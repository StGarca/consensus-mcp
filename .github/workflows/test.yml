name: tests

on:
  push:
    # main is the latest-released state; v* are the active release/dev
    # branches where all development lands (pre-v1.15.4 the trigger was
    # main-only, so CI was dormant from v1.13.0→v1.15.3 while every
    # release happened on a v* branch — fixed in v1.15.4).
    branches: [main, 'v*']
  pull_request:
    branches: [main, 'v*']

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    env:
      # Skip codex-cli-dependent tests; CI does not install the real codex binary.
      CONSENSUS_MCP_SKIP_CODEX_CLI_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run pytest
        run: python -m pytest consensus_mcp/tests/ -q

      - name: Run validator self-tests
        run: python consensus_mcp/validators/run_validator_tests.py
