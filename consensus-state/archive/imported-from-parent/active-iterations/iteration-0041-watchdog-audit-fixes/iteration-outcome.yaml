  Landed 3 audit findings in scripts/agent_loop_mcp/_visibility_watchdog.py
  from 2026-05-11 parallel audit dispatches.

  FINDINGS ADDRESSED:
    perf-rev-005 HIGH: _read_jsonl slurps entire dispatch-log.jsonl every
      run. Added _read_jsonl_streaming(path, since_ts=None) generator +
      --window-days CLI flag (default 7; 0 disables). Legacy _read_jsonl
      kept as thin list-returning wrapper for back-compat.
    xplat-rev-006 MEDIUM: _default_repo_root parent.parent.parent walk
      could land in site-packages after a non-editable install. Replaced
      with marker-validated resolver:
        1. AGENT_LOOP_MCP_REPO_ROOT env (authoritative; raises if invalid)
        2. Path.cwd() if markers present
        3. Walk parents of __file__ until markers OR root
      Fails loudly via new RepoRootResolutionError if none match.
    xplat-rev-007 MEDIUM: JSONL append had no cross-process serialization
      on Windows. Added _locked_append(path, payload) helper using
      msvcrt.locking on Windows + fcntl.flock on POSIX. emit_stalled_event
      now routes through it.

  Version bump: WATCHDOG_VERSION 1.0.0 -> 1.1.0.

  VERIFICATION:
    pytest scripts/agent_loop_mcp/tests/test_visibility_watchdog.py
      → 27 passed (was 14; +13 new regression tests:
