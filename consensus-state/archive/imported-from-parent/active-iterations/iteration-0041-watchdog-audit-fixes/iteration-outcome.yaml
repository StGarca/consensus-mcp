      - repo_root walks-to-marker / env-var-honored / env-var-invalid / no-markers-anywhere
      - locked_append basic + parent-dir-creation + 50-thread fan-out concurrent-safe
      - main --window-days flag honored + zero-disables)
    Full suite: 417 passed

