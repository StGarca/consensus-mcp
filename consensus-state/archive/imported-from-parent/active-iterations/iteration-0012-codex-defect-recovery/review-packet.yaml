design_notes:
  - |
    F2 helper signature: _collect_changed_files(repo_root: Path) -> list[str].
    Returns de-duplicated, sorted list. Per-view subprocess timeouts set; per-view
    subprocess failures swallowed (best-effort). The rule itself becomes stricter
    overall: previously a clean-staged + dirty-unstaged scenario silently passed;
    now it correctly flags.
  - |
    F3 wrap is in the redirect_stdout context but BEFORE the JSON parse — so a
    helper exception during stdin/argv/path-resolution produces an immediate
    structured return without reaching json.loads. The existing
    WrapperJsonDecodeError path is unchanged for the post-stdout parse failure.
  - |
    F4 lex-sort handles current iteration naming convention
    (iteration-NNNN-suffix). Future iterations using different naming may need
    a more sophisticated sort; documented as a known limitation in
    self_review_findings.
  - |
    F5 is documentation-only. Adds status_caveat top-level field to
    iter-0011 outcome.yaml. No schema validator currently enforces shape;
    additive change is safe.

