recovery_chain_demonstrated:
  class_3_recovery_status: |
    PARTIAL DEMO. Codex round-1 found 2 real defects (codex-rev-001 medium F4
    substring + codex-rev-002 low F5 phantom block). Both addressed in
    round-2 with empirical verification (n=7 -> n=6 for F4; new
    fault_recovery_demo_status block exists for F5). Round-2 claude review
    confirmed goal_satisfied=true. Round-2+ codex re-dispatches REJECTED
    by helper validator due to codex consistently emitting narrative text
    in blocking_objections instead of canonical 'codex-rev-NNN' IDs (3
    independent attempts). Helper invariant correctly catches malformed
    output; codex's substance was: 'review_target_path content unavailable
    / lacks verifiable patch/code content'. That is a DIFFERENT finding
    class than round-1.
  what_was_proved:
    - 'F2 stop-rule diff collection (HIGH severity codex finding) caught real working-tree violations on first run — fix self-validated'
    - 'F3 helper exception wrapping returns structured {ok:false} for direct MCP callers'
    - 'F4 G_real_iter substring->exact membership (codex round-1 medium) verified by n changing 7->6'
    - 'F5 fault_recovery_demo_status block (codex round-1 low) added to iter-0011 outcome.yaml'
    - 'cross_document_drift_detected stop rule fired correctly when review-packet updated mid-iteration'
    - 'claude_codex_goal_satisfaction_disagreement stop rule fired correctly on stale round-1 codex'
    - 'Recovery cycle: codex-finds -> address -> verify -> codex-re-review (3 layers traversed)'
  what_was_not_proved:
    - 'Single CLEAN second codex seal post-fix (codex-side format issue blocks)'
    - 'Operator-pristine quorum_close_passed close (supervisor strict-correctly blocks)'

converged_recommendations:
  - 'F2/F3/F4-round-2/F5-round-2 implementations verified by independent claude review + empirical evidence'
  - 'helper failure-containment behavior demonstrated end-to-end across multiple layers'
  - 'codex output-format issue is real systemic concern; warrants iter-0013 prompt-template review'

divergent_recommendations:
  - id: codex_round_1_vs_round_2_state
