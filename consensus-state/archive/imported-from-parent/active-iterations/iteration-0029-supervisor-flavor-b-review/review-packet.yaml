review_target: scripts/agent_loop_mcp/tools/loop_run_goal.py + scripts/agent_loop_mcp/tests/test_loop_run_goal.py (the SUPERVISOR STATE MACHINE subsystem of agent-loop, subsystem 4 of the Flavor B review chain). The 2 embedded touched-file contents in defect_target.touched_files_contents ARE the authoritative source for this review. Do not attempt to read files from disk. _self_drive.py is OUT OF SCOPE for this iteration (deferred to iter-0031); you may reference _self_drive helper calls by name (cmd_validate, cmd_check_stop_rules, _extract_goal_satisfied, _read_yaml_or_empty, _scope_signature) but do not propose fixes to _self_drive itself.
reviewer_question: "Review the supervisor state machine subsystem (loop_run_goal MCP tool + its\ntests) for defects, drift from documented behavior, hidden assumptions, and\nmissed requirements. This subsystem is the OUTER coordinator of every\nagent-loop iteration; bugs here either silently skip required gates\n(forbidden-transition leakage, closure-invariant bypass, schema-\nadditional-properties leakage) or surface false-positive next-action hints\nthat burn operator cycles.\n\nOut of scope: scripts/agent_loop_mcp/_self_drive.py (deferred to iter-0031,\na separate Flavor B target). You may cite _self_drive helper calls in\nloop_run_goal (cmd_validate, cmd_check_stop_rules, _extract_goal_satisfied,\n_read_yaml_or_empty, _scope_signature) but do not author fixes to\n_self_drive itself; flag any concerns as iter-0031 followup-scope.\n\nThoroughness dimensions specific to this subsystem (probe each):\n\n1. State-machine precedence correctness (_detect_state_from_files):\n   - Order of checks\
  \ in the precedence ladder (closed > disagreement >\n     blocked_stop_rule > needs_implementation > needs_claude_review >\n     ready_for_codex > patch-verification states > needs_consensus >\n     ready_to_close). Is the order documented in the module docstring\n     consistent with the code?\n   - State precedence drift: does any earlier check leak into a later\n     branch (e.g., a \"closed\" iteration with active stop rules ever\n     misreport as blocked_stop_rule_fired)?\n   - Are the patch-verification states placed BEFORE the\n     needs_consensus / ready_to_close branch (so a corrected_resubmit\n     patch verdict cannot bypass the forbidden close path)?\n\n2. Forbidden transition enforcement:\n   - The spec forbids `corrected_resubmit -> ready_to_close`. Verify that\n     _detect_patch_verification_state's corrected_resubmit branch\n     unconditionally returns the patch_corrected state regardless of\n     consensus.yaml / outcome.yaml presence (i.e., the patch state\n     overrides\
  \ needs_consensus / ready_to_close).\n   - Test test_corrected_resubmit_does_NOT_advance_to_ready_to_close\n     covers this; is there ANY path (e.g., partial verifications, mixed\n     verdicts) that could let a corrected_resubmit slip through?\n   - \"Unknown verdict mixture\" branch: the comment says be conservative\n     and return codex_patch_proposed; what about an explicit invalid\n     verdict like \"rejected\" or \"needs_changes\" that is not approved /\n     corrected_resubmit / null? Is \"conservative\" the safe call here or\n     should it be a distinct error state?\n\n3. Closure-invariant guard at ready_to_close\n   (_closure_invariant_blocks_close):\n   - The function reads independence-audit.yaml's audit_log, finds\n     last_mutation, picks the most-recent post-mutation review by\n     created_at_utc, and runs check_closure_invariant. Verify the\n     timestamp comparison: string comparison of ISO-8601 strings works\n     correctly ONLY when both are UTC (Z suffix) and\
  \ same format. If a\n     review_yaml had a \"+00:00\" offset and the mutation had \"Z\", the\n     comparison would diverge. Is this a real risk in practice?\n   - When candidates is empty (no fresh post-mutation review),\n     _closure_invariant_blocks_close returns False (i.e., NOT blocked).\n     The docstring says this is intentional per Task #28 v4 spec --\n     fail-closed gate is at T6, not here. Is the docstring rationale\n     bulletproof? Could a directly-authored consensus.yaml (no fresh\n     review) sneak a ready_to_close past the supervisor and rely on T6\n     alone to catch it? Is that delegation safe, or should the\n     supervisor also be fail-closed?\n   - Exception path: the function catches Exception on import (line ~269)\n     and returns False. Is silent-swallow of an ImportError the right\n     call here? Could a broken closure-invariant module cause the\n     supervisor to advance to ready_to_close when it should block?\n\n4. Patch-verification state detection\
  \ (_detect_patch_verification_state):\n   - patch_id collection: when pp.get('patch_id') is None (or non-str),\n     the code appends (str(None), None) and continues. Is this\n     defensive enough? Could a None patch_id be silently misread as a\n     missing verification file (returning codex_patch_proposed instead\n     of a malformed-finding error)?\n   - The \"any unverified -> codex_patch_proposed\" guard fires even if\n     SOME patches are already verified. Is that the right precedence\n     (under-eager mass-approval safety), or should each patch be\n     individually verified before moving to the patch_verified state?\n   - Verification yaml path computation: verifications_dir /\n     f\"{patch_id}.yaml\". If patch_id contains a path separator\n     (\"../\") due to malformed codex output, could this escape the\n     iter_dir? (patch_id pattern check happens in _dispatch_codex, not\n     in the supervisor -- is the supervisor exposed to a path-traversal\n     risk if codex-review.yaml\
  \ is hand-edited?)\n   - All-approved branch: returns\n     patch_verified_ready_for_codex_resubmit. Is the post-correction\n     re-review actually enforced ELSEWHERE in the pipeline (the\n     supervisor only emits the state hint; what consumes it?), or\n     does the supervisor's hint alone gate the close?\n\n5. auto_dispatch_codex semantics:\n   - When auto_dispatch_codex=None, the default is True (good -- task\n     brief). When auto_dispatch_codex=False, the dispatch is skipped\n     entirely (good). Is there a case where auto_dispatch_codex=True\n     should NOT actually dispatch (e.g., when reviewer.dispatch_codex\n     is in a transient error state and the supervisor would re-invoke\n     it on every poll)?\n   - The exception-handling block (line ~409-417) catches Exception\n     and converts it to a synthetic dict with error_type. The\n     comment says \"non-JSONDecode exceptions (yaml.YAMLError pre-check,\n     ImportError, ValueError) must NOT escape.\" Verify that the\n\
  \     handler does NOT mask a legitimate operator-intent error (e.g.,\n     reviewer_dispatch_codex raises a permission error or a config\n     error that the operator should see immediately).\n   - After dispatch, state is re-detected. Are stop rules also\n     re-evaluated? Line 425 re-runs cmd_check_stop_rules -- good. But\n     does re-detection correctly handle the case where dispatch SUCCEEDED\n     but the freshly-sealed codex-review.yaml is itself malformed (the\n     re-detect would land at ready_for_codex still -- is that the right\n     state, or should it surface a \"dispatch_succeeded_but_review_unreadable\"\n     state)?\n\n6. SCHEMA strictness:\n   - input_schema has additionalProperties: False (line 99 confirmed).\n     Does output_schema have the same? Audit line 101-112: NO,\n     additionalProperties is unspecified at output level. Is that\n     intentional, or a leakage risk (e.g., a future field added in\n     handle() could escape unnoticed)?\n   - Nested objects\
  \ in actions_taken (items in the array) have no\n     declared schema -- items: not present. Is the implicit \"anything\n     goes\" inside actions_taken acceptable, or should it be tightened\n     to {action: str, result: object}?\n   - auto_dispatch_codex allows [boolean, null] -- does null actually\n     reach handle() as None, and does None correctly default to True?\n\n7. Error handling completeness (handle):\n   - _validate_goal_packet: catches Exception and converts to err\n     string. Good. Could it silently catch a KeyboardInterrupt or\n     SystemExit (Exception in Python 3 catches neither, but the\n     bare except in self_drive could; verify the surface)?\n   - _check_stop_rules: NO exception handler at all (line 172-185).\n     What happens if cmd_check_stop_rules raises? handle() returns\n     ok=True with an empty stop_rules_fired and proceeds to state\n     detection -- that is a SILENT FAILURE. Should _check_stop_rules\n     match _validate_goal_packet's defensive try/except?\n\
  \   - _detect_state_from_files: also no top-level exception handler.\n     What if a malformed iteration-outcome.yaml causes _read_yaml_or_empty\n     to fail (it should not, but if it did)?\n\n8. Anti-scope adherence (task brief, line 46-50):\n   - \"Does NOT auto-dispatch the claude reviewer\" -- verified by inspection.\n   - \"Does NOT synthesize consensus.yaml mechanically\" -- verified.\n   - \"Does NOT author iteration-outcome.yaml mechanically\" -- verified.\n   - \"Does NOT call Anthropic API\" -- verified (supervisor pattern).\n   - Are these anti-scope items enforced by any test, or only by code\n     reading? If the supervisor grew a \"synthesize consensus\" branch\n     in a future refactor, would CI catch it?\n\n9. State-name enum consistency:\n   - _NEXT_ACTION dict has 11 entries; _detect_state_from_files emits 11\n     distinct state strings (plus the goal_packet_invalid path in\n     handle). Verify every emit-able state has a matching _NEXT_ACTION\n     entry; verify\
  \ _NEXT_ACTION has no orphan entries that no state\n     emits.\n   - handle's _NEXT_ACTION.get(state, \"unknown state...\") fallback\n     means a typo in a state name would silently surface as \"unknown\n     state\". Is this defensive (good) or hiding bugs (e.g., the\n     orchestrator cannot distinguish a real new state from a bug)?\n\n10. Test coverage of the state machine:\n    - Every state in _NEXT_ACTION has at least ONE positive test\n      (test_state_*). Verify by enumeration: goal_packet_invalid,\n      closed, blocked_reviewer_disagreement, blocked_stop_rule_fired,\n      needs_implementation, needs_claude_review, ready_for_codex,\n      codex_patch_proposed, patch_verified_ready_for_codex_resubmit,\n      patch_corrected_by_claude_ready_for_codex_resubmit,\n      needs_consensus, ready_to_close. What about\n      blocked_closure_invariant_failed -- does it have ANY test? Audit\n      test_loop_run_goal.py for a test that exercises the closure-\n      invariant guard path\
  \ with a stale review timestamp.\n    - Negative tests for ready_to_close: claude=null, codex=null,\n      both=False. What about claude=True + codex=False?\n      Disagreement rule fires, so it routes to blocked_reviewer_disagreement\n      first -- is there a test verifying this exact precedence?\n    - Forbidden-transition test: test_corrected_resubmit_does_NOT_advance_to_ready_to_close\n      covers the consensus.yaml-present case. What about with an\n      iteration-outcome.yaml present (closing_state set)? Should the\n      \"closed\" state win even with a corrected_resubmit pending? (Per\n      precedence, yes -- but verify no test contradicts.)\n\n11. Backward compatibility (states added post-iter-0013 / iter-0018):\n    - codex_patch_proposed (Task #25 / iter-0015)\n    - patch_verified_ready_for_codex_resubmit (Task #25 / iter-0015)\n    - patch_corrected_by_claude_ready_for_codex_resubmit (Task #25 / iter-0015)\n    - blocked_closure_invariant_failed (Task #28 / iter-0019-ish)\n\
  \    Were these added in a way that an older iteration directory (no\n    codex-patch-verifications/, no independence-audit.yaml) gracefully\n    advances through the cascade without errors? The empty-iter_dir\n    smoke test (test_state_needs_implementation_empty_iter_dir) suggests\n    yes; spot-check the dropthrough of newer states on legacy iterations.\n\n12. dispatch action recording (actions_taken):\n    - Schema says actions_taken is type: array (no items schema). Test\n      test_state_ready_for_codex_auto_dispatch_calls_handle asserts\n      actions_taken[0].get(\"action\") == \"reviewer.dispatch_codex\" --\n      verify the action record shape is stable (i.e., handle()'s record\n      always has the {action, result} keys; result is whatever\n      reviewer_dispatch_codex returned).\n    - When dispatch raises (handled by the try/except), the synthetic\n      result dict has {ok: False, error: str, error_type: str}. Does\n      it also have a pass_id or any other field test_dispatch_codex_exception_is_contained\n\
  \      checks for? Verify the synthetic shape is identical-enough to the\n      real ok=True shape that consumers do not trip on missing fields.\n\n13. Module-level state hygiene:\n    - _NEXT_ACTION is a module-level dict. If a future refactor adds\n      mutation (someone .pop's an entry at runtime), tests would not\n      catch it because each test reimports a fresh module -- but the\n      production server process keeps the module loaded. Is _NEXT_ACTION\n      protected against mutation (frozen via types.MappingProxyType or\n      similar), or is the convention \"do not mutate it\" sufficient?\n\n14. Bare-import hygiene:\n    - test_no_orphan_yaml_import already enforces no bare import yaml.\n    - Are there any other tempting-to-add bare imports that should not\n      be there (e.g., import requests for a fake feature flag, or a\n      from agent_loop_mcp import server that would cause a circular\n      import)?\n\nOutput strict-mode fix-author policy applies (goal_packet.fix_author_policy:\n\
  strict); every finding MUST have either patch_proposal or\npatch_not_proposed_reason. Patches must stay within allowed_files (the 2\ntarget files + the iter-0029 dir). Empty findings is a valid review.\n"
