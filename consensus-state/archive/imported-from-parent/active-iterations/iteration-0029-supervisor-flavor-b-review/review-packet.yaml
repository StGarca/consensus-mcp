    scripts/agent_loop_mcp/tools/loop_run_goal.py: "\"\"\"loop.run_goal MCP tool — Phase 4 supervisor for the bounded quorum self-drive loop.\n\nThis is the SUPERVISOR pattern, not an autonomous Anthropic-API executor.\nIt is a state-machine coordinator: detects current iteration state from\nfilesystem inspection, advances as far as it can without driving Claude,\noptionally dispatches the codex reviewer when ready, and returns the\nnext-action hint for the external orchestrator.\n\nStates detected (precedence order, top wins):\n\n  1. goal_packet_invalid          -- _self_drive.cmd_validate fails\n  2. closed                        -- iteration-outcome.yaml has closing_state\n  3. blocked_reviewer_disagreement -- claude/codex goal_satisfied differ\n  4. blocked_stop_rule_fired       -- any of the 9 stop rules fires\n  5. needs_implementation          -- no review-packet.yaml\n  6. needs_claude_review           -- review-packet.yaml exists, no claude-review\n  7. ready_for_codex        \
      \       -- claude-review exists, no codex-review\n                                       (auto-dispatches if auto_dispatch_codex=True)\n\n  Task #25 (iter-0015) patch-verification states (between codex-review and\n  consensus when codex emits patch_proposals):\n\n  8a. codex_patch_proposed\n                              -- codex-review has finding(s) with\n                                 patch_proposal AND no matching verification\n                                 yaml in codex-patch-verifications/.\n  8b. patch_corrected_by_claude_ready_for_codex_resubmit\n                              -- verification yaml verdict=corrected_resubmit;\n                                 corrections must be applied + codex must\n                                 re-review. **Forbidden transition**:\n                                 corrected_resubmit -> ready_to_close. Must\n                                 route through codex_re_reviewing_after_claude_correction\n                                 first\
      \ per codex 2026-05-10 v4 directive.\n  8c. patch_verified_ready_for_codex_resubmit\n                              -- verification yaml verdict=approved;\n                                 the patch may be applied via apply.codex_patch\n                                 (Task #26 / iter-0016) under operator\n                                 authorization (env AGENT_LOOP_MCP_CODEX_PATCH_APPLY=1\n                                 + goal_packet.authorization.codex_patch_apply_authorized=true);\n                                 close still requires codex post-correction re-review.\n\n  9. needs_consensus               -- both reviews exist, no consensus.yaml\n  10. ready_to_close                -- consensus exists, no outcome, gates green,\n                                       both reviewers goal_satisfied=True\n\nAnti-scope (per Task #13 brief):\n  - Does NOT auto-dispatch the claude reviewer.\n  - Does NOT synthesize consensus.yaml mechanically.\n  - Does NOT author iteration-outcome.yaml\
      \ mechanically.\n  - Does NOT call Anthropic API; this is a SUPERVISOR, not autonomous executor.\n\nHelper reuse: cmd_validate, cmd_check_stop_rules, _scope_signature, etc. are\nimported from _self_drive. reviewer_dispatch_codex.handle is called directly\nwhen auto_dispatch_codex=True.\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport contextlib\nimport io\nimport json\nfrom pathlib import Path\n\nfrom agent_loop_mcp import _self_drive\nfrom agent_loop_mcp._self_drive import _read_yaml_or_empty\nfrom agent_loop_mcp.tools import reviewer_dispatch_codex\n\n\nSCHEMA = {\n    \"name\": \"loop.run_goal\",\n    \"description\": (\n        \"Supervisor for the bounded quorum self-drive loop. Detects current \"\n        \"iteration state from filesystem; advances as far as possible \"\n        \"non-autonomously; dispatches codex review when ready; returns \"\n        \"next-action for the external orchestrator.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"\
      object\",\n        \"properties\": {\n            \"goal_packet_path\": {\n                \"type\": \"string\",\n                \"description\": \"Repo-relative or absolute path to goal_packet.yaml.\",\n            },\n            \"iteration_dir\": {\n                \"type\": \"string\",\n                \"description\": \"Repo-relative or absolute path to the iteration directory.\",\n            },\n            \"auto_dispatch_codex\": {\n                \"type\": [\"boolean\", \"null\"],\n                \"description\": (\n                    \"If True (default), when state is 'ready_for_codex' the \"\n                    \"tool calls reviewer.dispatch_codex internally and seals \"\n                    \"the review. If False, returns ready_for_codex without \"\n                    \"dispatching.\"\n                ),\n            },\n        },\n        \"required\": [\"goal_packet_path\", \"iteration_dir\"],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\"\
      : {\n        \"type\": \"object\",\n        \"properties\": {\n            \"ok\": {\"type\": \"boolean\"},\n            \"state\": {\"type\": \"string\"},\n            \"next_action\": {\"type\": \"string\"},\n            \"actions_taken\": {\"type\": \"array\"},\n            \"stop_rules_fired\": {\"type\": \"array\"},\n            \"error\": {\"type\": [\"string\", \"null\"]},\n        },\n        \"required\": [\"ok\", \"state\", \"next_action\"],\n    },\n}\n\n\n# Map state -> human-readable next_action hint.\n_NEXT_ACTION = {\n    \"goal_packet_invalid\": \"blocked: fix goal_packet\",\n    \"closed\": \"iteration already closed\",\n    \"blocked_reviewer_disagreement\": \"address reviewer disagreement (claude vs codex)\",\n    \"blocked_stop_rule_fired\": \"address stop rule\",\n    \"blocked_closure_invariant_failed\": (\n        \"address closure invariant failure (see closure-certificate.yaml or stop_rules_fired)\"\n    ),\n    \"needs_implementation\": \"implement, then author\
      \ review-packet.yaml\",\n    \"needs_claude_review\": \"dispatch claude reviewer; seal claude-review.yaml\",\n    \"ready_for_codex\": \"dispatch codex reviewer (or call this tool with auto_dispatch_codex=True)\",\n    \"codex_patch_proposed\": (\n        \"dispatch claude patch-verifier subagent; call loop.verify_codex_patch (build_inputs)\"\n    ),\n    \"patch_verified_ready_for_codex_resubmit\": (\n        \"claude approved the patch; dispatch codex for post-correction re-review\"\n    ),\n    \"patch_corrected_by_claude_ready_for_codex_resubmit\": (\n        \"claude returned corrected_resubmit; apply corrections + dispatch codex re-review \"\n        \"(forbidden: corrected_resubmit -> ready_to_close)\"\n    ),\n    \"needs_consensus\": \"synthesize consensus.yaml\",\n    \"ready_to_close\": \"author iteration-outcome.yaml\",\n}\n\n\ndef _validate_goal_packet(goal_packet_path: str) -> tuple[bool, str | None]:\n    \"\"\"Run _self_drive.cmd_validate in-process; capture its JSON\
      \ stdout.\n\n    Returns (is_valid, error_message). is_valid means the packet is structurally\n    sound and authorized — a scope_signature mismatch (cmd_validate exit 2) is\n    treated as INVALID for supervisor purposes (the operator must re-seal).\n    \"\"\"\n    buf = io.StringIO()\n    try:\n        with contextlib.redirect_stdout(buf):\n            rc = _self_drive.cmd_validate(argparse.Namespace(goal_packet=goal_packet_path))\n    except Exception as exc:\n        # cmd_validate raises FileNotFoundError when the goal_packet doesn't\n        # exist (and may surface other read/parse errors). Convert to the\n        # supervisor's tuple contract so handle() never lets an exception\n        # escape and break the MCP {ok, state, next_action} return shape.\n        return False, f\"goal_packet_read_failed: {exc}\"\n    output = buf.getvalue().strip()\n    if rc == 0:\n        return True, None\n    try:\n        parsed = json.loads(output)\n        return False, parsed.get(\"error\"\
      ) or output\n    except Exception:\n        return False, output or f\"cmd_validate exit {rc}\"\n\n\ndef _check_stop_rules(goal_packet_path: str, iteration_dir: str) -> list[dict]:\n    \"\"\"Run _self_drive.cmd_check_stop_rules in-process; return stop_rules_fired list.\"\"\"\n    buf = io.StringIO()\n    with contextlib.redirect_stdout(buf):\n        _self_drive.cmd_check_stop_rules(\n            argparse.Namespace(\n                goal_packet=goal_packet_path,\n                iteration_dir=iteration_dir,\n            )\n        )\n    output = buf.getvalue().strip()\n    try:\n        parsed = json.loads(output)\n        return parsed.get(\"stop_rules_fired\", []) or []\n    except Exception:\n        return []\n\n\ndef _detect_state_from_files(iter_dir: Path, stop_rules_fired: list[dict]) -> str:\n    \"\"\"Detect state by file presence + stop-rule cross-check.\n\n    Precedence is enforced by the order of checks below. The disagreement\n    rule is special-cased to a more-specific\
      \ state name; other firing rules\n    map to the generic blocked_stop_rule_fired (with the rule list returned\n    in the output).\n\n    'review_yaml_parse_failed' breadcrumbs from _self_drive are NOT real\n    stop rules — they're parse-failure breadcrumbs. They're surfaced in\n    stop_rules_fired but do not trigger blocked_stop_rule_fired on their\n    own; the orchestrator can inspect the list.\n    \"\"\"\n    outcome_path = iter_dir / \"iteration-outcome.yaml\"\n    if outcome_path.exists():\n        outcome = _read_yaml_or_empty(outcome_path)\n        if outcome.get(\"closing_state\"):\n            return \"closed\"\n\n    rule_names = {r.get(\"rule\") for r in stop_rules_fired if isinstance(r, dict)}\n    if \"claude_codex_goal_satisfaction_disagreement\" in rule_names:\n        return \"blocked_reviewer_disagreement\"\n\n    # Filter parse-failure breadcrumbs out of the \"real stop rules\" set.\n    breadcrumb_rules = {\"review_yaml_parse_failed\", \"git_check_failed\"}\n\
      \    real_rules = rule_names - breadcrumb_rules\n    if real_rules:\n        return \"blocked_stop_rule_fired\"\n\n    review_packet = iter_dir / \"review-packet.yaml\"\n    claude_review = iter_dir / \"claude-review.yaml\"\n    codex_review = iter_dir / \"codex-review.yaml\"\n    consensus = iter_dir / \"consensus.yaml\"\n\n    if not review_packet.exists():\n        return \"needs_implementation\"\n    if not claude_review.exists():\n        return \"needs_claude_review\"\n    if not codex_review.exists():\n        return \"ready_for_codex\"\n\n    # Task #25 (iter-0015): patch-verification states. If codex-review.yaml\n    # has any finding with a patch_proposal, the supervisor must route\n    # through claude verification before close.\n    patch_state = _detect_patch_verification_state(iter_dir, codex_review)\n    if patch_state is not None:\n        return patch_state\n\n    if not consensus.exists():\n        return \"needs_consensus\"\n    # Consensus exists, but ready_to_close\
      \ requires both reviewers to have\n    # explicitly emitted goal_satisfied=True. A null/missing verdict from\n    # either reviewer means the consensus exists but isn't yet \"valid for\n    # close\" — orchestrator must add the missing verdict (or fix the\n    # disagreement) before closing.\n    claude_data = _read_yaml_or_empty(claude_review)\n    codex_data = _read_yaml_or_empty(codex_review)\n    if (_self_drive._extract_goal_satisfied(claude_data) is True\n            and _self_drive._extract_goal_satisfied(codex_data) is True):\n        # Task #28: closure-invariant guard. Before returning ready_to_close,\n        # verify the closer (most-recent post-mutation review) passes the\n        # cross-actor + hash-match + freshness invariant.\n        if _closure_invariant_blocks_close(iter_dir):\n            return \"blocked_closure_invariant_failed\"\n        return \"ready_to_close\"\n    return \"needs_consensus\"\n\n\ndef _closure_invariant_blocks_close(iter_dir: Path) -> bool:\n\
      \    \"\"\"Return True iff the closure invariant fails and a close attempt is pending.\n\n    Read last_mutation from independence-audit.yaml; if no apply_step_landed\n    events, no gating. Otherwise pick the most recent review (claude/codex)\n    whose created_at_utc came AFTER last_mutation.timestamp and run\n    check_closure_invariant. Return True on failure.\n    \"\"\"\n    try:\n        from agent_loop_mcp._closure_invariant import (\n            check_closure_invariant,\n            last_mutation_from_audit,\n        )\n    except Exception:\n        return False\n    audit_path = iter_dir / \"independence-audit.yaml\"\n    if not audit_path.exists():\n        return False\n    audit = _read_yaml_or_empty(audit_path)\n    log = audit.get(\"audit_log\", []) or []\n    last_mutation = last_mutation_from_audit(log)\n    if last_mutation is None:\n        return False\n    lm_ts = last_mutation.get(\"timestamp\") or last_mutation.get(\"timestamp_utc\") or \"\"\n    candidates\
      \ = []\n    for review_path in (iter_dir / \"claude-review.yaml\", iter_dir / \"codex-review.yaml\"):\n        if review_path.exists():\n            review = _read_yaml_or_empty(review_path)\n            closer_ts = review.get(\"created_at_utc\")\n            if closer_ts and closer_ts > lm_ts:\n                candidates.append((closer_ts, review))\n    if not candidates:\n        # Asymmetric with T6 by design (per Task #28 v4 spec): the supervisor\n        # transition guard does NOT block here — it returns \"not blocked\" so\n        # the supervisor can advance through normal states (needs_consensus,\n        # needs_claude_review, etc.) when no fresh post-mutation review exists\n        # yet. The fail-closed gate is at T6 (audit_append_event for\n        # iteration_closed events). Real loop.run_goal-driven flow can't reach\n        # ready_to_close without both reviews present, so this asymmetry only\n        # matters for direct audit.append_event bypass paths — which T6 catches.\n\
      \        return False\n    candidates.sort(key=lambda x: x[0], reverse=True)\n    _, closer_verdict = candidates[0]\n    inv = check_closure_invariant(last_mutation, closer_verdict)\n    return not inv[\"ok\"]\n\n\ndef _detect_patch_verification_state(iter_dir: Path, codex_review: Path) -> str | None:\n    \"\"\"Task #25 (iter-0015): detect patch-verification sub-states.\n\n    Returns one of:\n      - \"codex_patch_proposed\"\n      - \"patch_corrected_by_claude_ready_for_codex_resubmit\"\n      - \"patch_verified_ready_for_codex_resubmit\"\n      - None (no patch_proposal in codex-review; supervisor proceeds normally)\n\n    The forbidden transition `corrected_resubmit -> ready_to_close` is\n    enforced here by returning the patch_corrected state regardless of\n    consensus/outcome presence — this state takes precedence over\n    ready_to_close (called BEFORE the consensus/ready_to_close branch\n    in _detect_state_from_files).\n    \"\"\"\n    review = _read_yaml_or_empty(codex_review)\n\
      \    findings = review.get(\"findings\") or []\n    patch_findings = [\n        f for f in findings\n        if isinstance(f, dict) and isinstance(f.get(\"patch_proposal\"), dict)\n    ]\n    if not patch_findings:\n        return None\n\n    verifications_dir = iter_dir / \"codex-patch-verifications\"\n\n    # Collect (patch_id, verdict) for each patch-bearing finding.\n    statuses: list[tuple[str, str | None]] = []\n    for f in patch_findings:\n        pp = f.get(\"patch_proposal\")\n        patch_id = pp.get(\"patch_id\") if isinstance(pp, dict) else None\n        if not patch_id:\n            statuses.append((str(patch_id), None))\n            continue\n        v_path = verifications_dir / f\"{patch_id}.yaml\"\n        if not v_path.exists():\n            statuses.append((patch_id, None))\n            continue\n        v_data = _read_yaml_or_empty(v_path)\n        statuses.append((patch_id, v_data.get(\"verdict\")))\n\n    # Any unverified -> codex_patch_proposed (orchestrator\
      \ must run verifier).\n    if any(verdict is None for _pid, verdict in statuses):\n        return \"codex_patch_proposed\"\n\n    # Any corrected_resubmit -> forbidden close path; require codex re-review.\n    if any(verdict == \"corrected_resubmit\" for _pid, verdict in statuses):\n        return \"patch_corrected_by_claude_ready_for_codex_resubmit\"\n\n    # All approved -> still requires codex post-correction re-review per spec.\n    if all(verdict == \"approved\" for _pid, verdict in statuses):\n        return \"patch_verified_ready_for_codex_resubmit\"\n\n    # Unknown verdict mixture -> remain in codex_patch_proposed (be conservative).\n    return \"codex_patch_proposed\"\n\n\ndef handle(\n    goal_packet_path: str,\n    iteration_dir: str,\n    auto_dispatch_codex: bool | None = None,\n) -> dict:\n    \"\"\"Supervisor entry point.\n\n    Returns a dict matching SCHEMA[\"output_schema\"]. ok=False iff goal_packet\n    is invalid or an unrecoverable error occurred. ok=True for\
      \ all other\n    states (including blocked_*) -- the state itself signals what to do\n    next.\n    \"\"\"\n    actions_taken: list[dict] = []\n\n    # Step 1: validate goal_packet structure + authorization + signature.\n    is_valid, err = _validate_goal_packet(goal_packet_path)\n    if not is_valid:\n        return {\n            \"ok\": False,\n            \"state\": \"goal_packet_invalid\",\n            \"next_action\": _NEXT_ACTION[\"goal_packet_invalid\"],\n            \"actions_taken\": actions_taken,\n            \"stop_rules_fired\": [],\n            \"error\": err,\n        }\n\n    iter_dir = Path(iteration_dir)\n\n    # Step 2: stop-rule check.\n    stop_rules_fired = _check_stop_rules(goal_packet_path, iteration_dir)\n\n    # Step 3: detect state.\n    state = _detect_state_from_files(iter_dir, stop_rules_fired)\n\n    # Step 4: optional auto-dispatch of codex when ready.\n    if state == \"ready_for_codex\":\n        # Default auto_dispatch_codex=True per task brief.\n\
      \        do_dispatch = True if auto_dispatch_codex is None else bool(auto_dispatch_codex)\n        if do_dispatch:\n            try:\n                # Per codex-rev-001 (iter-0010): pass review_target_path so codex\n                # gets explicit review-target-binding instead of fallback-scope review.\n                # By the time auto-dispatch fires the state cascade guarantees\n                # review-packet.yaml exists in iter_dir.\n                dispatch_result = reviewer_dispatch_codex.handle(\n                    goal_packet_path=goal_packet_path,\n                    iteration_dir=iteration_dir,\n                    review_target_path=str(iter_dir / \"review-packet.yaml\"),\n                )\n            except Exception as exc:\n                # The wrapper hardening (Task #15) only contains JSONDecodeError;\n                # other exceptions (yaml.YAMLError pre-check, ImportError,\n                # ValueError, etc.) must NOT escape and break the MCP contract.\n \
      \               dispatch_result = {\n                    \"ok\": False,\n                    \"error\": str(exc),\n                    \"error_type\": type(exc).__name__,\n                }\n            actions_taken.append({\n                \"action\": \"reviewer.dispatch_codex\",\n                \"result\": dispatch_result,\n            })\n            # Re-detect state after the dispatch attempt. If the seal succeeded,\n            # codex-review.yaml now exists and the state advances. If it failed,\n            # state stays ready_for_codex (the file wasn't written).\n            stop_rules_fired = _check_stop_rules(goal_packet_path, iteration_dir)\n            state = _detect_state_from_files(iter_dir, stop_rules_fired)\n\n    return {\n        \"ok\": True,\n        \"state\": state,\n        \"next_action\": _NEXT_ACTION.get(state, \"unknown state — orchestrator decision\"),\n        \"actions_taken\": actions_taken,\n        \"stop_rules_fired\": stop_rules_fired,\n     \
      \   \"error\": None,\n    }\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    scripts/agent_loop_mcp/tests/test_loop_run_goal.py: "\"\"\"Unit tests for tools/loop_run_goal.py — Phase 4 supervisor MCP tool.\n\nThe supervisor is a state-machine coordinator: it reads filesystem state of\nan iteration_dir, recognizes which phase the iteration is in, and returns\nthe next-action hint for the orchestrator. Optionally auto-dispatches the\ncodex reviewer when state == ready_for_codex.\n\nAnti-scope (kept thin per Task #13):\n  - Does NOT auto-dispatch claude reviewer.\n  - Does NOT synthesize consensus.yaml.\n  - Does NOT close the iteration (no iteration-outcome.yaml authoring).\n  - Does NOT call Anthropic API; this is the SUPERVISOR pattern.\n\nTests use tmp_path for iteration_dir isolation, build goal_packets with a\nmatching scope_signature so cmd_validate accepts them, and monkeypatch\nreviewer_dispatch_codex.handle to avoid real codex calls.\n\"\"\"\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport pytest\nimport yaml\n\nREPO_ROOT\
      \ = Path(__file__).resolve().parent.parent.parent.parent\nsys.path.insert(0, str(REPO_ROOT / \"scripts\"))\n\nfrom agent_loop_mcp import _self_drive  # noqa: E402\nfrom agent_loop_mcp.tool_registry import ToolRegistry  # noqa: E402\nfrom agent_loop_mcp.tools import loop_run_goal  # noqa: E402\nfrom agent_loop_mcp.tools import reviewer_dispatch_codex  # noqa: E402\n\n\n# ---- fixture helpers --------------------------------------------------------\n\n\ndef _write_valid_goal_packet(tmp_path: Path, **overrides) -> Path:\n    \"\"\"Write a goal_packet with matching scope_signature so cmd_validate exits 0.\n\n    Mirrors the minimal-required-fields pattern from test_self_drive_stop_rules.py\n    (_write_goal_packet) but additionally seals the canonical scope_signature so\n    the supervisor's validate-then-proceed branch is exercised.\n    \"\"\"\n    packet = {\n        \"schema_version\": 1,\n        \"pilot_id\": \"test-supervisor\",\n        \"goal\": {\"summary\": \"x\"},\n       \
      \ \"allowed_files\": [\"scripts/foo.py\"],\n        \"allowed_sections\": [],\n        \"forbidden_files\": [],\n        \"max_iterations\": 10,\n        \"max_patch_size\": None,\n        \"validators_required\": [],\n        \"acceptance_gates\": [],\n        \"stop_conditions\": [],\n        \"operator_escalation_triggers\": [],\n        \"authorization\": {\"authorized_by\": \"operator\"},\n    }\n    packet.update(overrides)\n    sig = _self_drive._scope_signature(packet)\n    packet[\"authorization\"][\"scope_signature\"] = sig\n    p = tmp_path / \"goal_packet.yaml\"\n    p.write_text(yaml.safe_dump(packet), encoding=\"utf-8\")\n    return p\n\n\ndef _write_invalid_goal_packet_missing_field(tmp_path: Path) -> Path:\n    \"\"\"Goal packet missing a required field — cmd_validate returns 1.\"\"\"\n    packet = {\n        \"schema_version\": 1,\n        \"pilot_id\": \"test-invalid\",\n        # missing 'goal', 'allowed_files', etc.\n    }\n    p = tmp_path / \"goal_packet.yaml\"\
      \n    p.write_text(yaml.safe_dump(packet), encoding=\"utf-8\")\n    return p\n\n\ndef _make_iter_dir(tmp_path: Path) -> Path:\n    iter_dir = tmp_path / \"iteration-0001\"\n    iter_dir.mkdir()\n    return iter_dir\n\n\n# ---- SCHEMA shape -----------------------------------------------------------\n\n\ndef test_schema_name_is_loop_run_goal():\n    assert loop_run_goal.SCHEMA[\"name\"] == \"loop.run_goal\"\n\n\ndef test_schema_required_fields():\n    required = set(loop_run_goal.SCHEMA[\"input_schema\"][\"required\"])\n    assert required == {\"goal_packet_path\", \"iteration_dir\"}\n\n\ndef test_schema_optional_auto_dispatch_codex_present():\n    props = loop_run_goal.SCHEMA[\"input_schema\"][\"properties\"]\n    assert \"auto_dispatch_codex\" in props\n\n\ndef test_schema_disallows_additional_properties():\n    assert loop_run_goal.SCHEMA[\"input_schema\"][\"additionalProperties\"] is False\n\n\ndef test_schema_output_required_fields():\n    required = set(loop_run_goal.SCHEMA[\"\
      output_schema\"][\"required\"])\n    assert required == {\"ok\", \"state\", \"next_action\"}\n\n\n# ---- register() integration -------------------------------------------------\n\n\ndef test_register_adds_tool_to_registry():\n    registry = ToolRegistry()\n    loop_run_goal.register(registry)\n    names = [t[\"name\"] for t in registry.list_tools()]\n    assert \"loop.run_goal\" in names\n\n\ndef test_register_handler_is_callable():\n    registry = ToolRegistry()\n    loop_run_goal.register(registry)\n    handler = registry.get_handler(\"loop.run_goal\")\n    assert callable(handler)\n\n\n# ---- state: goal_packet_invalid ---------------------------------------------\n\n\ndef test_state_goal_packet_invalid_missing_field(tmp_path):\n    \"\"\"Invalid goal_packet (missing required field) -> state=goal_packet_invalid, ok=False.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    bad = _write_invalid_goal_packet_missing_field(tmp_path)\n    result = loop_run_goal.handle(\n        goal_packet_path=str(bad),\n\
      \        iteration_dir=str(iter_dir),\n    )\n    assert result[\"state\"] == \"goal_packet_invalid\"\n    assert result[\"ok\"] is False\n    assert result[\"error\"]\n\n\ndef test_state_goal_packet_invalid_authorization_missing(tmp_path):\n    \"\"\"Goal packet missing authorization.authorized_by -> goal_packet_invalid.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    packet = {\n        \"schema_version\": 1,\n        \"pilot_id\": \"no-auth\",\n        \"goal\": {\"summary\": \"x\"},\n        \"allowed_files\": [],\n        \"max_iterations\": 1,\n        \"validators_required\": [],\n        \"acceptance_gates\": [],\n        \"stop_conditions\": [],\n        \"authorization\": {},  # missing authorized_by\n    }\n    p = tmp_path / \"goal_packet.yaml\"\n    p.write_text(yaml.safe_dump(packet), encoding=\"utf-8\")\n    result = loop_run_goal.handle(\n        goal_packet_path=str(p),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"state\"] == \"goal_packet_invalid\"\
      \n    assert result[\"ok\"] is False\n\n\n# ---- state: needs_implementation --------------------------------------------\n\n\ndef test_state_needs_implementation_empty_iter_dir(tmp_path):\n    \"\"\"Valid goal_packet + empty iter_dir -> needs_implementation.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    pkt = _write_valid_goal_packet(tmp_path)\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"needs_implementation\"\n    assert \"implement\" in result[\"next_action\"].lower()\n    assert result[\"actions_taken\"] == []\n\n\n# ---- state: needs_claude_review ---------------------------------------------\n\n\ndef test_state_needs_claude_review(tmp_path):\n    \"\"\"review-packet.yaml present, no claude-review -> needs_claude_review.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"\
      iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"needs_claude_review\"\n    assert \"claude\" in result[\"next_action\"].lower()\n\n\n# ---- state: ready_for_codex (no auto-dispatch) ------------------------------\n\n\ndef test_state_ready_for_codex_no_auto_dispatch(tmp_path, monkeypatch):\n    \"\"\"claude-review present, no codex-review, auto_dispatch_codex=False ->\n    ready_for_codex; reviewer.dispatch_codex.handle NOT called.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    pkt\
      \ = _write_valid_goal_packet(tmp_path)\n\n    called = []\n\n    def fake_handle(**kw):\n        called.append(kw)\n        return {\"ok\": True}\n\n    monkeypatch.setattr(reviewer_dispatch_codex, \"handle\", fake_handle)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n        auto_dispatch_codex=False,\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"ready_for_codex\"\n    assert called == [], \"reviewer.dispatch_codex must NOT be called when auto_dispatch_codex=False\"\n    assert result[\"actions_taken\"] == []\n\n\n# ---- state: ready_for_codex (auto-dispatch) ---------------------------------\n\n\ndef test_state_ready_for_codex_auto_dispatch_calls_handle(tmp_path, monkeypatch):\n    \"\"\"claude-review present, no codex-review, auto_dispatch_codex=True ->\n    reviewer.dispatch_codex.handle is called; state advances afterward.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir\
      \ / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    called = []\n\n    def fake_handle(**kw):\n        called.append(kw)\n        # Simulate a successful seal: write the codex-review.yaml so the\n        # post-action state-recheck transitions out of ready_for_codex.\n        (iter_dir / \"codex-review.yaml\").write_text(\n            yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n        )\n        return {\"ok\": True, \"pass_id\": \"codex-test-pass1\"}\n\n    monkeypatch.setattr(reviewer_dispatch_codex, \"handle\", fake_handle)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n        auto_dispatch_codex=True,\n    )\n    assert result[\"ok\"] is True\n\
      \    assert len(called) == 1\n    assert called[0][\"goal_packet_path\"] == str(pkt)\n    assert called[0][\"iteration_dir\"] == str(iter_dir)\n    # actions_taken must record the dispatch\n    assert len(result[\"actions_taken\"]) == 1\n    assert result[\"actions_taken\"][0].get(\"action\") == \"reviewer.dispatch_codex\"\n    # State must advance after dispatch (codex-review.yaml now exists)\n    assert result[\"state\"] == \"needs_consensus\"\n\n\ndef test_state_ready_for_codex_auto_dispatch_default_is_true(tmp_path, monkeypatch):\n    \"\"\"auto_dispatch_codex omitted -> defaults to True.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    called = []\n\n    def fake_handle(**kw):\n\
      \        called.append(kw)\n        (iter_dir / \"codex-review.yaml\").write_text(\n            yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n        )\n        return {\"ok\": True}\n\n    monkeypatch.setattr(reviewer_dispatch_codex, \"handle\", fake_handle)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert len(called) == 1, \"default auto_dispatch_codex must be True\"\n    assert result[\"state\"] == \"needs_consensus\"\n\n\ndef test_state_ready_for_codex_auto_dispatch_failure_propagates(tmp_path, monkeypatch):\n    \"\"\"If reviewer.dispatch_codex.handle returns ok=False, the supervisor\n    surfaces the failure and remains in ready_for_codex (codex-review not sealed).\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\"\
      ).write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    def fake_handle(**kw):\n        return {\"ok\": False, \"error\": \"codex CLI not found\", \"error_type\": \"FileNotFoundError\"}\n\n    monkeypatch.setattr(reviewer_dispatch_codex, \"handle\", fake_handle)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n        auto_dispatch_codex=True,\n    )\n    # state stays ready_for_codex (codex-review.yaml not produced)\n    assert result[\"state\"] == \"ready_for_codex\"\n    # the dispatch attempt is recorded with ok=False\n    assert len(result[\"actions_taken\"]) == 1\n    assert result[\"actions_taken\"][0][\"result\"][\"ok\"] is False\n\n\n# ---- state: needs_consensus -------------------------------------------------\n\n\ndef test_state_needs_consensus_both_reviews_agree(tmp_path):\n    \"\"\"Both reviews exist with goal_satisfied=true\
      \ and no consensus yet ->\n    needs_consensus.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"codex-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"needs_consensus\"\n    assert \"consensus\" in result[\"next_action\"].lower()\n\n\n# ---- state: blocked_reviewer_disagreement -----------------------------------\n\n\ndef test_state_blocked_reviewer_disagreement(tmp_path):\n    \"\"\"Both reviews exist but goal_satisfied\
      \ differs -> blocked_reviewer_disagreement.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"codex-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": False}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"state\"] == \"blocked_reviewer_disagreement\"\n    # The disagreement stop rule must also surface in stop_rules_fired\n    fired_rules = [r[\"rule\"] for r in result[\"stop_rules_fired\"]]\n    assert \"claude_codex_goal_satisfaction_disagreement\" in fired_rules\n\n\n# ---- state: ready_to_close --------------------------------------------------\n\
      \n\ndef test_state_ready_to_close(tmp_path):\n    \"\"\"Consensus exists, no outcome, both reviewers satisfied, gates green ->\n    ready_to_close.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"codex-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"consensus.yaml\").write_text(\n        yaml.safe_dump({\"reviewed_artifacts\": {}}), encoding=\"utf-8\"\n    )\n    # No acceptance_gates in the goal packet -> trivially green.\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert\
      \ result[\"state\"] == \"ready_to_close\"\n    assert \"outcome\" in result[\"next_action\"].lower() or \"close\" in result[\"next_action\"].lower()\n\n\n# ---- state: closed ----------------------------------------------------------\n\n\ndef test_state_closed_iteration_outcome_present(tmp_path):\n    \"\"\"iteration-outcome.yaml present with closing_state -> closed.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"iteration-outcome.yaml\").write_text(\n        yaml.safe_dump({\"closing_state\": \"quorum_close_passed\"}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"closed\"\n    assert \"already\" in result[\"next_action\"].lower() or \"closed\" in result[\"next_action\"].lower()\n\n\n# ---- state: blocked_stop_rule_fired -----------------------------------------\n\
      \n\ndef test_state_blocked_stop_rule_fired_max_iterations(tmp_path):\n    \"\"\"max_iterations exceeded via independence-audit.yaml -> blocked_stop_rule_fired.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    # No review-packet.yaml present yet — but max iterations already hit.\n    audit_log = {\n        \"audit_log\": [\n            {\"event\": \"patch_applied\"},\n            {\"event\": \"patch_applied\"},\n        ]\n    }\n    (iter_dir / \"independence-audit.yaml\").write_text(\n        yaml.safe_dump(audit_log), encoding=\"utf-8\"\n    )\n    # max_iterations=1 so two patch_applied entries trip the rule.\n    pkt = _write_valid_goal_packet(tmp_path, max_iterations=1)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"state\"] == \"blocked_stop_rule_fired\"\n    fired_rules = [r[\"rule\"] for r in result[\"stop_rules_fired\"]]\n    assert \"max_iteration_count_reached\" in fired_rules\n\
      \n\n# ---- Critical 1: ready_to_close requires both reviewers goal_satisfied=True --\n\n\ndef test_ready_to_close_blocked_when_codex_goal_satisfied_null(tmp_path):\n    \"\"\"consensus.yaml exists, claude=True, codex goal_satisfied missing/null\n    -> NOT ready_to_close; falls through to needs_consensus.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    # codex review file present but goal_satisfied missing (None / null).\n    (iter_dir / \"codex-review.yaml\").write_text(\n        yaml.safe_dump({\"some_other_field\": \"x\"}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"consensus.yaml\").write_text(\n        yaml.safe_dump({\"reviewed_artifacts\": {}}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\
      \n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] != \"ready_to_close\"\n    assert result[\"state\"] == \"needs_consensus\"\n\n\ndef test_ready_to_close_blocked_when_claude_goal_satisfied_missing(tmp_path):\n    \"\"\"consensus.yaml exists, codex=True, claude goal_satisfied missing\n    -> NOT ready_to_close; falls through to needs_consensus.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"some_other_field\": \"x\"}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"codex-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"consensus.yaml\").write_text(\n        yaml.safe_dump({\"\
      reviewed_artifacts\": {}}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"needs_consensus\"\n\n\ndef test_ready_to_close_blocked_when_both_false(tmp_path):\n    \"\"\"consensus.yaml exists, both reviewers goal_satisfied=False\n    -> NOT ready_to_close. (Disagreement rule does not fire because they agree.)\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": False}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"codex-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": False}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"consensus.yaml\"\
      ).write_text(\n        yaml.safe_dump({\"reviewed_artifacts\": {}}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] != \"ready_to_close\"\n\n\n# ---- Critical 2: missing goal_packet raises -> handled, returns ok=False -----\n\n\ndef test_handle_missing_goal_packet_returns_invalid_state(tmp_path):\n    \"\"\"goal_packet_path points to nonexistent file -> state=goal_packet_invalid,\n    ok=False, no exception.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    missing = tmp_path / \"does_not_exist.yaml\"\n    # Must NOT raise FileNotFoundError.\n    result = loop_run_goal.handle(\n        goal_packet_path=str(missing),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is False\n    assert result[\"state\"] == \"goal_packet_invalid\"\n    assert result[\"error\"\
      ]\n    # Surface the read-failure shape so orchestrator can distinguish from a\n    # parse failure.\n    assert \"read_failed\" in result[\"error\"] or \"not found\" in result[\"error\"].lower() \\\n        or \"no such file\" in result[\"error\"].lower() or \"does not exist\" in result[\"error\"].lower() \\\n        or \"errno 2\" in result[\"error\"].lower()\n\n\n# ---- Important 3: reviewer_dispatch_codex.handle exception is contained -----\n\n\ndef test_dispatch_codex_exception_is_contained_no_propagation(tmp_path, monkeypatch):\n    \"\"\"If reviewer_dispatch_codex.handle raises (non-JSONDecode error like\n    yaml.YAMLError, ImportError, ValueError), the supervisor must:\n      - not let the exception propagate\n      - record the synthetic action result with ok=False + error_type\n      - leave state at ready_for_codex (no codex-review sealed).\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\"\
      : []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    def boom(**kw):\n        raise ValueError(\"test exception\")\n\n    monkeypatch.setattr(reviewer_dispatch_codex, \"handle\", boom)\n\n    # Must not raise.\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n        auto_dispatch_codex=True,\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"ready_for_codex\"\n    assert len(result[\"actions_taken\"]) == 1\n    rec = result[\"actions_taken\"][0]\n    assert rec[\"action\"] == \"reviewer.dispatch_codex\"\n    assert rec[\"result\"][\"ok\"] is False\n    assert rec[\"result\"][\"error_type\"] == \"ValueError\"\n    assert \"test exception\" in rec[\"result\"][\"error\"]\n\n\ndef test_auto_dispatch_passes_review_target_path(tmp_path, monkeypatch):\n\
      \    \"\"\"codex-rev-001: auto-dispatch must pass review_target_path so codex\n    receives explicit review-target-binding instead of fallback-scope review.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    called = []\n\n    def fake_handle(**kw):\n        called.append(kw)\n        (iter_dir / \"codex-review.yaml\").write_text(\n            yaml.safe_dump({\"goal_satisfied\": True}), encoding=\"utf-8\"\n        )\n        return {\"ok\": True, \"pass_id\": \"codex-test-pass1\"}\n\n    monkeypatch.setattr(reviewer_dispatch_codex, \"handle\", fake_handle)\n\n    loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n        auto_dispatch_codex=True,\n\
      \    )\n\n    assert len(called) == 1\n    assert \"review_target_path\" in called[0], (\n        \"auto-dispatch must thread review_target_path to reviewer.dispatch_codex; \"\n        \"without it codex falls back to scope-only review (codex-rev-001)\"\n    )\n    expected = str(iter_dir / \"review-packet.yaml\")\n    assert called[0][\"review_target_path\"] == expected, (\n        f\"review_target_path should point to the iteration's review-packet.yaml; \"\n        f\"expected {expected!r}, got {called[0]['review_target_path']!r}\"\n    )\n\n\ndef test_no_orphan_yaml_import(tmp_path):\n    \"\"\"codex-rev-002: tools/loop_run_goal.py must not have a bare `import yaml`\n    after iter-0010's _read_yaml_or_empty dedup removed the only consumer.\"\"\"\n    src = Path(loop_run_goal.__file__).read_text(encoding=\"utf-8\")\n    for line in src.splitlines():\n        stripped = line.strip()\n        assert stripped != \"import yaml\", (\n            \"tools/loop_run_goal.py should not have\
      \ a bare `import yaml` after \"\n            \"iter-0010 dedup; the imported helper from _self_drive owns yaml usage\"\n        )\n\n\n# ---- Task #25 (iter-0015): patch-verification state-machine extensions -----\n#\n# The supervisor learns to detect three new states:\n#   * codex_patch_proposed                                      — codex-review.yaml has\n#     at least one finding with patch_proposal AND no corresponding entry in\n#     codex-patch-verifications/.\n#   * patch_verified_ready_for_codex_resubmit                   — verification yaml\n#     shows verdict=approved (still needs codex's post-correction re-review\n#     before close).\n#   * patch_corrected_by_claude_ready_for_codex_resubmit        — verification yaml\n#     shows verdict=corrected_resubmit; claude's corrections need to be applied\n#     and codex must re-review.\n#\n# The forbidden transition `claude_verifying_patch.corrected_resubmit ->\n# ready_to_close` is enforced: the supervisor MUST route through\n\
      # `codex_re_reviewing_after_claude_correction` first.\n\n\ndef _write_codex_review_with_patch(iter_dir: Path, patch_id: str = \"patch-aaaaaaaaaaaa-bbbbbbbbbbbb\") -> Path:\n    \"\"\"Write a codex-review.yaml with one finding carrying a patch_proposal.\"\"\"\n    review = {\n        \"iteration_id\": iter_dir.name,\n        \"reviewer_id\": \"codex-test-1\",\n        \"pass_id\": \"codex-test-1-pass1\",\n        \"findings\": [\n            {\n                \"id\": \"codex-rev-001\",\n                \"severity\": \"medium\",\n                \"summary\": \"Test finding\",\n                \"citation\": \"scripts/foo.py:1\",\n                \"risk\": \"low\",\n                \"recommendation\": \"apply patch\",\n                \"patch_proposal\": {\n                    \"patch_id\": patch_id,\n                    \"applies_to_findings\": [\"codex-rev-001\"],\n                    \"base_sha\": \"abc123def456\",\n                    \"unified_diff\": \"--- a\\n+++ b\\n@@ -1 +1,2\
      \ @@\\n h\\n+w\\n\",\n                    \"files_touched\": [\"scripts/foo.py\"],\n                },\n            },\n        ],\n        \"goal_satisfied\": False,\n        \"blocking_objections\": [],\n        \"goal_satisfied_rationale\": \"x\",\n    }\n    p = iter_dir / \"codex-review.yaml\"\n    p.write_text(yaml.safe_dump(review), encoding=\"utf-8\")\n    return p\n\n\ndef _write_verification_yaml(iter_dir: Path, patch_id: str, verdict: str, corrections: str | None = None) -> Path:\n    out = iter_dir / \"codex-patch-verifications\"\n    out.mkdir(parents=True, exist_ok=True)\n    record = {\n        \"schema_version\": 1,\n        \"verifier\": \"claude\",\n        \"verdict\": verdict,\n        \"review_scope_hash\": \"f\" * 64,\n        \"rationale\": \"test\",\n        \"approved_patch_id\": patch_id,\n    }\n    if corrections is not None:\n        record[\"corrections\"] = corrections\n    p = out / f\"{patch_id}.yaml\"\n    p.write_text(yaml.safe_dump(record), encoding=\"\
      utf-8\")\n    return p\n\n\ndef test_state_codex_patch_proposed_detected_when_no_verification_yet(tmp_path):\n    \"\"\"codex-review.yaml has a patch_proposal; no verification yaml exists yet\n    -> state = codex_patch_proposed.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": False}), encoding=\"utf-8\"\n    )\n    _write_codex_review_with_patch(iter_dir, patch_id=\"patch-aaaaaaaaaaaa-bbbbbbbbbbbb\")\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"codex_patch_proposed\"\n\n\ndef test_state_patch_verified_ready_for_codex_resubmit_detected(tmp_path):\n    \"\"\"Verification\
      \ yaml shows verdict=approved\n    -> state = patch_verified_ready_for_codex_resubmit (NOT ready_to_close).\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": False}), encoding=\"utf-8\"\n    )\n    patch_id = \"patch-aaaaaaaaaaaa-bbbbbbbbbbbb\"\n    _write_codex_review_with_patch(iter_dir, patch_id=patch_id)\n    _write_verification_yaml(iter_dir, patch_id=patch_id, verdict=\"approved\")\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"patch_verified_ready_for_codex_resubmit\"\n\n\ndef test_state_patch_corrected_by_claude_ready_for_codex_resubmit_detected(tmp_path):\n    \"\
      \"\"Verification yaml verdict=corrected_resubmit\n    -> state = patch_corrected_by_claude_ready_for_codex_resubmit.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": False}), encoding=\"utf-8\"\n    )\n    patch_id = \"patch-aaaaaaaaaaaa-bbbbbbbbbbbb\"\n    _write_codex_review_with_patch(iter_dir, patch_id=patch_id)\n    _write_verification_yaml(\n        iter_dir,\n        patch_id=patch_id,\n        verdict=\"corrected_resubmit\",\n        corrections=\"--- a\\n+++ b\\n\",\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"state\"] == \"patch_corrected_by_claude_ready_for_codex_resubmit\"\
      \n\n\ndef test_corrected_resubmit_does_NOT_advance_to_ready_to_close(tmp_path):\n    \"\"\"A corrected_resubmit verification verdict blocks the close path\n    (must route through codex_re_reviewing_after_claude_correction first\n    per spec). Even with consensus.yaml present and both reviewers\n    goal_satisfied=False (no disagreement), the patch state takes\n    precedence over needs_consensus / ready_to_close.\"\"\"\n    iter_dir = _make_iter_dir(tmp_path)\n    (iter_dir / \"review-packet.yaml\").write_text(\n        yaml.safe_dump({\"iteration_artifacts\": []}), encoding=\"utf-8\"\n    )\n    # Both reviewers explicitly goal_satisfied=False so no disagreement\n    # stop-rule fires; the test is about precedence between patch state\n    # and consensus/ready_to_close, not about stop rules.\n    (iter_dir / \"claude-review.yaml\").write_text(\n        yaml.safe_dump({\"goal_satisfied\": False}), encoding=\"utf-8\"\n    )\n    patch_id = \"patch-aaaaaaaaaaaa-bbbbbbbbbbbb\"\n   \
      \ _write_codex_review_with_patch(iter_dir, patch_id=patch_id)\n    # Even include a consensus.yaml — should NOT advance to ready_to_close.\n    (iter_dir / \"consensus.yaml\").write_text(\n        yaml.safe_dump({\"reviewed_artifacts\": {}}), encoding=\"utf-8\"\n    )\n    _write_verification_yaml(\n        iter_dir,\n        patch_id=patch_id,\n        verdict=\"corrected_resubmit\",\n        corrections=\"diff\",\n    )\n    pkt = _write_valid_goal_packet(tmp_path)\n\n    result = loop_run_goal.handle(\n        goal_packet_path=str(pkt),\n        iteration_dir=str(iter_dir),\n    )\n    assert result[\"state\"] != \"ready_to_close\"\n    assert result[\"state\"] == \"patch_corrected_by_claude_ready_for_codex_resubmit\"\n"
