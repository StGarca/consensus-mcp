findings:
- id: claude-rev-001
  severity: high
  summary: 'loop.run_goal output_schema is missing additionalProperties: false; a
    future field added in handle() would escape MCP-contract auditing.'
  citation: scripts/agent_loop_mcp/tools/loop_run_goal.py:101-112
  risk: input_schema has additionalProperties:false (line 99) and the test suite enforces
    it (test_schema_disallows_additional_properties). output_schema (lines 101-112)
    does NOT have additionalProperties:false, so if a future handle() refactor returns
    extra keys (e.g., a stray debug field), MCP callers receive them and no test fails.
    The schema-vs-implementation contract is asymmetric for no good reason; Flavor
    B subsystem reviews repeatedly catch schema drift like this (iter-0023 closure_invariant_schema
    findings, iter-0025 apply-pipeline).
  recommendation: Add additionalProperties:false to the output_schema object node,
    plus a test_schema_output_disallows_additional_properties asserting it.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: claude-rev-001-patch
    applies_to_findings:
    - claude-rev-001
    base_sha: 01c1700214c064e583a655a052d745424dd49303722bdd71a1410a7104856f20
    files_touched:
    - scripts/agent_loop_mcp/tools/loop_run_goal.py
    - scripts/agent_loop_mcp/tests/test_loop_run_goal.py
    unified_diff: "--- a/scripts/agent_loop_mcp/tools/loop_run_goal.py\n+++ b/scripts/agent_loop_mcp/tools/loop_run_goal.py\n\
      @@ -108,6 +108,7 @@\n             \"stop_rules_fired\": {\"type\": \"array\"\
      },\n             \"error\": {\"type\": [\"string\", \"null\"]},\n         },\n\
      \         \"required\": [\"ok\", \"state\", \"next_action\"],\n+        \"additionalProperties\"\
      : False,\n     },\n }\n--- a/scripts/agent_loop_mcp/tests/test_loop_run_goal.py\n\
      +++ b/scripts/agent_loop_mcp/tests/test_loop_run_goal.py\n@@ -103,6 +103,10\
      \ @@\n def test_schema_disallows_additional_properties():\n     assert loop_run_goal.SCHEMA[\"\
      input_schema\"][\"additionalProperties\"] is False\n \n+def test_schema_output_disallows_additional_properties():\n\
      +    assert loop_run_goal.SCHEMA[\"output_schema\"][\"additionalProperties\"\
      ] is False\n+\n def test_schema_output_required_fields():\n     required = set(loop_run_goal.SCHEMA[\"\
      output_schema\"][\"required\"])\n     assert required == {\"ok\", \"state\"\
      , \"next_action\"}\n"
    expected_tests:
    - python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/test_loop_run_goal.py::test_schema_output_disallows_additional_properties
      -q
- id: claude-rev-002
  severity: medium
  summary: _check_stop_rules has no exception handler; if cmd_check_stop_rules raises
    (e.g., yaml.YAMLError on a malformed independence-audit.yaml), the exception escapes
    handle() and breaks the MCP {ok, state, next_action} contract.
  citation: scripts/agent_loop_mcp/tools/loop_run_goal.py:170-185
  risk: _validate_goal_packet wraps cmd_validate in try/except specifically to satisfy
    'handle() never lets an exception escape and break the MCP {ok, state, next_action}
    return shape' (line 156-159). _check_stop_rules does NOT have the same protection.
    cmd_check_stop_rules calls yaml.safe_load on independence-audit.yaml at _self_drive.py
    line 389; a malformed YAML raises yaml.YAMLError, which propagates through _check_stop_rules
    and out of handle(). Asymmetric defensive depth.
  recommendation: 'Wrap the _self_drive.cmd_check_stop_rules call in _check_stop_rules
    in the same try/except pattern as _validate_goal_packet. On exception return [{''rule'':
    ''check_stop_rules_failed'', ''detail'': str(exc)}] so the supervisor surfaces
    the failure as a stop_rules_fired breadcrumb (matching the existing ''review_yaml_parse_failed''/''git_check_failed''
    breadcrumb pattern at line 212).'
  patch_not_proposed_reason: 'The breadcrumb-vs-blocking semantics for a check_stop_rules_failed
    entry deserves operator review: should this be a real stop rule, a breadcrumb
    (current breadcrumb_rules filter), or a third category? Defer to iter-0030 with
    a one-line direction; not safe to ship surgically from this packet alone.'
  patch_proposal: null
- id: claude-rev-003
  severity: medium
  summary: blocked_closure_invariant_failed is reachable in code but has NO positive
    test coverage; the closure-invariant safety gate could regress silently.
  citation: scripts/agent_loop_mcp/tools/loop_run_goal.py:247-252
  risk: "_detect_state_from_files calls _closure_invariant_blocks_close before returning\
    \ ready_to_close (line 250-251). On True, it returns 'blocked_closure_invariant_failed'\
    \ which is wired into _NEXT_ACTION (line 122-124). However, test_loop_run_goal.py\
    \ has NO test that constructs an independence-audit.yaml with a post-mutation\
    \ event + a stale/mismatched review and asserts the state == 'blocked_closure_invariant_failed'.\
    \ A regression in the safety gate would NOT fail tests. Cross-AI overlap: codex-rev-001\
    \ raised the same dimension (codex flagged HIGH; claude agrees the test gap is\
    \ real but rates it MEDIUM because the underlying logic is exercised via _closure_invariant\
    \ unit tests in test_closure_invariant.py \u2014 the gap here is the supervisor-integration\
    \ smoke test, not the invariant logic itself)."
  recommendation: Add a positive test that constructs independence-audit.yaml with
    an apply_step_landed event + a fresh claude-review.yaml whose review_target_hash
    mismatches last_mutation.post_sha, then asserts loop_run_goal.handle returns state
    == 'blocked_closure_invariant_failed'. Pair with a negative test where the hashes
    match (state == ready_to_close).
  patch_not_proposed_reason: "Constructing the closure-invariant fixture requires\
    \ knowing the audit_log event shape (apply_step_landed) and the review's review_target_hash\
    \ schema, both of which live in _closure_invariant.py and audit_append_event.py\
    \ \u2014 files OUT of scope for iter-0029 (forbidden_files list). A correct fixture\
    \ would either duplicate the schema (drift risk) or import from those forbidden\
    \ modules (scope violation). Defer to iter-0030 where the iteration scope can\
    \ include the closure-invariant module for fixture sharing."
  patch_proposal: null
- id: claude-rev-004
  severity: medium
  summary: Forbidden-transition guard (corrected_resubmit -> ready_to_close) is bypassed
    when iteration-outcome.yaml is directly authored with closing_state set, because
    the 'closed' state check runs BEFORE _detect_patch_verification_state.
  citation: scripts/agent_loop_mcp/tools/loop_run_goal.py:201-205
  risk: Precedence ladder in _detect_state_from_files runs 'closed' check first (line
    201-205) before stop-rule check, before _detect_patch_verification_state (line
    232). If an operator hand-authors iteration-outcome.yaml with closing_state set
    while a corrected_resubmit verification is pending, the supervisor reports 'closed'
    and the forbidden-transition gate is silent. test_corrected_resubmit_does_NOT_advance_to_ready_to_close
    covers consensus.yaml presence but NOT iteration-outcome.yaml presence. Severity
    is MEDIUM because direct outcome.yaml authoring requires operator intent (closing_state
    is not auto-set), but the supervisor should at minimum SURFACE the unresolved
    patch state as a warning stop_rule rather than silently report 'closed'.
  recommendation: Either (a) move _detect_patch_verification_state ABOVE the 'closed'
    check so a corrected_resubmit pending always wins, or (b) keep the current precedence
    but emit a stop_rules_fired breadcrumb ('corrected_resubmit_pending_but_iteration_closed')
    so the operator sees the inconsistency. Option (b) preserves the 'closed' terminal-state
    semantics while still surfacing the audit signal.
  patch_not_proposed_reason: The semantic call between (a) and (b) is an operator-policy
    decision, not a surgical fix. Defer to iter-0030 with an explicit operator direction.
  patch_proposal: null
