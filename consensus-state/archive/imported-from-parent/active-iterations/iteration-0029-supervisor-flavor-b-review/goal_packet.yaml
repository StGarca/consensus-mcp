schema_version: 1
pilot_id: iteration-0029-supervisor-flavor-b-review
goal:
  summary: Flavor B subsystem review of the supervisor state machine (loop.run_goal + its tests).
  desired_end_state: |
    iter-0029 is the FOURTH subsystem-wide Flavor B review of agent-loop code
    (iter-0023 closure invariant subsystem, iter-0025 apply pipeline,
    iter-0027 codex dispatch subsystem; this iteration targets the supervisor
    state machine subsystem).

    Files in scope (NARROW — 2 files only, to keep the review packet inside
    the context-window budget for both reviewers):
      - scripts/agent_loop_mcp/tools/loop_run_goal.py
      - scripts/agent_loop_mcp/tests/test_loop_run_goal.py

    Deferred to iter-0031: scripts/agent_loop_mcp/_self_drive.py (the
    stop-rule helper consumed by loop_run_goal via cmd_check_stop_rules /
    cmd_validate). It is a separate Flavor B target because (1) it is larger
    than this iteration's 2-file scope can absorb without context blowout
    and (2) its surface (CLI subcommands + helper functions) is structurally
    independent from the supervisor's state-detection precedence ladder.

    The supervisor state machine is the OUTER coordinator of the iteration
    lifecycle. Bugs here either silently skip required gates (forbidden
    transition not enforced, closure invariant not consulted, schema-
    additional-properties leakage) or surface false-positive states that
    burn operator cycles. This is also the first iteration to Flavor-B
    review the supervisor against the post-iter-0013/0018 state additions
    (codex_patch_proposed, patch_verified_ready_for_codex_resubmit,
    patch_corrected_by_claude_ready_for_codex_resubmit,
    blocked_closure_invariant_failed) which were added piecemeal in earlier
    Flavor-A iterations without dedicated subsystem review.

    A real codex reviewer (codex-cli) is dispatched against the review-packet
    (which embeds the 2 touched-file contents per iter-0021 and uses
    helper-stamped per-patch base_sha per iter-0024 F2 + iter-0026 F1).
    Findings emit either patch_proposal (preferred under fix_author_policy=strict)
    or patch_not_proposed_reason. Approved patches land via apply.codex_patch
    under operator authorization. iter-0028 F3 (MCP wrapper rc enforcement)
    and iter-0028 F4 (unified_diff body-path scope check) are now active and
    will both gate any codex patch_proposal that escapes scope.

    iter-0029 SUCCESS = the full Flavor B cycle closes:
      1. Codex emits findings against the 2 files
      2. For each finding with patch_proposal: claude verifier runs
      3. Approved patches land via apply.codex_patch (cross-family closer
         records review_target_hash=last_mutation.post_sha)
      4. closure-certificate.yaml: 3/3 invariant_checks PASS, overall PASS
      5. iteration_closed event recorded with closing_state=quorum_close_passed

    If codex emits zero defects: goal_satisfied=true; close immediately
    without mutation (trivial closure-certificate pass per iter-0027 model).

    If codex emits many defects (8+): apply approved patches in this
    iteration; document deferred / corrected_resubmit findings as iter-0030
    followup scope.
  non_goals:
    - modify any agent_loop_mcp source file outside the 2-file scope
    - modify run/, wiki/, or non-supervisor code
    - modify _self_drive.py (deferred to iter-0031)
    - modify _closure_invariant.py / _validate_closure_invariant.py (iter-0023 / iter-0024 covered)
    - modify _dispatch_codex.py / codex template / codex schema (iter-0027 / iter-0028 covered)
    - modify apply pipeline code (iter-0025 + iter-0026 already covered)
    - bump pyproject.toml version
    - introduce new MCP tools
allowed_files:
  - scripts/agent_loop_mcp/tools/loop_run_goal.py
  - scripts/agent_loop_mcp/tests/test_loop_run_goal.py
  - agent-loop/active/iteration-0029-supervisor-flavor-b-review/
allowed_sections: []
forbidden_files:
  - scripts/agent_loop_mcp/_closure_invariant.py
  - scripts/agent_loop_mcp/_validate_closure_invariant.py
  - scripts/agent_loop_mcp/_self_drive.py
  - scripts/agent_loop_mcp/_author_review_packet.py
  - scripts/agent_loop_mcp/_dispatch_codex.py
  - scripts/agent_loop_mcp/server.py
  - scripts/agent_loop_mcp/tool_registry.py
  - scripts/agent_loop_mcp/tools/apply_codex_patch.py
  - scripts/agent_loop_mcp/tools/loop_verify_codex_patch.py
  - scripts/agent_loop_mcp/tools/audit_append_event.py
  - scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py
  - scripts/agent_loop_mcp/tools/patch_stage_and_dry_run.py
  - scripts/agent_loop_mcp/tools/patch_apply_consensus_patch.py
  - scripts/agent_loop_mcp/tools/review_write_and_seal.py
  - scripts/agent_loop_mcp/dispatch_templates/codex_review_template.md
  - scripts/agent_loop_mcp/dispatch_templates/codex_review_schema.json
  - scripts/agent_loop_mcp/tests/test_closure_invariant.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch_multifile.py
  - scripts/agent_loop_mcp/tests/test_loop_verify_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_capstone_full_fix_loop.py
  - scripts/agent_loop_mcp/tests/test_dispatch_codex.py
  - scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py
  - scripts/agent_loop_mcp/tests/test_self_drive_stop_rules.py
  - scripts/agent_loop_mcp/tests/test_iter_0018_cross_ai_invariant.py
  - run/
  - wiki/
  - pyproject.toml
  - requirements.txt
max_iterations: 2
max_patch_size: 300
fix_author_policy: strict
validators_required:
  - validate_disposition_index
acceptance_gates:
  - id: A1
    description: pytest still green after any landed patches
    check: 'python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/test_loop_run_goal.py -q'
  - id: A2
    description: closure-certificate.yaml exists with overall PASS
    check: 'python -c "import yaml,sys; c=yaml.safe_load(open(''agent-loop/active/iteration-0029-supervisor-flavor-b-review/closure-certificate.yaml'')); sys.exit(0 if c[''overall'']==''PASS'' else 1)"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
  - any_acceptance_gate_returns_undefined
  - claude_codex_disagree_on_goal_satisfied
  - closure_cross_verification_failed
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-11T00:00:00Z'
  codex_patch_apply_authorized: true
  scope_signature: c84f9207c0822291fca5d667797ecef85d3d373b098e1875729bab2aab26990f
