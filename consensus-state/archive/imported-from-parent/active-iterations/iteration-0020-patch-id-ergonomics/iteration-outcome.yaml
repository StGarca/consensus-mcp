closing_reason: |
  iter-0020 was the empirical-proof companion to iter-0019. iter-0019
  surfaced that codex's read-only sandbox could NOT compute
  sha256(unified_diff) inside its reasoning, blocking content-bound
  patch_id authorship. iter-0020 landed the ergonomics fix and re-ran the
  same defect-target dispatch.

  PRIMARY EMPIRICAL PROOF (SUCCESS):
    Codex DID emit a valid `patch_proposal` block on the codex-iter0020-3
    pass. All schema + helper-validator gates passed:
      patch_id: codex-rev-001-patch                    ← finding-id-derived (NEW)
      applies_to_findings: [codex-rev-001]
      base_sha: 087dfb8baa2a22e25cd193b9727237c5bddae10baaf7eb7cae545c2a3754fe52
      unified_diff: <real diff text>
      files_touched: [
        scripts/agent_loop_mcp/tools/apply_codex_patch.py,
        scripts/agent_loop_mcp/tests/test_apply_codex_patch.py,
      ]
      expected_tests: [python_env\\python.exe -m pytest scripts/agent_loop_mcp/tests/ -q]
      unified_diff_sha256: 87c135ce0c63ebab17d25df8585397f826efa2ea31d819446ff9e5e240f8d853
        ← HELPER-STAMPED (codex did not produce this; _validate_patch_proposal
          computed it post-validation per iter-0020 design)

    The iter-0019 blocker is empirically removed. The full codex-fix-loop
    is now operationally proven for the dispatch + parse + seal + audit
    + patch_proposal authorship chain.

  SECONDARY OBSERVATION (different problem, not iter-0020 scope):
    Codex's emitted unified_diff is structurally wrong. The diff hallucinates
    a `def handle(args):` signature, but the real `handle()` in
    scripts/agent_loop_mcp/tools/apply_codex_patch.py takes
    (iteration_dir, patch_id, actor) as separate parameters. Codex's
    sandbox apparently could not read the actual source file content; it
    constructed the diff from imagined code shape.

    Consequence: applying the patch would fail at the diff applier (hunk
    context mismatch). claude verifier would correctly catch this as
    "diff does not apply to current source" and refuse approval.

    This is a SEPARATE blocker for the autonomous fix-loop end-to-end:
    codex's patch authorship works structurally (iter-0020 SUCCESS) but
    is content-blind. Until codex's tools include source-read access, the
    diff content can't be trusted on first emission. Workarounds:
      - Embed touched-file FULL contents in review-packet.yaml so codex
        reads them through the review_target rather than its filesystem
        tools (matches the v4 directive's "reproducibility-bounded inputs"
        philosophy)
      - Or: dispatch codex with --review-target pointing at a packet that
        already includes the file bodies (the verifier-input-bundle pattern
        already used for claude verification)

  WHAT iter-0020 PROVES OPERATIONALLY:
    1. patch_id ergonomics fix unblocks codex from authoring patch_proposal
       blocks (validator no longer requires impossible-to-compute hash)
    2. Helper-computed unified_diff_sha256 successfully replaces the
       implicit-via-patch_id binding without losing drift detection
    3. The full schema validation chain (codex → helper validator → seal
       → audit) holds cleanly with the new format
    4. Existing unit tests (257 in agent_loop_mcp/tests/) continue to pass
       with the new contract; +3 iter-0020 tests now also passing

  WHAT iter-0020 DOES NOT PROVE (next blocker, separate iteration):
    - Codex emitting a CORRECT diff (one that applies to real source)
    - End-to-end claude-verify → apply → close cross-family path
    - These require addressing codex's content-blind authorship

