schema_version: 1
iteration_id: iteration-0020-patch-id-ergonomics
created_utc: '2026-05-10T20:00:00Z'
review_target: |
  iter-0020 EMPIRICAL PROOF that the patch_id ergonomics fix unblocks codex
  patch authorship from a read-only sandbox.

  Background: iter-0019 was the first real-codex demo of the codex-fix-author
  cycle. Codex sealed a clean review with one finding (codex-rev-001) but
  could NOT author a valid patch_proposal — the patch_id formula required
  computing sha256(unified_diff) inside codex's reasoning, which a read-only
  sandbox cannot do. Codex correctly refused to guess and used
  patch_not_proposed_reason in strict mode.

  iter-0020 ergonomics fix landed (this commit's prerequisite):
    - patch_id regex relaxed from ^patch-[0-9a-f]{12}-[0-9a-f]{12}$ to
      ^codex-rev-\d+-patch$
    - Validator now requires patch_id == f"{finding_id}-patch" (finding-id-
      derived, codex-producible)
    - Helper computes sha256(unified_diff) and stamps unified_diff_sha256 on
      the validated patch_proposal output (helper does the work codex can't)
    - apply.codex_patch.handle reads helper-stamped unified_diff_sha256 (or
      recomputes defensively) for last_mutation drift-detection field

  Same defect target as iter-0019: `apply.codex_patch.handle()`
  (scripts/agent_loop_mcp/tools/apply_codex_patch.py) validates patch_id
  regex via defense-in-depth re-check, but does NOT re-validate `actor`
  structural shape. The MCP schema enforces `actor` requires
  {id, model_family, role, pass_id} at dispatch layer; direct Python imports
  of `handle()` bypass the schema validator. A caller invoking `handle()`
  with a partially-formed actor (e.g., missing model_family) would proceed
  to apply, then the audit event's last_mutation would lack model_family,
  causing the closure invariant's cross_family check to fail-undeterminable
  downstream — confusing operator UX.

  Surgical fix expected: ~5-15 lines + 1 regression test.

  Strict mode: this iteration uses `goal_packet.fix_author_policy: strict`.
  Codex MUST emit either `patch_proposal` OR `patch_not_proposed_reason`
  for every finding.

