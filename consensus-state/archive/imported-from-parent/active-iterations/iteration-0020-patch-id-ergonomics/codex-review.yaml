findings:
- id: codex-rev-001
  severity: medium
  summary: apply.codex_patch.handle lacks direct actor shape validation for required
    provenance keys
  citation: scripts/agent_loop_mcp/tools/apply_codex_patch.py:1
  risk: Direct Python imports can call the patch application path with incomplete
    actor provenance, bypassing the structural contract assumed by audit and policy
    code.
  recommendation: At handle entry, require actor to be a dict containing id, model_family,
    role, and pass_id; add a regression test for missing actor.model_family.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: 087dfb8baa2a22e25cd193b9727237c5bddae10baaf7eb7cae545c2a3754fe52
    unified_diff: "diff --git a/scripts/agent_loop_mcp/tools/apply_codex_patch.py\
      \ b/scripts/agent_loop_mcp/tools/apply_codex_patch.py\n--- a/scripts/agent_loop_mcp/tools/apply_codex_patch.py\n\
      +++ b/scripts/agent_loop_mcp/tools/apply_codex_patch.py\n@@ -1,5 +1,15 @@\n\
      \ def handle(args):\n+    actor = args.get(\"actor\")\n+    required_actor_keys\
      \ = (\"id\", \"model_family\", \"role\", \"pass_id\")\n+    missing_actor_keys\
      \ = [\n+        key\n+        for key in required_actor_keys\n+        if not\
      \ isinstance(actor, dict) or not actor.get(key)\n+    ]\n+    if missing_actor_keys:\n\
      +        return {\"ok\": False, \"error\": \"missing required actor key: \"\
      \ + \", \".join(missing_actor_keys)}\n+\n diff --git a/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\
      \ b/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\n--- a/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\n\
      +++ b/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\n@@ -1,3 +1,16\
      \ @@\n+def test_handle_refuses_actor_missing_model_family():\n+    from scripts.agent_loop_mcp.tools\
      \ import apply_codex_patch\n+\n+    result = apply_codex_patch.handle(\n+  \
      \      {\n+            \"actor\": {\n+                \"id\": \"codex\",\n+\
      \                \"role\": \"reviewer\",\n+                \"pass_id\": \"pass-1\"\
      ,\n+            }\n+        }\n+    )\n+    assert result[\"ok\"] is False\n\
      +    assert \"model_family\" in result[\"error\"]\n"
    files_touched:
    - scripts/agent_loop_mcp/tools/apply_codex_patch.py
    - scripts/agent_loop_mcp/tests/test_apply_codex_patch.py
    expected_tests:
    - python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/ -q
