closing_reason: |
  iter-0028 is a Flavor A surgical-implementation follow-up landing all 4
  findings codex emitted in iter-0027 against the codex-dispatch subsystem.
  No Flavor B ceremony (no review-packet, no codex re-dispatch, no
  closure-certificate). TDD applied per finding: RED tests added first,
  then implementation, then GREEN verified, regressions surfaced + fixed
  in pre-existing test fixtures.

  Findings landed (priority order):

  F3 (HIGH, codex-rev-001) — MCP wrapper rc-vs-stdout decoupling
    scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py:handle()
    now captures _dispatch_codex.main(argv)'s return code. After JSON
    parsing: if rc != 0 AND parsed["ok"] is not False, force ok=False
    and stamp wrapper_forced_ok_false_due_to_nonzero_rc=True. Honest-
    failure passthrough (rc != 0 AND parsed["ok"]==False) leaves dict
    untouched. Malformed-stdout path (WrapperJsonDecodeError) unchanged.

    Tests added (test_reviewer_dispatch_codex.py): +5
      - test_handle_rc_zero_with_ok_true_passes_through
      - test_handle_rc_nonzero_with_ok_true_forces_ok_false
      - test_handle_rc_nonzero_with_ok_false_passes_through
      - test_handle_rc_nonzero_with_malformed_stdout_wraps_as_before
      - test_handle_rc_nonzero_with_missing_ok_key_forces_ok_false

  F4 (HIGH, codex-rev-002) — unified_diff body path scope check
    scripts/agent_loop_mcp/_dispatch_codex.py:_validate_patch_proposal
    now parses --- a/<path> and +++ b/<path> headers from unified_diff,
    via a module-level regex _DIFF_FILE_HEADER_RE. Skips /dev/null
    (create/delete marker). Body-path set must satisfy:
      - every body path in files_touched (else
        unified_diff_body_path_outside_scope error)
      - every body path in goal_packet.allowed_files (when goal_packet
        supplied)
      - no body path in goal_packet.forbidden_files

    Tests added (test_dispatch_codex.py): +6
      - test_patch_proposal_diff_body_paths_must_be_in_files_touched
      - test_patch_proposal_diff_body_paths_must_be_in_allowed_files
      - test_patch_proposal_diff_body_minus_a_only_validates
      - test_patch_proposal_dev_null_paths_ignored_for_scope
      - test_patch_proposal_diff_body_forbidden_path_rejected_via_body_check
      - (plus 3 below shared with F1+F2)

  F1+F2 (MEDIUM, codex-rev-003) — template+validator format rejection
    F2: codex_review_template.md line ~204 fixed. Prior text claimed
        "expected_tests is the only optional field" — wrong; schema
        requires expected_tests. Replaced with "All six fields are
        REQUIRED; emit expected_tests: [] when no focused tests are known."
        plus a self-documenting iter-0028 correction note.
    F1: codex_review_template.md gained a dedicated subsection
        "unified_diff format requirements (iter-0028 F1)" showing both
        ACCEPTED (--- a/path / +++ b/path / @@ -L,N +L,N @@) and
        REJECTED (*** Begin Patch / *** Update File: / *** End Patch)
        formats with example bodies. The validator now refuses any
        unified_diff that starts with "*** Begin Patch" or contains
        "*** Update File", raising unified_diff_apply_patch_format_not_supported
        with text pointing at the expected unified-diff form.

    Tests added (test_dispatch_codex.py): +5
      - test_patch_proposal_diff_body_apply_patch_format_rejected
      - test_patch_proposal_diff_body_update_file_marker_rejected
      - test_patch_proposal_standard_unified_diff_accepted
      - test_template_does_not_claim_expected_tests_is_only_optional
      - test_template_explicitly_rejects_apply_patch_format

  F5 (MEDIUM, codex-rev-004) — _resolve_repo_root env-var fail-closed
    scripts/agent_loop_mcp/_dispatch_codex.py:_resolve_repo_root: when
    AGENT_LOOP_MCP_REPO_ROOT is set but the path fails _has_repo_markers,
    raise RepoRootResolutionError immediately with an operator-facing
    message naming the env var. NO fall-through to cwd/__file__ when env
    var is set-but-invalid. Empty-string env (falsy) continues to fall
    through to cwd-discovery (matches the existing 'if override:' truthy
    gate). The pre-existing
    test_resolve_repo_root_env_without_markers_falls_through_to_other_candidates
    test name/docstring was minimally updated (now
    test_resolve_repo_root_marker_check_rejects_empty_dir) to no longer
    lie about fall-through.

    Tests added (test_dispatch_codex.py): +4
      - test_resolve_repo_root_env_set_and_invalid_raises
      - test_resolve_repo_root_env_set_and_valid_uses_env
      - test_resolve_repo_root_env_unset_falls_back_to_cwd
      - test_resolve_repo_root_env_empty_string_treated_as_unset

  Pre-existing test fixture regressions surfaced by F4 (each fixed
  with the minimum-impact diff/files_touched alignment):
    - test_patch_proposal_no_goal_packet_skips_scope_check: prior used
      mismatched diff body + files_touched (intent: no-op, fact: F4 hit).
      Updated to use matching path on both sides.
    - test_iter_0018_cross_ai_invariant._good_patch_proposal: prior used
      'foo' in diff body but 'scripts/foo.py' in files_touched. Updated
      to 'scripts/foo.py' on both sides.

