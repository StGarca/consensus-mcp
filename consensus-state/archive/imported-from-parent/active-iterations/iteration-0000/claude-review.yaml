implementation_risks:
- id: risk-claude-rev-035-state-machine-edge-cases
  severity: medium
  claim_class: correctness
  claim: 'Section 17 state_transitions don''t define behavior when transitions

    occur during a transition (e.g. operator approval lands while

    verification is running). The atomic write pattern in section 5 covers

    file writes but not multi-step state mutations.

    '
  suggested_action: 'v1.7 or Phase 1 add section 17 transaction model: state mutations

    must complete before next mutation begins. Phase 0 single-writer

    lock partially addresses this but doesn''t bound transition duration.

    '
- id: risk-claude-rev-036-rebuttal-soft-convergence
  severity: low
  claim_class: methodology
  claim: 'Symmetric rebuttal in section 11 has no anti-convergence rule.

    Two reviewers can iteratively soften objections to reach agreement

    without triggering section 13 weak-agreement detection (which only

    fires on the initial review, not the rebuttal exchange).

    '
  suggested_action: 'v1.7 add section 11: rebuttal output must preserve at least one

    original blocking_objection from each side OR explicitly mark the

    iteration as ''agreement-via-mutual-softening'' (which then triggers

    adversarial_pass).

    '
