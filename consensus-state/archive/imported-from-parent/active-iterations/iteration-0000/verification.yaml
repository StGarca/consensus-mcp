  active_contract_readiness_should_advance_to: ready
  blocking_advance: |
    Despite both done_claim conditions now technically met, the operator
    has not approved the active_contract_readiness flip. Per claude-rev-034
    (deferred to v1.7), spec author (or operator) flipping the readiness
    field requires the same gates as a reviewer ready-claim AND must be
    reviewed by both agents. iteration-0000 produced canonical_findings
    (cf-003, cf-004, cf-005 blocking; cf-001 corroborated blocking; cf-007,
    cf-008 promoted-by-gate blocking) that should land before any readiness
    advance. RECOMMENDED: hold active_contract_readiness at
    pending_phase_0_empirical_validation until v1.7 incorporates iteration-0000 findings.

# Lessons learned captured for v1.7 design (per input.yaml emit_lessons_learned_for_v1_7)
lessons_learned_for_v1_7:
  - id: lesson-001
    observation: |
      Two reviewers caught the same gap in section 13 from different
      angles (cf-001: codex-rev-053 schema + claude-rev-033 enforcement).
      The synthesizer correctly merged them via shared section + shared
      claim space. This is the corroboration mechanism working as designed.

  - id: lesson-002
    observation: |
      Observational_only mode produced clean artifacts but raised
      meta-question (cf-006 / claude-rev-031): does iteration-0000 count
      as 'operational' for kill-switch purposes? The synthesizer defaulted
      to 'count it' but flagged the ambiguity (cf-002).
      v1.7 should make this explicit.

  - id: lesson-003
    observation: |
      The severity_gate auto-promotes single-source findings of
      claim_class 'process' to blocking (cf-007 done_claim asymmetry,
      cf-008 dangling reference). The 'process' inclusion in the
      eligible claim_class set might be too aggressive: cf-008 is a
      typo-class fix that doesn't deserve blocking severity but the
      gate elevates it. v1.7 should consider tightening the eligible
      set OR adding a 'low_severity_carveout' for trivial process fixes.

  - id: lesson-004
    observation: |
      Independence_proof check is currently honor-system (claude-rev-033).
      In iteration-0000 specifically, the same agent (claude) acted as
      orchestrator AND second reviewer. The seal protocol relied on
      claude self-discipline. No technical enforcement exists in Phase 0.
      v1.7 (or Phase 1 MCP) needs technical seal enforcement.

  - id: lesson-005
    observation: |
      The orchestrator role is implicit. Spec section 4.1 names "orchestrator
      owns turn order, packet budget, etc." but Phase 0 has no actual
      orchestrator process: I (claude) am performing all orchestrator
      operations manually + dispatching one agent. v1.7 should consider:
      either explicitly designate the operator's claude session as
      orchestrator-authority for Phase 0, or build orchestrator scripts.

  - id: lesson-006
    observation: |
      The contract self-review framing surfaced 11 canonical_findings on
      a spec that had 0 validator findings. The validator catches structural
      cross-references; reviews catch methodology + correctness gaps the
      validator cannot test. Both layers of checking are necessary.
      v1.7 / Phase 1 should consider adding more validators that catch
      finding classes the reviewers found here:
        - section reference resolution (codex-rev-052 dangling section_15)
        - severity_gate replay (verify gate logic produces expected outputs)
        - state-machine transition completeness (no untriggered transitions)

  - id: lesson-007
    observation: |
      iteration-0000 produced 0.818 independent_finding_rate. Above the
      0.30 kill-switch threshold by a wide margin. But iteration-0000
      had a SELF-REFERENCE objective (review the spec); operational
      iterations on PROJECT decisions may produce different rates.
      v1.7 + iteration-0001+ should track whether the rate generalizes.
