    = \"section_15_step_compute_canonical_findings_after_both_reviews_seal\"\n(note:\
    \ text says \"section_15_step\" but the step is in section_20 - separate\nfinding\
    \ codex-rev-052 below).\nNo statement of how rebuttal new_blockers feed back into\
    \ canonical_findings.\n"
  required_change: 'Either (a) explicitly state rebuttal new_blockers are corroboration-ineligible

    and document the resulting implementation_realist tradeoff, or (b) add a

    second canonical-finding-compute step after rebuttal seal, with clear rule

    for new entries vs prior entries. Pick one; do not leave it to the orchestrator

    author to decide.

    '
- id: codex-rev-050
  severity: blocking
  claim_class: correctness
  claim: 'Section 23 iteration_0000_preflight.required_before_clean_run lists

    ''validate_disposition_index.py real-spec report has 0 findings'' as a gate.

    The validator script''s own docstring states it ''always exits 0 when it

    ran successfully, regardless of findings count'' (per Path C design).

    Therefore exit-code-based gating is wrong but is the natural orchestrator

    default. Two implementers will diverge: shell-style implementer checks

    $LASTEXITCODE and gates clean (false-pass); python implementer parses

    the YAML report''s findings list (correct). Spec does not specify which.

    '
  file: wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md
  section: section_23
  evidence: "scripts/agent_loop/validate_disposition_index.py docstring (lines 26-30):\n\
