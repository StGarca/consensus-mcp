    \  always exits 0 when it ran successfully, regardless of findings count.\"\n\
    section_23.iteration_0000_preflight.required_before_clean_run:\n  - \"validate_disposition_index.py\
    \ real-spec report has 0 findings\"\nNo specification of HOW the orchestrator\
    \ confirms 0 findings (parse YAML?\nJSON sidecar? grep findings_count?).\n"
  required_change: 'Add explicit preflight step: "parse <report>.findings, assert
    len==0";

    OR specify that ''preflight clean'' is determined by a separate

    check_disposition_findings_zero check_id with documented argument.

    '
- id: codex-rev-051
  severity: blocking
  claim_class: correctness
  claim: 'Section 17 has a state-mutation rule (consensus_change_after_approval)

    that has no defined detection mechanism. Nothing in the orchestrator loop

    (section 20 steps) re-checks approved_consensus_sha256 against the

    current consensus.yaml hash on a schedule or trigger. The contract says

    "if production_ready_if still holds: regress_to ready_pending..." but

    who calls this transition? When? On every state read? On consensus.yaml

    write? On next iteration boot? Without a defined trigger, the rule is

    unimplementable and a stale-approval window is open until the operator

    notices.

    '
  file: wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md
  section: section_17
  evidence: 'section_17.state_transitions.consensus_change_after_approval defines
    two

    regression paths but no trigger/cadence.

    section_20.steps does not include any "recheck_approval_binds" step.

    section_5 lock semantics mention atomic writes but not approval-bind

    verification on read.

    Contrast with any_to_not_ready_triggers which lists explicit boolean

    triggers (consensus.yaml hash diverges AND production_ready_if no longer

    holds) - this fires only when BOTH conditions hold, leaving the case

    "consensus diverged + readiness still holds" handled only by the

    undetected consensus_change_after_approval rule.

    '
  required_change: 'Specify the detection point. Options: (a) add an

    ''recheck_approval_binds_on_state_read'' step that runs whenever any

    gate-state consumer reads production_state; (b) require approval-store

    sidecar to record a cadence/watch-condition. Without one of these, the

    transition cannot be implemented.

    '
