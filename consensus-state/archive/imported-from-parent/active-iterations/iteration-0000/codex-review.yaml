- id: codex-rev-049
  severity: blocking
  claim_class: correctness
  claim: 'Section 20 step list seals canonical_findings BEFORE

    run_symmetric_rebuttal_if_needed, but section 11 rebuttal schema permits

    ''new_blockers''. New blockers introduced post-seal bypass canonical-key

    computation entirely, so they cannot be corroborated, cannot be subject

    to the section 13 severity_gate / independence_proof, and cannot be

    auto-promoted. Two implementers will diverge: (a) recompute canonical

    findings after rebuttal (defeats sealing), (b) leave rebuttal blockers

    uncorroborated forever (defeats dual-reviewer corroboration value).

    The contract does not say which.

    '
  file: wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md
  section: section_20
  evidence: "section_20.steps order:\n  - seal_both_reviews\n  - compute_canonical_findings_after_both_reviews_seal\n\
    \  - run_symmetric_rebuttal_if_needed\nsection_11 rebuttal schema includes 'new_blockers:\
