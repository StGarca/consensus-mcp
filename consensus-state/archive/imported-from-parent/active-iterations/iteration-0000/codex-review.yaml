implementation_risks:
- id: codex-rev-057
  risk: 'Synthesizer must compute canonical_finding_key

    (file, section, claim_class, normalized_claim_text_hash) before peer

    questions can be issued (per section 13 ownership rule). But section 12

    bounded_micro_call has max_input_tokens=1500 and answers true/false on

    duplicate detection. With normalized_claim_text_hash as a key component,

    two near-duplicate findings with different claim text hash to different

    keys and require the micro-call to merge. If the micro-call exceeds the

    semantic_micro_calls budget (6 per section 20), some duplicates remain

    structurally separate canonical findings. This inflates the

    ''all_canonical_findings'' denominator in independent_finding_rate and

    can spuriously trigger the kill-switch. Empirical risk; not a defect

    yet.

    '
  mitigation_suggestion: 'Document this risk in section 22 notes: "independent_finding_rate
    may

    be biased downward when semantic_micro_calls budget is exhausted; budget

    exhaustion in iteration N flags rate computation for that iteration as

    best_effort_lower_bound."

    '
- id: codex-rev-058
  risk: 'Section 17.approval_store.permission_requirement says "OS ACL enforced,

    not honor-system" with path C:/Users/<you>/agent-loop-approvals/. On

    Windows, achieving this requires icacls/Set-Acl configuration outside

    the spec. No script in section 23 phase_0_deliverables sets up the ACL;

    no preflight check verifies it. An implementer following the spec

    literally would assume "outside_repo: true" is sufficient; it is not.

    '
  mitigation_suggestion: "Add to section 23 phase_0_deliverables:\n  - {path: scripts/agent_loop/setup_approval_store_acl.ps1,\
    \ implementation_status: specified}\nAdd to iteration_0000_preflight.required_before_clean_run:\n\
    \  - \"approval_store directory exists with operator-only write ACL verified\"\
    \n"
- id: codex-rev-059
  risk: 'Section 5.state_write_rules.atomic_write_pattern says "atomic

    rename/replace" with windows_note about cross-volume Move-Item. PowerShell

    Move-Item -Force is not atomic (read-then-write). Python os.replace()

    IS atomic on same-volume on Windows (NTFS). The spec says PowerShell

    scripts must avoid cross-volume Move-Item, but does not say PowerShell

    scripts must use a non-Move-Item primitive for the atomic-rename itself.

    Implementer following the windows_note literally still produces

    non-atomic writes if they use Move-Item on same-volume.

    '
  mitigation_suggestion: 'Tighten to: "PowerShell scripts MUST use [System.IO.File]::Move
    with

    MoveFileEx semantics, or shell out to python -c ''import os; os.replace(...)''.

    Move-Item is read-then-write and not safe for state commits."

    '
