- id: claude-rev-001
  severity: low
  summary: |
    iter-audit-2026-05-11-security codex-rev-001 (HIGH) landed: repo_root
    containment enforced in _author_review_packet.author_review_packet
    BEFORE any read_text.
  citation: scripts/agent_loop_mcp/_author_review_packet.py:95
  risk: |
    Confirmation-only finding; the previously-identified path-traversal /
    content-exfil defect is now closed. The new code path:
      - Defines OutsideRepoPathError(ValueError) at module scope, mirroring
        _dispatch_codex.OutsideRepoPathError for caller class-equality use.
      - Resolves repo_root once via repo_root.resolve().
      - For each rel in files: full = (repo_root / rel).resolve(), then
        _is_contained(full, repo_root_resolved). On uncontained: raise
        OutsideRepoPathError with the file name, resolved path, and
        repo_root in the message.
      - main() catches OutsideRepoPathError and returns rc=1 with a
        diagnostic on stderr (same bucket as missing-file).
      - main() catches OutsideRepoPathError, prints diagnostic, returns 1.
    All checks run BEFORE the read_text loop, so even a partial review-
    packet.yaml never gets written carrying leaked content.
  recommendation: |
    Land iter-0038; close goal_satisfied=true.
  patch_proposal: null
  patch_not_proposed_reason: |
    Direct edit (no apply.codex_patch pipeline used). The codex audit
    pass had codex_patch_apply_authorized=false; this iteration's
    authorization carries the same flag.
- id: claude-rev-002
  severity: low
  summary: |
    Windows case-fold edge addressed (refinement on codex's proposed patch).
  citation: scripts/agent_loop_mcp/_author_review_packet.py:48-67
  risk: |
    Codex's proposed patch (codex-rev-001-patch from
    iteration-audit-2026-05-11-security) used Path.relative_to() directly.
    That is a string compare, and Windows filesystems are case-insensitive,
    so mixed-case repo_root vs path forms can trigger false-positive
    rejection. Identical edge fixed in _dispatch_codex via iter-0033
    claude-rev-003. iter-0038 imports the same logic via _is_contained:
      - First try Path.relative_to (fast path).
      - On ValueError, if sys.platform == "win32", compare case-folded
        forward-slashed strings.
      - Otherwise return False (i.e., raise OutsideRepoPathError).
  recommendation: |
    Sufficient. Regression test
    test_windows_case_insensitive_passes locks the fallback.
  patch_proposal: null
  patch_not_proposed_reason: |
    No defect; refinement is part of the landing patch.
