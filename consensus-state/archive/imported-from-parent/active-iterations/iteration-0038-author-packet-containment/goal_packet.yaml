schema_version: 1
pilot_id: iteration-0038-author-packet-containment
goal:
  summary: Security audit followup landing codex-rev-001 (HIGH) from iter-audit-2026-05-11-security — add repo_root containment to _author_review_packet.author_review_packet, plus claude-rev refinement for Windows case-fold edge.
  desired_end_state: |
    iter-0038 closes the HIGH-severity finding codex-rev-001 from
    iteration-audit-2026-05-11-security: _author_review_packet.py reads
    operator-supplied paths with `(repo_root / rel).read_text(...)` and
    never verifies the resolved path is inside repo_root. A malicious or
    mistaken `files` entry using an absolute path, `../` traversal, or an
    in-repo symlink to an outside target can pull arbitrary file contents
    into review-packet.yaml and downstream sealed artifacts.

    The fix is symmetric to v1.10.5 hardening in
    `_dispatch_codex._normalize_relative_to_repo` (landed earlier this
    session at 6e4aa822). Same shape: resolve, try `relative_to(repo_root_resolved)`,
    on ValueError consult a Windows case-fold fallback before raising.
    On uncontained: raise a local `OutsideRepoPathError(ValueError)` named
    identically to the one in `_dispatch_codex` so callers see the same
    error_type class.

    Codex's proposed patch (in iter-audit-2026-05-11-security/codex-review.yaml)
    handled the canonical case but missed Windows case-fold. Claude refines:
    apply the same case-fold fallback that landed in iter-0033 claude-rev-003.

    Files in scope:
      - scripts/agent_loop_mcp/_author_review_packet.py
        (define OutsideRepoPathError; add containment check inside
         author_review_packet before any read_text; preserve all other
         semantics, including merge-on-existing and base_sha computation)
      - scripts/agent_loop_mcp/tests/test_author_review_packet_containment.py
        (NEW; 5 regression tests covering inside / outside-absolute /
         relative-traversal / symlink-to-outside / Windows case-fold)

    iter-0038 SUCCESS:
      1. author_review_packet raises OutsideRepoPathError before any
         disk read when a `files` entry resolves outside repo_root.
      2. Inside-repo paths (including Windows mixed-case forms on win32)
         continue to work unchanged.
      3. Symlinks-to-outside refused (resolve() follows the symlink, then
         relative_to compares against the real target).
      4. ~5 new tests added, all pass; existing tests stay green.
      5. Smoke 60/60; release gates 11/11.
      6. iteration-outcome.yaml closes quorum_close_passed with
         ceremony_flavor: codex_audit_followup_with_claude_refinement.
  non_goals:
    - modify _dispatch_codex.py (containment already there)
    - modify any other source file
    - bump pyproject.toml
    - register a new MCP tool
    - propagate containment to test scaffolds that intentionally use abs paths
    - rewrite the helper architecture; surgical containment only
