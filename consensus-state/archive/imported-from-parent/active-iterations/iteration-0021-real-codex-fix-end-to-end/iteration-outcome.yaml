closing_reason: |
  iter-0021 was the empirical-proof companion to iter-0020. iter-0020
  surfaced that codex's read-only sandbox could NOT reliably read repo
  files (the diff hallucinated `def handle(args)` for a function whose
  real signature is `def handle(iteration_dir: str, patch_id: str, actor: dict)`).
  iter-0021 fix: embed touched-file FULL contents inline in the
  review-packet so codex sees them as part of the prompt — no filesystem
  read required.

  PRIMARY EMPIRICAL PROOF (SUCCESS):
    Codex DID emit a CONTENT-CORRECT unified_diff. The hunks match the
    REAL source line-by-line:

      @@ -133,6 +133,19 @@ def handle(
           iter_dir = Path(iteration_dir)
           repo_root = _resolve_repo_root()

      +    required_actor_keys = ("id", "model_family", "role", "pass_id")
      +    if not isinstance(actor, dict):
      +        return _refuse(
      +            "invalid_actor: actor must be an object with required actor keys: "
      +            + ", ".join(required_actor_keys)
      +        )
      +    missing_actor_keys = [key for key in required_actor_keys if key not in actor]
      +    if missing_actor_keys:
      +        return _refuse(
      +            "invalid_actor: missing required actor key(s): "
      +            + ", ".join(missing_actor_keys)
      +        )

           # Defense-in-depth: validate patch_id format. The MCP layer enforces this

    Hunk header `def handle(` references the REAL handle (3-arg signature),
    NOT iter-0020's hallucinated `def handle(args)`. The test diff uses
    real fixture names from test_apply_codex_patch.py (_make_actor,
    _write_codex_review, _write_claude_verification, etc.). The diff
    structurally APPLIES to the actual repo state.

    The iter-0020 content-blindness blocker is empirically removed.
    Embedding touched-file contents in the review-packet successfully
    replaces codex's unreliable filesystem read.

  SECONDARY EMPIRICAL FINDING (different blocker, separate iteration):
    Codex emits a hallucinated `base_sha`. The patch_proposal carries
    `base_sha: f612e7d4...` but the actual current bundle_sha (computed
    by the helper-stamped value in defect_target.base_sha and verified
    via `bundle_sha(repo_root, files_touched)`) is `0c9507...`. Codex
    apparently did not propagate the helper-stamped base_sha from
    review-packet.defect_target.base_sha into its emitted patch_proposal.

    Consequence: apply.codex_patch refused with `base_sha_drift` (verified
    by direct invocation, see closure_attempt section below). iter-0021
    cannot drive the apply→close cycle to completion under the current
    closure invariant — the cycle is blocked at the apply gate.

    This is a SEPARATE blocker from iter-0021 scope. iter-0021 fixed
    codex's content-blindness; the base_sha-emission issue is a new
    follow-up.

  WHAT iter-0021 PROVES OPERATIONALLY:
    1. Touched-file contents embedded in review-packet successfully
       unblock codex from emitting a content-correct unified_diff
    2. The {touched_files_contents_block} prompt placeholder + helper
       (_author_review_packet) + dispatcher YAML-parsing chain all hold
       end-to-end (real codex-cli 0.129.0)
    3. claude verifier (this assistant, recording verdict via T9
       record_verdict) approves the diff content; review_scope_hash
       seal is reproducible
    4. apply.codex_patch correctly REFUSES on base_sha_drift, demonstrating
       the drift detection gate works as designed (defense-in-depth for
       cases like this one where codex emits a stale/wrong base_sha)
    5. pytest 257→266 (+9 iter-0021 tests; all green); smoke 60/60

  WHAT iter-0021 DOES NOT PROVE (next blocker, separate iteration):
    - Codex emitting a CORRECT base_sha (must propagate the helper-stamped
      defect_target.base_sha into patch_proposal.base_sha)
    - End-to-end claude-verify → apply → close cross-family path
      (blocked here at apply gate by base_sha drift)

