schema_version: 1
pilot_id: iteration-0021-real-codex-fix-end-to-end
goal:
  summary: iter-0021 empirical proof — codex emits a CONTENT-CORRECT patch_proposal when touched-file contents are embedded in the review-packet
  desired_end_state: |
    iter-0020 proved codex can emit a format-valid patch_proposal block, but
    the unified_diff was content-wrong (codex's read-only sandbox apparently
    cannot reliably read repo files). iter-0021 fix: embed the FULL contents
    of touched files inline in the review-packet so codex sees them as part
    of the prompt — no filesystem read required.

    Same defect target as iter-0019 / iter-0020: `apply.codex_patch.handle()`
    in scripts/agent_loop_mcp/tools/apply_codex_patch.py. The MCP schema
    enforces `actor` shape at dispatch layer; direct Python imports of
    `handle()` bypass that validator. Defense-in-depth re-validation should
    fail the call early when actor lacks any of the 4 required keys
    (id, model_family, role, pass_id).

    Codex's patch should add this re-validation as a surgical addition
    (~5-15 lines) plus a regression test asserting refusal on missing
    actor.model_family. The unified_diff MUST match the embedded source
    line-by-line; iter-0021 SUCCESS = codex's diff applies cleanly to the
    real source (verified by the apply step itself).

    handle's real signature is:
      def handle(iteration_dir: str, patch_id: str, actor: dict) -> dict

    NOT `def handle(args)` — codex's iter-0020 emission hallucinated the
    args-dict signature because its sandbox couldn't read the file. With
    iter-0021's embedded contents, codex MUST emit a diff matching the
    real signature.
  non_goals:
    - modify _closure_invariant.py
    - modify _self_drive.py
    - modify _dispatch_codex.py
    - introduce new MCP tools
    - modify codex_review_schema.json
    - bump pyproject.toml version
allowed_files:
  - scripts/agent_loop_mcp/tools/apply_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch.py
  - agent-loop/active/iteration-0021-real-codex-fix-end-to-end/
allowed_sections: []
forbidden_files:
  - scripts/agent_loop_mcp/_closure_invariant.py
  - scripts/agent_loop_mcp/_self_drive.py
  - scripts/agent_loop_mcp/_dispatch_codex.py
  - scripts/agent_loop_mcp/_author_review_packet.py
  - scripts/agent_loop_mcp/dispatch_templates/
  - scripts/agent_loop_mcp/tools/loop_run_goal.py
  - scripts/agent_loop_mcp/tools/loop_verify_codex_patch.py
  - scripts/agent_loop_mcp/tools/audit_append_event.py
  - scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py
  - scripts/agent_loop_mcp/server.py
  - run/
  - wiki/
max_iterations: 2
max_patch_size: 80
fix_author_policy: strict
validators_required:
  - validate_disposition_index
acceptance_gates:
  - id: A1
    description: apply.codex_patch.handle has actor structural re-validation (defense-in-depth check)
    check: 'grep -q "actor" scripts/agent_loop_mcp/tools/apply_codex_patch.py && grep -E "model_family|required actor key" scripts/agent_loop_mcp/tools/apply_codex_patch.py'
  - id: A2
    description: regression test asserts apply refuses on missing actor.model_family
    check: 'grep -q "model_family" scripts/agent_loop_mcp/tests/test_apply_codex_patch.py'
  - id: A3
    description: pytest still green
    check: 'python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/ -q'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
  - any_acceptance_gate_returns_undefined
  - claude_codex_disagree_on_goal_satisfied
  - closure_cross_verification_failed
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-10T22:00:00Z'
  codex_patch_apply_authorized: true
  scope_signature: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
