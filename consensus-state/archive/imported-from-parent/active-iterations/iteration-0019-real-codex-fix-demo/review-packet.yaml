defect_target:
  file: scripts/agent_loop_mcp/tools/apply_codex_patch.py
  function: handle
  shape: |
    The `actor` parameter is required by SCHEMA (lines 51-58) but only the
    MCP framework enforces this. When called directly via Python import
    (which subagent dispatch doesn't go through), no structural check happens
    until the audit event is emitted — by which point the patch has already
    landed. Defense-in-depth should fail the call early:

      if not isinstance(actor, dict):
          return _refuse("actor_invalid: must be a dict")
      missing = [k for k in ("id", "model_family", "role", "pass_id") if k not in actor]
      if missing:
          return _refuse(f"actor_missing_keys: {missing}")

    Place the check after the patch_id regex validation (~line 135-145).

reviewer_question: |
  Does codex emit a valid `patch_proposal` block for this defect?
    1. patch_id matches `^patch-[0-9a-f]{12}-[0-9a-f]{12}$`
    2. patch_id content-bound: `patch-{base_sha[:12]}-{sha256(unified_diff)[:12]}`
    3. unified_diff applies cleanly (single-file or via fast-path)
    4. files_touched correctly lists the modified path(s)
    5. base_sha matches current bundle_sha at codex-review-time
    6. applies_to_findings refs the in-review codex-rev-NNN
  Plus the standard goal_satisfied/blocking_objections/rationale.
