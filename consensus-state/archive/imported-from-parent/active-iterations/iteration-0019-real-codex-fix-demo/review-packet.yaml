review_target: |
  FIRST real-codex demo of the codex-fix-author cycle (post-#29 hardening).
  Codex is invited to author a `patch_proposal` block on the following defect,
  not just describe it.

  Defect: `apply.codex_patch.handle()` (scripts/agent_loop_mcp/tools/apply_codex_patch.py)
  validates the `patch_id` regex via defense-in-depth re-check, but does NOT
  re-validate the `actor` structural shape. The MCP schema enforces
  `actor` requires {id, model_family, role, pass_id} at dispatch layer, but
  direct Python imports of `handle()` bypass the schema validator. A caller
  invoking `handle()` with a partially-formed actor (e.g., missing
  model_family) would proceed to apply, then the audit event's last_mutation
  would lack model_family, causing the closure invariant's cross_family
  check to fail-undeterminable downstream — confusing operator UX.

  Per iter-0016 minor finding #7: defense-in-depth at the apply layer
  should re-validate actor has all 4 required keys. Surgical addition,
  ~5-15 lines + 1 regression test.

  Strict mode: this iteration uses `goal_packet.fix_author_policy: strict`.
  Codex MUST emit either `patch_proposal` OR `patch_not_proposed_reason`
  for every finding, per iter-0014 schema extension.

