closing_reason: |
  iter-0019 was the FIRST real-codex demo of the codex-fix-author cycle
  post-#29 hardening. It produced substantive EMPIRICAL signal:

  WHAT WORKED (post-#22 + #18 #4 hardening):
    1. Codex's first dispatch was rejected by codex CLI's strict-output validator
       (OpenAI requires every property to be in `required` array). This surfaced
       a real schema bug introduced by iter-0014: `expected_tests` was optional
       in `patch_proposal` and `patch_not_proposed_reason` was optional at
       finding level. Both fixed inline:
         - `patch_proposal.required` now includes `expected_tests`
         - finding.required now includes `patch_proposal` AND `patch_not_proposed_reason`,
           both as nullable types ([T, null]).
       Mutual exclusivity is enforced at python parse-time by `_dispatch_codex`,
       NOT at JSON Schema layer (since OpenAI strict-output rejects oneOf).

    2. Third dispatch sealed cleanly. Codex emitted a valid finding for the
       defect target (apply.codex_patch.handle actor shape re-validation gap):
         id=codex-rev-001, severity=medium, summary correctly identifies the
         defect, citation/risk/recommendation populated.

    3. Strict mode (iter-0018 finding #4) WORKED: codex correctly used
       `patch_not_proposed_reason` instead of `patch_proposal`, with reason
       given. Both fields cannot be present (mutual exclusivity); validator
       enforced.

    4. Closure invariant trivially passes (no mutation = no gate); iter-0019
       has no apply_step_landed events, so there's nothing to validate
       cross-family against.

  WHAT EMPIRICALLY DID NOT WORK:
    Codex cannot produce a valid `patch_proposal.patch_id` because the
    content-binding formula requires:
      patch_id = patch-{base_sha[:12]}-{sha256(unified_diff)[:12]}

    Codex's sandbox does NOT execute arbitrary code, so codex cannot:
      - compute `bundle_sha(repo_root, files_touched)` for base_sha
      - compute sha256(unified_diff_text) for the diff hash

    Codex was self-aware enough to refuse to GUESS a patch_id (which would
    fail the helper's content-binding check). It correctly chose
    patch_not_proposed_reason in strict mode.

  ARCHITECTURAL LEARNING — iter-0020 follow-up REQUIRED:
    The review-packet author MUST pre-compute `base_sha` for the
    `defect_target.files` and embed it in the review-packet so codex can
    copy it into `patch_proposal.base_sha` directly. Codex can still
    construct the unified_diff and compute its sha256 at-the-margin (sha256
    of a string is deterministic and small enough that codex's reasoning
    can in-line it via tool-use or hex-encoding the byte stream — though
    this is fragile).

    Cleaner path: drop the content-bound `patch_id` requirement. Use a
    different uniqueness scheme:
      - patch_id = uuid4() (codex generates a fresh UUID per finding)
      - apply layer recomputes the bundle_sha at apply-time and stamps it
        as `last_mutation.base_sha` (drift detection is unaffected)
      - the apply layer's `unified_diff_sha256` field is the authoritative
        content hash, not the patch_id

    The patch_id was conceptually "un-relabelable" via content-binding, but
    since the apply layer ALSO records `unified_diff_sha256` separately,
    relabeling is already detectable downstream. The patch_id can become
    purely a unique identifier (uuid4) without losing the security property.

    iter-0020 should: (a) pre-compute base_sha in review-packet, AND/OR
    (b) relax patch_id to uuid4. Operator decides which is cleaner.

