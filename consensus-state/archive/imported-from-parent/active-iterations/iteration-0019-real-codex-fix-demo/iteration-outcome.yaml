empirical_observations:
  - "Codex output reliability post-iter-0013 hardening is materially better. 3 dispatches: 2 schema-rejected (real schema bugs found + fixed); 3rd sealed cleanly."
  - "Codex strict-mode behavior (iter-0018 finding #4) is correct: codex used patch_not_proposed_reason when it couldn't author a valid patch."
  - "Codex's self-awareness about the patch_id constraint is a positive signal: codex refused to guess and instead documented the obstruction."
  - "The patch_id content-binding (iter-0014 #28 v4 design) is ergonomically blocked for codex's sandbox. Architectural gap, not a bug — codex's sandbox correctly cannot execute arbitrary hash code."
  - "First sealed real-codex review with the patch_proposal mechanism in place. Even though no patch was authored, the cycle's MECHANICAL infrastructure is empirically validated through the dispatch + parse + seal + audit path."

operator_decision_required:
  options:
    - id: A
      label: ITER_0020_PRE_COMPUTE_BASE_SHA
      description: |
        Author iter-0020 review-packets with `defect_target.base_sha` pre-computed
        via bundle_sha. Codex copies this into patch_proposal.base_sha and only
        needs to compute sha256(unified_diff) which is small + deterministic.
        Test if codex can in-line that hash.
    - id: B
      label: RELAX_PATCH_ID_TO_UUID4
      description: |
        Drop content-binding on patch_id. Use uuid4 for uniqueness.
        Drift detection still works via base_sha + post_sha + unified_diff_sha256
        (already stamped separately). patch_id becomes a label, not a hash.
    - id: C
      label: BOTH
      description: |
        iter-0020 pre-computes base_sha in review-packets AND relaxes patch_id.
        Most ergonomic for codex.

  recommendation: B or C — the content-binding was conceptual; uuid4 + separate
    diff hash field gives the same drift-detection without the codex-sandbox
    barrier.

