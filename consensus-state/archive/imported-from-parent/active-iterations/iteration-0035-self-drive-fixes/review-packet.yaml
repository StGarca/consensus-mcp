    agent-loop/active/iteration-0035-self-drive-fixes/proposed-patches.md: "# iter-0035\
      \ proposed patches — pre-implementation review target\n\nClaude-authored fix\
      \ patches for the 4 iter-0034 findings against\n`_self_drive.py`. Codex declined\
      \ patch authorship on all 4 in iter-0034\nciting context limitations; per operator-locked\
      \ workflow #4, claude\nproposes here and codex pre-reviews the diffs BEFORE\
      \ implementation.\n\nReviewer task: assess each patch for correctness, regression\
      \ risk,\nscope, and test coverage. NO code on disk reflects these patches yet.\n\
      \n---\n\n## Patch 1 — codex-rev-001 + claude-rev-001 (HIGH)\n\n**Defect**: `patch_size_exceeds_max`\
      \ counts only staged diff (if any\nstaged exists) OR HEAD diff (if no staged);\
      \ never counts untracked.\nOperator can stage 5 lines, leave 5000 unstaged →\
      \ check passes. New\nuntracked files (any size) never count.\n\n**Approach**:\
      \ count the union of (a) tracked changes since HEAD via\n`git diff --numstat\
      \ HEAD` (covers staged + unstaged in one view) plus\n(b) untracked file line\
      \ counts (each untracked file contributes its\ntotal line count as \"added\"\
      ). This mirrors what `git add -A && git\ncommit` would commit.\n\n```diff\n\
      --- a/scripts/agent_loop_mcp/_self_drive.py\n+++ b/scripts/agent_loop_mcp/_self_drive.py\n\
      @@ -443,42 +443,72 @@ def cmd_check_stop_rules(args) -> int:\n     # Rule: patch_size_exceeds_max\n\
      -    # Sum added+deleted across `git diff --cached --numstat` (or `--numstat\
      \ HEAD`\n-    # if nothing staged). Fire iff total > max_patch_size. None/0\
      \ cap = no fire.\n+    # iter-0035 codex-rev-001 fix: count the union of staged\
      \ + unstaged\n+    # tracked changes (via `git diff --numstat HEAD`) PLUS untracked\
      \ file\n+    # line counts. Previously the code branched between staged-only\
      \ and\n+    # HEAD-only, missing unstaged-when-staged-present and missing\n\
      +    # untracked files entirely.\n     max_patch_size = packet.get(\"max_patch_size\"\
      )\n     if max_patch_size:\n         try:\n+            total = 0\n+       \
      \     # Tracked: staged + unstaged in one view via `git diff --numstat HEAD`\n\
      \             ns = subprocess.run(\n-                [\"git\", \"diff\", \"\
      --cached\", \"--numstat\"],\n+                [\"git\", \"diff\", \"--numstat\"\
      , \"HEAD\"],\n                 cwd=str(repo_root),\n                 capture_output=True,\n\
      \                 text=True,\n                 check=False,\n              \
      \   timeout=30,\n             )\n             numstat_text = ns.stdout\n-  \
      \          if not numstat_text.strip():\n-                ns = subprocess.run(\n\
      -                    [\"git\", \"diff\", \"--numstat\", \"HEAD\"],\n-      \
      \              cwd=str(repo_root),\n-                    capture_output=True,\n\
      -                    text=True,\n-                    check=False,\n-      \
      \              timeout=30,\n-                )\n-                numstat_text\
      \ = ns.stdout\n-            total = 0\n             for line in numstat_text.splitlines():\n\
      \                 parts = line.split(\"\\t\")\n                 if len(parts)\
      \ < 2:\n                     continue\n                 # Binary files report\
      \ \"-\\t-\"; treat as 0\n                 try:\n                     added =\
      \ int(parts[0]) if parts[0] != \"-\" else 0\n                     deleted =\
      \ int(parts[1]) if parts[1] != \"-\" else 0\n                 except ValueError:\n\
      \                     continue\n                 total += added + deleted\n\
      +\n+            # Untracked: each new file contributes its full line count.\n\
      +            # `git ls-files --others --exclude-standard` honors .gitignore.\n\
      +            untracked = subprocess.run(\n+                [\"git\", \"ls-files\"\
      , \"--others\", \"--exclude-standard\"],\n+                cwd=str(repo_root),\n\
      +                capture_output=True,\n+                text=True,\n+      \
      \          check=False,\n+                timeout=30,\n+            )\n+   \
      \         for line in untracked.stdout.splitlines():\n+                rel =\
      \ line.strip()\n+                if not rel:\n+                    continue\n\
      +                f = repo_root / rel\n+                try:\n+             \
      \       # Count lines; treat binary as 0 (no decode).\n+                   \
      \ with f.open(\"rb\") as fh:\n+                        content = fh.read()\n\
      +                    # If decode fails, treat as binary (0 lines).\n+      \
      \              try:\n+                        text = content.decode(\"utf-8\"\
      )\n+                    except UnicodeDecodeError:\n+                      \
      \  continue\n+                    total += text.count(\"\\n\")\n+          \
      \      except OSError:\n+                    continue\n+\n             if total\
      \ > max_patch_size:\n                 stop_rules_fired.append({\n          \
      \           \"rule\": \"patch_size_exceeds_max\",\n                     \"patch_size\"\
      : total,\n                     \"max\": max_patch_size,\n                  \
      \   \"reason\": f\"patch_size={total}, max={max_patch_size}\",\n           \
      \      })\n         except Exception:\n```\n\n**Test coverage**: 3 new regression\
      \ tests:\n1. `test_patch_size_counts_unstaged_when_staged_present` — stage 5\
      \ lines, leave 5000 unstaged → fires.\n2. `test_patch_size_counts_untracked_files`\
      \ — no staged or unstaged changes, but a 5000-line untracked file → fires.\n\
      3. `test_patch_size_treats_untracked_binary_as_zero` — untracked binary file\
      \ (e.g., random bytes) doesn't crash or inflate count.\n\n---\n\n## Patch 2\
      \ — codex-rev-002 + claude-rev-002 (HIGH)\n\n**Defect**: `_reviewer_clean` returns\
      \ None when `goal_satisfied` missing\nBEFORE checking `blocking_objections`.\
      \ Caller's `if claude_clean is False`\nfails identity check on None, so blocker\
      \ is silently ignored when\nvalidator_status=\"pass\".\n\n**Approach**: check\
      \ blockers FIRST; if blockers non-empty, return False\nregardless of goal_satisfied\
      \ presence. Only fall back to the None\n\"in-flight\" semantic when there's\
      \ no signal at all (no blockers AND no\ngoal_satisfied).\n\n```diff\n--- a/scripts/agent_loop_mcp/_self_drive.py\n\
      +++ b/scripts/agent_loop_mcp/_self_drive.py\n@@ -679,9 +679,16 @@ def cmd_check_stop_rules(args)\
      \ -> int:\n         def _reviewer_clean(r):\n             \"\"\"Reviewer says\
      \ 'goal satisfied AND no blockers'.\"\"\"\n             if not isinstance(r,\
      \ dict):\n                 return None\n+            # iter-0035 codex-rev-002\
      \ fix: check blocking_objections BEFORE\n+            # the goal_satisfied early-return.\
      \ A reviewer that emits\n+            # blockers but forgets goal_satisfied:\
      \ false would previously\n+            # have its blocker silently ignored (return\
