      \ not in disagreers).\n+            blockers = r.get(\"blocking_objections\"\
      ) or []\n+            if blockers:\n+                return False\n        \
      \     gs = _extract_goal_satisfied(r)\n-            blockers = r.get(\"blocking_objections\"\
      ) or []\n             if gs is None:\n                 return None\n       \
      \      return gs is True and not blockers\n```\n\n**Test coverage**: 2 new regression\
      \ tests:\n1. `test_reviewer_with_blockers_but_missing_goal_satisfied_is_not_clean`\
      \ —\n   author a synthetic claude-review.yaml with `blocking_objections: [x]`\n\
      \   and no `goal_satisfied` field; assert `validator_reviewer_disagreement`\n\
      \   fires under validator pass.\n2. `test_reviewer_with_no_signal_returns_in_flight`\
      \ — author a review\n   with neither blockers nor goal_satisfied; assert it's\
      \ treated as\n   in-flight (no disagreement fired).\n\n---\n\n## Patch 3 — codex-rev-003\
      \ + claude-rev-003 (MEDIUM)\n\n**Defect**: `from agent_loop_mcp._closure_invariant\
      \ import ...` inside\nbare `try: ... except Exception:` silently sets `_check_inv\
      \ = None` on\nANY exception. Static 9/9 coverage; runtime can be 8/9 with no\
      \ operator\nsignal.\n\n**Approach**: emit a `closure_invariant_module_unavailable`\
      \ stop_rule\nentry when the import fails. Narrow the except to\n`(ImportError,\
      \ ModuleNotFoundError)` so unrelated exceptions (e.g., a\nNameError during module\
      \ load) propagate as a hard failure rather than\nsilent skip.\n\n```diff\n---\
      \ a/scripts/agent_loop_mcp/_self_drive.py\n+++ b/scripts/agent_loop_mcp/_self_drive.py\n\
      @@ -726,11 +726,23 @@ def cmd_check_stop_rules(args) -> int:\n     #     last_mutation.timestamp,\
      \ AND\n     #   - the verdict fails any of the three invariant checks.\n   \
      \  # If no last_mutation: no fire (close paths without mutation aren't gated).\n\
      \     # If no close-attempt review came after last_mutation: no fire (loop in\
      \ flight).\n+    # iter-0035 codex-rev-003 fix: emit a stop_rule entry when\
      \ the\n+    # _closure_invariant module fails to import. Previously a bare\n\
      +    # `except Exception` silently set _check_inv=None, dropping\n+    # runtime\
      \ coverage from 9/9 to 8/9 with no operator signal. Now we\n+    # narrow the\
      \ except to (ImportError, ModuleNotFoundError) and emit\n+    # closure_invariant_module_unavailable\
      \ so the failure is visible.\n+    _check_inv_import_error: Exception | None\
      \ = None\n     try:\n         from agent_loop_mcp._closure_invariant import\
      \ (\n             check_closure_invariant as _check_inv,\n             last_mutation_from_audit\
      \ as _lm_from_audit,\n         )\n-    except Exception:\n+    except (ImportError,\
      \ ModuleNotFoundError) as exc:\n         _check_inv = None\n         _lm_from_audit\
      \ = None\n+        _check_inv_import_error = exc\n+        stop_rules_fired.append({\n\
      +            \"rule\": \"closure_invariant_module_unavailable\",\n+        \
      \    \"exception\": f\"{type(exc).__name__}: {exc}\",\n+        })\n\n     if\
      \ _check_inv is not None and audit_path.exists():\n```\n\n**Test coverage**:\
      \ 1 new regression test:\n1. `test_closure_invariant_import_failure_emits_stop_rule`\
      \ — monkeypatch\n   `sys.modules['agent_loop_mcp._closure_invariant']` to None\
      \ (forces\n   ImportError on re-import), invoke `cmd_check_stop_rules`, assert\n\
      \   `closure_invariant_module_unavailable` appears in stop_rules_fired.\n\n\
      ---\n\n## Patch 4 — codex-rev-004 + claude-rev-004 (MEDIUM)\n\n**Defect**: `_resolve_referenced_path`\
      \ basename fallback. When\n`repo_root / ref_path` doesn't exist, returns `iter_dir\
      \ / basename(ref_path)`.\nA same-name collision can satisfy drift hash check\
      \ from the wrong file.\n\n**Approach**: Drop the basename fallback for paths\
      \ with directory\ncomponents. Iter-dir-local fallback applies only to bare basenames\n\
      (semantically \"this is iter-relative, no directory components implied\").\n\
      \n```diff\n--- a/scripts/agent_loop_mcp/_self_drive.py\n+++ b/scripts/agent_loop_mcp/_self_drive.py\n\
      @@ -350,16 +350,28 @@ def _canonical_sha256_of_yaml_file(p: Path) -> str:\n\
      \ def _resolve_referenced_path(ref_path: str, iter_dir: Path) -> Path:\n   \
      \  \"\"\"Resolve a reference path string (typically repo-relative) into a Path.\n\
      \n     Heuristics:\n       1. If absolute, return as-is.\n       2. Try repo_root\
      \ / ref_path (the canonical case for iteration_artifacts).\n-      3. Fall back\
      \ to iter_dir / basename(ref_path).\n+      3. If ref_path has NO directory\
      \ components (bare basename), fall back\n+         to iter_dir / Path(ref_path).name\
      \ (semantically iter-relative).\n+      4. Otherwise return the (non-existent)\
      \ repo_root / ref_path so the\n+         caller sees the missing-file state\
      \ instead of silently resolving\n+         to a same-named file elsewhere.\n\
      \     Returned path may not exist; callers must check.\n+\n+    iter-0035 codex-rev-004\
      \ fix: previously step 3 applied to ANY missing\n+    ref_path, allowing a same-named\
      \ file in iter_dir to satisfy a drift\n+    hash check intended for a wholly\
      \ different repo-root location.\n     \"\"\"\n     p = Path(ref_path)\n    \
      \ if p.is_absolute():\n         return p\n     repo_root = _resolve_repo_root()\n\
      \     candidate = repo_root / ref_path\n     if candidate.exists():\n      \
      \   return candidate\n-    # Iteration-dir-local fallback (e.g., test fixtures,\
      \ or runtime where ref is iter-relative)\n-    return iter_dir / Path(ref_path).name\n\
      +    # iter-0035 codex-rev-004: restrict iter-dir-local fallback to bare\n+\
      \    # basenames (no directory components in ref_path). Paths with \"/\" or\n\
      +    # \"\\\\\" are expected to resolve under repo_root; return the missing\n\
      +    # candidate so the caller sees it as missing rather than collapsing\n+\
      \    # to a same-name file in iter_dir.\n+    if \"/\" not in ref_path and \"\
      \\\\\" not in ref_path:\n+        return iter_dir / Path(ref_path).name\n+ \
      \   return candidate\n```\n\n**Test coverage**: 2 new regression tests:\n1.\
      \ `test_resolve_referenced_path_basename_only_falls_back_to_iter_dir` —\n  \
      \ bare basename \"foo.yaml\" + missing repo-root file → iter_dir/foo.yaml.\n\
      2. `test_resolve_referenced_path_with_dirs_does_not_fall_back_to_iter_dir` —\n\
      \   \"wiki/notes/foo.md\" + missing repo-root file → returns the (missing)\n\
      \   repo_root/wiki/notes/foo.md candidate, NOT iter_dir/foo.md.\n\n---\n\n##\
      \ Cross-cutting verification (acceptance)\n\nAfter landing all 4 patches:\n\
      - pytest: +8 new tests (3+2+1+2). Local baseline 363 → 371 (or 363 if\n  Windows-only\
      \ test skipped on Linux, etc.).\n- smoke: 60/60 unchanged\n- gates: 11/11 unchanged\
      \ after staging + commit\n- `G_pytest_dispatch_codex` baseline unchanged (no\
      \ test_dispatch_codex\n  changes in iter-0035)\n\n## Out of scope\n\n- Bare-except\
      \ policy doc (claude-rev-005 LOW): observational only, no\n  code patch proposed.\n\
      - Test for `test_outside_repo_review_target_via_main_emits_structured_failure`\n\
      \  semantics — already landed in iter-0033.\n\n## Reviewer questions\n\nFocused\
      \ asks for codex (non-exclusive):\n\n1. **Patch 1 untracked counting**: should\
      \ symlinks (untracked) be counted\n   by target file or as zero? Currently they'd\
