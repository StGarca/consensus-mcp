    scripts/agent_loop_mcp/_self_drive.py: "\"\"\"Phase 4 bounded self-drive PARTIAL\
      \ helper. NOT an autonomous API executor.\n\nPer autonomy contract (wiki/audiobook-project/agent-loop/2026-05-09-autonomy-contract.md\n\
      Section 8): Phase 4 v1.0 implements Level 2 via the supervised-quorum-orchestrator\n\
      pattern. The orchestrator-LLM (caller) follows the autonomy contract on a sealed\n\
      goal_packet; this script provides PARTIAL enforcement via:\n\n  - goal_packet\
      \ schema validation (load + check required fields)\n  - scope-signature computation\
      \ + verification over the safety-critical field set\n    (goal, allowed_files,\
      \ allowed_sections, forbidden_files, max_iterations,\n    max_patch_size, validators_required,\
      \ acceptance_gates, stop_conditions,\n    operator_escalation_triggers, authorization.authorized_by)\n\
      \  - state-machine transitions recorded as canonical event types\n  - acceptance-gate\
      \ evaluation (running each `check` command + recording result)\n  - changed-files-in-scope\
      \ verification using exact-file, dir-prefix (trailing /),\n    and fnmatch glob\
      \ matchers\n  - stop-rule checks for ALL 9 contract rules (full coverage):\n\
      \      max_iteration_count_reached, patch_would_touch_forbidden_files,\n   \
      \   claude_codex_goal_satisfaction_disagreement, patch_size_exceeds_max,\n \
      \     any_acceptance_gate_returns_undefined, repeated_finding_class_unresolved,\n\
      \      cross_document_drift_detected, validator_reviewer_disagreement,\n   \
      \   closure_cross_verification_failed.\n\nThe script does NOT call Anthropic\
      \ API or dispatch reviewers; that remains the\norchestrator's job. This script\
      \ is an enforcement helper for stop-rule + scope\n+ acceptance-gate enforcement.\
      \ Reviewer dispatch + consensus synthesis remain\nout-of-band orchestrator responsibilities.\n\
      \nUSAGE\n-----\n  # 1. Validate goal_packet\n  python -m agent_loop_mcp._self_drive\
      \ validate <goal_packet.yaml>\n\n  # 2. Record state transition\n  python -m\
      \ agent_loop_mcp._self_drive transition <goal_packet.yaml> <new_state> [--note\
      \ \"<text>\"]\n\n  # 3. Check stop rules\n  python -m agent_loop_mcp._self_drive\
      \ check_stop_rules <goal_packet.yaml> <iteration_dir>\n\n  # 4. Evaluate acceptance\
      \ gates\n  python -m agent_loop_mcp._self_drive evaluate_gates <goal_packet.yaml>\n\
      \n  # 5. Verify scope (changed files match allowed_files)\n  python -m agent_loop_mcp._self_drive\
      \ verify_scope <goal_packet.yaml>\n\n  # 6. Close (combined check; pass iff\
      \ all gates green + all stop rules clear + scope clean)\n  python -m agent_loop_mcp._self_drive\
      \ close <goal_packet.yaml> <iteration_dir>\n\nOUTPUT\n------\nJSON to stdout.\
      \ Exit 0 = pass; non-zero = fail (stop rule fired or gate not met).\n\"\"\"\n\
      from __future__ import annotations\n\nimport argparse\nimport fnmatch\nimport\
      \ hashlib\nimport json\nimport os\nimport subprocess\nimport sys\nfrom pathlib\
      \ import Path\n\nimport yaml\n\n\nSTOP_RULES_REQUIRED_BY_CONTRACT = (\n    \"\
      max_iteration_count_reached\",\n    \"patch_would_touch_forbidden_files\",\n\
      \    \"patch_size_exceeds_max\",\n    \"any_acceptance_gate_returns_undefined\"\
      ,\n    \"repeated_finding_class_unresolved\",\n    \"cross_document_drift_detected\"\
      ,\n    \"validator_reviewer_disagreement\",\n    \"claude_codex_goal_satisfaction_disagreement\"\
      ,\n    \"closure_cross_verification_failed\",\n)\nSTOP_RULES_IMPLEMENTED = (\n\
      \    \"max_iteration_count_reached\",\n    \"patch_would_touch_forbidden_files\"\
      ,\n    \"claude_codex_goal_satisfaction_disagreement\",\n    \"patch_size_exceeds_max\"\
      ,\n    \"any_acceptance_gate_returns_undefined\",\n    \"repeated_finding_class_unresolved\"\
      ,\n    \"cross_document_drift_detected\",\n    \"validator_reviewer_disagreement\"\
      ,\n    \"closure_cross_verification_failed\",\n)\n\nVALID_STATES = {\n    \"\
      goal_received\",\n    \"packet_built\",\n    \"reviews_dispatched\",\n    \"\
      reviews_sealed\",\n    \"consensus_ready\",\n    \"patch_planned\",\n    \"\
      validator_dry_run_passed\",\n    \"patch_applied\",\n    \"verification_passed\"\
      ,\n    \"quorum_close_passed\",\n    \"blocked_needs_operator\",\n}\n\nTERMINAL_STATES\
      \ = {\"quorum_close_passed\", \"blocked_needs_operator\"}\n\nREQUIRED_GOAL_PACKET_FIELDS\
      \ = {\n    \"schema_version\",\n    \"pilot_id\",\n    \"goal\",\n    \"allowed_files\"\
      ,\n    \"max_iterations\",\n    \"validators_required\",\n    \"acceptance_gates\"\
      ,\n    \"stop_conditions\",\n    \"authorization\",\n}\n\n\ndef _resolve_repo_root()\
      \ -> Path:\n    override = os.environ.get(\"AGENT_LOOP_MCP_REPO_ROOT\")\n  \
      \  if override:\n        return Path(override)\n    return Path(__file__).resolve().parent.parent.parent\n\
      \n\ndef _scope_signature(goal_packet: dict) -> str:\n    \"\"\"Canonical sha256\
      \ over the safety-critical field set per Round 9 F4.\n\n    Covers every field\
      \ that constrains safety, scope, validation, or closure. Excludes\n    only\
      \ authorization.scope_signature (self-reference) and authorization.authorized_at_utc\n\
      \    (timestamp metadata). authorization.authorized_by IS signed.\n    \"\"\"\
      \n    auth = goal_packet.get(\"authorization\", {}) or {}\n    payload = {\n\
      \        \"goal\": goal_packet.get(\"goal\", {}),\n        \"allowed_files\"\
      : goal_packet.get(\"allowed_files\", []),\n        \"allowed_sections\": goal_packet.get(\"\
      allowed_sections\", []),\n        \"forbidden_files\": goal_packet.get(\"forbidden_files\"\
      , []),\n        \"max_iterations\": goal_packet.get(\"max_iterations\"),\n \
      \       \"max_patch_size\": goal_packet.get(\"max_patch_size\"),\n        \"\
      validators_required\": goal_packet.get(\"validators_required\", []),\n     \
      \   \"acceptance_gates\": goal_packet.get(\"acceptance_gates\", []),\n     \
      \   \"stop_conditions\": goal_packet.get(\"stop_conditions\", []),\n       \
      \ \"operator_escalation_triggers\": goal_packet.get(\"operator_escalation_triggers\"\
      , []),\n        \"authorized_by\": auth.get(\"authorized_by\"),\n    }\n   \
      \ canonical = yaml.safe_dump(yaml.safe_load(yaml.safe_dump(payload)), sort_keys=True)\n\
      \    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\n\ndef\
      \ _path_matches_pattern(path: str, pattern: str) -> bool:\n    \"\"\"Match a\
      \ single repo-relative path against one allowed_files / forbidden_files pattern.\n\
      \n    Semantics per Round 9 F6:\n      - exact file:        \"scripts/agent_loop_mcp/_self_drive.py\"\
      \ matches that path only\n      - directory prefix:  pattern with trailing \"\
      /\" matches any path inside that directory\n      - glob pattern:      pattern\
      \ containing *, ?, or [ goes through fnmatch.fnmatch\n      - no overmatch:\
      \      bare names like \"scripts\" do NOT match \"scripts_old/foo.py\"\n   \
      \ \"\"\"\n    if not pattern:\n        return False\n    if path == pattern:\n\
      \        return True\n    if pattern.endswith(\"/\") and path.startswith(pattern):\n\
      \        return True\n    if any(ch in pattern for ch in (\"*\", \"?\", \"[\"\
      )):\n        return fnmatch.fnmatch(path, pattern)\n    return False\n\n\ndef\
      \ _path_in_scope(path: str, patterns) -> bool:\n    return any(_path_matches_pattern(path,\
      \ p) for p in (patterns or []))\n\n\ndef _collect_changed_files(repo_root: Path)\
      \ -> list[str]:\n    \"\"\"Return the de-duplicated union of git's three change-views.\n\
      \n    Per iter-0012 F2 (codex 2026-05-10 expert verdict): the prior implementation\n\
      \    used only `git diff --cached --name-only`, which silently misses unstaged\n\
      \    edits and untracked files. An agent could edit a forbidden file without\n\
      \    staging it and bypass `patch_would_touch_forbidden_files` / scope checks.\n\
      \n    This helper covers all three:\n      1. `git diff --cached --name-only`\
      \           (staged)\n      2. `git diff --name-only`                    (unstaged\
      \ tracked)\n      3. `git ls-files --others --exclude-standard` (untracked,\
      \ gitignore-honoring)\n\n    Subprocess failures on any individual view are\
      \ absorbed (same graceful\n    behavior as the prior cached-only path); whatever\
