    agent-loop/active/iteration-0037-bidirectional-dispatch/proposed-patches.md: "#\
      \ iter-0037 proposed patches — bidirectional dispatch (deferred half of Task\
      \ #43)\n\nWorkflow #4 pre-review of the Popen-streaming + heartbeat + abort-signal-file\n\
      rewrite of `_invoke_codex` in `scripts/agent_loop_mcp/_dispatch_codex.py`.\n\
      Builds directly on the design approved by codex in iter-0036 design-plan.md\n\
      review (codex-iter0036-2). Operator preferences locked in 2026-05-11:\n200-char\
      \ truncation, 30s heartbeat, auto-abort ONLY on heartbeat-silence\n(not wall-time),\
      \ Popen+readline thread.\n\nPer iter-0036 stall lesson: this doc is PROSE-FIRST\
      \ with targeted diffs.\nEmbedded code excerpts kept tight. No full-file embeds.\n\
      \n---\n\n## Patch 1 — replace `subprocess.run` with `Popen + reader thread`\n\
      \n**Defect**: current `_invoke_codex` uses blocking `subprocess.run(... capture_output=True,\
      \ timeout=N)`. No visibility while codex runs; no recovery if subprocess.run\
      \ itself hangs past timeout (iter-0036 codex-1 stall: 29 min with no terminal\
      \ event despite 15-min internal timeout).\n\n**Approach**:\n1. Initialize: pass\
      \ log_path + anchors (iteration_id/reviewer_id/pass_id) into `_invoke_codex`\
      \ so it can emit per-line events.\n2. Spawn codex via `subprocess.Popen(...,\
      \ stdout=PIPE, stderr=PIPE, stdin=PIPE, bufsize=0)`.\n3. Write the prompt to\
      \ stdin and close stdin.\n4. Reader thread reads stdout line-by-line, emits\
      \ `dispatch_streamed_line` events (truncated to 200 chars), records raw bytes\
      \ for final `output_sha256`.\n5. Main loop ticks every 500ms: check `proc.poll()`,\
      \ check abort-signal file, emit heartbeat every 30s, check heartbeat-silence\
      \ threshold.\n6. On exit: join reader thread, drain remaining bytes, return\
      \ decoded output for downstream parsing.\n\n**Diff (conceptual; ~120 LOC change\
      \ at lines ~440-560 of `_dispatch_codex.py`)**:\n\n```diff\n--- a/scripts/agent_loop_mcp/_dispatch_codex.py\n\
      +++ b/scripts/agent_loop_mcp/_dispatch_codex.py\n@@ -1,3 +1,4 @@\n+import threading\n\
      \ import argparse\n ...\n@@ -440,~50 -def _invoke_codex(prompt: str, codex_bin:\
      \ str, timeout_seconds: int,\n-                  repo_root: Path, schema_path:\
      \ Path) -> str:\n-    \"\"\"Run codex via subprocess.run; return stdout text.\"\
      \"\"\n-    out_path = ... tempfile ...\n-    proc = subprocess.run(\n-     \
      \   [codex_bin, \"exec\", \"--output-schema\", str(schema_path),\n-        \
      \ \"--cd\", str(repo_root), \"-o\", out_path],\n-        input=prompt.encode(\"\
      utf-8\"),\n-        capture_output=True,\n-        timeout=timeout_seconds,\n\
      -        check=False,\n-    )\n-    if proc.returncode != 0:\n-        raise\
      \ CodexInvocationError(...)\n-    return Path(out_path).read_text(encoding=\"\
      utf-8\")\n+def _invoke_codex(prompt: str, codex_bin: str, timeout_seconds: int,\n\
      +                  repo_root: Path, schema_path: Path,\n+                  log_path:\
      \ Path, anchors: dict,\n+                  heartbeat_interval: float = 30.0,\n\
      +                  stall_silence_seconds: float = 90.0,\n+                 \
      \ poll_interval: float = 0.5) -> str:\n+    \"\"\"Run codex via Popen + reader\
      \ thread; emit streamed lines + heartbeats;\n+    SIGTERM on operator-abort-signal\
      \ or heartbeat-silence.\n+    \"\"\"\n+    out_path = ... tempfile ...\n+  \
      \  abort_path = (repo_root / \"agent-loop\" / \"state\" /\n+               \
      \   f\"abort-dispatch-{anchors['pass_id']}.signal\")\n+    proc = subprocess.Popen(\n\
      +        [codex_bin, \"exec\", \"--output-schema\", str(schema_path),\n+   \
      \      \"--cd\", str(repo_root), \"-o\", out_path],\n+        stdin=subprocess.PIPE,\
      \ stdout=subprocess.PIPE, stderr=subprocess.PIPE,\n+        bufsize=0,\n+  \
      \  )\n+    proc.stdin.write(prompt.encode(\"utf-8\"))\n+    proc.stdin.close()\n\
      +\n+    start_ts = time.time()\n+    last_streamed_ts = None\n+    streamed_seq\
      \ = 0\n+    stdout_buf = []\n+    state_lock = threading.Lock()\n+\n+    def\
      \ reader():\n+        nonlocal last_streamed_ts, streamed_seq\n+        for\
      \ raw_line in iter(proc.stdout.readline, b\"\"):\n+            stdout_buf.append(raw_line)\n\
      +            line_str = raw_line.decode(\"utf-8\", errors=\"replace\").rstrip(\"\
      \\n\")\n+            full_len = len(line_str)\n+            with state_lock:\n\
      +                seq = streamed_seq\n+                streamed_seq += 1\n+ \
      \               last_streamed_ts = time.time()\n+            _log_dispatch(log_path,\
      \ {\n+                \"event\": \"dispatch_streamed_line\",\n+            \
      \    **anchors,\n+                \"stream\": \"stdout\",\n+               \
      \ \"line_truncated\": line_str[:200],\n+                \"line_full_length\"\
      : full_len,\n+                \"truncated\": full_len > 200,\n+            \
      \    \"seq\": seq,\n+            })\n+\n+    t = threading.Thread(target=reader,\
      \ daemon=True)\n+    t.start()\n+\n+    last_heartbeat = start_ts\n+    while\
      \ proc.poll() is None:\n+        now = time.time()\n+        # Operator abort?\n\
      +        if abort_path.exists():\n+            try:\n+                abort_reason\
      \ = abort_path.read_text(encoding=\"utf-8\").strip() or \"operator_signal_file\"\
      \n+            except OSError:\n+                abort_reason = \"operator_signal_file\
      \ (unreadable)\"\n+            proc.terminate()\n+            try: proc.wait(timeout=10)\n\
      +            except subprocess.TimeoutExpired: proc.kill()\n+            with\
      \ state_lock:\n+                silence_age = (now - last_streamed_ts) if last_streamed_ts\
      \ else None\n+            _log_dispatch(log_path, {\n+                \"event\"\
      : \"dispatch_aborted\",\n+                **anchors,\n+                \"abort_source\"\
      : \"operator_signal_file\",\n+                \"abort_reason\": abort_reason,\n\
      +                \"age_seconds\": now - start_ts,\n+                \"last_streamed_line_age_seconds\"\
      : silence_age,\n+            })\n+            try: abort_path.unlink()\n+  \
      \          except OSError: pass\n+            raise CodexInvocationError(f\"\
      dispatch aborted by operator: {abort_reason}\")\n+\n+        # Heartbeat tick?\n\
      +        if now - last_heartbeat >= heartbeat_interval:\n+            with state_lock:\n\
      +                silence_age = (now - last_streamed_ts) if last_streamed_ts\
      \ else (now - start_ts)\n+                seq_snap = streamed_seq\n+       \
      \     _log_dispatch(log_path, {\n+                \"event\": \"dispatch_heartbeat\"\
      ,\n+                **anchors,\n+                \"age_seconds\": now - start_ts,\n\
      +                \"last_streamed_line_age_seconds\": silence_age,\n+       \
      \         \"last_streamed_line_seq\": seq_snap - 1 if seq_snap > 0 else None,\n\
      +            })\n+            last_heartbeat = now\n+\n+            # Heartbeat-silence\
      \ auto-abort?\n+            if silence_age >= stall_silence_seconds:\n+    \
      \            proc.terminate()\n+                try: proc.wait(timeout=10)\n\
      +                except subprocess.TimeoutExpired: proc.kill()\n+          \
      \      _log_dispatch(log_path, {\n+                    \"event\": \"dispatch_aborted\"\
      ,\n+                    **anchors,\n+                    \"abort_source\": \"\
      watchdog_silence\",\n+                    \"abort_reason\": f\"no codex stdout\
      \ for {silence_age:.0f}s\",\n+                    \"age_seconds\": now - start_ts,\n\
      +                    \"last_streamed_line_age_seconds\": silence_age,\n+   \
      \             })\n+                raise CodexInvocationError(\n+          \
      \          f\"codex stuck: no output for {silence_age:.0f}s\"\n+           \
      \     )\n+\n+        # Wall-time timeout still respected as final fallback.\n\
      +        if now - start_ts >= timeout_seconds:\n+            proc.terminate()\n\
      +            try: proc.wait(timeout=10)\n+            except subprocess.TimeoutExpired:\
      \ proc.kill()\n+            raise CodexInvocationError(f\"codex exceeded {timeout_seconds}s\
      \ wall timeout\")\n+\n+        time.sleep(poll_interval)\n+\n+    # Codex exited;\
      \ drain reader.\n+    t.join(timeout=5)\n+    full_output = b\"\".join(stdout_buf).decode(\"\
      utf-8\", errors=\"replace\")\n+    if proc.returncode != 0:\n+        stderr_text\
      \ = proc.stderr.read().decode(\"utf-8\", errors=\"replace\") if proc.stderr\
      \ else \"\"\n+        raise CodexInvocationError(\n+            f\"codex exit={proc.returncode};\
      \ stderr_tail={stderr_text[-2000:]!r}\"\n+        )\n+    return Path(out_path).read_text(encoding=\"\
      utf-8\") if Path(out_path).exists() else full_output\n```\n\n**Callsite update**\
      \ (~line 1340, in `main()`):\n\n```diff\n-        codex_output = _invoke_codex(\n\
      -            prompt=prompt,\n-            codex_bin=ns.codex_bin,\n-       \
      \     timeout_seconds=ns.timeout_seconds,\n-            repo_root=repo_root,\n\
      -            schema_path=schema_path,\n-        )\n+        codex_output = _invoke_codex(\n\
      +            prompt=prompt,\n+            codex_bin=ns.codex_bin,\n+       \
      \     timeout_seconds=ns.timeout_seconds,\n+            repo_root=repo_root,\n\
      +            schema_path=schema_path,\n+            log_path=log_path,\n+  \
      \          anchors={\n+                \"iteration_id\": iteration_id,\n+  \
      \              \"reviewer_id\": reviewer_id,\n+                \"pass_id\":\
      \ pass_id,\n+            },\n+        )\n```\n\n---\n\n## Patch 2 — `_visibility_tui.py`\
      \ show live-dispatch state\n\n`_assemble_dispatches` already pairs by (iteration_id,\
      \ pass_id). Extend the `active` dispatch render to peek at the last `dispatch_streamed_line`\
      \ + `dispatch_heartbeat` for each active pass.\n\n**Approach**:\n1. In `_assemble_dispatches`,\
      \ while walking events, capture the most recent `dispatch_streamed_line` and\
      \ `dispatch_heartbeat` per (iteration_id, pass_id) key. Attach to the entry\
      \ dict.\n2. In `_render`'s active-dispatches loop, if last_line / last_heartbeat\
      \ present: display them under the dispatch.\n\n**Diff sketch (~30 LOC change)**:\n\
      \n```diff\n@@ in _assemble_dispatches:\n         elif kind in (\"dispatch_done\"\
      , ..., \"dispatch_stalled\", \"dispatch_aborted\"):\n             entry[\"end\"\
      ] = ev\n+        elif kind == \"dispatch_streamed_line\":\n+            entry[\"\
      last_line\"] = ev\n+        elif kind == \"dispatch_heartbeat\":\n+        \
      \    entry[\"last_heartbeat\"] = ev\n\n@@ in _render's active-dispatch block\
      \ (after existing age/timeout/target lines):\n+            last_line = ... \
      \ # peek from entry\n+            if last_line:\n+                txt = last_line.get(\"\
      line_truncated\", \"\")\n+                lines.append(f\"        last_line:\
      \ {txt!r}\")\n+            last_hb = ...  # peek from entry\n+            if\
      \ last_hb:\n+                hb_silence = last_hb.get(\"last_streamed_line_age_seconds\"\
      )\n+                ...colorize based on silence...\n+                lines.append(f\"\
      \        last_heartbeat: {_humanize_age(...)} ago; silence: {hb_silence:.0f}s\"\
      )\n```\n\n(The TUI's `_assemble_dispatches` currently returns `{\"active\":\
      \ [start_event, ...], \"recent\": [end_event, ...]}`. To attach last_line/heartbeat\
      \ to active entries, change the shape to `{\"active\": [{\"start\": ev, \"last_line\"\
      : ev, \"last_heartbeat\": ev}, ...], ...}` and adjust the render loop.)\n\n\
      ---\n\n## Patch 3 — test migration: `subprocess.run` → `Popen` mocks\n\nThe\
      \ new `_invoke_codex` uses `Popen` not `run`. Existing tests mock `subprocess.run`\
      \ via `monkeypatch.setattr(_dispatch_codex.subprocess, \"run\", fake_run)`.\
      \ They will break.\n\n**Strategy**: rather than rewriting each fake_run, provide\
      \ a `_mock_popen_for_codex(stdout_text, returncode=0, version_text=...)` helper\
      \ in a new `tests/_popen_mock_helper.py` (or top of test_dispatch_codex.py if\
      \ simpler) that returns a fake Popen object with `.stdout.readline()` yielding\
      \ the stdout text one line at a time, then b\"\" sentinel.\n\nTest files to\
      \ update (approximate fixture counts; verify with grep):\n1. `tests/test_dispatch_codex.py`\
      \ — ~10 fixtures\n2. `tests/test_capstone_full_fix_loop.py` — ~2 fixtures\n\
      3. `tests/test_iter_0022_base_sha_stamp.py` — ~1 fixture\n4. `tests/test_iter_0024_per_patch_base_sha.py`\
      \ — ~1 fixture\n5. `tests/test_iter_0026_crlf_base_sha.py` — ~1 fixture\n\n\
      **Parallel-agent strategy**: dispatch ONE agent per test file (5 parallel agents),\
      \ each:\n- Reads its file\n- Identifies every place that mocks `subprocess.run`\
      \ for codex purposes\n- Replaces with the Popen mock helper\n- Runs `pytest\
      \ <its file>` to verify\n- Reports back\n\n---\n\n## Patch 4 — NEW file `tests/test_dispatch_codex_streaming.py`\n\
      \nNew regression tests for the streaming/heartbeat/abort behavior:\n\n1. `test_streamed_lines_appear_in_dispatch_log`\
      \ — synthetic codex emits 5 lines; dispatch-log gets 5 dispatch_streamed_line\
      \ events with correct seq/truncation.\n2. `test_long_lines_are_truncated_to_200_chars`\
      \ — synthetic codex emits a 1000-char line; dispatch_streamed_line records line_truncated\
      \ len=200, line_full_length=1000, truncated=True.\n3. `test_heartbeat_fires_at_interval`\
      \ — patch time + run synthetic codex for 90s elapsed; ~3 heartbeats fire.\n\
      4. `test_heartbeat_silence_triggers_abort` — synthetic codex starts streaming,\
      \ then goes silent for 100s; dispatch_aborted with abort_source=\"watchdog_silence\"\
      .\n5. `test_operator_abort_signal_file_triggers_abort` — synthetic codex runs;\
      \ abort-signal file written mid-run; dispatch_aborted with abort_source=\"operator_signal_file\"\
      ; signal file deleted afterward.\n6. `test_wall_time_timeout_still_respected`\
      \ — synthetic codex streams a line every 30s (no silence trigger) but runs past\
      \ timeout_seconds; CodexInvocationError raised; dispatch_failed event emitted.\n\
      7. `test_clean_exit_returns_output` — synthetic codex streams + exits 0; full\
      \ output returned for downstream parsing.\n\n---\n\n## Acceptance & verification\n\
      \nAfter all patches:\n- pytest: +7-10 new tests in test_dispatch_codex_streaming.py.\
      \ ~388 → ~395+.\n- smoke: 60/60 unchanged\n- gates: 11/11 after staging + commit\n\
      - `G_pytest_dispatch_codex` baseline: bumped if test_dispatch_codex.py count\
      \ grew (it shouldn't — migrations don't add tests, just change mocks)\n- Empirical:\
      \ dispatch a real codex call (e.g., a tiny smoke goal_packet); inspect dispatch-log.jsonl\
      \ to confirm dispatch_streamed_line + dispatch_heartbeat events appear\n\n##\
      \ Out of scope (deferred)\n\n- Stderr streaming as dispatch_streamed_line —\
      \ only stdout for now. Stderr captured in toto and used in failure messages.\n\
      - TUI color tiering for heartbeat-silence levels (yellow at 60s, red at 90s).\
      \ Land basic display in iter-0037; refine in a followup.\n- Async/asyncio refactor\
      \ — using threads to match existing subprocess patterns.\n\n## Reviewer questions\
      \ for codex pre-review\n\n1. **Reader thread + main loop synchronization**:\
      \ the state_lock protects last_streamed_ts/streamed_seq writes from the reader\
      \ thread + reads from main. Any race conditions I'm missing?\n2. **bufsize=0\
      \ vs bufsize=1**: with bufsize=0 + binary mode + iter(readline, b\"\"), are\
      \ we guaranteed line-at-a-time delivery without buffering surprises on Windows?\n\
      3. **Wall-time fallback**: when wall timeout fires we raise CodexInvocationError\
      \ but don't emit a dedicated event (the calling `_failed_event` path handles\
      \ it). Should we emit a `dispatch_aborted` with abort_source=\"wall_timeout\"\
      \ for symmetry?\n4. **Abort-signal-file race**: operator writes file at T+0;\
      \ main loop polls 500ms later. Acceptable, or fast-path the poll on every iteration\
      \ regardless of poll_interval?\n5. **Output retrieval**: I return `Path(out_path).read_text()`\
      \ if the file exists (codex writes its output there via `-o`), else the streamed-buf\
      \ decoded. Is the file always written before proc.exit? If not, the streamed\
      \ buf is the fallback truth.\n6. **Cleanup on exception path**: if the reader\
      \ thread is still reading when an abort fires, does proc.terminate() reliably\
      \ close the stdout pipe so the readline loop exits? Windows vs Linux behavior\
      \ differences?\n"
