schema_version: 1
pilot_id: iteration-audit-2026-05-11-cross-platform
goal:
  summary: "Audit dispatch — cross-platform engineer focused on Windows/Linux portability gaps in subprocess + path code reviews agent-loop code for cross-platform defects."
  desired_end_state: |
    iter-audit-2026-05-11-cross-platform is one of 4 parallel codex audit dispatches
    on the agent-loop code (other dimensions: security, performance, bare-except). Each audit gets a
    specialized codex persona via the review-target.md framing. Findings
    are aggregated, claude evaluates each (cross-AI consensus loop per
    operator-locked process), consensus findings get dispatched as parallel
    workflow #4 fix cycles.

    THIS DISPATCH: codex acts as a cross-platform engineer focused on Windows/Linux portability gaps in subprocess + path code and produces findings on
    cross-platform defects in the embedded code excerpts.

    Concerns (non-exclusive): Windows backslash vs forward-slash in path comparisons; case-insensitive filesystem with case-sensitive Python; subprocess signal handling on Windows (no SIGTERM, terminate() vs SIGINT); CRLF vs LF default file encoding; symlink behavior across OSes.

    OUT OF SCOPE for this audit: the other 3 dimensions (each has its own
    parallel audit dispatch). Do NOT emit findings on those.

    Findings format: per the standard codex_review_schema.json. Each
    finding gets id (codex-rev-NNN), severity, summary, citation
    (file:line), risk, recommendation, patch_proposal (preferred) OR
    patch_not_proposed_reason (only if a patch isn't safely authorable
    from the embedded content).

    SUCCESS = sealed codex-review.yaml at
    agent-loop/active/iteration-audit-2026-05-11-cross-platform/codex-review.yaml
    with findings and goal_satisfied/goal_satisfied_rationale set.
  non_goals:
    - emit findings on dimensions OUTSIDE this audit's framing (security/perf/cross-platform/bare-except are split across parallel dispatches)
    - propose architectural rewrites (focus on targeted defects)
    - modify any code (this is review-only)
