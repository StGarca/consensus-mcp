      \ binding; either error\n    # message acceptable.\n    assert \"patch_id\"\
      \ in err\n    assert legacy_patch_id in str(exc.value) or \"codex-rev-\" in\
      \ err\n\n\n# ---- iter-0028 F4 (codex-rev-002): unified_diff body path scope-check\
