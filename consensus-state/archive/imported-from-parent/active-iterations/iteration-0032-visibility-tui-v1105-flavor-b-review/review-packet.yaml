    scripts/agent_loop_mcp/tests/test_visibility_tui.py: "\"\"\"Unit tests for _visibility_tui.\n\
      \nThe TUI is a read-only consumer of agent-loop/state/*.jsonl. These tests\n\
      exercise the pure-function pieces (event pairing, stall detection, render\n\
      text) so the heuristic stays correct across changes.\n\"\"\"\nfrom __future__\
      \ import annotations\n\nimport sys\nfrom datetime import datetime, timedelta,\
      \ timezone\nfrom pathlib import Path\n\n# Ensure the package import works whether\
      \ or not the wheel is installed.\nsys.path.insert(0, str(Path(__file__).resolve().parent.parent.parent))\n\
      \nfrom agent_loop_mcp import _visibility_tui  # noqa: E402\n\n\ndef _start_event(pass_id:\
      \ str, iteration_id: str, timestamp: str, **kw) -> dict:\n    base = {\n   \
      \     \"event\": \"dispatch_start\",\n        \"pass_id\": pass_id,\n      \
      \  \"iteration_id\": iteration_id,\n        \"timestamp_utc\": timestamp,\n\
      \        \"timeout_seconds\": 900,\n    }\n    base.update(kw)\n    return base\n\
      \n\ndef _done_event(pass_id: str, iteration_id: str, timestamp: str, **kw) ->\
      \ dict:\n    base = {\n        \"event\": \"dispatch_done\",\n        \"pass_id\"\
      : pass_id,\n        \"iteration_id\": iteration_id,\n        \"timestamp_utc\"\
      : timestamp,\n        \"exit_code\": 0,\n    }\n    base.update(kw)\n    return\
      \ base\n\n\ndef test_assemble_pairs_start_with_done():\n    \"\"\"A start +\
      \ matching done by pass_id => no active, one recent.\"\"\"\n    events = [\n\
      \        _start_event(\"p1\", \"iter-001\", \"2026-05-10T20:00:00Z\"),\n   \
      \     _done_event(\"p1\", \"iter-001\", \"2026-05-10T20:05:00Z\"),\n    ]\n\
      \    state = _visibility_tui._assemble_dispatches(events)\n    assert state[\"\
      active\"] == []\n    assert len(state[\"recent\"]) == 1\n    assert state[\"\
      recent\"][0][\"pass_id\"] == \"p1\"\n\n\ndef test_assemble_unmatched_start_is_active():\n\
      \    \"\"\"A start with no matching terminal event => 1 active, 0 recent.\"\"\
      \"\n    events = [_start_event(\"p2\", \"iter-002\", \"2026-05-10T20:00:00Z\"\
      )]\n    state = _visibility_tui._assemble_dispatches(events)\n    assert len(state[\"\
      active\"]) == 1\n    assert state[\"active\"][0][\"pass_id\"] == \"p2\"\n  \
      \  assert state[\"recent\"] == []\n\n\ndef test_assemble_handles_multiple_passes():\n\
      \    \"\"\"Multiple iterations interleaved; pairing by pass_id, not iteration_id.\"\
      \"\"\n    events = [\n        _start_event(\"p1\", \"iter-001\", \"2026-05-10T20:00:00Z\"\
