      \ active\n        _done_event(\"p1\", \"iter-001\", \"2026-05-10T20:05:00Z\"\
      ),\n        _start_event(\"p3\", \"iter-003\", \"2026-05-10T20:06:00Z\"),  #\
      \ active\n    ]\n    state = _visibility_tui._assemble_dispatches(events)\n\
      \    active_ids = {ev[\"pass_id\"] for ev in state[\"active\"]}\n    assert\
      \ active_ids == {\"p2\", \"p3\"}\n    assert state[\"recent\"][0][\"pass_id\"\
      ] == \"p1\"\n\n\ndef test_render_flags_stall_when_age_exceeds_warn_after():\n\
      \    \"\"\"STALL marker fires when age >= warn_after_seconds.\"\"\"\n    now\
      \ = datetime(2026, 5, 10, 20, 10, 0, tzinfo=timezone.utc)\n    # Started 6 minutes\
      \ ago, warn_after = 5 minutes => STALL but not ALERT.\n    start_time = (now\
      \ - timedelta(minutes=6)).isoformat().replace(\"+00:00\", \"Z\")\n    events\
      \ = [_start_event(\"p-stall\", \"iter-stall\", start_time, timeout_seconds=900)]\n\
