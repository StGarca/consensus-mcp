      \    err = str(exc.value).lower()\n    assert \"patch_id\" in err\n    assert\
      \ \"codex-rev-001-patch\" in str(exc.value) or \"must equal\" in err\n\n\ndef\
      \ test_unified_diff_sha256_computed_by_validator():\n    \"\"\"iter-0020: helper\
