      \ goal_packet fixture as a dict for goal-packet-aware validation.\"\"\"\n  \
      \  return _dispatch_codex._load_goal_packet(SMOKE_GOAL_PACKET)\n\n\ndef test_no_patch_proposal_still_works():\n\
