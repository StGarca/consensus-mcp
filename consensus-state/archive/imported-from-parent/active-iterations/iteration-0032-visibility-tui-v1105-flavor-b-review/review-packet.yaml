      \    err = str(exc.value)\n    assert \"unified_diff_body_path_outside_scope\"\
      \ in err\n    assert \"loop_run_goal.py\" in err\n\n\ndef test_patch_proposal_diff_body_paths_must_be_in_allowed_files():\n\
      \    \"\"\"F4: a body path that IS in files_touched but NOT in allowed_files\
      \ is rejected.\n\n    Caller declared files_touched=[forbidden.py] AND diff\
