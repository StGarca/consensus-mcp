      patch_proposal.required missing {f!r}; got {sorted(pp_required)}\"\n    # additionalProperties:false\
      \ enforces the closed set\n    assert pp_schema.get(\"additionalProperties\"\
      ) is False\n    # iter-0020: patch_id pattern is the codex-producible finding-id-derived\
      \ form\n    assert pp_schema[\"properties\"][\"patch_id\"][\"pattern\"] == r\"\
      ^codex-rev-\\d+-patch$\"\n\n\n# ---- iter-0020 patch_id ergonomics fix tests\
      \ ------------------------------\n\n\ndef test_patch_id_must_match_finding_id():\n\
      \    \"\"\"iter-0020: patch_id MUST equal f\"{finding_id}-patch\".\n\n    A\
      \ patch_proposal whose patch_id is the wrong finding-id-derived form\n    (e.g.\
      \ patch_id=codex-rev-002-patch on finding codex-rev-001) is REJECTED.\n    \"\
      \"\"\n    pp = _build_patch_proposal(finding_id=\"codex-rev-001\")\n    pp[\"\
      patch_id\"] = \"codex-rev-002-patch\"   # wrong finding id\n    text = _build_codex_output_with_patch(patch_proposal=pp)\n\
