findings:
- id: claude-rev-001
  severity: high
  summary: Confirms codex-rev-001 — OutsideRepoPathError escapes before structured failure logging
  citation: scripts/agent_loop_mcp/_dispatch_codex.py:1234-1252
  risk: |
    Verified independently. _normalize_relative_to_repo is called for
    template_path, schema_path, goal_packet_path, and review_target_normalized
    at lines ~1228-1240 — all BEFORE the try block at line 1294. A containment
    rejection (OutsideRepoPathError) propagates as an uncaught exception out
    of main(). Consequences:
      1. Operator sees a Python traceback to stderr, not the structured JSON
         {"ok": false, "error": ..., "error_type": "OutsideRepoPathError"}
         that other failure paths emit.
      2. No dispatch_failed event lands in agent-loop/state/dispatch-log.jsonl.
         The visibility TUI (just landed) cannot see a containment-rejected
         dispatch — silent failure for the audit consumer.
      3. The new hardening intentionally fires here, so the gap is most
         visible exactly when it matters most (an operator pointing at the
         wrong path expects a clear "outside-repo" diagnostic, not a stack
         trace).
    Cross-finding agreement with codex-rev-001 raises priority per the
    "overlap means real bug" pattern (failures doc 2026-05-10).
  recommendation: |
    Restructure the preflight block so containment rejections route through
    the same _log_dispatch + JSON-result pattern as other failures. Concrete
    approach: defer _normalize_relative_to_repo calls into the try block, OR
    add a narrow preflight try/except that emits dispatch_failed +
    {"ok": false} JSON for OutsideRepoPathError (and RepoRootResolutionError,
    same shape concern). Add regression test asserting that --review-target
    pointing outside repo produces a structured failure and a dispatch_failed
    event.
  patch_proposal: null
  patch_not_proposed_reason: |
    Codex declined to author a patch citing placement uncertainty around
    log_path / reviewer_id initialization. Claude agrees the structural fix
    is right but proper authorship belongs to a fresh iteration (iter-0033)
    where the preflight block can be redesigned with surrounding tests rather
    than a surgical edit risking incomplete coverage.
- id: claude-rev-002
  severity: medium
  summary: Confirms codex-rev-002 — _assemble_dispatches keys by pass_id only
  citation: scripts/agent_loop_mcp/_visibility_tui.py:104-118
  risk: |
    Verified independently. by_pass[pass_id] silently collapses two
    iterations that reuse a pass_id (unusual but not currently prevented by
    any naming contract). Specifically: a dispatch_done from iter-A with
    pass_id "p1" would close an unrelated dispatch_start from iter-B that
    also used pass_id "p1". The TUI's --once rc=1 stall-detection signal
    would then under-report stalls — exactly the failure mode the TUI was
    built to prevent.
    The review prompt explicitly listed this case in question 4 ("When
    pass_id collides across iterations?"); codex caught it, claude confirms.
  recommendation: |
    Key by (iteration_id, pass_id) tuple. Add regression test with two
    iterations sharing pass_id "p1" where only one has a terminal event;
    assert the other shows as active+stalled. Keep a pass_id-only fallback
    only for legacy events that lack iteration_id (defensive, not required
    by any current event in the log).
  patch_proposal: null
  patch_not_proposed_reason: |
    Defer to iter-0033 alongside codex-rev-001 fix; both touch the
    visibility surface and benefit from coordinated test authorship.
- id: claude-rev-003
  severity: medium
  summary: Containment check is case-sensitive on Windows where filesystem is case-insensitive
  citation: scripts/agent_loop_mcp/_dispatch_codex.py:185-189
  risk: |
    Path.relative_to() compares path components string-wise. On Windows
    (case-insensitive filesystem), the same on-disk file can be addressed as
    C:\Foo\repo\bar OR c:\foo\REPO\bar. If repo_root resolves to one
    casing and the operator-supplied path resolves to another (e.g., via
    8.3 short-name expansion, symlink with different case, or env var that
    normalizes differently), relative_to() raises ValueError and containment
    fires — false positive. Conversely, no observed false negatives (a
    truly-outside path won't satisfy relative_to under any casing).
    Practical impact: low likelihood in routine ops, but a real edge that
    would manifest as a confusing "outside repo_root" error on a path that
    IS inside the repo.
  recommendation: |
    On Windows (sys.platform == "win32"), compare lowercased str(resolved)
    against lowercased str(repo_root_resolved) using startswith plus a path
    separator check, OR use os.path.commonpath / Path.is_relative_to with
    case-folding. Add a regression test on Windows that exercises mixed-case
    repo_root vs path.
  patch_proposal: null
  patch_not_proposed_reason: |
    Defense-in-depth finding; not blocking. Land in iter-0033 alongside the
    HIGH/MEDIUM fixes for coherence.
- id: claude-rev-004
  severity: low
  summary: Missing end-to-end test for containment via main() entry
  citation: scripts/agent_loop_mcp/tests/test_dispatch_codex.py
  risk: |
    The four new containment tests (test_outside_repo_*, test_inside_repo_*,
    test_relative_*, test_none_path_returns_none) exercise the helper
    _normalize_relative_to_repo directly. None exercises the FULL main()
    flow where --review-target points at an outside-repo absolute path. If a
    future refactor relocates the containment call OR removes one of the
    several call sites (template_path, schema_path, goal_packet_path,
    review_target_normalized), the helper-level tests would still pass but
    end-to-end containment could be silently bypassed.
  recommendation: |
    Add a regression test that invokes _dispatch_codex.main() with
    --review-target pointing at /Anywhere/outside and asserts: (a) non-zero
    rc, (b) structured JSON {"ok": false, "error_type": "OutsideRepoPathError"}
    on stdout, (c) dispatch_failed event in dispatch-log. This test would
    fail with the current code (per codex-rev-001) — landing it alongside
    the iter-0033 fix exercises both contracts together.
  patch_proposal: null
  patch_not_proposed_reason: |
    Depends on codex-rev-001 / claude-rev-001 structural fix; land together
    in iter-0033.
