findings:
- id: codex-rev-001
  severity: high
  summary: Outside-repo path rejection can crash the dispatcher before JSON/error
    logging
  citation: scripts/agent_loop_mcp/_dispatch_codex.py:867
  risk: A containment violation in --iteration-dir, --goal-packet, --prompt-template,
    --schema, or --review-target raises OutsideRepoPathError before the main try/except
    block. The helper then emits no structured JSON result and no dispatch_failed
    event, so automation and the visibility TUI lose the failed dispatch even though
    the new hardening path fired.
  recommendation: Wrap path normalization and iteration-dir creation in the same failure
    path used for dispatch_failed, or add a narrow preflight catch that logs a structured
    failure once reviewer/pass identifiers and log_path are available.
  patch_not_proposed_reason: A correct patch needs exact placement decisions for preflight
    logging before log_path and reviewer/pass identifiers are fully initialized; safer
    for the implementer to restructure the main preflight block with tests rather
    than emit a fragile sealed-review patch.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: TUI collapses reused pass_id values across iterations into one dispatch
    state
  citation: scripts/agent_loop_mcp/_visibility_tui.py:104
  risk: _assemble_dispatches keys state only by pass_id even though the UI displays
    iteration_id/pass_id pairs. If a pass_id is reused across iterations, a later
    terminal event can incorrectly close an unrelated active dispatch, or a later
    start can overwrite the earlier one. The review prompt explicitly calls out pass_id
    collisions across iterations, so this can hide an active stalled dispatch from
    --once and CI.
  recommendation: Key dispatch state by a tuple that includes iteration_id and pass_id,
    and keep pass_id-only fallback only for legacy events missing iteration_id. Add
    a regression test with two iterations sharing the same pass_id where only one
    has a terminal event.
  patch_not_proposed_reason: The localized fix is straightforward, but the sealed
    packet lacks the surrounding historical log contract for legacy pass_id-only events;
    patching without that contract risks breaking old logs the TUI may need to read.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The containment and visibility additions are directionally
  correct, but the dispatcher can fail unstructured on the new containment errors
  and the TUI can hide active work when pass_id values collide across iterations.
