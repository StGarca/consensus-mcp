flip_rationale: |
  All 4 cf-007 preconditions are verified by direct artifact inspection
  (not just by trusting input.yaml claims). The flip is operationally
  meaningful: it removes the "active_contract_readiness flip" entry from
  section 23 forbidden_now and unblocks iteration-N+ work that depends on
  Phase 0 closure. The proposed value "phase_0_validated" is preferred
  over the spec's literal "ready" wording because:
    (1) "ready" is ambiguous - ready for what? Phase 1 MCP? Production?
        Operator clarity has been the project's largest cost; pick the
        least-ambiguous label.
    (2) "phase_0_validated" describes WHAT the flip means: empirical
        Phase 0 dry-run against iteration-0000 produced metrics, all
        cf-* findings dispositioned, validators clean across 5 iterations.
        It does NOT claim Phase 1 readiness or production readiness.
    (3) "phase_0_complete" is a near-synonym but reads as schedule-status,
        not gate-status. Validation is the gate concept; completion is
        bookkeeping.
  The spec's done_claim_rule.applies_to_frontmatter_readiness_flip text
  uses "ready" as the destination value. If operator prefers exact spec
  conformance, "ready" is acceptable; "phase_0_validated" is the
  implementation-realist preference for clarity. Either value satisfies
  cf-007. Recommend operator pick at authorization step.
  do_not_treat_as_phase_0_ready: true MUST flip to false at the same
  edit; leaving it true contradicts the new readiness value and would
  cause downstream consumers to read inconsistent signals. Removing the
  field entirely is also acceptable but flipping to false preserves the
  audit trail of "this used to be true; it is now explicitly false".
  Recommend: flip to false, do not remove.

