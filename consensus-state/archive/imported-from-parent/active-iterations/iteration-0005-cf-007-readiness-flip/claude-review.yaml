flip_rationale: 'Verification of 4 preconditions (independent of input.yaml claims):


  precondition_1 (validator clean): VERIFIED. Read state/validate-disposition-

  index-report.yaml directly: total_findings=0; severity_counts={};

  archived_count=20; resolved_count=130; pending_count=0; deferred_count=49;

  spec_sha256 d94a74f6 matches what review-packet.yaml input_provenance recorded.

  Validator script sha256 f4fc3130 logged. Zero findings is real.


  precondition_2 (iteration-0000 metrics exist in section 22): VERIFIED LITERALLY.

  Spec section 0 done_claim_rule.applies_to_frontmatter_readiness_flip text says

  "iteration-0000 metrics exist in section 22". Read 0000/iteration-outcome.yaml:

  all 5 blocks present (tokens_per_iteration, context_reuse, review_quality,

  outcome_quality, implementation_quality). Token estimates null with explicit

  documentation: "iteration-0000 was observational; tokens not measured at boot".

  Section 22 spec block defines token fields with default value 0; null and

  documented "not measured" is a presence-with-acknowledged-gap, not absence.

  Acceptable per spec text. Methodology objection: "exist" is a weak gate; spec

  could have said "exist with non-null token estimates"; it doesn''t. Don''t

  retroactively tighten the gate.


  precondition_3 (cf-* dispositioned with rationale): VERIFIED. Read disposition-

  ledger.yaml lines 547-566. cf-001/003/004/005/007/008 in

  iteration_0000_canonical_findings_resolved (with promoted_to + landed_in v1.7).

  cf-002, cf-006, cf-risk-001..003 in iteration_0000_canonical_findings_deferred,

  each with explicit rationale: text. cf-002 "kill-switch sample composition

  ambiguity; not blocking observational iterations; defer to v1.8". cf-006

  "iteration-0000 self-reference paradox; philosophical with no immediate

  failure". cf-risk-001/002/003 each cite the originating finding ID and reason.

  Spec text "deferred or resolved with rationale" satisfied verbatim.


  precondition_4 (dual-reviewer pass): IN PROGRESS. This review is one of two.

  Independence audit shows reviewer_invoked event for both codex and claude

  with seal_order_position=1 each (independence-audit.yaml lines 30-52).


  precondition_5 (operator rationale): NOT YET. Operator-only step.


  Why "phase_0_validated" not "ready": Naked "ready" reads to a future reviewer

  as "no findings, no residuals". The actual state is "all blocking findings

  resolved + grandfathered LOWs explicitly acknowledged + 49 deferred items

  with rationale". The honest label carries that nuance. "phase_0_validated"

  matches Phase 0 vocabulary already in section 23 (implementation_status.validated:

  "implemented + tested against real-world inputs in iteration-0000+"). The

  iteration-0000..0004 arc is exactly that test.


  Why do_not_treat_as_phase_0_ready: false (not "remove field"): Keep the

  audit trail. The field''s existence documented "we considered this question

  and decided NO". Setting to false documents "we considered this question

  again, the gate cleared, decided YES". Removing the field erases the

  consideration history. Sets a bad precedent for future contract-level

  questions ("just remove the question if you don''t like the answer anymore").

  '
