reviewer_stance_assignments:
  codex: implementation_realist
  claude: methodology_critic

# ---- Proposed implementation scope (open; depends on reviewer-approved values) ----

proposed_implementation_scope:
  if_unanimous_flip_approved:
    allowed_files:
      - wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md (frontmatter active_contract_readiness + do_not_treat_as_phase_0_ready + status + contract_version + revision_history v1.8 entry; section 24 status_counts)
      - agent-loop/active/iteration-0005-cf-007-readiness-flip/**
      - agent-loop/state/disposition-ledger.yaml (spec_version bump only)
    apply_step_explicitly_blocked_on_operator_authorization: true
    operator_authorization_form_to_be_surfaced: |
      iteration-0005 will surface to operator a fillable form requesting:
        - operator_explicit_authorization: yes/no
        - operator_supplied_rationale_for_flip: <text>
        - operator_authorizes_new_readiness_value: <reviewer-proposed value>
        - operator_authorizes_do_not_treat_as_phase_0_ready_change: <reviewer-proposed value>
      Apply step waits for operator response.
  if_blocked_or_one_reviewer_dissents:
    allowed_files:
      - agent-loop/active/iteration-0005-cf-007-readiness-flip/** (only the closure artifacts)
      - agent-loop/state/disposition-ledger.yaml (record blocker reasoning)
    no_spec_frontmatter_change: true
    iteration_closes_implementation_ready_false: true
  forbidden_files_all_paths:
    - "production outputs"
    - "spec sections 1-23"
    - "spec frontmatter active_contract_readiness ABSENT operator_explicit_authorization"
  forbidden_actions:
    - "flip readiness without operator authorization"
    - "flip readiness if any reviewer blocks"
    - "render production audio"
    - "merge to main"
    - "apply patches without canonical-006 dry-run gate"

# ---- Closure ----

closure_artifact: agent-loop/active/iteration-0005-cf-007-readiness-flip/iteration-outcome.yaml
success_criteria_per_G5:
  - "both reviewers emit flip_approved=true with consistent proposed_new_readiness_value AND proposed_do_not_treat_as_phase_0_ready_value: iteration closes implementation_ready=true; apply BLOCKED on operator authorization"
  - OR "any reviewer emits flip_approved=false: iteration closes implementation_ready=false; document the blocker; readiness remains pending_phase_0_empirical_validation"
  - "validators stay clean across iter-0000..iter-0005-cf-007"
  - "no spec mutation occurs in this iteration; all spec changes deferred to operator-authorized apply step OR not happening at all"
