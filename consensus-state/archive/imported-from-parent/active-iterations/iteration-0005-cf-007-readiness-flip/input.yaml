  - {path: wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md, role: "v1.7.9 spec; section 0 cf-007 + done_claim_rule + claude-rev-028 self-patch constraint"}
  - {path: agent-loop/state/disposition-ledger.yaml, role: "v1.7.9; all 11 iteration-0004 dispositions logged"}
