schema_version: 1
iteration_id: iteration-0005-cf-007-readiness-flip
created_utc: "2026-05-08T00:00:00Z"
operator_directive_received: "2026-05-08"
operator_directive_quote: "lets go with the next step"

iteration_class: cf_007_readiness_flip_review_pass   # NOT a routine iteration; per spec section 0 cf-007 mechanism
not_a_routine_iteration_because: |
  This is the dedicated readiness-flip review pass per spec section 0 done_claim_rule
  applies_to_frontmatter_readiness_flip rule. Its sole purpose is for both reviewer
  agents to confirm OR block the transition of frontmatter active_contract_readiness
  from pending_phase_0_empirical_validation to ready. Apply step (the actual flip)
  is BLOCKED on explicit operator approval even if both reviewers approve, per
  cf-007 forbidden_action: "unilateral spec patch flipping active_contract_readiness
  without dual-agent + operator review."

objective: |
  Dual-reviewer cf-007 readiness-flip review. Both reviewers MUST confirm:
  (a) all 4 preconditions are met (validate_disposition_index clean, iteration-0000
  metrics exist in section 22, cf-* findings dispositioned, validators clean across
  all iterations); (b) flip from pending_phase_0_empirical_validation to ready is
  appropriate now; (c) what the new readiness value should be; (d) what changes to
  do_not_treat_as_phase_0_ready field. If any reviewer blocks: surface as
  consensus.unresolved_disagreement; iteration closes implementation_ready=false.
  If both confirm: surface to operator with a SPECIFIC fillable approval form;
  apply step explicitly waits for operator authorization.

mode: implementation_with_operator_gated_apply

# ---- Operator guardrails (carried) ----

operator_guardrails:
  - {id: G1, rule: "Target only unresolved real defects, not already-dispositioned cf-* history.", interpretation: "in-scope: the readiness flip itself; out-of-scope: anything else"}
  - {id: G2, rule: "Input packet must include defect list + current validator results.", interpretation: "packet bundles all 4 precondition evidence: validator reports + iteration-0000 outcome.yaml + ledger + spec section 0 cf-007 text"}
  - {id: G3, rule: "Iteration may apply fixes only if Phase 0 mutating gates are satisfied.", interpretation: "all gates satisfied at boot; canonical-006 dry-run gate applies for the proposed flip; AND operator-approval gate per cf-007"}
  - {id: G4, rule: "Independence audit must mark prior exposure.", interpretation: "G4 forced post-exposure carried; corroboration_strength suggested_by_context"}
  - {id: G5, rule: "Success metric: defects resolved, validators clean, no new disposition/index drift.", interpretation: "success = both reviewers confirm flip + operator approval recorded; OR clean documentation of any block. NOT silent flip."}

# ---- 4 preconditions per spec section 0 cf-007 ----

cf_007_preconditions_evidence:

  precondition_1:
    rule: validate_disposition_index.py runs clean
    spec_reference: section 0 done_claim_rule applies_to_frontmatter_readiness_flip rule
    current_state: VERIFIED
    evidence: "agent-loop/state/validate-disposition-index-report.yaml: 0 findings; counts archived=20 resolved=130 deferred=49"

  precondition_2:
    rule: iteration-0000 metrics exist in section 22
    spec_reference: section 0 done_claim_rule
    current_state: VERIFIED
    evidence: "agent-loop/active/iteration-0000/iteration-outcome.yaml has all 5 §22 metric blocks (tokens_per_iteration, context_reuse, review_quality, outcome_quality, implementation_quality) per iteration-0002 change-09"
    note: "metric values were derived from iteration-0000 legacy fields where possible (finding_count_*, corroborations_detected, independent_finding_rate); null/0 elsewhere; legacy fields preserved additively. iteration-0000 was observational so token estimates weren't measured at boot but the metric blocks are present and validate_iteration parses them."

  precondition_3:
    rule: cf-* findings from iteration-0000 are dispositioned (resolved or deferred with rationale in disposition-ledger.yaml)
    spec_reference: section 0 done_claim_rule
    current_state: VERIFIED
    evidence: |
      cf-001..cf-008 from iteration-0000 all promoted in v1.7 (see section 24 resolved
      block + ledger iteration_0000_canonical_findings_resolved). cf-002, cf-006,
      cf-risk-001..003 deferred per iteration-0000 disposition (ledger
      iteration_0000_canonical_findings_deferred). pending_operator_decision: 0;
      pending_iteration_0001_canonical_findings: 0 (iteration-0004 closed all 11).

  precondition_4:
    rule: both reviewer agents confirm in a dedicated readiness-flip review pass
    spec_reference: section 0 done_claim_rule applies_to_frontmatter_readiness_flip
    current_state: PENDING (this iteration is THE pass; reviewers about to be dispatched)
    expected_evidence: "both reviewers' overall_position.implementation_ready: true with ready_to_flip: true field in their reviews"

  precondition_5_operator:
    rule: operator records the transition with explicit rationale in revision_history
    spec_reference: section 0 done_claim_rule
    current_state: PENDING (operator-only step; cannot be executed by claude)
    expected_evidence: "operator-supplied rationale_for_flip text + explicit authorization to apply"

# ---- Reviewer task ----

reviewer_decision_required:
  question: "Should active_contract_readiness flip from pending_phase_0_empirical_validation to ready NOW?"
  must_consider:
    - "Are all 4 preconditions truly met (not just claimed)?"
    - "Is the flip operationally meaningful? What changes downstream when readiness is ready?"
    - "Is there any quiet bug or known-unstable area that could embarrass us if we declare ready prematurely?"
    - "What value should the new readiness state hold? 'ready' / 'phase_0_complete' / 'phase_0_validated' / something else?"
    - "do_not_treat_as_phase_0_ready: true field — should it become false, or be removed?"
    - "Operator project guidance ('do not keep polishing process') — does flipping readiness signal we should redirect to render outcomes?"
  reviewers_must_emit:
    - flip_approved: bool
    - proposed_new_readiness_value: string (e.g. "ready" or "phase_0_validated")
    - proposed_do_not_treat_as_phase_0_ready_value: bool or "remove field"
    - rationale: string (mandatory; not the orchestrator's job to summarize)
    - blockers_if_any: list (must be empty if flip_approved=true)
  reviewers_may_disagree: yes (and that means flip blocked per section 13 one-blocker rule)

# ---- Gate state ----

gate_state:
  consensus_state: implementation_ready
  observational_mode: false
  production_state: not_ready
  production_ready: false
  production_allowed: false

active_contract_readiness_lock:
  locked_value: pending_phase_0_empirical_validation
  locked_for_iteration_duration_unless_unanimous_flip_consensus: true
  flip_authority: "consensus.unanimous_flip_approval AND operator_explicit_authorization (separate step after this iteration closes)"

apply_order_rule:
  rule: validators_first_then_apply_BUT_apply_blocked_on_operator_authorization
  enforcement: |
    Phase 1 (this iteration's work): canonical-006 dry-run on staging IF reviewers
    approve flip. Verify validators clean against the proposed flipped frontmatter.
    Phase 2 (post-iteration; operator-gated): operator records rationale in
    revision_history; operator authorizes apply; THEN claude applies the staged
    edit to real frontmatter.

