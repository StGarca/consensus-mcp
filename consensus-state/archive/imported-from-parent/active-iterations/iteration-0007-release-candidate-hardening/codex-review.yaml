non_blocking_suggestions:
  - id: codex-iter0007-001
    severity: medium
    target: "input.yaml implementation_scope.allowed_files"
    text: |
      pyproject.toml already exists at repo root for the parent upstream
      package (commits 091da6a3 + 552d00cd; visible at /pyproject.toml with
      [project] name = "upstream"). The Phase 3 plan annotates
      "pyproject.toml # NEW; created by P3 T5" which is misleading: T5 cannot
      create a path that already exists, and overwriting the audiobook
      pyproject would break that package's install. Recommend disambiguating
      to a sub-directory path before T5 dispatch, e.g.:
        - scripts/agent_loop_mcp/pyproject.toml   (in-tree sub-package)
        OR
        - packaging/agent-loop-mcp/pyproject.toml (separate packaging dir)
      whichever the operator prefers. The G_install gate ("package install
      works from clean checkout; smoke from installed package, NOT
      source-tree") implies the sub-package option since clean-env install
      target must be the agent-loop-mcp wheel, not the audiobook repo.
      Mechanical fix; not a structural blocker; flag before T5 fires.
  - id: codex-iter0007-002
    severity: low
    target: "input.yaml release_gate_criteria.G_unstaged"
    text: |
      G_unstaged rule reads "no unstaged required files (operator: 'no unstaged
      required files')" but does not define what counts as "required". Current
      `git status --short` shows 239 entries: 7 untracked agent-loop active
      iteration dirs (iter-0006, iter-0007 itself, validate report files,
      scope-check reports), modified pyproject.toml + requirements.txt + run/_render_annotated.py,
      plus the consolidated review MD with AM (added-modified) state. Some of
      these are required-for-shippable-boundary (iter-0007 ceremonial files,
      package pyproject) and some are not (the audiobook repo's
      run/_render_annotated.py is orthogonal to the MCP shippable). Recommend
      G_unstaged be re-stated as: "no unstaged files within
      shippable_boundary_paths" with shippable_boundary_paths enumerated
      explicitly in the manifest written during T5. This makes the gate
      mechanically verifiable rather than ambiguous.
  - id: codex-iter0007-003
    severity: low
    target: "input.yaml release_gate_criteria.G_install"
    text: |
      G_install ("clean temp venv; smoke from installed package, NOT
      source-tree") needs an explicit gate-test script to mechanically verify.
      Suggest adding scripts/agent_loop_mcp/_install_gate_test.py during the
      P3 ceremony that:
        (1) creates tmp venv via python -m venv
        (2) installs the agent-loop-mcp wheel from build artifact
        (3) imports agent_loop_mcp.server from the venv site-packages path
        (4) runs the smoke against the installed import (NOT sys.path-injected
            source-tree)
        (5) returns exit 0 iff installed-smoke passes
      Without this, G_install is verified by inspection rather than a
      reproducible command, and future regressions cannot trip the gate.
      Mechanical addition; per spec "frozen smoke unless gate-test additions
      are required" clause in forbidden_files this is permitted.
  - id: codex-iter0007-004
    severity: low
    target: "consolidated review MD Round 8 count drift"
    text: |
      Round 8 closure block (line 977) states "29 self-applied resolutions
      across Source-MD (7) + CFU (5) + MD-set (5) + Round 6 (9) + Round 7 (6)"
      but 7+5+5+9+6 = 32, not 29. The spot-check tables below list 7/7 + 5/5 +
      5/5 + 9/9 + 6/6 = 32 entries verified-fix-present. The "29" likely
      reflects cross-round de-duplication (e.g., wiki/log.md appears in both
      CFU F1 and Round 6 F5). Non-blocking because the conclusion ("Zero real
      blockers; v1.9.2 + post-Round-6+7 state is shippable") stands either
      way, but the count should be reconciled in a future bookkeeping pass
      (or a footnote added explaining the de-dup) to avoid future audit
      confusion. Do NOT iterate now; record only.
  - id: codex-iter0007-005
    severity: low
    target: "input.yaml allowed_sections"
    text: |
      allowed_sections lists "spec_md/section_0" and "spec_md/frontmatter"
      with the comment "potentially: add a 'Release boundary + shippable
      manifest' pointer" / "potentially: add v1.9.3 revision_history entry
      post-close". Both are conditional ("potentially"); recommend the
      iteration-outcome.yaml at close declare which (if any) of those sections
      were actually touched, so the surgical-changes principle has a closing
      receipt. If neither section is touched (i.e., shippable manifest lives
      entirely in agent-loop/active/iteration-0007.../ ceremonial files plus
      the new pyproject path), record allowed_sections_consumed: [] in the
      outcome explicitly.

rationale: |
  Plan is sound and Phase-3-anti-scope-compliant. Empirical verification of
  every cited current state (51/51 smoke, 21/21 validators, 0 findings,
  T9/T10 file="" structured errors, Round 8 closure CLOSED with NONE blockers,
  spec v1.9.2 active, design spec g1-through-g5-implemented, ledger v1.9.2,
  packet_sha256 self-verifies) confirms the inputs the plan rests on are all
  real. The 6-step structure (FREEZE / CLOSE / ITERATE / BOUND / PACKAGE /
  GATE) maps cleanly to operator directive language ("stop adding capability,
  freeze G1-G5, prove the tool can survive real use, then package only the
  stable core"). The 7 release gates are concrete and verifiable in principle:
  G_smoke, G_validators, G_frontmatter are commands that already exist;
  G_real_iter is verified by this iteration itself completing; G_unstaged and
  G_install need the structural disambiguation noted in suggestions
  codex-iter0007-002 and codex-iter0007-003 to be mechanically reproducible
  but are not blocking-defects (the operator's "no unstaged required files"
  rule is interpretable as-is). G_untracked_pkg is verifiable once the
  shippable boundary is enumerated in the SHIPS manifest (T5 BOUND step).

  The pyproject.toml-already-exists issue (codex-iter0007-001) is the only
  structural irregularity; it is medium severity because if T5 dispatched
  without disambiguation it would either fail (path conflict) or destructive-
  write the audiobook package's pyproject. The fix is a one-line edit to
  implementation_scope.allowed_files before T5 fires; this is well within
  Phase-3 scope (mechanical adjustment, not new design). Approving the plan
  contingent on the operator or T5 implementer catching this disambiguation
  before T5 dispatch.

  Phase 3 anti-scope is honored:
    - no G6 (input.yaml what_phase_3_does_NOT_do explicitly excludes G6)
    - no new mechanics (forbidden_actions + forbidden_files freeze MCP tool
      source + smoke test at 51/51)
    - no new doc architecture (allowed_sections caps at section_0 +
      frontmatter, both potentially-only edits)
    - external pass is single-shot per "do not expand external re-review pass
      into recursive rounds" forbidden_action; Round 8 sonnet pass IS that
      single shot, already done, CLOSED, 0 blockers
    - iteration-0007 IS the real G1-G5 ceremony per "iteration-0007 ceremony
      via MCP toolchain end-to-end" what_phase_3_DOES_do entry; this very
      review participates in that ceremony at seal_position 1

  Production scope target "agent-loop-mcp-rc-package-v1.9.3" with
  scope_match_mode "exact" is appropriate: the artifact is a Python package
  (type=deploy), the canonical scope identifier is unique (grep confirms only
  declared in iter-0007 input.yaml; no prior collision), and exact scope_match
  prevents drift between the approval target and the gate.evaluate target.

  Shippable boundary excludes wiki narrative + log.md + generated reports per
  the operator outline; this is correctly reflected in input.yaml's
  forbidden_files list ("wiki sources outside agent-loop/", "production audio
  outputs"). The MCP tool source freeze ("scripts/agent_loop_mcp/tools/* MCP
  tool source", "scripts/agent_loop_mcp/_smoke_test.py") locks the surface at
  the proven-clean 51/51 baseline.

