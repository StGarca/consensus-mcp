schema_version: 1
pilot_id: iteration-0023-closure-invariant-flavor-b-review
goal:
  summary: Flavor B subsystem review of closure invariant code
  desired_end_state: |
    iter-0023 is the FIRST subsystem-wide Flavor B review of agent-loop code.
    Operator request: "Flavor B, all code related to agent-loop" — decomposed
    by blast radius. This iteration targets the closure invariant subsystem
    (highest blast radius, smallest LOC).

    Files in scope:
      - scripts/agent_loop_mcp/_closure_invariant.py
      - scripts/agent_loop_mcp/_validate_closure_invariant.py
      - scripts/agent_loop_mcp/tests/test_closure_invariant.py
      - scripts/agent_loop_mcp/tests/test_iter_0018_cross_ai_invariant.py
      - scripts/agent_loop_mcp/tests/test_validate_closure_invariant.py

    The closure invariant is the supervisor-enforced 3-part gate that prevents
    self-close fraud. It must be airtight: cross_family + hash_match +
    freshness. Defense-in-depth across T6, _self_drive, and loop.run_goal call
    sites. Bugs here can let a model close its own work — the highest possible
    integrity failure in the agent-loop system.

    A real codex reviewer (codex-cli 0.129.0) is dispatched against the
    review-packet (which embeds touched-file contents per iter-0021 and uses
    helper-stamped base_sha per iter-0022). Findings emit either
    patch_proposal (preferred under fix_author_policy=strict) or
    patch_not_proposed_reason. Approved patches land via apply.codex_patch
    under operator authorization.

    iter-0023 SUCCESS = the full Flavor B cycle closes:
      1. Codex emits findings against the 5 files
      2. For each finding with patch_proposal: claude verifier runs
      3. Approved patches land via apply.codex_patch (cross-family closer
         records review_target_hash=last_mutation.post_sha)
      4. closure-certificate.yaml: 3/3 invariant_checks PASS, overall PASS
      5. iteration_closed event recorded with closing_state=quorum_close_passed

    If codex emits zero defects: goal_satisfied=true; close immediately
    without mutation.

    If codex emits many defects (8+): apply approved patches in this
    iteration; document deferred / corrected_resubmit findings as iter-0024
    followup scope.
  non_goals:
    - modify any agent_loop_mcp source file outside the 5-file scope
    - modify run/, wiki/, or non-agent-loop code
    - bump pyproject.toml version
    - introduce new MCP tools
    - extend the codex review schema
allowed_files:
  - scripts/agent_loop_mcp/_closure_invariant.py
  - scripts/agent_loop_mcp/_validate_closure_invariant.py
  - scripts/agent_loop_mcp/tests/test_closure_invariant.py
  - scripts/agent_loop_mcp/tests/test_iter_0018_cross_ai_invariant.py
  - scripts/agent_loop_mcp/tests/test_validate_closure_invariant.py
  - agent-loop/active/iteration-0023-closure-invariant-flavor-b-review/
allowed_sections: []
forbidden_files:
  - scripts/agent_loop_mcp/_self_drive.py
  - scripts/agent_loop_mcp/_dispatch_codex.py
  - scripts/agent_loop_mcp/_author_review_packet.py
  - scripts/agent_loop_mcp/dispatch_templates/
  - scripts/agent_loop_mcp/tools/
  - scripts/agent_loop_mcp/server.py
  - scripts/agent_loop_mcp/tool_registry.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_iter_0022_base_sha_stamp.py
  - scripts/agent_loop_mcp/tests/test_capstone_full_fix_loop.py
  - run/
  - wiki/
  - pyproject.toml
  - requirements.txt
max_iterations: 2
max_patch_size: 300
fix_author_policy: strict
validators_required:
  - validate_disposition_index
acceptance_gates:
  - id: A1
    description: pytest still green after any landed patches
    check: 'python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/test_closure_invariant.py scripts/agent_loop_mcp/tests/test_iter_0018_cross_ai_invariant.py scripts/agent_loop_mcp/tests/test_validate_closure_invariant.py -q'
  - id: A2
    description: closure-certificate.yaml exists with overall PASS
    check: 'python -c "import yaml,sys; c=yaml.safe_load(open(''agent-loop/active/iteration-0023-closure-invariant-flavor-b-review/closure-certificate.yaml'')); sys.exit(0 if c[''overall'']==''PASS'' else 1)"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
  - any_acceptance_gate_returns_undefined
  - claude_codex_disagree_on_goal_satisfied
  - closure_cross_verification_failed
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-10T00:00:00Z'
  codex_patch_apply_authorized: true
  scope_signature: b9b34bd39472e56402497ebbf3a69c19be804f666ce3f590855e31a4af6c39ee
