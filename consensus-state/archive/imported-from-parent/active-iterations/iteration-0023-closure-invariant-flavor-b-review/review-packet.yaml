      \ is None\n    assert _closure_invariant.last_mutation_from_audit([]) is None\n\
      \n\ndef test_last_mutation_from_audit_handles_legacy_events():\n    \"\"\"Pre-#28\
      \ apply_step_landed events without structured fields don't crash.\"\"\"\n  \
