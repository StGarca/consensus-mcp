      , model_family=\"claude\",\n                      target_hash=\"POST\", ts_offset=0)\n\
      \    res = _closure_invariant.check_closure_invariant(lm, v)\n    assert res[\"\
      ok\"] is True\n    assert res[\"checks\"] == {\"cross_family\": True, \"hash_match\"\
      : True, \"freshness\": True}\n\n\ndef test_codex_patch_claude_correction_claude_close_blocked():\n\
      \    \"\"\"#3 claude is last_mutation; claude tries to close -> cross_family\
      \ fail (same family).\"\"\"\n    lm = _make_lm(actor_id=\"claude-iter0017-2\"\
      , model_family=\"claude\", post_sha=\"POST\", ts_offset=-100)\n    v = _make_verdict(actor_id=\"\
      claude-iter0017-2\", model_family=\"claude\",\n                      target_hash=\"\
      POST\", ts_offset=0)\n    res = _closure_invariant.check_closure_invariant(lm,\
      \ v)\n    assert res[\"ok\"] is False\n    assert res[\"checks\"][\"cross_family\"\
      ] is False\n\n\ndef test_codex_patch_claude_correction_codex_post_correction_review_allowed():\n\
      \    \"\"\"#4 After claude correction, codex reviews POST hash with newer ts\
      \ -> allowed.\"\"\"\n    lm = _make_lm(actor_id=\"claude-iter0017-2\", model_family=\"\
      claude\", post_sha=\"POST\", ts_offset=-100)\n    v = _make_verdict(actor_id=\"\
      codex-iter0017-3\", model_family=\"codex\",\n                      target_hash=\"\
      POST\", ts_offset=0)\n    res = _closure_invariant.check_closure_invariant(lm,\
      \ v)\n    assert res[\"ok\"] is True\n\n\ndef test_codex_refix_then_codex_rereview_blocked():\n\
      \    \"\"\"#5 Codex re-fix then codex re-review -> cross_family fail (same model_family).\"\
      \"\"\n    lm = _make_lm(actor_id=\"codex-iter0017-3\", model_family=\"codex\"\
      , post_sha=\"POST\", ts_offset=-100)\n    v = _make_verdict(actor_id=\"codex-iter0017-3\"\
      , model_family=\"codex\",\n                      target_hash=\"POST\", ts_offset=0)\n\
      \    res = _closure_invariant.check_closure_invariant(lm, v)\n    assert res[\"\
      ok\"] is False\n    assert res[\"checks\"][\"cross_family\"] is False\n\n\n\
      def test_stale_claude_review_before_codex_refix_blocked():\n    \"\"\"#6 Claude\
      \ review timestamp BEFORE last_mutation timestamp -> freshness fail.\"\"\"\n\
      \    # last_mutation is \"now\"; claude verdict is from 1 hour ago.\n    lm\
      \ = _make_lm(actor_id=\"codex-iter0017-1\", model_family=\"codex\", post_sha=\"\
      POST\", ts_offset=0)\n    v = _make_verdict(actor_id=\"claude-iter0017-2\",\
      \ model_family=\"claude\",\n                      target_hash=\"POST\", ts_offset=-3600)\n\
      \    res = _closure_invariant.check_closure_invariant(lm, v)\n    assert res[\"\
      ok\"] is False\n    assert res[\"checks\"][\"freshness\"] is False\n\n\ndef\
      \ test_review_target_hash_mismatch_blocked():\n    \"\"\"#7 closer's review_target_hash\
      \ != last_mutation.post_sha -> hash_match fail.\"\"\"\n    lm = _make_lm(actor_id=\"\
      codex-iter0017-1\", model_family=\"codex\", post_sha=\"POST_REAL\", ts_offset=-100)\n\
      \    v = _make_verdict(actor_id=\"claude-iter0017-2\", model_family=\"claude\"\
      ,\n                      target_hash=\"POST_FAKE\", ts_offset=0)\n    res =\
      \ _closure_invariant.check_closure_invariant(lm, v)\n    assert res[\"ok\"]\
      \ is False\n    assert res[\"checks\"][\"hash_match\"] is False\n\n\ndef test_no_mutation_yet_close_not_gated():\n\
      \    \"\"\"#8 last_mutation is None -> invariant trivially passes.\"\"\"\n \
      \   v = _make_verdict(actor_id=\"claude-iter0017-1\", model_family=\"claude\"\
      ,\n                      target_hash=\"ANY\", ts_offset=0)\n    res = _closure_invariant.check_closure_invariant(None,\
      \ v)\n    assert res[\"ok\"] is True\n\n\ndef test_closure_certificate_authored_on_pass(tmp_path,\
      \ monkeypatch):\n    \"\"\"#9 When invariant passes and iteration_closed is\
      \ recorded, closure-certificate.yaml is authored.\n\n    Drive through the audit_append_event\
      \ T6 layer. We monkeypatch ACTIVE_DIR\n    to tmp_path so the test doesn't touch\
      \ the real agent-loop tree.\n    \"\"\"\n    monkeypatch.setattr(audit_append_event,\
      \ \"ACTIVE_DIR\", tmp_path)\n\n    iter_id = \"iteration-test-cert\"\n    iter_dir\
      \ = tmp_path / iter_id\n    iter_dir.mkdir()\n\n    # Pre-populate an audit\
      \ log with a structured apply_step_landed event.\n    apply_event = _make_apply_step_event(\n\
      \        actor_id=\"codex-iter0017-1\",\n        model_family=\"codex\",\n \
      \       role=\"fix_author\",\n        pass_id=\"codex-iter0017-1-pass1\",\n\
      \        patch_id=\"patch-aaaaaaaaaaaa-bbbbbbbbbbbb\",\n        files_touched=[\"\
      foo.py\"],\n        base_sha=\"base-aaaaaaaaaaaa\",\n        post_sha=\"POST_HASH\"\
      ,\n        unified_diff_sha256=\"diff-bbbbbbbbbbbb\",\n        timestamp=_now_iso(-1000),\n\
      \    )\n    audit_path = iter_dir / \"independence-audit.yaml\"\n    audit_path.write_text(\n\
      \        yaml.safe_dump({\"audit_log\": [apply_event]}, sort_keys=False),\n\
      \        encoding=\"utf-8\",\n    )\n\n    # Author a fresh claude-review.yaml\
      \ that satisfies the invariant.\n    claude_review = {\n        \"actor\": {\n\
      \            \"id\": \"claude-iter0017-2\",\n            \"model_family\": \"\
      claude\",\n            \"pass_id\": \"claude-iter0017-2-pass1\",\n        },\n\
      \        \"review_target_hash\": \"POST_HASH\",\n        \"created_at_utc\"\
      : _now_iso(),\n        \"goal_satisfied\": True,\n    }\n    (iter_dir / \"\
      claude-review.yaml\").write_text(\n        yaml.safe_dump(claude_review, sort_keys=False),\n\
      \        encoding=\"utf-8\",\n    )\n\n    result = audit_append_event.handle(\n\
      \        iteration_id=iter_id,\n        event_type=\"iteration_closed\",\n \
      \       actor=\"claude-iter0017-2\",\n        closing_state=\"quorum_close_passed\"\
      ,\n    )\n\n    # Refuse-on-fail OR pass: this case should pass; certificate\
      \ must exist.\n    assert \"error\" not in result, f\"unexpected error: {result.get('error')}\"\
      \n    cert_path = iter_dir / \"closure-certificate.yaml\"\n    assert cert_path.exists(),\
      \ \"closure-certificate.yaml not authored on PASS\"\n    cert = yaml.safe_load(cert_path.read_text(encoding=\"\
      utf-8\"))\n    assert cert[\"overall\"] == \"PASS\"\n    assert cert[\"invariant_checks\"\
      ][\"cross_family\"] == \"PASS\"\n    assert cert[\"invariant_checks\"][\"hash_match\"\
      ] == \"PASS\"\n    assert cert[\"invariant_checks\"][\"freshness\"] == \"PASS\"\
      \n\n\n# ---------------------------------------------------------------------------\n\
      # T6 audit_append_event refusal tests\n# ---------------------------------------------------------------------------\n\
      \n\ndef test_t6_refuses_iteration_closed_when_invariant_fails(tmp_path, monkeypatch):\n\
      \    \"\"\"T6 refuses to write iteration_closed when invariant fails.\n\n  \
