      \       \"files_modified\": [audited_rel],\n    }\n    audit_path = iter_dir\
      \ / \"independence-audit.yaml\"\n    audit_path.write_text(\n        yaml.safe_dump({\"\
      audit_log\": [apply_event]}), encoding=\"utf-8\"\n    )\n\n    # Cross-family\
      \ closer review so the closer-invariant itself would PASS;\n    # the new check\
      \ should still block on unaudited mutation.\n    closer = {\n        \"actor\"\
      : {\n            \"id\": \"claude-iter0018-2\",\n            \"model_family\"\
      : \"claude\",\n            \"pass_id\": \"claude-iter0018-2-pass1\",\n     \
      \   },\n        \"review_target_hash\": \"POST\",\n        \"created_at_utc\"\
      : _now_iso(0),\n        \"goal_satisfied\": True,\n    }\n    (iter_dir / \"\
