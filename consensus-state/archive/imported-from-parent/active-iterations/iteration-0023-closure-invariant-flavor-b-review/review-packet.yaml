    scripts/agent_loop_mcp/_closure_invariant.py: "\"\"\"Closure-cross-verification-and-freshness\
      \ invariant helpers (Task #28).\n\nImplements the supervisor-enforced invariant\
      \ from codex 2026-05-10 v3+v4+v5\ndirective:\n\n    closer.actor.model_family\
      \ != last_mutation.actor.model_family  # PRIMARY: cross-FAMILY\n    closer.review_target_hash\
      \ == last_mutation.post_sha            # PRIMARY: hash binding\n    closer.created_at_utc\
      \ > last_mutation.timestamp                # SECONDARY: freshness\n\nAll three\
      \ must pass for the closer to be permitted to record a quorum_close.\n\nPer\
      \ codex 2026-05-10 v5 Finding 1: the cross-AI check operates on\n`actor.model_family`,\
      \ NOT `actor.id`. Codex-A -> Codex-B with different\nactor.ids is same-family-different-actor,\
      \ NOT cross-AI. Real cross-AI\nrequires the families differ. If either model_family\
      \ is missing, the check\nFAILS (treat undeterminable as failed).\n\nHash binding\
      \ is PRIMARY because clocks and generated timestamps can drift;\nhashes can't.\
      \ Freshness is SECONDARY defense-in-depth against re-played stale\nverdicts\
      \ on the right post-mutation hash.\n\nPure helpers — no side effects. Filesystem\
      \ reads are confined to bundle_sha.\nThree independent enforcement layers (T6\
      \ audit_append_event, _self_drive\nstop rule, loop.run_goal transition guard)\
      \ call check_closure_invariant\nagainst the same logic; defense-in-depth requires\
      \ defeating all three to bypass.\n\"\"\"\nfrom __future__ import annotations\n\
      \nimport hashlib\nfrom pathlib import Path\nfrom typing import Optional\n\n\n\
      def bundle_sha(repo_root: Path, files_touched: list[str]) -> str:\n    \"\"\"\
      Patch target file bundle hash.\n\n    Canonical hash for last_mutation.{base_sha,\
      \ post_sha}. sha256 of sorted\n    (path, sha256-of-file-content) pairs. Reproducible\
      \ without commits;\n    bound to exactly the touched files; doesn't drift with\
      \ unrelated commits.\n    Missing files contribute b\"\" content hash (allowed\
      \ for delete patches).\n\n    NOT git HEAD (no-auto-commit conflict) and NOT\
      \ the review-packet sha\n    (covers metadata not patched files).\n    \"\"\"\
      \n    repo_root = Path(repo_root)\n    parts: list[str] = []\n    for p in sorted(files_touched):\n\
      \        full = repo_root / p\n        try:\n            content = full.read_bytes()\
      \ if full.exists() else b\"\"\n        except OSError:\n            content\
      \ = b\"\"\n        content_hash = hashlib.sha256(content).hexdigest()\n    \
      \    parts.append(f\"{p}\\0{content_hash}\")\n    canonical = \"\\n\".join(parts)\n\
      \    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\n\ndef\
      \ last_mutation_from_audit(audit_log: list[dict]) -> Optional[dict]:\n    \"\
      \"\"Derive last_mutation from apply_step_landed audit events.\n\n    Returns\
      \ the MOST RECENT apply_step_landed event (event-derived from the\n    audit\
      \ log, not mutable state text). Cannot drift from reality.\n\n    Returns None\
      \ if no apply_step_landed events found (no mutation has\n    occurred yet —\
      \ close paths without mutation aren't gated by this rule).\n\n    Backward-compat:\
      \ pre-#28 audit logs may have apply_step_landed events\n    without the structured\
      \ actor/patch_id fields. Returns the legacy event\n    as-is; the downstream\
      \ invariant check fails on the missing required\n    fields rather than crash.\n\
      \    \"\"\"\n    if not audit_log:\n        return None\n    apply_events =\
      \ [e for e in audit_log if isinstance(e, dict) and e.get(\"event\") == \"apply_step_landed\"\
      ]\n    if not apply_events:\n        return None\n    # Most-recent by list\
      \ order (audit_log appends in chronological order).\n    # We tolerate missing\
      \ timestamp_utc by falling back to list order.\n    most_recent = apply_events[-1]\n\
      \n    # Per iter-0017 capstone finding: apply_codex_patch (Task #26) emits its\n\
      \    # structured per-mutation fields nested under `last_mutation` (because\
      \ T6's\n    # apply_step_landed canonical event type doesn't have actor/post_sha\
      \ as\n    # named top-level fields — they go in extra_fields). This reader must\n\
      \    # accept BOTH shapes:\n    #   - top-level (legacy / unit-test shape):\
      \ {actor, post_sha, ...}\n    #   - nested (real apply_codex_patch shape): {extra_fields:\
      \ {last_mutation: {actor, post_sha, ...}}}\n    # Without this hoisting, the\
      \ closure invariant would always fail\n    # hash_match against a real apply_codex_patch\
      \ event because the top-level\n    # post_sha is absent.\n    nested = most_recent.get(\"\
      last_mutation\")\n    if isinstance(nested, dict):\n        # Hoist nested fields\
      \ to top level for downstream consumers, preserving\n        # any explicit\
      \ top-level values (top-level wins over nested).\n        merged = {**nested,\
      \ **{k: v for k, v in most_recent.items() if k != \"last_mutation\"}}\n    \
      \    most_recent = merged\n\n    # Surface a `timestamp` alias for downstream\
      \ invariant code (which\n    # expects either `timestamp` or `timestamp_utc`).\n\
      \    if \"timestamp\" not in most_recent and \"timestamp_utc\" in most_recent:\n\
      \        return {**most_recent, \"timestamp\": most_recent[\"timestamp_utc\"\
      ]}\n    return most_recent\n\n\ndef _actor_id(actor) -> Optional[str]:\n   \
      \ \"\"\"Extract actor id from either the structured dict form or a legacy string.\"\
      \"\"\n    if isinstance(actor, dict):\n        return actor.get(\"id\")\n  \
      \  if isinstance(actor, str):\n        return actor\n    return None\n\n\ndef\
      \ _actor_model_family(actor) -> Optional[str]:\n    \"\"\"Extract actor model_family\
      \ from the structured dict form.\n\n    Legacy string actors have no model_family\
      \ — return None (which causes the\n    cross-family check to FAIL as undeterminable,\
      \ per v5 Finding 1).\n    \"\"\"\n    if isinstance(actor, dict):\n        return\
      \ actor.get(\"model_family\")\n    return None\n\n\ndef check_closure_invariant(\n\
      \    last_mutation: Optional[dict],\n    closing_verdict: dict,\n) -> dict:\n\
      \    \"\"\"Three-part gate: cross_family + hash_match + freshness.\n\n    Returns:\n\
      \      {\n        \"ok\": bool,\n        \"checks\": {\n          \"cross_family\"\
      : bool,\n          \"hash_match\": bool,\n          \"freshness\": bool,\n \
      \       },\n        \"reason\": str,  # human-readable failure description;\
      \ empty when ok\n      }\n\n    Hash binding PRIMARY, timestamp SECONDARY (per\
      \ codex 2026-05-10 v4: clocks\n    can drift, hashes can't). All three must\
      \ pass for ok=True.\n\n    Per v5 Finding 1, the family check (cross_family)\
      \ replaces the old\n    cross_actor check that compared only actor.id. Codex-A\
      \ -> Codex-B with\n    different actor.ids passes cross_actor but is NOT cross-AI;\
      \ the family\n    check catches that. If either side's model_family is missing,\
      \ the check\n    FAILS (treat undeterminable as failed) — operators MUST author\
      \ actor\n    objects with model_family.\n\n    closing_verdict shape:\n    \
      \  {\n        actor: {id, model_family, pass_id},  # or string for legacy\n\
      \        review_target_hash: str,\n        created_at_utc: str (ISO 8601),\n\
      \        review_scope_hash: str,  # optional\n      }\n\n    If last_mutation\
      \ is None (no mutation yet), invariant trivially passes.\n    Close paths that\
      \ don't involve mutation aren't gated by this rule.\n    \"\"\"\n    if last_mutation\
      \ is None:\n        return {\n            \"ok\": True,\n            \"checks\"\
      : {\n                \"cross_family\": True,\n                \"hash_match\"\
      : True,\n                \"freshness\": True,\n            },\n            \"\
      reason\": \"\",\n        }\n\n    closer_actor_id = _actor_id(closing_verdict.get(\"\
      actor\"))\n    lm_actor_id = _actor_id(last_mutation.get(\"actor\"))\n    closer_family\
      \ = _actor_model_family(closing_verdict.get(\"actor\"))\n    lm_family = _actor_model_family(last_mutation.get(\"\
      actor\"))\n\n    # v5 Finding 1: cross-family check (BOTH families must be present\
      \ AND\n    # different). actor.id difference is necessary (a node cannot close\
      \ its\n    # own work) but not sufficient — same-family-different-actor doesn't\n\
      \    # buy independence.\n    cross_family = (\n        closer_family is not\
      \ None\n        and lm_family is not None\n        and closer_family != lm_family\n\
      \        and closer_actor_id is not None\n        and lm_actor_id is not None\n\
      \        and closer_actor_id != lm_actor_id\n    )\n\n    closer_target = closing_verdict.get(\"\
      review_target_hash\")\n    lm_post = last_mutation.get(\"post_sha\")\n    hash_match\
      \ = (\n        closer_target is not None\n        and lm_post is not None\n\
      \        and closer_target == lm_post\n    )\n\n    closer_ts = closing_verdict.get(\"\
      created_at_utc\")\n    lm_ts = last_mutation.get(\"timestamp\") or last_mutation.get(\"\
      timestamp_utc\")\n    # String comparison works for ISO 8601 / RFC 3339 with\
      \ Z suffix.\n    freshness = (\n        closer_ts is not None\n        and lm_ts\
      \ is not None\n        and closer_ts > lm_ts\n    )\n\n    ok = cross_family\
      \ and hash_match and freshness\n    reasons: list[str] = []\n    if not cross_family:\n\
      \        reasons.append(\n            f\"cross_family: closer.actor.model_family={closer_family!r}/\"\
      \n            f\"id={closer_actor_id!r} vs last_mutation.actor.model_family={lm_family!r}/\"\
      \n            f\"id={lm_actor_id!r}\"\n        )\n    if not hash_match:\n \
      \       reasons.append(\n            f\"hash_match: closer.review_target_hash={closer_target!r}\
      \ != last_mutation.post_sha={lm_post!r}\"\n        )\n    if not freshness:\n\
      \        reasons.append(\n            f\"freshness: closer.created_at_utc={closer_ts!r}\
      \ <= last_mutation.timestamp={lm_ts!r}\"\n        )\n    return {\n        \"\
      ok\": ok,\n        \"checks\": {\n            \"cross_family\": cross_family,\n\
      \            \"hash_match\": hash_match,\n            \"freshness\": freshness,\n\
      \        },\n        \"reason\": \"; \".join(reasons),\n    }\n"
    scripts/agent_loop_mcp/_validate_closure_invariant.py: "\"\"\"Standalone CLI:\
      \ scan iterations for closure-cross-verification-and-freshness invariant compliance.\n\
      \nUsage\n-----\n  # Scan all iterations under agent-loop/active/\n  python -m\
      \ agent_loop_mcp._validate_closure_invariant\n\n  # Scan a specific iteration\n\
      \  python -m agent_loop_mcp._validate_closure_invariant --iteration iteration-0009-mcp-wrapper-v1-1-x\n\
      \n  # Scan a custom active dir (used by tests)\n  python -m agent_loop_mcp._validate_closure_invariant\
      \ --active-dir /some/path\n\nOutput\n------\nJSON to stdout. Exit 0 if no non_compliant;\
      \ 1 if any non_compliant.\n\"\"\"\nfrom __future__ import annotations\n\nimport\
      \ argparse\nimport json\nimport sys\nfrom pathlib import Path\nfrom typing import\
      \ Optional\n\nimport yaml\n\ndef _resolve_repo_root() -> Path:\n    \"\"\"Resolve\
      \ repo root via AGENT_LOOP_MCP_REPO_ROOT env override (installed-wheel\n   \
      \ case where __file__ lands inside python_env/Lib/site-packages) → fallback\
      \ to\n    in-tree __file__ walk (source-tree case).\n    \"\"\"\n    import\
      \ os\n    override = os.environ.get(\"AGENT_LOOP_MCP_REPO_ROOT\")\n    if override:\n\
      \        return Path(override).resolve()\n    return Path(__file__).resolve().parent.parent.parent\n\
      \n\n_REPO_ROOT = _resolve_repo_root()\n_DEFAULT_ACTIVE_DIR = _REPO_ROOT / \"\
      agent-loop\" / \"active\"\n\n# Import from sibling module (no relative import\
      \ so CLI -m works).\nfrom agent_loop_mcp._closure_invariant import (  # noqa:\
      \ E402\n    check_closure_invariant,\n    last_mutation_from_audit,\n)\n\n\n\
      # ---------------------------------------------------------------------------\n\
      # Review file parsing — maps on-disk yaml to closing_verdict shape.\n# ---------------------------------------------------------------------------\n\
      \ndef _load_review_yaml(path: Path) -> Optional[dict]:\n    \"\"\"Parse a claude-review.yaml\
      \ or codex-review.yaml into closing_verdict shape.\n\n    On-disk fields:\n\
      \      reviewer_id       → actor.id\n      sealed_at_utc     → created_at_utc\n\
      \      packet_sha256     → review_target_hash\n      actor.model_family (when\
      \ structured actor present) → actor.model_family\n      otherwise: derive from\
      \ reviewer_id prefix or filename (claude-* / codex-*)\n\n    Returns None if\
      \ file missing or unreadable.\n\n    Per v5 Finding 1, model_family is now part\
      \ of the cross-family check; for\n    historical reviews that don't carry a\
      \ structured actor object, derive\n    model_family from reviewer_id prefix\
      \ or the review filename so the\n    historical validator can still produce\
      \ a verdict.\n    \"\"\"\n    if not path.exists():\n        return None\n \
      \   try:\n        data = yaml.safe_load(path.read_text(encoding=\"utf-8\"))\
      \ or {}\n    except Exception:\n        return None\n    reviewer_id = data.get(\"\
      reviewer_id\") or data.get(\"agent\")\n    sealed_at = data.get(\"sealed_at_utc\"\
      ) or data.get(\"created_at_utc\")\n    target_hash = data.get(\"packet_sha256\"\
      ) or data.get(\"review_target_hash\")\n    if not (reviewer_id and sealed_at):\n\
      \        return None\n\n    # Prefer the structured actor object when present\
      \ (post-iter-0018 reviews).\n    structured_actor = data.get(\"actor\") if isinstance(data.get(\"\
      actor\"), dict) else None\n\n    family: Optional[str] = None\n    if structured_actor\
      \ is not None:\n        family = structured_actor.get(\"model_family\")\n  \
      \  if not family:\n        # Heuristic: reviewer_id prefix.\n        rid = str(reviewer_id).lower()\n\
      \        if rid.startswith(\"codex\"):\n            family = \"codex\"\n   \
      \     elif rid.startswith(\"claude\"):\n            family = \"claude\"\n  \
      \      else:\n            # Fallback: file naming convention.\n            fname\
      \ = path.name.lower()\n            if fname.startswith(\"codex\"):\n       \
      \         family = \"codex\"\n            elif fname.startswith(\"claude\"):\n\
      \                family = \"claude\"\n\n    actor: dict = {\"id\": reviewer_id}\n\
      \    if family:\n        actor[\"model_family\"] = family\n\n    return {\n\
      \        \"actor\": actor,\n        \"review_target_hash\": target_hash,\n \
      \       \"created_at_utc\": sealed_at,\n    }\n\n\ndef _most_recent_closing_verdict(\n\
      \    iteration_dir: Path,\n    last_mutation: Optional[dict],\n) -> tuple[Optional[dict],\
      \ bool]:\n    \"\"\"Find the most recent review (claude or codex) with created_at_utc\
      \ > last_mutation.timestamp.\n\n    Returns (verdict_dict | None, closing_verdict_present:\
      \ bool).\n    present=True means a fresh-enough review exists. present=False\
      \ means\n    reviews exist but are all stale (or absent).\n    \"\"\"\n    mut_ts:\
      \ Optional[str] = None\n    if last_mutation is not None:\n        mut_ts =\
      \ last_mutation.get(\"timestamp\") or last_mutation.get(\"timestamp_utc\")\n\
      \n    candidates = []\n    for fname in (\"claude-review.yaml\", \"codex-review.yaml\"\
      ):\n        v = _load_review_yaml(iteration_dir / fname)\n        if v is None:\n\
      \            continue\n        v_ts = v.get(\"created_at_utc\", \"\")\n    \
      \    if mut_ts is None or v_ts > mut_ts:\n            candidates.append(v)\n\
      \n    if not candidates:\n        return None, False\n    # Pick most recent\
      \ by timestamp string (ISO 8601 sorts lexicographically).\n    best = max(candidates,\
      \ key=lambda v: v.get(\"created_at_utc\", \"\"))\n    return best, True\n\n\n\
      # ---------------------------------------------------------------------------\n\
      # Per-iteration scan\n# ---------------------------------------------------------------------------\n\
      \ndef scan_iteration(iteration_dir: Path) -> dict:\n    \"\"\"Return a result\
      \ dict for a single iteration directory.\"\"\"\n    iteration_id = iteration_dir.name\n\
      \    audit_path = iteration_dir / \"independence-audit.yaml\"\n\n    if not\
      \ audit_path.exists():\n        return {\n            \"iteration_id\": iteration_id,\n\
      \            \"has_apply_step_landed\": False,\n            \"last_mutation\"\
      : None,\n            \"closing_verdict_present\": False,\n            \"invariant_check\"\
      : None,\n            \"verdict\": \"n/a (no audit)\",\n        }\n\n    try:\n\
      \        audit_data = yaml.safe_load(audit_path.read_text(encoding=\"utf-8\"\
      )) or {}\n    except Exception:\n        return {\n            \"iteration_id\"\
      : iteration_id,\n            \"has_apply_step_landed\": False,\n           \
      \ \"last_mutation\": None,\n            \"closing_verdict_present\": False,\n\
      \            \"invariant_check\": None,\n            \"verdict\": \"n/a (no\
      \ audit)\",\n        }\n\n    audit_log = audit_data.get(\"audit_log\") or []\n\
      \    last_mutation = last_mutation_from_audit(audit_log)\n\n    if last_mutation\
      \ is None:\n        return {\n            \"iteration_id\": iteration_id,\n\
      \            \"has_apply_step_landed\": False,\n            \"last_mutation\"\
      : None,\n            \"closing_verdict_present\": False,\n            \"invariant_check\"\
      : None,\n            \"verdict\": \"n/a (no mutation)\",\n        }\n\n    closing_verdict,\
      \ cv_present = _most_recent_closing_verdict(iteration_dir, last_mutation)\n\n\
      \    if not cv_present:\n        return {\n            \"iteration_id\": iteration_id,\n\
      \            \"has_apply_step_landed\": True,\n            \"last_mutation\"\
      : last_mutation,\n            \"closing_verdict_present\": False,\n        \
      \    \"invariant_check\": None,\n            \"verdict\": \"in_flight\",\n \
      \       }\n\n    inv = check_closure_invariant(last_mutation, closing_verdict)\n\
      \    verdict = \"compliant\" if inv[\"ok\"] else \"non_compliant\"\n\n    return\
      \ {\n        \"iteration_id\": iteration_id,\n        \"has_apply_step_landed\"\
      : True,\n        \"last_mutation\": last_mutation,\n        \"closing_verdict_present\"\
      : True,\n        \"invariant_check\": inv,\n        \"verdict\": verdict,\n\
      \    }\n\n\n# ---------------------------------------------------------------------------\n\
      # Multi-iteration scan\n# ---------------------------------------------------------------------------\n\
      \ndef scan_all(iteration_dirs: list[Path]) -> dict:\n    \"\"\"Scan a list of\
      \ iteration dirs and return output dict with summary.\"\"\"\n    results = [scan_iteration(d)\
      \ for d in sorted(iteration_dirs, key=lambda p: p.name)]\n\n    counts = {\"\
      compliant\": 0, \"non_compliant\": 0, \"n/a\": 0, \"in_flight\": 0}\n    for\
      \ r in results:\n        v = r[\"verdict\"]\n        if v.startswith(\"n/a\"\
      ):\n            counts[\"n/a\"] += 1\n        elif v in counts:\n          \
      \  counts[v] += 1\n\n    return {\n        \"iterations_scanned\": results,\n\
      \        \"summary\": {\n            \"total\": len(results),\n            **counts,\n\
      \        },\n    }\n\n\n# ---------------------------------------------------------------------------\n\
      # CLI\n# ---------------------------------------------------------------------------\n\
      \ndef main() -> None:\n    parser = argparse.ArgumentParser(\n        description=\"\
      Scan iterations for closure-invariant compliance.\"\n    )\n    parser.add_argument(\n\
      \        \"--iteration\",\n        metavar=\"ITERATION_ID\",\n        help=\"\
      Scan a single iteration by name (relative to --active-dir).\",\n    )\n    parser.add_argument(\n\
      \        \"--active-dir\",\n        metavar=\"PATH\",\n        default=str(_DEFAULT_ACTIVE_DIR),\n\
      \        help=\"Directory containing iteration-* subdirs (default: agent-loop/active/).\"\
      ,\n    )\n    args = parser.parse_args()\n\n    active_dir = Path(args.active_dir)\n\
      \n    if args.iteration:\n        dirs = [active_dir / args.iteration]\n   \
      \ else:\n        dirs = sorted(active_dir.glob(\"iteration-*\"))\n\n    output\
      \ = scan_all(dirs)\n    print(json.dumps(output, indent=2, default=str))\n\n\
      \    has_non_compliant = output[\"summary\"][\"non_compliant\"] > 0\n    sys.exit(1\
      \ if has_non_compliant else 0)\n\n\nif __name__ == \"__main__\":\n    main()\n"
    scripts/agent_loop_mcp/tests/test_closure_invariant.py: "\"\"\"Unit tests for\
      \ the closure-cross-verification-and-freshness invariant\n(Task #28, codex 2026-05-10\
      \ v3+v4 directive).\n\nThree independent enforcement layers are tested here:\n\
      \  1. _closure_invariant module helpers (bundle_sha, last_mutation_from_audit,\n\
      \     check_closure_invariant)\n  2. _self_drive.cmd_check_stop_rules new `closure_cross_verification_failed`\n\
      \     stop rule\n  3. tools/loop_run_goal._detect_state_from_files transition\
      \ guard\n     (`blocked_closure_invariant_failed` state)\n  4. tools/audit_append_event\
      \ refusal to record `iteration_closed` when the\n     invariant fails, and authoring\
      \ of `closure-certificate.yaml` when it\n     passes.\n\nThe 9 acceptance tests\
      \ from the directive memory are the contract; the\nhelper-level unit tests catch\
      \ lower-level bugs.\n\nTests use tmp_path for filesystem isolation and monkeypatch\
      \ where needed.\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\n\
      import contextlib\nimport io\nimport json\nimport sys\nimport unittest.mock\
      \ as _mock\nfrom datetime import datetime, timedelta, timezone\nfrom pathlib\
      \ import Path\n\nimport pytest\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent.parent.parent\n\
      sys.path.insert(0, str(REPO_ROOT / \"scripts\"))\n\nfrom agent_loop_mcp import\
      \ _closure_invariant  # noqa: E402\nfrom agent_loop_mcp import _self_drive \
      \ # noqa: E402\nfrom agent_loop_mcp.tools import audit_append_event  # noqa:\
      \ E402\nfrom agent_loop_mcp.tools import loop_run_goal  # noqa: E402\n\n\n#\
      \ ---------------------------------------------------------------------------\n\
      # Fixture helpers\n# ---------------------------------------------------------------------------\n\
      \n\ndef _now_iso(offset_seconds: int = 0) -> str:\n    t = datetime.now(timezone.utc)\
      \ + timedelta(seconds=offset_seconds)\n    return t.replace(microsecond=0).isoformat().replace(\"\
      +00:00\", \"Z\")\n\n\ndef _write_file(p: Path, content: str = \"\") -> None:\n\
      \    p.parent.mkdir(parents=True, exist_ok=True)\n    p.write_text(content,\
      \ encoding=\"utf-8\")\n\n\ndef _make_apply_step_event(\n    *,\n    actor_id:\
      \ str,\n    model_family: str,\n    role: str,\n    pass_id: str,\n    patch_id:\
      \ str,\n    files_touched: list[str],\n    base_sha: str,\n    post_sha: str,\n\
      \    unified_diff_sha256: str,\n    timestamp: str | None = None,\n) -> dict:\n\
      \    \"\"\"Build a structured apply_step_landed event in the post-#28 shape.\"\
      \"\"\n    return {\n        \"event\": \"apply_step_landed\",\n        \"timestamp_utc\"\
      : timestamp or _now_iso(),\n        \"event_id\": f\"{timestamp or _now_iso()}_apply_step_landed_{actor_id}\"\
      ,\n        \"effect\": f\"applied patch {patch_id}\",\n        \"actor\": {\n\
      \            \"id\": actor_id,\n            \"model_family\": model_family,\n\
      \            \"role\": role,\n            \"pass_id\": pass_id,\n        },\n\
      \        \"patch_id\": patch_id,\n        \"files_touched\": files_touched,\n\
      \        \"base_sha\": base_sha,\n        \"post_sha\": post_sha,\n        \"\
      unified_diff_sha256\": unified_diff_sha256,\n        \"files_modified\": files_touched,\n\
      \    }\n\n\ndef _make_legacy_apply_step_event(timestamp: str | None = None)\
      \ -> dict:\n    \"\"\"Pre-#28 shape: only `effect` + optional `files_modified`.\"\
      \"\"\n    ts = timestamp or _now_iso()\n    return {\n        \"event\": \"\
