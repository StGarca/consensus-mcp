    scripts/agent_loop_mcp/tests/test_iter_0018_cross_ai_invariant.py: "\"\"\"iter-0018\
      \ cross-AI invariant hardening tests (codex 2026-05-10 v5).\n\nTests the 5 findings\
      \ from the v5 architectural review:\n\n  Finding 1 (HIGH):   model_family-level\
      \ cross-AI check (not just actor.id)\n  Finding 2 (HIGH):   capstone happy-path\
      \ is codex->apply->claude->close\n  Finding 3 (MEDIUM): mutation-completeness\
      \ check at close-attempt time\n  Finding 4 (MEDIUM): strict patch_proposal mode\
      \ in goal_packet\n  Finding 5 (LOW/M):  T6 fails closed when invariant evaluator\
      \ returns None\n\nEach finding gets at least one dedicated test, with additional\
      \ negative cases\nwhere appropriate. RED -> GREEN.\n\"\"\"\nfrom __future__\
      \ import annotations\n\nimport argparse\nimport contextlib\nimport importlib\n\
      import io\nimport json\nimport sys\nfrom datetime import datetime, timedelta,\
      \ timezone\nfrom pathlib import Path\n\nimport pytest\nimport yaml\n\nREPO_ROOT\
      \ = Path(__file__).resolve().parent.parent.parent.parent\nsys.path.insert(0,\
      \ str(REPO_ROOT / \"scripts\"))\n\nfrom agent_loop_mcp import _closure_invariant\
      \  # noqa: E402\nfrom agent_loop_mcp import _dispatch_codex  # noqa: E402\n\
      from agent_loop_mcp import _self_drive  # noqa: E402\nfrom agent_loop_mcp.tools\
      \ import audit_append_event  # noqa: E402\n\n\n# ---------------------------------------------------------------------------\n\
      # Shared fixture helpers (small re-use of existing test idioms; intentionally\n\
      # duplicated rather than imported to keep this test file self-contained per\
      \ the\n# Surgical Changes principle — touching the existing test_closure_invariant\n\
      # fixtures would couple modules that should evolve independently).\n# ---------------------------------------------------------------------------\n\
      \n\ndef _now_iso(offset_seconds: int = 0) -> str:\n    t = datetime.now(timezone.utc)\
      \ + timedelta(seconds=offset_seconds)\n    return t.replace(microsecond=0).isoformat().replace(\"\
      +00:00\", \"Z\")\n\n\ndef _make_lm(*, actor_id, model_family, post_sha, ts_offset=0,\
      \ files_touched=None):\n    if files_touched is None:\n        files_touched\
      \ = [\"foo.py\"]\n    return {\n        \"event\": \"apply_step_landed\",\n\
      \        \"timestamp_utc\": _now_iso(ts_offset),\n        \"actor\": {\n   \
      \         \"id\": actor_id,\n            \"model_family\": model_family,\n \
      \           \"role\": \"fix_author\",\n            \"pass_id\": f\"{actor_id}-pass1\"\
      ,\n        },\n        \"patch_id\": \"patch-xxxxxxxxxxxx-yyyyyyyyyyyy\",\n\
      \        \"files_touched\": list(files_touched),\n        \"base_sha\": \"base-xxxxxxxxxxxx\"\
      ,\n        \"post_sha\": post_sha,\n        \"unified_diff_sha256\": \"diff-yyyyyyyyyyyy\"\
      ,\n        \"timestamp\": _now_iso(ts_offset),\n    }\n\n\ndef _make_verdict(*,\
      \ actor_id, model_family, target_hash, ts_offset=0):\n    return {\n       \
      \ \"actor\": {\n            \"id\": actor_id,\n            \"model_family\"\
      : model_family,\n            \"pass_id\": f\"{actor_id}-pass1\",\n        },\n\
      \        \"review_target_hash\": target_hash,\n        \"created_at_utc\": _now_iso(ts_offset),\n\
      \    }\n\n\n# ===========================================================================\n\
      # Finding 1 (HIGH): closer.actor.model_family must differ from\n#          \
      \         last_mutation.actor.model_family\n# ===========================================================================\n\
      \n\ndef test_same_model_family_different_actor_ids_fails():\n    \"\"\"Codex-A\
      \ authors patch; codex-B (different id, SAME family=codex) closes.\n\n    Pre-iter-0018:\
      \ passes because actor.id differs.\n    Post-iter-0018: FAILS because model_family\
      \ is the same — that's same-family\n    different-actor, NOT cross-AI.\n   \
      \ \"\"\"\n    lm = _make_lm(\n        actor_id=\"codex-iter0018-1\", model_family=\"\
      codex\",\n        post_sha=\"POST\", ts_offset=-100,\n    )\n    v = _make_verdict(\n\
      \        actor_id=\"codex-iter0018-2\", model_family=\"codex\",\n        target_hash=\"\
      POST\", ts_offset=0,\n    )\n    res = _closure_invariant.check_closure_invariant(lm,\
      \ v)\n    assert res[\"ok\"] is False\n    # The check is now named cross_family\
      \ (renamed from cross_actor) and must\n    # fail in this case.\n    assert\
      \ res[\"checks\"][\"cross_family\"] is False\n    assert \"cross_family\" in\
      \ res[\"reason\"]\n\n\ndef test_different_model_family_passes():\n    \"\"\"\
      Codex authors, claude closes -> different model_family, passes.\"\"\"\n    lm\
      \ = _make_lm(\n        actor_id=\"codex-iter0018-1\", model_family=\"codex\"\
      ,\n        post_sha=\"POST\", ts_offset=-100,\n    )\n    v = _make_verdict(\n\
      \        actor_id=\"claude-iter0018-2\", model_family=\"claude\",\n        target_hash=\"\
      POST\", ts_offset=0,\n    )\n    res = _closure_invariant.check_closure_invariant(lm,\
      \ v)\n    assert res[\"ok\"] is True\n    assert res[\"checks\"][\"cross_family\"\
      ] is True\n\n\ndef test_missing_model_family_on_closer_fails():\n    \"\"\"\
      Closer actor missing model_family -> undeterminable cross-family -> FAIL.\"\"\
      \"\n    lm = _make_lm(\n        actor_id=\"codex-iter0018-1\", model_family=\"\
