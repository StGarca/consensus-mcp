      n\", encoding=\"utf-8\")\n\n    apply_event = {\n        \"event\": \"apply_step_landed\"\
      ,\n        \"timestamp_utc\": _now_iso(-100),\n        \"event_id\": f\"{_now_iso(-100)}_apply_step_landed_codex\"\
