      ] is False\n\n\ndef test_compliant(tmp_path):\n    \"\"\"last_mutation by codex\
      \ + fresh claude review of same post_sha → compliant.\"\"\"\n    d = _make_iteration(tmp_path)\n\
      \    mut_ts = _ts(-100)\n    _write_audit(d, audit_log=[\n        _make_apply_event(actor_id=\"\
