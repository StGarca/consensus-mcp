      ,\n    )\n    assert \"error\" in result\n    assert \"unaudited_mutation_detected\"\
      \ in result[\"error\"]\n    # Both unaudited paths should be surfaced.\n   \
      \ assert unaudited_rel in result[\"error\"]\n\n\ndef test_audited_working_tree_changes_allowed_to_close(tmp_path,\
      \ monkeypatch):\n    \"\"\"When all working-tree changes are accounted for in\
