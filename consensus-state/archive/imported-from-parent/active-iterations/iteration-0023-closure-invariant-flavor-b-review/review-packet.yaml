      \ = _make_lm(actor_id=\"codex-iter0017-1\", model_family=\"codex\", post_sha=\"\
      POST\", ts_offset=-100)\n    v = _make_verdict(actor_id=\"codex-iter0017-1\"\
      , model_family=\"codex\",\n                      target_hash=\"POST\", ts_offset=0)\n\
      \    res = _closure_invariant.check_closure_invariant(lm, v)\n    assert res[\"\
      ok\"] is False\n    assert res[\"checks\"][\"cross_family\"] is False\n    assert\
      \ \"cross_family\" in res[\"reason\"]\n\n\ndef test_codex_patch_then_claude_approve_allowed():\n\
      \    \"\"\"#2 Happy path: codex authors, claude closes. All three pass.\"\"\"\
      \n    lm = _make_lm(actor_id=\"codex-iter0017-1\", model_family=\"codex\", post_sha=\"\
