      \    # doesn't crash.\n    assert lm is not None\n    assert lm.get(\"event\"\
      ) == \"apply_step_landed\" or lm.get(\"timestamp\") is not None\n\n\n# ---------------------------------------------------------------------------\n\
      # 9 acceptance tests — helper-level invariant check\n# (driven through check_closure_invariant\
      \ directly; no filesystem dependency)\n# ---------------------------------------------------------------------------\n\
      \n\ndef _make_lm(*, actor_id, model_family, post_sha, ts_offset=0):\n    \"\"\
