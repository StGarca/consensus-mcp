      +00:00\", \"Z\")\n\n\ndef _write_audit(iteration_dir: Path, audit_log: list)\
      \ -> None:\n    p = iteration_dir / \"independence-audit.yaml\"\n    p.write_text(\n\
      \        yaml.safe_dump({\"schema_version\": 1, \"audit_log\": audit_log}),\n\
      \        encoding=\"utf-8\",\n    )\n\n\ndef _write_review(\n    iteration_dir:\
      \ Path,\n    filename: str,\n    *,\n    reviewer_id: str,\n    packet_sha256:\
      \ str,\n    sealed_at_utc: str,\n) -> None:\n    p = iteration_dir / filename\n\
      \    p.write_text(\n        yaml.safe_dump({\n            \"reviewer_id\": reviewer_id,\n\
      \            \"packet_sha256\": packet_sha256,\n            \"sealed_at_utc\"\
      : sealed_at_utc,\n            \"goal_satisfied\": True,\n        }),\n     \
      \   encoding=\"utf-8\",\n    )\n\n\ndef _make_apply_event(\n    *,\n    actor_id:\
      \ str,\n    model_family: str,\n    post_sha: str,\n    ts: str,\n) -> dict:\n\
      \    return {\n        \"event\": \"apply_step_landed\",\n        \"timestamp_utc\"\
