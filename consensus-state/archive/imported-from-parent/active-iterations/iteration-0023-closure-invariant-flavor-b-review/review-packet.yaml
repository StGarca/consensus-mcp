schema_version: 1
iteration_id: iteration-0023-closure-invariant-flavor-b-review
review_target: |
  Thorough Flavor B review of the closure invariant subsystem. Look for:
    - Edge cases in bundle_sha (empty files, binary content, symlinks, large files,
      paths containing newlines or null bytes — note canonical form uses \0 + \n).
    - last_mutation_from_audit drift between legacy top-level and nested
      extra_fields.last_mutation shapes (the iter-0017 hoist bug). Top-level wins
      over nested when both present — is that always correct?
    - check_closure_invariant correctness on the 3-part gate. Cross-family
      requires model_family present AND different AND actor.id different.
      Verify no logical hole when both families are equal but one is None.
    - Cross-family logic edge cases (missing model_family, malformed actor,
      actor as list/None, model_family with whitespace or casing mismatch).
    - Defense-in-depth gaps across the T6 / _self_drive / loop.run_goal call sites.
      The 3 layers must agree; any drift creates a bypass.
    - Historical validator interpretation: post-close mutations vs closure-certificate
      sealing. Does scan_iteration correctly classify in_flight vs compliant when
      reviews exist with timestamp == mutation timestamp (boundary)?
    - Type-system edge cases (legacy string actors, dict actors, None actors).
      _actor_id accepts string + dict; _actor_model_family only dict.
    - Concurrent-write race conditions in audit log reads (best-effort yaml read,
      no locking).
    - Test quality: do tests verify behavior or just structure? Are there missing
      negative cases (e.g., bundle_sha collision resistance, path traversal,
      reviewer_id-derived family heuristic edge cases — what if reviewer_id starts
      with "claude-bot" but actor.model_family is set to "codex"?)
    - Reproducibility-boundedness: bundle_sha includes file paths and content
      hashes. Does it handle Windows path separators? Trailing whitespace in paths?
    - Freshness timestamp comparison: ISO 8601 string compare. Mixed Z suffix vs
      +00:00 suffix sorts correctly? Microseconds vs no microseconds?
    - The historical validator's reviewer_id-prefix family heuristic is permissive
      (codex-* OR claude-* OR file naming). Could a malicious actor name "codexica"
      pass? "codex-x" -> "codex" by startswith("codex"). What about "code-x"?
    - last_mutation_from_audit returns the LAST list item; trusts chronological
      list order. Is timestamp_utc ever used to re-sort? What if events arrive
      out-of-order?

reviewer_question: |
  Identify ALL defects, design gaps, edge cases unhandled, and improvements in:
    - scripts/agent_loop_mcp/_closure_invariant.py
    - scripts/agent_loop_mcp/_validate_closure_invariant.py
    - scripts/agent_loop_mcp/tests/test_closure_invariant.py
    - scripts/agent_loop_mcp/tests/test_iter_0018_cross_ai_invariant.py
    - scripts/agent_loop_mcp/tests/test_validate_closure_invariant.py

  Emit findings with canonical IDs (codex-rev-NNN). For each, either emit a
  patch_proposal block (preferred — strict mode requires this OR a
  patch_not_proposed_reason) or document why a patch can't be authored.
  Mark goal_satisfied=true ONLY if no defects warrant a fix.

  IMPORTANT NOTES on patch_proposal authoring:
    - patch_id: derive from finding id, e.g. "codex-rev-001-patch"
    - base_sha: emit any string; the helper OVERWRITES with defect_target.base_sha
    - unified_diff: emit a content-correct unified_diff against the embedded
      touched_files_contents
    - files_touched: list the file paths you modified
    - applies_to_findings: list the finding id(s) this patch addresses
    - The helper computes unified_diff_sha256 and stamps it post-parse.

