      \ error: {result.get('error')}\"\n\n\n# ===========================================================================\n\
      # Finding 4 (MEDIUM): strict patch_proposal mode\n# ===========================================================================\n\
      \n\ndef _strict_codex_output(findings: list[dict]) -> str:\n    \"\"\"Build\
      \ a complete codex output JSON with the supplied findings list.\"\"\"\n    blocking\
      \ = [f[\"id\"] for f in findings if f[\"severity\"] in (\"blocking\", \"critical\"\
      )]\n    return json.dumps({\n        \"findings\": findings,\n        \"goal_satisfied\"\
      : False if findings else True,\n        \"blocking_objections\": blocking,\n\
      \        \"goal_satisfied_rationale\": \"test\",\n    })\n\n\ndef _make_finding(\n\
      \    *,\n    fid: str = \"codex-rev-001\",\n    severity: str = \"medium\",\n\
      \    patch_proposal: dict | None = None,\n    patch_not_proposed_reason: str\
      \ | None = None,\n):\n    f = {\n        \"id\": fid,\n        \"severity\"\
      : severity,\n        \"summary\": \"test summary\",\n        \"citation\": \"\
      scripts/foo.py:1\",\n        \"risk\": \"test risk\",\n        \"recommendation\"\
      : \"test recommendation\",\n    }\n    if patch_proposal is not None:\n    \
      \    f[\"patch_proposal\"] = patch_proposal\n    if patch_not_proposed_reason\
      \ is not None:\n        f[\"patch_not_proposed_reason\"] = patch_not_proposed_reason\n\
      \    return f\n\n\ndef _good_patch_proposal(finding_id: str = \"codex-rev-001\"\
      ) -> dict:\n    \"\"\"A schema-valid patch_proposal with iter-0020 finding-id-derived\
      \ patch_id.\"\"\"\n    base_sha = \"0\" * 64\n    diff = \"--- a/foo\\n+++ b/foo\\\
      n@@ -1 +1 @@\\n-x\\n+y\\n\"\n    patch_id = f\"{finding_id}-patch\"\n    return\
      \ {\n        \"patch_id\": patch_id,\n        \"applies_to_findings\": [finding_id],\n\
      \        \"base_sha\": base_sha,\n        \"unified_diff\": diff,\n        \"\
      files_touched\": [\"scripts/foo.py\"],\n    }\n\n\ndef _goal_packet_with_policy(policy:\
      \ str | None) -> dict:\n    gp: dict = {\n        \"schema_version\": 1,\n \
      \       \"pilot_id\": \"test\",\n        \"goal\": {\"summary\": \"x\"},\n \
      \       \"allowed_files\": [\"scripts/foo.py\"],\n        \"forbidden_files\"\
      : [],\n        \"max_iterations\": 5,\n        \"validators_required\": [],\n\
      \        \"acceptance_gates\": [],\n        \"stop_conditions\": [],\n     \
      \   \"authorization\": {\"authorized_by\": \"operator\"},\n    }\n    if policy\
      \ is not None:\n        gp[\"fix_author_policy\"] = policy\n    return gp\n\n\
      \ndef test_strict_mode_finding_with_patch_passes():\n    \"\"\"Strict mode:\
      \ every finding has a patch_proposal -> accepted.\"\"\"\n    finding = _make_finding(patch_proposal=_good_patch_proposal())\n\
      \    text = _strict_codex_output([finding])\n    gp = _goal_packet_with_policy(\"\
      strict\")\n    parsed = _dispatch_codex._parse_codex_output(text, goal_packet=gp)\n\
      \    assert parsed[\"findings\"][0][\"patch_proposal\"][\"patch_id\"]\n\n\n\
      def test_strict_mode_finding_with_reason_passes():\n    \"\"\"Strict mode: finding\
      \ has patch_not_proposed_reason instead -> accepted.\"\"\"\n    finding = _make_finding(\n\
      \        patch_not_proposed_reason=\"cannot author patch from sandbox without\
      \ applying tools\",\n    )\n    text = _strict_codex_output([finding])\n   \
      \ gp = _goal_packet_with_policy(\"strict\")\n    parsed = _dispatch_codex._parse_codex_output(text,\
      \ goal_packet=gp)\n    # The patch_not_proposed_reason field must be preserved\
      \ in the output.\n    assert parsed[\"findings\"][0][\"patch_not_proposed_reason\"\
      ]\n\n\ndef test_strict_mode_finding_missing_both_rejected():\n    \"\"\"Strict\
      \ mode: finding has neither patch_proposal nor patch_not_proposed_reason ->\
      \ REJECT entire output.\"\"\"\n    finding = _make_finding()  # plain finding,\
      \ no patch, no reason\n    text = _strict_codex_output([finding])\n    gp =\
      \ _goal_packet_with_policy(\"strict\")\n    with pytest.raises(_dispatch_codex.CodexOutputParseError)\
      \ as exc_info:\n        _dispatch_codex._parse_codex_output(text, goal_packet=gp)\n\
      \    err = str(exc_info.value)\n    assert \"fix_author_policy\" in err or \"\
      patch_not_proposed_reason\" in err or \"strict\" in err\n\n\ndef test_strict_mode_finding_with_both_rejected():\n\
      \    \"\"\"Strict mode: mutually exclusive — finding can't have BOTH patch_proposal\
      \ and patch_not_proposed_reason.\"\"\"\n    finding = _make_finding(\n     \
      \   patch_proposal=_good_patch_proposal(),\n        patch_not_proposed_reason=\"\
      contradiction\",\n    )\n    text = _strict_codex_output([finding])\n    gp\
      \ = _goal_packet_with_policy(\"strict\")\n    with pytest.raises(_dispatch_codex.CodexOutputParseError)\
      \ as exc_info:\n        _dispatch_codex._parse_codex_output(text, goal_packet=gp)\n\
      \    err = str(exc_info.value)\n    assert \"mutually exclusive\" in err or\
      \ \"both\" in err.lower() or \"patch_not_proposed_reason\" in err\n\n\ndef test_permissive_default_finding_without_patch_passes():\n\
      \    \"\"\"Permissive (default) mode: finding without patch_proposal -> accepted\
      \ (current behavior).\"\"\"\n    finding = _make_finding()\n    text = _strict_codex_output([finding])\n\
      \    # No fix_author_policy in goal_packet -> defaults to permissive.\n    gp\
      \ = _goal_packet_with_policy(None)\n    parsed = _dispatch_codex._parse_codex_output(text,\
