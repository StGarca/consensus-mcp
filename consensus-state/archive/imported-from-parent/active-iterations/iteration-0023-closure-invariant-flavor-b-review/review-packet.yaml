      : model_family,\n            \"role\": \"fix_author\",\n            \"pass_id\"\
      : f\"{actor_id}-pass1\",\n        },\n        \"post_sha\": post_sha,\n    \
      \    \"base_sha\": \"base-aaa\",\n    }\n\n\ndef _make_iteration(tmp_path: Path,\
      \ name: str = \"iteration-test\") -> Path:\n    d = tmp_path / name\n    d.mkdir()\n\
      \    return d\n\n\n# ---------------------------------------------------------------------------\n\
