rationale: Approved per CLAUDE.md. Replaces lex string compare on ISO 8601 timestamps
  with a UTC-normalized datetime parse + compare. Uses datetime.fromisoformat with
  Z->+00:00 normalization, returns None on naive or malformed values (fail-closed).
  Validator side updated to use the same parser via shared _parse_utc_timestamp; tuple-list
  sort uses a UTC-min floor for deterministic max(). Surgical, addresses real bypass.
