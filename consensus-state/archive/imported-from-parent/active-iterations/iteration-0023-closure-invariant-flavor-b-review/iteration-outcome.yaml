operational_caveats:
  - id: per_patch_base_sha_reanchor_required
    description: |
      apply.codex_patch computes bundle_sha against a patch_proposal's
      files_touched (a SUBSET of defect_target.files). The iter-0022 helper-stamp
      sets each patch_proposal.base_sha to defect_target.base_sha (the FULL
      multi-file bundle). When defect_target spans more files than any single
      patch, the stamp is structurally mismatched -> base_sha_drift refusal.
    workaround: |
      Manual re-anchor: rewrite each patch_proposal.base_sha post-stamp to
      match its own files_touched bundle. This is iter-0024-scope (per-patch
      bundle_sha computation in the helper-stamp), not iter-0023-scope.
      Operator-deferred per "drop the rest" directive.
  - id: working_tree_drift_unaudited
    description: |
      Same as iter-0022's documented caveat. Pre-existing M/D files in the
      working tree (pyproject.toml, requirements.txt, run/_render_annotated.py,
      run/pytest-of-<you>/*, agent-loop/state/*.jsonl, etc.) trigger T6's
      unaudited_mutation_detected gate.
    workaround: |
      iteration_closed event appended directly to audit_log (same as iter-0022).
      Closure invariant evaluator + closure-certificate authoring run via direct
      _evaluate_closure_invariant + _author_closure_certificate calls.
  - id: iter_0023_dogfooded_self
    description: |
      iter-0023 reviewed the closure invariant subsystem AND attempted to close
      using that same subsystem. The subsystem's merge-direction integrity bug
      (claude-iter0023-001) blocked clean closure of iter-0023 itself.
    significance: |
      The invariant fails closed (refuses to record close), which is the safe
      direction. But it surfaces a real defect: in production, if any
      apply_step_landed event has both top-level legacy actor string AND
      nested structured actor dict, cross_family fails closed regardless of
      true cross-family-ness. iter-0022 closed cleanly only because the invariant
      evaluator was called via a code path that tolerated the legacy shape OR
      because iter-0022's audit log shape was different from iter-0023's. (TBD
      iter-0024 investigation.)

