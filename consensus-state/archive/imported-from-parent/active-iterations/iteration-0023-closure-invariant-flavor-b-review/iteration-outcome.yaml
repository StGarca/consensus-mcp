primary_empirical_finding:
  iter_0023_dogfooded_its_own_subject: YES
  defect_surfaced: |
    last_mutation_from_audit merges nested structured fields with top-level
    legacy fields via {**nested, **top_level}. When apply_step_landed events
    have BOTH a top-level legacy `actor: "<id>"` (string, from audit_append_event's
    actor=actor.get("id") flattening) AND a nested `last_mutation.actor: {id,
    model_family, ...}` (dict, from apply_codex_patch's structured emission),
    the merge picks the legacy string. _actor_model_family(string) returns
    None, which fails cross_family closed even on a perfectly valid
    cross-family closure attempt.
  defect_severity: high (integrity bypass — fail-closed direction is conservative,
    but it BLOCKS valid closures, not the inverse; still an integrity defect
    because it makes the gate non-functional in the production audit shape)
  defect_already_flagged: YES (claude-iter0023-001 in pre-codex implementation_critic
    pass — codex did not address it in its 3 emitted patches; codex-rev-001
    addressed an orthogonal extra_fields fallback)

