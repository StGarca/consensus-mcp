    review_target_path uses Path(iter_dir) / "review-packet.yaml" computed
    inside the auto-dispatch branch. By the state-machine precedence,
    auto-dispatch only fires when state == ready_for_codex, which requires
    review-packet.yaml AND claude-review.yaml to exist. The path is therefore
    guaranteed to exist at dispatch time.
  - |
    The orphan import was created by iter-0010's _read_yaml_or_empty dedup.
    Codex-rev-002 identified it as a hygiene gap. Removal is straightforward;
    no other code in tools/loop_run_goal.py references the yaml module.
  - |
