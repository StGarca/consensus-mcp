status_caveat: |
  pilot_id directory name 'fault-recovery-demo' was aspirational; per the
  iteration's own fault_recovery_demo_status.demonstrated=false (below), the
  class-3 sealed-blocking-finding recovery branch was NOT triggered. iter-0011
  validated review_target_path threading + addressed prior codex findings,
  not the full recovery cycle. Authoritative status: see
  fault_recovery_demo_status block.
iteration_id: iteration-0011-fault-recovery-demo
created_utc: '2026-05-10T05:15:00Z'
closing_state: quorum_close_passed
closing_reason: |
  Addressed both iter-0010 codex findings (codex-rev-001 review_target_path
  threading + codex-rev-002 orphan yaml import). Both reviewers (claude opus
  subagent + codex CLI via loop.run_goal auto-dispatch) emit goal_satisfied=true
  with zero findings on either side. All 3 acceptance gates pass.

  FAULT-RECOVERY DEMO STATUS: attempted but NOT triggered. Per codex's expert
  verdict 2026-05-10, the bar is "Codex finds a blocking/high issue, Claude
  fixes it, Codex re-reviews, and the loop closes only after both reviewers
  have goal_satisfied=true." iter-0011 implementation was clean enough that
  codex found nothing on first dispatch. Recovery branch un-exercised at
  sealed-blocking-finding scope.

  However, iter-0010 call 3 DID exercise an INTRA-DISPATCH recovery: codex
  emitted a malformed response (blocking_objections invariant violation);
  helper validator rejected; loop.run_goal contained the failure (state
  stayed ready_for_codex; no exception); re-dispatch on call 4 succeeded.
  That is recovery-from-output-validation-failure, not recovery-from-sealed-
  blocking-finding. Both forms exercise the supervisor's failure-containment
  guarantees but at different layers.

  Honest framing: the supervisor handles 3 failure classes correctly:
    1. INTRA-DISPATCH (codex output validation fails) — exercised iter-0010 call 3
    2. NO-FINDINGS (clean unanimous close) — exercised iter-0010 + iter-0011
    3. SEALED-BLOCKING-FINDING-RECOVERY — NOT YET EXERCISED
  The 3rd class requires either a more substantive iter-0012 target with
  natural complexity, OR a deliberate manufactured-defect demo. Both options
  documented in iter-0011 consensus.yaml.fault_recovery_demo_status.

