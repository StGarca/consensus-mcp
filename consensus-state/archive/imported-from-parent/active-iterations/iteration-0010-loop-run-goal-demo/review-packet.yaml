design_notes:
  - |
    The change is a pure import-substitution refactor. Both `_read_yaml_or_empty`
    function bodies were byte-identical pre-refactor (verified via grep diff).
    Identity-after-import is structural: `from X import Y` makes Y the same object
    in both modules' namespaces.

  - |
    The dedup scope is intentionally minimal. There are other helpers shared
    between loop_run_goal.py and _self_drive.py (e.g., `_extract_goal_satisfied`)
    but the iter-0010 goal_packet scoped to ONE function only — preserving the
    "small real change" demo property of this iteration.

