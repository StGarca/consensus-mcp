    agent-loop/active/iteration-0039-dispatch-crossplat-fixes/proposed-patches.md: "#\
      \ iter-0039 proposed patches — _dispatch_codex.py cross-plat fixes\n\nWorkflow\
      \ #4 pre-review of 3 deferred cross-platform findings from the\n2026-05-11 audit\
      \ sweep (codex-audit-crossplat-1). Deferred because they\noverlapped with iter-0037's\
      \ bidirectional-dispatch rewrite; now that\niter-0037 has landed, the file is\
      \ stable and these fixes apply cleanly.\n\nProse-first per iter-0036 stall lesson.\
      \ Diffs reference current\npost-iter-0037 code (commit `2faa5fb7`).\n\n---\n\
      \n## Patch 1 — xplat-rev-001 HIGH (Windows containment canonical paths)\n\n\
      **Defect**: `_normalize_relative_to_repo` at `_dispatch_codex.py:190-210`\n\
      uses `str(resolved).lower().replace(\"\\\\\", \"/\")` as a Windows-case\nfallback.\
      \ This is lossy:\n- Doesn't strip Windows long-path prefix `\\\\?\\` (extended-length\
      \ paths\n  on Windows can start with this; lowercase-compare diverges).\n- Doesn't\
      \ handle 8.3 short names that `resolve()` doesn't expand\n  consistently.\n\
      - Doesn't normalize separator slashes vs backslashes at the OS level\n  (`os.path.normcase`\
      \ is the canonical form).\n\n**Approach**: Replace the lower+replace fallback\
      \ with a helper\n`_normalize_for_compare(p)` that:\n1. Strips `\\\\\\\\?\\\\\
      ` long-path prefix if present (Windows extended path)\n2. Calls `os.path.normcase(os.path.normpath(str(p)))`\
      \ — normcase\n   lowercases + normalizes separators on Windows, no-op on POSIX\n\
      3. Returns the canonical string\n\nThen `_normalize_relative_to_repo` containment\
      \ check becomes:\n```python\ncontained = False\ntry:\n    resolved.relative_to(repo_root_resolved)\n\
      \    contained = True\nexcept ValueError:\n    if sys.platform == \"win32\"\
      :\n        ncs_resolved = _normalize_for_compare(resolved)\n        ncs_root\
      \ = _normalize_for_compare(repo_root_resolved)\n        # exact match OR resolved\
      \ is under root + separator\n        if ncs_resolved == ncs_root or ncs_resolved.startswith(ncs_root\
      \ + os.sep):\n            contained = True\n```\n\n**Regression tests**:\n-\
      \ `test_containment_strips_long_path_prefix_on_windows` (skip on non-win32)\n\
      - `test_containment_handles_mixed_case_drive_on_windows` (skip on non-win32)\n\
      - `test_containment_handles_normalized_separators_on_windows` (skip on non-win32)\n\
      - `test_containment_unaffected_on_posix` (sanity check)\n\n---\n\n## Patch 2\
      \ — xplat-rev-002 HIGH (process tree termination + temp file leak)\n\n**Defect**:\
      \ The new Popen call (iter-0037, line ~480) doesn't set\nprocess-group creation\
      \ flags. `proc.terminate()` on Windows calls\nTerminateProcess which only kills\
      \ the immediate process. codex-cli\nspawns Node descendants that orphan after\
      \ abort. On POSIX, lack of\n`start_new_session=True` means signals don't propagate\
      \ to children\neither.\n\nAdditionally, `proc.wait(timeout=10)` is called after\
      \ terminate, but\non Windows if children hold the `out_file` handle, `Path(out_file).unlink()`\n\
      in the finally block silently fails (`except OSError: pass`).\n\n**Approach**:\n\
      \n1. Add process-group creation:\n```python\nif sys.platform == \"win32\":\n\
      \    creationflags = subprocess.CREATE_NEW_PROCESS_GROUP\n    popen_kwargs =\
      \ {\"creationflags\": creationflags}\nelse:\n    popen_kwargs = {\"start_new_session\"\
      : True}\n\nproc = popen_factory(\n    cmd,\n    stdin=subprocess.PIPE,\n   \
      \ stdout=subprocess.PIPE,\n    stderr=subprocess.PIPE,\n    bufsize=0,\n   \
      \ **popen_kwargs,\n)\n```\n\n2. Add a helper `_terminate_process_tree(proc,\
      \ grace_seconds=10)`:\n```python\ndef _terminate_process_tree(proc, grace_seconds:\
      \ float = 10.0):\n    \"\"\"Cross-platform: send SIGTERM-equivalent to the codex\
      \ process group,\n    wait for grace, then SIGKILL-equivalent if still alive.\"\
      \"\"\n    if proc.poll() is not None:\n        return\n    try:\n        if\
      \ sys.platform == \"win32\":\n            # CTRL_BREAK_EVENT goes to the process\
      \ group created with\n            # CREATE_NEW_PROCESS_GROUP. Children receive\
      \ it too.\n            proc.send_signal(signal.CTRL_BREAK_EVENT)\n        else:\n\
      \            os.killpg(os.getpgid(proc.pid), signal.SIGTERM)\n    except (OSError,\
      \ ProcessLookupError, ValueError):\n        # Fallback to single-process terminate.\n\
      \        try:\n            proc.terminate()\n        except OSError:\n     \
      \       pass\n\n    try:\n        proc.wait(timeout=grace_seconds)\n       \
      \ return\n    except subprocess.TimeoutExpired:\n        pass\n\n    # Force-kill\
      \ the group.\n    try:\n        if sys.platform == \"win32\":\n            #\
      \ On Windows, terminate() is the closest we have to SIGKILL;\n            #\
      \ CREATE_NEW_PROCESS_GROUP children may need taskkill /T /F.\n            import\
      \ subprocess as _sp\n            _sp.run([\"taskkill\", \"/F\", \"/T\", \"/PID\"\
      , str(proc.pid)],\n                    capture_output=True, timeout=5, check=False)\n\
      \        else:\n            os.killpg(os.getpgid(proc.pid), signal.SIGKILL)\n\
      \    except (OSError, ProcessLookupError, ValueError):\n        try:\n     \
      \       proc.kill()\n        except OSError:\n            pass\n    try:\n \
      \       proc.wait(timeout=2)\n    except subprocess.TimeoutExpired:\n      \
      \  pass\n```\n\n3. Replace every `proc.terminate(); proc.wait(...); proc.kill()`\
      \ block\n   with `_terminate_process_tree(proc)`.\n\n4. Temp file cleanup: change\
      \ the swallowed except to a logged warning\n   so the operator sees the leak:\n\
      ```python\nfinally:\n    try:\n        Path(out_file).unlink()\n    except OSError\
      \ as exc:\n        # Log to stderr but don't raise (we're in finally).\n   \
      \     print(f\"WARN: codex output temp file unlink failed: {exc}\",\n      \
      \        file=sys.stderr)\n```\n\n**Regression tests**:\n- `test_terminate_process_tree_sends_appropriate_signal_per_platform`\n\
      \  (use mock signal/sp.run)\n- `test_terminate_process_tree_force_kills_after_grace`\n\
      - `test_temp_file_cleanup_logs_warning_on_failure` (capsys)\n\n---\n\n## Patch\
      \ 3 — xplat-rev-008 LOW (binary resolution edge cases)\n\n**Defect**: Current\
      \ `_resolve_codex_bin` at line ~395 only special-cases\n.ps1 -> .cmd on Windows.\
      \ Missing:\n- Bare-name resolution (no extension): try .exe, .cmd, .bat in PATH\n\
      - App Execution Alias stub detection (0-byte files in WindowsApps)\n- MSYS-style\
      \ path conversion (`/c/foo/bar` -> `C:\\foo\\bar`)\n\n**Approach**: Extend `_resolve_codex_bin`\
      \ to handle these cases:\n```python\ndef _resolve_codex_bin(codex_bin: str)\
      \ -> str:\n    \"\"\"Resolve codex binary path with Windows-specific quirk handling.\"\
      \"\"\n    if sys.platform != \"win32\":\n        return codex_bin\n\n    # MSYS-style\
      \ path conversion: /c/foo/bar -> C:\\foo\\bar\n    if codex_bin.startswith(\"\
      /\") and len(codex_bin) >= 3 and codex_bin[2] == \"/\":\n        drive = codex_bin[1].upper()\n\
      \        rest = codex_bin[3:].replace(\"/\", \"\\\\\")\n        codex_bin =\
      \ f\"{drive}:\\\\{rest}\"\n\n    # If bare name, try common Windows extensions\
      \ in PATH.\n    if not Path(codex_bin).is_absolute() and \".\" not in Path(codex_bin).name:\n\
      \        for ext in (\".exe\", \".cmd\", \".bat\", \".ps1\"):\n            candidate\
      \ = shutil.which(codex_bin + ext)\n            if candidate:\n             \
      \   codex_bin = candidate\n                break\n\n    # Existing .ps1 -> .cmd\
      \ preference logic\n    resolved = shutil.which(codex_bin) or codex_bin\n  \
      \  if resolved.lower().endswith(\".ps1\"):\n        # Look for sibling .cmd\n\
      \        cmd_variant = Path(resolved).with_suffix(\".cmd\")\n        if cmd_variant.exists():\n\
      \            resolved = str(cmd_variant)\n\n    # App Execution Alias detection:\
      \ 0-byte file in WindowsApps is a stub.\n    p = Path(resolved)\n    if p.exists()\
      \ and p.stat().st_size == 0:\n        windows_apps = (os.environ.get(\"LOCALAPPDATA\"\
      , \"\")\n                        + r\"\\Microsoft\\WindowsApps\")\n        if\
      \ str(p).lower().startswith(windows_apps.lower()):\n            raise CodexInvocationError(\n\
      \                f\"codex binary {resolved!r} appears to be a Windows App \"\
      \n                f\"Execution Alias stub (0-byte file in WindowsApps). \"\n\
      \                f\"subprocess cannot execute App Aliases — install the \"\n\
      \                f\"real codex CLI binary or adjust PATH.\"\n            )\n\
      \n    return resolved\n```\n\n**Regression tests**:\n- `test_resolve_codex_bin_msys_path_conversion_on_windows`\
      \ (skip non-win32)\n- `test_resolve_codex_bin_bare_name_finds_cmd_on_windows`\
      \ (skip non-win32; mock shutil.which)\n- `test_resolve_codex_bin_app_alias_stub_rejected`\
      \ (skip non-win32; mock Path.stat)\n- `test_resolve_codex_bin_unchanged_on_posix`\
      \ (sanity)\n\n---\n\n## Cross-cutting verification\n\nAfter all 3 patches:\n\
      - pytest: +10 new regression tests (4 + 3 + 4 minus overlapping platform skips)\n\
      - smoke: 60/60\n- gates: 11/11 after commit\n- `G_pytest_dispatch_codex` baseline:\
      \ bump from 90 -> ~100 depending on\n  win32 skip behavior\n\n## Reviewer questions\
      \ for codex pre-review\n\n1. **`os.path.normcase` semantics**: on Windows it\
      \ lowercases + converts\n   forward slashes to backslashes. Is that the right\
      \ canonical form for\n   `startswith` comparison, or should we ALSO call `os.path.normpath`\n\
      \   to collapse `..` / `.` segments first?\n2. **`CREATE_NEW_PROCESS_GROUP`\
      \ impact on signal delivery**: with this\n   flag, Ctrl-C in the operator's\
      \ terminal does NOT propagate to the\n   codex subprocess (because it's now\
      \ in a separate group). Is this\n   acceptable? (codex is read-only and short-lived;\
      \ operator abort via\n   abort-signal-file is the canonical mechanism).\n3.\
      \ **`taskkill /F /T` reliability**: shells out to an external binary\n   for\
      \ force-kill. Acceptable, or should we use Win32 API via\n   ctypes/`subprocess.CREATE_NO_WINDOW`?\n\
      4. **MSYS path detection**: `/c/foo` is the most common form but\n   Cygwin\
      \ uses `/cygdrive/c/foo`. Should we handle both, or scope\n   to MSYS only (Git\
      \ Bash on Windows)?\n5. **App Alias 0-byte detection**: relies on file size.\
      \ Some real\n   binaries could be 0 bytes (unlikely but possible). Should we\
      \ also\n   check for the specific path prefix as the primary signal and only\n\
      \   use the 0-byte check as a confirmation?\n"
