schema_version: 1
pilot_id: iteration-0039-dispatch-crossplat-fixes
goal:
  summary: Workflow #4 fix cycle for 3 deferred cross-platform findings on _dispatch_codex.py.
  desired_end_state: |
    iter-0039 closes Task #45: the three cross-platform audit findings on
    `_dispatch_codex.py` that were deferred from the 2026-05-11 audit
    sweep because they touched the same file iter-0037 was rewriting.
    Now that iter-0037 (bidirectional dispatch via Popen + reader threads)
    has landed, the file is stable and these fixes can land cleanly.

    Files in scope:
      - scripts/agent_loop_mcp/_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_dispatch_codex_streaming.py (regression tests for new behavior)

    Findings to land (from agent-loop/active/iteration-audit-2026-05-11-cross-platform/codex-review.yaml):

    Patch 1 — xplat-rev-001 HIGH (Windows containment canonical paths):
      Current containment fallback at `_normalize_relative_to_repo` lines
      ~190-210 uses lossy `str(...).lower().replace("\\\\", "/")`. Replace
      with canonical normalization:
        - Strip Windows long-path prefix (`\\\\?\\`)
        - Use os.path.normcase (lowercases on Windows, no-op on POSIX)
        - Use os.path.normpath (normalizes separators)
      Then compare resolved-normalized startswith(root-normalized + sep).
      Add regression tests for: mixed-case drive, long-path prefix,
      junction, equivalent-but-different-case path.

    Patch 2 — xplat-rev-002 HIGH (process tree termination + temp file leak):
      Current Popen invocation does not set start_new_session / CREATE_
      NEW_PROCESS_GROUP. proc.terminate() kills only the immediate process.
      On Windows codex-cli spawns Node descendants that orphan. Fix:
        - On Windows: pass creationflags=subprocess.CREATE_NEW_PROCESS_GROUP
        - On POSIX: pass start_new_session=True
        - On terminate: send CTRL_BREAK_EVENT to process group on Windows;
          os.killpg(pid, SIGTERM) on POSIX
        - On kill: forcefully terminate group
        - On normal exit: no change needed
        - Temp file cleanup: ensure proc.wait() finishes before unlink so
          child file handles are released; log unlink failures instead of
          swallowing.

    Patch 3 — xplat-rev-008 LOW (binary resolution edge cases):
      Current `_resolve_codex_bin` only handles .ps1 -> .cmd fallback.
      Add:
        - Bare-name resolution: try .exe, .cmd, .bat in PATH on Windows
        - App Execution Alias detection: 0-byte file in
          %LOCALAPPDATA%\\Microsoft\\WindowsApps is an App Alias stub that
          subprocess can't exec; warn or reject
        - MSYS-style `/c/foo/bar` path conversion to `C:\\foo\\bar` if
          running native Windows Python (sys.platform=="win32")

    iter-0039 SUCCESS = workflow #4 closes:
      1. proposed-patches.md authored (prose-first per iter-0036 stall lesson)
      2. review-packet embeds proposed-patches.md
      3. Codex pre-review dispatched (operator can watch via TUI now —
         iter-0037 streaming live)
      4. Claude integrates codex feedback
      5. Claude implements integrated patches
      6. ≥ 6 new regression tests (2 per finding minimum)
      7. pytest still green; smoke 60/60; gates 11/11
      8. iteration-outcome.yaml closes quorum_close_passed
  non_goals:
