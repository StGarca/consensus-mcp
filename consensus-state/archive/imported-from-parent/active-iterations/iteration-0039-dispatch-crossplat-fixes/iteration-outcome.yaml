closing_reason: |
  iter-0039 closes Task #45: the 3 deferred cross-platform audit findings
  on _dispatch_codex.py that were held back from the 2026-05-11 audit
  sweep because they overlapped with iter-0037's bidirectional-dispatch
  rewrite.

  CHAIN:
    1. Goal_packet authored (scope: _dispatch_codex.py + 2 test files +
       release_gate_check).
    2. proposed-patches.md authored (249 lines, prose-first per iter-0036
       stall lesson).
    3. First codex pre-review dispatch (codex-iter0039-1-pass1) STALLED.
       The new heartbeat-silence watchdog (iter-0037) fired at exactly
       90 seconds and emitted dispatch_aborted + raised CodexInvocationError.
       Audit log clean. Retry was safe.
       *** This is the FIRST in-the-wild use of the iter-0037 abort
       mechanism. Direct empirical confirmation that the system catches
       stalls in <2 minutes instead of waiting 15 minutes. ***
    4. Second codex pre-review (codex-iter0039-1-pass2) sealed cleanly in
       ~40s. Two MEDIUM findings:
         codex-rev-001 MEDIUM: MSYS path conversion needs `.isalpha()` gate
           (otherwise /tmp/x mangles to T:\x)
         codex-rev-002 MEDIUM: Windows taskkill fallback should use
           CREATE_NO_WINDOW to avoid console flash
       Both integrated into the implementation before landing.
    5. Operator empirical feedback (2026-05-11): "Is 90 seconds long
       enough? That seems excessive". Lowered stall_silence_seconds
       default 90 -> 45. Stuck dispatches now killed in 45s, halving
       recovery time. 45s is still ~1.5x normal codex runtime so
       legitimate slow calls survive.

  LANDED CHANGES:
    Patch 1 (xplat-rev-001 HIGH): _normalize_for_compare(p) helper.
      - Strips Windows long-path prefix `\\?\`
      - Uses os.path.normcase + os.path.normpath for canonical compare
      - Replaces the lossy lower+replace fallback in
        _normalize_relative_to_repo
    Patch 2 (xplat-rev-002 HIGH): _terminate_process_tree(proc) helper.
      - Popen now creates a new process group
        (CREATE_NEW_PROCESS_GROUP on Windows, start_new_session=True on POSIX)
      - On terminate: send CTRL_BREAK_EVENT (Windows) / killpg+SIGTERM (POSIX)
      - On grace expiry: taskkill /F /T with CREATE_NO_WINDOW (Windows) /
        killpg+SIGKILL (POSIX)
      - Replaces 3 inline terminate/wait/kill blocks in _invoke_codex
    Patch 3 (xplat-rev-008 LOW): _resolve_codex_bin extended.
      - MSYS-style /c/foo/bar -> C:\foo\bar conversion (with isalpha gate)
      - Bare-name resolution tries .exe/.cmd/.bat/.ps1 in PATH on Windows
      - App Execution Alias stub rejection (0-byte file in WindowsApps
        raises CodexInvocationError with clear diagnostic)
    Bonus (operator empirical): stall_silence_seconds default 90 -> 45.

  REGRESSION TESTS (+5 new):
    test_normalize_for_compare_strips_long_path_prefix_on_windows
    test_normalize_for_compare_lowercases_on_windows
    test_normalize_for_compare_collapses_dot_segments
    test_resolve_codex_bin_msys_path_requires_alpha_drive_letter
    test_resolve_codex_bin_app_execution_alias_stub_rejected
    test_terminate_process_tree_uses_signal_on_posix (skipped on Windows)
    Plus updates to fake Popen mocks (send_signal + pid methods) so the
