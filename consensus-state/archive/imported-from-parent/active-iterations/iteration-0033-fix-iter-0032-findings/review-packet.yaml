    scripts/agent_loop_mcp/_visibility_tui.py: "\"\"\"Visibility TUI for agent-loop-mcp\
      \ dispatch + audit event streams.\n\nTier 0+1 of the 2026-05-10 visibility-TUI\
      \ design doc. Read-only tail of\nthe existing JSONL event streams with stall\
      \ detection. NO MCP tool surface\nadded, NO new event generation, NO operator\
      \ control channel — those are\ndeliberately out of scope (see design doc).\n\
      \nUsage\n-----\n    # Live tail (refresh every 2s; Ctrl-C to exit)\n    python\
      \ scripts/agent_loop_mcp/_visibility_tui.py\n\n    # One-shot snapshot (renders\
      \ once, exits 0 if no stall, 1 if any active\n    # dispatch is past the warning\
      \ threshold). Used by CI / smoke / manual checks.\n    python scripts/agent_loop_mcp/_visibility_tui.py\
      \ --once\n\n    # Custom poll + threshold\n    python scripts/agent_loop_mcp/_visibility_tui.py\
      \ --tick 1.0 --warn-after 180\n\nWhat it shows\n-------------\n- Active dispatches:\
      \ dispatch_start events with no matching dispatch_done /\n  dispatch_failed.\
      \ Age, target file (v1.10.5), timeout, stall status.\n- Recent terminal events:\
      \ last 5 dispatch_done / dispatch_failed entries.\n- Stall warning: dispatch\
      \ age >= warn_after_seconds.\n- Stall alert: dispatch age >= 0.9 * timeout_seconds\
      \ (or warn_after if no timeout).\n\nWhat it does NOT do\n-------------------\n\
      - No MCP tool registration.\n- No event generation. Read-only consumer of the\
      \ existing JSONL streams.\n- No watchdog actions (cleanup, retry, abort). That's\
      \ Task #43.\n- No operator reply channel.\n- No human text on the MCP stdio\
      \ pipe (we don't touch the MCP pipe at all).\n\"\"\"\nfrom __future__ import\
      \ annotations\n\nimport argparse\nimport json\nimport os\nimport sys\nimport\
      \ time\nfrom datetime import datetime, timezone\nfrom pathlib import Path\n\
      from typing import Optional\n\n\n# --- Color helpers (ANSI; no rich/textual\
      \ dependency) -----------------------\n\n_ANSI_ENABLED = sys.stdout.isatty()\n\
      _RESET = \"\\x1b[0m\" if _ANSI_ENABLED else \"\"\n_DIM = \"\\x1b[2m\" if _ANSI_ENABLED\
      \ else \"\"\n_BOLD = \"\\x1b[1m\" if _ANSI_ENABLED else \"\"\n_GREEN = \"\\\
      x1b[32m\" if _ANSI_ENABLED else \"\"\n_YELLOW = \"\\x1b[33m\" if _ANSI_ENABLED\
      \ else \"\"\n_RED = \"\\x1b[31m\" if _ANSI_ENABLED else \"\"\n_CYAN = \"\\x1b[36m\"\
      \ if _ANSI_ENABLED else \"\"\n\n\ndef _color(s: str, code: str) -> str:\n  \
      \  return f\"{code}{s}{_RESET}\" if _ANSI_ENABLED else s\n\n\n# --- File reading\
      \ -----------------------------------------------------------\n\ndef _read_jsonl(path:\
      \ Path) -> list[dict]:\n    \"\"\"Read a JSONL file. Returns empty list on missing/unreadable.\
      \ Skips\n    malformed lines (defensive against partial writes in tail mode).\n\
      \    \"\"\"\n    if not path.exists():\n        return []\n    events: list[dict]\
      \ = []\n    try:\n        text = path.read_text(encoding=\"utf-8\")\n    except\
      \ OSError:\n        return []\n    for line in text.splitlines():\n        line\
      \ = line.strip()\n        if not line:\n            continue\n        try:\n\
      \            events.append(json.loads(line))\n        except json.JSONDecodeError:\n\
      \            # Partial write or corrupt line; skip without aborting the TUI.\n\
      \            continue\n    return events\n\n\n# --- Time helpers -----------------------------------------------------------\n\
      \ndef _parse_ts(s: Optional[str]) -> Optional[datetime]:\n    if not s:\n  \
      \      return None\n    try:\n        # Tolerate both Z and +00:00 forms.\n\
      \        s2 = s.replace(\"Z\", \"+00:00\")\n        return datetime.fromisoformat(s2)\n\
      \    except (ValueError, TypeError):\n        return None\n\n\ndef _humanize_age(seconds:\
      \ float) -> str:\n    if seconds < 60:\n        return f\"{seconds:.0f}s\"\n\
      \    minutes, secs = divmod(int(seconds), 60)\n    if minutes < 60:\n      \
      \  return f\"{minutes}m{secs:02d}s\"\n    hours, minutes = divmod(minutes, 60)\n\
      \    return f\"{hours}h{minutes:02d}m\"\n\n\n# --- Dispatch state assembly -----------------------------------------------\n\
      \ndef _assemble_dispatches(events: list[dict]) -> dict:\n    \"\"\"Walk the\
      \ dispatch-log event stream; pair start events with terminal\n    (done/failed/refused)\
      \ events by pass_id. Returns a dict shape:\n        {\n          \"active\"\
      :   [start_event, ...],   # no terminal event\n          \"recent\":   [end_event,\
      \ ...],     # last 5 terminal events, newest first\n        }\n    \"\"\"\n\
      \    by_pass: dict[str, dict] = {}  # pass_id -> {\"start\": ev, \"end\": ev}\n\
      \    for ev in events:\n        pass_id = ev.get(\"pass_id\") or ev.get(\"reviewer_id\"\
      )\n        if not pass_id:\n            continue\n        entry = by_pass.setdefault(pass_id,\
      \ {\"start\": None, \"end\": None})\n        kind = ev.get(\"event\")\n    \
      \    if kind == \"dispatch_start\":\n            entry[\"start\"] = ev\n   \
      \     elif kind in (\"dispatch_done\", \"dispatch_failed\", \"dispatch_refused\"\
      ):\n            entry[\"end\"] = ev\n\n    active = [\n        v[\"start\"]\
      \ for v in by_pass.values() if v[\"start\"] and not v[\"end\"]\n    ]\n    recent_terminal\
      \ = [\n        v[\"end\"] for v in by_pass.values() if v[\"end\"]\n    ]\n \
      \   # Sort by timestamp descending.\n    def _sort_key(ev):\n        return\
      \ _parse_ts(ev.get(\"timestamp_utc\")) or datetime.min.replace(tzinfo=timezone.utc)\n\
      \    recent_terminal.sort(key=_sort_key, reverse=True)\n    active.sort(key=_sort_key,\
      \ reverse=True)\n    return {\"active\": active, \"recent\": recent_terminal[:5]}\n\
      \n\n# --- Rendering --------------------------------------------------------------\n\
      \ndef _render(dispatch_events: list[dict], audit_events: list[dict], warn_after:\
      \ float, now: datetime) -> tuple[str, bool]:\n    \"\"\"Render the TUI screen.\
      \ Returns (text, any_stalled).\n\n    any_stalled is True if at least one active\
      \ dispatch is past warn_after_seconds.\n    \"\"\"\n    state = _assemble_dispatches(dispatch_events)\n\
      \    lines: list[str] = []\n    any_stalled = False\n\n    lines.append(_color(\"\
      agent-loop-mcp visibility TUI\", _BOLD + _CYAN))\n    lines.append(_color(f\"\
      \  now={now.isoformat(timespec='seconds')}  warn_after={int(warn_after)}s\"\
      , _DIM))\n    lines.append(\"\")\n\n    # Active dispatches\n    if state[\"\
      active\"]:\n        lines.append(_color(f\"ACTIVE DISPATCHES ({len(state['active'])}):\"\
      , _BOLD))\n        for ev in state[\"active\"]:\n            start_ts = _parse_ts(ev.get(\"\
      timestamp_utc\"))\n            age_s = (now - start_ts).total_seconds() if start_ts\
      \ else 0.0\n            timeout = ev.get(\"timeout_seconds\") or 0\n       \
      \     alert_threshold = max(warn_after, 0.9 * timeout) if timeout else warn_after\n\
      \            stalled = age_s >= warn_after\n            alert = age_s >= alert_threshold\
      \ and timeout > 0\n            any_stalled = any_stalled or stalled\n\n    \
      \        tag = _color(\"OK    \", _GREEN)\n            if alert:\n         \
      \       tag = _color(\"ALERT \", _RED + _BOLD)\n            elif stalled:\n\
      \                tag = _color(\"STALL \", _YELLOW + _BOLD)\n\n            iter_id\
      \ = ev.get(\"iteration_id\", \"?\")\n            pass_id = ev.get(\"pass_id\"\
      , \"?\")\n            target = ev.get(\"review_target_path\") or _color(\"(no\
      \ review-target)\", _DIM)\n            timeout_disp = f\"timeout={timeout}s\"\
      \ if timeout else \"timeout=?\"\n            lines.append(\n               \
      \ f\"  {tag} {iter_id} / {pass_id}\"\n            )\n            lines.append(\n\
      \                f\"        age={_humanize_age(age_s)}  {timeout_disp}  target={target}\"\
      \n            )\n    else:\n        lines.append(_color(\"ACTIVE DISPATCHES\
      \ (0): idle\", _DIM))\n    lines.append(\"\")\n\n    # Recent terminal events\n\
      \    lines.append(_color(f\"RECENT TERMINAL EVENTS (last {len(state['recent'])}):\"\
      , _BOLD))\n    if not state[\"recent\"]:\n        lines.append(_color(\"  (none)\"\
      , _DIM))\n    for ev in state[\"recent\"]:\n        ts = ev.get(\"timestamp_utc\"\
      , \"?\")\n        kind = ev.get(\"event\", \"?\")\n        iter_id = ev.get(\"\
      iteration_id\", \"?\")\n        pass_id = ev.get(\"pass_id\", \"?\")\n     \
      \   marker = _color(\"done  \", _GREEN) if kind == \"dispatch_done\" else (\n\
      \                 _color(\"failed\", _RED)   if kind == \"dispatch_failed\"\
      \ else\n                 _color(\"refused\", _YELLOW))\n        rt_hash = ev.get(\"\
      review_target_hash\")\n        hash_disp = f\"  target_hash={rt_hash[:12]}…\"\
      \ if rt_hash else \"\"\n        lines.append(f\"  {marker}  {ts}  {iter_id}\
      \ / {pass_id}{hash_disp}\")\n    lines.append(\"\")\n\n    # MCP server lifecycle\
      \ (from audit-log)\n    server_events = [e for e in audit_events if e.get(\"\
      event\", \"\").startswith(\"mcp_server_\")]\n    if server_events:\n       \
      \ last_server = server_events[-1]\n        lines.append(_color(\"MCP SERVER:\"\
      , _BOLD))\n        lines.append(\n            f\"  last_event={last_server.get('event','?')}\
      \  \"\n            f\"at={last_server.get('timestamp_utc','?')}\"\n        )\n\
      \        lines.append(\"\")\n\n    return \"\\n\".join(lines), any_stalled\n\
      \n\n# --- CLI --------------------------------------------------------------------\n\
      \ndef _default_repo_root() -> Path:\n    \"\"\"Locate repo_root via the same\
      \ env-var override as _dispatch_codex.\n    Falls back to a __file__-relative\
      \ walk; if that fails the TUI exits with\n    a clear diagnostic rather than\
      \ tailing nothing.\n    \"\"\"\n    override = os.environ.get(\"AGENT_LOOP_MCP_REPO_ROOT\"\
      )\n    if override:\n        return Path(override).resolve()\n    # Walk up\
      \ from this file: scripts/agent_loop_mcp/_visibility_tui.py -> repo root\n \
      \   return Path(__file__).resolve().parent.parent.parent\n\n\ndef main(argv:\
      \ list[str] | None = None) -> int:\n    parser = argparse.ArgumentParser(description=\"\
      Visibility TUI for agent-loop-mcp dispatch streams.\")\n    parser.add_argument(\"\
      --once\", action=\"store_true\", help=\"Render once and exit (non-tail mode).\"\
      )\n    parser.add_argument(\"--tick\", type=float, default=2.0, help=\"Tail-mode\
      \ refresh interval in seconds (default 2.0).\")\n    parser.add_argument(\"\
      --warn-after\", type=float, default=300.0,\n                        help=\"\
      Seconds before an active dispatch is flagged STALL (default 300 = 5min).\")\n\
      \    parser.add_argument(\"--repo-root\", default=None,\n                  \
      \      help=\"Override repo root (default: AGENT_LOOP_MCP_REPO_ROOT or __file__\
      \ walk).\")\n    ns = parser.parse_args(argv)\n\n    repo_root = Path(ns.repo_root).resolve()\
      \ if ns.repo_root else _default_repo_root()\n    dispatch_log = repo_root /\
      \ \"agent-loop\" / \"state\" / \"dispatch-log.jsonl\"\n    audit_log = repo_root\
      \ / \"agent-loop\" / \"state\" / \"mcp-server-audit.jsonl\"\n\n    if not dispatch_log.parent.exists():\n\
      \        print(f\"ERROR: state dir not found: {dispatch_log.parent}\", file=sys.stderr)\n\
      \        return 2\n\n    def render_once() -> bool:\n        dispatch_events\
      \ = _read_jsonl(dispatch_log)\n        audit_events = _read_jsonl(audit_log)\n\
      \        text, stalled = _render(dispatch_events, audit_events, ns.warn_after,\
      \ datetime.now(timezone.utc))\n        if ns.once:\n            print(text)\n\
      \        else:\n            # Clear screen + home cursor before each render.\n\
      \            sys.stdout.write(\"\\x1b[2J\\x1b[H\")\n            sys.stdout.write(text)\n\
      \            sys.stdout.write(\"\\n\")\n            sys.stdout.flush()\n   \
      \     return stalled\n\n    if ns.once:\n        stalled = render_once()\n \
      \       return 1 if stalled else 0\n\n    try:\n        while True:\n      \
      \      render_once()\n            time.sleep(ns.tick)\n    except KeyboardInterrupt:\n\
      \        sys.stdout.write(\"\\n\")\n        return 0\n\n\nif __name__ == \"\
      __main__\":\n    sys.exit(main())\n"
