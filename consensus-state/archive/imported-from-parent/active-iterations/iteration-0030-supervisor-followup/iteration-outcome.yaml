closing_reason: |
  iter-0030 is a Flavor A surgical-implementation follow-up landing all 5
  findings emitted in iter-0029 against the supervisor state machine
  subsystem (1 codex + 4 claude findings, codex-rev-001 overlapping with
  claude-rev-003 so 4 distinct fix slots). No Flavor B ceremony (no
  review-packet, no codex re-dispatch, no closure-certificate). TDD applied
  per finding: RED tests added first, then implementation, then GREEN
  verified.

  Findings landed (priority order):

  F1 (HIGH, claude-rev-001) — output_schema additionalProperties:False
    tools/loop_run_goal.py:SCHEMA["output_schema"] gained additionalProperties:False
    mirroring the existing input_schema constraint. Stray return-shape keys
    from a future handle() refactor now fail the MCP contract check instead
    of silently leaking through.

    Tests added (test_loop_run_goal.py): +2
      - test_schema_output_disallows_additional_properties
      - test_schema_output_properties_cover_all_required_fields

  F2 (HIGH, codex-rev-001 ∪ claude-rev-003) — blocked_closure_invariant_failed coverage
    tools/loop_run_goal.py:_detect_state_from_files now maps the
    closure_cross_verification_failed stop rule (emitted by
    _self_drive.cmd_check_stop_rules when the supervisor invariant fails)
    to the more-specific state blocked_closure_invariant_failed, mirroring
    the existing claude_codex_goal_satisfaction_disagreement
    special-case. Without this mapping, the actionable state name was
    unreachable: cmd_check_stop_rules fires the rule before
    _detect_state_from_files reaches its direct _closure_invariant_blocks_close
    branch at line 250, so callers got the generic blocked_stop_rule_fired
    instead of the more-specific hint.

    Tests added (test_loop_run_goal.py): +2
      - test_blocked_closure_invariant_failed_positive: independence-audit.yaml
        with apply_step_landed event carrying last_mutation.actor.model_family
        AND a same-family stale claude-review.yaml -> state ==
        blocked_closure_invariant_failed.
      - test_blocked_closure_invariant_failed_negative_clean_state_advances:
        clean state without independence-audit.yaml -> state == ready_to_close.

  F3 (MEDIUM, claude-rev-002) — _check_stop_rules try/except
    tools/loop_run_goal.py:_check_stop_rules now wraps the
    _self_drive.cmd_check_stop_rules call in try/except mirroring the
    existing _validate_goal_packet pattern. On yaml.YAMLError or any other
    exception we return a synthetic [{'rule': 'check_stop_rules_failed',
    'detail': str(exc)}] BREADCRUMB. The breadcrumb_rules filter in
    _detect_state_from_files was extended to include this rule so it does
    not trip blocked_stop_rule_fired by itself — matches the existing
    review_yaml_parse_failed / git_check_failed pattern.

    Tests added (test_loop_run_goal.py): +2
      - test_check_stop_rules_swallows_exception_returns_breadcrumb
      - test_check_stop_rules_normal_path_still_works

  F4 (MEDIUM, claude-rev-004) — closed-vs-corrected_resubmit breadcrumb
    Operator-chosen option (b) per iter-0030 task brief: preserve closed-wins
    precedence (operator may legitimately hand-author iteration-outcome.yaml)
    BUT emit a stop_rules_fired BREADCRUMB
    ('iteration_closed_despite_corrected_resubmit_pending') when the close
    coexists with a pending corrected_resubmit verification. New helper
    _has_pending_corrected_resubmit reuses _detect_patch_verification_state
    so the two paths can never drift. Audit signal records the irregularity
    without blocking the operator close.

    Tests added (test_loop_run_goal.py): +2
      - test_closed_state_emits_breadcrumb_when_corrected_resubmit_pending
      - test_closed_state_no_breadcrumb_when_no_pending_resubmit

