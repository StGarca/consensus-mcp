goal:
  summary: Surgical followup landing iter-0029 supervisor findings F1-F4 (1 codex + 4 claude findings, 4 fix slots after codex-claude overlap)
  desired_end_state: |
    iter-0030 lands the 5 findings emitted against the supervisor state
    machine subsystem in iter-0029 (Flavor B subsystem review). Flavor A
    direct-implementation with TDD (no Flavor B ceremony, no review-packet,
    no codex re-dispatch within this iter).

    Findings to land (priority order, per iter-0029 iteration-outcome.yaml):

      F1 (HIGH, claude-rev-001) — output_schema additionalProperties:False
        Add `additionalProperties: False` to SCHEMA["output_schema"]; add
        test_schema_output_disallows_additional_properties. Symmetric with
        the existing input_schema constraint + test.

      F2 (HIGH, codex-rev-001 ∪ claude-rev-003) — blocked_closure_invariant_failed
        test coverage. Positive test: independence-audit.yaml with
        apply_step_landed event carrying last_mutation actor.model_family
        AND stale same-family claude-review -> state ==
        blocked_closure_invariant_failed. Negative test: clean state
        advances normally.

      F3 (MEDIUM, claude-rev-002) — _check_stop_rules try/except
        Wrap cmd_check_stop_rules call in try/except. On yaml.YAMLError or
        other audit-log corruption, return synthetic [{'rule':
        'check_stop_rules_failed', 'detail': str(exc)}] breadcrumb. Joins
        the existing breadcrumb_rules filter at line 212. Matches the
        defensive pattern in _validate_goal_packet.

      F4 (MEDIUM, claude-rev-004) — corrected_resubmit/closed precedence
        Operator-chosen option (b): preserve existing closed-wins precedence
        BUT emit a stop_rules_fired breadcrumb
        ('iteration_closed_despite_corrected_resubmit_pending') when both
        conditions coexist. Operator sees the irregularity in the audit
        signal without blocking close (legitimate operator close decisions
        survive).

    iter-0030 SUCCESS = all 4 fix slots landed, TDD test coverage added,
    pytest 335+N passing, 11/11 release gates green, one commit on
    renderer-may1-vintage.
  non_goals:
    - modify code outside tools/loop_run_goal.py + tests/test_loop_run_goal.py
    - modify any other tool / helper / schema file
    - re-dispatch codex (this is a direct-implementation iter)
    - re-author review-packet or run Flavor B cycle
    - touch closure invariant module / apply pipeline / run/ / wiki/
    - bump pyproject.toml version
    - introduce new MCP tools
