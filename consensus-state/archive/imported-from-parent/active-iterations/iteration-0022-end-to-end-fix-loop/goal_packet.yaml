schema_version: 1
pilot_id: iteration-0022-end-to-end-fix-loop
goal:
  summary: iter-0022 — close the full codex-fix-author loop end-to-end (helper-stamped base_sha unblocks apply)
  desired_end_state: |
    iter-0021 proved codex emits content-correct unified_diff when touched-file
    contents are embedded in the review-packet. The remaining blocker was codex's
    hallucinated base_sha emission: apply.codex_patch refused with
    base_sha_drift because codex's emitted base_sha did not match the
    operator-stamped defect_target.base_sha (the canonical bundle_sha).

    iter-0022 fix: the helper validator now OVERWRITES patch_proposal.base_sha
    with review_packet.defect_target.base_sha post-parse. Codex emits any
    string; the helper authoritatively replaces it with the canonical value.

    Same defect target as iter-0019 / iter-0020 / iter-0021:
    `apply.codex_patch.handle()` in scripts/agent_loop_mcp/tools/apply_codex_patch.py.
    The MCP schema enforces `actor` shape at dispatch layer; direct Python
    imports of `handle()` bypass that validator. Defense-in-depth re-validation
    should fail the call early when actor lacks any of the 4 required keys
    (id, model_family, role, pass_id).

    iter-0022 SUCCESS = the full cycle closes:
      1. codex emits patch_proposal with helper-stamped base_sha matching defect_target
      2. claude verifier approves the patch
      3. apply.codex_patch lands the mutation (no base_sha_drift refusal)
      4. cross-family closing review (claude post-mutation review_target_hash = last_mutation.post_sha)
      5. closure-certificate.yaml: 3/3 invariant_checks PASS, overall PASS

    The original codex-fix-author loop goal is empirically proven when this
    iteration closes with closing_state=quorum_close_passed.

    handle's real signature is:
      def handle(iteration_dir: str, patch_id: str, actor: dict) -> dict
  non_goals:
    - modify _closure_invariant.py
    - modify _self_drive.py
    - modify _dispatch_codex.py
    - introduce new MCP tools
    - modify codex_review_schema.json
    - bump pyproject.toml version
allowed_files:
  - scripts/agent_loop_mcp/tools/apply_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch.py
  - agent-loop/active/iteration-0022-end-to-end-fix-loop/
allowed_sections: []
forbidden_files:
  - scripts/agent_loop_mcp/_closure_invariant.py
  - scripts/agent_loop_mcp/_self_drive.py
  - scripts/agent_loop_mcp/_dispatch_codex.py
  - scripts/agent_loop_mcp/_author_review_packet.py
  - scripts/agent_loop_mcp/dispatch_templates/
  - scripts/agent_loop_mcp/tools/loop_run_goal.py
  - scripts/agent_loop_mcp/tools/loop_verify_codex_patch.py
  - scripts/agent_loop_mcp/tools/audit_append_event.py
  - scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py
  - scripts/agent_loop_mcp/server.py
  - run/
  - wiki/
max_iterations: 2
max_patch_size: 80
fix_author_policy: strict
validators_required:
  - validate_disposition_index
acceptance_gates:
  - id: A1
    description: apply.codex_patch.handle has actor structural re-validation
    check: 'grep -E "model_family|required actor key" scripts/agent_loop_mcp/tools/apply_codex_patch.py'
  - id: A2
    description: regression test asserts apply refuses on missing actor.model_family
    check: 'grep -q "model_family" scripts/agent_loop_mcp/tests/test_apply_codex_patch.py'
  - id: A3
    description: pytest still green
    check: 'python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/ -q'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
  - any_acceptance_gate_returns_undefined
  - claude_codex_disagree_on_goal_satisfied
  - closure_cross_verification_failed
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-10T23:00:00Z'
  codex_patch_apply_authorized: true
  scope_signature: b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3
