  it per CLAUDE.md, operator-authorized apply lands the mutation, cross-family
  closer seals the cycle — is now empirically proven end-to-end with real
  codex-cli 0.129.0.

  Cumulative iter-0019 -> iter-0020 -> iter-0021 -> iter-0022 represents
  the full operationally-proven chain. Helper-stamping of three fields
