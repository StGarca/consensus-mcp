    ambiguity_type: operator-owned
    proposed_resolution_method: operator
    owner: operator
    blocks: ["implementation_ready"]

self_resolved_questions:
  - id: srq-001
    question: "Is the canonical hash convention stable across CRLF/LF and UTF-8 BOM?"
    resolution_method: bounded_test
    resolution: |
      Tested via python_env\python.exe one-liner:
        d1 = yaml.safe_load(b'\\xef\\xbb\\xbfa: 1\\r\\nb: 2\\r\\n')
        d2 = yaml.safe_load(b'a: 1\\nb: 2\\n')
        canonical1 = hashlib.sha256(yaml.safe_dump(d1, sort_keys=True).encode('utf-8')).hexdigest()
        canonical2 = hashlib.sha256(yaml.safe_dump(d2, sort_keys=True).encode('utf-8')).hexdigest()
      Result: canonical1 == canonical2. Confirmed: yaml.safe_load normalizes
      both BOM and CRLF away, yaml.safe_dump re-emits LF-only without BOM,
      and sort_keys=True normalizes key order. The convention is byte-stable.
    confirmed: true
  - id: srq-002
    question: "Does iteration-0001 review-packet.yaml's canonical hash match the prompt's required reviewed_packet_sha256?"
    resolution_method: bounded_test
    resolution: |
      Tested via:
        hashlib.sha256(yaml.safe_dump(yaml.safe_load(open('iteration-0001/review-packet.yaml')), sort_keys=True).encode('utf-8')).hexdigest()
      Result: 00a1a3047f83b3d13b67ac23ffcda97cd5eaeca2e5a7bc8d915cf1fe5e543f1f
      Matches the prompt's required value exactly. Note: the embedded
      packet_sha256 field inside the yaml itself reads
      0a84eb9ae7d3b96097b6ef28b52ba71f12bee842e64718d78c203d2d471f3918
      (a different value, computed before re-canonicalization or via a
      different convention). Spec section 7 should clarify: the embedded
      packet_sha256 field, when present, must match the canonical hash
      computed via the same convention. Filed as a sub-finding under
      claude-rev-046 / claude-rev-051.
    confirmed: true

assumptions_challenged:
  - id: a-001
    assumption: "pass-20's per-defect proposed_resolution text is correct and the implementer can rely on it without re-verification."
    challenge_result: failed
    evidence: |
      Spot-verified pass-20's claude-rev-047 enumeration of missing
      required_packet_fields against actual validator output. pass-20 lists
      5 fields: karpathy_principle_summary, gate_state, decision_ledger_hash,
      claude_md_hash, requested_output_schema. validate_iteration.py
      actually reports: decision_ledger_hash, claude_md_hash,
      karpathy_principle_summary, changed_sections, check_results_if_any.
      pass-20 was wrong on 2 of 5 (gate_state and requested_output_schema
      are present; changed_sections and check_results_if_any are absent).
      The implementer must derive the patch list from the validator output,
      not from the pass-20 narrative. This is a Karpathy "Think Before Coding"
      / project rule "Never act on or report assumptions" finding against
      pass-20 itself.
  - id: a-002
    assumption: "The YAML parse error at iteration-outcome.yaml line 71 is real and the surgical fix (quote the offending value) is correct."
    challenge_result: cleared
    evidence: |
      Verified by direct yaml.safe_load: raises ScannerError "mapping values
      are not allowed here" at line 71 column 44. Inspected the line: it
      contains "cf-008: section 13 dangling reference: ..." -- the second
      colon (after 'reference') is the unquoted offender. patch-004 wraps
      the value in single quotes, which is the minimum-edit fix. yaml.safe_load
      accepts the patched form. The bullet's semantic meaning is unchanged.
  - id: a-003
    assumption: "Adding `reviewer: codex` as a sibling key in independence-audit.yaml audit_log entries (patch-008 / patch-009) is an in-scope schema-compatible change, not an architectural extension."
    challenge_result: partially-cleared
    evidence: |
      The current section 13 schema (md lines 1098-1112) lists
      fields_per_entry that does NOT include `reviewer:`. Adding it is
      technically a schema extension. However, the alternative (carrying
      agent identity ONLY in actor) requires either (i) actor='codex' and
      actor='claude' which corrupts actor's documented role
      (orchestrator), or (ii) cramming identity into invocation_protocol
      under a new key, which is a deeper schema change. The `reviewer:`
      sibling is the smallest-blast-radius option but operator should
      ratify in the same pass that handles claude-rev-045 option C
      (patch-011). For this iteration, patches 005-007 (rename event
      strings) are unambiguous in-scope; patches 008-009 (add reviewer
      key) are deferred under risk-003.

