implementation_risks:
  - id: risk-001
    severity: medium
    claim_class: correctness
    claim: |
      patch-010 inserts new top-level keys after schema_version. yaml.safe_load
      preserves dict semantic but yaml.safe_dump re-orders alphabetically when
      sort_keys=True is used by the canonical hasher. The canonical-hash
      change after patch-010 is unavoidable: review-packet.yaml's hash will
      change, which means iteration-0000's reviewed_packet_sha256 (now in
      claude-review.yaml and codex-review.yaml as 385d958...) MUST also be
      updated by the implementer in the same iteration to the new canonical
      hash, or the PACKET_SHA_MISMATCH finding from validate_iteration.py
      will reappear in claude-rev-046 form.
    suggested_action: |
      Implementer ordering: (1) apply patch-010 to review-packet.yaml.
      (2) Compute canonical hash via
        hashlib.sha256(yaml.safe_dump(yaml.safe_load(open(p)), sort_keys=True).encode("utf-8")).hexdigest()
      (3) Update claude-review.yaml and codex-review.yaml
        reviewed_packet_sha256 to that value.
      (4) Update independence-audit.yaml audit_log review_packet_built entry's
        sha256 field to that value (so the audit chain stays consistent).
      (5) Re-run validate_iteration.py; expect 0 PACKET_SHA_MISMATCH findings
        and 0 PACKET_MISSING_REQUIRED_FIELD findings.
  - id: risk-002
    severity: medium
    claim_class: scope
    claim: |
      patch-011 modifies sections 1-23 of the spec md (section 13 audit_log
      schema). Per iteration-0001 input.yaml proposed_implementation_scope.
      forbidden_files line 123, "spec sections 1-23 architectural rules"
      are forbidden. patch-011 thus violates the iteration-0001 scope.
    suggested_action: |
      patch-011 must NOT be applied by the implementer. Record it as a
      deferred_decisions entry in consensus.yaml with status: deferred,
      proposed_change=patch-011 text, owner: operator. The mechanical fix
      to the artifact (patches 005-009) is in scope; the spec note (option
      C "AND add a section 13 note") is the architectural arm and stays
      operator-gated. This matches the codex-rev-028 self-patch constraint.
  - id: risk-003
    severity: low
    claim_class: correctness
    claim: |
      patch-008 / patch-009 inject a `reviewer: codex` sibling key. The spec
      (section 13 audit_log fields_per_entry) currently lists actor as the
      identity carrier and does not list a `reviewer:` key. Adding
      `reviewer:` may be cleaner than overloading actor='codex' (which is
      semantically wrong: actor is orchestrator, not the reviewer being
      invoked), but it is technically a schema extension.
    suggested_action: |
      Two options: (a) keep `reviewer: codex` as a sibling key and let
      patch-011 (which is deferred) add the field to the section 13 schema
      when operator ratifies; (b) instead set actor='codex_reviewer' or
      add it to invocation_protocol.reviewer_identity. Recommend (a):
      cleanest separation, no actor-field corruption.

