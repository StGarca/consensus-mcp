    actor: claude
    artifact: agent-loop/active/iteration-0001/claude-review.yaml  # to be written
    independence_attestation:
      seal_order_position: 1   # both invoked simultaneously; neither's seal preceded the other's invocation
      other_review_existed_at_invocation: false
      reviewer_could_have_seen_other_review: false
    invocation_protocol:
      runtime: subagent_dispatch
      fresh_context: false
      fresh_context_false_reason: "subagent fresh per harness, but iteration-0000 artifacts and pass-20 archive are explicitly in the brief"
      reviewer_brief_excluded:
        - "codex reviewer's brief"
        - "codex reviewer's review.yaml (sealed before either reviewer publishes)"
      reviewer_brief_included:
