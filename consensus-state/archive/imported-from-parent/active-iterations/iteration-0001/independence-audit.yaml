schema_version: 1
iteration_id: iteration-0001
audit_purpose: "section 13 independence_proof_required; documents reviewer exposure metadata. iteration-0001 forces post-exposure framing per operator guardrail G4."

# Canonical event names per spec section 13 audit_log schema and pass-20 claude-rev-045 lesson.
# DO NOT use per-agent prefixes like codex_reviewer_invoked or claude_review_returned_and_sealed.

global_independence_attestation:
  achievable: false
  reason: |
    Operator guardrail G4: "Independence audit must mark prior exposure to iteration-0000 artifacts."
    Both reviewers are explicitly briefed on iteration-0000 artifacts as the review target.
    The pass-20 archive yaml (defect bodies) is part of the input packet.
    section 13 independence_proof_required cannot hold; corroboration_strength for any
    iteration-0001 finding derived from iteration-0000 or pass-20 exposure is
    suggested_by_context, NOT independent. Severity gate cannot auto-promote.

