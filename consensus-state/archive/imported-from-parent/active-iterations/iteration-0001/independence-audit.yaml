  - utc: "2026-05-08T00:00:00Z"
    event: iteration_closed
    actor: orchestrator
    closing_state: blocked
    artifacts_finalized:
      - agent-loop/active/iteration-0001/input.yaml
      - agent-loop/active/iteration-0001/review-packet.yaml
      - agent-loop/active/iteration-0001/codex-review.yaml
      - agent-loop/active/iteration-0001/claude-review.yaml
      - agent-loop/active/iteration-0001/independence-audit.yaml   # this file
      - agent-loop/active/iteration-0001/consensus.yaml
      - agent-loop/active/iteration-0001/verification.yaml
      - agent-loop/active/iteration-0001/iteration-outcome.yaml

forced_post_exposure_finding_classification:
  rule: |
    Per cf-001 enforcement notes (Phase 0 honor-system) and operator guardrail G4:
    every finding emitted by either reviewer in iteration-0001 carries
    corroboration_strength: suggested_by_context.
  rationale: |
    Reviewers cannot achieve fresh_context: true because their review target IS
    iteration-0000 + pass-20 archive. Both inputs are pre-existing artifacts the
    reviewers must read to do the work. independence_proof_required condition #1
    (reviewers invoked with fresh_context: true) categorically fails.
    Honest framing: do not claim independence we don't have.
  severity_gate_implication: |
    Per section 13 severity_gate + independence_proof_required:
    if any independence_proof_required condition fails, corroboration_strength is
    suggested_by_context and auto-promotion to blocking is BLOCKED regardless of
    severity. Source severity holds; auto-blocking via cross-reviewer corroboration
    does not.

# ---- Reviewer invocation protocol ----

reviewer_invocation_protocol:
  - reviewer: codex
    runtime: subagent_dispatch
    role_persona: codex (implementation_realist per section 4 stance)
    fresh_context: false   # subagent fresh, but will see iteration-0000 artifacts in brief
    reviewer_brief_excluded:
      - "claude reviewer's brief"
      - "claude reviewer's review.yaml (when written)"
      - "any in-progress orchestrator notes"
    reviewer_brief_included:
      - "agent-loop/active/iteration-0001/input.yaml"
      - "agent-loop/active/iteration-0001/review-packet.yaml"
      - "agent-loop/archive/review-passes/2026-05-08-claude-pass-20-phase0-validator-suite-build.yaml"
      - "agent-loop/active/iteration-0000/* (all 8 artifacts)"
      - "wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md (current spec at v1.7.2)"

  - reviewer: claude
    runtime: subagent_dispatch
    role_persona: claude (methodology_critic per section 4 stance)
    fresh_context: false   # same reasoning as codex
    reviewer_brief_excluded:
      - "codex reviewer's brief"
      - "codex reviewer's review.yaml (when written; sealed before claude is invoked)"
    reviewer_brief_included:
      - "agent-loop/active/iteration-0001/input.yaml"
      - "agent-loop/active/iteration-0001/review-packet.yaml"
      - "agent-loop/archive/review-passes/2026-05-08-claude-pass-20-phase0-validator-suite-build.yaml"
      - "agent-loop/active/iteration-0000/* (all 8 artifacts)"
      - "wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md (current spec at v1.7.2)"

dispatch_protocol:
  parallel_with_seal_barrier: |
    Reviewers are dispatched as parallel subagents. Each writes their review.yaml to:
      agent-loop/active/iteration-0001/codex-review.yaml
      agent-loop/active/iteration-0001/claude-review.yaml
    Neither reviewer reads the other's review during invocation (subagent isolation).
    review_returned_and_sealed event records the canonical sha256 of each file at
    write completion. Synthesizer step compute_canonical_findings runs only AFTER
    both seals have been recorded.
  honor_system: |
    Phase 0: subagent isolation is the technical mechanism preventing reviewers from
    reading peer review during invocation; reviewers are also instructed not to.
    No technical block on reading peer review post-invocation; honor-system + audit log.
