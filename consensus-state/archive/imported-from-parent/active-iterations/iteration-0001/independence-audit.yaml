    event: review_packet_built
    actor: orchestrator
    artifact: agent-loop/active/iteration-0001/review-packet.yaml
    sha256: 00a1a3047f83b3d13b67ac23ffcda97cd5eaeca2e5a7bc8d915cf1fe5e543f1f
    note: "Phase 0 file-based; build_review_packet.py invoked manually by orchestrator-stand-in."

