        sha256: 651f1889724362e07336fd3ded06587901fc3b7407f03d4a7b340d839f486314
      - artifact: agent-loop/active/iteration-0001/review-packet.yaml
        sha256: 00a1a3047f83b3d13b67ac23ffcda97cd5eaeca2e5a7bc8d915cf1fe5e543f1f
      - artifact: agent-loop/archive/review-passes/2026-05-08-claude-pass-20-phase0-validator-suite-build.yaml
        sha256: 6d59608c4c06b4d834a2c7abb9e7f03f15732d19ef99865d93ff5768a8df9416
