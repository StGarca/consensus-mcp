- section_id: '22'
  excerpt: "## 22. Metrics\n\nRequired metrics:\n\n```yaml\ntokens_per_iteration:\n\
    \  codex_input_estimate: 0\n  claude_input_estimate: 0\n  codex_output_estimate:\
    \ 0\n  claude_output_estimate: 0\ncontext_reuse:\n  sections_sent: 0\n  unchanged_sections_omitted:\
    \ 0\n  context_requests_served: 0\nreview_quality:\n  blockers_found: 0\n  blockers_confirmed_by_other_agent:\
    \ 0\n  blockers_rejected: 0\n  assumptions_challenged: 0\n  self_resolved_questions:\
    \ 0\n  operator_escalated_questions: 0\n  independent_finding_rate: 0.0\noutcome_quality:\n\
    \  decision_reversal_rate: 0.0\n  operator_override_rate: 0.0\n  time_to_correct_error_iterations:\
    \ null\nimplementation_quality:\n  accepted_changes: 0\n  implemented_changes:\
    \ 0\n  out_of_scope_changes: 0\n  checks_passed: false\n```\n\nCalibration:\n\n\
    - iteration-0000 establishes token baseline;\n- later comparable iterations target\
    \ <=80% of baseline input tokens;\n- three consecutive regressions trigger packet-builder\
    \ audit;\n- if `independent_finding_rate < 0.30` across 5 iterations, compare\
    \ to single-agent + adversarial self-critique.\n\nindependent_finding_rate formula\
    \ (per claude-rev-010 promoted from PROVISIONAL to canonical in v1.5):\n\n```yaml\n\
    independent_finding_rate:\n  formula: |\n    count(canonical_findings_with_exactly_one_source)\
    \ /\n    count(all_canonical_findings)\n    where canonical_findings are post-synthesizer-merge.\n\
    \  source_definition: |\n    A canonical_finding has 'exactly one source' if exactly\
    \ one reviewer\n    raised it in this iteration. Cross-pass corroborations count\
    \ as\n    additional sources only if the prior pass's finding was unresolved\n\
    \    at the time of the current pass.\n  measurement_window: 5 most recent operational\
    \ iterations (rolling)\n  aggregation: mean across window\n  notes:\n    - \"\
    Spec-review passes (pass-1..pass-N) are EXCLUDED from this measurement; only operational\
    \ iterations (iteration-0000+) count.\"\n    - \"Tainted findings (peer-question-derived\
    \ per section 10) are excluded from numerator but included in denominator.\"\n\
    ```"
