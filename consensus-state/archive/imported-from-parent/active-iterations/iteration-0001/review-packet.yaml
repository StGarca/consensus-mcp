- section_id: '17'
  excerpt: "## 17. Production gates\n\nState machine:\n\n```yaml\nproduction_state:\n\
    \  not_ready:\n    meaning: \"technical gates not clear\"\n  ready_pending_operator_approval:\n\
    \    meaning: \"technical gates clear; protected operator approval missing or\
    \ unmatched\"\n  approved:\n    meaning: \"technical gates clear and protected\
    \ operator approval matches all three binds (target + consensus + verification)\"\
    \n```\n\nTechnical readiness:\n\n```yaml\nproduction_ready_if:\n  - codex_production_clearance\n\
    \  - claude_production_clearance\n  - verification_passed\n  - production_scope_verified\n\
    \  - unresolved_consensus_disagreements_empty\n```\n\nPermission:\n\n```yaml\n\
    production_allowed_if:\n  - production_ready\n  - operator_production_approval_valid\n\
    \  - operator_production_scope_matches\n  - all_three_hash_binds_match   # codex-rev-011\
    \ resolution\n```\n\nProtected approval (per claude-rev-023; path designated by\
    \ operator 2026-05-08):\n\n```yaml\napproval_store:\n  path: \"C:/Users/<you>/agent-loop-approvals/operator-production-approval.yaml\"\
    \n  permission_requirement: \"agent process MUST NOT have write permission on\
    \ this directory; OS ACL enforced, not honor-system\"\n  outside_repo: true\n\
    \  note: \"Path is OUTSIDE wiki/, agent-loop/, scripts/, run/. Operator-only write.\"\
    \napproval_must_not_be:\n  - agent_writable\n  - in implementation_scope.allowed_files\n\
    \  - generated_by_codex_or_claude\n  - inside any agent-traversable repo path\n\
    approval_schema:    # codex-rev-011 resolution: three-way hash split\n  schema_version:\
    \ 2\n  iteration_id: iteration-0000\n  approved_by: operator\n  approved_utc: \"\
    2026-05-08T00:00:00Z\"\n  approved_target_sha256: \"<hash of the artifact/commit\
    \ being promoted to production>\"\n  approved_consensus_sha256: \"<hash of consensus.yaml\
    \ at approval time>\"\n  approved_verification_sha256: \"<hash of verification.yaml\
    \ at approval time>\"\n  production_scope:\n    type: \"render | merge | deploy\
    \ | data-mutation\"\n    target: \"<exact target>\"\n  signature_or_operator_nonce:\
    \ \"<operator-only value>\"\n```\n\nMirrored repo approval is audit evidence only,\
    \ not authority.\n\nState transitions:\n\n```yaml\nstate_transitions:\n  not_ready_to_ready_pending_operator_approval:\n\
    \    requires_all:\n      - current_state == not_ready\n      - consensus_state\
    \ == verified\n      - all production_ready_if conditions true at transition time\n\
    \n  ready_pending_operator_approval_to_approved:    # codex-rev-011 + codex-rev-005\
    \ resolution\n    requires_all:\n      - current_state == ready_pending_operator_approval\n\
    \      - all production_ready_if conditions still true at transition time\n  \
    \    - operator_production_approval_valid\n      - operator_production_scope_matches\n\
    \      - approved_target_sha256 == current_target_sha256\n      - approved_consensus_sha256\
    \ == current consensus.yaml sha256\n      - approved_verification_sha256 == current\
    \ verification.yaml sha256\n    rationale: \"TOCTOU defense via three independent\
    \ binds: any drift in target, consensus, or verification regresses state. Single-hash\
    \ design conflated different objects per scope_type.\"\n\n  consensus_change_after_approval:\
    \    # claude-rev-013 resolution: distinguish regression targets\n    if_production_ready_if_still_holds:\n\
    \      regress_to: ready_pending_operator_approval\n      require: \"re-approval\
    \ bound to new approved_consensus_sha256\"\n      rationale: \"consensus changed\
    \ but technical readiness intact; operator just re-confirms\"\n    else:\n   \
    \   regress_to: not_ready\n      rationale: \"readiness preconditions broken;\
    \ full reset required\"\n    detection_trigger:    # cf-005 resolution (v1.7)\n\
    \      step: \"recheck_approval_binds_against_current_artifact_hashes (section\
    \ 20 step list, near top of every iteration boot)\"\n      behavior: |\n     \
    \   Reads current spec_sha256, current consensus.yaml sha256, current\n      \
    \  verification.yaml sha256. Compares to approved_target_sha256 /\n        approved_consensus_sha256\
    \ / approved_verification_sha256 from the\n        operator approval_store. On\
    \ any mismatch:\n          - if production_ready_if conditions still hold: transition\
    \ to\n            ready_pending_operator_approval (per consensus_change_after_approval\
    \ rule above)\n          - else: transition to not_ready\n        Runs ONCE per\
    \ iteration boot. Cheap (3 sha256 reads + 3 comparisons).\n      cadence_alternative_phase_1:\
    \ |\n        Phase 1+ MAY add gate-state-read-time recheck for tighter responsiveness;\n\
    \        Phase 0 boot-time recheck is sufficient for file-based architecture.\n\
    \n  any_to_not_ready_triggers:\n    - any production_ready_if condition becomes\
    \ false\n    - new blocking objection raised on the artifact\n    - verification\
    \ artifact hash diverges from approved_verification_sha256\n    - target artifact\
    \ hash diverges from approved_target_sha256\n    - consensus.yaml hash diverges\
    \ from approved_consensus_sha256 AND production_ready_if no longer holds\n\n \
    \ forbidden_transitions:\n    - not_ready -> approved (must pass through ready_pending_operator_approval)\n\
    \    - approved -> not_ready -> approved (operator must re-issue approval; cannot\
    \ reuse stale approval)\n    - silent re-edit of approval_schema fields after\
    \ issue (per claude-rev-018 rollback semantics)\n```"
