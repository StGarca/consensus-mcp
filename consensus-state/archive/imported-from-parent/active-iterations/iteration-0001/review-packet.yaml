  excerpt: "## 16. Verification schema\n\nFile:\n\n```text\nagent-loop/active/<iteration>/verification.yaml\n\
    ```\n\nSchema:\n\n```yaml\nschema_version: 1\niteration_id: iteration-0000\npassed:\
    \ false\naccepted_changes_verified: []\nscope_check:\n  passed: false\n  touched_files:\
