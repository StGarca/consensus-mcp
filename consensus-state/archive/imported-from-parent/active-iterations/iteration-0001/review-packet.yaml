- section_id: '13'
  excerpt: "## 13. Consensus schema\n\nFile:\n\n```text\nagent-loop/active/<iteration>/consensus.yaml\n\
    ```\n\nSchema:\n\n```yaml\nschema_version: 1\niteration_id: iteration-0000\ncreated_utc:\
    \ \"2026-05-08T00:00:00Z\"\nconsensus_state: \"blocked | implementation_ready\
    \ | implemented | verified\"\nproduction_state: \"not_ready | ready_pending_operator_approval\
    \ | approved\"\nreview_consensus: false\nimplementation_ready: false\nproduction_ready:\
    \ false\nproduction_allowed: false\ncanonical_findings:\n  - canonical_id: \"\
    finding-001\"\n    source_findings:\n      - \"codex:codex-001\"\n      - \"claude:claude-003\"\
    \n    merge_method: \"exact | deterministic_key | bounded_micro_call\"\n    severity:\
    \ blocking\n    status: \"accepted | rejected | deferred | unresolved\"\n    required_change:\
    \ \"<text>\"\naccepted_changes:\n  - id: \"accepted-001\"\n    source_findings:\n\
    \      - \"finding-001\"\n    edit:\n      file: \"<path>\"\n      old_string:\
    \ \"<exact>\"\n      new_string: \"<exact>\"\nrejected_changes: []\ndeferred_decisions:\
    \ []\nunresolved_disagreements: []\nimplementation_scope:\n  allowed_files: []\n\
    \  forbidden_files:\n    - \"production outputs\"\n  allowed_actions:\n    - \"\
    edit docs\"\n    - \"run allowlisted checks\"\n  forbidden_actions:\n    - \"\
    render production audio\"\n    - \"merge to main\"\nchecks_required:\n  - id:\
    \ \"git-diff-check\"\n    check_id: \"git.diff_check\"\n    args:\n      paths:\
    \ []\n```\n\nConsensus rules:\n\n- one blocking objection from either agent blocks\
    \ by default;\n- one agent silent on a blocker does not clear it;\n- production-safety\
    \ disagreement always sets `production_state=not_ready`;\n- empty objection lists\
    \ do not count unless assumptions were challenged;\n- agreement without substantive\
    \ pushback triggers adversarial pass.\n\nSubstantive pushback:\n\n```yaml\nsubstantive_pushback:\n\
    \  valid_if:\n    any:\n      - \">=1 blocking_objection\"\n      - \">=3 non_blocking_suggestions\"\
    \n    and:\n      - \"assumptions_challenged non-empty\"\n      - \"evidence present\
    \ for every challenge\"\n```\n\nFocused adversarial pass:\n\n```yaml\nmode: adversarial-pass\n\
    prompt_requirement: >\n  Act as if the prior review missed something critical.\
    \ Produce one concrete\n  blocking objection with evidence, or provide evidence-based\
    \ no-objection\n  rationale after challenging assumptions.\n```\n\nNo operator-acknowledgement\
    \ escape for weak agreement in normal implementation iterations.\n\nDual-reviewer\
    \ corroboration (re-enabled in v1.5 per Tier 1/2/3 ratifications):\n\n```yaml\n\
    dual_reviewer_corroboration:\n  status: ACTIVE\n  ownership: synthesizer_only\
    \   # codex-rev-009 resolution: reviewers do NOT declare; sealed reviews\n  rule:\
    \ |\n    If N>=2 reviewers raise the same canonical finding (matched via\n   \
    \ section 12 canonical_finding_key) AND the finding meets the severity\n    gate\
    \ AND independence_proof_required holds, the finding auto-promotes\n    to must-apply\
    \ this iteration. corroborated_by lives on\n    consensus.canonical_findings (NOT\
    \ on reviewer artifacts).\n  canonical_finding_match:\n    key: [file, section,\
    \ claim_class, normalized_claim_text_hash]\n    computed_by: synthesizer\n   \
    \ computed_when: section_20_step_compute_canonical_findings_after_both_reviews_seal\n\
    \  severity_gate:   # codex-rev-010 resolution\n    auto_block_only_if:\n    \
    \  either_predicate_true:\n        - \"max(source_severity) in [high, blocking]\"\
    \n        - \"claim_class in [safety, correctness, security, process]\"\n    if_neither_predicate_true:\n\
    \      outcome: confirmed_suggestion\n      effect: \"recorded in canonical_findings;\
    \ NOT blocking; visible in consensus for operator review\"\n    if_either_predicate_true:\n\
    \      outcome: auto_blocking_must_apply\n      effect: \"severity upgraded to\
    \ blocking; implementation_scope must include target section; rebuttal cannot\
    \ downgrade without operator override\"\n  independence_proof_required:   # claude-rev-008\
    \ resolution; cf-001 schema added in v1.7\n    conditions_all_must_hold:\n   \
    \   - \"reviewers invoked with fresh_context: true (per section 19)\""
