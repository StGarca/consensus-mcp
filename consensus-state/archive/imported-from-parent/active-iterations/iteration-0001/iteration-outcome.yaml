schema_version: 1
iteration_id: iteration-0001
created_utc: "2026-05-08T00:00:00Z"
closing_state: blocked
closing_reason: |
  consensus_state: blocked. 7 canonical findings (1 blocking at source, 6 high). Reviewer
  overall_position disagreement (codex implementation_ready=true vs claude=false) resolved
  by section 13 one-blocker-blocks rule in claude favor (claude emitted 5 blocking_objections;
  codex emitted 2). No mutation occurred. Plan revision required before iteration-0001-revised.

# ---- Required metrics per spec section 22 ----

tokens_per_iteration:
  codex_input_estimate: 8000          # rough; subagent total was 117k including overhead
  claude_input_estimate: 8000         # same; subagent total was 111k
  codex_output_estimate: 6000         # codex-review.yaml ~330 lines yaml
  claude_output_estimate: 5500        # claude-review.yaml ~280 lines yaml
  total_subagent_dispatch_tokens: 228313   # sum of two reviewer subagent total_tokens reported
  note: |
    Subagent token totals include the brief + reading + thinking, not just the input
    packet content. True input-context-cost would require packet sha + brief sha + read tracking;
    Phase 0 estimate-only.

context_reuse:
  sections_sent: 8                    # changed_sections in review-packet.yaml
  unchanged_sections_omitted: 16      # spec has approx 24 sections; 8 sent, ~16 omitted (estimate)
  context_requests_served: 0          # no peer questions fired this iteration
  packet_size_bytes_approx: 12000     # rough
  ledger_hash_present: false          # decision-ledger.yaml does not exist in repo
  claude_md_hash_present: true

review_quality:
  blockers_found: 7                   # canonical post-merge; raw was also 7 (no exact key collisions, no dedup)
  blockers_confirmed_by_other_agent: 0
  blockers_rejected: 0
  assumptions_challenged: 8           # codex 3 + claude 5
  self_resolved_questions: 2          # codex empirically verified hash convention; codex confirmed packet hash match
  operator_escalated_questions: 5     # codex 3 + claude 2
  independent_finding_rate: 0.0       # by construction G4: all findings post-exposure; corroboration_strength suggested_by_context for all
  independent_finding_rate_formula_note: |
    Formula per claude-rev-010 (canonical in v1.5):
      count(canonical_findings_with_exactly_one_source) / count(all_canonical_findings)
    All 7 canonical findings have exactly one source reviewer (no key collisions).
    Numerator would be 7/7 = 1.0 IF reviewers were independent.
    But G4 forces fresh_context: false; tainted_findings rule excludes from numerator.
    Therefore: 0.0 / 7.0 = 0.0.
  independent_finding_rate_below_kill_switch: false
  kill_switch_threshold: 0.30
  kill_switch_window: "5 most recent operational iterations"
  iterations_in_window_so_far: 1     # iteration-0001 first; iteration-0000 was preflight-observational, excluded per claude-rev-010 measurement_window note
  measurement_too_thin_for_kill_switch_yet: true
  expected_recovery_path: |
    Once iteration-0002+ runs with reviewers NOT post-exposed to a self-authored archive,
    independent_finding_rate should rise above the 0.30 threshold. The 0.0 here is a
    forced-by-design value, not a signal of reviewer collapse.

outcome_quality:
  decision_reversal_rate: null        # no prior decisions to reverse
  operator_override_rate: null        # operator response pending
  time_to_correct_error_iterations: null

implementation_quality:
  accepted_changes: 0                 # blocked iteration
  implemented_changes: 0
  out_of_scope_changes: 0
  checks_passed: false                # verification.yaml.passed = false
  checks_skipped_count: 3             # see verification.yaml checks_skipped_due_to_blocked_consensus

# ---- Iteration-0001 contribution to long-term measures ----

iteration_calibration:
  is_baseline_for_section_22: false
  reason: "Iteration-0000 is the established baseline (per spec section 22 'iteration-0000 establishes token baseline'). Iteration-0001 is a comparable iteration; should target <=80% of baseline input tokens. Comparison deferred until iteration-0001-revised closes successfully."

# ---- Process-level outcomes ----

process_outcomes:
  dual_reviewer_pattern_validated: true
  dual_reviewer_disagreement_resolved_by_spec: true
  reviewer_caught_orchestrator_self_review_bias: true
  finding_caught_self_violation: canonical-005
    # input.yaml line 67 uses the very non-spec enum value claude-rev-043 was supposed to fix
    # Claude reviewer (methodology_critic) caught this; codex (implementation_realist) did not flag
  forced_post_exposure_framing_held: true
  no_mutation_safety_held: true       # blocked iteration produced no edits to iteration-0000 artifacts

# ---- Output paths produced by iteration-0001 ----

artifacts_produced:
  - agent-loop/active/iteration-0001/input.yaml
  - agent-loop/active/iteration-0001/review-packet.yaml
  - agent-loop/active/iteration-0001/codex-review.yaml
  - agent-loop/active/iteration-0001/claude-review.yaml
  - agent-loop/active/iteration-0001/independence-audit.yaml
  - agent-loop/active/iteration-0001/consensus.yaml
  - agent-loop/active/iteration-0001/verification.yaml
  - agent-loop/active/iteration-0001/iteration-outcome.yaml

# ---- Recommended next operator action ----

operator_action_required:
  primary: "Decide path forward on iteration-0001 blocked state"
  options:
    - id: A
      label: "Revise plan into iteration-0001-revised"
      first_steps:
        - "Address canonical-005 (input.yaml self-violation): fix the enum value the input uses to describe iteration-0000 state"
        - "Address canonical-006 (anti-regression order): change loop to validator-first-then-apply"
        - "Address canonical-007 (readiness flip risk): add explicit lock on active_contract_readiness for iteration-0001-revised duration"
        - "Re-build packet, re-dispatch reviewers"
      expected_outcome: "implementation_ready=true if methodology blockers cleared; codex's 11 patches then apply mechanically"
      effort: small_to_medium
    - id: B
      label: "Land architectural deferred_decisions as a separate v1.7.3 patch first; re-run iteration-0001 against v1.7.3"
      first_steps:
        - "Operator + codex review of canonical-004 (architectural enum widening)"
        - "Operator + codex review of canonical-006 (anti-regression order specification update)"
        - "Spec patch v1.7.3 lands"
        - "Iteration-0001 re-runs; codex patches apply"
      expected_outcome: "All 9 iteration-0000 defects resolved; spec contract tightened"
      effort: medium
    - id: C
      label: "Table iteration-0001 entirely; redirect to a different operational decision"
      first_steps:
        - "Pick alternate iteration-0001 target (different decision)"
        - "iteration-0000 known-debt remains; document in disposition-ledger as deferred"
      expected_outcome: "iteration-0001 covers something else; iteration-0000 defects defer"
      effort: small_for_iteration_0001_but_iteration_0000_debt_persists
  recommendation: "Path B (spec patch first) is most aligned with claude-rev-028 self-patch constraint and most-cleanly fulfills G5 'no new disposition/index drift'. Path A is faster but inherits architectural-deferral debt."

# ============================================================================
# POST-V1.7.4 CHECKPOINT (operator chose Path B; v1.7.4 patch landed 2026-05-08)
# ============================================================================

post_v1_7_4_checkpoint:
  written_utc: "2026-05-08T00:00:00Z"
  written_by: claude (orchestrator stand-in)
  checkpoint_purpose: "Capture state at v1.7.4 patch close before iteration-0001-revised launches; surface suggested Phase 3 plan + open questions + pushback for operator review"

  what_landed_this_phase:
    spec_patches_v1_7_4:
      - {ratification: canonical-004, target: section_13, change: "added observational_mode flag + observational_mode_enum_extensions block"}
      - {ratification: canonical-006, target: section_0,  change: "extended anti_regression_criterion with iteration_applied_changes_extension"}
      - {ratification: claude-rev-045, target: section_13, change: "locked canonical_event_name_rule on audit_log; per-agent prefixes forbidden; iteration-0000 grandfathered"}
      - {ratification: claude-rev-046, target: section_7, change: "pinned canonical_yaml_sha256 formula"}
      - {ratification: codex-q-001,    target: section_7, change: "added pre_canonical_pin_marker schema (operator chose preserve+provenance, NOT recompute)"}
    validator_code_updates:
      validate_consensus.py:
        change: "honors observational_mode flag; relaxes consensus_state / merge_method / status enums when set"
        empirical_validation: "iteration-0000/consensus.yaml drops from 14 INVALID_ENUM_VALUE to 0 when flag set"
      validate_iteration.py:
        changes:
          - "emits AUDIT_EVENT_NAME_NON_CANONICAL on per-agent prefixed event names; iteration-0000 grandfathered to low severity"
          - "honors pre_canonical_pin_marker on review yamls; PACKET_SHA_MISMATCH downgrades to PACKET_SHA_HISTORICAL (low) when both hash_convention=pre-canonical-pin and do_not_recompute=true present"
        empirical_validation: "marked-copy of iteration-0000 reviews triggers PACKET_SHA_HISTORICAL (low) instead of PACKET_SHA_MISMATCH (high); confirmed"
    bookkeeping:
      - "frontmatter: contract_version + status to v1.7.4; revision_history v1.7.4 entry"
      - "section_24: 5 resolved entries; status_counts updated (resolved 109 -> 114; pending_operator_decision 14 -> 11; new pending_iteration_0001_canonical_findings 5)"
    final_validation:
      validate_disposition_index: "0 findings on v1.7.4 spec"
      validate_iteration_on_iter_0001: "0 findings (canonical names + canonical hashes)"
      smoke_harness: "21/21"

  suggested_next_steps_for_iteration_0001_revised:
    naming_decision_required_first:
      options:
        - {id: a, label: "iteration-0001-revised", rationale: "emphasizes redo of same target; preserves iteration-0001 number for the conceptual unit"}
        - {id: b, label: "iteration-0002",         rationale: "sequential numbering; treats blocked iterations as terminal not retryable; simpler bookkeeping"}
      recommendation: "b (iteration-0002). Sequential is simpler; 'revised' is metadata not naming. iteration-0001's blocked state is preserved as historical record of the dual-reviewer pattern catching plan defects."

    plan_outline:
      step_0_naming: "Operator picks (a) or (b) above; default (b)."
      step_1_create_iteration_dir:
        path: "agent-loop/active/iteration-<NNNN>/"
      step_2_apply_pre_canonical_pin_markers_to_iteration_0000:
        rationale: "Mechanical fix per codex-q-001 disposition. Adds hash_convention: pre-canonical-pin + do_not_recompute: true to iteration-0000/codex-review.yaml + claude-review.yaml. Drops PACKET_SHA_MISMATCH (high) -> PACKET_SHA_HISTORICAL (low)."
        in_scope: true
      step_3_apply_observational_mode_to_iteration_0000:
        rationale: "Mechanical fix per canonical-004 disposition. Adds observational_mode: true to iteration-0000/consensus.yaml. Drops 14 INVALID_ENUM_VALUE findings."
        in_scope: true
      step_4_build_input_yaml:
        rules:
          - "DO NOT use non-spec enum values in input.yaml itself (canonical-005 fix). When describing iteration-0000 state, use spec-conforming form: gate_state: { consensus_state: implementation_ready, observational_mode: true } NOT consensus_state: implementation_ready_observational_only"
          - "Plan steps MUST list validators-first (canonical-006 fix). Apply step is gated by: dry-run validators on hypothetical post-edit state pass."
          - "Lock active_contract_readiness explicitly: pending_phase_0_empirical_validation for iteration duration (canonical-007 fix)."
          - "Target ONLY mechanical-fix findings: claude-rev-040 (corroborated_by strip), claude-rev-041 (partially-cleared hyphen), claude-rev-042 (no_objection_rationale text), claude-rev-044 (YAML parse error line 71), claude-rev-047 (5 missing packet fields). Plus the two mechanical applications of v1.7.4 above (steps 2-3)."
          - "Out of scope: claude-rev-048 scope_check intra-file (operator decides Phase 1+ extension); claude-rev-049..053 build-time spec ambiguities (separate operator decision)."
          - "Out of scope: iteration-0001 canonical-001 (scope_check intra-file gap; same as claude-rev-048); canonical-002 (codex-iter0001 finding about pass-20 enumeration; record as resolved-with-note); canonical-003 (corroborated_by root cause; deferred decision)."
      step_5_build_packet:
        command: "python_env\\python.exe scripts/agent_loop/build_review_packet.py build --input agent-loop/active/iteration-<NNNN>/input.yaml --out agent-loop/active/iteration-<NNNN>/review-packet.yaml"
      step_6_dispatch_reviewers:
        runtime: subagent_dispatch (parallel)
        codex_role: implementation_realist
        claude_role: methodology_critic
        independence_attestation: forced post-exposure (G4 still applies; reviewers see iteration-0000 + pass-20 + iteration-0001-blocked)
      step_7_synthesize_consensus:
        rule: "If methodology blockers from iteration-0001 (canonical-005, 006, 007) are demonstrably addressed in the new input.yaml AND no NEW methodology blockers surface, expect implementation_ready=true."
      step_8_apply_patches_if_implementation_ready:
        gate: "validators-first dry-run on hypothetical post-edit state must pass before apply (canonical-006 enforced)"
        scope: "the 5 mechanical iteration-0000 fixes + step 2 markers + step 3 observational_mode flag"
      step_9_verify_close:
        targets:
          - "validate_iteration on iteration-0000/ should drop to 0 high findings (low/informational acceptable: AUDIT_EVENT_NAME_NON_CANONICAL grandfathered to low; PACKET_SHA_HISTORICAL downgraded from PACKET_SHA_MISMATCH)"
          - "validate_review on iteration-0000/claude-review.yaml: 0 findings (after corroborated_by strip + partially-cleared fix + no_objection_rationale text)"
          - "validate_consensus on iteration-0000/consensus.yaml: 0 findings (after observational_mode: true)"
          - "validate_disposition_index: 0 findings (must hold)"
          - "smoke harness: 21/21 (must hold)"
          - "section 24 + disposition-ledger consistent (resolve claude-rev-040..047 as landed-in-iteration-<NNNN> in disposition-ledger; update status_counts)"
      effort_estimate: medium (1 turn for setup + 1 turn for reviewer dispatches + 1 turn for synthesis/apply/verify; potentially parallelizable to 2 turns if synthesis is inline)

  open_questions_for_operator:
    - id: Q1
      question: "Iteration naming: iteration-0001-revised (a) or iteration-0002 (b)?"
      recommendation: b
      blocks: step_0_naming
      can_default_if_no_response: yes (use b)

    - id: Q2
      question: "Phase 3 scope: apply patches in same iteration if implementation_ready, OR propose-only this iteration with apply in iteration-N+1?"
      context: |
        Operator's original guardrail G3 said 'may propose/apply fixes only if Phase 0 mutating
        gates are satisfied'. After v1.7.4 the gates ARE satisfied. The natural read: apply in
        iteration-<NNNN>. But the canonical-006 anti-regression rule says validators-first dry-run
        before apply within an iteration; that's enforceable.
      recommendation: "apply in same iteration; canonical-006 dry-run gate is the safety net."
      can_default_if_no_response: yes (use recommendation)

    - id: Q3
      question: "Should iteration-0001-blocked artifacts be archived (moved to agent-loop/archive/iterations/) or stay under agent-loop/active/iteration-0001/ as historical-but-active-tracked?"
      context: |
        active/ is for in-flight iterations. iteration-0001 is closed (blocked). Convention so
        far: 0000 stays under active/. Same convention applies here. But it's worth the operator
        confirming the convention rather than building habit.
      recommendation: "stay under active/. Document closing_state: blocked clearly in iteration-outcome.yaml (already done). Do not move."
      can_default_if_no_response: yes

    - id: Q4
      question: "Do we want to add automated fixture-based regression tests for the v1.7.4 validator behaviors (observational_mode + AUDIT_EVENT_NAME_NON_CANONICAL + PACKET_SHA_HISTORICAL), or rely on integration tests through real iteration runs?"
      context: |
        Phase 2 added the validator code; empirical verification via /tmp/marked-copy succeeded
        but no fixtures landed. Smoke harness still 21/21 (existing tests). v1.7.4 behaviors are
        currently verified only by inspection + iteration runs. A future cleanup pass could add
        fixtures. Cost: small. Benefit: prevents regression on these specific paths.
      recommendation: "defer to v1.7.5 cleanup; integration coverage via iteration-0001-revised is sufficient short-term."
      can_default_if_no_response: yes

    - id: Q5
      question: "OBSERVATIONAL_STATUS_EXTRA pattern coverage: validator currently matches a small literal-string set (deferred_to_v1_7, etc). Spec describes templates (deferred_to_v1_<X>). Switch to regex matching now or wait for first failure?"
      context: |
        If iteration-0002 (or iteration-0001-revised) emits 'deferred_to_v1_9' (or any version
        not in the literal set), validator flags INVALID_ENUM_VALUE. Manual list maintenance is
        OK for now but will drift. Regex is small-effort.
      recommendation: "wait for first failure; add regex if hit. YAGNI for now."
      can_default_if_no_response: yes

  pushback_or_risks_to_acknowledge:
    - id: R1
      claim: "Lessons from v1.7.4 reinforce that orchestrator self-review has bias; pass-20 was self-authored and iteration-0001 dual-reviewer caught its self-violations (canonical-005, canonical-006). Future spec patches authored by claude alone (without dual-reviewer) carry the same risk."
      mitigation: "v1.7.4 itself was claude-authored under operator direction (Path B chosen by operator). If a v1.7.5 cleanup is needed, consider a quick dual-reviewer pass on the proposed patch BEFORE landing, not after. Same pattern that caught canonical-006 would catch v1.7.5 self-violations."
      operator_decision_needed: "Should v1.7.5+ patches require pre-land dual-reviewer? Or operator-only pre-land review sufficient?"

    - id: R2
      claim: "OBSERVATIONAL_STATUS_EXTRA literal-set approach (Q5) is technical debt by design. Linked to Q5; flagging as a known-future-fix."
      mitigation: "deferred decision in disposition-ledger if Q5 answer is 'wait'."

    - id: R3
      claim: "iteration-0001 dual-reviewer pattern produced 7 canonical_findings + 11 codex patches with implementation_realist-vs-methodology_critic disagreement on overall_position. The disagreement was deterministically resolved via section 13 one-blocker rule. But the same pattern in iteration-N could produce a 50-50 split where neither side has a blocker count advantage. Section 13 doesn't have a tiebreaker for that case."
      tiebreaker_observation: "Section 13: 'one blocking objection from either agent blocks by default.' If both agents emit blockers and disagree on overall, both block; consensus is blocked. So the rule IS deterministic for the non-empty case. The risk is when both emit zero blockers but disagree on implementation_ready. Then substantive_pushback rule + assumptions_challenged + adversarial-pass kick in."
      mitigation: "no operator action; rule is deterministic for current scenarios. Flag for v1.8+ if a tiebreaker scenario surfaces."

    - id: R4
      claim: "iteration-0001-revised (or iteration-0002) will run with reviewers explicitly post-exposed to iteration-0001 + iteration-0000 + pass-20 + v1.7.4 spec patch. Independence_proof_required cannot hold; corroboration_strength: suggested_by_context for all findings. independent_finding_rate will be 0.0 by construction. This is expected per claude-rev-010 measurement_window note ('exclude tainted findings'); but if iteration-N over a 5-iteration window stays at 0.0 because every iteration is post-exposure to prior ones, the kill-switch threshold becomes meaningless."
      tactical_implication: "iteration-0002 ought to consider intercalating non-self-targeted iterations (e.g., a fresh project decision) so the kill-switch metric has signal. Or revise the metric formula to exclude iterations whose target IS prior-iteration artifacts."
      operator_decision_needed: "spec change on independent_finding_rate semantics for self-targeted iterations? Defer to v1.8."

    - id: R5
      claim: "active_contract_readiness REMAINS pending_phase_0_empirical_validation. cf-007 readiness flip mechanism still has not been exercised. iteration-0001-revised closing successfully would satisfy done_claim_rule's two technical conditions but the dedicated readiness-flip review pass per cf-007 is still required and has not been designed in detail."
      mitigation: "If iteration-0001-revised closes implementation_ready, design + run cf-007 readiness-flip review pass as a SEPARATE iteration. Do not auto-flip."

  what_NOT_to_do:
    - "Do NOT flip active_contract_readiness in this checkpoint or in iteration-0001-revised's closure. cf-007 readiness flip needs a dedicated pass per canonical-007 + cf-007 (locked-in via v1.7 + extended in canonical-007 disposition)."
    - "Do NOT modify iteration-0001 artifacts (preserved as historical record of the blocked state)."
    - "Do NOT modify spec sections 1-23 outside of the v1.7.4 work that already landed without operator + codex review (claude-rev-028)."
    - "Do NOT silently rename canonical-001..007 IDs or merge them into cf-NNN namespace; they live under iteration-0001 forever."

  ready_to_proceed_when:
    - "Operator answers Q1 (or accepts default 'b: iteration-0002')"
    - "Operator answers Q2 (or accepts default 'apply in same iteration; canonical-006 dry-run gate is safety net')"
    - "Operator authorizes iteration-0002 launch (explicit or implicit-via-no-objection-after-checkpoint)"

  default_path_if_operator_says_go_with_no_other_input:
    naming: iteration-0002
    scope: apply in same iteration with canonical-006 dry-run gate
    targets: claude-rev-040 / 041 / 042 / 044 / 047 + v1.7.4 mechanical applications (pre-canonical-pin marker + observational_mode flag)
    out_of_scope: claude-rev-048..053 + iteration-0001 canonical-001/002/003 (separate decisions)
    deferred_in_scope_but_not_landing_in_iteration_0002:
      - canonical-007 readiness-lock mechanism (operator-instruction in input.yaml; not validator-enforced)
      - corroborated_by root cause investigation (canonical-003; deferred decision recorded)
