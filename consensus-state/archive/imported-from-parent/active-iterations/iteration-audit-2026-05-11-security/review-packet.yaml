    agent-loop/active/iteration-audit-2026-05-11-security/review-target.md: "# Security\
      \ audit — agent-loop dispatch + content-embedding code\n\nAudit dimension: **security**\
      \ (path traversal, command injection, prompt injection, content exposure, secret\
      \ leakage in audit log).\n\n## Audit question for codex\n\nReview the following\
      \ code excerpts for security defects. Specific concerns (non-exclusive):\n\n\
      1. **Path traversal**: Can operator-supplied paths to `--goal-packet`, `--review-target`,\
      \ `--prompt-template`, `--schema`, or `--iteration-dir` reach files outside\
      \ repo_root via symlinks, relative-with-`..`, UNC paths, or other tricks the\
      \ containment check missed?\n2. **Command injection**: subprocess.run / Popen\
      \ invocations — is `shell=` ever True? Are user-provided strings interpolated\
      \ into commands without quoting?\n3. **Prompt injection**: when codex output\
      \ is parsed back into structured findings (citation, summary, risk text), can\
      \ a malicious codex emit content that breaks the parser or escapes downstream\
      \ context? E.g., a citation containing yaml control characters that breaks `_seal_via_t6`\
      \ writing.\n4. **Content exposure in audit log**: dispatch-log.jsonl + sealed\
      \ codex-review.yaml — is there any path where prompt content / goal_packet content\
      \ / source code content leaks into the audit log unintentionally? (The contract\
      \ is hashes only; check it holds.)\n5. **Schema-injection**: codex_review_schema.json\
      \ is loaded into prompt — if an attacker controlled it, what's the blast radius?\n\
      6. **Secret leakage**: are environment variables, AGENT_LOOP_MCP_REPO_ROOT,\
      \ codex auth tokens, etc. logged anywhere?\n\n## Files in scope (excerpts below)\n\
      \nThe full files live at the cited paths. Only the security-relevant excerpts\
      \ are embedded.\n\n---\n\n## Excerpt 1: `_dispatch_codex.py` lines 167-210 (containment)\n\
      \n```python\nclass OutsideRepoPathError(ValueError):\n    \"\"\"v1.10.5 containment\
      \ hardening: operator-supplied path resolves outside repo_root.\"\"\"\n\n\n\
      def _normalize_relative_to_repo(path_str: str | None, repo_root: Path) -> Path\
      \ | None:\n    \"\"\"Normalize an operator-supplied path against repo_root.\n\
      \    ... (docstring)\n    None passes through as None.\n    \"\"\"\n    if path_str\
      \ is None:\n        return None\n    p = Path(path_str)\n    resolved = p.resolve()\
      \ if p.is_absolute() else (repo_root / p).resolve()\n    repo_root_resolved\
      \ = repo_root.resolve()\n    contained = False\n    try:\n        resolved.relative_to(repo_root_resolved)\n\
      \        contained = True\n    except ValueError:\n        # iter-0033 claude-rev-003\
      \ fix: Path.relative_to is case-sensitive\n        # in string compare. Windows\
      \ filesystem is case-insensitive; mixed-\n        # case repo_root vs path can\
      \ trigger a false-positive containment\n        # rejection. On Windows, retry\
      \ with case-folded string compare.\n        if sys.platform == \"win32\":\n\
      \            resolved_lc = str(resolved).lower().replace(\"\\\\\", \"/\")\n\
      \            root_lc = str(repo_root_resolved).lower().replace(\"\\\\\", \"\
      /\")\n            if resolved_lc == root_lc or resolved_lc.startswith(root_lc.rstrip(\"\
      /\") + \"/\"):\n                contained = True\n    if not contained:\n  \
      \      raise OutsideRepoPathError(\n            f\"path {path_str!r} resolves\
      \ to {resolved} which is outside repo_root \"\n            f\"{repo_root_resolved}.\
      \ agent-loop-mcp dispatch only reads files inside \"\n            f\"the repo.\
      \ Move the file into the repo or pass a path relative to it.\"\n        )\n\
      \    return resolved\n```\n\n## Excerpt 2: `_dispatch_codex.py` subprocess invocation\
      \ pattern\n\n```python\ndef _invoke_codex(prompt, codex_bin, timeout_seconds,\
      \ repo_root, schema_path):\n    \"\"\"Run codex via subprocess.run with --output-schema\
      \ gated by JSON schema.\"\"\"\n    # ... codex_bin is resolved via shutil.which\
      \ earlier; never shell=True\n    proc = subprocess.run(\n        [codex_bin,\
      \ \"exec\", \"--output-schema\", str(schema_path), \"--cd\", str(repo_root),\
      \ \"-o\", out_path],\n        input=prompt.encode(\"utf-8\"),\n        capture_output=True,\n\
      \        timeout=timeout_seconds,\n        check=False,\n    )\n    # ... output\
      \ read from out_path, sha-hashed, parsed\n```\n\n## Excerpt 3: `_dispatch_codex.py`\
      \ audit-log writing\n\n```python\ndef _log_dispatch(log_path, event):\n    \"\
      \"\"Append-only JSONL audit log.\n    Secrets must NEVER be logged. The raw\
      \ subprocess cmd list is NOT passed to\n    this writer; callers log only codex_bin\
      \ (string) + schema_path (string) +\n    timeout_seconds. Raw prompt / codex\
      \ output / goal_packet content are never\n    logged; only their sha256 digests\
      \ are.\n    \"\"\"\n    log_path.parent.mkdir(parents=True, exist_ok=True)\n\
      \    event_with_ts = {\"timestamp_utc\": time.strftime(\"%Y-%m-%dT%H:%M:%SZ\"\
      , time.gmtime()), **event}\n    with log_path.open(\"a\", encoding=\"utf-8\"\
      ) as f:\n        f.write(json.dumps(event_with_ts) + \"\\n\")\n```\n\n## Excerpt\
      \ 4: codex output parsing (high-risk surface)\n\n```python\ndef _parse_codex_output(text,\
      \ goal_packet=None, review_packet=None, repo_root=None):\n    \"\"\"Parse codex's\
      \ JSON output; validate against schema invariants.\"\"\"\n    data = json.loads(text)\n\
      \    # ... iterates findings[], each finding has id/severity/summary/citation/risk/recommendation\n\
      \    # ... patch_proposal validated against _PATCH_PROPOSAL_REQUIRED / _PATCH_PROPOSAL_ALLOWED\n\
      \    # ... scope check against goal_packet allowed/forbidden_files\n    # ...\
      \ base_sha helper-stamped from review_packet.defect_target.base_sha\n```\n\n\
      ## Excerpt 5: review-packet content embedding (`_author_review_packet.py`)\n\
      \n```python\ndef author_review_packet(iteration_dir, files, repo_root):\n  \
      \  \"\"\"Embed touched-file contents into review-packet.yaml so codex can read\n\
      \    them in-prompt without filesystem access.\n    \"\"\"\n    contents = {}\n\
      \    for rel in files:\n        full = repo_root / rel\n        contents[rel]\
      \ = full.read_text(encoding=\"utf-8\")  # < attacker-controlled?\n    # ...\
      \ base_sha computed from contents; written to review-packet.yaml\n```\n\n##\
      \ What I expect codex to flag\n\nFindings I'd consider valid:\n- A path traversal\
      \ vector through the containment check I missed\n- A way for codex's emitted\
      \ finding text to break the yaml writer or pollute downstream context\n- An\
      \ audit-log path where prompt/code content leaks despite the hash-only contract\n\
      - A subprocess invocation where unquoted strings could be interpreted as shell\
      \ metachars\n\nOut of scope for this audit:\n- Performance (separate audit running\
      \ in parallel)\n- Cross-platform (separate audit running in parallel)\n- Style\
      \ / naming / docstrings\n- Bare-except patterns (separate audit running in parallel)\n"
