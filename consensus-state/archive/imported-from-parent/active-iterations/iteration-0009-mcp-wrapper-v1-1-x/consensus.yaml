    text: "Three helper flags (--prompt-template, --schema, --codex-bin) not exposed via wrapper input_schema. First two are sensible internal defaults; --codex-bin is borderline operator-facing — fold into v1.1.x+1 if/when an MCP caller needs it."
  - id: claude-iter0009-002
    severity: low
    text: "handle() raises JSONDecodeError on non-JSON helper stdout instead of returning {ok: False, error: ...}. Programming-error path only (helper always prints JSON in normal flow); accept as canonical-pattern divergence to be revisited if it ever fires in practice."
  - id: claude-iter0009-003
    severity: low
    text: "Comment imprecision around `if smoke:` vs `if smoke is None`. Behavior is correct (smoke=False omits flag); doc-only fix."
  - id: claude-iter0009-004
    severity: low
    text: "No malformed-stdout test. Add fake_main that prints 'not json' and assert handle() raises (or wraps); current tests only exercise the JSON-emitting path."

