design_notes:
  - |
    Wrapper is THIN by design: 145 lines total, of which ~80 are SCHEMA dict
    (input/output schemas as JSON Schema), ~25 are _build_argv (pure argv
    translation), ~15 are handle (stdout capture + json.loads), ~5 are
    register. No logic from _dispatch_codex.py is duplicated; the wrapper
    is purely a translation layer.

  - |
    Stdout capture via contextlib.redirect_stdout(io.StringIO()) is the
    canonical Python idiom for capturing helper stdout in-process without
    subprocess overhead. The helper only prints exactly one JSON line at
    end of main(); the wrapper strips and json.loads-es it.

  - |
    Failure path: when main() returns non-zero, the helper still prints
    a JSON dict with ok=False + error + error_type. The wrapper returns
    this dict verbatim WITHOUT raising. This matches the canonical MCP
    tool error pattern (per audit_append_event.py: errors returned as
    dicts, not raised).

  - |
    The wrapper does NOT modify _dispatch_codex.py. forbidden_files in the
    goal_packet enforces this. verify_scope confirms no out-of-scope files
    in the staged change set.

