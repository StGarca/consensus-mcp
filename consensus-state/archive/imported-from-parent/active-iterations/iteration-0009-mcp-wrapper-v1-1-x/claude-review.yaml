blocking_objections: []

non_blocking_suggestions:
  - id: claude-iter0009-001
    severity: low
    target: scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py SCHEMA
    text: |
      The wrapper omits three helper flags: "--prompt-template", "--schema",
      "--codex-bin". The first two are reasonably internal (template and
      schema paths default into the package). "--codex-bin" is more
      operator-facing — it lets a caller override the codex binary path,
      which is useful for alt-installs or test harnesses. Consider adding
      "codex_bin" as an optional input_schema property in a future minor
      bump if a real use case appears. Not blocking because the helper's
      default ("codex" on PATH) is the dominant case.

  - id: claude-iter0009-002
    severity: low
    target: scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py:140-141
    text: |
      handle() does "buf.getvalue().strip()" then "json.loads(output)". If
      the helper ever prints empty stdout or non-JSON (e.g. an argparse
      SystemExit before the JSON line, or a logging-leak that prepends a
      stray line), json.loads raises JSONDecodeError into the MCP caller.
      The canonical pattern in audit_append_event.py is to return a
      "{error: ...}" dict on failure rather than raise. Consider wrapping
      json.loads in a try/except and returning
      "{ok: False, error: 'helper produced non-JSON stdout', error_type:
      'JSONDecodeError', raw_stdout_excerpt: output[:200]}". Not blocking
      because the helper's success and managed-failure paths both print a
      single JSON line by construction; this guards against future helper
      regressions only.

  - id: claude-iter0009-003
    severity: low
    target: scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py:113
    text: |
      "if smoke:" treats both smoke=False and smoke=None as omit. Tests
      cover both cases correctly, but the docstring/comment in the file
      could be slightly more precise: it's "omit when falsy" not "omit
      when None" (which is what reviewer_id/pass_id/timeout_seconds do).
      Behavioral correctness is fine; this is a doc-clarity nit only.

  - id: claude-iter0009-004
    severity: low
    target: scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py
    text: |
      No test exercises the malformed-stdout path (helper prints empty
      string, multi-line output, or non-JSON). Adding one such test would
      pin behavior at the wrapper boundary and protect against future
      helper logging changes leaking into stdout. Not blocking — current
      tests cover all currently-reachable code paths in handle().

