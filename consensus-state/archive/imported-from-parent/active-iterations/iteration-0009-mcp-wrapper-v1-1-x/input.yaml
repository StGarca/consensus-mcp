schema_version: 1
iteration_id: iteration-0009-mcp-wrapper-v1-1-x
created_utc: '2026-05-09T00:00:00Z'
operator_directive_received: '2026-05-09'
operator_directive_quote: |
  "we want to test our agent-loop mcp on a real world scenario"
  Operator selected via clarifying questions:
    - Scenario: Self-host (agent-loop on agent-loop)
    - Success bar: Sealed codex-review.yaml + claude-review.yaml + consensus + T6 archive + T7
    - Iteration target: v1.1.x MCP wrapper for _dispatch_codex (Recommended)

iteration_class: phase_4_v1_1_x_mcp_wrapper_real_world_test
not_a_routine_iteration_because: |
  This is the first iteration that exercises the FULL quorum closure ceremony per
  the autonomy contract:
    - sealed goal_packet (scope_signature validated by _self_drive validate)
    - claude reviewer dispatch -> sealed claude-review.yaml
    - codex reviewer dispatch via _dispatch_codex helper -> sealed codex-review.yaml
      (the helper is itself the artifact under review; meta-recursive)
    - consensus.yaml synthesis from both reviews
    - T6 archive (audit.append_event events)
    - T7 closure (independence-audit + verification + iteration-outcome)
  iter-0008 closed by gate evidence only (per Round 9 F2 self-correction); iter-0009
  closes by full ceremony, demonstrating the autonomy contract end-to-end on a real
  small change.

objective: |
  Demonstrate the agent-loop MCP working end-to-end on a real-world target by
  landing the v1.1.x MCP wrapper around the proven _dispatch_codex helper
  (per project_phase_4_v1_1_x_mcp_wrapper_followup memory). The wrapper:
    - Adds tools/reviewer_dispatch_codex.py registering MCP tool reviewer.dispatch_codex
    - Calls _dispatch_codex.main(argv) in-process; captures stdout JSON; returns dict
    - Anti-scope: NO logic re-implementation; helper remains source of truth

mode: phase_4_v1_1_x_supervised_quorum_ceremony

# ---- Operator guardrails ----

operator_guardrails:
  - {id: G1, rule: "Wrapper is THIN: no helper-logic re-implementation."}
  - {id: G2, rule: "Anti-scope: scripts/agent_loop_mcp/_dispatch_codex.py is forbidden_files."}
  - {id: G3, rule: "TDD discipline: failing tests authored before implementation."}
  - {id: G4, rule: "Independence audit must show codex review on the wrapper itself, not on the helper."}
  - {id: G5, rule: "Success metric: A1-A5 acceptance gates pass without operator override."}

# ---- v1.1.x scope ----

what_v1_1_x_does:
  - "add tools/reviewer_dispatch_codex.py (~80 LOC thin wrapper)"
  - "register tool in server.py (1-line addition)"
  - "add tests/test_reviewer_dispatch_codex.py covering wrapper translation logic"
  - "drive full quorum closure on this change"

what_v1_1_x_does_NOT_do:
  - "no _dispatch_codex.py modification"
  - "no goal_packet schema change"
  - "no codex output schema change"
  - "no version bump (1.10.4 carries forward)"
  - "no other tool surface changes"

# ---- Gate state ----

gate_state:
  consensus_state: pending
  observational_mode: false
  production_state: not_ready
  production_ready: false
  production_allowed: false

# ---- Reviewer task ----

reviewer_decision_required:
  question: "Does the v1.1.x MCP wrapper meet the goal in goal_packet.yaml without scope drift?"
  must_consider:
    - "Is the wrapper THIN (no helper-logic re-implementation)?"
    - "Does the argv translation cover all operator-facing helper flags?"
    - "Are optional args correctly omitted when None?"
    - "Does the wrapper return helper JSON unchanged on success AND failure?"
    - "Does pytest cover behavior-level tests (not just structural)?"
    - "Does server.py registration follow the canonical pattern of other tools?"
    - "Are there any drift / scope-violation artifacts in the change set?"
  reviewers_must_emit:
    - goal_satisfied: bool
    - blocking_objections: list
    - rationale: string

# ---- Implementation scope ----

implementation_scope:
  allowed_files:
    - scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py
    - scripts/agent_loop_mcp/server.py
    - scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py
    - agent-loop/active/iteration-0009-mcp-wrapper-v1-1-x/
  forbidden_files:
    - scripts/agent_loop_mcp/_dispatch_codex.py
    - scripts/agent_loop_mcp/dispatch_templates/
    - scripts/agent_loop/
    - run/
    - wiki/

production_scope:
  type: deploy
  target: agent-loop-mcp-v1.10.4-with-v1.1.x-wrapper
  scope_match_mode: exact

# ---- Closure ----

closure_artifact: agent-loop/active/iteration-0009-mcp-wrapper-v1-1-x/iteration-outcome.yaml
success_criteria_per_G5:
  - "All 5 acceptance gates A1-A5 pass via _self_drive evaluate_gates"
  - "Both reviewers (claude + codex) emit goal_satisfied=true"
  - "Consensus synthesizes to consensus_state=implementation_ready"
  - "T6 archive contains: review_packet_built, both_reviews_sealed, consensus_built, iteration_closed events"
  - "Scope held: verify_scope returns in_scope=true with no out_of_scope files"
