fixes_landed:
  F2_hunk_anchored_diff_applier:
    severity: high
    target: scripts/agent_loop_mcp/tools/apply_codex_patch.py
    description: |
      _apply_unified_diff was doing pure linear text-matching, ignoring
      @@ -orig_start,orig_count +new_start,new_count @@ hunk headers. On
      files with repeated context lines the wrong occurrence could be
      silently mutated.

      Fix: parse @@ headers with _HUNK_HEADER_RE; each hunk anchored at
      orig_start - 1 (zero-indexed). Pre-hunk gap copy, body walk with
      strict context+delete-line matching at the anchored position, post-
      hunk tail copy. Hunks must arrive in increasing orig_start order
      (standard unified-diff form) or refuse with hunk_out_of_order.
      Context/delete mismatch at the anchored position refuses with
      hunk_context_mismatch (named, operator-actionable).
    test_file: scripts/agent_loop_mcp/tests/test_apply_codex_patch_hunk_anchored.py
    test_count: 4
    tests:
      - test_repeated_context_picks_correct_hunk
      - test_hunk_context_mismatch_refuses_cleanly
      - test_multi_hunk_each_anchored_to_its_own_line_numbers
      - test_repeated_context_first_hunk_targeted
  F1_crlf_base_sha_helper:
    severity: medium
    target: scripts/agent_loop_mcp/_dispatch_codex.py
    description: |
      _compute_per_patch_base_sha computed bundle_sha by encoding text
      strings from defect_target.touched_files_contents (UTF-8). On
      Windows with CRLF line endings on disk, apply.codex_patch's
      bundle_sha (which reads raw disk bytes) produced a DIFFERENT hash.
      Every helper-stamped per-patch base_sha returned base_sha_drift at
      apply time; iter-0023/0025 forced manual re-anchor for every patch.

      Fix: helper accepts optional repo_root. When supplied, defers to
      _closure_invariant.bundle_sha(repo_root, patch_files_touched) (disk
      bytes — same code path as apply.codex_patch). When repo_root is None
      (legacy unit-test path) falls back to text encoding.
      _validate_patch_proposal and _parse_codex_output thread repo_root
      through. CLI main() already resolves repo_root for codex --cd; now
      it also passes it to _parse_codex_output for the stamp.
    test_file: scripts/agent_loop_mcp/tests/test_iter_0026_crlf_base_sha.py
    test_count: 4
    tests:
      - test_helper_stamped_base_sha_matches_disk_bundle_sha_with_crlf
      - test_helper_stamped_base_sha_matches_disk_bundle_sha_with_lf
      - test_helper_no_repo_root_falls_back_to_text_encoding
      - test_helper_with_repo_root_but_file_missing_returns_disk_empty_hash
  F3_remove_obsolete_hoist_bridge:
    severity: low
    target: scripts/agent_loop_mcp/tests/test_capstone_full_fix_loop.py
    description: |
      Lines 371-385 (happy-path) + 649-660 (codex-then-codex test) manually
      hoisted nested last_mutation fields onto apply_step_landed event
      top-level. iter-0025 codex-rev-002 fixed the EMITTER side (apply
      event now puts canonical mutation fields at top-level via
      extra_fields); iter-0024 F1 fixed the READER side
      (last_mutation_from_audit merge direction). Bridge no longer
      needed.

      Fix: removed both hoist blocks; replaced with comments explaining
      iter-0024 F1 + iter-0025 codex-rev-002 made them obsolete. Capstone
      tests still pass.
    test_count_delta: 0  # tests pass without the bridge; no new tests
  F4_remaining_claude_iter0025_findings:
    severity: medium
    targets:
      - scripts/agent_loop_mcp/tools/apply_codex_patch.py
      - scripts/agent_loop_mcp/tools/loop_verify_codex_patch.py
    description: |
      Six findings from claude-iter0025-1 implementation_critic pass landed:

        F4-001 actor non-empty: _validate_actor now refuses empty/None/non-
              string id and pass_id (prior key-presence check accepted
              id="" / id=None / id=42 which corrupts audit-log provenance).

        F4-002 partial-apply rollback: apply step captures per-file
              pre-apply content BEFORE the os.replace loop. On per-file
              failure, rolls back already-applied files (write pre-apply
              text, or unlink if didn't exist pre-apply) so applied=False
              is truthful and no on-disk mutation persists.

        F4-004 /dev/null explicit refusal: `+++ /dev/null` (file deletion)
              now refuses with named reason file_deletion_unsupported
              instead of coincidentally failing via files_touched lookup.
              `--- /dev/null` (file-add) keeps working via the existing
              target.exists()==False branch — no explicit handling needed
              (per Karpathy Simplicity First: don't add code for working
              cases).

        F4-005 lazy-import drift: moved `import re` and _PATCH_ID_PATTERN
              from inside _record_verdict_handler to module level in
              loop_verify_codex_patch.py. Style consistent with the rest
              of the module.

        F4-006 record_verdict input enum: tightened SCHEMA input enum to
              {approved, corrected_resubmit, None}. "blocked" is an
              internal placeholder produced by build_inputs mode (still
              in output_schema enum); not a legal record_verdict INPUT.
              Schema and handler now agree.

        F4-007 test coverage gaps: added 3 missing test cases
              (base_sha empty, codex_review.yaml missing, diff_apply_failed
              in single-file no-side-channel path) per claude-iter0025-007.
    test_file: scripts/agent_loop_mcp/tests/test_apply_codex_patch_f4_coverage.py
    test_count: 12
    tests:
      # F4-001 (4 tests)
      - test_refuses_when_actor_id_is_empty_string
      - test_refuses_when_actor_pass_id_is_empty_string
      - test_refuses_when_actor_id_is_none
      - test_refuses_when_actor_id_is_not_string
      # F4-002 (1 test)
      - test_partial_apply_failed_rolls_back_already_applied_files
      # F4-004 (2 tests)
      - test_diff_delete_via_plus_plus_plus_dev_null_explicit_refusal
      - test_diff_add_via_dash_dash_dash_dev_null_works_explicitly
      # F4-005 (1 test)
      - test_record_verdict_handler_has_no_inline_import_re
      # F4-006 (1 test)
      - test_record_verdict_input_enum_excludes_blocked
      # F4-007 (3 tests)
      - test_refuses_when_codex_review_yaml_missing
      - test_refuses_when_base_sha_is_empty_string
      - test_refuses_diff_apply_failed_in_single_file_no_sidechannel

