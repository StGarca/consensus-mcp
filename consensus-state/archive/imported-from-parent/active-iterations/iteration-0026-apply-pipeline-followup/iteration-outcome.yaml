operational_caveats:
  - id: f4_002_rollback_best_effort
    description: |
      F4-002's rollback writes the captured pre-apply text back via write_text.
      If the rollback itself raises (e.g., filesystem full, permission revoked
      mid-operation), the error message appends rollback_errors=[...] so the
      operator can manually reconcile. Rollback is best-effort, not
      transactional — the operator's responsibility on rollback failure is
      manual git checkout / file restore.
  - id: f1_helper_repo_root_required_for_crlf_match
    description: |
      The CRLF fix is only effective when repo_root is supplied to the helper.
      Callers that hand-build patch_proposal validation (unit tests using
      _parse_codex_output(text, review_packet=...) without repo_root=) get
      the legacy text-encoding behaviour. That's intentional — they don't
      have a disk to read. Production callers (the CLI main()) always have
      a repo_root.

