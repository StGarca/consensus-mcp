schema_version: 1
pilot_id: iteration-0026-apply-pipeline-followup
ceremony_flavor: A_operator_deferred_fixes
parent_iteration: iteration-0025-apply-pipeline-flavor-b-review
goal:
  summary: Surgical followup fixes for iter-0025 deferred findings (F1-F4)
  desired_end_state: |
    iter-0026 is a Flavor A iteration (NOT Flavor B). No codex patch authorship
    needed; the operator deferred 4 findings from iter-0025's review that fell
    out of iter-0025's scope (forbidden_files restrictions or test-side fixes).

    Fixes landed in iter-0026:
      F2 (HIGH) — _apply_unified_diff respects @@ -L1,N1 +L2,N2 @@ hunk headers
        instead of pure linear text-matching. Repeated-context hunks now mutate
        the correct occurrence; mismatch at the line-anchored position refuses
        cleanly with hunk_context_mismatch.

      F1 (MEDIUM) — _compute_per_patch_base_sha in _dispatch_codex.py reads the
        actual disk bytes via bundle_sha(repo_root, files_touched) instead of
        hashing yaml-decoded UTF-8 text. Eliminates the Windows CRLF mismatch
        that forced per-patch manual re-anchor in iter-0023/0025.

      F3 (LOW) — Removed test-only hoist bridge in test_capstone_full_fix_loop.py
        (lines 371-385 + 649-660). iter-0025 codex-rev-002 fixed the EMITTER side;
        the bridge is now obsolete. Capstone still passes without it.

      F4 (MEDIUM) — Addressed remaining claude-iter0025 findings:
        001 actor non-empty check (id, pass_id must be non-empty strings)
        002 partial-apply rollback (multi-file with last-file failure -
            rollback already-applied files OR document semantics)
        004 /dev/null explicit support OR explicit refuse decision
        005 lazy-import drift audit (apply_codex_patch + loop_verify_codex_patch)
        006 record_verdict verdict-enum schema mismatch (drop "blocked" from
            record_verdict input enum)
        007 test coverage gaps (4 missing test cases for base_sha_missing,
            partial_apply_failed, codex_review_missing, diff_apply_failed)

    iter-0026 SUCCESS:
      1. pytest grows from 296 to 296+N (significant test additions expected)
      2. All 11 release gates pass after commit
      3. No forbidden_files touched
  non_goals:
    - modify closure invariant code (touched_files_contents bytes vs text is the
      F1 fix surface and lives in _dispatch_codex.py)
    - introduce new MCP tools
    - extend the codex review schema
    - bump pyproject.toml version
    - run real codex CLI
