    scripts/agent_loop_mcp/_self_drive.py: "\"\"\"Phase 4 bounded self-drive PARTIAL\
      \ helper. NOT an autonomous API executor.\n\nPer autonomy contract (wiki/audiobook-project/agent-loop/2026-05-09-autonomy-contract.md\n\
      Section 8): Phase 4 v1.0 implements Level 2 via the supervised-quorum-orchestrator\n\
      pattern. The orchestrator-LLM (caller) follows the autonomy contract on a sealed\n\
      goal_packet; this script provides PARTIAL enforcement via:\n\n  - goal_packet\
      \ schema validation (load + check required fields)\n  - scope-signature computation\
      \ + verification over the safety-critical field set\n    (goal, allowed_files,\
      \ allowed_sections, forbidden_files, max_iterations,\n    max_patch_size, validators_required,\
      \ acceptance_gates, stop_conditions,\n    operator_escalation_triggers, authorization.authorized_by)\n\
      \  - state-machine transitions recorded as canonical event types\n  - acceptance-gate\
      \ evaluation (running each `check` command + recording result)\n  - changed-files-in-scope\
      \ verification using exact-file, dir-prefix (trailing /),\n    and fnmatch glob\
      \ matchers\n  - stop-rule checks for ALL 9 contract rules (full coverage):\n\
      \      max_iteration_count_reached, patch_would_touch_forbidden_files,\n   \
      \   claude_codex_goal_satisfaction_disagreement, patch_size_exceeds_max,\n \
      \     any_acceptance_gate_returns_undefined, repeated_finding_class_unresolved,\n\
      \      cross_document_drift_detected, validator_reviewer_disagreement,\n   \
      \   closure_cross_verification_failed.\n\nThe script does NOT call Anthropic\
      \ API or dispatch reviewers; that remains the\norchestrator's job. This script\
      \ is an enforcement helper for stop-rule + scope\n+ acceptance-gate enforcement.\
      \ Reviewer dispatch + consensus synthesis remain\nout-of-band orchestrator responsibilities.\n\
      \nUSAGE\n-----\n  # 1. Validate goal_packet\n  python -m agent_loop_mcp._self_drive\
      \ validate <goal_packet.yaml>\n\n  # 2. Record state transition\n  python -m\
      \ agent_loop_mcp._self_drive transition <goal_packet.yaml> <new_state> [--note\
      \ \"<text>\"]\n\n  # 3. Check stop rules\n  python -m agent_loop_mcp._self_drive\
      \ check_stop_rules <goal_packet.yaml> <iteration_dir>\n\n  # 4. Evaluate acceptance\
      \ gates\n  python -m agent_loop_mcp._self_drive evaluate_gates <goal_packet.yaml>\n\
      \n  # 5. Verify scope (changed files match allowed_files)\n  python -m agent_loop_mcp._self_drive\
      \ verify_scope <goal_packet.yaml>\n\n  # 6. Close (combined check; pass iff\
      \ all gates green + all stop rules clear + scope clean)\n  python -m agent_loop_mcp._self_drive\
      \ close <goal_packet.yaml> <iteration_dir>\n\nOUTPUT\n------\nJSON to stdout.\
      \ Exit 0 = pass; non-zero = fail (stop rule fired or gate not met).\n\"\"\"\n\
      from __future__ import annotations\n\nimport argparse\nimport fnmatch\nimport\
      \ hashlib\nimport json\nimport os\nimport subprocess\nimport sys\nfrom pathlib\
      \ import Path\n\nimport yaml\n\n\nSTOP_RULES_REQUIRED_BY_CONTRACT = (\n    \"\
      max_iteration_count_reached\",\n    \"patch_would_touch_forbidden_files\",\n\
      \    \"patch_size_exceeds_max\",\n    \"any_acceptance_gate_returns_undefined\"\
      ,\n    \"repeated_finding_class_unresolved\",\n    \"cross_document_drift_detected\"\
      ,\n    \"validator_reviewer_disagreement\",\n    \"claude_codex_goal_satisfaction_disagreement\"\
      ,\n    \"closure_cross_verification_failed\",\n)\nSTOP_RULES_IMPLEMENTED = (\n\
      \    \"max_iteration_count_reached\",\n    \"patch_would_touch_forbidden_files\"\
      ,\n    \"claude_codex_goal_satisfaction_disagreement\",\n    \"patch_size_exceeds_max\"\
      ,\n    \"any_acceptance_gate_returns_undefined\",\n    \"repeated_finding_class_unresolved\"\
      ,\n    \"cross_document_drift_detected\",\n    \"validator_reviewer_disagreement\"\
      ,\n    \"closure_cross_verification_failed\",\n)\n\nVALID_STATES = {\n    \"\
      goal_received\",\n    \"packet_built\",\n    \"reviews_dispatched\",\n    \"\
      reviews_sealed\",\n    \"consensus_ready\",\n    \"patch_planned\",\n    \"\
      validator_dry_run_passed\",\n    \"patch_applied\",\n    \"verification_passed\"\
      ,\n    \"quorum_close_passed\",\n    \"blocked_needs_operator\",\n}\n\nTERMINAL_STATES\
      \ = {\"quorum_close_passed\", \"blocked_needs_operator\"}\n\nREQUIRED_GOAL_PACKET_FIELDS\
      \ = {\n    \"schema_version\",\n    \"pilot_id\",\n    \"goal\",\n    \"allowed_files\"\
      ,\n    \"max_iterations\",\n    \"validators_required\",\n    \"acceptance_gates\"\
      ,\n    \"stop_conditions\",\n    \"authorization\",\n}\n\n\ndef _resolve_repo_root()\
      \ -> Path:\n    override = os.environ.get(\"AGENT_LOOP_MCP_REPO_ROOT\")\n  \
      \  if override:\n        return Path(override)\n    return Path(__file__).resolve().parent.parent.parent\n\
      \n\ndef _scope_signature(goal_packet: dict) -> str:\n    \"\"\"Canonical sha256\
      \ over the safety-critical field set per Round 9 F4.\n\n    Covers every field\
      \ that constrains safety, scope, validation, or closure. Excludes\n    only\
      \ authorization.scope_signature (self-reference) and authorization.authorized_at_utc\n\
      \    (timestamp metadata). authorization.authorized_by IS signed.\n    \"\"\"\
      \n    auth = goal_packet.get(\"authorization\", {}) or {}\n    payload = {\n\
      \        \"goal\": goal_packet.get(\"goal\", {}),\n        \"allowed_files\"\
      : goal_packet.get(\"allowed_files\", []),\n        \"allowed_sections\": goal_packet.get(\"\
      allowed_sections\", []),\n        \"forbidden_files\": goal_packet.get(\"forbidden_files\"\
      , []),\n        \"max_iterations\": goal_packet.get(\"max_iterations\"),\n \
      \       \"max_patch_size\": goal_packet.get(\"max_patch_size\"),\n        \"\
      validators_required\": goal_packet.get(\"validators_required\", []),\n     \
      \   \"acceptance_gates\": goal_packet.get(\"acceptance_gates\", []),\n     \
      \   \"stop_conditions\": goal_packet.get(\"stop_conditions\", []),\n       \
      \ \"operator_escalation_triggers\": goal_packet.get(\"operator_escalation_triggers\"\
      , []),\n        \"authorized_by\": auth.get(\"authorized_by\"),\n    }\n   \
      \ canonical = yaml.safe_dump(yaml.safe_load(yaml.safe_dump(payload)), sort_keys=True)\n\
      \    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\n\ndef\
      \ _path_matches_pattern(path: str, pattern: str) -> bool:\n    \"\"\"Match a\
      \ single repo-relative path against one allowed_files / forbidden_files pattern.\n\
      \n    Semantics per Round 9 F6:\n      - exact file:        \"scripts/agent_loop_mcp/_self_drive.py\"\
      \ matches that path only\n      - directory prefix:  pattern with trailing \"\
      /\" matches any path inside that directory\n      - glob pattern:      pattern\
      \ containing *, ?, or [ goes through fnmatch.fnmatch\n      - no overmatch:\
      \      bare names like \"scripts\" do NOT match \"scripts_old/foo.py\"\n   \
      \ \"\"\"\n    if not pattern:\n        return False\n    if path == pattern:\n\
      \        return True\n    if pattern.endswith(\"/\") and path.startswith(pattern):\n\
      \        return True\n    if any(ch in pattern for ch in (\"*\", \"?\", \"[\"\
      )):\n        return fnmatch.fnmatch(path, pattern)\n    return False\n\n\ndef\
      \ _path_in_scope(path: str, patterns) -> bool:\n    return any(_path_matches_pattern(path,\
      \ p) for p in (patterns or []))\n\n\ndef _collect_changed_files(repo_root: Path)\
      \ -> list[str]:\n    \"\"\"Return the de-duplicated union of git's three change-views.\n\
      \n    Per iter-0012 F2 (codex 2026-05-10 expert verdict): the prior implementation\n\
      \    used only `git diff --cached --name-only`, which silently misses unstaged\n\
      \    edits and untracked files. An agent could edit a forbidden file without\n\
      \    staging it and bypass `patch_would_touch_forbidden_files` / scope checks.\n\
      \n    This helper covers all three:\n      1. `git diff --cached --name-only`\
      \           (staged)\n      2. `git diff --name-only`                    (unstaged\
      \ tracked)\n      3. `git ls-files --others --exclude-standard` (untracked,\
      \ gitignore-honoring)\n\n    Subprocess failures on any individual view are\
      \ absorbed (same graceful\n    behavior as the prior cached-only path); whatever\
      \ could be collected is\n    returned. Returns sorted unique repo-relative paths.\
      \ Empty list if all\n    three fail or there are no changes.\n    \"\"\"\n \
      \   seen: set[str] = set()\n    invocations = [\n        [\"git\", \"diff\"\
      , \"--cached\", \"--name-only\"],\n        [\"git\", \"diff\", \"--name-only\"\
      ],\n        [\"git\", \"ls-files\", \"--others\", \"--exclude-standard\"],\n\
      \    ]\n    for cmd in invocations:\n        try:\n            r = subprocess.run(\n\
      \                cmd,\n                cwd=str(repo_root),\n               \
      \ capture_output=True,\n                text=True,\n                check=False,\n\
      \                timeout=30,\n            )\n            for ln in r.stdout.splitlines():\n\
      \                p = ln.strip()\n                if p:\n                   \
      \ seen.add(p)\n        except Exception:\n            # Best-effort: silently\
      \ skip this view, like the prior cached-only\n            # path did via the\
      \ outer try/except in callers. Callers may surface\n            # the failure\
      \ as a 'git_check_failed' breadcrumb separately.\n            continue\n   \
      \ return sorted(seen)\n\n\ndef cmd_validate(args) -> int:\n    \"\"\"Validate\
      \ goal_packet schema; recompute scope_signature; verify match.\"\"\"\n    packet\
      \ = yaml.safe_load(Path(args.goal_packet).read_text(encoding=\"utf-8\"))\n \
      \   missing = REQUIRED_GOAL_PACKET_FIELDS - set(packet.keys())\n    if missing:\n\
      \        print(json.dumps({\"valid\": False, \"error\": \"missing_required_fields\"\
      , \"missing\": sorted(missing)}))\n        return 1\n    auth = packet.get(\"\
      authorization\", {})\n    if \"authorized_by\" not in auth or auth.get(\"authorized_by\"\
      ) != \"operator\":\n        print(json.dumps({\"valid\": False, \"error\": \"\
      authorization_missing_or_not_operator\"}))\n        return 1\n    expected_sig\
      \ = _scope_signature(packet)\n    recorded_sig = auth.get(\"scope_signature\"\
      )\n    sig_match = recorded_sig == expected_sig\n    print(json.dumps({\n  \
      \      \"valid\": True,\n        \"pilot_id\": packet[\"pilot_id\"],\n     \
      \   \"scope_signature_match\": sig_match,\n        \"scope_signature_expected\"\
      : expected_sig,\n        \"scope_signature_recorded\": recorded_sig,\n     \
      \   \"allowed_files_count\": len(packet[\"allowed_files\"]),\n        \"acceptance_gates_count\"\
      : len(packet[\"acceptance_gates\"]),\n        \"max_iterations\": packet[\"\
      max_iterations\"],\n    }))\n    return 0 if sig_match else 2\n\n\ndef cmd_transition(args)\
      \ -> int:\n    \"\"\"Record state transition. State must be in VALID_STATES.\"\
      \"\"\n    if args.new_state not in VALID_STATES:\n        print(json.dumps({\"\
      ok\": False, \"error\": \"invalid_state\", \"valid_states\": sorted(VALID_STATES)}))\n\
      \        return 1\n    print(json.dumps({\n        \"ok\": True,\n        \"\
      state\": args.new_state,\n        \"terminal\": args.new_state in TERMINAL_STATES,\n\
      \        \"note\": args.note,\n    }))\n    return 0\n\n\ndef _evaluate_one_gate(gate:\
      \ dict, repo_root: Path) -> dict:\n    \"\"\"Evaluate a single acceptance gate.\
      \ Returns the per-gate result dict.\n\n    Result-dict keys (per cmd_evaluate_gates\
      \ contract):\n      - id: gate id\n      - passed: bool\n      - One of:\n \
      \         exit_code + stdout_tail (clean run)\n          error: \"no_check_command\"\
      \  (empty/missing check field)\n          exception: <str>           (subprocess\
      \ raised)\n    \"\"\"\n    gate_id = gate.get(\"id\", \"?\")\n    check = gate.get(\"\
      check\", \"\")\n    if not check:\n        return {\"id\": gate_id, \"passed\"\
      : False, \"error\": \"no_check_command\"}\n    try:\n        r = subprocess.run(check,\
      \ shell=True, cwd=str(repo_root), capture_output=True, text=True, timeout=120)\n\
      \        return {\n            \"id\": gate_id,\n            \"passed\": r.returncode\
      \ == 0,\n            \"exit_code\": r.returncode,\n            \"stdout_tail\"\
      : r.stdout.splitlines()[-1] if r.stdout else \"\",\n        }\n    except Exception\
      \ as exc:\n        return {\"id\": gate_id, \"passed\": False, \"exception\"\
      : str(exc)}\n\n\ndef _read_yaml_or_empty(path: Path) -> dict:\n    \"\"\"Best-effort\
      \ yaml load; returns {} on missing/parse failure rather than raising.\"\"\"\n\
      \    try:\n        if not path.exists():\n            return {}\n        loaded\
      \ = yaml.safe_load(path.read_text(encoding=\"utf-8\"))\n        return loaded\
      \ if isinstance(loaded, dict) else {}\n    except Exception:\n        return\
      \ {}\n\n\ndef _extract_goal_satisfied(review: dict):\n    \"\"\"Pull goal_satisfied\
      \ from a review yaml. Try top-level first, then overall_position.\n\n    Returns\
      \ the value (typically bool) or None if not present.\n    \"\"\"\n    if \"\
      goal_satisfied\" in review:\n        return review.get(\"goal_satisfied\")\n\
      \    op = review.get(\"overall_position\") or {}\n    if isinstance(op, dict)\
      \ and \"goal_satisfied\" in op:\n        return op.get(\"goal_satisfied\")\n\
      \    return None\n\n\ndef _extract_finding_ids(review: dict, *, kind: str) ->\
      \ set:\n    \"\"\"Pull finding ids from a review yaml. Tolerates either claude\
      \ or codex shape.\n\n    kind=\"claude\" -> non_blocking_suggestions[].id (also\
      \ blocking_objections[].id)\n    kind=\"codex\"  -> findings[].id (also blocking_objections[].id)\n\
      \    \"\"\"\n    ids = set()\n    if not isinstance(review, dict):\n       \
      \ return ids\n    if kind == \"claude\":\n        for entry in (review.get(\"\
      non_blocking_suggestions\") or []):\n            if isinstance(entry, dict)\
      \ and entry.get(\"id\"):\n                ids.add(entry[\"id\"])\n        for\
      \ entry in (review.get(\"blocking_objections\") or []):\n            if isinstance(entry,\
      \ dict) and entry.get(\"id\"):\n                ids.add(entry[\"id\"])\n   \
      \ elif kind == \"codex\":\n        for entry in (review.get(\"findings\") or\
      \ []):\n            if isinstance(entry, dict) and entry.get(\"id\"):\n    \
      \            ids.add(entry[\"id\"])\n        for entry in (review.get(\"blocking_objections\"\
      ) or []):\n            if isinstance(entry, dict) and entry.get(\"id\"):\n \
      \               ids.add(entry[\"id\"])\n    return ids\n\n\ndef _canonical_sha256_of_yaml_file(p:\
      \ Path) -> str:\n    \"\"\"Canonical-full sha256: hashlib.sha256(yaml.safe_dump(yaml.safe_load(...),\
      \ sort_keys=True)).\n\n    Matches the canonical-full form used everywhere else\
      \ in this package\n    (audit_append_event._canonical_sha256, review_write_and_seal,\
      \ etc.).\n    \"\"\"\n    loaded = yaml.safe_load(p.read_text(encoding=\"utf-8\"\
      ))\n    canonical = yaml.safe_dump(loaded, sort_keys=True)\n    return hashlib.sha256(canonical.encode(\"\
      utf-8\")).hexdigest()\n\n\ndef _resolve_referenced_path(ref_path: str, iter_dir:\
      \ Path) -> Path:\n    \"\"\"Resolve a reference path string (typically repo-relative)\
      \ into a Path.\n\n    Heuristics:\n      1. If absolute, return as-is.\n   \
      \   2. Try repo_root / ref_path (the canonical case for iteration_artifacts).\n\
      \      3. Fall back to iter_dir / basename(ref_path).\n    Returned path may\
      \ not exist; callers must check.\n    \"\"\"\n    p = Path(ref_path)\n    if\
      \ p.is_absolute():\n        return p\n    repo_root = _resolve_repo_root()\n\
      \    candidate = repo_root / ref_path\n    if candidate.exists():\n        return\
      \ candidate\n    # Iteration-dir-local fallback (e.g., test fixtures, or runtime\
      \ where ref is iter-relative)\n    return iter_dir / Path(ref_path).name\n\n\
      \ndef cmd_check_stop_rules(args) -> int:\n    \"\"\"Check the implemented stop\
      \ rules against current state. Return non-zero if any fire.\n\n    NOTE (post-task\
      \ #28): full 9/9 contract coverage (closure_cross_verification_failed\n    added).\
      \ Runtime is O(gate_count x\n    per_gate_runtime) because 'any_acceptance_gate_returns_undefined'\
      \ re-evaluates\n    each gate, plus O(referenced_files) canonical-sha recomputation\
      \ for\n    'cross_document_drift_detected'. For goal_packets with expensive\
      \ gates this\n    function can take minutes. Callers that need fast metadata-only\
      \ checks should\n    structure their loop to avoid repeated invocations.\n \
      \   \"\"\"\n    packet = yaml.safe_load(Path(args.goal_packet).read_text(encoding=\"\
      utf-8\"))\n    iter_dir = Path(args.iteration_dir)\n\n    stop_rules_fired =\
      \ []\n\n    audit_path = iter_dir / \"independence-audit.yaml\"\n    iter_count\
      \ = 0\n    if audit_path.exists():\n        audit = yaml.safe_load(audit_path.read_bytes())\
      \ or {}\n        log = audit.get(\"audit_log\", []) or []\n        iter_count\
      \ = sum(1 for e in log if e.get(\"event\") == \"patch_applied\")\n\n    if iter_count\
      \ >= packet.get(\"max_iterations\", 0):\n        stop_rules_fired.append({\"\
      rule\": \"max_iteration_count_reached\", \"count\": iter_count, \"max\": packet.get(\"\
      max_iterations\", 0)})\n\n    forbidden = packet.get(\"forbidden_files\", [])\n\
      \    repo_root = _resolve_repo_root()\n    try:\n        # iter-0012 F2: union\
      \ of staged + unstaged + untracked, not just staged.\n        # See _collect_changed_files\
      \ docstring for the safety-gap rationale.\n        changed = _collect_changed_files(repo_root)\n\
      \        for forbidden_path in forbidden:\n            for c in changed:\n \
      \               if _path_matches_pattern(c, forbidden_path):\n             \
      \       stop_rules_fired.append({\"rule\": \"patch_would_touch_forbidden_files\"\
      , \"forbidden\": forbidden_path, \"changed\": c})\n    except Exception as exc:\n\
      \        stop_rules_fired.append({\"rule\": \"git_check_failed\", \"exception\"\
      : str(exc)})\n\n    # Rule: claude_codex_goal_satisfaction_disagreement\n  \
      \  # Fires iff BOTH claude-review.yaml and codex-review.yaml exist AND their\n\
      \    # goal_satisfied values differ. If either review is missing the loop is\
      \ in\n    # flight; not yet a disagreement.\n    #\n    # If a review file EXISTS\
      \ but fails YAML parse, record a\n    # 'review_yaml_parse_failed' breadcrumb\
      \ (parallel to existing\n    # git_check_failed precedent below) so the operator\
      \ gets a signal\n    # rather than a silent no-fire.\n    claude_path = iter_dir\
      \ / \"claude-review.yaml\"\n    codex_path = iter_dir / \"codex-review.yaml\"\
      \n    for review_path in (claude_path, codex_path):\n        if review_path.exists():\n\
      \            try:\n                yaml.safe_load(review_path.read_text(encoding=\"\
      utf-8\"))\n            except Exception as exc:\n                stop_rules_fired.append({\n\
      \                    \"rule\": \"review_yaml_parse_failed\",\n             \
      \       \"path\": str(review_path),\n                    \"exception\": str(exc),\n\
      \                })\n    if claude_path.exists() and codex_path.exists():\n\
      \        claude_review = _read_yaml_or_empty(claude_path)\n        codex_review\
      \ = _read_yaml_or_empty(codex_path)\n        claude_gs = _extract_goal_satisfied(claude_review)\n\
      \        codex_gs = _extract_goal_satisfied(codex_review)\n        if claude_gs\
      \ is not None and codex_gs is not None and claude_gs != codex_gs:\n        \
      \    stop_rules_fired.append({\n                \"rule\": \"claude_codex_goal_satisfaction_disagreement\"\
      ,\n                \"claude_goal_satisfied\": claude_gs,\n                \"\
      codex_goal_satisfied\": codex_gs,\n                \"reason\": f\"claude.goal_satisfied={claude_gs},\
      \ codex.goal_satisfied={codex_gs}, disagree\",\n            })\n\n    # Rule:\
      \ patch_size_exceeds_max\n    # Sum added+deleted across `git diff --cached\
      \ --numstat` (or `--numstat HEAD`\n    # if nothing staged). Fire iff total\
      \ > max_patch_size. None/0 cap = no fire.\n    max_patch_size = packet.get(\"\
      max_patch_size\")\n    if max_patch_size:\n        try:\n            ns = subprocess.run(\n\
      \                [\"git\", \"diff\", \"--cached\", \"--numstat\"],\n       \
      \         cwd=str(repo_root),\n                capture_output=True,\n      \
      \          text=True,\n                check=False,\n                timeout=30,\n\
      \            )\n            numstat_text = ns.stdout\n            if not numstat_text.strip():\n\
      \                ns = subprocess.run(\n                    [\"git\", \"diff\"\
      , \"--numstat\", \"HEAD\"],\n                    cwd=str(repo_root),\n     \
      \               capture_output=True,\n                    text=True,\n     \
      \               check=False,\n                    timeout=30,\n            \
      \    )\n                numstat_text = ns.stdout\n            total = 0\n  \
      \          for line in numstat_text.splitlines():\n                parts = line.split(\"\
      \\t\")\n                if len(parts) < 2:\n                    continue\n \
      \               # Binary files report \"-\\t-\"; treat as 0\n              \
      \  try:\n                    added = int(parts[0]) if parts[0] != \"-\" else\
      \ 0\n                    deleted = int(parts[1]) if parts[1] != \"-\" else 0\n\
      \                except ValueError:\n                    continue\n        \
      \        total += added + deleted\n            if total > max_patch_size:\n\
      \                stop_rules_fired.append({\n                    \"rule\": \"\
      patch_size_exceeds_max\",\n                    \"patch_size\": total,\n    \
      \                \"max\": max_patch_size,\n                    \"reason\": f\"\
      patch_size={total}, max={max_patch_size}\",\n                })\n        except\
      \ Exception:\n            # Treat git failure as missing-data; do not fire (matches\
      \ existing\n            # git_check_failed precedent for the forbidden-files\
      \ branch).\n            pass\n\n    # Rule: any_acceptance_gate_returns_undefined\n\
      \    # In-process re-evaluation of every acceptance_gate. A gate is \"undefined\"\
      \n    # iff its result dict has key `exception` or key `error == 'no_check_command'`.\n\
      \    undefined_gates = []\n    for gate in packet.get(\"acceptance_gates\",\
      \ []) or []:\n        result = _evaluate_one_gate(gate, repo_root)\n       \
      \ if \"exception\" in result:\n            undefined_gates.append({\"id\": result[\"\
      id\"], \"kind\": \"exception\", \"detail\": result[\"exception\"]})\n      \
      \  elif result.get(\"error\") == \"no_check_command\":\n            undefined_gates.append({\"\
      id\": result[\"id\"], \"kind\": \"no_check_command\"})\n    if undefined_gates:\n\
      \        stop_rules_fired.append({\n            \"rule\": \"any_acceptance_gate_returns_undefined\"\
      ,\n            \"undefined_gates\": undefined_gates,\n            \"reason\"\
      : f\"{len(undefined_gates)} gate(s) undefined: \" + \", \".join(\n         \
      \       f\"{g['id']}({g['kind']})\" for g in undefined_gates\n            ),\n\
      \        })\n\n    # Rule: repeated_finding_class_unresolved\n    # A non-blocking\
      \ finding with the same id appears in BOTH current iteration's\n    # review\
