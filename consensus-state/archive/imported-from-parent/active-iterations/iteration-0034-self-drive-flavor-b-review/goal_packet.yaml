schema_version: 1
pilot_id: iteration-0034-self-drive-flavor-b-review
goal:
  summary: Flavor B subsystem review of _self_drive.py stop-rule subsystem (deferred from iter-0031).
  desired_end_state: |
    iter-0034 is the SIXTH subsystem-wide Flavor B review of agent-loop code,
    re-running the abandoned iter-0031 target via the external codex-cli
    pattern that succeeded for iter-0023/0025/0027/0029/0032 (the iter-0031
    failure mode was in-process subagent stall; iter-0034 uses external
    codex-cli only, no in-process subagent re-dispatch).

    Files in scope (NARROW — 2 files):
      - scripts/agent_loop_mcp/_self_drive.py (895 lines)
          STOP_RULES_REQUIRED_BY_CONTRACT (line 67) + STOP_RULES_IMPLEMENTED
          (line 78), validate/transition/check_stop_rules CLI subcommands,
          path-matching helpers, gate evaluation, finding extraction.
      - scripts/agent_loop_mcp/tests/test_self_drive_stop_rules.py (1329 lines)
          Test coverage of the 9 implemented stop rules + helpers.

    The self_drive subsystem is the iteration-lifecycle stop-rule evaluator.
    It runs after the supervisor (iter-0029 reviewed) decides to evaluate
    stop conditions and BEFORE apply.codex_patch (iter-0025/0026 reviewed) /
    closure-certificate (iter-0023/0024 reviewed). Bugs here either:
      - Allow forbidden transitions (e.g., closing with unresolved blocking
        findings, applying patches that escape allowed_files scope, missing
        cross-AI verification when required)
      - Surface false-positive stops (burning operator cycles)
      - Drift from the 9-rule contract (STOP_RULES_REQUIRED_BY_CONTRACT
        vs STOP_RULES_IMPLEMENTED list inconsistency)

    What to look for (reviewer prompt — non-exclusive):
      1. Stop-rule completeness: do STOP_RULES_REQUIRED_BY_CONTRACT and
         STOP_RULES_IMPLEMENTED match? Is each rule actually fired
         somewhere in cmd_check_stop_rules() body?
      2. Forbidden-files detection: does _path_matches_pattern correctly
         handle glob patterns (including directory prefixes like "run/",
         "wiki/")? Any bypass via symlinks, ".." parent dirs, or absolute
         paths that don't normalize?
      3. Closure cross-verification: does the closure_cross_verification_
         failed rule actually consume the iter-0023 closure_invariant
         output? Does it fail-closed when invariant_checks not all PASS?
      4. Patch-size enforcement: max_patch_size comparison correct? Any
         off-by-one on counting unified_diff lines vs hunk lines vs
         context lines?
      5. Goal-satisfied disagreement: claude_codex_disagree_on_goal_
         satisfied rule — what if one reviewer omits goal_satisfied?
         Treated as disagreement, agreement, or skipped?
      6. Cross-finding overlap blocking: if claude flags HIGH and codex
         declines to flag, what's the stop_rule outcome? Conservative
         (block) or permissive (close)?
      7. Validator subprocess failure handling: cmd_validate runs
         configured validators_required as subprocesses; what if a
         validator fails to launch (missing python, missing module)?
         Reported as validator failure or stop_rule abort?
      8. Goal-driven verification adherence (Karpathy #4): does each
         stop_rule have a verifiable falsification test in the test file?
      9. Surgical changes adherence (Karpathy #3): are there any unused
         imports, dead branches, or commented-out code introduced piecemeal
         in past iterations?
      10. CLAUDE.md no-assumption rule: does the code anywhere act on a
          conclusion without first testing it (e.g., trust an event field
          without verifying its type/format)?

    A real codex reviewer (codex-cli) is dispatched against the
    review-packet (which embeds the 2 touched-file contents per
    iter-0021). Findings emit either patch_proposal (preferred under
    fix_author_policy=strict) or patch_not_proposed_reason.

    iter-0034 SUCCESS = the full Flavor B cycle closes:
      1. Codex emits findings against the 2 files
      2. For each finding with patch_proposal: claude verifier runs
      3. Approved patches land via apply.codex_patch (workflow #1)
         OR claude proposes via workflow #4 if codex declines authorship
      4. closure-certificate.yaml: invariant_checks PASS, overall PASS
      5. iteration_closed event recorded

    If codex emits zero defects: goal_satisfied=true; close immediately
    without mutation (trivial closure-certificate pass per iter-0027
    / iter-0029 / iter-0032 model).
  non_goals:
    - modify any agent_loop_mcp source file outside the 2-file scope
    - modify _closure_invariant.py / _validate_closure_invariant.py
      (iter-0023/0024 covered)
    - modify _dispatch_codex.py / codex template / codex schema
      (iter-0027/0028/0033 covered)
    - modify apply pipeline code (iter-0025/0026 covered)
    - modify supervisor (iter-0029/0030 covered)
    - modify visibility TUI (iter-0032/0033 covered)
    - bump pyproject.toml version
    - introduce new MCP tools
allowed_files:
  - scripts/agent_loop_mcp/_self_drive.py
  - scripts/agent_loop_mcp/tests/test_self_drive_stop_rules.py
  - agent-loop/active/iteration-0034-self-drive-flavor-b-review/
allowed_sections: []
forbidden_files:
  - scripts/agent_loop_mcp/_closure_invariant.py
  - scripts/agent_loop_mcp/_validate_closure_invariant.py
  - scripts/agent_loop_mcp/_dispatch_codex.py
  - scripts/agent_loop_mcp/_author_review_packet.py
  - scripts/agent_loop_mcp/_release_gate_check.py
  - scripts/agent_loop_mcp/_visibility_tui.py
  - scripts/agent_loop_mcp/server.py
  - scripts/agent_loop_mcp/tool_registry.py
  - scripts/agent_loop_mcp/tools/
  - scripts/agent_loop_mcp/dispatch_templates/
  - scripts/agent_loop_mcp/tests/test_closure_invariant.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch_multifile.py
  - scripts/agent_loop_mcp/tests/test_loop_verify_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_loop_run_goal.py
  - scripts/agent_loop_mcp/tests/test_capstone_full_fix_loop.py
  - scripts/agent_loop_mcp/tests/test_dispatch_codex.py
  - scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py
  - scripts/agent_loop_mcp/tests/test_visibility_tui.py
  - scripts/agent_loop_mcp/tests/test_iter_0018_cross_ai_invariant.py
  - scripts/agent_loop_mcp/tests/test_iter_0022_base_sha_stamp.py
  - scripts/agent_loop_mcp/tests/test_iter_0024_per_patch_base_sha.py
  - scripts/agent_loop_mcp/tests/test_iter_0026_crlf_base_sha.py
  - run/
  - wiki/
  - pyproject.toml
  - requirements.txt
max_iterations: 2
max_patch_size: 400
fix_author_policy: strict
validators_required:
  - validate_disposition_index
acceptance_gates:
  - id: A1
    description: pytest still green after any landed patches
    check: 'python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/test_self_drive_stop_rules.py -q'
  - id: A2
    description: closure-certificate.yaml exists with overall PASS
    check: 'python -c "import yaml,sys; c=yaml.safe_load(open(''agent-loop/active/iteration-0034-self-drive-flavor-b-review/closure-certificate.yaml'')); sys.exit(0 if c[''overall'']==''PASS'' else 1)"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
  - any_acceptance_gate_returns_undefined
  - claude_codex_disagree_on_goal_satisfied
  - closure_cross_verification_failed
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-11T01:15:00Z'
  codex_patch_apply_authorized: true
  scope_signature: e6c7bfe47569fd17d7d6555ab215ae9c88e3c0de7bbbe19b2083c8282823353a
