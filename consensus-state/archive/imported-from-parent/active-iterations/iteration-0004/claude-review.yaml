self_resolved_questions:
  - question: "Does iteration-0004 apply both mechanical_now items (claude-rev-052 + 053) in a single canonical-006 dry-run, or two separate dry-runs?"
    self_resolution: |
      Single dry-run with both edits staged together is correct per anti_regression_criterion's
      iteration_applied_changes_extension (canonical-006). The two edits are independent
      (different sections) and commute; running them as one staging set is the smaller
      validator surface and matches iteration-0002 / iteration-0003 precedent (both staged
      multi-edit changes through a single dry-run gate).
  - question: "Can canonical-005 be considered fully resolved when no spec rule was added?"
    self_resolution: |
      Yes, per Karpathy #2 Simplicity First. The pattern is "iteration discipline working".
      Adding a spec rule for input.yaml enum compliance solves a problem that hasn't
      recurred in 3 iterations and would expand sections beyond iteration-0004 scope. The
      ledger entry documents the behavioral resolution as evidence; future drift gets
      caught by validate_consensus.py once observational_mode flag is present (already
      v1.7.4 ratified for canonical-004 / claude-rev-043 path).
  - question: "Should canonical-007 be marked resolved if cf-007 itself is still pending?"
    self_resolution: |
      Yes, but with explicit two-clause wording. canonical-007 the FINDING was 'readiness-flip
      risk requiring active_contract_readiness lock during iteration'. The lock pattern is
      now standard (iter-0002 + iter-0003 + iter-0004 inputs all carry it). cf-007 the FLIP-GATE
      is a separate next-step review pass. Conflating them is the precise risk
      claude-iter0004-claude-003 calls out; the resolution wording must keep them distinct.

