implementation_risks:
  - id: claude-iter0004-risk-001
    risk: |
      Mechanical_now items (claude-rev-052 + 053) edit the same spec md file
      that scope_check.py cannot enforce intra-file regions for (claude-rev-048).
      An implementer who reads more than the bounded blocks risks adjacent
      edits in sections 1-6 + 8-15 + 17-23 (forbidden by iteration-0004
      input.yaml). The honor system is the only enforcement until claude-rev-048
      resolves at Phase 1.
    mitigation: |
      canonical-006 dry-run output MUST be inspected pre-apply; a diff that
      touches anything outside frontmatter / section 7 required_packet_fields
      / section 16 phase0_validators list / section 24 status_counts is a
      scope violation and the apply must be aborted, even if the validators
      are clean.
  - id: claude-iter0004-risk-002
    risk: |
      Closing iteration-0004 with all 11 items dispositioned could be
      mis-read as "phase 0 closed; ready for production". It is not. cf-007
      readiness-flip review is the still-pending gate. next_required_action
      update is load-bearing.
    mitigation: |
      Frontmatter next_required_action explicitly names cf-007 readiness-flip
      review as the next step; iteration-outcome.yaml repeats this in
      next_iteration_recommendations; ledger v1_7_X application_log records
      "active_contract_readiness UNCHANGED".
  - id: claude-iter0004-risk-003
    risk: |
      canonical-003 dropped without root-cause investigation. If
      corroborated_by re-emerges in iteration-0005+, the drop is reopened
      under will-revisit-if-recurs. Risk is small (3 iterations clean) but
      non-zero.
    mitigation: |
      Ledger entry for canonical-003 carries explicit will-revisit-if-recurs
      tag; future reviewers should grep for it before re-reporting.

