      \  rationale: |\n    Phase 0 may run before decision-ledger.yaml exists (e.g.,\
      \ iterations\n    that consult disposition-ledger.yaml only). The schema accommodates\n\
      \    this without forcing the builder to fabricate or omit. Phase 1+ MCP\n \
