schema_version: 1
pilot_id: iteration-0036-subagent-watchdog
goal:
  summary: Workflow #4 fix cycle landing Task #43 — subagent dispatch watchdog + external-process fallback policy.
  desired_end_state: |
    iter-0036 lands the action half of the iter-0031 abandonment lesson.
    The TUI (iter-0032/0033) provides observation: it sees stalled
    dispatches and flags them STALL/ALERT. The watchdog (this iteration)
    provides ACTION: detects stale orphans, writes a synthetic
    `dispatch_stalled` audit event so the orphan transitions from "active"
    to "terminal" in the audit log + TUI display, and recommends the
    external-process fallback re-dispatch pattern.

    Files in scope:
      - NEW: scripts/agent_loop_mcp/_visibility_watchdog.py
      - EDIT: scripts/agent_loop_mcp/_visibility_tui.py
        (recognize `dispatch_stalled` as terminal event in
        _assemble_dispatches; same pairing semantics as dispatch_failed)
      - NEW: scripts/agent_loop_mcp/tests/test_visibility_watchdog.py
      - EDIT: scripts/agent_loop_mcp/_release_gate_check.py (bump dispatch
        baseline if any new test lands there, else unchanged)

    Watchdog design (concretely):
      1. Scan agent-loop/state/dispatch-log.jsonl for dispatch_start events
         without matching terminal event (dispatch_done | dispatch_failed
         | dispatch_refused | dispatch_stalled), keyed by (iteration_id,
         pass_id) consistent with iter-0033 codex-rev-002 fix.
      2. Compute wall-time age vs configurable thresholds:
           - warn_threshold (default 300s = 5 min): age >= here = warn
           - stall_threshold (default 600s = 10 min): age >= here = stale
      3. For stale orphans in action=mark mode: append a synthetic
         `dispatch_stalled` audit event to dispatch-log.jsonl with all
         pre-normalize anchors (iteration_id / reviewer_id / pass_id),
         stall_reason="watchdog_timeout", original_start_timestamp_utc,
         age_seconds, watchdog_run_utc.
      4. Report mode (default): no mutation; structured JSON output + rc=1
         if any stale, rc=0 otherwise.
      5. Recommendation: each stale entry's JSON output includes a
         suggested re-dispatch command line using the external codex-cli
         pattern (per operator-locked workflow #4 + iter-0031 lesson:
         in-process subagent dispatch is fragile; external codex-cli
         is the proven recovery path).

    EXTERNAL-PROCESS FALLBACK POLICY (NEW IN CLAUDE.md OR MEMORY):
      Any codex re-dispatch following a stalled in-process subagent dispatch
      MUST use the external codex-cli pattern (python -m agent_loop_mcp.
      _dispatch_codex …). In-process subagent re-dispatch is the failure
      mode documented in iter-0031 cleanup commit a2a329b2.

    iter-0036 SUCCESS = workflow #4 closes:
      1. proposed-patches.md authored (includes new-file content + 1 diff)
      2. review-packet embeds proposed-patches.md + touched code
      3. Codex pre-review dispatched against the embedded review-packet
      4. Claude integrates any codex feedback BEFORE implementation
      5. Claude implements integrated patches via Write + Edit
      6. Regression tests added (≥ 5 new tests)
      7. pytest still green; smoke 60/60; gates 11/11
      8. iteration-outcome.yaml closes quorum_close_passed
  non_goals:
    - delete or modify existing audit events (append-only log invariant)
    - retroactively change dispatch-log.jsonl shape for prior entries
    - implement subagent timeout at the Claude harness level (out of
      codebase scope; we work via audit-log signals)
    - re-dispatch the historical iter-0031-2 orphan (operator decision)
    - bump pyproject.toml version
    - introduce new MCP tools
