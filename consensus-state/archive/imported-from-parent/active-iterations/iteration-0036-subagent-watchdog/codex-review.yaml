iteration_id: iteration-0036-subagent-watchdog
reviewer_id: codex-iter0036-2
pass_id: codex-iter0036-2-pass1
findings:
- id: codex-rev-001
  severity: high
  summary: Watchdog terminal-event set omits dispatch_refused, so refused dispatches
    can be misclassified as stale orphans.
  citation: agent-loop/active/iteration-0036-subagent-watchdog/design-plan.md:172
  risk: The desired watchdog must pair starts with dispatch_done, dispatch_failed,
    dispatch_refused, or dispatch_stalled. Leaving out dispatch_refused can cause
    the watchdog to append a false dispatch_stalled event for a dispatch that already
    ended as refused, corrupting audit/TUI state.
  recommendation: Update the watchdog design and implementation target to include
    dispatch_refused as a terminal event with the same pairing semantics as dispatch_failed
    and dispatch_stalled.
  patch_not_proposed_reason: Only design-plan.md was embedded; the in-scope implementation
    files needed for an exact unified diff were not provided.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: The stale marker reason drifts from the required stall_reason value.
  citation: agent-loop/active/iteration-0036-subagent-watchdog/design-plan.md:61
  risk: The desired end state requires mark mode to append dispatch_stalled with stall_reason="watchdog_timeout".
    The design instead specifies watchdog_orphan_detected, which can break downstream
    consumers and tests that key on the required reason.
  recommendation: Use stall_reason="watchdog_timeout" for synthetic dispatch_stalled
    events, and reserve any more detailed explanation for a separate field if needed.
  patch_not_proposed_reason: Only design-plan.md was embedded; the in-scope implementation
    files needed for an exact unified diff were not provided.
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: The design shifts primary scope to live Popen streaming and auto-abort
    rather than the requested watchdog action half.
  citation: agent-loop/active/iteration-0036-subagent-watchdog/design-plan.md:5
  risk: The desired end state scopes this iteration to a watchdog that marks stale
    orphaned dispatches, a TUI terminal-event update, tests, and release gate adjustment.
    Centering the plan on rewriting _dispatch_codex with streaming, heartbeats, and
    abort control risks scope creep and leaves the actual requested watchdog behavior
    under-specified.
  recommendation: Re-center iter-0036 on _visibility_watchdog.py, _visibility_tui.py
    terminal recognition, and tests. Move live dispatch streaming/heartbeat/abort
    work to a later iteration or clearly mark it out of scope for this goal.
  patch_not_proposed_reason: This is a design/scope correction and the implementation
    files were not embedded, so an exact applicable patch cannot be authored.
  patch_proposal: null
- id: codex-rev-004
  severity: medium
  summary: External-process fallback policy is missing from the touched content.
  citation: agent-loop/active/iteration-0036-subagent-watchdog/design-plan.md:200
  risk: The desired end state requires documenting that any codex re-dispatch after
    a stalled in-process subagent dispatch must use the external codex-cli pattern.
    Without that policy, operators may repeat the iter-0031 failure mode.
  recommendation: Add the external-process fallback policy to the allowed durable
    documentation for this iteration, including the python -m agent_loop_mcp._dispatch_codex
    pattern and the in-process re-dispatch prohibition.
  patch_not_proposed_reason: The requested policy target is CLAUDE.md or memory, but
    neither is in the allowed-files list or embedded contents; no in-scope exact patch
    can be proposed.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: 'The embedded plan does not fully meet the requested watchdog
  workflow: it omits dispatch_refused pairing, uses the wrong stalled reason, over-scopes
  into live dispatch rewriting, and lacks the required fallback policy documentation.'
