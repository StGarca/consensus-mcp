    agent-loop/active/iteration-0036-subagent-watchdog/design-plan.md: "# iter-0036\
      \ design — bidirectional dispatch monitoring + watchdog\n\nOperator-driven design\
      \ for true monitoring + control of codex dispatches.\nOne-shot fire-and-forget\
      \ was empirically inadequate (iter-0036 first\npre-review dispatch hung 29 minutes\
      \ past its 15-min internal timeout\nwith zero visibility). This design adds:\n\
      - Real-time streaming of codex stdout into the audit log\n- Periodic heartbeat\
      \ events while codex runs\n- Operator abort signal via file\n- Watchdog with\
      \ auto-abort triggered by heartbeat silence (not wall time)\n\nOperator preferences\
      \ locked in (2026-05-11):\n1. **Streamed lines truncated to 200 chars** — every\
      \ line, full structure\n   visible, log not bloated.\n2. **30-second heartbeat\
      \ interval** — 2 missed heartbeats = ~1 min stall\n   detection.\n3. **Auto-abort\
      \ ONLY on heartbeat-silence** (not wall-time) — genuinely\n   slow codex with\
      \ streaming output is left alone; truly stuck codex\n   gets killed.\n4. **Popen\
      \ pipe + readline** for stdout capture (standard pattern).\n\n## Bidirectional\
      \ limitations to be explicit about\n\ncodex-cli has no mid-run input channel.\
      \ Once invoked, codex consumes the\nprompt and emits output; there is no protocol\
      \ for \"send more input to\ncodex while it thinks.\" So \"bidirectional\" here\
      \ means:\n\n- **Codex → us**: real-time stdout streaming (NEW; one-way info\
      \ flow)\n- **Us → codex**: SIGTERM via abort-signal file (NEW; one-way control)\n\
      \nTrue conversational bidirectional (multiple sub-prompts within one\ncodex\
      \ session) would require either a different codex invocation pattern\n(short\
      \ codex calls in a loop with our orchestration in between) OR a\ncodex feature\
      \ we don't have. That's an iter-0037+ architectural question\nout of scope here.\n\
      \n## Event schema additions\n\nAll new events share the existing `pass_id` /\
      \ `iteration_id` /\n`reviewer_id` anchor convention.\n\n```jsonl\n{\"event\"\
      :\"dispatch_streamed_line\",\"pass_id\":\"<id>\",\"iteration_id\":\"<id>\",\n\
      \ \"reviewer_id\":\"<id>\",\"stream\":\"stdout\",\"line_truncated\":\"<≤200\
      \ chars>\",\n \"line_full_length\":<int>,\"truncated\":<bool>,\"timestamp_utc\"\
      :\"...\"}\n\n{\"event\":\"dispatch_heartbeat\",\"pass_id\":\"<id>\",\"iteration_id\"\
      :\"<id>\",\n \"reviewer_id\":\"<id>\",\"age_seconds\":<float>,\n \"last_streamed_line_age_seconds\"\
      :<float|null>,\n \"last_streamed_line_seq\":<int|null>,\n \"timestamp_utc\"\
      :\"...\"}\n\n{\"event\":\"dispatch_aborted\",\"pass_id\":\"<id>\",\"iteration_id\"\
      :\"<id>\",\n \"reviewer_id\":\"<id>\",\"abort_source\":\"operator_signal_file\"\
      |\"watchdog_silence\",\n \"abort_reason\":\"<string>\",\"age_seconds\":<float>,\n\
      \ \"last_streamed_line_age_seconds\":<float|null>,\"timestamp_utc\":\"...\"\
      }\n\n{\"event\":\"dispatch_stalled\",\"pass_id\":\"<id>\",\"iteration_id\":\"\
      <id>\",\n \"reviewer_id\":\"<id>\",\"stall_reason\":\"watchdog_orphan_detected\"\
      ,\n \"age_seconds\":<float>,\"timestamp_utc\":\"...\"}\n```\n\n`dispatch_streamed_line`\
      \ is the highest-volume event. We bound it via\n`line_truncated` (≤200 chars)\
      \ + `line_full_length` (so the consumer\nknows when truncation lost info). Long\
      \ lines (codex's structured JSON\noutput) get truncated visibly.\n\n`dispatch_heartbeat`\
      \ carries `last_streamed_line_age_seconds` so the\nwatchdog can detect silence:\
      \ if `now - last_heartbeat.last_streamed_line_age_seconds`\nexceeds the silence\
      \ threshold, codex is stuck.\n\n`dispatch_aborted` and `dispatch_stalled` are\
      \ both terminal events (pair\nwith the dispatch_start by pass_id like dispatch_done/dispatch_failed).\n\
      Aborted = active intervention; stalled = post-hoc detection.\n\n## `_dispatch_codex.py`\
      \ changes (sketch)\n\nReplace `subprocess.run(...)` with `Popen + threaded readline\
      \ loop`:\n\n```python\ndef _invoke_codex(prompt, codex_bin, timeout_seconds,\
      \ repo_root, schema_path,\n                  log_path, anchors):\n    \"\"\"\
      Run codex via Popen; stream stdout into dispatch-log as it arrives;\n    emit\
      \ periodic heartbeats; watch for abort-signal file; SIGTERM on\n    silence\
      \ (no streamed line in last STALL_SILENCE_SECONDS).\n    \"\"\"\n    proc =\
      \ subprocess.Popen([codex_bin, \"exec\", ...],\n                           \
      \ stdin=subprocess.PIPE,\n                            stdout=subprocess.PIPE,\n\
      \                            stderr=subprocess.PIPE,\n                     \
      \       cwd=str(repo_root),\n                            text=False,  # binary;\
      \ we decode per line\n                            bufsize=1)\n    proc.stdin.write(prompt.encode(\"\
      utf-8\"))\n    proc.stdin.close()\n\n    start_ts = time.time()\n    last_streamed_ts\
      \ = None\n    streamed_seq = 0\n    stdout_buf = []  # collect raw bytes for\
      \ final output_sha256\n    abort_path = repo_root / \"agent-loop\" / \"state\"\
      \ / f\"abort-dispatch-{anchors['pass_id']}.signal\"\n\n    # Read stdout in\
      \ a thread (or async); main loop emits heartbeats and\n    # checks abort signal.\n\
      \    def reader():\n        nonlocal last_streamed_ts, streamed_seq\n      \
      \  for raw_line in proc.stdout:\n            stdout_buf.append(raw_line)\n \
      \           try:\n                line_str = raw_line.decode(\"utf-8\", errors=\"\
      replace\").rstrip(\"\\n\")\n            except Exception:\n                continue\n\
      \            full_len = len(line_str)\n            truncated = full_len > 200\n\
      \            line_event = line_str[:200]\n            _log_dispatch(log_path,\
      \ {\n                \"event\": \"dispatch_streamed_line\",\n              \
      \  **anchors,\n                \"stream\": \"stdout\",\n                \"line_truncated\"\
      : line_event,\n                \"line_full_length\": full_len,\n           \
      \     \"truncated\": truncated,\n                \"seq\": streamed_seq,\n  \
      \          })\n            streamed_seq += 1\n            last_streamed_ts =\
      \ time.time()\n\n    t = threading.Thread(target=reader, daemon=True)\n    t.start()\n\
      \n    HEARTBEAT_INTERVAL = 30.0\n    STALL_SILENCE_SECONDS = 90.0  # 3 heartbeats\
      \ with no output → kill\n    last_heartbeat = start_ts\n\n    while proc.poll()\
      \ is None:\n        now = time.time()\n        # Operator abort?\n        if\
      \ abort_path.exists():\n            try:\n                abort_reason = abort_path.read_text(encoding=\"\
      utf-8\").strip() or \"operator_signal_file\"\n            except OSError:\n\
      \                abort_reason = \"operator_signal_file (unreadable)\"\n    \
      \        proc.terminate()\n            try:\n                proc.wait(timeout=10)\n\
      \            except subprocess.TimeoutExpired:\n                proc.kill()\n\
      \            _log_dispatch(log_path, {\n                \"event\": \"dispatch_aborted\"\
      ,\n                **anchors,\n                \"abort_source\": \"operator_signal_file\"\
      ,\n                \"abort_reason\": abort_reason,\n                \"age_seconds\"\
      : now - start_ts,\n                \"last_streamed_line_age_seconds\": (now\
      \ - last_streamed_ts) if last_streamed_ts else None,\n            })\n     \
      \       try:\n                abort_path.unlink()\n            except OSError:\n\
      \                pass\n            raise CodexInvocationError(f\"dispatch aborted\
      \ by operator: {abort_reason}\")\n\n        # Heartbeat tick?\n        if now\
      \ - last_heartbeat >= HEARTBEAT_INTERVAL:\n            silence_age = (now -\
      \ last_streamed_ts) if last_streamed_ts else (now - start_ts)\n            _log_dispatch(log_path,\
      \ {\n                \"event\": \"dispatch_heartbeat\",\n                **anchors,\n\
      \                \"age_seconds\": now - start_ts,\n                \"last_streamed_line_age_seconds\"\
      : silence_age,\n                \"last_streamed_line_seq\": streamed_seq - 1\
      \ if streamed_seq > 0 else None,\n            })\n            last_heartbeat\
      \ = now\n\n            # Heartbeat-silence auto-abort: if codex has been silent\
      \ for\n            # STALL_SILENCE_SECONDS, assume stuck.\n            if silence_age\
      \ >= STALL_SILENCE_SECONDS:\n                proc.terminate()\n            \
      \    try:\n                    proc.wait(timeout=10)\n                except\
      \ subprocess.TimeoutExpired:\n                    proc.kill()\n            \
      \    _log_dispatch(log_path, {\n                    \"event\": \"dispatch_aborted\"\
      ,\n                    **anchors,\n                    \"abort_source\": \"\
      watchdog_silence\",\n                    \"abort_reason\": f\"no codex stdout\
      \ for {silence_age:.0f}s (threshold {STALL_SILENCE_SECONDS}s)\",\n         \
      \           \"age_seconds\": now - start_ts,\n                    \"last_streamed_line_age_seconds\"\
      : silence_age,\n                })\n                raise CodexInvocationError(\n\
      \                    f\"codex stuck: no output for {silence_age:.0f}s\"\n  \
      \              )\n\n        # Wall-time timeout still respected as final fallback.\n\
      \        if now - start_ts >= timeout_seconds:\n            proc.terminate()\n\
      \            try:\n                proc.wait(timeout=10)\n            except\
      \ subprocess.TimeoutExpired:\n                proc.kill()\n            raise\
      \ CodexInvocationError(f\"codex exceeded {timeout_seconds}s wall timeout\")\n\
      \n        time.sleep(0.5)\n\n    # Codex exited; drain remaining stdout via\
      \ thread join.\n    t.join(timeout=5)\n    full_output = b\"\".join(stdout_buf).decode(\"\
      utf-8\", errors=\"replace\")\n    if proc.returncode != 0:\n        stderr_text\
      \ = proc.stderr.read().decode(\"utf-8\", errors=\"replace\") if proc.stderr\
      \ else \"\"\n        raise CodexInvocationError(\n            f\"codex exit={proc.returncode};\
      \ stderr_tail={stderr_text[-2000:]!r}\"\n        )\n    return full_output\n\
      ```\n\n## `_visibility_watchdog.py` (companion, sweeps stale orphans)\n\nSame\
      \ as the original proposal but tightened:\n- Recognizes 4 terminal events: dispatch_done,\
      \ dispatch_failed,\n  dispatch_aborted, dispatch_stalled.\n- Default `--stall-after\
      \ 600s` (10 min) — used for retroactive cleanup\n  of legacy orphans that existed\
      \ before this dispatch refactor.\n- `--action mark` appends `dispatch_stalled`\
      \ for orphans (audit hygiene\n  only; the live auto-abort happens inside `_dispatch_codex`\
      \ now).\n- The watchdog is now SECONDARY (cleanup); the primary stall defense\
      \ is\n  the in-dispatch silence-watcher.\n\n## `_visibility_tui.py` updates\n\
      \n- Treat `dispatch_streamed_line` and `dispatch_heartbeat` as\n  non-terminal\
      \ (ignore for pairing); show summary instead.\n- Treat `dispatch_aborted` and\
      \ `dispatch_stalled` as terminal.\n- For active dispatches, show:\n  - \"last_line:\
      \ <truncated content>\" (most recent dispatch_streamed_line)\n  - \"last_heartbeat:\
      \ <age>s ago\" (most recent heartbeat)\n  - \"stream_silence: <silence_age>s\"\
      \ (when concerning)\n- Color: silence ≥ 60s = yellow; silence ≥ 90s = red.\n\
      \n## Open architectural questions\n\n1. **Threading vs asyncio**: reader thread\
      \ is simpler but has graceful-\n   shutdown subtleties on Windows. Asyncio is\
      \ cleaner conceptually but\n   adds complexity to a previously-synchronous function.\
      \ Recommend\n   thread (matches existing subprocess patterns elsewhere).\n\n\
      2. **`STALL_SILENCE_SECONDS` default**: 90s gives 3 missed heartbeats at\n \
      \  30s cadence — feels right but is a guess. Alternative: 60s (faster\n   detection,\
      \ more false positives on slow LLMs).\n\n3. **Wall-time fallback**: still respected\
      \ as a hard ceiling. Should\n   `dispatch_failed` event for wall-timeout vs\
      \ heartbeat-silence carry\n   different `error_type` so the operator can tell\
      \ them apart? Recommend\n   yes: `WallTimeExceeded` vs `HeartbeatSilenceStall`.\n\
      \n4. **Test scaffold**: mocking Popen + thread + time is significantly\n   harder\
      \ than mocking subprocess.run. Plan: extract `_invoke_codex` into\n   a class\
      \ with injectable time source and injectable subprocess factory\n   so tests\
      \ can drive timing deterministically.\n\n5. **Backward compatibility risk**:\
      \ every existing test that mocks\n   `subprocess.run` for `_dispatch_codex`\
      \ invocations (there are ~10 of\n   them across test_dispatch_codex.py + test_capstone_full_fix_loop.py)\n\
      \   will need updating to mock `Popen` instead. Non-trivial migration.\n\n##\
      \ Implementation phases\n\nPhase A (~150 LOC change):\n- Add streamed-line +\
      \ heartbeat emission via Popen+thread in _dispatch_codex\n- Update existing\
      \ tests to mock Popen\n- Verify pytest stays green\n\nPhase B (~80 LOC):\n-\
      \ Add abort-signal-file polling + dispatch_aborted emission\n- Heartbeat-silence\
      \ auto-abort logic + dispatch_aborted emission\n- New regression tests\n\nPhase\
      \ C (~100 LOC):\n- _visibility_watchdog.py (retroactive cleanup; same shape\
      \ as original\n  proposal but recognizes dispatch_aborted as terminal)\n- New\
      \ regression tests\n\nPhase D (~50 LOC):\n- _visibility_tui.py updates to show\
      \ streamed/heartbeat state\n- New regression tests\n\nAll phases land in iter-0036\
      \ together (one commit) since they're tightly\ncoupled in event schema.\n\n\
      ## Reviewer questions (for codex pre-review)\n\n1. **Architecture sanity**:\
      \ does the Popen+reader-thread pattern + main-\n   loop polling pattern have\
      \ any obvious Windows-specific failure modes\n   that would re-create the iter-0036\
      \ stall? (E.g., codex-cli not\n   line-flushing → reader thread sees no lines\
      \ → heartbeat-silence\n   incorrectly fires.)\n2. **`bufsize=1` semantics**:\
      \ in Python 3 binary mode, `bufsize=1` is\n   deprecated. Should we use `bufsize=0`\
      \ (unbuffered) or set explicitly\n   via os.set_blocking?\n3. **Signal handling\
      \ on Windows**: `proc.terminate()` on Windows calls\n   TerminateProcess; codex's\
      \ children (if any) become orphans. Should\n   we use a process group or just\
      \ accept the leak?\n4. **Event volume bounds**: 200-char-truncated stream events\
      \ × thousands\n   of codex output lines per dispatch can push the JSONL log\
      \ to MB-scale.\n   Acceptable, or should we cap stream events at N per dispatch?\n\
      5. **Abort-signal-file race**: operator writes file at T+0; wrapper polls\n\
      \   at T+0.5 (every 500ms). Worst case: 500ms latency before SIGTERM\n   fires.\
      \ Acceptable, or should we use OS file-watching (inotify on\n   Linux, ReadDirectoryChangesW\
      \ on Windows)?\n6. **Threading vs subprocess.run with stdout=PIPE + read() in\
      \ a loop**:\n   could we avoid threads entirely by doing non-blocking reads\
      \ on\n   the pipe from the main loop? Cleaner if it works; the only complexity\n\
      \   is whether Python's pipe support handles non-blocking on Windows.\n"
