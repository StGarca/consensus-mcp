schema_version: 1
pilot_id: iteration-0008-pilot-3-consolidated-md-backfill
goal:
  summary: Bring the v1.9.x consolidated review-findings MD count-model paragraph
    into post-v1.9.3-rc + Round 8 closure agreement
  desired_end_state: Line ~33 count-model paragraph references all rounds (1+2+SourceMD+CFU+MDset+R6+R7+R8)
    with current totals; frontmatter parses; cross-reference table row for Round 8
    status accurate
  non_goals:
  - rewrite earlier rounds' findings
  - modify any other MD
  - modify ledger or spec md
  - add new finding rounds
allowed_files:
- wiki/audiobook-project/agent-loop/2026-05-09-v1.9.x-third-party-review-findings.md
allowed_sections: []
forbidden_files:
- scripts/
- agent-loop/state/disposition-ledger.yaml
- wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md
- wiki/audiobook-project/agent-loop/2026-05-08-phase-1-mcp-server-design.md
- wiki/audiobook-project/agent-loop/2026-05-09-phase-1-mcp-g1-g2-completion-summary.md
max_iterations: 1
max_patch_size: 200
validators_required: []
acceptance_gates:
- id: A1
  description: Frontmatter parses as valid YAML
  check: python_env/python.exe -c "import yaml; t=open(\"wiki/audiobook-project/agent-loop/2026-05-09-v1.9.x-third-party-review-findings.md\").read();
    yaml.safe_load(t.split(\"---\",2)[1])"
- id: A2
  description: Count model paragraph at the top mentions Round 8 explicitly
  check: grep -q "Round 8" wiki/audiobook-project/agent-loop/2026-05-09-v1.9.x-third-party-review-findings.md
- id: A3
  description: smoke 51/51 unchanged after the edit (no spec md / ledger drift)
  check: python_env/python.exe scripts/agent_loop_mcp/_smoke_test.py 2>&1 | tail -1
    | grep -q "51/51"
- id: A4
  description: validate_disposition_index 0 findings unchanged
  check: python_env/python.exe scripts/agent_loop/validate_disposition_index.py 2>&1
    | tail -1 | grep -q "0 finding"
stop_conditions:
- max_iteration_count_reached
- patch_would_touch_forbidden_files
- any_acceptance_gate_returns_undefined
- patch_size_exceeds_max
operator_escalation_triggers:
- touched_forbidden_files
- max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-09T00:00:00Z'
