rationale: |
  CLAUDE.md verification: codex-rev-003's INTENT is correct (template line 204
  currently says expected_tests is the only optional field, but the schema at
  codex_review_schema.json:24 lists expected_tests in required[]; this is a
  drift bug). However, the proposed patch_proposal.unified_diff is emitted
  in codex CLI's proprietary `*** Begin Patch / *** Update File / *** End
  Patch` format, NOT the standard unified-diff `--- a/path / +++ b/path /
  @@ -L,N +L,N @@` format that the iter-0026 F2 hunk-anchored applier
  expects (run/_apply_unified_diff in apply_codex_patch.py:441 and
  _apply_one_file_diff:523). Applying this patch would either silently
  drop the diff (no `+++` header) or fail at hunk parse with no
  _HUNK_HEADER_RE match.

  Per CLAUDE.md verifier role: I would re-author the diff in correct
  unified-diff form, but to keep iter-0027 a clean Flavor B review pass
  (per template: this iteration's mutation budget is for codex-authored
  patches that VERIFY-CLEAN), I record corrected_resubmit and defer the
  template fix to iter-0028 followup. iter-0028 is also where codex-rev-001
  / 002 / 004 get filed (high-severity scope-check and wrapper-rc gaps with
  no codex-authored patches).
corrections: |
  Resubmit the patch using a standard unified diff format. The intent is
  trivial — replace one line of prose in the template. Here is the
  correctly-formed unified diff codex should have emitted:

  --- a/scripts/agent_loop_mcp/dispatch_templates/codex_review_template.md
  +++ b/scripts/agent_loop_mcp/dispatch_templates/codex_review_template.md
  @@ -204 +204,3 @@
  -`expected_tests` is the only optional field; everything else is required.
  +`expected_tests` is required by the schema when `patch_proposal` is non-null;
  +use an empty array when no focused tests are known. Everything else is
  +also required.

  No iter-0027 mutation will land; this finding is filed as iter-0028
  followup along with codex-rev-001 / 002 / 004.
