schema_version: 1
pilot_id: iteration-0027-codex-dispatch-flavor-b-review
goal:
  summary: Flavor B subsystem review of codex dispatch helper, schema/template, and MCP wrapper
  desired_end_state: |
    iter-0027 is the THIRD subsystem-wide Flavor B review of agent-loop code
    (iter-0023 closure invariant subsystem, iter-0025 apply pipeline; this
    iteration targets the codex dispatch subsystem).

    Files in scope:
      - scripts/agent_loop_mcp/_dispatch_codex.py
      - scripts/agent_loop_mcp/dispatch_templates/codex_review_template.md
      - scripts/agent_loop_mcp/dispatch_templates/codex_review_schema.json
      - scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py

    The codex dispatch subsystem is the cross-AI reviewer pipeline. Bugs here
    directly degrade codex output quality: malformed schemas produce weak
    findings, prompt-template injection vulnerabilities corrupt review intent,
    JSON parser laxity admits self-verification fields, and missing strict-mode
    enforcement lets the helper accept reviews that should be rejected. This
    is also the meta-recursive moment — codex reviewing its own dispatch code.

    A real codex reviewer (codex-cli) is dispatched against the review-packet
    (which embeds the 6 touched-file contents per iter-0021 and uses
    helper-stamped per-patch base_sha per iter-0024 F2 + iter-0026 F1).
    Findings emit either patch_proposal (preferred under fix_author_policy=strict)
    or patch_not_proposed_reason. Approved patches land via apply.codex_patch
    under operator authorization.

    iter-0027 SUCCESS = the full Flavor B cycle closes:
      1. Codex emits findings against the 6 files
      2. For each finding with patch_proposal: claude verifier runs
      3. Approved patches land via apply.codex_patch (cross-family closer
         records review_target_hash=last_mutation.post_sha)
      4. closure-certificate.yaml: 3/3 invariant_checks PASS, overall PASS
      5. iteration_closed event recorded with closing_state=quorum_close_passed

    If codex emits zero defects: goal_satisfied=true; close immediately
    without mutation.

    If codex emits many defects (8+): apply approved patches in this iteration;
    document deferred / corrected_resubmit findings as iter-0028 followup scope.
  non_goals:
    - modify any agent_loop_mcp source file outside the 6-file scope
    - modify run/, wiki/, or non-codex-dispatch code
    - modify closure invariant code (iter-0023 + iter-0024 already covered it)
    - modify apply pipeline code (iter-0025 + iter-0026 already covered it)
    - bump pyproject.toml version
    - introduce new MCP tools
allowed_files:
  - scripts/agent_loop_mcp/_dispatch_codex.py
  - scripts/agent_loop_mcp/dispatch_templates/codex_review_template.md
  - scripts/agent_loop_mcp/dispatch_templates/codex_review_schema.json
  - scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py
  - scripts/agent_loop_mcp/tests/test_dispatch_codex.py
  - scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py
  - agent-loop/active/iteration-0027-codex-dispatch-flavor-b-review/
allowed_sections: []
forbidden_files:
  - scripts/agent_loop_mcp/_closure_invariant.py
  - scripts/agent_loop_mcp/_validate_closure_invariant.py
  - scripts/agent_loop_mcp/_self_drive.py
  - scripts/agent_loop_mcp/_author_review_packet.py
  - scripts/agent_loop_mcp/server.py
  - scripts/agent_loop_mcp/tool_registry.py
  - scripts/agent_loop_mcp/tools/apply_codex_patch.py
  - scripts/agent_loop_mcp/tools/loop_verify_codex_patch.py
  - scripts/agent_loop_mcp/tools/audit_append_event.py
  - scripts/agent_loop_mcp/tools/loop_run_goal.py
  - scripts/agent_loop_mcp/tools/patch_stage_and_dry_run.py
  - scripts/agent_loop_mcp/tools/patch_apply_consensus_patch.py
  - scripts/agent_loop_mcp/tools/review_write_and_seal.py
  - scripts/agent_loop_mcp/tests/test_closure_invariant.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_apply_codex_patch_multifile.py
  - scripts/agent_loop_mcp/tests/test_loop_verify_codex_patch.py
  - scripts/agent_loop_mcp/tests/test_capstone_full_fix_loop.py
  - run/
  - wiki/
  - pyproject.toml
  - requirements.txt
max_iterations: 2
max_patch_size: 400
fix_author_policy: strict
validators_required:
  - validate_disposition_index
acceptance_gates:
  - id: A1
    description: pytest still green after any landed patches
    check: 'python_env\python.exe -m pytest scripts/agent_loop_mcp/tests/test_dispatch_codex.py scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py -q'
  - id: A2
    description: closure-certificate.yaml exists with overall PASS
    check: 'python -c "import yaml,sys; c=yaml.safe_load(open(''agent-loop/active/iteration-0027-codex-dispatch-flavor-b-review/closure-certificate.yaml'')); sys.exit(0 if c[''overall'']==''PASS'' else 1)"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
  - any_acceptance_gate_returns_undefined
  - claude_codex_disagree_on_goal_satisfied
  - closure_cross_verification_failed
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-10T22:30:00Z'
  codex_patch_apply_authorized: true
  scope_signature: 52a791000a0a20085c4df1517946e40dda66085616ef6940cefc17ddde3ec816
