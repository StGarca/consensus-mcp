operational_caveats:
  - id: codex_diff_format_drift_apply_patch_vs_unified_diff
    description: |
      codex-cli's default patch_proposal.unified_diff emission uses the
      `*** Begin Patch / *** Update File: path / @@ ... *** End Patch`
      format (codex's proprietary apply_patch tool format), not the
      standard unified-diff `--- a/path / +++ b/path / @@ -L,N +L,N @@`
      format the iter-0026 F2 hunk-anchored applier expects. iter-0023 and
      iter-0025 happened to get unified diffs (maybe by virtue of less
      diff-shaped surface); iter-0027's template-text-edit naturally hit
      apply_patch shape.
    workaround: |
      iter-0028 F-1 (recommended): augment the prompt template to (a) show
      an explicit unified-diff example in the patch_proposal documentation,
      (b) name the apply_patch format as REJECTED, (c) optionally add a
      python parser-side check that rejects `*** Begin Patch` prefix at
      validate-time with a clear error message. Cost ~15 LOC template +
      ~5 LOC validator + tests.

iter_0028_followup_scope:
  - id: F1
    severity: medium
    description: |
      Augment codex_review_template.md to require unified-diff form for
      patch_proposal.unified_diff, with an explicit example and explicit
      rejection of codex-cli's apply_patch `*** Begin Patch` shape. Add
      a python-side validator check that rejects the wrong-format prefix
      with a named error.
    target_files:
      - scripts/agent_loop_mcp/dispatch_templates/codex_review_template.md
      - scripts/agent_loop_mcp/_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_dispatch_codex.py
  - id: F2
    severity: medium
    description: |
      codex-rev-003 root cause: template line 204 says `expected_tests` is
      "the only optional field" but schema requires it. Replace with
      "required by schema; empty array when no focused tests are known."
    target_file: scripts/agent_loop_mcp/dispatch_templates/codex_review_template.md
  - id: F3
    severity: high
    description: |
      codex-rev-001: reviewer_dispatch_codex.handle() should capture
      _dispatch_codex.main(argv)'s return code. When rc != 0 but stdout
      somehow parsed as success-shaped JSON, force ok=False. Defense-in-
      depth; current helper contract shields this in practice but the
      MCP wrapper layer should not depend on that.
    target_files:
      - scripts/agent_loop_mcp/tools/reviewer_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_reviewer_dispatch_codex.py
  - id: F4
    severity: high
    description: |
      codex-rev-002: _validate_patch_proposal should parse unified_diff
      file headers (`+++ b/path`) and verify EVERY path in the diff body
      matches files_touched AND passes allowed_files/forbidden_files scope
      checks. Today only the files_touched list is scope-checked; a
      malicious or buggy codex emission could declare files_touched=[ok.py]
      with a diff body targeting forbidden.py.
    target_files:
      - scripts/agent_loop_mcp/_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_dispatch_codex.py
  - id: F5
    severity: medium
    description: |
      codex-rev-004: _resolve_repo_root falls through from invalid
      AGENT_LOOP_MCP_REPO_ROOT to cwd/__file__ candidates. Codex argues
      operator-supplied env var should be authoritative: if it doesn't
      validate, raise RepoRootResolutionError immediately. Behavior
      change requires updating the env-without-markers test expectation.
    target_files:
      - scripts/agent_loop_mcp/_dispatch_codex.py
      - scripts/agent_loop_mcp/tests/test_dispatch_codex.py

