- section_id: '13'
  excerpt: "## 13. Consensus schema\n\nFile:\n\n```text\nagent-loop/active/<iteration>/consensus.yaml\n\
    ```\n\nSchema:\n\n```yaml\nschema_version: 1\niteration_id: iteration-0000\ncreated_utc:\
    \ \"2026-05-08T00:00:00Z\"\nconsensus_state: \"blocked | implementation_ready\
    \ | implemented | verified\"\nproduction_state: \"not_ready | ready_pending_operator_approval\
    \ | approved\"\nreview_consensus: false\nimplementation_ready: false\nproduction_ready:\
    \ false\nproduction_allowed: false\nobservational_mode: false   # v1.7.4 (canonical-004\
    \ ratification). When true, validate_consensus relaxes enum constraints to accept\
    \ observational-mode-specific values; see observational_mode_enum_extensions block\
    \ below.\ncanonical_findings:\n  - canonical_id: \"finding-001\"\n    source_findings:\n\
    \      - \"codex:codex-001\"\n      - \"claude:claude-003\"\n    merge_method:\
    \ \"exact | deterministic_key | bounded_micro_call\"\n    severity: blocking\n\
    \    status: \"accepted | rejected | deferred | unresolved\"\n    required_change:\
    \ \"<text>\"\naccepted_changes:\n  - id: \"accepted-001\"\n    source_findings:\n\
    \      - \"finding-001\"\n    edit:\n      file: \"<path>\"\n      old_string:\
    \ \"<exact>\"\n      new_string: \"<exact>\"\nrejected_changes: []\ndeferred_decisions:\
    \ []\nunresolved_disagreements: []\nimplementation_scope:\n  allowed_files: []\n\
    \  forbidden_files:\n    - \"production outputs\"\n  allowed_actions:\n    - \"\
    edit docs\"\n    - \"run allowlisted checks\"\n  forbidden_actions:\n    - \"\
    render production audio\"\n    - \"merge to main\"\nchecks_required:\n  - id:\
    \ \"git-diff-check\"\n    check_id: \"git.diff_check\"\n    args:\n      paths:\
    \ []\n```\n\nObservational-mode enum extensions (v1.7.4 ratification of canonical-004\
    \ from iteration-0001 / claude-rev-043 from pass-20):\n\n```yaml\nobservational_mode_enum_extensions:\n\
    \  applies_when: consensus.yaml field observational_mode == true\n  rationale:\
    \ |\n    iteration-0000 was preflight observational-only per codex-rev-038.\n\
    \    Synthesizer encoded that semantic richness using non-spec enum values.\n\
    \    Pass-20 claude-rev-043 caught the spec-vs-artifact mismatch.\n    Operator\
    \ decision (Path B, 2026-05-08): widen the spec to accept the\n    observational\
    \ vocabulary when the flag is set, rather than discard\n    the synthesizer-emitted\
    \ nuance by rewriting iteration-0000.\n  consensus_state_extra_values_when_observational_mode_true:\n\
    \    - implementation_ready_observational_only\n  merge_method_extra_values_when_observational_mode_true:\n\
    \    - shared_section_shared_concern\n    - related_topic_shared_concern\n  status_extra_values_when_observational_mode_true:\n\
    \    - \"deferred_to_v1_<X>\"          # template; X = next planned spec version\n\
    \    - \"recorded_for_iteration_<NNNN>_observation\"\n    - \"deferred_to_v1_<X>_per_observational_mode\"\
    \n    - \"deferred_to_v1_X\"              # legacy literal value (do not use in\
    \ new artifacts; kept for iteration-0000 compatibility)\n    - \"deferred_to_v1_X_per_observational_mode\"\
    \   # same: legacy literal\n  validator_behavior:\n    when_observational_mode_true:\n\
    \      action: |\n        validate_consensus.py SHOULD report INVALID_ENUM_VALUE\
    \ only if the\n        offending value is in NEITHER the canonical enum NOR the\n\
    \        observational extension. Values in the observational extension\n    \
    \    are accepted silently. Values not in either are flagged as before.\n    \
    \  finding_id_for_acceptance: \"no finding emitted for observational extension\
    \ values\"\n    when_observational_mode_false_or_absent:\n      action: \"validate_consensus.py\
    \ enforces canonical enum only; observational extension values trigger INVALID_ENUM_VALUE\
    \ as before\"\n  forbidden_in_non_observational_iterations: |\n    A consensus.yaml\
    \ with observational_mode: false (or unset) MUST use\n    canonical enum values\
    \ only. Setting observational_mode true in a\n    non-observational iteration\
    \ to escape enum enforcement is a defect\n    (validate_consensus.py emits OBSERVATIONAL_MODE_MISUSE\
    \ if the iteration's\n    declared mode is not preflight/observational-only per\
    \ codex-rev-038).\n```\n\nConsensus rules:\n\n- one blocking objection from either\
    \ agent blocks by default;\n- one agent silent on a blocker does not clear it;\n\
    - production-safety disagreement always sets `production_state=not_ready`;\n-\
    \ empty objection lists do not count unless assumptions were challenged;\n- agreement\
    \ without substantive pushback triggers adversarial pass.\n\nSubstantive pushback:\n\
    \n```yaml\nsubstantive_pushback:\n  valid_if:\n    any:\n      - \">=1 blocking_objection\"\
    \n      - \">=3 non_blocking_suggestions\"\n    and:\n      - \"assumptions_challenged\
    \ non-empty\"\n      - \"evidence present for every challenge\"\n```\n"
