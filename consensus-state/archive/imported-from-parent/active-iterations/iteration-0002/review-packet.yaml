  excerpt: "## 7. File index and packet selection\n\nFile:\n\n```text\nagent-loop/state/file-index.yaml\n\
    ```\n\nSection relevance:\n\n```yaml\nsection_relevant_if:\n  - changed\n  - active_blocker\n\
    \  - contains_hard_invariant\n  - defines_interface_touched_by_diff\n  - explicitly_requested_with_reason\n\
    ```\n\nCanonical YAML sha256 convention (v1.7.4 ratification of claude-rev-046):\n\
    \n```yaml\ncanonical_yaml_sha256:\n  formula: |\n    hashlib.sha256(\n      yaml.safe_dump(\n\
    \        yaml.safe_load(open(p, 'r', encoding='utf-8')),\n        sort_keys=True\n\
    \      ).encode('utf-8')\n    ).hexdigest()\n  applies_to:\n    - reviewed_packet_sha256\
    \ (section 9 review schema)\n    - approved_target_sha256 / approved_consensus_sha256\
    \ / approved_verification_sha256 (section 17 approval schema; for YAML targets\
    \ only)\n    - approved_consensus_sha256 / approved_verification_sha256 binds\
    \ (section 17)\n    - audit_log review_returned_and_sealed.sha256 (section 13)\n\
    \    - audit_log review_packet_built.sha256 (section 13)\n    - any other \"yaml\
    \ file sha256\" reference in this spec\n  empirical_validation:\n    byte_stable_across:\n\
    \      - LF vs CRLF line endings\n      - presence or absence of UTF-8 BOM\n \
    \     - key ordering variations in source (sort_keys=True normalizes)\n    verified_by:\
    \ codex-iter0001 reviewer; pass-20 builder convention adoption\n  do_NOT_apply_to:\n\
    \    - sha256 of non-YAML artifacts (rendered audio, binary blobs); use raw-bytes\
    \ hashlib.sha256(open(p,'rb').read()) for those\n    - approved_target_sha256\
    \ when target is non-YAML (e.g., a rendered .wav)\n```\n\nPre-canonical-pin historical\
    \ hash marker (v1.7.4 ratification of codex-q-001; operator decision: preserve\
    \ historical hashes; do NOT recompute):\n\n```yaml\npre_canonical_pin_marker:\n\
    \  purpose: \"Artifacts produced before v1.7.4 may carry sha256 values computed\
    \ under unspecified conventions. Recomputing rewrites audit meaning. Operator\
    \ decision: preserve original values, mark them as historical.\"\n  marker_fields_added_to_artifact:\n\
    \    hash_convention: pre-canonical-pin\n    do_not_recompute: true\n  scope:\n\
    \    - \"iteration-0000 review-packet.yaml + reviewed_packet_sha256 in iteration-0000\
    \ review yamls\"\n    - \"any audit_log entry produced before v1.7.4\"\n    -\
    \ \"any artifact whose canonical_yaml_sha256 (computed today) does not match its\
    \ embedded sha256, AND whose creation predates v1.7.4 land date\"\n  validator_behavior:\n\
    \    when_marker_present:\n      action: \"validate_iteration.py downgrades PACKET_SHA_MISMATCH\
    \ to informational (severity: low; finding ID: PACKET_SHA_HISTORICAL); does NOT\
    \ report as defect\"\n      requirement: \"marker fields MUST be present together;\
    \ marker without do_not_recompute: true is not honored\"\n    when_marker_absent:\n\
    \      action: \"PACKET_SHA_MISMATCH reported as high severity defect, as before\"\
    \n  enforcement:\n    pre_canonical_pin_period: \"any artifact dated before v1.7.4\
    \ land 2026-05-08\"\n    post_canonical_pin_period: \"any artifact dated v1.7.4\
    \ onward; canonical convention applies, marker is forbidden (a v1.7.4+ artifact\
    \ carrying the marker is a defect)\"\n```\n\nPacket budget:\n\n```yaml\npacket_budget:\n\
    \  max_changed_sections: 8\n  max_section_excerpt_lines: 120\n  max_diff_lines:\
    \ 600\n  max_prior_review_items: 20\n  include_full_file_only_if_lines_under:\
    \ 250\n```\n\nPacket must include:\n\n```yaml\nrequired_packet_fields:\n  - objective\n\
    \  - mode\n  - gate_state\n  - decision_ledger_hash\n  - claude_md_hash\n  - karpathy_principle_summary\n\
    \  - changed_sections\n  - open_blockers\n  - check_results_if_any\n  - requested_output_schema\n\
    ```"
