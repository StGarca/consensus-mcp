  excerpt: "## 0. Agent read contract\n\nActive contract: sections 1-23 only.\n\n\
    Section 24 is a disposition INDEX, not contract. Every entry in section 24 is\
    \ either `promoted_to: <section-id>` (the rule lives in 1-23) or `archived_at:\
    \ <path>` (the body lives in agent-loop/archive/review-passes/). Section 24 does\
    \ not carry finding bodies, proposed_resolution text, or verdict prose.\n\nReview\
    \ writeback rule (bifurcated):\n\n- promote: modify sections 1-23 inline so the\
    \ spec carries the change, AND add an index line in section 24 with `promoted_to:\
    \ <section-id>` and the version it landed in.\n- archive: write the full finding\
    \ body to `agent-loop/archive/review-passes/<reviewer>-<pass>.yaml`, AND add an\
    \ index line in section 24 with `archived_at: <path>`.\n\nA review pass returning\
    \ without doing one of those two is incomplete. Findings must not live only in\
    \ chat or in the spec body.\n\nFinding-id allocation: each reviewer namespaces\
    \ its findings (`claude-rev-NNN`, `codex-rev-NNN`) to avoid cross-reviewer collision.\
    \ Within a namespace, ids are monotonic AND continuous across passes (codex pass-9\
    \ starts at the next id after codex's most recent finding, not at codex-rev-001).\
    \ Gaps are recorded in section 24 with a one-line explanation.\n\nThis document\
    \ is optimized for AI consumption:\n\n- structured fields over prose;\n- stable\
    \ ids over repeated explanations;\n- active rules in one place;\n- no full review\
    \ transcripts;\n- no human-oriented narrative unless it changes implementation\
    \ behavior;\n- ASCII for spec body (use \"section\", \"<=\", \"+/-\"); UTF-8 acceptable\
    \ in archive YAMLs.\n\nKnown-blocker section marking rule (per claude-rev-024\
    \ + claude-rev-025):\n\n```yaml\nknown_blocker_section_marking_rule:\n  text:\
    \ |\n    Any section listed as a known_blocker target MUST contain an inline\n\
    \    DISABLED or BROKEN_PENDING_V_X marker as the first non-heading\n    content\
    \ of that section, plus a guard block that tools must check.\n    Frontmatter\
    \ listing alone does not satisfy this rule.\n  marker_vocabulary:\n    - TEMPORARILY_DISABLED_PENDING_V_<NEXT>\n\
    \    - BROKEN_PENDING_V_<NEXT>\n    - ENGAGED_WHILE_CONTRACT_BLOCKED\n    - DEPRECATED_WHILE_DISABLED\n\
    \    - DO_NOT_RUN_WHILE_BLOCKED\n  validator: scripts/agent_loop/validate_disposition_index.py\n\
    \  validator_finding_id: KNOWN_BLOCKER_SECTION_LACKS_DISABLE_MARKER\n```\n\nDone-claim\
    \ rule (per claude-rev-007; extended in v1.7 per cf-007):\n\n```yaml\ndone_claim_rule:\n\
    \  text: |\n    A reviewer may not declare 'ready for Phase 0' or 'production-quality\n\
    \    contract' or equivalent until BOTH:\n      - validate_disposition_index.py\
    \ runs clean (zero findings) on the spec\n      - iteration-0000 dry-run produces\
    \ empirical metrics in section 22\n    Until both conditions met, verdicts MUST\
    \ say 'pending phase 0\n    empirical validation' regardless of reviewer subjective\
    \ confidence.\n  rationale: \"3 of 3 prior 'ready' claims were rebutted by next\
    \ pass; rule encodes operator directive 'stop trying to prematurely launch' (2026-05-08)\"\
    \n  applies_to_frontmatter_readiness_flip:    # cf-007 resolution (v1.7)\n   \
    \ text: |\n      The same gates apply to spec authors editing frontmatter\n  \
    \    active_contract_readiness. Transitioning from\n      pending_phase_0_empirical_validation\
    \ -> ready requires:\n        - validate_disposition_index.py runs clean\n   \
    \     - iteration-0000 metrics exist in section 22\n        - cf-* findings from\
    \ iteration-0000 are dispositioned (resolved or deferred with rationale in disposition-ledger.yaml)\n\
    \        - both reviewer agents confirm in a dedicated readiness-flip review pass\n\
    \        - operator records the transition with explicit rationale in revision_history\n\
    \    forbidden:\n      - \"unilateral spec patch flipping active_contract_readiness\
    \ without dual-agent + operator review\"\n      - \"treating 'all preflight conditions\
    \ met' as sufficient to flip without the readiness-flip review pass\"\n    rationale:\
    \ \"The done_claim_rule for reviewers is moot if spec authors can flip readiness\
    \ directly. Same gate applies at both layers.\"\n```\n\nSelf-patch re-engagement\
    \ criterion (per claude-rev-028, hybrid model):\n\n```yaml\nclaude_self_patch_constraint:\n\
    \  scope_unrestricted_patches_allowed_when:\n    EITHER:\n      - \"validate_disposition_index.py\
    \ runs clean AND iteration-0000 metrics exist\"\n    OR:\n      - \"operator explicit\
    \ 'resume unrestricted self-patching' signal\"\n  always_allowed_regardless_of_above:\n\
    \    - version stamp updates\n    - ASCII normalization\n    - .gitignore allowlist\
    \ additions (after verification)\n    - status-field disable markers\n    - section-body\
    \ guards on known-blocker code\n    - Phase 0 deliverable implementation (scripts/agent_loop/,\
    \ fixtures/)\n  always_requires_operator_approval_plus_codex_review:\n    - architectural\
    \ changes to sections 1-23 (new rules, modified state machines, schema redesigns)\n\
    \    - changes to hard_invariants\n    - changes to known_blocker resolution proposals\n\
    \  rationale: \"4 of 4 consolidation/patch passes by claude introduced ~5 bugs\
    \ each; constraint prevents drift while allowing infrastructure work\"\n```\n\n\
    Rollback semantics (per claude-rev-018):\n\n```yaml\non_regression_caught_by_next_pass:\n\
    \  procedure:\n    - revert spec to prior version\n    - record attempted change\
    \ as `rejected_paths` entry in disposition-ledger.yaml\n    - operator decides\
    \ whether to retry differently or abandon\n  forbidden:\n    - silent re-edit\
    \ that doesn't acknowledge the regression\n    - leaving the regression in place\
    \ \"to fix in v1.N+2\" (creates stacked patches)\n    - cumulative compound patches\
    \ that obscure the original regression\n  rationale: \"4 of 4 patches regressed;\
    \ revert preserves Karpathy 'surgical changes'; follow-up patching empirically\
    \ compounds the problem\"\n```\n\nAnti-regression criterion (per claude-rev-001):\n\
    \n```yaml\nanti_regression_criterion:\n  text: |\n    Consolidation passes (any\
    \ patch that touches >5 sections OR removes\n    a behavioral rule) MUST run validate_disposition_index.py\
    \ and\n    validate_review.py BEFORE landing. The patch may NOT delete a\n   \
    \ behavioral rule without an explicit `dropped: <rule-id>` entry in\n    revision_history.summary.\n\
    \  iteration_applied_changes_extension:    # v1.7.4 ratification of canonical-006\
    \ from iteration-0001"
