- section_id: '9'
  excerpt: "## 9. Review artifact schema\n\nFiles:\n\n```text\nagent-loop/active/<iteration>/codex-review.yaml\n\
    agent-loop/active/<iteration>/claude-review.yaml\n```\n\nSchema:\n\n```yaml\n\
    schema_version: 1\nagent: codex\nstance: implementation_realist\niteration_id:\
    \ iteration-0000\nreviewed_packet_sha256: \"<hash>\"\noverall_position:\n  implementation_ready:\
    \ false\n  production_ready: false\n  confidence: \"low | medium | high\" # subjective,\
    \ not cross-agent calibrated\nblocking_objections:\n  - id: \"codex-001\"\n  \
    \  severity: blocking\n    claim_class: \"safety | correctness | scope | test\
    \ | methodology | security | process\"\n    claim: \"<specific issue>\"\n    file:\
    \ \"<path>\"\n    section: \"<section-id>\"\n    evidence: \"<quoted/summarized\
    \ evidence>\"\n    required_change: \"<what clears it>\"\n    # NOTE: corroborated_by\
    \ REMOVED from reviewer schema in v1.5 per codex-rev-009 resolution.\n    # corroborated_by\
    \ is synthesizer-owned and lives on consensus.canonical_findings (section 13).\n\
    \    # Reviewers issue findings independently; synthesizer detects matches across\
    \ sealed reviews.\nnon_blocking_suggestions: []\nagreements: []\ndisagreements:\
    \ []\npatch_recommendations:\n  - id: \"patch-001\"\n    edit:\n      file: \"\
    <path>\"\n      old_string: \"<exact old text>\"\n      new_string: \"<exact new\
    \ text>\"\nimplementation_risks: []\nclarifying_questions:\n  - id: \"q-001\"\n\
    \    question: \"<question>\"\n    ambiguity_type: \"repo-discoverable | peer-resolvable\
    \ | test-resolvable | operator-owned | external-unavailable | production-approval\
    \ | destructive-action\"\n    proposed_resolution_method: \"read_repo | peer_ask\
    \ | bounded_test | operator\"\n    owner: \"agent | operator\"\n    blocks:\n\
    \      - \"implementation_ready\"\nself_resolved_questions: []\nassumptions_challenged:\n\
    \  - id: \"a-001\"\n    assumption: \"<assumption>\"\n    challenge_result: \"\
    cleared | failed | partially-cleared\"\n    evidence: \"<evidence>\"\nno_objection_rationale:\n\
    \  required_when_no_blockers: true\n  text: \"<required if no blocking objections>\"\
    \n```\n\nValidity:\n\n- at least one `assumptions_challenged` entry required;\n\
    - empty `blocking_objections` is not clearance without evidence-based `no_objection_rationale`;\n\
    - every blocking objection must include `required_change`;\n- every operator question\
    \ must list blocked gate/action."
