- section_id: '24'
  excerpt: "## 24. Disposition index\n\nIndex only. Each entry resolves to either\
    \ `promoted_to: <section>` (rule landed in 1-23) or `archived_at: <path>` (body\
    \ archived externally). No finding bodies, proposed_resolution text, or verdict\
    \ prose live here. Full review-pass bodies are at `agent-loop/archive/review-passes/`.\n\
    \nFinding-id reservations:\n\n```yaml\nid_reservations:\n  - range: \"rev-001..rev-038\"\
    \n    namespace: \"shared (pre-namespacing convention; v1.0..v1.2)\"\n  - range:\
    \ \"rev-039..rev-051\"\n    status: reserved_unused\n  - range: \"rev-052..rev-065\"\
    \n    namespace: \"claude (pre-namespacing; pass-4)\"\n  - range: \"rev-066..rev-073\"\
    \n    namespace: \"codex (pre-namespacing; pass-5)\"\n  - range: \"rev-074..rev-080\"\
    \n    namespace: \"claude (pre-namespacing transitional; pass-6)\"\n  - prefix:\
