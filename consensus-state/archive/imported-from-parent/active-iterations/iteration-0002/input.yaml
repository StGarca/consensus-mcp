    validate_review + validate_consensus + validate_iteration on staged state.
    Apply to real iteration-0000/ ONLY if dry-run validators pass clean
    (or only with documented LOW-severity grandfathered findings).
  forbidden_orderings:
    - apply-then-validate
    - apply-some-then-validate-then-apply-rest

