  rule: validators_first_then_apply
  enforcement: |
    Per canonical-006 ratification (section 0 anti_regression_criterion.iteration_applied_changes_extension):
    iteration-0002 touches >5 files; qualifies as consolidation. Validators MUST
    run on hypothetical post-edit state BEFORE applying patches. Phase 0
    mechanism: stage proposed edits to /tmp/iteration-0002-staging/ (mirrors
