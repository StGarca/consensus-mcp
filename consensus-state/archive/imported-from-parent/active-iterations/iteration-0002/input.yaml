# ---- Specific mechanical changes to apply ----

# Reviewers may add OR object; this is the planned set.

planned_mechanical_changes:
  - id: change-01
    target_file: agent-loop/active/iteration-0000/claude-review.yaml
    change_kind: strip_field
    field_to_strip: corroborated_by
    strip_locations: "all blocking_objections + non_blocking_suggestions entries that have corroborated_by"
    related_finding: claude-rev-040
    rationale: "Per codex-rev-009 (v1.5): corroborated_by is synthesizer-only, not reviewer-emitted. Stripping clears CORROBORATED_BY_FORBIDDEN."
  - id: change-02
    target_file: agent-loop/active/iteration-0000/claude-review.yaml
    change_kind: rename_value
    rename_from: partially_cleared
    rename_to: partially-cleared
    locations: "any assumptions_challenged.challenge_result with underscore form"
    related_finding: claude-rev-041
    rationale: "Spec section 9 enum uses HYPHEN form. Cosmetic but validator-flagged."
  - id: change-03
    target_file: agent-loop/active/iteration-0000/claude-review.yaml
    change_kind: add_field
    field_to_add: no_objection_rationale.text
    field_value: "<reviewer-author-supplied no-objection rationale; explain why no blocking objections at iteration-0000 close>"
    condition: "only if blocking_objections is empty (which it is in iteration-0000)"
    related_finding: claude-rev-042
    rationale: "Spec section 9 validity: empty blocking_objections requires non-empty no_objection_rationale.text."
    operator_to_supply_text_during_apply: true   # the rationale text content is operator-supplied; template provided
  - id: change-04
    target_file: agent-loop/active/iteration-0000/iteration-outcome.yaml
    change_kind: yaml_quote_fix
    target_line: 71
    current_form: "unquoted value containing colon"
    fix: "wrap the value in single quotes OR replace inner colon with non-breaking alternative"
    related_finding: claude-rev-044
    rationale: "YAML parse error; blocks all metric reads; high operational impact."
  - id: change-05
    target_file: agent-loop/active/iteration-0000/review-packet.yaml
    change_kind: add_required_fields
    fields_to_add:
      - decision_ledger_hash
      - claude_md_hash
      - karpathy_principle_summary
      - changed_sections
      - check_results_if_any
    field_values_source: "rebuild semantically: decision_ledger_hash + claude_md_hash via canonical_yaml_sha256 / hashlib at iteration-0002 apply time; karpathy_principle_summary verbatim from CLAUDE.md prime directive; changed_sections + check_results_if_any best-effort historical reconstruction (may be empty arrays with note)"
    related_finding: claude-rev-047
    rationale: "Per pass-20 codex-iter0001 verification: 5 fields actually missing (NOT what pass-20 narrative claimed). Authoritative list from validate_iteration.py output."
  - id: change-06
    target_file: agent-loop/active/iteration-0000/consensus.yaml
    change_kind: add_field
    field_to_add: observational_mode
    field_value: true
    related_finding: claude-rev-043 (resolvable_via_canonical-004_v1_7_4_ratification)
    rationale: "v1.7.4 mechanical application: iteration-0000 IS observational-only per codex-rev-038. Setting flag drops 14 INVALID_ENUM_VALUE findings."
  - id: change-07
    target_file: agent-loop/active/iteration-0000/codex-review.yaml
    change_kind: add_marker_fields
    fields_to_add:
      hash_convention: pre-canonical-pin
      do_not_recompute: true
    related_finding: codex-q-001 (operator chose preserve+provenance, NOT recompute)
    rationale: "v1.7.4 mechanical application: pre-v1.7.4 review yaml has historical reviewed_packet_sha256. Marker downgrades PACKET_SHA_MISMATCH (high) -> PACKET_SHA_HISTORICAL (low)."
  - id: change-08
    target_file: agent-loop/active/iteration-0000/claude-review.yaml
    change_kind: add_marker_fields
    fields_to_add:
      hash_convention: pre-canonical-pin
      do_not_recompute: true
    related_finding: codex-q-001
    rationale: "Same as change-07 for claude-review."

# ---- Known-residual findings expected after iteration-0002 (acknowledged out-of-scope) ----

known_residual_post_iteration_0002:
  - finding_class: HASH_CHAIN_BROKEN
    count: 2
    severity: high
    location: iteration-0000/independence-audit.yaml
    cause: |
      Audit uses per-agent-prefixed event names (codex_reviewer_invoked etc.).
      Validator counts canonical events; sees 0 reviewer_invoked + 0
      review_returned_and_sealed -> emits HASH_CHAIN_BROKEN missing-event-type.
      v1.7.4 grandfather clause downgrades AUDIT_EVENT_NAME_NON_CANONICAL but
      not HASH_CHAIN_BROKEN's count check.
    proposed_resolution_options_for_iteration_0003_or_v1_7_5:
      - "(a) Extend grandfather: validate_iteration treats prefixed events as satisfying canonical count for iteration-0000 specifically"
      - "(b) Mechanical rename in iteration-0000/independence-audit.yaml from prefixed to canonical names"
      - "(c) Add canonical-event-equivalent entries alongside prefixed (duplicate audit log)"
      - "(d) Add pre_canonical_pin marker to audit_log; validate_iteration treats marked audits as canonical-equivalent"
    out_of_scope_this_iteration: true
    operator_decision_needed: yes
  - finding_class: AUDIT_EVENT_NAME_NON_CANONICAL
    count: 3
    severity: low (grandfathered)
    location: iteration-0000/independence-audit.yaml
    informational_only: true
    out_of_scope_this_iteration: true
    related_to_above: yes (same root cause; resolution paths same)

