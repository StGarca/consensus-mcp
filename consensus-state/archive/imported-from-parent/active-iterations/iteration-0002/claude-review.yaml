# ---- Implementation risks ----

implementation_risks:
  - id: risk-001
    severity: medium
    claim_class: process
    claim: "Plan's Phase 0 dry-run gate uses staging dir /tmp/iteration-0002-staging/. On Windows host this path will fail; staging script must use os.path.join(tempfile.gettempdir(), ...) or repo-relative agent-loop/state/iteration-0002-staging/. If implementer follows the literal text of the input.yaml the dry-run will fail to create the staging tree on this host and apply_order_rule cannot be enforced. Easy fix; flagged here so it does not become a deferred 'environmental' surprise mid-apply."
    suggested_action: "Implementer (apply step) substitutes /tmp/iteration-0002-staging/ with agent-loop/state/iteration-0002-staging/ for OS portability; record actual path used in iteration-outcome.yaml."
  - id: risk-002
    severity: low
    claim_class: methodology
    claim: "change-03 (no_objection_rationale.text on iteration-0000/claude-review.yaml) is marked operator_to_supply_text_during_apply: true. Iteration-0000's no-blockers state was authored 2026-05-08 by the orchestrator under v1.6 contract. Reconstructing the contemporaneous 'why no blockers' rationale post-hoc invites narrative drift; the implementer may invent reasoning that wasn't actually applied at iteration-0000 review time. Mitigation: phrase the rationale as 'historical reconstruction post-pass-20; reviewer at iteration-0000 close did not record explicit rationale' rather than fabricating a contemporary one."
    suggested_action: "Operator-supplied text uses pattern 'Reconstructed post-hoc 2026-05-08: <evidence-based reasoning from review content>'. Avoid first-person voice that implies the original reviewer wrote it at iteration-0000 close."

