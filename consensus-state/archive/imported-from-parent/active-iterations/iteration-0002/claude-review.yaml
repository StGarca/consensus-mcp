# ---- Non-blocking suggestions ----

non_blocking_suggestions:
  - id: claude-001
    severity: medium
    claim_class: methodology
    claim: "Plan declares apply_order_rule.rule: validators_first_then_apply with staging at /tmp/iteration-0002-staging/, but the staging-mechanism is hand-waved on three load-bearing details. (a) The repo runs on Windows; /tmp/ does not exist as a stable path. validate_iteration.py and validate_review.py walk the iteration dir and read sibling artifacts via relative paths inside the dir, which works for any --iteration-dir arg, but the plan's literal /tmp/iteration-0002-staging/ wording is a unix-ism that will fail on this host. (b) validate_disposition_index runs against the spec md, not against an iteration dir; it is unclear what 'staged disposition-ledger.yaml' even means before apply, since the ledger update is a post-close bookkeeping step (target_files line 75). (c) build_review_packet recomputes packet_sha256 against the spec; staged review yamls would have stale reviewed_packet_sha256 unless the plan also stages a recomputed packet, which it does not say. None of these is fatal but they are open seams in the dry-run gate."
    file: agent-loop/active/iteration-0002/input.yaml
    section: apply_order_rule
    evidence: "input.yaml lines 112-122 (apply_order_rule). validate_iteration.py:601 takes --iteration-dir as a free arg (any path works). validate_disposition_index.py operates on spec md, not iteration dir; ledger update is closure_artifact step per input.yaml line 167. No mention of how staged validators see a recomputed packet."
    suggested_resolution: |
      Tighten apply_order_rule with three lines: (1) staging dir is OS-portable; on Windows pick agent-loop/state/iteration-0002-staging/ or use tempfile.mkdtemp(). (2) Disposition-ledger dry-run is run on the proposed-post-close ledger content (since ledger update is itself a planned change); validate_disposition_index.py runs against the spec md unchanged. (3) For staged review yamls, do NOT recompute reviewed_packet_sha256; instead rely on pre-canonical-pin marker (which iteration-0000 reviews already get from change-07 + change-08 in this iteration). State this explicitly so the dry-run does not chase a phantom PACKET_SHA_MISMATCH on staged-but-unmarked staged reviews.
  - id: claude-002
    severity: medium
    claim_class: process
    claim: "known_residual_post_iteration_0002 lists HASH_CHAIN_BROKEN x2 + AUDIT_EVENT_NAME_NON_CANONICAL x3 as out-of-scope, with option (b) explicitly identified as 'mechanical rename in iteration-0000/independence-audit.yaml from prefixed to canonical names'. That is in fact mechanical and adheres to the same change-class as change-01..change-08. Deferring it to iteration-0003 is a Karpathy 'simplicity first' miss in the opposite direction: it splits work across iterations when the unit cost of one more change-09 (rename four event names in one yaml) is trivial AND it would actually clear the two remaining HIGH findings the plan accepts as residual. Operator decision is needed only if the chosen path is option (a) grandfather-extension or option (b1) widen-spec. Option (b2) rename-only is in the same risk profile as change-01..change-08."
    file: agent-loop/active/iteration-0002/input.yaml
    section: known_residual_post_iteration_0002
    evidence: "input.yaml lines 251-275. The four prefixed event names are codex_reviewer_invoked / codex_review_returned_and_sealed / claude_reviewer_invoked / claude_review_returned_and_sealed. Spec section 13 canonical names are reviewer_invoked + review_returned_and_sealed with actor field. Mechanical rename touches one file (independence-audit.yaml) and is fully reversible. Plan's stated rationale for deferral (operator decision needed) only applies to options (a), (b1 widen-spec), (c duplicate audit), or (d marker). It does NOT apply to (b2 rename) which is the cheapest path and is symmetric with the existing 8 changes."
    suggested_resolution: |
      Add change-09 to planned_mechanical_changes: target_file iteration-0000/independence-audit.yaml; change_kind rename_value; rename four event names from per-agent-prefixed to canonical (reviewer_invoked / review_returned_and_sealed) with actor field carrying the agent identity. Verify post-rename that audit-log canonical_yaml_sha256 chain still resolves (it should; rename is purely cosmetic on event_type). If operator wants to preserve the prefixed-name decision as historical, route through option (a) grandfather-extension instead and that IS legitimately operator-decision territory; either way the plan should pick one rather than declaring 2 HIGH findings residual.
  - id: claude-003
    severity: low
    claim_class: methodology
    claim: "change-04 (yaml_quote_fix at line 71 of iteration-0000/iteration-outcome.yaml) is described as 'wrap the value in single quotes OR replace inner colon with non-breaking alternative' but the plan does not pin which. claude-review.yaml from iteration-0001 a-001 verified the offending line reads '    - cf-008: section 13 dangling reference: \"section_15_step\" -> \"section_20_step\".'. There are TWO unquoted colons (after cf-008 and after reference). Single-quoting the whole list-item value is the surgical fix; the alternative wording 'replace inner colon with non-breaking alternative' invites editing the semantic content of the cf-008 entry, which is a Karpathy 'surgical changes' violation. Specify single-quote-the-value as the chosen approach so the implementer does not silently substitute an em-dash for the inner colon."
    file: agent-loop/active/iteration-0002/input.yaml
    section: planned_mechanical_changes.change-04
    evidence: "input.yaml lines 206-213. The 'OR' optionality leaves room for content edits. iteration-0001 claude-review a-001 evidence (lines 122-124) recorded the exact line content with two colons; both are inside an inline string and either single-quoting OR double-quoting the entire value resolves the parse without touching meaning."
    suggested_resolution: "Replace 'wrap the value in single quotes OR replace inner colon with non-breaking alternative' with 'wrap the entire post-key value in single quotes; do not modify the cf-008 entry text'. Add a verify step: run python -c 'import yaml; yaml.safe_load(open(\"agent-loop/active/iteration-0000/iteration-outcome.yaml\"))' post-edit; expect no exception."

