    question: "Does iteration-0002 plan address canonical-005 (input self-violation), canonical-006 (anti-regression order), canonical-007 (readiness lock) from iteration-0001 closure?"
    resolution_method: read_repo
    resolution: |
      Read iteration-0001 claude-review.yaml claude-005 (readiness lock missing), claude-004 (anti-regression ordering inverted), claude-003 (input.yaml line 86 carries non-spec enum). Read iteration-0002 input.yaml. Verified:
