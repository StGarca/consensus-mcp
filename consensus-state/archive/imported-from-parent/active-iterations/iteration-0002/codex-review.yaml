patch_recommendations:
  - id: patch-001
    edit:
      file: agent-loop/active/iteration-0000/claude-review.yaml
      old_string: |
        no_objection_rationale: |
          This review issues no blocking objections to iteration-0000 itself.
          The 4 non-blocking suggestions (claude-rev-031..034) are methodology gaps
          for v1.7 design; they do not block the observational run.
          The 2 implementation_risks (claude-rev-035, -036) flag edge cases that
          may or may not surface in iteration-0000.
          Per section 13 substantive_pushback rule: assumptions_challenged is
          non-empty (3 entries with evidence) and at least 3 non_blocking_suggestions
          present, so the no-blocking-objections position is supported by evidence.
      new_string: |
        no_objection_rationale:
          required_when_no_blockers: true
          text: |
            This review issues no blocking objections to iteration-0000 itself.
            The 4 non-blocking suggestions (claude-rev-031..034) are methodology gaps
            for v1.7 design; they do not block the observational run.
            The 2 implementation_risks (claude-rev-035, -036) flag edge cases that
            may or may not surface in iteration-0000.
            Per section 13 substantive_pushback rule: assumptions_challenged is
            non-empty (3 entries with evidence) and at least 3 non_blocking_suggestions
            present, so the no-blocking-objections position is supported by evidence.

  - id: patch-002
    edit:
      file: agent-loop/active/iteration-0000/claude-review.yaml
      old_string: "corroborated_by: []   # synthesizer populates per section 13"
      new_string: "# corroborated_by removed per codex-rev-009 / claude-rev-040; synthesizer-only field, not reviewer-emitted"

  - id: patch-003
    edit:
      file: agent-loop/active/iteration-0000/iteration-outcome.yaml
      old_string: '    - cf-008: section 13 dangling reference: "section_15_step" -> "section_20_step".'
      new_string: '    - ''cf-008: section 13 dangling reference: "section_15_step" -> "section_20_step".'''

  - id: patch-004
    edit:
      file: agent-loop/active/iteration-0000/claude-review.yaml
      old_string: "    challenge_result: partially_cleared"
      new_string: "    challenge_result: partially-cleared"

  - id: patch-005
    edit:
      file: agent-loop/active/iteration-0000/codex-review.yaml
      old_string: "iteration_id: iteration-0000"
      new_string: |
        iteration_id: iteration-0000
        hash_convention: pre-canonical-pin
        do_not_recompute: true

  - id: patch-006
    edit:
      file: agent-loop/active/iteration-0000/claude-review.yaml
      old_string: "iteration_id: iteration-0000"
      new_string: |
        iteration_id: iteration-0000
        hash_convention: pre-canonical-pin
        do_not_recompute: true

implementation_risks:
  - id: risk-001
    severity: medium
    claim_class: correctness
    claim: |
      Patches patch-005 + patch-006 use "iteration_id: iteration-0000" as an
      anchor for adding marker fields. If either review yaml has multiple
      occurrences of that line, the textual edit is ambiguous and Edit tool
      will fail. Verified via grep: each review yaml has exactly one
      occurrence at the schema header (line 5). Safe.
    suggested_action: "if Edit fails, fall back to YAML round-trip (load, mutate, dump) preserving key order via ruamel.yaml."
  - id: risk-002
    severity: medium
    claim_class: methodology
    claim: |
      The iteration-0000 review-packet.yaml will not have the proposed
      hash_convention/do_not_recompute markers (change-05 only adds the 5
      missing required fields). Validator code path (lines 507-516) checks
      markers on REVIEW_FILES only, not on review-packet.yaml. So packet's
      OWN canonical sha changing is silent, but the recorded sha in review
      yamls becomes mismatched against the new computed canonical sha,
      precisely the case PACKET_SHA_HISTORICAL handles. Safe iff change-07
      and change-08 both land BEFORE the next validate_iteration run.
    suggested_action: "ensure apply order: change-07 + change-08 land in the same staging round as change-05; do not split across rounds."
  - id: risk-003
    severity: low
    claim_class: process
    claim: |
      success_criteria_per_G5 lists "smoke harness: 21/21 (must hold)". This
      is a regression check, not a positive-state check. Run the smoke
      harness BEFORE applying any edits to capture baseline 21/21, then
      AGAIN after apply to confirm no regression.
    suggested_action: "operator runs python_env\\python.exe scripts\\agent_loop\\run_validator_tests.py both pre-apply and post-apply."

clarifying_questions: []

self_resolved_questions:
  - id: q-001
    question: "Does validate_iteration.py support an in-memory file-map override for canonical-006 dry-run, or is temp-file the only mechanism?"
    resolution_method: read_repo
    resolution: |
      Reading validate_iteration.py --help output shows ONLY --iteration-dir
      <path>; no --staged-files or --files-json or memory-override flag.
      Therefore Phase 0 dry-run mechanism is constrained to copy-to-staging-dir.
      Implication for change-codex-003 above.
  - id: q-002
    question: "Is corroborated_by removal scope correctly stated as 'all blocking_objections + non_blocking_suggestions entries'?"
    resolution_method: read_repo
    resolution: |
      grep "corroborated_by" iteration-0000/claude-review.yaml yields exactly
      one hit at line 258 (top-level, not inside list entries). Input.yaml's
      strip_locations description is over-broad; reality is one top-level
      field. Single edit point. Implication for codex-002.
  - id: q-003
    question: "Where does line 71 of iteration-outcome.yaml fail to parse?"
    resolution_method: bounded_test
    resolution: |
      python yaml.safe_load() reports parse error at line 71 col 44. Verified
      column 44 is the second colon ('reference:'). Two unquoted colons in
      one mapping value. Single-quoting the entire value clears the parse.

assumptions_challenged:
  - id: a-001
    assumption: "input.yaml's claim that change-04 target line is 71 is correct."
    challenge_result: cleared
    evidence: |
      Direct read of iteration-0000/iteration-outcome.yaml shows line 71:
      "    - cf-008: section 13 dangling reference: \"section_15_step\" -> \"section_20_step\"."
      yaml.safe_load() reports parse error at exactly line 71 column 44
      (the second colon, after 'reference'). input.yaml line number is
      accurate.

  - id: a-002
    assumption: "input.yaml's claim that change-01 covers 'all blocking_objections + non_blocking_suggestions entries with corroborated_by' is correct."
    challenge_result: failed
    evidence: |
      grep "corroborated_by" iteration-0000/claude-review.yaml -> only line 258,
      which is the TOP-LEVEL field, NOT inside any list entry. Input.yaml's
      description over-states scope. Reality: 1 top-level field strip.
      See codex-002 above.

  - id: a-003
    assumption: "change-03 in input.yaml accurately describes the existing claude-review.yaml state."
    challenge_result: failed
    evidence: |
      Direct read of claude-review.yaml line 248 shows the field IS present
      as a YAML scalar block-string. input.yaml says 'add_field' (implying
      absent); reality is 'restructure_field' (present but wrong shape).
      validate_review.py:268 confirms the dict-with-text-key requirement.
      See blocking codex-001.

  - id: a-004
    assumption: "All 5 fields in change-05.fields_to_add are genuinely missing from iteration-0000/review-packet.yaml top-level."
    challenge_result: cleared
    evidence: |
      Direct read of iteration-0000/review-packet.yaml: present top-level
      keys are objective, mode, gate_state, open_blockers, requested_output_schema,
      and several non-required fields (input_sanitization, active_ledgers,
      project_governance, changed_files, diff_summary, validator_state,
      finding_id_namespace_allocation, independence_proof_protocol,
      self_resolution_budget, call_budget). Missing top-level required
