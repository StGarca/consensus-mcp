  - id: a-005
    assumption: "Adding marker fields (change-07/08) downgrades PACKET_SHA_MISMATCH cleanly without cascading."
    challenge_result: partially-cleared
    evidence: |
      validate_iteration.py:507-528 shows the marker pair (hash_convention=pre-canonical-pin
      AND do_not_recompute=true) downgrades PACKET_SHA_MISMATCH to
      PACKET_SHA_HISTORICAL severity=low. Confirmed.
      Cascading: review yamls' OWN canonical sha changes after marker addition,
      but no other validator references review-yaml canonical sha (verified by
      grep on validate_*.py). audit_log entries store sha values for the
      review yamls; iteration-0000 audit_log stored sha values; if those are
      validator-checked, they would now mismatch. Need to verify audit_log
      sha-check exists. Quick scan of validate_iteration.py shows audit_log
      checks event-name canonicality + hash chain, but did not confirm whether
      review-yaml-sha is checked. Marking as partially-cleared pending operator
      or apply-time empirical verification (cheap: just run validate_iteration
      after apply).

  - id: a-006
    assumption: "change-06 (observational_mode: true on iteration-0000/consensus.yaml) cleanly drops the 14 INVALID_ENUM_VALUE findings."
    challenge_result: cleared
    evidence: |
      validate_consensus.py:188 shows: obs_mode = bool(consensus.get("observational_mode", False)).
      Lines 85-90 show OBSERVATIONAL_STATUS_VALUES extends the canonical
      enum with deferred_to_v1_X, deferred_to_v1_X_per_observational_mode,
      deferred_to_v1_7, etc. - matching the legacy literals iteration-0000
      synthesizer emitted. Flag flip clears the findings.

  - id: a-007
    assumption: "Spec section 0 phase_0_mechanism allows in-memory file-map override per its (b) bullet."
    challenge_result: failed
    evidence: |
      Spec lists (a) temp-file dry-run mode and (b) in-memory file map
      override. validate_iteration.py --help output shows ONLY --iteration-dir
      (a path). No (b) implementation exists today. Spec promises a
      mechanism the validator does not deliver. Implementation-realist
      consequence: option (a) is the only path forward in iteration-0002.
      See codex-003.

