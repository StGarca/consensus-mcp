# Single substantive blocking objection: change-03 is mis-classified as "add field"; the
# existing claude-review.yaml has no_objection_rationale as a SCALAR block-string, but
# validate_review.py (line 268) requires a DICT with .text key. The plan as written
# would not clear NO_BLOCKERS_WITHOUT_RATIONALE.

blocking_objections:
  - id: codex-001
    severity: blocking
    claim_class: correctness
    claim: |
      change-03 in input.yaml is misdescribed as add_field. The existing
      iteration-0000/claude-review.yaml line 248 has:

        no_objection_rationale: |
          This review issues no blocking objections...

      That is a YAML scalar (block string), not a mapping. validate_review.py
      Rule "no_objection_rationale required when no blockers" (review.py:265-275)
      does:

        nor = review.get("no_objection_rationale") or {}
        text = nor.get("text") if isinstance(nor, dict) else None
        if not isinstance(text, str) or not text.strip(): emit NO_BLOCKERS_WITHOUT_RATIONALE

      A scalar string fails isinstance(nor, dict). Therefore change-03 must
      RESTRUCTURE the field, not just add text. Required shape:

        no_objection_rationale:
          required_when_no_blockers: true
          text: |
            <rationale text here>

      This is a mechanical edit, not an operator-supplied content question.
      The existing rationale text is already present; only the YAML structure
      needs lifting from scalar to mapping.
    file: agent-loop/active/iteration-0000/claude-review.yaml
    section: line_248_through_256
    evidence: |
      Read of claude-review.yaml line 248:
        "no_objection_rationale: |\n  This review issues no blocking objections..."
      Read of validate_review.py line 268:
        "text = nor.get(\"text\") if isinstance(nor, dict) else None"
    required_change: |
      change-03 must be reclassified as restructure_field (not add_field) and
      operator_to_supply_text_during_apply set false (text already exists in
      file). Patch shape: replace the scalar-string form with a mapping that
      preserves the existing rationale prose under a .text key plus the
      required_when_no_blockers: true sibling. Concrete patch in
      patch_recommendations.patch-001 below.

non_blocking_suggestions:
  - id: codex-002
    severity: medium
    claim_class: scope
    claim: |
      change-01 in input.yaml says "all blocking_objections + non_blocking_suggestions
      entries that have corroborated_by". Empirical: claude-review.yaml has
      ZERO corroborated_by inside list entries; only ONE top-level field
      (line 258: "corroborated_by: []   # synthesizer populates per section 13").
      The fix is a single-line strip, not a multi-entry sweep.
    file: agent-loop/active/iteration-0000/claude-review.yaml
    section: line_258
    evidence: |
      grep "corroborated_by" iteration-0000/claude-review.yaml -> 1 hit (line 258).
      grep "corroborated_by" iteration-0000/codex-review.yaml -> 0 hits.
      validate_review.py uses recursive _contains_corroborated_by; the single
      top-level occurrence is enough to trip the finding.
    suggested_resolution: |
      Refine change-01 description in apply step: "strip the single top-level
      corroborated_by field from claude-review.yaml line 258". One edit point.
      Concrete patch in patch-002.

  - id: codex-003
    severity: medium
    claim_class: methodology
    claim: |
      Phase 0 dry-run staging mechanism is under-specified. input.yaml
      apply_order_rule says "stage proposed edits to /tmp/iteration-0002-staging/".
      validate_iteration.py only accepts --iteration-dir <path>; there is no
      in-memory file-map override (verified: --help output shows only
      --iteration-dir, --out, --json, --self-test). So:
        a) Staging dir must contain a FULL mirror of iteration-0000/ (all 7
           artifact files) with the 8 edits applied. Just dropping edited
           files in isolation will fail validate_iteration's cross-artifact
           checks (e.g. PACKET_SHA verification, audit_log presence).
        b) /tmp/ does not exist on Windows. The repo working dir is
           Windows-native (PowerShell + bash both available). Use
           %TEMP%\iteration-0002-staging\ or a repo-local
           agent-loop/.staging/iteration-0002/ tmp dir.
        c) The validator paths inside the staging tree must match the same
           relative layout (agent-loop/active/iteration-0000/*.yaml). Pass
           the staging root via --iteration-dir
           <staging_root>/agent-loop/active/iteration-0000.
    file: agent-loop/active/iteration-0002/input.yaml
    section: apply_order_rule.enforcement
    evidence: |
      validate_iteration.py --help output: only --iteration-dir is accepted
      (no in-memory override).
      Spec section 0 phase_0_mechanism mentions both options; only (a)
      temp-file dry-run mode is implementation-realistic given current
      validator CLI.
    suggested_resolution: |
      Operator/synthesizer chooses one of:
        - copy iteration-0000/ to %TEMP%\\iteration-0002-staging\\agent-loop\\active\\iteration-0000\\
          (Windows-native), apply edits there, run all 4 validators with
          --iteration-dir pointed at the staged copy
        - or extend validate_iteration.py to accept --staged-files JSON
          mapping (deferred work; not blocking this iteration)
      Document the chosen path in iteration-0002/iteration-outcome.yaml so
      future iterations can replay.

  - id: codex-004
    severity: low
    claim_class: scope
    claim: |
      Apply order matters: change-01 (strip top-level corroborated_by) +
      change-08 (add hash_convention + do_not_recompute) both edit
      claude-review.yaml. They commute (different fields), but as a single
      file-rewrite the sequence is: load yaml, apply both mutations, dump.
      No risk if applied in one rewrite. Risk only if applied as two
      sequential textual Edit tool calls and the second target string
      becomes ambiguous after the first edit. Recommend ordering:
        1. change-04 (iteration-outcome.yaml YAML parse fix; unblocks reads)
        2. change-05 (review-packet.yaml +5 fields; isolates packet sha drift)
        3. change-06 (consensus.yaml observational_mode true)
        4. change-07 (codex-review.yaml +marker fields)
        5. change-08 + change-01 + change-02 + change-03 (claude-review.yaml
           combined rewrite touching 4 distinct locations)
      Post-edit canonical sha of review-packet.yaml will differ from the sha
      recorded as reviewed_packet_sha256 in both review yamls; markers
      (change-07/08) downgrade resulting PACKET_SHA_MISMATCH to
      PACKET_SHA_HISTORICAL (low). Verified via validate_iteration.py:507-516
      branch.
    file: agent-loop/active/iteration-0002/input.yaml
    section: planned_mechanical_changes
    evidence: |
      Read of validate_iteration.py:507-528: PACKET_SHA_HISTORICAL emitted
      iff hash_convention == "pre-canonical-pin" AND do_not_recompute is True.
      Both change-07 and change-08 satisfy this; cascade is contained.
    suggested_resolution: |
      Apply order rule above. Single coherent rewrite per file, not multiple
      text-level edits per file.

  - id: codex-005
    severity: medium
    claim_class: methodology
    claim: |
      change-05 hash semantics: spec section 7 canonical_yaml_sha256 formula
      applies to "any yaml file sha256 reference". CLAUDE.md is markdown,
      not YAML, so claude_md_hash should be raw-bytes hashlib.sha256 of file
      contents (NOT canonical_yaml_sha256). decision_ledger_hash IS YAML
      (agent-loop/state/disposition-ledger.yaml), so canonical_yaml_sha256
      formula applies.
      However: iteration-0000 was created PRE v1.7.4 (predates the
      canonical_yaml_sha256 ratification). Honest reconstruction therefore
      preserves the raw-bytes sha values that existed in iteration-0000's
      project_governance.claude_md_sha256 and active_ledgers.disposition_ledger_sha256
      blocks. Both options are defensible:
        Option A (current-convention): apply v1.7.4 hash formulas to today.
        Option B (historical-faithful): copy the existing raw values.
      Recommend Option B for iteration-0000 reconstruction; Option A for
      iteration-0001+ packets going forward.
    file: agent-loop/active/iteration-0000/review-packet.yaml
    section: change-05_field_values
    evidence: |
      Computed today (Option A canonical convention):
        claude_md_hash (raw sha256): f8fc306383048356f10a97e977ac4c51342c1c0cf4b315d79b6e732b8ec7013d
        decision_ledger_hash (canonical YAML sha256): 2fe82ea92d52c5fe061ebaf4fe6a8b50bd3c33db9bb0b7cbbfa62719c3f5a876
      Existing in iteration-0000 packet (Option B historical):
        claude_md_sha256 = f8fc306383048356f10a97e977ac4c51342c1c0cf4b315d79b6e732b8ec7013d (matches; CLAUDE.md byte-stable)
        disposition_ledger_sha256 = bcfecf0f91f73cfcbfde40aeb1e08abae8af77faa62b4c8811614836a5d0cb7e (raw, pre-canonical era)
    suggested_resolution: |
      For change-05, propose:
        decision_ledger_hash: "bcfecf0f91f73cfcbfde40aeb1e08abae8af77faa62b4c8811614836a5d0cb7e"
          # Historical raw-bytes sha at iteration-0000 build time; preserved
          # under pre-canonical-pin convention (v1.7.4 canonical formula
          # post-dates iteration-0000).
        claude_md_hash: "f8fc306383048356f10a97e977ac4c51342c1c0cf4b315d79b6e732b8ec7013d"
          # Raw sha256 of CLAUDE.md (markdown; canonical_yaml_sha256 N/A).
        karpathy_principle_summary: |
          Think Before Coding: state assumptions, ask when uncertain, surface
          tradeoffs. Simplicity First: minimum design that solves the
          problem, no speculative abstraction. Surgical Changes: touch only
          what the objective requires, preserve unrelated work. Goal-Driven
          Execution: define success criteria and verification before
          implementation. See CLAUDE.md GLOBAL PRIME DIRECTIVE for full text.
        changed_sections: []
          # iteration-0000 was observational-only; no spec changes applied.
          # Empty array is the honest reconstruction.
        check_results_if_any: []
          # iteration-0000 ran no automated checks; the packet pre-dated the
          # checks_required schema. Empty array is the honest reconstruction.

  - id: codex-006
    severity: low
    claim_class: scope
    claim: |
      Residual findings (HASH_CHAIN_BROKEN x2 + AUDIT_EVENT_NAME_NON_CANONICAL x3)
      out-of-scope rationale is acceptable. Of the 4 proposed resolution
      paths, recommendation:
        - Option (b) mechanical rename in iteration-0000/independence-audit.yaml
          is the most defensible. It localizes the fix to ONE file, preserves
          audit semantics, and clears both finding classes simultaneously.
        - Option (a) extend grandfather is bookkeeping debt accumulation;
          spec validators get harder to reason about with each special case.
        - Option (c) duplicate audit log is data-redundancy smell.
        - Option (d) marker on audit_log is consistent with the
          pre-canonical-pin pattern but adds a new validator branch for a
          one-off historical artifact; cost > benefit.
      Recommendation for iteration-0003: apply (b) mechanical rename as the
      first change of that iteration's plan. Cheaper than a v1.7.5 spec patch.
    file: agent-loop/active/iteration-0002/input.yaml
    section: known_residual_post_iteration_0002
    evidence: |
      input.yaml lists 4 options. Mechanical rename matches the rest of
      iteration-0002's pattern (mechanical-only fixes; no spec edits).
    suggested_resolution: "operator preference; recommend (b) for iteration-0003."

  - id: codex-007
    severity: low
    claim_class: methodology
    claim: |
      success_criteria_per_G5 lists "validate_consensus on iteration-0000/consensus.yaml -> 0 findings".
      Verified that adding observational_mode: true to consensus.yaml will
      activate the relaxed enum set in validate_consensus.py:188 (obs_mode = bool(...)).
      The iteration-0000 consensus.yaml currently uses non-spec enum values
      that pass-20 claude-rev-043 caught (14 INVALID_ENUM_VALUE findings).
      Adding the flag should drop those findings. Confirmed mechanism is in
      place; G5 criterion is reachable.
    file: agent-loop/active/iteration-0000/consensus.yaml
    section: change-06_dropdown
    evidence: |
      validate_consensus.py:85-90 shows the OBSERVATIONAL_STATUS_VALUES list
      includes deferred_to_v1_X, deferred_to_v1_X_per_observational_mode,
      deferred_to_v1_7, etc. Matches the legacy literals in iteration-0000.
    suggested_resolution: "no change required; flag observability confirmed."

  - id: codex-008
    severity: low
    claim_class: process
    claim: |
      change-04 fix proposal in input.yaml says "wrap the value in single
      quotes OR replace inner colon with non-breaking alternative". Recommend
      the single-quote option, not colon replacement. Replacing the colon
      changes semantic content of the recorded finding (cf-008 talks about
      a dangling reference between section_15_step and section_20_step;
      altering the punctuation muddles archival integrity). Single-quoting
      preserves the original prose verbatim and is the minimal-impact YAML
      fix.
    file: agent-loop/active/iteration-0000/iteration-outcome.yaml
    section: line_71
    evidence: |
      Verified line 71 col 44 parse failure (mapping values not allowed
      here; second colon inside unquoted string). Single-quoting the entire
      value after "- " preserves bytes.
    suggested_resolution: "use single-quote form in apply step; concrete patch patch-003 below."

