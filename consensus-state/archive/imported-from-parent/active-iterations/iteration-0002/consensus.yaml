# ---- Apply order (canonical-iter0002-004 ratification) ----

apply_order:
  rule: per_file_batching_with_validators_first_dry_run
  staging_dir: agent-loop/state/iteration-0002-staging/   # canonical-iter0002-003 fix; Windows-portable
  steps:
    - "1. Mirror agent-loop/active/iteration-0000/ to staging dir"
    - "2. Apply ALL changes per affected file as single rewrites (claude-review.yaml gets change-01 + 02 + 03 + 08 in one transform; codex-review.yaml gets change-07; consensus.yaml gets change-06; iteration-outcome.yaml gets change-04; review-packet.yaml gets change-05)"
    - "3. Run validate_disposition_index (untouched), validate_review on staged claude-review, validate_consensus on staged consensus, validate_iteration on staged dir"
    - "4. If dry-run findings <= acknowledged residuals (HASH_CHAIN_BROKEN x2 + AUDIT_EVENT_NAME_NON_CANONICAL x3 LOW + PACKET_SHA_HISTORICAL x2 LOW): apply staged content to real iteration-0000/"
    - "5. If dry-run finds anything else: do NOT apply; surface as new canonical_findings; consensus_state regresses to blocked"

# ---- Implementation scope ----

implementation_scope:
  allowed_files:
    - agent-loop/active/iteration-0000/claude-review.yaml
    - agent-loop/active/iteration-0000/codex-review.yaml
    - agent-loop/active/iteration-0000/consensus.yaml
    - agent-loop/active/iteration-0000/iteration-outcome.yaml
    - agent-loop/active/iteration-0000/review-packet.yaml
    - agent-loop/active/iteration-0002/**
    - agent-loop/state/disposition-ledger.yaml
    - agent-loop/state/iteration-0002-staging/**
    - agent-loop/archive/review-passes/index.yaml
  forbidden_files:
    - "production outputs (audiobooks/**, listen/**, voices/**)"
    - "spec sections 1-23 + frontmatter (v1.7.4 already landed; iteration-0002 does NOT touch spec)"
  allowed_actions:
    - "edit iteration-0000 artifacts to apply mechanical fixes"
    - "add observational_mode flag to iteration-0000 consensus"
    - "add pre-canonical-pin markers to iteration-0000 reviews"
    - "run validators (read-only); record reports"
    - "update disposition-ledger + archive index after close"
  forbidden_actions:
    - "modify spec sections 1-23 OR frontmatter"
    - "flip active_contract_readiness"
    - "render production audio"
    - "merge to main"
    - "apply patches without canonical-006 dry-run gate passing"

# ---- Active contract readiness lock (canonical-007 ratification) ----

active_contract_readiness_lock:
  locked_value: pending_phase_0_empirical_validation
  locked_for_iteration_duration: true

