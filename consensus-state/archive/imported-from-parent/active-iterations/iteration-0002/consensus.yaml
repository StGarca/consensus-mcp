      from reading the file. After change-04 fixes the parse error in staging, the validator
      can read the file and exposes the deeper schema mismatch. Real defect, not artifact
      of staging.
    operator_decision_required:
      options:
        - id: A
          label: "Apply only the 7 non-cascading changes (01, 02, 03, 06, 07, 08); defer change-04 + change-05 to iteration-0003"
          impact: "claude-review + codex-review + consensus get clean; iteration-outcome stays YAML-parse-broken (claude-rev-044 unresolved); review-packet stays missing-fields (claude-rev-047 unresolved). Net partial improvement."
          consistency_concern: "Partial application of declared 8-change set; some defects remain"
        - id: B
