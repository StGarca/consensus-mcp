        - id: C
          label: "Defer all 8 changes; close iteration-0002 blocked; address everything in iteration-0003 with widened scope"
          impact: "iteration-0000 stays as-is until iteration-0003"
      recommendation: B (scope expansion is in-spirit with iteration-0002's mechanical purpose; metric blocks are required by spec; values can be reconstructed empty-with-note since iteration-0000 was observational)
    corroborated_by:
