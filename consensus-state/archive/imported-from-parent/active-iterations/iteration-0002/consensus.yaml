          impact: "iteration-0000 fully clean post-iteration-0002 (modulo HASH_CHAIN_BROKEN x2 + AUDIT_EVENT_NAME_NON_CANONICAL x3 grandfathered + PACKET_SHA_HISTORICAL x2 known-residual)"
