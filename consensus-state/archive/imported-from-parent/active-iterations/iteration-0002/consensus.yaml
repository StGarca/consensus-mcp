    merge_method: exact
    severity: high   # downgraded from codex-source-blocking; resolved inline by accepted_changes change-03-revised; spec section 13 BLOCKING_FINDING_NOT_REFLECTED_IN_CONSENSUS_STATE rule does not fire on resolved bugs
    severity_at_source: blocking
    severity_downgrade_rationale: "codex-001 was severity:blocking at source. canonical-iter0002-001 status:accepted with concrete patch in accepted_changes (change-03-revised). Per spec section 13 validator rule, blocking+accepted forces consensus_state:blocked unless severity downgrades to reflect that the patch resolves the blocking nature. Synthesizer downgrade: high (still a real defect; patch in accepted_changes covers it)."
