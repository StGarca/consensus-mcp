      \ += lines\n            except OSError:\n                continue\n        #\
      \ ...\n    except Exception:\n        pass\n```\n\nThis adds 2 more git subprocesses\
      \ to the stop-rule check (on top of `_collect_changed_files`'s 3), AND reads\
      \ every untracked file's full content from disk to count lines. For a session\
      \ with 100+ untracked files (run/ artifacts, pytest tmp, etc.), this is meaningful\
      \ I/O per stop-rule poll.\n\n## Excerpt 8: `_self_drive.py:544-561` — `any_acceptance_gate_returns_undefined`\
      \ re-runs every gate\n\n```python\nundefined_gates = []\nfor gate in packet.get(\"\
      acceptance_gates\", []) or []:\n    result = _evaluate_one_gate(gate, repo_root)\n\
      \    if \"exception\" in result:\n        undefined_gates.append({\"id\": result[\"\
