      \ result.get(\"error\") == \"no_check_command\":\n        undefined_gates.append({\"\
      id\": result[\"id\"], \"kind\": \"no_check_command\"})\n```\n\n`cmd_check_stop_rules`\
      \ runs ALL acceptance_gates via subprocess for the side-effect of checking \"\
      is any gate undefined\". This is N subprocesses (typically 5-15 in real goal_packets).\
      \ `cmd_evaluate_gates` ALSO runs all gates separately (line 876). If the orchestrator\
