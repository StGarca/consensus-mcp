      \    stop_rules_fired.append({\"rule\": \"git_check_failed\", \"exception\"\
      : str(exc)})\n```\n\n`_path_matches_pattern` calls `fnmatch.fnmatch` when wildcards\
      \ are present. With F forbidden patterns and C changed files, this is O(F ×\
      \ C) regex compilations per call. fnmatch does NOT cache compiled patterns;\
      \ it recompiles each invocation.\n\n## Excerpt 7: `_self_drive.py:467-542` —\
      \ patch_size_exceeds_max walks all untracked files synchronously\n\n```python\n\
      max_patch_size = packet.get(\"max_patch_size\")\nif max_patch_size:\n    try:\n\
