    agent-loop/active/iteration-audit-2026-05-11-performance/review-target.md: "#\
      \ Performance audit — agent-loop stop-rule + dispatch hot paths\n\nAudit dimension:\
      \ **performance** (subprocess overhead, repeated yaml parse, n² stop-rule patterns,\
      \ dispatch-log scan cost, redundant audit-log re-parse).\n\n## Audit question\
      \ for codex\n\nReview the following code excerpts for performance defects. Specific\
      \ concerns (non-exclusive):\n\n1. **subprocess.run / Popen overhead**: `_self_drive.cmd_check_stop_rules`\
      \ shells out to git 4× minimum per invocation (`diff --cached`, `diff`, `ls-files`,\
      \ `diff --numstat HEAD`), each with a 30s timeout and process-creation cost.\
      \ `_evaluate_one_gate` further shells out to a user-supplied check via `shell=True`\
      \ per gate per invocation. Is there a way to batch git calls, cache by repo\
      \ state, or detect \"no changes\" cheaply before forking?\n2. **Repeated `yaml.safe_load`\
      \ on hot paths**: `cmd_check_stop_rules` parses the same goal_packet once and\
      \ then calls `_read_yaml_or_empty(claude_path)` / `_read_yaml_or_empty(codex_path)`\
      \ repeatedly across stop-rule branches (claude_path read 3+ times across lines\
      \ 445/584/728/812; codex similar). Same review-packet.yaml re-parsed across\
      \ drift-finding branches. Each `_read_yaml_or_empty` re-opens, re-reads, and\
      \ re-parses the file. Cost matters when stop-rules are evaluated in a tight\
      \ orchestrator poll loop.\n3. **n² patterns in stop-rule evaluation**: `patch_would_touch_forbidden_files`\
      \ does `for forbidden in forbidden_list: for c in changed_files:` (O(F × C)).\
      \ For a goal_packet with 50 forbidden patterns and a 500-file changeset, that's\
      \ 25k `fnmatch.fnmatch` calls per check_stop_rules invocation. The drift-finding\
      \ loop scans `iteration_artifacts` then `claude_reviewed_sha` then `consensus.reviewed_artifacts`,\
      \ each re-computing `_canonical_sha256_of_yaml_file` (which itself re-parses\
      \ + re-dumps yaml) on every referenced file.\n4. **Large dispatch-log.jsonl\
      \ scan cost as log grows**: `_visibility_watchdog._read_jsonl` does `path.read_text()`\
      \ then `splitlines()` then `json.loads` per line, building the full event list\
      \ in memory. With a months-old append-only log this is unbounded. `find_stalled`\
      \ then builds a dict over ALL events. No time-window cutoff, no streaming parse,\
      \ no index.\n5. **Redundant re-parse of audit-log in multiple stop-rule branches**:\
      \ `audit_path` (independence-audit.yaml) is read at line 403 (iter_count), and\
      \ again at line 812 (closure_invariant). `yaml.safe_load(audit_path.read_bytes())`\
      \ on a large audit yaml runs twice. Same applies to repeated `_read_yaml_or_empty(claude_path)`\
      \ calls across the validator-disagreement and closure-invariant branches.\n\
      6. **Prompt build cost in `_dispatch_codex._build_prompt`**: Linear `str.replace`\
      \ loop over the substitutions dict for every dispatch; for very large `{touched_files_contents_block}`\
      \ (multi-file review-packets), `_format_touched_files_contents` likely traverses\
      \ the dict and concatenates strings. Quadratic risk if the formatter does `result\
      \ += chunk` instead of `\"\".join(...)`.\n\n## Files in scope (excerpts below)\n\
      \n- `scripts/agent_loop_mcp/_self_drive.py` (cmd_check_stop_rules + helpers)\n\
      - `scripts/agent_loop_mcp/_dispatch_codex.py` (subprocess invocation, prompt\
      \ build)\n- `scripts/agent_loop_mcp/_visibility_watchdog.py` (dispatch-log scan)\n\
      \n---\n\n## Excerpt 1: `_self_drive.py:175-218` — `_collect_changed_files` runs\
      \ 3 git subprocesses serially\n\n```python\ndef _collect_changed_files(repo_root:\
      \ Path) -> list[str]:\n    \"\"\"Return the de-duplicated union of git's three\
      \ change-views.\n    ... covers all three:\n      1. `git diff --cached --name-only`\
      \           (staged)\n      2. `git diff --name-only`                    (unstaged\
      \ tracked)\n      3. `git ls-files --others --exclude-standard` (untracked,\
      \ gitignore-honoring)\n    \"\"\"\n    seen: set[str] = set()\n    invocations\
      \ = [\n        [\"git\", \"diff\", \"--cached\", \"--name-only\"],\n       \
      \ [\"git\", \"diff\", \"--name-only\"],\n        [\"git\", \"ls-files\", \"\
      --others\", \"--exclude-standard\"],\n    ]\n    for cmd in invocations:\n \
      \       try:\n            r = subprocess.run(\n                cmd,\n      \
      \          cwd=str(repo_root),\n                capture_output=True,\n     \
      \           text=True,\n                check=False,\n                timeout=30,\n\
      \            )\n            for ln in r.stdout.splitlines():\n             \
      \   p = ln.strip()\n                if p:\n                    seen.add(p)\n\
      \        except Exception:\n            continue\n    return sorted(seen)\n\
      ```\n\nThree subprocess.run calls back-to-back. Each git invocation pays its\
      \ own fork+exec + libgit index-load. Used by `patch_would_touch_forbidden_files`,\
      \ `cmd_verify_scope` — invoked once per `cmd_check_stop_rules`, which runs frequently\
      \ in the orchestrator poll loop.\n\n## Excerpt 2: `_self_drive.py:262-286` —\
      \ `_evaluate_one_gate` shells out per gate with shell=True\n\n```python\ndef\
      \ _evaluate_one_gate(gate: dict, repo_root: Path) -> dict:\n    gate_id = gate.get(\"\
      id\", \"?\")\n    check = gate.get(\"check\", \"\")\n    if not check:\n   \
      \     return {\"id\": gate_id, \"passed\": False, \"error\": \"no_check_command\"\
      }\n    try:\n        r = subprocess.run(check, shell=True, cwd=str(repo_root),\
      \ capture_output=True, text=True, timeout=120)\n        return {\n         \
      \   \"id\": gate_id,\n            \"passed\": r.returncode == 0,\n         \
      \   \"exit_code\": r.returncode,\n            \"stdout_tail\": r.stdout.splitlines()[-1]\
      \ if r.stdout else \"\",\n        }\n    except Exception as exc:\n        return\
      \ {\"id\": gate_id, \"passed\": False, \"exception\": str(exc)}\n```\n\nCalled\
      \ inside the `any_acceptance_gate_returns_undefined` loop in `cmd_check_stop_rules:548-553`\
      \ (one subprocess per gate per stop-rule check) AND inside `cmd_evaluate_gates:876`\
      \ (one subprocess per gate per evaluate-gates call). A 10-gate goal_packet eats\
      \ 10 forks per check_stop_rules invocation. shell=True adds an extra shell process\
      \ layer.\n\n## Excerpt 3: `_self_drive.py:289-297` — `_read_yaml_or_empty` re-reads\
      \ + re-parses on every call\n\n```python\ndef _read_yaml_or_empty(path: Path)\
      \ -> dict:\n    \"\"\"Best-effort yaml load; returns {} on missing/parse failure\
      \ rather than raising.\"\"\"\n    try:\n        if not path.exists():\n    \
      \        return {}\n        loaded = yaml.safe_load(path.read_text(encoding=\"\
      utf-8\"))\n        return loaded if isinstance(loaded, dict) else {}\n    except\
      \ Exception:\n        return {}\n```\n\nCall sites inside ONE invocation of\
      \ `cmd_check_stop_rules` (line numbers from `_self_drive.py`):\n- 445/446: claude_review\
      \ + codex_review (disagreement check)\n- 583/584/585/586: claude_prior + claude_curr\
      \ + codex_prior + codex_curr (recurring-finding check)\n- 650: review_packet\
      \ (drift check)\n- 661: claude_review_for_drift (drift check — re-reads claude_path)\n\
      - 669: consensus (drift check)\n- 722: verification.yaml fallback\n- 728/729:\
      \ claude_v + codex_v (validator-disagreement check) — re-reads claude_path AND\
      \ codex_path\n- 822: review (closure-invariant check) — re-reads claude_path/codex_path\n\
      \nclaude-review.yaml is re-parsed up to 4× per single `cmd_check_stop_rules`\
      \ invocation. codex-review.yaml similar. No memoization.\n\n## Excerpt 4: `_self_drive.py:339-348`\
      \ — canonical-sha helper re-parses + re-dumps yaml\n\n```python\ndef _canonical_sha256_of_yaml_file(p:\
      \ Path) -> str:\n    \"\"\"Canonical-full sha256: hashlib.sha256(yaml.safe_dump(yaml.safe_load(...),\
      \ sort_keys=True)).\n    \"\"\"\n    loaded = yaml.safe_load(p.read_text(encoding=\"\
      utf-8\"))\n    canonical = yaml.safe_dump(loaded, sort_keys=True)\n    return\
      \ hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n```\n\nCalled by\
      \ `_check_drift` for every claimed-sha in `review-packet.iteration_artifacts[]`,\
      \ `claude-review.reviewed_packet_sha256`, and `consensus.reviewed_artifacts[]`.\
      \ If the same referenced_path appears in two claims (common — review_packet\
      \ AND consensus both anchor the same artifact), the file is re-loaded, re-dumped,\
      \ re-hashed each time. No path-level cache.\n\n## Excerpt 5: `_self_drive.py:407-409`\
      \ + `:811-815` — audit_path read twice per stop-rule invocation\n\n```python\n\
      audit_path = iter_dir / \"independence-audit.yaml\"\niter_count = 0\nif audit_path.exists():\n\
      \    audit = yaml.safe_load(audit_path.read_bytes()) or {}\n    log = audit.get(\"\
