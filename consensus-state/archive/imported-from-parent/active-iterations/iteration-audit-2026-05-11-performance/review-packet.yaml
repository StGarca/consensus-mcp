      \ — recurring-finding rule walks all sibling iter dirs\n\n```python\nparent_dir\
      \ = iter_dir.parent\nif parent_dir.exists():\n    try:\n        siblings = sorted(\n\
      \            d.name for d in parent_dir.iterdir()\n            if d.is_dir()\
      \ and d.name.startswith(\"iteration-\")\n        )\n    except OSError:\n  \
      \      siblings = []\n    if iter_dir.name in siblings:\n        idx = siblings.index(iter_dir.name)\n\
