      ```\n\nThe same `independence-audit.yaml` is read and parsed twice in two separate\
      \ stop-rule branches. For a long-running iteration with a large audit log, this\
      \ is a noticeable double-cost.\n\n## Excerpt 6: `_self_drive.py:410-421` — n²\
      \ fnmatch loop over forbidden_files × changed\n\n```python\nforbidden = packet.get(\"\
      forbidden_files\", [])\nrepo_root = _resolve_repo_root()\ntry:\n    changed\
      \ = _collect_changed_files(repo_root)\n    for forbidden_path in forbidden:\n\
      \        for c in changed:\n            if _path_matches_pattern(c, forbidden_path):\n\
      \                stop_rules_fired.append({\"rule\": \"patch_would_touch_forbidden_files\"\
