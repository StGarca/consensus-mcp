      \            codex_prior = _read_yaml_or_empty(prior_dir / \"codex-review.yaml\"\
      )\n            codex_curr = _read_yaml_or_empty(codex_path)\n            # ...\
      \ 4 yaml parses\n```\n\n`parent_dir.iterdir()` lists every sibling iteration\
      \ directory (could be hundreds in agent-loop/archive equivalents) plus stat\
      \ per entry to test `is_dir()`. Then 4 more yaml-parse calls. claude_path is\
      \ re-parsed here even though it was already parsed at line 445.\n\n## Excerpt\
      \ 10: `_dispatch_codex.py:431-517` — `_invoke_codex` fork+exec cost per dispatch\n\
      \n```python\ndef _invoke_codex(prompt, codex_bin, timeout_seconds, repo_root,\
      \ schema_path) -> str:\n    with tempfile.NamedTemporaryFile(mode=\"w\", suffix=\"\
      .json\", delete=False, encoding=\"utf-8\") as tmp:\n        out_file = tmp.name\n\
      \    try:\n        cmd = [\n            _resolve_codex_bin(codex_bin),\n   \
      \         \"exec\",\n            \"--skip-git-repo-check\",\n            \"\
      --cd\", str(repo_root),\n            \"--sandbox\", \"read-only\",\n       \
      \     \"--output-schema\", str(schema_path),\n            \"-o\", out_file,\n\
      \            \"-\",\n        ]\n        result = subprocess.run(\n         \
      \   cmd,\n            input=prompt.encode(\"utf-8\"),\n            capture_output=True,\n\
      \            timeout=timeout_seconds,\n        )\n        # ... + earlier `_get_codex_version`\
      \ shells out separately to `<codex> --version`\n```\n\nPer dispatch: at least\
      \ 2 subprocess invocations (`<codex> --version` for audit metadata + `<codex>\
      \ exec ...`). Both pay node.js startup cost (codex CLI is js). Could the version\
      \ be cached across calls in the same Python process? `_resolve_codex_bin` also\
      \ does `shutil.which` lookups multiple times across helper invocations.\n\n\
      ## Excerpt 11: `_dispatch_codex.py:285-362` — `_build_prompt` linear replace\
      \ loop\n\n```python\ndef _build_prompt(goal_packet, template_text, iteration_dir=None,\
      \ review_packet_path=None,\n                  review_target_path=None, review_target_hash=None,\
      \ review_packet=None) -> str:\n    # ...\n    substitutions = {\n        \"\
      {goal_summary}\": str(goal.get(\"summary\", \"\")),\n        \"{desired_end_state}\"\
      : str(goal.get(\"desired_end_state\", \"\")),\n        \"{allowed_files}\":\
      \ _format_list(goal_packet.get(\"allowed_files\", [])),\n        \"{acceptance_gates}\"\
      : _format_gates(goal_packet.get(\"acceptance_gates\", [])),\n        \"{scope_signature}\"\
      : str(auth.get(\"scope_signature\", \"\")),\n        # ... ~10 keys total\n\
      \        \"{touched_files_contents_block}\": _format_touched_files_contents(touched_contents),\n\
      \    }\n    out = template_text\n    for placeholder, value in substitutions.items():\n\
      \        out = out.replace(placeholder, value)\n    return out\n```\n\nFor each\
      \ substitution, a full pass over `template_text` (and the growing `out` after\
      \ each replace). For a template + touched_files_contents_block that runs to\
      \ 50k+ chars, that's ~10 full-string scans per dispatch. Probably not hot, but\
      \ worth checking the `_format_touched_files_contents` implementation for quadratic\
      \ string concat.\n\n## Excerpt 12: `_visibility_watchdog.py:83-140` — full dispatch-log\
      \ read on every watchdog run\n\n```python\ndef _read_jsonl(path: Path) -> list[dict]:\n\
      \    \"\"\"Read JSONL; tolerate missing file + malformed lines (mirrors TUI).\"\
      \"\"\n    if not path.exists():\n        return []\n    events: list[dict] =\
      \ []\n    try:\n        text = path.read_text(encoding=\"utf-8\")\n    except\
      \ OSError:\n        return []\n    for line in text.splitlines():\n        line\
      \ = line.strip()\n        if not line:\n            continue\n        try:\n\
      \            events.append(json.loads(line))\n        except json.JSONDecodeError:\n\
      \            continue\n    return events\n\n\ndef find_stalled(events, stall_threshold_seconds:\
      \ float, now: datetime) -> list[dict]:\n    \"\"\"Return orphan dispatch_start\
      \ events older than stall_threshold_seconds.\n    \"\"\"\n    by_key: dict[tuple,\
      \ dict] = {}\n    for ev in events:\n        pass_id = ev.get(\"pass_id\") or\
      \ ev.get(\"reviewer_id\")\n        if not pass_id:\n            continue\n \
      \       iter_id = ev.get(\"iteration_id\")\n        key = (iter_id, pass_id)\n\
      \        entry = by_key.setdefault(key, {\"start\": None, \"end\": None})\n\
      \        kind = ev.get(\"event\")\n        if kind == \"dispatch_start\":\n\
      \            entry[\"start\"] = ev\n        elif kind in _TERMINAL_EVENTS:\n\
      \            entry[\"end\"] = ev\n    # ... iterates by_key\n```\n\nFull file\
      \ slurp into memory, full event-list build, then full-dict scan. As dispatch-log.jsonl\
      \ grows monotonically (append-only across all iterations), every watchdog run\
      \ pays the cost of the entire history. No tail-only mode, no offset/cursor,\
      \ no time-window prefilter.\n\n## What I expect codex to flag\n\nFindings I'd\
      \ consider valid:\n- A memoize-once pattern that would eliminate 3-4 of the\
      \ 5+ yaml.safe_load calls on claude-review.yaml within one `cmd_check_stop_rules`\
      \ invocation\n- The double-read of `independence-audit.yaml` at lines 403 and\
      \ 812 collapsed into one parse\n- A way to short-circuit `_collect_changed_files`\
      \ when `git status --porcelain` reports clean\n- An obvious win in batching\
      \ `_evaluate_one_gate` calls or caching results within a single check_stop_rules\n\
      - Tail-only or cursor-based read for `_visibility_watchdog._read_jsonl` that\
      \ doesn't slurp the whole file each invocation\n- fnmatch pattern compilation\
      \ cache (or hoisted regex) for `_path_matches_pattern`\n- An n² hot path I missed\
      \ (e.g., per-iteration sibling enumeration scaling badly)\n- Whether `_canonical_sha256_of_yaml_file`\
      \ can be memoized by `(path, mtime)`\n\n## Out of scope for this audit\n\n-\
      \ **Security** (separate audit running in parallel)\n- **Cross-platform / Windows\
