      \ text=True, check=False, timeout=30,\n        )\n        for line in untracked.stdout.splitlines():\n\
      \            rel = line.strip()\n            if not rel:\n                continue\n\
      \            f = repo_root / rel\n            try:\n                if f.is_symlink():\n\
      \                    total += 1\n                    continue\n            \
      \    with f.open(\"rb\") as fh:\n                    content = fh.read()\n \
      \               try:\n                    text = content.decode(\"utf-8\")\n\
      \                except UnicodeDecodeError:\n                    continue\n\
      \                lines = text.count(\"\\n\")\n                if text and not\
