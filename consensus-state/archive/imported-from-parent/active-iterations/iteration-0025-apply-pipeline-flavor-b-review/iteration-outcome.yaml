primary_empirical_finding:
  iter_0025_validates_iter_0024_F1_fix: YES
  evidence: |
    iter-0023 produced cross_family=FAIL on its own audit log because the
    pre-F1 merge-direction bug let the legacy top-level actor STRING override
    the nested structured actor DICT. iter-0024 F1 inverted the merge
    direction so nested wins. iter-0025 exercises the post-F1 code path
    against a real audit log with the same shape (top-level legacy string
    actor + nested structured dict, both produced by audit_append_event's
    extra_fields flattening) — and the merge now correctly surfaces
    actor.model_family=codex, so cross_family=PASS.

    closure-certificate.yaml:
      cross_family: PASS
      hash_match:   PASS
      freshness:    PASS
      overall:      PASS

    This is the FIRST production iteration to close with overall=PASS
    under the iter-0024 F1 fix.

  iter_0025_dogfooded_apply_pipeline: YES
  defect_surfaced_apply_pipeline: |
    codex-rev-002 surfaced that the apply_step_landed event emitter does NOT
    place canonical mutation fields (mutation_actor, patch_id, base_sha,
    post_sha, timestamp) at event top-level — they live nested under
    extra_fields.last_mutation. The capstone test (test_capstone_full_fix_loop.py)
    bridges this by manually hoisting nested fields onto the event top-level
    in-test (lines 371-385, 649-660); without that bridge, closure invariant
    code reading top-level apply_step_landed fields cannot find canonical
    provenance. iter-0024 F1 fixed the READER side; codex-rev-002 fixed the
    EMITTER side. Both needed.
  defect_surfaced_record_verdict: |
    codex-rev-003 surfaced that record_verdict accepted approved_patch_id
    independent of codex_finding_id, allowing a verification record for
    codex-rev-002-patch to be stored under codex_finding_id=codex-rev-001
    (and vice versa). apply.codex_patch only checks that the verification
    file for the patch_id says approved; cross-finding approval bypass was
    possible. Patch adds expected_patch_id binding refusal.

  defect_surfaced_iter_0024_F2_followup: |
    iter-0025 exercised iter-0024 F2 (per-patch base_sha helper-stamp) and
    surfaced a latent CRLF mismatch: the F2 helper computes bundle_sha
    against the review-packet's touched_files_contents (UTF-8 decoded
    text), but apply.codex_patch's bundle_sha hashes raw disk bytes.
    On Windows with CRLF line endings, the two SHAs differ by ~517 bytes
    of line-ending difference. iter-0025 worked around via manual
    per-patch re-anchor (same as iter-0023). Filed as iter-0026
    followup-001 (out of iter-0025 scope; _dispatch_codex.py is in
    forbidden_files).

