operational_caveats:
  - id: iter_0024_F2_helper_crlf_mismatch
    description: |
      iter-0024 F2 introduced _compute_per_patch_base_sha to stamp per-patch
      base_sha against the patch's OWN files_touched subset of
      defect_target.touched_files_contents. The helper computes bundle_sha
      against the UTF-8 decoded text content (because review-packet stores
      text strings, not bytes). apply.codex_patch's bundle_sha reads raw
      bytes via read_bytes(). On Windows with CRLF line endings, the two
      hash inputs differ — every helper-stamped per-patch base_sha returns
      base_sha_drift at apply time.
    workaround: |
      Manual re-anchor: rewrite each patch_proposal.base_sha to
      bundle_sha(repo_root, patch.files_touched) (disk bytes) before
      calling apply.codex_patch. Same workaround as iter-0023's manual
      re-anchor, except the root cause is text/bytes mismatch in the F2
      helper rather than a missing helper altogether.
    iter_0026_scope: |
      Fix candidates:
        (a) _compute_per_patch_base_sha encodes content as bytes preserving
            line-ending state (read review-packet contents back via
            disk-bytes equivalence, or store CRLF in touched_files_contents).
        (b) bundle_sha normalizes CRLF->LF on read (changes canonical form;
            breaks backward-compat with iter-0023/0024 stamps already in
            audit logs).
        (c) _author_review_packet stores raw bytes (breaks YAML roundtrip).
      Recommendation: (a) - surgical, no canonical-form change, no
      backward-compat issue.
  - id: working_tree_drift_unaudited
    description: |
      Same as iter-0022/0023 documented caveat. Pre-existing M/D files in
      the working tree (pyproject.toml, requirements.txt, run/*, agent-loop/state/*.jsonl,
      etc.) trigger T6's unaudited_mutation_detected gate.
    workaround: |
      iteration_closed event appended directly to audit_log (same as iter-0022/0023).
      Closure invariant evaluator + closure-certificate authoring run via direct
      _evaluate_closure_invariant + _author_closure_certificate calls.

