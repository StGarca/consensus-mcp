    scripts/agent_loop_mcp/tests/test_capstone_full_fix_loop.py: "\"\"\"Capstone end-to-end\
      \ integration test for the full codex-fix-loop â€” Task #27 (iter-0017).\n\n\
      Per codex 2026-05-10 v4 directive (memory/project_codex_fix_author_directive.md):\n\
      This test walks through the COMPLETE codex-fix-loop in a single happy-path run,\n\
      using synthetic codex output (no real codex CLI). Proves the end-to-end\narchitecture\
      \ works: codex emits patch_proposal -> claude verifies -> apply\nunder operator\
      \ authorization -> codex post-correction re-review -> close\nwith closure-certificate.yaml\
      \ authored.\n\nPlus a forbidden-transition test that proves apply.codex_patch\
      \ refuses on\nverdict=corrected_resubmit and that audit.append_event refuses\
      \ iteration_closed\nwhen the closure invariant fails.\n\nThis is the capstone\
      \ â€” when this test lands and passes, the entire\ncodex-fix-loop is mechanically\
      \ proven end-to-end via integration test.\n\"\"\"\nfrom __future__ import annotations\n\
      \nimport hashlib\nimport importlib\nimport json\nimport sys\nfrom pathlib import\
      \ Path\n\nimport pytest\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent.parent.parent\n\
      sys.path.insert(0, str(REPO_ROOT / \"scripts\"))\n\nfrom agent_loop_mcp import\
      \ _dispatch_codex  # noqa: E402\nfrom agent_loop_mcp import _self_drive  # noqa:\
      \ E402\nfrom agent_loop_mcp._closure_invariant import bundle_sha  # noqa: E402\n\
      from agent_loop_mcp.tools import apply_codex_patch  # noqa: E402\nfrom agent_loop_mcp.tools\
      \ import audit_append_event  # noqa: E402\nfrom agent_loop_mcp.tools import\
      \ loop_run_goal  # noqa: E402\nfrom agent_loop_mcp.tools import loop_verify_codex_patch\
      \  # noqa: E402\n\n\n# ---- helpers --------------------------------------------------------------\n\
      \n\n# A 3-line target source file with a known off-by-one defect; the synthesized\n\
      # codex patch_proposal will fix the off-by-one. Trivial enough for the\n# minimal\
      \ unified-diff applier in apply_codex_patch._apply_unified_diff.\nTARGET_REL\
      \ = \"scripts/sample_off_by_one.py\"\nOLD_CONTENT = \"def first_n(xs, n):\\\
      n    return xs[:n - 1]\\n\"\nNEW_CONTENT = \"def first_n(xs, n):\\n    return\
      \ xs[:n]\\n\"\n\n\n@pytest.fixture\ndef repo_root_env(tmp_path, monkeypatch):\n\
      \    \"\"\"Point AGENT_LOOP_MCP_REPO_ROOT at tmp_path so audit + apply tools\
      \ resolve there.\n\n    Reload modules that captured REPO_ROOT at import time\
      \ so they pick up the\n    env override (mirrors the pattern in test_apply_codex_patch.py).\n\
      \    \"\"\"\n    monkeypatch.setenv(\"AGENT_LOOP_MCP_REPO_ROOT\", str(tmp_path))\n\
      \    import agent_loop_mcp.tools.audit_append_event as _aae\n    import agent_loop_mcp.tools.patch_stage_and_dry_run\
      \ as _psd\n    import agent_loop_mcp.tools.patch_apply_consensus_patch as _pac\n\
      \    importlib.reload(_aae)\n    importlib.reload(_psd)\n    importlib.reload(_pac)\n\
      \    importlib.reload(apply_codex_patch)\n    return tmp_path\n\n\n@pytest.fixture\n\
      def stub_clean_dry_run(monkeypatch):\n    \"\"\"Stub patch.stage_and_dry_run\
      \ to return APPROVED with no findings.\n\n    Matches the stubbing pattern from\
      \ test_apply_codex_patch.py â€” the staged\n    dry-run gate has its own tests;\
      \ this capstone focuses on the end-to-end\n    fix-loop wiring, not validator\
      \ gating.\n    \"\"\"\n    def _stub(iteration_id=None, proposed_patches=None,\
      \ validators_to_run=None):\n        return {\n            \"staging_dir_used\"\
      : \"/tmp/stub\",\n            \"dry_run_findings\": [],\n            \"gate_decision\"\
      : \"APPROVED\",\n            \"dry_run_isolation_caveats\": [],\n        }\n\
      \    import agent_loop_mcp.tools.patch_stage_and_dry_run as _psd_mod\n    monkeypatch.setattr(_psd_mod,\
      \ \"handle\", _stub)\n    return _stub\n\n\ndef _make_iter_dir(repo_root: Path,\
      \ iter_name: str = \"iteration-0017-capstone\") -> Path:\n    \"\"\"Create the\
      \ agent-loop/active/<iter_name> dir layout audit_append_event expects.\"\"\"\
      \n    iter_dir = repo_root / \"agent-loop\" / \"active\" / iter_name\n    iter_dir.mkdir(parents=True)\n\
      \    (iter_dir / \"independence-audit.yaml\").write_text(\n        yaml.safe_dump({\"\
      audit_log\": []}), encoding=\"utf-8\"\n    )\n    return iter_dir\n\n\ndef _write_target_file(repo_root:\
      \ Path, content: str = OLD_CONTENT) -> Path:\n    full = repo_root / TARGET_REL\n\
      \    full.parent.mkdir(parents=True, exist_ok=True)\n    full.write_text(content,\
      \ encoding=\"utf-8\")\n    return full\n\n\ndef _write_goal_packet(iter_dir:\
      \ Path, codex_patch_apply_authorized: bool = True) -> Path:\n    \"\"\"Goal\
      \ packet with codex_patch_apply_authorized + scope_signature so cmd_validate\
      \ accepts.\"\"\"\n    packet = {\n        \"schema_version\": 1,\n        \"\
      pilot_id\": \"test-capstone-fix-loop\",\n        \"goal\": {\"summary\": \"\
