      \    # Seed empty independence-audit.yaml so audit_append_event has a target.\n\
      \    (iter_dir / \"independence-audit.yaml\").write_text(\n        yaml.safe_dump({\"\
      audit_log\": []}), encoding=\"utf-8\"\n    )\n    return iter_dir\n\n\ndef _write_target_file(repo_root:\
      \ Path, rel: str, content: str) -> Path:\n    full = repo_root / rel\n    full.parent.mkdir(parents=True,\
      \ exist_ok=True)\n    full.write_text(content, encoding=\"utf-8\")\n    return\
      \ full\n\n\ndef _build_patch_proposal(\n    repo_root: Path,\n    files_touched=(\"\
      scripts/foo.py\",),\n    unified_diff: str = (\n        \"--- a/scripts/foo.py\\\
      n\"\n        \"+++ b/scripts/foo.py\\n\"\n        \"@@ -1 +1,2 @@\\n\"\n   \
