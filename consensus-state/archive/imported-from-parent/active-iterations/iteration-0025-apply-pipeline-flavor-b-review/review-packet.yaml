      \    a_after = (repo_root_env / \"scripts/file_a.py\").read_text(encoding=\"\
      utf-8\")\n    b_after = (repo_root_env / \"scripts/file_b.py\").read_text(encoding=\"\
      utf-8\")\n    assert a_after == \"alpha\\nbeta\\ngamma\\n\"\n    assert b_after\
      \ == \"one\\ntwo\\nthree\\n\"\n\n\n# ---- test 2: partial failure semantics\
      \ -------------------------------------\n\n\ndef test_multi_file_diff_partial_failure_aborts(\n\
      \    repo_root_env, monkeypatch, stub_clean_dry_run\n):\n    \"\"\"When the\
      \ second file's diff has unmatchable context, the apply must\n    refuse cleanly.\
      \ Documented semantics: failure is detected during the\n    `_apply_unified_diff`\
      \ PRE-APPLY computation phase (before any\n    os.replace), so neither file\
      \ is mutated. The partial_apply_failed\n    rollback branch in apply_codex_patch\
      \ handles only mid-write filesystem\n    errors, not diff-content failures.\n\
      \    \"\"\"\n    monkeypatch.setenv(\"AGENT_LOOP_MCP_CODEX_PATCH_APPLY\", \"\
      1\")\n    iter_dir = _setup_iter_for_apply(repo_root_env)\n\n    _write_target_file(repo_root_env,\
      \ \"scripts/file_a.py\", \"alpha\\nbeta\\n\")\n    _write_target_file(repo_root_env,\
      \ \"scripts/file_b.py\", \"one\\ntwo\\n\")\n\n    # file_b's hunk references\
      \ context lines that DON'T exist in the file\n    # (\"THREE\" / \"FOUR\" â€”\
      \ file actually has \"one\"/\"two\"). Applier must reject.\n    unified_diff\
      \ = (\n        \"--- a/scripts/file_a.py\\n\"\n        \"+++ b/scripts/file_a.py\\\
      n\"\n        \"@@ -1,2 +1,3 @@\\n\"\n        \" alpha\\n\"\n        \" beta\\\
      n\"\n        \"+gamma\\n\"\n        \"--- a/scripts/file_b.py\\n\"\n       \
      \ \"+++ b/scripts/file_b.py\\n\"\n        \"@@ -1,2 +1,3 @@\\n\"\n        \"\
      \ THREE\\n\"\n        \" FOUR\\n\"\n        \"+FIVE\\n\"\n    )\n    pp = _build_multifile_proposal(\n\
      \        repo_root_env,\n        [\"scripts/file_a.py\", \"scripts/file_b.py\"\
      ],\n        unified_diff,\n    )\n    _write_codex_review(iter_dir, pp)\n  \
      \  _write_claude_verification(iter_dir, pp[\"patch_id\"], \"approved\")\n\n\
      \    a_before = (repo_root_env / \"scripts/file_a.py\").read_text(encoding=\"\
      utf-8\")\n    b_before = (repo_root_env / \"scripts/file_b.py\").read_text(encoding=\"\
      utf-8\")\n\n    result = apply_codex_patch.handle(\n        iteration_dir=str(iter_dir),\n\
      \        patch_id=pp[\"patch_id\"],\n        actor=_make_actor(),\n    )\n \
      \   assert result[\"ok\"] is False\n    assert result[\"applied\"] is False\n\
      \    err = result.get(\"error\") or \"\"\n    assert \"diff_apply_failed\" in\
      \ err, f\"expected diff_apply_failed, got: {err}\"\n\n    # NEITHER file mutated:\
      \ failure happens pre-apply during diff\n    # computation; no os.replace runs.\n\
      \    a_after = (repo_root_env / \"scripts/file_a.py\").read_text(encoding=\"\
      utf-8\")\n    b_after = (repo_root_env / \"scripts/file_b.py\").read_text(encoding=\"\
      utf-8\")\n    assert a_after == a_before, \"file_a must not be mutated when\
      \ applier refuses\"\n    assert b_after == b_before, \"file_b must not be mutated\
      \ when applier refuses\"\n\n\n# ---- test 3: multi-hunk single file ----------------------------------------\n\
      \n\ndef test_multi_hunk_single_file_diff(\n    repo_root_env, monkeypatch, stub_clean_dry_run\n\
      ):\n    \"\"\"Single file, two `@@` hunks across separate change zones.\"\"\"\
      \n    monkeypatch.setenv(\"AGENT_LOOP_MCP_CODEX_PATCH_APPLY\", \"1\")\n    iter_dir\
      \ = _setup_iter_for_apply(repo_root_env)\n\n    original = \"L1\\nL2\\nL3\\\
      nL4\\nL5\\nL6\\nL7\\nL8\\n\"\n    _write_target_file(repo_root_env, \"scripts/multi.py\"\
      , original)\n\n    # Hunk 1: insert \"INS_AFTER_L2\" after L2.\n    # Hunk 2:\
      \ replace L7 with \"L7_NEW\".\n    unified_diff = (\n        \"--- a/scripts/multi.py\\\
      n\"\n        \"+++ b/scripts/multi.py\\n\"\n        \"@@ -1,3 +1,4 @@\\n\"\n\
      \        \" L1\\n\"\n        \" L2\\n\"\n        \"+INS_AFTER_L2\\n\"\n    \
      \    \" L3\\n\"\n        \"@@ -6,3 +7,3 @@\\n\"\n        \" L6\\n\"\n      \
      \  \"-L7\\n\"\n        \"+L7_NEW\\n\"\n        \" L8\\n\"\n    )\n    # NOTE:\
      \ force diff-applier path by using NO side-channel.\n    # files_touched is\
      \ single-file but we omit _old_content/_new_content.\n    pp = _build_multifile_proposal(\n\
      \        repo_root_env, [\"scripts/multi.py\"], unified_diff\n    )\n    _write_codex_review(iter_dir,\
      \ pp)\n    _write_claude_verification(iter_dir, pp[\"patch_id\"], \"approved\"\
      )\n\n    result = apply_codex_patch.handle(\n        iteration_dir=str(iter_dir),\n\
      \        patch_id=pp[\"patch_id\"],\n        actor=_make_actor(),\n    )\n \
      \   assert result[\"ok\"] is True, f\"expected ok=True, got: {result}\"\n\n\
      \    after = (repo_root_env / \"scripts/multi.py\").read_text(encoding=\"utf-8\"\
      )\n    assert after == \"L1\\nL2\\nINS_AFTER_L2\\nL3\\nL4\\nL5\\nL6\\nL7_NEW\\\
      nL8\\n\", (\n        f\"multi-hunk apply produced unexpected content: {after!r}\"\
      \n    )\n\n\n# ---- test 4: new file creation --------------------------------------------\n\
      \n\ndef test_diff_with_added_file(\n    repo_root_env, monkeypatch, stub_clean_dry_run\n\
      ):\n    \"\"\"`--- /dev/null` / `+++ b/path` introduces a new file.\"\"\"\n\
      \    monkeypatch.setenv(\"AGENT_LOOP_MCP_CODEX_PATCH_APPLY\", \"1\")\n    iter_dir\
      \ = _setup_iter_for_apply(repo_root_env)\n\n    new_rel = \"scripts/new_module.py\"\
      \n    # Pre-state: file does not exist.\n    assert not (repo_root_env / new_rel).exists()\n\
      \n    unified_diff = (\n        \"--- /dev/null\\n\"\n        f\"+++ b/{new_rel}\\\
      n\"\n        \"@@ -0,0 +1,2 @@\\n\"\n        \"+line_one\\n\"\n        \"+line_two\\\
      n\"\n    )\n    pp = _build_multifile_proposal(repo_root_env, [new_rel], unified_diff)\n\
      \    _write_codex_review(iter_dir, pp)\n    _write_claude_verification(iter_dir,\
      \ pp[\"patch_id\"], \"approved\")\n\n    result = apply_codex_patch.handle(\n\
      \        iteration_dir=str(iter_dir),\n        patch_id=pp[\"patch_id\"],\n\
      \        actor=_make_actor(),\n    )\n    assert result[\"ok\"] is True, f\"\
      expected ok=True, got: {result}\"\n\n    target = repo_root_env / new_rel\n\
      \    assert target.exists(), \"new file must be created\"\n    content = target.read_text(encoding=\"\
      utf-8\")\n    assert content == \"line_one\\nline_two\\n\", f\"new file content\
      \ unexpected: {content!r}\"\n\n\n# ---- test 5: file deletion -------------------------------------------------\n\
      \n\ndef test_diff_with_deleted_file(\n    repo_root_env, monkeypatch, stub_clean_dry_run\n\
      ):\n    \"\"\"`+++ /dev/null` deletes a file.\n\n    DOCUMENTED LIMITATION:\
      \ the v1.0 minimal applier in\n    `_apply_unified_diff` does NOT support deletions.\
      \ The +++ header\n    parsing strips a leading \"b/\" prefix only; \"/dev/null\"\
      \ is left as the\n    segment key, which then fails to match files_touched.\
      \ The apply step\n    in apply_codex_patch.handle() also has no os.unlink branch\
      \ â€” it only\n    writes new_text via os.replace. Deletions therefore fail\
      \ cleanly with\n    `diff_apply_failed` rather than executing.\n\n    Future\
      \ work: extend the applier to recognize `+++ /dev/null` as a\n    delete signal\
      \ and have handle() unlink the file.\n    \"\"\"\n    monkeypatch.setenv(\"\
      AGENT_LOOP_MCP_CODEX_PATCH_APPLY\", \"1\")\n    iter_dir = _setup_iter_for_apply(repo_root_env)\n\
      \n    rel = \"scripts/condemned.py\"\n    _write_target_file(repo_root_env,\
      \ rel, \"doomed_line_a\\ndoomed_line_b\\n\")\n\n    unified_diff = (\n     \
      \   f\"--- a/{rel}\\n\"\n        \"+++ /dev/null\\n\"\n        \"@@ -1,2 +0,0\
      \ @@\\n\"\n        \"-doomed_line_a\\n\"\n        \"-doomed_line_b\\n\"\n  \
      \  )\n    pp = _build_multifile_proposal(repo_root_env, [rel], unified_diff)\n\
      \    _write_codex_review(iter_dir, pp)\n    _write_claude_verification(iter_dir,\
      \ pp[\"patch_id\"], \"approved\")\n\n    result = apply_codex_patch.handle(\n\
      \        iteration_dir=str(iter_dir),\n        patch_id=pp[\"patch_id\"],\n\
      \        actor=_make_actor(),\n    )\n    # Documented unsupported -> clean\
      \ refusal.\n    assert result[\"ok\"] is False\n    assert result[\"applied\"\
      ] is False\n    err = result.get(\"error\") or \"\"\n    assert \"diff_apply_failed\"\
      \ in err, (\n        f\"deletion via +++ /dev/null should fail with diff_apply_failed;\
      \ got: {err}\"\n    )\n    # File must still exist: refusal occurred before\
      \ any apply step.\n    assert (repo_root_env / rel).exists(), \"file must remain\
      \ on refusal\"\n\n\n# ---- test 6: zero-context diff ---------------------------------------------\n\
      \n\ndef test_diff_with_no_context_lines(\n    repo_root_env, monkeypatch, stub_clean_dry_run\n\
      ):\n    \"\"\"Edge case: diff body has only +/- lines, no surrounding context.\n\
      \n    The applier walks lines linearly; with no context, `-` lines must\n  \
      \  match the original sequentially from orig_idx=0 and `+` lines append\n  \
      \  to output. This test uses a full-file replacement: every original\n    line\
      \ removed, every new line added.\n    \"\"\"\n    monkeypatch.setenv(\"AGENT_LOOP_MCP_CODEX_PATCH_APPLY\"\
      , \"1\")\n    iter_dir = _setup_iter_for_apply(repo_root_env)\n\n    rel = \"\
      scripts/zerocontext.py\"\n    _write_target_file(repo_root_env, rel, \"old_a\\\
      nold_b\\n\")\n\n    unified_diff = (\n        f\"--- a/{rel}\\n\"\n        f\"\
      +++ b/{rel}\\n\"\n        \"@@ -1,2 +1,2 @@\\n\"\n        \"-old_a\\n\"\n  \
      \      \"-old_b\\n\"\n        \"+new_a\\n\"\n        \"+new_b\\n\"\n    )\n\
      \    pp = _build_multifile_proposal(repo_root_env, [rel], unified_diff)\n  \
      \  _write_codex_review(iter_dir, pp)\n    _write_claude_verification(iter_dir,\
      \ pp[\"patch_id\"], \"approved\")\n\n    result = apply_codex_patch.handle(\n\
      \        iteration_dir=str(iter_dir),\n        patch_id=pp[\"patch_id\"],\n\
      \        actor=_make_actor(),\n    )\n    assert result[\"ok\"] is True, f\"\
      expected ok=True, got: {result}\"\n\n    after = (repo_root_env / rel).read_text(encoding=\"\
      utf-8\")\n    # DOCUMENTED SEMANTICS: applier emits +s in encounter order, then\n\
      \    # advances orig_idx for each `-`. With no context, the final\n    # \"\
      remaining originals\" tail-append loop adds nothing because all\n    # originals\
      \ were consumed by `-` lines. Result is the new lines only.\n    assert after\
      \ == \"new_a\\nnew_b\\n\", (\n        f\"zero-context full-replace produced\
      \ unexpected content: {after!r}\"\n    )\n\n\n# ---- test 7: multi-file post_sha\
      \ reflects all mutations --------------------\n\n\ndef test_multi_file_post_sha_reflects_all_mutations(\n\
      \    repo_root_env, monkeypatch, stub_clean_dry_run\n):\n    \"\"\"post_sha\
      \ (bundle_sha post-apply) differs from base_sha when MULTIPLE\n    files mutate.\
      \ Catches a regression where post_sha was computed against\n    only the first\
      \ file or against the staging_dir copies.\n    \"\"\"\n    monkeypatch.setenv(\"\
      AGENT_LOOP_MCP_CODEX_PATCH_APPLY\", \"1\")\n    iter_dir = _setup_iter_for_apply(repo_root_env)\n\
      \n    _write_target_file(repo_root_env, \"scripts/m_a.py\", \"AA1\\nAA2\\n\"\
      )\n    _write_target_file(repo_root_env, \"scripts/m_b.py\", \"BB1\\nBB2\\n\"\
      )\n\n    unified_diff = (\n        \"--- a/scripts/m_a.py\\n\"\n        \"+++\
      \ b/scripts/m_a.py\\n\"\n        \"@@ -1,2 +1,3 @@\\n\"\n        \" AA1\\n\"\
      \n        \" AA2\\n\"\n        \"+AA3\\n\"\n        \"--- a/scripts/m_b.py\\\
      n\"\n        \"+++ b/scripts/m_b.py\\n\"\n        \"@@ -1,2 +1,3 @@\\n\"\n \
      \       \" BB1\\n\"\n        \" BB2\\n\"\n        \"+BB3\\n\"\n    )\n    files_touched\
      \ = [\"scripts/m_a.py\", \"scripts/m_b.py\"]\n    pp = _build_multifile_proposal(repo_root_env,\
      \ files_touched, unified_diff)\n    _write_codex_review(iter_dir, pp)\n    _write_claude_verification(iter_dir,\
      \ pp[\"patch_id\"], \"approved\")\n\n    pre_bundle = bundle_sha(repo_root_env,\
      \ files_touched)\n    assert pre_bundle == pp[\"base_sha\"]\n\n    result =\
      \ apply_codex_patch.handle(\n        iteration_dir=str(iter_dir),\n        patch_id=pp[\"\
      patch_id\"],\n        actor=_make_actor(),\n    )\n    assert result[\"ok\"\
      ] is True, f\"expected ok=True, got: {result}\"\n\n    post_bundle = bundle_sha(repo_root_env,\
      \ files_touched)\n    lm = result[\"last_mutation\"]\n    assert lm[\"post_sha\"\
      ] == post_bundle, (\n        f\"last_mutation.post_sha={lm['post_sha']} should\
      \ equal \"\n        f\"bundle_sha-post-apply={post_bundle}\"\n    )\n    assert\
      \ lm[\"post_sha\"] != pre_bundle, (\n        \"post_sha must differ from base_sha\
      \ after a real mutation\"\n    )\n\n    # Spot-check: the per-file content hash\
      \ of EACH touched file changed.\n    a_after = (repo_root_env / \"scripts/m_a.py\"\
      ).read_text(encoding=\"utf-8\")\n    b_after = (repo_root_env / \"scripts/m_b.py\"\
      ).read_text(encoding=\"utf-8\")\n    assert a_after == \"AA1\\nAA2\\nAA3\\n\"\
      \n    assert b_after == \"BB1\\nBB2\\nBB3\\n\"\n\n    # And: dropping either\
      \ file from files_touched would change post_sha,\n    # confirming the bundle\
      \ hash truly covers BOTH mutations.\n    only_a = bundle_sha(repo_root_env,\
      \ [\"scripts/m_a.py\"])\n    only_b = bundle_sha(repo_root_env, [\"scripts/m_b.py\"\
      ])\n    assert post_bundle != only_a\n    assert post_bundle != only_b\n"
    scripts/agent_loop_mcp/tests/test_loop_verify_codex_patch.py: "\"\"\"Unit tests\
      \ for tools/loop_verify_codex_patch.py â€” Task #25 (iter-0015).\n\nPer codex\
      \ 2026-05-10 v4 directive (memory/project_codex_fix_author_directive.md):\n\
      \  - Claude verifies codex-emitted patches per CLAUDE.md.\n  - The MCP tool\
      \ BUILDS the verifier-input bundle (reproducibility-bounded);\n    it does NOT\
      \ itself dispatch a subagent â€” that's the orchestrator's job.\n  - The tool\
      \ also RECORDS the eventual subagent verdict back into the\n    iteration_dir.\n\
      \nTwo modes:\n  * mode=build_inputs (default) â€” read codex-review.yaml, find\
      \ patch_proposal,\n    assemble verifier_inputs (goal_packet + acceptance_gates\
      \ + touched files\n    full content + CLAUDE.md + codex finding TEXT only â€”\
      \ NOT codex's\n    reasoning trail), compute review_scope_hash. Returns blocked\
      \ verdict\n    placeholder for orchestrator to follow up.\n  * mode=record_verdict\
      \ â€” validate subagent's structured verdict and write\n    to iteration_dir/codex-patch-verifications/<patch_id>.yaml.\n\
      \"\"\"\nfrom __future__ import annotations\n\nimport json\nimport sys\nfrom\
      \ pathlib import Path\n\nimport pytest\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent.parent.parent\n\
      sys.path.insert(0, str(REPO_ROOT / \"scripts\"))\n\nfrom agent_loop_mcp.tool_registry\
      \ import ToolRegistry  # noqa: E402\nfrom agent_loop_mcp.tools import loop_verify_codex_patch\
      \  # noqa: E402\n\n\n# ---- helpers ---------------------------------------------------------------\n\
      \n\ndef _build_patch_proposal(\n    base_sha: str = \"abc123def456abc123def456abc123def456abc123def456abc123def456abcd\"\
      ,\n    unified_diff: str = (\n        \"--- a/scripts/foo.py\\n\"\n        \"\
      +++ b/scripts/foo.py\\n\"\n        \"@@ -1 +1,2 @@\\n\"\n        \" hello\\\
      n\"\n        \"+world\\n\"\n    ),\n    applies_to_findings=(\"codex-rev-001\"\
      ,),\n    files_touched=(\"scripts/foo.py\",),\n    expected_tests=None,\n) ->\
      \ dict:\n    # iter-0020: patch_id is finding-id-derived, not content-bound.\n\
      \    finding_id = list(applies_to_findings)[0] if applies_to_findings else \"\
      codex-rev-001\"\n    patch_id = f\"{finding_id}-patch\"\n    pp: dict = {\n\
      \        \"patch_id\": patch_id,\n        \"applies_to_findings\": list(applies_to_findings),\n\
      \        \"base_sha\": base_sha,\n        \"unified_diff\": unified_diff,\n\
      \        \"files_touched\": list(files_touched),\n    }\n    if expected_tests\
      \ is not None:\n        pp[\"expected_tests\"] = list(expected_tests)\n    return\
      \ pp\n\n\ndef _write_codex_review(\n    iter_dir: Path,\n    patch_proposal:\
      \ dict | None = None,\n    finding_id: str = \"codex-rev-001\",\n    extra_review_fields:\
      \ dict | None = None,\n) -> Path:\n    finding = {\n        \"id\": finding_id,\n\
      \        \"severity\": \"medium\",\n        \"summary\": \"Test finding for\
      \ verify-codex-patch tests\",\n        \"citation\": \"scripts/foo.py:1\",\n\
      \        \"risk\": \"Low; test fixture\",\n        \"recommendation\": \"Apply\
      \ the patch_proposal as a fix\",\n    }\n    if patch_proposal is not None:\n\
      \        finding[\"patch_proposal\"] = patch_proposal\n    review = {\n    \
      \    \"iteration_id\": iter_dir.name,\n        \"reviewer_id\": \"codex-test-1\"\
      ,\n        \"pass_id\": \"codex-test-1-pass1\",\n        \"findings\": [finding],\n\
      \        \"goal_satisfied\": False,\n        \"blocking_objections\": [],\n\
      \        \"goal_satisfied_rationale\": \"Codex's private reasoning trail; verifier\
      \ MUST NOT see this.\",\n    }\n    if extra_review_fields:\n        review.update(extra_review_fields)\n\
      \    p = iter_dir / \"codex-review.yaml\"\n    p.write_text(yaml.safe_dump(review),\
      \ encoding=\"utf-8\")\n    return p\n\n\ndef _write_goal_packet(iter_dir: Path)\
      \ -> Path:\n    pkt = {\n        \"schema_version\": 1,\n        \"pilot_id\"\
      : \"test-verify-codex-patch\",\n        \"goal\": {\"summary\": \"test goal\"\
      , \"desired_end_state\": \"verified\"},\n        \"allowed_files\": [\"scripts/foo.py\"\
      ],\n        \"allowed_sections\": [],\n        \"forbidden_files\": [],\n  \
      \      \"max_iterations\": 10,\n        \"max_patch_size\": None,\n        \"\
      validators_required\": [],\n        \"acceptance_gates\": [\n            {\"\
      id\": \"gate1\", \"description\": \"tests pass\", \"check\": \"pytest -q\"}\n\
      \        ],\n        \"stop_conditions\": [],\n        \"operator_escalation_triggers\"\
      : [],\n        \"authorization\": {\"authorized_by\": \"operator\", \"scope_signature\"\
      : \"sig\"},\n    }\n    p = iter_dir / \"goal_packet.yaml\"\n    p.write_text(yaml.safe_dump(pkt),\
      \ encoding=\"utf-8\")\n    return p\n\n\ndef _write_touched_file(repo_root:\
      \ Path, rel: str, content: str) -> Path:\n    full = repo_root / rel\n    full.parent.mkdir(parents=True,\
      \ exist_ok=True)\n    full.write_text(content, encoding=\"utf-8\")\n    return\
      \ full\n\n\ndef _write_claude_md(repo_root: Path, content: str = \"# CLAUDE.md\\\
      nKarpathy four principles.\\n\") -> Path:\n    p = repo_root / \"CLAUDE.md\"\
      \n    p.write_text(content, encoding=\"utf-8\")\n    return p\n\n\ndef _make_iter_dir(tmp_path:\
      \ Path) -> Path:\n    iter_dir = tmp_path / \"iteration-0015\"\n    iter_dir.mkdir()\n\
      \    return iter_dir\n\n\n# ---- SCHEMA shape ----------------------------------------------------------\n\
      \n\ndef test_schema_name_is_loop_verify_codex_patch():\n    assert loop_verify_codex_patch.SCHEMA[\"\
      name\"] == \"loop.verify_codex_patch\"\n\n\ndef test_schema_required_fields():\n\
      \    required = set(loop_verify_codex_patch.SCHEMA[\"input_schema\"][\"required\"\
      ])\n    assert required == {\"iteration_dir\", \"codex_finding_id\"}\n\n\ndef\
      \ test_schema_supports_mode_property():\n    props = loop_verify_codex_patch.SCHEMA[\"\
      input_schema\"][\"properties\"]\n    assert \"mode\" in props\n\n\ndef test_schema_disallows_additional_properties():\n\
      \    assert (\n        loop_verify_codex_patch.SCHEMA[\"input_schema\"][\"additionalProperties\"\
      ] is False\n    )\n\n\ndef test_schema_output_required_fields():\n    required\
      \ = set(loop_verify_codex_patch.SCHEMA[\"output_schema\"][\"required\"])\n \
      \   assert required == {\"verdict\", \"rationale\"}\n\n\ndef test_schema_verdict_enum_includes_all_three_values():\n\
      \    verdict_def = loop_verify_codex_patch.SCHEMA[\"output_schema\"][\"properties\"\
      ][\"verdict\"]\n    enum = set(verdict_def[\"enum\"])\n    assert enum == {\"\
      approved\", \"corrected_resubmit\", \"blocked\"}\n\n\n# ---- register() integration\
      \ ------------------------------------------------\n\n\ndef test_register_adds_tool_to_registry():\n\
      \    registry = ToolRegistry()\n    loop_verify_codex_patch.register(registry)\n\
      \    names = [t[\"name\"] for t in registry.list_tools()]\n    assert \"loop.verify_codex_patch\"\
      \ in names\n\n\ndef test_register_handler_is_callable():\n    registry = ToolRegistry()\n\
      \    loop_verify_codex_patch.register(registry)\n    handler = registry.get_handler(\"\
      loop.verify_codex_patch\")\n    assert callable(handler)\n\n\n# ---- mode=build_inputs\
      \ -----------------------------------------------------\n\n\ndef test_build_inputs_assembles_bundle(tmp_path):\n\
      \    \"\"\"Given fake codex-review with patch_proposal + goal_packet + touched\
      \ files,\n    returns input bundle with review_scope_hash.\"\"\"\n    iter_dir\
