      \        \"allowed_sections\": [],\n        \"forbidden_files\": [],\n     \
      \   \"max_iterations\": 10,\n        \"max_patch_size\": None,\n        \"validators_required\"\
      : [],\n        \"acceptance_gates\": [],\n        \"stop_conditions\": [],\n\
