      \ does NOT itself dispatch a subagent â€” that's the orchestrator's\njob. The\
      \ tool BUILDS the verifier-input bundle (mode=build_inputs) and\nRECORDS the\
      \ eventual verdict back into the iteration_dir\n(mode=record_verdict).\n\nIndependence\
      \ property (preserved): the build_inputs bundle includes the\ncodex finding\
      \ TEXT (the WHAT â€” summary + recommendation + citation +\nrisk + severity)\
      \ but EXCLUDES codex's `goal_satisfied_rationale` and any\nprior reviewer reasoning.\
      \ The verifier subagent re-derives the verdict\nfrom the patch + touched files\
      \ + CLAUDE.md, not from codex's narrative.\n\"\"\"\nfrom __future__ import annotations\n\
      \nimport hashlib\nimport json\nfrom pathlib import Path\nfrom typing import\
      \ Any\n\nimport yaml\n\nfrom agent_loop_mcp._self_drive import _read_yaml_or_empty\n\
      \n\nSCHEMA = {\n    \"name\": \"loop.verify_codex_patch\",\n    \"description\"\
      : (\n        \"Claude verifies a codex-emitted patch_proposal per CLAUDE.md.\
      \ \"\n        \"Subagent receives reproducibility-bounded inputs (NOT codex's\
      \ reasoning); \"\n        \"emits structured verdict: approved | corrected_resubmit.\
      \ \"\n        \"On corrected_resubmit, the verdict embeds claude's corrections;\
      \ \"\n        \"the supervisor MUST route through codex_re_reviewing_after_claude_correction\
      \ \"\n        \"before any close attempt. Two modes: mode=build_inputs (default)\
      \ reads \"\n        \"codex-review.yaml + builds the verifier-input bundle +\
      \ computes \"\n        \"review_scope_hash; mode=record_verdict validates the\
      \ subagent's verdict \"\n        \"and writes it to iteration_dir/codex-patch-verifications/<patch_id>.yaml.\"\
      \n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"\
      properties\": {\n            \"iteration_dir\": {\"type\": \"string\"},\n  \
      \          \"codex_finding_id\": {\"type\": \"string\"},\n            \"mode\"\
      : {\n                \"type\": [\"string\", \"null\"],\n                \"enum\"\
      : [\"build_inputs\", \"record_verdict\", None],\n                \"description\"\
      : (\n                    \"build_inputs (default) returns the verifier_inputs\
      \ bundle + \"\n                    \"review_scope_hash; record_verdict writes\
      \ the subagent's verdict \"\n                    \"to a yaml file under codex-patch-verifications/.\"\
      \n                ),\n            },\n            \"claude_md_path\": {\"type\"\
      : [\"string\", \"null\"]},\n            \"test_runner\": {\"type\": [\"string\"\
      , \"null\"]},\n            \"repo_root\": {\n                \"type\": [\"string\"\
      , \"null\"],\n                \"description\": (\n                    \"Repo\
      \ root for resolving touched_files paths in build_inputs. \"\n             \
      \       \"Defaults to the supervisor's repo root resolution.\"\n           \
      \     ),\n            },\n            # record_verdict-mode params:\n      \
      \      \"verdict\": {\n                \"type\": [\"string\", \"null\"],\n \
      \               \"enum\": [\"approved\", \"corrected_resubmit\", \"blocked\"\
      , None],\n            },\n            \"rationale\": {\"type\": [\"string\"\
      , \"null\"]},\n            \"review_scope_hash\": {\"type\": [\"string\", \"\
      null\"]},\n            \"corrections\": {\"type\": [\"string\", \"null\"]},\n\
      \            \"approved_patch_id\": {\"type\": [\"string\", \"null\"]},\n  \
      \      },\n        \"required\": [\"iteration_dir\", \"codex_finding_id\"],\n\
      \        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n\
      \        \"type\": \"object\",\n        \"properties\": {\n            \"verdict\"\
      : {\"enum\": [\"approved\", \"corrected_resubmit\", \"blocked\"]},\n       \
      \     \"review_scope_hash\": {\"type\": [\"string\", \"null\"]},\n         \
      \   \"rationale\": {\"type\": \"string\"},\n            \"corrections\": {\"\
      type\": [\"string\", \"null\"]},\n            \"approved_patch_id\": {\"type\"\
      : [\"string\", \"null\"]},\n            \"verifier_inputs\": {\"type\": [\"\
      object\", \"null\"]},\n            \"error\": {\"type\": [\"string\", \"null\"\
      ]},\n        },\n        \"required\": [\"verdict\", \"rationale\"],\n    },\n\
      }\n\n\n_VALID_VERDICTS = {\"approved\", \"corrected_resubmit\", \"blocked\"\
      }\n\n\ndef _read_codex_review(iter_dir: Path) -> dict | None:\n    \"\"\"Read\
      \ iteration_dir/codex-review.yaml; return dict or None if missing.\"\"\"\n \
      \   p = iter_dir / \"codex-review.yaml\"\n    if not p.exists():\n        return\
      \ None\n    return _read_yaml_or_empty(p)\n\n\ndef _find_finding_by_id(review:\
      \ dict, finding_id: str) -> dict | None:\n    findings = review.get(\"findings\"\
      ) or []\n    for f in findings:\n        if isinstance(f, dict) and f.get(\"\
      id\") == finding_id:\n            return f\n    return None\n\n\ndef _build_codex_finding_text(finding:\
      \ dict) -> str:\n    \"\"\"Render the finding as a plain-text block â€” the\
      \ WHAT, not the WHY.\n\n    Excludes any reasoning fields (goal_satisfied_rationale\
      \ lives at the\n    review root, not on a finding, but we deliberately do not\
      \ pull from\n    review-level fields anyway). Includes only the structured-output\n\
      \    schema-required finding fields: id, severity, summary, citation,\n    risk,\
      \ recommendation.\n    \"\"\"\n    parts = [\n        f\"id: {finding.get('id',\
      \ '')}\",\n        f\"severity: {finding.get('severity', '')}\",\n        f\"\
      summary: {finding.get('summary', '')}\",\n        f\"citation: {finding.get('citation',\
      \ '')}\",\n        f\"risk: {finding.get('risk', '')}\",\n        f\"recommendation:\
      \ {finding.get('recommendation', '')}\",\n    ]\n    return \"\\n\".join(parts)\n\
      \n\ndef _read_touched_files(repo_root: Path, files: list[str]) -> dict[str,\
      \ str]:\n    \"\"\"Read each file's full contents (UTF-8); missing files map\
      \ to \"\".\"\"\"\n    out: dict[str, str] = {}\n    for rel in files:\n    \
      \    full = repo_root / rel\n        try:\n            out[rel] = full.read_text(encoding=\"\
      utf-8\") if full.exists() else \"\"\n        except OSError:\n            out[rel]\
      \ = \"\"\n    return out\n\n\ndef _read_claude_md(claude_md_path: Path | None)\
      \ -> str:\n    \"\"\"Read CLAUDE.md content as a string; return \"\" if missing\
      \ or unreadable.\"\"\"\n    if claude_md_path is None:\n        return \"\"\n\
      \    try:\n        if claude_md_path.exists():\n            return claude_md_path.read_text(encoding=\"\
      utf-8\")\n    except OSError:\n        return \"\"\n    return \"\"\n\n\ndef\
      \ _compute_review_scope_hash(bundle: dict) -> str:\n    \"\"\"Compute sha256\
      \ of the verifier-input bundle.\n\n    Canonicalize via json.dumps with sort_keys=True\
      \ so the hash is\n    deterministic across calls with identical inputs and sensitive\
      \ to any\n    input change (file content, finding text, CLAUDE.md, etc.).\n\
      \    \"\"\"\n    canonical = json.dumps(bundle, sort_keys=True, ensure_ascii=False)\n\
      \    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\n\ndef\
      \ _bundle_sha_for_files(repo_root: Path, files_touched: list[str]) -> str:\n\
      \    \"\"\"Mirror of _closure_invariant.bundle_sha â€” used for post_sha_hint.\n\
      \n    Imported lazily to avoid a hard dep on _closure_invariant from this\n\
      \    tool (consistent with the loop_run_goal lazy-import pattern).\n    \"\"\
      \"\n    try:\n        from agent_loop_mcp._closure_invariant import bundle_sha\n\
      \        return bundle_sha(repo_root, files_touched)\n    except Exception:\n\
      \        # Best-effort; the orchestrator can recompute downstream.\n       \
      \ parts = []\n        for rel in sorted(files_touched):\n            full =\
      \ repo_root / rel\n            content = full.read_bytes() if full.exists()\
      \ else b\"\"\n            parts.append(f\"{rel}\\0{hashlib.sha256(content).hexdigest()}\"\
      )\n        return hashlib.sha256(\"\\n\".join(parts).encode(\"utf-8\")).hexdigest()\n\
      \n\ndef _read_goal_packet(iter_dir: Path) -> dict:\n    \"\"\"Read goal_packet.yaml\
      \ from the iteration dir; return {} if missing.\"\"\"\n    p = iter_dir / \"\
      goal_packet.yaml\"\n    if not p.exists():\n        return {}\n    return _read_yaml_or_empty(p)\n\
      \n\ndef _build_inputs_handler(\n    iter_dir: Path,\n    codex_finding_id: str,\n\
      \    claude_md_path: Path | None,\n    repo_root: Path,\n) -> dict:\n    \"\"\
      \"mode=build_inputs: assemble the verifier-input bundle + hash.\n\n    Independence\
      \ property: the bundle EXCLUDES codex's reasoning trail\n    (goal_satisfied_rationale,\
      \ prior reviewer conclusions). Only the\n    finding TEXT is included.\n   \
      \ \"\"\"\n    review = _read_codex_review(iter_dir)\n    if review is None:\n\
      \        return {\n            \"verdict\": \"blocked\",\n            \"rationale\"\
      : \"codex-review.yaml not found in iteration_dir\",\n            \"error\":\
      \ \"codex-review.yaml not found in iteration_dir\",\n        }\n    finding\
      \ = _find_finding_by_id(review, codex_finding_id)\n    if finding is None:\n\
      \        return {\n            \"verdict\": \"blocked\",\n            \"rationale\"\
      : f\"codex_finding_id {codex_finding_id!r} not present in codex-review.yaml\"\
      ,\n            \"error\": f\"codex_finding_id {codex_finding_id!r} not present\
      \ in codex-review.yaml\",\n        }\n    pp = finding.get(\"patch_proposal\"\
      )\n    if pp is None or not isinstance(pp, dict):\n        return {\n      \
      \      \"verdict\": \"blocked\",\n            \"rationale\": (\n           \
      \     f\"finding {codex_finding_id!r} has no patch_proposal; verification \"\
      \n                f\"requires a patch_proposal block\"\n            ),\n   \
      \         \"error\": (\n                f\"finding {codex_finding_id!r} has\
      \ no patch_proposal; verification \"\n                f\"requires a patch_proposal\
      \ block\"\n            ),\n        }\n\n    goal_packet = _read_goal_packet(iter_dir)\n\
      \    acceptance_gates = goal_packet.get(\"acceptance_gates\", []) or []\n  \
      \  files_touched = pp.get(\"files_touched\", []) or []\n    touched_files =\
      \ _read_touched_files(repo_root, list(files_touched))\n    claude_md_excerpt\
      \ = _read_claude_md(claude_md_path)\n    finding_text = _build_codex_finding_text(finding)\n\
      \    base_sha = pp.get(\"base_sha\", \"\")\n    post_sha_hint = _bundle_sha_for_files(repo_root,\
      \ list(files_touched))\n\n    bundle = {\n        \"goal_packet\": goal_packet,\n\
      \        \"acceptance_gates\": acceptance_gates,\n        \"patch_proposal\"\
      : pp,\n        \"touched_files\": touched_files,\n        \"claude_md_excerpt\"\
      : claude_md_excerpt,\n        \"codex_finding_text\": finding_text,\n      \
      \  \"base_sha\": base_sha,\n        \"post_sha_hint\": post_sha_hint,\n    }\n\
      \n    review_scope_hash = _compute_review_scope_hash(bundle)\n\n    return {\n\
      \        \"verdict\": \"blocked\",\n        \"rationale\": \"inputs built; awaiting\
      \ subagent verdict\",\n        \"review_scope_hash\": review_scope_hash,\n \
      \       \"verifier_inputs\": bundle,\n    }\n\n\ndef _record_verdict_handler(\n\
      \    iter_dir: Path,\n    codex_finding_id: str,\n    verdict: str | None,\n\
      \    rationale: str | None,\n    review_scope_hash: str | None,\n    corrections:\
      \ str | None,\n    approved_patch_id: str | None,\n) -> dict:\n    \"\"\"mode=record_verdict:\
      \ validate + persist the subagent's verdict.\"\"\"\n    if verdict not in {\"\
      approved\", \"corrected_resubmit\"}:\n        return {\n            \"verdict\"\
      : \"blocked\",\n            \"rationale\": \"invalid verdict\",\n          \
      \  \"error\": (\n                f\"verdict must be one of {{approved, corrected_resubmit}};\
      \ got {verdict!r}\"\n            ),\n        }\n    if not approved_patch_id:\n\
      \        return {\n            \"verdict\": \"blocked\",\n            \"rationale\"\
      : \"missing approved_patch_id\",\n            \"error\": \"approved_patch_id\
      \ is required to author the verification yaml\",\n        }\n    # Defense-in-depth:\
      \ validate patch_id format BEFORE constructing out_path.\n    # Per iter-0020\
      \ ergonomics fix: codex-producible form (finding-id-derived).\n    # Codex's\
      \ output schema enforces ^codex-rev-\\d+-patch$ at dispatch time,\n    # but\
      \ record_verdict accepts arbitrary string. Re-validate to prevent\n    # path-traversal\
      \ if a malformed value slips past the orchestrator.\n    import re\n    _PATCH_ID_PATTERN\
      \ = re.compile(r\"^codex-rev-\\d+-patch$\")\n    if not _PATCH_ID_PATTERN.match(approved_patch_id):\n\
      \        return {\n            \"verdict\": \"blocked\",\n            \"rationale\"\
      : \"approved_patch_id format invalid\",\n            \"error\": (\n        \
      \        f\"approved_patch_id must match ^codex-rev-\\\\d+-patch$; \"\n    \
      \            f\"got {approved_patch_id!r}\"\n            ),\n        }\n   \
      \ if verdict == \"corrected_resubmit\" and not corrections:\n        return\
      \ {\n            \"verdict\": \"blocked\",\n            \"rationale\": \"corrected_resubmit\
      \ requires corrections\",\n            \"error\": \"verdict=corrected_resubmit\
      \ requires a non-empty corrections diff\",\n        }\n\n    record: dict[str,\
      \ Any] = {\n        \"schema_version\": 1,\n        \"verifier\": \"claude\"\
      ,\n        \"verdict\": verdict,\n        \"review_scope_hash\": review_scope_hash\
      \ or \"\",\n        \"rationale\": rationale or \"\",\n        \"approved_patch_id\"\
      : approved_patch_id,\n        \"codex_finding_id\": codex_finding_id,\n    }\n\
      \    if corrections is not None:\n        record[\"corrections\"] = corrections\n\
      \n    out_dir = iter_dir / \"codex-patch-verifications\"\n    out_dir.mkdir(parents=True,\
      \ exist_ok=True)\n    out_path = out_dir / f\"{approved_patch_id}.yaml\"\n \
      \   out_path.write_text(yaml.safe_dump(record, sort_keys=True), encoding=\"\
      utf-8\")\n\n    response: dict[str, Any] = {\n        \"verdict\": verdict,\n\
      \        \"rationale\": rationale or \"\",\n        \"approved_patch_id\": approved_patch_id,\n\
      \        \"review_scope_hash\": review_scope_hash,\n    }\n    if corrections\
      \ is not None:\n        response[\"corrections\"] = corrections\n    return\
      \ response\n\n\ndef handle(\n    iteration_dir: str,\n    codex_finding_id:\
      \ str,\n    mode: str | None = None,\n    claude_md_path: str | None = None,\n\
      \    test_runner: str | None = None,\n    repo_root: str | None = None,\n  \
      \  verdict: str | None = None,\n    rationale: str | None = None,\n    review_scope_hash:\
      \ str | None = None,\n    corrections: str | None = None,\n    approved_patch_id:\
      \ str | None = None,\n) -> dict:\n    \"\"\"Tool entry point. mode default =\
      \ build_inputs.\"\"\"\n    iter_dir = Path(iteration_dir)\n    effective_mode\
      \ = mode or \"build_inputs\"\n\n    if effective_mode == \"build_inputs\":\n\
      \        # Resolve repo_root: explicit param > iter_dir's parent (typical\n\
      \        # iteration layout iter_dir == <repo>/agent-loop/active/iteration-NNNN/).\n\
      \        if repo_root is not None:\n            repo_root_path = Path(repo_root)\n\
      \        else:\n            # Fall back to iter_dir.parent.parent.parent (the\
      \ conventional\n            # repo layout). Best-effort; tests pass repo_root\
      \ explicitly.\n            try:\n                repo_root_path = iter_dir.resolve().parent.parent.parent\n\
      \            except Exception:\n                repo_root_path = iter_dir\n\
      \        claude_md_path_obj = Path(claude_md_path) if claude_md_path else (repo_root_path\
      \ / \"CLAUDE.md\")\n        return _build_inputs_handler(\n            iter_dir=iter_dir,\n\
      \            codex_finding_id=codex_finding_id,\n            claude_md_path=claude_md_path_obj,\n\
      \            repo_root=repo_root_path,\n        )\n    if effective_mode ==\
      \ \"record_verdict\":\n        return _record_verdict_handler(\n           \
      \ iter_dir=iter_dir,\n            codex_finding_id=codex_finding_id,\n     \
      \       verdict=verdict,\n            rationale=rationale,\n            review_scope_hash=review_scope_hash,\n\
      \            corrections=corrections,\n            approved_patch_id=approved_patch_id,\n\
      \        )\n    return {\n        \"verdict\": \"blocked\",\n        \"rationale\"\
      : f\"unknown mode {effective_mode!r}\",\n        \"error\": f\"mode must be\
      \ 'build_inputs' or 'record_verdict'; got {effective_mode!r}\",\n    }\n\n\n\
      def register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA,\
      \ handle)\n"
    scripts/agent_loop_mcp/tests/test_apply_codex_patch.py: "\"\"\"Unit tests for\
      \ tools/apply_codex_patch.py â€” Task #26 (iter-0016).\n\nPer codex 2026-05-10\
      \ v4 directive (memory/project_codex_fix_author_directive.md):\nStaged-apply\
