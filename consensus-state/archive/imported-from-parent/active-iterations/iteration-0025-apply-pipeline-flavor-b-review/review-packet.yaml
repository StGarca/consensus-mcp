      \            \"authorized_by\": \"operator\",\n            \"codex_patch_apply_authorized\"\
      : codex_patch_apply_authorized,\n        },\n    }\n    sig = _self_drive._scope_signature(packet)\n\
      \    packet[\"authorization\"][\"scope_signature\"] = sig\n    p = iter_dir\
      \ / \"goal_packet.yaml\"\n    p.write_text(yaml.safe_dump(packet), encoding=\"\
      utf-8\")\n    return p\n\n\ndef _build_synthetic_codex_output_with_patch(\n\
      \    repo_root: Path,\n    finding_id: str = \"codex-rev-001\",\n) -> tuple[str,\
      \ dict]:\n    \"\"\"Build a finding-id-derived patch_proposal + return (json_text,\
      \ patch_proposal_dict).\n\n    iter-0020: patch_id MUST equal f\"{finding_id}-patch\"\
      \ (codex-producible form,\n    replaces the old content-bound formula). unified_diff\
      \ is a real applicable\n    diff; apply_codex_patch's minimal applier handles\
      \ it.\n    \"\"\"\n    base_sha = bundle_sha(repo_root, [TARGET_REL])\n    unified_diff\
      \ = (\n        f\"--- a/{TARGET_REL}\\n\"\n        f\"+++ b/{TARGET_REL}\\n\"\
      \n        \"@@ -1,2 +1,2 @@\\n\"\n        \" def first_n(xs, n):\\n\"\n    \
      \    \"-    return xs[:n - 1]\\n\"\n        \"+    return xs[:n]\\n\"\n    )\n\
      \    patch_id = f\"{finding_id}-patch\"\n\n    patch_proposal = {\n        \"\
      patch_id\": patch_id,\n        \"applies_to_findings\": [finding_id],\n    \
      \    \"base_sha\": base_sha,\n        \"unified_diff\": unified_diff,\n    \
      \    \"files_touched\": [TARGET_REL],\n    }\n\n    codex_output = {\n     \
      \   \"findings\": [\n            {\n                \"id\": finding_id,\n  \
      \              \"severity\": \"medium\",\n                \"summary\": \"Off-by-one\
      \ in first_n: returns n-1 elements instead of n.\",\n                \"citation\"\
      : f\"{TARGET_REL}:2\",\n                \"risk\": \"Returns one element fewer\
      \ than the caller asked for; quiet bug.\",\n                \"recommendation\"\
      : \"Replace xs[:n - 1] with xs[:n].\",\n                \"patch_proposal\":\
      \ patch_proposal,\n            }\n        ],\n        \"goal_satisfied\": False,\n\
      \        \"blocking_objections\": [],\n        \"goal_satisfied_rationale\"\
      : (\n            \"Off-by-one defect identified with proposed patch; awaiting\
      \ verification + apply.\"\n        ),\n    }\n    return json.dumps(codex_output),\
      \ patch_proposal\n\n\ndef _author_codex_review_with_patch(\n    iter_dir: Path,\n\
      \    codex_output_json: str,\n    reviewer_id: str = \"codex-iter0017-1\",\n\
      \    pass_id: str = \"codex-iter0017-1-pass1\",\n) -> Path:\n    \"\"\"Parse\
      \ codex output JSON via _parse_codex_output (real validator) and write\n   \
      \ codex-review.yaml in T6's sealed shape. Also adds the 'side-channel'\n   \
      \ _old_content/_new_content keys to the patch_proposal so apply_codex_patch's\n\
      \    structured-fast-path is exercised (mirrors the existing iter-0016 test\n\
      \    fixture pattern; the unified_diff is also valid for the minimal applier\n\
      \    fallback).\"\"\"\n    parsed = _dispatch_codex._parse_codex_output(codex_output_json)\n\
      \    # Append the structured _old_content/_new_content side-channel for the\n\
      \    # fast-path (apply_codex_patch checks it before falling back to diff applier).\n\
      \    for finding in parsed[\"findings\"]:\n        pp = finding.get(\"patch_proposal\"\
      )\n        if isinstance(pp, dict):\n            pp[\"_old_content\"] = OLD_CONTENT\n\
      \            pp[\"_new_content\"] = NEW_CONTENT\n    review = {\n        \"\
      iteration_id\": iter_dir.name,\n        \"reviewer_id\": reviewer_id,\n    \
      \    \"pass_id\": pass_id,\n        \"findings\": parsed[\"findings\"],\n  \
      \      \"goal_satisfied\": parsed[\"goal_satisfied\"],\n        \"goal_satisfied_rationale\"\
      : parsed[\"goal_satisfied_rationale\"],\n        \"blocking_objections\": parsed[\"\
      blocking_objections\"],\n    }\n    p = iter_dir / \"codex-review.yaml\"\n \
      \   p.write_text(yaml.safe_dump(review), encoding=\"utf-8\")\n    return p\n\
      \n\ndef _make_codex_actor() -> dict:\n    return {\n        \"id\": \"codex-iter0017-1\"\
      ,\n        \"model_family\": \"codex\",\n        \"role\": \"fix_author\",\n\
      \        \"pass_id\": \"codex-iter0017-1-pass1\",\n    }\n\n\ndef _now_iso(offset_seconds:\
      \ int = 0) -> str:\n    from datetime import datetime, timedelta, timezone\n\
      \    t = datetime.now(timezone.utc) + timedelta(seconds=offset_seconds)\n  \
      \  return t.replace(microsecond=0).isoformat().replace(\"+00:00\", \"Z\")\n\n\
      \n# ---- happy-path capstone --------------------------------------------------\n\
      \n\ndef test_capstone_full_codex_fix_loop_end_to_end(repo_root_env, monkeypatch,\
      \ stub_clean_dry_run):\n    \"\"\"The 14-step full cycle from codex 2026-05-10\
      \ v4 directive (revised v5).\n\n    Setup: iteration-0017-capstone with goal_packet,\
      \ target source file with\n    a known off-by-one. Codex emits patch_proposal\
      \ -> claude builds verifier\n    inputs + records approved verdict -> apply.codex_patch\
      \ under operator\n    authorization mutates the file + emits apply_step_landed\
