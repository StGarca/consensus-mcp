non_blocking_suggestions:
  - id: claude-iter0025-followup-001
    severity: medium
    target: scripts/agent_loop_mcp/_dispatch_codex.py (_compute_per_patch_base_sha)
    text: |
      iter-0025 surfaced a real (but non-iter-0025-scope) defect in the
      iter-0024 F2 per-patch base_sha helper: the helper computes
      bundle_sha against the review-packet's touched_files_contents
      (UTF-8 decoded text strings), but apply.codex_patch computes
      bundle_sha against raw disk bytes. On Windows with CRLF line
      endings, the two SHAs differ — the helper-stamped base_sha never
      matches disk bundle_sha, so every apply path through F2 returns
      base_sha_drift. Workaround used in iter-0025: manually re-anchor
      each patch_proposal.base_sha to disk bundle_sha before applying
      (the iter-0023-style operational_caveat per_patch_base_sha_reanchor).
      Root cause: _author_review_packet stores text-decoded content
      (which normalizes CRLF to LF in the YAML representation) while
      bundle_sha hashes raw bytes (which preserves CRLF). This is
      iter-0026 scope (out of iter-0025's allowed_files; _dispatch_codex.py
      is in forbidden_files for iter-0025).
      Fix candidates: (a) _compute_per_patch_base_sha falls back to
      reading raw disk bytes when on Windows + CRLF; (b) bundle_sha
      normalizes CRLF -> LF on read (changes the canonical form, breaks
      backward-compat with existing iter-0023/0024 stamps); (c)
      _author_review_packet stores raw-byte content (breaks YAML round-trip).
      Recommendation: (a) — surgical, no canonical-form change, no
      backward-compat issue.
  - id: claude-iter0025-followup-002
    severity: high
    target: scripts/agent_loop_mcp/tools/apply_codex_patch.py (_apply_unified_diff)
    text: |
      codex-rev-001 finding (no patch authored). The minimal unified-diff
      applier ignores hunk @@ line numbers and uses purely contextual
      matching with forward linear-search drift recovery. On repeated-
      context hunks (e.g., a function body with multiple identical
      "return None" lines), the applier may mutate the wrong occurrence.
      base_sha can still match because the file content is correct; the
      audit post_sha records a real mutation that is NOT the reviewed
      fix. Codex declined to author the fix because it needs new
      regression tests spanning repeated-context scenarios. iter-0026
      scope: replace the minimal applier with a proper unified-diff
      parser that respects @@ line numbers (or use a vetted third-party
      library like unidiff / python-patch).
  - id: claude-iter0025-followup-003
    severity: low
    target: scripts/agent_loop_mcp/tests/test_capstone_full_fix_loop.py:371-385
    text: |
      The capstone test's in-test hoist bridge (lines 371-385, lines
      649-660) explicitly hoists nested last_mutation fields onto the
      apply_step_landed event top-level. Post codex-rev-002 (canonical
      top-level fields now emitted by the production audit path), the
      bridge may be obsolete. iter-0026 should verify by removing the
      bridge and re-running the capstone. If it passes, delete the
      bridge code; the iter-0024 F1 + iter-0025 codex-rev-002 fixes
      together cover both reader and emitter sides.

