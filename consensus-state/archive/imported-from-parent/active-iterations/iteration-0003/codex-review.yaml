implementation_risks:

  - id: codex-iter0003-risk-001-grandfather-precedent-creep
    risk: |
      Each grandfather extension adds an entry to a list that future
      reviewers read as "the project tolerates carve-outs for legacy
      issues". Three grandfather classes now exist for iteration-0000:
      AUDIT_EVENT_NAME_NON_CANONICAL (v1.7.4), PACKET_SHA_HISTORICAL
      (v1.7.4 codex-q-001), and HASH_CHAIN_BROKEN.missing_event_type
      (v1.7.6 this iteration). At three, the pattern is documented;
      at five, the pattern starts feeling load-bearing.
    mitigation_suggestion: |
      Option B's spec block must explicitly say "any further
      grandfather class requires a NEW operator decision; this
      block is not an interpretation surface". The patch text
      above includes that language verbatim. After Option B lands,
      the next iteration MUST NOT add a fourth grandfather class
      without an operator-explicit canonical-finding decision.

  - id: codex-iter0003-risk-002-test-fixtures-may-need-update
    risk: |
      validate_iteration.py --self-test exercises iteration_known_good
      and iteration_known_bad fixtures. The bad fixture intentionally
      triggers HASH_CHAIN_BROKEN. If the bad fixture's directory name
      happens to be 'iteration-0000', the grandfather predicate would
      downgrade those test findings from high to low and the
      assertion 'expected = {..., "HASH_CHAIN_BROKEN", ...}' over the
      seen-id set still holds (id matches regardless of severity), but
      severity-counting tests elsewhere in the suite could regress.
    mitigation_suggestion: |
      Before applying patch-001, grep for fixture directory names
      under agent-loop/tests/fixtures/ and confirm iteration_known_bad
      is NOT named iteration-0000. If it is, rename the fixture or
      keep current name and add a fixture-bypass override on the
      grandfather predicate. Cheap to verify; <1 min.

  - id: codex-iter0003-risk-003-canonical-006-dry-run-must-pass-on-validator-edit
    risk: |
      Spec section 0 anti_regression_criterion (canonical-006) requires
      validators-first dry-run on hypothetical post-edit state for
      iteration-applied changes touching >5 files. Option B's edit set
      is 4 files (validator + spec + ledger + iteration-0003 closure
      artifact), which is BELOW the >5 file threshold; the canonical-006
      gate technically does not bind. But the operator's directive
      explicitly named "canonical-006 dry-run gate on hypothetical
      post-edit state required before apply" in input.yaml G3. So
      run the dry-run anyway. If dry-run fires anything beyond the
      acknowledged 5 LOW findings, do NOT apply.
    mitigation_suggestion: |
      Stage the patches in agent-loop/state/iteration-0003-staging/
      mirror, run validate_iteration.py against the staged
      iteration-0000 + the staged validator script, confirm:
        - HASH_CHAIN_BROKEN findings count: 2 (severity downgraded
          to low)
        - AUDIT_EVENT_NAME_NON_CANONICAL count: 3 (low; unchanged)
        - PACKET_SHA_HISTORICAL count: 2 (low; unchanged)
        - HIGH count: 0
        - Total finding count: 7 (5 grandfathered + 2 historical)
      Then apply. If counts diverge, abort and re-review.

clarifying_questions: []

self_resolved_questions:

  - id: codex-iter0003-srq-001-does-rename-help-anything
    question: |
      If Option B is chosen, is there any value in ALSO renaming the
      three per-agent-prefixed event names to canonical form (cosmetic
      cleanup), or does Option B cleanly stand alone?
    ambiguity_type: repo-discoverable
    resolution_method: trace_validator_behavior_under_each_scenario
    resolved: true
    resolved_value: |
      Stand-alone. Renaming WITHOUT also reconstructing missing events
      would convert 3 LOW AUDIT_EVENT_NAME_NON_CANONICAL findings into
      0 of those + 3 NEW HIGH HASH_CHAIN_BROKEN sha-mismatch findings
      (because the renamed entries would now classify as canonical
      review_returned_and_sealed events, triggering the sha256-vs-file
      check at validate_iteration.py:361-415; the recorded shas predate
      iteration-0002 marker addition and no longer match). So renaming
      under Option B is strictly negative. Reject the cosmetic rename;
      keep iteration-0000 audit yaml byte-identical.
    evidence:
      - type: code
        ref: scripts/agent_loop/validate_iteration.py:361-415
      - type: file
        ref: agent-loop/active/iteration-0000/independence-audit.yaml

  - id: codex-iter0003-srq-002-is-option-c-marker-additive-or-skipping
    question: |
      Option C's pre_v1_7_4_iteration marker on iteration-0000 audit -
      does it ADD information or SKIP validation? The packet text says
      "skip canonical event name + hash chain checks entirely". Is
      "skip" the right primitive for a finding-class we want recorded
      as known/dispositioned?
    ambiguity_type: methodology
    resolution_method: contrast_skip_vs_grandfather_semantics
    resolved: true
    resolved_value: |
      "Skip" is the wrong primitive. Grandfathering EMITS the finding
      with downgraded severity AND a disposition note; Option C SKIPS
      emission entirely. Skipping makes the validator silent on a real
      historical state, which loses information for future audit. This
      is one more reason to prefer B over C: B keeps the validator
      honest about what the audit log contains.
    evidence:
      - type: file
        ref: agent-loop/active/iteration-0003/input.yaml
        line_ref: options_for_reviewers_to_decide.id_C.description
    loops_used: 1
    escalated_to_operator: false

assumptions_challenged:

  - id: codex-iter0003-assume-001-option-a-reconstruction-can-be-honest
    assumption: |
      "Option A retrospective reconstruction with explicit provenance
      is honest if the reconstruction_provenance field marks the
      synthetic origin of the inserted events."
    challenge_result: partially-cleared
    evidence: |
      Provenance fields can mark "this event was reconstructed at
      iteration-0003 close, not emitted by the original session", but
      they cannot recover the original session-time sha256 of
      iteration-0000/claude-review.yaml. The reconstructed event MUST
      use one of: (a) current canonical sha (loses original meaning),
      (b) a placeholder, or (c) a label like "session-time sha
      unknown; current canonical is X". None of these reconstruct what
      the original audit would have sealed. Option A is therefore
      "honestly synthetic" at best; the historical record now contains
      events that did not exist at the time. For a contract that
      prizes audit integrity (section 13 independence_proof), this is
      a real cost. Option B avoids it entirely.

  - id: codex-iter0003-assume-002-option-c-is-forward-looking
    assumption: |
      "Option C wider grandfather scope is forward-looking and handles
      any future canonical-pin events better than Option B's bounded
      carve-out."
    challenge_result: failed
    evidence: |
      Forward-looking architecture is virtuous when there is realistic
      forward demand. There is exactly ONE pre-v1.7.4 iteration in
      this project (iteration-0000); the spec is now at v1.7.6 and
      canonical-pin events are ratified; there is no pipeline of
      additional pre-pin iterations. Option C generalizes for N=1.
      Karpathy Simplicity First specifically calls out "no abstractions
      for single-use code". Option C's pre_v1_7_4_iteration marker is
      a single-use abstraction; rejecting it costs nothing and saves
      future-spec-reader confusion ("when should I add a marker?
      What other iterations qualify?"). Option B's bounded "iteration-0000
      only" is Simplicity-First-correct.

  - id: codex-iter0003-assume-003-validator-self-test-fixtures-uninvolved
    assumption: |
      "validate_iteration.py --self-test fixtures are not affected by
      Option B's grandfather predicate."
    challenge_result: partially-cleared
    evidence: |
      The grandfather predicate gates on iteration_name ==
      "iteration-0000" via Path.name comparison. self-test fixtures
      live under agent-loop/tests/fixtures/iteration_known_good/ and
      iteration_known_bad/. Path.name == "iteration_known_good" or
      "iteration_known_bad" -> grandfather predicate False, no severity
      downgrade. The self-test assertion checks ID-set membership
      ("HASH_CHAIN_BROKEN" in seen) not severity counts, so even if
      the fixtures were renamed iteration-0000 (which they aren't),
      the test would still pass on ID match. Risk is low but I am
      flagging it as risk codex-iter0003-risk-002 above for
      verification before apply rather than relying on this
      reasoning alone.

no_objection_rationale:
  required_when_no_blockers: true
  text: |
    No blocking objections issued. Option B is the implementation-realist
    pick: smallest change set (~10 LOC validator, ~15 lines spec, 1 ledger
    entry move, 1 closure artifact), zero artifact rewriting, zero
    synthetic events, bounded grandfather scope explicitly named
    iteration-0000-only, and consistent with the codex-q-001
    preserve-history-with-provenance precedent. Three non-blocking
    suggestions and three implementation risks are filed; assumptions
    challenged is non-empty (3 entries, evidence-backed). Methodology
    critique on grandfather-precedent creep is filed as a risk for the
    parallel methodology_critic reviewer to weigh. Per section 9 schema
    + section 13 substantive_pushback rule, all required fields are
    present.

