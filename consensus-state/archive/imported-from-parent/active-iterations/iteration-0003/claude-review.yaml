implementation_risks:
  - id: claude-iter0003-risk-001
    risk: "If validator subtype gating is missed, future legitimate HASH_CHAIN_BROKEN findings on iteration-0000 (e.g., a real hash drift after a future cf-* re-seal) get silently downgraded to low and could ship a real defect."
    mitigation: "Subtype gating per claude-iter0003-claude-001."
  - id: claude-iter0003-risk-002
    risk: "Validator + spec change in same iteration; if dry-run uses old validator binary (not the patched one), the dry-run gate validates the wrong logic. The validator change MUST be applied to the validator script in iteration-0003-staging path AND the dry-run MUST execute the staged validator, not the production one."
    mitigation: "canonical-006 dry-run protocol must explicitly stage the patched validate_iteration.py and invoke it from staging path; verify by checking staged validator's mtime > validation run start."
  - id: claude-iter0003-risk-003
    risk: "Precedent risk: extending grandfather scope per-iteration could become a habit. Operator already flagged this in input.yaml Option B con."
    mitigation: "Spec section 13 iteration_0000_grandfather_clause text MUST explicitly state 'iteration-0000 only; future iterations require explicit operator decision'. Codify the bounded scope in the clause itself, not just in commit messages."

clarifying_questions: []

self_resolved_questions:
  - question: "Does Option C's marker pre_v1_7_4_iteration: true conflict with the existing v1.7.4 grandfather in spec section 13?"
    self_resolution: "No. Existing v1.7.4 grandfather is a name-keyed clause (specific iteration-0000, specific finding class AUDIT_EVENT_NAME_NON_CANONICAL); Option C's proposed pre_v1_7_4_iteration marker would be a per-audit-yaml flag triggering a wider validator skip. They are independent mechanisms. Verified by reading spec section 13 lines 1494-1521. No conflict."
  - question: "Does codex-q-001 precedent (preserve+provenance over recompute) most closely align with A-ii or B?"
    self_resolution: "B aligns more strongly. codex-q-001 was about preserving original recorded sha256 fields and adding marker fields to downgrade severity; it did NOT add new events to audit_log. Option A-ii goes beyond codex-q-001 precedent by adding wholly new audit_log entries with reconstructed sha256s. B keeps the audit_log content frozen and changes only validator severity assignment, mirroring codex-q-001 pattern exactly."

assumptions_challenged:
  - "Assumed input.yaml's enumeration of three options exhausts the design space. Challenged: a hybrid B-with-cosmetic-rename was implicitly available; rejected because cosmetic rename without backing event-content change re-introduces the codex sha drift problem with no honesty benefit."
  - "Assumed 'forward-looking' is always a virtue. Challenged: on a population of one with no evidence of a second event, forward-looking is YAGNI per Karpathy #2."
  - "Assumed Option A's provenance notes neutralize the fabrication concern. Challenged: provenance annotates fabrication, it does not undo it; future audit reader still has to mentally subtract reconstructed events from 'what original session emitted'."
  - "Assumed validator subtype gating is implicit when input.yaml says 'downgrade HASH_CHAIN_BROKEN'. Challenged: input.yaml text says 'HASH_CHAIN_BROKEN.subtype=missing_event_type' but a literal-readers risk would gate on iteration-0000 alone; subtype gating must be explicit."
  - "Assumed claude-rev-028 (claude self-patching not converging) is satisfied by reviewer consensus alone. Challenged: it requires operator + codex review attestation in the ledger entry; reviewer consensus is necessary but not sufficient."

no_objection_rationale:
  required_when_no_blockers: true
  text: "No blockers because (1) B is artifact-zero on the historical record, satisfying Karpathy #3 Surgical Changes and codex-q-001 preserve+provenance precedent; (2) the validator + spec change is bounded (one branch + one clause extension); (3) the canonical-006 dry-run gate is an existing safety net for the apply phase; (4) non-blocking concerns (subtype gating, locality of grandfather text, codex-sha drift commentary, operator attestation in ledger) are addressable in the patch without re-opening the option choice; (5) active_contract_readiness lock holds; (6) G4 forced post-exposure handled correctly by suggested_by_context corroboration."

