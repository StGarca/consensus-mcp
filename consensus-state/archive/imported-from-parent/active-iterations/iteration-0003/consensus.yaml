    reason: "Would convert 3 LOW AUDIT_EVENT_NAME_NON_CANONICAL findings into 3 NEW HIGH HASH_CHAIN_BROKEN sha-mismatch findings (codex sha drift exposed). Net negative. Both reviewers explicitly rejected this hybrid."
