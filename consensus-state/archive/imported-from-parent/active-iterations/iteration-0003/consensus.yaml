    canonical_finding_key:
      file: scripts/agent_loop/validate_iteration.py
      section: "Rule 5 missing-event-type loop"
      claim_class: process
      normalized_claim_hash: "validator_downgrade_must_be_subtype_gated_not_iteration_catch_all"
    source_findings:
      - "claude:claude-iter0003-001 (methodology constraint)"
      - "codex:codex-iter0003-patch-1 (implementation detail)"
    merge_method: deterministic_key
    severity: high
    status: accepted
    required_change: |
      validate_iteration.py downgrade MUST be subtype-gated:
      ONLY when iteration_name == "iteration-0000" AND finding subtype == "missing_event_type",
      severity downgrades from high to low. Catch-all-on-iteration-0000 would silently
      hide future legitimate hash chain breaks. Implementation: predicate
      is_iteration_0000_for_grandfather := iteration_name == "iteration-0000".
    corroborated_by:
      - {reviewer: codex, finding_id: codex-iter0003-patch-1, corroboration_strength: suggested_by_context}
      - {reviewer: claude, finding_id: claude-iter0003-001, corroboration_strength: suggested_by_context}

  - canonical_id: canonical-iter0003-002
