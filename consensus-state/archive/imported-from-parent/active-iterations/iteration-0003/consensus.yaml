# ---- Apply order ----

apply_order:
  rule: validators_first_then_apply
  staging_dir: agent-loop/state/iteration-0003-staging/
  steps:
    - "1. Stage modified validate_iteration.py + spec md + ledger to staging dir; mirror iteration-0000/ for read"
    - "2. Run staged validate_iteration.py (NOT production validator) against agent-loop/active/iteration-0000/"
    - "3. Verify: HASH_CHAIN_BROKEN.subtype=missing_event_type findings downgrade from HIGH to LOW; AUDIT_EVENT_NAME_NON_CANONICAL stay LOW; no NEW HIGH findings"
    - "4. Run staged validate_disposition_index against staged spec md"
    - "5. If all dry-run findings are within acknowledged residuals (LOW only on iteration-0000): apply staged content to real"
    - "6. Else: regress to blocked; surface as new canonical_findings"

# ---- Implementation scope ----

implementation_scope:
  allowed_files:
    - scripts/agent_loop/validate_iteration.py
    - wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md
    - agent-loop/state/disposition-ledger.yaml
    - agent-loop/active/iteration-0000/independence-audit.yaml
    - agent-loop/active/iteration-0003/**
    - agent-loop/state/iteration-0003-staging/**
    - agent-loop/archive/review-passes/index.yaml
  forbidden_files:
    - "production outputs"
    - "spec sections outside section_13 + frontmatter + section_24"
  allowed_actions:
    - "edit validate_iteration.py to add subtype-gated grandfather"
    - "edit spec section 13 grandfather clause (architectural; operator-decision_path_b precedent applies)"
    - "edit ledger; move canonical-iter0002-005"
    - "edit iteration-0000 audit_log: add note field on codex event documenting drift"
    - "run staged validators (read-only)"
  forbidden_actions:
    - "modify spec sections other than 13 + 24 + frontmatter"
    - "flip active_contract_readiness"
    - "render production audio"
    - "merge to main"
    - "apply patches without canonical-006 dry-run gate (using STAGED validator)"
    - "rename iteration-0000 audit event names (would cascade per canonical-iter0003-004)"

active_contract_readiness_lock:
  locked_value: pending_phase_0_empirical_validation
  locked_for_iteration_duration: true

