    merge_method: exact
    severity: medium
    status: accepted
    required_change: |
      Spec section 13 grandfather extension MUST land in existing
      iteration_0000_grandfather_clause (locality), NOT a new block. Carve-out
      MUST be bounded to iteration-0000 only via literal string equality.
    corroborated_by:
