proposed_revision_history_entry_text: |
  - version: v1.9.0
    date: 2026-05-08
    summary: |
      Phase 1 MCP G1+G2 implementation status record. NOT a v1.8.2 trigger
      fire; operator strategic pivot 2026-05-08 authorized G1+G2 build via
      /superpowers:subagent-driven-development invocation. Recorded honestly
      so future readers cannot mistake this for a trigger-gated transition.

      What v1.8.2 said:
        Phase 1 MCP design spec status: shelved-pending-operational-signal.
        G1+G2 implementation triggers: render work surfaces a Phase-0
        honor-system breach OR canonical-006 manual mechanism failure that
        the technical gate would prevent.

      Strict reading 2026-05-08:
        render_work_surfaced_breach: false
        canonical_006_manual_mechanism_failed: false
        operator_strategic_pivot_authorized_implementation: true

      v1.9.0 records the override explicitly. The v1.8.2 trigger language
      describes the loosest acceptable trigger condition (an EXAMPLE of a
      sufficient signal), not the only acceptable trigger. Operator
      discretion is preserved and remains the master gate; v1.9.0 does not
      redefine the trigger language.

      Implementation evidence (verified empirically by both reviewers):

        evidence_1_tools_registered:
          T2-T7 = 6 MCP tools registered in scripts/agent_loop_mcp/server.py:
            state.read_decision_ledger (T2; line 57-58)
            audit.append_event (T3; line 60-61)
            patch.stage_and_dry_run (T4; line 63-64)
            patch.apply_consensus_patch (T5; line 66-67)
            review.write_and_seal (T6; line 69-70)
            review.read_post_seal (T7; line 72-73)

        evidence_2_smoke_test_pass_count:
          scripts/agent_loop_mcp/_smoke_test.py exits 0;
          final stdout line: "34/34 tests passed"

        evidence_3_validator_suite_unchanged:
          scripts/agent_loop/run_validator_tests.py exits 0;
          final stdout line: "21/21 tests passed"

        evidence_4_disposition_index_clean:
          scripts/agent_loop/validate_disposition_index.py:
            "validate_disposition_index: 0 finding(s) ({})"

        evidence_5_no_real_state_pollution:
          real archive/review-passes/index.yaml SHA256
          c3efd13ff16df837b0240cd05c5697ab3d431568087764113e0e3f7e1f765800
          unchanged before AND after smoke run (verified pre-smoke + post-smoke);
          real disposition-ledger.yaml SHA256
          e3c6d3ba0a41a37f3922cf6063f6fccab19e5ae18a4c5f9f724332fa87bcc1cb
          unchanged before AND after smoke run (verified pre-smoke + post-smoke).

        evidence_6_g1_self_hash_verification:
          T6 seal computes canonical_yaml_sha256 with self_hash_exception
          (drops pre-existing packet_sha256, hashes packet, writes hash back);
          T7 read recomputes and verifies. Smoke tests:
            test_review_write_and_seal_self_hash_exception: PASS
              (stale packet_sha256='old_stale_value_should_be_ignored' input;
              returned hash != stale, != hash-of-packet-with-stale)
            test_review_read_post_seal_modern_packet_verifies: PASS
              (verified=True; recorded == computed; legacy_unsealed not set)
            test_review_read_post_seal_tampered_packet_detected: PASS
              (post-tamper verified=False; recorded != computed;
               legacy_unsealed not set, distinguishing tamper from legacy)

        evidence_7_g2_canonical_006_enforcement:
          T5 (patch.apply_consensus_patch) gated on T4 (stage_and_dry_run);
          high/blocking findings -> dry_run_failed; target file bytes on disk
          unchanged after refused apply (canonical-006 invariant proven).
          Smoke test test_apply_consensus_patch_high_finding_refuses_apply:
            (a) writes original_bytes b"status: draft\n" to target_file;
            (b) calls handle() with patches changing target_file;
            (c) asserts result['error'] == 'dry_run_failed';
            (d) asserts at least one high/blocking/critical severity finding;
            (e) asserts target_file.read_bytes() == original_bytes (line 970-973).
          T5 default validators = all 4 main validators (validate_disposition_index
          + validate_review_packet + validate_consensus + validate_iteration).

      Bounded gaps documented (must remain visible to future readers):

        gap_1_t5_mid_write_io_failure (severity: medium):
          T5 wraps per-file os.replace loop; on mid-loop OS error returns
          {error: "partial_apply_failed", applied_files: [partial list],
           failed_relpath, exception}. Prior writes NOT rolled back; operator
          must reconcile manually. audit.append_event NOT called in this branch
          (the partial state is operator-recoverable; auto-recording would
          claim completion that did not occur). Documented at
          scripts/agent_loop_mcp/tools/patch_apply_consensus_patch.py module
          docstring lines 16-23 + output_schema enum line 134 +
          properties applied_files/failed_relpath/exception lines 147-168.

        gap_2_t5_single_writer_concurrency (severity: medium):
          No per-iteration filelock. Concurrent invocations on same iteration_id
          with overlapping relpaths will race; both calls may pass dry-run
          gate independently; per-file os.replace order non-deterministic;
          audit log non-locked read-modify-write. Single-writer assumed.
          Documented at scripts/agent_loop_mcp/tools/patch_apply_consensus_patch.py
          module docstring CONCURRENCY block lines 25-29.
          Deferred to phase_1_x.

        gap_3_t7_legacy_unsealed_packets (severity: low):
          21 sealed pre-T6 review packets in agent-loop/archive/review-passes/
          predate the packet_sha256 field. T7 read_post_seal returns
          legacy_unsealed=True with verified=False on these. This is the only
          expected verified=False normal case; tampered packets return
          verified=False without legacy_unsealed. Migration (re-sealing legacy
          packets) is out of scope. Documented at
          scripts/agent_loop_mcp/tools/review_read_post_seal.py lines 21, 56,
          92-93, 134, 194, 211, 315.
          Deferred to phase_1_x.

      What does NOT happen in v1.9.0:
        - no architectural change to active contract sections 1-23
        - no MCP code changes (T2-T7 LOCKED at 34/34 for this iteration)
        - no validator code changes (validators 21/21 unchanged)
        - no readiness flip (active_contract_readiness stays phase_0_validated)
        - no Phase 1 design spec scope expansion
        - no decoupling/packaging work

      Sibling Phase 1 design spec status flips:
        shelved-pending-operational-signal-per-operator-2026-05-08
          -> g1-g2-implemented-2026-05-08-rest-still-shelved
        do_not_treat_as_phase_1_ready: true STILL HOLDS
        (implementing G1+G2 does not declare Phase 1 ready; G3-G5 still
         operationally-triggered)

      Disposition-ledger update:
        spec_version: draft-v1.8.2-ai-contract -> draft-v1.9.0-ai-contract
        v1_9_0_application_log block records:
          applied_utc, applied_by, authorized_by_operator, patch_kind:
          phase_1_mcp_g1_g2_implementation_status_record, preceded_by:
          iteration-0006, gaps_carried (3), evidence_summary (7).

      next_required_action:
        continue_render_outcomes_redirect_with_phase_1_mcp_g1_g2_in_place
        (the operator project guidance "do not keep polishing process unless
         it directly improves render outcomes" still applies; G1+G2 is a
         capability that exists but does not get further iteration unless
         render work surfaces specific operational pain that requires it.)

      v1.9.0 is NOT the agent-loop self-construction phase re-opening.
      Self-construction phase ENDED with v1.8.2 (per v1.8.2 own text).
      v1.9.0 is a status-record version: G1+G2 capability was built outside
      the self-construction phase, on operator-pivot authority, and v1.9.0
      records that build for audit. The next iteration after iteration-0006
      should NOT default to another governance polish; it should default to
      render-outcomes work.

      Standalone-extraction (decouple+package the agent-loop into its own
      repo/package) is NOT declared the next gate by v1.9.0. Standalone
      extraction is process-side polish that does not improve render
      outcomes; it remains deferred until operator explicitly requests it.
