methodological_red_flags_observed:
  - |
    Override-as-narrative-prose pattern: input.yaml correctly NAMES the
    trigger override but proposes recording it only as revision_history
    text. The same pattern in v1.8.0's cf-007 application produced the
    iter-0005 stale-closure-text bug class (closure artifacts contained
    pre-apply text contradicting the closing_state). Structural
    frontmatter fields are stronger audit anchors than narrative prose.
  - |
    "Self-construction ended" inconsistency: v1.8.2 declared a closure
    that v1.9.0 immediately re-opens (under any reasonable scoping). The
    inconsistency is not addressed in input.yaml; it is delegated to
    reviewers as question (d). Delegating without proposing your own
    answer is a soft form of confusion-avoidance. Reviewer commitment
    here: phase vocabulary distinction is the right resolution.
  - |
    Bounded gaps without smoke coverage: gap_1 + gap_2 are documented
    behaviors (partial_apply_failed branch + CONCURRENCY caveat) that
    are NOT exercised by any of the 34 smoke tests. The 34/34 assertion
    is real but does NOT validate the bounded-gap behavior. Calling out
    "documentation-only verified" honestly in v1.9.0 is what prevents a
    future reader from misreading "34/34 + bounded gaps documented" as
    "34/34 covers the bounded gaps."
  - |
    Operator-pivot-precedent risk: iteration-0006 establishes that an
    operator can authorize work whose strict-reading trigger conditions
    did not fire. That is fine as a one-time pivot; it becomes a problem
    if it normalizes. Iteration-0001's canonical-005 (orchestrator-self-
    violation) failure pattern was exactly this: a rule held in spec
    text was treated as advisory because the orchestrator wanted to
    proceed. The override IS legitimate this time (operator authority is
    higher than spec text); the precedent must be explicitly bounded so
    future agents do not inherit "operator-pivot trumps trigger
    language" as a general rule. Recommend v1.9.0 language: "future
    Phase 1.x work that lacks render-friction trigger ALSO requires
    operator strategic pivot, not auto-permission inherited from
    v1.9.0."
  - |
    No-polishing guidance lives only in spec, not in operator memory.
    If a future agent edits the spec to weaken the guidance, no durable
    counter-record exists. Promotion to durable memory is a soft
    recommendation but worth tracking.
  - |
    Smoke test count (34) and validator count (21) are quoted as
    evidence in input.yaml. Both are point-in-time counts on
    2026-05-08; neither artifact carries an embedded version stamp that
    a future maintainer could check against to detect "34/34 was true
    at v1.9.0 land but the test list has since drifted". Consider
    pinning the test list (file SHA of _smoke_test.py) in the
    revision_history v1.9.0 entry as well as the count, so the
    34/34-passed claim is verifiable against the exact test set that
    produced it.

assumptions_challenged:
  - assumption: "v1.8.2 trigger language ('render work surfaces a Phase-0 honor-system breach OR canonical-006 manual mechanism failure') is the OPERATIVE trigger condition for G1+G2 implementation"
    challenge: "Strict reading: yes. v1.8.2 explicitly stated those triggers; neither was reported before operator authorized G1+G2 implementation. Operator override is the path that was taken; it is legitimate (operator authority > spec text) but is NOT trigger-firing. v1.9.0 must record the override as override, not as trigger fire. Future agents reading v1.9.0 should NOT inherit 'operator-pivot trumps trigger language' as a general rule. The override IS bounded to this specific G1+G2 implementation."
  - assumption: "'agent-loop self-construction phase ENDED with v1.8.2' is still true post-v1.9.0"
    challenge: "Methodologically-incoherent without phase vocabulary distinction. Self-construction phase (sections 1-23 architectural contract) closed at v1.8.2; that closure NOT reopened. Phase 1 MCP enforcement layer (T2-T7) opened at v1.9.0; this is a DIFFERENT phase. Recommend explicit phase vocabulary in v1.9.0 entry to prevent semantic drift. Codex's reading (ENDED still holds for architectural scope) is correct narrowly; my reading (need vocabulary) is the methodologically-cleaner resolution. Both preserved in synthesizer's resolution."
  - assumption: "Bounded gaps gap_1 (T5 partial_apply_failed) and gap_2 (T5 single-writer concurrency) are 'documented' in a meaningful sense"
    challenge: "Read patch_apply_consensus_patch.py docstring; confirmed both gaps are described at module-docstring level. HOWEVER, neither gap is exercised by any of the 34 smoke tests. The 34/34 figure validates the toolchain's HAPPY-PATH behavior, NOT the bounded-gap branches. v1.9.0 entry must explicitly note 'documentation-only verified, no smoke coverage' for these two gaps to prevent a future reader from misreading '34/34 + bounded gaps documented' as '34/34 covers the bounded gaps'. Carrying as test-coverage debt for Phase 1.x (claude-iter0006-004)."
  - assumption: "Operator project guidance 'do not keep polishing process unless it directly improves render outcomes' is durable and survives spec edits"
    challenge: "Searched ~/.claude/projects/.../memory/. Guidance is repeated MULTIPLE TIMES in spec corpus (CLAUDE.md, v1.8.0+v1.8.1+v1.8.2 revision_history) but NOT in operator memory dir. If a future spec edit weakens the guidance, no durable counter-record exists. Recommend memory promotion (claude-iter0006-006) - operator-scope action, deferred but flagged."
  - assumption: "Iteration-0006's input.yaml is appropriately sized (~290 lines)"
    challenge: "Karpathy Simplicity First applies to specs. Bookkeeping-only iterations should be ~120 lines by referencing spec section 0 + section 13 rules instead of restating them. iteration-0006's input.yaml restates trigger-condition language, evidence list, bounded-gap list, etc. Pattern-flag for future iterations (claude-iter0006-005); not blocking this one."
  - assumption: "Override-as-narrative-prose is sufficient for the v1.8.2 trigger-gate override record"
