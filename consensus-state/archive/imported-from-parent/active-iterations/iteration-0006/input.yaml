# ---- Bounded gaps (must be honestly recorded in v1.9.0) ----

bounded_gaps:

  gap_1_t5_mid_write_io_failure:
    severity: medium
    description: |
      T5 patch.apply_consensus_patch wraps the per-file os.replace loop in
      try/except. On mid-loop OS error (disk full, antivirus lock, permission),
      returns structured {error: "partial_apply_failed", applied_files: [...],
      failed_relpath, exception}. Prior writes in the same call are NOT
      rolled back; operator must inspect applied_files to reconcile.
    documented: true
    docstring_location: "scripts/agent_loop_mcp/tools/patch_apply_consensus_patch.py module docstring"

  gap_2_t5_single_writer_concurrency:
    severity: medium
    description: |
      T5 has no per-iteration filelock. Concurrent invocations on the same
      iteration_id with overlapping relpaths will race. Audit log is
      non-locked read-modify-write. Single-writer assumed; documented
      prominently in T5 docstring CONCURRENCY block.
    documented: true
    deferred_to: phase_1_x

  gap_3_t7_legacy_unsealed_packets:
    severity: low
    description: |
      The 21 sealed pre-T6 review packets in agent-loop/archive/review-passes/
      do not carry packet_sha256 fields (predate T6). T7 read_post_seal
      surfaces these as legacy_unsealed=True with verified=False (the only
      expected normal verified=False case). Phase 0 -> Phase 1 migration
      (re-sealing legacy packets) is out of scope.
    documented: true
    deferred_to: phase_1_x

