    discretion is preserved.

  reviewer_question: |
    Is the proposed v1.9.0 treatment of the trigger gate honest? Or does v1.9.0
    need stronger language acknowledging the override (e.g., explicit
    "v1.8.2_trigger_gate_overridden_by_operator: true" frontmatter field)?

# ---- Reviewer task ----

reviewer_decision_required:
  question: "Should the spec bump v1.8.2 -> v1.9.0 land, recording Phase 1 MCP G1+G2 implementation status?"
  must_consider:
    - "Are all 7 implementation evidence items truly verified (not just claimed)?"
    - "Are all 3 bounded gaps honestly characterized?"
    - "Is the v1.8.2 trigger gate override treatment adequate (operator strategic pivot recorded)?"
    - "Is 'agent-loop self-construction phase ENDED with v1.8.2' still truthful, or does v1.9.0 re-open?"
    - "Does v1.9.0 frontmatter need any field changes beyond version bump? (active_contract_readiness; do_not_treat_as_phase_0_ready; next_required_action)"
    - "Should standalone-extraction (decouple+package, currently deferred) be declared the next gate?"
    - "Operator project guidance ('do not keep polishing process unless it directly improves render outcomes') - does v1.9.0 violate this, or is it the closing record before render redirect?"
  reviewers_must_emit:
    - bump_approved: bool
    - proposed_revision_history_entry_text: string (the v1.9.0 entry the reviewer endorses)
    - "proposed_frontmatter_changes: dict (e.g., contract_version v1.9.0 or empty if no changes)"
    - rationale: string (mandatory; do not delegate to synthesizer)
    - blockers_if_any: list (must be empty if bump_approved=true)
    - non_blocking_suggestions: list (low/medium severity tweaks)
  reviewers_may_disagree: yes (and that means bump blocked per section 13 one-blocker rule)

