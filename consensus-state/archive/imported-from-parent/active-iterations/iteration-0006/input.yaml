  proposed_v1_9_0_treatment: |
    Record honestly: v1.8.2 trigger conditions as stated were NOT met. Operator
    authorized G1+G2 implementation as a strategic pivot via /superpowers:
    subagent-driven-development invocation 2026-05-08. v1.9.0 revision_history
    must explicitly state this is an operator override, not a trigger fire.
    Future readers should understand that the v1.8.2 trigger language describes
