schema_version: 1
pilot_id: iteration-0024-closure-invariant-followup-fixes
goal:
  summary: Follow-up fix iteration for iter-0023 findings codex missed
  desired_end_state: |
    iter-0024 is the followup fix iteration for findings iter-0023 surfaced
    but did not fix within its own scope. Three findings are addressed:

    F1 (HIGH; primary scope) — merge-direction bug in
        _closure_invariant.last_mutation_from_audit.

        The "hoist nested fields to top level" block previously did
        `{**nested, **{top_level minus last_mutation}}` which made TOP-LEVEL
        legacy fields win. When audit_append_event flattens extra_fields and
        writes a top-level `actor: "<id>"` (string) alongside the nested
        `extra_fields.last_mutation.actor: {dict}`, the top-level string
        overwrites the structured dict. Downstream _actor_model_family then
        returns None and cross_family fails closed even on a perfectly
        valid cross-family closure attempt — blocking clean iter-0023 close.

        Fix: invert merge so nested structured form wins:
            merged = {**top_level, **nested}

    F2 (MEDIUM) — per-patch base_sha helper-stamp in
        _dispatch_codex._validate_patch_proposal.

        iter-0022 helper stamped every patch_proposal.base_sha with
        defect_target.base_sha (the FULL multi-file bundle). When defect_target
        spans more files than any single patch (typical Flavor B shape),
        apply.codex_patch computes bundle_sha against the patch's OWN
        files_touched and refuses base_sha_drift. iter-0023 operational_caveat
        per_patch_base_sha_reanchor_required required manual re-anchor.

        Fix: helper now computes a PER-PATCH base_sha from the patch's
        files_touched subset against defect_target.touched_files_contents
        (canonical bundle_sha formula). Backward-compat fallback to
        defect_target.base_sha when touched_files_contents is missing.

    F3 (LOW) — remaining substantive claude-iter0023 findings:
      003 list-order trust    → last_mutation_from_audit sorts by timestamp_utc
                                  before picking the most-recent event.
      004 path-separator      → bundle_sha normalises Windows backslash paths
                                  via PurePosixPath; \\0 / \\n rejected.
      005 reviewer_id heuristic → tighten startswith("codex") to
                                  startswith("codex-") so "codexica-bot" doesn't
                                  silently route.
      006 test gaps           → add hash_match None==None test + legacy string
                                  actor on last_mutation test.
      007 test gaps           → add both-reviews-present picks-newer test +
                                  unrecognised reviewer_id test.
      008 OSError masking     → documented in code as intentional preserve-as-empty
                                  behaviour; no functional change (out of scope
                                  to add side-channel logging).

    SUCCESS: pytest +20 (was 276 → 296), all 11/11 release gates green,
    commit hash recorded.
  non_goals:
    - run a full Flavor B ceremony (codex + claude + apply) — this is an
      explicit-defect followup
    - modify _self_drive.py, tools/*, run/, wiki/, or non-closure-invariant code
    - bump pyproject.toml version
    - alter goal_packet / review-packet schemas
    - add side-channel logging for bundle_sha OSError (out of scope per claude
      iter0023-008; finding deferred as intentional documented behaviour)
allowed_files:
  - scripts/agent_loop_mcp/_closure_invariant.py
  - scripts/agent_loop_mcp/_validate_closure_invariant.py
  - scripts/agent_loop_mcp/_dispatch_codex.py
  - scripts/agent_loop_mcp/tests/test_closure_invariant.py
  - scripts/agent_loop_mcp/tests/test_validate_closure_invariant.py
  - scripts/agent_loop_mcp/tests/test_iter_0024_per_patch_base_sha.py
  - agent-loop/active/iteration-0024-closure-invariant-followup-fixes/
allowed_sections: []
forbidden_files:
  - scripts/agent_loop_mcp/_self_drive.py
  - scripts/agent_loop_mcp/_author_review_packet.py
  - scripts/agent_loop_mcp/server.py
  - scripts/agent_loop_mcp/tool_registry.py
  - scripts/agent_loop_mcp/tools/
  - scripts/agent_loop_mcp/dispatch_templates/
  - run/
  - wiki/
  - pyproject.toml
  - requirements.txt
max_iterations: 1
max_patch_size: 600
fix_author_policy: inline
validators_required:
  - pytest
acceptance_gates:
  - id: A1
    description: pytest delta +20 (276 baseline → 296 with new tests)
    check: 'python -m pytest scripts/agent_loop_mcp/tests/ -q --tb=no'
    expected: '296 passed'
  - id: A2
    description: 11/11 release gates green
    check: 'python scripts/agent_loop/release_gates_runner.py 2>&1 | tail -5'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
