closing_reason: |
  iter-0024 is a follow-up FIX iteration for findings iter-0023 surfaced but
  could not land within its own codex-emission scope. Three categories of fix
  applied inline (not via codex+claude+apply ceremony):

    F1 (HIGH) — Merge-direction bug in _closure_invariant.last_mutation_from_audit.
        Inverted the hoist so nested structured form wins over top-level
        legacy fields. Without this fix, audit_append_event's top-level
        actor-string flattening overrode the nested actor-dict, causing
        cross_family to fail closed on every production close attempt.

    F2 (MEDIUM) — Per-patch base_sha helper-stamp in
        _dispatch_codex._validate_patch_proposal. Helper now computes
        bundle_sha against the patch's OWN files_touched subset using
        review_packet.defect_target.touched_files_contents, eliminating the
        manual per-patch re-anchor iter-0023 had to do across 3 patches.

    F3 (LOW/MEDIUM) — Five remaining claude-iter0023 findings:
        003 list-order trust       → timestamp_utc-sorted apply_events.
        004 path-separator         → POSIX-normalised paths, \\0/\\n rejected.
        005 reviewer_id prefix     → dash-boundary required for family match.
        006/007 test gaps          → 4 tests added (no source change).
        008 OSError masking        → docstring callout only; deferred.

primary_empirical_finding:
  pytest_delta: '+20 (276 baseline → 296 with new tests)'
  invariant_bug_fix_verified: |
    With F1 applied, audit events carrying BOTH top-level legacy `actor:
    "<string>"` AND nested `extra_fields.last_mutation.actor: {dict}` now
    correctly surface the dict for downstream model_family extraction.
    Test test_last_mutation_nested_actor_dict_beats_legacy_top_level_string
    reproduces the iter-0023 cross_family failure and confirms it now passes.

artifacts_modified:
  - path: scripts/agent_loop_mcp/_closure_invariant.py
    description: |
      F1 — last_mutation_from_audit merge direction inverted
        ({**top_level, **nested}); nested structured fields now win.
      F3-003 — apply_events sorted by parsed timestamp_utc with floor
        sentinel for unparseable timestamps; stable sort preserves list
        order when all timestamps missing.
      F3-004 — bundle_sha normalises path separators via new _normalize_path
        helper (backslash → forward-slash via str().replace + PurePosixPath);
        rejects paths with \\0 or \\n by raising ValueError.
      F3-008 — bundle_sha docstring expanded to call out the intentional
        OSError-as-empty masking behaviour.
  - path: scripts/agent_loop_mcp/_validate_closure_invariant.py
    description: |
      F3-005 — reviewer_id prefix heuristic now requires dash boundary:
        startswith("codex-") instead of startswith("codex"). Filename
        fallback also requires dash. Unrecognised IDs leave family unset
        (fails cross_family closed = correct).
  - path: scripts/agent_loop_mcp/_dispatch_codex.py
    description: |
      F2 — Added _compute_per_patch_base_sha helper. _validate_patch_proposal
      now stamps pp["base_sha"] with bundle_sha computed against the patch's
      OWN files_touched against defect_target.touched_files_contents.
      Backward compat: when touched_files_contents missing or a patch file is
      absent from the map, falls back to defect_target.base_sha (iter-0022
      behaviour).

artifacts_added:
  - path: scripts/agent_loop_mcp/tests/test_iter_0024_per_patch_base_sha.py
    description: |
      5 tests covering F2 per-patch base_sha logic — subset stamping, full
      overlap, multi-patch independence, no-touched_files_contents fallback,
      missing-file fallback.

