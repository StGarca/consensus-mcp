# ---- New findings introduced by v1.7.1 ----

new_findings:
  - id: claude-rev-037-pass17-prefix-inconsistency-across-artifacts
    severity: high
    claim_class: correctness
    claim: |
      pass-17 finding IDs use THREE different forms across artifacts:
        - disposition-ledger.yaml: 'pass-17/codex-rev-049-cf-findings-not-archived' (slash separator, short suffix)
        - pass-17 archive yaml: 'pass-17-codex-rev-049-cf-findings-not-archived-in-repo' (hyphen separator, full suffix)
        - archive index yaml: 'pass-17-codex-rev-049' (hyphen, no suffix)
      A future validator extending codex-rev-067 to check finding-ID consistency
      across artifacts will see three non-equal strings and either flag them
      (correct) or special-case multiple equivalent forms (technical debt).
    evidence:
      - "agent-loop/state/disposition-ledger.yaml grep for 'pass-17/codex-rev-049' returns 3 entries"
      - "agent-loop/archive/review-passes/2026-05-08-codex-pass-17-path-x-readiness-review.yaml grep for 'pass-17-codex-rev' returns 3 entries with full suffixes"
      - "agent-loop/archive/review-passes/index.yaml grep for 'pass-17-codex-rev-049' returns 2 entries with no suffix"
    introduced_by: v1.7.1
    introduced_how: |
      My v1.7.1 patch updated archive yaml and archive index to use 'pass-17-' hyphen
      prefix per codex-rev-066 required_change. I did NOT update disposition-ledger.yaml
      (which I had originally written using 'pass-17/' slash form during v1.7).
      The pass-17 archive yaml id_collision_disambiguation note documented the
      inconsistency as intentional, but documenting drift is not resolving drift.
    impact: |
      Cross-artifact finding-ID consistency is broken. The codex-rev-066 fix is
      effectively partial. v1.8 validator extension (per codex-rev-067 deferral)
      will need to either flag this OR carry compatibility logic; the latter is
      maintenance debt.
    recommended_fix: |
      Option A (preferred): Pick canonical form 'pass-17-codex-rev-NNN-<full-suffix>';
      update disposition-ledger.yaml and archive index.yaml to match. Single source
      of truth.
      Option B: Document the dual form as a permanent allowed pattern in section 0
      finding-id allocation; require any validator to handle both. Adds rule
      complexity without solving drift.
      Recommend A: trivial mechanical edit; preserves single canonical form.
    disposition: archived_pending_v1_7_2
    self_correction_eligible: true   # claude-rev-028 self-patch scope: bookkeeping fix
    corroboration_strength: suggested_by_context   # I applied the patches; not independent

  - id: claude-rev-038-id_collision_disambiguation-block-documents-bug-as-feature
    severity: medium
    claim_class: methodology
    claim: |
      The id_collision_disambiguation block I added to pass-17 archive yaml
      describes inconsistent ID forms as 'equivalent for reference purposes'
      rather than fixing them. This is the partial-fix pattern (claude-rev-001
      anti-regression criterion target) at meta level: the disambiguation
      block IS the regression rationalization.
    evidence:
      - |
        agent-loop/archive/review-passes/2026-05-08-codex-pass-17-path-x-readiness-review.yaml id_collision_disambiguation:
          ledger_uses: "pass-17/codex-rev-049 form (slash) which is equivalent for reference purposes; archive uses 'pass-17-' (hyphen) for filename-safe alignment with archive_index_yaml entries."
    introduced_by: v1.7.1
    impact: |
      Future agents reading the disambiguation block will see operator-blessed
      inconsistency and may extend the pattern (e.g., section_24/section-24
      forms; iteration_0000/iteration-0000 forms; etc). Section 0 ASCII rule
      establishes one form; this disambiguation establishes a precedent for
      multiple forms.
    recommended_fix: |
      If claude-rev-037 Option A applied: delete or rewrite this disambiguation
      block to say 'IDs prefixed; ledger updated to match'.
      If Option B applied: tighten language to specify EXACTLY which dual forms
      are permitted, with no 'equivalent' fudge.
    disposition: archived_pending_v1_7_2
    corroboration_strength: suggested_by_context

  - id: claude-rev-039-v1_7_1-perpetuates-4-of-4-patch-regression-pattern
    severity: medium
    claim_class: methodology
    claim: |
      Empirical pattern observation: every consolidation/patch by claude has
      introduced new bugs caught by next codex pass. v1.7.1 is the 5th instance.
        - v1.0 -> v1.2: rev-031..rev-038 surfaced post-hoc by claude pass-3
        - v1.2 -> v1.3: rev-005 deleted; caught by codex pass-7
        - v1.3 -> v1.4 patches: corroboration ownership conflict + hash type confusion; caught by pass-9 / pass-13
        - v1.4 patches -> v1.4 patches: section 9 schema active despite section 13 disable; caught by pass-13
        - v1.7 -> v1.7.1: prefix inconsistency + disambiguation-as-resolution; caught by THIS PASS
      Pattern is structural, not anecdotal. Every claude self-applied patch
      (regardless of size, regardless of self-patch scope) has introduced at
      least one regression caught by next reviewer.
    evidence: archived disposition-ledger.yaml + archive index.yaml passes 1-19
    impact: |
      The Path C protocol (operator ratification + validator-first) was supposed
      to break this pattern, and v1.5 + v1.6 broke it briefly. v1.7 + v1.7.1
      reverted to claude-self-patches-introduce-bugs mode.
      The difference between pattern-broken and pattern-restored:
        - v1.5: large coherent patch from operator-ratified Tier-1/2/3 designs (no claude self-decisions on architecture)
        - v1.6: small Quoroom borrows that operator ratified before claude applied
        - v1.7: medium patch from operator-ratified Tier-2 designs BUT the bookkeeping (which is "self-patch scope") was claude-only -> codex pass-18 caught 5 bookkeeping bugs
        - v1.7.1: tiny cleanup that claude self-applied -> THIS PASS caught 3 (bookkeeping inconsistency + disambiguation-as-bug + this meta finding)
      Pattern: claude reliably introduces ~1-5 bugs per self-applied patch
      regardless of scope. Operator ratification of architectural design works;
      claude self-application of mechanical fixes still drifts.
    recommended_fix: |
      Two options:
        Option A: Tighten claude-rev-028 self-patch scope. Even mechanical
          fixes require codex-cross-review BEFORE landing. Slower but
          empirically necessary.
        Option B: Build the codex-rev-067 cross-artifact validator now (not
          v1.8) so machine catches what claude misses. Validator becomes the
          first-line check; codex review becomes audit-of-validator.
      Recommend B: validator extension is one of the deferred-to-v1.8 items;
      promoting it here doesn't add architecture, just enforces existing rules.
    disposition: archived_pending_v1_8 (or v1.7.2 if Option B accepted)
    corroboration_strength: cross_pass (corroborates claude-rev-028 from pass-14 + codex-rev-067 from pass-18)

