    - "codex-rev-020 section 24 prose drift (claude pass-10 added pending_v1_5 prose blocks)"
    - "codex-rev-022 published rates with undefined formula (claude pass-10 added third cycle measurement before formula promoted)"
  interpretation: |
    Claude pass-10 introduced 5 new bugs while applying 4 prior fixes.
    Net effect: +5 -4 = +1 bug. The "fixing introduces bugs" pattern
    is now unmistakable. claude-rev-001 anti-regression criterion is
    not just theoretical safeguard - it's empirically required.
    Operator directive "stop trying to prematurely launch" is structurally
    correct: claude is not converging on a clean spec by self-editing.
  meta_recommendation: |
    Until validate_disposition_index.py is built AND iteration-0000
    produces empirical metrics, ANY claude inline patch should be
    constrained to:
      - bumping version stamp
      - cosmetic ASCII fixes
      - .gitignore allowlist additions (after verification)
      - disabling known-unsafe rules
    Architectural changes (anything in pending_v1_5_blocking) should
    NOT be applied by claude alone; require operator approval AND
    codex agreement BEFORE landing inline.
