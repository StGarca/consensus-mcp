findings:
- id: codex-rev-001
  severity: high
  summary: review-packet authoring reads operator-supplied file paths without repo
    containment
  citation: scripts/agent_loop_mcp/_author_review_packet.py:6
  risk: A malicious files entry using an absolute path, ../ traversal, or an in-repo
    symlink can read files outside repo_root and embed their contents into review-packet.yaml,
    exposing secrets or unrelated source to Codex and downstream sealed artifacts.
  recommendation: Resolve each requested file path, verify it is under the resolved
    repo_root before reading, and reject outside-repo paths before embedding content.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: 093ef6a2a9810a6ec4493f82d1e50031768c112abfc8cdac62f8e49f6facdf87
    unified_diff: "--- a/scripts/agent_loop_mcp/_author_review_packet.py\n+++ b/scripts/agent_loop_mcp/_author_review_packet.py\n\
      @@ -1,9 +1,16 @@\n def author_review_packet(iteration_dir, files, repo_root):\n\
      \     \"\"\"Embed touched-file contents into review-packet.yaml so codex can\
      \ read\n     them in-prompt without filesystem access.\n     \"\"\"\n     contents\
      \ = {}\n+    repo_root_resolved = repo_root.resolve()\n     for rel in files:\n\
      -        full = repo_root / rel\n+        full = (repo_root / rel).resolve()\n\
      +        try:\n+            full.relative_to(repo_root_resolved)\n+        except\
      \ ValueError as exc:\n+            raise ValueError(\n+                f\"review\
      \ packet file {rel!r} resolves outside repo_root {repo_root_resolved}\"\n+ \
      \           ) from exc\n         contents[rel] = full.read_text(encoding=\"\
      utf-8\")  # < attacker-controlled?\n     # ... base_sha computed from contents;\
      \ written to review-packet.yaml\n"
    files_touched:
    - scripts/agent_loop_mcp/_author_review_packet.py
    expected_tests: []
    unified_diff_sha256: 0836e4729d417c2ceccec9726bc0ba07fc314a438876aadbe1eb80f4cda7e7b3
goal_satisfied: false
goal_satisfied_rationale: Embedded excerpts show a high-severity path traversal and
