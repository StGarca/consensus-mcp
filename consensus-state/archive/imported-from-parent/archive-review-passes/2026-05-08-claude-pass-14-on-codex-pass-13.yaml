  independent_finding_rate: 0.62
  formula_status: PROVISIONAL
  total_findings: 16  # 8 codex + 7 claude + 1 carried (claude-rev-024 is meta of codex-rev-025/026)
  duplicates: 6 (3 cross-pass + 3 in-pass)
  duplicates_observed:
    - "claude-rev-024 generalizes codex-rev-025 + codex-rev-026 (disable-mechanism-informal)"
    - "claude-rev-025 follows from claude-rev-024 (broken-code pattern)"
    - "claude-rev-027 architectural overlap with claude-rev-024 (structural contradiction)"
    - "claude-rev-026 extends codex-rev-027 (known_blockers context)"
  pattern_note: |
    Lower independence (0.62) is EXPECTED at this depth. Pass-13 and
    pass-14 cluster around 3 themes (disable mechanism, broken-section
    marking, partial-fix audit). When findings cluster thematically
    rather than spreading widely, it suggests we're in convergence
    territory FOR THESE THEMES specifically — but new themes may
    still be undiscovered.

  pattern_warning: |
    The independent_finding_rate trend (0.86, 0.86, 0.81, 0.71, 0.62)
    is monotonically declining. Two possible interpretations:
      (a) GOOD: each pass cleans surface issues, deeper findings cluster
          around remaining architectural themes; convergence in progress
      (b) BAD: claude self-patching means each new pass produces findings
          dependent on prior passes' work, reducing independence by
          construction; rate would drop further if the same pair
          continues without external input
    Cannot distinguish (a) vs (b) without external check (e.g., a
    different reviewer or operator-driven v1.5 fix).

recommendation: |
  Operator decision required before v1.5:
    1. Choose Path A / B / C from meta_recommendation above
    2. If Path C (stop patching, build infrastructure):
       - Scaffold scripts/agent_loop/ with validate_disposition_index.py
       - Run validator on current spec; expect failures (it's blocked)
       - Use validator output as v1.5 work-list (deterministic, not
         agent-generated)
    3. If Path B (operator takes over):
       - Operator applies v1.5 architectural fixes directly
       - Claude+codex review the v1.5 result; no inline patches
    4. If Path A (continue self-patching):
       - Apply claude-rev-028 constraint (limit scope strictly)
       - Build validator FIRST; gate further patches on clean run

  Until operator chooses path:
    - Spec stays at v1.4-patched-pass-10-pass-12-pass-14
    - active_contract_readiness remains blocked_pending_v1_5
    - This pass DOES NOT declare ready for Phase 0
