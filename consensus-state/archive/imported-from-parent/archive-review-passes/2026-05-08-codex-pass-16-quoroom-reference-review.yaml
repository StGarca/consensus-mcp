schema_version: 1
pass_id: pass-16-codex-quoroom-reference-review
reviewer: codex
date: 2026-05-08
external_reference:
  name: quoroom-ai/room
  url: https://github.com/quoroom-ai/room
  local_review_clone: "%TEMP%/quoroom-room-review"
review_type: external_project_comparison
spec_version_reviewed: draft-v1.5-ai-contract
verdict:
  clone_wholesale: false
  borrow_architecture_patterns: true
  immediate_dependency_candidate: false
  summary: |
    Quoroom is a strong reference implementation for the runtime layer we
    eventually want: persistent rooms, queen/workers, quorum decisions,
    WIP state, skills, memory, task scheduling, MCP tools, HTTP/WebSocket
    observability, and self-mod audit/revert. It is not a drop-in solution
    for this project. Our current safest path remains Phase 0 deterministic
    files plus validators, then selectively borrow Quoroom's runtime patterns
    once schemas and iteration-0000 are proven.

source_observations:
  - id: quoroom-obs-001
    claim: "Quoroom's core unit is a Room with Queen, Workers, Quorum, Keeper, goals, skills, memory, task scheduling, MCP, REST/WebSocket, dashboard, and CLI."
    relevance: "Very high for the multi-agent consensus loop; low for direct audiobook rendering."
  - id: quoroom-obs-002
    claim: "Quoroom uses local-first persistent state rather than transient chat transcript state."
    relevance: "Directly relevant to context conservation and repeatability."
  - id: quoroom-obs-003
    claim: "Quoroom separates coordinator and executor roles."
    relevance: "Matches our Path C direction: reviewers/synthesizer should not also be unconstrained patch authors."
  - id: quoroom-obs-004
    claim: "Quoroom exposes many MCP tools but wraps them with UI/API/runtime surfaces."
    relevance: "Useful later; too much surface area for our current Phase 0."
  - id: quoroom-obs-005
    claim: "Quoroom includes wallet, on-chain identity, public rooms, cloud stations, and autonomous earning framing."
    relevance: "Do not borrow for this project; unrelated and security-expanding."

borrow_candidates:
  - id: borrow-001-agent-wip
    pattern: "per-agent WIP saved at cycle end and injected at the top of the next cycle"
    target_in_our_project: "agent-loop/state/agent-wip.yaml or SQLite event store later"
    reason: "Reduces repeated context loading and prevents agents from restarting analysis every turn."
  - id: borrow-002-role-scoped-tools
    pattern: "queen/coordinator gets orchestration tools; workers get execution tools"
    target_in_our_project: "reviewer / synthesizer / implementer / verifier tool profiles"
    reason: "Prevents a reviewer from silently becoming the patch author and recreating the pass-10/pass-12 regression pattern."
  - id: borrow-003-quorum-as-objection-capture
    pattern: "announce decision; allow objection window; record objections"
    target_in_our_project: "consensus.yaml decision lifecycle"
    reason: "Good for low-risk changes and for preserving pushback. Must not auto-approve production or high-risk changes."
  - id: borrow-004-skill-versioning
    pattern: "reusable skills with activation contexts and versions"
    target_in_our_project: "agent-loop/skills/*.md or project skill registry"
    reason: "Our repeated review methodology, emotion-source review, LoRA acoustic verification, and validator-writing patterns should become versioned skills instead of repeated prose."
  - id: borrow-005-self-mod-audit-revert
    pattern: "audit every self-modification and support one-step revert where possible"
    target_in_our_project: "patch ledger with old/new sha256, scope, validator evidence, and revert command"
    reason: "Improves safety for agent-applied changes and makes consensus implementation reversible."
  - id: borrow-006-runtime-memory
    pattern: "entities, observations, relations, FTS, vector search"
    target_in_our_project: "Phase 1+ SQLite memory/event store"
    reason: "Can replace repeated whole-MD rereads with targeted retrieval of prior decisions, failures, and project facts."
  - id: borrow-007-scheduler-webhooks
    pattern: "cron, one-time, on-demand, and webhook-triggered tasks"
    target_in_our_project: "nightly validators, corpus backfill jobs, render verification, GitHub event triggers"
    reason: "Useful after deterministic validators exist; not needed before iteration-0000."
  - id: borrow-008-provider-adapters
    pattern: "Claude/Codex CLI plus OpenAI/Anthropic/Gemini/Ollama API abstraction"
    target_in_our_project: "agent executor layer"
    reason: "Lets Codex/Claude/local models participate with the same artifact protocol."
  - id: borrow-009-dashboard-observability
    pattern: "local dashboard with activity, workers, goals, memory, WebSocket events"
    target_in_our_project: "read-only dashboard after Phase 0"
    reason: "Good for operator situational awareness. Keep read-only until gates are mature."

findings:
  - id: codex-rev-039-add-agent-wip-artifact-before-runtime
    severity: high
    status: candidate_pending_v1_6
    claim: "Our loop lacks Quoroom-style per-agent WIP state, so agents still depend too heavily on chat continuity and large MD rereads."
    borrowed_from: "Quoroom quoroom_save_wip pattern"
    required_change: |
      Add a Phase 0 WIP artifact before any full MCP runtime:
        agent-loop/state/agent-wip.yaml
      keyed by agent_id, iteration_id, current_task, last_completed_action,
      next_action, blockers, and artifact_paths. Inject WIP before archive
      context in every agent packet.
  - id: codex-rev-040-role-scoped-tool-profiles
    severity: high
    status: candidate_pending_v1_6
    claim: "The spec names reviewer/synthesizer/implementer roles, but it does not yet enforce Quoroom-style role-scoped tools at the artifact layer."
    borrowed_from: "Quoroom queen vs worker tool split"
    required_change: |
      Define tool_profiles:
        reviewer: read/search/write-review only
        synthesizer: read reviews/build consensus/no code patch
        implementer: apply consensus patch within scope
        verifier: run checks/write verification/no patch except generated reports
      Validator must reject artifacts where role and tool use conflict.
  - id: codex-rev-041-quorum-objection-window-for-low-risk-only
    severity: medium
    status: candidate_pending_v1_6
    claim: "Quoroom's announce-and-object quorum model is useful, but unsafe if copied into our production gates."
    borrowed_from: "Quoroom quorum decisions"
    required_change: |
      Add decision_class:
        low_risk_docs: objection_window_allowed
        validator_or_schema_change: explicit_dual_agent_consensus_required
        production_or_render_or_training: operator_approval_required
      Auto-effective decisions are forbidden for production, model training,
      corpus mutation, and paid/cloud actions.
  - id: codex-rev-042-plan-phase1-sqlite-event-store
    severity: medium
    status: candidate_pending_v1_6
    claim: "YAML files are correct for Phase 0, but Quoroom shows the next scalability step is a local persistent event store."
    borrowed_from: "Quoroom better-sqlite3 schema, WAL mode, FTS/vector memory"
    required_change: |
      Keep Phase 0 YAML. Add Phase 1 design for SQLite:
        events, artifacts, agents, tasks, decisions, tool_calls, checks,
        summaries, memories, embeddings.
      The DB is derived from append-only artifacts until Phase 1 validators
      can prove round-trip consistency.
  - id: codex-rev-043-skill-registry-for-review-methodology
    severity: medium
    status: candidate_pending_v1_6
    claim: "Our repeated review instructions should become versioned reusable skills rather than repeated MD prose."
    borrowed_from: "Quoroom skill activation/versioning"
    required_change: |
      Add project skills:
        consensus-reviewer
        validator-author
        emotion-model-auditor
        lora-acoustic-verifier
        copyright-safe-corpus-operator
      Each review packet records skill name, version, and hash.
  - id: codex-rev-044-self-mod-audit-for-consensus-patches
    severity: high
    status: candidate_pending_v1_6
    claim: "Consensus patches need Quoroom-style audit/revert metadata before agents get broader patch authority."
    borrowed_from: "Quoroom self-mod audit and revert"
    required_change: |
      Add patch_ledger entries:
        patch_id, consensus_id, implementer_id, files, old_sha256,
        new_sha256, validators_run, validator_outputs, revert_command,
        reversible, operator_approval_ref_if_needed.
  - id: codex-rev-045-executor-provider-abstraction
    severity: medium
    status: candidate_pending_v1_6
    claim: "Our spec says Codex + Claude but does not yet specify enough executor mechanics for CLI/API/local model parity."
    borrowed_from: "Quoroom provider adapter layer"
    required_change: |
      Add executor_adapter contract for Codex CLI, Claude CLI, API models,
      and local models. Include session resume, timeout, abort, rate-limit
      detection, context overflow recovery, and tool-call transcript capture.
  - id: codex-rev-046-read-only-dashboard-later-not-now
    severity: medium
    status: candidate_pending_v1_6
    claim: "Quoroom's dashboard/WebSocket model is useful for operator observability, but adding UI now would distract from validator readiness."
    borrowed_from: "Quoroom local dashboard and WebSocket activity stream"
    required_change: |
      Defer UI until Phase 1. If added, make it read-only first:
      iterations, current WIP, findings, consensus state, check state,
      production_state, and operator questions.
  - id: codex-rev-047-do-not-import-wallet-cloud-public-room-surface
    severity: high
    status: candidate_pending_v1_6
    claim: "Quoroom's wallet, cloud station, public room, and autonomous earning features are orthogonal and would increase security/scope risk."
    borrowed_from: "negative lesson from Quoroom scope"
    required_change: |
      Add explicit non-goals for our loop:
        no wallet
        no on-chain identity
        no public room publishing
        no autonomous purchasing/cloud rental
        no externally reachable webhooks until local auth model is proven.
  - id: codex-rev-048-audiobook-specialist-workers
    severity: medium
    status: candidate_pending_v1_6
    claim: "Quoroom's worker templates suggest a useful project-specific role roster for our audiobook pipeline."
    borrowed_from: "Quoroom named worker template pattern"
    required_change: |
      Define reusable worker profiles:
        Manifest Guardian
        Emotion Auditor
        Acoustic Verifier
        Alignment Miner
        LoRA Trainer
        Render QA
        Copyright Safety Reviewer
      Each profile gets allowed tools, forbidden actions, expected artifacts,
      and escalation triggers.

integration_sequence:
  - step: 1
    action: "Fix pass-15 codex-rev-033 first: pin or remove PyYAML dependency, rerun validator tests."
  - step: 2
    action: "Run iteration-0000 with current file-based Phase 0 artifacts."
  - step: 3
    action: "Add agent-wip.yaml and role-scoped tool profiles."
  - step: 4
    action: "Add patch ledger and executor adapter contract."
  - step: 5
    action: "Only after artifacts stabilize, design Phase 1 SQLite/MCP runtime inspired by Quoroom."
  - step: 6
    action: "Read-only dashboard is optional Phase 1 observability; not a readiness blocker."

pushback:
  - "Do not install Quoroom as a dependency to solve our current problem. It is a useful reference, not our runtime contract."
  - "Do not copy democratic voting into production clearance. Our operator gates and dual-agent technical gates are stricter for good reasons."
  - "Do not add wallet, cloud, public rooms, or autonomous commerce features."
  - "Do not build UI before validator reproducibility and iteration-0000."
  - "Borrow the state-machine and audit patterns, not the product scope."

recommended_next_patch:
  priority: high
  content: |
    Promote codex-rev-039 and codex-rev-040 into v1.6 after fixing the
    PyYAML validator dependency:
      - add agent-wip.yaml schema
      - add role-scoped tool_profiles
      - add validator checks for role/tool mismatch
