findings:
- id: codex-rev-001
  severity: blocking
  summary: Real nested apply_step_landed mutation metadata is never hoisted
  citation: scripts/agent_loop_mcp/_closure_invariant.py:93
  risk: Real apply_codex_patch events described by the local comment use extra_fields.last_mutation,
    but the reader only checks top-level last_mutation. Valid post-patch closures
    then fail cross_family/hash_match because actor and post_sha are absent, blocking
    the intended closure cycle after any mutation.
  recommendation: Read extra_fields.last_mutation when top-level last_mutation is
    absent, then hoist the nested mutation fields before invariant evaluation.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: b6382e9281b3377c9c2641747a3aa57ff8fda2c54b7bf41e716a38963e784e1c
    unified_diff: "diff --git a/scripts/agent_loop_mcp/_closure_invariant.py b/scripts/agent_loop_mcp/_closure_invariant.py\n\
      --- a/scripts/agent_loop_mcp/_closure_invariant.py\n+++ b/scripts/agent_loop_mcp/_closure_invariant.py\n\
      @@ -90,7 +90,11 @@ def last_mutation_from_audit(audit_log: list[dict]) -> Optional[dict]:\n\
      \     # Without this hoisting, the closure invariant would always fail\n   \
      \  # hash_match against a real apply_codex_patch event because the top-level\n\
      \     # post_sha is absent.\n     nested = most_recent.get(\"last_mutation\"\
      )\n+    if not isinstance(nested, dict):\n+        extra_fields = most_recent.get(\"\
      extra_fields\")\n+        if isinstance(extra_fields, dict):\n+            nested\
      \ = extra_fields.get(\"last_mutation\")\n     if isinstance(nested, dict):\n\
      \         # Hoist nested fields to top level for downstream consumers, preserving\n\
      \         # any explicit top-level values (top-level wins over nested).\n"
    files_touched:
    - scripts/agent_loop_mcp/_closure_invariant.py
    expected_tests:
    - python_env\\python.exe -m pytest scripts/agent_loop_mcp/tests/test_closure_invariant.py
      -q
    unified_diff_sha256: b7e6a18822906ae43148398110b52dec5b3ddf3b93fda94838d4c3ec0282057c
- id: codex-rev-002
  severity: blocking
  summary: Freshness check compares timestamp strings instead of instants
  citation: scripts/agent_loop_mcp/_closure_invariant.py:205
  risk: A stale review can pass freshness if it uses a lexicographically larger ISO/RFC3339
    offset form, for example 11:00+02:00 compared with 10:00Z even though it is earlier
    in UTC. That defeats the required freshness leg of the closure invariant.
  recommendation: Normalize aware ISO/RFC3339 timestamps to UTC datetimes and fail
    closed on malformed or timezone-naive values; use the same normalization in the
    standalone validator candidate selection.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-002-patch
    applies_to_findings:
    - codex-rev-002
    base_sha: b6382e9281b3377c9c2641747a3aa57ff8fda2c54b7bf41e716a38963e784e1c
    unified_diff: "diff --git a/scripts/agent_loop_mcp/_closure_invariant.py b/scripts/agent_loop_mcp/_closure_invariant.py\n\
      --- a/scripts/agent_loop_mcp/_closure_invariant.py\n+++ b/scripts/agent_loop_mcp/_closure_invariant.py\n\
      @@ -26,6 +26,7 @@ from __future__ import annotations\n \n import hashlib\n+from\
      \ datetime import datetime, timezone\n from pathlib import Path\n from typing\
      \ import Optional\n@@ -122,6 +123,30 @@ def _actor_model_family(actor) -> Optional[str]:\n\
      \     return None\n \n \n+def _parse_utc_timestamp(value) -> Optional[datetime]:\n\
      +    \"\"\"Parse ISO 8601/RFC 3339 timestamps to aware UTC datetimes.\"\"\"\n\
      +    if isinstance(value, datetime):\n+        parsed = value\n+    elif isinstance(value,\
      \ str):\n+        text = value.strip()\n+        if text.endswith((\"Z\", \"\
      z\")):\n+            text = f\"{text[:-1]}+00:00\"\n+        try:\n+       \
      \     parsed = datetime.fromisoformat(text)\n+        except ValueError:\n+\
      \            return None\n+    else:\n+        return None\n+\n+    if parsed.tzinfo\
      \ is None or parsed.utcoffset() is None:\n+        return None\n+    return\
      \ parsed.astimezone(timezone.utc)\n+\n+\n def check_closure_invariant(\n   \
      \  last_mutation: Optional[dict],\n     closing_verdict: dict,\n@@ -202,12 +227,12\
      \ @@ def check_closure_invariant(\n \n     closer_ts = closing_verdict.get(\"\
      created_at_utc\")\n     lm_ts = last_mutation.get(\"timestamp\") or last_mutation.get(\"\
      timestamp_utc\")\n-    # String comparison works for ISO 8601 / RFC 3339 with\
      \ Z suffix.\n+    closer_dt = _parse_utc_timestamp(closer_ts)\n+    lm_dt =\
      \ _parse_utc_timestamp(lm_ts)\n     freshness = (\n-        closer_ts is not\
      \ None\n-        and lm_ts is not None\n-        and closer_ts > lm_ts\n+  \
      \      closer_dt is not None\n+        and lm_dt is not None\n+        and closer_dt\
      \ > lm_dt\n     )\ndiff --git a/scripts/agent_loop_mcp/_validate_closure_invariant.py\
      \ b/scripts/agent_loop_mcp/_validate_closure_invariant.py\n--- a/scripts/agent_loop_mcp/_validate_closure_invariant.py\n\
      +++ b/scripts/agent_loop_mcp/_validate_closure_invariant.py\n@@ -20,6 +20,7\
      \ @@ import argparse\n import json\n import sys\n+from datetime import datetime,\
      \ timezone\n from pathlib import Path\n from typing import Optional\n@@ -43,6\
      \ +44,7 @@ from agent_loop_mcp._closure_invariant import (  # noqa: E402\n \
      \    check_closure_invariant,\n     last_mutation_from_audit,\n+    _parse_utc_timestamp,\n\
      \ )\n@@ -117,24 +119,30 @@ def _most_recent_closing_verdict(\n     mut_ts: Optional[str]\
      \ = None\n     if last_mutation is not None:\n         mut_ts = last_mutation.get(\"\
      timestamp\") or last_mutation.get(\"timestamp_utc\")\n+    mut_dt: Optional[datetime]\
      \ = _parse_utc_timestamp(mut_ts) if mut_ts is not None else None\n+    mutation_timestamp_missing\
      \ = mut_ts is None or mut_dt is None\n \n-    candidates = []\n+    candidates:\
      \ list[tuple[Optional[datetime], dict]] = []\n     for fname in (\"claude-review.yaml\"\
      , \"codex-review.yaml\"):\n         v = _load_review_yaml(iteration_dir / fname)\n\
      \         if v is None:\n             continue\n-        v_ts = v.get(\"created_at_utc\"\
      , \"\")\n-        if mut_ts is None or v_ts > mut_ts:\n-            candidates.append(v)\n\
      +        v_dt = _parse_utc_timestamp(v.get(\"created_at_utc\"))\n+        if\
      \ mutation_timestamp_missing:\n+            candidates.append((v_dt, v))\n+\
      \        elif v_dt is not None and mut_dt is not None and v_dt > mut_dt:\n+\
      \            candidates.append((v_dt, v))\n \n     if not candidates:\n    \
      \     return None, False\n-    # Pick most recent by timestamp string (ISO 8601\
      \ sorts lexicographically).\n-    best = max(candidates, key=lambda v: v.get(\"\
      created_at_utc\", \"\"))\n+    # Pick most recent by normalized timestamp. Invalid\
      \ verdict timestamps sort\n+    # oldest and will fail the downstream freshness\
      \ check.\n+    floor = datetime.min.replace(tzinfo=timezone.utc)\n+    best\
      \ = max(candidates, key=lambda item: item[0] or floor)[1]\n     return best,\
      \ True\n"
