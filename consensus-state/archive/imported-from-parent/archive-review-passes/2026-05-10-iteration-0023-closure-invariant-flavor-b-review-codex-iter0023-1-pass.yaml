      \ b/scripts/agent_loop_mcp/_validate_closure_invariant.py\n--- a/scripts/agent_loop_mcp/_validate_closure_invariant.py\n\
      +++ b/scripts/agent_loop_mcp/_validate_closure_invariant.py\n@@ -73,14 +73,16\
      \ @@ def _load_review_yaml(path: Path) -> Optional[dict]:\n         data = yaml.safe_load(path.read_text(encoding=\"\
      utf-8\")) or {}\n     except Exception:\n         return None\n+    structured_actor\
      \ = data.get(\"actor\") if isinstance(data.get(\"actor\"), dict) else None\n\
      \     reviewer_id = data.get(\"reviewer_id\") or data.get(\"agent\")\n+    if\
      \ not reviewer_id and structured_actor is not None:\n+        reviewer_id =\
      \ structured_actor.get(\"id\")\n     sealed_at = data.get(\"sealed_at_utc\"\
      ) or data.get(\"created_at_utc\")\n     target_hash = data.get(\"packet_sha256\"\
      ) or data.get(\"review_target_hash\")\n     if not (reviewer_id and sealed_at):\n\
      \         return None\n \n     # Prefer the structured actor object when present\
      \ (post-iter-0018 reviews).\n-    structured_actor = data.get(\"actor\") if\
      \ isinstance(data.get(\"actor\"), dict) else None\n-\n     family: Optional[str]\
      \ = None\n     if structured_actor is not None:\n         family = structured_actor.get(\"\
      model_family\")\n"
    files_touched:
