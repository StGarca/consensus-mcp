    unified_diff_sha256: d07af3ad119b9cdca5d138e8d8afce932b1e2ea02ff92533cdc42270b6fe05bb
- id: codex-rev-003
  severity: high
  summary: Validator ignores modern actor-only review files
  citation: scripts/agent_loop_mcp/_validate_closure_invariant.py:76
  risk: _load_review_yaml returns None unless reviewer_id or agent is present, even
    when a structured actor.id exists. Modern review files using actor plus created_at_utc/review_target_hash
    are invisible to the validator, so non-compliant closures can be reported as in_flight
    and the CLI can exit 0.
  recommendation: Derive reviewer_id from actor.id before the required-field check
    when a structured actor object is present.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-003-patch
    applies_to_findings:
    - codex-rev-003
    base_sha: b6382e9281b3377c9c2641747a3aa57ff8fda2c54b7bf41e716a38963e784e1c
