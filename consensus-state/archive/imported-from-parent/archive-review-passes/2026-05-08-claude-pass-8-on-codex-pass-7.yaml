      Pass-8 was initially delivered conversationally without writing back
      to MD or archive. Operator caught the violation with 'did you update
      the md?' and reinforced with 'always fully update with all findings,
      questions, thoughts, concerns etc'. Same failure mode as pass-4
      (which codex-rev-068 caught). The writeback rule needs enforcement
      (rev-080) AND habituation; section 0 rule is necessary but not
      sufficient.
    durable_rule_for_claude_going_forward: |
      After every review pass, immediately write back ALL findings,
      questions, observations, and meta-notes. Never deliver review
      content conversationally only. The archive file is the canonical
      record; chat is ephemeral.
