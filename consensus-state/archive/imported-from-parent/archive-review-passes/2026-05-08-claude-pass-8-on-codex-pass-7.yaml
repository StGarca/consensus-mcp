      Pass-7 and pass-8 produced 14 total findings (8 codex + 6 claude),
      2 corroborated, 12 unique. Independence rate 0.86 again, consistent
      with pass-4/pass-5 measurement. The architecture is justifying
      itself across multiple iterations now, not just once.
