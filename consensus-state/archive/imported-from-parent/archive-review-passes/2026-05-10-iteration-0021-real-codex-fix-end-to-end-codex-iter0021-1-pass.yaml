findings:
- id: codex-rev-001
  severity: medium
  summary: apply.codex_patch.handle() does not re-validate actor shape when called
    directly
  citation: scripts/agent_loop_mcp/tools/apply_codex_patch.py:127
  risk: Direct Python imports can bypass the MCP schema and reach audit emission with
    a malformed actor, weakening defense-in-depth provenance for apply-step mutations.
  recommendation: Add an early required-key check for actor.id, actor.model_family,
    actor.role, and actor.pass_id, and cover missing actor.model_family with a regression
    test.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: f612e7d465f2a027cf470fd69251265b0f6d2f15de766bd203235fd50c6db3d9
    unified_diff: "--- a/scripts/agent_loop_mcp/tools/apply_codex_patch.py\n+++ b/scripts/agent_loop_mcp/tools/apply_codex_patch.py\n\
      @@ -133,6 +133,19 @@ def handle(\n     iter_dir = Path(iteration_dir)\n    \
      \ repo_root = _resolve_repo_root()\n \n+    required_actor_keys = (\"id\", \"\
      model_family\", \"role\", \"pass_id\")\n+    if not isinstance(actor, dict):\n\
      +        return _refuse(\n+            \"invalid_actor: actor must be an object\
      \ with required actor keys: \"\n+            + \", \".join(required_actor_keys)\n\
      +        )\n+    missing_actor_keys = [key for key in required_actor_keys if\
      \ key not in actor]\n+    if missing_actor_keys:\n+        return _refuse(\n\
      +            \"invalid_actor: missing required actor key(s): \"\n+         \
      \   + \", \".join(missing_actor_keys)\n+        )\n+\n     # Defense-in-depth:\
      \ validate patch_id format. The MCP layer enforces this\n     # via the input_schema\
      \ pattern; record_verdict validates likewise. We\n     # re-check here so a\
      \ misuse via direct python import can't slip past.\n--- a/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\n\
      +++ b/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\n@@ -296,6 +296,29\
      \ @@ def test_refuses_with_authorization_missing_codex_patch_apply_field(repo_root_env\n\
      \     assert result[\"ok\"] is False\n     assert result[\"applied\"] is False\n\
      \     assert \"operator_authorization_missing\" in (result.get(\"error\") or\
      \ \"\")\n \n \n+def test_refuses_when_actor_missing_model_family(repo_root_env,\
      \ monkeypatch):\n+    \"\"\"Direct handle() imports bypass MCP schema validation;\
      \ fail closed.\"\"\"\n+    monkeypatch.setenv(\"AGENT_LOOP_MCP_CODEX_PATCH_APPLY\"\
      , \"1\")\n+    iter_dir = _make_active_iter(repo_root_env)\n+    _write_goal_packet(iter_dir,\
      \ codex_patch_apply_authorized=True)\n+    _write_target_file(repo_root_env,\
      \ \"scripts/foo.py\", \"hello\\n\")\n+    pp = _build_patch_proposal(repo_root_env)\n\
      +    _write_codex_review(iter_dir, pp)\n+    _write_claude_verification(iter_dir,\
      \ pp[\"patch_id\"], \"approved\")\n+    actor = _make_actor()\n+    del actor[\"\
      model_family\"]\n+\n+    result = apply_codex_patch.handle(\n+        iteration_dir=str(iter_dir),\n\
      +        patch_id=pp[\"patch_id\"],\n+        actor=actor,\n+    )\n+    assert\
      \ result[\"ok\"] is False\n+    assert result[\"applied\"] is False\n+    assert\
      \ \"missing required actor key\" in (result.get(\"error\") or \"\")\n+    assert\
      \ \"model_family\" in (result.get(\"error\") or \"\")\n+\n+\n # ---- claude\
      \ verification gate ---------------------------------------------\n \n \n"
    files_touched:
    - scripts/agent_loop_mcp/tools/apply_codex_patch.py
