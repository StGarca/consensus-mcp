    results
  citation: scripts/agent_loop_mcp/_validate_closure_invariant.py:77
  risk: Unexpected defects become `None` or `n/a (no audit)`, making invariant diagnostics
    indistinguishable from absent or malformed input.
  recommendation: Narrow both YAML read handlers to `OSError`, `UnicodeDecodeError`,
    and `yaml.YAMLError`, and preserve distinct diagnostics for unreadable versus
    malformed audit data.
  patch_not_proposed_reason: Cannot safely author a unified diff because scripts/agent_loop_mcp/_validate_closure_invariant.py
