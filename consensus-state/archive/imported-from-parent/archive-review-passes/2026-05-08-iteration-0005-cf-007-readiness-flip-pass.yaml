lessons_learned:
  - id: post_apply_closure_artifact_hygiene
    observation: "Even with v1.7.8 ITERATION_CLOSURE_INCOHERENT validator, post-apply closure artifact updates are easy to miss (5 operator_response_pending fields + 3 apply_status fields + multiple process_outcomes labels). Validator must scan EVERYTHING, not just the most-obvious top-level fields."
    fix_landed: validator hardening v0.3.1
  - id: case_normalization_for_status_strings
    observation: "BLOCKED_PENDING_OPERATOR_AUTHORIZATION uppercase variant slipped past lowercase-only 'pending' substring match. Future status string conventions should be lowercase OR validator must case-normalize."
    fix_landed: case-insensitive match in validator
  - id: dual_reviewer_unanimous_value_consensus
    observation: "iter-0005 produced first unanimous reviewer agreement on a non-spec-literal value (phase_0_validated). Both arrived independently because both engaged with the underlying tension (LOW residuals + governance vs behavior framing). This is the dual-reviewer pattern at its best."
  - id: operator_shortcut_authorization_pattern
    observation: "operator's 'authorize defaults' shortcut response collapsed 5 form fields into single response with template-derived rationale. Pattern works when reviewer-proposed values are unanimous AND template is sufficient. Future cf-007-style passes can use same shortcut."
