findings:
- id: codex-rev-001
  severity: blocking
  summary: handle() still accepts structurally invalid actor dictionaries on direct
    Python calls
  citation: scripts/agent_loop_mcp/tools/apply_codex_patch.py:131
  risk: Direct imports bypass the MCP schema, so calls missing required actor fields
    can proceed through authorization, apply files, and only emit incomplete audit
    metadata instead of failing early as required by iter-0022 A1/A2.
  recommendation: Add an explicit actor structure validator at the start of handle()
    and cover missing actor.model_family with a regression test.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: 0c9507575598bfebc25afe42eaa27358f967fc1ccbea287af7ae695f07adb94b
    unified_diff: "--- a/scripts/agent_loop_mcp/tools/apply_codex_patch.py\n+++ b/scripts/agent_loop_mcp/tools/apply_codex_patch.py\n\
      @@ -123,6 +123,20 @@ def _refuse(error: str, last_mutation: dict | None = None)\
      \ -> dict:\n     }\n \n \n+def _validate_actor(actor: dict) -> str | None:\n\
      +    \"\"\"Defense-in-depth actor validation for direct Python handle() calls.\"\
      \"\"\n+    if not isinstance(actor, dict):\n+        return \"actor_invalid:\
      \ actor must be a dict\"\n+    required = (\"id\", \"model_family\", \"role\"\
      , \"pass_id\")\n+    missing = [key for key in required if key not in actor]\n\
      +    if missing:\n+        return \"actor_invalid: missing required actor key(s):\
      \ \" + \", \".join(missing)\n+    if actor.get(\"model_family\") not in (\"\
      codex\", \"claude\"):\n+        return \"actor_invalid: model_family must be\
      \ 'codex' or 'claude'\"\n+    if actor.get(\"role\") not in (\"fix_author\"\
      , \"correction_author\"):\n+        return \"actor_invalid: role must be 'fix_author'\
      \ or 'correction_author'\"\n+    return None\n+\n+\n def handle(\n     iteration_dir:\
      \ str,\n     patch_id: str,\n@@ -132,6 +146,10 @@ def handle(\n     \"\"\"Apply\
      \ a verified codex patch under operator authorization.\"\"\"\n     iter_dir\
      \ = Path(iteration_dir)\n     repo_root = _resolve_repo_root()\n+\n+    actor_error\
      \ = _validate_actor(actor)\n+    if actor_error:\n+        return _refuse(actor_error)\n\
      \ \n     # Defense-in-depth: validate patch_id format. The MCP layer enforces\
      \ this\n     # via the input_schema pattern; record_verdict validates likewise.\
      \ We\n--- a/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\n+++ b/scripts/agent_loop_mcp/tests/test_apply_codex_patch.py\n\
      @@ -160,6 +160,24 @@ def test_register_adds_tool():\n     assert callable(handler)\n\
      \ \n \n+# ---- direct-call actor validation -----------------------------------------\n\
      +\n+\n+def test_refuses_when_actor_missing_model_family(repo_root_env, monkeypatch):\n\
      +    \"\"\"Direct Python imports bypass MCP schema validation; handle() re-checks\
      \ actor.\"\"\"\n+    monkeypatch.setenv(\"AGENT_LOOP_MCP_CODEX_PATCH_APPLY\"\
      , \"1\")\n+    iter_dir = _make_active_iter(repo_root_env)\n+    _write_goal_packet(iter_dir,\
      \ codex_patch_apply_authorized=True)\n+    actor = _make_actor()\n+    actor.pop(\"\
      model_family\")\n+\n+    result = apply_codex_patch.handle(\n+        iteration_dir=str(iter_dir),\n\
      +        patch_id=\"codex-rev-001-patch\",\n+        actor=actor,\n+    )\n\
      +    assert result[\"ok\"] is False\n+    assert result[\"applied\"] is False\n\
      +    assert \"missing required actor key\" in (result.get(\"error\") or \"\"\
      )\n+    assert \"model_family\" in (result.get(\"error\") or \"\")\n+\n+\n #\
      \ ---- authorization gate ----------------------------------------------------\n\
      \ \n \n"
