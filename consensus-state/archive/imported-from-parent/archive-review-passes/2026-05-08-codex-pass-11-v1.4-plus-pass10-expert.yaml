reviewer: codex
reviewed_utc: "2026-05-08T00:00:00Z"
spec_under_review: "wiki/audiobook-project/agent-loop/2026-05-08-multi-agent-consensus-mcp-orchestration.md"
spec_version_reviewed: "draft-v1.4-ai-contract-plus-claude-pass-10"
depth: "execution-contract / pass-10 writeback audit / git-trackability and lifecycle consistency"
overall_verdict: >
  Pass-10 correctly corroborates the important pass-9 issues and fixes several
  hygiene problems. It also exposes a deeper process problem: the active
  contract is being patched after v1.4 without a version bump, section 24 is
  continuing to carry lifecycle/prose despite being declared index-only, and
  the git allowlist still does not cover all Phase 0 deliverables. The document
  should not be treated as Phase-0-ready until the high findings below are
  resolved or explicitly accepted.
findings:
  high:
    - id: codex-rev-017-active-contract-patched-without-version-bump
      claim: "Pass-10 applies active-contract-affecting changes while frontmatter still says status=draft-v1.4-ai-contract and contract_version=multi-agent-consensus-mcp-v1.4."
      evidence:
        - "frontmatter remains v1.4"
        - "pass-10 changed active section 23 fixture comment and section 24 lifecycle/index content"
        - "archive index marks pass-10 partial with pending v1.5 items"
      risk: "Agents cannot tell whether they are executing v1.4, v1.4 plus patches, or a pre-v1.5 draft. Validators keyed to contract_version will produce ambiguous results."
      required_change: "Either bump to v1.4.1 for pass-10 inline changes or declare active_contract_patch_level in frontmatter with pass ids included."
    - id: codex-rev-018-phase0-scripts-ignored-by-git
      claim: ".gitignore now allows agent-loop archives/state/fixtures, but the spec's Phase 0 deliverables live under scripts/agent_loop/, and top-level scripts/ is still denied by the root /* rule."
      evidence:
        - ".gitignore allowlist includes /run, /wiki, /tests, /agent-loop, but not /scripts"
        - "section 23 phase_0_deliverables lists scripts/agent_loop/build_review_packet.py and related validators"
      risk: "Phase 0 implementation can create the required validator/orchestrator scripts and still have them ignored by git, repeating the archive-file audit failure in a more serious form."
      required_change: "Add /scripts and scripts/agent_loop/** to .gitignore allowlist, or move Phase 0 scripts under an already-allowed top-level path."
    - id: codex-rev-019-known-blocking-findings-not-reflected-in-frontmatter
      claim: "Section 24 lists blocking pending v1.5 findings, but frontmatter has no blocked_by, known_blockers, or readiness field."
      evidence:
        - "pending_v1_5_blocking includes codex-rev-009/010/011/012, claude-rev-007/008/013"
        - "frontmatter status remains active v1.4 with no blocked marker"
      risk: "A packet builder or agent that reads only frontmatter plus sections 1-23 can miss that the active contract has known blocking issues."
      required_change: "Add frontmatter known_blockers or active_contract_readiness: blocked_pending_v1_5 until those items are resolved."
  medium:
    - id: codex-rev-020-section24-index-only-rule-still-violated-by-pass10
      claim: "Pass-10 improved section 24 structure but still leaves pending groups, rationales, and pass_10_applied prose in the section declared index-only."
      evidence:
        - "section 24 pending_v1_5_* entries include rationale/note fields"
        - "section 24 pass_10_applied contains prose descriptions"
      risk: "The review-log drift problem is reduced but not solved; section 24 is now a lifecycle ledger rather than a pure index."
      required_change: "Rename section 24 to Disposition Metadata or move pending/deferred/applied prose to a separate disposition-ledger.yaml."
    - id: codex-rev-021-pass10-archive-trackability-still-unverified-in-index
      claim: "Pass-10 says the archive gitignore issue is fixed, but the index does not record whether each archived_at path is tracked or merely present in the working tree."
      evidence:
        - "archive index lists archived_at paths only"
        - "pass-10 itself was untracked before this review pass staged it"
      risk: "A future pass can regress to references that exist locally but are absent from git."
      required_change: "validate_disposition_index.py should verify git ls-files contains every archived_at path, not just file existence."
    - id: codex-rev-022-pass10-rate-metrics-use-undefined-formula
      claim: "archive index publishes independent_finding_rate=0.81 for passes 9 and 10 while claude-rev-010 says the formula remains undefined."
      evidence:
        - "archive index loop_self_test_observations pass 9/10 formula"
        - "section 24 pending_v1_5_medium includes claude-rev-010-independent-finding-rate-formula-undefined"
      risk: "The metric can be persuasive while still semantically unstable. Future decisions may rely on a number whose denominator/numerator are not contract-defined."
      required_change: "Mark archive-index independence rates provisional until section 22 defines the formula, or promote the formula immediately."
    - id: codex-rev-023-active-corrobation-rule-known-unsafe-but-still-live
      claim: "Pass-10 agrees codex-rev-009/010 and claude-rev-008 are blocking, but the unsafe section 13 corroboration rule remains active in sections 1-23."
      evidence:
        - "section 13 still requires reviewer-declared corroborated_by and broad auto-blocking"
        - "pending_v1_5_blocking lists the relevant fixes"
      risk: "Any agent running against the active contract before v1.5 can apply the known-unsafe corroboration rule."
      required_change: "Temporarily disable dual_reviewer_corroboration in section 13 until v1.5 repairs ownership, independence proof, and severity gating."
  low:
    - id: codex-rev-024-gitignore-comment-nonascii
      claim: ".gitignore introduces a non-ASCII em dash in the agent-loop section comment."
      evidence: ".gitignore comment '# === agent-loop/ ...'"
      risk: "Low; not spec body, but previous mojibake issues came from similar punctuation and this repo is PowerShell-heavy."
      required_change: "Normalize .gitignore comments to ASCII."
positive_assessment:
  - "Pass-10 correctly treats codex-rev-009/010/011 as still blocking for v1.5."
  - "Pass-10 correctly fixes the legacy rev-071 citation and the section-body em dash."
  - "Pass-10 correctly recognizes premature ready-claims as a governance issue."
  - "Pass-10 correctly identifies validate_disposition_index.py as load-bearing infrastructure."
  - ".gitignore now starts allowing agent-loop archive artifacts, which fixes the immediate broken-audit problem for review-pass YAMLs."
recommendation: >
  Before another broad prose consolidation, fix git trackability for scripts/agent_loop,
  add an explicit blocked/readiness field to frontmatter, and either disable or repair
  the known-unsafe corroboration rule. Then build validate_disposition_index.py and
  run it before accepting further spec rewrites.
