findings:
- id: codex-rev-001
  severity: medium
  summary: Gemini proposal mode lacks template/schema provenance in dispatch logs
    and sealed packets
  citation: consensus_mcp/_dispatch_gemini.py:653
  risk: Proposal-mode Gemini dispatches can be sealed without any audit record of
    which proposal schema constrained the output. That weakens the new proposal/review
    split because a later verifier cannot distinguish the built-in proposal schema
    from an overridden schema, despite --schema now being an operator-facing input
    in proposal mode.
  recommendation: When ns.mode == "proposal", compute proposal_schema_sha256 from
    the effective proposal_schema_path and include proposal_schema_path/proposal_schema_sha256
    in dispatch_start, dispatch_failed provenance, sealed dispatch_provenance, and
    dispatch_done.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Proposal parsers accept empty rationale when structural_abstention is false
    if a custom schema relaxes minLength
  citation: consensus_mcp/_dispatch_codex.py:575
  risk: The built-in schemas require rationale_vs_alternatives to be non-empty, but
    the parser delegates that requirement entirely to the operator-supplied schema.
    A relaxed override can seal a non-abstaining proposal with an empty rationale,
    violating the desired end state that rationale_vs_alternatives is required and
    undermining convergence quality.
  recommendation: 'After schema validation, enforce parser-level semantic checks shared
    by built-in and override schemas: rationale_vs_alternatives must be a non-empty
    string in all cases, and non-abstaining proposals must have non-null selected_target
    and deliverable_scope.'
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The core mode switch and new proposal template/schema pairs
  are present, but proposal-mode provenance and parser-level invariant enforcement
  are incomplete enough to keep the implementation short of the sealed review goal.
