goal_satisfied: true
goal_satisfied_rationale: 'The root cause of both failures was not a missing tool,
  but a flawed reasoning pattern: assumption over verification. A tool-based solution,
  like a ''release pre-flight check'', would be a point-fix for the release symptom,
  but would not prevent the same class of error in other domains (e.g., inferring
  database schemas, dependency availability, etc.). By modifying the core operating
  instructions of the AI contributors, we address the fundamental reasoning flaw directly.
  This ''Verification-First'' invariant forces the AI to explicitly check environmental
  facts and project conventions before acting on them, and to be precise about the
  state of artifacts (e.g., distinguishing between a git tag and a branch head) when
  making claims. This is a higher-leverage solution that prevents a wider class of
  future errors and addresses both observed failure modes more robustly than a single-purpose
  tool.'
