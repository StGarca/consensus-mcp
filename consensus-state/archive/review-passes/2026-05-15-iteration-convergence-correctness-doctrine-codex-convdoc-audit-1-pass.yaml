findings:
- id: codex-rev-001
  severity: medium
  summary: Worked example introduces an empirical_status value that the convention's
    schema does not allow.
  citation: docs/workflows/converged-plan-convention.md:90
  risk: 'Authors following the example will record `empirical_status: refuted`, but
    the documented allowed values are only `proven | pending | n/a`, creating drift
    before machine enforcement is added.'
  recommendation: Either add `refuted` to the documented `empirical_status` values
    with semantics, or change the example comment to use one of the declared states.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: f0bef285c0bcd805f5360d379091af2f4b1514671990b2f39e7a8b17e30ee141
    unified_diff: "--- a/docs/workflows/converged-plan-convention.md\n+++ b/docs/workflows/converged-plan-convention.md\n\
      @@ -22,7 +22,7 @@ falsification:\n   refutation_observation: <the specific observable\
      \ that, if seen,\n     proves the hypothesis WRONG. Pre-specified. Not \"we'll\
      \ test\n     it\" \u2014 name the observable, e.g. \"i2c_master_transmit still\n\
      \     returns 0x103 at i2c.cpp:91 on a clean POWERON\">\n-  empirical_status:\
      \ proven | pending | n/a\n+  empirical_status: proven | pending | refuted |\
      \ n/a\n     # n/a       \u2192 falsifiable_from_artifacts:true and the proving\n\
      \     #             test is included in this iteration.\n     # pending   \u2192\
      \ defined class, experiment named but not yet run.\n@@ -30,6 +30,8 @@ falsification:\n\
      \     #             refutation_observation.\n     # proven    \u2192 the experiment\
      \ ran and did NOT produce the\n     #             refutation_observation.\n\
      +    # refuted   \u2192 the experiment ran and DID produce the\n+    #     \
      \        refutation_observation.\n ```"
    files_touched:
    - docs/workflows/converged-plan-convention.md
    expected_tests: []
    unified_diff_sha256: e258516419f1ff5534320c664906b4b5d8d3bc33ba85f539a5c2a6d92e86f9fb
goal_satisfied: false
