findings:
- id: codex-rev-001
  severity: blocking
  summary: ClaudeAdapter bypasses the required sealing path and writes raw YAML instead
    of using T6 write_and_seal.
  citation: consensus_mcp/contributors/claude.py:97
  risk: Claude artifacts will not have the same cryptographic sealing, archive behavior,
    or provenance guarantees as codex/gemini outputs, so the contributor adapter layer
    does not meet the sealed-artifact contract.
  recommendation: Route Claude callback output through the existing review.write_and_seal/T6
    sealing helper and return the paths/hashes it produces.
  patch_not_proposed_reason: The required review.write_and_seal API is outside the
    embedded authoritative files, so a correct patch would require a non-embedded
    signature.
  patch_proposal: null
- id: codex-rev-002
  severity: high
  summary: CodexAdapter and GeminiAdapter let malformed or unreadable sealed artifacts
    escape as raw exceptions.
  citation: consensus_mcp/contributors/codex.py:81; consensus_mcp/contributors/gemini.py:75
  risk: A missing sealed_path, unreadable YAML file, or malformed helper result bypasses
    DispatchError, preventing the engine from applying its contributor failure and
    timeout policy consistently.
  recommendation: Wrap sealed-path extraction, YAML reading, and schema validation
    in DispatchError for both subprocess adapters.
  patch_not_proposed_reason: Patch omitted to keep this sealed review focused; the
    fix is local to the cited adapters and should be covered by a missing-sealed-path
    unit test.
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: GeminiAdapter ignores per-dispatch adapter_options despite DispatchPacket
    documenting model selection there.
  citation: consensus_mcp/contributors/gemini.py:40
  risk: Workflow code that supplies a phase-specific Gemini model through DispatchPacket.adapter_options
    will silently run the configured default model instead, causing drift from the
    requested contributor configuration.
  recommendation: Merge packet.adapter_options with adapter_config, with an explicit
    precedence rule, before constructing --model.
  patch_not_proposed_reason: Patch omitted because the expected precedence between
    packet adapter_options and adapter_config is not specified in the embedded goal
    packet.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The adapter layer has the requested shape, but Claude output
  is not sealed through the required common path and subprocess adapter failures are
  not normalized reliably.
blocking_objections:
- codex-rev-001
