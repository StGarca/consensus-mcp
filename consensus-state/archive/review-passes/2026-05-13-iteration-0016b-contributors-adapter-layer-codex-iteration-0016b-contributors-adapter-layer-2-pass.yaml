findings:
- id: codex-rev-001
  severity: blocking
  summary: ClaudeAdapter trusts T6's archive path without ensuring the file is inside
    the requested iteration, so an injected or misconfigured seal result can make
    the adapter copy arbitrary files into the iteration artifact.
  citation: consensus_mcp/contributors/claude.py:84
  risk: The contributor adapter layer is supposed to normalize sealed artifacts for
    the current iteration, but this path trust can leak or substitute unrelated files
    and still return a successful SealedArtifact.
  recommendation: After T6 returns, resolve the sealed path and require it to be a
    file under the expected consensus-state archive location for the same iteration/reviewer/pass,
    or at minimum under the current iteration/archive root, before copying it locally.
  patch_not_proposed_reason: The embedded allowed files do not include consensus_mcp/tools/review_write_and_seal.py
    or the archive path contract needed to author an exact confinement patch safely.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The adapter layer is mostly present, but ClaudeAdapter's
  sealing handoff trusts an unvalidated returned path before copying it into the iteration
  output, which is a blocking artifact-integrity issue.
blocking_objections:
- codex-rev-001
