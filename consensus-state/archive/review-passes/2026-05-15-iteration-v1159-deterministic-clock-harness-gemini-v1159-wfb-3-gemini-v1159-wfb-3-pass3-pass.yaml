goal_satisfied_rationale: The proposed change successfully replaces the timing-fragile
  test harness with a fully deterministic, `threading.Condition`-based virtual clock
  (`_SyncClock`). This directly addresses the root cause of the flaky tests on Windows
  CI by creating an explicit happens-before relationship between the test driver and
  the production code's poll loop. The production change is a minimal, clean injection
  seam (`_sleep` kwarg) with zero impact on runtime behavior. The new test harness
  is robust, includes deadlock-avoidance safeguards, and correctly maintains coverage
  for the critical abort/heartbeat logic.
