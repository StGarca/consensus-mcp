findings:
- id: codex-rev-001
  severity: high
  summary: apply_codex_patch still applies via uncanonicalized target paths after
    only validating files_touched strings
  citation: consensus_mcp/tools/apply_codex_patch.py:239
  risk: A malicious patch_proposal can pass the new files_touched containment check
    with an in-scope path, then use a unified_diff header such as ../../../escape.txt;
    _apply_unified_diff returns that diff path as the key, and the later os.replace
    loop writes repo_root / rel without a second containment or allowed_files check.
    This leaves CR-1 and CR-2 bypassable for the non-structured unified_diff path.
  recommendation: After deriving new_contents, require its keys to exactly match files_touched
    and resolve every key through resolve_contained(repo_root, rel) plus the same
    allowed_files/forbidden_files scope check before staging or applying.
  patch_not_proposed_reason: No patch proposed because the goal packet declares no
    allowed files, so any patch_proposal files_touched entry would be out of scope.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: patch_stage_and_dry_run validates file_rel against project_root but stages
    relative to a fresh project_root() call
  citation: consensus_mcp/tools/patch_stage_and_dry_run.py:261
  risk: project_root() is lazy and environment-driven. If the process environment
    changes between resolving real_path and computing real_path.relative_to(project_root()),
    the function can error or compute staging paths against a different base than
    the one used for containment. That weakens the fail-closed H-2 fix and can turn
    a valid request into an unhandled exception.
  recommendation: Snapshot project_root().resolve() once at the start of handle()
    and reuse that Path for resolve_contained, relative_to, validator cwd decisions,
    and staged spec relative calculations.
  patch_not_proposed_reason: No patch proposed because the goal packet declares no
    allowed files, so any patch_proposal files_touched entry would be out of scope.
  patch_proposal: null
