findings:
- id: codex-rev-001
  severity: high
  summary: restore --dry-run returns before missing-iteration validation and before
    computing deletions
  citation: consensus_mcp/_snapshot_state.py:401
  risk: A dry run can report success for an iteration that the real restore rejects,
    and it omits files that the real restore will delete during scope cleanup. Operators
    lose the safety signal expected from --dry-run before a destructive restore.
  recommendation: Run the same empty-scope validation for dry runs, compute both copied
    and deleted paths, and report the complete restore plan before returning.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: parent-history import is not byte-for-byte idempotent despite the stated
    idempotency requirement
  citation: consensus_mcp/_import_parent_history.py:101
  risk: Re-importing the same parent with --force rewrites source-manifest.yaml and
    README.md with a new imported_at_utc value, so the target tree changes even when
    the source tree did not. That undermines reproducible provenance and the documented
    idempotency intent.
  recommendation: Make repeated imports deterministic for the same source, or compare
    the existing manifest/source hashes and skip rewriting timestamped files when
    content is unchanged.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The core modules are present, but restore dry-run safety
  semantics and documented import idempotency are not fully satisfied.
