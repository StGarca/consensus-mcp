findings:
- id: codex-rev-001
  severity: critical
  summary: --iteration accepts path traversal and can recursively delete outside the
    requested iteration scope
  citation: consensus_mcp/_snapshot_state.py:357
  risk: An operator typo or malicious value such as ../.. is interpolated into consensus-state/active/{iteration};
    later cleanup calls shutil.rmtree on that derived path. This can expand restore
    scope beyond one iteration and can target the repo root, violating the restore
    scope and main-tree safety requirements.
  recommendation: Validate --iteration as a single safe path component before any
    dirty check or restore work, rejecting separators, drive/absolute paths, and dot
    segments; add regression tests for ../.., ../archive, slash, and backslash inputs.
  patch_not_proposed_reason: No patch proposed because the sealed packet does not
    provide the full review-packet base_sha; recommend applying the validation change
    in the allowed file with focused unit tests.
  patch_proposal: null
- id: codex-rev-002
  severity: high
  summary: restore skips the required safety snapshot for deletion-only dirty state
  citation: consensus_mcp/_snapshot_state.py:471
  risk: _detect_dirty_paths only walks files that currently exist. If a snapshotted
    file was deleted locally and restore runs without --force, dirty is empty, so
    no auto-pre-snapshot is created before restore repopulates the deleted file. That
    loses the current deletion state and breaks the F6a default protection.
  recommendation: Compare the current restore scope against snapshot contents including
    missing paths, or otherwise detect deletions under consensus-state before allowing
    restore to proceed without an auto-pre-snapshot.
  patch_not_proposed_reason: Fix needs careful git-worktree regression coverage for
    deletion-only dirty state and scope-limited restore behavior; not safe to propose
    from the embedded excerpts alone.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The import and snapshot surfaces are mostly present, but
  restore has a critical iteration path traversal issue and misses deletion-only dirty
  state, so the approved safety requirements are not fully met.
