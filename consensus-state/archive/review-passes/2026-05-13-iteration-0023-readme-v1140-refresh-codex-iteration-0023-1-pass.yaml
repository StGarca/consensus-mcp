findings:
- id: codex-rev-001
  severity: blocking
  summary: Quick Start does not document the required `consensus.run_iteration` MCP
    tool name
  citation: README.md:65
  risk: Acceptance gate A2 fails because README.md contains `consensus_run_iteration`
    but not the required `consensus.run_iteration` string, and new users are taught
    to call the Python handler directly instead of the documented MCP tool surface.
  recommendation: Update the Quick Start text to name `consensus.run_iteration` explicitly,
    ideally before the direct Python escape hatch example.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: db72cc1214d2553ffd806c03f45d73978c4f1430994057fd5260bd0931597934
    unified_diff: "--- a/README.md\n+++ b/README.md\n@@ -62,7 +62,7 @@ consensus-init\
      \ --non-interactive --accept-defaults\n # 3. Author a goal packet describing\
      \ what you want done\n #    (per-iteration goal_packet.yaml under consensus-state/active/<iter>/)\n\
      \ \n-# 4. Run an iteration end-to-end via the new MCP tool, or directly:\n+#\
      \ 4. Run an iteration end-to-end via the `consensus.run_iteration` MCP tool,\
      \ or directly:\n python -c \"\n from consensus_mcp.tools.consensus_run_iteration\
      \ import handle\n result = handle(\n"
    files_touched:
    - README.md
    expected_tests:
    - py -3.11 -c "t=open('README.md',encoding='utf-8').read(); assert 'consensus-init'
      in t; assert 'consensus.run_iteration' in t; assert 'propose-converge' in t;
      assert 'gemini' in t.lower(); assert 'snapshot' in t.lower(); assert '1.14.0'
      in t; print('ok')"
    unified_diff_sha256: a1b2ad44f9bb5643815c2a35110943c537aeac5e75bd5b96629e35faae7491ac
goal_satisfied: false
goal_satisfied_rationale: README covers most v1.14.0 updates, but it misses the required
