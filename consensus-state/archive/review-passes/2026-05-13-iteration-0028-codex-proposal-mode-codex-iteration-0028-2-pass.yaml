findings:
- id: codex-rev-001
  severity: blocking
  summary: Gemini proposal mode never loads or uses the new proposal schema
  citation: consensus_mcp/_dispatch_gemini.py:478
  risk: The goal requires proposal_template.md + proposal_schema.json pairs for both
    dispatchers and says mode='proposal' switches the default template + schema names,
    with schema overrides preserved. Gemini only switches the template and still has
    no --schema path, so gemini_proposal_schema.json is dead artifact/provenance,
    and operators cannot override it. The template also promises schema validation
    the dispatcher does not perform.
  recommendation: Add a --schema flag to the Gemini dispatcher, select gemini_proposal_schema.json
    when --mode proposal and gemini_review_schema.json or the embedded review contract
    equivalent when --mode review, hash/log the selected schema, and either validate
    parsed proposal output with it or correct the design so the schema file is not
    claimed as dispatcher-enforced.
  patch_not_proposed_reason: A safe patch requires knowing whether Gemini review mode
    already has or should gain a separate schema artifact, but that file is not embedded.
    The review target only includes the new proposal schemas/templates and dispatcher
    files.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Proposal parsers accept malformed nested proposal shapes that the schemas
    reject
  citation: consensus_mcp/_dispatch_codex.py:676
  risk: Both proposal parsers check only the top-level fields plus a few scalar/list
    types. They do not verify deliverable_scope is an object/null, require its five
    fields, reject extra nested keys, ensure nested arrays contain strings, or ensure
    selected_target is a string/null. As a result, dispatcher post-parse can seal
    proposal payloads that do not actually match codex_proposal_schema.json or gemini_proposal_schema.json
    despite the templates promising strict validation.
  recommendation: Either run jsonschema validation against the selected proposal schema
    after JSON parsing, or add equivalent defense-in-depth checks for selected_target,
    deliverable_scope, nested required fields, nested additionalProperties:false,
    and array item types in both proposal parsers.
  patch_not_proposed_reason: Fix spans both parsers and should preferably reuse the
    schema files, but dependency availability and the intended Gemini schema-loading
    path are not established from the embedded files alone.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The codex side largely implements proposal mode, but the
  Gemini schema pair is not integrated and both proposal parsers can seal outputs
  that violate their advertised schemas.
blocking_objections:
- codex-rev-001
