- id: codex-rev-001
  severity: high
  summary: get_iteration_outcome resolves relative iteration_dir against process cwd
    instead of repo root
  citation: consensus_mcp/tools/consensus_get_iteration_outcome.py:72
  risk: Operators using the installed MCP server with repo-relative iteration paths,
    as the schema advertises, can read the wrong directory or get a false missing-directory
    error whenever the server cwd is not the project root.
  recommendation: Resolve relative iteration_dir paths against the configured project/repo
    root, consistent with consensus.run_iteration path handling, or remove the repo-relative
    contract from the schema.
  patch_not_proposed_reason: Patch not proposed because the embedded scope does not
    include existing server/project-root conventions or tests for get_iteration_outcome
    repo-relative path resolution, so a precise fix could drift from local patterns.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The run tool and engine factory largely satisfy the goal,
  but the outcome inspector advertises repo-relative paths while resolving them against
