findings:
- id: codex-rev-001
  severity: medium
  summary: '`off` enforcement rewrites incomplete convention results to `presence_ok:
    true`, hiding that required thinking was not recorded.'
  citation: consensus_mcp/validators/validate_converged_plan.py:227
  risk: 'With `converged_plan_enforcement: off`, a new plan missing or malformed convention
    blocks is sealed with `convention_gate.presence_ok: true` and no violations. That
    makes disabled enforcement look like a clean structural pass, weakening the recursive-trap
    defense that pass only means presence was recorded.'
  recommendation: Keep hard rejection disabled for `off`, but preserve the real `presence_ok`
    value and violations, or stamp an explicit disabled status so readers cannot confuse
    disabled enforcement with a clean presence/consistency gate.
  patch_not_proposed_reason: null
  patch_proposal: null
