findings:
- id: codex-rev-001
  severity: high
  summary: Codex proposal parser ignores the effective --schema override
  citation: consensus_mcp/_dispatch_codex.py:448 and consensus_mcp/_dispatch_codex.py:692
  risk: '`--schema` only affects the codex CLI invocation; the local proposal parser
    still validates against hard-coded `codex_proposal_schema.json`. A custom proposal
    schema can produce CLI-valid output that the dispatcher rejects, so the explicit
    override contract is not actually preserved.'
  recommendation: Thread the resolved `schema_path` into `_parse_codex_proposal_output()`
    and validate against that path, falling back to the built-in proposal schema only
    when no override is supplied.
  patch_not_proposed_reason: Patch not proposed because the sealed review should stay
    scoped to defect identification; fix is straightforward but needs matching parser
    tests for the override path.
  patch_proposal: null
- id: codex-rev-002
  severity: high
  summary: Gemini dispatcher has no --schema override despite the stated mode/schema
    contract
  citation: consensus_mcp/_dispatch_gemini.py:520 and consensus_mcp/_dispatch_gemini.py:445
  risk: The desired end state says schema overrides still win, but gemini accepts
    only `--prompt-template` and the proposal parser always reads hard-coded `gemini_proposal_schema.json`.
    Operators cannot supply an alternate proposal schema, and template/schema overrides
    can drift apart.
  recommendation: Add a `--schema` flag for gemini proposal validation, normalize
    it like other operator paths, pass the effective schema path into `_parse_gemini_proposal_output()`,
    and record its hash/path in provenance or explicitly revise the CLI contract to
    say gemini has no schema override.
  patch_not_proposed_reason: Patch not proposed because the existing gemini adapter
    intentionally removed schema CLI handling; fixing this needs a deliberate contract
    decision for review-mode gemini as well as proposal mode.
  patch_proposal: null
goal_satisfied: false
