findings:
- id: codex-rev-001
  severity: low
  summary: 'Option B: split spec/state roots is right, but reviewable-file root remains
    unresolved'
  citation: docs/design-consults/multi-project-resolution-v1.13.0.md:17
  risk: The proposal fixes the boot failure and per-project state location, but it
    only defines `_resolve_spec_path()` and `_resolve_state_root()`. The design explicitly
    says current `REPO_ROOT` also controls where reviewable files are referenced from;
    keeping `_resolve_repo_root()` for back-compat while making it non-load-bearing
    for spec/state does not define the new project root used for file review/path
    confinement. In frozen-wheel/no-env mode, any remaining review-path logic tied
    to `REPO_ROOT` can still resolve against site-packages instead of the user's project,
    so the server may boot but fail the core requirement that codex can review the
    project's files.
  recommendation: 'B: Approve the spirit, but add an explicit project/review root
    resolver before landing. Recommended precedence: env override such as `CONSENSUS_MCP_PROJECT_ROOT`
    if present, otherwise `Path.cwd()` for frozen wheel/user-scope use, while keeping
    `CONSENSUS_MCP_REPO_ROOT` only as the legacy self-hosted/shared-state mode where
    that behavior is intentional. Then audit all consumers of `REPO_ROOT` so spec,
    state, package install root, and reviewable-project root are separate concerns.'
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: true
goal_satisfied_rationale: The verdict is supplied as the required single low-severity
  design finding; no blocking objections prevent the maintainer from proceeding with
  the corrected Option B design.
