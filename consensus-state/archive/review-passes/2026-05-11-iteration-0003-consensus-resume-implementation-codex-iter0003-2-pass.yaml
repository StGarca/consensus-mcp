pass_id: codex-iter0003-2-pass1
findings:
- id: codex-rev-001
  severity: medium
  summary: include_streamed_lines is accepted by the public snapshot/tool API but
    never forwarded into in-flight dispatch computation
  citation: consensus_mcp/_resume.py:742
  risk: Callers requesting streamed lines always receive the default compact in_flight_dispatches
    payload, so the resume tool misses its documented diagnostic detail during active
    dispatches.
  recommendation: Pass include_streamed_lines and max_streamed_lines through to _compute_in_flight,
    and keep the existing cap enforcement there.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: dd582aa7b35faf3bda89ae3a8a7a521ca56a5227dfa143b7c158ddd5404b8e1f
    unified_diff: "--- a/consensus_mcp/_resume.py\n+++ b/consensus_mcp/_resume.py\n\
      @@ -738,7 +738,12 @@ def snapshot(\n     # --- recent_activity (rev-002 enum,\
      \ rev-005 tiebreaker) ---\n     recent_activity = _compute_recent_activity(events,\
      \ max_count=10)\n \n     # --- in_flight_dispatches ---\n-    in_flight = _compute_in_flight(events,\
      \ iter_dir)\n+    in_flight = _compute_in_flight(\n+        events,\n+     \
      \   iter_dir,\n+        include_streamed=include_streamed_lines,\n+        max_streamed_lines=max_streamed_lines,\n\
      +    )\n \n     # --- closure cert + iteration-outcome ---\n     closure_cert_path\
      \ = iter_dir / \"closure-certificate.yaml\"\n"
    files_touched:
    - consensus_mcp/_resume.py
    expected_tests:
    - python -m pytest consensus_mcp/tests/test_resume.py -q
    unified_diff_sha256: 9bf5bba17ddbb9c87348c0b0fef6c64c647a54de146c0d7b1457ad89f9b977c8
goal_satisfied: false
goal_satisfied_rationale: The main v2 resume surfaces and the five pass-2 fixes are
  mostly present, but the streamed-lines option exposed by the snapshot and MCP wrapper
  is currently nonfunctional.
