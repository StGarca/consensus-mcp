findings:
- id: codex-rev-001
  severity: medium
  summary: Reviews remain classified as open when the current bundle hash is unknown.
  citation: consensus_mcp/_resume.py:401
  risk: A malformed bundle-mutation event without bundle_sha256/review_target_hash,
    or a missing/unreadable review-packet fallback, leaves current_bundle_sha as None;
    any review carrying a hash then falls through to open. That can make resume suggest
    acting on stale review findings or patch proposals against an unverified bundle
    state.
  recommendation: Treat reviews as invalid or otherwise non-actionable when current_bundle_sha
    cannot be established, and surface a warning when _compute_current_bundle_sha
    returns mutation_event_missing_hash or none.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The tool covers the requested surfaces, but unknown bundle
  provenance can still produce actionable open reviews, so the resume snapshot is
  not safe enough to close as fully satisfying the spec.
