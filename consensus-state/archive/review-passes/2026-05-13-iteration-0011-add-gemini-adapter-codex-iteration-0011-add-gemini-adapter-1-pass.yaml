iteration_id: iteration-0011-add-gemini-adapter
reviewer_id: codex-iteration-0011-add-gemini-adapter-1
pass_id: codex-iteration-0011-add-gemini-adapter-1-pass1
findings:
- id: codex-rev-001
  severity: high
  summary: Prompt write can block before stdout/stderr readers and the watchdog are
    started.
  citation: consensus_mcp/_dispatch_gemini.py:246
  risk: Large goal packets or a Gemini startup path that writes output before draining
    stdin can deadlock the helper before the timeout loop begins, leaving dispatch
    hung with no sealed pass and no watchdog abort.
  recommendation: Start stdout/stderr reader threads before writing stdin, and send
    the prompt through a bounded writer path covered by the same timeout/watchdog
    semantics; add a regression test with a fake process that does not drain stdin
    immediately.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: high
  summary: Local Gemini validation accepts goal_satisfied=true even when blocking
    findings exist.
  citation: consensus_mcp/_dispatch_gemini.py:557
  risk: A malformed Gemini response can include blocking or critical findings, list
    them in blocking_objections, and still be sealed as goal_satisfied=true, corrupting
    quorum semantics instead of triggering the intended validator retry.
  recommendation: After computing expected_blocking, reject goal_satisfied=true when
    that set is non-empty, and add tests for both blocking-findings-with-true and
    blank goal_satisfied_rationale cases.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: The --schema path is hashed for provenance but never embedded in the Gemini
    prompt.
  citation: consensus_mcp/_dispatch_gemini.py:794
  risk: Operators can pass a schema path and see schema_sha256 recorded, but Gemini
    never receives that schema content; custom schema changes silently have no effect
    while provenance implies they mattered.
  recommendation: Load the schema before building the final prompt and include it
    in the prompt text, or remove the --schema prompt-embedding claim and provenance
    field if the static template is the only intended contract.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The adapter is present and wired, but the subprocess path
  can hang before watchdog coverage and the local validator can seal incoherent successful
  reviews; the schema argument is also not actually prompt-visible.
blocking_objections: []
