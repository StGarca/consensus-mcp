    key_design_decisions:
    - Keep implementation local and complete in the current iteration; no follow-up
      deferral because Q1-Q4 gates are concrete and small.
    - 'Add bounded-buffer state to _FakePipeReader: write index, read/drain index,
      buffered byte count, blocked-writer flag, and capacity_bytes defaulting to unbounded
      for existing tests.'
    - Have StreamingFakeCodexPopen.poll() pump due pipe writes before exit checks
      and return None while any pipe is blocked; release_all remains the first override
      so teardown exits fast (release_all behavior verified via consensus_mcp/tests/test_dispatch_codex_streaming.py:181-190
      and poll release path via consensus_mcp/tests/test_dispatch_codex_streaming.py:322-342).
    - Reader consumption removes bytes, pumps the next due payload if capacity frees,
      and calls _SyncClock.notify(); no correctness path depends on _REPOLL or wall-clock
      sleeps.
    - Add private keyword-only _drain_stderr=True to _invoke_codex, mirroring the
      existing private _sleep seam (verified via consensus_mcp/_dispatch_codex.py:282-296,324-335).
      Default behavior still starts and joins the stderr reader exactly as today (verified
      via consensus_mcp/_dispatch_codex.py:427-445,541-548).
    - 'Minimal test scope: update or add one focused backpressure test while leaving
      the other seven streaming tests on default unbounded pipe behavior unless a
      tiny constructor default change is mechanically necessary.'
    - 'Mutant gate: nominal default drain must return output and drain all stdout/stderr;
      injected no-drain case must observe stderr writer_blocked with virtual time
      at/after exit_at, poll unable to exit, then release_all terminates the runner
      without hanging.'
    acceptance_gates:
    - 'Nominal targeted pytest passes: consensus_mcp/tests/test_dispatch_codex_streaming.py::test_stderr_drain_prevents_deadlock
      with bounded stderr capacity, scheduled stderr volume greater than capacity,
      holder[''out''] == ''{"ok": true}'', and stdout/stderr fully consumed.'
    - 'Committed mutant gate passes as a harness proof: calling _invoke_codex with
      _drain_stderr=False reaches proc.stderr.writer_blocked deterministically, does
      not produce successful output, and release_all plus join leaves no live runner
      thread.'
    - 'Temporary production mutant gate fails deterministically: skipping t_stderr.start()
      or forcing _drain_stderr=False for the nominal test makes test_stderr_drain_prevents_deadlock
      fail on blocked backpressure or max_rounds release_all, not hang or timeout.'
    - Full streaming test module passes repeatedly, with at least 10 consecutive targeted
      runs of the backpressure test and 3 consecutive runs of the full consensus_mcp/tests/test_dispatch_codex_streaming.py
      module on the local Windows workspace.
    - converged-plan.yaml records the per-Q design, deadlock-free waker table, mutant-gate
      procedure, and the provisional external-refuting observation; docs/advisories.md
      is updated from 'deferred follow-up' to the implemented version/commit only
      after the implementation commit/tag exists, explicitly naming which artifacts
      contain the fix and which older v1.15.9 artifacts do not.
  risks:
  - Line-atomic buffering is intentionally narrower than kernel byte-stream semantics;
    acceptable only because payload size is kept below capacity and the target failure
    is full-buffer writer blocking, not partial-line reads.
  - Adding a private _drain_stderr seam touches production code shape; risk is bounded
    by default True, no public CLI exposure, and tests proving existing stderr reader
    behavior remains default.
  - A misordered notify could create a harness wedge; release_all-first poll behavior,
    exact condition predicates, and repeated no-hang mutant runs are mandatory gates.
  - Do not claim v1.15.9 is fixed; current verified docs say v1.15.9 contains the
    limitation until addressed, so closure must name the new version plus commit/tag
    and artifact split.
