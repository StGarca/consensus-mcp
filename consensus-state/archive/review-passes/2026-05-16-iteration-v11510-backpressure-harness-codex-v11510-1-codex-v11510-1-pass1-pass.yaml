proposal:
  selected_target: Implement bounded, line-atomic pipe backpressure in the existing
    streaming test fake, plus a private default-on stderr-drain seam and committed
    mutant gate in iteration-v11510-backpressure-harness.
  rationale_vs_alternatives: 'Differential/prior: the valuable proof is not a general
    OS pipe simulator; it is a deterministic reproduction of the one failure mode
    the current harness omits: a writer cannot finish because stderr is not drained.
    Current evidence says v1.15.9 deliberately kept real reader threads but did not
    model backpressure (verified via docs/advisories.md:23-53 and consensus_mcp/tests/test_dispatch_codex_streaming.py:214-262,322-342).
    The better move is a finite byte-capacity buffer inside _FakePipeReader, pumped
    by StreamingFakeCodexPopen.poll(), where poll refuses exit while any pipe is blocked,
    and reader consumption notify-unblocks the writer. This beats a real subprocess/OS-pipe
    integration because that reintroduces scheduler and platform timing risk the goal
    forbids (verified via goal_packet.yaml:44-46). It beats a partial-byte pipe emulator
    because line-atomic payloads are sufficient to prove drain/no-drain behavior while
    avoiding a broader process simulator explicitly out of scope (verified via goal_packet.yaml:87-90).
    It beats only strengthening _idx assertions because docs/advisories.md:44-53 names
    true backpressure modeling plus release_all plus mutant gate as the deferred follow-up.
    Root-cause mechanism note: the real OS claim is provisional from these artifacts;
    the pre-specified external refuting observation would be a target Windows CI subprocess
    writing more than the pipe capacity to stderr with no reader, yet exiting and
    joining normally before stderr is consumed.'
