findings:
- id: codex-rev-001
  severity: medium
  summary: state.update_decision_ledger still references removed LEDGER_PATH inside
    module code
  citation: consensus_mcp/tools/state_update_decision_ledger.py:390
  risk: PEP 562 __getattr__ does not resolve unqualified globals inside the same module.
    If the ledger path is outside project_root, the fallback branch raises NameError
    after the ledger write path, and the migration requirement that old in-module
    constants be replaced is not met.
  recommendation: Replace the fallback with _ledger_path() and update the stale comment,
    then rerun the full suite plus the migration checks.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: 99e560661cf0012965d2f8592945dbbed84658fa97afe9afd456003ece9704d8
    unified_diff: "--- a/consensus_mcp/tools/state_update_decision_ledger.py\n+++\
      \ b/consensus_mcp/tools/state_update_decision_ledger.py\n@@ -385,10 +385,10\
      \ @@ def handle(\n     try:\n         ledger_rel = str(_ledger_path().relative_to(project_root()))\n\
      \     except ValueError:\n-        # LEDGER_PATH may be monkeypatched outside\
      \ REPO_ROOT in tests; fall back\n-        # to the absolute string. Production\
      \ callers always have LEDGER_PATH inside.\n-        ledger_rel = str(LEDGER_PATH)\n\
      +        # state_root may resolve outside project_root in tests or operator\n\
      +        # configuration; fall back to the absolute path string.\n+        ledger_rel\
      \ = str(_ledger_path())\n \n     return {\n         \"written\": True,\n"
    files_touched:
    - consensus_mcp/tools/state_update_decision_ledger.py
    expected_tests:
    - py -3.11 -m pytest consensus_mcp/tests -q
    - py -3.11 -c "from consensus_mcp.tools import state_update_decision_ledger as
      m; assert m.LEDGER_PATH is not None; print('ok')"
    unified_diff_sha256: cac01ca3ed3ef1a5685adb73bbc8989eead6672cd53c574eb51b83d928a7b4d6
