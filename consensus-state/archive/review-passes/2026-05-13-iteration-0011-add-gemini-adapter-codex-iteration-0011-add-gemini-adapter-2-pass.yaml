findings:
- id: codex-rev-001
  severity: high
  summary: Malformed MCP input can terminate the server through uncaught SystemExit
  citation: consensus_mcp/tools/reviewer_dispatch_gemini.py:143; consensus_mcp/server.py:208
  risk: The wrapper invokes argparse-backed _dispatch_gemini.main() in-process and
    catches Exception only. If a client passes a bad value such as timeout_seconds="bad",
    argparse raises SystemExit, which also escapes the server's Exception handler
    and can kill the stdio MCP server instead of returning an ok=false tool result.
  recommendation: Validate wrapper inputs before building argv, or catch SystemExit
    around _dispatch_gemini.main() and convert it into a structured ok=false response.
    Add a regression test for invalid timeout_seconds through reviewer_dispatch_gemini.handle().
  patch_not_proposed_reason: Review-only pass; patch proposal deferred by goal packet.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Gemini validator accepts empty rationale despite the stated non-empty contract
  citation: consensus_mcp/_dispatch_gemini.py:534; consensus_mcp/dispatch_templates/gemini_review_schema.json:27
  risk: A Gemini response with goal_satisfied_rationale="" passes local parsing and
    would not trigger the validator retry, even though the prompt marks that field
    as required and non-empty. This weakens the sealed review contract and can produce
    low-information accepted packets.
  recommendation: 'Reject blank or whitespace-only goal_satisfied_rationale in _parse_gemini_output
    and add minLength: 1 to gemini_review_schema.json. Cover the rejection with a
    parser unit test.'
  patch_not_proposed_reason: Review-only pass; patch proposal deferred by goal packet.
  patch_proposal: null
- id: codex-rev-003
  severity: low
  summary: Usage text still advertises the removed --schema flag
  citation: consensus_mcp/_dispatch_gemini.py:20
  risk: Operators following the module usage banner can pass --schema even though
    argparse no longer accepts it, causing an avoidable CLI failure and contradicting
    the no-schema-flag design.
  recommendation: Remove the --schema line from the usage docstring and state that
    the schema reference is embedded in gemini_review_template.md.
  patch_not_proposed_reason: Review-only pass; patch proposal deferred by goal packet.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The Gemini adapter is mostly present, but the MCP wrapper
  has an availability bug on malformed input and the local JSON validator is weaker
  than the stated review contract.
