findings:
- id: codex-rev-001
  severity: high
  summary: Idempotent re-seal is still wall-clock dependent because a fresh sealed_at_utc
    is stamped before hashing.
  citation: consensus_mcp/tools/review_write_and_seal.py:297
  risk: A retry of the same pre-seal packet after the UTC second changes computes
    a different packet_sha256 and returns index_collision instead of the promised
    idempotent success, making the new idempotency path timing-sensitive and the test
    flaky.
  recommendation: When an index entry for pass_id already exists, compute the idempotent
    candidate using the existing sealed_at_utc when the caller did not provide one,
    or otherwise define and test idempotency only for callers that resubmit the already
    sealed packet.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Integrity guard can crash on tampered archives that parse as valid non-mapping
    YAML.
  citation: consensus_mcp/tools/review_write_and_seal.py:383
  risk: If the recorded archive is replaced with valid YAML such as a list or scalar,
    yaml.safe_load succeeds but .pop('packet_sha256', None) raises, so the tool fails
    with an unstructured exception instead of idempotent_target_integrity_mismatch
    or idempotent_target_unreadable.
  recommendation: Only remove packet_sha256 when the parsed archive is a dict; hash
    any other parsed YAML value as-is so it returns the structured integrity mismatch.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: Pass-label-only packets do not preserve the raw pass_id in the sealed packet
    body.
  citation: consensus_mcp/tools/review_write_and_seal.py:281
  risk: The implementation allows packets with pass_label but no pass_id, then seals
    them without adding the pass_id parameter, so those artifacts violate the stated
    contract that raw pass_id is preserved in both index and packet body.
  recommendation: After validating any explicit packet.pass_id matches the parameter,
    stamp packet['pass_id'] = pass_id when it is absent before computing packet_sha256.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The main filename collision path is fixed, but the implementation
  still misses stated idempotency, integrity-error, and raw-pass-id body contracts
  in edge cases.
