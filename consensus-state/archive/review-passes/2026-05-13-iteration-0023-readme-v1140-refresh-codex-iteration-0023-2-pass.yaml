findings:
- id: codex-rev-001
  severity: medium
  summary: README still frames convergence as requiring exactly two model families
    instead of the configured N-contributor rule.
  citation: README.md:253
  risk: New users can come away with the old two-AI closure model even though v1.14.0
    documents an N-contributor pool and configurable strict-majority/unanimous/advisory
    rules elsewhere.
  recommendation: Replace the final tiebreaker sentence with wording based on the
    configured convergence rule and cross-family contributors, not exactly two model
    families.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: c54a6b13a23ab8c645418598ffa09af72984b59fcb2678412ca049a8ba25c805
    unified_diff: "--- a/README.md\n+++ b/README.md\n@@ -250,4 +250,4 @@ MIT \u2014\
      \ see [LICENSE](LICENSE).\n \n The project is self-hosted: consensus-mcp uses\
      \ itself for its own review process. Pull requests go through the four-step\
      \ cycle. If you contribute, expect cross-AI review feedback on your change.\n\
      \ \n-When in doubt about a finding, the closure invariant is the tiebreaker:\
      \ did two different model families agree on the same code state? If yes, the\
      \ change can land. If no, the iteration stays open until they agree.\n+When\
      \ in doubt about a finding, the closure invariant is the tiebreaker: did the\
      \ configured convergence rule pass on the same code state with cross-family\
      \ contributors? If yes, the change can land. If no, the iteration stays open\
      \ until the configured rule is satisfied.\n"
    files_touched:
    - README.md
    expected_tests:
    - py -3.11 -c "t=open('README.md',encoding='utf-8').read(); assert 'Two AI agents'
      not in t; assert '_visibility_tui' not in t; assert '420+ regression tests'
      not in t; assert '**1.12.0**' not in t; print('ok')"
    - py -3.11 -c "t=open('README.md',encoding='utf-8').read(); assert 'consensus-init'
      in t; assert 'consensus.run_iteration' in t; assert 'propose-converge' in t;
      assert 'gemini' in t.lower(); assert 'snapshot' in t.lower(); assert '1.14.0'
      in t; print('ok')"
    unified_diff_sha256: 6a21b8031c4baed165ca517e5b2147d1f01344ee3db1a02fa2a834f61543f2e4
