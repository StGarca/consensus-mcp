proposal:
  selected_target: A dedicated Claude Code command/skill that acts as a thin wrapper
    around the `consensus-init` shell binary.
  rationale_vs_alternatives: 'The core problem is a discoverability gap for users
    whose first interaction is inside the Claude Code UI. The natural user behavior
    is to type `consensus init` into the chat. Simply documenting that they must exit
    the UI and use a terminal (`!` command) works against this natural mental model.


    A dedicated command/skill meets the user where they are. It directly intercepts
    the user''s intent, provides helpful feedback, and orchestrates the one-time bootstrap
    process. This is superior to alternatives like NLP intent detection, which can
    be brittle, or expecting the user to read documentation first. It solves the chicken-and-egg
    problem by providing a UI-native entry point that can execute the necessary external
    command to bring the full system online, creating a near-zero-friction onboarding
    experience.'
  deliverable_scope:
    next_iteration_id: iter-0040-claude-bootstrap-skill-impl
    files_in_scope:
    - claude_extension/src/bootstrap.ts (new file to contain the wrapper command logic)
    - claude_extension/package.json (to register the `consensus init` command and
      activation event)
    - claude_extension/src/extension.ts (to register the bootstrap command on activation)
    files_out_of_scope:
    - consensus_mcp/* (the core python logic is invoked, not modified)
    - pyproject.toml
    key_design_decisions:
    - The command will be registered as `consensus init` within the Claude Code extension.
    - The command's logic will first check for the existence of `.mcp.json` in the
      workspace root.
    - If `.mcp.json` is absent, the command will execute the `consensus-init` binary
      in the system's shell, capturing stdout/stderr.
    - Upon successful execution, the user will be notified and prompted to reload
      the Claude Code window to activate the now-initialized MCP server.
    - If `.mcp.json` is present, the command will inform the user that the project
      is already initialized.
    - Error handling must gracefully manage cases where `consensus-init` is not on
      the user's PATH or fails for other reasons.
    acceptance_gates:
    - In a new project without `.mcp.json`, typing `consensus init` in the Claude
      Code chat triggers the bootstrap command.
    - The command successfully creates the `.mcp.json` file.
    - The user is presented with a success message and a prompt to reload.
    - In a project where `.mcp.json` exists, the command returns a message indicating
      the project is already initialized.
    - If the `consensus-init` shell command fails, a helpful error message is displayed
      to the user.
  risks:
  - The implementation depends on the specifics of the Claude Code extension API for
    executing shell commands and prompting the user, which may have unknown constraints.
  - Path and environment variable differences across user machines could make reliably
    finding and executing the `consensus-init` binary challenging. The wrapper must
    have robust error handling for this.
  estimated_complexity: small
  structural_abstention: false
