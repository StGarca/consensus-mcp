findings:
- id: codex-rev-001
  severity: high
  summary: Restore reports success without clearing a scope that is absent from the
    snapshot
  citation: consensus_mcp/_snapshot_state.py:401
  risk: If the selected snapshot contains no files for the requested scope, restore
    returns zero files and leaves the current consensus-state subtree in place, producing
    a stale hybrid state instead of matching the snapshot.
  recommendation: Clean the requested restore scope before the empty-path early return,
    or raise an explicit error for a missing iteration while still allowing full restores
    to remove an absent consensus-state tree.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Restore can auto-snapshot dirty state before confirming the requested tag
    exists
  citation: consensus_mcp/_snapshot_state.py:603
  risk: A typo or nonexistent tag can create an unnecessary pre-restore snapshot,
    then fail later with tag-not-found, polluting snapshot history and giving misleading
    operator feedback.
  recommendation: Verify args.tag exists immediately after argument validation and
    before dirty detection or auto-pre-snapshot work.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The proposed files implement most of the requested snapshot/import
  surface, but restore has correctness gaps that can leave stale state or create safety
  snapshots for invalid tags.
