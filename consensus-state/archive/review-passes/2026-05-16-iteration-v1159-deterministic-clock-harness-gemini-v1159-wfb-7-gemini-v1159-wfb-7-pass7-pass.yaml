goal_satisfied_rationale: The proposed changes successfully replace the timing-fragile
  test harness with a deterministic, `threading.Condition`-based clock (`_SyncClock`).
  This directly addresses the root cause of the Windows CI flakes described in the
  goal by eliminating real `time.sleep` calls in the test driver. The new harness
  preserves and improves coverage for all abort scenarios (heartbeat silence, operator
  signal, wall-time), and the `@_FLAKY_WINDOWS_CI` skip can now be removed. The implementation
  is robust and includes safeguards against deadlocks, fully satisfying the requirements.
