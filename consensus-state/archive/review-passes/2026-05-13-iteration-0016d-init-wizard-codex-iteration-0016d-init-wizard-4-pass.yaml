findings:
- id: codex-rev-001
  severity: medium
  summary: Malformed-marker .gitignore updates are not idempotent after the first
    repair append.
  citation: consensus_mcp/_init_wizard.py:363
  risk: If a repo has an orphan/reversed/nested consensus marker, each subsequent
    `consensus init` run preserves the previous appended clean block and appends another
    one, so `.gitignore` accumulates duplicate managed sections despite the idempotency
    requirement.
  recommendation: When marker ordering is malformed, preserve foreign/orphan content
    but still detect and remove any exact previously appended consensus managed block
    before appending the fresh block; add a rerun test for malformed and reversed
    marker cases.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Existing-config refusal happens after config construction and validation.
  citation: consensus_mcp/_init_wizard.py:405
  risk: With an existing config and no `--reconfigure`/`--force`, invalid new flags
    can return exit 3 and interactive input can return exit 1 before the mandated
    exit 4 guard runs.
  recommendation: Move the existing-config guard before `build_config_from_flags()`
    for normal init/dry-run paths, after `--check` and `--print-defaults` handling.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The init wizard covers most requested behavior, but the
  .gitignore malformed-marker path violates idempotency and the existing-config guard
  does not reliably enforce the exit-4 contract.
