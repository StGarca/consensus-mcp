findings:
- id: gemini-rev-001
  severity: blocking
  summary: The test isolation fix is incomplete; several tests that call `main()`
    are missing the required call to the new `_isolate_archive_root` helper.
  citation: consensus_mcp/tests/test_dispatch_codex.py:1016
  risk: The test suite will remain flaky. Tests that run after the unmodified tests
    will fail due to state pollution in the real `consensus-state` directory, which
    is the exact bug this change was intended to fix. The acceptance gates will not
    pass reliably.
  recommendation: 'Apply the `_isolate_archive_root(tmp_path, monkeypatch)` call to
    all tests that invoke `_dispatch_codex.main()` to ensure their log outputs are
    correctly redirected to the temporary test directory. The following tests (and
    likely others) are missing the call: `test_main_smoke_flag_without_env_refuses`,
    `test_dispatch_failed_includes_computed_provenance_when_codex_fails`, `test_dispatch_failed_carries_review_target_fields_when_target_was_read`,
    `test_outside_repo_review_target_via_main_emits_structured_failure`, and `test_mkdir_oserror_during_preflight_emits_structured_failure`.'
  patch_proposal: null
  patch_not_proposed_reason: null
goal_satisfied: false
goal_satisfied_rationale: The change correctly implements the `_isolate_archive_root`
  helper to patch module-level constants, but it fails to apply this helper to all
  necessary tests. Because several tests that write log files are left unmodified,
  the root cause of the test pollution is not fully addressed, and the goal is not
  met.
