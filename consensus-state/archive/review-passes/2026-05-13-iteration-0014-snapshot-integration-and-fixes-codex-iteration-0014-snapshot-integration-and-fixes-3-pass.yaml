findings:
- id: codex-rev-001
  severity: blocking
  summary: Clean force re-import still rewrites targets that contain iteration files,
    so imported_at_utc can drift
  citation: consensus_mcp/_import_parent_history.py:213
  risk: The idempotency check records each expected iteration as a directory-level
    hash, but also adds every nested iteration file to actual_inventory. A clean import
    target therefore has extra actual_inventory entries and fails the no-op condition,
    causing --force re-imports to rewrite source-manifest.yaml and README.md instead
    of preserving the original timestamp.
  recommendation: When a file is covered by an expected directory entry, add only
    that parent entry to actual_inventory; add the raw file path only when it is not
    covered by an expected subtree.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: caf148c42d6a3579d93031c7f36182acaf4d8c39cbb624b9cd1ca0f20596752f
    unified_diff: "--- a/consensus_mcp/_import_parent_history.py\n+++ b/consensus_mcp/_import_parent_history.py\n\
      @@ -208,15 +208,18 @@ def import_history(\n                     if rel in expected_inventory:\n\
      \                         actual_inventory.add(rel)\n                     continue\n\
      \                 # Regular files: README + manifest at root, archive pass files.\n\
      \                 rel = str(f.relative_to(target_root.parent))\n-          \
      \      actual_inventory.add(rel)\n                 # Also recognize iteration-dir-rooted\
      \ files as part of their\n                 # parent iteration entry.\n+    \
      \            covered_by_expected_entry = False\n                 for expected\
      \ in expected_inventory:\n                     if rel.startswith(expected +\
      \ os.sep) or rel.startswith(expected + \"/\"):\n                         actual_inventory.add(expected)\n\
      +                        covered_by_expected_entry = True\n                \
      \         break\n+                if not covered_by_expected_entry:\n+     \
      \               actual_inventory.add(rel)\n \n             if (\n          \
      \       existing_hashes\n"
    files_touched:
    - consensus_mcp/_import_parent_history.py
    expected_tests:
    - py -3.11 -m pytest consensus_mcp/tests/test_import_parent_history.py::test_idempotent_skip_preserves_imported_at_utc_when_clean
      -q
    unified_diff_sha256: 96b88c0b9f0464360ac65a3b6efded0197c1c4ebe310257c827e7856bc02c504
goal_satisfied: false
goal_satisfied_rationale: The snapshot/restore/diff integration surface is present,
  but the import idempotency requirement is not met because clean targets with iteration
  files do not take the no-op path.
blocking_objections:
- codex-rev-001
