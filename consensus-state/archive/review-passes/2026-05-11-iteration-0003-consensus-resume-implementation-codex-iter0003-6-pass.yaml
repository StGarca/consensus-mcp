findings:
- id: codex-rev-001
  severity: medium
  summary: Explicit iteration_id can escape consensus-state/active
  citation: consensus_mcp/_resume.py:737
  risk: The MCP input is documented as an iteration directory name, but the code joins
    it directly with active/. A caller can supply path separators or an absolute path
    and make the read-only snapshot inspect YAML files outside the active iteration
    area, leaking unrelated operating context and violating the resume tool's scope
    boundary.
  recommendation: Reject absolute paths, separators, and parent traversal in iteration_id;
    resolve the candidate path and require it to remain under consensus-state/active
    before reading any files.
  patch_not_proposed_reason: Patch not proposed because the sealed review packet did
    not embed the surrounding path-validation patterns or registry tests needed to
    choose the repo-consistent error behavior.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The pass-2 functional requirements are mostly implemented,
  but explicit iteration selection lacks path confinement, so the tool does not fully
  meet the read-only scoped snapshot contract.
