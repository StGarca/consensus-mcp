    set from `ConvergenceOutcome` with no place for human judgment blocks (verified
    via #3), and the required block names have zero code occurrences today (verified
    via #4). Differential/prior: key-presence validation would converge on the same
    green-means-correct trap v1.15.0 warns against. Better value delta: make the convention
    blocks enter the pipeline as explicit human-authored convergence input, then have
    the engine validate and persist them at the only point that can prevent a bad
    final artifact from being sealed. External refuting observation: if implementation
