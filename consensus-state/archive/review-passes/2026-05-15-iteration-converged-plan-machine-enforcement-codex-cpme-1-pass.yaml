  deliverable_scope:
    next_iteration_id: iteration-converged-plan-convention-enforcement
    files_in_scope:
    - consensus_mcp/workflow_engine.py
    - existing module defining ConvergenceOutcome, after locating it in-tree
    - consensus_mcp/validators/converged_plan_convention.py
    - module defining `consensus_get_iteration_outcome`, only after locating it in-tree
    - tests/test_converged_plan_convention.py
    - tests/test_workflow_engine_converged_plan.py
    - docs/workflows/converged-plan-convention.md
    files_out_of_scope:
    - consensus_mcp/validators/consensus_gate.py
    - consensus_mcp/schemas/* as primary enforcement
    - packaging, release, PyPI, npm, installer, or distribution changes unless project
      files independently verify that channel
    - immutable v1.15.0 tag artifact changes
    key_design_decisions:
    - Add a typed `ConvergedPlanConvention` object with required `falsification`,
      `independent_safeguard`, and `decisive_experiment_before_next_iteration` blocks.
    - Convention blocks enter before sealing as explicit human-authored input; `_seal_converged_plan`
      assembles the final artifact and fails closed for new Workflow A convergences
      when blocks are missing or invalid.
    - 'Validator checks semantic shape, not only keys: stated differential/prior,
      named code-or-external refuting observation, independent safeguard not identical
      to the validator, and a decisive experiment executable before the next iteration.'
    - Persist convention blocks into generated `converged-plan.yaml` with `empirical_status`,
      default `proposed` unless evidence justifies another status.
    - 'Keep old outcome reading backward-compatible: legacy plans without blocks load,
      but are marked doctrine-only or unenforced, not silently valid.'
    - 'Docs must state exact artifact truth: v1.15.0 tag `4e81f9e` contains doctrine
      only; enforcement exists only in the new development artifact or later verified
      version/tag.'
    acceptance_gates:
    - Workflow A convergence without convention blocks fails before writing `converged-plan.yaml`.
    - Placeholder or empty convention text fails validation.
    - Valid fixture with differential/prior, refuting observation, independent safeguard,
      and decisive experiment seals successfully and persists all blocks.
    - Regression test proves `consensus_mcp/validators/consensus_gate.py` is not used
      for this enforcement path.
    - Existing old `converged-plan.yaml` fixtures still load through `consensus_get_iteration_outcome`
      without crash and are reported as legacy/unenforced.
    - Docs name the enforcement entry point and distinguish v1.15.0 doctrine-only
      tag `4e81f9e` from the new enforcement artifact.
  risks:
