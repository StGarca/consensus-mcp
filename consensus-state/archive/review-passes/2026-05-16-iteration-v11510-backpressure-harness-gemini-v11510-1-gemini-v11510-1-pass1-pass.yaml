goal_satisfied_rationale: The proposed design directly implements the mandatory converged
  design seed from the v1.15.9 scope consult. It models backpressure by introducing
  a finite-capacity buffer into `_FakePipeReader` and making `StreamingFakeCodexPopen.poll()`
  aware of a "blocked writer" state. This mechanism integrates cleanly with the existing
  `_SyncClock`'s `threading.Condition`, ensuring the harness remains deterministic
  and deadlock-free, as required. An alternative of using real OS pipes is explicitly
  non-negotiable as it would reintroduce the platform-specific flakiness the v1.15.9
  rewrite eliminated. This approach is superior because it simulates the specific
  deadlock condition (a blocked writer on a full pipe) within the confines of the
  virtual clock, providing deterministic and fast-failing test coverage for the exact
  failure mode described in the goal, without external dependencies or race conditions.
