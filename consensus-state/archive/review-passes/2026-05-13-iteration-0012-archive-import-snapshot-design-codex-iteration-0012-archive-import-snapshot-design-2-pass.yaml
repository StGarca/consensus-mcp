  citation: docs/design-consults/iter-0012-archive-import-and-snapshot.md:103
  risk: Namespace isolation plus the manifest gives the import durable provenance
    without rewriting parent history. One tagged orphan-branch commit per snapshot
    keeps restore semantics simple while still relying on git storage to deduplicate.
    The full CLI surface is worth including now because list and diff are needed to
    operate the snapshot branch safely. Restore remains the highest-risk path, and
    auto-pre-snapshot with explicit force and abort-on-dirty modes gives a scriptable
    safety net without interactive prompts.
  recommendation: 'Q1: F1a; Q2: namespace-isolation; Q3: F3a; Q4: F4a; Q5: F5a; Q6:
