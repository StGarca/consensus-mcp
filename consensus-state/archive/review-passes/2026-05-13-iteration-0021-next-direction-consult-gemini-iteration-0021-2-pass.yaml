goal_satisfied_rationale: "Proposal for iter-0022: Wire `workflow_engine` to MCP toolset.\n\
  \n1.  **Target**: (a) **MCP wiring of `workflow_engine` + contributors**.\n\n2.\
  \  **Justification**: This is the highest-value next step. The `workflow_engine`\
  \ (iter-0016c) and contributor adapters (iter-0016b) represent a significant, recently\
  \ completed investment. However, they are currently inaccessible to operators through\
  \ the standard MCP server interface. This iteration makes that investment useful\
  \ by exposing the engine's power through the command line, completing the feature\
  \ arc and delivering a major new capability. The lazy `REPO_ROOT` refactor (b) is\
  \ important but a high-risk internal change, while audit cleanup (c) and documentation\
  \ (d) are lower-priority tasks that can follow.\n\n3.  **Implementation Approach**:\n\
  \    *   **Files Touched**:\n        *   `consensus_mcp/tools/consensus_run_iteration.py`\
  \ (new): Main tool to drive the workflow.\n        *   `consensus_mcp/tools/consensus_get_iteration_outcome.py`\
  \ (new): Read-only tool to fetch results.\n        *   `consensus_mcp/tool_registry.py`:\
  \ Register the new tools.\n        *   `consensus_mcp/tests/test_workflow_engine_wiring.py`\
  \ (new): Integration tests.\n    *   **Key Design Decisions**:\n        *   `consensus_run_iteration`\
  \ will be the primary entry point. It will identify the target `iteration_dir` from\
  \ an argument.\n        *   It will load contributor configurations from `.consensus/config.yaml`\
  \ to dynamically build the adapters for the `WorkflowEngine`.\n        *   The engine's\
  \ output (convergence status, findings, etc.) will be written to a structured `engine-outcome.json`\
  \ file in the iteration directory.\n    *   **Validators/Tests**:\n        *   Unit\
  \ tests for new tools.\n        *   An end-to-end integration test simulating a\
  \ `propose-converge` workflow driven entirely by the new MCP tool.\n\n4.  **Smallest\
  \ Deliverable Scope**:\n    *   **Iteration ID**: iter-0022\n    *   **Summary**:\
  \ Implement and wire `consensus_run_iteration` tool to drive the `WorkflowEngine`\
  \ for a single, operator-invoked consensus round.\n    *   **Deliverable**: A functional\
  \ `consensus_run_iteration` tool that can execute a `propose-converge` iteration\
  \ based on a `goal_packet.yaml` and a `.consensus/config.yaml`, writing the outcome\
  \ to disk.\n    *   **Acceptance Gate**: An integration test successfully runs a\
  \ full `propose-converge` workflow via the new tool and validates the contents of\
  \ the final `engine-outcome.json`."
