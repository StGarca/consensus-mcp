goal_satisfied_rationale: 'Differential/prior: v1.15.9 scope is regression restoration,
  not new coverage expansion: make the existing streaming/heartbeat/abort harness
  deterministic everywhere, delete the v1.15.8 Windows CI skip, and preserve the coverage
  those tests actually had. Verified via supplied baseline fact: `git show da62d54^:...test_dispatch_codex_streaming.py`
  had the same stderr test shape, with virtual-time `exit_at=0.3` and only thread-completion/output
  assertions. Therefore codex-v1159-wfb-6 is a real latent coverage gap, but not a
  v1.15.9 regression and not a valid blocker for this iteration. Blocking v1.15.9
  to build fake pipe-capacity/backpressure semantics has worse value because codex''s
  own note says that needs focused Windows CI determinism validation. Ignoring the
  finding is also worse because current comments can overclaim what the fake proves.
  Best move: complete the current iteration by narrowing the stated contract, then
  optionally open a focused follow-on. Convergence prior: this answer follows from
  baseline/current scope equivalence; if others use the same prior, agreement is not
  independent proof. Provisional external claim: backpressure modeling may reintroduce
  Windows flake/deadlock risk; refuting observation would be a Windows CI run, verified
  as relevant by the embedded v1.15.9 docstring''s Windows runner/skip context, where
  a candidate harness repeatedly passes normally, fails a mutant that removes stderr
  draining, and never hangs/timeouts.'
