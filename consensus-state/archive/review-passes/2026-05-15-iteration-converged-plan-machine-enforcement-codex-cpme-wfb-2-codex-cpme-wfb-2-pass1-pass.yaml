findings:
- id: codex-rev-001
  severity: blocking
  summary: Engine bypasses the mandated provenance-by-citation requirement on missing
    convention input
  citation: consensus_mcp/workflow_engine.py:480
  risk: A new non-safety Workflow A convergence with no convention-input.yaml still
    seals a v1.15.1 converged-plan.yaml under graduated enforcement, but the plan
    contains no convention block and no cited_pass_ids. That violates the acceptance
    gate that convention blocks are persisted into the sealed plan with required cited_pass_ids
    and lets new convergences close without any contributor-pass provenance for the
    convention judgement.
  recommendation: For v1.15.1 engine-sealed plans, require a conforming convention
    object with non-empty cited_pass_ids before sealing, or otherwise do not claim
    the v1.15.0 named blocker is closed under the default graduated mode. If graduated
    mode intentionally allows sealing incomplete plans, it must still persist an explicit
    convention/provenance object or downgrade the release claim.
  patch_not_proposed_reason: Allowed files is empty for this review packet; proposing
    a patch would be outside scope.
  patch_proposal: null
- id: codex-rev-002
  severity: high
  summary: Invalid present convention schema version is silently stamped as current
    at seal time
  citation: consensus_mcp/workflow_engine.py:510
  risk: 'validate_convention correctly records a schema-version violation for missing
    or foreign versions, but _seal_converged_plan then writes convention_schema_version:
    1 whenever the convention omits the key. Under the default graduated mode this
    produces a sealed plan whose top-level version appears current while convention_violations
    only warn, obscuring malformed/future convention input and contradicting the stated
    ''not defaulted, not grandfathered'' fix.'
  recommendation: When convention input is present, stamp the top-level convention_schema_version
    from the validator/input without fallback, or omit it on invalid input; do not
    rewrite malformed present conventions to the current version unless the plan hard-rejects.
  patch_not_proposed_reason: Allowed files is empty for this review packet; proposing
    a patch would be outside scope.
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: README omits the new Workflow C and enforcement config choices from the
    operator configuration table
  citation: README.md:124
  risk: The quick-start and status text advertise v1.15.1 enforcement, but the '9
    operator-configurable dimensions' table still lists workflow.mode as only post-review/propose-converge/advisory
    and omits convergence.converged_plan_enforcement. Operators reading the main configuration
    reference will not discover the autonomous-execute mode or the off|warn|graduated|strict
    gate knob.
  recommendation: Update the README configuration table and count to include Workflow
    C and converged_plan_enforcement, or link the table explicitly to a newer complete
    schema reference.
  patch_not_proposed_reason: Allowed files is empty for this review packet; proposing
    a patch would be outside scope.
  patch_proposal: null
