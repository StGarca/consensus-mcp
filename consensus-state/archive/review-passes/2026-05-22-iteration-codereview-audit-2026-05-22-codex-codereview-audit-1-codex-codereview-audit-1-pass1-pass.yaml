findings:
- id: codex-rev-001
  severity: high
  summary: 'CR-4 is too narrow: missing, null, non-list, or all-invalid allowed_files
    also become allow-all, not only allowed_files: [].'
  citation: consensus_mcp/validators/scope_check.py:379
  risk: A fix aimed only at explicit empty lists can leave malformed or absent scope
    declarations failing open for every touched file.
  recommendation: Revise the finding and fix to require a non-empty list of valid
    string patterns before scope matching; fail closed otherwise.
  patch_not_proposed_reason: No files are in allowed_files for this sealed review,
    so a source patch would be outside scope.
  patch_proposal: null
- id: codex-rev-002
  severity: high
  summary: 'H-2 understates the traversal mode: unresolved relative .. paths may not
    raise ValueError and can escape the staging directory path construction.'
  citation: consensus_mcp/tools/patch_stage_and_dry_run.py:259
  risk: Remediation focused only on catching relative_to() ValueError can miss the
    more dangerous relative traversal case, where staging writes are built from '../'
    relpaths.
  recommendation: Require resolved project-root containment before any read, patch
    map insert, relative_to(), or staging destination write.
  patch_not_proposed_reason: No files are in allowed_files for this sealed review,
    so a source patch would be outside scope.
  patch_proposal: null
- id: codex-rev-003
  severity: high
  summary: 'Claude missed an apply_codex_patch trust-boundary bug: iteration_dir is
    accepted directly, so authorization can be read from a caller-selected directory.'
  citation: consensus_mcp/tools/apply_codex_patch.py:162
  risk: With the env interlock enabled, a caller can point T6 at a non-canonical directory
    containing its own goal_packet, codex-review, and verification files, bypassing
    the intended active-iteration provenance boundary.
  recommendation: Resolve iteration_dir and require it to be under the canonical active
    iterations root before reading authorization or patch artifacts.
  patch_not_proposed_reason: No files are in allowed_files for this sealed review,
    so a source patch would be outside scope.
  patch_proposal: null
- id: codex-rev-004
  severity: medium
  summary: 'M-6 is correctly identified but under-ranked: patch.stage_and_dry_run''s
    public gate_decision can approve critical findings.'
  citation: consensus_mcp/tools/patch_stage_and_dry_run.py:329
  risk: Because gate_decision is part of the tool contract, downstream callers may
    rely on APPROVED even when dry_run_findings contains critical issues.
  recommendation: Promote the review item to HIGH or explicitly scope it as safe only
    for current T5/T6 callers, and include critical in the gate severity set.
  patch_not_proposed_reason: No files are in allowed_files for this sealed review,
    so a source patch would be outside scope.
  patch_proposal: null
