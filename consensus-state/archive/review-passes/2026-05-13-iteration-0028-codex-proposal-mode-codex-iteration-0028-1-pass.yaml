findings:
- id: codex-rev-001
  severity: blocking
  summary: Codex proposal mode selects the proposal schema but still parses output
    with the review-only validator.
  citation: consensus_mcp/_dispatch_codex.py:720
  risk: A real `--mode proposal` run will ask Codex to emit `selected_target`/`deliverable_scope`
    JSON, then `_parse_codex_output` rejects it as unexpected top-level keys and missing
    `findings`; the new mode cannot produce a sealed proposal.
  recommendation: Add a proposal-output parser for `codex_proposal_schema.json` shape
    and route `ns.mode == "proposal"` through it before sealing, or otherwise adapt
    sealing to accept proposal packets.
  patch_not_proposed_reason: A correct patch likely needs changes to the sealed-packet
    contract in `_dispatch_base.py`, which is not embedded or in scope; proposing
    only local parser changes would risk producing packets `_build_sealed_packet`
    cannot seal.
  patch_proposal: null
- id: codex-rev-002
  severity: blocking
  summary: Gemini proposal mode uses the proposal template but still validates Gemini
    output with the review-only parser.
  citation: consensus_mcp/_dispatch_gemini.py:590
  risk: Gemini proposal outputs with `selected_target` and `structural_abstention`
    will fail `_parse_gemini_output` because it requires `findings`, `goal_satisfied`,
    `blocking_objections`, and `goal_satisfied_rationale`; retrying with the same
    review parser cannot recover.
  recommendation: Add and use a proposal parser/schema validation path for `ns.mode
    == "proposal"`, and ensure the sealed packet format supports proposal payloads.
  patch_not_proposed_reason: A correct patch likely needs changes to the sealed-packet
    contract in `_dispatch_base.py`, which is not embedded or in scope; proposing
    only local parser changes would risk producing packets `_build_sealed_packet`
    cannot seal.
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: The new tests do not exercise dispatcher execution or parser acceptance
    for proposal-shaped output.
  citation: consensus_mcp/tests/test_dispatch_codex_proposal_mode.py:73
  risk: The suite can pass while both dispatchers remain unusable in proposal mode,
    because the tests only search source text and validate standalone schema files.
  recommendation: Add focused tests that run the dispatcher with mocked invocations
    returning proposal-shaped JSON, asserting proposal mode reaches sealing, and tests
    that review-shaped JSON is rejected through the actual dispatcher/parser path.
  patch_not_proposed_reason: Test fixes depend on the missing production parser/sealing
    design; adding tests alone would fail until the proposal execution path is implemented.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The requested files and mode flags exist, but proposal mode
  is not functionally wired through parsing/sealing, so the core goal is not met.
