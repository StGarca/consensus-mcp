goal_satisfied_rationale: 'Addressing only README stops the active bleed for new installs
  but leaves workflow #4 internally contradictory. Addressing only config fixes doctrine/data
  alignment but leaves users installing v1.14.0 from documented commands. Addressing
  only the disconfirmation pattern improves process but does not remove either concrete
  release hazard. A single narrow stabilization iteration has the best value delta
  because the gaps share one failure mode: shipped doctrine, validation, and install
  guidance disagree. Keep it scoped to compatibility, procedural enforcement, and
  install safety; do not mutate historical tags or redesign the workflow engine.'
