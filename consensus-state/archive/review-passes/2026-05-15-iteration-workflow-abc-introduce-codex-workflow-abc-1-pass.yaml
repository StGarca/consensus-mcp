proposal:
  selected_target: 'Implement Workflow C as a bounded autonomous extension of Workflow
    A: letter aliases become operator-facing vocabulary, legacy numeric aliases stay
    as deprecated compatibility inputs, and Workflow C auto-approves only convergence-emergent
    scope items that match an explicit operator predeclared autonomy contract.'
  rationale_vs_alternatives: 'This satisfies the operator directive without turning
    autonomy into an unbounded permission slip. A rename-only target handles A/B but
    misses the overnight operator-unavailable requirement. A prompt-only Workflow
    C would be easy to document but weak in execution because agents could treat scope
    expansion inconsistently. A fully open auto-approval mode would move fast but
    creates unacceptable risk around file reach, dependencies, destructive actions,
    credentials, deployment, and budget. The better value delta is a small state-machine
    addition: Workflow C inherits Workflow A''s blind-first propose-converge behavior,
    then adds structured scope classification, boundary matching, audit logging, and
    halt conditions. That gives overnight continuity while preserving replayability
    and operator trust.'
  deliverable_scope:
    next_iteration_id: iteration-workflow-abc-c-bounded-autonomy
    files_in_scope:
    - consensus_mcp/config.py
    - consensus_mcp/dispatch_templates/*.md
    - consensus_mcp/dispatch_templates/*.json
    - consensus_mcp/**/*workflow*.py
    - consensus_mcp/**/*scope*.py
    - consensus_mcp/**/*closure*.py
    - tests/**/*workflow*
    - tests/**/*scope*
    - docs/**/*.md
    - skills/**/*.md
    - templates/**/*.md
    files_out_of_scope:
    - Historical archived iteration state except migration notes or fixture copies
      needed for tests
    - Broad engine rewrites unrelated to workflow selection, scope approval, dispatch,
      or closure
    - Changing persisted canonical slugs for existing workflows unless a narrow migration
      shim is required
    - Provider/model dispatch behavior not specific to Workflow C
    key_design_decisions:
    - 'Operator-facing names: Workflow A is default propose-converge, Workflow B is
      lightweight post-review, Workflow C is consensus-to-completion-autonomous.'
    - 'Internal canonical slugs should remain stable for existing modes: post-review
      and propose-converge. Add a new canonical slug for Workflow C, for example consensus-to-completion-autonomous.'
    - Aliases should accept A/B/C and lowercase variants. Existing 3/4 numeric aliases
      should remain accepted with deprecation messaging during transition, not removed
      abruptly.
    - 'Workflow C requires an explicit autonomy contract in the goal packet: allowed
      files or globs, allowed task classes, allowed dependency/install behavior, budget
      or iteration caps, required acceptance gates, protected paths, and mandatory
      human-stop triggers.'
    - Auto-approval applies only to new scope items that emerge from convergence,
      are represented as structured deliverable_scope deltas, and match one or more
      declared boundary entries.
    - Out-of-bound items are not rejected silently. They are parked in a pending-operator
      section, and Workflow C may continue only if remaining approved scope can proceed
      independently.
    - Every auto-approval event must be written to iteration state with boundary id,
      originating proposal ids, rationale, timestamp, scope signature, and resulting
      next iteration id.
    - Workflow C completion requires normal closure gates plus an autonomy ledger
      check proving every executed scope item was predeclared, auto-approved within
      bounds, or explicitly operator-approved.
    acceptance_gates:
    - Config tests prove A/B/C aliases resolve correctly, default workflow is A/propose-converge,
      B maps to post-review, C maps to the new autonomous slug, and legacy 3/4 aliases
      still resolve with deprecation coverage.
    - 'Prompt/template tests or snapshot checks prove operator-facing docs no longer
      present #3/#4 as primary vocabulary and introduce C''s boundary contract clearly.'
    - Workflow C unit tests cover within-bound auto-approval, out-of-bound parking,
      mixed approved/pending scope, budget cap halt, protected path halt, and missing
      autonomy contract refusal.
    - Integration fixture simulates a convergence result that introduces a new in-bound
      task and verifies the next iteration is created without operator approval while
      the audit ledger records why.
    - Integration fixture simulates an out-of-bound task and verifies dispatch pauses
      or parks that task without granting authority.
    - Docs include concise operator examples for A, B, and C, including an overnight
      run example with boundaries and stop conditions.
  risks:
  - Boundary matching can become either too loose to protect the operator or too strict
    to be useful; keep the first implementation explicit and conservative.
  - Legacy numeric references across docs/templates may be numerous enough that a
    mechanical rename can accidentally alter historical context; preserve history
    notes where needed.
  - Autonomy ledger and scope signature handling must be deterministic, or resumed
    overnight runs may become hard to audit.
  - If Workflow C tries to implement full planning, execution, review, and closure
    in one change, scope will sprawl; ship the minimal enforceable loop first.
  estimated_complexity: medium
  structural_abstention: false
