findings:
- id: codex-rev-001
  severity: medium
  summary: Fast-path watermark ignores abort-signal state used in the snapshot output.
  citation: consensus_mcp/_resume.py:412
  risk: A caller passing prior_snapshot_watermark can receive watermark_unchanged_since_prior=true
    after an operator creates or removes abort-dispatch-*.signal, so abort_signal_present
    and the expected wait/abort guidance can be stale.
  recommendation: Include abort-dispatch signal file presence/mtime in _compute_watermark,
    or bypass the fast path when in-flight dispatch abort state can affect output.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Fresh iterations with no mutation fall through to operator_decision_required
    instead of dispatching a reviewer.
  citation: consensus_mcp/_resume.py:630
  risk: A newly authorized iteration with a review packet, no reviews, and no in-flight
    dispatch can stall even though the resume tool is supposed to provide the next
    orchestration action.
  recommendation: Add an expected_next_action branch for the no-mutation/no-in-flight/no-actionable-review
    state that suggests dispatch_cross_family_reviewer when review-packet.yaml is
    present.
  patch_not_proposed_reason: null
  patch_proposal: null
