proposal:
  selected_target: Fix new T6 seal archive filenames by including pass_id as the canonical
    collision discriminator while preserving reviewer_id for human readability.
  rationale_vs_alternatives: 'Best move is to align archive-path uniqueness with the
    existing canonical index key. Verified via prompt: review_write_and_seal.py at
    v1.14.9 commit 301bbbb line 244 builds filenames from date_str, iteration_id,
    reviewer_id; lines 250-251 reject path collisions before index handling; lines
    262-271 key index entries on pass_id. Adding pass_id to the filename fixes the
    root mismatch directly and matches the verified test docstring expectation that
    filenames contain iteration_id, reviewer_id, and pass_id. It is better than requiring
    fresh reviewer_ids because that keeps identity overloaded with pass sequence state.
    It is better than auto-suffixing collisions because suffixes make archives nondeterministic
    and hide the canonical key. It is better than rewriting old archives because the
    prompt verifies readers resolve via index full relative path or direct path, so
    old archives remain readable without migration. It is better than changing the
    index key to reviewer_id because pass_id is already the canonical uniqueness contract.'
  deliverable_scope:
    next_iteration_id: iteration-seal-archive-filename-pass-id
    files_in_scope:
    - consensus_mcp/tools/review_write_and_seal.py
    - tests/test_contributors.py
    files_out_of_scope:
    - existing consensus-state archive packet files
    - consensus_mcp/tools/review_read_post_seal.py
    - index.yaml schema changes
    - release, package, registry, or distribution artifacts
    key_design_decisions:
    - New seals use a deterministic filename containing date_str, iteration_id, reviewer_id,
      and pass_id, with pass_id providing uniqueness for multiple passes by the same
      reviewer.
    - Keep reviewer_id in the filename for operator browsing, but stop requiring reviewer_id
      to encode pass ordinal.
    - Preserve existing archive files exactly; no migration or deletion of void seals.
    - Keep index.yaml pass_id semantics and stored relative packet paths unchanged.
    - Do not make shipped or fixed release claims in this iteration; scope is local
      source and tests only, with no verified external distribution channel involved.
    acceptance_gates:
    - A regression test creates two seals in the same iteration with the same reviewer_id
      and different pass_id values; both seal successfully and produce different packet
      paths.
    - index.yaml contains distinct entries keyed by each pass_id, and each entry points
      to the correct new packet path.
    - Updated filename assertions in tests/test_contributors.py require iteration_id,
      reviewer_id, and pass_id tokens in the new archive filename.
    - Existing read-by-index and direct-path behavior continues to pass for old archive
      paths because readers consume stored relative paths rather than reconstructing
      identity from filenames, as verified in the prompt.
    - Full relevant local test target for contributor seal/read behavior passes.
  risks:
  - Undiscovered tooling outside the verified reader may glob or parse old filename
    shape; mitigate with a focused rg check before implementation.
  - pass_id may contain filesystem-hostile or very long characters if existing sanitization
    is incomplete; reuse the same slugging policy applied to other filename tokens.
  - Same pass_id plus same reviewer_id reruns still collide on the exact packet path
    unless idempotent overwrite semantics are separately redesigned; that is outside
    this small root-cause fix.
  estimated_complexity: small
  structural_abstention: false
