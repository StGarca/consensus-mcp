findings:
- id: codex-rev-001
  severity: blocking
  summary: --reconfigure recomputes omitted non-interactive fields instead of preserving
    existing config defaults
  citation: consensus_mcp/_init_wizard.py:151
  risk: Running reconfigure with omitted flags can silently replace existing contributors
    from PATH and cascade new workflow, convergence, independence, and finding-disposition
    defaults, violating the stated load-existing-as-defaults behavior.
  recommendation: When an existing config is loaded for --reconfigure, only mutate
    fields supplied by explicit CLI flags; skip auto-detection and derived default
    recomputation for fields already present.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: blocking
  summary: Interactive wizard prompts only three of nine configurability dimensions
  citation: consensus_mcp/_init_wizard.py:90
  risk: Default interactive init only asks for contributors, workflow, and convergence,
    so users cannot configure independence, finding disposition, snapshot trigger/cadence,
    patch authoring, or timeout policy through the wizard.
  recommendation: Add interactive prompts for every remaining configurability dimension,
    using cfg.VALID_* choices and current/base values as defaults.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-003
  severity: high
  summary: Interactive derived defaults ignore CLI flags supplied before prompting
  citation: consensus_mcp/_init_wizard.py:145
  risk: Because prompts run before CLI overrides, partial interactive commands such
    as --contributors claude or --workflow advisory can derive defaults from stale
    base values and produce invalid or surprising config.
  recommendation: Normalize explicit CLI values into the base config before prompting,
    or make interactive_overrides compute dependent defaults from args-aware normalized
    values.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-004
  severity: medium
  summary: Reconfigure diff is malformed because unified-diff control lines lack newlines
  citation: consensus_mcp/_init_wizard.py:226
  risk: The before/after diff can print with the ---, +++, and @@ records run together,
    making the required reconfigure diff hard to review and not a normal unified diff.
  recommendation: Use difflib's default lineterm with keepends=True, or split without
    line endings and join the generated diff with newlines.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-005
  severity: high
  summary: Unmatched .gitignore open marker causes unrelated ignore lines to be dropped
  citation: consensus_mcp/_init_wizard.py:241
  risk: If .gitignore contains the open managed marker without a close marker, in_block
    stays true to EOF and the rewrite omits every following user line, violating the
    preserve-user-content requirement.
  recommendation: Strip only complete managed marker pairs; if markers are malformed,
    preserve the original lines and append a clean block or fail with a clear error.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: Core --reconfigure and interactive wizard requirements are
  not met; additional diff formatting and .gitignore preservation defects remain.
