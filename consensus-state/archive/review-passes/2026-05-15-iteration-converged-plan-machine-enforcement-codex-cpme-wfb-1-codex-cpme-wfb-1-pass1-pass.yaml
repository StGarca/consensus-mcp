iteration_id: iteration-converged-plan-machine-enforcement
reviewer_id: codex-cpme-wfb-1
pass_id: codex-cpme-wfb-1-pass1
findings:
- id: codex-rev-001
  severity: blocking
  summary: New Workflow A plans can omit convention-input.yaml and bypass enforcement
    entirely
  citation: consensus_mcp/workflow_engine.py:384
  risk: 'Machine enforcement remains optional: a new convergence with no convention
    blocks is sealed as doctrine-only, and safety/strict missing-block hard rejects
    are never evaluated.'
  recommendation: Treat missing convention input during new sealing as a convention
    violation under the configured enforcement level; reserve doctrine-only only for
    read-time legacy plans that predate convention_schema_version.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: blocking
  summary: decisive_experiment_before_next_iteration is not required or validated
  citation: consensus_mcp/schemas/converged_plan_convention.schema.json:7
  risk: One of the three named convention blocks can be omitted while the plan still
    passes validation and seals, so the implementation does not enforce the converged-plan
    convention it claims to enforce.
  recommendation: Require the key in the schema and add validator checks that allow
    null only for the documented proven/n/a cases; otherwise require a non-empty experiment
    string.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-003
  severity: high
  summary: convention_schema_version is read but never enforced as version 1
  citation: consensus_mcp/validators/validate_converged_plan.py:106
  risk: Malformed or future-version convention objects can be accepted and surfaced
    as enforced, undermining the schema contract and the legacy-vs-current distinction.
  recommendation: Reject or at least annotate any present convention whose convention_schema_version
    is missing or not exactly CONVENTION_SCHEMA_VERSION; do not default a present
    malformed convention to version 1 at seal time.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-004
  severity: high
  summary: Hard reject does not guarantee no converged-plan.yaml when rerunning an
    existing iteration directory
  citation: consensus_mcp/workflow_engine.py:402
  risk: A stale previously sealed converged-plan.yaml can remain after a later hard
    reject, so consensus_get_iteration_outcome may report an obsolete successful plan
    for an iteration that just failed closed.
  recommendation: Before validation or on hard reject, ensure any stale final artifact
    cannot be mistaken for the current outcome, for example by removing/renaming it
    safely or writing an explicit failure marker consumed by the outcome reader.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The implementation adds useful pieces, but enforcement is
  bypassable for new plans with no convention input and one named convention block
  is not enforced, so the machine-enforcement goal is not met.
blocking_objections:
- codex-rev-001
- codex-rev-002
