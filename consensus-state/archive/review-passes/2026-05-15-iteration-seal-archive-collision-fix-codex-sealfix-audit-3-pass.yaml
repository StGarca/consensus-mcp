findings:
- id: codex-rev-001
  severity: medium
  summary: '`handle()` accepts a packet whose embedded `pass_id` differs from the
    `pass_id` parameter, so the sealed body can disagree with the filename and index
    identity.'
  citation: consensus_mcp/tools/review_write_and_seal.py:243
  risk: A caller typo or adapter bug can seal an archive indexed under one pass id
    while the packet body claims another, breaking the stated raw-pass-id preservation
    contract and weakening later audit/replay checks that compare packet body to index
    metadata.
  recommendation: Validate that `packet.pass_id`, when present, equals the `pass_id`
    parameter; if only `pass_label` is present, keep the existing compatibility path
    or document it explicitly. Add a regression test for mismatched packet/body pass
    ids.
  patch_not_proposed_reason: A patch would be straightforward, but the review target
    did not embed the current review packet/base_sha needed for a helper-stamped patch
    proposal; recommend applying the validation inside the existing pre-seal field
    checks.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The collision fix itself is mostly implemented, but the
  pass id contract is incomplete because the archive index/path can be keyed by a
  different pass id than the sealed packet body records.
