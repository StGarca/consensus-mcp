findings:
- id: codex-rev-001
  severity: blocking
  summary: import idempotency skips rewrite based only on source entry hashes, leaving
    stale README/manifest when existing target content has drifted
  citation: consensus_mcp/_import_parent_history.py:140
  risk: A forced re-import can report success and return the old manifest without
    repairing a modified or corrupted target tree, so the documented byte-for-byte
    idempotency is not guaranteed and stale README/source-manifest content can persist.
  recommendation: Before skipping, verify the existing target subtree and README/source-manifest
    bytes match the expected output, or rebuild the target when any target content
    differs.
  patch_not_proposed_reason: A correct patch needs the expected README/manifest byte
    rendering factored before the skip path; with only embedded file contents and
    no executable verification, I am not proposing a risky hand-written diff.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The snapshot/restore tests and dry-run restore behavior
  are largely present, but the import idempotency fix can skip necessary repairs and
  does not satisfy the byte-for-byte target-tree intent.
blocking_objections:
- codex-rev-001
