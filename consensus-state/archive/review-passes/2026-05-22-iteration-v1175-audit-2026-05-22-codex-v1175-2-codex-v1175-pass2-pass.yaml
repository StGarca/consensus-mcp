findings:
- id: codex-rev-001
  severity: high
  summary: CRLF dirty detection still hashes raw working-tree bytes because `git hash-object
    -- <path>` does not apply clean filters without a path context.
  citation: consensus_mcp/_snapshot_state.py:526
  risk: 'H-4 remains unfixed on Windows/core.autocrlf=true: unchanged CRLF text files
    can still be reported dirty, so restore dirty guards can continue to misfire.'
  recommendation: Compute the blob id with clean filters applied, for example `git
    hash-object --path=<repo-relative-path> -- <path>` or another git plumbing command
    that demonstrably matches the indexed/tree blob under autocrlf.
  patch_not_proposed_reason: The review packet only embeds a partial diff, not the
    full current file with exact surrounding lines needed to emit an apply-safe unified
    diff against the authoritative contents.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: "Most changes are directionally correct, but H-4\u2019s\
  \ mechanism appears to preserve the raw-byte hashing behavior it was meant to replace,\
  \ leaving a high-impact Windows regression unresolved."
