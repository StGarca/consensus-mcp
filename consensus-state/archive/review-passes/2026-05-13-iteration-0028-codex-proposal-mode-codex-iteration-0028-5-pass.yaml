findings:
- id: codex-rev-001
  severity: medium
  summary: Gemini proposal schema overrides are validated but not communicated to
    Gemini
  citation: consensus_mcp/dispatch_templates/gemini_proposal_template.md:55
  risk: A proposal-mode run with --schema can require fields or constraints that are
    not present in the prompt. Gemini is still instructed to emit the built-in gemini_proposal_schema.json
    shape, so custom schema overrides can fail generation and retry despite being
    used by the post-parser.
  recommendation: When proposal_schema_path is selected, embed or otherwise name the
    effective schema in the Gemini prompt/retry path, and update the proposal template
    wording so it does not hard-code gemini_proposal_schema.json when an override
    is active.
  patch_not_proposed_reason: A safe fix spans dispatcher prompt construction and tests;
    no patch proposed in this sealed review.
  patch_proposal: null
- id: codex-rev-002
  severity: low
  summary: Gemini dispatcher docs still claim there is no --schema flag
  citation: consensus_mcp/_dispatch_gemini.py:22
  risk: The module docstring and usage text describe the old review-only contract
    even though argparse now exposes --schema for proposal mode. Operators reading
    the helper documentation may miss the new override path or misunderstand when
    it applies.
  recommendation: Update the _dispatch_gemini.py module docstring and usage block
    to document --mode and the proposal-only --schema behavior.
  patch_not_proposed_reason: Documentation-only cleanup; no patch proposed in this
    sealed review.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The default review/proposal split is implemented, but Gemini's
  schema override contract is incomplete because the override is not reflected in
  the model prompt, and the helper docs are stale.
