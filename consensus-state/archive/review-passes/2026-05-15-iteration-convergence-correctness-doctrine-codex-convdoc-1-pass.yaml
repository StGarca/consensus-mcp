    key_design_decisions:
    - Add a 'convergence is agreement, not truth' doctrine section to consensus-workflow,
      including fast unanimity as a shared-prior flag and a verify-harder trigger.
    - 'Define a documented converged-plan convention: falsification.hypothesis, falsification.falsifiable_from_artifacts,
      falsification.discriminating_experiment, falsification.refutation_observation,
      falsification.empirical_status, independent_safeguard, and next_decisive_experiment.'
    - For hardware/firmware state, toolchain/environment, concurrency/timing, and
      other external-only claims, require empirical_status=pending until the named
      experiment passes; do not allow fixed/shipped/root-cause-correct language before
      proof.
    - For safety-critical, data-loss, bricking, or irreversible-risk defects, require
      an independent_safeguard that is valuable even if the root-cause hypothesis
      is false.
    - Patch all Codex/Gemini proposal and review templates so every contributor states
      the differential/prior they are reasoning from and names what observation would
      refute the hypothesis when the claim is external-only.
    - Keep void-seal preservation as an audit-history doctrine note, not new machinery,
      because the verified goal says v1.14.9 seal-collision + void-preservation work
      was validated in the field.
    - Do not change convergence voting rules; correctness discipline is layered on
      top of strict-majority/weighted-synthesis mechanics.
    acceptance_gates:
    - 'The workflow skill contains the five transferable lessons: convergence-not-correctness,
      shared-prior unanimity, empirical proof before root-cause commit for external-only
      classes, root-cause-independent safeguard, and decisive next experiment.'
    - All four dispatch templates contain contributor-facing instructions for prior/differential
      disclosure and refutation-observation naming; proposal templates already carry
      verification-first/completion mandates verified via codex_proposal_template.md:12-35
      and gemini_proposal_template.md:12-35.
    - A new focused test asserts the doctrine phrases and converged-plan convention
      fields are present in the packaged workflow skill and all dispatch templates.
    - Existing proposal-mode and Claude-install tests still pass, especially tests
      verified in consensus_mcp/tests/test_dispatch_codex_proposal_mode.py:25-45,
      consensus_mcp/tests/test_dispatch_gemini_proposal_mode.py:17-42, and consensus_mcp/tests/test_init_wizard_install_claude_code.py:24-69.
    - No release/publish claim is made by the implementation unless it names the exact
      version, commit/tag, and affected artifacts; current package version is verified
