- id: codex-rev-001
  severity: medium
  summary: Extracted goal-packet loader is not used by the codex adapter
  citation: consensus_mcp/_dispatch_codex.py:590
  risk: The shared base now owns _load_goal_packet with root-type validation, but
    main() still hand-parses YAML with yaml.safe_load. Future adapters using _load_goal_packet
    will reject non-mapping goal packets while codex continues into later AttributeError-style
    failures, so the extracted infrastructure is not actually the single reusable
    behavior source for this helper.
  recommendation: Load the goal packet through _load_goal_packet in main(), and compute
    goal_packet_sha256 from the already-read text separately if provenance still needs
    the raw hash.
  patch_not_proposed_reason: A safe patch would need exact current line numbers and
    surrounding context in the sealed diff target; the embedded review surface provides
    file contents but not the original pre-extraction behavior or tests needed to
    prove no behavior drift.
  patch_proposal: null
