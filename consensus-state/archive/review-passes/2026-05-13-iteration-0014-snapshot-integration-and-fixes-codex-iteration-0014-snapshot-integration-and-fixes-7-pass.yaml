findings:
- id: codex-rev-001
  severity: medium
  summary: Manifest drift can still pass the idempotent skip check because the expected
    manifest text is generated from the already-loaded existing manifest.
  citation: consensus_mcp/_import_parent_history.py:221
  risk: A hand-edited or corrupted `source-manifest.yaml` with the same per-target
    hashes can be preserved on `--force`, so the import reports a clean idempotent
    no-op while provenance metadata or duplicate/stale entries remain wrong.
  recommendation: Build the expected manifest from the current parent source inventory,
    preserving only the existing `imported_at_utc` when hashes match, then compare
    on-disk manifest bytes to that canonical expected manifest before skipping the
    rewrite.
  patch_not_proposed_reason: Review-only sealed packet; no patch authored because
    the fix should be generated against the helper-stamped base with exact unified-diff
    line ranges.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: Snapshot/restore integration coverage is present, but the
  import idempotency fix still allows corrupted manifest provenance to survive a forced
  re-import.
