goal_satisfied_rationale: 'No blocking defects in the embedded review target. The
  five landed CI fixes are root-cause fixes, not masks: the real-codex skips honestly
  classify four non-hermetic tests, the fixture path correction restores sanitizer
  input, the process-group conftest guard prevents fake-Popen tests from signaling
  the runner while preserving production fallback behavior, the POSIX signal assertion
  now targets the real stdlib enum, and the dispatch-log fix addresses the verified
  writer race. Open-item verdict: corrected A+C is the right fix-shape. A is the module-level
  threading.Lock around _log_dispatch''s JSONL append, which matches the observed
  intra-process main/stdout/stderr thread concurrency without the Windows same-process
  OS-lock stall; C is acceptable as defensive test telemetry parsing, not the primary
  correctness mechanism. Cross-process dispatch-log serialization is explicitly out
  of scope and should not block this CI-greening bundle.'
