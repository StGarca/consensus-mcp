proposal:
  selected_target: 'decision: do not pursue plugin-as-internal-dispatcher; keep the
    codex shell CLI subprocess as the sealed workflow path'
  rationale_vs_alternatives: Based on the provided context, the Claude Code codex
    plugin is a Claude Code chat/MCP-tool integration, not a documented embeddable
    consensus-mcp dispatch API. The current subprocess adapter directly controls prompt
    bytes, stdout/stderr capture, stall detection, raw output archival, schema validation,
    provenance hashes, and T6 sealing inputs. Moving sealed dispatch behind the plugin
    would trade known local process control for a host-mediated tool runtime, weakening
    Q2 provenance and Q3 independence attestation. The plugin may be useful as operator
    install/auth guidance, but not as the internal sealed contributor path unless
    it exposes a stable headless API with replayable, hashable request/response envelopes.
  deliverable_scope:
    next_iteration_id: iteration-0043-codex-dispatch-boundary-decision
    files_in_scope:
    - consensus-state/active/iteration-0042-codex-plugin-vs-cli-dispatch/converged-plan.yaml
    - docs/architecture/codex-dispatch-boundary.md
    files_out_of_scope:
    - consensus_mcp/_dispatch_codex.py
    - T6 sealing implementation
    - Claude Code plugin marketplace internals
    - Claude Code host/runtime implementation
    - other contributor adapters
    key_design_decisions:
    - 'Q1 feasibility: no for internal replacement under the provided plugin contract.'
    - 'Q2 provenance: no for sealed workflow migration; subprocess keeps stronger
      byte-level provenance.'
    - 'Q3 independence: no by default; Claude-hosted plugin execution makes Codex
      contributor independence harder to attest.'
    - 'Q4 pattern: retain CLI subprocess adapter as canonical; document plugin as
      optional operator convenience only.'
    - 'Q5 threshold: revisit only if CLI dispatch becomes a recurring blocker or the
      plugin publishes a stable non-chat API with raw output, version metadata, errors,
      and hashable envelopes.'
    - 'Q6 missed dimension: marketplace supply-chain/runtime-host trust, including
      upgrades, auth state, transcript/logging surfaces, and tool policy.'
    acceptance_gates:
    - Converged plan records explicit no-go for plugin-as-internal-dispatcher.
    - Architecture note defines minimum provenance contract for any future non-subprocess
      Codex adapter.
    - No sealed workflow code path depends on Claude Code plugin installation or runtime.
    - Plugin absence remains non-fatal to consensus-mcp dispatch.
  risks:
  - Plugin may solve some auth/install friction, so separate CLI diagnostics should
    cover that pain directly.
  - Future plugin versions may expose a proper headless API; this decision should
    be scoped to the current known contract.
  - Keeping subprocess means existing parsing/stall-detection reliability still needs
    normal maintenance.
