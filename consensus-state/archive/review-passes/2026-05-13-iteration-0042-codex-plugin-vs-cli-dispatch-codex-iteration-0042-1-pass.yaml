goal_satisfied: true
goal_satisfied_rationale: Based on the provided context, the Claude Code codex plugin
  is a Claude Code chat/MCP-tool integration, not a documented embeddable consensus-mcp
  dispatch API. The current subprocess adapter directly controls prompt bytes, stdout/stderr
  capture, stall detection, raw output archival, schema validation, provenance hashes,
  and T6 sealing inputs. Moving sealed dispatch behind the plugin would trade known
  local process control for a host-mediated tool runtime, weakening Q2 provenance
  and Q3 independence attestation. The plugin may be useful as operator install/auth
  guidance, but not as the internal sealed contributor path unless it exposes a stable
  headless API with replayable, hashable request/response envelopes.
