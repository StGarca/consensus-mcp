findings:
- id: codex-rev-001
  severity: medium
  summary: review-packet base_sha fallback still runs after a bundle-mutation event
    without a hash
  citation: consensus_mcp/_resume.py:219
  risk: A malformed or partial bundle-mutation event can leave current_bundle_sha
    set to the old review-packet base_sha, so stale reviews may stay classified open
    after the bundle changed.
  recommendation: Only use the review-packet base_sha fallback when there are no bundle-mutation
    events; if the latest mutation lacks a usable hash, report current_bundle_sha
    as unknown and warn rather than falling back.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: dispatch_cross_family_reviewer always suggests Codex even when the valid
    closer family is Claude
  citation: consensus_mcp/_resume.py:600
  risk: After a Codex-authored bundle mutation, the resume tool can recommend another
    Codex dispatch that cannot satisfy the cross-family closure invariant, causing
    wasted passes or a stuck loop.
  recommendation: Build the suggested action from closure_invariant_status.valid_closer_families;
    when the required family is not dispatchable by this server, return operator_decision_required
    or a Claude-specific dispatch path instead.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
