findings:
- id: codex-rev-001
  severity: blocking
  summary: heartbeat cadence test still passes if production emits heartbeats too
    early
  citation: consensus_mcp/tests/test_dispatch_codex_streaming.py:343
  risk: The only heartbeat-cadence regression test advances exactly by heartbeat_interval
    each step and only checks total count plus monotonic ages. A regression that emits
    every poll, or uses a much smaller threshold, still produces one heartbeat per
    30s driver step and passes, so H2 heartbeat cadence coverage is not preserved.
  recommendation: Drive at least one sub-interval poll before each boundary and assert
    no heartbeat is emitted until the interval is crossed, then assert exactly one
    heartbeat appears at the boundary before advancing again.
  patch_not_proposed_reason: Patch not proposed in sealed review because the safest
    fix is a small test-harness edit, but the review output only needs to identify
    the coverage hole for quorum comparison.
  patch_proposal: null
