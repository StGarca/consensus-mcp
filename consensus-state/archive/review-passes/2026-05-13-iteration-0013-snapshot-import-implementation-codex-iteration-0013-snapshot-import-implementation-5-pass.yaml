findings:
- id: codex-rev-001
  severity: high
  summary: Snapshot tag collisions can make two snapshots in the same second fail
    after committing an unreferenced snapshot commit.
  citation: consensus_mcp/_snapshot_state.py:75
  risk: Running `snapshot` or the restore auto-pre-snapshot path twice within one
    second with the same label builds the same tag name; `git tag -a` then fails after
    the commit is created, the branch is not advanced, and the operator loses the
    snapshot attempt despite the CLI goal requiring reliable snapshot/restore safety.
  recommendation: Make tag creation collision-resistant before committing, for example
    by retrying with a short monotonic or random suffix when the generated tag already
    exists, or by checking and regenerating until `git rev-parse --verify refs/tags/<tag>`
    fails.
  patch_not_proposed_reason: A robust patch would need a new tag-generation contract
    and tests around duplicate timestamps; the embedded tests do not include a controllable
    clock fixture, so I am not proposing a diff against this sealed packet.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The implementation largely matches the requested design,
  but snapshot creation is not reliable under same-second tag collisions, including
  the default restore safety snapshot path.
