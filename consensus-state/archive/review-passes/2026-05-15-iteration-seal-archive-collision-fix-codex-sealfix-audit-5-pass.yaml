findings:
- id: codex-rev-001
  severity: medium
  summary: idempotent branch reports success even when the recorded archive hash is
    missing or stale
  citation: consensus_mcp/tools/review_write_and_seal.py:404
  risk: A corrupt or manually edited archived mapping with the same content identity
    but a missing or incorrect packet_sha256 can be accepted as an idempotent success,
    returning an empty or stale hash instead of detecting the integrity mismatch promised
    by the fix.
  recommendation: After content identity matches, recompute the archived packet_sha256
    from the on-disk mapping with packet_sha256 removed and compare it to the index
    entry before returning success; return idempotent_target_integrity_mismatch on
    missing or mismatched index/on-disk hash.
  patch_not_proposed_reason: The provided embedded file block has no review_packet.defect_target.base_sha,
    and this fix needs a careful hunk across the idempotency branch plus tests for
    stale/missing index hashes; recommend applying in the next author loop.
  patch_proposal: null
goal_satisfied: true
goal_satisfied_rationale: The pass-id collision fix and main idempotent behavior are
