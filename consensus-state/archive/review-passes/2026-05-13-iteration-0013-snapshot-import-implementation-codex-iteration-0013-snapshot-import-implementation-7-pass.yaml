findings:
- id: codex-rev-001
  severity: blocking
  summary: snapshot creation records the new snapshot commit on a detached worktree,
    then attempts to force-move a branch that is still checked out in another worktree
  citation: consensus_mcp/_snapshot_state.py:177
  risk: '`snapshot` can fail after creating the commit and tag because `consensus-state-snapshots`
    remains checked out by the initial orphan worktree; Git refuses `git branch -f`
    on a branch checked out elsewhere, so the branch may not advance and the snapshot
    CLI does not reliably meet the orphan-branch durability requirement.'
  recommendation: Do not leave `consensus-state-snapshots` checked out in a persistent
    worktree. Create subsequent snapshots in a worktree checked out on the branch
    itself, or detach/remove/prune the initial worktree state before force-updating
    the branch.
  patch_not_proposed_reason: The embedded file lacks the integration test file or
    surrounding helper expectations needed to author and anchor a safe branch/worktree
    lifecycle patch without risking a mismatched diff.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: 'The implementation has a blocking snapshot lifecycle defect:
  after initialization, later snapshots can fail when advancing the orphan branch,
  so the desired snapshot durability behavior is not fully met.'
blocking_objections:
- codex-rev-001
