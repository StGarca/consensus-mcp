findings:
- id: codex-rev-001
  severity: medium
  summary: Idempotent import skip ignores README.md and source-manifest.yaml content
    drift.
  citation: consensus_mcp/_import_parent_history.py:226
  risk: A forced re-import can report a clean idempotent no-op while preserving corrupted
    or manually edited provenance files, so the target tree is not byte-for-byte what
    the importer would produce.
  recommendation: Before returning the existing manifest, validate the root provenance
    files' expected content or rewrite when README.md/source-manifest.yaml differ
    from the canonical import output.
  patch_not_proposed_reason: Fix needs a small canonical-manifest/readme comparison
    helper; omitted here to avoid proposing an unverified hunk against timestamp-preservation
    semantics.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: Snapshot integration coverage and restore dry-run behavior
  are present, but the import idempotency fast path still misses provenance-file drift,
  so the byte-for-byte idempotency goal is not fully met.
