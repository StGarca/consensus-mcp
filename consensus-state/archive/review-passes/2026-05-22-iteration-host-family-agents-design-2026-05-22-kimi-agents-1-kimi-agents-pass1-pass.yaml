goal_satisfied_rationale: "Differential: I reason from the verified architecture that\
  \ (1) there is NO claude CLI for subprocess dispatch (ClaudeAdapter is callback-based,\
  \ verified in contributors/claude.py:1-14), (2) the profile+adapter factory already\
  \ supports open contributor extension via kind:cli_reviewer (ProfileAdapter) and\
  \ kind:host (reserved for orchestrator), and (3) the cross-family closure invariant\
  \ is enforced by comparing actor.model_family (_closure_invariant.py:266-273), so\
  \ any artifact tagged with the same family automatically fails the gate \u2014 no\
  \ special-case wiring needed.\n\nWhy (b) beats (a): Option (a) reuses ClaudeAdapter\
  \ for a second callback invocation, but ClaudeAdapter is hard-coded to key==\"claude\"\
  \ in build_adapters (_engine_factory.py:265-267). Reusing it for a second contributor\
  \ key (e.g., \"claude-swe\") requires factory special-casing that is MORE intrusive\
  \ than adding a dedicated HostPeerAdapter, and it conflates the orchestrator adapter\
  \ with the reviewer adapter in a way that makes provenance tagging and role differentiation\
  \ fragile. Option (a) also has no clean config surface \u2014 the second invocation\
  \ is invisible to the operator.\n\nWhy (b) beats (c): Option (c) assumes the host\
  \ can \"spawn a subagent\" with fresh context. Verified: there is no claude CLI\
  \ binary in this project (no detect.command for claude; claude is in-process). A\
  \ subprocess spawn is impossible without inventing an external distribution mechanism,\
  \ which violates the verification-first mandate. Any \"subagent\" would still be\
  \ a host-runtime construct accessed via callback, making (c) semantically identical\
  \ to (b) but with misleading naming.\n\nWhy (b) beats (d): A true \"other\" (e.g.,\
  \ RPC to a hosted Claude service) would require network credentials, API keys, and\
  \ heavy deps \u2014 violating the 100% Python / no heavy deps constraint and the\
  \ verification-first mandate (no such channel exists in the project).\n\nThe HostPeerAdapter\
  \ design is the minimal extension: it mirrors ClaudeAdapter's callback contract,\
  \ integrates into the existing B-routing factory (_engine_factory.py step (c) for\
  \ profiles), produces SealedArtifact with symmetric T6 sealing, and tags provenance\
  \ with the host's model_family so the existing cross-family invariant naturally\
  \ excludes it. The config surface is a profile with kind:host_peer, which keeps\
  \ the open-contributor model intact \u2014 an operator can add zero, one, or multiple\
  \ host-peer specialists with zero code changes beyond the initial adapter class."
