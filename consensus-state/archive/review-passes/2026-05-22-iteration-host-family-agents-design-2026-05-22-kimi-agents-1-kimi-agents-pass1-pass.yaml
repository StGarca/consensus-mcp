    key_design_decisions:
    - Add KIND_HOST_PEER = 'host_peer' to _contributor_profiles schema. host_peer
      is like host (in-process, no CLI) but is NOT the orchestrator; it requires a
      family tag and a role field.
    - Create HostPeerAdapter that accepts artifact_callback like ClaudeAdapter but
      injects actor.model_family into the artifact dict before T6 seal, ensuring the
      closure invariant sees it as same-family.
    - Engine factory B-routing step (c) resolves kind:host_peer profiles to HostPeerAdapter
      and passes claude_artifact_callback to it (factory checks ctor signature or
      explicit kind).
    - 'Role split enforced by engine respecting can_propose/can_review/can_converge
      flags (currently in config schema but unused by engine). Orchestrator key: can_converge=true,
      can_review=false. Host-peer key: can_review=true, can_converge=false. Both can
      propose in workflow #4.'
    - "Fresh-context guarantee is contractual: HostPeerAdapter.dispatch emits an independence_attestation\
      \ block with context_isolation:'host_peer_fresh_context_contract'. The host\
      \ implementation (outside consensus-mcp) is the external refuting observation\
      \ \u2014 if the host callback reuses polluted context, the attestation is false\
      \ and the operator can detect it."
    - Supplementary weighting via adapter_config.weight (default 'full', opt-in 'supplementary').
      Convergence evaluator includes supplementary votes in synthesis but they do
      NOT count toward cross-family closure quorum.
    - 'Gate exclusion is root-cause-independent: because host_peer provenance carries
      the same model_family as the host mutator, the existing _closure_invariant.check_closure_invariant
      cross_family check fails closed automatically. No weakening, no special-case
      bypass.'
    - "Blindness is structural: HostPeerAdapter receives only the DispatchPacket for\
      \ its phase. In PROPOSE/REVIEW phases the packet contains only the problem statement\
      \ or review target \u2014 same blindness guarantee as codex/gemini. The host\
      \ callback must not inject peer outputs; this is enforced by convention + packet\
      \ structure."
    acceptance_gates:
    - HostPeerAdapter produces a SealedArtifact with T6 archive path, correct packet_sha256,
      and contributor name matching the profile key
    - 'Engine workflow #4 skips converge phase for host-peer when can_converge=false;
      workflow #3 skips review for orchestrator when can_review=false'
    - validate_profile accepts a well-formed host_peer profile and rejects host_peer
      with missing family tag
    - A host-peer review artifact with model_family='claude' fails cross_family check
      against a claude mutator in _closure_invariant.check_closure_invariant (existing
      behavior, regression guard)
    - _validate_closure_invariant CLI correctly derives family from host-peer sealed
      artifact and produces non_compliant when same-family closes
    - config.validate accepts contributors.enabled containing a host_peer profile
      name and rejects weight values outside {'full','supplementary'}
  risks:
  - "Host callback freshness is NOT mechanically enforceable by consensus-mcp \u2014\
    \ it depends on the host runtime honoring the contract. The safeguard is the attestation\
    \ + operator visibility, not code-level isolation."
  - 'Engine phase-gate wiring (can_*) is currently unimplemented; adding it changes
    dispatch semantics for all adapters. Risk of regression if existing configs have
    inconsistent can_* flags (e.g., legacy configs with can_converge=false on codex).
    Mitigation: default to current behavior when can_* is absent.'
  - "Adding a new built-in profile (claude-swe.yaml) may surprise operators who already\
    \ have a custom 'claude-swe' profile in contributors.profiles. Profile merge uses\
    \ whole-profile replacement, so operator overlay wins \u2014 acceptable."
  - If the host family model is generalized beyond 'claude' in future (e.g., kimi
    hosts), the host_peer adapter must dynamically read the family from the host adapter
    rather than hard-coding 'claude'. Design should use adapter_config or profile
    field, not hard-coded string.
  estimated_complexity: medium
  structural_abstention: false
