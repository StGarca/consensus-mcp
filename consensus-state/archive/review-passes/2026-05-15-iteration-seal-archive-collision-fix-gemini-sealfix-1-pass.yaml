proposal:
  selected_target: Change archive filename format to `{date_str}-{iteration_id}-{reviewer_id}-{pass_id}-pass.yaml`
  rationale_vs_alternatives: This directly fixes the root cause of the defect by using
    the canonical uniqueness key for a review pass (`pass_id`) in the archive filename.
    This aligns filename uniqueness with the `index.yaml` uniqueness key, eliminating
    the collision path. It is superior to the status quo workaround, which overloads
    the `reviewer_id` with sequencing data. It is also better than alternative fixes
    like adding a simple counter on collision, as it's a deterministic solution based
    on the data's own identity. The provided context confirms this change is backward-compatible
    for reading existing archives and aligns with a pre-existing (but unimplemented)
    design assertion in a test docstring, making it the lowest-risk, most correct
    path forward.
  deliverable_scope:
    next_iteration_id: iter-0029-seal-collision-fix
    files_in_scope:
    - consensus_mcp/tools/review_write_and_seal.py
    - consensus_mcp/tests/test_contributors.py
    files_out_of_scope:
    - consensus_mcp/tools/review_read_post_seal.py
    - Any tooling that parses archive filenames to extract metadata; context suggests
      none exists.
    - Existing sealed archives (no data migration).
    key_design_decisions:
    - The new archive filename format will be `{date_str}-{iteration_id}-{reviewer_id}-{pass_id}-pass.yaml`.
    - This change will only apply to newly sealed archives. Existing archives will
      not be renamed or migrated, preserving audit history.
    - The `pass_id` must be available in the context passed to the `review_write_and_seal`
      tool.
    acceptance_gates:
    - The filename generation logic in `review_write_and_seal.py` is updated to include
      `pass_id`.
    - Unit tests in `test_contributors.py` that hardcode the old filename format are
      updated and pass.
    - An integration test successfully seals two reviews from the same iteration with
      the same `reviewer_id` but different `pass_id`s, verifying no collision occurs.
    - Verification that existing, old-format archives can still be read successfully
      by `review_read_post_seal.py`.
  risks:
  - There is a minor, unverified risk that some other tool or script outside the provided
    context parses the archive filename instead of using `index.yaml`. Based on the
    supplied information, this is unlikely as the read tool itself does not do this.
  estimated_complexity: small
  structural_abstention: false
