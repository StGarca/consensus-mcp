proposal:
  selected_target: Introduce a new `validate_converged_plan` validator and update
    the proposal schema and workflow engine to propagate the required convention blocks.
  rationale_vs_alternatives: "The core problem is that the human-judgment convention\
    \ blocks originate outside the automated `converged-plan.yaml` generation process.\
    \ The primary alternative\u2014having a human or process manually edit the YAML\
    \ post-generation\u2014is brittle, breaks the chain of evidence, and is prone\
    \ to error. This proposal correctly places the origin of the convention blocks\
    \ within the AI-authored proposals themselves. It then uses the existing workflow\
    \ engine to propagate them into the final artifact, ensuring provenance. A new,\
    \ dedicated validator then enforces the *structural* contract of these blocks,\
    \ not their semantic content. This directly addresses the prompt's mandate to\
    \ avoid a 'green-means-correct' shared-prior trap, as the validator's success\
    \ signal means 'the formal argument is present', not 'the argument is true'. This\
    \ is a more robust and integrated solution than simply bolting on a schema check\
    \ without addressing the data's point of entry."
  deliverable_scope:
    next_iteration_id: iter-0029-converged-plan-enforcement
    files_in_scope:
    - consensus_mcp/dispatch_templates/gemini_proposal_schema.json
    - consensus_mcp/dispatch_templates/codex_proposal_schema.json
    - consensus_mcp/workflow_engine.py
    - consensus_mcp/validators/validate_converged_plan.py
    - consensus_mcp/tool_registry.py
    - tests/validators/test_validate_converged_plan.py
    - tests/test_workflow_engine.py
    - docs/workflows/converged-plan-convention.md
    files_out_of_scope:
    - consensus_mcp/validators/consensus_gate.py
    - consensus_mcp/tools/gate_evaluate_production_with_scope_match.py
    - any TUI or visualization components
    key_design_decisions:
    - The convention blocks (`falsification`, `independent_safeguard`, `decisive_experiment_before_next_iteration`)
      will be added as optional structured objects to the proposal schemas, making
      them a formal part of the AI contributor's output.
    - The `workflow_engine._seal_converged_plan` function will be updated to extract
      these blocks from the winning proposal's `deliverable_scope` and write them
      into the `converged-plan.yaml` artifact.
    - A new validator, `validators/validate_converged_plan.py`, will be created. It
      will be triggered after plan convergence.
    - This new validator will enforce the presence and *structural* integrity of the
      convention blocks in `converged-plan.yaml`, failing the run if they are absent
      or malformed (e.g., `falsification` is present but lacks a `refutation_condition`
      field). It will NOT attempt to evaluate the semantic content, thereby preventing
      the gate from becoming a source of false confidence.
    - The `converged-plan-convention.md` documentation will be updated to reflect
      the new machine-enforced structure for these blocks.
    acceptance_gates:
    - When a converged plan is generated, the new `validate_converged_plan` tool runs
      automatically.
    - The build fails if a `converged-plan.yaml` is generated without the required
      convention blocks (e.g., `falsification`).
    - The build fails if a convention block is present but has an invalid structure
      (e.g., `independent_safeguard` is a string instead of an object).
    - The build succeeds when a `converged-plan.yaml` contains structurally valid
      convention blocks extracted from the source proposal.
    - Unit tests for the new validator and updated workflow engine confirm this behavior
      with both valid and invalid fixture data.
  risks:
  - AI contributors may learn to 'game the system' by providing syntactically valid
    but semantically useless boilerplate for the required blocks. Mitigation relies
    on continued human oversight of the final converged plans, as the machine's role
    is only to enforce the ceremony of intellectual honesty, not its substance.
  - The definition of 'structural integrity' for the convention blocks could become
    overly complex, inadvertently leading to semantic validation. Mitigation is to
    keep the structural checks minimal (e.g., presence of key fields, non-empty string
    values) and documented explicitly.
  estimated_complexity: medium
  structural_abstention: false
