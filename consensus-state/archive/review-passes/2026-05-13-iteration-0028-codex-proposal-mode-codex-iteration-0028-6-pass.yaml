findings:
- id: codex-rev-001
  severity: medium
  summary: Proposal parsers assume structural_abstention exists and is boolean after
    custom-schema validation.
  citation: consensus_mcp/_dispatch_codex.py:454; consensus_mcp/_dispatch_gemini.py:482
  risk: An operator-supplied proposal schema that relaxes or omits structural_abstention
    can pass jsonschema validation and then produce a KeyError or accept a non-boolean
    truthy value. That breaks the documented schema-override contract with unclear
    dispatch failures or incoherent sealed proposal state.
  recommendation: Add parser-level invariants in both proposal parsers requiring structural_abstention
    to be present and boolean before cross-field checks, independent of the active
    schema.
  patch_not_proposed_reason: No patch proposed because the paired fix needs symmetric
    codex and gemini parser tests for custom-schema override behavior.
  patch_proposal: null
- id: codex-rev-002
  severity: low
  summary: Codex proposal dispatch does not record the selected mode in sealed provenance.
  citation: consensus_mcp/_dispatch_codex.py:696
  risk: Codex review and proposal runs are distinguishable from the sealed packet
    shape, but the dispatch_provenance block lacks the explicit mode field that gemini
    records. This weakens audit readability for the new mode split, especially with
    custom template or schema paths.
  recommendation: 'Add mode: ns.mode to codex dispatch_provenance and dispatch log
    events for parity with gemini.'
  patch_not_proposed_reason: No patch proposed because this is an audit-readability
    issue rather than a functional blocker.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The proposal mode implementation satisfies the core template
  and schema split, but the custom-schema parser path has a real invariant gap and
  codex provenance is missing explicit mode parity.
