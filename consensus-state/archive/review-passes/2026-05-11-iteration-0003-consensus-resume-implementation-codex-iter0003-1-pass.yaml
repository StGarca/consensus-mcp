findings:
- id: codex-rev-001
  severity: blocking
  summary: MCP server registration deliverable is absent from the sealed review target
  citation: consensus_mcp/server.py:1
  risk: The resume wrapper may exist but the MCP server may never expose the tool,
    so the core consensus_resume deliverable cannot be verified or accepted from this
    packet.
  recommendation: Include consensus_mcp/server.py in the sealed review target with
    the registry import and register call for the resume tool.
  patch_not_proposed_reason: consensus_mcp/server.py was required for the deliverable
    but was not embedded in the authoritative touched-file contents, so an exact diff
    cannot be authored.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: include_streamed_lines and max_streamed_lines are accepted but ignored
  citation: consensus_mcp/_resume.py:609
  risk: Callers requesting streamed dispatch context receive the same snapshot as
    callers that did not request it, leaving stalled or in-flight dispatch diagnosis
    incomplete.
  recommendation: Thread include_streamed_lines and max_streamed_lines into dispatch-log
    processing, return the bounded streamed-line payload defined by the spec, and
    add coverage proving the flag changes output.
  patch_not_proposed_reason: null
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: close_iteration payload can select the wrong open review
  citation: consensus_mcp/_resume.py:518
  risk: When closure_invariant_status is satisfiable because one review is a valid
    cross-family closer, expected_next_action may still return the first open review
    by pass_id, causing an invalid close attempt or closing against the wrong review.
  recommendation: Carry the validated closer pass_id out of the closure-invariant
    check, or select a closer using valid_closer_families plus valid_closer_review_target_hash
    before building close_iteration_payload.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
