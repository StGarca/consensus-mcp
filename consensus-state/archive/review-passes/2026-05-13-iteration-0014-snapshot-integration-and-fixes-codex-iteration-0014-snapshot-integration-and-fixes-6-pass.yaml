findings:
- id: codex-rev-001
  severity: medium
  summary: restore dry-run validates refs differently than real restore
  citation: consensus_mcp/_snapshot_state.py:606
  risk: '`restore --dry-run` can accept an arbitrary existing ref such as a branch,
    produce a plausible copy/delete plan, then the real restore rejects the same `--tag`
    later because only `refs/tags/<tag>` is valid. That weakens the dry-run safety
    goal by allowing a false preflight result.'
  recommendation: Move the `refs/tags/{args.tag}` validation before the dry-run branch
    so dry-run and real restore reject the same invalid targets.
  patch_not_proposed_reason: null
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The integration coverage and main restore/import changes
  are present, but dry-run restore still has a validation mismatch with real restore.
