schema_version: 1
pilot_id: iteration-seal-archive-collision-fix
workflow_mode: propose-converge
independence: blind-first-reveal
goal:
  summary: |
    Workflow A consult on the proper fix for the
    `packet_path_collision` defect in the T6 seal pipeline.

    VERIFIED DEFECT (consensus_mcp/tools/review_write_and_seal.py
    at HEAD of v1.14.9 branch, commit 301bbbb):

      Line 244:
        filename = f"{date_str}-{iteration_id}-{reviewer_id}-pass.yaml"

      Line 250-251 (collision guard, fires BEFORE index logic):
        if sealed_path.exists():
            return {"error": "packet_path_collision", "detail": str(sealed_path)}

      Line 262-271 (index logic — correctly keys on pass_id):
        for entry in passes_list:
            if entry.get("id") == pass_id:
                if entry.get("packet_sha256") != packet_sha256:
                    return {"error": "index_collision", ...}
                # Same hash -- idempotent; still refuse to overwrite the
                # packet file (already caught above by path collision)

    The archive filename derives from `reviewer_id`, NOT `pass_id`.
    `pass_id` is the canonical uniqueness key (index.yaml keys on
    it, line 263). When an operator re-uses the same reviewer_id
    across passes (e.g. `gemini-iteration-0012-2` for both pass1
    and pass2), the second seal produces the same filename → hard
    `packet_path_collision` error at line 250, BEFORE the
    pass_id-aware index logic at 262 ever runs.

    OBSERVED IMPACT (report that triggered this consult):
    "Gemini's round-2 review ran (exit 0) but failed to seal:
    packet_path_collision — the archive filename derives from
    reviewer-id, not pass-id, so re-using gemini-iteration-0012-2
    collided with the void pass1/pass2 archive. Codex r2 will hit
    the same collision. Fix: fresh reviewer-ids (not just
    pass-ids), preserving the void seals as honest audit history."

    DE-FACTO WORKAROUND: operators bake the pass ordinal into
    reviewer_id (the 162 existing archives use `codex-iter0003-1`
    ... `codex-iter0003-5`). This overloads reviewer_id (reviewer
    IDENTITY) with pass-sequence bookkeeping. Root cause: filename
    uniqueness and index uniqueness use different keys.

    BACKWARD-COMPAT SURFACE (verified):
      - 162 existing archives use `{reviewer_id}-pass.yaml`.
      - review_read_post_seal.py resolves via index.yaml pass_id
        lookup (index stores full relative path) OR direct path
        arg. It does NOT parse the filename to reconstruct
        identity — a filename-scheme change for NEW seals does not
        break reading OLD archives.
      - test_contributors.py:147 and :222 hardcode the
        `{iteration_id}-{reviewer_id}-pass.yaml` string; will need
        updating.
      - test_contributors.py:135 docstring asserts "Archive
        filename must contain iteration_id + reviewer_id + pass_id
        tokens" — the docstring already claims pass_id SHOULD be
        in the filename; the implementation never put it there
        (silent regression evidence).

  question: |
    Each contributor: stance on Q1-Q5, justify vs alternatives,
    sketch smallest deliverable per the no-deferral rule.

    Q1 — **Archive filename scheme.**
      (a) `{date}-{iteration_id}-{pass_id}-pass.yaml` — drop
          reviewer_id; pass_id is the canonical uniqueness key
          (matches index). pass_id conventionally embeds
          reviewer_id as prefix so identity stays legible.
      (b) `{date}-{iteration_id}-{reviewer_id}-{pass_id}-pass.yaml`
          — both. Explicit but redundant + Windows 260-char path
          risk.
      (c) `{date}-{iteration_id}-{reviewer_id}-{sha8}-pass.yaml`
          — reviewer_id + first 8 of packet_sha256. Content-
          addressed; identical re-seals collapse naturally.
      (d) Keep `{reviewer_id}` + pipeline-computed monotonic
          pass-ordinal (filesystem scan + race window).

    Q2 — **Idempotency semantics.** Exact re-seal (same pass_id,
    same packet_sha256):
      (a) Idempotent SUCCESS — return existing sealed_path +
          `idempotent: true`. Requires reordering: check index
          for pass_id+sha BEFORE the path-exists guard.
      (b) Distinct non-fatal error type
          (`already_sealed_identical`) caller treats as success.
      (c) Unchanged hard error (listed for completeness).

    Q3 — **Backward compat with 162 existing archives.**
      (a) No migration. Old archives readable via index path
          resolution. New scheme for new seals. Mixed dir OK
          (index is source of truth). Document.
      (b) Lazy migration script renames old archives + rewrites
          index paths (touches sealed audit history — provenance
          concern).
      (c) Dual-read fallback that resolves either scheme by
          filename if index missing/corrupt.

    Q4 — **Void-seal preservation (audit-history concern).**
      (a) New pass_id for retry → new file; void seal preserved.
          Natural consequence of Q1-a + Q2-a.
      (b) Add `void: true` / `superseded_by: <pass_id>` to the
          voided seal's index entry (records WHY, not just THAT).
      (c) Both — preserve file AND annotate index supersession.

    Q5 — **Smallest viable deliverable (no-deferral check).**
      (a) Q1 + Q2 + Q3-a + test updates — core fix, complete.
      (b) (a) + Q4-b/c index annotation — schema change to
          index.yaml entries; bundle or own consult?
      (c) (a) + forensic validator scanning the 162 existing
          archives for latent collisions the old scheme may have
          silently mis-sealed.

    Required: verdict on Q1-Q5 + any Q6 missed dimension.

    Q6 — Open-ended. Candidates: race window between path-exists
    guard and atomic write (concurrent dispatch, same pass_id);
    whether `index_collision` (diff content, same pass_id) should
    preserve the rejected packet for forensics; full content-
    addressed CAS archive; Windows 260-char limit with long
    iteration_id+reviewer_id+pass_id; whether
    test_contributors.py:135's docstring proves pass_id-in-filename
    was always the intended design.

  non_goals:
    - migrating/renaming the 162 existing sealed archives unless
      Q3 converges on (b) with explicit justification
    - changing the canonical_yaml_sha256 algorithm
    - changing review_read_post_seal.py index resolution (only
      additive backward-compat reading if Q3 requires)
    - redesigning index.yaml structure (only per-entry fields,
      only if Q4 converges on annotation)
  type: design_consult
