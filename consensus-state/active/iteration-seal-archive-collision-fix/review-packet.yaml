    consensus_mcp/tools/review_write_and_seal.py: "\"\"\"review.write_and_seal MCP\
      \ tool. Phase 1 G1 (sealed-review provenance).\n\nThe only authorized writer\
      \ for review packets under\nconsensus-state/archive/review-passes/. After Phase\
      \ 0 sealing, no review may land\nin that directory except through this tool.\n\
      \nSealing contract:\n  1. Validate required pre-seal fields.\n  2. Compute canonical_yaml_sha256\
      \ of the packet sans packet_sha256 field\n     (self-hash exception -- the field\
      \ cannot affect its own hash).\n  3. Insert packet_sha256 into the packet dict.\n\
      \  4. Compute deterministic file path from inputs + current UTC date.\n  5.\
      \ Refuse if path already exists (idempotent only at hash level, never\n    \
      \ overwrites).\n  6. Atomic write (tmp + os.replace) of the sealed packet.\n\
      \  7. Atomic read-modify-write of index.yaml (append new entry).\n  8. Append\
      \ review_returned_and_sealed audit event.\n\nCONCURRENCY (v1.0 limitation):\
      \ This tool is single-writer for both the packet\nfile and index.yaml. Concurrent\
      \ invocations can race on index.yaml\nread-modify-write -- the audit_log read-modify-write\
      \ is also non-locked.\nDo not invoke concurrently. Phase 1.x will add per-file\
      \ filelock.\n\"\"\"\nfrom __future__ import annotations\n\nimport copy\nimport\
      \ hashlib\nimport os\nfrom datetime import datetime, timezone\nfrom pathlib\
      \ import Path\n\nimport yaml\n\nfrom consensus_mcp._paths import project_root,\
      \ archive_dir, index_path, active_dir\n\n# iter-0037 (Phase B step 10 per iter-0024\
      \ plan, HIGHEST-impact seal-pipeline\n# tool): migrated from cached REPO_ROOT/ARCHIVE_DIR/INDEX_PATH\
      \ module-level\n# constants to lazy `_paths` resolvers. Tests redirect paths\
      \ via\n# `monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\", ...)` /\n# `CONSENSUS_MCP_REPO_ROOT`,\
      \ NOT `monkeypatch.setattr` on this module —\n# the latter is unsafe against\
      \ __getattr__-only attributes (pytest captures\n# the lazy-synthesized value\
      \ at setattr time and restores it into __dict__\n# at teardown, permanently\
      \ shadowing the resolver for subsequent tests).\n# PEP 562 `__getattr__` retained\
      \ for external `module.REPO_ROOT` etc.\n# reads.\n\n\ndef __getattr__(name:\
      \ str):\n    \"\"\"PEP 562 backward compat for external `module.REPO_ROOT` /\n\
      \    `module.ARCHIVE_DIR` / `module.INDEX_PATH` reads. Internal code should\n\
      \    call the `_paths` resolvers directly.\"\"\"\n    if name == \"REPO_ROOT\"\
      :\n        return project_root()\n    if name == \"ARCHIVE_DIR\":\n        return\
      \ archive_dir()\n    if name == \"INDEX_PATH\":\n        return index_path()\n\
      \    raise AttributeError(f\"module {__name__!r} has no attribute {name!r}\"\
      )\n\n# canonical_yaml_sha256 formula (see also: state_read_decision_ledger.py,\
      \ audit_append_event.py)\n# Double round-trip: yaml.safe_dump -> yaml.safe_load\
      \ -> yaml.safe_dump ensures\n# any Python-object quirks (ordered vs unordered\
      \ dicts, aliases) are normalized\n# before hashing. sort_keys=True makes hash\
      \ order-independent.\ndef _canonical_yaml_sha256(obj) -> str:\n    \"\"\"Canonical\
      \ SHA-256 of a Python object per spec section 7.\"\"\"\n    canonical = yaml.safe_dump(yaml.safe_load(yaml.safe_dump(obj)),\
      \ sort_keys=True)\n    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\
      \n\n# iteration-seal-archive-collision-fix (codex-sealfix-audit-4 HIGH\n# finding):\
      \ idempotency must NOT depend on packet_sha256, because that\n# hash includes\
      \ the volatile `sealed_at_utc` stamp. A re-dispatch\n# builds a fresh packet\
      \ with no sealed_at_utc; Step 3 then stamps a\n# NEW timestamp, so the recomputed\
      \ packet_sha256 differs from the\n# originally-sealed one even though the substantive\
      \ content is\n# identical — which used to be misclassified as `index_collision`,\n\
      # defeating the whole idempotency feature for the primary\n# (dispatch-retry)\
      \ use case. Idempotency is therefore judged on\n# CONTENT IDENTITY: the canonical\
      \ hash of the packet with the volatile\n# seal-provenance fields removed.\n\
      _VOLATILE_SEAL_FIELDS = (\"sealed_at_utc\", \"packet_sha256\")\n\n\ndef _content_identity_sha256(obj)\
      \ -> str:\n    \"\"\"Canonical hash of a packet mapping with volatile seal-provenance\n\
      \    fields (`sealed_at_utc`, `packet_sha256`) removed, so two seals of\n  \
      \  the same substantive content compare equal regardless of seal time\n    or\
      \ the timestamped self-hash. Non-mapping input returns a sentinel\n    that\
      \ cannot collide with any real packet's identity (used by the\n    integrity\
      \ guard to treat a tampered non-mapping archive as a\n    mismatch rather than\
      \ crashing).\"\"\"\n    if not isinstance(obj, dict):\n        return \"non-mapping:\"\
      \ + hashlib.sha256(\n            repr(obj).encode(\"utf-8\", \"replace\")\n\
      \        ).hexdigest()\n    stripped = copy.deepcopy(obj)\n    for f in _VOLATILE_SEAL_FIELDS:\n\
      \        stripped.pop(f, None)\n    return _canonical_yaml_sha256(stripped)\n\
      \n\n# Required pre-seal fields (keys that must exist in the packet).\n_REQUIRED_FIELDS\
      \ = (\"iteration_id\", \"reviewer_id\", \"findings\")\n# pass_id or pass_label\
      \ -- at least one must be present.\n_PASS_LABEL_FIELDS = (\"pass_id\", \"pass_label\"\
      )\n\n\ndef _now_utc() -> str:\n    return (\n        datetime.now(timezone.utc)\n\
      \        .replace(microsecond=0)\n        .isoformat()\n        .replace(\"\
      +00:00\", \"Z\")\n    )\n\n\ndef _now_utc_date() -> str:\n    return datetime.now(timezone.utc).strftime(\"\
      %Y-%m-%d\")\n\n\ndef _sanitize_for_filename(value: str) -> str:\n    \"\"\"\
      iteration-seal-archive-collision-fix: make a pass_id safe to embed\n    in an\
      \ archive filename without changing the raw pass_id used in the\n    index entry\
      \ or packet body.\n\n    Replaces every character outside [A-Za-z0-9._-] with\
      \ '-' and\n    collapses runs of '-'. Empty / all-hostile input falls back to\n\
      \    'pass' so the filename never degenerates to just the suffix.\n    pass_id\
      \ values are conventionally already filesystem-safe\n    (e.g. 'codex-iter0044-2-pass1');\
      \ this guard only matters for\n    pathological ids containing slashes, colons,\
      \ spaces, etc.\n    \"\"\"\n    import re\n    cleaned = re.sub(r\"[^A-Za-z0-9._-]\"\
      , \"-\", value or \"\")\n    cleaned = re.sub(r\"-{2,}\", \"-\", cleaned).strip(\"\
      -\")\n    return cleaned or \"pass\"\n\n\nSCHEMA = {\n    \"name\": \"review.write_and_seal\"\
      ,\n    \"description\": (\n        \"Seal a review packet and register it in\
      \ the archive index. \"\n        \"Computes packet_sha256 (self-hash exception:\
      \ hashes packet sans that field), \"\n        \"writes atomically to \"\n  \
      \      \"consensus-state/archive/review-passes/<date>-<iter>-<reviewer>-<pass_id>-pass.yaml\
      \ \"\n        \"(iteration-seal-archive-collision-fix: pass_id added so multi-pass\
      \ \"\n        \"same-reviewer seals do not collide; pass_id sanitized for the\
      \ \"\n        \"filename, raw value preserved in index/body), \"\n        \"\
      updates index.yaml, and appends a review_returned_and_sealed audit event. \"\
      \n        \"An exact re-seal (same pass_id + same packet_sha256) is an idempotent\
      \ \"\n        \"success ({idempotent: true, index_updated: false}) with an on-disk\
      \ \"\n        \"integrity guard. Only authorized writer for review packets \"\
      \n        \"post-Phase-0 sealing.\"\n    ),\n    \"input_schema\": {\n     \
      \   \"type\": \"object\",\n        \"properties\": {\n            \"iteration_id\"\
      : {\n                \"type\": \"string\",\n                \"description\"\
      : \"Iteration identifier (e.g. 'iteration-0006').\",\n            },\n     \
      \       \"reviewer_id\": {\n                \"type\": \"string\",\n        \
      \        \"description\": \"'codex' | 'claude' or other free string.\",\n  \
      \          },\n            \"pass_id\": {\n                \"type\": \"string\"\
      ,\n                \"description\": \"Unique pass identifier (e.g. 'iteration-0006-pass-a');\
      \ enforced via index.\",\n            },\n            \"packet\": {\n      \
      \          \"type\": \"object\",\n                \"description\": \"Full review\
      \ packet dict, YAML-serializable.\",\n            },\n        },\n        \"\
      required\": [\"iteration_id\", \"reviewer_id\", \"pass_id\", \"packet\"],\n\
      \        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n\
      \        \"type\": \"object\",\n        \"description\": (\n            \"Success:\
      \ {sealed_path, packet_sha256, index_updated, \"\n            \"audit_event_id,\
      \ [idempotent]}. On an exact idempotent re-seal, \"\n            \"index_updated\
      \ is false, audit_event_id is \"\n            \"'skipped_idempotent_reseal',\
      \ and idempotent is true. \"\n            \"Failure: {error, ...} where error\
      \ is one of: \"\n            \"packet_path_collision | index_collision | missing_required_field\
      \ | \"\n            \"invalid_yaml | audit_write_failed | idempotent_target_missing\
      \ | \"\n            \"idempotent_target_unreadable | idempotent_target_integrity_mismatch.\"\
      \n        ),\n        \"oneOf\": [\n            {\n                \"title\"\
      : \"success\",\n                \"type\": \"object\",\n                \"properties\"\
      : {\n                    \"sealed_path\": {\"type\": \"string\"},\n        \
      \            \"packet_sha256\": {\"type\": \"string\"},\n                  \
      \  \"index_updated\": {\"type\": \"boolean\"},\n                    \"audit_event_id\"\
      : {\"type\": \"string\"},\n                    # iteration-seal-archive-collision-fix:\
      \ present and true\n                    # only on an exact idempotent re-seal.\n\
      \                    \"idempotent\": {\"type\": \"boolean\"},\n            \
      \    },\n                \"required\": [\"sealed_path\", \"packet_sha256\",\
      \ \"index_updated\", \"audit_event_id\"],\n            },\n            {\n \
      \               \"title\": \"failure\",\n                \"type\": \"object\"\
      ,\n                \"properties\": {\n                    \"error\": {\n   \
      \                     \"type\": \"string\",\n                        \"enum\"\
      : [\n                            \"packet_path_collision\",\n              \
      \              \"index_collision\",\n                            \"missing_required_field\"\
      ,\n                            \"invalid_yaml\",\n                         \
      \   \"audit_write_failed\",\n                            # iteration-seal-archive-collision-fix:\n\
      \                            # idempotent-path integrity guard errors.\n   \
      \                         \"idempotent_target_missing\",\n                 \
      \           \"idempotent_target_unreadable\",\n                            \"\
      idempotent_target_integrity_mismatch\",\n                        ],\n      \
      \              },\n                    \"field\": {\"type\": [\"string\", \"\
      null\"]},\n                    \"detail\": {\"type\": [\"string\", \"null\"\
      ]},\n                },\n                \"required\": [\"error\"],\n      \
      \      },\n        ],\n    },\n}\n\n\ndef handle(\n    iteration_id: str,\n\
      \    reviewer_id: str,\n    pass_id: str,\n    packet: dict,\n) -> dict:\n \
      \   \"\"\"Seal a review packet, write it to the archive, update the index.\n\
      \n    Returns:\n      Success: {sealed_path, packet_sha256, index_updated, audit_event_id}\n\
      \        plus, on an exact idempotent re-seal (same pass_id + same\n       \
      \ packet_sha256): index_updated=False,\n        audit_event_id='skipped_idempotent_reseal',\
      \ idempotent=True,\n        and sealed_path is the EXISTING recorded archive\
      \ path (which\n        may use the pre-iteration-seal-archive-collision-fix\
      \ 3-token\n        scheme — the index is the resolution source of truth).\n\
      \      Failure: {error: <code>, ...}\n\n    Failure codes:\n      missing_required_field:\
      \ packet lacks a required pre-seal field; field: <name>\n      packet_path_collision:\
      \ deterministic target path already exists with\n        no matching pass_id\
      \ in the index (defense-in-depth backstop;\n        unreachable in normal flow\
      \ now that the filename carries pass_id)\n      index_collision: pass_id already\
      \ exists in index with a different packet_sha256\n      invalid_yaml: packet\
      \ is not YAML-serializable\n      audit_write_failed: packet+index written but\
      \ audit event failed; requires operator\n      idempotent_target_missing: pass_id+sha\
      \ match the index but the\n        recorded archive file is gone (iteration-seal-archive-collision-fix)\n\
      \      idempotent_target_unreadable: recorded archive file exists but\n    \
      \    cannot be parsed (iteration-seal-archive-collision-fix)\n      idempotent_target_integrity_mismatch:\
      \ index sha matches the new\n        packet but the on-disk archive hashes differently\
      \ — the sealed\n        file may be tampered (iteration-seal-archive-collision-fix)\n\
      \    \"\"\"\n    # --- Step 1: validate YAML serializability ---\n    try:\n\
      \        yaml.safe_dump(packet)\n    except Exception as exc:\n        return\
      \ {\"error\": \"invalid_yaml\", \"detail\": str(exc)}\n\n    # --- Step 2: validate\
      \ required pre-seal fields ---\n    for field in _REQUIRED_FIELDS:\n       \
      \ if field not in packet:\n            return {\"error\": \"missing_required_field\"\
      , \"field\": field}\n\n    # pass_id OR pass_label must be present\n    if not\
      \ any(f in packet for f in _PASS_LABEL_FIELDS):\n        return {\"error\":\
      \ \"missing_required_field\", \"field\": \"pass_id or pass_label\"}\n\n    #\
      \ packet.iteration_id must match the parameter\n    if packet.get(\"iteration_id\"\
      ) != iteration_id:\n        return {\n            \"error\": \"missing_required_field\"\
      ,\n            \"field\": \"iteration_id\",\n            \"detail\": (\n   \
      \             f\"packet.iteration_id={packet.get('iteration_id')!r} \"\n   \
      \             f\"does not match parameter iteration_id={iteration_id!r}\"\n\
      \            ),\n        }\n\n    # packet.reviewer_id must match the parameter\n\
      \    if packet.get(\"reviewer_id\") != reviewer_id:\n        return {\n    \
      \        \"error\": \"missing_required_field\",\n            \"field\": \"reviewer_id\"\
      ,\n            \"detail\": (\n                f\"packet.reviewer_id={packet.get('reviewer_id')!r}\
      \ \"\n                f\"does not match parameter reviewer_id={reviewer_id!r}\"\
      \n            ),\n        }\n\n    # packet.pass_id (if present) must match\
      \ the parameter\n    # (iteration-seal-archive-collision-fix, codex-sealfix-audit-3\n\
      \    # finding): symmetric with the iteration_id / reviewer_id guards\n    #\
      \ above. Now that pass_id determines the archive FILENAME, the\n    # index\
      \ `id`, AND is recorded in the sealed body, a divergence\n    # between the\
      \ embedded pass_id and the parameter would make the\n    # sealed artifact's\
      \ self-described identity disagree with its\n    # filename + index entry —\
      \ a provenance inconsistency. The packet\n    # may legitimately carry only\
      \ `pass_label` (no `pass_id`); only\n    # enforce when an explicit packet.pass_id\
      \ is present.\n    if \"pass_id\" in packet and packet.get(\"pass_id\") != pass_id:\n\
      \        return {\n            \"error\": \"missing_required_field\",\n    \
      \        \"field\": \"pass_id\",\n            \"detail\": (\n              \
      \  f\"packet.pass_id={packet.get('pass_id')!r} \"\n                f\"does not\
      \ match parameter pass_id={pass_id!r}\"\n            ),\n        }\n\n    #\
      \ --- Step 3: stamp seal provenance ---\n    # Note: pre_canonical_pin_marker\
      \ (spec sec ~1517) is for HISTORICAL pre-v1.7.4\n    # packets only -- it documents\
      \ that an older hash predates the canonical-yaml\n    # convention. Modern T6\
      \ packets use sealed_at_utc instead. If a caller passed\n    # in a historical\
      \ packet that already has pre_canonical_pin_marker, preserve it;\n    # we never\
      \ add it to new packets.\n    packet = dict(packet)  # shallow copy\n    # iteration-seal-archive-collision-fix\
      \ (codex-sealfix-audit-4 medium\n    # finding): a pass-label-only packet carried\
      \ no pass_id in its body,\n    # so the sealed artifact did not self-record\
      \ the canonical pass\n    # identity that now determines its filename + index\
      \ entry. Stamp the\n    # pass_id parameter into the body so the sealed packet\
      \ always\n    # self-describes its pass identity. The Step-2 guard above already\n\
      \    # rejected a body pass_id that DISAGREES with the parameter, so this\n\
      \    # only fills an absent value (never overwrites a conflicting one).\n  \
      \  packet.setdefault(\"pass_id\", pass_id)\n    if \"sealed_at_utc\" not in\
      \ packet:\n        packet[\"sealed_at_utc\"] = _now_utc()\n\n    # --- Step\
      \ 4: self-hash exception ---\n    # Hash the packet WITHOUT the packet_sha256\
      \ field (circular dependency prevention).\n    packet_for_hash = copy.deepcopy(packet)\n\
      \    packet_for_hash.pop(\"packet_sha256\", None)\n    packet_sha256 = _canonical_yaml_sha256(packet_for_hash)\n\
      \n    # Insert computed hash into the working packet dict.\n    packet = dict(packet)\n\
      \    packet[\"packet_sha256\"] = packet_sha256\n\n    # --- Step 5: deterministic\
      \ path ---\n    # iteration-seal-archive-collision-fix (workflow A converged\
      \ plan,\n    # weighted-synthesis; codex+gemini majority on the 4-token scheme):\n\
      \    # the archive filename now includes pass_id, the SAME canonical\n    #\
      \ uniqueness key the index keys on (Step 6 below). Before this fix\n    # the\
      \ filename keyed on reviewer_id only, so re-using a reviewer_id\n    # across\
      \ passes produced a hard packet_path_collision BEFORE the\n    # pass_id-aware\
      \ index logic ever ran. test_contributors.py:135's\n    # docstring (\"filename\
      \ must contain iteration_id + reviewer_id +\n    # pass_id tokens\") documents\
      \ this 4-token scheme as the intended\n    # contract; the implementation had\
      \ silently regressed to 3 tokens\n    # at/before extraction. pass_id is sanitized\
      \ for filesystem-hostile\n    # characters in the FILENAME only; the raw pass_id\
      \ is preserved\n    # verbatim in the index entry and packet body.\n    date_str\
      \ = _now_utc_date()\n    safe_pass_id = _sanitize_for_filename(pass_id)\n  \
      \  filename = f\"{date_str}-{iteration_id}-{reviewer_id}-{safe_pass_id}-pass.yaml\"\
      \n    _archive = archive_dir()\n    _index = index_path()\n    sealed_path =\
      \ _archive / filename\n    _repo = project_root()\n\n    # --- Step 6: index\
      \ lookup FIRST (reordered ahead of the path guard) ---\n    # Per the converged\
      \ plan: the pass_id-aware idempotency check must\n    # run BEFORE the path-exists\
      \ guard so an exact re-seal (same pass_id,\n    # same content hash) is an idempotent\
      \ SUCCESS rather than a hard\n    # packet_path_collision. This is what the\
      \ prior line-272 comment\n    # always intended (\"Same hash -- idempotent\"\
      ) but the old ordering\n    # defeated it.\n    _archive.mkdir(parents=True,\
      \ exist_ok=True)\n    if _index.exists():\n        index_raw = _index.read_bytes()\n\
      \        index_data = yaml.safe_load(index_raw) or {}\n    else:\n        index_data\
      \ = {}\n\n    # iteration-seal-archive-collision-fix (codex-sealfix-audit-4\
      \ HIGH\n    # finding): idempotency is judged on CONTENT IDENTITY, not on the\n\
      \    # timestamped packet_sha256. A re-dispatch builds a fresh packet\n    #\
      \ with no sealed_at_utc; Step 3 stamps a new timestamp, so its\n    # packet_sha256\
      \ necessarily differs from the originally-sealed one\n    # even when the substantive\
      \ content is identical. Comparing\n    # content-identity (volatile seal-provenance\
      \ stripped) of the\n    # INCOMING packet against the actual ON-DISK archived\
      \ packet makes\n    # an exact re-seal an idempotent success regardless of seal\
      \ time,\n    # and a genuine different-content reuse of the pass_id a real\n\
      \    # index_collision. We read the on-disk file (not the possibly-stale\n \
      \   # index sha) so the decision reflects the true archived artifact.\n    incoming_identity\
      \ = _content_identity_sha256(packet)\n    passes_list: list = index_data.get(\"\
      passes\", [])\n    for entry in passes_list:\n        if entry.get(\"id\") ==\
      \ pass_id:\n            existing_rel = entry.get(\"path\")\n            existing_abs\
      \ = (_repo / existing_rel) if existing_rel else None\n            if existing_abs\
      \ is None or not existing_abs.exists():\n                return {\n        \
      \            \"error\": \"idempotent_target_missing\",\n                   \
      \ \"detail\": (\n                        f\"pass_id={pass_id!r} is in the index\
      \ but its recorded \"\n                        f\"archive file is missing: {existing_rel!r}\"\
      \n                    ),\n                }\n            try:\n            \
      \    on_disk = yaml.safe_load(existing_abs.read_text(encoding=\"utf-8\"))\n\
      \            except Exception as exc:\n                return {\n          \
      \          \"error\": \"idempotent_target_unreadable\",\n                  \
      \  \"detail\": f\"{existing_rel!r}: {type(exc).__name__}: {exc}\",\n       \
      \         }\n            # _content_identity_sha256 handles a non-mapping on_disk\n\
      \            # (tampered archive that still parses as valid YAML) via a\n  \
      \          # sentinel that cannot equal a real packet's identity —\n       \
      \     # so this neither crashes (codex-sealfix-audit-4 medium\n            #\
      \ finding) nor falsely reports idempotent success.\n            on_disk_identity\
      \ = _content_identity_sha256(on_disk)\n            if on_disk_identity != incoming_identity:\n\
      \                # Same pass_id, substantively different content. If the\n \
      \               # on-disk archive is a non-mapping it is corrupt/tampered\n\
      \                # rather than a legitimate prior pass — report that\n     \
      \           # distinctly so an operator can tell a re-use conflict\n       \
      \         # from a damaged archive.\n                if not isinstance(on_disk,\
      \ dict):\n                    return {\n                        \"error\": \"\
      idempotent_target_integrity_mismatch\",\n                        \"detail\"\
      : (\n                            f\"pass_id={pass_id!r}: the recorded archive\
      \ \"\n                            f\"{existing_rel!r} is not a YAML mapping\
      \ \"\n                            f\"({type(on_disk).__name__}) — the sealed\
      \ file \"\n                            f\"may be tampered or truncated.\"\n\
      \                        ),\n                    }\n                return {\n\
      \                    \"error\": \"index_collision\",\n                    \"\
      detail\": (\n                        f\"pass_id={pass_id!r} already sealed with\
      \ substantively \"\n                        f\"different content (content-identity\
      \ \"\n                        f\"{on_disk_identity[:12]}… vs incoming \"\n \
      \                       f\"{incoming_identity[:12]}…) at {existing_rel!r}\"\n\
      \                    ),\n                }\n            # Content-identical\
      \ → idempotent re-seal. Return SUCCESS\n            # describing the ACTUAL\
      \ archived artifact: the existing\n            # recorded path + the originally-sealed\
      \ packet_sha256 from\n            # the index entry (NOT the freshly-recomputed\
      \ incoming hash,\n            # which carries a new sealed_at_utc and would\
      \ not match what\n            # is on disk). sealed_path + packet_sha256 therefore\
      \ stay\n            # mutually consistent.\n            return {\n         \
      \       \"sealed_path\": str(existing_abs),\n                \"packet_sha256\"\
      : entry.get(\"packet_sha256\", \"\"),\n                \"index_updated\": False,\n\
      \                \"audit_event_id\": \"skipped_idempotent_reseal\",\n      \
      \          \"idempotent\": True,\n            }\n\n    # --- Step 7: path collision\
      \ guard (defense-in-depth backstop) ---\n    # With the pass_id now in the filename\
      \ AND the index check above,\n    # this should be unreachable for legitimate\
      \ flows. It remains as a\n    # last-resort guard against a genuine filename\
      \ collision (e.g. a\n    # hand-placed file or a pass_id that sanitizes to a\
      \ name already\n    # present without a matching index entry). Distinct detail\
      \ string\n    # so this case is diagnosable separately from the old behavior.\n\
