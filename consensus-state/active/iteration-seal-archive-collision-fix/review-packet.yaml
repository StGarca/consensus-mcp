    consensus_mcp/tests/test_seal_collision_fix.py: "\"\"\"iteration-seal-archive-collision-fix:\
      \ tests for the T6 seal\narchive-filename collision fix.\n\nDefect: `review_write_and_seal.handle`\
      \ built the archive filename from\n`reviewer_id` only, so re-using a reviewer_id\
      \ across passes produced a\nhard `packet_path_collision` BEFORE the pass_id-aware\
      \ index logic ran.\nConverged fix (workflow A, weighted-synthesis; codex+gemini\
      \ majority):\n4-token filename including pass_id; index pass_id+sha check reordered\n\
      ahead of the path-exists guard; exact re-seal is an idempotent success\nwith\
      \ an on-disk integrity guard.\n\"\"\"\nfrom __future__ import annotations\n\n\
      import yaml\nimport pytest\n\nfrom consensus_mcp.tools import review_write_and_seal\
      \ as t6\nfrom consensus_mcp.tools.review_write_and_seal import SCHEMA, _sanitize_for_filename\n\
      \n\n# ---------- output_schema contract (codex-sealfix-audit-2 finding) ----------\n\
      # Workflow B post-review caught that the new idempotent integrity error\n# codes\
      \ + the `idempotent` success field were returned by handle() but\n# missing\
      \ from the registered output_schema. This test pins the contract\n# so the drift\
      \ cannot silently regress.\n\ndef _failure_enum():\n    for branch in SCHEMA[\"\
      output_schema\"][\"oneOf\"]:\n        if branch.get(\"title\") == \"failure\"\
      :\n            return set(branch[\"properties\"][\"error\"][\"enum\"])\n   \
      \ raise AssertionError(\"no failure branch in output_schema\")\n\n\ndef _success_props():\n\
      \    for branch in SCHEMA[\"output_schema\"][\"oneOf\"]:\n        if branch.get(\"\
      title\") == \"success\":\n            return branch[\"properties\"]\n    raise\
      \ AssertionError(\"no success branch in output_schema\")\n\n\ndef test_schema_failure_enum_includes_idempotent_error_codes():\n\
      \    enum = _failure_enum()\n    for code in (\n        \"idempotent_target_missing\"\
      ,\n        \"idempotent_target_unreadable\",\n        \"idempotent_target_integrity_mismatch\"\
      ,\n    ):\n        assert code in enum, f\"{code!r} missing from output_schema\
      \ failure enum\"\n\n\ndef test_schema_success_branch_documents_idempotent_field():\n\
      \    assert \"idempotent\" in _success_props(), (\n        \"output_schema success\
      \ branch must document the `idempotent` field\"\n    )\n\n\ndef test_every_handle_error_code_is_in_schema_enum():\n\
      \    \"\"\"Every error code the implementation can return must be in the\n \
      \   schema enum (prevents the exact drift codex flagged).\"\"\"\n    import\
      \ inspect\n    src = inspect.getsource(t6.handle)\n    import re\n    returned\
      \ = set(re.findall(r'\"error\":\\s*\"([a-z_]+)\"', src))\n    enum = _failure_enum()\n\
      \    missing = returned - enum\n    assert not missing, f\"handle() returns\
      \ error codes absent from schema enum: {missing}\"\n\n\ndef _packet(iteration_id,\
      \ reviewer_id, pass_id, findings=None):\n    return {\n        \"iteration_id\"\
      : iteration_id,\n        \"reviewer_id\": reviewer_id,\n        \"pass_id\"\
      : pass_id,\n        \"findings\": findings if findings is not None else [],\n\
      \        \"goal_satisfied\": True,\n        \"blocking_objections\": [],\n \
      \   }\n\n\n@pytest.fixture\ndef repo(tmp_path, monkeypatch):\n    # _paths re-reads\
      \ env on every call (lazy resolvers) — see memory\n    # feedback_monkeypatch_getattr_pollution:\
      \ use setenv, not setattr.\n    monkeypatch.setenv(\"CONSENSUS_MCP_REPO_ROOT\"\
      , str(tmp_path))\n    return tmp_path\n\n\n# ---------- _sanitize_for_filename\
      \ ----------\n\ndef test_sanitize_passthrough_for_safe_id():\n    assert _sanitize_for_filename(\"\
      codex-iter0044-2-pass1\") == \"codex-iter0044-2-pass1\"\n\n\ndef test_sanitize_replaces_hostile_chars():\n\
      \    assert _sanitize_for_filename(\"gemini/iter:0012 pass2\") == \"gemini-iter-0012-pass2\"\
      \n\n\ndef test_sanitize_collapses_runs_and_strips():\n    assert _sanitize_for_filename(\"\
      --a///b--\") == \"a-b\"\n\n\ndef test_sanitize_all_hostile_falls_back():\n \
      \   assert _sanitize_for_filename(\"///\") == \"pass\"\n    assert _sanitize_for_filename(\"\
      \") == \"pass\"\n\n\n# ---------- pass_id body/param consistency (codex-sealfix-audit-3)\
      \ ----------\n\ndef test_packet_pass_id_must_match_parameter(repo):\n    \"\"\
      \"Symmetric with the iteration_id/reviewer_id guards: an embedded\n    packet.pass_id\
      \ that disagrees with the pass_id parameter is rejected\n    so the sealed body\
      \ cannot contradict the filename + index identity.\"\"\"\n    p = _packet(\"\
      iter-id\", \"rev\", \"rev-pass1\")\n    p[\"pass_id\"] = \"rev-pass-DIFFERENT\"\
      \n    r = t6.handle(\"iter-id\", \"rev\", \"rev-pass1\", p)\n    assert r.get(\"\
      error\") == \"missing_required_field\", r\n    assert r.get(\"field\") == \"\
      pass_id\", r\n\n\ndef test_packet_without_pass_id_but_with_pass_label_is_allowed(repo):\n\
      \    \"\"\"The packet may legitimately carry only pass_label; the guard must\n\
      \    NOT fire when packet.pass_id is absent.\"\"\"\n    p = {\n        \"iteration_id\"\
      : \"iter-id\",\n        \"reviewer_id\": \"rev\",\n        \"pass_label\": \"\
      round-2\",  # no pass_id key in the body\n        \"findings\": [],\n      \
      \  \"goal_satisfied\": True,\n        \"blocking_objections\": [],\n    }\n\
      \    r = t6.handle(\"iter-id\", \"rev\", \"rev-pass1\", p)\n    assert \"error\"\
      \ not in r, r\n    # codex-sealfix-audit-4 medium finding: the sealed body must\
      \ now\n    # self-record the canonical pass_id even for pass-label-only input.\n\
      \    import yaml as _yaml\n    from pathlib import Path\n    sealed = _yaml.safe_load(Path(r[\"\
      sealed_path\"]).read_text(encoding=\"utf-8\"))\n    assert sealed.get(\"pass_id\"\
      ) == \"rev-pass1\", sealed\n\n\ndef test_matching_packet_pass_id_passes(repo):\n\
      \    p = _packet(\"iter-id\", \"rev\", \"rev-pass1\")  # _packet sets pass_id\
      \ == param\n    r = t6.handle(\"iter-id\", \"rev\", \"rev-pass1\", p)\n    assert\
      \ \"error\" not in r, r\n\n\n# ---------- filename scheme (Q1-b: 4 tokens incl\
      \ pass_id) ----------\n\ndef test_filename_contains_all_four_tokens(repo):\n\
      \    r = t6.handle(\"iter-x\", \"codex-rev\", \"codex-rev-pass1\", _packet(\"\
      iter-x\", \"codex-rev\", \"codex-rev-pass1\"))\n    assert \"error\" not in\
      \ r, r\n    name = r[\"sealed_path\"].replace(\"\\\\\", \"/\").split(\"/\")[-1]\n\
      \    assert \"iter-x\" in name\n    assert \"codex-rev\" in name\n    assert\
      \ \"codex-rev-pass1\" in name\n    assert name.endswith(\"-pass.yaml\")\n\n\n\
      # ---------- the actual defect: same reviewer_id, distinct pass_ids ----------\n\
      \ndef test_same_reviewer_distinct_pass_ids_no_collision(repo):\n    \"\"\"The\
      \ triggering scenario: same reviewer_id re-used across passes\n    must NOT\
      \ collide (this is exactly gemini-iteration-0012-2 pass1 vs\n    pass2 from\
      \ the report).\"\"\"\n    rid = \"gemini-iteration-0012-2\"\n    r1 = t6.handle(\"\
      iter-0012\", rid, f\"{rid}-pass1\", _packet(\"iter-0012\", rid, f\"{rid}-pass1\"\
      , findings=[{\"a\": 1}]))\n    r2 = t6.handle(\"iter-0012\", rid, f\"{rid}-pass2\"\
      , _packet(\"iter-0012\", rid, f\"{rid}-pass2\", findings=[{\"b\": 2}]))\n  \
      \  assert \"error\" not in r1, r1\n    assert \"error\" not in r2, r2\n    assert\
      \ r1[\"sealed_path\"] != r2[\"sealed_path\"]\n\n\n# ---------- idempotency (Q2-a)\
      \ ----------\n\ndef test_exact_reseal_is_idempotent_success(repo):\n    p =\
      \ _packet(\"iter-id\", \"rev\", \"rev-pass1\")\n    r1 = t6.handle(\"iter-id\"\
      , \"rev\", \"rev-pass1\", p)\n    assert \"error\" not in r1, r1\n    r2 = t6.handle(\"\
      iter-id\", \"rev\", \"rev-pass1\", _packet(\"iter-id\", \"rev\", \"rev-pass1\"\
      ))\n    assert \"error\" not in r2, r2\n    assert r2.get(\"idempotent\") is\
      \ True\n    assert r2[\"index_updated\"] is False\n    assert r2[\"sealed_path\"\
      ] == r1[\"sealed_path\"]\n    assert r2[\"packet_sha256\"] == r1[\"packet_sha256\"\
      ]\n\n\ndef test_idempotent_reseal_is_timestamp_independent(repo):\n    \"\"\"\
      codex-sealfix-audit-4 HIGH finding: a re-dispatch builds a fresh\n    packet\
      \ (no sealed_at_utc) → Step 3 stamps a NEW timestamp → its\n    packet_sha256\
      \ differs from the original. Idempotency must STILL be\n    detected (content\
      \ identity), not misclassified as index_collision.\n    Simulate the timestamp/hash\
      \ divergence by rewriting the on-disk\n    archive's volatile seal-provenance\
      \ to clearly different values; the\n    content-identity comparison must ignore\
      \ them.\"\"\"\n    import yaml as _yaml\n    from pathlib import Path\n    r1\
      \ = t6.handle(\"iter-id\", \"rev\", \"rev-pass1\", _packet(\"iter-id\", \"rev\"\
      , \"rev-pass1\"))\n    assert \"error\" not in r1, r1\n    archived = _yaml.safe_load(Path(r1[\"\
      sealed_path\"]).read_text(encoding=\"utf-8\"))\n    archived[\"sealed_at_utc\"\
      ] = \"1999-01-01T00:00:00Z\"        # clearly different seal time\n    archived[\"\
      packet_sha256\"] = \"deadbeef\" * 8                # clearly different self-hash\n\
      \    Path(r1[\"sealed_path\"]).write_text(_yaml.safe_dump(archived), encoding=\"\
      utf-8\")\n    r2 = t6.handle(\"iter-id\", \"rev\", \"rev-pass1\", _packet(\"\
      iter-id\", \"rev\", \"rev-pass1\"))\n    assert \"error\" not in r2, r2\n  \
      \  assert r2.get(\"idempotent\") is True, r2\n    assert r2[\"index_updated\"\
      ] is False\n\n\ndef test_idempotent_integrity_guard_detects_non_mapping_archive(repo):\n\
      \    \"\"\"codex-sealfix-audit-4 medium finding: a tampered archive that\n \
      \   still parses as valid non-mapping YAML (a list/scalar) must NOT\n    crash\
      \ the integrity path and must report a distinct integrity\n    error rather\
      \ than a false success.\"\"\"\n    from pathlib import Path\n    r1 = t6.handle(\"\
      iter-id\", \"rev\", \"rev-pass1\", _packet(\"iter-id\", \"rev\", \"rev-pass1\"\
      ))\n    assert \"error\" not in r1, r1\n    Path(r1[\"sealed_path\"]).write_text(\"\
      - just\\n- a\\n- list\\n\", encoding=\"utf-8\")\n    r2 = t6.handle(\"iter-id\"\
      , \"rev\", \"rev-pass1\", _packet(\"iter-id\", \"rev\", \"rev-pass1\"))\n  \
      \  assert r2.get(\"error\") == \"idempotent_target_integrity_mismatch\", r2\n\
      \n\ndef test_idempotent_target_missing_when_archive_deleted(repo):\n    from\
      \ pathlib import Path\n    r1 = t6.handle(\"iter-id\", \"rev\", \"rev-pass1\"\
      , _packet(\"iter-id\", \"rev\", \"rev-pass1\"))\n    assert \"error\" not in\
      \ r1, r1\n    Path(r1[\"sealed_path\"]).unlink()\n    r2 = t6.handle(\"iter-id\"\
      , \"rev\", \"rev-pass1\", _packet(\"iter-id\", \"rev\", \"rev-pass1\"))\n  \
      \  assert r2.get(\"error\") == \"idempotent_target_missing\", r2\n\n\n# ----------\
      \ index_collision unchanged (Q2: same pass_id, diff content) ----------\n\n\
      def test_same_pass_id_different_content_is_index_collision(repo):\n    t6.handle(\"\
      iter-id\", \"rev\", \"rev-pass1\", _packet(\"iter-id\", \"rev\", \"rev-pass1\"\
