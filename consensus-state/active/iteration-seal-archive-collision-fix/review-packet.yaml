      , _packet(\"iter-id\", \"rev\", \"rev-pass1\", findings=[{\"y\": 2}]))\n   \
      \ assert r2.get(\"error\") == \"index_collision\", r2\n\n\n# ---------- hostile\
      \ pass_id sanitization ----------\n\ndef test_hostile_pass_id_sanitized_in_filename_raw_in_index(repo,\
      \ tmp_path):\n    hostile = \"rev/iter:99 pass1\"\n    r = t6.handle(\"iter-h\"\
      , \"rev\", hostile, _packet(\"iter-h\", \"rev\", hostile))\n    assert \"error\"\
      \ not in r, r\n    name = r[\"sealed_path\"].replace(\"\\\\\", \"/\").split(\"\
      /\")[-1]\n    assert \"/\" not in name and \":\" not in name and \" \" not in\
      \ name\n    # Raw pass_id preserved verbatim in the index entry.\n    index_yaml\
      \ = (tmp_path / \"consensus-state\" / \"archive\" / \"review-passes\" / \"index.yaml\"\
      )\n    if not index_yaml.exists():\n        # _paths may locate the index elsewhere\
      \ under repo root; find it.\n        matches = list(tmp_path.rglob(\"index.yaml\"\
      ))\n        assert matches, \"index.yaml not written\"\n        index_yaml =\
      \ matches[0]\n    idx = yaml.safe_load(index_yaml.read_text(encoding=\"utf-8\"\
      ))\n    ids = [e.get(\"id\") for e in idx.get(\"passes\", [])]\n    assert hostile\
      \ in ids, f\"raw pass_id not preserved in index: {ids}\"\n"
    consensus_mcp/tests/test_contributors.py: "\"\"\"Unit tests for consensus_mcp.contributors.*\
      \ — adapter layer.\n\nPer iter-0016b: test the abstract interface + fake adapters\
      \ + ClaudeAdapter's\ncallback contract + codex/gemini adapter argv translation\
      \ (without spawning\nreal subprocesses).\n\"\"\"\nfrom __future__ import annotations\n\
      \nfrom pathlib import Path\nfrom unittest.mock import patch\n\nimport pytest\n\
      import yaml\n\nfrom consensus_mcp.contributors import (\n    PHASE_CONVERGE,\n\
      \    PHASE_PROPOSE,\n    PHASE_REVIEW,\n    ContributorAdapter,\n    DispatchError,\n\
      \    SealedArtifact,\n)\nfrom consensus_mcp.contributors.base import (\n   \
      \ DispatchPacket,\n    FakeAlwaysApprove,\n    FakeAlwaysBlock,\n    FakeRaisesDispatchError,\n\
      )\nfrom consensus_mcp.contributors.claude import ClaudeAdapter\nfrom consensus_mcp.contributors.codex\
      \ import CodexAdapter\nfrom consensus_mcp.contributors.gemini import GeminiAdapter\n\
      \n\n# ---------- Phase constants ----------\n\ndef test_phase_constants():\n\
      \    assert PHASE_PROPOSE == \"propose\"\n    assert PHASE_REVIEW == \"review\"\
      \n    assert PHASE_CONVERGE == \"converge\"\n\n\n# ---------- FakeAlwaysApprove\
      \ / FakeAlwaysBlock ----------\n\ndef _make_packet(tmp_path: Path, phase: str\
      \ = PHASE_REVIEW) -> DispatchPacket:\n    iter_dir = tmp_path / \"iter-test\"\
      \n    iter_dir.mkdir(parents=True, exist_ok=True)\n    goal = iter_dir / \"\
      goal_packet.yaml\"\n    goal.write_text(\"pilot_id: iter-test\\n\", encoding=\"\
      utf-8\")\n    return DispatchPacket(\n        phase=phase,\n        contributor=\"\
      <test>\",\n        iteration_dir=iter_dir,\n        goal_packet_path=goal,\n\
      \        review_target_path=None,\n        reviewer_id=None,\n        pass_id=None,\n\
      \        timeout_seconds=60,\n        adapter_options=None,\n    )\n\n\ndef\
      \ test_fake_approve_returns_clean(tmp_path):\n    adapter = FakeAlwaysApprove()\n\
      \    packet = _make_packet(tmp_path, PHASE_REVIEW)\n    art = adapter.dispatch(packet)\n\
      \    assert art.contributor == \"fake-approve\"\n    assert art.phase == PHASE_REVIEW\n\
      \    assert art.parsed[\"goal_satisfied\"] is True\n    assert art.parsed[\"\
      blocking_objections\"] == []\n    assert art.sealed_path.exists()\n\n\ndef test_fake_block_returns_blocking_finding(tmp_path):\n\
      \    adapter = FakeAlwaysBlock()\n    packet = _make_packet(tmp_path, PHASE_REVIEW)\n\
      \    art = adapter.dispatch(packet)\n    assert art.parsed[\"goal_satisfied\"\
      ] is False\n    assert art.parsed[\"blocking_objections\"] == [\"fake-block-rev-001\"\
      ]\n\n\ndef test_fake_raise_raises_dispatch_error(tmp_path):\n    adapter = FakeRaisesDispatchError()\n\
      \    packet = _make_packet(tmp_path)\n    with pytest.raises(DispatchError):\n\
      \        adapter.dispatch(packet)\n\n\n# ---------- ContributorAdapter convenience\
      \ methods ----------\n\ndef test_propose_calls_dispatch_with_propose_phase(tmp_path):\n\
      \    adapter = FakeAlwaysApprove()\n    iter_dir = tmp_path / \"iter\"\n   \
      \ iter_dir.mkdir()\n    (iter_dir / \"goal.yaml\").write_text(\"pilot: x\\n\"\
      , encoding=\"utf-8\")\n    problem = tmp_path / \"problem.md\"\n    problem.write_text(\"\
      # challenge\\n\", encoding=\"utf-8\")\n    art = adapter.propose(iter_dir, iter_dir\
      \ / \"goal.yaml\", problem)\n    assert art.phase == PHASE_PROPOSE\n\n\ndef\
      \ test_review_calls_dispatch_with_review_phase(tmp_path):\n    adapter = FakeAlwaysApprove()\n\
      \    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"\
      goal.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    target = tmp_path\
      \ / \"target.yaml\"\n    target.write_text(\"k: v\\n\", encoding=\"utf-8\")\n\
      \    art = adapter.review(iter_dir, iter_dir / \"goal.yaml\", target)\n    assert\
      \ art.phase == PHASE_REVIEW\n\n\ndef test_converge_calls_dispatch_with_converge_phase(tmp_path):\n\
      \    adapter = FakeAlwaysApprove()\n    iter_dir = tmp_path / \"iter\"\n   \
      \ iter_dir.mkdir()\n    (iter_dir / \"goal.yaml\").write_text(\"pilot: x\\n\"\
      , encoding=\"utf-8\")\n    conv = tmp_path / \"convergence-packet.yaml\"\n \
      \   conv.write_text(\"k: v\\n\", encoding=\"utf-8\")\n    art = adapter.converge(iter_dir,\
      \ iter_dir / \"goal.yaml\", conv, round_number=1)\n    assert art.phase == PHASE_CONVERGE\n\
      \n\n# ---------- ClaudeAdapter ----------\n\ndef test_claude_without_callback_raises(tmp_path):\n\
      \    adapter = ClaudeAdapter()\n    packet = _make_packet(tmp_path)\n    with\
      \ pytest.raises(DispatchError, match=\"artifact_callback\"):\n        adapter.dispatch(packet)\n\
      \n\ndef test_claude_with_callback_seals_artifact(tmp_path):\n    \"\"\"ClaudeAdapter\
      \ now routes through T6 (codex-rev-001 round-1 fix); mock T6 in tests.\n\n \
      \   Archive filename must contain iteration_id + reviewer_id + pass_id tokens\n\
      \    (codex-rev-001 round-2 confinement check).\n    \"\"\"\n    def cb(packet):\n\
      \        return {\n            \"findings\": [],\n            \"goal_satisfied\"\
      : True,\n            \"goal_satisfied_rationale\": \"claude approves\",\n  \
      \          \"blocking_objections\": [],\n        }\n    def fake_t6(iteration_id,\
      \ reviewer_id, pass_id, packet):\n        # iteration-seal-archive-collision-fix:\
      \ 4-token filename\n        # (date, iteration_id, reviewer_id, pass_id) per\
