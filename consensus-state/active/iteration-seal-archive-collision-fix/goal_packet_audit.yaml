pilot_id: iteration-seal-archive-collision-fix-audit
workflow_mode: post-review
independence: visible-from-start
goal:
  summary: |
    Workflow B (post-review) audit of the implemented fix for the
    T6 seal `packet_path_collision` defect. Implementation follows
    the iteration-seal-archive-collision-fix converged plan
    (workflow A weighted-synthesis; codex + gemini + claude; no
    blocking objections).

    IMPLEMENTED (consensus_mcp/tools/review_write_and_seal.py):
      - Step 5 filename now 4-token:
        `{date}-{iteration_id}-{reviewer_id}-{safe_pass_id}-pass.yaml`
        (was 3-token, reviewer_id only). Restores the documented
        contract in test_contributors.py:135.
      - `_sanitize_for_filename`: [^A-Za-z0-9._-]→-, collapse runs,
        strip, fallback "pass". Applied to FILENAME only; raw
        pass_id preserved verbatim in index entry + packet body.
      - Steps 6/7 REORDERED: the index pass_id+sha lookup now runs
        BEFORE the path-exists guard. Exact re-seal (same pass_id,
        same packet_sha256) returns SUCCESS with `idempotent: true`,
        `index_updated: false`, and the EXISTING recorded path
        (scheme-agnostic — old-scheme archives still resolve).
      - Integrity guard on idempotent match: re-reads the on-disk
        archive, recomputes canonical sha; mismatch → distinct
        error `idempotent_target_integrity_mismatch` (also
        `idempotent_target_missing` / `_unreadable`). No false
        success on a tampered/truncated archive.
      - `index_collision` (same pass_id, different sha) unchanged.
      - path-exists guard retained as defense-in-depth backstop
        with a distinct detail string (unreachable in normal flow).
      - No migration of the 162 existing archives; reader
        (review_read_post_seal) is index-path-based and
        scheme-agnostic (verified pre-implementation).

    TESTS:
      - NEW consensus_mcp/tests/test_seal_collision_fix.py (12):
        sanitize behavior; 4-token filename; the exact
        gemini-iteration-0012-2 same-reviewer-distinct-pass
        scenario; idempotent success; integrity guard on tamper;
        index_collision unchanged; hostile pass_id sanitized in
        filename + raw in index.
      - test_contributors.py:147 + :223 fake_t6 helpers updated to
        the 4-token scheme (these are mocks; the docstring at :135
        already asserted the 4-token contract).
      - Full suite: 714 pass, 0 regressions (excluding the
        pre-existing test_dispatch_codex ordering flake +
        jsonschema-missing environmental issue, both predating
        this work).

    DEFERRED WITH STATED REASONS (recorded, not silently dropped):
      - superseded_by index annotation: 2/3 contributors scoped it
        out as beyond the minimal defect; file preservation alone
        already satisfies the report's audit-history requirement.
      - forensic scan of the 162 archives: blocked on an undefined
        remediation model for immutable sealed history.
      - index.yaml non-atomic read-modify-write race: pre-existing,
        orthogonal; separate hardening consult.

  question: |
    Audit the patch in the embedded review-target. For each:

    Q1 — Does the 4-token filename + reorder actually eliminate
    the collision for the report's scenario (same reviewer_id,
    distinct pass_ids), without breaking the index_collision
    semantics for genuine same-pass_id different-content
    conflicts?

    Q2 — Is the idempotency path correct and safe? Specifically:
    does the integrity guard close the "index says sealed but file
    differs" hole, and does returning the EXISTING recorded path
    (not the newly-computed 4-token name) correctly preserve
    backward-compat for re-seals of old-scheme archives?

    Q3 — Is `_sanitize_for_filename` sufficient? Any pass_id
    shape that still escapes it, produces an empty/degenerate
    name, or could make two distinct raw pass_ids collide to the
    same sanitized filename WITHOUT a matching index entry (i.e.
    falsely hit the defense-in-depth backstop or, worse, silently
    overwrite)? Note the index lookup uses the RAW pass_id so two
    raw ids sanitizing alike still get distinct index entries —
    confirm the filename path can't then clobber.

    Q4 — Backward-compat: confirm review_read_post_seal still
    resolves the 162 existing archives (index stores full relative
    path; reader never parses the filename). Any code path that
    DOES parse archive filenames and would break on the new
    scheme?

    Q5 — Are the deferrals legitimate (real blockers / convergence-
    scoped-out) or is anything well-defined being deferred without
    cause (no-deferral rule check)?

    Q8 — RE-AUDIT (pass 5) CONTEXT: codex-sealfix-audit-4
    raised 3 findings (1 high, 2 medium; no blocking objections):
      (H) "Idempotent re-seal is still wall-clock dependent
          because a fresh sealed_at_utc is stamped before
          hashing." RESOLVED: idempotency is now judged on
          CONTENT IDENTITY via new `_content_identity_sha256`
          which strips the volatile seal-provenance fields
          (`sealed_at_utc`, `packet_sha256`). The idempotency
          decision compares the incoming packet's content
          identity against the actual ON-DISK archived packet's
          content identity — timestamp/self-hash independent. A
          re-dispatch with a new seal time is now correctly an
          idempotent SUCCESS, not a false index_collision. The
          idempotent return now reports the EXISTING index
          entry's packet_sha256 (consistent with sealed_path),
          not the recomputed incoming hash.
      (M) "Integrity guard can crash on tampered archives that
          parse as valid non-mapping YAML." RESOLVED:
          `_content_identity_sha256` returns a non-colliding
          sentinel for non-mapping input (no .pop on a list);
          a non-mapping on-disk archive yields
          idempotent_target_integrity_mismatch, never a crash
          or false success.
      (M) "Pass-label-only packets do not preserve the raw
          pass_id in the sealed packet body." RESOLVED: Step 3
          now `packet.setdefault("pass_id", pass_id)` so the
          sealed body always self-records the canonical pass
          identity (the Step-2 guard still rejects a body
          pass_id that DISAGREES with the parameter, so this
          only fills an absent value).
    New/updated tests: timestamp-independent idempotency;
    non-mapping archive → integrity_mismatch (no crash);
    target-missing; pass-label body now carries pass_id.
    722 tests pass, 0 regressions. Confirm all 3 findings are
    fully resolved and no new contract gap was introduced by
    the content-identity redesign (esp.: does returning the
    index entry's packet_sha256 on the idempotent path remain
    consistent with sealed_path; does content-identity correctly
    treat genuinely-different content as index_collision).

    Q7 — RE-AUDIT (pass 4) CONTEXT: codex-sealfix-audit-3
    raised a medium finding — "handle() accepts a packet whose
    embedded pass_id differs from the pass_id parameter, so the
    sealed body can disagree with the filename and index
    identity" (goal_satisfied=False, no blocking objections).
    This pass addresses it: a symmetric guard now mirrors the
    existing iteration_id / reviewer_id parameter-vs-body checks
    — if `packet` carries an explicit `pass_id` that differs
    from the `pass_id` parameter, handle() returns
    {error: missing_required_field, field: pass_id}. The guard
    only fires when packet.pass_id is present (a pass_label-only
    packet is still accepted). 3 new tests cover: mismatch
    rejected, pass_label-only allowed, matching pass_id passes.
    720 tests pass, 0 regressions. Confirm this finding is fully
    resolved and the guard introduces no false-rejection of
    legitimate packets.

    Q6 — RE-AUDIT CONTEXT: codex-sealfix-audit-2 (prior pass)
    raised a medium finding — "Tool output schema omits the new
    idempotent integrity error codes returned by handle()" —
    goal_satisfied=False, no blocking objections. This pass
    addresses it: SCHEMA.output_schema failure enum now includes
    idempotent_target_missing / _unreadable /
    _integrity_mismatch; the success branch documents the
    `idempotent` field; the SCHEMA.description reflects the
    4-token path + idempotent semantics; the handle() docstring
    failure-codes list is updated; and 3 new schema-contract
    tests pin every handle() error code to the schema enum so
    the drift cannot silently regress. Confirm the finding is
    fully resolved and no new contract gap was introduced.

    Required: stance on Q1-Q5 + blocking_objections + any
    non-blocking findings. Approval = convergence; this ships as
    v1.14.9.
