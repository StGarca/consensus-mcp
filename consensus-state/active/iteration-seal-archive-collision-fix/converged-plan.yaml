iteration_id: iteration-seal-archive-collision-fix
converged_at_utc: '2026-05-15T15:00:00Z'
convergence_rule: weighted-synthesis
contributors_responsive: [claude, codex, gemini]
blocking_objections: []
all_substantive: true

q1_filename_scheme:
  claude: '(a) {date}-{iteration_id}-{pass_id}-pass.yaml (drop reviewer_id; pass_id embeds it by convention)'
  codex: '(b) keep reviewer_id AND add pass_id — for operator browsability'
  gemini: '(b) {date_str}-{iteration_id}-{reviewer_id}-{pass_id}-pass.yaml'
  weighted_synthesis: |
    ADOPT (b): `{date}-{iteration_id}-{reviewer_id}-{pass_id}-pass.yaml`.
    Codex + gemini majority (2/1). Decisive factors that overturn
    claude's (a): (1) the reviewer_id-embedded-in-pass_id convention
    is NOT enforced, so dropping reviewer_id risks illegible
    filenames for opaque pass_ids; (2) test_contributors.py:135's
    documented contract literally names all THREE tokens
    ("iteration_id + reviewer_id + pass_id") — (b) restores the
    documented contract exactly, (a) would only partially. Claude's
    Windows-path-length concern is real but a concern, not a
    blocker (iteration_ids are the long segment, not reviewer_id);
    mitigated by pass_id sanitization + accepted as a known
    trade-off.

q2_idempotency:
  weighted_synthesis: |
    ADOPT claude (a) — only substantive Q2 stance; uncontested.
    Codex's "preserve existing files; no deletion of void seals"
    is idempotency-compatible. Reorder so the index pass_id+sha
    lookup runs BEFORE the path-exists guard:
      - pass_id in index + same sha → SUCCESS + `idempotent: true`,
        return existing sealed_path
      - pass_id in index + different sha → index_collision
        (unchanged)
      - pass_id absent + path exists → defense-in-depth backstop
        (should be unreachable once filename includes pass_id)
    RISK MITIGATION (claude, uncontested): on idempotent match,
    re-verify the on-disk packet's sha still matches before
    returning success; if the file was tampered/truncated, surface
    a distinct integrity error rather than a false success.

q3_backward_compat:
  weighted_synthesis: |
    UNANIMOUS (a) — no migration. All three confirm
    review_read_post_seal.py resolves via index.yaml stored
    relative path and never parses the filename; existing 162
    archives remain readable with zero changes. Mixed-scheme
    directory across the v1.14.x boundary is expected and
    acceptable (index is the resolution source of truth).
    Document in CHANGELOG.

q4_void_seal_preservation:
  claude: '(c) preserve file + superseded_by index annotation'
  codex: 'file preservation only (no migration/deletion of void seals)'
  gemini: 'file preservation only (no rename/migration)'
  weighted_synthesis: |
    ADOPT file-preservation (unanimous). The void seal FILE
    survives untouched as honest audit history — this alone
    satisfies the triggering report's "honest audit history"
    requirement. Claude's `superseded_by` index annotation is a
    genuinely useful enhancement but 2/3 contributors scoped it
    OUT as beyond the minimal defect fix, and it adds an
    index.yaml per-entry schema field. Per weighted-synthesis we
    respect the convergence: NOT silently dropped — recorded as
    an explicitly-considered enhancement deferred WITH a stated
    reason (peer convergence: smaller is correct here; the report's
    audit requirement is already met by file preservation). This
    is scope-narrowing by convergence, not the deferral
    anti-pattern.

q5_scope:
  weighted_synthesis: |
    All three: small, core fix only. Forensic scan of the 162
    archives — claude named-blocker'd it (undefined remediation
    model for immutable history); peers implicitly out-of-scope.
    Converged: ship core fix; defer forensic scan + index race +
    superseded_by annotation, each with a stated reason.

q6_missed_dimensions:
  adopted: |
    - test_contributors.py:135 docstring names all 3 tokens —
      INDEPENDENTLY cited by both claude and codex as evidence
      this was the original intended contract; (b) restores it.
      Commit will cite "restores documented-but-never-implemented
      contract; silent regression at/before extraction."
    - pass_id filesystem-hostile-char sanitization (claude,
      uncontested): sanitize [^A-Za-z0-9._-]→- for the FILENAME
      only; raw pass_id stays in index + packet body. Test with
      a hostile pass_id.
    - index.yaml non-atomic read-modify-write race (claude Q6.1):
      PRE-EXISTING + orthogonal. Named follow-up, not this fix.
    - Windows 260-char: (b) is longer than claude's (a) would be;
      accepted trade-off, sanitization keeps it bounded; note in
      CHANGELOG.

