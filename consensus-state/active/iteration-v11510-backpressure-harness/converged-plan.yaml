q1_backpressure_mechanism:
  weighted_synthesis: |
    `_FakePipeReader` gets an explicit bounded buffer:
    `capacity_bytes` (default a sentinel = UNBOUNDED so the other
    7 streaming tests are byte-identical — backward compatible),
    a buffered-byte count, and an observable `writer_blocked`
    flag. Representation = codex's explicit state (the mutant
    MUST be able to ASSERT `writer_blocked`, which claude's
    pure-derived-predicate could not expose); `deque`-style
    line-atomic payloads (gemini) — payloads kept < capacity so
    line-atomic is faithful for the full-buffer-blocks-writer
    failure (codex's bound; a partial-byte kernel emulator is
    explicitly out of scope).
    `StreamingFakeCodexPopen.poll()` (already called every
    production iteration) pumps due scheduled writes into the
    buffer, sets `writer_blocked` when a write would exceed
    `capacity_bytes`, and RETURNS None (proc not exited) while
    any pipe is `writer_blocked` — EVEN IF `now >= exit_at`
    (codex+gemini; = claude's "predicate gates exit"). Production's
    REAL reader thread calling `_FakePipeReader.readline()`
    drains bytes → clears `writer_blocked` → calls the existing
    `_SyncClock.notify()` (the v1.15.9 codex-rev-003 waker — NO
    new notify path, NO new thread, NO new lock). `release_all()`
    remains the FIRST override in `poll()` (v1.15.9 codex-rev-001)
    so a wedged harness still exits LOUD/FAST.
    Deadlock-free: every wait is an EXISTING `_SyncClock` wait
    proven in v1.15.9 (advance / readline-notify / proc-exit /
    thread-death / release_all / _CEILING). The only new logic is
    a predicate + a flag inside `poll()` — no new blocking
    primitive ⇒ no new deadlock surface. Determinism: buffer
    occupancy is a pure function of virtual `now` + `_idx`; no
    real time; `_REPOLL` stays a pure lost-wakeup net.

q2_mutant_gate:
  weighted_synthesis: |
    Private, keyword-only, DEFAULTED seam on `_invoke_codex`
    mirroring the v1.15.9 `_sleep=` precedent EXACTLY: name
    `_drain_stderr: bool = True` (claude/codex; semantically
    clearer than gemini's `_start_stderr_reader` — names the
    effect; gemini's "skip the stderr reader thread" is the
    mechanism). Default True ⇒ ZERO production behaviour change
    (still starts+joins the stderr reader exactly as today).
    `_drain_stderr=False` (test-only) does NOT spawn the stderr
    reader thread = the faithful mutant.
    Tests:
    - REWRITE `test_stderr_drain_prevents_deadlock` (gemini's
      strong point: it is THE test whose name promises this and
      has never proved it) to use a BOUNDED stderr capacity with
      scheduled stderr > capacity; nominal (`_drain_stderr=True`)
      MUST: proc exits, `holder["out"]=='{"ok": true}'`, all
      stdout+stderr drained (`_idx==len`), `writer_blocked`
      cleared.
    - ADD `test_stderr_backpressure_deadlock_detected`
      (`_drain_stderr=False`): stderr never drained ⇒
      `writer_blocked` becomes True with virtual time at/after
      `exit_at` ⇒ `poll()` cannot exit ⇒ the test asserts
      `proc.stderr.writer_blocked` is observed AND the dispatch
      does NOT return success; `_drive`'s `release_all()`+join is
      the never-hang backstop (its firing is itself a loud
      deterministic FAIL, never a timeout/hang).
    GOVERNANCE (v1.15.9 codex-rev-001 lesson, claude-flagged):
    the seam touches `consensus_mcp/_dispatch_codex.py`, which
    the round-1 `goal_packet.allowed_files` did NOT list.
    RECONCILED here: `deliverable.files` includes it; the
    goal_packet allowed_files is corrected to match BEFORE the
    Workflow B audit (codex listed it in files_in_scope —
    converged).

