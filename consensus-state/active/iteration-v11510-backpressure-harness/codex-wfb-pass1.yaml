  severity: blocking
  summary: mutant gate still relies on the real-time ceiling to prove the no-stderr-reader
    deadlock
  citation: consensus_mcp/tests/test_dispatch_codex_streaming.py:777
  risk: 'The required mutant gate is timeout-driven: the disabled-stderr path waits
    for `_drive` to hit `_CEILING` before `release_all()` fires. That violates the
    goal''s no-hang/no-timeout constraint and makes the proof depend on the safety
    timeout instead of deterministically observing pipe backpressure.'
  recommendation: Drive the mutant branch to the explicit backpressure state, e.g.
    wait on the clock condition until the fake stderr buffer is saturated and `_writer_blocked`
    is true, then call `release_all()` and assert the runner unwinds without waiting
    for `_CEILING`.
  patch_not_proposed_reason: The safe fix is a targeted harness rewrite of the mutant
    driver path; I am reporting the blocking review finding without authoring a speculative
    diff against the embedded sealed packet.
  patch_proposal: null
