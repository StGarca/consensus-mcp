      \ fixture missing {FIXT_GOOD_REDACTIONS}\")\n        return False\n\n    expected\
      \ = _yaml_load(FIXT_GOOD_REDACTIONS.read_text(encoding=\"utf-8\"))\n    expected_patterns\
      \ = list(expected.get(\"patterns\") or [])\n\n    packet = build_review_packet(FIXT_GOOD_INPUT)\n\
      \n    # 1. all required_packet_fields present\n    for k in REQUIRED_PACKET_FIELDS:\n\
