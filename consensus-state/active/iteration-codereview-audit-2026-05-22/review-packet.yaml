      : \"Iteration this dry-run targets; null for spec-only patches\",\n        \
      \    },\n            \"proposed_patches\": {\n                \"type\": \"array\"\
      ,\n                \"items\": {\n                    \"type\": \"object\",\n\
      \                    \"properties\": {\n                        \"file\": {\"\
      type\": \"string\"},\n                        \"old_string\": {\"type\": \"\
      string\"},\n                        \"new_string\": {\"type\": \"string\"},\n\
