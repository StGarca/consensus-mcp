      \ / \"validate_disposition_index.py\"),\n        \"validate_review\":      \
      \       str(base / \"validate_review.py\"),\n        \"validate_consensus\"\
      :          str(base / \"validate_consensus.py\"),\n        \"validate_iteration\"\
      :          str(base / \"validate_iteration.py\"),\n    }\n\nSCHEMA = {\n   \
      \ \"name\": \"patch.stage_and_dry_run\",\n    \"description\": (\n        \"\
      Stage proposed patches to a temp dir + run validators on hypothetical \"\n \
