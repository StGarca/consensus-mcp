      : findings,\n    }\n\n\n# --------------------------------------------------------------------------\n\
      # self-test\n# --------------------------------------------------------------------------\n\
      \nFIXT_GOOD_INPUT = (\n    REPO_ROOT / \"consensus-state\" / \"tests\" / \"\
