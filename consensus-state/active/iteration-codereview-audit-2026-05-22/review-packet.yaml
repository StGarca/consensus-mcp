      - **`_import_parent_history.py:157`** `extraction_commit="ff0164f"` default
      is a now-nonexistent SHA (history was rewritten) — should be `None` + required.
      (conf low)


      ### Dropped (reviewers retracted these mid-analysis)

      - Dispatcher "temp file leak" — `finally` covers it. • Orchestration `validate_consensus.py:395`
      or/and — logic is correct. • `_import_parent_history.py:233` conditional-for
      — valid Python. • Validators `HIGH-3` — non-issue on re-read.


      ---


      ## On the `.mcp.json` change made during this session (disconfirming evidence)


      I dropped the env block from `.mcp.json` (it hardcoded `C:\Users\steve\…` —
      PII) on the basis that `_resolve_repo_root` and `_resolve_spec_path` walk up
      from `__file__`. **Reviewer H-1 correctly caught what I missed:** `_resolve_state_root()`
      and `_resolve_project_root()` do **not** have a `__file__`-walk fallback — their
      final fallback is `Path.cwd()`. The old `.mcp.json` set `CONSENSUS_MCP_REPO_ROOT`,
      which fed the *legacy REPO_ROOT* branch of those resolvers; dropping it shifts
      state/project resolution to **cwd-dependent**.


      **Impact:** if Claude Code launches the server with cwd ≠ repo root, the dev
      folder''s consensus state/audit writes land in the wrong tree — silently. Whether
      that happens depends on Claude Code''s MCP cwd behavior (it typically inherits
      the session cwd = project root, but this is not guaranteed and should be confirmed,
      not assumed).


      **Recommended resolution (keeps PII out AND removes the doubt):** add a `__file__`-parent-walk
      fallback (with repo-root marker detection) to `_resolve_state_root()` and `_resolve_project_root()`,
      mirroring `_resolve_repo_root`/`_resolve_spec_path`. Then the env-free `.mcp.json`
      is correct for source-tree checkouts regardless of cwd, and pip-installed users
      keep using the `consensus init`-written env vars. This is a code change → run
      it through the consensus workflow. Until it lands, the safe interim is to confirm
      Claude Code''s cwd is the repo root for this project (or temporarily re-add
      only `CONSENSUS_MCP_STATE_ROOT`/`PROJECT_ROOT` pointing at a non-PII relative
      location — not viable on an absolute Windows path, hence the code fix is preferred).


      ---


      ## Suggested remediation order


      1. **CR-1 / CR-2 / CR-3 / H-2** — path containment + scope membership on every
      operator/AI-supplied file path (one shared helper; lift from T5). Highest security
      value, low blast radius.

      2. **CR-4 / H-5 / H-7** — close the fail-open gates (empty `allowed_files`,
      git-unavailable, timeout-only-blocking).

      3. **H-1** — state/project root `__file__`-walk fallback (unblocks the env-free
      `.mcp.json`).

      4. **H-3 / H-4 / H-6** — `cmd_close` JSON, Windows CRLF dirty-detection, release-gate
      count strings.

      5. **Atomic-write cluster** (M-2/3/4/5) — one tmp+`os.replace` helper.

      6. Remaining MEDIUM/LOW as capacity allows.


      Each batch is a coherent consensus iteration. Items 1–2 share the "fail-closed
      boundary" doctrine and could bundle.

