      ,\n                    },\n                    # partial_apply_failed branch\n\
      \                    \"failed_relpath\": {\n                        \"type\"\
      : [\"string\", \"null\"],\n                        \"description\": \"Relpath\
      \ that raised on write; only when error==partial_apply_failed.\",\n        \
      \            },\n                    \"exception\": {\n                    \
      \    \"type\": [\"string\", \"null\"],\n                        \"description\"\
      : \"ExcType: message string; only when error==partial_apply_failed.\",\n   \
      \                 },\n                },\n                \"required\": [\"\
      error\"],\n            },\n        ],\n    },\n}\n\n\ndef handle(\n    iteration_id:\
      \ str,\n    patches: dict,\n    rationale: str,\n    require_dry_run_clean:\
      \ bool = True,\n    validators_to_run: list | None = None,\n) -> dict:\n   \
      \ \"\"\"Apply consensus patches to an iteration dir, gated by dry-run.\n\n \
      \   Steps:\n      1. Guard: iteration dir must exist.\n      2. Guard: no path\
      \ traversal in patch keys.\n      3. Build proposed_patches for stage_and_dry_run\
      \ (full-file replacement).\n      4. Run stage_and_dry_run gate; refuse if BLOCKED\
      \ or any high/blocking/critical finding.\n      5. Atomic write each patch (tmp\
      \ + os.replace).\n      6. Append apply_step_landed audit event; return event_id.\n\
      \n    validators_to_run: passed through to stage_and_dry_run. None = default\
      \ (all 4 main validators).\n\n    Failure modes documented in module docstring.\n\
      \    \"\"\"\n    if not require_dry_run_clean:\n        raise NotImplementedError(\n\
      \            \"require_dry_run_clean=False is deferred to Phase 1.x; \"\n  \
      \          \"always pass True in v1.0.\"\n        )\n\n    # --- Step 1: iteration\
      \ existence guard ---\n    iter_dir = active_dir() / iteration_id\n    if not\
      \ iter_dir.is_dir():\n        return {\"error\": \"iteration_not_found\"}\n\n\
      \    # --- Step 2: path traversal guard ---\n    for relpath in patches:\n \
      \       target = (iter_dir / relpath).resolve()\n        try:\n            target.relative_to(iter_dir.resolve())\n\
      \        except ValueError:\n            return {\n                \"error\"\
      : \"invalid_patches\",\n                \"reason\": f\"path_traversal:{relpath}\"\
      ,\n            }\n\n    # --- Step 3: build proposed_patches for stage_and_dry_run\
      \ ---\n    # stage_and_dry_run expects {file: repo-relative str, old_string,\
      \ new_string}.\n    # We do a full-file replacement: old_string = current content\
      \ (or \"\" if new file).\n    proposed_patches = []\n    for relpath, new_text\
      \ in patches.items():\n        target = iter_dir / relpath\n        if target.exists():\n\
      \            old_text = target.read_text(encoding=\"utf-8\")\n        else:\n\
      \            old_text = \"\"\n        # Repo-relative path for stage_and_dry_run.\n\
      \        repo_rel = str(target.relative_to(project_root()))\n        proposed_patches.append({\n\
      \            \"file\": repo_rel,\n            \"old_string\": old_text,\n  \
      \          \"new_string\": new_text,\n        })\n\n    # --- Step 4: dry-run\
      \ gate ---\n    stage_kwargs: dict = {\n        \"iteration_id\": iteration_id,\n\
      \        \"proposed_patches\": proposed_patches,\n    }\n    if validators_to_run\
      \ is not None:\n        stage_kwargs[\"validators_to_run\"] = validators_to_run\n\
      \    dry_run_result = stage_handle(**stage_kwargs)\n\n    dry_run_findings =\
      \ dry_run_result.get(\"dry_run_findings\", [])\n\n    # Refuse on internal error\
      \ from stage_handle.\n    if \"error\" in dry_run_result:\n        return {\n\
      \            \"error\": \"dry_run_failed\",\n            \"dry_run_findings\"\
      : dry_run_findings,\n        }\n\n    gate_decision = dry_run_result.get(\"\
      gate_decision\", \"BLOCKED\")\n    high_findings = [\n        f for f in dry_run_findings\n\
      \        if f.get(\"severity\") in _HIGH_SEVERITIES\n    ]\n\n    if gate_decision\
      \ != \"APPROVED\" or high_findings:\n        return {\n            \"error\"\
      : \"dry_run_failed\",\n            \"dry_run_findings\": dry_run_findings,\n\
      \        }\n\n    # --- Step 5: atomic apply ---\n    applied_files: list[str]\
      \ = []\n    try:\n        for relpath, new_text in patches.items():\n      \
      \      target = iter_dir / relpath\n            target.parent.mkdir(parents=True,\
      \ exist_ok=True)\n            tmp_path = target.with_suffix(target.suffix +\
      \ \".tmp\")\n            tmp_path.write_text(new_text, encoding=\"utf-8\")\n\
      \            os.replace(str(tmp_path), str(target))\n            applied_files.append(relpath)\n\
      \    except Exception as exc:\n        # Mid-loop IO failure (disk full, permission\
      \ denied, antivirus lock, etc.).\n        # Prior writes already on disk; audit\
      \ is NOT recorded (partial state must be\n        # reconciled manually — auto-recording\
      \ would lie about completion).\n        exception_str = type(exc).__name__ +\
      \ \": \" + str(exc)\n        return {\n            \"error\": \"partial_apply_failed\"\
      ,\n            \"applied_files\": applied_files,\n            \"failed_relpath\"\
      : relpath,\n            \"exception\": exception_str,\n        }\n\n    # ---\
      \ Step 6: audit event ---\n    # Canonical event type for a landed apply is\
      \ apply_step_landed (required field: effect).\n    audit_result = audit_handle(\n\
      \        iteration_id=iteration_id,\n        event_type=\"apply_step_landed\"\
      ,\n        effect=rationale,\n        files_modified=applied_files,\n      \
      \  extra_fields={\n            \"dry_run_findings_count\": len(dry_run_findings),\n\
      \        },\n    )\n\n    if \"error\" in audit_result:\n        # Artifacts\
      \ already written; operator must investigate.\n        return {\n          \
      \  \"error\": \"audit_write_failed\",\n            \"applied_files\": applied_files,\n\
      \            \"audit_error\": audit_result[\"error\"],\n        }\n\n    return\
      \ {\n        \"applied_files\": applied_files,\n        \"dry_run_findings\"\
      : dry_run_findings,\n        \"audit_event_id\": audit_result[\"event_id\"],\n\
      \    }\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"\
      name\"], SCHEMA, handle)\n"
    consensus_mcp/tools/patch_stage_and_dry_run.py: "\"\"\"patch.stage_and_dry_run\
      \ MCP tool. Phase 1 G2 partial (dry-run; not apply).\n\nImplements the canonical-006\
      \ anti_regression_criterion.iteration_applied_changes_extension\nas a technical\
      \ gate. Replaces manual orchestrator staging mechanism with\nmediated staging\
      \ + isolated subprocess validation.\n\nCONCURRENCY NOTE: validators write to\
      \ shared consensus-state/state/validate-*-report.yaml\npaths. This tool redirects\
      \ all validator output to temp paths, so concurrent\ncalls do NOT race on the\
      \ shared report files. Phase 0 is single-writer anyway.\n\"\"\"\nfrom __future__\
      \ import annotations\nimport json\nimport shutil\nimport subprocess\nimport\
      \ sys\nimport tempfile\nfrom pathlib import Path\n\nfrom consensus_mcp._paths\
      \ import project_root, active_dir, spec_path\n\n# iter-0035 (Phase B step 5\
