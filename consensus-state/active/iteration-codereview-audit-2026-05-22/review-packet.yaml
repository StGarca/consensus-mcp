    CODE_REVIEW_2026-05-22.md: '# consensus-mcp — Thorough Code Review (2026-05-22)


      **Method:** 5 parallel read-only reviewers over risk-grouped areas (dispatchers/subprocess,
      orchestration core, validators/gates, MCP tools/patch-apply, state/config/init/release).
      ~25K LOC of Python.

      **Reviewed at:** main `d948334` (post-PII-scrub).

      **Confidence** is the reviewer''s self-rated 0–100; I''ve dropped findings the
      reviewers retracted mid-analysis and down-weighted spec-ambiguities.


      > Fixes are NOT applied here. Per project rule, non-trivial fixes go through
      the consensus peer-review workflow. This document is the review deliverable
      only.


      ---


      ## Executive summary — headline themes


      1. **Operator/AI-supplied file paths are used without repo-containment checks**
      in three tools, enabling arbitrary file read/write outside the repo. `apply_codex_patch.py`
      (T6) is missing BOTH the path-traversal guard AND the scope-vs-`allowed_files`
      check that its sibling `patch_apply_consensus_patch.py` (T5) already has. This
      is the most important cluster.

      2. **Several safety gates fail OPEN** — they return pass/empty on an error or
      empty input where they must reject: empty `allowed_files` = allow-all; git-failure
      = "no unaudited mutations"; majority-rule convergence when only timeouts block.

      3. **Windows-specific correctness bugs** — SHA-1 dirty-detection ignores CRLF
      normalization (always-dirty), non-atomic `write_text` on audit/verdict/ledger/gitignore
      files.

      4. **`cmd_close` emits multiple JSON blobs** to stdout → unparseable by any
      machine consumer.

      5. **My `.mcp.json` change has a real downside** the review caught — see the
      dedicated section below.


      ---


      ## CRITICAL


      | ID | File:line | Issue | Conf |

      |----|-----------|-------|------|

      | **CR-1** | `tools/apply_codex_patch.py` ~272–352 | `files_touched` (from `codex-review.yaml`)
      used to build write targets with **no `resolve()`+containment check** → a `../../..`
      or absolute entry writes **outside the repo**. T5 has this guard (lines 221–229);
      T6 does not. | 100 |

      | **CR-2** | `tools/apply_codex_patch.py` ~300–320 | `files_touched` **never
      checked against `goal_packet.allowed_files`** → a codex patch can modify source
      files **outside the authorized scope**; only `validate_disposition_index` runs,
      which checks provenance, not target files. | 95 |

      | **CR-3** | `validators/build_review_packet.py` ~298–311 | `target_files` from
      operator `input.yaml` read after `.resolve()` with **no containment check**
      → arbitrary file **read/exfil** into the review packet (e.g. `../../etc/passwd`).
      | 92 |

      | **CR-4** | `validators/scope_check.py:379` | `if allowed_files and not _matches_any(...)`
      — an **empty `allowed_files: []` short-circuits to allow-ALL** touched files.
      `scope_check_block.passed=True`, zero findings. Fail-open. Sibling `check_autonomy_scope`
      (line ~720) does it correctly. | 95 |


      **Note on CR-1/2/3:** exploitation requires the dual operator interlock to be
      satisfied, so this is "semi-trusted input." But `files_touched` originates from
      an *AI''s* output — a hallucinated or manipulated codex/consensus patch is exactly
      the threat model this product exists to contain. Treat as real. The clean fix
      is to lift the guard already present in `patch_apply_consensus_patch.py` into
      T6 and `build_review_packet.py` (`is_relative_to(REPO_ROOT)` + scope membership).


      ---


      ## HIGH


      | ID | File:line | Issue | Conf |

      |----|-----------|-------|------|

      | **H-1** | `server.py:86–94` + `.mcp.json` | `_resolve_state_root()` / `_resolve_project_root()`
      fall back to **`Path.cwd()`** (no `__file__`-walk). After dropping `CONSENSUS_MCP_REPO_ROOT`
      from `.mcp.json`, state/project root depend on the server''s cwd. **See dedicated
      section.** | — |

      | **H-2** | `tools/patch_stage_and_dry_run.py:231,242,259` | No traversal guard
      on `file_rel`: reads arbitrary file into memory, then `relative_to()` raises
      an **uncaught `ValueError`** that escapes `handle()` and breaks the `{ok,state}`
      MCP contract. | 95 |

      | **H-3** | `_self_drive.py:1150–1163` (`cmd_close`) | Calls sub-commands that
      each `print(json.dumps(...))`, so `close` emits **5 JSON blobs** → `json.loads(stdout)`
      fails for any consumer. | 100 |

      | **H-4** | `_snapshot_state.py:538–539` | Python-side git blob SHA-1 ignores
      **CRLF normalization**; with `core.autocrlf=true` every text file reads as **always-dirty**
      → restore guard mis-fires on Windows. Use `git hash-object`. | high |

      | **H-5** | `tools/audit_append_event.py:425–485` | `_detect_working_tree_changes`
      returns `[]` on **any git failure** → `iteration_closed` mutation-completeness
      gate **fail-open** when git is unavailable. | 87 |

      | **H-6** | `_release_gate_check.py:453` (+ smoke/validator gates) | Gate passes
      only if output contains literal **`"95 passed"`** — brittle: passes a build
      where a test was deleted but count still nets 95; fails a good build when tests
      are added. Use `returncode == 0` / `>= N`. | high |

      | **H-7** | `workflow_engine.py:456–458` | `_evaluate_convergence` under `TIMEOUT_BLOCKING`:
      the `blocking_ids` veto for majority rules is **bypassed when only timeouts
      block**, and the rationale string misreports `n_block`. Correct-for-wrong-reason
      today; fragile. | 85 |

      | **H-8** | `_resume.py:48,136,168,234,333,362,457` | Seven bare `except Exception:`
      swallow errors → **silent wrong-state snapshots** (e.g. empty dispatch-log read
      makes orchestrator think nothing is in-flight). `_self_drive.py` was already
      narrowed (iter-0036); `_resume.py` wasn''t. | 82 |


