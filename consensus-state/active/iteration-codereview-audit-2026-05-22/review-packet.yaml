      \           \"type\": \"string\",\n                        \"description\":\
      \ \"event_id returned by audit.append_event.\",\n                    },\n  \
      \              },\n                \"required\": [\"applied_files\", \"dry_run_findings\"\
      , \"audit_event_id\"],\n            },\n            {\n                \"title\"\
      : \"failure\",\n                \"type\": \"object\",\n                \"properties\"\
      : {\n                    \"error\": {\n                        \"type\": \"\
      string\",\n                        \"enum\": [\n                           \
      \ \"dry_run_failed\",\n                            \"iteration_not_found\",\n\
      \                            \"invalid_patches\",\n                        \
      \    \"audit_write_failed\",\n                            \"partial_apply_failed\"\
      ,\n                        ],\n                    },\n                    \"\
      dry_run_findings\": {\n                        \"type\": \"array\",\n      \
      \                  \"description\": \"Only present when error==dry_run_failed.\"\
      ,\n                    },\n                    # invalid_patches branch\n  \
      \                  \"reason\": {\n                        \"type\": [\"string\"\
      , \"null\"],\n                        \"description\": \"Only present when error==invalid_patches.\"\
      ,\n                    },\n                    # audit_write_failed branch +\
      \ partial_apply_failed branch\n                    \"applied_files\": {\n  \
      \                      \"type\": [\"array\", \"null\"],\n                  \
      \      \"items\": {\"type\": \"string\"},\n                        \"description\"\
      : (\n                            \"Present when error==audit_write_failed (full\
      \ list) or \"\n                            \"error==partial_apply_failed (partial\
      \ list written so far).\"\n                        ),\n                    },\n\
      \                    # audit_write_failed branch\n                    \"audit_error\"\
      : {\n                        \"type\": [\"string\", \"null\"],\n           \
