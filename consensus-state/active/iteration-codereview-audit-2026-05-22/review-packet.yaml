    consensus_mcp/validators/scope_check.py: "\"\"\"scope_check.py - Phase 0 implementation-scope\
      \ validator (P0-V5).\n\nPer spec section 13 (implementation_scope schema), section\
      \ 16 (verification.yaml\nscope_check block), and section 20 (run_scope_check\
      \ step). Validates that the\npost-implementation git diff is contained within\n\
      consensus.yaml.implementation_scope.allowed_files and respects forbidden_files\n\
      and forbidden_actions.\n\nDetects:\n  - touched files outside allowed_files\
      \ (FILE_OUTSIDE_ALLOWED_SCOPE)\n  - touched files matching forbidden_files (FORBIDDEN_FILE_TOUCHED)\n\
      \  - forbidden actions detected by path-pattern heuristics\n    (FORBIDDEN_ACTION_DETECTED)\
      \ -- Phase 0 best-effort, NOT full intent\n    inference. Only the documented\
      \ sentinel patterns trigger.\n  - consensus.yaml lacking implementation_scope\
      \ block\n    (IMPLEMENTATION_SCOPE_MISSING_FROM_CONSENSUS)\n  - git diff command\
      \ failure (GIT_DIFF_FAILED)\n\nGlob matching rules (Phase 0, simple):\n  - Forward-slash\
      \ paths only; backslashes (Windows-style from git on some\n    configs) are\
      \ normalized to '/' before matching.\n  - 'a/**/b' matches 'a/b', 'a/x/b', 'a/x/y/b'\
      \ (zero-or-more path segments\n    between a and b).\n  - '**' standalone matches\
      \ anything (including paths with no separator).\n  - Other wildcards delegate\
      \ to fnmatch.fnmatchcase semantics: '*' matches\n    any run of characters INCLUDING\
      \ '/' (gitignore would not, but Phase 0\n    accepts the looseness; allowed_files\
      \ patterns are usually narrow enough\n    that this does not over-match in practice).\n\
      \  - Examples:\n      \"wiki/**/*.md\"            matches \"wiki/foo.md\" ->\
      \ True\n      \"wiki/**/*.md\"            matches \"wiki/consensus-mcp/foo.md\"\
      \ -> True\n      \"consensus_mcp/validators/*.py\" matches \"consensus_mcp/validators/scope_check.py\"\
      \ -> True\n      \"consensus_mcp/validators/*.py\" matches \"scripts/other/foo.py\"\
      \ -> False\n      \"dist/**/*\"               matches \"dist/wheel.whl\" ->\
      \ True\n\nForbidden-action detection (Phase 0 path-pattern heuristics):\n  -\
      \ \"publish release artifact\": any touched file matching\n    \"dist/**/*\"\
      \ or \"build/**/*\".\n  - \"merge to main\": current branch == 'main' AND the\
      \ diff range contains\n    merge commits (git log --merges <a>..<b> non-empty).\n\
      \  - Downstream consensus-mcp users can extend FORBIDDEN_ACTION_PATH_PATTERNS\n\
      \    in a wrapper script to add project-specific heuristics.\n\nOutput: structured\
      \ report (YAML by default, JSON via --json) suitable for\ndownstream tooling.\
      \ The scope_check_block field matches the section 16\nverification.yaml scope_check\
      \ schema.\n\nUsage:\n  python consensus_mcp/validators/scope_check.py --consensus\
      \ PATH \\\n    [--ref-a REF] [--ref-b REF] [--out PATH] [--json] [--self-test]\n\
      \nExit codes:\n  0 - validator ran cleanly; report written\n  2 - validator\
      \ could not run (consensus missing, parse error, missing input)\n\nFindings\
      \ count does NOT gate exit code (Path C / consistent with\nvalidate_disposition_index.py\
      \ and validate_review.py).\n\"\"\"\nfrom __future__ import annotations\nimport\
      \ argparse\nimport fnmatch\nimport hashlib\nimport importlib.metadata\nimport\
      \ json\nimport platform\nimport subprocess\nimport sys\nfrom datetime import\
      \ datetime, timezone\nfrom pathlib import Path\n\nREPO_ROOT = Path(__file__).resolve().parent.parent.parent\n\
      DEFAULT_OUT = REPO_ROOT / \"consensus-state\" / \"state\" / \"scope-check-report.yaml\"\
      \n\n# Path-pattern heuristics for Phase 0 forbidden-action detection.\n# Keys:\
      \ forbidden_action sentinel string (matched verbatim against\n# implementation_scope.forbidden_actions\
      \ list). Values: list of glob patterns\n# whose match against any touched file\
      \ triggers the FORBIDDEN_ACTION_DETECTED\n# finding for that action.\n#\n# Default\
      \ ships with one example mapping (\"publish release artifact\" ->\n# any binary\
      \ under dist/ or build/). Downstream consensus-mcp users override\n# this dict\
      \ in their own scope_check wrapper to add project-specific\n# heuristics (e.g.\
      \ mapping \"render production media\" -> \"outputs/**/*.bin\"\n# is a downstream\
      \ override, not a built-in default).\nFORBIDDEN_ACTION_PATH_PATTERNS: dict[str,\
      \ list[str]] = {\n    \"publish release artifact\": [\"dist/**/*\", \"build/**/*\"\
      ],\n}\n\n\ndef _parse_yaml_file(path: Path) -> dict:\n    try:\n        import\
      \ yaml\n    except ImportError:\n        raise SystemExit(\"pyyaml required\
      \ (pip install pyyaml)\")\n    if not path.exists():\n        raise SystemExit(f\"\
      consensus file not found: {path}\")\n    try:\n        data = yaml.safe_load(path.read_text(encoding=\"\
      utf-8\"))\n    except Exception as e:\n        raise SystemExit(f\"yaml parse\
      \ error in {path}: {e}\")\n    if not isinstance(data, dict):\n        raise\
      \ SystemExit(f\"consensus file root must be a mapping: {path}\")\n    return\
      \ data\n\n\ndef _normalize_path(p: str) -> str:\n    \"\"\"Normalize a path\
      \ string to forward-slash form for glob matching.\"\"\"\n    return p.replace(\"\
      \\\\\", \"/\").strip()\n\n\ndef _glob_match(pattern: str, path: str) -> bool:\n\
      \    \"\"\"Phase 0 glob matcher. Handles '**' as zero-or-more path segments.\n\
      \n    Strategy: try the pattern with each '/**/' segment expanded to BOTH '/'\n\
      \    (zero segments) and '/*/' (one-or-more segments via fnmatch's cross-slash\n\
      \    '*'). fnmatch's '*' already crosses '/', so '/*/' covers the\n    one-or-more\
      \ case. Trailing/leading '**' are normalized to '*'.\n    \"\"\"\n    npat =\
      \ _normalize_path(pattern)\n    npath = _normalize_path(path)\n\n    # Trailing\
      \ '**' -> '*' (matches any tail).\n    if npat.endswith(\"/**\"):\n        npat\
      \ = npat[:-3] + \"/*\"\n    # Leading '**' -> '*'.\n    if npat.startswith(\"\
      **/\"):\n        npat = \"*/\" + npat[3:]\n    # Standalone '**'.\n    if npat\
      \ == \"**\":\n        return True\n\n    # Build candidate patterns by expanding\
      \ each '/**/' to '/' (zero segments)\n    # and to '/*/' (>=1 segments). For\
      \ N occurrences, that's 2**N candidates,\n    # which is fine for Phase 0 patterns\
      \ (typically 0-1 '/**/' per pattern).\n    candidates = [npat]\n    while any(\"\
      /**/\" in c for c in candidates):\n        next_candidates: list[str] = []\n\
      \        for c in candidates:\n            if \"/**/\" in c:\n             \
      \   next_candidates.append(c.replace(\"/**/\", \"/\", 1))\n                next_candidates.append(c.replace(\"\
      /**/\", \"/*/\", 1))\n            else:\n                next_candidates.append(c)\n\
      \        candidates = next_candidates\n\n    return any(fnmatch.fnmatchcase(npath,\
      \ c) for c in candidates)\n\n\ndef _matches_any(patterns: list[str], path: str)\
      \ -> bool:\n    return any(_glob_match(p, path) for p in patterns if isinstance(p,\
      \ str))\n\n\ndef _get_touched_files(ref_a: str, ref_b: str, cwd: Path) -> list[str]:\n\
      \    \"\"\"Return the file list from `git diff --name-only <a>..<b>` as forward-\n\
      \    slash paths. Raises subprocess.CalledProcessError on failure (caller wraps\n\
      \    into a GIT_DIFF_FAILED finding).\"\"\"\n    result = subprocess.run(\n\
      \        [\"git\", \"-C\", str(cwd), \"diff\", \"--name-only\", f\"{ref_a}..{ref_b}\"\
      ],\n        capture_output=True,\n        text=True,\n        check=True,\n\
      \    )\n    out = result.stdout\n    return [_normalize_path(line) for line\
      \ in out.splitlines() if line.strip()]\n\n\ndef _git_current_branch(cwd: Path)\
      \ -> str | None:\n    try:\n        result = subprocess.run(\n            [\"\
      git\", \"-C\", str(cwd), \"rev-parse\", \"--abbrev-ref\", \"HEAD\"],\n     \
      \       capture_output=True,\n            text=True,\n            check=False,\n\
      \        )\n        if result.returncode != 0:\n            return None\n  \
      \      return result.stdout.strip() or None\n    except Exception:\n       \
      \ return None\n\n\ndef _git_has_merge_commits(ref_a: str, ref_b: str, cwd: Path)\
      \ -> bool:\n    try:\n        result = subprocess.run(\n            [\"git\"\
      , \"-C\", str(cwd), \"log\", \"--merges\", \"--oneline\",\n             f\"\
      {ref_a}..{ref_b}\"],\n            capture_output=True,\n            text=True,\n\
      \            check=False,\n        )\n        if result.returncode != 0:\n \
      \           return False\n        return bool(result.stdout.strip())\n    except\
      \ Exception:\n        return False\n\n\ndef _sha256_file(path: Path) -> str\
      \ | None:\n    if not path.exists() or not path.is_file():\n        return None\n\
      \    h = hashlib.sha256()\n    with path.open(\"rb\") as f:\n        for chunk\
      \ in iter(lambda: f.read(1024 * 1024), b\"\"):\n            h.update(chunk)\n\
      \    return h.hexdigest()\n\n\ndef _dependency_version(dist_name: str) -> str\
      \ | None:\n    try:\n        return importlib.metadata.version(dist_name)\n\
      \    except importlib.metadata.PackageNotFoundError:\n        return None\n\n\
      \ndef _git_stdout(args: list[str]) -> str | None:\n    try:\n        result\
      \ = subprocess.run(\n            [\"git\", \"-C\", str(REPO_ROOT), *args],\n\
      \            capture_output=True,\n            text=True,\n            check=False,\n\
      \        )\n        if result.returncode != 0:\n            return None\n  \
      \      return result.stdout.strip()\n    except Exception:\n        return None\n\
      \n\ndef _build_provenance(consensus_path: Path, ref_a: str, ref_b: str) -> dict:\n\
      \    return {\n        \"generated_utc\": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace(\"\
      +00:00\", \"Z\"),\n        \"command_line\": sys.argv,\n        \"python\":\
      \ {\n            \"version\": platform.python_version(),\n            \"executable\"\
      : sys.executable,\n            \"platform\": platform.platform(),\n        },\n\
      \        \"dependency_versions\": {\n            \"PyYAML\": _dependency_version(\"\
      PyYAML\"),\n        },\n        \"git\": {\n            \"head\": _git_stdout([\"\
      rev-parse\", \"HEAD\"]),\n            \"branch\": _git_stdout([\"branch\", \"\
      --show-current\"]),\n            \"ref_a\": ref_a,\n            \"ref_b\": ref_b,\n\
      \        },\n        \"inputs\": {\n            \"consensus_path\": str(consensus_path.relative_to(REPO_ROOT))\
      \ if consensus_path.is_relative_to(REPO_ROOT) else str(consensus_path),\n  \
      \          \"consensus_sha256\": _sha256_file(consensus_path),\n           \
      \ \"validator_script_path\": \"consensus_mcp/validators/scope_check.py\",\n\
      \            \"validator_script_sha256\": _sha256_file(Path(__file__).resolve()),\n\
      \        },\n    }\n\n\ndef scope_check(\n    consensus_path: Path,\n    ref_a:\
      \ str = \"HEAD~1\",\n    ref_b: str = \"HEAD\",\n    *,\n    _touched_files_override:\
      \ list[str] | None = None,\n    _current_branch_override: str | None = None,\n\
      \    _has_merge_commits_override: bool | None = None,\n) -> dict:\n    \"\"\"\
      Validate the diff between ref_a and ref_b is within\n    consensus.implementation_scope.\
      \ Returns the structured report.\n\n    Dependency-injection seams (underscore-prefixed\
      \ kwargs) let the self-test\n    bypass real git invocation. Production callers\
      \ pass only the positional\n    args.\n    \"\"\"\n    findings: list[dict]\
      \ = []\n\n    consensus = _parse_yaml_file(consensus_path)\n\n    impl_scope\
      \ = consensus.get(\"implementation_scope\")\n    if not isinstance(impl_scope,\
      \ dict):\n        findings.append({\n            \"id\": \"IMPLEMENTATION_SCOPE_MISSING_FROM_CONSENSUS\"\
      ,\n            \"severity\": \"high\",\n            \"field\": \"implementation_scope\"\
      ,\n            \"claim\": \"consensus.yaml has no implementation_scope block;\
      \ \"\n                     \"section 13 schema required for scope_check (P0-V5)\"\
      ,\n        })\n        return _wrap(\n            findings,\n            consensus_path,\n\
      \            ref_a,\n            ref_b,\n            scope_block={\n       \
      \         \"passed\": False,\n                \"touched_files\": [],\n     \
      \           \"out_of_scope_files\": [],\n                \"ref_a\": ref_a,\n\
      \                \"ref_b\": ref_b,\n            },\n        )\n\n    allowed_files\
      \ = impl_scope.get(\"allowed_files\") or []\n    forbidden_files = impl_scope.get(\"\
      forbidden_files\") or []\n    forbidden_actions = impl_scope.get(\"forbidden_actions\"\
      ) or []\n\n    if not isinstance(allowed_files, list):\n        allowed_files\
      \ = []\n    if not isinstance(forbidden_files, list):\n        forbidden_files\
      \ = []\n    if not isinstance(forbidden_actions, list):\n        forbidden_actions\
      \ = []\n\n    # ---- Touched files ----\n    if _touched_files_override is not\
