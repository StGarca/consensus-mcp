      gate_decision\", \"dry_run_isolation_caveats\"],\n    },\n}\n\n\ndef _apply_patch(text:\
      \ str, old_string: str, new_string: str, file_label: str) -> tuple[str, str\
      \ | None]:\n    \"\"\"Apply one old->new substitution. Returns (new_text, error_or_None).\"\
