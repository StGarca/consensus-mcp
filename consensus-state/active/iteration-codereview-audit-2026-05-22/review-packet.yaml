      ## LOW / informational


      - **`_self_drive.py:314–324`** `cmd_validate` returns `valid:true` in JSON but
      exit `2` on scope-signature mismatch — dual-signal API; `cmd_close` handles
      it fail-closed, so low risk, but confusing. (conf 85)

      - **`_resume.py` blocker detail** — `satisfiable_now=False` always reports `needs_cross_family_reviewer`
      even when the real cause is "mutation actor family unknown." (conf 88)

      - **`_self_drive.py:147`** `_scope_signature` double YAML round-trip without
      `sort_keys` on the inner dump → latent cross-PyYAML-version signature instability.
      Consider `json.dumps(sort_keys=True)`. (conf 87)

      - **`_resume.py:335`** abort-signal path hardcodes `iter_dir.parent.parent`
      (assumes fixed depth). (conf 83)

      - **`workflow_engine.py:369–393`** convergence packet inlines full proposal
      file contents and grows each round → can exceed downstream adapter parse/timeout
      limits. Store refs+hashes. (conf 80)

      - **`validators/consensus_gate.py:228`** `APPROVAL_MISSING` emitted `severity:"medium"`
      while every sibling blocking condition uses `"high"` → severity-filtered consumers
      under-weight it. (conf 88)

      - **`validators/scope_check.py:125–128`** leading `**/` rewritten to `*/` →
      `**/foo.py` fails to match a repo-root `foo.py` (under-match; fail-open for
