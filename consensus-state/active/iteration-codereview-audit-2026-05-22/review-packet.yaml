      \ attributes).\"\"\"\n    if name == \"REPO_ROOT\":\n        return project_root()\n\
      \    if name == \"SPEC_PATH\":\n        return spec_path()\n    if name == \"\
      ACTIVE_DIR\":\n        return active_dir()\n    raise AttributeError(f\"module\
      \ {__name__!r} has no attribute {name!r}\")\n\nDEFAULT_VALIDATORS = [\n    \"\
