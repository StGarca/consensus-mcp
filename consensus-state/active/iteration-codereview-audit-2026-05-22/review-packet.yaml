      \ therefore inaccurate. The output field\n    dry_run_isolation_caveats documents\
      \ which checks are affected; callers should inspect\n    it before trusting\
      \ dry-run results for those patch classes.\n    \"\"\"\n    if proposed_patches\
      \ is None:\n        proposed_patches = []\n    if validators_to_run is None:\n\
      \        validators_to_run = list(DEFAULT_VALIDATORS)\n\n    # Refuse empty\
      \ validator list: canonical-006 requires SOME validation; an empty\n    # list\
