      \ state.\n\n    Isolation limitation: REPO_ROOT is resolved at module import\
      \ time. Validators 1\n    (archived_at file existence), 5 (phase_0 script gitignore),\
      \ and 6 (archive index\n    xref) resolve file paths against the real filesystem,\
      \ not the staging dir. Dry-run\n    results for patches that add/remove archived_at\
