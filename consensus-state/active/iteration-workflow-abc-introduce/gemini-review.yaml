proposal:
  selected_target: Implement Workflow C (autonomous consensus-to-completion) and rename
    existing workflows to aliases A ('propose-converge') and B ('post-review').
  rationale_vs_alternatives: "This directly addresses the operator's directive to\
    \ enable unattended runs, significantly increasing throughput for large-scale\
    \ tasks by allowing the system to operate overnight. Workflow C, with its pre-declared\
    \ scope boundaries, provides a safe mechanism for autonomy. The A/B renaming improves\
    \ clarity and usability of the operator-facing controls. The alternative\u2014\
    requiring manual approval for all emergent scope\u2014is the current bottleneck\
    \ that this change is designed to solve. A more complex boundary system was considered\
    \ but deferred in favor of an initial, simpler implementation (e.g., glob patterns)\
    \ to deliver value faster."
  deliverable_scope:
    next_iteration_id: iteration-0040-workflow-abc-impl
    files_in_scope:
    - consensus_mcp/config.py
    - consensus_mcp/workflow_engine.py
    - consensus_mcp/validators/scope_check.py
    - consensus_mcp/goal_packet_schema.yaml
    - consensus_mcp/_self_drive.py
    - docs/**/*.md
    - consensus_mcp/dispatch_templates/*.md
    - consensus_mcp/tests/test_workflow_engine_autonomous.py
    files_out_of_scope:
    - consensus_mcp/_visibility_tui.py
    - consensus-state/archive/*
    - Core consensus and convergence algorithms (only the orchestration layer is in
      scope)
    key_design_decisions:
    - Define Workflow C's auto-approval boundaries via a new `scope_boundaries` key
      in `goal_packet.yaml`. This key will contain `allowed_file_patterns` (a list
      of globs) to validate emergent scope against.
    - The `workflow_engine` will, under Workflow C, invoke the `scope_check` validator
      on any newly-proposed scope. If validation passes, the workflow proceeds without
      operator intervention. If it fails, the engine will halt the run for that scope
      item, requiring operator review to resume.
    - 'Update `config.py`: Add `WORKFLOW_AUTONOMOUS = ''autonomous''`. Update `WORKFLOW_ALIASES`
      to map ''A'' -> ''propose-converge'', ''B'' -> ''post-review'', ''C'' -> ''autonomous''.
      Mark numeric aliases ''3'' and ''4'' as deprecated but retain them for backward
      compatibility in the mapping to avoid breaking existing scripts.'
    - 'Perform a global search-and-replace to update all user-facing documentation,
      templates, and helper text from ''workflow #3''/''#4'' to ''Workflow B''/''A''
      respectively, ensuring consistent terminology.'
    acceptance_gates:
    - A new unit test for `scope_check.py` confirms that it correctly validates file
      paths against glob patterns defined in the goal packet.
    - A new integration test for `workflow_engine.py` successfully completes a multi-step
      task using Workflow C, demonstrating auto-approval of an in-scope change.
    - A second integration test for Workflow C demonstrates that the process correctly
      halts and awaits operator input when an out-of-scope change is proposed.
    - 'A `grep` search for ''workflow #3'' and ''workflow #4'' across the repository
      (excluding `consensus-state/archive` and `CHANGELOG.md`) yields no results.'
  risks:
  - Risk of scope creep if `scope_boundaries` glob patterns are too permissive. Initial
    implementation and documentation must guide the operator to use conservative,
    specific patterns.
  - The halt-on-failure mechanism for out-of-scope changes must be robustly implemented
    to prevent the system from entering a non-recoverable state during an unattended
    run.
  - The manual process of updating all documentation is error-prone. A missed reference
    to the old workflow numbers could lead to user confusion or broken commands.
  estimated_complexity: medium
  structural_abstention: false
