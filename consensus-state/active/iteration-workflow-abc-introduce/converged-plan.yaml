q3_halt_set:
  weighted_synthesis: |
    Wide-by-default per claude+codex consensus. Required
    halt conditions in v1.14.4:
      (a) blocking_objection raised
      (b) test_suite_regression vs baseline
      (c) schema_change_proposed
      (d) max_iterations exceeded
      (e) max_wall_clock_minutes exceeded
      (f) convergence fails after N rounds
      (g) reviewer_dispatch_permanent_failure
      (h) files outside allowed patterns touched
      (i) files in forbidden patterns touched
      (j) operator_interrupt_file_present
      (k) reviewer_explicit_recommend_operator_review

    PLUS codex's autonomy ledger check: every executed scope
    item must be predeclared OR auto-approved within bounds
    OR explicitly operator-approved. No silent overrides.

    Operator opts OUT of specific halt conditions per-run via
    autonomy_contract.skip_halt_on (preserves control while
    making safety the default).

q4_loop_semantics:
  claude_position: '(c) queue-based for safety'
  codex_position: 'auto-approve emergent scope from convergence within bounds (closer to (a))'
  gemini_position: 'auto-proceed when scope passes validation (closer to (a))'
  weighted_synthesis: |
    Codex+gemini consensus wins: Workflow C is
    AUTO-EMERGENCE (new scope from convergence is auto-
    approved if within bounds), not queue-based. Operator's
    directive said "new scope is automatically approved if
    within scope" — that IS the auto-emerge pattern.
    Claude's queue-based proposal was overly cautious; the
    no-deferral rule's "default to completion" applies here.

    Out-of-bounds scope is PARKED (not silently rejected) per
    codex; operator returns to a parked-items list they can
    approve/reject.

