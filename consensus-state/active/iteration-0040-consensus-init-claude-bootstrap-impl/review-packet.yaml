      \ \".consensus/cache/\",\n    \".consensus/logs/\",\n)\n\n\nclass WizardError(RuntimeError):\n\
      \    pass\n\n\ndef _detect_repo_root(start: Path | None = None) -> Path:\n \
      \   \"\"\"Resolve project root for the iteration.\n\n    iter-0031 (per iter-0030\
