      \ else cfg.INDEPENDENCE_VISIBLE\n                )\n            if \"finding_disposition\"\
      \ not in set_flags:\n                base[\"convergence\"][\"finding_disposition\"\
      ] = cfg.DISPOSITION_ALL_OR_NOTHING\n\n    base[\"project\"][\"name\"] = repo_root.name\n\
      \    cfg.validate(base)\n    return base\n\n\ndef write_config(config: dict,\
      \ path: Path) -> None:\n    \"\"\"Atomically write config YAML to path.\"\"\"\
      \n    path.parent.mkdir(parents=True, exist_ok=True)\n    tmp = path.with_suffix(path.suffix\
      \ + \".tmp\")\n    tmp.write_text(\n        yaml.safe_dump(config, sort_keys=False,\
      \ default_flow_style=False),\n        encoding=\"utf-8\",\n    )\n    tmp.replace(path)\n\
      \n\ndef _config_diff(old: dict, new: dict) -> str:\n    \"\"\"Return a well-formed\
      \ unified diff of two configs serialized as YAML.\"\"\"\n    a = yaml.safe_dump(old,\
      \ sort_keys=False, default_flow_style=False).splitlines()\n    b = yaml.safe_dump(new,\
      \ sort_keys=False, default_flow_style=False).splitlines()\n    # Use lineterm=''\
      \ + join with '\\n' so control records (---, +++, @@) and\n    # body lines\
      \ all end with one newline (codex-rev-004).\n    diff_lines = list(difflib.unified_diff(a,\
      \ b, fromfile=\"existing\", tofile=\"proposed\", lineterm=\"\"))\n    return\
      \ \"\\n\".join(diff_lines)\n\n\ndef update_gitignore(repo_root: Path) -> bool:\n\
      \    \"\"\"Add managed paths to .gitignore between bracketed markers. Returns\
      \ True if changed.\n\n    Idempotent: complete marker pairs are stripped, then\
      \ a single fresh managed\n    block is appended. If the file contains an OPEN\
      \ marker without a CLOSE\n    marker (or vice versa), the file is treated as\
      \ foreign and left untouched\n    — a fresh block is appended but no existing\
      \ lines are deleted\n    (codex-rev-005).\n    \"\"\"\n    gi = repo_root /\
      \ \".gitignore\"\n    existing = gi.read_text(encoding=\"utf-8\") if gi.exists()\
      \ else \"\"\n\n    # Validate that markers are well-ordered: each open is followed\
      \ by a close\n    # before another open, and there are no orphans. Counts must\
      \ match AND\n    # ordering must be valid (codex pass-2 rev-005 + codex pass-3\
      \ rev-001).\n    markers_well_formed = True\n    depth = 0\n    for line in\
      \ existing.splitlines():\n        if line == GITIGNORE_OPEN_MARKER:\n      \
      \      depth += 1\n            if depth != 1:\n                markers_well_formed\
      \ = False\n                break\n        elif line == GITIGNORE_CLOSE_MARKER:\n\
      \            depth -= 1\n            if depth != 0:\n                markers_well_formed\
      \ = False\n                break\n    if depth != 0:\n        markers_well_formed\
      \ = False\n\n    stripped_lines: list[str] = []\n    if markers_well_formed:\n\
      \        in_block = False\n        for line in existing.splitlines():\n    \
      \        if line == GITIGNORE_OPEN_MARKER:\n                in_block = True\n\
      \                continue\n            if line == GITIGNORE_CLOSE_MARKER:\n\
      \                in_block = False\n                continue\n            if\
      \ not in_block:\n                stripped_lines.append(line)\n    else:\n  \
      \      # Malformed (orphan markers, reversed order, nested, etc.):\n       \
      \ # preserve every existing line; never silently drop content.\n        # BUT\
      \ we still strip OUR own previously appended exact managed block at\n      \
      \  # the tail so reruns remain idempotent (codex pass-4 rev-001).\n        raw_lines\
      \ = existing.splitlines()\n        block_size = len(GITIGNORE_MANAGED_PATHS)\
      \ + 2  # open + paths + close\n        if (\n            len(raw_lines) >= block_size\n\
      \            and raw_lines[-block_size] == GITIGNORE_OPEN_MARKER\n         \
      \   and raw_lines[-1] == GITIGNORE_CLOSE_MARKER\n            and raw_lines[-(block_size\
      \ - 1):-1] == list(GITIGNORE_MANAGED_PATHS)\n        ):\n            # Drop\
      \ the trailing managed block + any blank separator immediately\n           \
      \ # before it so the next append doesn't accumulate blank lines.\n         \
      \   raw_lines = raw_lines[:-block_size]\n            while raw_lines and raw_lines[-1].strip()\
      \ == \"\":\n                raw_lines.pop()\n        stripped_lines = raw_lines\n\
      \n    new_block = [GITIGNORE_OPEN_MARKER, *GITIGNORE_MANAGED_PATHS, GITIGNORE_CLOSE_MARKER]\n\
      \    new_content_lines = list(stripped_lines)\n    if new_content_lines and\
      \ new_content_lines[-1].strip() != \"\":\n        new_content_lines.append(\"\
      \")\n    new_content_lines.extend(new_block)\n    new_content = \"\\n\".join(new_content_lines)\
      \ + \"\\n\"\n\n    if new_content == existing:\n        return False\n    gi.write_text(new_content,\
      \ encoding=\"utf-8\")\n    return True\n\n\ndef cmd_init(args) -> int:\n   \
      \ \"\"\"Implement the `consensus init` command.\"\"\"\n    repo_root = _detect_repo_root()\n\
      \    config_path = _resolve_config_path(args, repo_root)\n\n    if args.check:\n\
      \        if not config_path.exists():\n            print(f\"error: {config_path}\
      \ does not exist\", file=sys.stderr)\n            return 2\n        try:\n \
      \           loaded = cfg.load(config_path)\n        except cfg.ConfigValidationError\
      \ as exc:\n            print(f\"error: invalid config: {exc}\", file=sys.stderr)\n\
      \            return 3\n        print(yaml.safe_dump(loaded, sort_keys=False,\
      \ default_flow_style=False))\n        return 0\n\n    if args.print_defaults:\n\
      \        print(yaml.safe_dump(cfg.default_config(), sort_keys=False, default_flow_style=False))\n\
      \        return 0\n\n    # gemini pass-3 rev-001: --dry-run no longer forces\
      \ non-interactive. Users\n    # can preview an interactive session via `consensus\
      \ init --dry-run`.\n    # Interactivity is suppressed only by --non-interactive\
      \ or --accept-defaults.\n    # codex pass-4 rev-002: check existing-config guard\
      \ BEFORE we build / prompt\n    # so exit 4 wins over exit 1 (user abort during\
      \ interactive) and exit 3\n    # (invalid construction).\n    if config_path.exists()\
      \ and not (args.reconfigure or args.force):\n        print(\n            f\"\
      error: {config_path} already exists. Use --reconfigure to update \"\n      \
      \      f\"or --force to overwrite.\",\n            file=sys.stderr,\n      \
      \  )\n        return 4\n\n    interactive = not (args.non_interactive or args.accept_defaults)\n\
      \n    try:\n        new_config = build_config_from_flags(args, repo_root, interactive=interactive)\n\
      \    except cfg.ConfigValidationError as exc:\n        print(f\"error: invalid\
      \ config: {exc}\", file=sys.stderr)\n        return 3\n    except KeyboardInterrupt:\n\
      \        print(\"\\naborted by user\", file=sys.stderr)\n        return 1\n\n\
      \    if args.reconfigure and config_path.exists():\n        try:\n         \
      \   existing = cfg.load(config_path)\n            diff = _config_diff(existing,\
      \ new_config)\n            if diff:\n                print(\"--- reconfigure\
      \ diff ---\")\n                print(diff)\n                print(\"--- end\
      \ diff ---\")\n            else:\n                print(\"reconfigure: no changes\"\
      )\n        except cfg.ConfigValidationError:\n            print(f\"note: existing\
      \ config at {config_path} is invalid; overwriting\")\n\n    if args.dry_run:\n\
      \        print(f\"DRY RUN: would write {config_path}\")\n        print(yaml.safe_dump(new_config,\
      \ sort_keys=False, default_flow_style=False))\n        if not args.no_update_gitignore:\n\
      \            print(f\"would update .gitignore at {repo_root / '.gitignore'}\
      \ (managed block)\")\n        else:\n            print(\".gitignore update skipped\
      \ (--no-update-gitignore)\")\n        if not args.no_mcp_json:\n           \
      \ mcp_path = _resolve_mcp_json_path(repo_root)\n            print(f\"would write\
      \ .mcp.json at {mcp_path} (consensus-mcp registered)\")\n        else:\n   \
      \         print(\".mcp.json write skipped (--no-mcp-json)\")\n        return\
      \ 0\n\n    write_config(new_config, config_path)\n    print(f\"wrote {config_path}\"\
      )\n\n    if not args.no_update_gitignore:\n        changed = update_gitignore(repo_root)\n\
      \        if changed:\n            print(f\"updated .gitignore at {repo_root\
      \ / '.gitignore'}\")\n        else:\n            print(\".gitignore already\
      \ up to date\")\n\n    # iter-0031: write .mcp.json by default (per iter-0030\
      \ converged plan).\n    if not args.no_mcp_json:\n        try:\n           \
      \ command, mcp_args, is_portable = _resolve_mcp_command(args.mcp_command)\n\
      \        except ValueError as exc:\n            print(f\"WARN: --mcp-command\
      \ invalid: {exc}; skipping .mcp.json\", file=sys.stderr)\n            return\
      \ 0\n        state_root = repo_root / \"consensus-state\"\n        project_root\
      \ = repo_root\n        status, mcp_path = _write_mcp_json(\n            repo_root,\n\
      \            state_root,\n            project_root,\n            command,\n\
      \            mcp_args,\n            force=args.mcp_force,\n        )\n     \
      \   if status == \"wrote\":\n            print(f\"wrote {mcp_path} (consensus-mcp\
      \ registered)\")\n        elif status == \"merged\":\n            print(f\"\
      merged consensus-mcp into existing {mcp_path}\")\n        elif status == \"\
      already-current\":\n            print(f\"consensus-mcp entry in {mcp_path} already\
      \ current\")\n        elif status == \"blocked-conflict\":\n            print(\n\
      \                f\"BLOCKED: existing consensus-mcp entry in {mcp_path} differs\
      \ \"\n                f\"from desired config. Use --mcp-force to replace, or\
      \ edit \"\n                f\"manually.\",\n                file=sys.stderr,\n\
      \            )\n        elif status.startswith(\"parse-error:\"):\n        \
      \    err_detail = status[len(\"parse-error:\"):]\n            print(\n     \
      \           f\"WARN: {mcp_path} failed to parse as JSON ({err_detail}); \"\n\
      \                f\"not modifying. Fix the file manually or delete it and re-run.\"\
      ,\n                file=sys.stderr,\n            )\n        else:\n        \
      \    print(f\"WARN: unknown mcp-json status {status!r}\", file=sys.stderr)\n\
      \    else:\n        print(\".mcp.json write skipped (--no-mcp-json)\")\n\n \
      \   # iter-0040: optional install of Claude Code skill + slash command pack.\n\
      \    if getattr(args, \"install_claude_code\", False):\n        claude_home\
      \ = _resolve_claude_home()\n        for line in _install_claude_extensions(claude_home,\
      \ force=args.force):\n            print(line)\n\n    # iter-0040: when invoked\
      \ from inside a Claude Code session, print\n    # contextual restart guidance\
      \ so the user knows what to do next.\n    if getattr(args, \"from_claude_code\"\
      , False):\n        print()\n        print(\n            \"Detected --from-claude-code:\
      \ Claude Code must reload to \"\n            \"activate the consensus-mcp server.\
      \ Either restart Claude \"\n            \"Code in this project (Ctrl-C, then\
      \ `claude code`), or run \"\n            \"`/mcp` to reload MCP servers if your\
      \ build supports it.\"\n        )\n\n    return 0\n\n\ndef main(argv: list[str]\
      \ | None = None) -> int:\n    # iter-0040 (per iter-0039 converged plan Q6 bonus):\
      \ the package also ships\n    # a `consensus` console-script alias. When invoked\
      \ as `consensus init ...`,\n    # argv[0] is the literal subcommand \"init\"\
      . Strip it so argparse sees the\n    # same arguments as `consensus-init ...`.\
      \ Any other leading token is left\n    # in place (treated as an unrecognized\
      \ argument by argparse, which\n    # produces the expected usage error).\n \
      \   if argv is None:\n        raw = sys.argv[1:]\n    else:\n        raw = list(argv)\n\
      \    if raw and raw[0] == \"init\":\n        raw = raw[1:]\n    argv = raw\n\
      \n    parser = argparse.ArgumentParser(\n        prog=\"consensus init\",\n\
      \        description=\"Initialize .consensus/config.yaml for cross-AI workflow\"\
      ,\n    )\n    parser.add_argument(\"--check\", action=\"store_true\", help=\"\
      validate existing config and exit\")\n    parser.add_argument(\"--print-defaults\"\
      , action=\"store_true\", help=\"print default YAML to stdout\")\n    parser.add_argument(\"\
      --dry-run\", action=\"store_true\", help=\"show intended config; do not write\"\
      )\n    parser.add_argument(\"--non-interactive\", action=\"store_true\", help=\"\
      no prompts\")\n    parser.add_argument(\"--accept-defaults\", action=\"store_true\"\
      , help=\"non-interactive with defaults\")\n    parser.add_argument(\"--reconfigure\"\
      , action=\"store_true\", help=\"re-prompt with existing as defaults; show diff\"\
      )\n    parser.add_argument(\"--force\", action=\"store_true\", help=\"overwrite\
      \ without prompt\")\n    parser.add_argument(\"--no-update-gitignore\", action=\"\
      store_true\", help=\"skip .gitignore marker write\")\n    parser.add_argument(\"\
      --config\", default=None, help=\"override config path\")\n\n    # iter-0031:\
      \ .mcp.json bootstrap flags (per iter-0030 converged plan).\n    parser.add_argument(\"\
      --no-mcp-json\", action=\"store_true\",\n                        help=\"skip\
      \ writing .mcp.json (default: auto-write)\")\n    parser.add_argument(\"--mcp-command\"\
      , default=None,\n                        help=(\"override the command written\
      \ into .mcp.json. \"\n                              \"Whitespace-split; first\
      \ token = command, rest = args. \"\n                              \"Default:\
      \ discover via PATH (consensus-mcp), else \"\n                             \
      \ \"fall back to sys.executable -m consensus_mcp.server.\"))\n    parser.add_argument(\"\
      --mcp-force\", action=\"store_true\",\n                        help=(\"replace\
      \ existing consensus-mcp entry in .mcp.json \"\n                           \
      \   \"even when it differs from the desired config. \"\n                   \
      \           \"Does NOT overwrite other servers in mcpServers.\"))\n\n    # iter-0040:\
      \ Claude Code bootstrap pack flags (per iter-0039 converged plan).\n    parser.add_argument(\"\
      --install-claude-code\", action=\"store_true\",\n                        help=(\"\
      copy shipped skill + slash-command into \"\n                              \"\
      $CLAUDE_HOME or ~/.claude so Claude Code can \"\n                          \
      \    \"trigger consensus-init from chat. Idempotent; \"\n                  \
      \            \"use --force to overwrite user-edited content.\"))\n    parser.add_argument(\"\
      --from-claude-code\", action=\"store_true\",\n                        help=(\"\
      the caller is a Claude Code skill / slash \"\n                             \
      \ \"command; print contextual restart guidance \"\n                        \
      \      \"after init.\"))\n\n    parser.add_argument(\"--workflow\", default=None,\n\
      \                        choices=[\"3\", \"4\", \"post-review\", \"propose-converge\"\
      , \"advisory\"],\n                        help=\"workflow mode\")\n    parser.add_argument(\"\
      --contributors\", default=None,\n                        help=\"comma-separated\
      \ list of enabled contributors\")\n    parser.add_argument(\"--independence\"\
      , default=None,\n                        choices=list(cfg.VALID_INDEPENDENCE),\n\
      \                        help=\"independence model\")\n    parser.add_argument(\"\
      --convergence\", default=None,\n                        choices=list(cfg.VALID_CONVERGENCE),\n\
      \                        help=\"convergence rule\")\n    parser.add_argument(\"\
      --finding-disposition\", default=None,\n                        choices=list(cfg.VALID_DISPOSITION),\n\
      \                        help=\"finding disposition granularity\")\n    parser.add_argument(\"\
      --snapshot-trigger\", default=None,\n                        choices=list(cfg.VALID_SNAPSHOT_TRIGGER),\n\
      \                        help=\"snapshot trigger policy\")\n    parser.add_argument(\"\
      --snapshot-every-iterations\", type=int, default=None,\n                   \
      \     help=\"periodic snapshot iteration cadence\")\n    parser.add_argument(\"\
      --patch-authoring\", default=None,\n                        choices=list(cfg.VALID_PATCH_AUTHORING),\n\
      \                        help=\"patch authoring permission\")\n    parser.add_argument(\"\
      --timeout-policy\", default=None,\n                        choices=list(cfg.VALID_TIMEOUT_POLICY),\n\
      \                        help=\"contributor timeout policy\")\n\n    args =\
      \ parser.parse_args(argv)\n    return cmd_init(args)\n\n\nif __name__ == \"\
      __main__\":\n    sys.exit(main())\n"
    consensus_mcp/claude_extensions/skills/consensus/SKILL.md: "---\nname: consensus\n\
      description: Bootstrap or check consensus-mcp in this project. Trigger when\
      \ the user says \"consensus init\", \"bootstrap consensus\", \"set up consensus\"\
      , \"initialize consensus-mcp\", or asks to install/enable the cross-AI consensus\
      \ workflow in their current project.\n---\n\n# Consensus-mcp project bootstrap\n\
      \nThis skill is the entry point for setting up the **consensus-mcp** cross-AI\n\
      consensus workflow in a project. It is invoked when the user expresses intent\n\
      to initialize consensus-mcp — typically by typing phrases like\n\"consensus\
      \ init\", \"set up consensus\", or \"bootstrap consensus\" without a\nleading\
      \ slash.\n\n## What it does\n\n1. Run the shell binary `consensus-init --from-claude-code`\
      \ (installed by\n   `pipx install consensus-mcp`).\n2. Surface the binary's\
      \ stdout/stderr verbatim — `consensus-init` already\n   prints the right next-step\
      \ guidance, so don't paraphrase or summarize.\n3. If `consensus-init` fails\
      \ because the binary is not on PATH, tell the\n   user to run `pipx install\
      \ consensus-mcp` once globally.\n4. After a successful bootstrap, point the\
      \ user at the restart step\n   (Claude Code must reload to pick up the new MCP\
      \ server). The CLI output\n   already says this; just confirm.\n\n## How to\
      \ invoke\n\nUse Bash to run `consensus-init --from-claude-code` from the current\n\
      working directory. The binary detects the project root automatically\n(git rev-parse\
      \ → strong markers → cwd, per iter-0031).\n\n## What NOT to do\n\n- Don't reimplement\
      \ any of `consensus-init`'s logic. It writes\n  `.consensus/config.yaml`, `.mcp.json`,\
      \ and a `.gitignore` managed\n  block — let the binary handle all of that.\n\
      - Don't paraphrase the binary's output. Operators rely on the exact\n  next-step\
      \ text from the CLI.\n- Don't run if the user is asking a conceptual question\n\
      \  (\"what is consensus-mcp?\", \"how does consensus work?\") — that is\n  not\
      \ a bootstrap intent.\n\n## Expected output flow\n\n```text\n$ consensus-init\
      \ --from-claude-code\n.mcp.json written: <project-root>/.mcp.json\n.consensus/config.yaml\
      \ written: <project-root>/.consensus/config.yaml\n.gitignore managed block added.\n\
      \nDetected --from-claude-code: Claude Code must reload to activate the\nconsensus-mcp\
      \ server. Either restart Claude Code in this project\n(Ctrl-C, then `claude\
      \ code`), or run `/mcp` to reload MCP servers\nif your build supports it.\n\
      ```\n\nAfter running, confirm the message to the user and stop. Do not\nattempt\
      \ to invoke any consensus-mcp MCP tool in the same session —\nthey won't be\
      \ available until Claude Code reloads.\n"
    consensus_mcp/claude_extensions/commands/consensus-init.md: '---

      description: Bootstrap consensus-mcp in this project (writes .mcp.json + .consensus/config.yaml
      via the consensus-init shell binary)

      ---


      Run `consensus-init --from-claude-code` via Bash from the current working

      directory. Surface the binary''s stdout/stderr verbatim — it already prints

      the correct next-step guidance, including the restart instructions for

      Claude Code.


      If the binary is not on PATH, tell the user to run

      `pipx install consensus-mcp` once globally and retry. If the bootstrap

      succeeds, confirm the binary''s restart message to the user and stop —

      the consensus-mcp MCP tools will not be available until Claude Code

      reloads.


      Do not reimplement any of `consensus-init`''s logic. The binary handles

      `.mcp.json` writing, `.consensus/config.yaml` creation, `.gitignore`

      managed block, and Claude-Code-specific restart messaging.

      '
    consensus_mcp/tests/test_init_wizard_install_claude_code.py: "\"\"\"iter-0040\
      \ — tests for consensus-init --install-claude-code + --from-claude-code.\n\n\
      Per iter-0039 converged-plan.yaml acceptance gates A1-A7.\n\nA1: package ships\
      \ consensus_mcp/claude_extensions/{skills,commands}/\nA2: --install-claude-code\
      \ copies into HOME idempotently\nA3: CLAUDE_HOME env override redirects install\
      \ destination\nA4: --from-claude-code prints Claude-Code-specific restart message\n\
      A5: `consensus init` (space form) routes to the same entry point\nA6: skill/command\
      \ content avoids consensus-mcp-internal jargon\nA7: README/CHANGELOG covered\
      \ by separate manual review\n\"\"\"\nfrom __future__ import annotations\n\n\
      import os\nimport sys\nfrom pathlib import Path\n\nimport pytest\n\nfrom consensus_mcp\
      \ import _init_wizard as wiz\n\n\n# ---------- A1: package-data presence ----------\n\
      \ndef test_claude_extensions_skill_md_ships_in_package():\n    \"\"\"A1: SKILL.md\
      \ must exist next to the module so package_data picks it up.\"\"\"\n    pkg_root\
      \ = Path(wiz.__file__).resolve().parent\n    skill = pkg_root / \"claude_extensions\"\
      \ / \"skills\" / \"consensus\" / \"SKILL.md\"\n    assert skill.exists(), f\"\
      missing packaged SKILL.md at {skill}\"\n    text = skill.read_text(encoding=\"\
      utf-8\")\n    assert text.startswith(\"---\"), \"SKILL.md must start with YAML\
      \ frontmatter\"\n    assert \"name: consensus\" in text\n    assert \"description:\"\
      \ in text\n\n\ndef test_claude_extensions_command_md_ships_in_package():\n \
      \   \"\"\"A1: consensus-init.md command file must ship with the package.\"\"\
      \"\n    pkg_root = Path(wiz.__file__).resolve().parent\n    cmd = pkg_root /\
      \ \"claude_extensions\" / \"commands\" / \"consensus-init.md\"\n    assert cmd.exists(),\
      \ f\"missing packaged command at {cmd}\"\n    text = cmd.read_text(encoding=\"\
      utf-8\")\n    assert text.startswith(\"---\"), \"command must start with YAML\
      \ frontmatter\"\n    assert \"description:\" in text\n\n\n# ---------- A2: --install-claude-code\
      \ copies idempotently ----------\n\ndef test_install_claude_code_copies_skill_and_command(tmp_path,\
      \ monkeypatch):\n    \"\"\"A2: --install-claude-code copies SKILL.md + command\
      \ MD into CLAUDE_HOME.\"\"\"\n    fake_home = tmp_path / \".claude\"\n    monkeypatch.setenv(\"\
      CLAUDE_HOME\", str(fake_home))\n    monkeypatch.chdir(tmp_path)\n\n    rc =\
      \ wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n      \
      \  \"--contributors\", \"claude,codex,gemini\",\n        \"--install-claude-code\"\
      ,\n        \"--no-mcp-json\",  # skip .mcp.json so test focuses on extensions\n\
      \    ])\n    assert rc == 0\n    assert (fake_home / \"skills\" / \"consensus\"\
      \ / \"SKILL.md\").exists()\n    assert (fake_home / \"commands\" / \"consensus-init.md\"\
      ).exists()\n\n\ndef test_install_claude_code_idempotent_on_rerun(tmp_path, monkeypatch):\n\
      \    \"\"\"A2: running --install-claude-code twice is a no-op the second time.\"\
      \"\"\n    fake_home = tmp_path / \".claude\"\n    monkeypatch.setenv(\"CLAUDE_HOME\"\
      , str(fake_home))\n    monkeypatch.chdir(tmp_path)\n\n    first = wiz.main([\n\
      \        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\"\
      , \"claude,codex,gemini\",\n        \"--install-claude-code\", \"--no-mcp-json\"\
      ,\n    ])\n    assert first == 0\n    skill = fake_home / \"skills\" / \"consensus\"\
      \ / \"SKILL.md\"\n    first_mtime = skill.stat().st_mtime\n    first_text =\
      \ skill.read_text(encoding=\"utf-8\")\n\n    # Rerun. config.yaml exists from\
      \ first run, so use --reconfigure.\n    # Skill content is byte-identical →\
      \ no rewrite.\n    second = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\"\
      ,\n        \"--contributors\", \"claude,codex,gemini\",\n        \"--install-claude-code\"\
      , \"--no-mcp-json\", \"--reconfigure\",\n    ])\n    assert second == 0\n  \
