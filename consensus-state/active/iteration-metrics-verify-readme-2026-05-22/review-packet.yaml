    consensus-state/active/iteration-metrics-verify-readme-2026-05-22/metrics-brief.md: "#\
      \ Consult: verify the cross-project metrics + write a layman README section\n\
      \nYou are one of several AI contributors in a Workflow A (propose-converge)\
      \ consult.\nTwo deliverables in your proposal:\n\n1. **VERIFY** the orchestrator's\
      \ cross-project metrics methodology + counts below.\n   State plainly whether\
      \ you agree, and where you think the numbers are wrong or\n   over/under-stated.\
      \ You CANNOT re-scan the filesystem (you only have what's\n   embedded here)\
      \ — so review the METHOD (the extraction script) and the\n   reported results\
      \ for soundness, bias, and likely error, and say where you'd\n   trust vs distrust\
      \ each number.\n2. **PROPOSE** a concise, layman-readable replacement for the\
      \ README's \"Does it\n   actually work?\" cross-project paragraph (constraints\
      \ at the bottom).\n\n## What was measured\n\nThe orchestrator (claude) used\
      \ consensus-mcp on three separate codebases and\ntried to aggregate the sealed\
      \ run history into one scorecard. Each project has\nits own `consensus-state/`\
      \ directory (project-specific) whose run artifacts are\ngitignored. The extractor\
      \ deduped sealed passes by content hash and counted ONLY\nstructured review\
      \ findings that carry a `severity` field (the codex/gemini/kimi\ncode-review\
      \ schema), excluding design-consult/proposal items.\n\n### Extraction method\
      \ (the script that produced the numbers)\n\n```python\n# dedup passes by packet_sha256\
      \ or (reviewer_id,pass_id); count findings objects\n# that HAVE a `severity`\
      \ key, from sealed passes only (dispatch_provenance or\n# reviewer_id+pass_id\
      \ present); classify selected_target/proposal as proposal passes.\n# apply/fix\
      \ events counted from independence-audit.yaml audit_log where\n# event in {apply_step_landed,patch_applied,codex_patch_apply,apply_consensus_patch}.\n\
      ```\n\n### Results (per project + total)\n\n| Project | Iterations | Review\
      \ passes | Bug findings (severitied) | Blocking/critical | fixes logged | Reliability\
      \ (orchestrator's own call) |\n|---|---|---|---|---|---|---|\n| Project A (the\
      \ tool itself) | 76 | 220 | 230 (5 critical, 55 blocking, 41 high, 82 medium,\
      \ 47 low) | 60 | 0 | RELIABLE — modern sealed format; matches an independent\
      \ count |\n| Project B (firmware/hardware UI) | 15 | 46 | 60 (14 high, 17 medium,\
      \ 26 blocking) | 26 | 0 | APPROXIMATE — single date, no converged-plans → older\
      \ format |\n| Project C (large ML pipeline) | 66 | 4 | 15 | 1 | 0 | UNDERCOUNT\
      \ — its reviews use a non-sealed `*-out.yaml` format the pass-filter skips;\
      \ true count is far higher (>=88 pass-like files) |\n| TOTAL | 157 | 270 | 305\
      \ | 87 | 0 | FLOOR ONLY — dominated by Project A; not a clean aggregate |\n\n\
      ### The orchestrator's own conclusions (verify or refute these)\n- Project A's\
      \ 230 findings / 60 blocking-or-critical is trustworthy (two independent counts\
      \ agree).\n- A single trustworthy cross-project total CANNOT be produced today:\
      \ the three\n  projects use different log formats/eras; `fixes_applied` is 0\
      \ everywhere\n  because corrections are not logged as events; findings vs design-consult\
      \ items\n  vs prose summaries are mixed. So 305 is a floor, not a real number.\n\
      - Therefore the README must NOT lean on the cross-project total; it should rest\
      \ on\n  Project A's reliable numbers + an honest \"used on other real codebases\
      \ too\"\n  statement, without fabricated aggregates.\n\n## Your task 1 — verdict\
      \ on the metrics\nDo you agree the methodology is sound and the conclusions\
      \ hold? Where do the\ncounts likely deviate (over or under)? Is 230/60 for Project\
      \ A defensible? Is it\nhonest to present 305 as a floor rather than a total?\
      \ Name any methodology flaw\n(dedup, severity-only filter, the `is_pass` filter\
      \ that undercounts Project C,\nfixes=0).\n\n## Your task 2 — propose the README\
      \ section\nWrite a concise (roughly 6-12 lines), plain-language \"Does it actually\
      \ work?\"\nsection a non-expert understands. Put your proposed markdown in\n\
      `rationale_vs_alternatives` (or deliverable_scope), clearly delimited.\n\nCONSTRAINTS\
      \ (hard):\n- Layman-readable; no jargon.\n- Ground claims ONLY in defensible\
      \ numbers (Project A's 230 findings / 60\n  blocking across 76 iterations; the\
      \ system is sealed/auditable; it's also used\n  on other real, separate codebases).\
      \ Do NOT cite the unreliable cross-project\n  total or Project B/C bug counts\
      \ as if precise.\n- Do NOT name any project, and do NOT use project-specific\
      \ terms (e.g. NO\n  \"emotion engine\" or any feature codename), and do NOT\
      \ use the words ebook,\n  audiobook, or narration.\n- It's fine to say the per-run\
      \ results aren't yet aggregated into one number\n  (honest), or to omit a cross-project\
      \ number entirely — your call, argue it.\n"
