goal_satisfied_rationale: "=== TASK 1 \u2014 VERDICT ON THE METRICS ===\n\n**Differential\
  \ / prior:** I am reasoning from the embedded extraction script and results table\
  \ as the authoritative source, treating the README's older figures (244 passes /\
  \ 74 iterations / 232 findings) as stale unless explicitly reconciled. The script's\
  \ logic is inspectable; the README's current prose is not.\n\n**Agree with the orchestrator\
  \ on the big picture:** A clean cross-project total is impossible today, and 305\
  \ is honestly a floor. However, I identify additional deviations and one important\
  \ non-falsifiable claim.\n\n**Where counts likely deviate:**\n1. **Project A (230/60):\
  \ DEFENSIBLE with caveats.** The severity buckets sum correctly (5+55+41+82+47 =\
  \ 230). The orchestrator's claim of \"two independent counts agree\" is strong converging\
  \ evidence. BUT: the severity-only filter is still a schema-dependent gate. Any\
  \ finding from an older format, a prose-only review, or a design consult that identified\
  \ a real defect without using the `severity` key is silently dropped. So 230 is\
  \ a defensible **floor** for Project A, not necessarily a complete count. The 60\
  \ blocking/critical is defensible because it is a strict subset with unambiguous\
  \ criteria.\n2. **Project B (60/26): LIKELY UNDER-COUNTED.** Labeled \"APPROXIMATE\
  \ \u2014 older format.\" The severity-only filter and the sealed-pass filter both\
  \ discard output from eras before the structured schema was stable. The true finding\
  \ count is probably higher; we just can't quantify by how much from the embedded\
  \ brief alone.\n3. **Project C (15/1): SEVERELY UNDER-COUNTED \u2014 the methodology\
  \ flaw is here.** The `is_pass` filter requires `dispatch_provenance` or `reviewer_id+pass_id`.\
  \ Project C's reviews live in a non-sealed `*-out.yaml` format that lacks these\
  \ fields. The brief itself says >=88 pass-like files exist; only 4 were counted.\
  \ This is not a minor variance \u2014 it's an order-of-magnitude blind spot.\n4.\
  \ **`fixes_applied=0` is a methodology failure, not a finding of zero fixes.** The\
  \ audit-log event set `{apply_step_landed,patch_applied,codex_patch_apply,apply_consensus_patch}`\
  \ does not capture manual edits, design-consult resolutions, or fixes applied through\
  \ non-audit paths. The README currently claims \"every one resolved before its change\
  \ merged\" \u2014 this is a non-falsifiable claim from the artifacts in evidence\
  \ (we can't refute it without reading every commit message, which we don't have).\
  \ It should be softened to \"addressed\" (fixed or dismissed with evidence) rather\
  \ than \"resolved.\"\n5. **Dedup by `(reviewer_id, pass_id)` is mostly sound** but\
  \ could miss duplicates if a re-run produces identical content under a different\
  \ pass_id while lacking a content hash \u2014 though the OR logic with `packet_sha256`\
  \ mitigates this.\n\n**Is presenting 305 as a floor honest?** Yes, it is honest,\
  \ but the table format (a \"TOTAL\" row in a results table) visually invites readers\
  \ to treat it as approximately complete. A more honest presentation would be to\
  \ omit the total row entirely or replace it with a range/uncertainty annotation.\
  \ Project C alone adds an unknown but large increment (>=88 files, of which some\
  \ unknown fraction contain findings).\n\n**Pre-specified refuting observation for\
  \ the \"230 is a complete count\" hypothesis:** If a manual audit of Project A's\
  \ 220 sealed passes found even one review file containing a valid bug finding that\
  \ lacks a `severity` key, the hypothesis that 230 equals the true finding count\
  \ is falsified. I expect this would be found.\n\n**Root-cause-independent safeguard:**\
  \ The README should never cite a cross-project total or a fixes_applied count, because\
  \ even if my specific hypotheses about under-counting are wrong, the logging methodology\
  \ is known to be incomplete across formats.\n\n\n=== TASK 2 \u2014 PROPOSED README\
  \ SECTION ===\n\n```markdown\n## Does it actually work?\n\nThe history is sealed\
  \ to disk with content hashes, so it's auditable:\n[`consensus-state/archive/review-passes/`](consensus-state/archive/review-passes).\n\
  \nIn 76 iterations of reviewing its own code, the panel found **230 issues,\n60\
  \ of them blocking or critical** \u2014 each addressed before the change\nmerged.\
  \ The same setup is also in active use on other real, separate\ncodebases. Because\
  \ those projects use different log formats, we don't\nyet combine their counts into\
  \ one headline number; every figure you see\nhere is drawn from the sealed artifacts.\n\
  ```\n\n**Why this version over alternatives:**\n- It grounds every claim in Project\
  \ A's defensible numbers (230/60 across 76 iterations) and the sealed/auditable\
  \ property.\n- It replaces \"resolved\" (implies fixed, which the event log can't\
  \ verify) with \"addressed\" (covers both fixes and evidence-based dismissals, which\
  \ the sealed process does guarantee).\n- It mentions other codebases honestly without\
  \ citing unreliable Project B/C counts or a fabricated cross-project total.\n- It\
  \ removes all project names, project-specific feature terms, and the banned words.\n\
  - It is 9 lines \u2014 within the 6-12 line constraint and significantly more concise\
  \ than the current 33-line section, reducing the chance that a reader skims past\
  \ it.\n\n**Rejected alternatives:**\n- Keeping the current paragraph about the external\
  \ project (neural TTS, emotion engine, ~100 iterations) \u2014 violates the project-name\
  \ and feature-term bans; also those numbers come from Project B/C which the brief\
  \ flags as approximate/under-counted.\n- Citing 305 as a cross-project floor \u2014\
  \ honest per the brief, but the brief itself says the README must NOT lean on it.\
  \ A floor in a headline number is still a precise-sounding number that invites false\
  \ confidence.\n- Claiming \"all 60 blocking findings were fixed\" \u2014 the fixes_applied=0\
  \ methodology gap makes this non-falsifiable and potentially misleading. \"Addressed\"\
  \ is the defensible formulation.\n- Dropping the \"other codebases\" mention entirely\
  \ \u2014 weaker than acknowledging real usage elsewhere while honestly disclaiming\
  \ aggregation."
