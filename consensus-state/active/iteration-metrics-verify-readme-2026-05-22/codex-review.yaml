goal_satisfied: true
goal_satisfied_rationale: 'Differential / prior: I am reasoning from an evidence-audit
  model, not a marketing model. A README claim should be based on the strongest reproducible
  artifact, and mixed-era telemetry should be disclosed as incomplete rather than
  normalized into a single headline number.


  Verdict on metrics: the methodology is sound for the narrow thing it actually measures:
  sealed, structured review findings with a `severity` key, deduped by packet hash
  or reviewer/pass identity. It is not sound as a complete cross-project productivity
  or defect-remediation metric. Project A''s 230 findings and 60 blocking-or-critical
  findings across 76 iterations is defensible because the brief says it uses the modern
  sealed format and matches an independent count. That does not prove every finding
  was correct or fixed; it proves the count of auditable severitied findings is reliable.
  Project B is approximate: older/sparser format, single-date history, and no converged
  plans make it less comparable. Project C is materially undercounted because the
  `is_pass` filter skips its non-sealed `*-out.yaml` pass-like files; the table''s
  4 review passes / 15 findings should not be presented as a project result. The `severity`-only
  filter undercounts design-consult value and prose-only findings while also excluding
  non-review proposals by design. Dedup by content hash or reviewer/pass identity
  is reasonable but can undercount repeated independent confirmations with identical
  packets, or overcount if the same substantive finding appears in distinct wording.
  `fixes_logged=0` is not evidence that no fixes were applied; it is evidence that
  apply/fix events were not logged through the counted audit events. Presenting 305
  as a floor is honest only if phrased as an incomplete lower bound from heterogeneous
  logs; it should not appear in README copy because readers will treat it as a clean
  total.


  External-system verification: this proposal does not recommend publishing to PyPI/npm/GitHub
  Releases/docs hosting or any other external distribution channel, so no external-channel
  step is proposed. The only artifact to touch is the repository README. No fixed/shipped
  claim is made.


  Root-cause falsifiability: the claim that Project C is undercounted due to the pass
  filter is provisional because the embedded brief, not the filesystem, is the evidence
  here. External refuting observation: running the extractor against Project C with
  an expanded pass detector that includes `*-out.yaml` files returns the same 4 review
  passes and 15 severitied findings, with no additional severitied findings in the
  >=88 pass-like files.


  Proposed README markdown:


  ```markdown

  ## Does it actually work?


  Yes, and the evidence is auditable.


  On this codebase, consensus-mcp has been used across 76 iterations. Those sealed
  runs recorded 230 review findings, including 60 marked blocking or critical.


  Each contributor''s answer is saved before the group result is chosen, so the record
  can be checked later instead of relying on a chat transcript.


  The same workflow has also been used on other separate, real codebases. Those histories
  are useful evidence, but they were logged in different formats, so they are not
  yet rolled into one clean cross-project total.

  ```


  This is better than alternatives that headline 305 or cite Project B/C precise counts
  because it avoids converting a known floor into marketing certainty. It is also
  better than omitting evidence entirely because it preserves the strongest defensible
  numeric claim: 230 total findings and 60 blocking-or-critical findings over 76 iterations,
  in sealed auditable runs.'
