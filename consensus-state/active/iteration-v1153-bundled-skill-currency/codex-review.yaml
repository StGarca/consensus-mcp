goal_satisfied_rationale: 'Differential/prior: this is a user-facing currency-drift
  hot-patch, not a behavior-change patch. The root failure is not one stale paragraph
  but new installers receiving stale doctrine/status text that contradicts already-shipped
  artifacts. From that prior, option (d) wins because F1, F2, F3, and F4 all share
  the same failure mode: already-passed or already-resolved forward references in
  installer-facing guidance/runtime status. F1-only answers the triggering operator
  question too narrowly and leaves the same new installer misled later. F1+F2 fixes
  shipped-reality drift in one file but leaves Workflow C''s passed target version
  in two installed skills and the runtime error. F1+F2+F3 fixes bundled docs but leaves
  the first operator who runs Workflow C seeing the same false v1.15.0 promise from
  code. The F4 blast radius is only a NotImplementedError message string and nearby
  comment, with no engine semantics changed, so release hygiene does not justify splitting
  it. Verification-first citations used for install/distribution claims: bundled install
  path verified via goal_packet F6 and consensus/SKILL.md bootstrap text; git-tag/pipx
  distribution verified via consensus-workflow/SKILL.md Release cadence step 6. Artifact-scope:
  v1.15.1 tag bef618cf contains converged-plan machine enforcement per CHANGELOG.md
  1.15.1; v1.15.2 tag fb60f3cf contains GEMINI_CLI_TRUST_WORKSPACE dispatcher injection
  per CHANGELOG.md 1.15.2; v1.15.0/1/2 do not contain this proposed v1.15.3 text correction.
  Q2: use option (b): state Workflow C remains unimplemented as of v1.15.2, no target
  version is committed, it is a named blocker documented in docs/workflows/workflow-c-autonomous.md,
  and running it raises NotImplementedError. Q3: include F4 now; this is code-string
  currency, not behavior code. Q4: include one normative line because it directly
  closes the operator''s actual question and prevents 2-AI/3-AI false distinctions
  from recurring. Q5: F1 should ship now; no blocker exists because facts, scope,
  and acceptance gates are already concrete. Observation that would show this recommendation
  wrong: a current-tree check proving workflow_engine.py''s Workflow C branch now
  implements multi-iteration execution, or proving the installed bootstrap no longer
  copies consensus-workflow to new users, would sever the shared failure-mode rationale
  for bundling F3/F4 or Q4 respectively.'
