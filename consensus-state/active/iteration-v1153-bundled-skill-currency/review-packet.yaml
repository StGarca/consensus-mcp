      \        post_review_voters = [c for c in enabled if c != cfg.CLAUDE]\n    \
      \    outcome.convergence = self._evaluate_convergence(\n            review_artifacts,\
      \ outcome, eligible_voters=post_review_voters\n        )\n        # Final artifact\
      \ for workflow #3 is the target itself (already written\n        # by claude\
      \ pre-engine); engine doesn't synthesize.\n        outcome.final_artifact_path\
      \ = target_path\n\n    def _run_workflow_4(\n        self,\n        iteration_dir:\
      \ Path,\n        goal_packet_path: Path,\n        problem_statement_path: Path,\n\
      \        outcome: IterationOutcome,\n    ) -> None:\n        \"\"\"Propose-converge\
      \ with blind-first-reveal independence.\n\n        Phases:\n          1. BLIND\
      \ PROPOSAL: all enabled contributors propose against the\n             problem\
