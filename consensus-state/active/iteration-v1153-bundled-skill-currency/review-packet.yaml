      \  # still annotates. `enforcement: doctrine-only` is exclusively a\n      \
      \  # READ-time classification (consensus_get_iteration_outcome) for\n      \
      \  # pre-v1.15.1 plans that have no convention_gate at all.\n        convention\
      \ = self._read_convention_input(iteration_dir)\n        risk_class = self._goal_risk_class(goal_packet_path)\n\
      \        result = vcp.validate_convention(\n            convention if convention\
      \ is not None else {},\n            risk_class=risk_class,\n            enforcement=enforcement,\n\
      \        )\n\n        if result[\"hard_reject\"]:\n            # Fail-closed:\
      \ surface the reasons and do NOT seal. codex-rev-004:\n            # a stale\
      \ converged-plan.yaml from an earlier run must not\n            # survive a\
      \ later hard reject and be mistaken for the outcome.\n            if out.exists():\n\
      \                out.unlink()\n            reasons = \"; \".join(result[\"hard_reject_reasons\"\
      ]) or (\n                \"missing/invalid convention blocks\"\n           \
      \ )\n            raise WorkflowError(\n                \"converged-plan convention\
      \ enforcement hard-rejected this \"\n                f\"iteration (enforcement={enforcement}):\
      \ {reasons}\"\n            )\n\n        # Always stamp a v1.15.1 convention_gate\
      \ (so the outcome reader can\n        # distinguish a v1.15.1 seal from a true\
      \ pre-v1.15.1 legacy plan).\n        # codex-rev-002 (pass-2): when a convention\
      \ IS present, stamp its\n        # version VERBATIM (never rewrite an invalid/foreign\
      \ version to the\n        # current one — the validator already flagged it;\
      \ a misleading\n        # top-level field would undo pass-1 codex-rev-003).\
      \ The\n        # current-version default applies ONLY to the absent-convention\n\
      \        # case, which is a legitimate v1.15.1 engine seal with no input.\n\
      \        if convention is not None:\n            plan[\"convention_schema_version\"\
      ] = convention.get(\n                \"convention_schema_version\"\n       \
      \     )\n            plan[\"convention\"] = convention\n        else:\n    \
      \        plan[\"convention_schema_version\"] = vcp.CONVENTION_SCHEMA_VERSION\n\
      \        plan[\"convention_violations\"] = result[\"violations\"]\n        gate\
      \ = {\n            \"enforcement\": enforcement,\n            \"hard_reject\"\
      : False,\n            \"presence_ok\": result[\"presence_ok\"],\n          \
      \  \"convention_present\": convention is not None,\n            \"gate_scope\"\
      : vcp.GATE_SCOPE_DISCLAIMER,\n        }\n        # codex-rev-001 (pass-2) transparency:\
      \ the converged plan's q4/q5\n        # DELIBERATELY makes graduated default\
      \ = warn+annotate for a new\n        # non-safety convergence missing blocks\
      \ (papercut-avoidance — an\n        # explicit named risk in the consult). That\
      \ is NOT a silent bypass:\n        # surface it loudly so an operator/outcome-reader\
      \ cannot mistake an\n        # annotated incomplete seal for a complete one.\n\
      \        if not result[\"presence_ok\"]:\n            gate[\"enforcement_note\"\
      ] = (\n                \"convention incomplete/absent and sealed under \"\n\
      \                f\"'{enforcement}' as warn+annotate (NOT a clean pass). \"\n\
      \                \"Per converged-plan q4/q5 only safety-class / proven-without-\"\
      \n                \"experiment hard-reject; non-safety is intentionally \"\n\
      \                \"non-blocking to avoid the rejected-goal_packet papercut.\
      \ \"\n                \"See convention_violations.\"\n            )\n      \
      \  plan[\"convention_gate\"] = gate\n\n        out.write_text(\n           \
      \ yaml.safe_dump(plan, sort_keys=False, default_flow_style=False, allow_unicode=True),\n\
      \            encoding=\"utf-8\",\n        )\n        return out\n"
    docs/workflows/workflow-c-autonomous.md: "# Workflow C — autonomous-execute\n\n\
      **Status (as of v1.15.2):** Contract shipped (v1.14.4). The\nmulti-iteration\
      \ engine is **UNIMPLEMENTED — no committed target\nversion.** The earlier \"\
      v1.15.0\" forward-reference came due\nunfulfilled (v1.15.0 = convergence-correctness\
      \ doctrine; v1.15.1 =\nconverged-plan machine-enforcement; v1.15.2 = gemini-dispatch\
      \ fix —\nnone shipped the Workflow C engine) and was corrected in v1.15.3\n\
      rather than re-promised against another version. This doc is the\nsingle source\
      \ of truth for status.\n\nWorkflow C runs consensus iterations to completion\
      \ **without\noperator-in-the-loop**, auto-approving emergent scope items if\
      \ they\nfall within an operator-pre-declared `autonomy_contract`. Designed\n\
      for overnight runs and operator-unavailable windows.\n\n## What v1.14.4 ships\n\
      \n- Letter aliases (A/B/C) replace numeric (3/4) as canonical operator\n  vocabulary.\
      \ Numeric aliases stay accepted for one cycle with\n  `DeprecationWarning`.\n\
      - `WORKFLOW_AUTONOMOUS_EXECUTE = \"autonomous-execute\"` constant in\n  `consensus_mcp/config.py`.\n\
      - `consensus_mcp/validators/scope_check.py` gains\n  `validate_autonomy_contract()`\
      \ + `check_autonomy_scope()` functions\n  for use by the engine (and by operators\
      \ authoring contracts).\n- Workflow C requires exactly 3 contributors (claude\
      \ + codex + gemini)\n  enforced at config-load.\n- `workflow_engine.py` recognizes\
      \ Workflow C and raises a clear\n  `NotImplementedError` (stating it is unimplemented\
      \ as of v1.15.2,\n  no committed target) when an operator tries to RUN one.\
      \ Operators\n  can stage and validate Workflow C goal_packets; execution is\n\
      \  gated until the engine ships.\n\n## What the engine will add (named blocker)\n\
      \nThe multi-iteration auto-execution loop. Specifically:\n\n- Cross-platform\
      \ interrupt-file watching (Windows `ReadDirectoryChangesW`\n  vs Unix `select`/`poll`\
      \ differences need validation).\n- Integration tests with real peer dispatches\
      \ (cost: dispatcher\n  latency × N iterations per test run).\n- Resume-after-halt\
      \ semantics (operator returns, hits a parked item,\n  approves it; how does\
      \ the loop pick up?).\n- Autonomy-ledger replay for failure recovery.\n\n##\
      \ What's deferred (no committed version)\n\nProject-level `.consensus/autonomous-policy.yaml`\
      \ as a default that\ngoal_packets can override per-run. Deferred until empirical\
      \ evidence\noperators want it across multiple Workflow C runs (we have zero\
      \ runs\ntoday; designing for hypothetical reuse is premature). No target\nversion\
      \ is committed — status tracked here, not promised against a\nversion number\
      \ (the v1.15.3 currency hot-patch removed all such\nforward-references).\n\n\
      ## Authoring a Workflow C goal_packet\n\nAdd an `autonomy_contract` block to\
      \ your goal_packet:\n\n```yaml\nschema_version: 1\npilot_id: my-overnight-run\n\
      workflow_mode: autonomous-execute  # or alias \"C\"\ncontributors:\n  enabled:\
      \ [claude, codex, gemini]  # all 3 required for Workflow C\n\nautonomy_contract:\n\
      \  max_iterations: 10\n  max_wall_clock_minutes: 240\n  allowed_file_patterns:\n\
      \    - \"consensus_mcp/contributors/**\"\n    - \"consensus_mcp/tests/test_contributors.py\"\
      \n    - \"docs/**/*.md\"\n  forbidden_file_patterns:\n    - \".github/**\"\n\
      \    - \"pyproject.toml\"\n    - \"consensus_mcp/_dispatch_*.py\"\n  # Optional:\
      \ opt OUT of specific halt conditions for less-safe runs\n  # (default is wide-by-default;\
      \ all halt conditions active)\n  skip_halt_on:\n    # - test_suite_regression\n\
      \    # - schema_change_proposed\n```\n\n## Halt conditions (wide-by-default)\n\
      \nEvery Workflow C iteration boundary checks for these conditions; ANY\none\
      \ halts the run and surfaces to operator. Operator opts OUT per-run\nvia `autonomy_contract.skip_halt_on`.\n\
      \n| Halt condition | Triggered when |\n|---|---|\n| `blocking_objection` | Any\
      \ peer raises a blocking_objection |\n| `test_suite_regression` | New test failures\
      \ vs baseline |\n| `schema_change_proposed` | config.py / goal_packet schema\
      \ / sealed-artifact schemas modified |\n| `max_iterations_exceeded` | Iteration\
      \ count > `autonomy_contract.max_iterations` |\n| `max_wall_clock_minutes_exceeded`\
      \ | Wall-clock > `autonomy_contract.max_wall_clock_minutes` |\n| `convergence_failure_after_n_rounds`\
      \ | Convergence fails after N rounds (default 3) |\n| `reviewer_dispatch_permanent_failure`\
      \ | Peer dispatch fails after 3 retries |\n| `files_outside_allowed_patterns`\
      \ | Proposed scope touches files outside allowed_file_patterns |\n| `files_in_forbidden_patterns`\
      \ | Proposed scope touches files in forbidden_file_patterns |\n| `operator_interrupt_file_present`\
      \ | `.consensus/interrupt` file marker exists |\n| `reviewer_explicit_recommend_operator_review`\
      \ | A peer's sealed packet has `recommend_operator_review: true` |\n\n## Scope-check\
      \ decisions\n\n`check_autonomy_scope(proposed_files, contract)` returns one\
      \ of:\n\n- `approved` — every file is within `allowed_file_patterns` AND none\n\
      \  in `forbidden_file_patterns`. Auto-proceed.\n- `parked` — at least one file\
      \ is OUTSIDE allowed_file_patterns but\n  none are forbidden. Item parked for\
      \ operator review when they\n  return. Other (in-bounds) work continues.\n-\
      \ `halt` — at least one file is in `forbidden_file_patterns`. Hard\n  stop;\
      \ operator must review before any further autonomous action.\n\n## Operator\
      \ interrupt mechanism\n\nTo halt a running Workflow C from outside the session,\
      \ create the\nfile `.consensus/interrupt` in the repo root. The engine (once\n\
      implemented — see Status above) checks for this file at every\niteration boundary\n\
      and halts cleanly if present, deletes the file, and surfaces a\n\"halted by\
      \ operator interrupt\" status in the audit log.\n\n## Audit log\n\nWorkflow\
      \ C writes to\n`consensus-state/autonomous-runs/<run-id>/log.jsonl` with one\
      \ entry\nper iteration boundary:\n\n```json\n{\n  \"schema_version\": 1,\n \
      \ \"iteration_id\": \"...\",\n  \"started_utc\": \"...\",\n  \"completed_utc\"\
      : \"...\",\n  \"halt_check_results\": {...},\n  \"scope_check_decision\": \"\
      approved\" | \"parked\" | \"halt\",\n  \"files_touched\": [...],\n  \"next_iteration_id\"\
      : \"...\" | null\n}\n```\n\nWhen the operator returns, the audit log tells the\
      \ complete story:\nwhich iterations ran, which halted and why, which scope items\
      \ were\nparked.\n\n## Why ONLY 3-AI contributors?\n\nAutonomous mode means \"\
      no operator-in-the-loop.\" The wide cross-AI\nsafety net is mandatory by default\
      \ (Workflow C requires exactly 3\ncontributors, enforced at config-load). A\
      \ future relaxation\n(explicit operator opt-in, e.g. 2-AI Workflow C with a\
      \ brief safety\nwarning) is possible but is NOT committed to any version — when\
      \ the\nengine lands it ships safety-first.\n\n## Provenance\n\n- iter-workflow-abc-introduce\
      \ convergence (workflow #4 weighted-\n  synthesis across claude + codex + gemini,\
      \ no blocking objections).\n- See `consensus-state/active/iteration-workflow-abc-introduce/`\n\
      \  for the full converged plan; archived snapshot under\n  `consensus-state-snapshots`\
      \ branch.\n"
    CHANGELOG.md: "# Changelog\n\n## 1.15.3 - 2026-05-15\n\n**Bundled-doctrine + status\
      \ currency hot-patch** — doc/string only,\nno behavior change. Triggered by\
      \ an operator question (\"on a new\ninstall, will 2-AI follow all the upgraded\
      \ workflow lessons, same\nas 3-AI?\"). Investigation answer: **yes — doctrine\
      \ + v1.15.1\nmachine-enforcement are AI-count-AGNOSTIC, scoped by workflow mode,\n\
      never by contributor count.** But the investigation found shipped\nv1.15.2 artifacts\
      \ carrying stale forward-references that misled\nevery new installer (2-AI and\
      \ 3-AI identically).\n\nScope set by a **Workflow A consult** (`iteration-v1153-bundled-\n\
      skill-currency`; claude + codex + gemini; weighted-synthesis;\nshared-prior\
      \ self-check PASSED-WITH-CORRECTION — fast 3/3 unanimity\non scope was partly\
      \ a shared prior; claude's differing differential\nsurfaced F7, which was integrated,\
      \ not laundered by the unanimity).\n\nFixed (one failure mode — a shipped artifact's\
      \ forward-reference\nwhose target version already came due):\n- **F1** `consensus-workflow/SKILL.md`:\
      \ the converged-plan\n  convention is no longer described as \"machine validation\
      \ is a\n  sequenced follow-up\" — it is **machine-enforced as of v1.15.1**\n\
      \  (`validate_converged_plan` + fail-closed seal-time gate +\n  `convergence.converged_plan_enforcement`\
      \ knob, default\n  `graduated`).\n- **F2** same skill, Gemini section: empty\
      \ gemini output is NOT a\n  429 — `GEMINI_CLI_TRUST_WORKSPACE` guidance added\
      \ (fixed v1.15.2;\n  manual workaround only ≤ v1.15.1; don't burn the 429 budget).\n\
      - **F3** both bundled skills (`consensus-workflow` +\n  bootstrap `consensus`):\
      \ Workflow C engine status corrected — it\n  did **not** ship in v1.15.0; it\
      \ is UNIMPLEMENTED as of v1.15.2,\n  no committed target version.\n- **F4**\
      \ `workflow_engine.py`: the Workflow C `NotImplementedError`\n  message + comment\
      \ no longer promise \"lands in v1.15.0\" (string/\n  comment only — no control\
      \ flow; no test pinned it).\n- **F7** `docs/workflows/workflow-c-autonomous.md`:\
      \ 5 stale\n  \"v1.15.0\" forward-references corrected (the consult's\n  shared-prior-correction\
      \ finding — the doc F4's text points at).\n- **Q4** `consensus-workflow/SKILL.md`:\
      \ new normative\n  **consistency invariant** stating doctrine + enforcement\
      \ are\n  workflow-mode-scoped, never contributor-count-scoped — 2-AI and\n \
      \ 3-AI installs governed identically; only the convergence-rule\n  default differs\
      \ (unanimous@2 vs strict-majority@3). Converts the\n  operator's implicit invariant\
      \ into a written guarantee.\n\nNo invented replacement version anywhere (artifact-scoped\
      \ truth —\nthat would repeat the exact defect). Code+doc bundled in one tag\n\
      per the shared-failure-mode hot-patch doctrine (verified precedent:\nv1.14.5,\
      \ v1.14.6). Full suite green, 0 regressions. Workflow B\naudit: codex + gemini.\n\
      \n## 1.15.2 - 2026-05-15\n\n**gemini-dispatch workspace-trust fix** — closes\
      \ the v1.15.1\nnamed blocker (advisory 2026-05-15, now **resolved**).\n\n`consensus_mcp/_dispatch_gemini.py`\
      \ now injects\n`GEMINI_CLI_TRUST_WORKSPACE=true` into the gemini subprocess\
      \ env\nvia a new `_gemini_subprocess_env()` helper (returns a COPY of the\n\
      parent env; forces the var to `true` even if an inherited value is\n`false`;\
      \ never mutates `os.environ`). gemini CLI\n`0.43.0-preview.0`+ refuses headless\
      \ runs in an \"untrusted\"\ndirectory — it writes the trust error to stderr\
      \ and produces\n**empty stdout**, which the dispatcher then fails as\n`GeminiOutputParseError`.\n\
      \n**Empirically verified 2026-05-15** (the v1.15.1 audit diagnosed\nthis first-hand;\
      \ gemini pass-1 failed twice for exactly this):\n- `--skip-trust` alone (still\
      \ passed, defense-in-depth) is NOT\n  load-bearing on this version — gemini\
      \ bypassed trust but went\n  autonomous and 429'd.\n- `GEMINI_CLI_TRUST_WORKSPACE=true`\
      \ produced clean deterministic\n  output, and the two clean v1.15.1 Workflow\
      \ B audit approvals.\n\n`_dispatch_gemini.py` was in the v1.15.1 iteration's\n\
      `forbidden_files`, so the dispatcher-level fix was correctly\ndeferred to this\
      \ version rather than patched out-of-scope.\n\nWorkflow B audit clean: gemini\
      \ `goal_satisfied=true`, 0 blocking,\n0 findings — **dispatched from source\
      \ with\n`GEMINI_CLI_TRUST_WORKSPACE` explicitly unset**, so the audit pass\n\
      of this fix was made possible BY this fix (end-to-end in-vivo\nproof; acceptance\
      \ gate A4). codex: 0 blocking; doc-accuracy\nfindings on the advisory/changelog\
      \ wording integrated. Full suite\ngreen: 968 passed, 1 skipped, 0 regressions;\
      \ 4 new unit tests for\n`_gemini_subprocess_env` in `test_dispatch_gemini.py`.\n\
      \n## 1.15.1 - 2026-05-15\n\n**Machine-enforcement of the converged-plan convention**\
      \ — closes the\nv1.15.0 NAMED BLOCKER. From `iteration-converged-plan-machine-\n\
      enforcement` (Workflow A weighted-synthesis: claude + codex + gemini;\nshared-prior\
      \ self-check PASSED; no blocking objections; the consult\ndogfooded the very\
      \ convention it enforces). The recorded v1.15.0\n\"starting design\" (gemini's\
      \ `severity` field + `consensus_gate.py`\nmechanism) was **partially refuted\
      \ by first-hand code-reading** during\nthe consult: `consensus_mcp/validators/consensus_gate.py`\
      \ is the\nPhase-0 production-readiness gate (P0-V6) and is the WRONG component\
      \ —\nthe v1.15.0 doctrine working correctly on its own audit trail.\n\n**Artifact\
      \ truth (scoped claim):** the **v1.15.0 tag `4e81f9e` is\nDOCTRINE-ONLY** —\
      \ it shipped the convention as an authoring convention\nenforced by the bundled\
      \ skill + Workflow B audit, with **zero engine\ncode**. Machine enforcement\
      \ exists **only from the v1.15.1 tag\nforward**. Users on v1.15.0 get doctrine;\
      \ they must upgrade to v1.15.1\nto get the gate.\n\nShipped (real code paths\
      \ — meaningful regression signal, unlike\nv1.15.0's doc-only change):\n\n- **`consensus_mcp/schemas/converged_plan_convention.schema.json`**\n\
      \  (NEW; `schemas/` is net-new) — JSON Schema for the convention\n  object;\
      \ `empirical_status` enum `proven|pending|refuted|n/a` matches\n  v1.15.0 verbatim.\n\
      - **`consensus_mcp/validators/validate_converged_plan.py`** (NEW;\n  small;\
      \ structure + consequence ONLY). Enforces the consequence of\n  the orchestrator-attested\
      \ `falsifiable_from_artifacts` bool — the\n  engine does **not** classify the\
      \ defect (keyword heuristics are the\n  shared-prior trap the v1.15.0 report\
      \ documents). **Recursive-trap\n  defense (highest-order constraint):** the\
      \ validator has zero code\n  path deriving any approved/correct/ready/sound\
      \ state from the\n  blocks (pinned by `test_validator_source_sets_no_correctness_state`\n\
      \  grepping the module), and every result carries an unconditional\n  `gate_scope`\
      \ disclaimer: *\"presence-and-consistency only; NOT a\n  soundness assertion\
      \ … remains a human judgement.\"* A pass means the\n  required thinking was\
      \ **recorded**, never that it is **true**.\n- **`workflow_engine._seal_converged_plan`**\
      \ — ingests the optional\n  orchestrator-authored `convention-input.yaml` via\
      \ the ONE channel\n  that already reaches seal time (a file in `iteration_dir`;\
      \ no new\n  parameter threaded through `run_iteration`/the MCP tool — codex's\n\
      \  external-refuting-observation honored), validates it, and seals the\n  blocks\
      \ **INTO** `converged-plan.yaml` (same write, same hash) with\n  required `cited_pass_ids`\
      \ (provenance-by-citation: not a loose\n  untracked sidecar, not a single-winner\
      \ extraction — gemini's\n  chain-of-evidence requirement). **Fail-closed:**\
      \ a hard-reject does\n  NOT write `converged-plan.yaml`.\n- **Graduated strictness**\
      \ (`convergence.converged_plan_enforcement`:\n  `off|warn|graduated|strict`,\
      \ default `graduated`). Hard-reject ONLY\n  (i) operator-declared safety/data-loss/bricking/irreversible\
      \ risk\n  class missing a conforming root-cause-independent\n  `independent_safeguard`,\
      \ and (ii) `empirical_status:proven` with no\n  recorded `experiment_result`;\
      \ warn + annotate `convention_violations`\n  otherwise.\n- **`consensus_get_iteration_outcome`**\
      \ surfaces `enforcement` +\n  `convention_gate_scope` + `convention_violations`;\
      \ a reader can\n  never see a pass marker without the non-soundness disclaimer\
      \ next\n  to it. Legacy / absent-convention plans (this session's iter-0043\n\
      \  .. v1.15.0) still load, explicitly marked `enforcement:\n  doctrine-only`\
      \ — **NOT silently valid, NOT rejected**.\n\n**Named blocker (need-evidence,\
      \ deferred — not a cop-out):** operator\ngoal_packet `defect_class`/`risk_class`\
      \ declaration UX + an\nanti-gaming cross-check on `falsifiable_from_artifacts`.\
      \ Both are\nill-posed until the shipped slice produces real usage data.\n\n\
      **Workflow B audit chain** (codex + gemini, post-implementation):\ngemini APPROVED\
      \ (`goal_satisfied=true`, no blocking). codex pass-1\nraised 2 blocking + 2\
      \ high — all verified against real code (no\nhallucinations; all correctly caught\
      \ the slice under-implementing\nthe converged plan) and integrated TDD-first:\
      \ the third named block\n(`decisive_experiment_before_next_iteration`) is now\
      \ schema-required\n+ validated; `doctrine-only` is a READ-time legacy classification\n\
      only (a new convergence missing blocks is validated under the\nconfigured level,\
      \ not bypassed); `convention_schema_version` is\npinned exactly (never defaulted/rewritten);\
      \ a hard-reject removes any\nstale `converged-plan.yaml` (fail-closed truly\
      \ closed). **Design\nnote (intentional, peer-converged):** under the default\
      \ `graduated`\nlevel a new *non-safety* convergence missing blocks is sealed\
      \ as\n**warn + annotate** (loudly marked via `convention_gate.\nenforcement_note`,\
      \ never a silent pass), NOT hard-rejected — this is\nthe converged plan's deliberate\
      \ q4/q5 decision (incl. codex's own\nconsult position) to avoid the rejected-goal_packet\
      \ papercut. Strict\nenforcement is opt-in via `converged_plan_enforcement: strict`.\n\
      \nFull suite green: 964 passed, 1 skipped, 0 regressions (38 new\ncode-path\
      \ tests in `test_converged_plan_convention.py`, including\nall audit-integration\
      \ fixes — they close the v1.15.0 doc-only loose\nend with a meaningful regression\
      \ signal).\n\n## 1.15.0 - 2026-05-15\n\n**Convergence-correctness doctrine**\
      \ — minor bump (cross-project\ndoctrine evolution, not a hot-patch). From\n\
      `iteration-convergence-correctness-doctrine` (Workflow A\nweighted-synthesis:\
      \ claude + codex + gemini, no blocking\nobjections; gemini dissented substantively\
      \ on prominence +\nmachine-enforcement and that dissent was incorporated, not\n\
      outvoted — the shared-prior self-check passed), derived from a\nreal downstream\
      \ failure: the ChilipadScreen ESP32-P4 i2c\nboot-loop consensus-failure report\
      \ (2026-05-15) where two clean\nstrict-majority convergences (one round-1 *unanimous*)\
      \ were both\nrefuted on-device.\n\nDoctrine added to the bundled `consensus-workflow`\
      \ skill + both\ndispatch-template preambles + a new\n`docs/workflows/converged-plan-convention.md`:\n\
      \n- **Safety interlock first (headline rule).** Safety-critical /\n  data-loss\
      \ / bricking / irreversible-risk defects MUST ship a\n  root-cause-INDEPENDENT\
      \ safeguard with the hypothesized fix,\n  valuable even if the hypothesis is\
      \ 100% false. Auditable bar:\n  \"would it still work if the root cause were\
      \ entirely\n  different?\" Field-proven: an independent boot-loop breaker\n\
      \  un-bricked a medical-safety device across two failed\n  root-cause iterations\
      \ (\"the single highest-value decision\").\n- **Convergence is agreement, not\
      \ truth.** Fast independent\n  unanimity is a verify-harder flag — a shared-prior\
      \ artifact is\n  the multi-agent analog of single-agent rationalize-away.\n\
      \  Dispatch templates now require each contributor to state the\n  differential/prior\
      \ it reasoned from (shared prior exposed at\n  reveal instead of laundered as\
      \ \"independent agreement\").\n- **Provisional-until-proven** for the defined\
      \ not-falsifiable-\n  from-artifacts class (hardware/firmware state, environment/\n\
      \  toolchain, concurrency/timing): converged root cause is\n  PROVISIONAL; \"\
      fixed/shipped/root-cause-correct\" language\n  forbidden until a pre-specified\
      \ EXTERNAL discriminating\n  experiment runs.\n- **Anti-theater property:**\
      \ a falsification is real only if its\n  refuting observation is pre-specified,\
      \ a specific observable,\n  and (for that class) external to the reasoning that\
      \ produced\n  the hypothesis.\n- **Converged-plan convention:** `falsification`,\n\
      \  `independent_safeguard`, and\n  `decisive_experiment_before_next_iteration`\
      \ blocks documented\n  as an authoring standard, doctrine-enforced now.\n\n\
