      \ WorkflowError(\n            \"convention-input.yaml must contain a `convention:`\
      \ mapping \"\n            \"(or be the convention mapping itself)\"\n      \
      \  )\n\n    def _goal_risk_class(self, goal_packet_path: Path) -> str | None:\n\
