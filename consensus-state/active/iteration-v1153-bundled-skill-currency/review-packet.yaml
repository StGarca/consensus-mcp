      \          \"schema_version\": 1,\n            \"iteration_id\": iteration_dir.name,\n\
      \            \"convergence_round\": round_number,\n        }\n        out =\
      \ iteration_dir / f\"convergence-packet-round-{round_number}.yaml\"\n      \
      \  out.write_text(\n            yaml.safe_dump(packet, sort_keys=False, default_flow_style=False,\
      \ allow_unicode=True, width=10000),\n            encoding=\"utf-8\",\n     \
      \   )\n        return out\n\n    def _record_timed_out(self, contributor: str,\
