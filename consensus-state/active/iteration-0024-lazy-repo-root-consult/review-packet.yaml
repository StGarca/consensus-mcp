  touched_files_contents:
    consensus-state/active/iteration-0024-lazy-repo-root-consult/claude-proposal.yaml: "iteration_id: iteration-0024-lazy-repo-root-consult\nreviewer_id: claude-iteration-0024-1\npass_id: claude-iteration-0024-1-blind-proposal\nphase: blind_proposal\nauthored_at_utc: '2026-05-13T08:50:00Z'\nauthored_before_peer_visibility: true\n\ndecision: SHIP-PHASED\n\nrationale_vs_alternatives: |\n  SHIP (now, all 11 modules in one PR) is too risky for v1.14.0 hygiene work.\n  The seal/audit pipeline is the project's load-bearing trust anchor; a\n  semantic bug in one of those 11 files would corrupt the audit log\n  invisibly. Single-iteration scope can't carry that risk responsibly.\n\n  DEFER is tempting but wrong. iter-0019 hides the symptom in\n  test_dispatch_codex but the same gotcha is now an unmaintained landmine\n  for any new tool added to consensus_mcp/tools/. Every new test author has\n  to know to monkeypatch the cached module attributes; every new tool that\n  caches REPO_ROOT at import inherits the bug. The cost compounds.\n\n  SHIP-PHASED gives the operator confidence at each step:\n    Phase A (iter-0025) — introduce a small `_paths.py` helper exposing\n      `repo_root()`, `archive_dir()`, `index_path()`, `active_dir()`,\n      `audit_log_path()` as functions. Each function reads\n      CONSENSUS_MCP_REPO_ROOT (and CONSENSUS_MCP_STATE_ROOT etc per\n      iter-0007 v1.13.0) on every call. NO existing modules touched yet —\n      we ship the API + tests proving it composes correctly.\n    Phase B (iter-0026) — migrate ONE tool at a time, starting with the\n      least-load-bearing (state_read_decision_ledger.py, repo_get_section.py)\n      and ending with the highest-load-bearing (review_write_and_seal.py,\n      audit_append_event.py). Each migration is one workflow #3 iteration\n      with codex + gemini review.\n    Phase C (iter-0027+) — retire iter-0019's _isolate_archive_root once\n      every dispatch-touching tool is migrated; replace with a thinner\n      env-var-only fixture.\n\n  This pattern matches how iter-0010 handled _dispatch_base extraction:\n  introduce the helper, then incrementally migrate callers. It worked.\n\nselected_call: SHIP-PHASED\n\nphase_a_design:\n  new_file: consensus_mcp/_paths.py\n  api_sketch: |\n    \"\"\"Lazy path resolution. Every call re-reads env state so tests can\n    monkeypatch.setenv(...) and pytest fixtures Just Work.\n\n    Backward compatibility: this module DOES NOT change existing tool\n    behavior on its own. Tools migrate one by one in Phase B.\n    \"\"\"\n    from __future__ import annotations\n    import os\n    from pathlib import Path\n\n    def repo_root() -> Path:\n        \"\"\"Resolve repo root per CONSENSUS_MCP_REPO_ROOT env (current\n        convention) → walked-up __file__ → cwd. Reads env on every call.\"\"\"\n        ...\n\n    def state_root() -> Path:\n        \"\"\"Per iter-0007 v1.13.0: CONSENSUS_MCP_STATE_ROOT → legacy\n        REPO_ROOT/consensus-state → cwd/consensus-state.\"\"\"\n        ...\n\n    def archive_dir() -> Path:\n        return state_root() / \"archive\" / \"review-passes\"\n\n    def index_path() -> Path:\n        return archive_dir() / \"index.yaml\"\n\n    def active_dir() -> Path:\n        return state_root() / \"active\"\n\n    def audit_log_path() -> Path:\n        return state_root() / \"state\" / \"audit-log.jsonl\"\n\n    def dispatch_log_path() -> Path:\n        return state_root() / \"state\" / \"dispatch-log.jsonl\"\n\n  tests_new:\n    - consensus_mcp/tests/test_paths.py\n    - covers: env-var override, walked-up discovery, state-root vs\n      repo-root split, monkeypatch semantics (env-after-import works)\n    - ~12 tests\n\nbackward_compatibility: |\n  Phase A adds NEW api; nothing existing changes. The MCP server's\n  \"stable repo root within a session\" contract is not affected because the\n  contract is enforced at the orchestrator level (one env-var setting per\n  session), not the module-load level. Lazy resolution honors whatever\n  env state is current at call time — which is the same value the\n  module-level capture WOULD HAVE captured, except now it's re-resolvable\n  by tests.\n\ntest_side_surface: |\n  In Phase B (per-tool migration), each migrated tool's tests can DROP\n  iter-0019's _isolate_archive_root monkeypatching for that tool — the\n  tool now reads env-state per call, so monkeypatch.setenv() Just Works.\n  Tests for un-migrated tools keep using _isolate_archive_root. Phase C\n  retires the helper entirely once all tools are migrated.\n\ncall_site_mechanical_scope: |\n  Phase B migrations look like:\n    -from consensus_mcp.tools.X import REPO_ROOT, ARCHIVE_DIR, INDEX_PATH\n    +from consensus_mcp._paths import repo_root, archive_dir, index_path\n    -ARCHIVE_DIR.mkdir(...)\n    +archive_dir().mkdir(...)\n    -sealed_path = ARCHIVE_DIR / filename\n    +sealed_path = archive_dir() / filename\n  Mechanical, easy-to-diff, easy-to-test per file.\n\nrollback_plan: |\n  Phase A is purely additive — rollback = `git revert <commit>`. Phase B\n  per-tool migrations are each a single-iteration commit; rollback any\n  individual migration is `git revert <commit>` and the suite continues\n  working because we kept iter-0019's _isolate_archive_root for un-migrated\n  tools.\n\nsmallest_deliverable_for_iter_0025:\n  iteration_id: iteration-0025-paths-helper-introduce\n  scope:\n    in:\n      - consensus_mcp/_paths.py (new)\n      - consensus_mcp/tests/test_paths.py (new)\n    out:\n      - any changes to existing tools or seal pipeline\n      - any callers using the new helper (that's Phase B)\n  acceptance_gates:\n    - full suite stays >=688 green + adds ~12 new test_paths tests → >=700\n    - test_paths.py exercises env-override path with monkeypatch.setenv\n      AFTER import (the key gotcha iter-0019 worked around)\n  recommended_workflow: post-review (workflow #3)\n  rationale: Implementation per a converged design (this consult) is\n    canonical workflow #3.\n\ndeferred_to_iter_0026_plus:\n  - Phase B per-tool migration sequence\n  - Phase C _isolate_archive_root retirement\n  - Each phase B migration ships as its own peer-reviewed iteration so the\n    operator can pause/resume at any tool boundary.\n\nrisks:\n  - The walked-up __file__ fallback in _resolve_repo_root has subtle\n    behavior on installed wheels (no .git, source tree in site-packages).\n    Phase A test_paths.py must exercise BOTH dev-checkout and wheel-install\n    layouts.\n  - Some tools may have OTHER module-level state that derives from\n    REPO_ROOT in subtle ways (e.g., loaded YAML configs, hardcoded path\n    components). Phase B per-tool reviews catch these.\n  - The state_root vs repo_root split from iter-0007 needs to be respected:\n    consensus-state lives under state_root, source code under repo_root.\n    The helper must NOT collapse them.\n"
