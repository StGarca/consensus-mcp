schema_version: 1
pilot_id: iteration-0024-lazy-repo-root-consult
workflow_mode: propose-converge
independence: blind-first-reveal
goal:
  summary: |
    iter-0024 — workflow #4 design consult for the last deferred item from
    iter-0021: lazy REPO_ROOT resolution. iter-0019 fixed the symptom
    (test_dispatch_codex contamination) via test-side monkeypatching, but
    the underlying architecture remains: 11 modules cache module-level
    paths at import time, so any env-var override (CONSENSUS_MCP_REPO_ROOT)
    set AFTER import is silently ignored.
  question: |
    Should we land the lazy REPO_ROOT refactor in v1.14.0+? If yes, what's
    the safest design? If no, document the recommended deferral and any
    interim guard rails.

    Background — 11 module-level captures live in:
      consensus_mcp/server.py:111
      consensus_mcp/tools/audit_append_event.py:58
      consensus_mcp/tools/gate_evaluate_production_with_scope_match.py:105
      consensus_mcp/tools/patch_apply_consensus_patch.py:59
      consensus_mcp/tools/patch_stage_and_dry_run.py:36
      consensus_mcp/tools/repo_get_section.py:64
      consensus_mcp/tools/repo_set_section.py:107
      consensus_mcp/tools/review_read_post_seal.py:50
      consensus_mcp/tools/review_write_and_seal.py:51
      consensus_mcp/tools/state_read_decision_ledger.py:40
      consensus_mcp/tools/state_update_decision_ledger.py:90

    Each derives ARCHIVE_DIR / INDEX_PATH / ACTIVE_DIR / similar constants
    from REPO_ROOT at import time.

    Each contributor should:
      1. Decide: SHIP (now), SHIP-BUT-PHASED (incremental rollout), or
         DEFER (state the deferral conditions). Justify the call against
         the alternatives.
      2. If SHIP or SHIP-PHASED: sketch the design (lazy properties? per-call
         resolution? config-context object passed through call chains?
         contextvars? something else?). Spell out:
           - backward compatibility (the MCP server expects a stable
             repo root within a session — does lazy resolution break that
             contract or just fix what's broken?)
           - test-side surface (does iter-0019's _isolate_archive_root
             remain useful or get superseded?)
           - call-site mechanical scope (do call sites need to change, or
             only the module-level definitions?)
           - rollback plan if it breaks something subtle in the seal
             pipeline or audit log
      3. List the smallest deliverable scope for ONE iteration that would
         close this work.

    A good answer rejects the alternative call (SHIP vs SHIP-PHASED vs
    DEFER), justifies the chosen call concretely, and gives an
    implementation plan tight enough to execute against.

  desired_end_state: |
    converged-plan.yaml at iteration_dir root names the chosen call
    (SHIP/SHIP-PHASED/DEFER) with at least 2 of 3 contributors approving;
    if SHIP/SHIP-PHASED, includes design decisions + smallest-deliverable
    scope; if DEFER, includes specific deferral conditions + any interim
    guard rails (e.g., new test-isolation helpers used in more test files).
  non_goals:
    - implementing the refactor in this iteration (design only)
    - resolving any other outstanding item
    - architectural rewrites beyond REPO_ROOT scope
allowed_files: []
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 3
max_patch_size: 0
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: converged-plan.yaml present at iteration_dir
    check: 'py -3.11 -c "import os; assert os.path.exists(''consensus-state/active/iteration-0024-lazy-repo-root-consult/converged-plan.yaml''); print(''ok'')"'
  - id: A2
    description: chosen call documented
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - non_convergence_after_3_rounds
operator_escalation_triggers:
  - non_convergence_after_3_rounds
authorization:
  authorized_by: operator-autonomous-overnight
  authorized_at_utc: '2026-05-13T08:50:00Z'
  codex_patch_apply_authorized: false
  scope_signature: '293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718'
contributors:
  enabled: [claude, codex, gemini]
