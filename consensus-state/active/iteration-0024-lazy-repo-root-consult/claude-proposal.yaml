deferred_to_iter_0026_plus:
  - Phase B per-tool migration sequence
  - Phase C _isolate_archive_root retirement
  - Each phase B migration ships as its own peer-reviewed iteration so the
    operator can pause/resume at any tool boundary.

risks:
  - The walked-up __file__ fallback in _resolve_repo_root has subtle
    behavior on installed wheels (no .git, source tree in site-packages).
    Phase A test_paths.py must exercise BOTH dev-checkout and wheel-install
    layouts.
  - Some tools may have OTHER module-level state that derives from
    REPO_ROOT in subtle ways (e.g., loaded YAML configs, hardcoded path
    components). Phase B per-tool reviews catch these.
  - The state_root vs repo_root split from iter-0007 needs to be respected:
    consensus-state lives under state_root, source code under repo_root.
    The helper must NOT collapse them.
