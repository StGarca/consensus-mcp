findings:
- id: codex-rev-001
  severity: medium
  summary: "The fast-path response omits whether the watermark is unchanged from prior\
    \ input in the schema, so \xA78 returns a field not defined by \xA74."
  citation: docs/specs/consensus-resume-spec.md:249
  risk: Implementers following the schema can omit or reject `watermark_unchanged_since_prior`,
    breaking the specified cheap-refresh contract.
  recommendation: "Add `watermark_unchanged_since_prior` and `snapshot_watermark_drift`\
    \ to the \xA74 output schema as optional fields, or remove them from \xA78."
  patch_not_proposed_reason: Review-only sealed pass; no patch requested and exact
    line-numbered diff generation is not required for verdict output.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: "`recent_activity.kind` excludes bundle mutation events that \xA75 step\
    \ 5 says are read from dispatch-log."
  citation: docs/specs/consensus-resume-spec.md:83
  risk: A dispatch-log event such as `patch_applied`, `review_packet_rebundled`, or
    `operator_force_bundle_rewrite` has no legal place in the audit stream even though
    the spec later requires reading those events.
  recommendation: Either include bundle mutation kinds in `recent_activity.kind` or
    explicitly state they are excluded from `recent_activity` while still considered
    for `bundle_mutation`.
  patch_not_proposed_reason: Review-only sealed pass; no patch requested and exact
    line-numbered diff generation is not required for verdict output.
  patch_proposal: null
- id: codex-rev-003
  severity: medium
  summary: "`bundle_mutation` uses the latest dispatch-log bundle event, but \xA7\
    5 step 4 classifies reviews before \xA75 step 5 determines `bundle_mutation`."
  citation: docs/specs/consensus-resume-spec.md:157
  risk: An implementation that follows the numbered behavior literally cannot know
    the current bundle sha while classifying reviews, causing incorrect `open` versus
    `superseded` results.
  recommendation: Move bundle-mutation/current-bundle computation before review classification,
    or make step 4 explicitly depend on a precomputed current bundle sha.
  patch_not_proposed_reason: Review-only sealed pass; no patch requested and exact
    line-numbered diff generation is not required for verdict output.
  patch_proposal: null
- id: codex-rev-004
  severity: medium
  summary: "If there is no bundle mutation, \xA75 step 4 compares review hashes against\
    \ `bundle_mutation.bundle_sha256` even though `bundle_mutation` is null."
  citation: docs/specs/consensus-resume-spec.md:162
  risk: Fresh reviews in an initial bundle can be misclassified as superseded or force
    implementers to invent an unstated fallback for the current review target hash.
  recommendation: Define the current bundle sha source when `bundle_mutation` is null,
    likely `review-packet.yaml`'s canonical bundle/review_target_hash.
  patch_not_proposed_reason: Review-only sealed pass; no patch requested and exact
    line-numbered diff generation is not required for verdict output.
  patch_proposal: null
- id: codex-rev-005
  severity: medium
  summary: '`recent_activity` ordering is under-specified for equal timestamps despite
    the deterministic-ordering requirement.'
  citation: docs/specs/consensus-resume-spec.md:137
  risk: Two log events with the same timestamp can produce non-byte-stable snapshots
    across implementations, weakening tests and the output-stability claim.
  recommendation: Add a deterministic tiebreaker for `recent_activity`, such as dispatch-log
    line number descending or `(timestamp_utc, event_id)` descending.
  patch_not_proposed_reason: Review-only sealed pass; no patch requested and exact
    line-numbered diff generation is not required for verdict output.
  patch_proposal: null
