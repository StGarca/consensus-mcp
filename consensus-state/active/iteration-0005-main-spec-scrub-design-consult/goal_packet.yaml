    references from main's section 24.
  desired_end_state: "Codex reviews docs/design-consults/main-spec-scrub-stale-archive-refs.md\n\
    and emits ONE finding that picks a winner among Option A (scrub),\nOption B (env-var\
    \ escape hatch), or Option C (hybrid).\n\nThe finding's recommendation field carries\
    \ the winning option (A/B/C);\nrisk field carries the rationale. severity: low\
    \ (this is a design\nchoice, not a defect).\n\nContext the maintainer wants codex\
    \ to weigh:\n  - The 53 entries point at files in a DIFFERENT repository\n   \
    \ (upstream-26.4.16, where agent_loop_mcp was developed).\n    Those files\
    \ will NEVER exist in this standalone consensus-mcp\n    repo. They are extraction-time\
    \ leftover.\n  - The boot gate currently rejects this dev tree (54 findings: 52\n\
    \    ARCHIVED_FILE_MISSING blocking + 2 medium cross-reference findings).\n  -\
    \ The maintainer's resolved/deferred/dropped lists (180 entries\n    total) are\
    \ legitimate local audit-trail data referencing THIS\n    spec's own sections\
    \ \u2014 those must stay regardless of the choice.\n  - The env-var option (B)\
    \ doesn't suppress the 2 medium\n    cross-reference findings (ARCHIVE_INDEX_HAS_PASSES_NOT_IN_SPEC_24\n\
    \    and SPEC_24_HAS_PASSES_NOT_IN_ARCHIVE_INDEX); it only handles\n    ARCHIVED_FILE_MISSING.\
    \ So B alone may not unblock boot.\n\nEmpty findings is NOT acceptable \u2014\
    \ the maintainer needs a verdict.\n"
