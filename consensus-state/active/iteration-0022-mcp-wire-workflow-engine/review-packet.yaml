  touched_files_contents:
    consensus_mcp/_engine_factory.py: "\"\"\"Factory for assembling a WorkflowEngine from a `.consensus/config.yaml`.\n\nSingle source of truth for \"given a validated config + repo root, return a\nready-to-run WorkflowEngine with all enabled contributors instantiated\".\n\nReusable from Python and from the `consensus_run_iteration` MCP tool wrapper\nso both entry points construct identical adapter pools.\n\"\"\"\nfrom __future__ import annotations\n\nfrom pathlib import Path\nfrom typing import Callable\n\nfrom consensus_mcp import config as cfg\nfrom consensus_mcp.contributors import ContributorAdapter\nfrom consensus_mcp.contributors.base import DispatchPacket\nfrom consensus_mcp.contributors.claude import ClaudeAdapter\nfrom consensus_mcp.contributors.codex import CodexAdapter\nfrom consensus_mcp.contributors.gemini import GeminiAdapter\nfrom consensus_mcp.workflow_engine import WorkflowEngine, WorkflowError\n\n\nclass EngineFactoryError(RuntimeError):\n    \"\"\"Raised when a config requests a contributor we can't construct.\"\"\"\n\n\n# Registry of built-in contributor keys → adapter constructors.\n# Each adapter takes `adapter_config: dict | None` at construction time and\n# receives per-dispatch context (repo_root, iteration_dir, paths) via the\n# DispatchPacket passed to dispatch().\n_BUILTIN_ADAPTERS: dict[str, type[ContributorAdapter]] = {\n    \"claude\": ClaudeAdapter,\n    \"codex\": CodexAdapter,\n    \"gemini\": GeminiAdapter,\n}\n\n\ndef build_adapters(\n    config: dict,\n    *,\n    claude_artifact_callback: Callable[[DispatchPacket], dict] | None = None,\n) -> dict[str, ContributorAdapter]:\n    \"\"\"Build a {contributor_key: ContributorAdapter} dict from a validated config.\n\n    For each key in `contributors.enabled`, instantiate the matching adapter\n    using the per-contributor adapter_config block. Unknown keys raise\n    EngineFactoryError (caller should validate config first via cfg.validate()\n    to catch these earlier, but we fail-closed here too).\n\n    `claude_artifact_callback`: required for workflow modes where ClaudeAdapter\n    is dispatched (workflow #4 propose-converge; advisory). For workflow #3\n    post-review the ClaudeAdapter is registered but not invoked, so the\n    callback may be None.\n    \"\"\"\n    enabled = config.get(\"contributors\", {}).get(\"enabled\", [])\n    if not enabled:\n        raise EngineFactoryError(\"config.contributors.enabled is empty\")\n\n    per_contributor = config.get(\"contributors\", {}).get(\"config\", {}) or {}\n\n    adapters: dict[str, ContributorAdapter] = {}\n    for key in enabled:\n        ctor = _BUILTIN_ADAPTERS.get(key)\n        if ctor is None:\n            raise EngineFactoryError(\n                f\"unknown contributor key {key!r}; \"\n                f\"built-in keys: {sorted(_BUILTIN_ADAPTERS.keys())}\"\n            )\n        adapter_config = per_contributor.get(key) or {}\n        if key == \"claude\":\n            adapters[key] = ctor(\n                adapter_config=adapter_config,\n                artifact_callback=claude_artifact_callback,\n            )\n        else:\n            adapters[key] = ctor(adapter_config=adapter_config)\n    return adapters\n\n\ndef build_engine(\n    config: dict,\n    repo_root: Path,\n    *,\n    claude_artifact_callback: Callable[[DispatchPacket], dict] | None = None,\n) -> WorkflowEngine:\n    \"\"\"Convenience: validate config, build adapters, return a WorkflowEngine.\n\n    schema_version=0 is a legacy-synthesis sentinel per config.synthesize_\n    legacy_config(); skip validation for legacy-mode dicts so the engine can\n    still run against pre-iter-0015 repos without a .consensus/config.yaml.\n    \"\"\"\n    if config.get(\"schema_version\") != 0:\n        cfg.validate(config)\n    adapters = build_adapters(\n        config,\n        claude_artifact_callback=claude_artifact_callback,\n    )\n    try:\n        return WorkflowEngine(config, adapters, repo_root)\n    except WorkflowError as exc:\n        raise EngineFactoryError(str(exc)) from exc\n"
    consensus_mcp/tools/consensus_run_iteration.py: "\"\"\"consensus.run_iteration MCP tool — drives an iteration end-to-end per\n`.consensus/config.yaml`.\n\nPer iter-0021 converged plan (Section A): wraps WorkflowEngine.run_iteration\nbehind an MCP tool surface so operators can run workflow #3 / #4 / advisory\nvia the installed MCP server, not just via Python import.\n\nInputs:\n  - iteration_dir: path; engine writes effective-config.yaml + artifacts\n  - goal_packet_path: path\n  - target_path: path; for #3 the patch under review, for #4 the problem\n    statement, for advisory the artifact\n  - config_path: optional path; defaults to <repo_root>/.consensus/config.yaml\n  - claude_proposal_yaml: optional string; when the workflow dispatches\n    ClaudeAdapter, the tool wrapper supplies this via the artifact_callback\n    so claude-the-orchestrator-tool-caller doesn't deadlock waiting on\n    claude-the-adapter to produce content.\n\nOutput: structured dict with workflow_mode, converged, contributors_responsive,\ncontributors_timed_out, approve_votes, block_votes, blocking_objection_ids,\nfinal_artifact_path, rationale, error.\n\nSealing already flows through T6 inside the contributor adapters; this tool\nadds no new audit surface.\n\"\"\"\nfrom __future__ import annotations\n\nimport copy\nimport json\nimport os\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp import config as cfg\nfrom consensus_mcp import _engine_factory as factory\nfrom consensus_mcp.contributors.base import DispatchPacket\n\n\nSCHEMA = {\n    \"name\": \"consensus.run_iteration\",\n    \"description\": (\n        \"Run one iteration end-to-end per .consensus/config.yaml. Reads the \"\n        \"config, instantiates the enabled contributor adapters, dispatches \"\n        \"WorkflowEngine.run_iteration(), and returns the structured outcome \"\n        \"(workflow mode, convergence, contributor responsiveness, final \"\n        \"artifact path). Sealing already flows through T6 inside each \"\n        \"adapter; this tool adds no audit surface. claude_proposal_yaml \"\n        \"supplies claude-the-orchestrator's content for workflow modes that \"\n        \"dispatch ClaudeAdapter (propose-converge, advisory).\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"iteration_dir\": {\n                \"type\": \"string\",\n                \"description\": \"Absolute or repo-relative path to the iteration directory.\",\n            },\n            \"goal_packet_path\": {\n                \"type\": \"string\",\n                \"description\": \"Path to the iteration's goal_packet.yaml.\",\n            },\n            \"target_path\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Path to the workflow target. For workflow #3 (post-review): \"\n                    \"the patch/diff/file being reviewed. For workflow #4 \"\n                    \"(propose-converge): the problem statement. For advisory: \"\n                    \"the artifact contributors recommend on.\"\n                ),\n            },\n            \"config_path\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": (\n                    \"Override path to .consensus/config.yaml. Defaults to \"\n                    \"<repo_root>/.consensus/config.yaml; if absent, legacy-mode \"\n                    \"synthesis is used per cfg.synthesize_legacy_config().\"\n                ),\n            },\n            \"claude_proposal_yaml\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": (\n                    \"YAML string for claude-the-orchestrator's contributor \"\n                    \"artifact. Required when workflow.mode dispatches \"\n                    \"ClaudeAdapter (propose-converge, advisory). Must validate \"\n                    \"as a contributor-artifact YAML: top-level fields \"\n                    \"findings (list), goal_satisfied (bool), blocking_objections \"\n                    \"(list).\"\n                ),\n            },\n            \"repo_root\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": (\n                    \"Override repo root. Defaults to CONSENSUS_MCP_REPO_ROOT \"\n                    \"env var or current working directory.\"\n                ),\n            },\n        },\n        \"required\": [\"iteration_dir\", \"goal_packet_path\", \"target_path\"],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"ok\": {\"type\": \"boolean\"},\n            \"workflow_mode\": {\"type\": \"string\"},\n            \"converged\": {\"type\": \"boolean\"},\n            \"convergence_rule\": {\"type\": [\"string\", \"null\"]},\n            \"contributors_responsive\": {\"type\": \"array\"},\n            \"contributors_timed_out\": {\"type\": \"array\"},\n            \"approve_votes\": {\"type\": \"array\"},\n            \"block_votes\": {\"type\": \"array\"},\n            \"blocking_objection_ids\": {\"type\": \"array\"},\n            \"final_artifact_path\": {\"type\": [\"string\", \"null\"]},\n            \"rationale\": {\"type\": [\"string\", \"null\"]},\n            \"error\": {\"type\": [\"string\", \"null\"]},\n            \"error_type\": {\"type\": [\"string\", \"null\"]},\n        },\n    },\n}\n\n\ndef _resolve_repo_root(override: str | None) -> Path:\n    if override:\n        return Path(override).resolve()\n    env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if env:\n        return Path(env).resolve()\n    return Path.cwd().resolve()\n\n\ndef _resolve_config_path(\n    explicit: str | None,\n    repo_root: Path,\n) -> Path:\n    if explicit:\n        return Path(explicit).resolve()\n    return repo_root / \".consensus\" / \"config.yaml\"\n\n\ndef _load_config(config_path: Path, repo_root: Path) -> dict:\n    \"\"\"Load config. Falls back to legacy synthesis if no .consensus/config.yaml.\n\n    Legacy synthesis returns schema_version=0 as a sentinel — validate() rejects\n    that on purpose, so the legacy path skips validation per converged-plan\n    Section D.\n    \"\"\"\n    if config_path.exists():\n        return cfg.load(config_path)\n    return cfg.synthesize_legacy_config(repo_root)\n\n\ndef _build_claude_callback(claude_proposal_yaml: str | None):\n    \"\"\"Return an artifact_callback that returns the parsed YAML on each call.\n\n    For multi-round workflows the same content is returned each round;\n    operators wanting per-round content must structure their proposal yaml\n    with the contributor-artifact shape and let the engine seal it as-is.\n    \"\"\"\n    if claude_proposal_yaml is None:\n        return None\n\n    try:\n        parsed = yaml.safe_load(claude_proposal_yaml)\n    except yaml.YAMLError as exc:\n        raise ValueError(f\"claude_proposal_yaml is not valid YAML: {exc}\") from exc\n\n    if not isinstance(parsed, dict):\n        raise ValueError(\n            f\"claude_proposal_yaml must parse to a mapping; got {type(parsed).__name__}\"\n        )\n    for required in (\"findings\", \"goal_satisfied\", \"blocking_objections\"):\n        if required not in parsed:\n            raise ValueError(\n                f\"claude_proposal_yaml missing required field {required!r}\"\n            )\n    # codex pass-1 rev-003: validate field types, not just presence.\n    if not isinstance(parsed[\"findings\"], list):\n        raise ValueError(\n            f\"claude_proposal_yaml.findings must be a list; got \"\n            f\"{type(parsed['findings']).__name__}\"\n        )\n    if not isinstance(parsed[\"blocking_objections\"], list):\n        raise ValueError(\n            f\"claude_proposal_yaml.blocking_objections must be a list; got \"\n            f\"{type(parsed['blocking_objections']).__name__}\"\n        )\n    if not isinstance(parsed[\"goal_satisfied\"], bool):\n        raise ValueError(\n            f\"claude_proposal_yaml.goal_satisfied must be a bool; got \"\n            f\"{type(parsed['goal_satisfied']).__name__}\"\n        )\n\n    def _callback(packet: DispatchPacket) -> dict:\n        # gemini pass-1 rev-002: deepcopy so multi-round mutations to nested\n        # lists/dicts don't leak across rounds.\n        return copy.deepcopy(parsed)\n\n    return _callback\n\n\ndef _resolve_path(p: str | Path, repo_root: Path) -> Path:\n    \"\"\"Resolve `p` against `repo_root` when relative (codex pass-1 rev-002).\n\n    Absolute paths pass through resolve() unchanged. Relative paths get joined\n    onto repo_root BEFORE resolve() so they are correct regardless of the\n    server process cwd.\n    \"\"\"\n    p = Path(p)\n    if not p.is_absolute():\n        p = repo_root / p\n    return p.resolve()\n\n\ndef handle(\n    iteration_dir: str,\n    goal_packet_path: str,\n    target_path: str,\n    config_path: str | None = None,\n    claude_proposal_yaml: str | None = None,\n    repo_root: str | None = None,\n) -> dict:\n    \"\"\"Run one iteration end-to-end. Returns structured outcome dict.\"\"\"\n    try:\n        rr = _resolve_repo_root(repo_root)\n        iter_dir = _resolve_path(iteration_dir, rr)\n        gp_path = _resolve_path(goal_packet_path, rr)\n        tgt_path = _resolve_path(target_path, rr)\n        cfg_path = (\n            _resolve_path(config_path, rr) if config_path\n            else _resolve_config_path(None, rr)\n        )\n\n        loaded_config = _load_config(cfg_path, rr)\n\n        # codex pass-3 rev-001: when claude is enabled AND the workflow mode\n        # dispatches ClaudeAdapter (propose-converge, advisory), the operator\n        # MUST supply claude_proposal_yaml. Workflow #3 post-review skips\n        # claude entirely so the parameter is optional there.\n        workflow_mode = loaded_config.get(\"workflow\", {}).get(\"mode\", \"\")\n        enabled = loaded_config.get(\"\
      contributors\", {}).get(\"enabled\", [])\n        modes_dispatching_claude = {\n            cfg.WORKFLOW_PROPOSE_CONVERGE,\n            cfg.WORKFLOW_ADVISORY,\n        }\n        if (\n            \"claude\" in enabled\n            and workflow_mode in modes_dispatching_claude\n            and claude_proposal_yaml is None\n        ):\n            return {\n                \"ok\": False,\n                \"error\": (\n                    f\"claude_proposal_yaml is required for workflow mode \"\n                    f\"{workflow_mode!r} when 'claude' is in contributors.enabled. \"\n                    f\"Without it, ClaudeAdapter has no artifact_callback and \"\n                    f\"will raise DispatchError on first invocation.\"\n                ),\n                \"error_type\": \"MissingClaudeProposalError\",\n            }\n\n        claude_callback = _build_claude_callback(claude_proposal_yaml)\n\n        engine = factory.build_engine(\n            loaded_config,\n            repo_root=rr,\n            claude_artifact_callback=claude_callback,\n        )\n\n        outcome = engine.run_iteration(iter_dir, gp_path, tgt_path)\n    except (factory.EngineFactoryError, ValueError) as exc:\n        return {\n            \"ok\": False,\n            \"error\": str(exc),\n            \"error_type\": type(exc).__name__,\n        }\n    except cfg.ConfigValidationError as exc:\n        return {\n            \"ok\": False,\n            \"error\": f\"invalid config: {exc}\",\n            \"error_type\": \"ConfigValidationError\",\n        }\n    except Exception as exc:  # noqa: BLE001 — boundary translation\n        return {\n            \"ok\": False,\n            \"error\": str(exc),\n            \"error_type\": type(exc).__name__,\n        }\n\n    conv = outcome.convergence\n    return {\n        \"ok\": True,\n        \"workflow_mode\": outcome.workflow_mode,\n        \"converged\": (conv.converged if conv else False),\n        \"convergence_rule\": (conv.rule if conv else None),\n        \"contributors_responsive\": (conv.contributors_responsive if conv else []),\n        \"contributors_timed_out\": (conv.contributors_timed_out if conv else []),\n        \"approve_votes\": (conv.approve_votes if conv else []),\n        \"block_votes\": (conv.block_votes if conv else []),\n        \"blocking_objection_ids\": (conv.blocking_objection_ids if conv else []),\n        \"final_artifact_path\": (\n            str(outcome.final_artifact_path) if outcome.final_artifact_path else None\n        ),\n        \"rationale\": (conv.rationale if conv else None),\n        \"error\": outcome.error,\n        \"error_type\": None,\n    }\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/tools/consensus_get_iteration_outcome.py: "\"\"\"consensus.get_iteration_outcome MCP tool — read-only inspector for an\niteration's outcome.\n\nPer iter-0021 converged plan (Section A): returns the parsed converged-plan\n(workflow #4) or the sealed contributor artifacts (workflow #3) for an\niteration_dir, so operators / downstream tools can introspect outcomes\nwithout re-running.\n\"\"\"\nfrom __future__ import annotations\n\nimport os\nfrom pathlib import Path\n\nimport yaml\n\n\ndef _resolve_repo_root(override: str | None) -> Path:\n    if override:\n        return Path(override).resolve()\n    env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if env:\n        return Path(env).resolve()\n    return Path.cwd().resolve()\n\n\ndef _resolve_path(p: str | Path, repo_root: Path) -> Path:\n    \"\"\"Resolve `p` against `repo_root` when relative. Mirrors consensus_run_iteration\n    (codex pass-2 rev-001 — fixes the inconsistency where this tool advertised\n    repo-relative paths in its schema but resolved against process cwd).\"\"\"\n    p = Path(p)\n    if not p.is_absolute():\n        p = repo_root / p\n    return p.resolve()\n\n\nSCHEMA = {\n    \"name\": \"consensus.get_iteration_outcome\",\n    \"description\": (\n        \"Read-only inspector for an iteration's outcome. Returns the parsed \"\n        \"converged-plan.yaml (workflow #4 propose-converge) if present, \"\n        \"otherwise lists the sealed contributor artifacts (workflow #3 \"\n        \"post-review or advisory). Does NOT re-run anything.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"iteration_dir\": {\n                \"type\": \"string\",\n                \"description\": \"Absolute or repo-relative path to the iteration directory.\",\n            },\n            \"repo_root\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": (\n                    \"Override repo root. Defaults to CONSENSUS_MCP_REPO_ROOT \"\n                    \"env var or current working directory. Relative iteration_dir \"\n                    \"paths are resolved against this root.\"\n                ),\n            },\n        },\n        \"required\": [\"iteration_dir\"],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"ok\": {\"type\": \"boolean\"},\n            \"iteration_id\": {\"type\": [\"string\", \"null\"]},\n            \"converged_plan\": {\"type\": [\"object\", \"null\"]},\n            \"contributor_artifacts\": {\n                \"type\": \"array\",\n                \"description\": \"List of {contributor, path, sealed_at} for each sealed artifact found in the iteration dir.\",\n            },\n            \"effective_config_path\": {\"type\": [\"string\", \"null\"]},\n            \"error\": {\"type\": [\"string\", \"null\"]},\n            \"error_type\": {\"type\": [\"string\", \"null\"]},\n        },\n    },\n}\n\n\n_KNOWN_CONTRIB_FILES = {\n    \"claude-review.yaml\": \"claude\",\n    \"claude-proposal.yaml\": \"claude\",\n    \"codex-review.yaml\": \"codex\",\n    \"gemini-review.yaml\": \"gemini\",\n}\n\n\ndef handle(iteration_dir: str, repo_root: str | None = None) -> dict:\n    \"\"\"Read iteration outcome from disk. Never re-runs the engine.\"\"\"\n    try:\n        rr = _resolve_repo_root(repo_root)\n        iter_dir = _resolve_path(iteration_dir, rr)\n        if not iter_dir.exists():\n            return {\n                \"ok\": False,\n                \"error\": f\"iteration_dir does not exist: {iter_dir}\",\n                \"error_type\": \"FileNotFoundError\",\n            }\n        if not iter_dir.is_dir():\n            return {\n                \"ok\": False,\n                \"error\": f\"iteration_dir is not a directory: {iter_dir}\",\n                \"error_type\": \"NotADirectoryError\",\n            }\n\n        iteration_id = iter_dir.name\n\n        effective_config_path = iter_dir / \"effective-config.yaml\"\n        effective_config_str: str | None = (\n            str(effective_config_path) if effective_config_path.exists() else None\n        )\n\n        converged_plan_path = iter_dir / \"converged-plan.yaml\"\n        converged_plan = None\n        if converged_plan_path.exists():\n            try:\n                converged_plan = yaml.safe_load(converged_plan_path.read_text(encoding=\"utf-8\"))\n            except yaml.YAMLError as exc:\n                return {\n                    \"ok\": False,\n                    \"iteration_id\": iteration_id,\n                    \"error\": f\"converged-plan.yaml is not valid YAML: {exc}\",\n                    \"error_type\": \"YAMLError\",\n                }\n\n        contributor_artifacts = []\n        for fname, contributor in _KNOWN_CONTRIB_FILES.items():\n            fpath = iter_dir / fname\n            if not fpath.exists():\n                continue\n            entry = {\n                \"contributor\": contributor,\n                \"path\": str(fpath),\n            }\n            try:\n                parsed = yaml.safe_load(fpath.read_text(encoding=\"utf-8\"))\n                if isinstance(parsed, dict):\n                    if \"sealed_at_utc\" in parsed:\n                        entry[\"sealed_at\"] = parsed[\"sealed_at_utc\"]\n                    if \"pass_id\" in parsed:\n                        entry[\"pass_id\"] = parsed[\"pass_id\"]\n                    if \"goal_satisfied\" in parsed:\n                        entry[\"goal_satisfied\"] = parsed[\"goal_satisfied\"]\n            except yaml.YAMLError:\n                # Malformed artifact — still report its existence.\n                entry[\"parse_error\"] = True\n            contributor_artifacts.append(entry)\n\n        return {\n            \"ok\": True,\n            \"iteration_id\": iteration_id,\n            \"converged_plan\": converged_plan,\n            \"contributor_artifacts\": contributor_artifacts,\n            \"effective_config_path\": effective_config_str,\n            \"error\": None,\n            \"error_type\": None,\n        }\n    except Exception as exc:  # noqa: BLE001 — boundary translation\n        return {\n            \"ok\": False,\n            \"error\": str(exc),\n            \"error_type\": type(exc).__name__,\n        }\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/server.py: "\"\"\"MCP server for the consensus pipeline. Phase 1 G1+G2 hybrid skeleton.\n\nPer spec docs/architecture/phase-1-completion.md\nsection 3 (architecture) + section 5 (permissions).\n\nRegisters tool framework, performs boot-time validate_disposition_index\ncheck, listens on stdio. Tools registered: T2..T11 + Phase 4 supervisor +\ncodex-fix-author surface. Phase 1 MCP G1+G2 implementation complete:\nstate.read_decision_ledger (T2), audit.append_event (T3),\npatch.stage_and_dry_run (T4), patch.apply_consensus_patch (T5),\nreview.write_and_seal (T6), review.read_post_seal (T7).\nPhase 2 G5: state.update_decision_ledger (T8).\nPhase 2 G3: repo.get_section (T9), repo.set_section (T10).\nPhase 2 G4: gate.evaluate_production_with_scope_match (T11).\nPhase 4 supervisor: reviewer.dispatch_codex, loop.run_goal,\nloop.verify_codex_patch, apply.codex_patch (Task #26 / iter-0016).\n\nImplementation note: the Anthropic MCP SDK (pip install mcp) was not\npresent in python_env at implementation time. This server uses hand-rolled\nstdio JSON-RPC 2.0, which is the raw wire format the MCP SDK wraps anyway.\nIf the SDK is later installed, this file can be swapped for the SDK-style\nserver; the ToolRegistry contract stays the same.\n\nBoot sequence:\n  1. Run validate_disposition_index against the canonical spec md\n  2. If findings != 0: REFUSE TO START; print findings to stderr; exit 2\n  3. If findings == 0: register tool surface (empty for now); listen on stdio\n  4. Append mcp_server_started event to consensus-state/state/mcp-server-audit.jsonl\n\nShutdown:\n  - Append mcp_server_stopped event before exiting\n\nCLI flags:\n  --boot-and-exit   Boot, write audit event, then exit cleanly. Used by\n                    the smoke test to verify the boot/shutdown cycle without\n                    keeping a long-running stdio server open.\n\"\"\"\nfrom __future__ import annotations\nimport argparse\nimport importlib.metadata\nimport json\nimport os\nimport sys\nfrom datetime import datetime, timezone\nfrom pathlib import Path\n\n\ndef _package_version() -> str:\n    \"\"\"iter-0001 codex-rev-002 fix: derive serverInfo.version from installed\n    package metadata so it stays in sync with pyproject.toml. Falls back to\n    \"unknown\" if the package isn't installed (e.g., running from a fresh\n    source checkout without `pip install -e .`).\"\"\"\n    try:\n        return importlib.metadata.version(\"consensus-mcp\")\n    except importlib.metadata.PackageNotFoundError:\n        return \"unknown\"\n\ndef _resolve_repo_root() -> Path:\n    \"\"\"Legacy REPO_ROOT resolver. Kept for back-compat.\n\n    v1.13.0: no longer load-bearing for spec/state/project-root. Use\n    _resolve_spec_path / _resolve_state_root / _resolve_project_root instead.\n    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if override:\n        return Path(override).resolve()\n    return Path(__file__).resolve().parent.parent\n\n\ndef _resolve_spec_path() -> Path:\n    \"\"\"Spec path: env override > legacy REPO_ROOT > walked-up checkout > packaged template.\"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_SPEC_PATH\")\n    if override:\n        return Path(override).resolve()\n    repo_root_env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n        legacy = Path(repo_root_env).resolve() / \"docs\" / \"architecture\" / \"orchestration-spec.md\"\n        if legacy.exists():\n            return legacy\n    walked = Path(__file__).resolve().parent.parent / \"docs\" / \"architecture\" / \"orchestration-spec.md\"\n    if walked.exists():\n        return walked\n    return Path(__file__).resolve().parent / \"spec_template.md\"\n\n\ndef _resolve_state_root() -> Path:\n    \"\"\"State root: env override > legacy REPO_ROOT > CWD.\"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_STATE_ROOT\")\n    if override:\n        return Path(override).resolve()\n    repo_root_env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n        return Path(repo_root_env).resolve() / \"consensus-state\"\n    return Path.cwd() / \"consensus-state\"\n\n\ndef _resolve_project_root() -> Path:\n    \"\"\"Project root (reviewable-file root): env override > legacy REPO_ROOT > CWD.\n\n    This is what consumers of goal_packet.allowed_files resolve against.\n    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_PROJECT_ROOT\")\n    if override:\n        return Path(override).resolve()\n    repo_root_env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n        return Path(repo_root_env).resolve()\n    return Path.cwd()\n\n\nREPO_ROOT = _resolve_repo_root()\nSPEC_PATH = _resolve_spec_path()\nSTATE_ROOT = _resolve_state_root()\nPROJECT_ROOT = _resolve_project_root()\n\n\ndef _resolve_audit_log_path() -> Path:\n    \"\"\"Allow smoke tests to point AUDIT_LOG at a temp sink via env var; default to state root.\"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_AUDIT_LOG\")\n    if override:\n        return Path(override)\n    return STATE_ROOT / \"state\" / \"mcp-server-audit.jsonl\"\n\n\nAUDIT_LOG = _resolve_audit_log_path()\n\n\nfrom consensus_mcp.tool_registry import ToolRegistry  # noqa: E402\n\n# Global registry -- T2-T11 modules import this and call registry.register().\nregistry = ToolRegistry()\n\nfrom consensus_mcp.tools import state_read_decision_ledger  # noqa: E402\nstate_read_decision_ledger.register(registry)\n\nfrom consensus_mcp.tools import audit_append_event  # noqa: E402\naudit_append_event.register(registry)\n\nfrom consensus_mcp.tools import patch_stage_and_dry_run  # noqa: E402\npatch_stage_and_dry_run.register(registry)\n\nfrom consensus_mcp.tools import patch_apply_consensus_patch  # noqa: E402\npatch_apply_consensus_patch.register(registry)\n\nfrom consensus_mcp.tools import review_write_and_seal  # noqa: E402\nreview_write_and_seal.register(registry)\n\nfrom consensus_mcp.tools import review_read_post_seal  # noqa: E402\nreview_read_post_seal.register(registry)\n\nfrom consensus_mcp.tools import state_update_decision_ledger  # noqa: E402\nstate_update_decision_ledger.register(registry)\n\nfrom consensus_mcp.tools import repo_get_section  # noqa: E402\nrepo_get_section.register(registry)\n\nfrom consensus_mcp.tools import repo_set_section  # noqa: E402\nrepo_set_section.register(registry)\n\nfrom consensus_mcp.tools import gate_evaluate_production_with_scope_match  # noqa: E402\ngate_evaluate_production_with_scope_match.register(registry)\n\nfrom consensus_mcp.tools import reviewer_dispatch_codex  # noqa: E402\nreviewer_dispatch_codex.register(registry)\n\nfrom consensus_mcp.tools import reviewer_dispatch_gemini  # noqa: E402\nreviewer_dispatch_gemini.register(registry)\n\nfrom consensus_mcp.tools import loop_run_goal  # noqa: E402\nloop_run_goal.register(registry)\n\nfrom consensus_mcp.tools import loop_verify_codex_patch  # noqa: E402\nloop_verify_codex_patch.register(registry)\n\nfrom consensus_mcp.tools import apply_codex_patch  # noqa: E402\napply_codex_patch.register(registry)\n\nfrom consensus_mcp.tools import resume  # noqa: E402\nresume.register(registry)\n\nfrom consensus_mcp.tools import consensus_run_iteration  # noqa: E402\nconsensus_run_iteration.register(registry)\n\nfrom consensus_mcp.tools import consensus_get_iteration_outcome  # noqa: E402\nconsensus_get_iteration_outcome.register(registry)\n\n\n# ---------------------------------------------------------------------------\n# Boot-time disposition check\n# ---------------------------------------------------------------------------\n\ndef _run_disposition_check() -> int:\n    \"\"\"Run validate_disposition_index against the spec; return findings count.\n\n    Returns 0 if clean. Non-zero means server should refuse to start.\n    Raises on import/IO error (caller handles).\n    \"\"\"\n    from consensus_mcp.validators.validate_disposition_index import validate_disposition_index\n    report = validate_disposition_index(SPEC_PATH)\n    return report[\"stats\"][\"total_findings\"]\n\n\n# ---------------------------------------------------------------------------\n# Audit log\n# ---------------------------------------------------------------------------\n\ndef _now_utc() -> str:\n    return (\n        datetime.now(timezone.utc)\n        .replace(microsecond=0)\n        .isoformat()\n        .replace(\"+00:00\", \"Z\")\n    )\n\n\ndef _append_audit_event(event: str, extra: dict | None = None) -> None:\n    \"\"\"Append one JSON-lines record to mcp-server-audit.jsonl (create if missing).\n\n    True JSONL (one JSON object per line). Atomic-safe for concurrent writers:\n    each write is a single open-append-close, so two racing processes interleave\n    lines rather than silently dropping each other's events. (Note: this is\n    atomic-append for the SERVER boot/stop log; per-iteration audit_append_event\n    has different semantics -- see audit_append_event.py docstring.)\n    \"\"\"\n    record: dict = {\"event\": event, \"timestamp_utc\": _now_utc()}\n    if extra:\n        record.update(extra)\n    AUDIT_LOG.parent.mkdir(parents=True, exist_ok=True)\n    with AUDIT_LOG.open(\"a\", encoding=\"utf-8\") as f:\n        f.write(json.dumps(record) + \"\\n\")\n\n\n# ---------------------------------------------------------------------------\n# Stdio JSON-RPC 2.0 server (MCP wire format)\n# ---------------------------------------------------------------------------\n\ndef _send(obj: dict) -> None:\n    sys.stdout.write(json.dumps(obj) + \"\\n\")\n    sys.stdout.flush()\n\n\ndef _handle_request(req: dict) -> dict | None:\n    \"\"\"Dispatch one JSON-RPC request; return response dict or None (for notifications).\"\"\"\n    req_id = req.get(\"id\")\n    method = req.get(\"method\", \"\")\n    params = req.get(\"params\") or {}\n\n    # MCP initialize handshake\n    if method == \"initialize\":\n        return {\n            \"jsonrpc\": \"2.0\",\n            \"id\": req_id,\n            \"result\": {\n\
      \                \"protocolVersion\": \"2024-11-05\",\n                \"serverInfo\": {\"name\": \"consensus-mcp\", \"version\": _package_version()},\n                \"capabilities\": {\"tools\": {}},\n            },\n        }\n\n    # MCP tools/list\n    if method == \"tools/list\":\n        tools = registry.list_tools()\n        return {\n            \"jsonrpc\": \"2.0\",\n            \"id\": req_id,\n            \"result\": {\"tools\": tools},\n        }\n\n    # MCP tools/call\n    if method == \"tools/call\":\n        name = params.get(\"name\", \"\")\n        arguments = params.get(\"arguments\") or {}\n        try:\n            handler = registry.get_handler(name)\n        except KeyError:\n            return {\n                \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n                \"error\": {\"code\": -32601, \"message\": f\"tool not found: {name}\"},\n            }\n        try:\n            result = handler(**arguments)\n            return {\n                \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n                \"result\": {\"content\": [{\"type\": \"text\", \"text\": json.dumps(result)}]},\n            }\n        except Exception as exc:\n            return {\n                \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n                \"error\": {\"code\": -32000, \"message\": str(exc)},\n            }\n\n    # Notification (no id) -- no response required\n    if req_id is None:\n        return None\n\n    return {\n        \"jsonrpc\": \"2.0\",\n        \"id\": req_id,\n        \"error\": {\"code\": -32601, \"message\": f\"method not found: {method}\"},\n    }\n\n\ndef _serve_stdio() -> None:\n    \"\"\"Read JSON-RPC lines from stdin; write responses to stdout.\"\"\"\n    for raw_line in sys.stdin:\n        raw_line = raw_line.strip()\n        if not raw_line:\n            continue\n        try:\n            req = json.loads(raw_line)\n        except json.JSONDecodeError as exc:\n            _send({\n                \"jsonrpc\": \"2.0\",\n                \"id\": None,\n                \"error\": {\"code\": -32700, \"message\": f\"parse error: {exc}\"},\n            })\n            continue\n        resp = _handle_request(req)\n        if resp is not None:\n            _send(resp)\n\n\n# ---------------------------------------------------------------------------\n# Entry point\n# ---------------------------------------------------------------------------\n\ndef main(argv: list[str] | None = None) -> int:\n    parser = argparse.ArgumentParser(description=\"consensus-mcp MCP server (Phase 1 skeleton)\")\n    parser.add_argument(\n        \"--boot-and-exit\",\n        action=\"store_true\",\n        help=\"boot, write audit event, then exit (used by smoke test)\",\n    )\n    args = parser.parse_args(argv)\n\n    # Boot gate: refuse to start if spec has findings.\n    try:\n        findings = _run_disposition_check()\n    except Exception as exc:\n        print(f\"ERROR: disposition check failed: {exc}\", file=sys.stderr)\n        return 2\n\n    if findings != 0:\n        print(\n            f\"ERROR: validate_disposition_index reports {findings} finding(s); \"\n            \"server refuses to start.\",\n            file=sys.stderr,\n        )\n        return 2\n\n    _append_audit_event(\"mcp_server_started\", {\"findings_at_boot\": findings})\n\n    if args.boot_and_exit:\n        _append_audit_event(\"mcp_server_stopped\", {\"reason\": \"boot-and-exit\"})\n        return 0\n\n    try:\n        _serve_stdio()\n    finally:\n        _append_audit_event(\"mcp_server_stopped\", {\"reason\": \"stdin_eof\"})\n\n    return 0\n\n\nif __name__ == \"__main__\":\n    sys.exit(main())\n"
    consensus_mcp/tests/test_engine_factory.py: "\"\"\"Unit tests for consensus_mcp._engine_factory.\"\"\"\nfrom __future__ import annotations\n\nfrom copy import deepcopy\nfrom pathlib import Path\n\nimport pytest\n\nfrom consensus_mcp import _engine_factory as factory\nfrom consensus_mcp import config as cfg\nfrom consensus_mcp.contributors.claude import ClaudeAdapter\nfrom consensus_mcp.contributors.codex import CodexAdapter\nfrom consensus_mcp.contributors.gemini import GeminiAdapter\n\n\ndef _three_contributor_config():\n    c = deepcopy(cfg.default_config())\n    c[\"contributors\"][\"enabled\"] = [\"claude\", \"codex\", \"gemini\"]\n    cfg.validate(c)\n    return c\n\n\ndef test_build_adapters_returns_one_per_enabled_contributor(tmp_path):\n    config = _three_contributor_config()\n    def _cb(packet):\n        return {\"findings\": [], \"goal_satisfied\": True, \"blocking_objections\": []}\n    adapters = factory.build_adapters(config, claude_artifact_callback=_cb)\n    assert set(adapters.keys()) == {\"claude\", \"codex\", \"gemini\"}\n    assert isinstance(adapters[\"claude\"], ClaudeAdapter)\n    assert isinstance(adapters[\"codex\"], CodexAdapter)\n    assert isinstance(adapters[\"gemini\"], GeminiAdapter)\n\n\ndef test_build_adapters_solo_claude(tmp_path):\n    config = deepcopy(cfg.default_config())\n    config[\"contributors\"][\"enabled\"] = [\"claude\"]\n    config[\"workflow\"][\"mode\"] = cfg.WORKFLOW_POST_REVIEW\n    config[\"workflow\"][\"independence\"] = cfg.INDEPENDENCE_VISIBLE\n    config[\"convergence\"][\"rule\"] = cfg.CONVERGE_UNANIMOUS\n    cfg.validate(config)\n    adapters = factory.build_adapters(config)\n    assert list(adapters.keys()) == [\"claude\"]\n    assert isinstance(adapters[\"claude\"], ClaudeAdapter)\n\n\ndef test_build_adapters_unknown_key_raises(tmp_path):\n    config = _three_contributor_config()\n    config[\"contributors\"][\"enabled\"] = [\"claude\", \"fictional-ai\"]\n    # validate() rejects this — so bypass for the factory test.\n    with pytest.raises(factory.EngineFactoryError, match=\"unknown contributor key\"):\n        factory.build_adapters(config)\n\n\ndef test_build_adapters_empty_enabled_raises(tmp_path):\n    config = deepcopy(cfg.default_config())\n    config[\"contributors\"][\"enabled\"] = []\n    with pytest.raises(factory.EngineFactoryError, match=\"empty\"):\n        factory.build_adapters(config)\n\n\ndef test_build_engine_validates_config(tmp_path):\n    \"\"\"build_engine() should validate the config before constructing adapters.\"\"\"\n    config = deepcopy(cfg.default_config())\n    config[\"workflow\"][\"mode\"] = \"not-a-real-mode\"\n    with pytest.raises(cfg.ConfigValidationError):\n        factory.build_engine(config, repo_root=tmp_path)\n\n\ndef test_build_engine_returns_workflow_engine(tmp_path):\n    config = _three_contributor_config()\n    def _cb(packet):\n        return {\"findings\": [], \"goal_satisfied\": True, \"blocking_objections\": []}\n    engine = factory.build_engine(\n        config, repo_root=tmp_path, claude_artifact_callback=_cb,\n    )\n    from consensus_mcp.workflow_engine import WorkflowEngine\n    assert isinstance(engine, WorkflowEngine)\n    assert engine.repo_root == tmp_path\n    assert set(engine.adapters.keys()) == {\"claude\", \"codex\", \"gemini\"}\n\n\ndef test_build_engine_claude_callback_threaded(tmp_path):\n    \"\"\"The claude_artifact_callback must reach ClaudeAdapter.artifact_callback.\"\"\"\n    config = _three_contributor_config()\n    def _cb(packet):\n        return {\"findings\": [], \"goal_satisfied\": True, \"blocking_objections\": []}\n    engine = factory.build_engine(\n        config, repo_root=tmp_path, claude_artifact_callback=_cb,\n    )\n    assert engine.adapters[\"claude\"].artifact_callback is _cb\n"
    consensus_mcp/tests/test_consensus_run_iteration.py: "\"\"\"Tests for consensus.run_iteration MCP tool.\"\"\"\nfrom __future__ import annotations\n\nfrom copy import deepcopy\nfrom pathlib import Path\n\nimport pytest\nimport yaml\n\nfrom consensus_mcp import _engine_factory as factory\nfrom consensus_mcp import config as cfg\nfrom consensus_mcp.tools import consensus_run_iteration as tool\n\n\ndef _make_iter_dir(tmp_path: Path) -> tuple[Path, Path, Path]:\n    iter_dir = tmp_path / \"iteration-test\"\n    iter_dir.mkdir()\n    goal = iter_dir / \"goal_packet.yaml\"\n    goal.write_text(\"pilot: iter-test\\nschema_version: 1\\n\", encoding=\"utf-8\")\n    target = iter_dir / \"problem.yaml\"\n    target.write_text(\"question: test\\n\", encoding=\"utf-8\")\n    return iter_dir, goal, target\n\n\ndef _write_config(tmp_path: Path, contributors=None, mode=None):\n    config = deepcopy(cfg.default_config())\n    if contributors is not None:\n        config[\"contributors\"][\"enabled\"] = contributors\n    if mode is not None:\n        config[\"workflow\"][\"mode\"] = mode\n        if mode == cfg.WORKFLOW_POST_REVIEW:\n            config[\"workflow\"][\"independence\"] = cfg.INDEPENDENCE_VISIBLE\n            if len(config[\"contributors\"][\"enabled\"]) == 1:\n                config[\"convergence\"][\"rule\"] = cfg.CONVERGE_UNANIMOUS\n    cfg.validate(config)\n    cfg_dir = tmp_path / \".consensus\"\n    cfg_dir.mkdir(exist_ok=True)\n    cfg_path = cfg_dir / \"config.yaml\"\n    cfg_path.write_text(yaml.safe_dump(config), encoding=\"utf-8\")\n    return cfg_path\n\n\n# ---------- happy paths ----------\n\ndef test_run_iteration_workflow_4_with_fakes(tmp_path, monkeypatch):\n    \"\"\"End-to-end: workflow #4 with Fake adapters via factory monkeypatch.\"\"\"\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\", \"gemini\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n\n    # Swap in Fake adapters so we don't need real codex/gemini subprocesses.\n    from consensus_mcp.contributors.base import (\n        FakeAlwaysApprove, FakeAlwaysBlock, FakeRaisesDispatchError,\n    )\n\n    def _fake_build_adapters(config, *, claude_artifact_callback=None):\n        return {\n            \"claude\": FakeAlwaysApprove(),\n            \"codex\": FakeAlwaysApprove(),\n            \"gemini\": FakeAlwaysApprove(),\n        }\n    monkeypatch.setattr(factory, \"build_adapters\", _fake_build_adapters)\n\n    claude_yaml = yaml.safe_dump({\n        \"findings\": [],\n        \"goal_satisfied\": True,\n        \"blocking_objections\": [],\n    })\n\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        claude_proposal_yaml=claude_yaml,\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"workflow_mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n    assert result[\"converged\"] is True\n    # All three contributors approved (Fake adapters share a name so the\n    # engine's _artifact_contributor_key collapses them under one key when\n    # artifact values are identical — counting >=1 approve_vote is enough\n    # to assert convergence happened).\n    assert len(result[\"approve_votes\"]) >= 1\n    assert result[\"final_artifact_path\"] is not None\n    assert \"converged-plan.yaml\" in result[\"final_artifact_path\"]\n\n\ndef test_run_iteration_workflow_3_with_fakes(tmp_path, monkeypatch):\n    _write_config(\n        tmp_path,\n        contributors=[\"claude\", \"codex\", \"gemini\"],\n        mode=cfg.WORKFLOW_POST_REVIEW,\n    )\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    from consensus_mcp.contributors.base import FakeAlwaysApprove\n    monkeypatch.setattr(factory, \"build_adapters\", lambda cfg, **k: {\n        \"claude\": FakeAlwaysApprove(),\n        \"codex\": FakeAlwaysApprove(),\n        \"gemini\": FakeAlwaysApprove(),\n    })\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"workflow_mode\"] == cfg.WORKFLOW_POST_REVIEW\n    assert result[\"converged\"] is True\n\n\ndef test_run_iteration_block_vote_fails_convergence(tmp_path, monkeypatch):\n    \"\"\"Workflow #4 with one blocking contributor → converged False.\"\"\"\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\", \"gemini\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    from consensus_mcp.contributors.base import FakeAlwaysApprove, FakeAlwaysBlock\n    monkeypatch.setattr(factory, \"build_adapters\", lambda cfg, **k: {\n        \"claude\": FakeAlwaysApprove(),\n        \"codex\": FakeAlwaysBlock(),\n        \"gemini\": FakeAlwaysApprove(),\n    })\n    claude_yaml = yaml.safe_dump({\n        \"findings\": [], \"goal_satisfied\": True, \"blocking_objections\": [],\n    })\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        claude_proposal_yaml=claude_yaml,\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"converged\"] is False\n    assert \"codex\" in result[\"block_votes\"]\n\n\n# ---------- error paths ----------\n\ndef test_run_iteration_missing_config_uses_legacy(tmp_path, monkeypatch):\n    \"\"\"No .consensus/config.yaml → falls back to legacy-mode synthesis.\n\n    Legacy synthesis returns contributors.enabled=[claude, codex], so the\n    engine factory needs both adapters available.\n    \"\"\"\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    from consensus_mcp.contributors.base import FakeAlwaysApprove\n    monkeypatch.setattr(factory, \"build_adapters\", lambda cfg, **k: {\n        \"claude\": FakeAlwaysApprove(),\n        \"codex\": FakeAlwaysApprove(),\n    })\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is True\n    # Legacy synthesizes workflow #3 (post-review).\n    assert result[\"workflow_mode\"] == cfg.WORKFLOW_POST_REVIEW\n\n\ndef test_run_iteration_invalid_claude_proposal_yaml(tmp_path, monkeypatch):\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        claude_proposal_yaml=\"not a mapping\",\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is False\n    assert \"mapping\" in result[\"error\"]\n\n\ndef test_run_iteration_claude_proposal_missing_field(tmp_path, monkeypatch):\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    # missing blocking_objections\n    bad = yaml.safe_dump({\"findings\": [], \"goal_satisfied\": True})\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        claude_proposal_yaml=bad,\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is False\n    assert \"blocking_objections\" in result[\"error\"]\n\n\ndef test_run_iteration_invalid_yaml_in_proposal(tmp_path, monkeypatch):\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        claude_proposal_yaml=\"key: value\\n  bad-indent: this\",\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is False\n\n\ndef test_claude_proposal_findings_wrong_type(tmp_path, monkeypatch):\n    \"\"\"codex pass-1 rev-003: findings must be a list, not a mapping.\"\"\"\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    bad = yaml.safe_dump({\n        \"findings\": {\"id\": \"f1\"},  # mapping, not list\n        \"goal_satisfied\": True,\n        \"blocking_objections\": [],\n    })\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        claude_proposal_yaml=bad,\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is False\n    assert \"findings must be a list\" in result[\"error\"]\n\n\ndef test_claude_proposal_goal_satisfied_wrong_type(tmp_path, monkeypatch):\n    \"\"\"codex pass-1 rev-003: goal_satisfied must be a bool.\"\"\"\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    bad = yaml.safe_dump({\n        \"findings\": [],\n        \"goal_satisfied\": \"yes\",  # string, not bool\n        \"blocking_objections\": [],\n    })\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        claude_proposal_yaml=bad,\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is False\n    assert \"goal_satisfied must be a bool\" in result[\"error\"]\n\n\ndef test_relative_paths_resolve_against_repo_root(tmp_path, monkeypatch):\n    \"\"\"codex pass-1 rev-002: relative iteration_dir/goal_packet/target paths\n    must join repo_root, not the process cwd.\"\"\"\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\"])\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n\
      \n    # Move cwd somewhere ELSE so process-cwd resolution would fail.\n    other_dir = tmp_path / \"elsewhere\"\n    other_dir.mkdir()\n    monkeypatch.chdir(other_dir)\n\n    from consensus_mcp.contributors.base import FakeAlwaysApprove\n    monkeypatch.setattr(factory, \"build_adapters\", lambda cfg, **k: {\n        \"claude\": FakeAlwaysApprove(),\n        \"codex\": FakeAlwaysApprove(),\n    })\n\n    # Pass repo-RELATIVE paths (not absolute). Engine must still find them\n    # because repo_root override redirects resolution.\n    rel_iter = iter_dir.relative_to(tmp_path)\n    rel_goal = goal.relative_to(tmp_path)\n    rel_target = target.relative_to(tmp_path)\n    claude_yaml = yaml.safe_dump({\n        \"findings\": [], \"goal_satisfied\": True, \"blocking_objections\": [],\n    })\n    result = tool.handle(\n        iteration_dir=str(rel_iter),\n        goal_packet_path=str(rel_goal),\n        target_path=str(rel_target),\n        claude_proposal_yaml=claude_yaml,\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is True, result.get(\"error\")\n\n\ndef test_missing_claude_proposal_yaml_rejected_in_workflow_4(tmp_path, monkeypatch):\n    \"\"\"codex pass-3 rev-001: workflow #4 with claude enabled MUST require\n    claude_proposal_yaml; without it, fail fast with MissingClaudeProposalError\n    rather than waiting for ClaudeAdapter to raise DispatchError mid-run.\"\"\"\n    _write_config(tmp_path, contributors=[\"claude\", \"codex\", \"gemini\"])  # default = #4\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        # claude_proposal_yaml deliberately omitted\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is False\n    assert result[\"error_type\"] == \"MissingClaudeProposalError\"\n    assert \"claude_proposal_yaml is required\" in result[\"error\"]\n    assert \"propose-converge\" in result[\"error\"]\n\n\ndef test_missing_claude_proposal_yaml_ok_in_workflow_3(tmp_path, monkeypatch):\n    \"\"\"Workflow #3 doesn't dispatch ClaudeAdapter — claude_proposal_yaml stays\n    optional.\"\"\"\n    _write_config(\n        tmp_path,\n        contributors=[\"claude\", \"codex\", \"gemini\"],\n        mode=cfg.WORKFLOW_POST_REVIEW,\n    )\n    iter_dir, goal, target = _make_iter_dir(tmp_path)\n    monkeypatch.chdir(tmp_path)\n    from consensus_mcp.contributors.base import FakeAlwaysApprove\n    monkeypatch.setattr(factory, \"build_adapters\", lambda cfg, **k: {\n        \"claude\": FakeAlwaysApprove(),\n        \"codex\": FakeAlwaysApprove(),\n        \"gemini\": FakeAlwaysApprove(),\n    })\n    result = tool.handle(\n        iteration_dir=str(iter_dir),\n        goal_packet_path=str(goal),\n        target_path=str(target),\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is True\n\n\ndef test_register_attaches_tool(tmp_path):\n    \"\"\"register() must add the tool to a registry.\"\"\"\n    from consensus_mcp.tool_registry import ToolRegistry\n    registry = ToolRegistry()\n    tool.register(registry)\n    listed = registry.list_tools()\n    names = {t[\"name\"] for t in listed}\n    assert \"consensus.run_iteration\" in names\n"
    consensus_mcp/tests/test_consensus_get_iteration_outcome.py: "\"\"\"Tests for consensus.get_iteration_outcome MCP tool.\"\"\"\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport pytest\nimport yaml\n\nfrom consensus_mcp.tools import consensus_get_iteration_outcome as tool\n\n\ndef test_returns_converged_plan_when_present(tmp_path):\n    iter_dir = tmp_path / \"iter-x\"\n    iter_dir.mkdir()\n    plan = {\"iteration_id\": \"iter-x\", \"converged_at_round\": 1, \"rule\": \"unanimous\"}\n    (iter_dir / \"converged-plan.yaml\").write_text(yaml.safe_dump(plan), encoding=\"utf-8\")\n    result = tool.handle(iteration_dir=str(iter_dir))\n    assert result[\"ok\"] is True\n    assert result[\"iteration_id\"] == \"iter-x\"\n    assert result[\"converged_plan\"][\"converged_at_round\"] == 1\n\n\ndef test_returns_contributor_artifacts_when_present(tmp_path):\n    iter_dir = tmp_path / \"iter-y\"\n    iter_dir.mkdir()\n    (iter_dir / \"codex-review.yaml\").write_text(\n        yaml.safe_dump({\n            \"pass_id\": \"codex-iter-y-1-pass1\",\n            \"goal_satisfied\": True,\n            \"sealed_at_utc\": \"2026-05-13T07:00:00Z\",\n            \"findings\": [],\n            \"blocking_objections\": [],\n        }), encoding=\"utf-8\",\n    )\n    (iter_dir / \"gemini-review.yaml\").write_text(\n        yaml.safe_dump({\n            \"pass_id\": \"gemini-iter-y-1-pass1\",\n            \"goal_satisfied\": False,\n            \"findings\": [{\"id\": \"g1\"}],\n            \"blocking_objections\": [\"g1\"],\n        }), encoding=\"utf-8\",\n    )\n    result = tool.handle(iteration_dir=str(iter_dir))\n    assert result[\"ok\"] is True\n    keys = {a[\"contributor\"] for a in result[\"contributor_artifacts\"]}\n    assert keys == {\"codex\", \"gemini\"}\n    codex_entry = next(a for a in result[\"contributor_artifacts\"] if a[\"contributor\"] == \"codex\")\n    assert codex_entry[\"goal_satisfied\"] is True\n    assert codex_entry[\"sealed_at\"] == \"2026-05-13T07:00:00Z\"\n\n\ndef test_returns_effective_config_path_when_present(tmp_path):\n    iter_dir = tmp_path / \"iter-z\"\n    iter_dir.mkdir()\n    cfg_path = iter_dir / \"effective-config.yaml\"\n    cfg_path.write_text(\"schema_version: 1\\n\", encoding=\"utf-8\")\n    result = tool.handle(iteration_dir=str(iter_dir))\n    assert result[\"ok\"] is True\n    assert result[\"effective_config_path\"] == str(cfg_path)\n\n\ndef test_missing_iteration_dir(tmp_path):\n    result = tool.handle(iteration_dir=str(tmp_path / \"does-not-exist\"))\n    assert result[\"ok\"] is False\n    assert \"does not exist\" in result[\"error\"]\n\n\ndef test_iteration_dir_is_file(tmp_path):\n    file_not_dir = tmp_path / \"file.yaml\"\n    file_not_dir.write_text(\"x: y\", encoding=\"utf-8\")\n    result = tool.handle(iteration_dir=str(file_not_dir))\n    assert result[\"ok\"] is False\n    assert \"not a directory\" in result[\"error\"]\n\n\ndef test_empty_dir_returns_empty_outcome(tmp_path):\n    iter_dir = tmp_path / \"iter-empty\"\n    iter_dir.mkdir()\n    result = tool.handle(iteration_dir=str(iter_dir))\n    assert result[\"ok\"] is True\n    assert result[\"converged_plan\"] is None\n    assert result[\"contributor_artifacts\"] == []\n    assert result[\"effective_config_path\"] is None\n\n\ndef test_malformed_converged_plan_yaml(tmp_path):\n    iter_dir = tmp_path / \"iter-bad\"\n    iter_dir.mkdir()\n    (iter_dir / \"converged-plan.yaml\").write_text(\n        \"key: value\\n  bad: indent\\n\", encoding=\"utf-8\"\n    )\n    result = tool.handle(iteration_dir=str(iter_dir))\n    assert result[\"ok\"] is False\n    assert \"YAML\" in result[\"error\"]\n\n\ndef test_register_attaches_tool():\n    from consensus_mcp.tool_registry import ToolRegistry\n    registry = ToolRegistry()\n    tool.register(registry)\n    listed = registry.list_tools()\n    names = {t[\"name\"] for t in listed}\n    assert \"consensus.get_iteration_outcome\" in names\n\n\ndef test_relative_iteration_dir_resolves_against_repo_root(tmp_path, monkeypatch):\n    \"\"\"codex iter-0022 pass-2 rev-001: relative iteration_dir must join repo_root\n    not process cwd.\"\"\"\n    iter_dir = tmp_path / \"iter-rel\"\n    iter_dir.mkdir()\n    (iter_dir / \"converged-plan.yaml\").write_text(yaml.safe_dump({\"x\": 1}), encoding=\"utf-8\")\n    other = tmp_path / \"elsewhere\"\n    other.mkdir()\n    monkeypatch.chdir(other)\n    result = tool.handle(\n        iteration_dir=str(iter_dir.relative_to(tmp_path)),\n        repo_root=str(tmp_path),\n    )\n    assert result[\"ok\"] is True\n    assert result[\"iteration_id\"] == \"iter-rel\"\n\n\ndef test_mcp_wire_format(tmp_path):\n    \"\"\"Tool must surface flat {name, description, inputSchema} per iter-0008.\"\"\"\n    from consensus_mcp.tool_registry import ToolRegistry\n    from consensus_mcp.tools import consensus_run_iteration\n    registry = ToolRegistry()\n    consensus_run_iteration.register(registry)\n    tool.register(registry)\n    for entry in registry.list_tools():\n        assert set(entry.keys()) >= {\"name\", \"description\", \"inputSchema\"}\n        # Snake-case must not leak through.\n        assert \"input_schema\" not in entry\n        assert isinstance(entry[\"inputSchema\"], dict)\n"
