schema_version: 1
pilot_id: iteration-0022-mcp-wire-workflow-engine
goal:
  summary: |
    iter-0022 — wire iter-0016c workflow_engine + iter-0016b contributor
    adapters through the MCP tool surface per the iter-0021 converged plan.
    Two new tools (consensus.run_iteration and consensus.get_iteration_outcome)
    plus the supporting _engine_factory helper. Until this iteration, the
    workflow #4 engine and N-contributor adapter pool are only reachable via
    Python import — an operator running the installed MCP server cannot
    drive workflow #4 through the standard tool surface. This iteration
    closes that UX gap.
  desired_end_state: |
    consensus_mcp/tools/consensus_run_iteration.py exposes a `handle()` that
    reads .consensus/config.yaml (or falls back to legacy synthesis), builds
    adapters from contributors.enabled, runs WorkflowEngine.run_iteration(),
    and returns structured outcome (workflow_mode, converged, contributors_
    responsive/timed_out, approve_votes/block_votes, blocking_objection_ids,
    final_artifact_path, rationale). consensus_mcp/tools/consensus_get_
    iteration_outcome.py exposes a read-only inspector that returns the
    parsed converged-plan.yaml + contributor artifacts + effective-config
    path for an iteration_dir. consensus_mcp/_engine_factory.py is the
    single source of truth for "given config + repo_root, build adapter
    dict + engine"; reusable from Python and from the MCP wrapper.

    Both new tools are registered in consensus_mcp/server.py via the
    standard `from consensus_mcp.tools import <name>; <name>.register(
    registry)` pattern. Both register() functions wire SCHEMA + handle into
    the global registry with flat camelCase MCP wire format ({name,
    description, inputSchema}) per iter-0008.

    For workflow #4 (propose-converge), claude-the-orchestrator's content
    is supplied via the `claude_proposal_yaml` tool parameter; the wrapper
    parses + validates it (must be a dict with findings/goal_satisfied/
    blocking_objections), then builds an artifact_callback that returns
    the parsed dict. This avoids the deadlock of claude-the-tool-caller
    waiting for claude-the-adapter to produce content.

    Full suite 682 pass + 1 skipped + 0 fail (current 658 + 24 new tests
    across test_engine_factory.py, test_consensus_run_iteration.py,
    test_consensus_get_iteration_outcome.py).
  non_goals:
    - resume/pause/cancel semantics (separate follow-up)
    - exposing the init wizard as an MCP tool (operators use consensus-init CLI)
    - any changes to WorkflowEngine, contributors/, config.py, _init_wizard
    - README / CHANGELOG updates (separate follow-up)
allowed_files:
  - consensus_mcp/tools/consensus_run_iteration.py
  - consensus_mcp/tools/consensus_get_iteration_outcome.py
  - consensus_mcp/_engine_factory.py
  - consensus_mcp/server.py
  - consensus_mcp/tests/test_consensus_run_iteration.py
  - consensus_mcp/tests/test_consensus_get_iteration_outcome.py
  - consensus_mcp/tests/test_engine_factory.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/contributors/
  - consensus_mcp/config.py
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/_snapshot_state.py
  - consensus_mcp/tool_registry.py
  - consensus-state/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
max_iterations: 1
max_patch_size: 800
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=682 green
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2
    description: new tools registered and discoverable
    check: 'py -3.11 -c "from consensus_mcp.server import registry; names = {t[''name''] for t in registry.list_tools()}; assert ''consensus.run_iteration'' in names; assert ''consensus.get_iteration_outcome'' in names; print(''ok'')"'
  - id: A3
    description: MCP wire format compliance
    check: 'py -3.11 -c "from consensus_mcp.server import registry; assert all(set(t.keys()) >= {''name'',''description'',''inputSchema''} and ''input_schema'' not in t for t in registry.list_tools()); print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator-autonomous-overnight
  authorized_at_utc: '2026-05-13T08:00:00Z'
  codex_patch_apply_authorized: false
  scope_signature: '0718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f6'
