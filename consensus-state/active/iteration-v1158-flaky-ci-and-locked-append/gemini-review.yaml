  deliverable_scope:
    next_iteration_id: v1.15.8-ci-stability-fixes
    files_in_scope:
    - consensus_mcp/_visibility_watchdog.py
    - consensus_mcp/tests/test_visibility_watchdog.py
    - consensus_mcp/tests/test_dispatch_codex_streaming.py
    files_out_of_scope:
    - consensus_mcp/_dispatch_base.py
    - Any other product-facing code not directly related to the `_locked_append` primitive
      or the specific failing tests.
    key_design_decisions:
    - In `_visibility_watchdog.py`, a new module-level `threading.Lock` will be introduced
      to serialize all calls to `_locked_append`, ensuring intra-process thread safety.
    - 'The `except OSError: pass` block within `_locked_append` will be removed. Instead,
      a failure to acquire the `msvcrt` lock will raise an exception, preventing silent
      data loss in the audit log during cross-process contention.'
    - In `test_dispatch_codex_streaming.py`, the `test_heartbeat_fires_at_interval`
      function will be refactored. The `time.sleep()` loop will be replaced with a
      deterministic mechanism, likely using a `queue.Queue` or `threading.Event`,
      to allow the test's main thread to wait for signals from the worker thread instead
      of relying on wall-clock time.
    acceptance_gates:
    - The `test_locked_append_serializes_concurrent_writes` test passes consistently
      on all CI platforms, especially Windows.
    - The `test_heartbeat_fires_at_interval` test passes consistently on all CI platforms,
      especially Windows.
    - The final fix is confirmed by achieving at least 5 consecutive green Windows
      CI runs on the PR branch before it is merged, as verification for a flaky-fix.
    - A new test is added to `test_visibility_watchdog.py` to confirm that `_locked_append`
      raises an `OSError` if `msvcrt.locking` fails (using a mock), confirming the
      loud-fail behavior.
  risks:
  - The added `threading.Lock` in `_locked_append` could theoretically become a performance
