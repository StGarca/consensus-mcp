q1_locked_append:
  unanimous: "(d)"
  weighted_synthesis: |
    `_visibility_watchdog._locked_append` is the sealed-provenance/
    audit + watchdog integrity primitive. Its Windows path catches
    `OSError` (incl. `PermissionError`) from `msvcrt.locking` and
    proceeds with an UNLOCKED write ‚Üí silent line loss under
    contention (F1: 46/50 in a 50-thread, one-process fan-out).
    Two coupled defects, both fixed:
    - **Intra-process (the observed class):** add a module-level
      `threading.Lock` serializing ALL in-process callers ‚ÄĒ the
      exact v1.15.7 `_log_dispatch` correction, applied for
      consistency to this primitive. (claude precedent + gemini
      "right primitive per contention type" + codex "process-local
      mutex can actually serialize the known case".)
    - **Cross-process fallback fail-LOUD (independent safeguard):**
      the OS-lock-acquire-failure path must NOT silently write
      unlocked. It raises (or, minimally, the write is refused and
      a structured integrity event is emitted) so an audit
      consumer can never be misled by a silently-incomplete log.
      codex explicitly framed this as a ROOT-CAUSE-INDEPENDENT
      safeguard (safety-interlock-first doctrine): valuable for
      audit integrity regardless of why the OS lock failed.
    (b) retry = still can lose lines (wrong for an integrity
    primitive); (a) alone leaves the silent cross-process landmine;
    (c) alone doesn't fix the thread race. (d) is the only complete
    fix. Caveat to honor in impl: the threading.Lock must wrap the
    open+write so it is held for the whole append; lock ordering ‚ÄĒ
    no nested/reentrant `_locked_append` calls under the lock
    (verify no caller re-enters).

q2_heartbeat_test:
  unanimous: "(a)"
  weighted_synthesis: |
    `test_heartbeat_fires_at_interval` (+ same-pattern siblings:
    silence-abort / wall-time tests that use `clock.advance()` +
    real `time.sleep` + `join(timeout)`) flake on loaded Windows
    runners because they hope the daemon runner thread is scheduled
    enough in a wall-clock budget. Heartbeats are driven off the
    INJECTED `time_fn`, so coverage is fully preservable with
    deterministic synchronization: the runner signals progress
    (Event/Condition/queue) the test waits on, and assertions are
    on the EMITTED heartbeat events (already in dispatch-log), not
    on thread-liveness timing. (b) widen-join is still
    probabilistic = still flaky. (c) quarantine-on-Windows is the
    HONEST INTERIM only if (a)'s harness rework genuinely exceeds
    this iteration ‚ÄĒ with a concrete named follow-up, never a
    silent skip.

