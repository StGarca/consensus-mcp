      ,\n    }\n    base.update(kw)\n    return base\n\n\n# ---- find_stalled --------------------------------------------------------\n\
      \n\ndef test_find_stalled_returns_empty_when_no_orphans():\n    \"\"\"Start\
      \ + matching done → no orphan.\"\"\"\n    now = datetime(2026, 5, 11, 4, 0,\
