    consensus_mcp/_visibility_watchdog.py: "\"\"\"Watchdog for stalled dispatches\
      \ (Task #43; iter-0031 abandonment lesson).\n\nDetects dispatch_start events\
      \ in consensus-state/state/dispatch-log.jsonl that\nlack a matching terminal\
      \ event after a configurable wall-time threshold.\nIn --action=mark mode, appends\
      \ a `dispatch_stalled` audit event for each\nstale orphan so the audit shape\
      \ closes and the visibility TUI clears it\nfrom \"active\".\n\nTHE AUDIT LOG\
      \ IS APPEND-ONLY. The watchdog NEVER edits or deletes existing\nevents. It only\
      \ appends new `dispatch_stalled` records that share the\norphan's identifiers\
      \ (iteration_id / reviewer_id / pass_id).\n\nTerminal events recognized for\
      \ pairing (per iter-0036 codex-rev-001 review\n+ workflow taxonomy):\n  - dispatch_done\
      \       (success)\n  - dispatch_failed     (helper-side exception or codex non-zero\
      \ exit)\n  - dispatch_refused    (env-gate / pre-flight refusal)\n  - dispatch_aborted\
      \    (operator-signal-file or watchdog-silence, iter-0037+)\n  - dispatch_stalled\
      \    (this watchdog's own retroactive marker)\n\nIncluding dispatch_refused\
      \ matters: refused dispatches already have a\nterminal event; treating them\
      \ as orphans would corrupt the audit shape\nby appending a synthetic dispatch_stalled.\n\
      \nEXTERNAL-PROCESS FALLBACK POLICY:\nAny codex re-dispatch following a stalled\
      \ in-process subagent dispatch\nMUST use the external codex-cli pattern via\
      \ `python -m\nconsensus_mcp._dispatch_codex …`. In-process Claude subagent re-dispatch\n\
      is the failure mode iter-0031 documented; see\n`memory/feedback_external_process_fallback.md`.\n\
      \nUsage\n-----\n    # Default: read-only report; rc=1 if any orphan is stale,\
      \ rc=0 otherwise.\n    python consensus_mcp/_visibility_watchdog.py\n\n    #\
      \ Mutate: append dispatch_stalled events for each stale orphan.\n    python\
      \ consensus_mcp/_visibility_watchdog.py --action mark\n\n    # Custom thresholds\
      \ (seconds).\n    python consensus_mcp/_visibility_watchdog.py --stall-after\
      \ 1800\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport\
      \ json\nimport os\nimport sys\nimport threading\nfrom datetime import datetime,\
      \ timedelta, timezone\n\n# v1.15.8 Q1(d): `_locked_append` is the sealed-provenance/audit\
      \ +\n# watchdog integrity primitive. Its OS file lock (msvcrt.locking /\n# fcntl.flock)\
      \ serializes CROSS-process writers, but the observed\n# loss (windows-py3.10\
      \ CI: 46/50 lines from a 50-thread, ONE-process\n# fan-out) was INTRA-process\
      \ thread contention — for which an OS file\n# lock is the wrong primitive (same\
      \ lesson as v1.15.7\n# `_dispatch_base._log_dispatch`). A process-wide lock\
      \ serializes all\n# in-process callers deterministically; the OS lock then only\
      \ matters\n# for genuine cross-process contention. Converged via Workflow A\n\
      # (claude+codex+gemini, weighted-synthesis, shared-prior check\n# PASSED): iteration-v1158-flaky-ci-and-locked-append.\n\
      _APPEND_LOCK = threading.Lock()\nfrom pathlib import Path\nfrom typing import\
      \ Iterator\n\nWATCHDOG_VERSION = \"1.1.0\"\n\n# Per iter-0036 codex-rev-001:\
      \ include dispatch_refused as terminal so a\n# refused dispatch (env-gate failure,\
      \ etc.) isn't reclassified as an\n# orphan. dispatch_aborted reserved for iter-0037\
      \ streaming/abort work.\n_TERMINAL_EVENTS = {\n    \"dispatch_done\",\n    \"\
      dispatch_failed\",\n    \"dispatch_refused\",\n    \"dispatch_aborted\",\n \
      \   \"dispatch_stalled\",\n}\n\n# Markers identifying the consensus-mcp repo\
      \ root (mirrors\n# _dispatch_codex._REPO_ROOT_MARKERS, kept local to avoid an\
      \ import cycle).\n_REPO_ROOT_MARKERS = (\"consensus-state\", \"consensus_mcp\"\
      , \"consensus_mcp/validators\")\n\n\nclass RepoRootResolutionError(RuntimeError):\n\
      \    \"\"\"Raised when repo_root cannot be resolved to a valid repo (no markers\
      \ found).\"\"\"\n\n\ndef _has_repo_markers(candidate: Path) -> bool:\n    \"\
      \"\"Return True iff candidate contains all _REPO_ROOT_MARKERS as subpaths.\"\
      \"\"\n    return all((candidate / marker).is_dir() for marker in _REPO_ROOT_MARKERS)\n\
      \n\ndef _default_repo_root() -> Path:\n    \"\"\"Resolve the repo root using\
      \ marker validation (xplat-rev-006 fix).\n\n    The prior heuristic ``Path(__file__).resolve().parent.parent``\
      \ lands\n    inside site-packages after a non-editable install, making the watchdog\
      \ scan\n    the wrong tree. Walk parents looking for repo markers; raise if\
      \ none match\n    and no env var was supplied.\n\n    Resolution order (first\
      \ candidate with all repo markers wins):\n      1. CONSENSUS_MCP_REPO_ROOT env\
      \ var (must validate; authoritative)\n      2. Path.cwd() (operator usually\
      \ invokes from repo root)\n      3. Walk parents of Path(__file__) until filesystem\
      \ root\n    \"\"\"\n    candidates_tried: list[tuple[str, Path]] = []\n\n  \
      \  override = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if override:\n\
      \        candidate = Path(override).resolve()\n        candidates_tried.append((\"\
      CONSENSUS_MCP_REPO_ROOT\", candidate))\n        if _has_repo_markers(candidate):\n\
      \            return candidate\n        # Operator-supplied env var is authoritative\
      \ — don't silently fall\n        # through. Mirrors _dispatch_codex behaviour.\n\
      \        raise RepoRootResolutionError(\n            f\"CONSENSUS_MCP_REPO_ROOT={override!r}\
      \ was set but the path \"\n            f\"{candidate} does not contain all required\
      \ repo markers \"\n            f\"{_REPO_ROOT_MARKERS}. Either fix the path\
      \ or unset the env \"\n            f\"var to use automatic discovery.\"\n  \
      \      )\n\n    seen: set[Path] = set()\n\n    def _walk(start: Path, label:\
      \ str) -> Path | None:\n        \"\"\"Walk start and its parents looking for\
      \ repo markers.\"\"\"\n        node = start\n        while node not in seen:\n\
      \            seen.add(node)\n            candidates_tried.append((f\"{label}\
      \ ({node.name or node})\", node))\n            if _has_repo_markers(node):\n\
      \                return node\n            if node.parent == node:\n        \
      \        return None\n            node = node.parent\n        return None\n\n\
      \    # 1. Walk cwd and its parents (operator usually invokes from inside the\
      \ repo).\n    found = _walk(Path.cwd().resolve(), \"cwd-walk\")\n    if found\
      \ is not None:\n        return found\n\n    # 2. Walk parents of __file__ (handles\
      \ in-tree installs; fails on site-packages\n    #    because no parent up to\
      \ filesystem root contains the marker set).\n    found = _walk(Path(__file__).resolve().parent,\
      \ \"__file__-walk\")\n    if found is not None:\n        return found\n\n  \
      \  tried_msg = \"; \".join(f\"{name}={path}\" for name, path in candidates_tried)\n\
      \    raise RepoRootResolutionError(\n        f\"Cannot resolve consensus-mcp\
      \ repo root. None of the candidates contain \"\n        f\"all required markers\
      \ {_REPO_ROOT_MARKERS}. Set CONSENSUS_MCP_REPO_ROOT \"\n        f\"to the repo\
      \ root directory. Candidates tried: {tried_msg}\"\n    )\n\n\ndef _parse_ts(s):\n\
      \    if not s:\n        return None\n    try:\n        return datetime.fromisoformat(str(s).replace(\"\
      Z\", \"+00:00\"))\n    except (ValueError, TypeError):\n        return None\n\
      \n\ndef _read_jsonl(path: Path) -> list[dict]:\n    \"\"\"Read JSONL; tolerate\
      \ missing file + malformed lines (mirrors TUI).\n\n    Legacy non-streaming\
      \ API. Kept for any caller that depends on a list\n    return type. New code\
      \ should prefer ``_read_jsonl_streaming``.\n    \"\"\"\n    return list(_read_jsonl_streaming(path))\n\
      \n\ndef _read_jsonl_streaming(path: Path, since_ts: datetime | None = None)\
      \ -> Iterator[dict]:\n    \"\"\"Yield parsed events from a JSONL file (perf-rev-005\
      \ fix).\n\n    Streams line-by-line instead of slurping the whole file. Events\
      \ whose\n    ``timestamp_utc`` parses to a value strictly older than ``since_ts``\n\
      \    are skipped; events with missing/unparseable timestamps are always\n  \
      \  yielded (we can't prove they're old, and ``find_stalled`` already\n    handles\
      \ unparseable timestamps).\n    \"\"\"\n    if not path.exists():\n        return\n\
      \    try:\n        with path.open(\"r\", encoding=\"utf-8\") as f:\n       \
      \     for line in f:\n                line = line.strip()\n                if\
      \ not line:\n                    continue\n                try:\n          \
      \          ev = json.loads(line)\n                except json.JSONDecodeError:\n\
      \                    continue\n                if since_ts is not None:\n  \
      \                  ts = _parse_ts(ev.get(\"timestamp_utc\"))\n             \
      \       if ts is not None and ts < since_ts:\n                        continue\n\
      \                yield ev\n    except OSError:\n        return\n\n\ndef _locked_append(path:\
      \ Path, payload: str) -> None:\n    \"\"\"Append ``payload`` to ``path`` under\
      \ an OS-appropriate exclusive lock\n    (xplat-rev-007 fix).\n\n    Concurrency\
      \ model (v1.15.8 Q1(d), Workflow A converged):\n      - INTRA-process (threads\
      \ of one process): serialized by the\n        module-level ``_APPEND_LOCK``\
      \ held for the whole append. This\n        is the verified-observed contention\
      \ class (F1: 50 threads /\n        one process lost 4 lines). Deterministic;\
      \ no scheduler luck.\n      - CROSS-process: the OS lock (``msvcrt.locking``\
      \ byte-range on\n        Windows / ``fcntl.flock`` on POSIX) still serializes\
      \ distinct\n        processes.\n      - **Fail-LOUD (independent safeguard):**\
      \ if the OS lock cannot\n        be acquired we DO NOT silently write unlocked\
      \ — that would\n        let the sealed-provenance/audit log be silently incomplete\n\
      \        (the F1 defect: ``except OSError: pass`` + unlocked write).\n     \
      \   We raise so integrity loss is observable, never silent. This\n        protects\
      \ audit integrity regardless of *why* the OS lock\n        failed.\n      -\
      \ If neither lock module is importable (rare platform), the\n        in-process\
      \ lock still serializes threads; cross-process is\n        unsupportable there,\
      \ so we warn (unchanged) rather than fail\n        the platform outright.\n\
      \    \"\"\"\n    path.parent.mkdir(parents=True, exist_ok=True)\n    data =\
      \ payload.encode(\"utf-8\")\n    try:\n        import msvcrt  # type: ignore[import-not-found]\n\
      \    except ImportError:\n        msvcrt = None  # type: ignore[assignment]\n\
      \    try:\n        import fcntl  # type: ignore[import-not-found]\n    except\
      \ ImportError:\n        fcntl = None  # type: ignore[assignment]\n\n    with\
      \ _APPEND_LOCK:\n        if msvcrt is None and fcntl is None:\n            sys.stderr.write(\n\
      \                \"WARNING: _locked_append: neither msvcrt nor fcntl \"\n  \
      \              \"available; cross-process serialization unavailable \"\n   \
      \             \"(in-process writers are still serialized).\\n\"\n          \
      \  )\n            with path.open(\"ab\") as f:\n                f.write(data)\n\
      \            return\n\n        with path.open(\"ab\") as f:\n            if\
      \ msvcrt is not None:\n                # Windows byte-range lock (1 byte at\
      \ the writer's\n                # offset). LK_LOCK blocks with internal retries;\
      \ the\n                # lock auto-releases on handle close.\n             \
