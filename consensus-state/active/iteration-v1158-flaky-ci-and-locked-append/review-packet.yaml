      \n\ndef _read_jsonl_streaming(path: Path, since_ts: datetime | None = None)\
      \ -> Iterator[dict]:\n    \"\"\"Yield parsed events from a JSONL file (perf-rev-005\
      \ fix).\n\n    Streams line-by-line instead of slurping the whole file. Events\
      \ whose\n    ``timestamp_utc`` parses to a value strictly older than ``since_ts``\n\
      \    are skipped; events with missing/unparseable timestamps are always\n  \
      \  yielded (we can't prove they're old, and ``find_stalled`` already\n    handles\
      \ unparseable timestamps).\n    \"\"\"\n    if not path.exists():\n        return\n\
      \    try:\n        with path.open(\"r\", encoding=\"utf-8\") as f:\n       \
      \     for line in f:\n                line = line.strip()\n                if\
      \ not line:\n                    continue\n                try:\n          \
      \          ev = json.loads(line)\n                except json.JSONDecodeError:\n\
      \                    continue\n                if since_ts is not None:\n  \
      \                  ts = _parse_ts(ev.get(\"timestamp_utc\"))\n             \
      \       if ts is not None and ts < since_ts:\n                        continue\n\
      \                yield ev\n    except OSError:\n        return\n\n\ndef _locked_append(path:\
      \ Path, payload: str) -> None:\n    \"\"\"Append ``payload`` to ``path`` under\
      \ an OS-appropriate exclusive lock\n    (xplat-rev-007 fix).\n\n    Concurrency\
      \ model (v1.15.8 Q1(d), Workflow A converged):\n      - INTRA-process (threads\
