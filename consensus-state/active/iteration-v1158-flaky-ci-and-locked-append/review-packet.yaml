      \nfrom consensus_mcp import _visibility_watchdog  # noqa: E402\n\n\ndef _start_event(pass_id:\
      \ str, iteration_id: str, timestamp: str, **kw) -> dict:\n    base = {\n   \
      \     \"event\": \"dispatch_start\",\n        \"pass_id\": pass_id,\n      \
      \  \"iteration_id\": iteration_id,\n        \"timestamp_utc\": timestamp,\n\
      \        \"timeout_seconds\": 900,\n    }\n    base.update(kw)\n    return base\n\
      \n\ndef _done_event(pass_id: str, iteration_id: str, timestamp: str, **kw) ->\
      \ dict:\n    base = {\n        \"event\": \"dispatch_done\",\n        \"pass_id\"\
      : pass_id,\n        \"iteration_id\": iteration_id,\n        \"timestamp_utc\"\
      : timestamp,\n        \"exit_code\": 0,\n    }\n    base.update(kw)\n    return\
      \ base\n\n\ndef _refused_event(pass_id: str, iteration_id: str, timestamp: str,\
      \ **kw) -> dict:\n    base = {\n        \"event\": \"dispatch_refused\",\n \
      \       \"pass_id\": pass_id,\n        \"iteration_id\": iteration_id,\n   \
      \     \"timestamp_utc\": timestamp,\n    }\n    base.update(kw)\n    return\
      \ base\n\n\ndef _stalled_event(pass_id: str, iteration_id: str, timestamp: str,\
      \ **kw) -> dict:\n    base = {\n        \"event\": \"dispatch_stalled\",\n \
