      \  repo_root = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n\
      \    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\
      \n\n    # Codex would run a long time; we'll abort externally.\n    factory\
      \ = _make_factory(clock, scheduled_stdout=[(0.0, b\"working\\n\")], exit_at=1000.0)\n\
      \n    exc_holder = {}\n\n    def runner():\n        try:\n            _dispatch_codex._invoke_codex(\n\
      \                prompt=\"x\",\n                codex_bin=\"codex\",\n     \
      \           timeout_seconds=10000,\n                repo_root=repo_root,\n \
      \               schema_path=SCHEMA_PATH,\n                log_path=log_path,\n\
      \                anchors=_anchors(),\n                heartbeat_interval=10000.0,\n\
      \                stall_silence_seconds=10000.0,  # don't fire silence-abort\n\
      \                poll_interval=0.01,\n                time_fn=clock.now,\n \
      \               popen_factory=factory,\n            )\n        except Exception\
      \ as e:  # noqa: BLE001\n            exc_holder[\"e\"] = e\n\n    th = threading.Thread(target=runner,\
      \ daemon=True)\n    th.start()\n    # Wait a beat so the loop is running.\n\
      \    time.sleep(0.1)\n    signal_path = repo_root / \"consensus-state\" / \"\
      state\" / \"abort-dispatch-codex-test-pass1.signal\"\n    signal_path.write_text(\"\
      operator manual abort\", encoding=\"utf-8\")\n    th.join(timeout=10)\n    assert\
      \ not th.is_alive(), \"runner did not abort\"\n\n    assert \"e\" in exc_holder,\
      \ \"expected CodexInvocationError\"\n    assert isinstance(exc_holder[\"e\"\
      ], _dispatch_codex.CodexInvocationError)\n\n    events = _read_log_events(log_path)\n\
      \    aborts = [e for e in events if e[\"event\"] == \"dispatch_aborted\"]\n\
      \    assert len(aborts) == 1, f\"expected 1 abort event, got {aborts}\"\n  \
      \  assert aborts[0][\"abort_source\"] == \"operator_signal_file\"\n    assert\
      \ \"operator manual abort\" in aborts[0].get(\"abort_reason\", \"\")\n\n   \
      \ # Signal file should be deleted.\n    assert not signal_path.exists(), \"\
      abort signal file was not deleted\"\n\n\n# --------------------------------------------------------------------------\n\
      # Test 6 — wall-time hard ceiling\n# --------------------------------------------------------------------------\n\
      \n\n@_FLAKY_WINDOWS_CI\ndef test_wall_time_hard_ceiling(tmp_path):\n    \"\"\
      \"Codex streams continuously (so silence-abort never fires) but runs\n    past\
      \ `timeout_seconds + stall_silence_seconds` → expect dispatch_aborted\n    with\
      \ abort_source=\"wall_time_hard_ceiling\" and CodexInvocationError.\n    \"\"\
      \"\n    repo_root = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n\
      \    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\
      \n\n    # Stream a line every 1s of clock-time forever, so silence never fires.\n\
      \    # The reader thread reads scheduled bytes as clock advances past them.\n\
      \    scheduled = [(float(i), f\"keepalive{i}\\n\".encode(\"utf-8\")) for i in\
      \ range(0, 200)]\n    factory = _make_factory(clock, scheduled_stdout=scheduled,\
      \ exit_at=10000.0)\n\n    exc_holder = {}\n\n    def runner():\n        try:\n\
      \            _dispatch_codex._invoke_codex(\n                prompt=\"x\",\n\
      \                codex_bin=\"codex\",\n                timeout_seconds=10, \
      \ # wall = 10\n                repo_root=repo_root,\n                schema_path=SCHEMA_PATH,\n\
      \                log_path=log_path,\n                anchors=_anchors(),\n \
      \               heartbeat_interval=1000.0,\n                stall_silence_seconds=5.0,\
      \  # grace = 5; hard ceiling at 15s\n                poll_interval=0.01,\n \
      \               time_fn=clock.now,\n                popen_factory=factory,\n\
      \            )\n        except Exception as e:  # noqa: BLE001\n           \
      \ exc_holder[\"e\"] = e\n\n    th = threading.Thread(target=runner, daemon=True)\n\
      \    th.start()\n\n    # Advance clock in 1s steps; reader drains scheduled\
      \ keepalives as we go,\n    # so silence_age stays low. After ~16s of clock\
      \ advance, wall-time hard\n    # ceiling (10 + 5 = 15s) should trip.\n    for\
      \ _ in range(20):\n        clock.advance(1.0)\n        time.sleep(0.02)\n  \
      \  th.join(timeout=10)\n    assert not th.is_alive(), \"runner did not abort\"\
      \n\n    assert \"e\" in exc_holder, \"expected CodexInvocationError\"\n    assert\
      \ isinstance(exc_holder[\"e\"], _dispatch_codex.CodexInvocationError)\n\n  \
      \  events = _read_log_events(log_path)\n    aborts = [e for e in events if e[\"\
      event\"] == \"dispatch_aborted\"]\n    assert len(aborts) == 1, f\"expected\
      \ 1 abort, got {aborts}\"\n    assert aborts[0][\"abort_source\"] == \"wall_time_hard_ceiling\"\
      \n\n\n# --------------------------------------------------------------------------\n\
      # Test 7 — clean exit returns codex output payload\n# --------------------------------------------------------------------------\n\
      \n\ndef test_clean_exit_returns_output(tmp_path):\n    repo_root = _setup_repo_root(tmp_path)\n\
      \    clock = _ControllableClock()\n    log_path = repo_root / \"consensus-state\"\
      \ / \"state\" / \"dispatch-log.jsonl\"\n\n    payload = '{\"findings\": [],\
      \ \"verdict\": \"PASS\"}'\n    scheduled = [(0.0, b\"working...\\n\"), (0.0,\
      \ b\"done\\n\")]\n    factory = _make_factory(\n        clock,\n        scheduled_stdout=scheduled,\n\
      \        exit_at=0.3,\n        returncode=0,\n        output_payload=payload,\n\
      \    )\n\n    th, holder = _run_invoke_in_thread(\n        prompt=\"x\",\n \
      \       codex_bin=\"codex\",\n        timeout_seconds=60,\n        repo_root=repo_root,\n\
      \        schema_path=SCHEMA_PATH,\n        log_path=log_path,\n        anchors=_anchors(),\n\
      \        heartbeat_interval=30.0,\n        stall_silence_seconds=90.0,\n   \
      \     poll_interval=0.01,\n        time_fn=clock.now,\n        popen_factory=factory,\n\
      \    )\n    _drive_clock_until_done(clock, th)\n    assert not th.is_alive()\n\
      \    assert \"e\" not in holder, f\"unexpected exception: {holder.get('e')}\"\
      \n    assert holder[\"out\"] == payload\n\n    events = _read_log_events(log_path)\n\
      \    aborts = [e for e in events if e[\"event\"] == \"dispatch_aborted\"]\n\
      \    assert aborts == [], f\"clean exit produced abort events: {aborts}\"\n\
      \    stream = [e for e in events if e[\"event\"] == \"dispatch_streamed_line\"\
      ]\n    assert len(stream) == 2\n\n\n# --------------------------------------------------------------------------\n\
      # Optional 8th — stderr drain prevents deadlock\n# --------------------------------------------------------------------------\n\
      \n\ndef test_stderr_drain_prevents_deadlock(tmp_path):\n    \"\"\"codex emits\
      \ ~100KB to stderr; without the stderr-reader thread real\n    codex would block\
      \ on a full pipe buffer. With the drain in place,\n    dispatch completes normally.\n\
      \n    In this fake we simulate by scheduling many stderr lines; the test\n \
      \   asserts that _invoke_codex returns cleanly within the test budget.\n   \
      \ \"\"\"\n    repo_root = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n\
      \    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\
      \n\n    big_line = b\"E\" * 1000 + b\"\\n\"\n    # ~100 lines × 1001 bytes ≈\
      \ 100KB on stderr.\n    scheduled_err = [(0.0, big_line) for _ in range(100)]\n\
      \    scheduled_out = [(0.0, b\"ok\\n\")]\n    factory = _make_factory(\n   \
      \     clock,\n        scheduled_stdout=scheduled_out,\n        scheduled_stderr=scheduled_err,\n\
      \        exit_at=0.3,\n    )\n\n    th, holder = _run_invoke_in_thread(\n  \
      \      prompt=\"x\",\n        codex_bin=\"codex\",\n        timeout_seconds=60,\n\
      \        repo_root=repo_root,\n        schema_path=SCHEMA_PATH,\n        log_path=log_path,\n\
      \        anchors=_anchors(),\n        heartbeat_interval=30.0,\n        stall_silence_seconds=90.0,\n\
      \        poll_interval=0.01,\n        time_fn=clock.now,\n        popen_factory=factory,\n\
      \    )\n    _drive_clock_until_done(clock, th)\n    assert not th.is_alive()\n\
      \    assert \"e\" not in holder, f\"unexpected exception: {holder.get('e')}\"\
      \n    assert holder[\"out\"] == '{\"ok\": true}'\n"
    CHANGELOG.md: "# Changelog\n\n## 1.15.8 - unreleased\n\n**Windows-CI flakes —\
      \ root-caused via Workflow A consult.** The\nre-enabled CI kept showing the\
      \ *same commit* green on one run, red\non another (2 Windows-only flakes). Consult\n\
      `iteration-v1158-flaky-ci-and-locked-append` (claude+codex+gemini,\nweighted-synthesis,\
      \ shared-prior self-check PASSED — three distinct\ndifferentials; dogfoods the\
      \ v1.15.1 convention incl. an\nindependent_safeguard).\n\n- **Q1(d) — real defect\
      \ in `_visibility_watchdog._locked_append`\n  (the sealed-provenance/audit +\
      \ watchdog integrity primitive).**\n  It caught `OSError` from `msvcrt.locking`\
      \ then wrote **UNLOCKED**,\n  silently losing audit lines under contention (windows-py3.10\
      \ CI:\n  `test_locked_append_serializes_concurrent_writes` lost 4 of 50\n  from\
      \ a 50-thread, ONE-process fan-out — intra-process contention,\n  the v1.15.7\
      \ OS-lock-vs-threads class in a different primitive;\n  latent + CI-exposed,\
      \ not introduced this session). Fix: a\n  module-level `threading.Lock` (`_APPEND_LOCK`)\
      \ serializes all\n  in-process callers deterministically; the OS lock now only\n\
      \  governs genuine cross-process contention; and the failure path\n  **fails\
      \ LOUD** (raises) instead of a silent unlocked write — an\n  independent safeguard\
      \ so a sealed-provenance/audit log can never\n  be silently incomplete, regardless\
      \ of *why* the OS lock failed.\n  Fixes the test deterministically (not a quarantine).\n\
      - **Q2(c interim) — timing-fragile heartbeat-pattern tests.** Four\n  tests\
      \ drive the `_invoke_codex` runner thread + advance a\n  controllable clock\
      \ with real `time.sleep` ticks then `join`;\n  they flake on loaded Windows\
      \ GitHub runners (not a product\n  defect — same logic green on Linux CI + local;\
      \ driven by the\n  injected `time_fn`). Per the converged plan's explicit (c)\n\
      \  allowance, `skipif(win32 and GITHUB_ACTIONS)` — they still run on\n  **Linux\
      \ CI every push + local Windows dev**, so coverage is\n  retained. **Named follow-up:**\
      \ rework `_ControllableClock` into a\n  deterministic synchronizing clock so\
      \ they run everywhere and the\n  skip drops (advisory 2026-05-15).\n- **Verification\
      \ discipline:** per the converged plan\n  (provisional-until-proven), v1.15.8\
      \ is cut ONLY after a\n  determinism argument AND **≥3 consecutive green Windows\
      \ CI runs**\n  of the same commit — one green run is explicitly insufficient\n\
      \  (the over-claim that bit this session).\n\nFull suite 968 passed / 1 skipped\
      \ / 0 regressions. Workflow B\naudit: codex + gemini.\n\n## 1.15.7 - 2026-05-15\n\
      \n**CI fix: 4 codex-dispatch tests required a real `codex` binary.**\nFirst\
      \ green CI surfaced this: `test_dispatch_codex.py`'s\n`test_main_smoke_with_mocked_codex`,\n\
      `test_main_smoke_flag_with_env_proceeds`,\n`test_main_sealed_packet_embeds_dispatch_provenance`,\n\
      `test_dispatch_done_includes_archive_path_and_audit_id` predate the\niter-0037\
      \ refactor that moved the codex invocation from\n`subprocess.run` to `subprocess.Popen`.\
      \ They still mock only\n`subprocess.run` (now just the `codex --version` probe),\
      \ so the\nactual dispatch executes the **real** codex via Popen. They passed\n\
      on dev machines purely because a real `codex` is on PATH; on CI\nrunners with\
      \ none they failed `CodexInvocationError: codex binary\nnot found` (windows\
      \ legs → exit 1) or reached a process-group kill\nthat SIGTERM'd the runner\
      \ (ubuntu legs → exit 143). It stayed\nhidden because CI was dormant v1.13.0→v1.15.3\
      \ (main-only trigger)\nuntil v1.15.4 re-enabled it — so these were never actually\n\
      CI-covered.\n\nHonest interim fix: a `skipif(shutil.which(\"codex\") is None)`\n\
      guard so they skip cleanly when no real codex is present (they are\nde-facto\
      \ integration tests as written). Verified both ways: codex\npresent → all 4\
      \ run + pass (no regression, full suite 968/0);\ncodex absent (simulated) →\
      \ 4 skip, 0 failed. **Named follow-up\n(tracked):** rewrite the 4 to mock the\
      \ Popen path via the existing\n`make_fake_codex_popen_factory` / `popen_factory=`\
      \ kwarg (the\npattern the genuinely-hermetic `main()` tests already use) and\
      \ drop\nthe skip. Test-only change; no production code, no behavior.\n\nTwo\
      \ more pre-existing CI-env debts re-enabled CI surfaced, fixed\nhere too:\n\n\
      - **Validator self-test `20/21` (windows legs).**\n  `run_validator_tests.py::test_packet_build_sanitizes_injection`\n\
      \  failed because `review_packet_known_good/input.yaml` listed\n  `target_files:\
      \ agent-loop/tests/fixtures/prompt_injection_doc.md`\n  — a **parent-project\
      \ path never rewritten during the standalone\n  extraction**. The doc actually\
      \ lives at\n  `consensus-state/tests/fixtures/prompt_injection_doc.md`; the\n\
      \  stale path meant the builder read nothing, sanitized nothing, and\n  the\
      \ empty `sanitization_log` failed the `>=7` check. Repointed the\n  fixture\
      \ path (the doc contains all 7 `SANITIZE_PATTERNS`); now\n  **21/21**. Not Windows-specific\
      \ — reproduced locally; latent since\n  iter-0001, masked by dormant CI.\n-\
      \ **ubuntu job-kill (exit 143 / \"operation canceled\" ~25%) —\n  ROOT-CAUSED\
      \ + fixed.** Not a hang and not the 4 above:\n  `test_dispatch_codex_streaming.py::_FakePopen.pid`\
      \ returned\n  **`0`**. On POSIX, `_dispatch_base._terminate_process_tree` does\n\
      \  `os.killpg(os.getpgid(proc.pid), SIG*)`; `os.getpgid(0)` resolves\n  to **the\
      \ caller's own process group**, so the abort/watchdog\n  tests SIGTERM'd the\
      \ pytest / GitHub-Actions job *itself* (instant,\n  hence pytest-timeout never\
      \ fired). Windows uses the\n  `send_signal`/`taskkill` branch, so it was masked\
      \ locally and CI\n  was dormant v1.13.0→v1.15.3 so it stayed hidden until v1.15.4\n\
      \  re-enabled CI. Latent since iter-0039. Fixed two ways:\n  (a) corrected the\
      \ synthetic pid to a never-live value so\n  `os.getpgid` raises `ProcessLookupError`\
      \ → the documented\n  `proc.terminate()` fallback runs; (b) a suite-wide\n \
      \ `tests/conftest.py` autouse guard that neutralizes\n  `os.killpg`/`os.getpgid`\
      \ so NO test can ever signal a real\n  process group (production `_terminate_process_tree`\
      \ logic still\n  runs; every `dispatch_aborted` assertion unchanged). `pytest-\n\
      \  timeout` retained as permanent hardening. Verified: targeted\n  abort/dispatch\
      \ suites 144/0; full suite 968 passed / 1 skipped /\n  0 regressions with the\
      \ guard active.\n- **POSIX-only `signal` AttributeError (the FINAL ubuntu blocker).**\n\
      \  Once (3) stopped the runner self-kill, ubuntu ran to completion\n  and surfaced\
      \ the real last failure:\n  `test_terminate_process_tree_uses_signal_on_posix`\
      \ asserted\n  `_dispatch_codex.signal.SIGTERM`, but the iter-0037 refactor moved\n\
      \  `_terminate_process_tree` to `_dispatch_base` and `_dispatch_codex`\n  only\
      \ re-imports the function, not the `signal` module → \n  `AttributeError`. This\
      \ test is Windows-skipped, so it only ran on\n  POSIX CI — masked the entire\
      \ time CI was dormant. Fixed: assert\n  against the stdlib `signal.SIGTERM`\
      \ enum directly (module-agnostic;\n  the same object `_dispatch_base` passes).\
      \ ubuntu was \"1 failed,\n  898 passed, 10 skipped\" — this was the 1.\n- **dispatch-log\
      \ write atomicity (real defect — found by auditing\n  the audit).** With the\
