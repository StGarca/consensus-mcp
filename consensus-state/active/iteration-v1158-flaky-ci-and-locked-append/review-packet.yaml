      \ parser.parse_args(argv)\n\n    repo_root = Path(ns.repo_root).resolve() if\
      \ ns.repo_root else _default_repo_root()\n    log_path = repo_root / \"consensus-state\"\
      \ / \"state\" / \"dispatch-log.jsonl\"\n\n    now = datetime.now(timezone.utc)\n\
