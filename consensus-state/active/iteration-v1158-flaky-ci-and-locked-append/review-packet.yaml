      \ now=now)\n    assert stale == []\n\n\ndef test_find_stalled_returns_orphan_older_than_threshold():\n\
      \    \"\"\"Start without terminal, age > threshold → returned.\"\"\"\n    now\
      \ = datetime(2026, 5, 11, 4, 0, 0, tzinfo=timezone.utc)\n    # Started 30 min\
