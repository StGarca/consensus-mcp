    consensus_mcp/_visibility_watchdog.py: "\"\"\"Watchdog for stalled dispatches\
      \ (Task #43; iter-0031 abandonment lesson).\n\nDetects dispatch_start events\
      \ in consensus-state/state/dispatch-log.jsonl that\nlack a matching terminal\
      \ event after a configurable wall-time threshold.\nIn --action=mark mode, appends\
      \ a `dispatch_stalled` audit event for each\nstale orphan so the audit shape\
      \ closes and the visibility TUI clears it\nfrom \"active\".\n\nTHE AUDIT LOG\
      \ IS APPEND-ONLY. The watchdog NEVER edits or deletes existing\nevents. It only\
      \ appends new `dispatch_stalled` records that share the\norphan's identifiers\
      \ (iteration_id / reviewer_id / pass_id).\n\nTerminal events recognized for\
      \ pairing (per iter-0036 codex-rev-001 review\n+ workflow taxonomy):\n  - dispatch_done\
      \       (success)\n  - dispatch_failed     (helper-side exception or codex non-zero\
      \ exit)\n  - dispatch_refused    (env-gate / pre-flight refusal)\n  - dispatch_aborted\
      \    (operator-signal-file or watchdog-silence, iter-0037+)\n  - dispatch_stalled\
      \    (this watchdog's own retroactive marker)\n\nIncluding dispatch_refused\
      \ matters: refused dispatches already have a\nterminal event; treating them\
      \ as orphans would corrupt the audit shape\nby appending a synthetic dispatch_stalled.\n\
      \nEXTERNAL-PROCESS FALLBACK POLICY:\nAny codex re-dispatch following a stalled\
      \ in-process subagent dispatch\nMUST use the external codex-cli pattern via\
      \ `python -m\nconsensus_mcp._dispatch_codex …`. In-process Claude subagent re-dispatch\n\
      is the failure mode iter-0031 documented; see\n`memory/feedback_external_process_fallback.md`.\n\
      \nUsage\n-----\n    # Default: read-only report; rc=1 if any orphan is stale,\
      \ rc=0 otherwise.\n    python consensus_mcp/_visibility_watchdog.py\n\n    #\
      \ Mutate: append dispatch_stalled events for each stale orphan.\n    python\
      \ consensus_mcp/_visibility_watchdog.py --action mark\n\n    # Custom thresholds\
      \ (seconds).\n    python consensus_mcp/_visibility_watchdog.py --stall-after\
      \ 1800\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport\
      \ json\nimport os\nimport sys\nfrom datetime import datetime, timedelta, timezone\n\
      from pathlib import Path\nfrom typing import Iterator\n\nWATCHDOG_VERSION =\
      \ \"1.1.0\"\n\n# Per iter-0036 codex-rev-001: include dispatch_refused as terminal\
      \ so a\n# refused dispatch (env-gate failure, etc.) isn't reclassified as an\n\
      # orphan. dispatch_aborted reserved for iter-0037 streaming/abort work.\n_TERMINAL_EVENTS\
      \ = {\n    \"dispatch_done\",\n    \"dispatch_failed\",\n    \"dispatch_refused\"\
      ,\n    \"dispatch_aborted\",\n    \"dispatch_stalled\",\n}\n\n# Markers identifying\
      \ the consensus-mcp repo root (mirrors\n# _dispatch_codex._REPO_ROOT_MARKERS,\
      \ kept local to avoid an import cycle).\n_REPO_ROOT_MARKERS = (\"consensus-state\"\
      , \"consensus_mcp\", \"consensus_mcp/validators\")\n\n\nclass RepoRootResolutionError(RuntimeError):\n\
      \    \"\"\"Raised when repo_root cannot be resolved to a valid repo (no markers\
      \ found).\"\"\"\n\n\ndef _has_repo_markers(candidate: Path) -> bool:\n    \"\
      \"\"Return True iff candidate contains all _REPO_ROOT_MARKERS as subpaths.\"\
      \"\"\n    return all((candidate / marker).is_dir() for marker in _REPO_ROOT_MARKERS)\n\
      \n\ndef _default_repo_root() -> Path:\n    \"\"\"Resolve the repo root using\
      \ marker validation (xplat-rev-006 fix).\n\n    The prior heuristic ``Path(__file__).resolve().parent.parent``\
      \ lands\n    inside site-packages after a non-editable install, making the watchdog\
      \ scan\n    the wrong tree. Walk parents looking for repo markers; raise if\
      \ none match\n    and no env var was supplied.\n\n    Resolution order (first\
      \ candidate with all repo markers wins):\n      1. CONSENSUS_MCP_REPO_ROOT env\
      \ var (must validate; authoritative)\n      2. Path.cwd() (operator usually\
      \ invokes from repo root)\n      3. Walk parents of Path(__file__) until filesystem\
      \ root\n    \"\"\"\n    candidates_tried: list[tuple[str, Path]] = []\n\n  \
      \  override = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if override:\n\
      \        candidate = Path(override).resolve()\n        candidates_tried.append((\"\
      CONSENSUS_MCP_REPO_ROOT\", candidate))\n        if _has_repo_markers(candidate):\n\
      \            return candidate\n        # Operator-supplied env var is authoritative\
      \ — don't silently fall\n        # through. Mirrors _dispatch_codex behaviour.\n\
      \        raise RepoRootResolutionError(\n            f\"CONSENSUS_MCP_REPO_ROOT={override!r}\
      \ was set but the path \"\n            f\"{candidate} does not contain all required\
      \ repo markers \"\n            f\"{_REPO_ROOT_MARKERS}. Either fix the path\
      \ or unset the env \"\n            f\"var to use automatic discovery.\"\n  \
      \      )\n\n    seen: set[Path] = set()\n\n    def _walk(start: Path, label:\
      \ str) -> Path | None:\n        \"\"\"Walk start and its parents looking for\
      \ repo markers.\"\"\"\n        node = start\n        while node not in seen:\n\
      \            seen.add(node)\n            candidates_tried.append((f\"{label}\
      \ ({node.name or node})\", node))\n            if _has_repo_markers(node):\n\
      \                return node\n            if node.parent == node:\n        \
      \        return None\n            node = node.parent\n        return None\n\n\
      \    # 1. Walk cwd and its parents (operator usually invokes from inside the\
      \ repo).\n    found = _walk(Path.cwd().resolve(), \"cwd-walk\")\n    if found\
      \ is not None:\n        return found\n\n    # 2. Walk parents of __file__ (handles\
      \ in-tree installs; fails on site-packages\n    #    because no parent up to\
      \ filesystem root contains the marker set).\n    found = _walk(Path(__file__).resolve().parent,\
      \ \"__file__-walk\")\n    if found is not None:\n        return found\n\n  \
      \  tried_msg = \"; \".join(f\"{name}={path}\" for name, path in candidates_tried)\n\
      \    raise RepoRootResolutionError(\n        f\"Cannot resolve consensus-mcp\
      \ repo root. None of the candidates contain \"\n        f\"all required markers\
      \ {_REPO_ROOT_MARKERS}. Set CONSENSUS_MCP_REPO_ROOT \"\n        f\"to the repo\
      \ root directory. Candidates tried: {tried_msg}\"\n    )\n\n\ndef _parse_ts(s):\n\
      \    if not s:\n        return None\n    try:\n        return datetime.fromisoformat(str(s).replace(\"\
      Z\", \"+00:00\"))\n    except (ValueError, TypeError):\n        return None\n\
      \n\ndef _read_jsonl(path: Path) -> list[dict]:\n    \"\"\"Read JSONL; tolerate\
      \ missing file + malformed lines (mirrors TUI).\n\n    Legacy non-streaming\
      \ API. Kept for any caller that depends on a list\n    return type. New code\
      \ should prefer ``_read_jsonl_streaming``.\n    \"\"\"\n    return list(_read_jsonl_streaming(path))\n\
      \n\ndef _read_jsonl_streaming(path: Path, since_ts: datetime | None = None)\
      \ -> Iterator[dict]:\n    \"\"\"Yield parsed events from a JSONL file (perf-rev-005\
      \ fix).\n\n    Streams line-by-line instead of slurping the whole file. Events\
      \ whose\n    ``timestamp_utc`` parses to a value strictly older than ``since_ts``\n\
      \    are skipped; events with missing/unparseable timestamps are always\n  \
      \  yielded (we can't prove they're old, and ``find_stalled`` already\n    handles\
      \ unparseable timestamps).\n    \"\"\"\n    if not path.exists():\n        return\n\
      \    try:\n        with path.open(\"r\", encoding=\"utf-8\") as f:\n       \
      \     for line in f:\n                line = line.strip()\n                if\
      \ not line:\n                    continue\n                try:\n          \
      \          ev = json.loads(line)\n                except json.JSONDecodeError:\n\
      \                    continue\n                if since_ts is not None:\n  \
      \                  ts = _parse_ts(ev.get(\"timestamp_utc\"))\n             \
      \       if ts is not None and ts < since_ts:\n                        continue\n\
      \                yield ev\n    except OSError:\n        return\n\n\ndef _locked_append(path:\
      \ Path, payload: str) -> None:\n    \"\"\"Append ``payload`` to ``path`` under\
      \ an OS-appropriate exclusive lock\n    (xplat-rev-007 fix).\n\n    On Windows\
      \ uses ``msvcrt.locking`` (byte-range; we lock the first byte\n    of the file\
      \ from the writer's offset). On POSIX uses ``fcntl.flock``.\n    If neither\
      \ module is importable we fall back to an unlocked append and\n    emit a one-time\
      \ warning to stderr — concurrent writers may produce\n    torn lines.\n    \"\
      \"\"\n    path.parent.mkdir(parents=True, exist_ok=True)\n    data = payload.encode(\"\
      utf-8\")\n    try:\n        import msvcrt  # type: ignore[import-not-found]\n\
      \    except ImportError:\n        msvcrt = None  # type: ignore[assignment]\n\
      \    try:\n        import fcntl  # type: ignore[import-not-found]\n    except\
      \ ImportError:\n        fcntl = None  # type: ignore[assignment]\n\n    if msvcrt\
      \ is None and fcntl is None:\n        sys.stderr.write(\n            \"WARNING:\
      \ _locked_append: neither msvcrt nor fcntl available; \"\n            \"falling\
      \ back to unlocked append (concurrent writers may produce \"\n            \"\
      torn lines).\\n\"\n        )\n        with path.open(\"ab\") as f:\n       \
      \     f.write(data)\n        return\n\n    with path.open(\"ab\") as f:\n  \
      \      if msvcrt is not None:\n            # Windows byte-range lock: lock 1\
      \ byte at the current file\n            # offset. LK_LOCK blocks (with internal\
      \ retries) until the\n            # lock is acquired. The lock auto-releases\
      \ when the file\n            # handle closes, so we don't need an explicit LK_UNLCK.\n\
      \            try:\n                msvcrt.locking(f.fileno(), msvcrt.LK_LOCK,\
      \ 1)\n            except OSError:\n                # Lock acquisition failed\
      \ (e.g., on a filesystem that\n                # doesn't support locking). Proceed\
      \ unlocked; this is\n                # strictly best-effort cross-process serialization.\n\
      \                pass\n            f.write(data)\n        else:\n          \
      \  # POSIX advisory lock; auto-released on close.\n            fcntl.flock(f.fileno(),\
      \ fcntl.LOCK_EX)\n            f.write(data)\n\n\ndef find_stalled(events, stall_threshold_seconds:\
      \ float, now: datetime) -> list[dict]:\n    \"\"\"Return orphan dispatch_start\
      \ events older than stall_threshold_seconds.\n\n    Pairing uses (iteration_id,\
      \ pass_id) tuple key (per iter-0033 codex-rev-002\n    fix). dispatch_stalled\
      \ is itself a terminal event, so re-running the\n    watchdog after a previous\
      \ --action=mark run does NOT re-mark the same\n    orphan.\n\n    ``events``\
      \ may be any iterable of dicts (list or generator from\n    ``_read_jsonl_streaming``).\n\
      \    \"\"\"\n    by_key: dict[tuple, dict] = {}\n    for ev in events:\n   \
      \     pass_id = ev.get(\"pass_id\") or ev.get(\"reviewer_id\")\n        if not\
      \ pass_id:\n            continue\n        iter_id = ev.get(\"iteration_id\"\
      )\n        key = (iter_id, pass_id)\n        entry = by_key.setdefault(key,\
      \ {\"start\": None, \"end\": None})\n        kind = ev.get(\"event\")\n    \
      \    if kind == \"dispatch_start\":\n            entry[\"start\"] = ev\n   \
      \     elif kind in _TERMINAL_EVENTS:\n            entry[\"end\"] = ev\n\n  \
      \  stale = []\n    for entry in by_key.values():\n        start = entry[\"start\"\
      ]\n        if not start or entry[\"end\"]:\n            continue\n        start_ts\
      \ = _parse_ts(start.get(\"timestamp_utc\"))\n        if start_ts is None:\n\
      \            continue\n        age = (now - start_ts).total_seconds()\n    \
      \    if age >= stall_threshold_seconds:\n            stale.append({\n      \
      \          \"start_event\": start,\n                \"age_seconds\": age,\n\
      \                \"start_timestamp_utc\": start.get(\"timestamp_utc\"),\n  \
      \          })\n    return stale\n\n\ndef _suggest_redispatch(orphan_start: dict)\
      \ -> str:\n    \"\"\"Recommended external-process re-dispatch command for the\
      \ given orphan.\n\n    Uses the proven _dispatch_codex CLI pattern; never in-process\
      \ subagent\n    (per iter-0031 lesson + feedback_external_process_fallback.md).\
      \ The\n    pass_id is bumped to f\"{reviewer_id}-pass2\" to avoid collision\
      \ with\n    the orphan; operator must adjust manually if pass2 is also taken.\n\
      \    \"\"\"\n    iter_id = orphan_start.get(\"iteration_id\", \"<iteration_id>\"\
      )\n    reviewer_id = orphan_start.get(\"reviewer_id\", \"<reviewer_id>\")\n\
      \    return (\n        \"python_env/python.exe -m consensus_mcp._dispatch_codex\
      \ \"\n        f\"--goal-packet consensus-state/active/{iter_id}/goal_packet.yaml\
      \ \"\n        f\"--iteration-dir consensus-state/active/{iter_id} \"\n     \
      \   f\"--reviewer-id {reviewer_id} \"\n        f\"--pass-id {reviewer_id}-pass2\
      \ \"\n        \"--codex-bin codex \"\n        f\"--review-target consensus-state/active/{iter_id}/review-packet.yaml\
      \ \"\n        \"--timeout-seconds 900\"\n    )\n\n\ndef emit_stalled_event(log_path:\
      \ Path, orphan: dict, stall_threshold_seconds: float, now: datetime) -> dict:\n\
      \    \"\"\"Append a dispatch_stalled event for the given orphan; return the\
      \ event dict.\n\n    APPEND-ONLY: never modifies or deletes existing events.\n\
      \n    Per iter-0036 codex-rev-002 review: stall_reason MUST be \"watchdog_timeout\"\
      \n    (the goal_packet-contracted value). A free-text 'detail' field carries\n\
      \    any additional context.\n    \"\"\"\n    start = orphan[\"start_event\"\
      ]\n    event = {\n        \"timestamp_utc\": now.strftime(\"%Y-%m-%dT%H:%M:%SZ\"\
      ),\n        \"event\": \"dispatch_stalled\",\n        \"iteration_id\": start.get(\"\
      iteration_id\"),\n        \"reviewer_id\": start.get(\"reviewer_id\"),\n   \
      \     \"pass_id\": start.get(\"pass_id\"),\n        \"stall_reason\": \"watchdog_timeout\"\
      ,\n        \"stall_threshold_seconds\": stall_threshold_seconds,\n        \"\
      age_seconds\": orphan[\"age_seconds\"],\n        \"original_start_timestamp_utc\"\
      : orphan[\"start_timestamp_utc\"],\n        \"watchdog_run_utc\": now.strftime(\"\
      %Y-%m-%dT%H:%M:%SZ\"),\n        \"watchdog_version\": WATCHDOG_VERSION,\n  \
      \      \"detail\": \"orphan dispatch_start with no terminal event past stall\
      \ threshold\",\n    }\n    _locked_append(log_path, json.dumps(event) + \"\\\
      n\")\n    return event\n\n\ndef main(argv: list[str] | None = None) -> int:\n\
      \    parser = argparse.ArgumentParser(description=\"Watchdog for stalled dispatches.\"\
      )\n    parser.add_argument(\"--repo-root\", default=None,\n                \
      \        help=\"Override repo root (default: env var or __file__ walk).\")\n\
      \    parser.add_argument(\"--stall-after\", type=float, default=600.0,\n   \
      \                     help=\"Seconds before an orphan is stale (default 600\
      \ = 10 min).\")\n    parser.add_argument(\"--action\", choices=(\"report\",\
      \ \"mark\"), default=\"report\",\n                        help=\"report = read-only\
      \ scan; mark = append dispatch_stalled events.\")\n    parser.add_argument(\"\
      --window-days\", type=float, default=7.0,\n                        help=\"Only\
      \ inspect events newer than this many days \"\n                            \
      \ \"(default 7). Stalled-dispatch detection only \"\n                      \
      \       \"needs recent unmatched starts; older history \"\n                \
      \             \"is skipped to avoid slurping the full log. \"\n            \
      \                 \"Pass 0 (or negative) to disable filtering.\")\n    ns =\
      \ parser.parse_args(argv)\n\n    repo_root = Path(ns.repo_root).resolve() if\
      \ ns.repo_root else _default_repo_root()\n    log_path = repo_root / \"consensus-state\"\
      \ / \"state\" / \"dispatch-log.jsonl\"\n\n    now = datetime.now(timezone.utc)\n\
      \    since_ts: datetime | None = None\n    if ns.window_days and ns.window_days\
      \ > 0:\n        since_ts = now - timedelta(days=ns.window_days)\n    events\
      \ = _read_jsonl_streaming(log_path, since_ts=since_ts)\n    stale = find_stalled(events,\
      \ ns.stall_after, now)\n\n    output = {\n        \"watchdog_run_utc\": now.strftime(\"\
      %Y-%m-%dT%H:%M:%SZ\"),\n        \"watchdog_version\": WATCHDOG_VERSION,\n  \
      \      \"stall_after_seconds\": ns.stall_after,\n        \"action\": ns.action,\n\
      \        \"stale_count\": len(stale),\n        \"stale\": [],\n    }\n    for\
      \ orphan in stale:\n        start = orphan[\"start_event\"]\n        entry =\
      \ {\n            \"iteration_id\": start.get(\"iteration_id\"),\n          \
      \  \"reviewer_id\": start.get(\"reviewer_id\"),\n            \"pass_id\": start.get(\"\
