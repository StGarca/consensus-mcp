      on another); product is sound (968/0 local, ubuntu always green).\n\n## Q1(d)\
      \ — `_visibility_watchdog._locked_append` (REAL FIX)\n\nThe audit/sealed-provenance\
      \ integrity primitive caught `OSError`\nfrom `msvcrt.locking` and then **wrote\
      \ UNLOCKED** (\"best-effort\")\n→ silent line loss under contention (F1: 46/50\
      \ from a 50-thread,\nONE-process fan-out — intra-process, the v1.15.7 OS-lock-vs-threads\n\
      class in a different primitive).\n\n- **Intra-process:** new module-level `_APPEND_LOCK\
      \ =\n  threading.Lock()`, held around the whole append (open + OS-lock +\n \
      \ write). Deterministically serializes all in-process callers — no\n  scheduler\
      \ luck. This is the verified-observed contention class.\n- **Independent safeguard\
      \ (fail-LOUD):** the Windows\n  `msvcrt.locking` failure path no longer `pass`-es\
      \ and writes\n  unlocked; it **raises** `OSError` (\"refusing a silent unlocked\n\
      \  write to a sealed-provenance/audit log\"). Audit integrity loss is\n  now\
      \ observable, never silent — protects regardless of *why* the\n  OS lock failed\
      \ (the convention's independent_safeguard;\n  works_if_root_cause_wrong=true).\n\
      - The no-lock-module platform branch keeps its warning (in-process\n  still\
      \ serialized by `_APPEND_LOCK`); not made fatal — that would\n  needlessly break\
      \ platforms lacking msvcrt+fcntl, and is a\n  different branch than the F1 defect.\n\
      \n## Q2(c interim) — heartbeat-pattern timing tests\n\nConverged plan Q3 explicitly\
      \ permits the (c) interim when the\ndeterministic (a) rework overruns the iteration\
      \ bound. A correct\nsynchronizing-`_ControllableClock` redesign across all four\n\
      runner-thread+clock tests is substantial harness work with real\ndeadlock risk\
      \ (the precise failure mode this session keeps\nhitting), so it is the **named\
      \ follow-up**, not rushed here.\n`@_FLAKY_WINDOWS_CI` (skipif `sys.platform=='win32'\
      \ and\nGITHUB_ACTIONS=='true'`) applied to the 4 racy tests\n(`test_heartbeat_fires_at_interval`,\n\
      `test_heartbeat_silence_triggers_abort`,\n`test_operator_abort_signal_file_triggers_abort`,\n\
      `test_wall_time_hard_ceiling`). They still run on **Linux CI every\npush** and\
      \ **local Windows dev**, so the regression coverage is\nretained (logic is driven\
      \ by the injected `time_fn`, not a Windows\ncode path). Named follow-up tracked\
      \ in `docs/advisories.md`.\n\n## Verification discipline (provisional-until-proven)\n\
      \nPer the converged plan: a flaky fix is NOT proven by one green\nrun. Resolved\
      \ requires BOTH (i) the determinism argument — Q1:\n`threading.Lock` strictly\
      \ serializes in-process (no scheduler\ndependence); Q2: the racy tests no longer\
      \ execute on the flaky\nWindows-CI environment — AND (ii) ≥3 consecutive green\
      \ Windows CI\nruns (py3.10 + py3.12) of the same commit. v1.15.8 is NOT cut\n\
      until that gate passes.\n\n## Audit questions\n- Q1: does Q1(d) match the converged\
      \ plan; is fail-LOUD-raise the\n  right safeguard (vs. structured-event-and-continue)\
      \ for the\n  audit primitive; any caller that legitimately relied on the\n \
      \ silent best-effort write and would now break? (grep callers.)\n- Q2: is the\
      \ Windows-GitHub-Actions-only skip acceptable\n  (coverage retained on Linux\
      \ CI + local) per the converged plan's\n  explicit (c)-interim allowance, with\
      \ the named follow-up\n  concrete enough?\n- Q3: is the ≥3-consecutive-green-Windows-CI\
      \ gate the right\n  proven-bar; anything that makes Q1(d) itself nondeterministic?\n\
      - Q4: blocking objections; state the differential/prior.\n"
