      \ > 0:\n        since_ts = now - timedelta(days=ns.window_days)\n    events\
      \ = _read_jsonl_streaming(log_path, since_ts=since_ts)\n    stale = find_stalled(events,\
      \ ns.stall_after, now)\n\n    output = {\n        \"watchdog_run_utc\": now.strftime(\"\
      %Y-%m-%dT%H:%M:%SZ\"),\n        \"watchdog_version\": WATCHDOG_VERSION,\n  \
