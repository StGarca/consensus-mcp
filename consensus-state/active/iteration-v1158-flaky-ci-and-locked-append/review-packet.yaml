    consensus_mcp/_visibility_watchdog.py: "\"\"\"Watchdog for stalled dispatches\
      \ (Task #43; iter-0031 abandonment lesson).\n\nDetects dispatch_start events\
      \ in consensus-state/state/dispatch-log.jsonl that\nlack a matching terminal\
      \ event after a configurable wall-time threshold.\nIn --action=mark mode, appends\
      \ a `dispatch_stalled` audit event for each\nstale orphan so the audit shape\
      \ closes and the visibility TUI clears it\nfrom \"active\".\n\nTHE AUDIT LOG\
      \ IS APPEND-ONLY. The watchdog NEVER edits or deletes existing\nevents. It only\
      \ appends new `dispatch_stalled` records that share the\norphan's identifiers\
      \ (iteration_id / reviewer_id / pass_id).\n\nTerminal events recognized for\
      \ pairing (per iter-0036 codex-rev-001 review\n+ workflow taxonomy):\n  - dispatch_done\
      \       (success)\n  - dispatch_failed     (helper-side exception or codex non-zero\
      \ exit)\n  - dispatch_refused    (env-gate / pre-flight refusal)\n  - dispatch_aborted\
      \    (operator-signal-file or watchdog-silence, iter-0037+)\n  - dispatch_stalled\
      \    (this watchdog's own retroactive marker)\n\nIncluding dispatch_refused\
      \ matters: refused dispatches already have a\nterminal event; treating them\
      \ as orphans would corrupt the audit shape\nby appending a synthetic dispatch_stalled.\n\
      \nEXTERNAL-PROCESS FALLBACK POLICY:\nAny codex re-dispatch following a stalled\
      \ in-process subagent dispatch\nMUST use the external codex-cli pattern via\
      \ `python -m\nconsensus_mcp._dispatch_codex …`. In-process Claude subagent re-dispatch\n\
      is the failure mode iter-0031 documented; see\n`memory/feedback_external_process_fallback.md`.\n\
      \nUsage\n-----\n    # Default: read-only report; rc=1 if any orphan is stale,\
      \ rc=0 otherwise.\n    python consensus_mcp/_visibility_watchdog.py\n\n    #\
      \ Mutate: append dispatch_stalled events for each stale orphan.\n    python\
      \ consensus_mcp/_visibility_watchdog.py --action mark\n\n    # Custom thresholds\
      \ (seconds).\n    python consensus_mcp/_visibility_watchdog.py --stall-after\
      \ 1800\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport\
      \ json\nimport os\nimport sys\nimport threading\nfrom datetime import datetime,\
      \ timedelta, timezone\n\n# v1.15.8 Q1(d): `_locked_append` is the sealed-provenance/audit\
      \ +\n# watchdog integrity primitive. Its OS file lock (msvcrt.locking /\n# fcntl.flock)\
      \ serializes CROSS-process writers, but the observed\n# loss (windows-py3.10\
      \ CI: 46/50 lines from a 50-thread, ONE-process\n# fan-out) was INTRA-process\
      \ thread contention — for which an OS file\n# lock is the wrong primitive (same\
      \ lesson as v1.15.7\n# `_dispatch_base._log_dispatch`). A process-wide lock\
      \ serializes all\n# in-process callers deterministically; the OS lock then only\
      \ matters\n# for genuine cross-process contention. Converged via Workflow A\n\
      # (claude+codex+gemini, weighted-synthesis, shared-prior check\n# PASSED): iteration-v1158-flaky-ci-and-locked-append.\n\
      _APPEND_LOCK = threading.Lock()\nfrom pathlib import Path\nfrom typing import\
      \ Iterator\n\nWATCHDOG_VERSION = \"1.1.0\"\n\n# Per iter-0036 codex-rev-001:\
      \ include dispatch_refused as terminal so a\n# refused dispatch (env-gate failure,\
      \ etc.) isn't reclassified as an\n# orphan. dispatch_aborted reserved for iter-0037\
      \ streaming/abort work.\n_TERMINAL_EVENTS = {\n    \"dispatch_done\",\n    \"\
      dispatch_failed\",\n    \"dispatch_refused\",\n    \"dispatch_aborted\",\n \
      \   \"dispatch_stalled\",\n}\n\n# Markers identifying the consensus-mcp repo\
      \ root (mirrors\n# _dispatch_codex._REPO_ROOT_MARKERS, kept local to avoid an\
      \ import cycle).\n_REPO_ROOT_MARKERS = (\"consensus-state\", \"consensus_mcp\"\
      , \"consensus_mcp/validators\")\n\n\nclass RepoRootResolutionError(RuntimeError):\n\
      \    \"\"\"Raised when repo_root cannot be resolved to a valid repo (no markers\
      \ found).\"\"\"\n\n\ndef _has_repo_markers(candidate: Path) -> bool:\n    \"\
      \"\"Return True iff candidate contains all _REPO_ROOT_MARKERS as subpaths.\"\
      \"\"\n    return all((candidate / marker).is_dir() for marker in _REPO_ROOT_MARKERS)\n\
      \n\ndef _default_repo_root() -> Path:\n    \"\"\"Resolve the repo root using\
      \ marker validation (xplat-rev-006 fix).\n\n    The prior heuristic ``Path(__file__).resolve().parent.parent``\
      \ lands\n    inside site-packages after a non-editable install, making the watchdog\
