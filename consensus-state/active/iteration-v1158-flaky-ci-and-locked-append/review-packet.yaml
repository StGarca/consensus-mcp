      \n\ndef find_stalled(events, stall_threshold_seconds: float, now: datetime)\
      \ -> list[dict]:\n    \"\"\"Return orphan dispatch_start events older than stall_threshold_seconds.\n\
      \n    Pairing uses (iteration_id, pass_id) tuple key (per iter-0033 codex-rev-002\n\
      \    fix). dispatch_stalled is itself a terminal event, so re-running the\n\
      \    watchdog after a previous --action=mark run does NOT re-mark the same\n\
      \    orphan.\n\n    ``events`` may be any iterable of dicts (list or generator\
      \ from\n    ``_read_jsonl_streaming``).\n    \"\"\"\n    by_key: dict[tuple,\
      \ dict] = {}\n    for ev in events:\n        pass_id = ev.get(\"pass_id\") or\
      \ ev.get(\"reviewer_id\")\n        if not pass_id:\n            continue\n \
      \       iter_id = ev.get(\"iteration_id\")\n        key = (iter_id, pass_id)\n\
      \        entry = by_key.setdefault(key, {\"start\": None, \"end\": None})\n\
      \        kind = ev.get(\"event\")\n        if kind == \"dispatch_start\":\n\
      \            entry[\"start\"] = ev\n        elif kind in _TERMINAL_EVENTS:\n\
      \            entry[\"end\"] = ev\n\n    stale = []\n    for entry in by_key.values():\n\
      \        start = entry[\"start\"]\n        if not start or entry[\"end\"]:\n\
      \            continue\n        start_ts = _parse_ts(start.get(\"timestamp_utc\"\
      ))\n        if start_ts is None:\n            continue\n        age = (now -\
      \ start_ts).total_seconds()\n        if age >= stall_threshold_seconds:\n  \
      \          stale.append({\n                \"start_event\": start,\n       \
      \         \"age_seconds\": age,\n                \"start_timestamp_utc\": start.get(\"\
      timestamp_utc\"),\n            })\n    return stale\n\n\ndef _suggest_redispatch(orphan_start:\
      \ dict) -> str:\n    \"\"\"Recommended external-process re-dispatch command\
      \ for the given orphan.\n\n    Uses the proven _dispatch_codex CLI pattern;\
      \ never in-process subagent\n    (per iter-0031 lesson + feedback_external_process_fallback.md).\
      \ The\n    pass_id is bumped to f\"{reviewer_id}-pass2\" to avoid collision\
      \ with\n    the orphan; operator must adjust manually if pass2 is also taken.\n\
      \    \"\"\"\n    iter_id = orphan_start.get(\"iteration_id\", \"<iteration_id>\"\
      )\n    reviewer_id = orphan_start.get(\"reviewer_id\", \"<reviewer_id>\")\n\
