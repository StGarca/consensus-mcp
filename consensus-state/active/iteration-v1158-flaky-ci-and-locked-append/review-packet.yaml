    consensus_mcp/tests/test_dispatch_codex_streaming.py: "\"\"\"Regression tests\
      \ for iter-0037 streaming/heartbeat/abort features of\n`_invoke_codex` in `consensus_mcp/_dispatch_codex.py`.\n\
      \nThese tests use:\n  - `_ControllableClock` — manual `time_fn` substitute;\
      \ tests advance the\n    clock to drive heartbeat / silence / wall-time logic\
      \ without real waits.\n  - `StreamingFakeCodexPopen` — Popen-shaped fake; `stdout.readline()`\
      \ returns\n    scheduled bytes when the controllable clock has reached the scheduled\n\
      \    time, else blocks briefly (real time, not mocked) until either the next\n\
      \    schedule time is reached or the proc is told to exit.\n\nReal `time.sleep(poll_interval)`\
      \ is left as actual time. Tests use a tiny\npoll_interval (0.01s) plus short\
      \ real sleeps between clock-advances so the\nreader thread can drain. This is\
      \ acceptable: the *decision* logic in\n_invoke_codex is driven entirely by `time_fn`;\
      \ we only need a few ms of\nreal time for thread scheduling.\n\"\"\"\nfrom __future__\
      \ import annotations\n\nimport json as _json\nimport os\nimport sys\nimport\
      \ threading\nimport time\nfrom pathlib import Path\n\nimport pytest\n\nREPO_ROOT\
      \ = Path(__file__).resolve().parent.parent.parent\n\nfrom consensus_mcp import\
      \ _dispatch_codex  # noqa: E402\n\n\nSCHEMA_PATH = REPO_ROOT / \"consensus_mcp\"\
      \ / \"dispatch_templates\" / \"codex_review_schema.json\"\n\n\n# v1.15.8 Q2(c)\
      \ interim (Workflow A converged:\n# iteration-v1158-flaky-ci-and-locked-append).\
      \ These tests drive the\n# `_invoke_codex` runner in a daemon thread and advance\
      \ a controllable\n# clock with real `time.sleep` ticks, then `join` and assert\
      \ the thread\n# finished/aborted. On loaded Windows GitHub-Actions runners the\
      \ runner\n# thread is not scheduled enough within the wall-clock budget → \"\
      runner\n# did not finish\" (same commit green on Linux CI + local; the logic\
      \ is\n# driven by the INJECTED time_fn, so it is NOT a Windows product path\
      \ —\n# purely runner scheduling). Skipped ONLY on Windows + GitHub Actions:\n\
      # Linux CI runs them every push and local Windows dev still runs them,\n# so\
      \ the regression coverage is retained. NAMED FOLLOW-UP: rework\n# `_ControllableClock`\
      \ into a deterministic synchronizing clock\n# (test↔runner handshake, no real\
      \ sleeps) so these run everywhere and\n# this skip can be dropped. Tracked:\
      \ docs/advisories.md 2026-05-15.\n_FLAKY_WINDOWS_CI = pytest.mark.skipif(\n\
      \    sys.platform == \"win32\" and os.environ.get(\"GITHUB_ACTIONS\") == \"\
      true\",\n    reason=\"v1.15.8 Q2(c): clock.advance + real time.sleep + thread-join\
      \ \"\n    \"timing race on loaded Windows GitHub runners (not a product defect;\
      \ \"\n    \"green on Linux CI + local). Named follow-up: deterministic \"\n\
      \    \"synchronizing _ControllableClock.\",\n)\n\n\n# --------------------------------------------------------------------------\n\
      # Test helpers\n# --------------------------------------------------------------------------\n\
      \n\nclass _ControllableClock:\n    \"\"\"Manually-advanced monotonic clock for\
      \ `time_fn=` injection.\"\"\"\n\n    def __init__(self, start: float = 1000.0):\n\
      \        self.t = float(start)\n        self._lock = threading.Lock()\n\n  \
