  deliverable_scope:
    next_iteration_id: iteration-v1158-flaky-ci-and-locked-append
    files_in_scope:
    - consensus_mcp/_visibility_watchdog.py
    - consensus_mcp/tests/test_visibility_watchdog.py
    - consensus_mcp/tests/test_dispatch_codex_streaming.py
    - consensus-state/active/iteration-v1158-flaky-ci-and-locked-append/converged-plan.yaml
    files_out_of_scope:
    - consensus_mcp/_dispatch_codex.py
    - consensus_mcp/_dispatch_gemini.py
    - release/tag/distribution artifacts
    - cross-process append redesign beyond loud failure on OS lock failure
    key_design_decisions:
    - Add a module-level `threading.Lock` in `_visibility_watchdog.py` and hold it
      across parent-dir creation, file open, OS lock attempt, and write, serializing
      all in-process `_locked_append` callers.
    - 'Keep the OS lock as the cross-process layer, but replace silent `except OSError:
      pass` on lock acquisition with loud failure before writing. For an integrity
      primitive, no append is better than an undetectably corrupt append.'
    - Preserve the no-locking-module fallback only if explicitly treated as unsupported/non-integrity
      mode, or make it fail loudly too if `_locked_append` is considered always-integrity-critical
      in this project. The safer v1.15.8 default is no silent unlocked append for
      audit/provenance writes.
    - Rewrite heartbeat-pattern tests to observe progress through an Event/queue tied
      to emitted dispatch events, then drive the controllable clock in response to
      observed states. Remove the `advance clock in loop + real sleep + join and hope`
      shape from heartbeat, silence-abort, and wall-ceiling siblings.
    - 'Keep coverage assertions: heartbeat count/window, monotonic ages, silence abort
      source, wall-time ceiling source, clean thread termination, and absence of unexpected
      exceptions.'
    - 'Document CI confirmation as probabilistic evidence, not proof: deterministic
      test structure is the primary fix argument; repeated Windows CI greens are regression
      confidence.'
    acceptance_gates:
    - '`test_locked_append_serializes_concurrent_writes` passes on Windows with 50
      distinct parseable JSONL records and no thread exceptions.'
    - Add a forced OS-lock-failure test that monkeypatches/simulates `msvcrt.locking`
      raising `PermissionError` and asserts `_locked_append` raises before writing
      any payload.
    - Add or preserve an append-only test proving existing log bytes remain a prefix
      after successful locked append.
    - '`test_heartbeat_fires_at_interval` no longer contains the 100-iteration `clock.advance`
      plus `time.sleep` plus `join(10)` pattern and still asserts heartbeat cadence
      around 30/60/90 seconds.'
    - Sibling streaming tests that drive fake time for silence abort or wall-time
      ceiling use explicit progress synchronization rather than fixed real sleeps
      where a dispatch event is the real prerequisite.
    - Local targeted tests pass for `consensus_mcp/tests/test_visibility_watchdog.py`
      and `consensus_mcp/tests/test_dispatch_codex_streaming.py`.
    - Full local suite remains green if practical in the iteration; if skipped, record
      the concrete reason in the converged plan.
    - 'External confirmation: run the existing Windows CI matrix at least 3 consecutive
      times on the same v1.15.8 commit with no failures in these two tests; cite run
      IDs in the plan. One green run is insufficient for a flake fix.'
    - '`converged-plan.yaml` records Q1/Q2 decisions, strongest counters, wrong-observations,
      artifact boundaries, and explicitly avoids claiming fixed in any immutable tag
      until the v1.15.8 tag/commit exists.'
  risks:
  - Fail-loud OS-lock failure may expose unsupported filesystems or antivirus interference
    as hard failures. That is acceptable for provenance integrity but should be called
    out in release notes if it affects operators.
  - A global module lock may reduce parallel append throughput. Audit JSONL append
    volume is low, so correctness dominates.
  - If deterministic tests require monkeypatching an internal logging helper whose
    name changes, the test may become too coupled. Keep the helper local and assert
    behavior through emitted events where possible.
  - Repeated CI greens reduce flake risk but cannot prove absence. The determinism
    argument must carry the fix, with CI used as external confirmation.
