schema_version: 1
pilot_id: iteration-0011-add-gemini-adapter
goal:
  summary: "Add gemini CLI as second adapter — reuses iter-0010 _dispatch_base; prompt-engineered JSON (no --schema flag); validator-retry on parse fail (per iter-0009 Q2: F2b). Review-only; patch_proposal deferred to iter-0013."
  desired_end_state: |
    consensus_mcp/_dispatch_gemini.py is the gemini adapter parallel to
    _dispatch_codex.py. Imports generic helpers (_resolve_repo_root,
    _normalize_relative_to_repo, _load_goal_packet, _load_template,
    _build_prompt, _terminate_process_tree, _sha256_str, _build_sealed_packet,
    _seal_via_t6, _log_dispatch) from _dispatch_base. Adapter-specific code:
      - GeminiInvocationError, GeminiOutputParseError
      - _resolve_gemini_bin (Windows-aware lookup analogous to _resolve_codex_bin)
      - _get_gemini_version (best-effort `gemini --version`)
      - _invoke_gemini (subprocess + watchdog; gemini reads prompt via -p flag;
        no --output-schema; validator-retry on JSON parse fail with one retry max)
      - _parse_gemini_output (validates JSON-only response; tolerates leading/
        trailing prose by extracting the first {...} block; reuses schema
        shape from codex_review_schema.json; gemini-rev-N finding IDs)
      - main() CLI entrypoint

    consensus_mcp/dispatch_templates/gemini_review_template.md is gemini's
    prompt template — mirrors codex_review_template.md structure but with
    explicit JSON-only output instructions (no --schema enforcement).

    consensus_mcp/dispatch_templates/gemini_review_schema.json mirrors
    codex_review_schema.json but with `gemini-rev-\\d+` id pattern.

    consensus_mcp/tools/reviewer_dispatch_gemini.py is the MCP tool wrapper
    parallel to reviewer_dispatch_codex.py.

    consensus_mcp/server.py registers reviewer_dispatch_gemini after the
    existing reviewer_dispatch_codex registration.

    Tests cover the new code (parse output, validator-retry behavior,
    binary resolution, MCP wrapper).

    Sealed gemini output uses attestation_method="auto_gemini_dispatch"
    and sealed_filename="gemini-review.yaml" (the base layer's existing
    kwargs for these are leveraged).

    Backward compat: codex adapter unaffected; existing 452-test suite green.
  non_goals:
    - patch_proposal support in gemini (deferred to iter-0013 capability metadata)
    - gate refactor / N-of-M quorum (iter-0012)
    - claude-review.yaml first-class artifact (iter-0012)
    - modify _dispatch_codex.py or _dispatch_base.py behavior (touch only for trivial parameterization if strictly needed)
allowed_files:
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/dispatch_templates/gemini_review_template.md
  - consensus_mcp/dispatch_templates/gemini_review_schema.json
  - consensus_mcp/tools/reviewer_dispatch_gemini.py
  - consensus_mcp/server.py
  - consensus_mcp/tests/test_dispatch_gemini.py
  - consensus_mcp/tests/test_reviewer_dispatch_gemini.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/tool_registry.py
  - consensus_mcp/validators/
  - consensus-state/
  - README.md
  - LICENSE
  - CHANGELOG.md
  - pyproject.toml
  - .github/
  - docs/
max_iterations: 1
max_patch_size: 3500
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full test suite passes (>=452 + new gemini tests, 0 fail)
    check: "py -3.11 -m pytest consensus_mcp/tests -q"
  - id: A2
    description: _dispatch_gemini.py exists and is non-empty
    check: "test -s consensus_mcp/_dispatch_gemini.py"
  - id: A3
    description: reviewer_dispatch_gemini registered in server.py
    check: "grep -q reviewer_dispatch_gemini consensus_mcp/server.py"
  - id: A4
    description: codex review of diff returns goal_satisfied=true with no blocking_objections
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T00:55:00Z'
  codex_patch_apply_authorized: false
  scope_signature: b06b39180e49e03f3da383ce4ec0046eb6e7e199877929865a367db956a734b3
