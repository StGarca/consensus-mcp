  touched_files_contents:
    consensus_mcp/_dispatch_gemini.py: "\"\"\"Phase 4 v1.14.0 — auto-gemini-dispatch helper (gemini adapter).\n\nSibling of _dispatch_codex.py. Reuses generic dispatch infrastructure from\n_dispatch_base.py (extracted in iter-0010); supplies gemini-specific code:\nCLI invocation shape, binary resolution, output JSON parsing with\nvalidator-retry on schemaless parse fail (per iter-0009 verdict Q2: F2b).\n\nScope (iter-0011): REVIEW-ONLY. Gemini does NOT author patch_proposal blocks\nin v1.14.0; codex remains the only patch-authoring adapter. Patch authoring\nacross adapters is deferred to iter-0013 capability metadata.\n\nUSAGE\n-----\n  python -m consensus_mcp._dispatch_gemini \\\\\n      --goal-packet <path/to/goal_packet.yaml> \\\\\n      --iteration-dir <path/to/iteration-XXXX/> \\\\\n      [--reviewer-id gemini-iterXXXX-N] \\\\\n      [--pass-id gemini-iterXXXX-N-passN] \\\\\n      [--prompt-template <path>] \\\\\n      [--gemini-bin <path>] \\\\\n      [--model gemini-2.5-pro] \\\\\n      [--timeout-seconds 600] \\\\\n      [--review-target <path>] \\\\\n      [--smoke]\n\nThe output schema is embedded in dispatch_templates/gemini_review_template.md\n(under \"Schema reference\"). There is no separate --schema flag; the template\nis authoritative.\n\nExit 0 = sealed pass produced; non-zero = failure (gemini error, parse fail,\nseal fail). JSON to stdout on success.\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport json\nimport os\nimport re\nimport shutil\nimport subprocess\nimport sys\nimport tempfile\nimport threading\nimport time\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp._dispatch_base import (\n    _REPO_ROOT_MARKERS,\n    RepoRootResolutionError,\n    _has_repo_markers,\n    _resolve_repo_root,\n    OutsideRepoPathError,\n    _normalize_for_compare,\n    _normalize_relative_to_repo,\n    _load_goal_packet,\n    _load_template,\n    _FENCE_LANG_BY_EXT,\n    _format_touched_files_contents,\n    _build_prompt,\n    _terminate_process_tree,\n    _sha256_str,\n    _build_sealed_packet,\n    _seal_via_t6,\n    _log_dispatch,\n)\n\n\n# Adapter-specific finding patterns. Gemini emits gemini-rev-N IDs; the\n# codex_review_schema.json id pattern is codex-rev-N, so we cannot share\n# the validator directly. Mirror codex's enum + allowed-key set since the\n# semantic contract (severity values, required fields) is identical.\n_GEMINI_FINDING_ID_PATTERN = re.compile(r\"^gemini-rev-\\d+$\")\n_VALID_SEVERITIES = {\"low\", \"medium\", \"high\", \"blocking\", \"critical\"}\n_REQUIRED_FINDING_FIELDS = (\"id\", \"severity\", \"summary\", \"citation\", \"risk\", \"recommendation\")\n# iter-0011 scope: gemini does NOT emit patch_proposal in v1.14.0. Both\n# patch_proposal and patch_not_proposed_reason are still in the allowed set\n# (must be null per schema) but the parser enforces patch_proposal IS null\n# (since the codex-rev- pattern wouldn't match gemini-rev- patch IDs anyway).\n_ALLOWED_FINDING_KEYS = set(_REQUIRED_FINDING_FIELDS) | {\"patch_proposal\", \"patch_not_proposed_reason\"}\n_ALLOWED_TOP_LEVEL_KEYS = {\"findings\", \"goal_satisfied\", \"blocking_objections\", \"goal_satisfied_rationale\"}\n_BLOCKING_SEVERITIES = {\"blocking\", \"critical\"}\n\n# Default gemini model. Operator can override via --model.\n_DEFAULT_GEMINI_MODEL = \"gemini-2.5-pro\"\n\n\nclass GeminiInvocationError(RuntimeError):\n    \"\"\"Raised when the gemini CLI exits non-zero, times out, or is not found.\"\"\"\n\n\nclass GeminiOutputParseError(ValueError):\n    \"\"\"Raised when gemini output is not parseable JSON or lacks the expected top-level shape.\"\"\"\n\n\ndef _resolve_gemini_bin(gemini_bin: str) -> str:\n    \"\"\"Resolve a gemini binary spec to an actual executable file path.\n\n    Mirrors _resolve_codex_bin's Windows hardening: PATHEXT-aware lookup,\n    .cmd preference over .ps1, App Execution Alias rejection, MSYS-path\n    conversion. Independent of codex's implementation because the npm\n    install layout / executable shape is the same for gemini-cli.\n    \"\"\"\n    if (\n        sys.platform == \"win32\"\n        and len(gemini_bin) >= 3\n        and gemini_bin[0] == \"/\"\n        and gemini_bin[1].isalpha()\n        and gemini_bin[2] == \"/\"\n    ):\n        drive = gemini_bin[1].upper()\n        rest = gemini_bin[3:].replace(\"/\", \"\\\\\")\n        gemini_bin = f\"{drive}:\\\\{rest}\"\n\n    if os.path.sep in gemini_bin or (len(gemini_bin) > 1 and gemini_bin[1] == \":\"):\n        if sys.platform == \"win32\":\n            p = Path(gemini_bin)\n            try:\n                if p.exists() and p.stat().st_size == 0:\n                    windows_apps = (\n                        os.environ.get(\"LOCALAPPDATA\", \"\")\n                        + r\"\\Microsoft\\WindowsApps\"\n                    )\n                    if windows_apps and str(p).lower().startswith(windows_apps.lower()):\n                        raise GeminiInvocationError(\n                            f\"gemini binary {gemini_bin!r} is a Windows App Execution \"\n                            f\"Alias stub (0-byte file in WindowsApps). subprocess cannot \"\n                            f\"exec App Aliases — install the real gemini CLI binary or \"\n                            f\"adjust PATH so a non-stub variant is preferred.\"\n                        )\n            except OSError:\n                pass\n        return gemini_bin\n\n    if sys.platform == \"win32\" and \".\" not in Path(gemini_bin).name:\n        for ext in (\".exe\", \".cmd\", \".bat\", \".ps1\"):\n            cand = shutil.which(gemini_bin + ext)\n            if cand:\n                return _resolve_gemini_bin(cand)\n\n    resolved = shutil.which(gemini_bin)\n    if resolved is None:\n        return gemini_bin\n    if sys.platform == \"win32\" and resolved.lower().endswith(\".ps1\"):\n        cmd_alt = shutil.which(gemini_bin + \".cmd\")\n        if cmd_alt:\n            resolved = cmd_alt\n    if sys.platform == \"win32\":\n        p = Path(resolved)\n        try:\n            if p.exists() and p.stat().st_size == 0:\n                windows_apps = (\n                    os.environ.get(\"LOCALAPPDATA\", \"\")\n                    + r\"\\Microsoft\\WindowsApps\"\n                )\n                if windows_apps and str(p).lower().startswith(windows_apps.lower()):\n                    raise GeminiInvocationError(\n                        f\"gemini binary resolved to {resolved!r} which is a Windows \"\n                        f\"App Execution Alias stub (0-byte file in WindowsApps). \"\n                        f\"subprocess cannot exec App Aliases — install the real \"\n                        f\"gemini CLI binary or adjust PATH so a non-stub variant is \"\n                        f\"preferred.\"\n                    )\n        except OSError:\n            pass\n    return resolved\n\n\ndef _get_gemini_version(gemini_bin: str) -> str:\n    \"\"\"Best-effort: shell out to `<gemini> --version` and return the version string.\n\n    Returns 'unknown' on any failure. Used for audit-log provenance only.\n    \"\"\"\n    try:\n        result = subprocess.run(\n            [_resolve_gemini_bin(gemini_bin), \"--version\"],\n            capture_output=True,\n            text=True,\n            encoding=\"utf-8\",\n            errors=\"replace\",\n            timeout=10,\n        )\n        if result.returncode == 0:\n            return result.stdout.strip() or \"unknown\"\n    except (FileNotFoundError, subprocess.TimeoutExpired, OSError):\n        pass\n    return \"unknown\"\n\n\ndef _invoke_gemini(\n    prompt: str,\n    gemini_bin: str,\n    model: str,\n    timeout_seconds: int,\n    repo_root: Path,\n    log_path=None,\n    anchors=None,\n    heartbeat_interval: float = 30.0,\n    stall_silence_seconds: float = 180.0,\n    poll_interval: float = 0.5,\n    time_fn=None,\n    popen_factory=None,\n) -> str:\n    \"\"\"Shell out to gemini CLI via Popen + reader threads.\n\n    Pattern mirrors _invoke_codex's stream-and-watchdog loop (iter-0037):\n      - Popen with stdout + stderr reader threads (prevents pipe-buffer deadlock)\n      - dispatch_streamed_line per stdout line + dispatch_heartbeat at interval\n      - Auto-abort on heartbeat-silence\n      - log_path + anchors optional (None disables streaming events for tests)\n\n    Gemini-specific CLI shape:\n      gemini -p \"<short directive>\" -m <model> --approval-mode plan --skip-trust\n    The actual prompt body is piped via stdin (gemini appends -p text after\n    stdin). -p is required to trigger headless mode. --approval-mode plan is\n    gemini's read-only mode (no file writes, no shell exec) — the parallel\n    to codex's --sandbox read-only. --skip-trust suppresses the workspace-trust\n    interactive prompt.\n\n    stall_silence_seconds defaults to 180s (gemini cold-start can exceed 45s\n    on large prompts; matches the codex adapter's iter-0010 default bump).\n    \"\"\"\n    if time_fn is None:\n        time_fn = time.time\n    if popen_factory is None:\n        popen_factory = subprocess.Popen\n    can_log = log_path is not None and anchors is not None\n\n    cmd = [\n        _resolve_gemini_bin(gemini_bin),\n        \"-p\", \"Now respond. Output ONLY the JSON described above; no prose, no markdown fences.\",\n        \"-m\", model,\n        \"--approval-mode\", \"plan\",\n        \"--skip-trust\",\n    ]\n    if sys.platform == \"win32\":\n        popen_kwargs = {\"creationflags\": subprocess.CREATE_NEW_PROCESS_GROUP}\n    else:\n        popen_kwargs = {\"start_new_session\": True}\n    try:\n        proc = popen_factory(\n            cmd,\n            stdin=subprocess.PIPE,\n            stdout=subprocess.PIPE,\n            stderr=subprocess.PIPE,\n            bufsize=0,\n            cwd=str(repo_root),\n            **popen_kwargs,\n        )\n    except FileNotFoundError:\n        raise GeminiInvocationError(f\"gemini binary not found: {gemini_bin}\") from None\n\n    # codex-rev-001\
      \ round-1 fix: start readers + watchdog BEFORE writing stdin.\n    # Gemini may emit output (or refuse to drain its stdin) before we finish\n    # sending the prompt; without readers running, that deadlocks.\n    state_lock = threading.Lock()\n    stdout_buf: list = []\n    stderr_buf: list = []\n    last_streamed_ts: list = [None]\n    streamed_seq: list = [0]\n\n    abort_path = None\n    if can_log:\n        abort_path = repo_root / \"consensus-state\" / \"state\" / f\"abort-dispatch-{anchors['pass_id']}.signal\"\n\n    def stdout_reader():\n        try:\n            for raw_line in iter(proc.stdout.readline, b\"\"):\n                if not raw_line:\n                    break\n                with state_lock:\n                    stdout_buf.append(raw_line)\n                    seq = streamed_seq[0]\n                    streamed_seq[0] = seq + 1\n                    last_streamed_ts[0] = time_fn()\n                if can_log:\n                    line_str = raw_line.decode(\"utf-8\", errors=\"replace\").rstrip(\"\\r\\n\")\n                    full_len = len(line_str)\n                    _log_dispatch(log_path, {\n                        \"event\": \"dispatch_streamed_line\",\n                        **anchors,\n                        \"stream\": \"stdout\",\n                        \"line_truncated\": line_str[:200],\n                        \"line_full_length\": full_len,\n                        \"truncated\": full_len > 200,\n                        \"seq\": seq,\n                    })\n        except Exception:\n            pass\n\n    def stderr_reader():\n        try:\n            for raw_line in iter(proc.stderr.readline, b\"\"):\n                if not raw_line:\n                    break\n                with state_lock:\n                    stderr_buf.append(raw_line)\n        except Exception:\n            pass\n\n    t_stdout = threading.Thread(target=stdout_reader, daemon=True, name=\"gemini-stdout-reader\")\n    t_stderr = threading.Thread(target=stderr_reader, daemon=True, name=\"gemini-stderr-reader\")\n    t_stdout.start()\n    t_stderr.start()\n\n    # codex-rev-001 round-1 fix: write stdin AFTER readers are running so\n    # gemini-side stdout/stderr pressure can't deadlock us before drain begins.\n    # Use a writer thread (daemon) so a slow-to-drain stdin doesn't block the\n    # watchdog loop; the watchdog will still abort if the process stalls.\n    def stdin_writer():\n        try:\n            proc.stdin.write(prompt.encode(\"utf-8\"))\n            proc.stdin.close()\n        except (BrokenPipeError, OSError):\n            pass\n    t_stdin = threading.Thread(target=stdin_writer, daemon=True, name=\"gemini-stdin-writer\")\n    t_stdin.start()\n\n    start_ts = time_fn()\n    last_heartbeat = start_ts\n\n    while proc.poll() is None:\n        now = time_fn()\n\n        if abort_path is not None and abort_path.exists():\n            try:\n                abort_reason = abort_path.read_text(encoding=\"utf-8\").strip() or \"operator_signal_file\"\n            except OSError:\n                abort_reason = \"operator_signal_file (unreadable)\"\n            _terminate_process_tree(proc)\n            with state_lock:\n                silence_age = (now - last_streamed_ts[0]) if last_streamed_ts[0] is not None else None\n            if can_log:\n                _log_dispatch(log_path, {\n                    \"event\": \"dispatch_aborted\",\n                    **anchors,\n                    \"abort_source\": \"operator_signal_file\",\n                    \"abort_reason\": abort_reason,\n                    \"age_seconds\": now - start_ts,\n                    \"last_streamed_line_age_seconds\": silence_age,\n                })\n            try:\n                abort_path.unlink()\n            except OSError:\n                pass\n            raise GeminiInvocationError(f\"dispatch aborted by operator: {abort_reason}\")\n\n        with state_lock:\n            lst = last_streamed_ts[0]\n            seq_snap = streamed_seq[0]\n        if lst is not None:\n            silence_age = now - lst\n            silence_trigger_threshold = stall_silence_seconds\n        else:\n            silence_age = now - start_ts\n            silence_trigger_threshold = stall_silence_seconds\n\n        if silence_age >= silence_trigger_threshold:\n            _terminate_process_tree(proc)\n            if can_log:\n                _log_dispatch(log_path, {\n                    \"event\": \"dispatch_aborted\",\n                    **anchors,\n                    \"abort_source\": \"watchdog_silence\",\n                    \"abort_reason\": f\"no gemini stdout for {silence_age:.0f}s (threshold {silence_trigger_threshold:.0f}s)\",\n                    \"age_seconds\": now - start_ts,\n                    \"last_streamed_line_age_seconds\": silence_age if lst is not None else None,\n                })\n            raise GeminiInvocationError(\n                f\"gemini stuck: no output for {silence_age:.0f}s\"\n            )\n\n        if now - last_heartbeat >= heartbeat_interval:\n            if can_log:\n                _log_dispatch(log_path, {\n                    \"event\": \"dispatch_heartbeat\",\n                    **anchors,\n                    \"age_seconds\": now - start_ts,\n                    \"last_streamed_line_age_seconds\": silence_age if lst is not None else None,\n                    \"last_streamed_line_seq\": seq_snap - 1 if seq_snap > 0 else None,\n                })\n            last_heartbeat = now\n\n        if now - start_ts >= timeout_seconds + stall_silence_seconds:\n            _terminate_process_tree(proc)\n            if can_log:\n                _log_dispatch(log_path, {\n                    \"event\": \"dispatch_aborted\",\n                    **anchors,\n                    \"abort_source\": \"wall_time_hard_ceiling\",\n                    \"abort_reason\": f\"wall_time={now - start_ts:.0f}s exceeded timeout_seconds={timeout_seconds}s + grace={stall_silence_seconds}s\",\n                    \"age_seconds\": now - start_ts,\n                    \"last_streamed_line_age_seconds\": silence_age if lst is not None else None,\n                })\n            raise GeminiInvocationError(\n                f\"gemini exceeded {timeout_seconds}s wall timeout + {stall_silence_seconds}s grace\"\n            )\n\n        time.sleep(poll_interval)\n\n    t_stdout.join(timeout=5)\n    t_stderr.join(timeout=5)\n    if t_stdout.is_alive() or t_stderr.is_alive():\n        raise GeminiInvocationError(\n            \"gemini exited but reader thread did not drain within 5s; \"\n            \"possible partial output or pipe-handling defect\"\n        )\n\n    with state_lock:\n        stdout_bytes = b\"\".join(stdout_buf)\n        stderr_bytes = b\"\".join(stderr_buf)\n\n    if proc.returncode != 0:\n        stderr_str = stderr_bytes.decode(\"utf-8\", errors=\"replace\")\n        stdout_str = stdout_bytes.decode(\"utf-8\", errors=\"replace\")\n        stderr_tail = stderr_str.strip()[-4000:]\n        stdout_hint = (\n            f\"; stdout_tail={stdout_str.strip()[-500:]!r}\"\n            if stdout_str.strip()\n            else \"\"\n        )\n        raise GeminiInvocationError(\n            f\"gemini exit={proc.returncode}; stderr_tail={stderr_tail!r}{stdout_hint}\"\n        )\n\n    return stdout_bytes.decode(\"utf-8\", errors=\"replace\")\n\n\n_JSON_FENCE_RE = re.compile(r\"```(?:json)?\\s*(\\{.*?\\})\\s*```\", re.DOTALL)\n\n\ndef _extract_json_from_text(text: str) -> str:\n    \"\"\"Extract a JSON object substring from gemini's free-form output.\n\n    Gemini lacks codex's --output-schema enforcement, so its response may\n    include leading prose, markdown fences, or trailing commentary even\n    when explicitly told to emit JSON only. This helper applies a small\n    ladder of recoveries:\n\n      1. Whole-string trim — if the trimmed text starts with `{` and ends\n         with `}`, return as-is.\n      2. Fenced-code-block extraction — first ```json ... ``` (or bare\n         ``` ... ```) containing a `{...}` block.\n      3. Greedy outermost-brace match — first `{` to last `}`. Fragile\n         (won't handle nested unbalanced braces), but a final fallback.\n\n    Returns the candidate JSON string. Does NOT validate that it parses;\n    the caller does. If nothing matches, returns the original text so the\n    JSONDecodeError downstream carries the actual gemini output as diagnostic.\n    \"\"\"\n    stripped = text.strip()\n    if stripped.startswith(\"{\") and stripped.endswith(\"}\"):\n        return stripped\n    fenced = _JSON_FENCE_RE.search(text)\n    if fenced:\n        return fenced.group(1)\n    first_brace = text.find(\"{\")\n    last_brace = text.rfind(\"}\")\n    if first_brace != -1 and last_brace > first_brace:\n        return text[first_brace:last_brace + 1]\n    return text\n\n\ndef _parse_gemini_output(\n    text: str,\n    goal_packet: dict | None = None,\n) -> dict:\n    \"\"\"Parse gemini's JSON response + locally validate shape.\n\n    Gemini lacks codex's --output-schema, so this parser is intentionally\n    more lenient on extraction (handles fenced/wrapped JSON via\n    _extract_json_from_text) but equally strict on the parsed shape.\n\n    Rules (mirrors codex's _parse_codex_output minus patch_proposal):\n      - root is a JSON object\n      - top-level keys exactly {findings, goal_satisfied, blocking_objections,\n        goal_satisfied_rationale}\n      - findings is a list; each finding has all 6 required fields\n        (id, severity, summary, citation, risk, recommendation)\n      - id matches ^gemini-rev-\\\\d+$ (NOT codex-rev-)\n      - severity in the canonical enum\n      - patch_proposal/patch_not_proposed_reason MUST be null in v1.14.0\n        (iter-0011 scope: gemini is review-only)\n      - blocking_objections invariant: set equals blocking/critical finding IDs\n      - goal_satisfied is bool; goal_satisfied_rationale is non-empty string\n\n\
      \    Raises GeminiOutputParseError on any violation.\n    \"\"\"\n    candidate = _extract_json_from_text(text)\n    try:\n        parsed = json.loads(candidate)\n    except json.JSONDecodeError as exc:\n        raise GeminiOutputParseError(\n            f\"gemini output is not valid JSON: {exc}; first 500 chars of raw: {text[:500]!r}\"\n        ) from exc\n\n    if not isinstance(parsed, dict):\n        raise GeminiOutputParseError(\n            f\"gemini output JSON root must be an object, got {type(parsed).__name__}\"\n        )\n\n    unknown_top = set(parsed.keys()) - _ALLOWED_TOP_LEVEL_KEYS\n    if unknown_top:\n        raise GeminiOutputParseError(\n            f\"gemini output JSON has unexpected top-level keys: {sorted(unknown_top)}\"\n        )\n\n    for required in (\"findings\", \"goal_satisfied\", \"blocking_objections\", \"goal_satisfied_rationale\"):\n        if required not in parsed:\n            raise GeminiOutputParseError(f\"gemini output JSON missing required key: {required!r}\")\n\n    if not isinstance(parsed[\"findings\"], list):\n        raise GeminiOutputParseError(\"'findings' must be an array\")\n    if not isinstance(parsed[\"goal_satisfied\"], bool):\n        raise GeminiOutputParseError(\n            f\"'goal_satisfied' must be boolean, got {type(parsed['goal_satisfied']).__name__}\"\n        )\n    if not isinstance(parsed[\"blocking_objections\"], list):\n        raise GeminiOutputParseError(\n            f\"'blocking_objections' must be an array, got {type(parsed['blocking_objections']).__name__}\"\n        )\n    if not isinstance(parsed[\"goal_satisfied_rationale\"], str):\n        raise GeminiOutputParseError(\n            f\"'goal_satisfied_rationale' must be string, got \"\n            f\"{type(parsed['goal_satisfied_rationale']).__name__}\"\n        )\n    # codex-rev-002 round-2 fix: enforce non-empty rationale per the prompt\n    # contract. Empty/whitespace-only is incoherent with \"always populate\".\n    if not parsed[\"goal_satisfied_rationale\"].strip():\n        raise GeminiOutputParseError(\n            \"'goal_satisfied_rationale' must be a non-empty string (prompt contract)\"\n        )\n\n    for i, item in enumerate(parsed[\"blocking_objections\"]):\n        if not isinstance(item, str):\n            raise GeminiOutputParseError(\n                f\"blocking_objections[{i}] must be string, got {type(item).__name__}\"\n            )\n\n    blocking_finding_ids = []\n    for i, finding in enumerate(parsed[\"findings\"]):\n        if not isinstance(finding, dict):\n            raise GeminiOutputParseError(\n                f\"findings[{i}] must be an object, got {type(finding).__name__}\"\n            )\n        unknown_keys = set(finding.keys()) - _ALLOWED_FINDING_KEYS\n        if unknown_keys:\n            raise GeminiOutputParseError(\n                f\"findings[{i}] has unexpected keys: {sorted(unknown_keys)}\"\n            )\n        for required in _REQUIRED_FINDING_FIELDS:\n            if required not in finding:\n                raise GeminiOutputParseError(\n                    f\"findings[{i}] missing required field: {required!r}\"\n                )\n        for str_field in (\"id\", \"severity\", \"summary\", \"citation\", \"risk\", \"recommendation\"):\n            if not isinstance(finding[str_field], str):\n                raise GeminiOutputParseError(\n                    f\"findings[{i}].{str_field} must be string, got \"\n                    f\"{type(finding[str_field]).__name__}\"\n                )\n        if finding[\"severity\"] not in _VALID_SEVERITIES:\n            raise GeminiOutputParseError(\n                f\"findings[{i}] has invalid severity {finding['severity']!r}; \"\n                f\"must be one of {sorted(_VALID_SEVERITIES)}\"\n            )\n        if not _GEMINI_FINDING_ID_PATTERN.match(finding[\"id\"]):\n            raise GeminiOutputParseError(\n                f\"findings[{i}] id {finding['id']!r} does not match pattern \"\n                f\"^gemini-rev-\\\\d+$\"\n            )\n        # iter-0011 scope: gemini is review-only; patch_proposal and\n        # patch_not_proposed_reason must both be null (if present).\n        pp = finding.get(\"patch_proposal\")\n        if pp is not None:\n            raise GeminiOutputParseError(\n                f\"findings[{i}].patch_proposal must be null in v1.14.0 — gemini is \"\n                f\"review-only (patch authoring deferred to iter-0013)\"\n            )\n        reason = finding.get(\"patch_not_proposed_reason\")\n        if reason is not None and not isinstance(reason, str):\n            raise GeminiOutputParseError(\n                f\"findings[{i}].patch_not_proposed_reason must be string or null, \"\n                f\"got {type(reason).__name__}\"\n            )\n        if finding[\"severity\"] in _BLOCKING_SEVERITIES:\n            blocking_finding_ids.append(finding[\"id\"])\n\n    expected_blocking = set(blocking_finding_ids)\n    actual_blocking = set(parsed[\"blocking_objections\"])\n    if expected_blocking != actual_blocking:\n        missing = expected_blocking - actual_blocking\n        extra = actual_blocking - expected_blocking\n        msg_parts = [\"blocking_objections invariant violated:\"]\n        if missing:\n            msg_parts.append(f\"missing finding ids: {sorted(missing)}\")\n        if extra:\n            msg_parts.append(f\"unexpected ids (not blocking/critical findings): {sorted(extra)}\")\n        msg_parts.append(\n            f\"expected = {{f.id : f.severity in {{blocking, critical}}}} = {sorted(expected_blocking)}\"\n        )\n        msg_parts.append(f\"actual = {sorted(actual_blocking)}\")\n        raise GeminiOutputParseError(\"; \".join(msg_parts))\n\n    # codex-rev-002 round-1 fix: goal_satisfied=true with non-empty\n    # blocking_objections is incoherent — reject so a malformed gemini\n    # response can't be sealed as a successful review.\n    if parsed[\"goal_satisfied\"] is True and actual_blocking:\n        raise GeminiOutputParseError(\n            f\"goal_satisfied=true is incoherent with non-empty blocking_objections \"\n            f\"{sorted(actual_blocking)}; a successful review cannot have blocking findings\"\n        )\n\n    return parsed\n\n\ndef _invoke_gemini_with_retry(\n    prompt: str,\n    gemini_bin: str,\n    model: str,\n    timeout_seconds: int,\n    repo_root: Path,\n    goal_packet: dict | None = None,\n    log_path=None,\n    anchors=None,\n) -> tuple[str, dict]:\n    \"\"\"Per iter-0009 verdict Q2: F2b — validator-retry on schemaless parse fail.\n\n    Runs gemini once. If output parses cleanly, return (raw_output, parsed).\n    If parse fails, re-prompt gemini ONCE with the parse error appended,\n    re-parse, and return. Second parse failure raises.\n\n    Returns (raw_output_of_last_attempt, parsed_dict). The raw output is what\n    the seal records; the parsed dict feeds into _build_sealed_packet.\n    \"\"\"\n    raw = _invoke_gemini(\n        prompt=prompt,\n        gemini_bin=gemini_bin,\n        model=model,\n        timeout_seconds=timeout_seconds,\n        repo_root=repo_root,\n        log_path=log_path,\n        anchors=anchors,\n    )\n    try:\n        parsed = _parse_gemini_output(raw, goal_packet=goal_packet)\n        return raw, parsed\n    except GeminiOutputParseError as first_err:\n        # Retry once with the parse error in the prompt.\n        if log_path is not None and anchors is not None:\n            _log_dispatch(log_path, {\n                \"event\": \"dispatch_retry_for_parse_fail\",\n                **anchors,\n                \"first_parse_error\": str(first_err)[:1000],\n            })\n        retry_prompt = (\n            prompt\n            + \"\\n\\n# Retry — your previous response failed JSON validation\\n\\n\"\n            + f\"Parse error: {first_err}\\n\\n\"\n            + \"Re-emit ONLY valid JSON conforming to the schema in the prompt above. \"\n            + \"No prose, no markdown fences, no commentary — JSON only, starting with `{` \"\n            + \"and ending with `}`.\"\n        )\n        raw_retry = _invoke_gemini(\n            prompt=retry_prompt,\n            gemini_bin=gemini_bin,\n            model=model,\n            timeout_seconds=timeout_seconds,\n            repo_root=repo_root,\n            log_path=log_path,\n            anchors=anchors,\n        )\n        parsed_retry = _parse_gemini_output(raw_retry, goal_packet=goal_packet)\n        return raw_retry, parsed_retry\n\n\ndef main(argv: list[str] | None = None) -> int:\n    p = argparse.ArgumentParser(\n        prog=\"consensus_mcp._dispatch_gemini\",\n        description=\"Auto-dispatch gemini CLI as a reviewer; auto-seal via T6.\",\n    )\n    p.add_argument(\"--goal-packet\", required=True)\n    p.add_argument(\"--iteration-dir\", required=True)\n    p.add_argument(\"--reviewer-id\", default=None)\n    p.add_argument(\"--pass-id\", default=None)\n    p.add_argument(\"--prompt-template\", default=None)\n    p.add_argument(\"--gemini-bin\", default=\"gemini\")\n    p.add_argument(\"--model\", default=_DEFAULT_GEMINI_MODEL)\n    p.add_argument(\"--timeout-seconds\", type=int, default=600)\n    p.add_argument(\"--review-target\", default=None)\n    p.add_argument(\"--smoke\", action=\"store_true\",\n                   help=\"Smoke mode: gated by CONSENSUS_MCP_RUN_REAL_GEMINI_SMOKE=1 env var\")\n\n    ns = p.parse_args(argv)\n\n    try:\n        repo_root = _resolve_repo_root()\n    except RepoRootResolutionError as exc:\n        print(json.dumps({\"ok\": False, \"error\": str(exc), \"error_type\": \"RepoRootResolutionError\"}))\n        return 4\n\n    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\n    _pre_iter_id = Path(ns.iteration_dir).name or \"unknown-iteration\"\n    _pre_reviewer_id = ns.reviewer_id or f\"gemini-{_pre_iter_id}-1\"\n    _pre_pass_id = ns.pass_id or f\"{_pre_reviewer_id}-pass1\"\n\n    try:\n        iter_dir = _normalize_relative_to_repo(ns.iteration_dir,\
      \ repo_root)\n        iter_dir.mkdir(parents=True, exist_ok=True)\n        iteration_id = iter_dir.name\n\n        template_path = (\n            _normalize_relative_to_repo(ns.prompt_template, repo_root)\n            if ns.prompt_template\n            else (Path(__file__).parent / \"dispatch_templates\" / \"gemini_review_template.md\")\n        )\n        # codex-rev-003 round-1 fix: schema is part of the prompt template\n        # (embedded under \"Schema reference\" header), NOT a separate file the\n        # helper passes to gemini. The prior `--schema` flag computed\n        # schema_sha256 but never embedded the file's content in the prompt,\n        # so operators thought it mattered when it didn't. Removed entirely;\n        # the schema contract lives in dispatch_templates/gemini_review_template.md.\n        goal_packet_path = _normalize_relative_to_repo(ns.goal_packet, repo_root)\n        review_target_normalized = _normalize_relative_to_repo(ns.review_target, repo_root)\n    except (OutsideRepoPathError, OSError) as exc:\n        error_type = type(exc).__name__\n        _log_dispatch(log_path, {\n            \"event\": \"dispatch_failed\",\n            \"error_type\": error_type,\n            \"error\": str(exc),\n            \"reviewer_id\": _pre_reviewer_id,\n            \"pass_id\": _pre_pass_id,\n            \"iteration_id\": _pre_iter_id,\n            \"timeout_seconds\": ns.timeout_seconds,\n        })\n        print(json.dumps({\"ok\": False, \"error\": str(exc), \"error_type\": error_type}))\n        return 5\n\n    review_target_path_str: str | None = None\n    if review_target_normalized is not None:\n        try:\n            review_target_path_str = str(\n                review_target_normalized.relative_to(repo_root.resolve())\n            ).replace(\"\\\\\", \"/\")\n        except ValueError:\n            review_target_path_str = str(review_target_normalized)\n\n    reviewer_id = ns.reviewer_id or f\"gemini-{iteration_id}-1\"\n    pass_id = ns.pass_id or f\"{reviewer_id}-pass1\"\n\n    if ns.smoke and os.environ.get(\"CONSENSUS_MCP_RUN_REAL_GEMINI_SMOKE\") != \"1\":\n        refuse_msg = (\n            \"--smoke requires CONSENSUS_MCP_RUN_REAL_GEMINI_SMOKE=1 in the environment. \"\n            \"This gate prevents accidental real-gemini invocation under cost/auth/session \"\n            \"side effects. Set the env var explicitly to opt in, or drop --smoke for \"\n            \"normal (non-smoke) usage.\"\n        )\n        _log_dispatch(log_path, {\n            \"event\": \"dispatch_refused\",\n            \"error_type\": \"smoke_env_gate\",\n            \"error\": refuse_msg,\n            \"reviewer_id\": reviewer_id,\n            \"pass_id\": pass_id,\n        })\n        print(json.dumps({\"ok\": False, \"error\": refuse_msg, \"error_type\": \"smoke_env_gate\"}))\n        return 3\n\n    _log_dispatch(log_path, {\n        \"event\": \"dispatch_start\",\n        \"iteration_id\": iteration_id,\n        \"reviewer_id\": reviewer_id,\n        \"pass_id\": pass_id,\n        \"smoke\": ns.smoke,\n        \"timeout_seconds\": ns.timeout_seconds,\n        \"gemini_bin\": ns.gemini_bin,\n        \"model\": ns.model,\n        # schema_path removed per codex-rev-003 round-1: was misleading provenance.\n        \"review_target_path\": review_target_path_str,\n        \"adapter\": \"gemini\",\n    })\n\n    prompt_sha: str | None = None\n    goal_packet_sha: str | None = None\n    scope_sig: str | None = None\n    gemini_version: str | None = None\n    output_sha: str | None = None\n    review_target_hash: str | None = None\n\n    def _failed_event(error_type: str, error: str) -> dict:\n        ev = {\n            \"event\": \"dispatch_failed\",\n            \"error_type\": error_type,\n            \"error\": error,\n            \"reviewer_id\": reviewer_id,\n            \"pass_id\": pass_id,\n            \"iteration_id\": iteration_id,\n            \"timeout_seconds\": ns.timeout_seconds,\n            \"adapter\": \"gemini\",\n        }\n        for k, v in (\n            (\"gemini_version\", gemini_version),\n            (\"model\", ns.model),\n            (\"prompt_sha256\", prompt_sha),\n            (\"output_sha256\", output_sha),\n            (\"goal_packet_sha256\", goal_packet_sha),\n            (\"scope_signature\", scope_sig),\n            (\"review_target_path\", review_target_path_str),\n            (\"review_target_hash\", review_target_hash),\n        ):\n            if v is not None:\n                ev[k] = v\n        return ev\n\n    try:\n        goal_packet_text = goal_packet_path.read_text(encoding=\"utf-8\")\n        goal_packet = _load_goal_packet(goal_packet_path)\n        template_text = _load_template(template_path)\n\n        review_packet_data: dict | None = None\n        if review_target_normalized is not None:\n            review_target_text = review_target_normalized.read_text(encoding=\"utf-8\")\n            review_target_hash = _sha256_str(review_target_text)\n            if review_target_normalized.suffix.lower() in (\".yaml\", \".yml\"):\n                try:\n                    candidate = yaml.safe_load(review_target_text)\n                    if isinstance(candidate, dict):\n                        review_packet_data = candidate\n                except yaml.YAMLError:\n                    review_packet_data = None\n\n        prompt = _build_prompt(\n            goal_packet,\n            template_text,\n            iteration_dir=str(iter_dir),\n            review_packet_path=str(goal_packet_path),\n            review_target_path=str(review_target_normalized) if review_target_normalized else None,\n            review_target_hash=review_target_hash,\n            review_packet=review_packet_data,\n        )\n        prompt_sha = _sha256_str(prompt)\n        goal_packet_sha = _sha256_str(goal_packet_text)\n        scope_sig = ((goal_packet or {}).get(\"authorization\", {}) or {}).get(\"scope_signature\", \"\")\n\n        gemini_version = _get_gemini_version(ns.gemini_bin)\n        raw_output, extracted = _invoke_gemini_with_retry(\n            prompt=prompt,\n            gemini_bin=ns.gemini_bin,\n            model=ns.model,\n            timeout_seconds=ns.timeout_seconds,\n            repo_root=repo_root,\n            goal_packet=goal_packet,\n            log_path=log_path,\n            anchors={\n                \"iteration_id\": iteration_id,\n                \"reviewer_id\": reviewer_id,\n                \"pass_id\": pass_id,\n            },\n        )\n        output_sha = _sha256_str(raw_output)\n\n        provenance = {\n            \"gemini_version\": gemini_version,\n            \"model\": ns.model,\n            \"prompt_sha256\": prompt_sha,\n            \"output_sha256\": output_sha,\n            \"goal_packet_sha256\": goal_packet_sha,\n            \"scope_signature\": scope_sig,\n            \"review_target_path\": review_target_path_str,\n            \"review_target_hash\": review_target_hash,\n            \"adapter\": \"gemini\",\n        }\n        packet = _build_sealed_packet(\n            extracted, iteration_id, reviewer_id, pass_id,\n            provenance=provenance,\n            attestation_method=\"auto_gemini_dispatch\",\n            attestation_input_sources=[\n                \"goal_packet (path passed via --goal-packet)\",\n                \"prompt_template (substituted by _build_prompt)\",\n                \"review_target (path passed via --review-target; may be unspecified)\",\n                \"model (gemini CLI --model flag; no --output-schema enforcement)\",\n            ],\n        )\n        result = _seal_via_t6(packet, iter_dir, sealed_filename=\"gemini-review.yaml\")\n    except (GeminiInvocationError, GeminiOutputParseError) as exc:\n        _log_dispatch(log_path, _failed_event(type(exc).__name__, str(exc)))\n        print(json.dumps({\"ok\": False, \"error\": str(exc), \"error_type\": type(exc).__name__}))\n        return 1\n    except Exception as exc:\n        _log_dispatch(log_path, _failed_event(type(exc).__name__, str(exc)))\n        print(json.dumps({\"ok\": False, \"error\": str(exc), \"error_type\": type(exc).__name__}))\n        return 2\n\n    _log_dispatch(log_path, {\n        \"event\": \"dispatch_done\",\n        \"iteration_id\": iteration_id,\n        \"reviewer_id\": reviewer_id,\n        \"pass_id\": pass_id,\n        \"gemini_version\": gemini_version,\n        \"model\": ns.model,\n        \"timeout_seconds\": ns.timeout_seconds,\n        \"exit_code\": 0,\n        \"prompt_sha256\": prompt_sha,\n        \"output_sha256\": output_sha,\n        \"goal_packet_sha256\": goal_packet_sha,\n        \"scope_signature\": scope_sig,\n        \"review_target_path\": review_target_path_str,\n        \"review_target_hash\": review_target_hash,\n        \"packet_sha256\": result.get(\"packet_sha256\"),\n        \"archive_sealed_path\": result.get(\"archive_sealed_path\"),\n        \"local_mirror_path\": result.get(\"sealed_path\"),\n        \"sealed_path\": result.get(\"sealed_path\"),\n        \"t6_audit_event_id\": result.get(\"audit_event_id\"),\n        \"adapter\": \"gemini\",\n    })\n    print(json.dumps({\"ok\": True, \"pass_id\": pass_id, **result}))\n    return 0\n\n\nif __name__ == \"__main__\":\n    sys.exit(main())\n"
    consensus_mcp/dispatch_templates/gemini_review_template.md: "You are running a code/spec review on a sealed goal_packet. You are the gemini\nreviewer in a multi-reviewer quorum (claude is the orchestrator; codex is the\nother reviewer when enabled). Your output will be sealed cryptographically\nand compared with the other reviewers' findings.\n\n# Goal\n\n{goal_summary}\n\n# Touched-file contents (authoritative source)\n\nThe current contents of the files in scope are embedded below. Read these\nAS IF they are the actual repository state. **Do NOT attempt to read files\nfrom disk** — you have only read-only access via gemini's `--approval-mode plan`\nand your filesystem reads may be unreliable. Use ONLY the embedded contents\nbelow as your authoritative source.\n\nIf a file you need is not embedded here, note it as a finding (severity\nmedium) explaining which file is missing — do NOT hallucinate content.\n\n{touched_files_contents_block}\n\n# Desired end state\n\n{desired_end_state}\n\n# Allowed files (in-scope; everything else is OUT of scope)\n\n{allowed_files}\n\n# Acceptance gates\n\n{acceptance_gates}\n\n# Authorization\n\nscope_signature: {scope_signature}\nauthorized_by: {authorized_by}\nauthorized_at_utc: {authorized_at_utc}\n\n# Review target\n\niteration_dir: {iteration_dir}\nreview_packet_path: {review_packet_path}\nreview_target_path: {review_target_path}\nreview_target_hash (sha256): {review_target_hash}\n\nYou MUST review ONLY the content at review_target_path. Do not infer the\nreview surface from the goal_packet allowed_files alone — the\nreview_target_path is the canonical input.\n\n# Your task\n\n1. Read the diff or proposed change against the allowed_files scope.\n2. Identify findings: any defect, drift, missed requirement, security\n   concern, or scope violation. Each finding gets a stable id, severity,\n   summary, and citation (file:line).\n3. Mark `goal_satisfied: true` ONLY if the proposed change fully meets the\n   desired_end_state with no blocking findings.\n\n# Output format — CRITICAL: JSON ONLY\n\nUnlike codex, gemini does NOT enforce output schema. Your response MUST be\nPURE JSON conforming to the schema below — no prose preamble, no markdown\nfences (no ```json or ``` markers), no commentary, no trailing explanation.\nThe first character of your response MUST be `{` and the last character MUST\nbe `}`. The helper validator parses your response as JSON; anything that\nisn't pure JSON will be rejected and you'll get one retry with the parse\nerror fed back to you. Two parse failures fail the dispatch.\n\n## CRITICAL RULES\n\n### Rule 1 — `id` field MUST match the regex `^gemini-rev-\\d+$`\n\nEvery finding's `id` is a canonical identifier, NOT a description.\n\nCORRECT:\n- `\"id\": \"gemini-rev-001\"`\n- `\"id\": \"gemini-rev-002\"`\n\nINCORRECT (helper validator REJECTS):\n- `\"id\": \"scope signature mismatch\"`     ← narrative text\n- `\"id\": \"codex-rev-001\"`                ← wrong prefix (you're gemini, not codex)\n- `\"id\": \"gemini-rev-A1\"`                ← non-digit suffix\n\nThe narrative goes in `summary`, NOT in `id`.\n\n### Rule 2 — `blocking_objections` MUST equal the SET of finding IDs where severity is \"blocking\" or \"critical\"\n\nCORRECT:\n```json\n{\"findings\": [{\"id\": \"gemini-rev-001\", \"severity\": \"blocking\", ...}], \"blocking_objections\": [\"gemini-rev-001\"]}\n```\n\nINCORRECT: putting narrative text in `blocking_objections`, or omitting a blocking-severity finding from it, or including a low/medium finding ID in it.\n\nThe helper computes the expected set as `{f.id for f in findings if f.severity in {\"blocking\",\"critical\"}}` and rejects on mismatch.\n\n### Rule 3 — `goal_satisfied` MUST be coherent with findings\n\n- `goal_satisfied: true` requires `blocking_objections: []`.\n- `goal_satisfied: false` is valid even with no blocking findings if medium/low findings collectively indicate the goal isn't met.\n\n### Rule 4 — `goal_satisfied_rationale` is REQUIRED and non-empty\n\nAlways populate it, even when goal_satisfied is true.\n\n### Rule 5 — patch_proposal MUST be null in v1.14.0\n\nThis release of consensus-mcp scopes gemini as review-only. Per-finding\n`patch_proposal` field MUST be `null` (or omitted). If you want to suggest\na fix, describe it in the finding's `recommendation` field as prose. Patch\nauthoring for gemini is deferred to a later iteration.\n\n`patch_not_proposed_reason` may be `null` or a brief string.\n\n## Schema reference\n\n```json\n{\n  \"findings\": [\n    {\n      \"id\": \"gemini-rev-NNN\",\n      \"severity\": \"low|medium|high|blocking|critical\",\n      \"summary\": \"<one-line description>\",\n      \"citation\": \"<file:line>\",\n      \"risk\": \"<impact statement>\",\n      \"recommendation\": \"<action; prose only — no patch_proposal in v1.14.0>\",\n      \"patch_proposal\": null,\n      \"patch_not_proposed_reason\": null\n    }\n  ],\n  \"goal_satisfied\": true,\n  \"goal_satisfied_rationale\": \"<why>\",\n  \"blocking_objections\": []\n}\n```\n\nIf you have no findings: emit `findings: []`, `blocking_objections: []`,\n`goal_satisfied: true`, with a one-sentence rationale. Empty findings is a\nvalid review. Do NOT manufacture findings to look diligent.\n\nAnti-self-verification: do NOT include fields like `verified`, `self_verified`,\n`correct`, `approved`, `confirmed` in any object. They are NOT in the allowed\nkey set and will be rejected.\n\n# Remember\n\nYour response is JSON only. First character `{`, last character `}`. No\nmarkdown fences. No prose. The validator does not parse natural language.\n"
    consensus_mcp/dispatch_templates/gemini_review_schema.json: "{\n  \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n  \"title\": \"Gemini review packet (auto-dispatch, v1.14.0 review-only)\",\n  \"type\": \"object\",\n  \"required\": [\"findings\", \"goal_satisfied\", \"goal_satisfied_rationale\", \"blocking_objections\"],\n  \"additionalProperties\": false,\n  \"properties\": {\n    \"findings\": {\n      \"type\": \"array\",\n      \"items\": {\n        \"type\": \"object\",\n        \"required\": [\"id\", \"severity\", \"summary\", \"citation\", \"risk\", \"recommendation\"],\n        \"additionalProperties\": false,\n        \"properties\": {\n          \"id\":             {\"type\": \"string\", \"pattern\": \"^gemini-rev-\\\\d+$\"},\n          \"severity\":       {\"type\": \"string\", \"enum\": [\"low\", \"medium\", \"high\", \"blocking\", \"critical\"]},\n          \"summary\":        {\"type\": \"string\", \"minLength\": 1},\n          \"citation\":       {\"type\": \"string\"},\n          \"risk\":           {\"type\": \"string\"},\n          \"recommendation\": {\"type\": \"string\"},\n          \"patch_proposal\": {\"type\": \"null\", \"description\": \"MUST be null in v1.14.0 (review-only); patch authoring deferred\"},\n          \"patch_not_proposed_reason\": {\"type\": [\"string\", \"null\"]}\n        }\n      }\n    },\n    \"goal_satisfied\":            {\"type\": \"boolean\"},\n    \"goal_satisfied_rationale\":  {\"type\": \"string\", \"minLength\": 1},\n    \"blocking_objections\":       {\"type\": \"array\", \"items\": {\"type\": \"string\", \"pattern\": \"^gemini-rev-\\\\d+$\"}}\n  }\n}\n"
    consensus_mcp/tools/reviewer_dispatch_gemini.py: "\"\"\"reviewer.dispatch_gemini MCP tool. v1.14.0 — thin wrapper over _dispatch_gemini.\n\nMirrors reviewer_dispatch_codex.py: translates MCP tool kwargs into argv,\ncalls _dispatch_gemini.main() in-process, captures stdout, returns parsed\nJSON. The helper remains the source of truth.\n\nScope (iter-0011): review-only. Gemini does NOT emit patch_proposal in\nv1.14.0; the schema and parser enforce this. Patch authoring parity is\ndeferred to iter-0013 capability metadata.\n\nThe MCP surface exposes `--model` (gemini's CLI flag for model selection)\nbecause operators may reasonably want to pick between gemini-2.5-pro (default)\nand lighter/cheaper variants per dispatch.\n\"\"\"\nfrom __future__ import annotations\n\nimport contextlib\nimport io\nimport json\n\nfrom consensus_mcp import _dispatch_gemini\n\n\nSCHEMA = {\n    \"name\": \"reviewer.dispatch_gemini\",\n    \"description\": (\n        \"Dispatch the gemini CLI as a reviewer for an iteration. Thin MCP \"\n        \"wrapper over the _dispatch_gemini helper. Returns the helper's JSON \"\n        \"output verbatim (success: ok=True with pass_id + sealed paths; \"\n        \"failure: ok=False with error + error_type).\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"goal_packet_path\": {\n                \"type\": \"string\",\n                \"description\": \"Repo-relative or absolute path to the iteration's goal_packet.yaml.\",\n            },\n            \"iteration_dir\": {\n                \"type\": \"string\",\n                \"description\": \"Repo-relative or absolute path to the iteration directory.\",\n            },\n            \"reviewer_id\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": \"Reviewer identifier; defaults to 'gemini-<iteration_id>-1'.\",\n            },\n            \"pass_id\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": \"Pass identifier; defaults to '<reviewer_id>-pass1'.\",\n            },\n            \"timeout_seconds\": {\n                \"type\": [\"integer\", \"null\"],\n                \"description\": \"Gemini subprocess timeout in seconds; default 600.\",\n            },\n            \"review_target_path\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": (\n                    \"Optional path to the file under review (diff/patch or \"\n                    \"review-packet.yaml); helper computes sha256 and threads \"\n                    \"it through the prompt.\"\n                ),\n            },\n            \"model\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": \"Gemini model identifier; defaults to gemini-2.5-pro.\",\n            },\n            \"smoke\": {\n                \"type\": [\"boolean\", \"null\"],\n                \"description\": (\n                    \"If true, helper's --smoke is passed; the env var \"\n                    \"CONSENSUS_MCP_RUN_REAL_GEMINI_SMOKE=1 must also be set \"\n                    \"or the helper refuses (exit 3).\"\n                ),\n            },\n        },\n        \"required\": [\"goal_packet_path\", \"iteration_dir\"],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"ok\": {\"type\": \"boolean\"},\n            \"pass_id\": {\"type\": [\"string\", \"null\"]},\n            \"packet_sha256\": {\"type\": [\"string\", \"null\"]},\n            \"sealed_path\": {\"type\": [\"string\", \"null\"]},\n            \"archive_sealed_path\": {\"type\": [\"string\", \"null\"]},\n            \"audit_event_id\": {\"type\": [\"string\", \"null\"]},\n            \"error\": {\"type\": [\"string\", \"null\"]},\n            \"error_type\": {\"type\": [\"string\", \"null\"]},\n            \"raw_stdout_sample\": {\"type\": [\"string\", \"null\"]},\n        },\n        \"required\": [\"ok\"],\n    },\n}\n\n\ndef _build_argv(\n    goal_packet_path: str,\n    iteration_dir: str,\n    reviewer_id: str | None,\n    pass_id: str | None,\n    timeout_seconds: int | None,\n    review_target_path: str | None,\n    model: str | None,\n    smoke: bool | None,\n) -> list[str]:\n    argv: list[str] = [\n        \"--goal-packet\", goal_packet_path,\n        \"--iteration-dir\", iteration_dir,\n    ]\n    if reviewer_id is not None:\n        argv += [\"--reviewer-id\", reviewer_id]\n    if pass_id is not None:\n        argv += [\"--pass-id\", pass_id]\n    if timeout_seconds is not None:\n        argv += [\"--timeout-seconds\", str(timeout_seconds)]\n    if review_target_path is not None:\n        argv += [\"--review-target\", review_target_path]\n    if model is not None:\n        argv += [\"--model\", model]\n    if smoke:\n        argv += [\"--smoke\"]\n    return argv\n\n\ndef handle(\n    goal_packet_path: str,\n    iteration_dir: str,\n    reviewer_id: str | None = None,\n    pass_id: str | None = None,\n    timeout_seconds: int | None = None,\n    review_target_path: str | None = None,\n    model: str | None = None,\n    smoke: bool | None = None,\n) -> dict:\n    \"\"\"Dispatch gemini via _dispatch_gemini.main; return parsed JSON dict.\n\n    Same rc-vs-stdout reconciliation as reviewer_dispatch_codex (iter-0028 F3):\n    if main() returns a non-zero exit code but stdout JSON claims ok=True,\n    force ok=False and stamp the marker key. Defense-in-depth.\n    \"\"\"\n    argv = _build_argv(\n        goal_packet_path=goal_packet_path,\n        iteration_dir=iteration_dir,\n        reviewer_id=reviewer_id,\n        pass_id=pass_id,\n        timeout_seconds=timeout_seconds,\n        review_target_path=review_target_path,\n        model=model,\n        smoke=smoke,\n    )\n    buf = io.StringIO()\n    rc: int = 0\n    with contextlib.redirect_stdout(buf):\n        try:\n            rc = _dispatch_gemini.main(argv) or 0\n        except SystemExit as exc:\n            # codex-rev-001 round-2 fix: argparse raises SystemExit on bad\n            # input. SystemExit subclasses BaseException (NOT Exception), so\n            # the bare `except Exception` below would let it escape and kill\n            # the stdio MCP server. Catch it explicitly and convert to a\n            # structured failure response.\n            return {\n                \"ok\": False,\n                \"error_type\": \"ArgparseSystemExit\",\n                \"error\": f\"argparse rejected input: {exc.code!r}\",\n            }\n        except Exception as exc:\n            return {\n                \"ok\": False,\n                \"error_type\": type(exc).__name__,\n                \"error\": str(exc),\n            }\n    output = buf.getvalue().strip()\n    try:\n        parsed = json.loads(output)\n    except json.JSONDecodeError as exc:\n        return {\n            \"ok\": False,\n            \"error_type\": \"WrapperJsonDecodeError\",\n            \"error\": str(exc),\n            \"raw_stdout_sample\": output[:200],\n        }\n    if rc != 0 and isinstance(parsed, dict) and parsed.get(\"ok\") is not False:\n        parsed[\"ok\"] = False\n        parsed[\"wrapper_forced_ok_false_due_to_nonzero_rc\"] = True\n    return parsed\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/server.py: "\"\"\"MCP server for the consensus pipeline. Phase 1 G1+G2 hybrid skeleton.\n\nPer spec docs/architecture/phase-1-completion.md\nsection 3 (architecture) + section 5 (permissions).\n\nRegisters tool framework, performs boot-time validate_disposition_index\ncheck, listens on stdio. Tools registered: T2..T11 + Phase 4 supervisor +\ncodex-fix-author surface. Phase 1 MCP G1+G2 implementation complete:\nstate.read_decision_ledger (T2), audit.append_event (T3),\npatch.stage_and_dry_run (T4), patch.apply_consensus_patch (T5),\nreview.write_and_seal (T6), review.read_post_seal (T7).\nPhase 2 G5: state.update_decision_ledger (T8).\nPhase 2 G3: repo.get_section (T9), repo.set_section (T10).\nPhase 2 G4: gate.evaluate_production_with_scope_match (T11).\nPhase 4 supervisor: reviewer.dispatch_codex, loop.run_goal,\nloop.verify_codex_patch, apply.codex_patch (Task #26 / iter-0016).\n\nImplementation note: the Anthropic MCP SDK (pip install mcp) was not\npresent in python_env at implementation time. This server uses hand-rolled\nstdio JSON-RPC 2.0, which is the raw wire format the MCP SDK wraps anyway.\nIf the SDK is later installed, this file can be swapped for the SDK-style\nserver; the ToolRegistry contract stays the same.\n\nBoot sequence:\n  1. Run validate_disposition_index against the canonical spec md\n  2. If findings != 0: REFUSE TO START; print findings to stderr; exit 2\n  3. If findings == 0: register tool surface (empty for now); listen on stdio\n  4. Append mcp_server_started event to consensus-state/state/mcp-server-audit.jsonl\n\nShutdown:\n  - Append mcp_server_stopped event before exiting\n\nCLI flags:\n  --boot-and-exit   Boot, write audit event, then exit cleanly. Used by\n                    the smoke test to verify the boot/shutdown cycle without\n                    keeping a long-running stdio server open.\n\"\"\"\nfrom __future__ import annotations\nimport argparse\nimport importlib.metadata\nimport json\nimport os\nimport sys\nfrom datetime import datetime, timezone\nfrom pathlib import Path\n\n\ndef _package_version() -> str:\n    \"\"\"iter-0001 codex-rev-002 fix: derive serverInfo.version from installed\n    package metadata so it stays in sync with pyproject.toml. Falls back to\n    \"unknown\" if the package isn't installed (e.g., running from a fresh\n    source checkout without `pip install -e .`).\"\"\"\n    try:\n        return importlib.metadata.version(\"consensus-mcp\")\n    except importlib.metadata.PackageNotFoundError:\n        return \"unknown\"\n\ndef _resolve_repo_root() -> Path:\n    \"\"\"Legacy REPO_ROOT resolver. Kept for back-compat.\n\n    v1.13.0: no longer load-bearing for spec/state/project-root. Use\n    _resolve_spec_path / _resolve_state_root / _resolve_project_root instead.\n    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if override:\n        return Path(override).resolve()\n    return Path(__file__).resolve().parent.parent\n\n\ndef _resolve_spec_path() -> Path:\n    \"\"\"Spec path: env override > legacy REPO_ROOT > walked-up checkout > packaged template.\"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_SPEC_PATH\")\n    if override:\n        return Path(override).resolve()\n    repo_root_env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n        legacy = Path(repo_root_env).resolve() / \"docs\" / \"architecture\" / \"orchestration-spec.md\"\n        if legacy.exists():\n            return legacy\n    walked = Path(__file__).resolve().parent.parent / \"docs\" / \"architecture\" / \"orchestration-spec.md\"\n    if walked.exists():\n        return walked\n    return Path(__file__).resolve().parent / \"spec_template.md\"\n\n\ndef _resolve_state_root() -> Path:\n    \"\"\"State root: env override > legacy REPO_ROOT > CWD.\"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_STATE_ROOT\")\n    if override:\n        return Path(override).resolve()\n    repo_root_env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n        return Path(repo_root_env).resolve() / \"consensus-state\"\n    return Path.cwd() / \"consensus-state\"\n\n\ndef _resolve_project_root() -> Path:\n    \"\"\"Project root (reviewable-file root): env override > legacy REPO_ROOT > CWD.\n\n    This is what consumers of goal_packet.allowed_files resolve against.\n    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_PROJECT_ROOT\")\n    if override:\n        return Path(override).resolve()\n    repo_root_env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n        return Path(repo_root_env).resolve()\n    return Path.cwd()\n\n\nREPO_ROOT = _resolve_repo_root()\nSPEC_PATH = _resolve_spec_path()\nSTATE_ROOT = _resolve_state_root()\nPROJECT_ROOT = _resolve_project_root()\n\n\ndef _resolve_audit_log_path() -> Path:\n    \"\"\"Allow smoke tests to point AUDIT_LOG at a temp sink via env var; default to state root.\"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_AUDIT_LOG\")\n    if override:\n        return Path(override)\n    return STATE_ROOT / \"state\" / \"mcp-server-audit.jsonl\"\n\n\nAUDIT_LOG = _resolve_audit_log_path()\n\n\nfrom consensus_mcp.tool_registry import ToolRegistry  # noqa: E402\n\n# Global registry -- T2-T11 modules import this and call registry.register().\nregistry = ToolRegistry()\n\nfrom consensus_mcp.tools import state_read_decision_ledger  # noqa: E402\nstate_read_decision_ledger.register(registry)\n\nfrom consensus_mcp.tools import audit_append_event  # noqa: E402\naudit_append_event.register(registry)\n\nfrom consensus_mcp.tools import patch_stage_and_dry_run  # noqa: E402\npatch_stage_and_dry_run.register(registry)\n\nfrom consensus_mcp.tools import patch_apply_consensus_patch  # noqa: E402\npatch_apply_consensus_patch.register(registry)\n\nfrom consensus_mcp.tools import review_write_and_seal  # noqa: E402\nreview_write_and_seal.register(registry)\n\nfrom consensus_mcp.tools import review_read_post_seal  # noqa: E402\nreview_read_post_seal.register(registry)\n\nfrom consensus_mcp.tools import state_update_decision_ledger  # noqa: E402\nstate_update_decision_ledger.register(registry)\n\nfrom consensus_mcp.tools import repo_get_section  # noqa: E402\nrepo_get_section.register(registry)\n\nfrom consensus_mcp.tools import repo_set_section  # noqa: E402\nrepo_set_section.register(registry)\n\nfrom consensus_mcp.tools import gate_evaluate_production_with_scope_match  # noqa: E402\ngate_evaluate_production_with_scope_match.register(registry)\n\nfrom consensus_mcp.tools import reviewer_dispatch_codex  # noqa: E402\nreviewer_dispatch_codex.register(registry)\n\nfrom consensus_mcp.tools import reviewer_dispatch_gemini  # noqa: E402\nreviewer_dispatch_gemini.register(registry)\n\nfrom consensus_mcp.tools import loop_run_goal  # noqa: E402\nloop_run_goal.register(registry)\n\nfrom consensus_mcp.tools import loop_verify_codex_patch  # noqa: E402\nloop_verify_codex_patch.register(registry)\n\nfrom consensus_mcp.tools import apply_codex_patch  # noqa: E402\napply_codex_patch.register(registry)\n\nfrom consensus_mcp.tools import resume  # noqa: E402\nresume.register(registry)\n\n\n# ---------------------------------------------------------------------------\n# Boot-time disposition check\n# ---------------------------------------------------------------------------\n\ndef _run_disposition_check() -> int:\n    \"\"\"Run validate_disposition_index against the spec; return findings count.\n\n    Returns 0 if clean. Non-zero means server should refuse to start.\n    Raises on import/IO error (caller handles).\n    \"\"\"\n    from consensus_mcp.validators.validate_disposition_index import validate_disposition_index\n    report = validate_disposition_index(SPEC_PATH)\n    return report[\"stats\"][\"total_findings\"]\n\n\n# ---------------------------------------------------------------------------\n# Audit log\n# ---------------------------------------------------------------------------\n\ndef _now_utc() -> str:\n    return (\n        datetime.now(timezone.utc)\n        .replace(microsecond=0)\n        .isoformat()\n        .replace(\"+00:00\", \"Z\")\n    )\n\n\ndef _append_audit_event(event: str, extra: dict | None = None) -> None:\n    \"\"\"Append one JSON-lines record to mcp-server-audit.jsonl (create if missing).\n\n    True JSONL (one JSON object per line). Atomic-safe for concurrent writers:\n    each write is a single open-append-close, so two racing processes interleave\n    lines rather than silently dropping each other's events. (Note: this is\n    atomic-append for the SERVER boot/stop log; per-iteration audit_append_event\n    has different semantics -- see audit_append_event.py docstring.)\n    \"\"\"\n    record: dict = {\"event\": event, \"timestamp_utc\": _now_utc()}\n    if extra:\n        record.update(extra)\n    AUDIT_LOG.parent.mkdir(parents=True, exist_ok=True)\n    with AUDIT_LOG.open(\"a\", encoding=\"utf-8\") as f:\n        f.write(json.dumps(record) + \"\\n\")\n\n\n# ---------------------------------------------------------------------------\n# Stdio JSON-RPC 2.0 server (MCP wire format)\n# ---------------------------------------------------------------------------\n\ndef _send(obj: dict) -> None:\n    sys.stdout.write(json.dumps(obj) + \"\\n\")\n    sys.stdout.flush()\n\n\ndef _handle_request(req: dict) -> dict | None:\n    \"\"\"Dispatch one JSON-RPC request; return response dict or None (for notifications).\"\"\"\n    req_id = req.get(\"id\")\n    method = req.get(\"method\", \"\")\n    params = req.get(\"params\") or {}\n\n    # MCP initialize handshake\n    if method == \"initialize\":\n        return {\n            \"jsonrpc\": \"2.0\",\n            \"id\": req_id,\n            \"result\": {\n                \"protocolVersion\": \"2024-11-05\",\n                \"serverInfo\": {\"name\": \"consensus-mcp\", \"version\": _package_version()},\n                \"capabilities\": {\"tools\": {}},\n            },\n        }\n\n    # MCP tools/list\n\
      \    if method == \"tools/list\":\n        tools = registry.list_tools()\n        return {\n            \"jsonrpc\": \"2.0\",\n            \"id\": req_id,\n            \"result\": {\"tools\": tools},\n        }\n\n    # MCP tools/call\n    if method == \"tools/call\":\n        name = params.get(\"name\", \"\")\n        arguments = params.get(\"arguments\") or {}\n        try:\n            handler = registry.get_handler(name)\n        except KeyError:\n            return {\n                \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n                \"error\": {\"code\": -32601, \"message\": f\"tool not found: {name}\"},\n            }\n        try:\n            result = handler(**arguments)\n            return {\n                \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n                \"result\": {\"content\": [{\"type\": \"text\", \"text\": json.dumps(result)}]},\n            }\n        except Exception as exc:\n            return {\n                \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n                \"error\": {\"code\": -32000, \"message\": str(exc)},\n            }\n\n    # Notification (no id) -- no response required\n    if req_id is None:\n        return None\n\n    return {\n        \"jsonrpc\": \"2.0\",\n        \"id\": req_id,\n        \"error\": {\"code\": -32601, \"message\": f\"method not found: {method}\"},\n    }\n\n\ndef _serve_stdio() -> None:\n    \"\"\"Read JSON-RPC lines from stdin; write responses to stdout.\"\"\"\n    for raw_line in sys.stdin:\n        raw_line = raw_line.strip()\n        if not raw_line:\n            continue\n        try:\n            req = json.loads(raw_line)\n        except json.JSONDecodeError as exc:\n            _send({\n                \"jsonrpc\": \"2.0\",\n                \"id\": None,\n                \"error\": {\"code\": -32700, \"message\": f\"parse error: {exc}\"},\n            })\n            continue\n        resp = _handle_request(req)\n        if resp is not None:\n            _send(resp)\n\n\n# ---------------------------------------------------------------------------\n# Entry point\n# ---------------------------------------------------------------------------\n\ndef main(argv: list[str] | None = None) -> int:\n    parser = argparse.ArgumentParser(description=\"consensus-mcp MCP server (Phase 1 skeleton)\")\n    parser.add_argument(\n        \"--boot-and-exit\",\n        action=\"store_true\",\n        help=\"boot, write audit event, then exit (used by smoke test)\",\n    )\n    args = parser.parse_args(argv)\n\n    # Boot gate: refuse to start if spec has findings.\n    try:\n        findings = _run_disposition_check()\n    except Exception as exc:\n        print(f\"ERROR: disposition check failed: {exc}\", file=sys.stderr)\n        return 2\n\n    if findings != 0:\n        print(\n            f\"ERROR: validate_disposition_index reports {findings} finding(s); \"\n            \"server refuses to start.\",\n            file=sys.stderr,\n        )\n        return 2\n\n    _append_audit_event(\"mcp_server_started\", {\"findings_at_boot\": findings})\n\n    if args.boot_and_exit:\n        _append_audit_event(\"mcp_server_stopped\", {\"reason\": \"boot-and-exit\"})\n        return 0\n\n    try:\n        _serve_stdio()\n    finally:\n        _append_audit_event(\"mcp_server_stopped\", {\"reason\": \"stdin_eof\"})\n\n    return 0\n\n\nif __name__ == \"__main__\":\n    sys.exit(main())\n"
    consensus_mcp/tests/test_dispatch_gemini.py: "\"\"\"Unit tests for consensus_mcp._dispatch_gemini.\n\nFocused on gemini-specific behavior:\n  - _extract_json_from_text (free-form output → JSON substring)\n  - _parse_gemini_output (validates JSON shape; gemini-rev-N IDs; patch_proposal MUST be null)\n  - _invoke_gemini_with_retry (validator-retry on first-pass parse fail)\n  - _resolve_gemini_bin (Windows-aware lookup)\n  - MCP wrapper (argv translation, rc reconciliation)\n\nDoes NOT re-test base helpers (covered by test_dispatch_codex.py); does NOT\nrun real gemini CLI (smoke env-gated to CONSENSUS_MCP_RUN_REAL_GEMINI_SMOKE=1).\n\"\"\"\nfrom __future__ import annotations\n\nimport json\nimport sys\nfrom pathlib import Path\n\nimport pytest\n\n# Allow imports of consensus_mcp from the repo root without install.\nROOT = Path(__file__).resolve().parent.parent.parent\nif str(ROOT) not in sys.path:\n    sys.path.insert(0, str(ROOT))\n\nfrom consensus_mcp import _dispatch_gemini  # noqa: E402\nfrom consensus_mcp.tools import reviewer_dispatch_gemini  # noqa: E402\n\n\n# ---------- _extract_json_from_text ----------\n\ndef test_extract_pure_json_passes_through():\n    text = '{\"findings\": [], \"goal_satisfied\": true}'\n    assert _dispatch_gemini._extract_json_from_text(text) == text\n\n\ndef test_extract_strips_leading_trailing_whitespace():\n    text = '  \\n  {\"k\": 1}\\n   '\n    assert _dispatch_gemini._extract_json_from_text(text) == '{\"k\": 1}'\n\n\ndef test_extract_handles_json_markdown_fence():\n    text = 'Sure thing:\\n```json\\n{\"findings\": []}\\n```\\nhope that helps'\n    out = _dispatch_gemini._extract_json_from_text(text)\n    assert out == '{\"findings\": []}'\n\n\ndef test_extract_handles_bare_markdown_fence():\n    text = '```\\n{\"k\": \"v\"}\\n```'\n    out = _dispatch_gemini._extract_json_from_text(text)\n    assert out == '{\"k\": \"v\"}'\n\n\ndef test_extract_falls_back_to_brace_scan():\n    text = 'Here is what I found: {\"findings\": [], \"goal_satisfied\": true}. Done.'\n    out = _dispatch_gemini._extract_json_from_text(text)\n    assert out == '{\"findings\": [], \"goal_satisfied\": true}'\n\n\ndef test_extract_returns_raw_when_no_braces():\n    text = \"no json here at all\"\n    assert _dispatch_gemini._extract_json_from_text(text) == text\n\n\n# ---------- _parse_gemini_output ----------\n\ndef _minimal_valid():\n    return {\n        \"findings\": [],\n        \"goal_satisfied\": True,\n        \"goal_satisfied_rationale\": \"No issues found.\",\n        \"blocking_objections\": [],\n    }\n\n\ndef test_parse_minimal_valid():\n    parsed = _dispatch_gemini._parse_gemini_output(json.dumps(_minimal_valid()))\n    assert parsed[\"goal_satisfied\"] is True\n    assert parsed[\"findings\"] == []\n\n\ndef test_parse_rejects_invalid_json():\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"not valid JSON\"):\n        _dispatch_gemini._parse_gemini_output(\"{not json\")\n\n\ndef test_parse_rejects_non_object_root():\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"must be an object\"):\n        _dispatch_gemini._parse_gemini_output(\"[1,2,3]\")\n\n\ndef test_parse_rejects_unknown_top_level_key():\n    payload = _minimal_valid()\n    payload[\"unexpected\"] = \"field\"\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"unexpected top-level\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n\n\ndef test_parse_rejects_missing_required():\n    payload = _minimal_valid()\n    del payload[\"goal_satisfied\"]\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"missing required\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n\n\ndef test_parse_rejects_finding_with_codex_id_prefix():\n    payload = _minimal_valid()\n    payload[\"findings\"] = [{\n        \"id\": \"codex-rev-001\",\n        \"severity\": \"low\",\n        \"summary\": \"wrong adapter prefix\",\n        \"citation\": \"x:1\",\n        \"risk\": \"r\",\n        \"recommendation\": \"use gemini-rev-N\",\n    }]\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=r\"\\^gemini-rev\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n\n\ndef test_parse_accepts_gemini_rev_id():\n    payload = _minimal_valid()\n    payload[\"findings\"] = [{\n        \"id\": \"gemini-rev-001\",\n        \"severity\": \"low\",\n        \"summary\": \"minor stylistic suggestion\",\n        \"citation\": \"consensus_mcp/foo.py:1\",\n        \"risk\": \"very low\",\n        \"recommendation\": \"consider renaming\",\n    }]\n    parsed = _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n    assert parsed[\"findings\"][0][\"id\"] == \"gemini-rev-001\"\n\n\ndef test_parse_rejects_non_null_patch_proposal():\n    payload = _minimal_valid()\n    payload[\"findings\"] = [{\n        \"id\": \"gemini-rev-001\",\n        \"severity\": \"low\",\n        \"summary\": \"x\",\n        \"citation\": \"x:1\",\n        \"risk\": \"r\",\n        \"recommendation\": \"rec\",\n        \"patch_proposal\": {\"patch_id\": \"gemini-rev-001-patch\"},\n    }]\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"patch_proposal must be null\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n\n\ndef test_parse_allows_null_patch_proposal():\n    payload = _minimal_valid()\n    payload[\"findings\"] = [{\n        \"id\": \"gemini-rev-001\",\n        \"severity\": \"low\",\n        \"summary\": \"x\",\n        \"citation\": \"x:1\",\n        \"risk\": \"r\",\n        \"recommendation\": \"rec\",\n        \"patch_proposal\": None,\n        \"patch_not_proposed_reason\": None,\n    }]\n    parsed = _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n    assert parsed[\"findings\"][0][\"patch_proposal\"] is None\n\n\ndef test_parse_blocking_invariant_violated():\n    payload = _minimal_valid()\n    payload[\"findings\"] = [{\n        \"id\": \"gemini-rev-001\",\n        \"severity\": \"blocking\",\n        \"summary\": \"x\",\n        \"citation\": \"x:1\",\n        \"risk\": \"r\",\n        \"recommendation\": \"rec\",\n    }]\n    # blocking_objections is empty but a blocking-severity finding exists.\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"blocking_objections invariant\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n\n\ndef test_parse_rejects_goal_satisfied_true_with_blocking_objections():\n    \"\"\"codex-rev-002 round-1 fix: goal_satisfied=true is incoherent with any blocking finding.\"\"\"\n    payload = _minimal_valid()\n    payload[\"findings\"] = [{\n        \"id\": \"gemini-rev-001\",\n        \"severity\": \"blocking\",\n        \"summary\": \"x\",\n        \"citation\": \"x:1\",\n        \"risk\": \"r\",\n        \"recommendation\": \"rec\",\n    }]\n    payload[\"blocking_objections\"] = [\"gemini-rev-001\"]\n    payload[\"goal_satisfied\"] = True  # incoherent\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"incoherent\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n\n\ndef test_parse_blocking_invariant_satisfied():\n    payload = _minimal_valid()\n    payload[\"findings\"] = [{\n        \"id\": \"gemini-rev-001\",\n        \"severity\": \"critical\",\n        \"summary\": \"x\",\n        \"citation\": \"x:1\",\n        \"risk\": \"r\",\n        \"recommendation\": \"rec\",\n    }]\n    payload[\"blocking_objections\"] = [\"gemini-rev-001\"]\n    payload[\"goal_satisfied\"] = False\n    parsed = _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n    assert parsed[\"blocking_objections\"] == [\"gemini-rev-001\"]\n\n\ndef test_parse_extracts_from_wrapped_output():\n    # Simulates gemini emitting prose around the JSON.\n    payload_str = json.dumps(_minimal_valid())\n    wrapped = f\"Sure, here's the review:\\n```json\\n{payload_str}\\n```\\nDone.\"\n    parsed = _dispatch_gemini._parse_gemini_output(wrapped)\n    assert parsed[\"goal_satisfied\"] is True\n\n\n# ---------- _invoke_gemini_with_retry ----------\n\nclass _FakeInvokeFactory:\n    \"\"\"Captures the sequence of prompts _invoke_gemini receives + returns scripted outputs.\"\"\"\n    def __init__(self, outputs: list[str]):\n        self.outputs = list(outputs)\n        self.prompts: list[str] = []\n\n    def __call__(self, *, prompt, **_kwargs):\n        self.prompts.append(prompt)\n        return self.outputs.pop(0)\n\n\ndef test_retry_succeeds_on_first_attempt(monkeypatch):\n    factory = _FakeInvokeFactory([json.dumps(_minimal_valid())])\n    monkeypatch.setattr(_dispatch_gemini, \"_invoke_gemini\", factory)\n    raw, parsed = _dispatch_gemini._invoke_gemini_with_retry(\n        prompt=\"initial\",\n        gemini_bin=\"gemini\",\n        model=\"gemini-2.5-pro\",\n        timeout_seconds=60,\n        repo_root=Path(\".\"),\n    )\n    assert parsed[\"goal_satisfied\"] is True\n    assert len(factory.prompts) == 1\n    assert factory.prompts[0] == \"initial\"\n\n\ndef test_retry_succeeds_on_second_attempt(monkeypatch):\n    \"\"\"First call returns junk, second returns valid JSON. Retry succeeds.\"\"\"\n    factory = _FakeInvokeFactory([\n        \"not json at all{\",                       # parse will fail\n        json.dumps(_minimal_valid()),             # valid\n    ])\n    monkeypatch.setattr(_dispatch_gemini, \"_invoke_gemini\", factory)\n    raw, parsed = _dispatch_gemini._invoke_gemini_with_retry(\n        prompt=\"initial\",\n        gemini_bin=\"gemini\",\n        model=\"gemini-2.5-pro\",\n        timeout_seconds=60,\n        repo_root=Path(\".\"),\n    )\n    assert parsed[\"goal_satisfied\"] is True\n    assert len(factory.prompts) == 2\n    # Retry prompt should include the parse error feedback.\n    assert \"Retry\" in factory.prompts[1]\n    assert \"Parse error\" in factory.prompts[1]\n\n\ndef test_retry_fails_when_both_attempts_invalid(monkeypatch):\n\
      \    factory = _FakeInvokeFactory([\"garbage 1\", \"garbage 2\"])\n    monkeypatch.setattr(_dispatch_gemini, \"_invoke_gemini\", factory)\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError):\n        _dispatch_gemini._invoke_gemini_with_retry(\n            prompt=\"initial\",\n            gemini_bin=\"gemini\",\n            model=\"gemini-2.5-pro\",\n            timeout_seconds=60,\n            repo_root=Path(\".\"),\n        )\n    assert len(factory.prompts) == 2  # exactly one retry; no further attempts\n\n\n# ---------- _resolve_gemini_bin ----------\n\ndef test_resolve_returns_input_when_path_separator_present():\n    # Caller-supplied full path with separator should pass through.\n    if sys.platform == \"win32\":\n        # On Windows the function checks for App Alias zero-byte stubs but\n        # otherwise returns the input. Pass a non-existent path that has a\n        # separator; the function returns it unchanged.\n        out = _dispatch_gemini._resolve_gemini_bin(r\"C:\\nonexistent\\gemini.exe\")\n        assert out == r\"C:\\nonexistent\\gemini.exe\"\n    else:\n        out = _dispatch_gemini._resolve_gemini_bin(\"/nonexistent/gemini\")\n        assert out == \"/nonexistent/gemini\"\n\n\ndef test_resolve_returns_input_when_which_misses(monkeypatch):\n    monkeypatch.setattr(_dispatch_gemini.shutil, \"which\", lambda _: None)\n    out = _dispatch_gemini._resolve_gemini_bin(\"definitely-not-gemini\")\n    assert out == \"definitely-not-gemini\"\n\n\n# ---------- reviewer_dispatch_gemini wrapper ----------\n\ndef test_wrapper_argv_required_args_only():\n    argv = reviewer_dispatch_gemini._build_argv(\n        goal_packet_path=\"goal.yaml\",\n        iteration_dir=\"iter-dir\",\n        reviewer_id=None,\n        pass_id=None,\n        timeout_seconds=None,\n        review_target_path=None,\n        model=None,\n        smoke=None,\n    )\n    assert argv == [\"--goal-packet\", \"goal.yaml\", \"--iteration-dir\", \"iter-dir\"]\n\n\ndef test_wrapper_argv_all_args():\n    argv = reviewer_dispatch_gemini._build_argv(\n        goal_packet_path=\"g.yaml\",\n        iteration_dir=\"iter\",\n        reviewer_id=\"gemini-x-1\",\n        pass_id=\"gemini-x-1-pass1\",\n        timeout_seconds=600,\n        review_target_path=\"rp.yaml\",\n        model=\"gemini-2.5-pro\",\n        smoke=True,\n    )\n    assert \"--reviewer-id\" in argv and \"gemini-x-1\" in argv\n    assert \"--pass-id\" in argv and \"gemini-x-1-pass1\" in argv\n    assert \"--timeout-seconds\" in argv and \"600\" in argv\n    assert \"--review-target\" in argv and \"rp.yaml\" in argv\n    assert \"--model\" in argv and \"gemini-2.5-pro\" in argv\n    assert \"--smoke\" in argv\n\n\ndef test_wrapper_argv_smoke_false_omits_flag():\n    argv = reviewer_dispatch_gemini._build_argv(\n        goal_packet_path=\"g.yaml\",\n        iteration_dir=\"iter\",\n        reviewer_id=None,\n        pass_id=None,\n        timeout_seconds=None,\n        review_target_path=None,\n        model=None,\n        smoke=False,\n    )\n    assert \"--smoke\" not in argv\n\n\ndef test_wrapper_handle_helper_exception_returns_error_dict(monkeypatch):\n    def boom(*_args, **_kwargs):\n        raise RuntimeError(\"simulated helper crash\")\n    monkeypatch.setattr(_dispatch_gemini, \"main\", boom)\n    result = reviewer_dispatch_gemini.handle(\n        goal_packet_path=\"g.yaml\",\n        iteration_dir=\"iter\",\n    )\n    assert result[\"ok\"] is False\n    assert result[\"error_type\"] == \"RuntimeError\"\n    assert \"simulated helper crash\" in result[\"error\"]\n\n\ndef test_wrapper_handle_rc_nonzero_forces_ok_false(monkeypatch):\n    \"\"\"If main() returns non-zero but stdout JSON claims ok=True, wrapper forces ok=False.\"\"\"\n    def fake_main(_argv):\n        # Print a payload that claims ok=True\n        print('{\"ok\": true, \"pass_id\": \"x\"}')\n        return 1\n    monkeypatch.setattr(_dispatch_gemini, \"main\", fake_main)\n    result = reviewer_dispatch_gemini.handle(\n        goal_packet_path=\"g.yaml\",\n        iteration_dir=\"iter\",\n    )\n    assert result[\"ok\"] is False\n    assert result.get(\"wrapper_forced_ok_false_due_to_nonzero_rc\") is True\n\n\ndef test_wrapper_handle_rc_zero_passes_through(monkeypatch):\n    def fake_main(_argv):\n        print('{\"ok\": true, \"pass_id\": \"x\"}')\n        return 0\n    monkeypatch.setattr(_dispatch_gemini, \"main\", fake_main)\n    result = reviewer_dispatch_gemini.handle(\n        goal_packet_path=\"g.yaml\",\n        iteration_dir=\"iter\",\n    )\n    assert result[\"ok\"] is True\n    assert \"wrapper_forced_ok_false_due_to_nonzero_rc\" not in result\n\n\ndef test_parse_rejects_empty_rationale():\n    \"\"\"codex-rev-002 round-2 fix: empty/whitespace rationale must be rejected.\"\"\"\n    payload = _minimal_valid()\n    payload[\"goal_satisfied_rationale\"] = \"\"\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"non-empty\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n    payload[\"goal_satisfied_rationale\"] = \"   \\n\\t  \"\n    with pytest.raises(_dispatch_gemini.GeminiOutputParseError, match=\"non-empty\"):\n        _dispatch_gemini._parse_gemini_output(json.dumps(payload))\n\n\ndef test_wrapper_catches_systemexit(monkeypatch):\n    \"\"\"codex-rev-001 round-2 fix: SystemExit (e.g., bad argparse input) must\n    not escape and kill the MCP server.\"\"\"\n    def fake_main(_argv):\n        raise SystemExit(2)\n    monkeypatch.setattr(_dispatch_gemini, \"main\", fake_main)\n    result = reviewer_dispatch_gemini.handle(\n        goal_packet_path=\"g.yaml\",\n        iteration_dir=\"iter\",\n    )\n    assert result[\"ok\"] is False\n    assert result[\"error_type\"] == \"ArgparseSystemExit\"\n\n\ndef test_wrapper_handle_malformed_stdout(monkeypatch):\n    def fake_main(_argv):\n        print(\"not json\")\n        return 0\n    monkeypatch.setattr(_dispatch_gemini, \"main\", fake_main)\n    result = reviewer_dispatch_gemini.handle(\n        goal_packet_path=\"g.yaml\",\n        iteration_dir=\"iter\",\n    )\n    assert result[\"ok\"] is False\n    assert result[\"error_type\"] == \"WrapperJsonDecodeError\"\n\n\n# ---------- registry registration ----------\n\ndef test_registry_can_register_gemini_tool():\n    class FakeRegistry:\n        def __init__(self):\n            self.registered: list[tuple] = []\n        def register(self, name, schema, handler):\n            self.registered.append((name, schema, handler))\n\n    reg = FakeRegistry()\n    reviewer_dispatch_gemini.register(reg)\n    assert len(reg.registered) == 1\n    name, schema, handler = reg.registered[0]\n    assert name == \"reviewer.dispatch_gemini\"\n    assert schema[\"name\"] == \"reviewer.dispatch_gemini\"\n    assert handler is reviewer_dispatch_gemini.handle\n\n\ndef test_schema_required_args():\n    assert reviewer_dispatch_gemini.SCHEMA[\"input_schema\"][\"required\"] == [\"goal_packet_path\", \"iteration_dir\"]\n    props = reviewer_dispatch_gemini.SCHEMA[\"input_schema\"][\"properties\"]\n    assert \"model\" in props  # gemini-specific addition vs codex\n\n\ndef test_server_registers_gemini():\n    \"\"\"Verify server.py wires up the gemini tool alongside codex.\"\"\"\n    from consensus_mcp.server import registry\n    names = [t[\"name\"] for t in registry.list_tools()]\n    assert \"reviewer.dispatch_gemini\" in names\n"
