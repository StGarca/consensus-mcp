findings:
- id: codex-rev-001
  severity: low
  summary: Converged design proposal for iter-0015 consensus init wizard and workflow
    config
  citation: docs/design-consults/iter-0015-consensus-init-design-challenge.md:0
  risk: The convergence plan needs to preserve the strongest shared agreement while
    resolving real design splits before implementation. The biggest risks are backward-compatibility
    drift, schema churn, and building a workflow engine whose sealed artifacts cannot
    later prove which config governed dispatch. This proposal synthesizes the three
    revealed blind proposals into one implementable design, favoring explicit config
    capture, adapter-based dispatch, and non-disruptive legacy behavior.
  recommendation: "## Part 1 - Consensus Points\n\nSettled decisions across all three\
    \ proposals:\n\n- `consensus init` creates a committed `.consensus/config.yaml`\
    \ and supports interactive, non-interactive, and defaults-plus-overrides usage.\n\
    - Config is versioned YAML with `schema_version: 1` and declarative workflow policy.\n\
    - Operator-configurable dimensions must include workflow mode, contributor pool,\
    \ independence model, convergence rule, finding disposition, snapshot trigger,\
    \ patch authoring, and interactivity.\n- Workflow #4 defaults to blind-first proposals\
    \ followed by reveal/convergence.\n- Existing `reviewer.dispatch_codex` and `reviewer.dispatch_gemini`\
    \ become adapter-backed compatibility surfaces under broader contributor vocabulary.\n\
    - A workflow engine loads config at iteration start and dispatches contributors\
    \ according to config.\n- Real codex/gemini should not be required in unit tests;\
    \ use fake/mock adapters for engine and convergence tests.\n- Historical iterations\
    \ must not be rewritten.\n- Patch proposals are out of scope for this design phase.\n\
    \n## Part 2 - Divergence Points\n\n- Default workflow: claude and gemini prefer\
    \ workflow `4`; codex prefers workflow `3` for compatibility. Resolution: generated\
    \ new configs default to workflow `4` when at least two contributors are detected,\
    \ otherwise workflow `3`; legacy missing-config mode remains workflow `3`. This\
    \ preserves adoption of the new deliberation model without breaking old repos.\n\
    \n- Missing config behavior for new iterations: claude/gemini allow legacy mode;\
    \ codex wants new iteration creation to fail unless init runs. Resolution: v1\
    \ runs legacy mode with a visible once-per-session warning and writes effective\
    \ legacy config into the iteration artifact. Add a future deprecation path, but\
    \ do not fail closed in the first config release.\n\n- Schema shape: claude keeps\
    \ workflow/contributors/snapshot/patch sections; codex separates convergence and\
    \ artifacts more explicitly; gemini uses a simpler workflow.pool model. Resolution:\
    \ use codex's separation for `convergence` and `artifacts`, claude's richer adapter\
    \ settings and defaults, and avoid gemini's overloaded `workflow.pool` because\
    \ contributor pool is a top-level concern.\n\n- Numeric workflow names versus\
    \ semantic names: all proposals accept `3`, `4`, and `advisory`, with codex questioning\
    \ string names. Resolution: schema stores semantic strings `post-review`, `propose-converge`,\
    \ `advisory`; CLI accepts aliases `3` and `4`. Artifacts may display both where\
    \ helpful.\n\n- Contributor requirement: claude requires claude; codex asks whether\
    \ codex+gemini-only should be allowed later; challenge says claude alone allowed\
    \ and advisory says claude decides. Resolution: v1 requires `claude` as orchestrator\
    \ in `contributors.enabled`; reserve non-Claude orchestrators for a future schema\
    \ version.\n\n- Workflow #4 with one contributor: claude/gemini make it invalid;\
    \ codex allows with warning. Resolution: invalid by default. Operator can select\
    \ workflow `post-review` or `advisory` for solo use.\n\n- Finding disposition\
    \ default: claude defaults workflow #4 to `per-finding`; codex/gemini favor `all-or-nothing`\
    \ for compatibility/simplicity. Resolution: default `all-or-nothing` in legacy/workflow\
    \ #3 and `per-finding` in generated workflow #4 configs. This matches the workflow's\
    \ purpose while preserving old behavior.\n\n- Snapshot periodic shape: claude\
    \ supports iterations and minutes; codex supports both with separate fields; gemini\
    \ warns minute periodic may require daemon behavior. Resolution: schema supports\
    \ both, but v1 implementation only guarantees every-N-iterations; every-M-minutes\
    \ is accepted only when a long-running runner exists, otherwise validation warns\
    \ or rejects depending command context.\n\n- `.gitignore` behavior: all agree\
    \ config is committed; claude/codex update runtime paths, gemini cautions not\
    \ to ignore all `.consensus/`. Resolution: update `.gitignore` only for volatile\
    \ paths under `.consensus/tmp/`, `.consensus/cache/`, `.consensus/logs/`; never\
    \ ignore `.consensus/config.yaml`. Non-interactive defaults to updating these\
    \ markers unless `--no-update-gitignore` is supplied.\n\n- Patch authoring conflicts:\
    \ claude asks who wins; codex/gemini do not deeply resolve. Resolution: v1 default\
    \ `claude-only`; if `any-contributor`, non-Claude patches are candidate patches\
    \ and claude records accept/reject/merge in disposition. No automatic winner by\
    \ file order.\n\n- Artifact extension/naming: claude uses YAML, codex/gemini often\
    \ use JSON. Resolution: use YAML for config, manifests, decisions, and sealed\
    \ review-format artifacts; adapters may internally normalize JSON but lifecycle\
    \ artifacts remain YAML for consistency with existing sealed packets.\n\n- STILL_OPEN:\
    \ Exact semantics for failed/timed-out contributors in workflow #4. Recommended\
    \ default for implementation: count timeout as an explicit non-approval for strict/unanimous\
    \ rules, but record `status: timed_out` separately from `rejected`; allow future\
    \ configurable quorum shrink only after operator approval.\n\n## Part 3 - Final\
    \ Converged Design\n\n### Section A - `consensus init` CLI Surface\n\nSubcommands\
    \ and modes:\n\n- `consensus init`: interactive setup for `.consensus/config.yaml`.\n\
    - `consensus init --reconfigure`: load existing config, prompt with current values,\
    \ show diff, validate, and write atomically after confirmation.\n- `consensus\
    \ init --non-interactive`: no prompts; supplied flags plus defaults must produce\
    \ a valid config.\n- `consensus init --accept-defaults`: non-interactive generation\
    \ using defaults, with any supplied flags overriding defaults.\n- `consensus init\
    \ --check`: validate existing config and print normalized effective config.\n\
    - `consensus init --print-defaults`: print generated default YAML without writing.\n\
    - `consensus init --dry-run`: show intended config and `.gitignore` changes without\
    \ writing.\n\nFlags:\n\n- `--workflow {3,4,post-review,propose-converge,advisory}`.\n\
    - `--contributors claude[,codex][,gemini]`.\n- `--independence {blind-first-reveal,visible-from-start,sequential}`.\n\
    - `--convergence {unanimous,strict-majority,inclusive-majority,advisory}`.\n-\
    \ `--finding-disposition {all-or-nothing,per-finding}`.\n- `--snapshot-trigger\
    \ {manual-only,on-iteration-close,periodic}`.\n- `--snapshot-every-iterations\
    \ N`.\n- `--snapshot-every-minutes M`.\n- `--patch-authoring {claude-only,any-contributor,none}`.\n\
    - `--primary-model-codex ID`, `--primary-model-gemini ID`.\n- `--iteration-timeout-seconds\
    \ N`, `--stall-silence-seconds N`.\n- `--config PATH`, default `.consensus/config.yaml`.\n\
    - `--update-gitignore` / `--no-update-gitignore`.\n- `--force`, for confirmed\
    \ overwrites in non-interactive contexts.\n\nInteractive flow:\n\n1. Detect repo\
    \ root, existing config, project type, and available AI CLIs.\n2. Ask workflow\
    \ mode. Default: `propose-converge` if at least two contributors are available,\
    \ else `post-review`.\n3. Ask contributor pool. Default: detected contributors\
    \ including `claude`; v1 requires `claude`.\n4. Ask independence model. Default:\
    \ `blind-first-reveal` for workflow #4, `visible-from-start` for workflow #3/advisory.\n\
    5. Ask convergence rule. Default: `strict-majority` for three contributors, `unanimous`\
    \ for two, `advisory` for advisory workflow.\n6. Ask finding disposition. Default:\
    \ `per-finding` for workflow #4, `all-or-nothing` otherwise.\n7. Ask snapshot\
    \ trigger. Default: `on-iteration-close`; if periodic, ask iteration cadence and\
    \ optionally time cadence.\n8. Ask patch authoring. Default: `claude-only`.\n\
    9. Ask timeout/model overrides only in advanced prompt path, or accept defaults\
    \ in normal path.\n10. Show normalized YAML preview, validation warnings, and\
    \ `.gitignore` diff.\n11. Confirm write.\n\nNon-interactive example:\n\n```sh\n\
    consensus init --non-interactive --workflow 4 --contributors claude,codex,gemini\
    \ --independence blind-first-reveal --convergence strict-majority --finding-disposition\
    \ per-finding --snapshot-trigger on-iteration-close --patch-authoring claude-only\n\
    ```\n\nIdempotency:\n\n- If config is absent, create it.\n- If config exists and\
    \ no changes are requested, exit `0` with no rewrite.\n- If config exists and\
    \ requested flags differ, require `--reconfigure` or `--force`; otherwise exit\
    \ with a concise diff.\n- Writes are atomic via temp file then rename.\n- `.gitignore`\
    \ edits are additive, bracketed with `# consensus-mcp` markers, and deduplicated.\n\
    \n### Section B - `.consensus/config.yaml` Schema\n\nCanonical schema:\n\n```yaml\n\
    schema_version: 1\nproject:\n  name: null\n  config_created_at_utc: null\nworkflow:\n\
    \  mode: propose-converge\n  independence: blind-first-reveal\ncontributors:\n\
    \  enabled: [claude, codex, gemini]\n  adapters:\n    claude:\n      role: orchestrator\n\
    \      can_propose: true\n      can_review: true\n      can_converge: true\n \
    \   codex:\n      command: codex\n      model: gpt-5.5\n      sandbox_mode: read-only\n\
    \      can_propose: true\n      can_review: true\n      can_converge: true\n \
    \   gemini:\n      command: gemini\n      model: gemini-2.5-pro\n      approval_mode:\
    \ plan\n      can_propose: true\n      can_review: true\n      can_converge: true\n\
    convergence:\n  rule: strict-majority\n  finding_disposition: per-finding\n  max_rounds:\
    \ 3\nsnapshots:\n  trigger: on-iteration-close\n  periodic:\n    every_iterations:\
    \ null\n    every_minutes: null\n  branch: consensus-state-snapshots\n  retention:\
    \ unbounded\npatches:\n  authoring: claude-only\n  max_patch_lines: 600\nartifacts:\n\
    \  root: consensus-state\n  seal_outputs: true\ndefaults:\n  iteration_timeout_seconds:\
    \ 600\n  stall_silence_seconds: 180\n  pre_first_byte_silence_seconds: 600\n```\n\
    \nTypes and validation:\n\n- `schema_version` is required integer `1`.\n- `workflow.mode`\
    \ stores `post-review`, `propose-converge`, or `advisory`; CLI aliases `3` and\
    \ `4` normalize to semantic names.\n- `contributors.enabled` is a non-empty unique\
    \ list from `claude`, `codex`, `gemini`; v1 requires `claude`.\n- `workflow.mode:\
    \ propose-converge` requires at least two contributors.\n- `convergence.rule:\
    \ advisory` is required when `workflow.mode: advisory`.\n- `strict-majority` with\
    \ two contributors behaves like unanimous and emits a warning; with one contributor\
    \ it is invalid.\n- `inclusive-majority` with two contributors is valid but warns\
    \ that ties pass.\n- `patches.authoring: any-contributor` means non-Claude patches\
    \ are candidate patches; claude final disposition chooses.\n- `snapshots.trigger:\
    \ periodic` requires at least one periodic field. Non-periodic triggers require\
    \ both periodic fields null.\n- Unknown top-level keys are warnings when `x-`\
    \ prefixed and errors otherwise for schema v1.\n\nDefaults:\n\n- New generated\
    \ config: workflow #4 if at least two contributors, else workflow #3.\n- Missing\
    \ legacy config: synthesized schema v0 legacy behavior for runtime compatibility\
    \ only.\n- New workflow #4: `blind-first-reveal`, `strict-majority` for three\
    \ contributors, `per-finding`, `on-iteration-close`, `claude-only` patches.\n\
    - Workflow #3: `visible-from-start`, `unanimous` for two contributors, `all-or-nothing`,\
    \ `on-iteration-close`, `claude-only` patches.\n\n### Section C - Workflow Engine\
    \ Integration\n\nModules:\n\n- `consensus_mcp/config.py`: load, normalize, validate,\
    \ and render effective config.\n- `consensus_mcp/workflow_engine.py`: plan and\
    \ execute iteration phases.\n- `consensus_mcp/contributors/`: adapter implementations\
    \ for `claude`, `codex`, `gemini`.\n\nRead model:\n\n- At iteration start, discover\
    \ repo root and load `.consensus/config.yaml`.\n- Normalize aliases and defaults\
    \ once.\n- Validate before dispatch.\n- Copy normalized config into the iteration\
    \ directory as `effective-config.yaml`.\n- Record `schema_version` and `config_sha256`\
    \ in sealed packets.\n- Do not reread config mid-iteration unless a future explicit\
    \ replan command creates a new sealed event.\n\nAdapter interface:\n\n```python\n\
    class ContributorAdapter:\n    def propose(self, problem_statement_path, iteration_dir,\
    \ *, blind: bool) -> Path: ...\n    def review(self, target_path, iteration_dir)\
    \ -> Path: ...\n    def converge(self, iteration_dir, proposal_paths, round_number:\
    \ int) -> Path: ...\n```\n\nWorkflow behavior:\n\n- `post-review`: claude produces\
    \ implementation/plan artifact first; enabled non-Claude contributors review;\
    \ convergence evaluates review results.\n- `propose-converge`: all enabled contributors\
    \ receive blind proposal packets; outputs are sealed; reveal phase dispatches\
    \ convergence packets; final decision records vote counts, selected plan, unresolved\
    \ questions, and finding disposition.\n- `advisory`: contributors produce recommendations;\
    \ claude records final decision without quorum gate.\n- `sequential`: contributor\
    \ order is the order in `contributors.enabled`; each phase records visible prior\
    \ artifacts.\n\nArtifact lifecycle:\n\n- `effective-config.yaml` at iteration\
    \ start.\n- `<contributor>-proposal.yaml` for workflow #4 blind outputs.\n- `proposal-manifest.yaml`\
    \ after blind phase, listing contributor hashes.\n- `convergence-round-N-<contributor>.yaml`\
    \ for convergence responses.\n- `convergence-decision.yaml` with rule evaluation\
    \ and rationale.\n- `finding-disposition.yaml` when `per-finding` is enabled.\n\
    - `converged-plan.yaml` as the final implementation input.\n\nExisting `_dispatch_codex.py`\
    \ and `_dispatch_gemini.py` remain CLI invocation layers. New contributor adapters\
    \ call them with phase-specific prompt templates.\n\n### Section D - Migration\
    \ Plan\n\nExisting repos without config:\n\n- Historical reads synthesize schema\
    \ v0 and never rewrite old iterations.\n- New v1 runs without config enter legacy\
    \ mode: workflow #3, claude orchestrator, codex/gemini review according to available\
    \ historical behavior, all-or-nothing disposition, claude-only patches.\n- Emit\
    \ `legacy_mode_activated` once per session and include effective legacy config\
    \ in the new iteration for auditability.\n- Documentation recommends `consensus\
    \ init --from-legacy` to write equivalent v1 config.\n\nNaming migration:\n\n\
    - New implementation uses contributor/proposal/convergence vocabulary.\n- Keep\
    \ `reviewer.dispatch_codex` and `reviewer.dispatch_gemini` as deprecated compatibility\
    \ aliases through v1.x.\n- Deprecation warnings go to CLI/audit logs, not sealed\
    \ review content.\n- Do not rename old artifacts.\n\nTests:\n\n- Table-test config\
    \ normalization and validation for every dimension.\n- Snapshot-test generated\
    \ YAML from defaults, flags, and reconfigure flows.\n- CLI tests for absent config,\
    \ existing same config, existing changed config, `--dry-run`, `--check`, `.gitignore`\
    \ marker dedupe, and non-interactive invalid combos.\n- Engine tests with fake\
    \ adapters only: approve, reject, timeout, rotating convergence, and malformed\
    \ artifact.\n- Assert dispatch order, blind input isolation, proposal sealing\
    \ before reveal, config hash capture, convergence rule outcomes, and per-finding\
    \ disposition.\n- Real AI smoke tests remain opt-in via environment variable.\n\
    \n### Section E - Open Questions\n\n- Timeout semantics should be confirmed by\
    \ the maintainer before implementation hardens them. Proposed v1 default: timeout\
    \ is non-approval, separately labeled `timed_out`.\n- Whether minute-based periodic\
    \ snapshots should be rejected outside long-running runner contexts or accepted\
    \ with warning needs operator preference.\n- Future non-Claude orchestrators should\
    \ wait for schema v2 rather than complicating v1.\n- Stable canonical finding\
    \ IDs for per-finding convergence should be generated during proposal normalization\
    \ before reveal-phase voting."
  patch_not_proposed_reason: Design convergence only; iter-0016+ implements after
    consensus.
  patch_proposal: null
