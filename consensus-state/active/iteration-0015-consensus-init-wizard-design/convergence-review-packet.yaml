    docs/design-consults/iter-0015-consensus-init-design-challenge.md: "# Design challenge: iter-0015 — consensus init wizard + .consensus/config.yaml schema\n\n**Workflow #4 BLIND DESIGN CHALLENGE.** You (the reading contributor — claude, codex, or gemini) are one of three independent contributors. Each of you will receive THIS document, with NO visibility into the other contributors' proposals. Author your own complete design proposal. After all three are sealed, the proposals will be revealed and you'll be asked to converge.\n\n## Background\n\n`consensus-mcp` orchestrates cross-AI code review. The current state has hardcoded assumptions: workflow #3 (apply-then-review) by default, codex always-on, claude as privileged orchestrator. The maintainer has determined these are **not universal** — every project should pick its own deliberation shape at initial setup.\n\nThe `docs/specs/consensus-onboarding-cli-spec.md` spec exists but was never implemented. iter-0015 must rectify both: build the missing init wizard AND make every workflow assumption operator-configurable.\n\n## Problem statement\n\nDesign (do NOT implement yet — iter-0016+ implements per converged design):\n\n1. **`consensus init` CLI wizard**: one-shot per-repo setup. Asks operator decisions across the dimensions below. Writes `.consensus/config.yaml` (committed) and updates `.gitignore` if needed.\n\n2. **`.consensus/config.yaml` schema**: typed, versioned, declarative. Covers every dimension below. Sensible defaults so the wizard can run non-interactively (`--non-interactive --workflow 4 --contributors claude,codex,gemini --convergence majority`).\n\n3. **Workflow engine**: at iteration start, the engine reads config and dispatches per operator's choices. Existing `reviewer.dispatch_codex` / `reviewer.dispatch_gemini` become pluggable adapters under the engine.\n\n## Configurability dimensions (the operator must be able to pick each)\n\n| Dimension | Options to support |\n|---|---|\n| **Workflow mode** | `#3` (post-review: claude implements, others audit) \\| `#4` (propose-converge: blind-first proposals + reveal-and-converge) \\| `advisory` (proposals are informational; claude decides) |\n| **Contributor pool** | enabled set: any subset of {claude, codex, gemini}; minimum 1 (claude alone allowed) |\n| **Independence model** | `blind-first-reveal` (canonical workflow #4) \\| `visible-from-start` (all contributors see all inputs) \\| `sequential` (1st proposes, 2nd critiques, 3rd synthesizes) |\n| **Convergence rule** | `unanimous` (all enabled must agree) \\| `strict-majority` (>N/2) \\| `inclusive-majority` (≥N/2, ties pass) \\| `advisory` (claude decides regardless of others) |\n| **Finding disposition granularity** | `all-or-nothing` (current: any blocking → reject whole packet) \\| `per-finding` (claude accepts/rejects/defers each finding individually, sub-converges per finding) |\n| **Snapshot trigger** | `manual-only` \\| `on-iteration-close` (auto-snapshot when iteration seals) \\| `periodic` (every N iterations or every M minutes) |\n| **Patch authoring permissions** | `claude-only` (default — only claude emits `patch_proposal`) \\| `any-contributor` (codex/gemini also authorized) \\| `none` (no contributor proposes patches; claude implements solo) |\n| **Init-wizard interactivity** | `interactive` (prompt for each dimension) \\| `non-interactive` (all flags supplied, no prompts) \\| `mixed` (operator can `--accept-defaults` and override specific flags) |\n\n## Your design proposal — required output structure\n\nEmit ONE finding only. severity: low (design + scoping).\n\nThe `recommendation` field MUST contain a structured design proposal covering:\n\n**Section A — `consensus init` CLI surface**\n- Subcommand structure (`init`, `init --reconfigure`, etc.)\n- Flag set (one per configurability dimension above, plus any you propose)\n- Interactive prompt flow (what questions, in what order, with what default highlights)\n- Non-interactive invocation form (full one-liner)\n- Idempotency semantics (re-running `init` on an existing `.consensus/config.yaml`)\n\n**Section B — `.consensus/config.yaml` schema**\n- Top-level keys + types\n- Per-dimension key paths and value types\n- Versioning (`schema_version: N`)\n- Defaults document (what each dimension defaults to when omitted)\n- Validation rules (which combinations are illegal, e.g., `workflow: 4` + `contributors: [claude]` only)\n\n**Section C — Workflow engine integration**\n- Where in the codebase the engine lives (new module, refactor of existing)\n- How the engine reads config at iteration start\n- How adapters (codex, gemini, future) are dispatched per config\n- Backward compat with existing iter-0001..0014 (most lack `.consensus/config.yaml`)\n- New artifact types (e.g., `claude-proposal.yaml` for workflow #4 blind phase) and their lifecycle\n\n**Section D — Migration plan**\n- Existing repos without `.consensus/config.yaml`: assume what default? Generate one? Refuse new iterations until init runs?\n- Renaming: `reviewer.dispatch_codex` is review-vocabulary; workflow #4 needs \"contributor\" or \"proposer\" vocabulary. Do we rename, alias, or keep the legacy name forever?\n- Tests: how to test the workflow engine without dispatching real codex/gemini\n\n**Section E — Open questions you flag**\n- Anything you'd want the maintainer (or other contributors) to weigh in on before implementation\n- Edge cases that may need further specification\n\n## Output format\n\nStandard codex/gemini review output:\n\n```json\n{\n  \"findings\": [\n    {\n      \"id\": \"<prefix>-rev-001\",\n      \"severity\": \"low\",\n      \"summary\": \"Design proposal for iter-0015 consensus init wizard + config schema\",\n      \"citation\": \"docs/design-consults/iter-0015-consensus-init-design-challenge.md:0\",\n      \"risk\": \"<3-5 sentence rationale for the highest-impact design choices>\",\n      \"recommendation\": \"<Sections A through E, as a single long string>\",\n      \"patch_proposal\": null,\n      \"patch_not_proposed_reason\": null\n    }\n  ],\n  \"goal_satisfied\": true,\n  \"goal_satisfied_rationale\": \"<one-sentence why this design meets the goal>\",\n  \"blocking_objections\": []\n}\n```\n\nYou may use Markdown formatting inside the `recommendation` string. Do NOT propose any code changes (no `patch_proposal`). Iter-0016+ implements after consensus converges.\n\n## Reminder\n\nYou are ONE of THREE independent contributors. The other two are also writing their own proposals against THIS SAME problem statement, without seeing your work. After all three seal, the proposals will be revealed for the convergence phase. Be creative and complete in this round — your proposal is your unique contribution, not a critique of someone else's.\n"
    consensus-state/active/iteration-0015-consensus-init-wizard-design/claude-proposal.yaml: "iteration_id: iteration-0015-consensus-init-wizard-design\nreviewer_id: claude-iteration-0015-consensus-init-wizard-design-1\npass_id: claude-iteration-0015-consensus-init-wizard-design-1-pass1\n# Workflow #4 BLIND PROPOSAL — claude (orchestrator) authoring an independent\n# design proposal BEFORE codex/gemini have been dispatched. This proposal is\n# sealed at <claude-sealed_at_utc> below. codex and gemini will receive the\n# same problem statement (docs/design-consults/iter-0015-consensus-init-design-challenge.md)\n# WITHOUT seeing this file. After all three contributors seal, convergence\n# phase begins.\nfindings:\n- id: claude-rev-001\n  severity: low\n  summary: Design proposal for iter-0015 consensus init wizard + config schema (claude's blind contribution)\n  citation: docs/design-consults/iter-0015-consensus-init-design-challenge.md:0\n  risk: |\n    The highest-impact choices in this proposal: (1) using a flat `.consensus/config.yaml`\n    schema with explicit defaults rather than a nested override-chain, because operators\n    need to see their full effective config at a glance and the override-chain pattern in\n    other tools (eslint, prettier) reliably confuses users. (2) Treating claude as a\n    structural orchestrator that ALSO produces its own claude-proposal.yaml — symmetric\n    contributor artifact — vs treating claude as a privileged author whose proposal is\n    implicit in the goal_packet. The symmetric model is what the maintainer corrected\n    me on twice today; it costs orchestrator-loop complexity but eliminates a real\n    asymmetry. (3) Legacy mode (no .consensus/config.yaml) maps to workflow #3 + codex-only\n    so existing iter-0001..0014 don't break; consensus init is opt-in for now and only\n    becomes mandatory at a future major version.\n  recommendation: |\n    # Section A — `consensus init` CLI surface\n\n    ## Subcommands\n\n    - `consensus init` — interactive wizard (default behavior)\n    - `consensus init --reconfigure` — re-prompts, overwrites existing config (asks \"reconfigure? [y/N]\" first)\n    - `consensus init --non-interactive <flags>` — script-friendly; refuses to prompt; all dimensions must be supplied or default\n    - `consensus init --accept-defaults [overrides]` — non-interactive with defaults; specific flags override\n    - `consensus init --dry-run` — show what would be written without modifying anything\n\n    Exit codes: 0 = config written, 1 = user abort, 2 = invalid combo, 3 = AI CLI verification failed, 4 = config already exists (without --reconfigure)\n\n    ## Flag set (one per configurability dimension)\n\n    ```\n    --workflow {3,4,advisory}                 default: 4 if ≥2 contributors detected, else 3\n    --contributors claude[,codex][,gemini]    default: all that are installed+authed\n    --independence {blind-first-reveal,visible-from-start,sequential}\n                                              default: blind-first-reveal if workflow=4, visible if workflow=3\n    --convergence {unanimous,strict-majority,inclusive-majority,advisory}\n                                              default: strict-majority for ≥3 contributors, unanimous for 2\n    --disposition {all-or-nothing,per-finding}\n                                              default: per-finding for workflow=4, all-or-nothing for #3\n    --snapshot-trigger {manual,on-close,periodic:N,periodic:Tm}\n                                              default: on-close\n    --patch-author {claude,any,none}          default: claude\n    --interactivity {interactive,non-interactive,mixed}\n                                              implicit via subcommand variant; explicit override for testing\n    --primary-model-codex <id>                default: gpt-5.5\n    --primary-model-gemini <id>               default: gemini-2.5-pro\n    --iteration-timeout-seconds <int>         default: 600\n    --stall-silence-seconds <int>             default: 180 (allows env var override per existing infra)\n    ```\n\n    ## Interactive prompt flow\n\n    ```\n    Scanning project...\n      ✓ git repo detected (branch: main)\n      ✓ Python project (pyproject.toml present)\n      ✓ README.md found\n    Detecting AI CLIs...\n      ✓ claude     → /usr/local/bin/claude (v1.x)\n      ✓ codex      → /usr/bin/codex (codex-cli 0.130.0)\n      ✓ gemini     → /usr/bin/gemini (0.43.0-preview.0)\n\n    Which workflow mode?\n      [1] #3 — post-review (claude implements, others audit)         [faster, riskier]\n      [2] #4 — propose-converge (all 3 propose, reveal, converge)   [slower, lower-regret]\n      [3] advisory — proposals are informational; claude decides    [for hot-patches]\n    Default: 2 (workflow #4)\n    > _\n\n    Which contributors should participate?\n      [a] claude only        (solo)\n      [b] claude + codex     (2-AI consensus)\n      [c] claude + gemini    (2-AI consensus)\n      [d] claude + codex + gemini  (3-AI consensus, blind-first)\n    Default: d\n    > _\n\n    Independence model? (only meaningful for workflow #4 with ≥2 contributors)\n      [1] blind-first-reveal — each contributor proposes in isolation, all reveal at once\n      [2] visible-from-start — all contributors see all inputs (collaborative drafting)\n      [3] sequential — 1st proposes, 2nd critiques, 3rd synthesizes\n    Default: 1\n    > _\n\n    Convergence rule? (when do contributors agree?)\n      [1] unanimous           (all enabled must goal_satisfied=true)\n      [2] strict-majority     (>N/2 must agree; ties refuse)\n      [3] inclusive-majority  (≥N/2; ties pass)\n      [4] advisory            (claude decides regardless of others)\n    Default: 2\n    > _\n\n    Finding disposition granularity?\n      [1] all-or-nothing      (any blocking finding rejects the whole iteration)\n      [2] per-finding         (claude accepts/rejects each finding individually)\n    Default: 2\n    > _\n\n    Snapshot trigger?\n      [1] manual-only         (operator runs snapshot subcommand)\n      [2] on-iteration-close  (auto-snapshot when iteration seals)\n      [3] periodic:5          (every 5 iterations)\n      [4] periodic:30m        (every 30 minutes)\n    Default: 2\n    > _\n\n    Patch authoring — who can emit `patch_proposal`?\n      [1] claude only         (current behavior; reviewer suggests via prose only)\n      [2] any contributor     (codex/gemini can also propose patches)\n      [3] none                (claude implements solo; no suggested patches)\n    Default: 1\n    > _\n\n    Summary:\n      workflow:          #4 (propose-converge)\n      contributors:      claude, codex, gemini\n      independence:      blind-first-reveal\n      convergence:       strict-majority\n      disposition:       per-finding\n      snapshot trigger:  on-iteration-close\n      patch authoring:   claude only\n\n    Writing .consensus/config.yaml ...\n    Updating .gitignore (excludes runtime state) ...\n    ✓ Setup complete. Try: consensus run \"fix a typo in README\"\n    ```\n\n    ## Non-interactive form\n\n    ```\n    consensus init --non-interactive \\\n        --workflow 4 \\\n        --contributors claude,codex,gemini \\\n        --independence blind-first-reveal \\\n        --convergence strict-majority \\\n        --disposition per-finding \\\n        --snapshot-trigger on-close \\\n        --patch-author claude\n    ```\n\n    ## Idempotency\n\n    Refuses to overwrite existing `.consensus/config.yaml` unless `--reconfigure` flag is passed. Reconfigure prompts with current values as defaults and shows a diff before writing. `--non-interactive --reconfigure` updates fields specified by flags and preserves the rest.\n\n    # Section B — `.consensus/config.yaml` schema\n\n    ```yaml\n    schema_version: 1\n    project:\n      name: <derived from cwd basename>\n      detected_at_utc: <timestamp of init run>\n    workflow:\n      mode: 4              # 3 | 4 | advisory\n      independence: blind-first-reveal  # blind-first-reveal | visible-from-start | sequential\n      convergence: strict-majority      # unanimous | strict-majority | inclusive-majority | advisory\n      finding_disposition: per-finding  # all-or-nothing | per-finding\n      max_convergence_rounds: 3         # before surface-to-operator\n    contributors:\n      enabled: [claude, codex, gemini]\n      claude:\n        role: orchestrator              # always orchestrator; only contributor that runs the loop\n        can_propose: true               # writes claude-proposal.yaml in workflow #4\n        can_review: true                # writes claude-review.yaml in workflow #3\n      codex:\n        cli_path: codex                 # operator-overridable; resolved via shutil.which\n        model: gpt-5.5\n        can_propose: true\n        can_review: true\n        sandbox_mode: read-only         # --sandbox flag passed to codex CLI\n      gemini:\n        cli_path: gemini\n        model: gemini-2.5-pro\n        can_propose: true\n        can_review: true\n        approval_mode: plan             # --approval-mode flag passed to gemini CLI\n    snapshot:\n      trigger: on-iteration-close       # manual | on-iteration-close | periodic\n      retention: unbounded              # unbounded | last:N | older-than:D | manual\n      branch: consensus-state-snapshots\n    patch_authoring:\n      authorized_contributors: [claude] # subset of enabled contributors\n      max_patch_size: 600               # diff lines; existing iter convention\n    defaults:\n      iteration_timeout_seconds: 600\n      stall_silence_seconds: 180\n      pre_first_byte_silence_seconds: 600  # iter-0007 F4 finally implemented\n    ```\n\n    ## Validation rules\n\n    1. `workflow.mode == 4` requires `len(contributors.enabled) >= 2`. Workflow #4 with 1 contributor is meaningless.\n    2. `workflow.mode == advisory` requires `len(contributors.enabled) >= 1`.\n    3. `workflow.convergence == \"unanimous\"\
      ` valid for any N.\n    4. `workflow.convergence == \"strict-majority\"` with N=2 reduces to unanimous (warn the operator).\n    5. `patch_authoring.authorized_contributors` must be a subset of `contributors.enabled`.\n    6. `contributors.claude` is REQUIRED (claude is always enabled; the orchestrator).\n    7. If `workflow.mode == \"advisory\"`, `workflow.convergence` defaults to `advisory` and warns if set otherwise.\n    8. `schema_version: 1` is the only currently-supported version. Future versions migrate.\n\n    ## Defaults document\n\n    | Dimension | Default |\n    |---|---|\n    | workflow.mode | 4 |\n    | workflow.independence | blind-first-reveal |\n    | workflow.convergence | strict-majority |\n    | workflow.finding_disposition | per-finding |\n    | workflow.max_convergence_rounds | 3 |\n    | contributors.enabled | [claude, codex, gemini] (auto-detected) |\n    | snapshot.trigger | on-iteration-close |\n    | patch_authoring.authorized_contributors | [claude] |\n    | iteration_timeout_seconds | 600 |\n    | stall_silence_seconds | 180 |\n\n    # Section C — Workflow engine integration\n\n    ## New module: `consensus_mcp/_workflow_engine.py`\n\n    Pure-Python orchestration layer that:\n\n    1. Loads `.consensus/config.yaml` at iteration start (or applies legacy defaults).\n    2. Validates config against schema.\n    3. Selects workflow runner based on `workflow.mode`:\n       - `Workflow3Runner`: claude proposes + implements → other contributors review (current pattern, pluggable).\n       - `Workflow4Runner`: blind-first-reveal-converge orchestration.\n       - `AdvisoryRunner`: dispatch contributors for info; claude decides without consensus gate.\n    4. Each runner uses a `ContributorAdapter` per enabled contributor — abstract base with `propose(problem_statement) → proposal_artifact_path` and `review(target_path) → review_artifact_path`.\n    5. Engine writes per-phase artifacts:\n       - Workflow #4: `claude-proposal.yaml`, `codex-proposal.yaml`, `gemini-proposal.yaml` (blind phase), `convergence-round-N.yaml` (reveal phase).\n       - Workflow #3: existing pattern — `codex-review.yaml`, `gemini-review.yaml` (review phase).\n\n    ## Adapter abstraction\n\n    ```python\n    class ContributorAdapter:\n        def __init__(self, config): ...\n        def propose(self, problem_statement_path, iteration_dir, *, blind: bool = True) -> Path:\n            \"\"\"Emit <contributor>-proposal.yaml. Blind = don't include peer proposals in prompt.\"\"\"\n        def review(self, target_path, iteration_dir) -> Path:\n            \"\"\"Emit <contributor>-review.yaml. Existing review path.\"\"\"\n        def converge(self, iteration_dir, all_proposals: list[Path]) -> Path:\n            \"\"\"Reveal-phase: emit <contributor>-convergence-roundN.yaml that picks/synthesizes.\"\"\"\n    ```\n\n    Existing `_dispatch_codex.py` and `_dispatch_gemini.py` become the underlying CLI invokers; `ContributorAdapter` is a thin wrapper that selects prompt template based on phase (propose vs review vs converge).\n\n    ## Backward compat with iter-0001..0014\n\n    Iterations without `.consensus/config.yaml`: engine logs `legacy_mode` event and uses workflow #3 + codex-only + all-or-nothing + claude-patch-author defaults. Identical to current behavior. No breakage.\n\n    `consensus init` is opt-in until a future major version (v2.x?) makes config mandatory.\n\n    ## New artifact types\n\n    For workflow #4:\n\n    - `<iter_dir>/claude-proposal.yaml` — claude's blind proposal (orchestrator-written)\n    - `<iter_dir>/codex-proposal.yaml` — codex's blind proposal (via codex CLI)\n    - `<iter_dir>/gemini-proposal.yaml` — gemini's blind proposal (via gemini CLI)\n    - `<iter_dir>/convergence-round-N.yaml` — each contributor's view of the converged plan (N rounds until consensus)\n    - `<iter_dir>/converged-plan.yaml` — final agreed plan after convergence (the \"winner\")\n\n    Sealing semantics: all proposal artifacts seal through `review.write_and_seal` (T6) at write time, same independence_attestation pattern.\n\n    # Section D — Migration plan\n\n    ## Existing repos without `.consensus/config.yaml`\n\n    Engine detects missing config → enters legacy mode automatically. Logs a one-time `legacy_mode_activated` event. README mentions `consensus init` for the new wizard.\n\n    ## Naming evolution\n\n    - Keep `reviewer.dispatch_codex` / `reviewer.dispatch_gemini` as legacy MCP tool names through v1.x.\n    - Add new MCP tool names: `contributor.propose_codex` / `contributor.propose_gemini` / `contributor.converge_codex` / `contributor.converge_gemini` for workflow #4.\n    - Existing `reviewer.dispatch_*` continue to work, mapped internally to `contributor.review_*`.\n    - At v2.0, deprecate the `reviewer.*` aliases and rename to `contributor.*` exclusively.\n\n    ## Tests\n\n    - Workflow engine has fake `ContributorAdapter` subclasses (`FakeAlwaysApprove`, `FakeAlwaysBlock`, `FakeRotating`) for fast unit tests — no real CLI dispatch.\n    - Real codex/gemini smoke tests opt-in via env var `CONSENSUS_MCP_RUN_REAL_AI_SMOKE=1` (parallel to existing `CONSENSUS_MCP_RUN_REAL_CODEX_SMOKE`).\n    - Workflow #4 end-to-end test uses 3 fake adapters with scripted proposals + scripted convergence behavior.\n\n    ## Schema migration\n\n    `schema_version: 1` ships in iter-0016 (the implementation iteration). When we need to break schema (e.g., adding required fields), bump to 2 and provide a `consensus init --migrate` subcommand that reads the v1 config and writes the v2 equivalent.\n\n    # Section E — Open questions for convergence phase\n\n    1. **Convergence round limit**: I proposed `max_convergence_rounds: 3`. What's the right number? Too few = premature halt. Too many = unbounded cost. Other contributors weigh in.\n\n    2. **Per-finding disposition**: when claude rejects a finding from codex, does that constitute a \"no\" vote from claude AGAINST codex's proposal, or is it neutral? I lean toward neutral — claude is the synthesizer, not a voting peer at the disposition step. Confirm.\n\n    3. **Patch authoring conflict resolution**: if `patch_authoring.authorized_contributors == [claude, codex]` and both propose patches on the same finding, who wins? Proposed: claude (orchestrator privilege). Alternative: codex's patch is shown to claude who chooses to accept/reject/merge. Other contributors weigh in.\n\n    4. **Rate-limit / cost awareness**: should config include per-contributor budget caps (max dispatches per iteration, max tokens per dispatch)? Or is this an operator-external concern? Proposed: out of scope for v1, document operational guidance only.\n\n    5. **Snapshot trigger=on-iteration-close**: hook point is `audit_append_event` for `iteration_closed` events. Engine subscribes. Coordinate with iter-0012's deferred trigger work (F7a was manual-only for iter-0013). Confirm timing: pre-close (capture state before sealing) or post-close (after seal lands)? Proposed: post-close.\n\n    6. **Backward-compat warning fatigue**: should engine emit `legacy_mode_activated` once per iteration, or once per session, or just once total in the repo's audit log? Proposed: once per session (low noise, still visible).\n\n    7. **Migration path for the iter-0011 gemini adapter**: the current `_dispatch_gemini.py` is review-shaped. Should it grow a `propose()` method, or do we factor out a base and write a NEW `_propose_gemini.py`? Proposed: grow the existing module — it's already cleanly factored from iter-0010 _dispatch_base.\n\n    8. **Wizard verbosity**: should the interactive flow show full default values for every option, or only ask about non-defaults if the operator chooses \"advanced\" mode? Proposed: hybrid — ask all dimensions but show defaults clearly so \"press enter to accept\" is one-keystroke per dimension.\n  patch_not_proposed_reason: null\n  patch_proposal: null\ngoal_satisfied: true\ngoal_satisfied_rationale: This claude blind proposal covers Sections A through E of the design challenge in concrete detail and surfaces 8 open questions for the convergence phase to address. No code is proposed (per scope); iter-0016+ implements after consensus.\nblocking_objections: []\nindependence_attestation:\n  method: workflow_4_blind_authoring\n  reviewer_isolated_by_construction: true\n  no_peer_review_visible_at_dispatch: true\n  input_sources:\n  - docs/design-consults/iter-0015-consensus-init-design-challenge.md (the shared problem statement)\n  - memory/project_workflows.md (workflow #3 vs #4 distinction)\n  - memory/project_init_configurability.md (operator-choice dimensions)\n  - memory/project_iteration_persistence.md (snapshot context)\n  see_dispatch_provenance_for_input_hashes: false\nsealed_at_utc: '2026-05-13T03:50:00Z'\n"
    consensus-state/active/iteration-0015-consensus-init-wizard-design/codex-review.yaml: "iteration_id: iteration-0015-consensus-init-wizard-design\nreviewer_id: codex-iteration-0015-consensus-init-wizard-design-1\npass_id: codex-iteration-0015-consensus-init-wizard-design-1-pass1\nfindings:\n- id: codex-rev-001\n  severity: low\n  summary: Design proposal for iter-0015 consensus init wizard + config schema\n  citation: docs/design-consults/iter-0015-consensus-init-design-challenge.md:0\n  risk: 'The highest-impact choice is to make workflow policy declarative and read\n    once at iteration start, so sealed packets can record the exact config that governed\n    dispatch. Backward compatibility should not silently preserve hardcoded workflow\n    #3 forever; legacy defaults are acceptable only as an explicit v0 compatibility\n    mode with warnings. The schema should separate contributors, workflow shape, convergence,\n    disposition, snapshots, and patch permissions so future adapters can be added\n    without changing existing config semantics. The init wizard should be idempotent\n    and diff-aware because configuration becomes a committed project contract, not\n    transient local state.'\n  recommendation: \"## Section A - `consensus init` CLI surface\\n\\nSubcommands:\\n-\\\n    \\ `consensus init`: create `.consensus/config.yaml` and ensure local runtime artifacts\\\n    \\ are ignored.\\n- `consensus init --reconfigure`: load existing config, prompt\\\n    \\ with current values as defaults, write atomically after validation.\\n- `consensus\\\n    \\ init --check`: validate existing config, print normalized effective config,\\\n    \\ exit `0` valid, `2` missing, `3` invalid.\\n- `consensus init --print-defaults`:\\\n    \\ emit default YAML to stdout without writing.\\n\\nFlags:\\n- `--workflow {3,4,advisory}`\\\n    \\ maps to post-review, propose-converge, advisory.\\n- `--contributors claude,codex,gemini`\\\n    \\ enables contributor pool; minimum one.\\n- `--independence {blind-first-reveal,visible-from-start,sequential}`.\\n\\\n    - `--convergence {unanimous,strict-majority,inclusive-majority,advisory}`.\\n-\\\n    \\ `--finding-disposition {all-or-nothing,per-finding}`.\\n- `--snapshot-trigger\\\n    \\ {manual-only,on-iteration-close,periodic}`.\\n- `--snapshot-every-iterations\\\n    \\ N` and `--snapshot-every-minutes M`, required as applicable for `periodic`.\\n\\\n    - `--patch-authoring {claude-only,any-contributor,none}`.\\n- `--interactive`,\\\n    \\ `--non-interactive`, `--accept-defaults`.\\n- `--reconfigure`, `--force`, `--dry-run`,\\\n    \\ `--config PATH` default `.consensus/config.yaml`.\\n\\nInteractive prompt flow:\\n\\\n    1. Confirm repository root and target config path. Default: current git root plus\\\n    \\ `.consensus/config.yaml`.\\n2. Choose workflow mode. Highlight default `3` for\\\n    \\ compatibility; describe `4` as blind proposals then convergence.\\n3. Choose\\\n    \\ contributors. Default: `claude,codex`; allow `claude` alone; warn when workflow\\\n    \\ `4` has one contributor because blind consensus degenerates.\\n4. Choose independence\\\n    \\ model. Default depends on workflow: `blind-first-reveal` for workflow `4`, `visible-from-start`\\\n    \\ for workflow `3` and `advisory`.\\n5. Choose convergence rule. Default: `strict-majority`\\\n    \\ when contributors count >= 3, `unanimous` when count <= 2, `advisory` for advisory\\\n    \\ workflow.\\n6. Choose finding disposition. Default: `all-or-nothing` for compatibility.\\n\\\n    7. Choose patch authoring permission. Default: `claude-only`.\\n8. Choose snapshot\\\n    \\ trigger. Default: `on-iteration-close`; if `periodic`, ask iteration and minute\\\n    \\ cadence.\\n9. Show normalized YAML preview and validation result. Ask `Write\\\n    \\ config?` unless non-interactive.\\n10. Offer `.gitignore` update for volatile\\\n    \\ paths: `.consensus/tmp/`, `.consensus/cache/`, `.consensus/logs/`, while leaving\\\n    \\ `.consensus/config.yaml` committed.\\n\\nNon-interactive one-liner:\\n`consensus\\\n    \\ init --non-interactive --workflow 4 --contributors claude,codex,gemini --independence\\\n    \\ blind-first-reveal --convergence strict-majority --finding-disposition per-finding\\\n    \\ --snapshot-trigger on-iteration-close --patch-authoring any-contributor`\\n\\n\\\n    Idempotency:\\n- If config is absent, create it.\\n- If config exists and no `--reconfigure`,\\\n    \\ exit `0` when effective config already matches supplied flags; exit `4` with\\\n    \\ a concise diff when supplied flags would change it.\\n- `--reconfigure` permits\\\n    \\ updates and preserves unknown future keys only if their parent `schema_version`\\\n    \\ is newer and `--force` is supplied; otherwise refuse with exit `3`.\\n- Writes\\\n    \\ are atomic: create temp file in `.consensus/`, fsync where supported, then rename.\\n\\\n    - `.gitignore` updates are additive and bracketed with `# consensus-mcp` markers;\\\n    \\ reruns do not duplicate entries.\\n\\n## Section B - `.consensus/config.yaml`\\\n    \\ schema\\n\\nProposed YAML:\\n```yaml\\nschema_version: 1\\nproject:\\n  config_created_by:\\\n    \\ consensus init\\n  config_created_at: null\\nworkflow:\\n  mode: 3\\n  independence:\\\n    \\ visible-from-start\\ncontributors:\\n  enabled:\\n    - claude\\n    - codex\\n \\\n    \\ adapters:\\n    claude:\\n      role: orchestrator\\n    codex:\\n      command:\\\n    \\ codex\\n    gemini:\\n      command: gemini\\nconvergence:\\n  rule: unanimous\\n\\\n    \\  finding_disposition: all-or-nothing\\npatches:\\n  authoring: claude-only\\nsnapshots:\\n\\\n    \\  trigger: on-iteration-close\\n  periodic:\\n    every_iterations: null\\n    every_minutes:\\\n    \\ null\\nartifacts:\\n  root: consensus-state\\n  seal_reviews: true\\n```\\n\\nTop-level\\\n    \\ keys and types:\\n- `schema_version`: integer, required. Initial value `1`.\\n\\\n    - `project`: object, optional metadata only; engine must not require timestamps\\\n    \\ for determinism.\\n- `workflow.mode`: enum string or integer normalized to strings\\\n    \\ `3`, `4`, `advisory`.\\n- `workflow.independence`: enum `blind-first-reveal`,\\\n    \\ `visible-from-start`, `sequential`.\\n- `contributors.enabled`: non-empty array\\\n    \\ of unique enum values `claude`, `codex`, `gemini`.\\n- `contributors.adapters`:\\\n    \\ object keyed by contributor id; adapter-specific settings validated by adapter.\\n\\\n    - `convergence.rule`: enum `unanimous`, `strict-majority`, `inclusive-majority`,\\\n    \\ `advisory`.\\n- `convergence.finding_disposition`: enum `all-or-nothing`, `per-finding`.\\n\\\n    - `patches.authoring`: enum `claude-only`, `any-contributor`, `none`.\\n- `snapshots.trigger`:\\\n    \\ enum `manual-only`, `on-iteration-close`, `periodic`.\\n- `snapshots.periodic.every_iterations`:\\\n    \\ nullable positive integer.\\n- `snapshots.periodic.every_minutes`: nullable positive\\\n    \\ integer.\\n- `artifacts.root`: string path relative to repo root, default `consensus-state`.\\n\\\n    - `artifacts.seal_reviews`: boolean, default `true`.\\n\\nDefaults when omitted:\\n\\\n    - `schema_version: 1` only when generating; loaded config must include it.\\n-\\\n    \\ `workflow.mode: 3`.\\n- `workflow.independence: visible-from-start`, except generated\\\n    \\ workflow `4` defaults to `blind-first-reveal`.\\n- `contributors.enabled: [claude,\\\n    \\ codex]` if available adapters include codex; otherwise `[claude]`.\\n- `convergence.rule:\\\n    \\ unanimous` for <=2 contributors, `strict-majority` for >=3 contributors, `advisory`\\\n    \\ for advisory workflow.\\n- `convergence.finding_disposition: all-or-nothing`.\\n\\\n    - `patches.authoring: claude-only`.\\n- `snapshots.trigger: on-iteration-close`.\\n\\\n    - `artifacts.root: consensus-state` and `artifacts.seal_reviews: true`.\\n\\nValidation\\\n    \\ rules:\\n- Unknown top-level keys are warnings for same schema version, errors\\\n    \\ for older engine unless `x-` prefixed.\\n- `contributors.enabled` must be unique\\\n    \\ and non-empty.\\n- `workflow.mode: 4` plus one contributor is legal but emits\\\n    \\ warning `W_DEGENERATE_BLIND_WORKFLOW`; it behaves as single sealed proposal\\\n    \\ plus no quorum.\\n- `workflow.mode: 3` with `patches.authoring: any-contributor`\\\n    \\ is illegal unless `convergence.finding_disposition: per-finding`, because post-review\\\n    \\ patch authorship otherwise collides with claude implementation ownership.\\n\\\n    - `workflow.mode: advisory` requires `convergence.rule: advisory`; other convergence\\\n    \\ rules are invalid.\\n- `convergence.rule: strict-majority` with one contributor\\\n    \\ is invalid; use `unanimous` or `advisory`.\\n- `convergence.rule: inclusive-majority`\\\n    \\ with two contributors is legal but warned because ties pass.\\n- `workflow.independence:\\\n    \\ sequential` requires at least two contributors unless explicitly `--force`d\\\n    \\ with warning.\\n- `snapshots.trigger: periodic` requires at least one of `every_iterations`\\\n    \\ or `every_minutes`; both null is invalid.\\n- Non-periodic snapshot trigger requires\\\n    \\ both periodic values null.\\n- Adapter commands must not contain shell metacharacter\\\n    \\ strings; store argv arrays in future if command arguments are needed.\\n\\n##\\\n    \\ Section C - Workflow engine integration\\n\\nEngine location:\\n- Add `consensus_mcp/config.py`\\\n    \\ for loading, normalizing, and validating `.consensus/config.yaml`.\\n- Add `consensus_mcp/workflow_engine.py`\\\n    \\ for iteration planning and state transitions.\\n- Add `consensus_mcp/contributors/`\\\n    \\ with adapters: `claude.py`, `codex.py`, `gemini.py`. Existing `reviewer.dispatch_codex`\\\n    \\ and `reviewer.dispatch_gemini` become compatibility wrappers around contributor\\\n    \\ adapters.\\n\\nConfig read model:\\n- At iteration start, engine discovers\
      \ repo\\\n    \\ root, loads `.consensus/config.yaml`, normalizes defaults, validates, then copies\\\n    \\ the effective config into the iteration directory as `effective-config.yaml`.\\n\\\n    - The sealed `goal_packet.yaml` records `config_sha256` and `schema_version` so\\\n    \\ later review can prove which rules applied.\\n- Config is not reread mid-iteration\\\n    \\ except by explicit `consensus iteration replan --allow-config-change`, which\\\n    \\ creates a new iteration event and seal.\\n\\nDispatch model:\\n- Engine constructs\\\n    \\ a contributor plan from `contributors.enabled` and `workflow.*`.\\n- Adapter\\\n    \\ interface: `prepare_input(iteration, contributor, phase)`, `dispatch(packet)`,\\\n    \\ `collect_result()`, `normalize_result()`.\\n- Workflow `3`: claude implementation\\\n    \\ artifact first, enabled non-claude contributors receive post-review packets\\\n    \\ according to convergence rule.\\n- Workflow `4`: all enabled contributors receive\\\n    \\ blind proposal packets with only shared inputs. Outputs are sealed as independent\\\n    \\ proposal artifacts. Reveal phase indexes proposals and dispatches convergence\\\n    \\ packets according to rule.\\n- Advisory: contributors produce recommendations;\\\n    \\ claude final decision artifact records accepted rationale without requiring\\\n    \\ quorum.\\n- Sequential independence: first enabled contributor proposes, second\\\n    \\ receives prior proposal and critiques, third synthesizes; order is explicit\\\n    \\ in `contributors.enabled`.\\n\\nBackward compatibility:\\n- Existing iterations\\\n    \\ `iter-0001` through `iter-0014` are read as legacy sealed artifacts. Do not\\\n    \\ rewrite them.\\n- Missing config for an existing historical iteration maps to\\\n    \\ `schema_version: 0`, `workflow.mode: 3`, `contributors.enabled: [claude,codex]`\\\n    \\ if codex artifact exists, and `convergence.rule: all existing hardcoded behavior`\\\n    \\ only for display/replay.\\n- New iterations in repos without config should fail\\\n    \\ closed after a grace command: `consensus run` exits `2` with `Run consensus\\\n    \\ init first`; `consensus run --legacy-defaults` may generate a v1 config matching\\\n    \\ legacy defaults.\\n\\nNew artifact types and lifecycle:\\n- `effective-config.yaml`:\\\n    \\ normalized config copied at iteration start.\\n- `proposal-packet.yaml`: contributor-specific\\\n    \\ sealed blind input for workflow `4`.\\n- `<contributor>-proposal.json`: structured\\\n    \\ proposal output, sealed before reveal.\\n- `proposal-manifest.yaml`: list of\\\n    \\ proposal hashes and contributors, created after blind phase closes.\\n- `reveal-packet.yaml`:\\\n    \\ convergence input containing all sealed proposal hashes and revealed content.\\n\\\n    - `<contributor>-convergence-review.json`: each contributor's convergence vote\\\n    \\ or critique.\\n- `convergence-decision.yaml`: final rule evaluation, vote counts,\\\n    \\ accepted findings, and rationale.\\n- `finding-disposition.yaml`: required when\\\n    \\ `per-finding`; maps finding ids to accepted/rejected/deferred plus sub-quorum\\\n    \\ evidence.\\n\\n## Section D - Migration plan\\n\\nRepos without `.consensus/config.yaml`:\\n\\\n    - For historical read-only commands, synthesize legacy config in memory and label\\\n    \\ it `schema_version: 0`.\\n- For commands that create new iterations, require\\\n    \\ config. Exit `2` with exact remediation: `consensus init --workflow 3 --contributors\\\n    \\ claude,codex --convergence unanimous`.\\n- Provide `consensus init --from-legacy`\\\n    \\ to write v1 YAML matching current behavior and commit-friendly ignore markers.\\n\\\n    \\nVocabulary migration:\\n- Introduce neutral terms `contributor`, `proposal`,\\\n    \\ `convergence`, and `adapter` in new modules and artifacts.\\n- Keep `reviewer.dispatch_codex`\\\n    \\ and `reviewer.dispatch_gemini` as deprecated aliases for one minor release cycle\\\n    \\ or until iter-0025, whichever is later.\\n- Alias wrappers should call `contributors.codex.dispatch()`\\\n    \\ and emit one deprecation warning in CLI logs, never inside sealed artifact content.\\n\\\n    - Do not rename old artifact files in previous iterations.\\n\\nTesting:\\n- Unit-test\\\n    \\ config normalization with table cases for every dimension and illegal combination.\\n\\\n    - Snapshot-test generated YAML from interactive defaults and non-interactive flags.\\n\\\n    - Use fake adapters implementing the contributor interface; they write deterministic\\\n    \\ JSON and never spawn real codex/gemini.\\n- Engine tests should assert dispatch\\\n    \\ plan order, sealed artifact names, config hash capture, and convergence outcomes\\\n    \\ for N=1, N=2, N=3.\\n- Add CLI tests for idempotency: absent config, existing\\\n    \\ same config, existing changed config, `--reconfigure`, `.gitignore` marker dedupe.\\n\\\n    - Add backward-compat tests that load old iteration fixtures without config and\\\n    \\ verify read-only replay succeeds while new iteration creation refuses until\\\n    \\ init.\\n\\n## Section E - Open questions for convergence phase\\n\\n- Should `workflow.mode`\\\n    \\ be stored as strings `post-review` and `propose-converge` instead of numeric\\\n    \\ `3` and `4`, while accepting `3` and `4` as CLI aliases?\\n- Is `claude` always\\\n    \\ required in `contributors.enabled`, or should the schema truly permit `codex,gemini`\\\n    \\ only for non-Claude orchestrators later?\\n- Should adapter settings store executable\\\n    \\ names only, or full argv arrays plus environment allowlists?\\n- Should `inclusive-majority`\\\n    \\ be available by default, given that two-contributor ties pass and may surprise\\\n    \\ operators?\\n- Does `per-finding` convergence need stable finding ids before\\\n    \\ reveal, or can the convergence phase assign canonical ids after proposal normalization?\\n\\\n    - Should `.consensus/config.yaml` include policy for model names and sandbox permissions,\\\n    \\ or keep those in adapter-local config outside this initial schema?\\n- Should\\\n    \\ `consensus init` modify `.gitignore` automatically in non-interactive mode,\\\n    \\ or require `--update-gitignore` to avoid unrequested workspace edits?\\n- What\\\n    \\ is the exact lifecycle for failed or timed-out contributors in workflow `4`:\\\n    \\ absent vote, reject vote, or configurable quorum shrink?\"\n  patch_not_proposed_reason: null\n  patch_proposal: null\ngoal_satisfied: true\ngoal_satisfied_rationale: The review emits exactly one low-severity design finding\n  with Sections A through E and no patch proposal, matching the blind proposal phase\n  requirements.\nblocking_objections: []\nindependence_attestation:\n  method: auto_codex_dispatch\n  reviewer_isolated_by_construction: true\n  no_peer_review_visible_at_dispatch: true\n  input_sources:\n  - goal_packet (path passed via --goal-packet)\n  - prompt_template (substituted by _build_prompt)\n  - review_target (path passed via --review-target; may be unspecified)\n  see_dispatch_provenance_for_input_hashes: true\ndispatch_provenance:\n  codex_version: codex-cli 0.130.0\n  prompt_sha256: 4865e5cdde424f8e7b76d6d06521bef340cb152d9d6c484148ba96ad966ce124\n  output_sha256: fd13f7a070a69774864d7e31add9ac963ee97cb312b0637d9813463be52f9631\n  schema_sha256: 90cb7fa1b2fa8731898b52df8d4ce482e2d9491acbc3ba53b4d309a6c69c8b53\n  goal_packet_sha256: 2fb13d94dc6a4ec4ceeecc76b4068ce6fa37f41723abc0b1190d24fbfcd97ee1\n  scope_signature: 78f0f2acd138cb4d3ada84a721b35a395ff3b3920b360492f6f0ffdfd72c0530\n  review_target_path: consensus-state/active/iteration-0015-consensus-init-wizard-design/review-packet.yaml\n  review_target_hash: 8697025e43579038b850f41545e40f138bfb25a9f790cd9f1970b35fe00082cf\nsealed_at_utc: '2026-05-13T03:58:16Z'\npacket_sha256: eaf19a3d66b326507ae533efb4ac51c3f79f4737f8fc241c40f960e7cfedb3c1\n"
    consensus-state/active/iteration-0015-consensus-init-wizard-design/gemini-review.yaml: "iteration_id: iteration-0015-consensus-init-wizard-design\nreviewer_id: gemini-iteration-0015-consensus-init-wizard-design-1\npass_id: gemini-iteration-0015-consensus-init-wizard-design-1-pass1\nfindings:\n- id: gemini-rev-001\n  severity: low\n  summary: Design proposal for iter-0015 consensus init wizard + config schema\n  citation: docs/design-consults/iter-0015-consensus-init-design-challenge.md:0\n  risk: 'The highest-impact design choices are: 1. Establishing a versioned, declarative\n    YAML schema as the source of truth, which moves away from hardcoded logic but\n    requires careful migration planning. 2. Introducing a new workflow engine to abstract\n    dispatch logic, which improves modularity but adds a layer of complexity that\n    must be rigorously tested. 3. Defining a non-disruptive migration path where existing\n    repositories default to a legacy mode, ensuring backward compatibility while encouraging\n    adoption of the new configuration.'\n  recommendation: \"### Section A \\u2014 `consensus init` CLI surface\\n\\n**1. Subcommand\\\n    \\ structure:**\\n- `consensus init`: The primary command for one-time setup. It\\\n    \\ will be idempotent.\\n- If `.consensus/config.yaml` exists, `init` will load\\\n    \\ it and use its values as defaults in an interactive 'reconfiguration' session.\\\n    \\ It will ask for confirmation before overwriting.\\n- A `--force` flag will allow\\\n    \\ overwriting without a prompt.\\n\\n**2. Flag set:**\\n- `--non-interactive`: Run\\\n    \\ without interactive prompts. Requires all necessary dimension flags to be set.\\n\\\n    - `--accept-defaults`: Run non-interactively, accepting all default values. Can\\\n    \\ be combined with other flags to override specific defaults.\\n- `--workflow <3|4|advisory>`:\\\n    \\ Sets the workflow mode.\\n- `--contributors <claude,codex,gemini>`: Comma-separated\\\n    \\ list of enabled contributors.\\n- `--independence <blind-first-reveal|visible-from-start|sequential>`:\\\n    \\ Sets the independence model.\\n- `--convergence <unanimous|strict-majority|inclusive-majority|advisory>`:\\\n    \\ Sets the convergence rule.\\n- `--disposition-granularity <all-or-nothing|per-finding>`:\\\n    \\ Sets the finding disposition granularity.\\n- `--snapshot-trigger <manual-only|on-iteration-close|periodic>`\\n\\\n    - `--snapshot-period <N>`: Integer. Used with `--snapshot-trigger periodic` to\\\n    \\ specify 'every N iterations'.\\n- `--patch-authoring <claude-only|any-contributor|none>`\\n\\\n    \\n**3. Interactive prompt flow:**\\n1.  Check for existing `.consensus/config.yaml`.\\\n    \\ If found, inform the user they are reconfiguring.\\n2.  Prompt for **Workflow\\\n    \\ mode** (default: 4).\\n3.  Prompt for **Contributor pool** (multiselect, default:\\\n    \\ claude, codex, gemini).\\n4.  If workflow is `#4`, prompt for **Independence\\\n    \\ model** (default: `blind-first-reveal`).\\n5.  If more than one contributor,\\\n    \\ prompt for **Convergence rule** (default: `strict-majority`).\\n6.  Prompt for\\\n    \\ **Finding disposition granularity** (default: `all-or-nothing`).\\n7.  Prompt\\\n    \\ for **Snapshot trigger** (default: `on-iteration-close`). If `periodic`, ask\\\n    \\ for the iteration period.\\n8.  Prompt for **Patch authoring permissions** (default:\\\n    \\ `claude-only`).\\n9.  Display a summary of the selected configuration.\\n10. Ask\\\n    \\ for confirmation to write to `.consensus/config.yaml`.\\n11. After writing, ask\\\n    \\ if `.consensus/` should be added to `.gitignore` (it should not, as this config\\\n    \\ is per-repo).\\n\\n**4. Non-interactive invocation form:**\\n```sh\\nconsensus init\\\n    \\ --non-interactive --workflow 4 --contributors claude,codex,gemini --independence\\\n    \\ blind-first-reveal --convergence strict-majority\\n```\\n\\n**5. Idempotency semantics:**\\n\\\n    - Re-running `consensus init` on a repo with an existing config will load the\\\n    \\ current settings and use them as defaults in the prompts. It acts as a `reconfigure`\\\n    \\ command. It will require confirmation via prompt or `--force` to overwrite.\\n\\\n    \\n### Section B \\u2014 `.consensus/config.yaml` schema\\n\\n**1. Schema Definition\\\n    \\ (`.consensus/config.yaml`):**\\n```yaml\\nschema_version: 1\\n\\n# Workflow mode\\\n    \\ and contributor settings\\nworkflow:\\n  # One of: 3 (post-review), 4 (propose-converge),\\\n    \\ advisory\\n  mode: 4\\n\\n  # List of enabled contributors. Any subset of {claude,\\\n    \\ codex, gemini}\\n  pool:\\n    - claude\\n    - codex\\n    - gemini\\n\\n  # Independence\\\n    \\ model. One of: blind-first-reveal, visible-from-start, sequential\\n  independence_model:\\\n    \\ blind-first-reveal\\n\\n# Rules for reaching agreement\\nconvergence:\\n  # One\\\n    \\ of: unanimous, strict-majority, inclusive-majority, advisory\\n  rule: strict-majority\\n\\\n    \\n  # Granularity for handling findings. One of: all-or-nothing, per-finding\\n\\\n    \\  disposition_granularity: all-or-nothing\\n\\n# Automated state snapshots\\nsnapshots:\\n\\\n    \\  # One of: manual-only, on-iteration-close, periodic\\n  trigger: on-iteration-close\\n\\\n    \\n  # Optional: defines period for 'periodic' trigger\\n  # period_iterations:\\\n    \\ 5\\n\\n# Permissions for who can author patches\\npatch_authoring:\\n  # One of:\\\n    \\ claude-only, any-contributor, none\\n  permission: claude-only\\n```\\n\\n**2. Defaults\\\n    \\ Document:**\\n- `workflow.mode`: `4`\\n- `workflow.pool`: `[claude, codex, gemini]`\\n\\\n    - `workflow.independence_model`: `blind-first-reveal`\\n- `convergence.rule`: `strict-majority`\\n\\\n    - `convergence.disposition_granularity`: `all-or-nothing`\\n- `snapshots.trigger`:\\\n    \\ `on-iteration-close`\\n- `patch_authoring.permission`: `claude-only`\\n\\n**3.\\\n    \\ Validation Rules:**\\n- If `workflow.mode` is `4`, `workflow.pool` must contain\\\n    \\ at least 2 contributors.\\n- If `workflow.pool` has only 1 contributor, `convergence.rule`\\\n    \\ must be `advisory`.\\n- The `snapshots.period_iterations` key is only valid if\\\n    \\ `snapshots.trigger` is `periodic`.\\n\\n### Section C \\u2014 Workflow engine integration\\n\\\n    \\n**1. Location:**\\n- A new module `consensus_mcp._workflow_engine.py` will be\\\n    \\ created.\\n- It will define a `WorkflowEngine` class responsible for managing\\\n    \\ the iteration lifecycle based on the config.\\n\\n**2. Config Loading:**\\n- At\\\n    \\ the start of an iteration, `_self_drive.py` (or its equivalent) will instantiate\\\n    \\ the `WorkflowEngine`.\\n- The engine's constructor will search for `.consensus/config.yaml`.\\\n    \\ If found, it loads and validates it. If not, it loads the backward-compatible\\\n    \\ default configuration.\\n\\n**3. Adapter Dispatch:**\\n- The engine will have a\\\n    \\ main `run_iteration()` method.\\n- This method will read the `workflow.mode`\\\n    \\ and dispatch to helper methods (e.g., `_run_workflow_4()`).\\n- These methods\\\n    \\ will orchestrate the calls to contributor adapters. The existing `reviewer_dispatch_codex`\\\n    \\ and `reviewer_dispatch_gemini` tools will become adapters called by the engine.\\\n    \\ The engine will handle the logic for blind proposals, convergence, etc.\\n\\n\\\n    **4. Backward Compatibility:**\\n- If `.consensus/config.yaml` is missing, the\\\n    \\ engine will use a 'legacy' configuration object that hardcodes the previous\\\n    \\ behavior (Workflow #3, claude orchestrates, codex/gemini review). It will log\\\n    \\ a warning encouraging the user to run `consensus init`.\\n\\n**5. New Artifact\\\n    \\ Types:**\\n- For Workflow #4's blind phase, artifacts will be named `<iteration_dir>/<contributor_name>-proposal.json`.\\\n    \\ These are standard review packets.\\n- After the reveal phase, the orchestrator\\\n    \\ (claude) will produce a `synthesis-and-plan.md` artifact summarizing the converged\\\n    \\ design and next steps.\\n\\n### Section D \\u2014 Migration plan\\n\\n**1. Existing\\\n    \\ Repos:**\\n- Do not refuse to run. When `.consensus/config.yaml` is not found,\\\n    \\ operate in 'legacy mode' (emulating the old, hardcoded workflow) and print a\\\n    \\ one-time warning to the console suggesting that the user run `consensus init`.\\n\\\n    \\n**2. Renaming:**\\n- The concept of 'reviewer' is too narrow. The new, more general\\\n    \\ term is 'contributor'.\\n- We will introduce a new set of tools with `contributor_`\\\n    \\ prefixes, e.g., `contributor.propose()`, `contributor.review()`.\\n- The old\\\n    \\ `reviewer_dispatch_*` tools will be marked as deprecated and internally aliased\\\n    \\ to the new `contributor.*` tools for backward compatibility with old iterations.\\\n    \\ A warning will be logged when the old tools are used.\\n\\n**3. Tests:**\\n- **Unit\\\n    \\ tests:** For the YAML schema validation and config loading logic.\\n- **Integration\\\n    \\ tests:** Create a test fixture with multiple mock 'contributor' adapters that\\\n    \\ return canned data.\\n- Test the `WorkflowEngine` against various `config.yaml`\\\n    \\ files (one for each workflow, different convergence rules) and assert that the\\\n    \\ mock adapters are called in the correct order and that the final outcome (pass/fail/converged)\\\n    \\ is correct.\\n\\n### Section E \\u2014 Open questions you flag\\n\\n1.  **Sequential\\\n    \\ Independence Model:** For `independence_model: sequential`, how should the sequence\\\n    \\ be defined? Is the order of contributors in the `workflow.pool` list significant,\\\n    \\ or should we introduce a separate `workflow.sequence` list?\\n2.  **Periodic\\\n    \\ Snapshots:** The `periodic` snapshot trigger based on time (`every M minutes`)\\\n    \\ implies a long-running daemon, which contrasts with\
      \ `consensus-mcp`'s current\\\n    \\ transactional, per-invocation model. Should we limit the initial implementation\\\n    \\ of 'periodic' to 'every N iterations' to avoid this architectural shift?\\n3.\\\n    \\  **Complex Interactions:** How does `disposition_granularity: per-finding` interact\\\n    \\ with `workflow: 4`? Does each finding require its own proposal-convergence cycle?\\\n    \\ I propose to initially restrict `per-finding` to Workflow #3 and `advisory`\\\n    \\ modes to limit complexity.\\n4.  **CLI Flag Naming:** Is there a risk of collision\\\n    \\ with other tools? Should we prefix flags, e.g., `--consensus-workflow` instead\\\n    \\ of `--workflow`?\"\n  patch_proposal: null\n  patch_not_proposed_reason: Design phase only. Implementation will follow in a subsequent\n    iteration after the design is converged.\ngoal_satisfied: true\ngoal_satisfied_rationale: The design proposal comprehensively addresses all requirements\n  from the design challenge, covering the CLI, schema, engine, and migration.\nblocking_objections: []\nindependence_attestation:\n  method: auto_gemini_dispatch\n  reviewer_isolated_by_construction: true\n  no_peer_review_visible_at_dispatch: true\n  input_sources:\n  - goal_packet (path passed via --goal-packet)\n  - prompt_template (substituted by _build_prompt)\n  - review_target (path passed via --review-target; may be unspecified)\n  - model (gemini CLI --model flag; no --output-schema enforcement)\n  see_dispatch_provenance_for_input_hashes: true\ndispatch_provenance:\n  gemini_version: 0.43.0-preview.0\n  model: gemini-2.5-pro\n  prompt_sha256: 92218feb2f070555ecfde35e2033f478d0c7d5be9e715c8eacc1c6a657b69ef1\n  output_sha256: 78231ead30c3388447fa7d63c2ee9d69837533fe25f658553eac2931e6417fb0\n  goal_packet_sha256: 2fb13d94dc6a4ec4ceeecc76b4068ce6fa37f41723abc0b1190d24fbfcd97ee1\n  scope_signature: 78f0f2acd138cb4d3ada84a721b35a395ff3b3920b360492f6f0ffdfd72c0530\n  review_target_path: consensus-state/active/iteration-0015-consensus-init-wizard-design/review-packet.yaml\n  review_target_hash: 8697025e43579038b850f41545e40f138bfb25a9f790cd9f1970b35fe00082cf\n  adapter: gemini\nsealed_at_utc: '2026-05-13T03:57:58Z'\npacket_sha256: 603752da5e4ec3e4dbfca404d423df0f6178d86dc251787c83e70d0f9b040fbc\n"
