iteration_id: iteration-0015-consensus-init-wizard-design
phase: converged-plan
sealed_at_utc: '2026-05-13T04:15:00Z'
convergence_rule_applied: strict-majority
contributors:
- claude
- codex
- gemini
agreement_summary:
  consensus_dimensions:
    - centralized .consensus/config.yaml (versioned, committed)
    - consensus init CLI (interactive + non-interactive + accept-defaults)
    - workflow engine as new module (consensus_mcp/_workflow_engine.py or consensus_mcp/workflow_engine.py)
    - contributors/ subdir with adapter implementations
    - existing _dispatch_codex.py / _dispatch_gemini.py become underlying CLI invokers under adapters
    - legacy mode (no config) keeps iter-0001..0014 readable with workflow #3 emulation + once-per-session warning
    - vocabulary migration reviewer.* → contributor.* with deprecated aliases
    - YAML for all lifecycle artifacts
    - test pattern: fake ContributorAdapter subclasses for engine unit tests; real CLI smoke gated by env var
    - effective-config.yaml per iteration captures applied rules
    - goal_packet records config_sha256 + schema_version
    - converged-plan.yaml is the final workflow #4 outcome artifact
    - convergence-round-N.yaml per contributor for multi-round attempts
    - workflow.max_convergence_rounds = 3
    - subcommands: init, init --reconfigure, init --check (codex addition), init --print-defaults (codex addition)
    - sequential ordering from contributors.enabled order (no separate field)
    - .gitignore updates use bracketed `# consensus-mcp managed` markers for dedupe
    - schema_version: 1 ships in iter-0016
  divergence_resolutions:
    - dimension: default_workflow_mode
      claude: 4 if >=2 contributors else 3
      codex: 4 if >=2 contributors else 3 (codex revised in convergence)
      gemini: 4 if >=2 contributors else 3
      resolution: 4 if >=2 contributors detected at init, else 3 (legacy mode also 3)
      majority: unanimous
    - dimension: schema_structure
      claude: top-level domain groupings (workflow, contributors, snapshot, patch_authoring, defaults)
      codex: granular separation (workflow.*, convergence.*, patches.*, snapshots.*, artifacts.*)
      gemini: explicit endorsement of claude's structure in convergence
      resolution: codex-style granular nesting (workflow/contributors/convergence/patches/snapshots/artifacts/defaults) with claude's adapter detail
      majority: 2-of-3 (codex+gemini accepting codex's separation; claude's resolved view also matches)
    - dimension: contributor_pool_keys
      claude: contributors.enabled + contributors.<id>
      codex: contributors.enabled + contributors.adapters.<id>
      gemini: workflow.pool (compact)
      resolution: codex's contributors.enabled + contributors.adapters.<id> split (semantic clarity)
      majority: 2-of-3 (claude+codex; gemini accepted this in convergence)
    - dimension: claude_required_as_orchestrator
      claude: yes (required)
      codex: open question in blind, resolved to YES in convergence
      gemini: implicit, resolved to YES in convergence
      resolution: claude REQUIRED in contributors.enabled for schema_version 1; reserve non-claude orchestrators for v2
      majority: unanimous after convergence
    - dimension: per_finding_x_workflow_4
      claude: workflow.mode == 4 forces all-or-nothing (per-finding restricted to #3 and advisory)
      codex: per-finding is default for workflow #4 (allows per-finding under #4)
      gemini: per-finding restricted to workflow #3 + advisory only for v1 to limit complexity
      resolution: PER MAJORITY (claude+gemini) — per-finding restricted to workflow #3 + advisory for v1. workflow #4 forces all-or-nothing. revisit in v2 if operators request.
      majority: 2-of-3 (claude+gemini outvote codex). codex's minority view recorded as STILL_OPEN_minority_dissent for operator visibility.
    - dimension: snapshot_periodic_time_based
      claude: defer time-based; reserve every_minutes field; v1 rejects with not_yet_implemented
      codex: schema supports both but v1 only implements every-N-iterations; every-M-minutes accepted only when long-running runner exists
      gemini: defer time-based to a future iteration when a daemon mode exists
      resolution: schema RESERVES every_minutes field (forward compat); v1 implementation only supports every_iterations. operator-supplied every_minutes triggers a not_yet_implemented warning at config-load time.
      majority: unanimous
    - dimension: gitignore_update
      claude: not addressed explicitly
      codex: auto + bracketed markers for dedupe
      gemini: explicit ask
      resolution: codex's bracketed-marker auto-update by default; --no-update-gitignore opts out
      majority: 2-of-3 (claude+codex+gemini in convergence agreed)
    - dimension: workflow_mode_numeric_vs_semantic
      claude: numeric 3/4/advisory accepted
      codex: semantic strings (post-review, propose-converge, advisory) stored; CLI aliases 3 and 4
      gemini: numeric/string accepted
      resolution: SCHEMA stores semantic strings (post-review, propose-converge, advisory). CLI accepts 3 and 4 as aliases. Artifacts display both where helpful.
      majority: 2-of-3 (codex's proposal accepted on cleanliness grounds; claude+gemini agree in convergence)
    - dimension: timeout_policy
      claude: not addressed in blind; convergence STILL_OPEN
      codex: timeout = non-approval, separately labeled timed_out
      gemini: workflow.timeout_policy field defaulting to treat-as-no-vote (other options: treat-as-blocking, shrink-quorum)
      resolution: ADD workflow.timeout_policy field with values {treat-as-no-vote, treat-as-blocking, shrink-quorum}. Default treat-as-no-vote. timeout status separately labeled timed_out in artifacts for clarity.
      majority: 2-of-3 (codex+gemini); claude defers to them on this dimension
    - dimension: patch_authoring_conflict
      claude: claude (orchestrator) has final say
      codex: non-Claude patches are candidate patches; claude records accept/reject/merge in disposition
      gemini: orchestrator (claude) has final say; UI presents all proposed patches
      resolution: when patches.authoring=any-contributor, non-claude patches are CANDIDATE patches. claude (orchestrator) authors the final patch-disposition (accept-one / merge-some / reject-all) recorded in finding-disposition.yaml.
      majority: unanimous (all three converged on claude-final-say)
    - dimension: contributors_for_legacy_mode
      claude: claude + codex (if codex installed)
      codex: workflow #3, codex/gemini review per historical behavior
      gemini: workflow #3, claude orchestrator, codex/gemini review
      resolution: legacy mode = workflow #3, contributors.enabled = [claude, codex] if codex installed else [claude]; gemini opt-in via init.
      majority: 2-of-3 (claude+codex specific on the duo default; gemini concurs)
  still_open_for_operator:
    - id: SO-1
      summary: default workflow mode (#4 vs #3) when exactly 2 contributors detected
      proposed_default: 4 (matches convergence resolution)
      rationale: operator may prefer simpler #3 for 2-contributor cases; wizard surfaces this in interactive flow
    - id: SO-2
      summary: codex's minority view on D5 — per-finding default for workflow #4
      proposed_default: all-or-nothing (per claude+gemini majority)
      rationale: revisit in v2 if operators request per-finding under workflow #4 routinely
    - id: SO-3
      summary: rejection vs warning for every_minutes in v1
      proposed_default: WARN (config-load logs not_yet_implemented but does not refuse)
      rationale: forward-compatibility for v2 daemon mode
    - id: SO-4
      summary: should --no-update-gitignore be default in non-interactive mode?
      proposed_default: NO (auto-update on by default)
      rationale: explicit opt-out via flag preserves operator control without breaking common case
    - id: SO-5
      summary: adapter registration mechanism for future AIs (deepseek, aider, local llama)
      proposed_default: closed enum for v1 (claude/codex/gemini); open in v2 via plugin contract
      rationale: limit v1 surface area; learn from v1 usage before designing extensibility
    - id: SO-6
      summary: config_sha256 immutability — strict (replan-creates-new-iter) vs lax (allow mid-iter change)
      proposed_default: strict (codex's recommendation)
      rationale: provenance integrity > operator convenience for the first release

# === FINAL CONVERGED DESIGN ===
# This is the implementation contract for iter-0016. All three contributors
# in workflow #4 round 1 converged on this design. The strict-majority rule
# resolved one dissent (D5 per-finding × #4) in favor of claude+gemini's
# position. The dissent is recorded above for operator visibility.

final_design:
  section_a_cli_surface:
    subcommands:
      - consensus init  # interactive wizard
      - consensus init --reconfigure  # re-prompts with existing values as defaults
      - consensus init --non-interactive  # all dimensions via flags, refuses prompts
      - consensus init --accept-defaults  # non-interactive with defaults; overrides via flags
      - consensus init --check  # validate existing config; print normalized form; exit 0/2/3
      - consensus init --print-defaults  # emit default YAML to stdout (no write)
      - consensus init --dry-run  # show intended config + .gitignore changes without writing
    flags:
      - "--workflow {3,4,post-review,propose-converge,advisory}"
      - "--contributors claude[,codex][,gemini]"
      - "--independence {blind-first-reveal,visible-from-start,sequential}"
      - "--convergence {unanimous,strict-majority,inclusive-majority,advisory}"
      - "--finding-disposition {all-or-nothing,per-finding}"
      - "--snapshot-trigger {manual-only,on-iteration-close,periodic}"
      - "--snapshot-every-iterations N"
      - "--patch-authoring {claude-only,any-contributor,none}"
      - "--timeout-policy {treat-as-no-vote,treat-as-blocking,shrink-quorum}"
      - "--primary-model-codex ID"
      - "--primary-model-gemini ID"
      - "--iteration-timeout-seconds N"
      - "--stall-silence-seconds N"
      - "--config PATH"
      - "--update-gitignore / --no-update-gitignore"
      - "--force"
    exit_codes:
      0: ok
      1: user-abort (interactive cancel)
      2: config missing (for --check) or new iteration in repo without config
      3: invalid config / illegal combination
      4: config exists without --reconfigure or --force
    interactive_flow_order:
      - workflow mode (default based on detected contributor count)
      - contributor pool (default: detected installed AIs)
      - independence model (default depends on workflow)
      - convergence rule (default depends on contributor count)
      - finding disposition (default depends on workflow)
      - snapshot trigger
      - patch authoring
      - advanced/optional (timeout policy, model overrides, snapshot periodic)
      - YAML preview + validation + .gitignore diff
      - confirm write
    idempotency:
      - refuses overwrite without --reconfigure or --force
      - atomic write (temp + rename + fsync)
      - .gitignore deduped via bracketed markers
    gitignore_markers:
      open: "# >>> consensus-mcp managed <<<"
      close: "# <<< consensus-mcp managed >>>"
      managed_paths:
        - .consensus/tmp/
        - .consensus/cache/
        - .consensus/logs/
  section_b_config_schema:
    schema_yaml: |
      schema_version: 1
      project:
        name: null  # derived from cwd basename at init time
        config_created_at_utc: null
      workflow:
        mode: propose-converge   # post-review | propose-converge | advisory (CLI aliases: 3, 4)
        independence: blind-first-reveal  # blind-first-reveal | visible-from-start | sequential
        max_convergence_rounds: 3
        timeout_policy: treat-as-no-vote  # treat-as-no-vote | treat-as-blocking | shrink-quorum
      contributors:
        enabled: [claude, codex, gemini]   # order is sequence for independence=sequential
        adapters:
          claude:
            role: orchestrator
            can_propose: true
            can_review: true
            can_converge: true
          codex:
            command: codex
            model: gpt-5.5
            sandbox_mode: read-only
            can_propose: true
            can_review: true
            can_converge: true
          gemini:
            command: gemini
            model: gemini-2.5-pro
            approval_mode: plan
            can_propose: true
            can_review: true
            can_converge: true
      convergence:
        rule: strict-majority    # unanimous | strict-majority | inclusive-majority | advisory
        finding_disposition: all-or-nothing  # all-or-nothing | per-finding
      patches:
        authoring: claude-only   # claude-only | any-contributor | none
        max_patch_lines: 600
      snapshots:
        trigger: on-iteration-close  # manual-only | on-iteration-close | periodic
        periodic:
          every_iterations: null
          every_minutes: null   # forward-compat; v1 emits not_yet_implemented if non-null
        branch: consensus-state-snapshots
        retention: unbounded
      artifacts:
        root: consensus-state
        seal_outputs: true
      defaults:
        iteration_timeout_seconds: 600
        stall_silence_seconds: 180
        pre_first_byte_silence_seconds: 600
    validation_rules:
      - schema_version must equal 1
      - contributors.enabled must contain "claude" (orchestrator)
      - contributors.enabled must be non-empty unique
      - workflow.mode == propose-converge requires len(contributors.enabled) >= 2
      - workflow.mode == propose-converge forces convergence.finding_disposition: all-or-nothing (D5 majority resolution)
      - workflow.mode == advisory requires convergence.rule == advisory
      - convergence.rule == strict-majority with N=2 reduces to unanimous (WARN)
      - convergence.rule == inclusive-majority with N=2 ties pass (WARN)
      - convergence.rule == strict-majority with N=1 is invalid
      - patches.authoring must be claude-only OR subset of contributors.enabled (effective for any-contributor)
      - snapshots.trigger == periodic requires every_iterations (every_minutes non-null in v1 = not_yet_implemented WARN)
      - workflow.independence == sequential requires len(contributors.enabled) >= 2
      - unknown top-level keys WARN at same schema_version, ERROR if schema_version mismatched
  section_c_workflow_engine:
    modules:
      - consensus_mcp/config.py  # load, normalize, validate
      - consensus_mcp/workflow_engine.py  # WorkflowEngine class, iteration lifecycle
      - consensus_mcp/contributors/__init__.py
      - consensus_mcp/contributors/claude.py
      - consensus_mcp/contributors/codex.py  # wraps _dispatch_codex
      - consensus_mcp/contributors/gemini.py  # wraps _dispatch_gemini
    adapter_interface:
      class: ContributorAdapter
      methods:
        - "propose(problem_statement_path, iteration_dir, *, blind: bool) -> Path"
        - "review(target_path, iteration_dir) -> Path"
        - "converge(iteration_dir, proposal_paths, round_number: int) -> Path"
    iteration_lifecycle:
      - "load .consensus/config.yaml at iteration start"
      - "normalize + validate; copy to <iter_dir>/effective-config.yaml"
      - "record config_sha256 + schema_version in goal_packet"
      - "dispatch per workflow.mode"
      - "seal artifacts per phase"
      - "config NOT re-read mid-iteration; consensus iteration replan --allow-config-change creates new iteration"
    artifact_lifecycle:
      shared:
        - <iter_dir>/effective-config.yaml
        - <iter_dir>/goal_packet.yaml (with config_sha256 + schema_version)
        - <iter_dir>/review-packet.yaml
      workflow_3:
        - <iter_dir>/<contributor>-review.yaml  # existing pattern
        - <iter_dir>/finding-disposition.yaml (if per-finding)
      workflow_4:
        - <iter_dir>/<contributor>-proposal.yaml (blind phase, all enabled)
        - <iter_dir>/proposal-manifest.yaml (after blind phase closes)
        - <iter_dir>/<contributor>-convergence-round-N.yaml (reveal phase)
        - <iter_dir>/converged-plan.yaml (final outcome)
      advisory:
        - <iter_dir>/<contributor>-recommendation.yaml
        - <iter_dir>/final-decision.yaml (claude's choice + rationale)
  section_d_migration:
    legacy_mode:
      trigger: missing .consensus/config.yaml
      behavior: emulate workflow #3 + claude orchestrator + codex review (if codex installed) + all-or-nothing + claude-only patches
      logging: legacy_mode_activated event once per session
      hint: "Run `consensus init` to create .consensus/config.yaml"
      historical_iterations: readable as schema_version=0 (synthetic); NEVER rewritten
    new_iterations_in_legacy_repo:
      default_behavior: legacy mode (don't refuse)
      operator_override: consensus init --from-legacy generates v1 config matching current behavior
    vocabulary_migration:
      new_mcp_tools:
        - contributor.propose_codex
        - contributor.propose_gemini
        - contributor.review_codex
        - contributor.review_gemini
        - contributor.converge_codex
        - contributor.converge_gemini
      deprecated_aliases:
        - reviewer.dispatch_codex (-> contributor.review_codex)
        - reviewer.dispatch_gemini (-> contributor.review_gemini)
      deprecation_path: aliases remain through v1.x; dropped at v2.0.0; CLI logs deprecation warning when alias used (not in sealed content)
    test_strategy:
      unit:
        - config normalization table tests (every dimension + illegal combos)
        - schema validator edge cases
      integration:
        - WorkflowEngine with FakeAlwaysApprove / FakeAlwaysBlock / FakeRotating adapters
        - workflow #3 end-to-end (mock + assertion on dispatch order)
        - workflow #4 end-to-end (blind phase, manifest, reveal, convergence rule evaluation)
        - per-finding disposition (workflow #3 / advisory)
        - timeout policy (each value)
      cli:
        - init (absent config, --reconfigure, --check, --print-defaults, --dry-run)
        - .gitignore marker dedupe on re-run
        - non-interactive invalid combinations
      smoke_real_ai: opt-in via CONSENSUS_MCP_RUN_REAL_AI_SMOKE=1
  section_e_open_questions_for_operator:
    - SO-1: default workflow mode for 2-contributor case (proposed: 4)
    - SO-2: codex minority dissent on D5 — per-finding × workflow #4 (proposed: all-or-nothing per majority)
    - SO-3: every_minutes v1 behavior (proposed: WARN with not_yet_implemented, accept)
    - SO-4: --no-update-gitignore default in non-interactive mode (proposed: NO; auto-update on by default)
    - SO-5: future-AI adapter registration (proposed: closed enum for v1; plugin contract in v2)
    - SO-6: config_sha256 immutability strictness (proposed: strict per codex)

implementation_iteration: iter-0016
implementation_scope_summary: |
  Build consensus_mcp/config.py + consensus_mcp/workflow_engine.py +
  consensus_mcp/contributors/{claude,codex,gemini}.py. Implement init wizard
  as a new shell entry point (likely consensus_mcp/_init_wizard.py). Add
  .consensus/config.yaml schema + validation. Integration tests with fake
  adapters. Backward compat via legacy mode. New MCP tool aliases. Multiple
  iterations expected (iter-0016 may split into 0016a/b/c per sub-component).
