  summary: Design proposal for iter-0015 consensus init wizard + config schema (claude's blind contribution)
  citation: docs/design-consults/iter-0015-consensus-init-design-challenge.md:0
  risk: |
    The highest-impact choices in this proposal: (1) using a flat `.consensus/config.yaml`
    schema with explicit defaults rather than a nested override-chain, because operators
    need to see their full effective config at a glance and the override-chain pattern in
    other tools (eslint, prettier) reliably confuses users. (2) Treating claude as a
    structural orchestrator that ALSO produces its own claude-proposal.yaml — symmetric
    contributor artifact — vs treating claude as a privileged author whose proposal is
    implicit in the goal_packet. The symmetric model is what the maintainer corrected
    me on twice today; it costs orchestrator-loop complexity but eliminates a real
    asymmetry. (3) Legacy mode (no .consensus/config.yaml) maps to workflow #3 + codex-only
    so existing iter-0001..0014 don't break; consensus init is opt-in for now and only
    becomes mandatory at a future major version.
  recommendation: |
    # Section A — `consensus init` CLI surface

    ## Subcommands

    - `consensus init` — interactive wizard (default behavior)
    - `consensus init --reconfigure` — re-prompts, overwrites existing config (asks "reconfigure? [y/N]" first)
    - `consensus init --non-interactive <flags>` — script-friendly; refuses to prompt; all dimensions must be supplied or default
    - `consensus init --accept-defaults [overrides]` — non-interactive with defaults; specific flags override
    - `consensus init --dry-run` — show what would be written without modifying anything

    Exit codes: 0 = config written, 1 = user abort, 2 = invalid combo, 3 = AI CLI verification failed, 4 = config already exists (without --reconfigure)

    ## Flag set (one per configurability dimension)

    ```
    --workflow {3,4,advisory}                 default: 4 if ≥2 contributors detected, else 3
    --contributors claude[,codex][,gemini]    default: all that are installed+authed
    --independence {blind-first-reveal,visible-from-start,sequential}
                                              default: blind-first-reveal if workflow=4, visible if workflow=3
    --convergence {unanimous,strict-majority,inclusive-majority,advisory}
                                              default: strict-majority for ≥3 contributors, unanimous for 2
    --disposition {all-or-nothing,per-finding}
                                              default: per-finding for workflow=4, all-or-nothing for #3
    --snapshot-trigger {manual,on-close,periodic:N,periodic:Tm}
                                              default: on-close
    --patch-author {claude,any,none}          default: claude
    --interactivity {interactive,non-interactive,mixed}
                                              implicit via subcommand variant; explicit override for testing
    --primary-model-codex <id>                default: gpt-5.5
    --primary-model-gemini <id>               default: gemini-2.5-pro
    --iteration-timeout-seconds <int>         default: 600
    --stall-silence-seconds <int>             default: 180 (allows env var override per existing infra)
    ```

    ## Interactive prompt flow

    ```
    Scanning project...
      ✓ git repo detected (branch: main)
      ✓ Python project (pyproject.toml present)
      ✓ README.md found
    Detecting AI CLIs...
      ✓ claude     → /usr/local/bin/claude (v1.x)
      ✓ codex      → /usr/bin/codex (codex-cli 0.130.0)
      ✓ gemini     → /usr/bin/gemini (0.43.0-preview.0)

    Which workflow mode?
      [1] #3 — post-review (claude implements, others audit)         [faster, riskier]
      [2] #4 — propose-converge (all 3 propose, reveal, converge)   [slower, lower-regret]
      [3] advisory — proposals are informational; claude decides    [for hot-patches]
    Default: 2 (workflow #4)
    > _

    Which contributors should participate?
      [a] claude only        (solo)
      [b] claude + codex     (2-AI consensus)
      [c] claude + gemini    (2-AI consensus)
      [d] claude + codex + gemini  (3-AI consensus, blind-first)
    Default: d
    > _

    Independence model? (only meaningful for workflow #4 with ≥2 contributors)
      [1] blind-first-reveal — each contributor proposes in isolation, all reveal at once
      [2] visible-from-start — all contributors see all inputs (collaborative drafting)
      [3] sequential — 1st proposes, 2nd critiques, 3rd synthesizes
    Default: 1
    > _

    Convergence rule? (when do contributors agree?)
      [1] unanimous           (all enabled must goal_satisfied=true)
      [2] strict-majority     (>N/2 must agree; ties refuse)
      [3] inclusive-majority  (≥N/2; ties pass)
      [4] advisory            (claude decides regardless of others)
    Default: 2
    > _

    Finding disposition granularity?
      [1] all-or-nothing      (any blocking finding rejects the whole iteration)
      [2] per-finding         (claude accepts/rejects each finding individually)
    Default: 2
    > _

    Snapshot trigger?
      [1] manual-only         (operator runs snapshot subcommand)
      [2] on-iteration-close  (auto-snapshot when iteration seals)
      [3] periodic:5          (every 5 iterations)
      [4] periodic:30m        (every 30 minutes)
    Default: 2
    > _

    Patch authoring — who can emit `patch_proposal`?
      [1] claude only         (current behavior; reviewer suggests via prose only)
      [2] any contributor     (codex/gemini can also propose patches)
      [3] none                (claude implements solo; no suggested patches)
    Default: 1
    > _

    Summary:
      workflow:          #4 (propose-converge)
      contributors:      claude, codex, gemini
      independence:      blind-first-reveal
      convergence:       strict-majority
      disposition:       per-finding
      snapshot trigger:  on-iteration-close
      patch authoring:   claude only

    Writing .consensus/config.yaml ...
    Updating .gitignore (excludes runtime state) ...
    ✓ Setup complete. Try: consensus run "fix a typo in README"
    ```

    ## Non-interactive form

    ```
    consensus init --non-interactive \
        --workflow 4 \
        --contributors claude,codex,gemini \
        --independence blind-first-reveal \
        --convergence strict-majority \
        --disposition per-finding \
        --snapshot-trigger on-close \
        --patch-author claude
    ```

    ## Idempotency

    Refuses to overwrite existing `.consensus/config.yaml` unless `--reconfigure` flag is passed. Reconfigure prompts with current values as defaults and shows a diff before writing. `--non-interactive --reconfigure` updates fields specified by flags and preserves the rest.

    # Section B — `.consensus/config.yaml` schema

    ```yaml
    schema_version: 1
    project:
      name: <derived from cwd basename>
      detected_at_utc: <timestamp of init run>
    workflow:
      mode: 4              # 3 | 4 | advisory
      independence: blind-first-reveal  # blind-first-reveal | visible-from-start | sequential
      convergence: strict-majority      # unanimous | strict-majority | inclusive-majority | advisory
      finding_disposition: per-finding  # all-or-nothing | per-finding
      max_convergence_rounds: 3         # before surface-to-operator
    contributors:
      enabled: [claude, codex, gemini]
      claude:
        role: orchestrator              # always orchestrator; only contributor that runs the loop
        can_propose: true               # writes claude-proposal.yaml in workflow #4
        can_review: true                # writes claude-review.yaml in workflow #3
      codex:
        cli_path: codex                 # operator-overridable; resolved via shutil.which
        model: gpt-5.5
        can_propose: true
        can_review: true
        sandbox_mode: read-only         # --sandbox flag passed to codex CLI
      gemini:
        cli_path: gemini
        model: gemini-2.5-pro
        can_propose: true
        can_review: true
        approval_mode: plan             # --approval-mode flag passed to gemini CLI
    snapshot:
      trigger: on-iteration-close       # manual | on-iteration-close | periodic
      retention: unbounded              # unbounded | last:N | older-than:D | manual
      branch: consensus-state-snapshots
    patch_authoring:
      authorized_contributors: [claude] # subset of enabled contributors
      max_patch_size: 600               # diff lines; existing iter convention
    defaults:
      iteration_timeout_seconds: 600
      stall_silence_seconds: 180
      pre_first_byte_silence_seconds: 600  # iter-0007 F4 finally implemented
    ```

    ## Validation rules

    1. `workflow.mode == 4` requires `len(contributors.enabled) >= 2`. Workflow #4 with 1 contributor is meaningless.
    2. `workflow.mode == advisory` requires `len(contributors.enabled) >= 1`.
    3. `workflow.convergence == "unanimous"` valid for any N.
    4. `workflow.convergence == "strict-majority"` with N=2 reduces to unanimous (warn the operator).
    5. `patch_authoring.authorized_contributors` must be a subset of `contributors.enabled`.
    6. `contributors.claude` is REQUIRED (claude is always enabled; the orchestrator).
    7. If `workflow.mode == "advisory"`, `workflow.convergence` defaults to `advisory` and warns if set otherwise.
    8. `schema_version: 1` is the only currently-supported version. Future versions migrate.

    ## Defaults document

    | Dimension | Default |
    |---|---|
    | workflow.mode | 4 |
    | workflow.independence | blind-first-reveal |
    | workflow.convergence | strict-majority |
    | workflow.finding_disposition | per-finding |
    | workflow.max_convergence_rounds | 3 |
    | contributors.enabled | [claude, codex, gemini] (auto-detected) |
    | snapshot.trigger | on-iteration-close |
    | patch_authoring.authorized_contributors | [claude] |
    | iteration_timeout_seconds | 600 |
    | stall_silence_seconds | 180 |

    # Section C — Workflow engine integration

    ## New module: `consensus_mcp/_workflow_engine.py`

    Pure-Python orchestration layer that:

    1. Loads `.consensus/config.yaml` at iteration start (or applies legacy defaults).
    2. Validates config against schema.
    3. Selects workflow runner based on `workflow.mode`:
       - `Workflow3Runner`: claude proposes + implements → other contributors review (current pattern, pluggable).
       - `Workflow4Runner`: blind-first-reveal-converge orchestration.
       - `AdvisoryRunner`: dispatch contributors for info; claude decides without consensus gate.
    4. Each runner uses a `ContributorAdapter` per enabled contributor — abstract base with `propose(problem_statement) → proposal_artifact_path` and `review(target_path) → review_artifact_path`.
    5. Engine writes per-phase artifacts:
       - Workflow #4: `claude-proposal.yaml`, `codex-proposal.yaml`, `gemini-proposal.yaml` (blind phase), `convergence-round-N.yaml` (reveal phase).
       - Workflow #3: existing pattern — `codex-review.yaml`, `gemini-review.yaml` (review phase).

    ## Adapter abstraction

    ```python
    class ContributorAdapter:
        def __init__(self, config): ...
        def propose(self, problem_statement_path, iteration_dir, *, blind: bool = True) -> Path:
            """Emit <contributor>-proposal.yaml. Blind = don't include peer proposals in prompt."""
        def review(self, target_path, iteration_dir) -> Path:
            """Emit <contributor>-review.yaml. Existing review path."""
        def converge(self, iteration_dir, all_proposals: list[Path]) -> Path:
            """Reveal-phase: emit <contributor>-convergence-roundN.yaml that picks/synthesizes."""
    ```

    Existing `_dispatch_codex.py` and `_dispatch_gemini.py` become the underlying CLI invokers; `ContributorAdapter` is a thin wrapper that selects prompt template based on phase (propose vs review vs converge).

    ## Backward compat with iter-0001..0014

    Iterations without `.consensus/config.yaml`: engine logs `legacy_mode` event and uses workflow #3 + codex-only + all-or-nothing + claude-patch-author defaults. Identical to current behavior. No breakage.

    `consensus init` is opt-in until a future major version (v2.x?) makes config mandatory.

    ## New artifact types

    For workflow #4:

    - `<iter_dir>/claude-proposal.yaml` — claude's blind proposal (orchestrator-written)
    - `<iter_dir>/codex-proposal.yaml` — codex's blind proposal (via codex CLI)
    - `<iter_dir>/gemini-proposal.yaml` — gemini's blind proposal (via gemini CLI)
    - `<iter_dir>/convergence-round-N.yaml` — each contributor's view of the converged plan (N rounds until consensus)
    - `<iter_dir>/converged-plan.yaml` — final agreed plan after convergence (the "winner")

    Sealing semantics: all proposal artifacts seal through `review.write_and_seal` (T6) at write time, same independence_attestation pattern.

    # Section D — Migration plan

    ## Existing repos without `.consensus/config.yaml`

    Engine detects missing config → enters legacy mode automatically. Logs a one-time `legacy_mode_activated` event. README mentions `consensus init` for the new wizard.

    ## Naming evolution

    - Keep `reviewer.dispatch_codex` / `reviewer.dispatch_gemini` as legacy MCP tool names through v1.x.
    - Add new MCP tool names: `contributor.propose_codex` / `contributor.propose_gemini` / `contributor.converge_codex` / `contributor.converge_gemini` for workflow #4.
    - Existing `reviewer.dispatch_*` continue to work, mapped internally to `contributor.review_*`.
    - At v2.0, deprecate the `reviewer.*` aliases and rename to `contributor.*` exclusively.

    ## Tests

    - Workflow engine has fake `ContributorAdapter` subclasses (`FakeAlwaysApprove`, `FakeAlwaysBlock`, `FakeRotating`) for fast unit tests — no real CLI dispatch.
    - Real codex/gemini smoke tests opt-in via env var `CONSENSUS_MCP_RUN_REAL_AI_SMOKE=1` (parallel to existing `CONSENSUS_MCP_RUN_REAL_CODEX_SMOKE`).
    - Workflow #4 end-to-end test uses 3 fake adapters with scripted proposals + scripted convergence behavior.

    ## Schema migration

    `schema_version: 1` ships in iter-0016 (the implementation iteration). When we need to break schema (e.g., adding required fields), bump to 2 and provide a `consensus init --migrate` subcommand that reads the v1 config and writes the v2 equivalent.

    # Section E — Open questions for convergence phase

    1. **Convergence round limit**: I proposed `max_convergence_rounds: 3`. What's the right number? Too few = premature halt. Too many = unbounded cost. Other contributors weigh in.

    2. **Per-finding disposition**: when claude rejects a finding from codex, does that constitute a "no" vote from claude AGAINST codex's proposal, or is it neutral? I lean toward neutral — claude is the synthesizer, not a voting peer at the disposition step. Confirm.

    3. **Patch authoring conflict resolution**: if `patch_authoring.authorized_contributors == [claude, codex]` and both propose patches on the same finding, who wins? Proposed: claude (orchestrator privilege). Alternative: codex's patch is shown to claude who chooses to accept/reject/merge. Other contributors weigh in.

    4. **Rate-limit / cost awareness**: should config include per-contributor budget caps (max dispatches per iteration, max tokens per dispatch)? Or is this an operator-external concern? Proposed: out of scope for v1, document operational guidance only.

    5. **Snapshot trigger=on-iteration-close**: hook point is `audit_append_event` for `iteration_closed` events. Engine subscribes. Coordinate with iter-0012's deferred trigger work (F7a was manual-only for iter-0013). Confirm timing: pre-close (capture state before sealing) or post-close (after seal lands)? Proposed: post-close.

    6. **Backward-compat warning fatigue**: should engine emit `legacy_mode_activated` once per iteration, or once per session, or just once total in the repo's audit log? Proposed: once per session (low noise, still visible).

    7. **Migration path for the iter-0011 gemini adapter**: the current `_dispatch_gemini.py` is review-shaped. Should it grow a `propose()` method, or do we factor out a base and write a NEW `_propose_gemini.py`? Proposed: grow the existing module — it's already cleanly factored from iter-0010 _dispatch_base.

    8. **Wizard verbosity**: should the interactive flow show full default values for every option, or only ask about non-defaults if the operator chooses "advanced" mode? Proposed: hybrid — ask all dimensions but show defaults clearly so "press enter to accept" is one-keystroke per dimension.
