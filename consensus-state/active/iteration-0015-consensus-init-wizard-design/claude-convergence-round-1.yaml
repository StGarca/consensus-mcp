  summary: Convergence proposal — synthesis across claude/codex/gemini blind proposals for iter-0015 design
  citation: docs/design-consults/iter-0015-consensus-init-design-challenge.md:0
  risk: |
    Tight convergence on the high-level architecture (engine + adapters + declarative YAML config + legacy fallback)
    means iter-0016 has a clear implementation target. The remaining divergence is in schema-shape details
    (flat vs nested key paths) and default selection (workflow #3 vs #4); these are bikeshed-class for the most
    part but matter for the wizard's UX. Two areas worth surfacing to the operator before iter-0016 starts:
    (1) `per-finding` disposition × workflow #4 — gemini correctly flagged that this combination could devolve
    into N parallel proposal-convergence cycles per finding, which may not be the intent; claude and codex
    proposed it without grappling with that. (2) Default workflow mode — codex defaulted to #3 for compat
    while claude+gemini defaulted to #4 for the canonical pattern. The operator should pick.
  recommendation: |
    # Part 1 — Consensus points (all three blind proposals agree)

    All three contributors converged on the high-level architecture:

    1. **`consensus init` is a new shell CLI subcommand**, not an MCP tool — for one-shot per-repo setup.
    2. **`.consensus/config.yaml` is the source of truth**, committed (not gitignored), versioned with `schema_version: 1`.
    3. **Three workflow modes**: `3` (post-review), `4` (propose-converge), `advisory`. String-or-int representation acceptable.
    4. **Three independence models**: `blind-first-reveal`, `visible-from-start`, `sequential`.
    5. **Four convergence rules**: `unanimous`, `strict-majority`, `inclusive-majority`, `advisory`.
    6. **Two finding disposition granularities**: `all-or-nothing`, `per-finding`.
    7. **Three snapshot triggers**: `manual-only`, `on-iteration-close`, `periodic`.
    8. **Three patch-authoring permissions**: `claude-only`, `any-contributor`, `none`.
    9. **Interactive + non-interactive + accept-defaults invocation forms**.
    10. **Workflow engine is a new module**, not a refactor of `_self_drive`. Adapters become first-class.
    11. **Legacy mode** (no `.consensus/config.yaml`) keeps existing iter-0001..0014 readable.
    12. **Rename trajectory**: `reviewer.*` → `contributor.*` with deprecated alias for at least one release.
    13. **Test pattern**: fake `ContributorAdapter` subclasses for unit tests; opt-in env-var smoke for real CLI calls.

    # Part 2 — Divergence points + proposed resolution

    **D1. Default workflow mode**
    - claude proposed `4` (canonical propose-converge)
    - codex proposed `3` (backward-compat safe)
    - gemini proposed `4`
    - **RESOLUTION**: default `4` when ≥2 contributors detected at init time; fall back to `3` when only claude is enabled. Both claude and gemini favor `4` as the canonical default; codex's compat concern is addressed by the legacy-mode pathway (no config → workflow #3 emulation). This way operators with the full 3-AI setup get the canonical workflow; degenerate single-contributor projects get workflow #3 by default.

    **D2. YAML schema shape — flat vs nested**
    - claude: top-level domains (`workflow`, `contributors`, `snapshot`, `patch_authoring`, `defaults`)
    - codex: very granular (`workflow.mode`, `workflow.independence`, `convergence.rule`, `convergence.finding_disposition`, `patches.authoring`, `snapshots.trigger`, `artifacts.*`)
    - gemini: hierarchical clusters (`workflow.mode`, `workflow.pool`, `workflow.independence_model`, `convergence.rule`, `convergence.disposition_granularity`, `snapshots.*`, `patch_authoring.*`)
    - **RESOLUTION**: adopt codex's granular nesting because it groups by SEMANTIC concern (workflow shape, contributor identity, convergence policy, patch permissions, snapshot policy, artifacts) and each grouping evolves independently. The exact key-paths from codex's proposal:
      ```
      schema_version: 1
      workflow: {mode, independence}
      contributors: {enabled: [...], adapters: {<id>: {...}}}
      convergence: {rule, finding_disposition}
      patches: {authoring}
      snapshots: {trigger, periodic: {every_iterations, every_minutes}}
      artifacts: {root, seal_reviews}
      ```
      One amendment from claude: add a `defaults` block under each section for per-section defaults visible to operators reading the file. (E.g., `convergence.defaults.timeout_seconds: 600`.)

    **D3. Contributor pool naming**
    - claude: `contributors.enabled: [...]` + per-contributor blocks at `contributors.<id>`
    - codex: `contributors.enabled: [...]` + `contributors.adapters: {<id>: {...}}`
    - gemini: `workflow.pool: [...]`
    - **RESOLUTION**: codex's `contributors.enabled` + `contributors.adapters.<id>.*` split. "Adapters" makes the configuration mapping explicit (which adapter implements each contributor; future projects might have multiple codex instances or custom AIs). gemini's `workflow.pool` is more compact but conflates "who" with "how."

    **D4. Is claude required in `contributors.enabled`?**
    - claude said YES (orchestrator must be present)
    - codex flagged as open question
    - gemini implicit
    - **RESOLUTION**: claude is required for v1 schema_version=1. Note in spec that future versions MAY support non-claude orchestrators if anyone wants to consume the engine without claude's involvement, but no current path exists. Validation rule: `contributors.enabled` must contain `claude`.

    **D5. Per-finding disposition × workflow #4 — does it apply?**
    - claude: implicit yes (per-finding default for #4)
    - codex: legal combo, with extra validation rule
    - gemini: restrict per-finding to #3 + advisory only, to avoid N cycles per finding
    - **RESOLUTION**: gemini's concern is real — workflow #4 + per-finding means each finding gets its own propose-converge sub-loop. That's not what we want. Per-finding disposition is meaningful in workflow #3 (where claude reviews each finding individually after the fact) and advisory (where claude picks per-finding). For workflow #4, the converged-plan-as-a-whole IS the outcome; individual findings inside a contributor's proposal are inputs to convergence, not separately gated. Validation rule: `workflow.mode == 4` implies `convergence.finding_disposition: all-or-nothing` (whole converged plan accepted or returned for another round); for workflow #3 or advisory, `per-finding` is available.

    **D6. Snapshot periodic — time-based or iteration-based?**
    - claude: both supported (`every N iterations` OR `every M minutes`)
    - codex: both
    - gemini: questions time-based since it implies a daemon
    - **RESOLUTION**: gemini's concern is correct for v1 — consensus-mcp is per-invocation, no daemon. Implement `every_iterations` only for v1. Document `every_minutes` as a placeholder field that v1 rejects with `not_yet_implemented` (so the schema is forward-compatible).

    **D7. `.gitignore` auto-update during init**
    - claude: not mentioned
    - codex: auto + bracketed markers for dedupe
    - gemini: explicit ask required
    - **RESOLUTION**: codex's bracketed-marker pattern is the safer default. Auto-update with `# >>> consensus-mcp managed <<<` markers, deduped on re-run. Operator can opt out with `--no-gitignore`.

    **D8. Exit codes for `consensus init`**
    - claude: 0/1/2/3/4 with specific meanings
    - codex: 0/2/3/4 with detailed meanings
    - gemini: not specified
    - **RESOLUTION**: codex's set (0=valid, 2=missing, 3=invalid, 4=config exists without --reconfigure). Add 1=user-abort (interactive cancel). Document in `consensus init --help`.

    **D9. Sequential ordering source**
    - claude: order of `contributors.enabled` list
    - codex: explicit in `contributors.enabled`
    - gemini: open question — pool order or separate `workflow.sequence`?
    - **RESOLUTION**: order of `contributors.enabled` IS the sequence when `independence == sequential`. Don't add a separate field. Document this binding.

    **D10. config_sha256 in goal_packet**
    - codex: proposes recording `config_sha256` + `schema_version` in goal_packet so sealed packets prove which config governed the dispatch
    - claude + gemini: not raised
    - **RESOLUTION**: adopt codex's proposal. It's defensive provenance for ~6 extra YAML lines per goal_packet. Worthwhile.

    # Part 3 — Final converged design (synthesis)

    ## A. `consensus init` CLI surface

    Subcommands:
    - `consensus init` — interactive wizard (or reconfigure if `.consensus/config.yaml` exists)
    - `consensus init --reconfigure` — re-prompts with existing values as defaults
    - `consensus init --check` — validate existing config, print normalized form, exit 0/2/3
    - `consensus init --print-defaults` — emit default YAML to stdout (no write)
    - `consensus init --non-interactive` — refuse to prompt; all dimensions via flags
    - `consensus init --accept-defaults` — non-interactive with defaults; overrides via flags

    Flags (all dimensions + meta):
    ```
    --workflow {3,4,advisory}
    --contributors claude,codex,gemini       (subset)
    --independence {blind-first-reveal,visible-from-start,sequential}
    --convergence {unanimous,strict-majority,inclusive-majority,advisory}
    --finding-disposition {all-or-nothing,per-finding}
    --snapshot-trigger {manual-only,on-iteration-close,periodic}
    --snapshot-every-iterations N
    --patch-authoring {claude-only,any-contributor,none}
    --no-gitignore                           (skip .gitignore marker write)
    --config PATH                            (override .consensus/config.yaml location)
    --force                                  (overwrite without prompt)
    --dry-run                                (show, don't write)
    ```

    Exit codes: 0=ok, 1=user-abort, 2=config missing (for --check), 3=invalid config, 4=config exists without --reconfigure.

    Interactive flow: detect AI CLIs, ask each dimension in order with default highlights, show YAML preview + validation, confirm write, optionally update `.gitignore`.

    Non-interactive one-liner:
    ```
    consensus init --non-interactive \
        --workflow 4 --contributors claude,codex,gemini \
        --independence blind-first-reveal --convergence strict-majority \
        --finding-disposition all-or-nothing \
        --snapshot-trigger on-iteration-close \
        --patch-authoring claude-only
    ```

    Idempotency: refuses overwrite without `--reconfigure` or `--force`. `--reconfigure` shows diff before writing. Atomic write (temp + rename + fsync where supported).

    `.gitignore` updates use bracketed markers `# >>> consensus-mcp managed <<<` ... `# <<< consensus-mcp managed >>>` for dedupe on re-run. `--no-gitignore` opts out.

    ## B. `.consensus/config.yaml` schema

    ```yaml
    schema_version: 1
    workflow:
      mode: 4                              # 3 | 4 | advisory
      independence: blind-first-reveal     # blind-first-reveal | visible-from-start | sequential
      max_convergence_rounds: 3
    contributors:
      enabled: [claude, codex, gemini]     # ordered list; order is the sequence for independence=sequential
      adapters:
        claude:
          role: orchestrator               # always orchestrator; only contributor that runs the loop
          can_propose: true
          can_review: true
        codex:
          command: codex                   # operator-overridable
          model: gpt-5.5
          sandbox_mode: read-only
          can_propose: true
          can_review: true
        gemini:
          command: gemini
          model: gemini-2.5-pro
          approval_mode: plan
          can_propose: true
          can_review: true
    convergence:
      rule: strict-majority                # unanimous | strict-majority | inclusive-majority | advisory
      finding_disposition: all-or-nothing  # all-or-nothing | per-finding
    patches:
      authoring: claude-only               # claude-only | any-contributor | none
      max_patch_size: 600                  # diff lines
    snapshots:
      trigger: on-iteration-close          # manual-only | on-iteration-close | periodic
      periodic:
        every_iterations: null             # positive int when trigger=periodic
        every_minutes: null                # FORWARD-COMPAT placeholder; v1 rejects with not_yet_implemented
      branch: consensus-state-snapshots
      retention: unbounded
    artifacts:
      root: consensus-state
      seal_reviews: true
    defaults:
      iteration_timeout_seconds: 600
      stall_silence_seconds: 180
      pre_first_byte_silence_seconds: 600
    ```

    **Defaults document** (when key omitted):
    | Key | Default |
    |---|---|
    | workflow.mode | 4 if `len(contributors.enabled) >= 2` else 3 |
    | workflow.independence | blind-first-reveal if mode=4, else visible-from-start |
    | workflow.max_convergence_rounds | 3 |
    | contributors.enabled | [claude, codex, gemini] (auto-detected installed AIs) |
    | convergence.rule | strict-majority if N≥3, unanimous if N≤2, advisory if mode=advisory |
    | convergence.finding_disposition | all-or-nothing (forced when mode=4) |
    | patches.authoring | claude-only |
    | snapshots.trigger | on-iteration-close |
    | artifacts.root | consensus-state |
    | artifacts.seal_reviews | true |

    **Validation rules**:
    1. `schema_version` required, must be 1.
    2. `contributors.enabled` must be non-empty and contain `claude` (orchestrator).
    3. `workflow.mode == 4` requires `len(contributors.enabled) >= 2`. Warns + degrades if =1.
    4. `workflow.mode == 4` forces `convergence.finding_disposition: all-or-nothing` (per D5 resolution).
    5. `convergence.rule == "strict-majority"` with N=2 reduces to unanimous (warn).
    6. `convergence.rule == "advisory"` valid only if `workflow.mode == "advisory"`.
    7. `patches.authoring` subset of `contributors.enabled`.
    8. `snapshots.trigger == "periodic"` requires `every_iterations: <int>`; `every_minutes` is forward-compat reserved (v1 rejects if non-null).
    9. `workflow.independence == "sequential"` requires `len(contributors.enabled) >= 2`.
    10. Unknown top-level keys: warning at same schema_version, error if schema_version mismatches.

    ## C. Workflow engine integration

    New modules:
    - `consensus_mcp/config.py` — load + normalize + validate `.consensus/config.yaml`
    - `consensus_mcp/_workflow_engine.py` — `WorkflowEngine` class, iteration lifecycle
    - `consensus_mcp/contributors/__init__.py` + `claude.py`, `codex.py`, `gemini.py` — adapters

    Adapter interface:
    ```python
    class ContributorAdapter:
        def __init__(self, config): ...
        def prepare_input(self, iteration, phase): ...           # phase: propose|review|converge
        def dispatch(self, packet) -> SealedArtifact: ...
        def collect_result(self) -> dict: ...
        def normalize_result(self, raw) -> dict: ...
    ```

    Existing `_dispatch_codex.py` and `_dispatch_gemini.py` become the underlying CLI invokers wrapped by `contributors/codex.py` and `contributors/gemini.py`.

    Config lifecycle:
    - At iteration start, engine loads `.consensus/config.yaml`, normalizes, validates.
    - Engine writes `effective-config.yaml` to iteration dir (snapshot of applied config).
    - goal_packet records `config_sha256` (sha256 of effective-config.yaml) + `schema_version` (per D10).
    - Config is NOT re-read mid-iteration. Explicit `consensus iteration replan --allow-config-change` creates a new iteration if needed.

    Dispatch model per workflow:
    - **Workflow 3**: claude implements first → enabled non-claude adapters review per convergence rule.
    - **Workflow 4**:
      1. All enabled adapters receive blind proposal packets (only shared problem statement, no peer visibility).
      2. Each adapter seals its `<contributor>-proposal.yaml`.
      3. After all sealed, reveal packet bundles ALL three for convergence dispatch.
      4. Each adapter seals `<contributor>-convergence-round-N.yaml` (their view of the synthesis).
      5. Engine compares convergence views; if agreement (per `convergence.rule`), seal `converged-plan.yaml` and proceed. Else iterate up to `max_convergence_rounds`.
    - **Advisory**: dispatch all adapters in parallel; their outputs are informational. Claude (orchestrator) writes `final-decision.yaml` with rationale.
    - **Sequential**: first enabled adapter proposes; second receives + critiques; third synthesizes. Order from `contributors.enabled`.

    Backward compat:
    - Missing `.consensus/config.yaml` → engine logs `legacy_mode_activated` once per session. Uses workflow #3 + codex-only (if codex installed) defaults. Existing iter-0001..0014 read as legacy.
    - New iterations in repos without config: exit 2 with hint "Run `consensus init` first", OR allow `consensus run --legacy-defaults` to generate v1 config with current behavior.

    New artifact types:
    - `effective-config.yaml` — per-iteration config snapshot
    - `<contributor>-proposal.yaml` — blind proposal artifact (workflow #4 blind phase)
    - `<contributor>-convergence-round-N.yaml` — convergence view (workflow #4 reveal phase)
    - `converged-plan.yaml` — final agreed plan (workflow #4 success)
    - `finding-disposition.yaml` — per-finding accept/reject/defer (workflow #3 + per-finding)
    - `final-decision.yaml` — claude's choice rationale (advisory mode)

    ## D. Migration plan

    **Repos without `.consensus/config.yaml`**:
    - Read-only commands (e.g., `consensus history`, `consensus status`) work with legacy defaults.
    - Write commands (`consensus run`) refuse with exit 2 + hint; or allow `--legacy-defaults` to auto-generate config matching current behavior.
    - Existing iter-0001..0014 readable as `schema_version: 0` legacy iterations.

    **Vocabulary migration**:
    - Introduce `contributor.*` MCP tool names alongside existing `reviewer.*` aliases.
    - Deprecate `reviewer.dispatch_codex` / `reviewer.dispatch_gemini` with one-time CLI log warning.
    - At v2.0.0, drop the aliases.

    **Schema migration**:
    - `schema_version: 1` ships in iter-0016.
    - Future bumps provide `consensus init --migrate` for in-place v1→v2.

    **Tests**:
    - Unit-test config normalization: table-driven across all dimensions + illegal combinations.
    - Fake adapters (`FakeAlwaysApprove`, `FakeAlwaysBlock`, `FakeProposesSpecificFinding`) for fast engine tests.
    - Real CLI smoke gated by `CONSENSUS_MCP_RUN_REAL_AI_SMOKE=1`.
    - End-to-end workflow #4 test with 3 fake adapters + scripted convergence behavior.

    ## E. Open questions (post-convergence — STILL_OPEN for operator decision)

    1. **STILL_OPEN — Default workflow mode when 3 contributors detected**: claude+gemini favor #4, codex favors #3. Resolution proposed defaults to #4 when ≥2 contributors, but operator's preferred default for the standard 3-AI case may differ. The init wizard itself surfaces this in the interactive flow.

    2. **STILL_OPEN — Single-contributor mode**: should `contributors.enabled: [claude]` be allowed? It's a degenerate case (no peer review) but useful for hot-patches. Currently allowed via legacy mode; should the new schema explicitly support it?

    3. **STILL_OPEN — `every_minutes` snapshot timing**: gemini correctly notes consensus-mcp is per-invocation. Defer time-based to a future iteration when a daemon mode exists. v1 accepts the field but rejects non-null with `not_yet_implemented`.

    4. **STILL_OPEN — Adapter registration mechanism for future AIs**: schema_version=1 hardcodes {claude, codex, gemini}. Future operators may want to add an aider adapter, deepseek, local llama, etc. How extensible should v1 be? Currently the validation enforces the closed enum; future schema_version=2 could open it.

    5. **STILL_OPEN — config_sha256 stamping when config changes mid-iteration**: codex proposed strict immutability with `replan --allow-config-change` creating a new iteration. Convergence agreed. Surface for operator confirmation that this is the right rigor level.

    6. **STILL_OPEN — Patch authoring with `any-contributor`**: if codex + gemini both propose patches on the same finding, who wins? Convergence rule should apply, but the per-finding sub-loop interaction with workflow=#4 (where we forced all-or-nothing) needs explicit handling. Resolution proposal: workflow #4 with `patches.authoring=any-contributor` means each contributor's proposal includes their patches; the converged plan picks one set or merges; no separate per-finding sub-loop within #4.

    7. **STILL_OPEN — Validation rule D6**: `workflow.mode == 4` forces `convergence.finding_disposition: all-or-nothing`. Is this too restrictive? Operator may want per-finding granularity even within workflow #4. Resolution proposal: keep the rule for v1 to bound complexity; revisit in v2 if operators request.

    Implementation begins in iter-0016 once these STILL_OPEN questions are addressed (either by operator decision or by further codex/gemini convergence rounds).
