schema_version: 1
pilot_id: iteration-0021-next-direction-consult
workflow_mode: propose-converge
independence: blind-first-reveal
goal:
  summary: |
    iter-0021 — design consult (workflow #4) to pick the next major direction
    for consensus-mcp now that v1.14.0 is feature-complete, packaged, and
    documented. All three contributors (claude/codex/gemini) propose blindly,
    then converge across rounds.
  question: |
    Given the current state of consensus-mcp v1.14.0 (5 iterations shipped
    tonight: iter-0016d wizard, iter-0017 packaging, iter-0018 changelog,
    iter-0019 test isolation, iter-0020 changelog sync), what is the highest-
    value next iteration and what is the implementation approach?

    Each contributor should:
      1. Pick ONE target from the candidate list (or propose a different
         in-scope target if you have a better one).
      2. Justify briefly WHY it's the highest-value next move (compare to
         the alternatives).
      3. Sketch the implementation approach (files touched, key design
         decisions, validators/tests, scope boundaries, risks).
      4. List the smallest deliverable scope that would close ONE iteration
         (so we don't sprawl).

    Candidate targets (non-exclusive — propose another if warranted):

    (a) **MCP wiring of workflow_engine + contributors**: surface the iter-
        0016c workflow engine through MCP tools so operators can drive
        workflow #4 (and #3, advisory) end-to-end via the existing MCP
        server. Today the engine is reachable only as a Python import; no
        MCP tool dispatches it. Likely needs: new tool `consensus_run_
        iteration` reading `.consensus/config.yaml`, building adapters from
        `contributors.enabled`, calling `WorkflowEngine.run_iteration()`,
        returning structured outcome. Plus `consensus_evaluate_convergence`
        and `consensus_get_iteration_outcome` (read-only) probably.

    (b) **Lazy `REPO_ROOT` resolution architecture refactor**: the deeper
        fix iter-0019 worked around. Convert module-level `REPO_ROOT` /
        `ARCHIVE_DIR` / `INDEX_PATH` / `ACTIVE_DIR` constants in
        `review_write_and_seal.py`, `audit_append_event.py`, and ~8 other
        tools to lazy functions that re-read `CONSENSUS_MCP_REPO_ROOT` per
        call. Risk: every tool in consensus_mcp.tools touches this; if any
        long-lived MCP-server session assumes a stable repo root, lazy
        resolution could surprise it.

    (c) **Audit-trail cleanup**: scrub 20 stale `iter-9999-*` entries
        from `consensus-state/archive/review-passes/index.yaml` left over
        from pre-iter-0019 test pollution. Touches audit-trail provenance
        so needs careful design (immutable seal semantics vs. provable-
        fixture flag vs. delete-and-document).

    (d) **README.md v1.14.0 refresh**: README presumably still describes
        v1.13.0 surface. Add init-wizard quickstart, contributor pool
        config, snapshot/restore overview. Low risk, modest value.

    (e) **Some other in-scope target** the contributor identifies.

    A good answer rejects candidates that aren't actually the highest-
    value next move, and proposes a concretely-bounded iteration with
    clear acceptance gates.

  desired_end_state: |
    converged-plan.yaml at iteration_dir root names the next iteration
    (iter-0022 ID, summary, deliverable scope, acceptance gates) with all
    three contributors having goal_satisfied=true on the final round and
    no blocking objections. Engine output captures convergence rationale.
  non_goals:
    - implementing any of the candidate targets in this iteration
      (this is a design consult; implementation is iter-0022)
    - resolving every outstanding item — pick ONE to do next
    - architectural rewrites beyond the chosen target's scope
allowed_files: []
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 3
max_patch_size: 0
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: converged-plan.yaml exists at iteration_dir root
    check: 'py -3.11 -c "import os; assert os.path.exists(''consensus-state/active/iteration-0021-next-direction-consult/converged-plan.yaml''); print(''ok'')"'
  - id: A2
    description: all three contributors approved final round
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - non_convergence_after_3_rounds
operator_escalation_triggers:
  - non_convergence_after_3_rounds
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T07:45:00Z'
  codex_patch_apply_authorized: false
  scope_signature: f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5
contributors:
  enabled: [claude, codex, gemini]
convergence:
  rule: unanimous
  finding_disposition: all-or-nothing
