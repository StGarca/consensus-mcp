selected_target: (a) MCP wiring of workflow_engine + contributors

rationale_vs_alternatives: |
  (a) is highest-value because it's the load-bearing UX gap. Right now the
  workflow #4 engine and N-contributor adapter pool — the work that defined
  v1.14.0 — are only reachable via Python import. An operator running the
  installed MCP server cannot actually drive an iteration through workflow
  #4; they can only invoke the legacy single-reviewer dispatch tools. That
  means we shipped the engine but the engine isn't usable. Until (a) is
  done, v1.14.0's headline feature is dark.

  (b) lazy REPO_ROOT is genuine debt but iter-0019 already removed the
  visible symptom. It's optimization, not capability. Defer.

  (c) audit-trail cleanup is hygiene of ~20 lines. The pollution doesn't
  cause failures anymore. Strictly cosmetic. Defer.

  (d) README refresh has real onboarding value but is downstream of (a):
  documenting the wizard + workflow #4 makes more sense once the MCP
  surface for #4 exists, otherwise the README would describe two parallel
  ways to run iterations (legacy MCP tools vs. new Python-only engine).

  No (e) alternative — the candidate list covers the visible-from-here
  surface.

proposed_iter_id: iteration-0022-mcp-wire-workflow-engine

deliverable_scope:
  primary_tool:
    name: consensus_run_iteration
    purpose: |
      MCP tool that orchestrates one iteration end-to-end per the operator's
      .consensus/config.yaml. Reads config, instantiates adapters from
      contributors.enabled, constructs WorkflowEngine, calls run_iteration(),
      returns the structured IterationOutcome.
    inputs:
      - iteration_dir (path; engine writes effective-config.yaml + contributor
        artifacts + convergence packets here)
      - goal_packet_path (path; same shape as today's dispatcher inputs)
      - target_path (path; for #3 the patch under review, for #4 the problem
        statement, for advisory the artifact)
      - config_path (optional; defaults to .consensus/config.yaml at repo root)
    outputs:
      - workflow_mode (echoed from effective config)
      - converged (bool)
      - convergence_rule (echoed)
      - contributors_responsive (list)
      - contributors_timed_out (list)
      - approve_votes / block_votes (lists of contributor keys)
      - blocking_objection_ids (list)
      - final_artifact_path (for workflow #4 = converged-plan.yaml; for #3
        = the reviewed target_path)
      - rationale (string from ConvergenceOutcome)
      - error (optional; surfaces WorkflowError messages)
  secondary_tool:
    name: consensus_get_iteration_outcome
    purpose: |
      Read-only inspector — returns the parsed converged-plan.yaml (workflow
      #4) or the sealed contributor artifacts list (workflow #3) for an
      iteration_dir, so operators / downstream tools can introspect outcomes
      without re-running.
  out_of_scope:
    - exposing the wizard as an MCP tool (operators run it via
      `consensus-init` CLI; no MCP wrapper needed for a one-shot init)
    - re-running aborted iterations (separate `consensus_resume_iteration`
      tool would be a follow-up; today's engine is single-shot)
    - any changes to the engine's internals — this iteration ONLY wires
      the existing engine through new MCP tools

key_design_decisions:
  - The new tool stays orthogonal to the legacy `reviewer_dispatch_codex` /
    `reviewer_dispatch_gemini` tools. Those are single-contributor primitives;
    `consensus_run_iteration` is the multi-contributor orchestrator. Both
    coexist; the legacy tools become "advanced/escape hatch", the new tool
    becomes the recommended entry point.
  - Adapter instantiation factory lives in a new helper (e.g.,
    `consensus_mcp/_engine_factory.py`) so the same wiring is reusable from
    Python and from the MCP tool. Map contributor key → adapter class:
      claude → ClaudeAdapter (orchestrator self, via artifact_callback)
      codex  → CodexAdapter
      gemini → GeminiAdapter
  - For workflow #4 the orchestrator-self artifact_callback needs a real
    handler. Today ClaudeAdapter's callback writes via T6 with confinement
    check on iteration_id + reviewer_id tokens. The MCP tool surface needs
    to expose how the operator provides claude's content — either as a
    parameter to `consensus_run_iteration` (claude_proposal_yaml: str) or
    via a separate `consensus_submit_claude_proposal` step before running.
    DECISION POINT: I lean toward parameter form for round-1 simplicity;
    multi-round convergence may need the submit-step form. Worth flagging
    to codex/gemini.
  - Timeout policy + max-round semantics inherited from config; the tool
    doesn't accept overrides (keeps the contract tight).
  - All sealing already flows through T6; no new audit surface needed.
  - Tool registered in `tool_registry.py` with proper MCP wire format
    (lessons from iter-0008).
  - argparse-free (uses tool wrapper convention from other MCP tools).

risks:
  - claude-as-MCP-tool-caller-AND-claude-as-contributor is the tricky bit.
    When the MCP tool is invoked, "claude" the contributor inside the
    engine needs content from claude the operator. If we don't get the
    artifact_callback contract right, the orchestrator-self ends up
    deadlocked or fabricates content. Mitigation: parameterized
    claude_proposal_yaml on the tool; tool validates JSON shape before
    calling engine.
  - Effective-config write must use `cfg.load()` not raw yaml.safe_load
    so legacy-mode synthesis still works for older repos without
    `.consensus/config.yaml`.
  - Touching `tool_registry.py` needs the camelCase `inputSchema` shape;
    regression from iter-0008.

acceptance_gates_for_iter_0022:
  - A1: full suite >=662 green (current 658 + at least 4 new tool tests
        covering happy-path workflow #3 + happy-path workflow #4 + missing-
        config error + adapter-construction failure)
  - A2: integration smoke (tmp_path-isolated archive per iter-0019 pattern):
        run `consensus_run_iteration` end-to-end with FakeAlwaysApprove
        adapters from `contributors.base`, assert converged-plan.yaml lands
        at expected path
  - A3: MCP wire format compliance (test_tool_registry_mcp_wire_format.py
        recognizes the new tool with flat `{name, description, inputSchema}`
        shape)
  - A4: no regression in legacy reviewer_dispatch_* tools

