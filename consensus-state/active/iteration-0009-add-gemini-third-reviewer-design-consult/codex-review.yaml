  summary: N-of-M reviewer design verdict
  citation: docs/design-consults/iter-0009-add-gemini-third-reviewer.md:86
  risk: Extracting a shared dispatch base is the right shape for N reviewers, but
    it is the riskiest change because it touches hardened codex behavior and needs
    regression coverage before gemini lands. Validator-retry is the safer default
    for schemaless adapters because prompt-only JSON is brittle, while a single retry
    bounds latency and failure loops. Explicit claude attestation avoids the ambiguous
    tie and implicit-author-vote edge cases in the first governance rewrite. Version-stamping
    is worth the small overhead because this machinery may later re-evaluate historical
    sealed reviews, and strict majority keeps ties from passing as consensus.
  recommendation: 'Q1: F1b; Q2: F2b; Q3: F4b; Q4: F5c; Q5: F6a; Q6: strict; Q7: added:
    reviewer-specific timeout/model/sandbox policy and adapter capability metadata
    for native schema, retry support, network/edit permissions, and rate-limit behavior.'
