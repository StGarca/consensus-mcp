schema_version: 1
pilot_id: iteration-0009-add-gemini-third-reviewer-design-consult
goal:
  summary: "Cross-AI consult on generalizing reviewer pool to N-of-M (gemini as first new adapter) — F1-F6 design choices, Q1-Q7 verdict."
  desired_end_state: |
    Codex reviews docs/design-consults/iter-0009-add-gemini-third-reviewer.md
    (embedded in review-packet.yaml, NOT a raw md file) and emits ONE finding
    answering seven questions:

      Q1 helper module: F1a (fork) or F1b (extract _dispatch_base.py)
      Q2 schemaless reviewer output: F2a (prompt-only) or F2b (validator-retry)
      Q3 claude's vote: F4a (implicit) or F4b (explicit claude-review.yaml)
      Q4 enablement mechanism: F5a (env), F5b (goal_packet), or F5c (both)
      Q5 backward compat: F6a (version-stamp) or F6b (read-only history)
      Q6 even-N quorum: strict (N/2+1, ties refuse) or inclusive (>=N/2, ties pass)
      Q7 missing findings: "none" or "added: <list>"

    Recommendation field carries:
      "Q1: <F1a|F1b>; Q2: <F2a|F2b>; Q3: <F4a|F4b>; Q4: <F5a|F5b|F5c>; Q5: <F6a|F6b>; Q6: <strict|inclusive>; Q7: <none|added: ...>"
    Risk field carries short rationale (~4 sentences) covering highest-impact picks.

    Context codex needs to weigh:
      - Real ask is "generalize to N reviewers with dynamic enable/disable" —
        adding gemini is the first instance, not the only goal. Cost / rate
        limit / preference may toggle any reviewer; system must degrade
        gracefully (claude-only is the floor; any single external adapter
        being absent loses "another opinion" but not function).
      - Maintainer already chose: vote semantics = majority of enabled-and-
        responsive; dispatch = parallel. Do NOT re-litigate.
      - F1b (extract base) is strongly preferred under N-reviewer scope; codex
        confirm or dissent with reason.
      - This is the FIRST iteration to mutate consensus governance machinery
        itself. Reviewed by codex alone (chicken-and-egg: gemini doesn't exist
        yet); future iterations get 2-of-3 (or N-of-M) once landed.
  non_goals:
    - implement gemini dispatch or _dispatch_base refactor (this is design + scoping)
    - challenge the governance defaults (majority-of-enabled, parallel dispatch) already chosen by maintainer
    - touch existing iter-0001..0008 artifacts
    - rewrite codex review schema (new adapters conform to it)
allowed_files:
  - docs/design-consults/iter-0009-add-gemini-third-reviewer.md
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - consensus-state/
  - README.md
  - LICENSE
  - CHANGELOG.md
  - pyproject.toml
  - .github/
  - docs/architecture/
  - docs/workflows/
  - docs/postmortems/
  - docs/specs/
  - docs/templates/
max_iterations: 1
max_patch_size: 0
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: codex emits one finding with recommendation containing Q1/Q2/Q3/Q4/Q5/Q6/Q7 verdicts
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-12T22:55:00Z'
  codex_patch_apply_authorized: false
