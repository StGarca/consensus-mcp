  touched_files_contents:
    consensus_mcp/tools/repo_set_section.py: "\"\"\"repo.set_section MCP tool. Phase 2 G3 / claude-rev-048 / canonical-001 (T10).\n\nSection-aware WRITE of a spec md region. Closes the honor-system gap that\nscope_check.py file-path globs left open: a patch can declare it touches only\nsection_24 but the actual file edit can rewrite any section. This tool refuses\nto land such a write.\n\nPer design spec (docs/architecture/phase-1-completion.md\nlines 304-320):\n\n  inputs:\n    file: string\n    section_id: string\n    new_section_text: string\n    consensus_yaml_sha256: string  (binds write to specific implementation_scope)\n  outputs:\n    written_sha256: string\n    sections_unchanged_verified: list of section IDs (technical attestation)\n  permissions:\n    callable_by: implementer (only via patch.apply_consensus_patch in production)\n  technical_enforcement:\n    - \"Refuses if requested section is NOT in consensus.implementation_scope (per-section)\"\n    - \"Reads ALL sections pre-write + post-write; refuses if any other section changed\"\n\nINTRA-FILE SCOPE ENFORCEMENT\n----------------------------\n  1. Refuse if consensus_yaml_path is not provided (the implementation_scope\n     check is the load-bearing security gate; running blind would defeat the\n     point of T10 vs. naked file edit).\n  2. Load consensus.yaml; compute its canonical_yaml_sha256; refuse if mismatch.\n  3. Refuse if (file, section_id) is not in consensus.implementation_scope.\n     Match shape:\n       - allowed_sections: list of strings like \"<file_marker>/<section_id>\"\n         where file_marker is the file's repo-relative path (forward slashes).\n       - allowed_sections: OR list of {file, section_id} dicts.\n       - If allowed_sections is absent: fall back to allowed_files. The fall-\n         back PERMITS the write if the file matches AND no per-section list\n         is encoded for that file. Documented honestly: this fallback is the\n         honor-system path and is here only because legacy consensus files\n         predate the per-section field. New consensus files SHOULD encode\n         allowed_sections explicitly.\n  4. Build new_text via parse + replace + reconstruct.\n  5. Re-parse new_text and diff against pre-parse. If any non-target section's\n     section_text changed (or section_id set differs), refuse with\n     \"unintended_section_change\" + the unintended-changes list. This catches\n     the \"new_section_text contains a '## N.' line that the parser interprets\n     as a new heading\" attack/bug.\n  6. Atomic write (tempfile + os.replace).\n  7. Optional audit event (apply_step_landed) when iteration_id is supplied.\n\nFAILURE MODES\n-------------\n  - file_not_found\n  - path_outside_repo\n  - section_not_found\n  - consensus_yaml_path_required        (set_section without consensus is forbidden)\n  - invalid_consensus_yaml              (file does not parse as YAML mapping)\n  - consensus_sha_mismatch              (consensus_yaml_sha256 doesn't match the file)\n  - section_not_in_implementation_scope\n  - unintended_section_change           (round-trip safety check fired)\n  - audit_write_failed                  (write succeeded but audit emit failed; manual reconcile)\n\nCONCURRENCY (v1.0)\n------------------\nSingle-writer. Concurrent invocations on the same spec md file can race the\nread-validate-write window. The consensus pipeline is single-writer by design.\n**Do not invoke concurrently for the same file.** Per-iteration filelock\ndeferred to Phase 1.x.\n\nMISSING-REQUIRED-FIELD CONTRACT (Round 6 F9 v1.9.2 disclosure): missing\nrequired positional arguments raise Python TypeError, NOT a structured\n{\"error\": \"missing_*_field\"} return. file=\"\" / file=None and consensus_yaml_path\n=\"\" / consensus_yaml_path=None ARE caught upfront by _resolve_under_repo and\nreturned as {\"error\": \"file_required\"} (Round 6 F8 fix). A missing 'file' or\n'consensus_yaml_sha256' kwarg entirely will TypeError at the function signature\nlevel. Same contract applies to T8/T9/T11.\n\"\"\"\nfrom __future__ import annotations\n\nimport hashlib\nimport os\nimport tempfile\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp._paths import project_root\nfrom consensus_mcp.tools._md_sections import parse, reconstruct  # noqa: E402\nfrom consensus_mcp.tools.audit_append_event import handle as audit_handle  # noqa: E402\n\n# iter-0035 (Phase B step 3 per iter-0024 plan): migrated from module-level\n# REPO_ROOT capture to lazy `_paths.project_root()` resolution.\n\n\ndef __getattr__(name: str):\n    \"\"\"PEP 562 backward compat for external callers that referenced\n    `REPO_ROOT` as a module attribute (codex-rev-002 pass-1).\"\"\"\n    if name == \"REPO_ROOT\":\n        return project_root()\n    raise AttributeError(f\"module {__name__!r} has no attribute {name!r}\")\n\n\nSCHEMA = {\n    \"name\": \"repo.set_section\",\n    \"description\": (\n        \"Section-aware write of a spec md region. Refuses if the section is not \"\n        \"in consensus.implementation_scope, or if any other section would change \"\n        \"as a side effect of the write (round-trip safety check).\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"file\": {\n                \"type\": \"string\",\n                \"description\": \"Spec md path (absolute or repo-relative).\",\n            },\n            \"section_id\": {\n                \"type\": \"string\",\n                \"description\": \"Section identifier ('frontmatter' or 'section_N').\",\n            },\n            \"new_section_text\": {\n                \"type\": \"string\",\n                \"description\": \"Full new text for the section (replaces existing).\",\n            },\n            \"consensus_yaml_sha256\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Canonical SHA-256 of consensus.yaml authorizing this write. \"\n                    \"Recorded in audit; checked against consensus_yaml_path if \"\n                    \"provided.\"\n                ),\n            },\n            \"consensus_yaml_path\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Repo-relative or absolute path to consensus.yaml. Required \"\n                    \"in v1.0 (no force-bypass). Used to enforce per-section scope.\"\n                ),\n            },\n            \"iteration_id\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": (\n                    \"Optional iteration whose audit log gets the apply_step_landed \"\n                    \"event. If None, no audit event is emitted.\"\n                ),\n            },\n        },\n        \"required\": [\n            \"file\",\n            \"section_id\",\n            \"new_section_text\",\n            \"consensus_yaml_sha256\",\n            \"consensus_yaml_path\",\n        ],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"description\": (\n            \"Success: {written, written_sha256, sections_unchanged_verified, \"\n            \"file, audit_event_id}. Failure: {error, ...}.\"\n        ),\n        \"oneOf\": [\n            {\n                \"title\": \"success\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"written\": {\"type\": \"boolean\", \"enum\": [True]},\n                    \"written_sha256\": {\"type\": \"string\"},\n                    \"sections_unchanged_verified\": {\n                        \"type\": \"array\",\n                        \"items\": {\"type\": \"string\"},\n                    },\n                    \"file\": {\"type\": \"string\"},\n                    \"audit_event_id\": {\"type\": [\"string\", \"null\"]},\n                },\n                \"required\": [\n                    \"written\",\n                    \"written_sha256\",\n                    \"sections_unchanged_verified\",\n                    \"file\",\n                    \"audit_event_id\",\n                ],\n            },\n            {\n                \"title\": \"failure\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"error\": {\n                        \"type\": \"string\",\n                        \"enum\": [\n                            \"file_not_found\",\n                            \"path_outside_repo\",\n                            \"section_not_found\",\n                            \"consensus_yaml_path_required\",\n                            \"invalid_consensus_yaml\",\n                            \"consensus_sha_mismatch\",\n                            \"section_not_in_implementation_scope\",\n                            \"unintended_section_change\",\n                            \"audit_write_failed\",\n                        ],\n                    },\n                    \"detail\": {\"type\": [\"string\", \"null\"]},\n                    \"available_section_ids\": {\n                        \"type\": [\"array\", \"null\"],\n                        \"items\": {\"type\": \"string\"},\n                    },\n                    \"unintended_changed_section_ids\": {\n                        \"type\": [\"array\", \"null\"],\n                        \"items\": {\"type\": \"string\"},\n                    },\n                    \"consensus_yaml_sha256_actual\": {\"type\": [\"string\", \"null\"]},\n                },\n                \"required\": [\"error\"],\n            },\n        ],\n    },\n}\n\n\ndef _resolve_under_repo(path_str: str) -> Path | dict:\n    \"\"\"Resolve to absolute path under project_root(). Returns Path or {error: ...}.\n\n    Guards against path_str=\"\" / path_str=None: refuse upfront with a structured\n    file_required error rather than letting Path(\"\").resolve() pass through to a\n    read_text PermissionError\
      \ on a directory. (Round 6 F8 fix; symmetric with\n    repo_get_section._resolve_under_repo.)\n    \"\"\"\n    if not path_str:\n        return {\"error\": \"file_required\", \"detail\": \"path argument is empty or None\"}\n    p = Path(path_str)\n    if not p.is_absolute():\n        p = project_root() / p\n    try:\n        resolved = p.resolve()\n    except OSError as exc:\n        return {\"error\": \"file_not_found\", \"detail\": str(exc)}\n    try:\n        resolved.relative_to(project_root().resolve())\n    except ValueError:\n        return {\"error\": \"path_outside_repo\", \"detail\": str(resolved)}\n    if not resolved.exists():\n        return {\"error\": \"file_not_found\", \"detail\": str(resolved)}\n    if not resolved.is_file():\n        return {\"error\": \"file_required\", \"detail\": f\"path resolves to a directory, not a file: {resolved}\"}\n    return resolved\n\n\ndef _canonical_yaml_sha256_from_text(text: str) -> str:\n    \"\"\"Canonical SHA-256: hash of yaml.safe_dump(safe_load(text), sort_keys=True).\"\"\"\n    loaded = yaml.safe_load(text)\n    return hashlib.sha256(\n        yaml.safe_dump(loaded, sort_keys=True).encode(\"utf-8\")\n    ).hexdigest()\n\n\ndef _file_marker(file_path: Path) -> str:\n    \"\"\"Return repo-relative forward-slash marker for scope matching.\n\n    Examples:\n      .../docs/architecture/orchestration-spec.md\n        -> \"docs/architecture/orchestration-spec.md\"\n\n    The shorthand \"spec_md\" is also accepted at scope-match time as an alias\n    for the canonical spec path (see _is_scope_allowed).\n    \"\"\"\n    try:\n        rel = file_path.relative_to(project_root().resolve())\n    except ValueError:\n        # File outside project_root() shouldn't reach here (caller refused).\n        return str(file_path).replace(\"\\\\\", \"/\")\n    return str(rel).replace(\"\\\\\", \"/\")\n\n\n_SPEC_MD_REL = (\n    \"docs/architecture/\"\n    \"orchestration-spec.md\"\n)\n\n\ndef _is_scope_allowed(\n    consensus: dict,\n    file_marker: str,\n    section_id: str,\n) -> tuple[bool, str]:\n    \"\"\"Return (allowed, reason) per implementation_scope.\n\n    Match order:\n      1. allowed_sections (per-section, preferred). Each entry is one of:\n          - string \"<marker>/<section_id>\"  (e.g., \"spec_md/section_24\" or\n            \"wiki/.../<file>.md/section_24\")\n          - dict {\"file\": \"<marker>\", \"section_id\": \"<id>\"}\n         \"spec_md\" is an alias for the canonical spec md path.\n      2. If allowed_sections is absent or empty, fall back to allowed_files\n         (per-file). If file is in allowed_files: allow. This is the legacy\n         honor-system path; new consensus files SHOULD use allowed_sections.\n      3. Otherwise refuse.\n    \"\"\"\n    scope = consensus.get(\"implementation_scope\") or {}\n    if not isinstance(scope, dict):\n        return False, \"implementation_scope is not a mapping\"\n\n    allowed_sections = scope.get(\"allowed_sections\")\n    file_aliases = {file_marker, \"spec_md\"} if file_marker == _SPEC_MD_REL else {file_marker}\n\n    if isinstance(allowed_sections, list) and allowed_sections:\n        for entry in allowed_sections:\n            if isinstance(entry, str):\n                # \"<marker>/<section_id>\" — split on the last \"/\"; the section_id\n                # part is the literal \"frontmatter\" or \"section_N\" trailing token.\n                # We accept any of the file aliases as the marker prefix.\n                for alias in file_aliases:\n                    expected_prefix = alias + \"/\"\n                    if entry.startswith(expected_prefix):\n                        sec_part = entry[len(expected_prefix):]\n                        if sec_part == section_id:\n                            return True, \"matched allowed_sections string entry\"\n            elif isinstance(entry, dict):\n                e_file = entry.get(\"file\", \"\")\n                e_sec = entry.get(\"section_id\", \"\")\n                if e_file in file_aliases and e_sec == section_id:\n                    return True, \"matched allowed_sections dict entry\"\n        return False, (\n            \"allowed_sections present but did not match \"\n            f\"{file_marker}/{section_id}\"\n        )\n\n    # Legacy fallback: allowed_files.\n    allowed_files = scope.get(\"allowed_files\") or []\n    if isinstance(allowed_files, list):\n        for af in allowed_files:\n            if isinstance(af, str) and af in file_aliases:\n                return True, \"matched allowed_files (legacy per-file path)\"\n\n    return False, (\n        \"neither allowed_sections nor allowed_files matched \"\n        f\"{file_marker}/{section_id}\"\n    )\n\n\ndef handle(\n    file: str,\n    section_id: str,\n    new_section_text: str,\n    consensus_yaml_sha256: str,\n    consensus_yaml_path: str,\n    iteration_id: str | None = None,\n) -> dict:\n    \"\"\"Write one section of a spec md file under intra-file scope enforcement.\n\n    Returns success-shape or failure-shape per SCHEMA.output_schema oneOf.\n    See module docstring for full failure mode list.\n    \"\"\"\n    # ---- Step 1: resolve target file ----\n    resolved_or_err = _resolve_under_repo(file)\n    if isinstance(resolved_or_err, dict):\n        return resolved_or_err\n    target_path = resolved_or_err\n\n    # ---- Step 2: pre-parse ----\n    try:\n        current_text = target_path.read_text(encoding=\"utf-8\")\n    except UnicodeDecodeError as exc:\n        return {\"error\": \"invalid_utf8\", \"detail\": str(exc)}\n    pre_smap = parse(current_text)\n\n    if section_id not in pre_smap.sections:\n        return {\n            \"error\": \"section_not_found\",\n            \"detail\": f\"section_id {section_id!r} not in file\",\n            \"available_section_ids\": pre_smap.section_ids(),\n        }\n\n    # ---- Step 3: consensus path required (no force-bypass in v1.0) ----\n    if not consensus_yaml_path or not consensus_yaml_path.strip():\n        return {\n            \"error\": \"consensus_yaml_path_required\",\n            \"detail\": (\n                \"v1.0 requires consensus_yaml_path; force-bypass deferred to \"\n                \"Phase 1.x.\"\n            ),\n        }\n\n    consensus_resolved_or_err = _resolve_under_repo(consensus_yaml_path)\n    if isinstance(consensus_resolved_or_err, dict):\n        # Re-key as invalid_consensus_yaml so the caller distinguishes \"the\n        # consensus file is missing/outside-repo\" from \"the spec md is missing\".\n        return {\n            \"error\": \"invalid_consensus_yaml\",\n            \"detail\": (\n                f\"consensus_yaml_path could not be resolved under project_root(): \"\n                f\"{consensus_resolved_or_err}\"\n            ),\n        }\n    consensus_path = consensus_resolved_or_err\n\n    try:\n        consensus_text = consensus_path.read_text(encoding=\"utf-8\")\n        consensus = yaml.safe_load(consensus_text)\n    except (UnicodeDecodeError, yaml.YAMLError) as exc:\n        return {\"error\": \"invalid_consensus_yaml\", \"detail\": str(exc)}\n    if not isinstance(consensus, dict):\n        return {\n            \"error\": \"invalid_consensus_yaml\",\n            \"detail\": (\n                f\"consensus.yaml must be a YAML mapping; got \"\n                f\"{type(consensus).__name__}\"\n            ),\n        }\n\n    # ---- Step 4: consensus sha match ----\n    actual_sha = _canonical_yaml_sha256_from_text(consensus_text)\n    if actual_sha != consensus_yaml_sha256:\n        return {\n            \"error\": \"consensus_sha_mismatch\",\n            \"detail\": (\n                \"consensus_yaml_sha256 does not match the canonical sha of \"\n                \"consensus_yaml_path\"\n            ),\n            \"consensus_yaml_sha256_actual\": actual_sha,\n        }\n\n    # ---- Step 5: scope check ----\n    file_marker = _file_marker(target_path)\n    allowed, reason = _is_scope_allowed(consensus, file_marker, section_id)\n    if not allowed:\n        return {\n            \"error\": \"section_not_in_implementation_scope\",\n            \"detail\": reason,\n        }\n\n    # ---- Step 6: stage new_text via reconstruct ----\n    new_smap = pre_smap.replace(section_id, new_section_text)\n    new_text = reconstruct(new_smap)\n\n    # ---- Step 7: round-trip safety check ----\n    post_smap = parse(new_text)\n\n    pre_ids = set(pre_smap.sections.keys())\n    post_ids = set(post_smap.sections.keys())\n\n    unintended: list[str] = []\n    # New or vanished section IDs are unintended.\n    for sid in (post_ids - pre_ids) | (pre_ids - post_ids):\n        unintended.append(sid)\n    # Same-id sections whose text changed (other than the requested target).\n    for sid in pre_ids & post_ids:\n        if sid == section_id:\n            # Target section MUST differ (the write); but if new text reparses\n            # to a different target text, that's a parser/round-trip violation\n            # too — flag it. Acceptable target text is whatever the parser\n            # extracted from the staged file at this section_id.\n            continue\n        if pre_smap.sections[sid] != post_smap.sections[sid]:\n            unintended.append(sid)\n\n    if unintended:\n        return {\n            \"error\": \"unintended_section_change\",\n            \"detail\": (\n                \"Reconstructed file would alter sections other than the target \"\n                \"(round-trip safety violated; new_section_text likely contains \"\n                \"a heading the parser interprets as a new section).\"\n            ),\n            \"unintended_changed_section_ids\": sorted(set(unintended)),\n        }\n\n    # ---- Step 8: atomic write ----\n    tmp_path = target_path.with_suffix(target_path.suffix + \".tmp\")\n    tmp_path.write_text(new_text, encoding=\"utf-8\")\n    os.replace(str(tmp_path), str(target_path))\n\n    written_sha = hashlib.sha256(new_text.encode(\"utf-8\")).hexdigest()\n\
      \    sections_unchanged = sorted(\n        sid for sid in pre_ids if sid != section_id\n    )\n\n    # ---- Step 9: optional audit event ----\n    audit_event_id: str | None = None\n    if iteration_id is not None:\n        try:\n            file_rel = str(target_path.relative_to(project_root().resolve())).replace(\"\\\\\", \"/\")\n        except ValueError:\n            file_rel = str(target_path)\n        audit_result = audit_handle(\n            iteration_id=iteration_id,\n            event_type=\"apply_step_landed\",\n            actor=\"implementer\",\n            artifact=file_rel,\n            sha256=written_sha,\n            effect=f\"repo.set_section committed {file_rel}#{section_id}\",\n            files_modified=[file_rel],\n            extra_fields={\n                \"consensus_yaml_sha256\": consensus_yaml_sha256,\n                \"section_id\": section_id,\n                \"sections_unchanged_verified_count\": len(sections_unchanged),\n            },\n        )\n        if \"error\" in audit_result:\n            return {\n                \"error\": \"audit_write_failed\",\n                \"detail\": (\n                    \"spec md was atomically written but audit.append_event failed. \"\n                    \"Operator must reconcile manually.\"\n                ),\n                \"audit_error\": audit_result[\"error\"],\n            }\n        audit_event_id = audit_result.get(\"event_id\")\n\n    return {\n        \"written\": True,\n        \"written_sha256\": written_sha,\n        \"sections_unchanged_verified\": sections_unchanged,\n        \"file\": str(target_path),\n        \"audit_event_id\": audit_event_id,\n    }\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/tools/state_update_decision_ledger.py: "\"\"\"state.update_decision_ledger MCP tool. Phase 2 G5 (canonical ledger writer).\n\nThe only authorized writer to consensus-state/state/disposition-ledger.yaml after\nPhase 2 G5 lands. Replaces direct yaml.safe_dump of the ledger file with\nmediated validate-then-write + audit emission.\n\nVALIDATE-THEN-WRITE PROTOCOL\n----------------------------\nPer design spec (docs/architecture/phase-1-completion.md\nlines 345-361):\n  1. Parse proposed_ledger_yaml (refuse if not parseable as a YAML mapping).\n  2. Stage to a temp file (no real-path write yet).\n  3. Run validate_disposition_index against the spec under the staged ledger\n     (the validator reads the spec; the ledger contributes sha256 to provenance).\n  4. If post-write findings > 0: refuse; real ledger bytes unchanged.\n  5. If post-write findings == 0: atomic write (temp + os.replace) to canonical path.\n  6. Emit audit event (apply_step_landed) if iteration_id supplied.\n\nVALIDATOR COVERAGE LIMITATION (assumption surfaced 2026-05-09)\n--------------------------------------------------------------\nvalidate_disposition_index.py validates the SPEC's section 24 disposition index\nagainst on-disk archived_at files, git tracking, archive index, and known_blockers.\nIt does NOT load disposition-ledger.yaml content into its validation passes; the\nledger participates only via its sha256 in the provenance block.\n\nImplication: post-write findings count is effectively independent of ledger\ncontent. The validate-then-write gate enforced here is a contract per the design\nspec. When the validator gains ledger-content checks (planned in a future spec\nrevision), this tool's gate becomes meaningful without code changes here.\n\nFAILURE MODES\n-------------\n  - invalid_yaml: proposed_ledger_yaml does not parse, or parses to a non-dict.\n    No file written; no audit event.\n  - no_consensus_sha_provided: consensus_yaml_sha256 missing or empty.\n    No file written; no audit event.\n  - validate_post_findings_nonzero: validator returned >0 findings against staged\n    state. No file written; no audit event. Returns findings list for caller diagnosis.\n  - audit_write_failed: ledger HAS been written atomically, but audit.append_event\n    failed (e.g., iteration dir missing). Operator must reconcile manually; the\n    ledger update is on disk and not rolled back. Includes ledger_canonical_sha256_post_write\n    so the operator can record state. Mirrors T5's audit_write_failed semantics.\n\nCONCURRENCY (v1.0)\n------------------\nSingle-writer. Per-iteration filelock is deferred to Phase 1.x. Concurrent calls\nto this tool can race on the read-validate-write window: two writes can both pass\nvalidation against pre-write state and the second os.replace wins, silently\ndiscarding the first. The consensus pipeline is single-writer by design (one orchestrator\nat a time). Do not invoke concurrently.\n\nMISSING-REQUIRED-FIELD CONTRACT (Round 6 F9 v1.9.2 disclosure): missing\nrequired positional arguments raise Python TypeError, NOT a structured\n{\"error\": \"missing_*_field\"} return. The output_schema enumerates structured\nerror codes for documented failure modes (validate_post_findings_nonzero,\ninvalid_yaml, audit_write_failed, etc.) but signature-level TypeError on\nmissing required kwargs is the documented contract for missing-input cases.\nCallers that route arguments through the MCP server's handler(**arguments)\ndispatch will see TypeError if the input dict omits a required field; this is\nloud and easy to debug. Same contract applies to T9/T10/T11.\n\"\"\"\nfrom __future__ import annotations\n\nimport hashlib\nimport os\nimport tempfile\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp._paths import project_root, state_root, spec_path\nfrom consensus_mcp.tools.audit_append_event import handle as audit_handle  # noqa: E402\n\n# iter-0035 (Phase B step 4 per iter-0024 plan): migrated from module-level\n# REPO_ROOT / LEDGER_PATH / SPEC_PATH captures to lazy `_paths` resolvers.\n# Each call reads env state. Helpers below resolve per-call.\n\n\ndef _ledger_path() -> Path:\n    \"\"\"<state_root>/state/disposition-ledger.yaml — lazy.\"\"\"\n    return state_root() / \"state\" / \"disposition-ledger.yaml\"\n\n\n# Public aliases preserved for tests / external callers that may have used\n# LEDGER_PATH and SPEC_PATH as constants. These are now lazy properties via\n# module __getattr__ below.\n\n\ndef __getattr__(name: str):\n    \"\"\"Lazy attribute access for legacy module-level constants.\n\n    iter-0035 backward compat: prior code referenced `LEDGER_PATH`,\n    `SPEC_PATH`, and `REPO_ROOT` as module constants. After migrating to\n    lazy resolvers, these names resolve to fresh Path objects on each\n    access via this __getattr__ hook (PEP 562).\n    \"\"\"\n    if name == \"LEDGER_PATH\":\n        return _ledger_path()\n    if name == \"SPEC_PATH\":\n        return spec_path()\n    if name == \"REPO_ROOT\":\n        return project_root()\n    raise AttributeError(f\"module {__name__!r} has no attribute {name!r}\")\n\nSCHEMA = {\n    \"name\": \"state.update_decision_ledger\",\n    \"description\": (\n        \"Validate-then-write the disposition ledger. Stages proposed YAML to a \"\n        \"temp file, runs validate_disposition_index against the spec under the \"\n        \"staged ledger, and only commits the atomic write if post-write findings \"\n        \"are zero. Emits an apply_step_landed audit event when iteration_id is \"\n        \"supplied. Single authorized writer for the ledger after Phase 2 G5.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"proposed_ledger_yaml\": {\n                \"type\": \"string\",\n                \"description\": \"Full new file content for disposition-ledger.yaml (YAML mapping).\",\n            },\n            \"consensus_yaml_sha256\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Canonical SHA-256 of the consensus.yaml that authorizes this \"\n                    \"ledger update. Recorded in the audit event.\"\n                ),\n            },\n            \"iteration_id\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": (\n                    \"Optional iteration the audit event lands under. If None, \"\n                    \"no audit event is emitted (audit_event_id will be null).\"\n                ),\n            },\n        },\n        \"required\": [\"proposed_ledger_yaml\", \"consensus_yaml_sha256\"],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"description\": (\n            \"Success: {written: True, validate_disposition_index_findings_pre, \"\n            \"validate_disposition_index_findings_post: 0, ledger_path, \"\n            \"ledger_canonical_sha256_post_write, audit_event_id}. \"\n            \"Failure: {error, ...}.\"\n        ),\n        \"oneOf\": [\n            {\n                \"title\": \"success\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"written\": {\"type\": \"boolean\", \"enum\": [True]},\n                    \"validate_disposition_index_findings_pre\": {\"type\": \"integer\"},\n                    \"validate_disposition_index_findings_post\": {\"type\": \"integer\", \"enum\": [0]},\n                    \"ledger_path\": {\"type\": \"string\"},\n                    \"ledger_canonical_sha256_post_write\": {\"type\": \"string\"},\n                    \"audit_event_id\": {\"type\": [\"string\", \"null\"]},\n                },\n                \"required\": [\n                    \"written\",\n                    \"validate_disposition_index_findings_pre\",\n                    \"validate_disposition_index_findings_post\",\n                    \"ledger_path\",\n                    \"ledger_canonical_sha256_post_write\",\n                    \"audit_event_id\",\n                ],\n            },\n            {\n                \"title\": \"failure\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"error\": {\n                        \"type\": \"string\",\n                        \"enum\": [\n                            \"invalid_yaml\",\n                            \"no_consensus_sha_provided\",\n                            \"validate_post_findings_nonzero\",\n                            \"audit_write_failed\",\n                        ],\n                    },\n                    \"detail\": {\"type\": [\"string\", \"null\"]},\n                    \"validate_disposition_index_findings_post\": {\"type\": [\"integer\", \"null\"]},\n                    \"findings\": {\"type\": [\"array\", \"null\"]},\n                    \"ledger_canonical_sha256_post_write\": {\"type\": [\"string\", \"null\"]},\n                    \"audit_error\": {\"type\": [\"string\", \"null\"]},\n                },\n                \"required\": [\"error\"],\n            },\n        ],\n    },\n}\n\n\ndef _canonical_sha256_from_text(yaml_text: str) -> str:\n    \"\"\"Return canonical SHA-256 (yaml.safe_dump(safe_load(text), sort_keys=True)).\"\"\"\n    loaded = yaml.safe_load(yaml_text)\n    return hashlib.sha256(\n        yaml.safe_dump(loaded, sort_keys=True).encode(\"utf-8\")\n    ).hexdigest()\n\n\ndef _build_redirected_spec(spec_text: str, staged_ledger_relpath: str) -> str:\n    \"\"\"Return spec_text with the frontmatter `disposition_ledger:` field repointed.\n\n    The validator's _build_provenance hashes the file at REPO_ROOT/<disposition_ledger>.\n    By rewriting that field to a repo-relative path that resolves to the staged ledger,\n    the validator sees staged content without the canonical file ever changing.\n\n    Returns spec_text unchanged if no disposition_ledger line is found.\n    \"\"\"\n    out_lines = []\n\
      \    in_frontmatter = False\n    saw_close = False\n    replaced = False\n    for line in spec_text.splitlines(keepends=True):\n        if not in_frontmatter and line.startswith(\"---\"):\n            in_frontmatter = True\n            out_lines.append(line)\n            continue\n        if in_frontmatter and not saw_close and line.startswith(\"---\"):\n            saw_close = True\n            out_lines.append(line)\n            continue\n        if in_frontmatter and not saw_close and not replaced:\n            stripped = line.lstrip()\n            if stripped.startswith(\"disposition_ledger:\"):\n                # Preserve indentation; replace value.\n                indent = line[: len(line) - len(stripped)]\n                out_lines.append(f'{indent}disposition_ledger: \"{staged_ledger_relpath}\"\\n')\n                replaced = True\n                continue\n        out_lines.append(line)\n    return \"\".join(out_lines)\n\n\ndef _run_validator_with_findings(staged_ledger_path: Path) -> tuple[int, list]:\n    \"\"\"Validate the spec with disposition_ledger frontmatter repointed to staged_ledger_path.\n\n    Materializes the staged ledger at a path under REPO_ROOT (so the relative-path\n    resolution in the validator works) without touching the canonical\n    consensus-state/state/disposition-ledger.yaml. Uses a sibling temp file in the\n    same state dir and a temp spec under wiki/.\n\n    Returns (total_findings, findings_list).\n    \"\"\"\n    from consensus_mcp.validators.validate_disposition_index import validate_disposition_index\n\n    # Place the redirect targets under REPO_ROOT so the validator's relative-path\n    # resolution (REPO_ROOT / disposition_ledger) finds the staged file. The state\n    # dir under REPO_ROOT is used as the staging sibling location so the staged\n    # ledger is reachable via repo-relative path. We deliberately do NOT use\n    # LEDGER_PATH.parent because LEDGER_PATH may be monkeypatched in tests to a\n    # path outside REPO_ROOT.\n    state_dir = state_root() / \"state\"\n    state_dir.mkdir(parents=True, exist_ok=True)\n    sibling_ledger = state_dir / f\".staged-ledger-{os.getpid()}.yaml\"\n    _spec = spec_path()\n    sibling_spec = _spec.parent / f\".staged-spec-{os.getpid()}.md\"\n\n    spec_text = _spec.read_text(encoding=\"utf-8\")\n    staged_relpath = str(sibling_ledger.relative_to(project_root())).replace(\"\\\\\", \"/\")\n    redirected_spec = _build_redirected_spec(spec_text, staged_relpath)\n\n    try:\n        sibling_ledger.write_bytes(staged_ledger_path.read_bytes())\n        sibling_spec.write_text(redirected_spec, encoding=\"utf-8\")\n        report = validate_disposition_index(sibling_spec)\n        return report[\"stats\"][\"total_findings\"], report.get(\"findings\", [])\n    finally:\n        for p in (sibling_ledger, sibling_spec):\n            try:\n                if p.exists():\n                    p.unlink()\n            except OSError:\n                pass\n\n\ndef handle(\n    proposed_ledger_yaml: str,\n    consensus_yaml_sha256: str,\n    iteration_id: str | None = None,\n) -> dict:\n    \"\"\"Validate-then-write the disposition ledger.\n\n    Args:\n        proposed_ledger_yaml: full YAML text to write to disposition-ledger.yaml.\n        consensus_yaml_sha256: canonical sha256 of the consensus authorizing this update.\n        iteration_id: optional iteration whose audit log gets the apply_step_landed event.\n\n    Returns success or failure shape per SCHEMA.output_schema oneOf.\n    \"\"\"\n    # ---- Step 0: input validation ----\n    if not consensus_yaml_sha256 or not consensus_yaml_sha256.strip():\n        return {\n            \"error\": \"no_consensus_sha_provided\",\n            \"detail\": \"consensus_yaml_sha256 is required and must be non-empty.\",\n        }\n\n    try:\n        loaded = yaml.safe_load(proposed_ledger_yaml)\n    except yaml.YAMLError as exc:\n        return {\n            \"error\": \"invalid_yaml\",\n            \"detail\": f\"proposed_ledger_yaml failed to parse: {exc}\",\n        }\n    if not isinstance(loaded, dict):\n        return {\n            \"error\": \"invalid_yaml\",\n            \"detail\": (\n                f\"proposed_ledger_yaml must parse to a YAML mapping; \"\n                f\"got {type(loaded).__name__}\"\n            ),\n        }\n\n    # ---- Step 1: pre-state findings (real disk) ----\n    from consensus_mcp.validators.validate_disposition_index import validate_disposition_index\n    pre_report = validate_disposition_index(spec_path())\n    pre_findings_count = pre_report[\"stats\"][\"total_findings\"]\n\n    # ---- Step 2: stage + validate against hypothetical post-write state ----\n    staging_dir = tempfile.mkdtemp(prefix=\"state-update-stage-\")\n    staged_path = Path(staging_dir) / \"disposition-ledger.yaml\"\n    staged_path.write_text(proposed_ledger_yaml, encoding=\"utf-8\")\n\n    try:\n        post_count, post_findings = _run_validator_with_findings(staged_path)\n    finally:\n        try:\n            staged_path.unlink()\n            Path(staging_dir).rmdir()\n        except OSError:\n            pass\n\n    # ---- Step 3: refuse on non-zero post findings ----\n    if post_count > 0:\n        return {\n            \"error\": \"validate_post_findings_nonzero\",\n            \"validate_disposition_index_findings_post\": post_count,\n            \"findings\": post_findings,\n            \"detail\": (\n                f\"validate_disposition_index reports {post_count} finding(s) against \"\n                \"the hypothetical post-write state; ledger was NOT written.\"\n            ),\n        }\n\n    # ---- Step 4: atomic write to real path ----\n    _ledger = _ledger_path()\n    tmp_path = _ledger.with_suffix(_ledger.suffix + \".tmp\")\n    tmp_path.write_text(proposed_ledger_yaml, encoding=\"utf-8\")\n    os.replace(str(tmp_path), str(_ledger))\n\n    post_canonical_sha = _canonical_sha256_from_text(proposed_ledger_yaml)\n\n    # ---- Step 5: optional audit event ----\n    audit_event_id: str | None = None\n    if iteration_id is not None:\n        audit_result = audit_handle(\n            iteration_id=iteration_id,\n            event_type=\"apply_step_landed\",\n            actor=\"orchestrator\",\n            artifact=\"consensus-state/state/disposition-ledger.yaml\",\n            sha256=post_canonical_sha,\n            effect=\"state.update_decision_ledger committed\",\n            files_modified=[\"consensus-state/state/disposition-ledger.yaml\"],\n            extra_fields={\n                \"consensus_yaml_sha256\": consensus_yaml_sha256,\n                \"validate_disposition_index_findings_pre\": pre_findings_count,\n                \"validate_disposition_index_findings_post\": 0,\n            },\n        )\n        if \"error\" in audit_result:\n            # Ledger already written; operator must reconcile.\n            return {\n                \"error\": \"audit_write_failed\",\n                \"ledger_canonical_sha256_post_write\": post_canonical_sha,\n                \"audit_error\": audit_result[\"error\"],\n                \"detail\": (\n                    \"Ledger was atomically written but audit.append_event failed. \"\n                    \"Operator must inspect consensus-state/state/disposition-ledger.yaml \"\n                    \"and the iteration's independence-audit.yaml to reconcile.\"\n                ),\n            }\n        audit_event_id = audit_result.get(\"event_id\")\n\n    try:\n        ledger_rel = str(_ledger_path().relative_to(project_root()))\n    except ValueError:\n        # LEDGER_PATH may be monkeypatched outside REPO_ROOT in tests; fall back\n        # to the absolute string. Production callers always have LEDGER_PATH inside.\n        ledger_rel = str(LEDGER_PATH)\n\n    return {\n        \"written\": True,\n        \"validate_disposition_index_findings_pre\": pre_findings_count,\n        \"validate_disposition_index_findings_post\": 0,\n        \"ledger_path\": ledger_rel,\n        \"ledger_canonical_sha256_post_write\": post_canonical_sha,\n        \"audit_event_id\": audit_event_id,\n    }\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/tools/patch_stage_and_dry_run.py: "\"\"\"patch.stage_and_dry_run MCP tool. Phase 1 G2 partial (dry-run; not apply).\n\nImplements the canonical-006 anti_regression_criterion.iteration_applied_changes_extension\nas a technical gate. Replaces manual orchestrator staging mechanism with\nmediated staging + isolated subprocess validation.\n\nCONCURRENCY NOTE: validators write to shared consensus-state/state/validate-*-report.yaml\npaths. This tool redirects all validator output to temp paths, so concurrent\ncalls do NOT race on the shared report files. Phase 0 is single-writer anyway.\n\"\"\"\nfrom __future__ import annotations\nimport json\nimport shutil\nimport subprocess\nimport sys\nimport tempfile\nfrom pathlib import Path\n\nfrom consensus_mcp._paths import project_root, active_dir, spec_path\n\n# iter-0035 (Phase B step 5 per iter-0024 plan): migrated from module-level\n# REPO_ROOT / SPEC_PATH / ACTIVE_DIR captures to lazy `_paths` resolvers.\n\n\ndef __getattr__(name: str):\n    \"\"\"Lazy module-level constants (PEP 562 backward compat for callers\n    that referenced REPO_ROOT / SPEC_PATH / ACTIVE_DIR as module attributes).\"\"\"\n    if name == \"REPO_ROOT\":\n        return project_root()\n    if name == \"SPEC_PATH\":\n        return spec_path()\n    if name == \"ACTIVE_DIR\":\n        return active_dir()\n    raise AttributeError(f\"module {__name__!r} has no attribute {name!r}\")\n\nDEFAULT_VALIDATORS = [\n    \"validate_disposition_index\",\n    \"validate_review\",\n    \"validate_consensus\",\n    \"validate_iteration\",\n]\n\ndef _validator_scripts() -> dict:\n    \"\"\"Resolve validator script paths under the current project root.\n\n    iter-0035: lazy resolution per-call so monkeypatch.setenv() works.\n    The validators dir lives under project_root (source-tree-relative),\n    not state_root.\n    \"\"\"\n    base = project_root() / \"consensus_mcp\" / \"validators\"\n    return {\n        \"validate_disposition_index\": str(base / \"validate_disposition_index.py\"),\n        \"validate_review\":             str(base / \"validate_review.py\"),\n        \"validate_consensus\":          str(base / \"validate_consensus.py\"),\n        \"validate_iteration\":          str(base / \"validate_iteration.py\"),\n    }\n\nSCHEMA = {\n    \"name\": \"patch.stage_and_dry_run\",\n    \"description\": (\n        \"Stage proposed patches to a temp dir + run validators on hypothetical \"\n        \"post-edit state + return findings + gate decision per canonical-006 \"\n        \"anti-regression rule.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"iteration_id\": {\n                \"type\": [\"string\", \"null\"],\n                \"description\": \"Iteration this dry-run targets; null for spec-only patches\",\n            },\n            \"proposed_patches\": {\n                \"type\": \"array\",\n                \"items\": {\n                    \"type\": \"object\",\n                    \"properties\": {\n                        \"file\": {\"type\": \"string\"},\n                        \"old_string\": {\"type\": \"string\"},\n                        \"new_string\": {\"type\": \"string\"},\n                    },\n                    \"required\": [\"file\", \"old_string\", \"new_string\"],\n                },\n            },\n            \"validators_to_run\": {\n                \"type\": \"array\",\n                \"items\": {\"type\": \"string\"},\n                \"description\": \"Validator names to run; defaults to all 4 main validators\",\n            },\n        },\n        \"required\": [\"proposed_patches\"],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"staging_dir_used\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Temp dir used for staging (already deleted by return time). \"\n                    \"Past tense: signals the dir was used and cleaned, not that it still exists.\"\n                ),\n            },\n            \"dry_run_findings\": {\"type\": \"array\"},\n            \"gate_decision\": {\"type\": \"string\", \"enum\": [\"APPROVED\", \"BLOCKED\"]},\n            \"dry_run_isolation_caveats\": {\n                \"type\": \"array\",\n                \"items\": {\"type\": \"string\"},\n                \"description\": (\n                    \"Validator checks that are NOT fully isolated from the real repo during \"\n                    \"dry-run. Callers should inspect this list before trusting dry-run results \"\n                    \"for patches that touch archived_at entries, gitignore, or archive index.\"\n                ),\n            },\n        },\n        \"required\": [\"staging_dir_used\", \"dry_run_findings\", \"gate_decision\", \"dry_run_isolation_caveats\"],\n    },\n}\n\n\ndef _apply_patch(text: str, old_string: str, new_string: str, file_label: str) -> tuple[str, str | None]:\n    \"\"\"Apply one old->new substitution. Returns (new_text, error_or_None).\"\"\"\n    if old_string not in text:\n        return text, f\"old_string not found in {file_label}\"\n    return text.replace(old_string, new_string, 1), None\n\n\ndef _read_report_findings(report_path: Path) -> list[dict]:\n    \"\"\"Parse a validator YAML report; return its findings list (empty on error).\"\"\"\n    if not report_path.exists():\n        return []\n    try:\n        import yaml\n        data = yaml.safe_load(report_path.read_text(encoding=\"utf-8\"))\n    except Exception:\n        return []\n    if not isinstance(data, dict):\n        return []\n    findings = data.get(\"findings\", [])\n    if not isinstance(findings, list):\n        return []\n    return [f for f in findings if isinstance(f, dict)]\n\n\ndef _run_validator(name: str, extra_args: list[str], out_path: Path) -> tuple[list[dict], str | None]:\n    \"\"\"Run one validator subprocess; return (findings, error_or_None).\"\"\"\n    script = _validator_scripts().get(name)\n    if script is None:\n        return [], f\"unknown validator: {name}\"\n    cmd = [sys.executable, script] + extra_args + [\"--out\", str(out_path)]\n    try:\n        result = subprocess.run(\n            cmd,\n            capture_output=True,\n            text=True,\n            cwd=str(project_root()),\n            timeout=60,\n        )\n    except subprocess.TimeoutExpired:\n        return [], f\"validator {name} timed out\"\n    except Exception as exc:\n        return [], f\"validator {name} failed: {exc}\"\n    if result.returncode not in (0, 1):\n        stderr_snippet = result.stderr.strip()[:300]\n        return [], f\"validator {name} exited {result.returncode}: {stderr_snippet}\"\n    return _read_report_findings(out_path), None\n\n\n_DRY_RUN_ISOLATION_CAVEATS: list[str] = [\n    \"Validator 1 (archived_at file existence): resolves paths against real REPO_ROOT, not staging dir. \"\n    \"Patches that add/remove archived_at entries will produce inaccurate dry-run findings.\",\n    \"Validator 5 (phase_0 deliverables gitignore status): resolves against real .gitignore. \"\n    \"Patches modifying gitignore + script set are not fully dry-run-testable.\",\n    \"Validator 6 (archive index pass list): cross-checks against real consensus-state/archive/review-passes/index.yaml.\",\n]\n\n\ndef handle(\n    iteration_id: str | None = None,\n    proposed_patches: list | None = None,\n    validators_to_run: list | None = None,\n) -> dict:\n    \"\"\"Stage patches; run validators against staged state; return findings + gate.\n\n    Empty proposed_patches runs validators against real (un-patched) state.\n\n    Isolation limitation: REPO_ROOT is resolved at module import time. Validators 1\n    (archived_at file existence), 5 (phase_0 script gitignore), and 6 (archive index\n    xref) resolve file paths against the real filesystem, not the staging dir. Dry-run\n    results for patches that add/remove archived_at entries, change gitignore rules, or\n    modify the archive pass index are therefore inaccurate. The output field\n    dry_run_isolation_caveats documents which checks are affected; callers should inspect\n    it before trusting dry-run results for those patch classes.\n    \"\"\"\n    if proposed_patches is None:\n        proposed_patches = []\n    if validators_to_run is None:\n        validators_to_run = list(DEFAULT_VALIDATORS)\n\n    # Refuse empty validator list: canonical-006 requires SOME validation; an empty\n    # list would silently bypass the gate (every patch returns APPROVED with no\n    # findings). To run zero validators, the caller must say so explicitly via the\n    # _force_zero_validators=True escape hatch reserved for diagnostics; production\n    # callers must never pass that flag.\n    if not validators_to_run:\n        return {\n            \"error\": (\n                \"validators_to_run is empty; canonical-006 requires at least one \"\n                \"validator. Pass None to use DEFAULT_VALIDATORS, or name specific \"\n                \"validators from _validator_scripts().\"\n            )\n        }\n\n    # Validate requested validator names early.\n    unknown = [v for v in validators_to_run if v not in _validator_scripts()]\n    if unknown:\n        return {\"error\": f\"unknown validator(s): {', '.join(unknown)}\"}\n\n    # Determine which iteration dir to stage (may be None).\n    iter_dir: Path | None = None\n    if iteration_id is not None:\n        iter_dir = active_dir() / iteration_id\n        if not iter_dir.exists():\n            return {\"error\": f\"iteration dir not found: {iter_dir}\"}\n\n    # Build a map: real_path -> patched_text for every patched file.\n    patched: dict[Path, str] = {}\n    for patch in proposed_patches:\n        file_rel = patch.get(\"file\", \"\")\n        old_str = patch.get(\"old_string\", \"\")\n        new_str = patch.get(\"new_string\", \"\")\n       \
      \ real_path = project_root() / file_rel\n        if real_path in patched:\n            current_text = patched[real_path]\n        else:\n            if not real_path.exists():\n                if old_str == \"\":\n                    # New-file creation: empty old_string is the \"before\" state.\n                    current_text = \"\"\n                else:\n                    return {\"error\": f\"file not found: {file_rel}\"}\n            else:\n                current_text = real_path.read_text(encoding=\"utf-8\")\n        new_text, err = _apply_patch(current_text, old_str, new_str, file_rel)\n        if err:\n            return {\"error\": err}\n        patched[real_path] = new_text\n\n    # Write staged copies to a temp dir (auto-cleaned on exit via try/finally).\n    staging = tempfile.mkdtemp(prefix=\"mcp-stage-\")\n    staging_path = Path(staging)\n\n    all_findings: list[dict] = []\n    staged_dir_str = staging  # reported back; cleaned before return\n\n    try:\n        # Stage patched files.\n        for real_path, text in patched.items():\n            # Mirror directory structure under staging_path.\n            rel = real_path.relative_to(project_root())\n            dest = staging_path / rel\n            dest.parent.mkdir(parents=True, exist_ok=True)\n            dest.write_text(text, encoding=\"utf-8\")\n\n        # Determine staged spec path: use staged copy if it was patched, else real.\n        _spec = spec_path()\n        staged_spec = staging_path / _spec.relative_to(project_root()) if _spec in patched else _spec\n\n        # Determine staged iteration dir: copy real dir if iteration_id given, then overlay patches.\n        staged_iter_dir: Path | None = None\n        if iter_dir is not None:\n            staged_iter_dir = staging_path / iteration_id\n            shutil.copytree(str(iter_dir), str(staged_iter_dir))\n            # Overlay any iteration-file patches.\n            for real_path, text in patched.items():\n                if real_path.is_relative_to(iter_dir):\n                    rel_in_iter = real_path.relative_to(iter_dir)\n                    (staged_iter_dir / rel_in_iter).write_text(text, encoding=\"utf-8\")\n\n        # Run each requested validator.\n        for name in validators_to_run:\n            out_path = staging_path / f\"{name}-report.yaml\"\n\n            if name == \"validate_disposition_index\":\n                extra = [\"--spec\", str(staged_spec)]\n                findings, err = _run_validator(name, extra, out_path)\n                if err:\n                    return {\"error\": err}\n                all_findings.extend(_tag_findings(findings, name))\n\n            elif name == \"validate_iteration\":\n                if staged_iter_dir is None:\n                    # No iteration context; skip silently.\n                    continue\n                extra = [\"--iteration-dir\", str(staged_iter_dir)]\n                findings, err = _run_validator(name, extra, out_path)\n                if err:\n                    return {\"error\": err}\n                all_findings.extend(_tag_findings(findings, name))\n\n            elif name == \"validate_review\":\n                if staged_iter_dir is None:\n                    continue\n                for review_file in (\"codex-review.yaml\", \"claude-review.yaml\"):\n                    review_path = staged_iter_dir / review_file\n                    if not review_path.exists():\n                        continue\n                    rout = staging_path / f\"validate_review-{review_file}.yaml\"\n                    extra = [\"--review\", str(review_path)]\n                    findings, err = _run_validator(name, extra, rout)\n                    if err:\n                        return {\"error\": err}\n                    all_findings.extend(_tag_findings(findings, f\"{name}:{review_file}\"))\n\n            elif name == \"validate_consensus\":\n                if staged_iter_dir is None:\n                    continue\n                consensus_path = staged_iter_dir / \"consensus.yaml\"\n                if not consensus_path.exists():\n                    continue\n                extra = [\"--consensus\", str(consensus_path)]\n                findings, err = _run_validator(name, extra, out_path)\n                if err:\n                    return {\"error\": err}\n                all_findings.extend(_tag_findings(findings, name))\n\n    finally:\n        shutil.rmtree(staging, ignore_errors=True)\n\n    gate = \"APPROVED\" if all(f.get(\"severity\") not in (\"high\", \"blocking\") for f in all_findings) else \"BLOCKED\"\n\n    return {\n        \"staging_dir_used\": staged_dir_str,\n        \"dry_run_findings\": all_findings,\n        \"gate_decision\": gate,\n        \"dry_run_isolation_caveats\": _DRY_RUN_ISOLATION_CAVEATS,\n    }\n\n\ndef _tag_findings(findings: list[dict], source: str) -> list[dict]:\n    \"\"\"Add a _validator tag to each finding for traceability.\"\"\"\n    tagged = []\n    for f in findings:\n        f2 = dict(f)\n        f2[\"_validator\"] = source\n        tagged.append(f2)\n    return tagged\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/tools/patch_apply_consensus_patch.py: "\"\"\"patch.apply_consensus_patch MCP tool. Phase 1 G2 (canonical-006 enforcement).\n\nThe only authorized writer to artifacts under consensus-state/active/<iter>/ after\nPhase 0 sealing. Every apply is gated by patch.stage_and_dry_run (no high/blocking\nfindings), atomically written, and recorded via audit.append_event.\n\nFailure modes:\n  - iteration_not_found: iteration dir does not exist; refuse before staging.\n  - dry_run_failed: stage_and_dry_run gate returned BLOCKED or had high/blocking\n    findings; artifacts are NOT touched.\n  - invalid_patches: a patch path would escape the iteration dir (path traversal);\n    extra fields: reason (str).\n  - audit_write_failed: artifacts HAVE been written but audit.append_event failed.\n    Operator must investigate manually; rollback is out of scope for v1.0.\n    Extra fields: applied_files (list[str]), audit_error (str).\n  - partial_apply_failed: an OS error (disk full, permission denied, antivirus lock)\n    interrupted the per-file write loop after one or more files were already written.\n    Extra fields: applied_files (partial list written so far), failed_relpath (str),\n    exception (str: \"ExcType: message\").\n    NOTE: v1.0 does NOT roll back prior atomic writes on mid-loop failure; operator\n    must manually inspect applied_files to reconcile the partially-written state.\n    audit.append_event is NOT called in this branch (the partial state is\n    operator-recoverable; auto-recording would lie about completion).\n\nCONCURRENCY (v1.0 limitation): This tool is single-writer. Concurrent invocations\non the same iteration_id with overlapping relpaths will race — both calls may pass\nthe dry-run gate independently and the per-file os.replace order is non-deterministic.\nThe audit log is also a non-locked read-modify-write. **Do not invoke concurrently\nfor the same iteration_id.** Phase 1.x will add per-iteration filelock.\n\nrequire_dry_run_clean=False raises NotImplementedError. Force-override / operator-bypass\nis deferred to Phase 1.x.\n\"\"\"\nfrom __future__ import annotations\n\nimport os\nfrom pathlib import Path\n\nfrom consensus_mcp._paths import project_root, active_dir\nfrom consensus_mcp.tools.patch_stage_and_dry_run import handle as stage_handle  # noqa: E402\nfrom consensus_mcp.tools.audit_append_event import handle as audit_handle  # noqa: E402\n\n# iter-0035 (Phase B step 6 per iter-0024 plan): migrated from module-level\n# REPO_ROOT / ACTIVE_DIR captures to lazy `_paths` resolvers.\n\n\ndef __getattr__(name: str):\n    \"\"\"PEP 562 backward compat for external callers that referenced\n    REPO_ROOT / ACTIVE_DIR as module attributes.\"\"\"\n    if name == \"REPO_ROOT\":\n        return project_root()\n    if name == \"ACTIVE_DIR\":\n        return active_dir()\n    raise AttributeError(f\"module {__name__!r} has no attribute {name!r}\")\n\n_HIGH_SEVERITIES = {\"high\", \"blocking\", \"critical\"}\n\nSCHEMA = {\n    \"name\": \"patch.apply_consensus_patch\",\n    \"description\": (\n        \"Gate-then-apply: runs patch.stage_and_dry_run first; if APPROVED and no \"\n        \"high/blocking findings, atomically writes patches to the iteration dir and \"\n        \"appends an apply_step_landed audit event. Refuses on BLOCKED or any \"\n        \"high/blocking/critical finding. No force flag in v1.0.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"iteration_id\": {\n                \"type\": \"string\",\n                \"description\": \"Must match an existing dir under consensus-state/active/\",\n            },\n            \"patches\": {\n                \"type\": \"object\",\n                \"description\": (\n                    \"Keys: relative paths under the iteration dir (e.g. 'consensus.yaml'). \"\n                    \"Values: full new YAML text to write.\"\n                ),\n                \"additionalProperties\": {\"type\": \"string\"},\n            },\n            \"rationale\": {\n                \"type\": \"string\",\n                \"description\": \"Short human reason recorded in audit log.\",\n            },\n            \"require_dry_run_clean\": {\n                \"type\": \"boolean\",\n                \"description\": (\n                    \"If False, raises NotImplementedError (Phase 1.x). \"\n                    \"Always pass True (default) in v1.0.\"\n                ),\n                \"default\": True,\n            },\n            \"validators_to_run\": {\n                \"type\": [\"array\", \"null\"],\n                \"items\": {\"type\": \"string\"},\n                \"description\": (\n                    \"Validator names to pass to stage_and_dry_run. \"\n                    \"None (default) = all 4 main validators.\"\n                ),\n            },\n        },\n        \"required\": [\"iteration_id\", \"patches\", \"rationale\"],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"description\": (\n            \"Success: {applied_files, dry_run_findings, audit_event_id}. \"\n            \"Failure: {error, ...} where error is one of: \"\n            \"dry_run_failed | iteration_not_found | invalid_patches | \"\n            \"audit_write_failed | partial_apply_failed.\"\n        ),\n        \"oneOf\": [\n            {\n                \"title\": \"success\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"applied_files\": {\n                        \"type\": \"array\",\n                        \"items\": {\"type\": \"string\"},\n                        \"description\": \"Relative paths within iteration dir that were written.\",\n                    },\n                    \"dry_run_findings\": {\n                        \"type\": \"array\",\n                        \"description\": \"Echoed from stage_and_dry_run for traceability.\",\n                    },\n                    \"audit_event_id\": {\n                        \"type\": \"string\",\n                        \"description\": \"event_id returned by audit.append_event.\",\n                    },\n                },\n                \"required\": [\"applied_files\", \"dry_run_findings\", \"audit_event_id\"],\n            },\n            {\n                \"title\": \"failure\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"error\": {\n                        \"type\": \"string\",\n                        \"enum\": [\n                            \"dry_run_failed\",\n                            \"iteration_not_found\",\n                            \"invalid_patches\",\n                            \"audit_write_failed\",\n                            \"partial_apply_failed\",\n                        ],\n                    },\n                    \"dry_run_findings\": {\n                        \"type\": \"array\",\n                        \"description\": \"Only present when error==dry_run_failed.\",\n                    },\n                    # invalid_patches branch\n                    \"reason\": {\n                        \"type\": [\"string\", \"null\"],\n                        \"description\": \"Only present when error==invalid_patches.\",\n                    },\n                    # audit_write_failed branch + partial_apply_failed branch\n                    \"applied_files\": {\n                        \"type\": [\"array\", \"null\"],\n                        \"items\": {\"type\": \"string\"},\n                        \"description\": (\n                            \"Present when error==audit_write_failed (full list) or \"\n                            \"error==partial_apply_failed (partial list written so far).\"\n                        ),\n                    },\n                    # audit_write_failed branch\n                    \"audit_error\": {\n                        \"type\": [\"string\", \"null\"],\n                        \"description\": \"Only present when error==audit_write_failed.\",\n                    },\n                    # partial_apply_failed branch\n                    \"failed_relpath\": {\n                        \"type\": [\"string\", \"null\"],\n                        \"description\": \"Relpath that raised on write; only when error==partial_apply_failed.\",\n                    },\n                    \"exception\": {\n                        \"type\": [\"string\", \"null\"],\n                        \"description\": \"ExcType: message string; only when error==partial_apply_failed.\",\n                    },\n                },\n                \"required\": [\"error\"],\n            },\n        ],\n    },\n}\n\n\ndef handle(\n    iteration_id: str,\n    patches: dict,\n    rationale: str,\n    require_dry_run_clean: bool = True,\n    validators_to_run: list | None = None,\n) -> dict:\n    \"\"\"Apply consensus patches to an iteration dir, gated by dry-run.\n\n    Steps:\n      1. Guard: iteration dir must exist.\n      2. Guard: no path traversal in patch keys.\n      3. Build proposed_patches for stage_and_dry_run (full-file replacement).\n      4. Run stage_and_dry_run gate; refuse if BLOCKED or any high/blocking/critical finding.\n      5. Atomic write each patch (tmp + os.replace).\n      6. Append apply_step_landed audit event; return event_id.\n\n    validators_to_run: passed through to stage_and_dry_run. None = default (all 4 main validators).\n\n    Failure modes documented in module docstring.\n    \"\"\"\n    if not require_dry_run_clean:\n        raise NotImplementedError(\n            \"require_dry_run_clean=False is deferred to Phase 1.x; \"\n            \"always pass True in v1.0.\"\n        )\n\n    # --- Step 1: iteration existence guard ---\n    iter_dir = active_dir() / iteration_id\n    if not iter_dir.is_dir():\n        return {\"error\": \"iteration_not_found\"}\n\n    # --- Step 2: path traversal\
      \ guard ---\n    for relpath in patches:\n        target = (iter_dir / relpath).resolve()\n        try:\n            target.relative_to(iter_dir.resolve())\n        except ValueError:\n            return {\n                \"error\": \"invalid_patches\",\n                \"reason\": f\"path_traversal:{relpath}\",\n            }\n\n    # --- Step 3: build proposed_patches for stage_and_dry_run ---\n    # stage_and_dry_run expects {file: repo-relative str, old_string, new_string}.\n    # We do a full-file replacement: old_string = current content (or \"\" if new file).\n    proposed_patches = []\n    for relpath, new_text in patches.items():\n        target = iter_dir / relpath\n        if target.exists():\n            old_text = target.read_text(encoding=\"utf-8\")\n        else:\n            old_text = \"\"\n        # Repo-relative path for stage_and_dry_run.\n        repo_rel = str(target.relative_to(project_root()))\n        proposed_patches.append({\n            \"file\": repo_rel,\n            \"old_string\": old_text,\n            \"new_string\": new_text,\n        })\n\n    # --- Step 4: dry-run gate ---\n    stage_kwargs: dict = {\n        \"iteration_id\": iteration_id,\n        \"proposed_patches\": proposed_patches,\n    }\n    if validators_to_run is not None:\n        stage_kwargs[\"validators_to_run\"] = validators_to_run\n    dry_run_result = stage_handle(**stage_kwargs)\n\n    dry_run_findings = dry_run_result.get(\"dry_run_findings\", [])\n\n    # Refuse on internal error from stage_handle.\n    if \"error\" in dry_run_result:\n        return {\n            \"error\": \"dry_run_failed\",\n            \"dry_run_findings\": dry_run_findings,\n        }\n\n    gate_decision = dry_run_result.get(\"gate_decision\", \"BLOCKED\")\n    high_findings = [\n        f for f in dry_run_findings\n        if f.get(\"severity\") in _HIGH_SEVERITIES\n    ]\n\n    if gate_decision != \"APPROVED\" or high_findings:\n        return {\n            \"error\": \"dry_run_failed\",\n            \"dry_run_findings\": dry_run_findings,\n        }\n\n    # --- Step 5: atomic apply ---\n    applied_files: list[str] = []\n    try:\n        for relpath, new_text in patches.items():\n            target = iter_dir / relpath\n            target.parent.mkdir(parents=True, exist_ok=True)\n            tmp_path = target.with_suffix(target.suffix + \".tmp\")\n            tmp_path.write_text(new_text, encoding=\"utf-8\")\n            os.replace(str(tmp_path), str(target))\n            applied_files.append(relpath)\n    except Exception as exc:\n        # Mid-loop IO failure (disk full, permission denied, antivirus lock, etc.).\n        # Prior writes already on disk; audit is NOT recorded (partial state must be\n        # reconciled manually — auto-recording would lie about completion).\n        exception_str = type(exc).__name__ + \": \" + str(exc)\n        return {\n            \"error\": \"partial_apply_failed\",\n            \"applied_files\": applied_files,\n            \"failed_relpath\": relpath,\n            \"exception\": exception_str,\n        }\n\n    # --- Step 6: audit event ---\n    # Canonical event type for a landed apply is apply_step_landed (required field: effect).\n    audit_result = audit_handle(\n        iteration_id=iteration_id,\n        event_type=\"apply_step_landed\",\n        effect=rationale,\n        files_modified=applied_files,\n        extra_fields={\n            \"dry_run_findings_count\": len(dry_run_findings),\n        },\n    )\n\n    if \"error\" in audit_result:\n        # Artifacts already written; operator must investigate.\n        return {\n            \"error\": \"audit_write_failed\",\n            \"applied_files\": applied_files,\n            \"audit_error\": audit_result[\"error\"],\n        }\n\n    return {\n        \"applied_files\": applied_files,\n        \"dry_run_findings\": dry_run_findings,\n        \"audit_event_id\": audit_result[\"event_id\"],\n    }\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/tools/gate_evaluate_production_with_scope_match.py: "\"\"\"gate.evaluate_production_with_scope_match MCP tool. Phase 2 G4 (T11).\n\nReplaces the Phase 0 lenient-enum-membership-only scope match in\nconsensus_mcp/validators/consensus_gate.py with strict prefix-OR-exact target\nmatch per consensus.production_scope.scope_match_mode.\n\nCloses claude-rev-050 (production-scope tightening) per spec section 17 +\n§13 consensus.production_scope schema (added v1.9.2 as Phase 2 G4 prereq).\n\nDesign spec ref: docs/architecture/phase-1-completion.md\nlines 322-341 (gate.evaluate_production_with_scope_match block).\n\nRead-only contract\n------------------\nThis tool reads consensus.yaml + verification.yaml + approval.yaml and\nreturns a structured production-state evaluation. It writes no files,\nemits no audit events, and mutates no state. Mirrors the read-only pattern\nof state.read_decision_ledger (T2) and review.read_post_seal (T7).\n\nThe audit trail is the responsibility of the consume-side caller (e.g., the\norchestrator that ACTS on the result records its own apply-step audit\nevent).\n\nscope_match_mode semantics\n--------------------------\nconsensus.production_scope.scope_match_mode is operator-configurable per\niteration (set in consensus.yaml at synthesis time):\n\n  exact   : approval.production_scope.target == consensus.production_scope.target\n            (byte-equality)\n  prefix  : consensus.production_scope.target.startswith(approval.production_scope.target)\n            i.e., the operator approves a parent scope, and consensus narrows\n            to a child. Example:\n              approval.target  = \"ssb-ch1\"\n              consensus.target = \"ssb-ch1-final\"\n              -> match (consensus.target startswith approval.target)\n\nIf consensus does not specify scope_match_mode, default is \"exact\" (the\nstrict default; loosening to prefix is opt-in only).\n\nState-machine evaluation order (per spec section 17)\n----------------------------------------------------\n1. Parse all three YAML files; refuse on missing/invalid.\n2. Extract consensus.production_scope (refuse if absent: spec §13 v1.9.2 added it).\n3. Extract approval.production_scope (refuse if absent).\n4. Compare types: refuse if mismatch (different scope kinds cannot match).\n5. Compute scope-match per scope_match_mode (refuse on invalid mode).\n6. Compute technical-readiness (production_ready_if conditions).\n7. Compute three-way hash binds (target / consensus / verification).\n8. Synthesize production_state:\n     not_ready                         : technical readiness fails\n     ready_pending_operator_approval   : technical OK; approval bind/scope mismatch\n     approved                          : technical OK AND all three binds match AND scope-match strict OK\n9. Populate gate_findings for any failure path.\n\nDocumented limitations\n----------------------\n- The tool reads `consensus.production_clearances.{codex,claude} == \"approved\"`,\n  `consensus.unresolved_disagreements == []`, `consensus.implementation_scope`\n  presence, and `verification.passed && verification.scope_check.passed` to\n  derive technical-readiness, mirroring consensus_mcp/validators/consensus_gate.py.\n  The §17 production_ready_if list (\"codex_production_clearance,\n  claude_production_clearance, verification_passed, production_scope_verified,\n  unresolved_consensus_disagreements_empty\") is reified the same way.\n- observational_mode bypass is NOT implemented in this tool. If\n  observational_mode is true and the operator wants the gate to short-circuit,\n  that's a Phase 3 enhancement (caller can detect observational_mode and skip\n  this tool).\n- The tool requires current_target_sha256 from the caller (the artifact-or-\n  commit hash at gate-evaluate time). If absent the result will reflect a\n  TARGET_SHA_DRIFT-class finding when the approval has a different value.\n\nMISSING-REQUIRED-FIELD CONTRACT (Round 6 F9 v1.9.2 disclosure): missing\nrequired positional arguments raise Python TypeError, NOT a structured\n{\"error\": \"missing_*_field\"} return. The output_schema's\nmissing_consensus_field / missing_approval_field error codes apply when the\nYAML files load successfully but lack the documented structural fields\n(production_scope.target, etc.); they do NOT apply to entirely-missing\nfunction arguments. Same contract applies to T8/T9/T10.\n\"\"\"\nfrom __future__ import annotations\n\nimport hashlib\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp._paths import project_root\n\n# iter-0035 (Phase B step 7 per iter-0024 plan): migrated to lazy\n# `_paths.project_root()` resolution.\n\n\ndef __getattr__(name: str):\n    \"\"\"PEP 562 backward compat for `REPO_ROOT` callers.\"\"\"\n    if name == \"REPO_ROOT\":\n        return project_root()\n    raise AttributeError(f\"module {__name__!r} has no attribute {name!r}\")\n\nVALID_SCOPE_TYPES = {\"render\", \"merge\", \"deploy\", \"data-mutation\"}\nVALID_SCOPE_MATCH_MODES = {\"exact\", \"prefix\"}\n\n\ndef _canonical_yaml_sha256_text(text: str) -> str:\n    \"\"\"Canonical sha256 of YAML text (re-dump with sort_keys=True before hashing).\"\"\"\n    loaded = yaml.safe_load(text)\n    canonical = yaml.safe_dump(loaded, sort_keys=True)\n    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\n\ndef _load_yaml(path: Path, missing_error_code: str) -> tuple[dict | None, dict | None, str | None]:\n    \"\"\"Return (data, error_dict, raw_text). On success error_dict is None.\"\"\"\n    if not path.exists():\n        return None, {\"error\": missing_error_code, \"detail\": str(path)}, None\n    try:\n        text = path.read_text(encoding=\"utf-8\")\n    except Exception as exc:\n        return None, {\"error\": \"invalid_yaml\", \"detail\": f\"{path}: {exc}\"}, None\n    try:\n        data = yaml.safe_load(text)\n    except yaml.YAMLError as exc:\n        return None, {\"error\": \"invalid_yaml\", \"detail\": f\"{path}: {exc}\"}, None\n    if not isinstance(data, dict):\n        return None, {\n            \"error\": \"invalid_yaml\",\n            \"detail\": f\"{path}: root is not a mapping (got {type(data).__name__})\",\n        }, None\n    return data, None, text\n\n\nSCHEMA = {\n    \"name\": \"gate.evaluate_production_with_scope_match\",\n    \"description\": (\n        \"Read-only evaluation of the production_state machine with strict \"\n        \"scope-match (exact|prefix). Replaces consensus_gate.py lenient enum-\"\n        \"membership scope check. Reads consensus.yaml + verification.yaml + \"\n        \"approval.yaml; returns production_state, gate_findings list, and \"\n        \"operator_production_scope_match_strict_check bool. No writes; no audit \"\n        \"event (the caller acting on the result records its own audit trail).\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"consensus_yaml_path\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Absolute or repo-relative path to consensus.yaml for the iteration.\"\n                ),\n            },\n            \"verification_yaml_path\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Absolute or repo-relative path to verification.yaml for the iteration.\"\n                ),\n            },\n            \"approval_yaml_path\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"Absolute path to operator-protected approval.yaml (typically \"\n                    \"outside the repo at <operator-approval-path>/...).\"\n                ),\n            },\n            \"current_target_sha256\": {\n                \"type\": \"string\",\n                \"description\": (\n                    \"SHA-256 of the artifact or commit being evaluated for production. \"\n                    \"Compared to approval.approved_target_sha256.\"\n                ),\n            },\n        },\n        \"required\": [\n            \"consensus_yaml_path\",\n            \"verification_yaml_path\",\n            \"approval_yaml_path\",\n            \"current_target_sha256\",\n        ],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"description\": (\n            \"Success: {production_state, gate_findings, \"\n            \"operator_production_scope_match_strict_check, scope_match_mode_used, \"\n            \"consensus_target, approval_target, technical_readiness}. \"\n            \"Failure: {error, detail} where error is one of \"\n            \"consensus_yaml_not_found | verification_yaml_not_found | \"\n            \"approval_yaml_not_found | invalid_yaml | missing_production_scope | \"\n            \"missing_consensus_field | missing_approval_field | scope_type_mismatch | \"\n            \"invalid_scope_match_mode.\"\n        ),\n        \"oneOf\": [\n            {\n                \"title\": \"success\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"production_state\": {\n                        \"type\": \"string\",\n                        \"enum\": [\n                            \"not_ready\",\n                            \"ready_pending_operator_approval\",\n                            \"approved\",\n                        ],\n                    },\n                    \"gate_findings\": {\"type\": \"array\"},\n                    \"operator_production_scope_match_strict_check\": {\"type\": \"boolean\"},\n                    \"scope_match_mode_used\": {\n                        \"type\": \"string\",\n                        \"enum\": [\"exact\", \"prefix\"],\n                    },\n                    \"consensus_target\": {\"type\": \"string\"},\n                    \"approval_target\": {\"type\": \"string\"},\n                    \"technical_readiness\": {\"type\": \"object\"},\n \
      \               },\n                \"required\": [\n                    \"production_state\",\n                    \"gate_findings\",\n                    \"operator_production_scope_match_strict_check\",\n                    \"scope_match_mode_used\",\n                    \"consensus_target\",\n                    \"approval_target\",\n                ],\n            },\n            {\n                \"title\": \"failure\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"error\": {\n                        \"type\": \"string\",\n                        \"enum\": [\n                            \"consensus_yaml_not_found\",\n                            \"verification_yaml_not_found\",\n                            \"approval_yaml_not_found\",\n                            \"invalid_yaml\",\n                            \"missing_production_scope\",\n                            \"missing_consensus_field\",\n                            \"missing_approval_field\",\n                            \"scope_type_mismatch\",\n                            \"invalid_scope_match_mode\",\n                        ],\n                    },\n                    \"detail\": {\"type\": [\"string\", \"null\"]},\n                },\n                \"required\": [\"error\"],\n            },\n        ],\n    },\n}\n\n\ndef _resolve_path(p: str) -> Path:\n    \"\"\"Treat absolute strings literally; treat relative as repo-relative.\"\"\"\n    raw = Path(p)\n    if raw.is_absolute():\n        return raw\n    return project_root() / raw\n\n\ndef handle(\n    consensus_yaml_path: str,\n    verification_yaml_path: str,\n    approval_yaml_path: str,\n    current_target_sha256: str,\n) -> dict:\n    \"\"\"Evaluate production_state with strict scope-match.\n\n    See module docstring for read-only contract, scope_match_mode semantics,\n    and state-machine evaluation order.\n    \"\"\"\n    consensus_path = _resolve_path(consensus_yaml_path)\n    verification_path = _resolve_path(verification_yaml_path)\n    # Approval path: operator-protected store is OUTSIDE the repo, so we honor\n    # absolute paths verbatim (no REPO_ROOT prefix when absolute).\n    approval_path = _resolve_path(approval_yaml_path)\n\n    consensus, err, consensus_text = _load_yaml(consensus_path, \"consensus_yaml_not_found\")\n    if err is not None:\n        return err\n    verification, err, _ = _load_yaml(verification_path, \"verification_yaml_not_found\")\n    if err is not None:\n        return err\n    approval, err, _ = _load_yaml(approval_path, \"approval_yaml_not_found\")\n    if err is not None:\n        return err\n\n    # ---- Step 2: extract consensus.production_scope (spec §13 v1.9.2) ----\n    cons_scope = consensus.get(\"production_scope\")\n    if not isinstance(cons_scope, dict):\n        return {\n            \"error\": \"missing_production_scope\",\n            \"detail\": (\n                \"consensus.production_scope absent or non-mapping. Required by \"\n                \"spec section 13 (v1.9.2 Phase 2 G4 prereq); see \"\n                \"docs/architecture/orchestration-spec.md \"\n                \"section 13.\"\n            ),\n        }\n    cons_target = cons_scope.get(\"target\")\n    cons_type = cons_scope.get(\"type\")\n    if not isinstance(cons_target, str) or not isinstance(cons_type, str):\n        return {\n            \"error\": \"missing_consensus_field\",\n            \"detail\": (\n                \"consensus.production_scope.{type,target} must both be strings; \"\n                f\"got type={cons_type!r} target={cons_target!r}\"\n            ),\n        }\n    cons_match_mode = cons_scope.get(\"scope_match_mode\", \"exact\")\n\n    # ---- Step 3: extract approval.production_scope ----\n    appr_scope = approval.get(\"production_scope\")\n    if not isinstance(appr_scope, dict):\n        return {\n            \"error\": \"missing_approval_field\",\n            \"detail\": \"approval.production_scope absent or non-mapping (spec section 17).\",\n        }\n    appr_target = appr_scope.get(\"target\")\n    appr_type = appr_scope.get(\"type\")\n    if not isinstance(appr_target, str) or not isinstance(appr_type, str):\n        return {\n            \"error\": \"missing_approval_field\",\n            \"detail\": (\n                \"approval.production_scope.{type,target} must both be strings; \"\n                f\"got type={appr_type!r} target={appr_target!r}\"\n            ),\n        }\n\n    # ---- Step 4: type match ----\n    if cons_type != appr_type:\n        return {\n            \"error\": \"scope_type_mismatch\",\n            \"detail\": (\n                f\"consensus.production_scope.type={cons_type!r} != \"\n                f\"approval.production_scope.type={appr_type!r}\"\n            ),\n        }\n\n    # ---- Step 5: scope-match per mode ----\n    if cons_match_mode not in VALID_SCOPE_MATCH_MODES:\n        return {\n            \"error\": \"invalid_scope_match_mode\",\n            \"detail\": (\n                f\"consensus.production_scope.scope_match_mode={cons_match_mode!r}; \"\n                f\"must be one of {sorted(VALID_SCOPE_MATCH_MODES)}\"\n            ),\n        }\n    if cons_match_mode == \"exact\":\n        scope_match_strict = (cons_target == appr_target)\n    else:  # prefix\n        scope_match_strict = cons_target.startswith(appr_target)\n\n    # ---- Step 6: technical-readiness (mirrors consensus_gate.py logic) ----\n    findings: list = []\n\n    clearances = consensus.get(\"production_clearances\") or {}\n    if not isinstance(clearances, dict):\n        clearances = {}\n    codex_clearance = clearances.get(\"codex\") == \"approved\"\n    claude_clearance = clearances.get(\"claude\") == \"approved\"\n    if not codex_clearance:\n        findings.append({\n            \"id\": \"MISSING_CODEX_CLEARANCE\",\n            \"severity\": \"high\",\n            \"claim\": \"consensus.production_clearances.codex != 'approved'\",\n            \"field\": \"consensus.production_clearances.codex\",\n        })\n    if not claude_clearance:\n        findings.append({\n            \"id\": \"MISSING_CLAUDE_CLEARANCE\",\n            \"severity\": \"high\",\n            \"claim\": \"consensus.production_clearances.claude != 'approved'\",\n            \"field\": \"consensus.production_clearances.claude\",\n        })\n\n    unresolved = consensus.get(\"unresolved_disagreements\")\n    unresolved_empty = isinstance(unresolved, list) and len(unresolved) == 0\n    if not unresolved_empty:\n        findings.append({\n            \"id\": \"UNRESOLVED_DISAGREEMENTS_PRESENT\",\n            \"severity\": \"high\",\n            \"claim\": \"consensus.unresolved_disagreements is not an empty list\",\n            \"field\": \"consensus.unresolved_disagreements\",\n        })\n\n    impl_scope = consensus.get(\"implementation_scope\")\n    impl_scope_verified = bool(impl_scope) and (\n        (isinstance(impl_scope, dict) and len(impl_scope) > 0)\n        or (isinstance(impl_scope, list) and len(impl_scope) > 0)\n    )\n    if not impl_scope_verified:\n        findings.append({\n            \"id\": \"IMPLEMENTATION_SCOPE_MISSING\",\n            \"severity\": \"high\",\n            \"claim\": \"consensus.implementation_scope absent or empty\",\n            \"field\": \"consensus.implementation_scope\",\n        })\n\n    ver_passed = verification.get(\"passed\") is True\n    scope_check = verification.get(\"scope_check\") or {}\n    scope_check_passed = isinstance(scope_check, dict) and scope_check.get(\"passed\") is True\n    verification_ok = ver_passed and scope_check_passed\n    if not verification_ok:\n        findings.append({\n            \"id\": \"VERIFICATION_NOT_PASSED\",\n            \"severity\": \"high\",\n            \"claim\": \"verification.passed=true AND verification.scope_check.passed=true required\",\n            \"field\": \"verification.passed\",\n        })\n\n    technical_readiness = {\n        \"codex_production_clearance\": codex_clearance,\n        \"claude_production_clearance\": claude_clearance,\n        \"verification_passed\": verification_ok,\n        \"production_scope_verified\": impl_scope_verified,\n        \"unresolved_consensus_disagreements_empty\": unresolved_empty,\n    }\n    production_ready = all(technical_readiness.values())\n\n    if not production_ready:\n        findings.append({\n            \"id\": \"PRODUCTION_NOT_READY_TECHNICAL\",\n            \"severity\": \"high\",\n            \"claim\": (\n                \"production_ready_if conditions not all true; see technical_readiness.\"\n            ),\n            \"field\": \"technical_readiness\",\n        })\n\n    # ---- Step 7: three-way hash binds ----\n    current_consensus_sha = _canonical_yaml_sha256_text(consensus_text)\n    current_verification_sha = _canonical_yaml_sha256_text(\n        verification_path.read_text(encoding=\"utf-8\")\n    )\n\n    target_sha_match = (approval.get(\"approved_target_sha256\") == current_target_sha256)\n    consensus_sha_match = (approval.get(\"approved_consensus_sha256\") == current_consensus_sha)\n    verification_sha_match = (approval.get(\"approved_verification_sha256\") == current_verification_sha)\n\n    if not target_sha_match:\n        findings.append({\n            \"id\": \"TARGET_SHA_DRIFT\",\n            \"severity\": \"high\",\n            \"claim\": \"approval.approved_target_sha256 != current_target_sha256\",\n            \"field\": \"approval.approved_target_sha256\",\n        })\n    if not consensus_sha_match:\n        findings.append({\n            \"id\": \"CONSENSUS_SHA_DRIFT\",\n            \"severity\": \"high\",\n            \"claim\": \"approval.approved_consensus_sha256 != current consensus.yaml canonical sha256\",\n            \"field\": \"approval.approved_consensus_sha256\",\n        })\n    if not verification_sha_match:\n        findings.append({\n            \"id\": \"VERIFICATION_SHA_DRIFT\",\n   \
      \         \"severity\": \"high\",\n            \"claim\": \"approval.approved_verification_sha256 != current verification.yaml canonical sha256\",\n            \"field\": \"approval.approved_verification_sha256\",\n        })\n    all_three_binds_match = target_sha_match and consensus_sha_match and verification_sha_match\n\n    # ---- Step 8: scope-match strict-check finding (when not matched) ----\n    if not scope_match_strict:\n        findings.append({\n            \"id\": \"OPERATOR_SCOPE_MISMATCH\",\n            \"severity\": \"high\",\n            \"claim\": (\n                f\"scope_match_mode={cons_match_mode!r}: \"\n                f\"consensus.production_scope.target={cons_target!r} does not match \"\n                f\"approval.production_scope.target={appr_target!r}\"\n            ),\n            \"field\": \"consensus.production_scope.target\",\n        })\n\n    # ---- Step 9: synthesize production_state ----\n    if not production_ready:\n        production_state = \"not_ready\"\n    elif all_three_binds_match and scope_match_strict:\n        production_state = \"approved\"\n    else:\n        production_state = \"ready_pending_operator_approval\"\n\n    return {\n        \"production_state\": production_state,\n        \"gate_findings\": findings,\n        \"operator_production_scope_match_strict_check\": scope_match_strict,\n        \"scope_match_mode_used\": cons_match_mode,\n        \"consensus_target\": cons_target,\n        \"approval_target\": appr_target,\n        \"technical_readiness\": technical_readiness,\n    }\n\n\ndef register(registry) -> None:\n    \"\"\"Register this tool with the server's ToolRegistry.\"\"\"\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/tools/review_read_post_seal.py: "\"\"\"review.read_post_seal MCP tool. Phase 1 G1 (sealed-review provenance, read side).\n\nThe only authorized reader of a sealed review packet for downstream agents.\nVerifies the packet's canonical_yaml_sha256 matches the stored packet_sha256\nfield (self-hash exception -- same convention as review.write_and_seal / T6).\n\nVerification contract:\n  1. Resolve the packet path (via pass_id index lookup OR direct path with safety check).\n  2. Load the packet YAML.\n  3. Deep-copy packet, pop packet_sha256 (self-hash exception).\n  4. Re-compute canonical_yaml_sha256 of the remainder.\n  5. Compare re-computed vs stored.\n  6. Return success-shape with verified=True/False.\n\nverified=False is NOT the same as error=\"verification_failed\":\n  - verified=False in success-shape: packet loaded and hashed fine, but digests differ.\n    The caller decides what to do with a hash mismatch.\n  - error=\"verification_failed\": structural problem prevented canonical hashing\n    (e.g., packet_sha256 field absent in a modern packet, YAML invalid).\n  - The ONLY expected normal verified=False case is a legacy pre-T6 packet that\n    never had a packet_sha256 field; these are flagged with legacy_unsealed=True.\n\nRead-only tool: NO writes anywhere, NO audit event (mirrors state.read_decision_ledger).\n\"\"\"\nfrom __future__ import annotations\n\nimport copy\nimport hashlib\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp._paths import project_root, archive_dir, index_path\n\n# iter-0035 (Phase B step 8 per iter-0024 plan): migrated to lazy `_paths`\n# resolvers. ARCHIVE_DIR and INDEX_PATH now resolve per-call; REPO_ROOT\n# semantic is project_root.\n\n\ndef __getattr__(name: str):\n    \"\"\"PEP 562 backward compat for module-level constants.\"\"\"\n    if name == \"REPO_ROOT\":\n        return project_root()\n    if name == \"ARCHIVE_DIR\":\n        return archive_dir()\n    if name == \"INDEX_PATH\":\n        return index_path()\n    raise AttributeError(f\"module {__name__!r} has no attribute {name!r}\")\n\n# canonical_yaml_sha256 formula (see also: state_read_decision_ledger.py, review_write_and_seal.py, ...)\n# Double round-trip: yaml.safe_dump -> yaml.safe_load -> yaml.safe_dump ensures\n# any Python-object quirks (ordered vs unordered dicts, aliases) are normalized\n# before hashing. sort_keys=True makes hash order-independent.\ndef _canonical_yaml_sha256(obj) -> str:\n    \"\"\"Canonical SHA-256 of a Python object per spec section 7.\"\"\"\n    canonical = yaml.safe_dump(yaml.safe_load(yaml.safe_dump(obj)), sort_keys=True)\n    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\n\ndef _finalize_verification(packet, packet_yaml: str, sealed_path, resolved_pass_id):\n    \"\"\"Apply self-hash exception + compare recorded vs computed; return success-shape dict.\"\"\"\n    if not isinstance(packet, dict):\n        return {\n            \"error\": \"invalid_yaml\",\n            \"detail\": f\"packet YAML is not a mapping (got {type(packet).__name__})\",\n        }\n    packet_for_hash = copy.deepcopy(packet)\n    recorded_sha = packet_for_hash.pop(\"packet_sha256\", None)\n    if recorded_sha is None:\n        try:\n            computed_sha = _canonical_yaml_sha256(packet_for_hash)\n        except Exception as exc:\n            return {\"error\": \"verification_failed\", \"detail\": f\"cannot hash packet: {exc}\"}\n        return {\n            \"packet_yaml\": packet_yaml,\n            \"packet\": packet,\n            \"packet_sha256_recorded\": None,\n            \"packet_sha256_computed\": computed_sha,\n            \"verified\": False,\n            \"sealed_path\": str(sealed_path),\n            \"pass_id\": resolved_pass_id,\n            \"legacy_unsealed\": True,\n        }\n    try:\n        computed_sha = _canonical_yaml_sha256(packet_for_hash)\n    except Exception as exc:\n        return {\"error\": \"verification_failed\", \"detail\": f\"cannot hash packet: {exc}\"}\n    return {\n        \"packet_yaml\": packet_yaml,\n        \"packet\": packet,\n        \"packet_sha256_recorded\": recorded_sha,\n        \"packet_sha256_computed\": computed_sha,\n        \"verified\": recorded_sha == computed_sha,\n        \"sealed_path\": str(sealed_path),\n        \"pass_id\": resolved_pass_id,\n    }\n\n\nSCHEMA = {\n    \"name\": \"review.read_post_seal\",\n    \"description\": (\n        \"Read and verify a sealed review packet. Accepts exactly one of: pass_id \"\n        \"(resolved via index.yaml) or path (relative or absolute, must be under \"\n        \"consensus-state/archive/review-passes/). Re-computes canonical_yaml_sha256 using \"\n        \"the self-hash exception (hashes packet sans packet_sha256 field) and compares \"\n        \"to the stored value. Returns packet content + verification result. \"\n        \"Read-only -- no writes, no audit event. \"\n        \"Legacy pre-T6 packets without packet_sha256 are flagged with legacy_unsealed=True \"\n        \"and verified=False (expected normal; not a corruption indicator).\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"oneOf\": [\n            {\n                \"properties\": {\n                    \"pass_id\": {\n                        \"type\": \"string\",\n                        \"description\": \"Pass identifier matching an 'id' entry in index.yaml.\",\n                    },\n                },\n                \"required\": [\"pass_id\"],\n                \"additionalProperties\": False,\n            },\n            {\n                \"properties\": {\n                    \"path\": {\n                        \"type\": \"string\",\n                        \"description\": (\n                            \"Relative (from repo root) or absolute path to a sealed packet. \"\n                            \"Must resolve to a file under consensus-state/archive/review-passes/.\"\n                        ),\n                    },\n                },\n                \"required\": [\"path\"],\n                \"additionalProperties\": False,\n            },\n        ],\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"description\": (\n            \"Success: {packet_yaml, packet, packet_sha256_recorded, packet_sha256_computed, \"\n            \"verified, sealed_path, pass_id}. \"\n            \"verified=False + legacy_unsealed=True: pre-T6 packet without hash field (expected normal). \"\n            \"verified=False + no legacy_unsealed: modern packet with hash mismatch (corruption/tamper). \"\n            \"Failure: {error, ...} where error is one of: \"\n            \"must_provide_exactly_one_of_pass_id_or_path | pass_id_not_in_index | \"\n            \"path_outside_archive | file_not_found | invalid_yaml | verification_failed.\"\n        ),\n        \"oneOf\": [\n            {\n                \"title\": \"success\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"packet_yaml\": {\n                        \"type\": \"string\",\n                        \"description\": \"Raw YAML text as read from disk.\",\n                    },\n                    \"packet\": {\n                        \"type\": \"object\",\n                        \"description\": \"Parsed packet dict.\",\n                    },\n                    \"packet_sha256_recorded\": {\n                        \"type\": [\"string\", \"null\"],\n                        \"description\": \"Value of packet_sha256 in the packet (null for legacy packets).\",\n                    },\n                    \"packet_sha256_computed\": {\n                        \"type\": \"string\",\n                        \"description\": \"Re-computed canonical_yaml_sha256 (self-hash exception applied).\",\n                    },\n                    \"verified\": {\n                        \"type\": \"boolean\",\n                        \"description\": (\n                            \"True iff recorded == computed. \"\n                            \"False for legacy packets (legacy_unsealed=True) and for tampered packets.\"\n                        ),\n                    },\n                    \"sealed_path\": {\n                        \"type\": \"string\",\n                        \"description\": \"Absolute path read from.\",\n                    },\n                    \"pass_id\": {\n                        \"type\": [\"string\", \"null\"],\n                        \"description\": \"Resolved pass_id (from index lookup or filename).\",\n                    },\n                    \"legacy_unsealed\": {\n                        \"type\": \"boolean\",\n                        \"description\": (\n                            \"True iff packet had no packet_sha256 field (pre-T6 legacy packet). \"\n                            \"Only present when verified=False for this reason.\"\n                        ),\n                    },\n                },\n                \"required\": [\n                    \"packet_yaml\",\n                    \"packet\",\n                    \"packet_sha256_recorded\",\n                    \"packet_sha256_computed\",\n                    \"verified\",\n                    \"sealed_path\",\n                    \"pass_id\",\n                ],\n            },\n            {\n                \"title\": \"failure\",\n                \"type\": \"object\",\n                \"properties\": {\n                    \"error\": {\n                        \"type\": \"string\",\n                        \"enum\": [\n                            \"must_provide_exactly_one_mode\",\n                            \"pass_id_not_in_index\",\n                            \"path_outside_archive\",\n                            \"file_not_found\",\n                            \"invalid_yaml\",\n                            \"verification_failed\",\n                            \"both_reviews_not_sealed\",\n                            \"iteration_dir_not_found\"\
      ,\n                            \"unknown_reviewer\",\n                        ],\n                    },\n                    \"detail\": {\"type\": [\"string\", \"null\"]},\n                },\n                \"required\": [\"error\"],\n            },\n        ],\n    },\n}\n\n\ndef handle(\n    pass_id: str | None = None,\n    path: str | None = None,\n    iteration_id: str | None = None,\n    reviewer: str | None = None,\n) -> dict:\n    \"\"\"Read and verify a sealed review packet.\n\n    Exactly one of three modes:\n      - pass_id  -> look up a sealed review-pass packet from archive/index.yaml\n      - path     -> read a specific archive packet by path (must be under ARCHIVE_DIR)\n      - iteration_id + reviewer -> G1 mode per Phase 1 design spec: serve the\n        per-reviewer review.yaml from the iteration dir, BUT ONLY after verifying\n        both reviewer_invoked AND review_returned_and_sealed events exist for BOTH\n        codex AND claude in the iteration's independence-audit.yaml. Refuses with\n        error=\"both_reviews_not_sealed\" if either is missing. This is the design-\n        intended G1 enforcement: synthesizer cannot read a sealed review until\n        both reviewers have sealed.\n\n    Returns success-shape:\n        {\n            \"packet_yaml\": str,            # raw YAML text as on disk\n            \"packet\": dict,                # parsed dict\n            \"packet_sha256_recorded\": str | None,  # value of field in packet (None if absent)\n            \"packet_sha256_computed\": str, # re-computed hash (self-hash exception applied)\n            \"verified\": bool,              # True iff recorded == computed\n            \"sealed_path\": str,            # absolute path read from\n            \"pass_id\": str | None,         # resolved (from index or filename)\n        }\n        Plus \"legacy_unsealed\": True when verified=False because the packet had no\n        packet_sha256 field (pre-T6 legacy packet -- the ONLY expected normal verified=False).\n\n    Returns failure-shape:\n        {\"error\": <code>, ...}\n\n    Failure codes:\n        must_provide_exactly_one_of_pass_id_or_path: neither or both args given\n        pass_id_not_in_index: pass_id not found in index.yaml\n        path_outside_archive: resolved path is not under ARCHIVE_DIR\n        file_not_found: resolved path does not exist on disk\n        invalid_yaml: file exists but is not valid YAML or not a dict\n        verification_failed: structural problem prevented canonical hashing\n            (distinct from verified=False: use this only when hashing cannot complete)\n\n    verified=False vs error=\"verification_failed\":\n        verified=False (success-shape): packet loaded and hashed successfully, but\n            recorded != computed. The most common case is legacy_unsealed=True (pre-T6\n            packet that never had a hash). Also signals tampered/corrupted modern packets.\n        error=\"verification_failed\" (failure-shape): packet could not be hashed at all\n            due to structural problems (e.g., packet is not a dict after YAML parse).\n    \"\"\"\n    # --- Step 1: exactly one mode ---\n    has_pass_id = pass_id is not None\n    has_path = path is not None\n    has_iter = iteration_id is not None and reviewer is not None\n    has_iter_partial = (iteration_id is not None) ^ (reviewer is not None)\n    modes = sum([has_pass_id, has_path, has_iter])\n    if modes != 1 or has_iter_partial:\n        return {\n            \"error\": \"must_provide_exactly_one_mode\",\n            \"detail\": (\n                \"exactly one of: pass_id, path, or (iteration_id + reviewer); \"\n                \"iteration_id + reviewer must both be provided together\"\n            ),\n        }\n\n    # --- iteration_id + reviewer mode: G1 both-sealed enforcement ---\n    if has_iter:\n        if reviewer not in (\"codex\", \"claude\"):\n            return {\n                \"error\": \"unknown_reviewer\",\n                \"detail\": f\"reviewer must be 'codex' or 'claude'; got {reviewer!r}\",\n            }\n        from consensus_mcp._paths import active_dir\n        iter_dir = active_dir() / iteration_id\n        if not iter_dir.is_dir():\n            return {\"error\": \"iteration_dir_not_found\", \"detail\": str(iter_dir)}\n        audit_path = iter_dir / \"independence-audit.yaml\"\n        if not audit_path.exists():\n            return {\n                \"error\": \"both_reviews_not_sealed\",\n                \"detail\": f\"independence-audit.yaml missing at {audit_path}\",\n            }\n        try:\n            audit_data = yaml.safe_load(audit_path.read_bytes()) or {}\n        except Exception as exc:\n            return {\"error\": \"invalid_yaml\", \"detail\": f\"independence-audit.yaml: {exc}\"}\n        audit_log = audit_data.get(\"audit_log\", []) or []\n        # Need: reviewer_invoked AND review_returned_and_sealed for BOTH codex AND claude.\n        invoked = {\n            e.get(\"actor\") for e in audit_log\n            if e.get(\"event\") == \"reviewer_invoked\" and e.get(\"actor\") in (\"codex\", \"claude\")\n        }\n        sealed = {\n            e.get(\"actor\") for e in audit_log\n            if e.get(\"event\") == \"review_returned_and_sealed\"\n            and e.get(\"actor\") in (\"codex\", \"claude\")\n        }\n        missing_invoked = {\"codex\", \"claude\"} - invoked\n        missing_sealed = {\"codex\", \"claude\"} - sealed\n        if missing_invoked or missing_sealed:\n            return {\n                \"error\": \"both_reviews_not_sealed\",\n                \"detail\": (\n                    f\"missing reviewer_invoked for {sorted(missing_invoked) or 'none'}; \"\n                    f\"missing review_returned_and_sealed for {sorted(missing_sealed) or 'none'}\"\n                ),\n            }\n        # Both sealed -> serve the per-reviewer review file from the iteration dir.\n        # NOTE: per-reviewer review.yaml files are NOT sealed packets (no\n        # packet_sha256 field). The G1 \"unsealed\" check is on the AUDIT LOG (above);\n        # the file content itself is just a dict. Return a mode-specific shape that\n        # signals both-sealed=True + provides canonical sha for downstream\n        # consumers that want to pin the served content.\n        review_path = iter_dir / f\"{reviewer}-review.yaml\"\n        if not review_path.exists():\n            return {\"error\": \"file_not_found\", \"detail\": str(review_path)}\n        try:\n            review_yaml_text = review_path.read_text(encoding=\"utf-8\")\n            review_dict = yaml.safe_load(review_yaml_text)\n        except Exception as exc:\n            return {\"error\": \"invalid_yaml\", \"detail\": str(exc)}\n        if not isinstance(review_dict, dict):\n            return {\n                \"error\": \"invalid_yaml\",\n                \"detail\": f\"review YAML is not a mapping (got {type(review_dict).__name__})\",\n            }\n        try:\n            review_sha = _canonical_yaml_sha256(review_dict)\n        except Exception as exc:\n            return {\"error\": \"verification_failed\", \"detail\": f\"cannot hash review: {exc}\"}\n        return {\n            \"mode\": \"iteration_id_reviewer\",\n            \"iteration_id\": iteration_id,\n            \"reviewer\": reviewer,\n            \"both_reviews_sealed\": True,\n            \"review_yaml\": review_yaml_text,\n            \"review\": review_dict,\n            \"review_canonical_sha256\": review_sha,\n            \"review_path\": str(review_path),\n        }\n\n    # --- Step 2: resolve to an absolute sealed_path (pass_id or path mode) ---\n    resolved_pass_id: str | None = None\n\n    if has_pass_id:\n        # Index lookup\n        if not index_path().exists():\n            return {\"error\": \"pass_id_not_in_index\", \"detail\": \"index.yaml not found\"}\n        try:\n            index_raw = index_path().read_bytes()\n            index_data = yaml.safe_load(index_raw) or {}\n        except Exception as exc:\n            return {\"error\": \"invalid_yaml\", \"detail\": f\"index.yaml: {exc}\"}\n\n        passes_list: list = index_data.get(\"passes\", [])\n        matched_entry = None\n        for entry in passes_list:\n            if entry.get(\"id\") == pass_id:\n                matched_entry = entry\n                break\n\n        if matched_entry is None:\n            return {\"error\": \"pass_id_not_in_index\", \"detail\": f\"pass_id={pass_id!r} not in index\"}\n\n        resolved_pass_id = pass_id\n\n        # The index stores paths as repo-relative (forward slashes per T6).\n        raw_path_str = matched_entry.get(\"path\") or matched_entry.get(\"archived_at\")\n        if not raw_path_str:\n            return {\n                \"error\": \"pass_id_not_in_index\",\n                \"detail\": f\"index entry for {pass_id!r} has no 'path' or 'archived_at' field\",\n            }\n        # Resolve relative to REPO_ROOT (T6 stores repo-relative paths).\n        candidate = project_root() / raw_path_str\n        sealed_path = candidate.resolve()\n\n        # Safety: index path MUST resolve under ARCHIVE_DIR (defense against a\n        # corrupted or tampered index that points elsewhere).\n        try:\n            sealed_path.relative_to(archive_dir().resolve())\n        except ValueError:\n            return {\n                \"error\": \"path_outside_archive\",\n                \"detail\": (\n                    f\"index entry for {pass_id!r} resolves to {sealed_path}, \"\n                    f\"which is not under {archive_dir()}\"\n                ),\n            }\n\n    else:\n        # Direct path -- resolve and safety-check\n        raw_path = Path(path)\n        if not raw_path.is_absolute():\n            raw_path = project_root() / raw_path\n        sealed_path = raw_path.resolve()\n\n        # Safety: must be under ARCHIVE_DIR\n        try:\n            sealed_path.relative_to(archive_dir().resolve())\n\
      \        except ValueError:\n            return {\n                \"error\": \"path_outside_archive\",\n                \"detail\": f\"resolved path {sealed_path} is not under {archive_dir()}\",\n            }\n\n        # Derive pass_id from filename (best-effort; may be None for unusual names)\n        # Convention: YYYY-MM-DD-<iter>-<reviewer>-pass.yaml\n        stem = sealed_path.stem  # strips .yaml\n        resolved_pass_id = stem if stem else None\n\n    # --- Step 3: file existence ---\n    if not sealed_path.exists():\n        return {\"error\": \"file_not_found\", \"detail\": str(sealed_path)}\n\n    # --- Step 4: load YAML + verify ---\n    try:\n        packet_yaml = sealed_path.read_text(encoding=\"utf-8\")\n        packet = yaml.safe_load(packet_yaml)\n    except Exception as exc:\n        return {\"error\": \"invalid_yaml\", \"detail\": str(exc)}\n\n    return _finalize_verification(\n        packet=packet,\n        packet_yaml=packet_yaml,\n        sealed_path=sealed_path,\n        resolved_pass_id=resolved_pass_id,\n    )\n\n\ndef register(registry) -> None:\n    \"\"\"Register this tool with the server's ToolRegistry.\"\"\"\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
