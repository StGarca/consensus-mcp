schema_version: 1
pilot_id: iteration-0035-phase-b-batch-low-impact
goal:
  summary: |
    iter-0035 — bundled Phase B migration of 6 LOW-impact tools from
    cached REPO_ROOT/ACTIVE_DIR/ARCHIVE_DIR/INDEX_PATH/LEDGER_PATH/SPEC_PATH
    captures to lazy `_paths` resolvers. Each module gains a PEP 562
    `__getattr__` hook so external callers that referenced the old
    constants as module attributes still work (backward compat).

    Tools migrated in this iter:
      - repo_set_section.py
      - state_update_decision_ledger.py
      - patch_stage_and_dry_run.py
      - patch_apply_consensus_patch.py
      - gate_evaluate_production_with_scope_match.py
      - review_read_post_seal.py

    DEVIATION FROM ITER-0024 CONVERGED PLAN: iter-0024's Phase B
    guidance was "one tool at a time." After iter-0026 and iter-0034
    each converged in one round on mechanical migration patterns, I
    judged the per-tool review cost vs the bundling risk and bundled
    these 6 LOW-impact tools. The HIGH-impact tools (audit_append_event,
    review_write_and_seal) remain separate per the plan (iter-0036,
    iter-0037). Reviewers may flag if the bundle violates the spirit
    of the plan; I'll unbundle on objection.
  desired_end_state: |
    All 6 modules no longer have module-level REPO_ROOT assignments or
    _resolve_repo_root function definitions. Each module imports
    appropriate `_paths` functions (project_root, state_root, active_dir,
    archive_dir, index_path, spec_path as needed). All in-module
    references to the old constants have been replaced with function
    calls. PEP 562 __getattr__ hooks preserve external attribute
    access for backward compatibility (LEDGER_PATH, SPEC_PATH,
    ACTIVE_DIR, ARCHIVE_DIR, INDEX_PATH, REPO_ROOT all resolvable
    via `module.NAME` from external callers).

    Full suite: 773 pass + 1 skipped + 0 fail (no regression).

    audit_append_event.py and review_write_and_seal.py remain
    unmigrated for iter-0036 and iter-0037 per the converged plan's
    "highest-impact last" guidance.
  non_goals:
    - migrating audit_append_event (iter-0036)
    - migrating review_write_and_seal (iter-0037)
    - new test coverage for migrated tools (suite-level no-regression
      check is sufficient; pattern proven by iter-0026 + iter-0034)
    - retiring iter-0019 _isolate_archive_root (Phase C)
allowed_files:
  - consensus_mcp/tools/repo_set_section.py
  - consensus_mcp/tools/state_update_decision_ledger.py
  - consensus_mcp/tools/patch_stage_and_dry_run.py
  - consensus_mcp/tools/patch_apply_consensus_patch.py
  - consensus_mcp/tools/gate_evaluate_production_with_scope_match.py
  - consensus_mcp/tools/review_read_post_seal.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/tools/audit_append_event.py
  - consensus_mcp/tools/review_write_and_seal.py
  - consensus_mcp/tools/state_read_decision_ledger.py
  - consensus_mcp/tools/repo_get_section.py
  - consensus_mcp/_paths.py
  - consensus_mcp/server.py
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/contributors/
  - consensus_mcp/config.py
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/_engine_factory.py
  - consensus_mcp/_snapshot_state.py
  - consensus_mcp/_import_parent_history.py
  - consensus-state/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 1
max_patch_size: 600
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=773 green
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2
    description: all 6 modules no longer have top-level REPO_ROOT
    check: 'py -3.11 -c "import re; files = [''consensus_mcp/tools/repo_set_section.py'', ''consensus_mcp/tools/state_update_decision_ledger.py'', ''consensus_mcp/tools/patch_stage_and_dry_run.py'', ''consensus_mcp/tools/patch_apply_consensus_patch.py'', ''consensus_mcp/tools/gate_evaluate_production_with_scope_match.py'', ''consensus_mcp/tools/review_read_post_seal.py'']; [print(f) for f in files if re.search(r''^REPO_ROOT\s*='', open(f, encoding=''utf-8'').read(), re.M) or re.search(r''^def _resolve_repo_root'', open(f, encoding=''utf-8'').read(), re.M)]; print(''ok'')"'
  - id: A3
    description: each module imports from _paths
    check: 'py -3.11 -c "files = [''consensus_mcp/tools/repo_set_section.py'', ''consensus_mcp/tools/state_update_decision_ledger.py'', ''consensus_mcp/tools/patch_stage_and_dry_run.py'', ''consensus_mcp/tools/patch_apply_consensus_patch.py'', ''consensus_mcp/tools/gate_evaluate_production_with_scope_match.py'', ''consensus_mcp/tools/review_read_post_seal.py'']; [print(f) for f in files if ''from consensus_mcp._paths import'' not in open(f, encoding=''utf-8'').read()]; print(''ok'')"'
  - id: A4
    description: PEP 562 backward-compat __getattr__ preserves external access
    check: 'py -3.11 -c "from consensus_mcp.tools import patch_stage_and_dry_run as m; assert m.REPO_ROOT is not None; assert m.ACTIVE_DIR is not None; print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T16:35:00Z'
  codex_patch_apply_authorized: false
  scope_signature: 'b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1'
