schema_version: 1
pilot_id: iteration-0027-next-direction-consult
workflow_mode: propose-converge
independence: blind-first-reveal
goal:
  summary: |
    iter-0027 — workflow #4 consult on the next major direction after the
    v1.14.0 feature train (iter-0009..0026). Operator asked for a real
    3-AI consensus rather than claude unilaterally picking work.
  question: |
    What is the highest-leverage next move for consensus-mcp? Each
    contributor should:
      1. Pick ONE target from the candidate list (or propose another).
      2. Justify why it's higher-leverage than the alternatives — be
         concrete about the value delta.
      3. Sketch the implementation approach (files touched, design
         decisions, validators/tests, scope boundary, risks).
      4. Smallest deliverable scope that closes ONE iteration so we
         don't sprawl.

    Candidate targets:

    (a) **Continue Phase B migrations** (iter-0027..iter-0035).
        Mechanically migrate the remaining 9 tools to `_paths.py`.
        Per iter-0024 plan order: repo_get_section, repo_set_section,
        state_update_decision_ledger, patch_stage_and_dry_run,
        patch_apply_consensus_patch, gate_evaluate_production_with_
        scope_match, review_read_post_seal, audit_append_event,
        review_write_and_seal. Each is one workflow #3 iteration with
        codex+gemini review. Low-risk, low-novelty.

    (b) **Fix codex review-template friction so 3-AI consensus is HONEST**.
        Both iter-0021 and iter-0024 lost codex's substantive vote
        because the codex prompt template is hard-coded for "review this
        code change" and rejects design-consult packets that lack
        patchable files. Net effect: every workflow #4 consult has only
        run with 2 substantive contributors. Fixing this unblocks the
        full value proposition. Likely shape: add a second prompt
        template + schema for "proposal mode"; either a new MCP tool
        `consensus.dispatch_proposal` or a `--mode proposal` flag on
        the existing dispatcher. Real design surface for the consult to
        weigh in on.

    (c) **Use consensus-mcp on another project** (proof-of-value beyond
        self-hosted). Until consensus-mcp drives an iteration on
        ANOTHER project, the "it works" claim rests entirely on
        bootstrap evidence. Operator has another active project
        (upstream-26.4.16 is the parent the standalone forked
        from). Run a real workflow #4 iteration on a change THERE,
        prove the install-and-use path works, surface what breaks.

    (d) **Audit-trail hygiene** — scrub 20 stale iter-9999-* entries
        from consensus-state/archive/review-passes/index.yaml left over
        from pre-iter-0019 test pollution. Cosmetic. Lowest leverage.

    (e) **Something else** the contributor identifies — operator did
        say "real progress," so be honest if none of (a)-(d) is the
        actual highest-leverage move.

    A good answer rejects the candidates that AREN'T the best move,
    justifies the chosen target with concrete value-delta language,
    and proposes a bounded first iteration.

  desired_end_state: |
    converged-plan.yaml at iteration_dir root names the next iteration
    (iter-0028 ID + scope + acceptance gates) with at least 2 of 3
    contributors substantively approving. Codex structural-abstention
    is acceptable as long as the substantive votes converge.
  non_goals:
    - implementing any of the candidates in this iteration (design only)
    - resolving every candidate (pick ONE)
    - committing to the entire chain (e.g., picking Phase B doesn't
      mean committing to all 9 migrations tonight — just the next one)
allowed_files: []
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 3
max_patch_size: 0
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: converged-plan.yaml present at iteration_dir
    check: 'py -3.11 -c "import os; assert os.path.exists(''consensus-state/active/iteration-0027-next-direction-consult/converged-plan.yaml''); print(''ok'')"'
  - id: A2
    description: chosen target documented with rationale
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - non_convergence_after_3_rounds
operator_escalation_triggers:
  - non_convergence_after_3_rounds
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T12:00:00Z'
  codex_patch_apply_authorized: false
  scope_signature: '5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5'
contributors:
  enabled: [claude, codex, gemini]
convergence:
  rule: strict-majority
  finding_disposition: all-or-nothing
