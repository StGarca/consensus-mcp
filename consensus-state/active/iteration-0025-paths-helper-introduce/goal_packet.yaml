schema_version: 1
pilot_id: iteration-0025-paths-helper-introduce
goal:
  summary: |
    iter-0025 — Phase A of the iter-0024 converged SHIP-PHASED plan.
    Introduce `consensus_mcp/_paths.py` with lazy-resolved path functions
    (`repo_root`, `state_root`, `project_root`, `spec_path`, plus derived
    `archive_dir`, `index_path`, `active_dir`, `audit_log_path`,
    `dispatch_log_path`). Every function re-reads env state on every call
    so `monkeypatch.setenv()` AFTER import works — the gotcha iter-0019
    worked around. PURELY ADDITIVE: no existing tool touched in this
    iteration. Phase B per-tool migrations are deferred to iter-0026+.
  desired_end_state: |
    `consensus_mcp/_paths.py` exposes the 9 helper functions documented
    in iter-0024 converged-plan Section "phase_a_design_summary". Each
    helper reads CONSENSUS_MCP_REPO_ROOT / CONSENSUS_MCP_STATE_ROOT /
    CONSENSUS_MCP_PROJECT_ROOT / CONSENSUS_MCP_SPEC_PATH on every call
    (no module-level caching). `repo_root()` walked-up fallback uses
    repo markers (pyproject.toml or .git) not just `consensus_mcp/`
    presence, so installed-wheel layout (gemini-rev-001 from iter-0024)
    falls back to cwd correctly.

    `consensus_mcp/tests/test_paths.py` covers 17 scenarios:
      - env-override-at-call-time (the iter-0019 gotcha)
      - dev-checkout walked-up discovery
      - installed-wheel layout fallback to cwd
      - state_root vs repo_root vs project_root orthogonality
      - state_root env-precedence chain
      - spec_path packaged-template fallback
      - all 5 derived helpers compose state_root correctly
      - mid-session env mutation observable on subsequent calls
      - mid-session env deletion reverts to fallback

    Full suite: 705 pass + 1 skipped + 0 fail (was 688 + 17 new tests).
  non_goals:
    - migrating any existing tool to use the new helpers (Phase B —
      separate iterations 0026+)
    - retiring iter-0019's _isolate_archive_root (Phase C)
    - changing existing module-level REPO_ROOT captures
allowed_files:
  - consensus_mcp/_paths.py
  - consensus_mcp/tests/test_paths.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/server.py
  - consensus_mcp/tools/
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/contributors/
  - consensus_mcp/config.py
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/_engine_factory.py
  - consensus_mcp/_snapshot_state.py
  - consensus_mcp/_import_parent_history.py
  - consensus-state/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
max_iterations: 1
max_patch_size: 400
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=700 green
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2
    description: env-override-at-call-time regression test exists
    check: 'py -3.11 -c "import re; t=open(''consensus_mcp/tests/test_paths.py'',encoding=''utf-8'').read(); assert re.search(r''def test_repo_root_honors_env_override_at_call_time'', t); assert re.search(r''def test_env_change_between_calls_is_observable'', t); print(''ok'')"'
  - id: A3
    description: state_root vs repo_root vs project_root split honored
    check: 'py -3.11 -c "t=open(''consensus_mcp/tests/test_paths.py'',encoding=''utf-8'').read(); assert ''test_project_root_independent_from_state_root'' in t; print(''ok'')"'
  - id: A4
    description: installed-wheel layout test covered (gemini-rev-001 iter-0024)
    check: 'py -3.11 -c "t=open(''consensus_mcp/tests/test_paths.py'',encoding=''utf-8'').read(); assert ''test_repo_root_wheel_layout_fallback'' in t; print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator-autonomous-overnight
  authorized_at_utc: '2026-05-13T10:00:00Z'
  codex_patch_apply_authorized: false
  scope_signature: '3a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293'
