schema_version: 1
pilot_id: iteration-0018-changelog-v1140
goal:
  summary: |
    iter-0018 — backfill CHANGELOG.md with the v1.14.0 release notes covering
    iter-0009..iter-0017. Documents new contributors (gemini adapter), snapshot/
    restore, the 9 operator-configurable governance dimensions, workflow engine,
    `consensus init` wizard, and packaging. Also flags the known pre-existing
    test_dispatch_codex.py full-suite contamination as deferred to a peer-
    reviewed follow-up.
  desired_end_state: |
    CHANGELOG.md gains a "## 1.14.0 - 2026-05-13" section ABOVE the existing
    "## 1.13.0 - 2026-05-12" section. No existing changelog text mutated.
    No source code touched. Tests unchanged. Section is faithful to what
    actually shipped (verifiable against `git log v1.14.0`); does not claim
    features not present in code; does not omit the known-issues callout.
  non_goals:
    - changing any source/test/config file
    - removing/altering existing changelog content
    - bumping the version (already done in iter-0017)
    - landing the deferred test-isolation arch fix (separate iteration)
allowed_files:
  - CHANGELOG.md
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - consensus-state/
  - pyproject.toml
  - README.md
  - LICENSE
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 1
max_patch_size: 200
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: v1.14.0 section present above v1.13.0
    check: 'py -3.11 -c "t=open(''CHANGELOG.md'',encoding=''utf-8'').read(); i114=t.find(''## 1.14.0''); i113=t.find(''## 1.13.0''); assert i114>=0 and i113>i114, ''v1.14.0 must precede v1.13.0''; print(''ok'')"'
  - id: A2
    description: known-issues callout present
    check: 'py -3.11 -c "t=open(''CHANGELOG.md'',encoding=''utf-8'').read(); assert ''Known issues'' in t.split(''## 1.13.0'')[0]; print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
  authorized_by: operator-autonomous-overnight
  authorized_at_utc: '2026-05-13T05:50:00Z'
  codex_patch_apply_authorized: false
  scope_signature: c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2
