    docs/design-consults/v1.13.0-consolidated-design.md: '# Design consult: v1.13.0
      consolidated design — multi-project resolution + dispatch reliability findings


      **Context for reviewer:** During iter-0006 you (codex) caught a defect in the
      original v1.13.0 proposal: it split spec/state roots but left the reviewable-file
      root tied to `REPO_ROOT`. While working through that finding, four additional
      issues surfaced. The maintainer needs you to (a) approve or correct the consolidated
      v1.13.0 design that incorporates your iter-0006 fix, AND (b) scope which of
      the six findings ship in v1.13.0 vs split to v1.14.0.


      ## All six findings from this session


      ### Finding 1 — 3-way root split (your iter-0006-4 catch)


      Current `REPO_ROOT` controls spec + state + reviewable-file root. v1.13.0 splits
      into three resolvers:


      - `_resolve_spec_path()` — env override (`CONSENSUS_MCP_SPEC_PATH`) > legacy
      `CONSENSUS_MCP_REPO_ROOT/docs/architecture/orchestration-spec.md` if it exists
      > walked-up checkout if it exists > shipped `consensus_mcp/spec_template.md`
      (packaged with wheel)

      - `_resolve_state_root()` — env override (`CONSENSUS_MCP_STATE_ROOT`) > `CONSENSUS_MCP_REPO_ROOT/consensus-state`
      if set > `Path.cwd()/consensus-state`

      - `_resolve_project_root()` — env override (`CONSENSUS_MCP_PROJECT_ROOT`) >
      `CONSENSUS_MCP_REPO_ROOT` if set > `Path.cwd()`. This root is what consumers
      of `goal_packet.allowed_files` resolve against.


      `_resolve_repo_root()` stays for back-compat; not load-bearing anymore.


      **Audit required:** every `REPO_ROOT` consumer in the codebase gets re-assigned
      to one of the three concerns. Files to audit at minimum: `server.py`, `_dispatch_codex.py`
      (`_resolve_repo_root` use at line 1585), `_release_gate_check.py`, `_self_drive.py`,
      tools/*.


      ### Finding 2 — Ship spec template in wheel


      Currently `pyproject.toml` package_data ships `dispatch_templates/*.md`, `dispatch_templates/*.json`,
      `docs/*.md` (package-local), `tests/fixtures/*`. It does NOT ship `docs/architecture/orchestration-spec.md`.
      Add a `consensus_mcp/spec_template.md` file (copy of the release-branch scrubbed
      spec) and add it to package_data. End users with no local checkout boot against
      this packaged template.


      **Maintenance:** template stays synced with `docs/architecture/orchestration-spec.md`
      from the release branch. Initial sync at release time; CI check can enforce
      later.


      ### Finding 3 — Dispatcher `--review-target` auto-discovery + warning


      Surfaced this session: `_dispatch_codex.py:1756` only loads `touched_files_contents`
      into the prompt when `--review-target` points at a `.yaml`. If operator passes
      a `.md` directly (the common-sense usage), codex receives the prompt with `{touched_files_contents_block}`
      empty and either (a) silently infers from goal_packet (iter-0005) or (b) honestly
      reports the absence (iter-0006-1 / iter-0006-3).


      **Fix:** dispatcher auto-discovers `<iteration_dir>/review-packet.yaml` if `--review-target`
      is non-yaml or unspecified. Logs a `dispatch_review_packet_resolved` event with
      the path used. If neither --review-target points at a yaml NOR `iteration_dir/review-packet.yaml`
      exists, emit a `dispatch_review_packet_missing` event at WARNING level before
      sending the truncated prompt.


      ### Finding 4 — Watchdog cold-start grace period


      Current `stall_silence_seconds: 45.0` (`_dispatch_codex.py:613`) applies uniformly.
      For bigger prompts, codex''s pre-first-token LLM load can exceed 45s. iter-0006-2
      was killed at 45s with `last_streamed_line_seq: null` — codex had emitted zero
      bytes; it was still loading.


      **Fix:** two thresholds —

      - `pre_first_byte_silence_seconds` (suggested default: 180s) applies from process
      start until first stdout line

      - `post_first_byte_silence_seconds` (current 45s default, renamed) applies after
      first stdout line received


      Operator overrides via env vars `CONSENSUS_MCP_PRE_FIRST_BYTE_SILENCE_SECONDS`
      / `CONSENSUS_MCP_POST_FIRST_BYTE_SILENCE_SECONDS` or CLI flags.


      ### Finding 5 — Visibility upgrade: surface "still loading" state


      Heartbeats with `last_streamed_line_seq: null` mean codex hasn''t produced output
      yet — but the event payload doesn''t say that in human-readable terms. Operators
      reading the dispatch-log don''t immediately see "loading, no output yet" vs.
      "outputting, then stalled."


      **Fix:** dispatch_heartbeat event payload adds a `status` field:

      - `"loading"` when `last_streamed_line_seq is None`

      - `"streaming"` when last line is recent

      - `"stalled"` when last line is older than half the post-first-byte silence
      threshold


      The visibility TUI (`_visibility_tui.py`) renders this status as a colored badge
      so operators see codex''s state at a glance.


      ### Finding 6 — iter-0005 retroactive invalidation


      iter-0005-1''s verdict was sealed but its prompt did NOT include the design
      doc content (same `--review-target .md` bug as iter-0006-1 / iter-0006-3). Its
      `recommendation: A` happened to match what the maintainer wanted, but codex
      reasoned from the goal_packet''s `desired_end_state` alone — not from the canonical
      design doc text.


      **Action:** add a `verdict_qualifier` field to iter-0005''s iteration-outcome
      (or a new disposition entry in section 24 deferred list) recording that the
      cross-AI review premise was incomplete. This is BEFORE-THE-FACT prevention of
      a future audit catching "wait, codex never saw the doc but the packet claims
      it was reviewed."


      ## Open scope questions


      **Q1.** What''s v1.13.0 scope?

      - **Option A**: F1+F2 only (the original goal: zero-per-project-setup for end
      users). Defer F3-F5 to v1.14.0 (dispatch reliability). F6 is a one-time data
      correction, separate.

      - **Option B**: F1+F2+F3 bundled (multi-project resolution must include the
      dispatcher fix that exposed it). Defer F4+F5 to v1.14.0. F6 separate.

      - **Option C**: F1-F5 all in v1.13.0 (one coherent "consensus-mcp is now actually
      usable in non-self-hosted contexts" release). F6 separate.

      - **Option D**: F1-F6 all in v1.13.0 (full session findings).


      **Q2.** Is the proposed F1 implementation (three resolvers with the precedence
      orders listed) correct, or does it have a defect this time?


      **Q3.** Are there findings I missed that should be in the package?


      ## Your task


      Emit ONE finding only. severity: low (design + scoping).

      - `recommendation`: a single string of the form `"Q1: <A|B|C|D>; Q2: <correct|defect:
      ...>; Q3: <none|added: ...>"`

      - `risk`: short rationale (~3 sentences) for the scope choice + correctness
      verdict

      - No patch_proposal needed — the maintainer implements after the verdict.


      Empty findings is NOT acceptable.

      '
