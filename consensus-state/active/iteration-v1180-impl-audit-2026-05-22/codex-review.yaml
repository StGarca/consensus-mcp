findings:
- id: codex-rev-001
  severity: blocking
  summary: Wizard contributor selection is implemented only as helpers and is not
    wired into the CLI/config flow.
  citation: consensus_mcp/_init_wizard.py:998
  risk: '`consensus init --contributors ...` is not registered in the shown parser,
    and the new multi-select resolver is never called when building `new_config`;
    the advertised flags-over-prompts, min-2 selection, claude-optional wizard UX,
    and tests invoking `--contributors` will not work end to end.'
  recommendation: Add a `--contributors` parser option and call `_resolve_contributor_selection`
    during config construction so `new_config['contributors']['enabled']` reflects
    either the explicit list or interactive multi-select before validation/write/dry-run.
  patch_not_proposed_reason: The embedded diff does not include the existing `cmd_init`
    config-construction block where `new_config` is assembled, so a safe unified diff
    cannot be authored without hallucinating surrounding lines.
  patch_proposal: null
- id: codex-rev-002
  severity: high
  summary: ProfileAdapter derives the repository root from `iteration_dir.parent`,
    which points at consensus-state rather than the project root for normal iteration
    paths.
  citation: consensus_mcp/contributors/profile_adapter.py:268
  risk: For paths like `repo/consensus-state/active/iter-*`, Kimi/custom profile CLIs
    are invoked with `cwd` and `-w` set to `repo/consensus-state/active` instead of
    the repository root, so they will miss project context and may review or modify
    the wrong tree.
  recommendation: Derive the working directory from an explicit dispatch packet repo-root
    field if available, or compute it robustly from the known consensus-state layout
    instead of assuming the iteration directory's parent is the repo root.
  patch_not_proposed_reason: The embedded contents do not include `DispatchPacket`'s
    full schema or existing adapter repo-root conventions, so a correct patch would
    require missing context outside the supplied file contents.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: The implementation has blocking wizard integration drift
  and a high-risk ProfileAdapter working-directory bug, so it does not fully satisfy
  the v1.18.0 contributor-selection goal despite the provenance and factory routing
  pieces largely matching the plan.
