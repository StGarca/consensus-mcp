      \n+instructions:\n+  filename: AGENTS.md       # codex AND kimi both read AGENTS.md\
      \ ‚Üí dedupe to one file\n+timeout_seconds: 1800\ndiff --git a/consensus_mcp/contributors/profile_adapter.py\
