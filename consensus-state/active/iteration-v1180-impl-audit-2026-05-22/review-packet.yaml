      @@ -0,0 +1,370 @@\n+\"\"\"Unit tests for consensus_mcp.contributors.profile_adapter.ProfileAdapter\
      \ (v1.18.0).\n+\n+ProfileAdapter is the generic, profile-driven contributor\
