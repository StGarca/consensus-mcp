      \ # per-AI convention file (CLAUDE.md/AGENTS.md/...)\n+    timeout_seconds:\
      \ int      # default 1800\n+\"\"\"\n+from __future__ import annotations\n+\n\
      +from copy import deepcopy\n+from pathlib import Path\n+\n+import yaml\n+\n\
      +# === Schema vocabulary ===\n+KIND_HOST = \"host\"\n+KIND_CLI_REVIEWER = \"\
