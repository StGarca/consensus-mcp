      \ 0000000..4317506\n--- /dev/null\n+++ b/consensus_mcp/contributors/profile_adapter.py\n\
      @@ -0,0 +1,392 @@\n+\"\"\"Generic, profile-driven contributor adapter (v1.18.0).\n\
      +\n+Per the converged plan (iteration-v1180-contributor-design-2026-05-22):\n\
      +**B-ROUTING + UNIVERSAL PROFILES.** claude/codex/gemini keep their existing\n\
      +adapter classes; ``ProfileAdapter`` is the ONE generic adapter that dispatches\n\
      +any ``kind: cli_reviewer`` contributor described purely by a profile dict ‚Äî\
      \ kimi\n+today, plus any user-added AI with ZERO new Python classes.\n+\n+ProfileAdapter\
      \ is the live replacement (in spirit) for the parent project's kimi\n+monkeypatch\
      \ wrapper. That wrapper monkeypatched ``_dispatch_gemini._invoke_gemini``\n\
      +and ``_seal_via_t6`` and ‚Äî critically ‚Äî left the gemini provenance defaults\
      \ in\n+place, so a kimi review sealed with ``model='gemini-2.5-pro'``. ProfileAdapter\n\
      +fixes this by building ``dispatch_provenance`` EXPLICITLY from the resolved\n\
      +profile (model/contributor/bin/attestation_method), never copying another\n\
      +adapter's defaults (converged-plan ``decision.provenance``; regression gate:\
      \ a\n+kimi seal must NOT contain ``model='gemini-2.5-pro'``).\n+\n+Reuse, don't\
      \ reimplement\n+------------------------\n+The dispatch pipeline mirrors ``_dispatch_gemini.main``\
      \ but is parameterized by\n+the profile. It reuses the shared ``_dispatch_base``\
      \ machinery for everything\n+that is NOT CLI-shape-specific:\n+\n+  * ``_load_goal_packet``\
      \ / ``_load_template`` ‚Äî read goal_packet + prompt template\n+  * ``_build_prompt``\
      \ ‚Äî substitute placeholders (same template the gemini adapter uses)\n+  * ``_sha256_str``\
      \ ‚Äî provenance hashes\n+  * ``_build_sealed_packet`` ‚Äî wrap findings in the\
      \ T6 outer structure\n+  * ``_seal_via_t6`` ‚Äî write the sealed YAML through\
      \ review.write_and_seal (NOT reimplemented)\n+\n+The ONLY profile-specific steps\
      \ are:\n+  * the CLI invocation (``_invoke``: transport, base_args, prompt_flag,\n\
      +    workdir_flag, model_flag, env, timeout)\n+  * output chrome removal (``output.strip_patterns``)\
      \ before JSON parse\n+\n+The parser intentionally reuses gemini's lenient extractor\
      \ + shape validator\n+(``_dispatch_gemini._parse_gemini_output`` via ``_extract_json_from_text``):\n\
      +a non-codex cli_reviewer (kimi/custom) does not enforce a JSON schema natively\n\
      +(``output.schema_enforced: false``), so it needs the same fence/prose-tolerant\n\
      +extraction gemini uses. Finding-ID prefix enforcement is gemini-specific, so\
      \ we\n+do NOT route through gemini's id-pattern check; we use ``json.loads``\
      \ on the\n+stripped+extracted text and a minimal structural guard.\n+\"\"\"\n\
      +from __future__ import annotations\n+\n+import json\n+import os\n+import re\n\
      +import subprocess\n+import sys\n+import time\n+from pathlib import Path\n+\n\
      +from consensus_mcp import _contributor_profiles as _profiles\n+from consensus_mcp._dispatch_base\
      \ import (\n+    _build_prompt,\n+    _build_sealed_packet,\n+    _load_goal_packet,\n\
      +    _load_template,\n+    _seal_via_t6,\n+    _sha256_str,\n+)\n+from consensus_mcp._dispatch_gemini\
      \ import _extract_json_from_text\n+from consensus_mcp.contributors.base import\
      \ (\n+    ContributorAdapter,\n+    DispatchError,\n+    DispatchPacket,\n+\
      \    SealedArtifact,\n+)\n+\n+# Default prompt template (shared with the gemini\
      \ adapter). A profile-driven\n+# cli_reviewer is a review/proposal contributor\
      \ exactly like gemini; it consumes\n+# the same goal_packet-substituted template.\
      \ Future profiles MAY name their own\n+# template, but v1.18.0 keeps a single\
      \ shared default.\n+_DISPATCH_TEMPLATES_DIR = (\n+    Path(__file__).resolve().parent.parent\
      \ / \"dispatch_templates\"\n+)\n+_DEFAULT_REVIEW_TEMPLATE = _DISPATCH_TEMPLATES_DIR\
      \ / \"gemini_review_template.md\"\n+\n+\n+class ProfileAdapter(ContributorAdapter):\n\
      +    \"\"\"Profile-driven cli_reviewer adapter.\n+\n+    Construct with a single\
      \ ``profile`` dict (a merged built-in/override entry\n+    from ``_contributor_profiles``).\
      \ The profile MUST validate and be\n+    ``kind: cli_reviewer``; a ``kind: host``\
      \ profile (claude) is rejected ‚Äî the\n+    host is never a subprocess.\n+  \
      \  \"\"\"\n+\n+    def __init__(self, profile: dict, adapter_config: dict |\
      \ None = None):\n+        super().__init__(adapter_config)\n+        if not\
      \ isinstance(profile, dict):\n+            raise ValueError(\n+            \
      \    f\"ProfileAdapter requires a profile dict; got {type(profile).__name__}\"\
      \n+            )\n+        name = profile.get(\"name\")\n+        # Validate\
      \ the profile up front (raises ValueError on any violation).\n+        _profiles.validate_profile(name\
      \ or \"<unnamed>\", profile)\n+        if profile.get(\"kind\") != _profiles.KIND_CLI_REVIEWER:\n\
      +            raise ValueError(\n+                f\"ProfileAdapter only dispatches\
      \ kind={_profiles.KIND_CLI_REVIEWER!r} \"\n+                f\"profiles; profile\
      \ {name!r} has kind={profile.get('kind')!r}. \"\n+                f\"A host\
      \ (claude) is the in-process orchestrator, never a subprocess.\"\n+        \
      \    )\n+        self.profile = profile\n+        self.name = name\n+\n+   \
      \ # ----- profile accessors -------------------------------------------------\n\
      +\n+    @property\n+    def _invoke_cfg(self) -> dict:\n+        return self.profile.get(\"\
      invoke\") or {}\n+\n+    @property\n+    def _timeout_seconds(self) -> int:\n\
      +        return int(self.profile.get(\"timeout_seconds\", 1800))\n+\n+    @property\n\
      +    def _sealed_filename(self) -> str:\n+        return self.profile.get(\"\
      sealed_filename\") or f\"{self.name}-review.yaml\"\n+\n+    @property\n+   \
      \ def _bin(self) -> str:\n+        return (self.profile.get(\"detect\") or {}).get(\"\
      command\") or self.name\n+\n+    @property\n+    def _model(self) -> str:\n\
      +        return self.profile.get(\"model\") or \"\"\n+\n+    # ----- CLI invocation\
      \ (the ONE profile-specific step) --------------------\n+\n+    def _build_cmd(self,\
      \ prompt: str, repo_root: Path) -> tuple[list[str], bool]:\n+        \"\"\"\
      Build the argv from the profile. Returns (cmd, stdin_prompt).\n+\n+        transport=stdin\
      \ ‚Üí prompt delivered via stdin; NO prompt_flag in argv.\n+        transport=flag\
      \  ‚Üí prompt delivered as the value following prompt_flag.\n+\n+        base_args,\
      \ workdir_flag (+ repo_root value), and model_flag (+ model\n+        value)\
      \ are wired in per the profile. model_flag is only added when the\n+       \
      \ profile carries a non-empty model.\n+        \"\"\"\n+        invoke = self._invoke_cfg\n\
      +        transport = invoke.get(\"transport\")\n+        cmd: list[str] = [self._bin]\n\
      +        cmd.extend(list(invoke.get(\"base_args\") or []))\n+\n+        workdir_flag\
      \ = invoke.get(\"workdir_flag\")\n+        if workdir_flag:\n+            cmd.extend([workdir_flag,\
      \ str(repo_root)])\n+\n+        model_flag = invoke.get(\"model_flag\")\n+ \
      \       if model_flag and self._model:\n+            cmd.extend([model_flag,\
      \ self._model])\n+\n+        stdin_prompt = transport == _profiles.TRANSPORT_STDIN\n\
      +        if transport == _profiles.TRANSPORT_FLAG:\n+            prompt_flag\
      \ = invoke.get(\"prompt_flag\")\n+            cmd.extend([prompt_flag, prompt])\n\
      +        return cmd, stdin_prompt\n+\n+    def _subprocess_env(self) -> dict:\n\
      +        \"\"\"Parent env + the profile's injected env vars (e.g.\n+       \
      \ GEMINI_CLI_TRUST_WORKSPACE). Returns a COPY; never mutates os.environ.\"\"\
      \"\n+        env = os.environ.copy()\n+        for key, value in (self.profile.get(\"\
      env\") or {}).items():\n+            env[str(key)] = str(value)\n+        return\
      \ env\n+\n+    def _invoke(\n+        self,\n+        *,\n+        cmd: list[str],\n\
      +        prompt: str,\n+        stdin_prompt: bool,\n+        env: dict,\n+\
      \        cwd: str,\n+        timeout_seconds: int,\n+    ) -> str:\n+      \
      \  \"\"\"Shell out to the profile's CLI and return raw stdout.\n+\n+       \
      \ This is the seam tests monkeypatch (mirrors the kimi wrapper's\n+        ``_invoke_kimi``\
      \ and the test_dispatch_gemini fake-invoke pattern). The\n+        real implementation\
      \ runs the CLI non-interactively, piping the prompt\n+        via stdin when\
      \ ``stdin_prompt`` is True. Raises DispatchError on any\n+        subprocess\
      \ failure so the engine's timeout/failure policy applies.\n+        \"\"\"\n\
      +        popen_input = prompt if stdin_prompt else None\n+        _t0 = time.perf_counter()\n\
      +        try:\n+            result = subprocess.run(\n+                cmd,\n\
      +                input=popen_input,\n+                capture_output=True,\n\
      +                text=True,\n+                timeout=timeout_seconds,\n+  \
      \              cwd=cwd,\n+                env=env,\n+            )\n+      \
      \  except subprocess.TimeoutExpired as exc:\n+            raise DispatchError(\n\
      +                f\"{self.name} CLI timed out after {timeout_seconds}s\"\n+\
      \            ) from exc\n+        except FileNotFoundError as exc:\n+      \
      \      raise DispatchError(\n+                f\"{self.name} CLI binary not\
      \ found: {self._bin!r}\"\n+            ) from exc\n+        except OSError as\
      \ exc:\n+            raise DispatchError(\n+                f\"{self.name} CLI\
      \ invocation failed ({type(exc).__name__}): {exc}\"\n+            ) from exc\n\
      +        if result.returncode != 0:\n+            _el = time.perf_counter()\
      \ - _t0\n+            raise DispatchError(\n+                f\"{self.name}\
      \ CLI exited {result.returncode} after {_el:.0f}s; \"\n+                f\"\
      stderr tail: {(result.stderr or '')[-500:]!r}\"\n+            )\n+        return\
      \ result.stdout or \"\"\n+\n+    # ----- output chrome removal --------------------------------------------\n\
      +\n+    def _strip_chrome(self, text: str) -> str:\n+        \"\"\"Apply the\
      \ profile's output.strip_patterns (regexes) to remove CLI\n+        chrome (resume\
      \ footers, banners) BEFORE JSON parse. Patterns are applied\n+        in declared\
      \ order; MULTILINE + DOTALL match the kimi wrapper's\n+        _RESUME_FOOTER_RE\
      \ semantics.\"\"\"\n+        out = text\n+        for pattern in (self.profile.get(\"\
      output\") or {}).get(\"strip_patterns\") or []:\n+            out = re.sub(pattern,\
      \ \"\", out, flags=re.MULTILINE | re.DOTALL)\n+        return out.strip()\n\
      +\n+    # ----- parse ------------------------------------------------------------\n\
      +\n+    def _parse(self, raw: str) -> dict:\n+        \"\"\"Strip chrome, extract\
      \ a JSON object, parse + minimally validate shape.\n+\n+        cli_reviewer\
      \ profiles (kimi/custom) do NOT enforce a JSON schema\n+        natively, so\
      \ this reuses gemini's prose/fence-tolerant\n+        ``_extract_json_from_text``\
      \ before ``json.loads``. The structural guard\n+        keeps it adapter-agnostic\
      \ (no gemini-rev id-prefix check): the parsed\n+        object must be a mapping\
      \ with the standard review keys.\n+        \"\"\"\n+        stripped = self._strip_chrome(raw)\n\
      +        candidate = _extract_json_from_text(stripped)\n+        try:\n+   \
      \         parsed = json.loads(candidate)\n+        except json.JSONDecodeError\
      \ as exc:\n+            raise DispatchError(\n+                f\"{self.name}\
      \ output is not valid JSON: {exc}; \"\n+                f\"first 300 chars:\
      \ {stripped[:300]!r}\"\n+            ) from exc\n+        if not isinstance(parsed,\
      \ dict):\n+            raise DispatchError(\n+                f\"{self.name}\
      \ output JSON root must be an object, \"\n+                f\"got {type(parsed).__name__}\"\
      \n+            )\n+        for required in (\"findings\", \"goal_satisfied\"\
      , \"blocking_objections\"):\n+            if required not in parsed:\n+    \
      \            raise DispatchError(\n+                    f\"{self.name} output\
      \ JSON missing required key: {required!r}\"\n+                )\n+        if\
      \ not isinstance(parsed[\"findings\"], list):\n+            raise DispatchError(f\"\
      {self.name} output 'findings' must be an array\")\n+        return parsed\n\
      +\n+    # ----- dispatch ---------------------------------------------------------\n\
      +\n+    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n+   \
      \     iter_dir = Path(packet.iteration_dir)\n+        iteration_id = iter_dir.name\n\
      +        reviewer_id = (\n+            packet.reviewer_id\n+            or f\"\
      {self.name}-{iteration_id}-{packet.phase}-1\"\n+        )\n+        pass_id\
      \ = packet.pass_id or f\"{reviewer_id}-pass1\"\n+        timeout_seconds = packet.timeout_seconds\
      \ or self._timeout_seconds\n+\n+        # The CLI's working directory: where\
      \ it loads project context + runs.\n+        # Mirrors the kimi wrapper's -w/cwd\
      \ = repo_root. Use the goal_packet's\n+        # parent as the project frame\
      \ (the iteration lives under the repo).\n+        repo_root = iter_dir.parent\n\
      +\n+        try:\n+            goal_packet_text = Path(packet.goal_packet_path).read_text(encoding=\"\
      utf-8\")\n+            goal_packet = _load_goal_packet(Path(packet.goal_packet_path))\n\
      +            template_text = _load_template(_DEFAULT_REVIEW_TEMPLATE)\n+\n+\
      \            review_target_hash = None\n+            review_packet_data = None\n\
      +            if packet.review_target_path is not None:\n+                rt\
      \ = Path(packet.review_target_path)\n+                review_target_text = rt.read_text(encoding=\"\
      utf-8\")\n+                review_target_hash = _sha256_str(review_target_text)\n\
      +                if rt.suffix.lower() in (\".yaml\", \".yml\"):\n+         \
      \           import yaml\n+                    try:\n+                      \
      \  candidate = yaml.safe_load(review_target_text)\n+                       \
      \ if isinstance(candidate, dict):\n+                            review_packet_data\
      \ = candidate\n+                    except yaml.YAMLError:\n+              \
      \          review_packet_data = None\n+\n+            prompt = _build_prompt(\n\
      +                goal_packet,\n+                template_text,\n+          \
      \      iteration_dir=str(iter_dir),\n+                review_packet_path=str(packet.goal_packet_path),\n\
      +                review_target_path=(\n+                    str(packet.review_target_path)\n\
      +                    if packet.review_target_path is not None\n+           \
      \         else None\n+                ),\n+                review_target_hash=review_target_hash,\n\
      +                review_packet=review_packet_data,\n+            )\n+      \
      \      prompt_sha = _sha256_str(prompt)\n+            goal_packet_sha = _sha256_str(goal_packet_text)\n\
      +            scope_sig = (\n+                (goal_packet or {}).get(\"authorization\"\
      , {}) or {}\n+            ).get(\"scope_signature\", \"\")\n+\n+           \
      \ cmd, stdin_prompt = self._build_cmd(prompt, repo_root)\n+            raw_output\
      \ = self._invoke(\n+                cmd=cmd,\n+                prompt=prompt,\n\
      +                stdin_prompt=stdin_prompt,\n+                env=self._subprocess_env(),\n\
      +                cwd=str(repo_root),\n+                timeout_seconds=timeout_seconds,\n\
      +            )\n+            extracted = self._parse(raw_output)\n+        \
      \    output_sha = _sha256_str(raw_output)\n+        except DispatchError:\n\
      +            raise\n+        except Exception as exc:\n+            raise DispatchError(\n\
      +                f\"{self.name} dispatch failed ({type(exc).__name__}): {exc}\"\
      \n+            ) from exc\n+\n+        # PROVENANCE ‚Äî built EXPLICITLY from\
      \ the profile. Never copy another\n+        # adapter's defaults (converged-plan\
      \ decision.provenance). This is the\n+        # regression fix for the kimi\
      \ wrapper's gemini-2.5-pro mislabel.\n+        provenance = {\n+           \
      \ \"model\": self._model,\n+            \"adapter\": \"profile\",\n+       \
      \     \"contributor\": self.name,\n+            \"bin\": self._bin,\n+     \
      \       \"attestation_method\": f\"auto_{self.name}_dispatch\",\n+         \
      \   \"prompt_sha256\": prompt_sha,\n+            \"output_sha256\": output_sha,\n\
      +            \"goal_packet_sha256\": goal_packet_sha,\n+            \"schema_sha256\"\
      : None,\n+            \"scope_signature\": scope_sig,\n+            \"review_target_hash\"\
      : review_target_hash,\n+        }\n+\n+        attestation_method = f\"auto_{self.name}_dispatch\"\
      \n+        sealed_packet = _build_sealed_packet(\n+            extracted,\n\
      +            iteration_id,\n+            reviewer_id,\n+            pass_id,\n\
      +            provenance=provenance,\n+            attestation_method=attestation_method,\n\
      +            attestation_input_sources=[\n+                \"goal_packet (path\
      \ passed via packet.goal_packet_path)\",\n+                \"prompt_template\
      \ (substituted by _build_prompt)\",\n+                \"review_target (path\
      \ passed via packet.review_target_path; may be unspecified)\",\n+          \
      \      f\"profile (name={self.name}, model={self._model}, bin={self._bin})\"\
      ,\n+            ],\n+        )\n+\n+        try:\n+            result = _seal_via_t6(\n\
      +                sealed_packet, iter_dir, sealed_filename=self._sealed_filename\n\
      +            )\n+        except Exception as exc:\n+            raise DispatchError(\n\
      +                f\"{self.name} T6 seal failed ({type(exc).__name__}): {exc}\"\
      \n+            ) from exc\n+\n+        return SealedArtifact(\n+           \
      \ contributor=self.name,\n+            phase=packet.phase,\n+            pass_id=pass_id,\n\
      +            sealed_path=Path(result[\"sealed_path\"]),\n+            archive_sealed_path=(\n\
      +                Path(result[\"archive_sealed_path\"])\n+                if\
      \ result.get(\"archive_sealed_path\")\n+                else None\n+       \
