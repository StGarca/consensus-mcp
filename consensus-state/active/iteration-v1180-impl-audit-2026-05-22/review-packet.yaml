      \ or \"configurability\" that wasn't requested.\n+- No error handling for impossible\
      \ scenarios.\n+- If you write 200 lines and it could be 50, rewrite it.\n+\n\
      +Ask yourself: \"Would a senior engineer say this is overcomplicated?\" If yes,\
