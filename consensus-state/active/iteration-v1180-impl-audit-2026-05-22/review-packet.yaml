      \ host | cli_reviewer # claude=host (in-process); others=cli_reviewer\n+   \
      \ model: str                # label sealed into dispatch_provenance.model\n\
      +    detect: {command: str}    # binary resolved via shutil.which (cli_reviewer)\n\
      +    invoke:\n+      transport: stdin | flag\n+      base_args: [str]\n+   \
      \   prompt_flag: str|null   # transport=flag ‚Üí the flag; stdin ‚Üí null\n+   \
      \   workdir_flag: str       # optional, e.g. -w\n+      model_flag: str    \
      \     # optional, e.g. --model\n+    env: {KEY: str}           # injected into\
