      \ @@\n+\"\"\"Contributor profile data foundation (v1.18.0).\n+\n+Per converged-plan.yaml\
      \ (iteration-v1180-contributor-design-2026-05-22):\n+**B-ROUTING + UNIVERSAL\
      \ PROFILES.** Every built-in AI (claude/codex/gemini/kimi)\n+has a YAML *profile*\
      \ ‚Äî a pure-data description of how to detect, invoke, parse,\n+install, and\
      \ authenticate one contributor. Profiles supply:\n+\n+  * the wizard's selectable\
      \ list,\n+  * detect+guide install/auth strings (printed, never executed),\n\
      +  * model/provenance labels sealed into the T6 review (fixes the parent kimi\n\
      +    wrapper's ``gemini-2.5-pro`` mislabel), and\n+  * forward-compat docs for\
      \ a future option-A dispatcher refactor.\n+\n+This module is the **data layer\
      \ ONLY**: it loads the packaged built-ins, merges\n+operator overrides from\
      \ ``contributors.profiles``, and validates the schema. It\n+does NOT dispatch\
      \ (``ProfileAdapter`` + ``_engine_factory`` own routing), does\n+NOT run the\
      \ wizard, and does NOT touch the network.\n+\n+Dispatch routing note (B-routing):\
      \ the codex/gemini built-in *adapters* stay\n+unchanged; their profiles here\
      \ are METADATA-ONLY (wizard/detect/provenance).\n+Only ``kimi`` (and future\
      \ user-added cli_reviewers) is consumed by\n+``ProfileAdapter`` in v1.18.0.\n\
      +\n+Schema (converged-plan ``decision.profile_schema``)::\n+\n+    name: str\
