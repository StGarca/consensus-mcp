schema_version: 1
pilot_id: iteration-0010-extract-dispatch-base
goal:
  summary: "Extract _dispatch_base.py from _dispatch_codex.py — shared dispatch infrastructure becomes reusable so future reviewer adapters (gemini, ...) are thin ~150-line modules. NO functional change; preserve codex behavior bit-for-bit. Per iter-0009 verdict Q1: F1b."
  desired_end_state: |
    New file consensus_mcp/_dispatch_base.py contains generic helpers:
      - RepoRootResolutionError, OutsideRepoPathError (error classes)
      - _has_repo_markers, _resolve_repo_root
      - _normalize_for_compare, _normalize_relative_to_repo
      - _load_goal_packet, _load_template
      - _format_touched_files_contents, _build_prompt
      - _terminate_process_tree
      - _compute_per_patch_base_sha
      - _validate_patch_proposal
      - _sha256_str, _build_sealed_packet, _seal_via_t6
      - _log_dispatch

    consensus_mcp/_dispatch_codex.py becomes the codex adapter — keeps:
      - CodexInvocationError, CodexOutputParseError
      - _resolve_codex_bin, _get_codex_version
      - _invoke_codex (codex CLI subprocess management)
      - _parse_codex_output (codex JSON shape)
      - main() (CLI entrypoint)
    and imports remaining helpers from _dispatch_base.

    Existing 133-test dispatch suite passes unchanged. Full repo test suite
    >=452 passing, 0 failing.

    Tests that access generic helpers via `_dispatch_codex._foo(...)` continue
    to work because _dispatch_codex.py re-imports them (Python module-namespace
    binding is not a re-export hack; the adapter genuinely uses these helpers).
    New tests should import from _dispatch_base directly; existing tests are
    not forcibly migrated in this iteration.
  non_goals:
    - introduce gemini adapter (deferred to iter-0011)
    - change codex CLI invocation behavior in any way
    - change sealed codex-review.yaml format
    - change goal_packet/review-packet schemas
    - introduce gate-semantics changes (deferred to iter-0012)
    - introduce enablement mechanism (deferred to iter-0012)
    - introduce adapter capability metadata (deferred to iter-0013)
allowed_files:
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/tests/test_dispatch_codex.py
  - consensus_mcp/tests/test_dispatch_codex_streaming.py
  - consensus_mcp/tests/test_iter_0018_cross_ai_invariant.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/tools/
  - consensus_mcp/validators/
  - consensus_mcp/server.py
  - consensus_mcp/tool_registry.py
  - consensus-state/
  - README.md
  - LICENSE
  - CHANGELOG.md
  - pyproject.toml
  - .github/
  - docs/
max_iterations: 1
max_patch_size: 3000
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full test suite passes (>=452 tests green, 0 fail)
    check: "py -3.11 -m pytest consensus_mcp/tests -q"
  - id: A2
    description: _dispatch_codex.py line count reduced by >=25% (generic helpers moved out; ~30% was the pre-extraction estimate, actual 29% after counting the new import block + docstring overhead)
    check: "wc -l consensus_mcp/_dispatch_codex.py | awk '{print ($1 < 1404)}'"
  - id: A3
    description: _dispatch_base.py exists and is non-empty
    check: "test -s consensus_mcp/_dispatch_base.py"
  - id: A4
    description: codex review of the diff returns goal_satisfied=true with no blocking_objections
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
  - validators_disagree_with_reviewer_claims
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-12T23:00:00Z'
  codex_patch_apply_authorized: false
  scope_signature: 03deae7b9c8fb59bc2330732a33d7dc65d7c39c08bee3297121301ba7e02dbea
