schema_version: 1
pilot_id: iteration-0033-readme-pipx-bootstrap
goal:
  summary: |
    iter-0033 — refresh README.md Quick Start section for pipx install +
    iter-0031 auto-bootstrap UX. Update Status section + Requirements
    + architecture-diagram test count to reflect v1.14.0 reality.
  desired_end_state: |
    Quick Start uses `pipx install git+https://...@v1.14.0` instead of
    `pip install consensus-mcp` (which isn't on PyPI). Documents the
    iter-0031 single-command bootstrap (consensus-init writes .mcp.json
    automatically). Adds a "Bootstrap flags" subsection listing
    --no-mcp-json, --mcp-command, --mcp-force, --reconfigure, --check,
    --print-defaults. Status section + tree comment updated from
    "688+ tests" to "773+". Requirements section adds pipx as
    recommended + jsonschema as a dependency.
  non_goals:
    - changing CHANGELOG.md (iter-0032 already did the sync)
    - any source-code changes
    - changing the "How it actually works" or "Architecture overview"
      sections (those are still accurate)
allowed_files:
  - README.md
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - consensus-state/
  - pyproject.toml
  - CHANGELOG.md
  - LICENSE
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 1
max_patch_size: 200
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: pipx install is now the recommended path
    check: 'py -3.11 -c "t=open(''README.md'',encoding=''utf-8'').read(); assert ''pipx install'' in t; print(''ok'')"'
  - id: A2
    description: iter-0031 auto-bootstrap is documented
    check: 'py -3.11 -c "t=open(''README.md'',encoding=''utf-8'').read(); assert ''auto-bootstrap'' in t.lower() or ''writes .mcp.json'' in t.lower() or ''writes BOTH'' in t; print(''ok'')"'
  - id: A3
    description: stale test count fixed
    check: 'py -3.11 -c "t=open(''README.md'',encoding=''utf-8'').read(); assert ''688+'' not in t; assert ''773+'' in t; print(''ok'')"'
  - id: A4
    description: pipx in Requirements
    check: 'py -3.11 -c "t=open(''README.md'',encoding=''utf-8'').read(); assert ''pipx'' in t; print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T16:10:00Z'
  codex_patch_apply_authorized: false
  scope_signature: '90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f'
