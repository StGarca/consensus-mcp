proposal:
  selected_target: |
    FIX BOTH ADAPTERS + BOTH MCP WRAPPERS + REMOVE SKILL
    WORKAROUND IN ONE ATOMIC PR. Centralize the phase→mode
    mapping in a single helper module so adapter, wrapper, and
    any future caller share one source of truth. Add unit-level
    argv-contract tests AND integration-level template-selection
    tests so this regression and its cousin (mode→template
    mapping moves) are both caught at CI time.

    Concrete answers:
      Q1: (a) — `PHASE_CONVERGE` → `--mode proposal`.
      Q2: (b) — MCP wrappers expose `phase`, translate
          internally via the shared helper.
      Q3: (a) — one PR fixing both adapters + both wrappers
          symmetrically.
      Q4: (a) — remove the skill workaround paragraph in the
          same PR.
      Q5: (c) — both unit and integration tests.

  rationale_vs_alternatives: |
    Q1 — Why (a) over (b) or (c):

    The dispatcher exposes exactly two templates / two schemas.
    `codex_proposal_schema.json` requires `selected_target`,
    `rationale_vs_alternatives`, `deliverable_scope`, `risks`,
    `estimated_complexity`, `structural_abstention` — this is
    EXACTLY the shape of a converged plan. The review schema is
    finding-disposition-shaped (Q1 verdict, blocking_objections,
    findings_by_severity), which would force the converger to
    invent findings against peer outputs to satisfy the schema —
    a category error.

    (b) "convergence is meta-audit on peer outputs" is
    superficially appealing but breaks on the schema test:
    converging across 3 proposals does not produce a
    "verdict-on-a-thing" output, it produces a synthesized plan.
    The output shape demands proposal-mode.

    (c) "add a third `--mode converge`" expands scope into the
    dispatcher and breaks the iter-0028 design intent
    (`contributors/codex.py:5-13`): "all three phases reuse
    the SAME prompt template; phase intent is conveyed via the
    goal_packet's desired_end_state text." Iter-0028
    empirically validated this for codex with mixed propose +
    converge dispatches against the same template. A third
    mode would invalidate that validation without evidence
    that it's needed.

    Q2 — Why (b) over (a) or (c):

    The engine abstraction is `phase`. `DispatchPacket.phase`
    is the data we already pass between layers. The MCP wrapper
    is just a different transport for the same dispatch
    operation; it should accept the same vocabulary. (a) leaks
    `mode` into the wrapper's public schema, which means MCP
    tool callers in downstream projects need to learn the
    template/schema split — that's leaky abstraction. (c)
    "expose both" gives two ways to do the same thing, which
    violates "one obvious way" and creates the
    `phase=propose, mode=review` ambiguity that the bug is
    really about: which wins? Pick one surface, hide the
    other.

    Centralization: extract the mapping to
    `consensus_mcp/contributors/_phase_mode.py` (~10 lines):

        from consensus_mcp.contributors.base import (
            PHASE_PROPOSE, PHASE_REVIEW, PHASE_CONVERGE,
        )

        _PHASE_TO_MODE = {
            PHASE_PROPOSE: "proposal",
            PHASE_REVIEW: "review",
            PHASE_CONVERGE: "proposal",  # synthesis = proposal-shaped output
        }

        def phase_to_mode(phase: str) -> str:
            try:
                return _PHASE_TO_MODE[phase]
            except KeyError:
                raise ValueError(f"unmapped phase {phase!r}; ...")

    Both adapters import this; both MCP wrappers import this.
    One source of truth. Strict-dict lookup means a future
    `PHASE_X` raises loudly instead of silently defaulting
    (addressing one of Q6's concerns).

    Q3 — Why (a) over (b) or (c):

    The defect is symmetric — same omission, same fix shape,
    same test shape, same skill paragraph mentions both. (b)
    "codex first, gemini second" doubles the review cost and
    leaves a window where the audit trail says "fixed for
    codex, still broken for gemini" which is an inconsistent
    state nobody designed for. (c) "defer gemini to v1.15.0
    because of 429 rates" confuses the bug (which is
    independent of 429) with usage frequency (which is
    irrelevant to defect-fix prioritization). Symmetric bugs
    deserve symmetric fixes in one PR.

    Q4 — Why (a) over (b) or (c):

    Per iter-0041, the consensus-workflow skill is bundled in
    the wheel and installed by the bootstrap pack. Installing
    the new wheel updates code AND skill atomically. There is
    no release-boundary window where users have new code but
    old skill (or vice versa) — they're the same artifact.
    (b) "follow-up PR after release" introduces a window where
    the shipped skill contradicts the shipped code, which is
    the worst documentation state. (c) "document the version
    boundary explicitly" is appealing but the skill is meant
    to describe CURRENT behavior, not historical compat;
    versioned compat notes belong in CHANGELOG.md.

    Q5 — Why (c) over (a), (b), or (d):

    The reason this defect persisted is that the existing
    proposal-mode test
    (`test_dispatch_codex_proposal_mode.py:58`) tests
    `argparse.ArgumentParser` behavior in isolation — it
    builds its OWN parser and parses literal `["--mode",
    "proposal"]`, completely bypassing both the adapter AND
    the dispatcher's own arg parser. CI was green because
    the test was self-referential.

    (a) unit test alone catches THIS regression (adapter
    omits `--mode`) but not the cousin (dispatcher's
    template-selection logic moves and the unit test still
    asserts the same argv shape that no longer means what
    we think it means).

    (b) integration test alone is more thorough but slow
    and harder to debug when it fails — argv-shape
    assertions give a clearer signal than "the wrong
    template was loaded somewhere."

    (d) "argv tests are brittle" is a fair concern in
    general, but for a specific contract (adapter MUST
    forward `--mode` based on `packet.phase`), the argv
    IS the contract. Brittleness here is desirable: it
    catches the regression we're fixing.

    (c) gives both: unit test as the regression seal,
    integration test as the deeper template-selection
    seal. Total cost: ~30 LOC of test code. Cheap
    insurance against the exact failure mode that
    propagated this defect across projects.

    Q6 — Missed dimensions:

    1. **Existing sealed artifacts with wrong template.**
       Every parent-project iter-0019..0042 propose-mode
       dispatch through the engine adapter (post-iter-0028)
       sealed against the WRONG schema. Those sealed packets
       are in `consensus-state/archive/imported-from-parent/`.
       Audit consumers may have keyed off the wrong fields.
       Recommend: in the fix PR, add a one-time scan
       (`scripts/audit_template_phase_mismatch.py`) that
       reports any sealed packet where `template_used` does
       not match the phase implied by the iteration's
       goal_packet.workflow_mode + reviewer_id role. Don't
       MIGRATE existing artifacts — they're historical
       record. Just surface the count so we know the blast
       radius.

    2. **Loud failure for unmapped phases.** Use strict-dict
       lookup (KeyError → ValueError) in the helper, not
       `if/elif/else` with a default fallback. If a future
       phase is added, the adapter raises immediately
       instead of silently dispatching the wrong mode.
       This is the same lesson the original defect teaches:
       silent default-to-review is what got us here.

    3. **Closure-invariant template check (FOLLOW-UP, not
       this PR).** The seal pipeline could enforce
       `template_used` matches the expected mapping for the
       phase. That would catch any future drift between
       adapter argv and dispatcher behavior. But it's a
       separate change with its own design surface
       (what does "expected for phase" mean when the
       operator passes `--prompt-template` override?), so
       defer to a follow-up iteration.

