risks:
  - 'Existing sealed artifacts in consensus-state/archive/ may have been sealed against the wrong schema during the defect window. Downstream audit tooling that reads template_used could surface inconsistencies. Mitigation: one-time audit script reports count, do not migrate historical record.'
  - 'Test fixtures that dispatch PHASE_PROPOSE with review-mode-shaped expected output will start failing legitimately — those failures are signal, not noise, but require triage before the PR can land green.'
  - 'PHASE_CONVERGE → proposal mapping is a design call; if iter-0028 empirical validation does not in fact extend to convergence (the docstring claim is "validated for design proposals + convergence syntheses" but the validation iterations were primarily proposal-shaped), we may discover converge-mode artifacts have a quality drop. Mitigation: post-fix, monitor first 3 converge dispatches for output-quality regressions; if observed, add codex_converge_template.md as follow-up (not this PR).'
  - 'MCP wrapper API change (new optional `phase` parameter) is technically a schema extension, not a breaking change — but downstream MCP clients that strictly validate request schemas may need updates. Mitigation: parameter is optional with default "review" preserving current behavior.'
estimated_complexity: small
