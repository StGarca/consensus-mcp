proposal:
  selected_target: 'Fix the integration boundary end-to-end: map DispatchPacket.phase
    to dispatcher --mode in CodexAdapter and GeminiAdapter, add mode/phase support
    to the MCP wrapper argv builder, and replace the shell-CLI workaround in the consensus-workflow
    skill with the engine path after tests prove proposal mode reaches the dispatchers.'
  rationale_vs_alternatives: 'A narrow adapter-only patch fixes the production engine
    path for loop_run_goal and consensus_run_iteration, but leaves MCP-tool callers
    unable to request proposal mode and leaves the bootstrap skill teaching downstream
    users to bypass the engine. A dispatcher-template change is the wrong layer because
    the binaries already support --mode and the failure is lost intent at the caller
    boundary. A tests-only or documentation-only iteration would preserve the silent
    failure. The best value move is a small end-to-end propagation fix: one canonical
    phase-to-mode mapping, both engine adapters covered, the MCP wrapper exposed,
    and the obsolete workaround removed so new projects stop inheriting bad operating
    procedure.'
  deliverable_scope:
    next_iteration_id: iteration-0044-engine-phase-mode-forwarding
    files_in_scope:
    - consensus_mcp/contributors/codex.py
    - consensus_mcp/contributors/gemini.py
    - consensus_mcp/contributors/base.py
    - tools/reviewer_dispatch_codex.py
    - tests/test_contributor_adapter_mode_forwarding.py
    - tests/test_reviewer_dispatch_codex_mode_forwarding.py
    - consensus_mcp/dispatch_templates/codex_proposal_template.md
    - consensus_mcp/dispatch_templates/codex_proposal_schema.json
    - skills/consensus-workflow/SKILL.md
    files_out_of_scope:
    - consensus_mcp/_dispatch_codex.py
    - consensus_mcp/_dispatch_gemini.py
    - consensus_mcp/dispatch_templates/codex_review_template.md
    - consensus_mcp/dispatch_templates/codex_review_schema.json
    - orchestration loop semantics beyond forwarding the existing packet.phase value
    - 'schema redesign or workflow #4 convergence policy changes'
    key_design_decisions:
    - 'Centralize phase-to-mode conversion as a tiny helper near DispatchPacket or
      the contributor base layer: PHASE_PROPOSE maps to proposal; PHASE_REVIEW and
      PHASE_CONVERGE map to review unless a separate converge schema exists later.'
    - Fail closed on unknown phases with a clear ValueError instead of silently defaulting
      to review.
    - Adapters append --mode before invoking _dispatch_codex.main or _dispatch_gemini.main,
      preserving existing fixed flags and optional --review-target behavior.
    - The MCP wrapper accepts an explicit mode or phase parameter and forwards --mode
      through _build_argv, with default review retained for backward compatibility.
    - Tests monkeypatch dispatcher main functions and inspect argv at the adapter
      boundary; they must not only parse argparse in isolation.
    - 'Update the consensus-workflow skill to use the engine path for workflow #4
      round-1 dispatch and retain a short note that the former shell fallback was
      removed after adapter forwarding landed.'
    acceptance_gates:
    - CodexAdapter.dispatch with DispatchPacket.phase == PHASE_PROPOSE invokes _dispatch_codex.main
      with --mode proposal.
    - GeminiAdapter.dispatch with DispatchPacket.phase == PHASE_PROPOSE invokes _dispatch_gemini.main
      with --mode proposal.
    - CodexAdapter.dispatch and GeminiAdapter.dispatch with PHASE_REVIEW or PHASE_CONVERGE
      invoke dispatchers with --mode review.
    - Unknown packet.phase raises a deterministic error covered by test.
    - tools/reviewer_dispatch_codex.py _build_argv can produce --mode proposal through
      its public caller path while preserving current review default.
    - A regression search over tests shows CodexAdapter or GeminiAdapter are covered
      by proposal/mode tests, not only raw argparse.
    - Existing dispatcher proposal-mode tests still pass.
    - 'consensus-workflow no longer instructs users to bypass the engine for round-1
      workflow #4 proposal dispatch.'
  risks:
  - If downstream code used nonstandard phase strings, fail-closed validation may
    expose latent bad callers immediately.
  - Mapping PHASE_CONVERGE to review is pragmatic but should be documented because
    a future converge-specific schema would need an explicit new mode.
  - The Gemini dispatcher may have subtle argv ordering assumptions; tests should
    assert behavior through the actual adapter call shape.
  - Skill path may differ from the installed bootstrap pack layout, so documentation
    update should target the repo source of truth and any generated pack if present.
  estimated_complexity: small
  structural_abstention: false
