goal_satisfied_rationale: 'A narrow adapter-only patch fixes the production engine
  path for loop_run_goal and consensus_run_iteration, but leaves MCP-tool callers
  unable to request proposal mode and leaves the bootstrap skill teaching downstream
  users to bypass the engine. A dispatcher-template change is the wrong layer because
  the binaries already support --mode and the failure is lost intent at the caller
  boundary. A tests-only or documentation-only iteration would preserve the silent
  failure. The best value move is a small end-to-end propagation fix: one canonical
  phase-to-mode mapping, both engine adapters covered, the MCP wrapper exposed, and
  the obsolete workaround removed so new projects stop inheriting bad operating procedure.'
