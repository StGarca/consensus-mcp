proposal:
  selected_target: 'Fix: Plumb DispatchPacket.phase to adapter layer and forward as
    --mode flag'
  rationale_vs_alternatives: 'The core defect lies at the integration boundary between
    the workflow engine and the dispatch CLIs. The adapter layer (`CodexAdapter`,
    `GeminiAdapter`) is the choke point where the `DispatchPacket.phase` information
    is dropped. The proposed fix addresses the root cause directly within this layer,
    ensuring that any caller using the production `workflow_engine` path will automatically
    have the correct `--mode` forwarded based on the workflow phase.


    An alternative would be to modify only the higher-level MCP tools (`reviewer_dispatch_codex.py`,
    etc.). This would be an incomplete fix, as it would not correct the behavior for
    direct engine consumers like `loop_run_goal` and `consensus_run_iteration`, which
    is where the production impact is most acute. Another alternative would be to
    require all callers to manually specify the mode, which would be brittle and contrary
    to the design principle of having the workflow engine manage the phase.


    This proposal also includes updating the MCP wrapper tools and, crucially, adding
    specific test coverage for the adapter-level integration. The existing tests are
    green because they bypass the adapter layer entirely, which is how the defect
    remained hidden. Adding tests at the adapter boundary is the only way to guarantee
    the fix is correct and prevent future regressions.'
  deliverable_scope:
    next_iteration_id: iter-0044-adapter-mode-forwarding-fix
    files_in_scope:
    - consensus_mcp/contributors/codex.py
    - consensus_mcp/contributors/gemini.py
    - consensus_mcp/tools/reviewer_dispatch_codex.py
    - consensus_mcp/tools/reviewer_dispatch_gemini.py
    - consensus_mcp/tests/test_dispatch_codex.py
    - consensus_mcp/tests/test_dispatch_gemini.py
    - consensus_mcp/tests/test_reviewer_dispatch_codex.py
    files_out_of_scope:
    - consensus_mcp/_dispatch_codex.py
    - consensus_mcp/_dispatch_gemini.py
    - consensus-workflow skill (external to this repo)
    key_design_decisions:
    - In `CodexAdapter.dispatch` and `GeminiAdapter.dispatch`, inspect the `packet.phase`
      attribute.
    - If `packet.phase` is `PHASE_PROPOSE`, inject `['--mode', 'proposal']` into the
      `argv` list passed to the subprocess.
    - If `packet.phase` is not `PHASE_PROPOSE`, do not add the `--mode` flag, allowing
      the underlying script to use its default value of 'review'.
    - Update the `reviewer_dispatch_codex` and `reviewer_dispatch_gemini` MCP tools
      to accept a phase parameter and pass it correctly when constructing the `DispatchPacket`
      for the adapters.
    - Create new unit tests that call the `CodexAdapter.dispatch` and `GeminiAdapter.dispatch`
      methods directly and mock the `subprocess.run` call to assert that the `argv`
      argument is correctly constructed for both proposal and review phases.
    acceptance_gates:
    - All existing tests must continue to pass.
    - A new test in `test_dispatch_codex.py` must successfully assert that `CodexAdapter`
      forwards `--mode proposal` when `packet.phase == PHASE_PROPOSE`.
    - A new test in `test_dispatch_gemini.py` must successfully assert that `GeminiAdapter`
      forwards `--mode proposal` when `packet.phase == PHASE_PROPOSE`.
    - Tests for `reviewer_dispatch_codex.py` must be updated to cover the new phase-forwarding
      logic.
  risks:
  - The adapter dispatch methods may be called from other locations not identified
    in the initial investigation, requiring a broader search for call sites.
  - The existing tests for the adapter layer do not appear to mock `subprocess.run`,
    so adding this test pattern may introduce unforeseen complexity.
  - Modifying the signature of functions within the `reviewer_dispatch_*` tools could
    impact other tools that call them, although this is considered low risk.
  estimated_complexity: medium
  structural_abstention: false
