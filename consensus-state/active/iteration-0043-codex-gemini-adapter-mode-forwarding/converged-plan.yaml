# === SYNTHESIS BY QUESTION ===

q1_phase_to_mode_for_phase_converge:
  claude_position: '(a) PHASE_CONVERGE → proposal — synthesis output is proposal-shaped per existing schema'
  codex_position: 'PHASE_CONVERGE → review — pragmatic until a dedicated converge schema exists'
  gemini_position: 'implicit review — only PHASE_PROPOSE gets the flag, everything else falls through to dispatcher default'
  weighted_synthesis: |
    PHASE_CONVERGE → review for the initial fix. Codex's pragmatic
    framing wins on shipping risk (a converge-shaped schema does
    not exist yet; introducing proposal-shape to converge dispatches
    is an unverified design call that should not block the defect
    fix). Claude's argument that synthesis output is proposal-shaped
    is preserved as an EXPLICIT FOLLOW-UP: iter-0045 should evaluate
    whether converge dispatches produce review-shaped output that
    fits the synthesis task, and if not, ship `codex_converge_schema.json`
    + `_phase_mode.PHASE_CONVERGE → "converge"` (a new third mode).
    The good idea is not lost; it's sequenced.

q2_mcp_wrapper_surface:
  claude_position: '(b) expose `phase` only — match engine abstraction'
  codex_position: 'accept explicit mode OR phase — both work'
  gemini_position: 'accept `phase` parameter'
  weighted_synthesis: |
    MCP wrappers expose `phase` as the primary parameter (matches
    engine adapter, hides dispatcher implementation detail per
    claude+gemini consensus). Additionally accept an optional
    `mode` override for callers who need explicit dispatcher-level
    control (codex's flexibility argument preserved as an
    escape-hatch). Default behavior when neither is passed:
    `phase=PHASE_REVIEW` (preserves backward compat with current
    callers).

q3_same_patch_for_gemini:
  claude_position: '(a) one PR fixing both'
  codex_position: '(a) one PR covering both adapters'
  gemini_position: '(a) one PR covering both adapters + both wrappers'
  weighted_synthesis: |
    Unanimous: one PR covering both adapters AND both MCP wrappers.
    No splits — symmetric defect, symmetric fix.

q4_workaround_removal:
  claude_position: '(a) remove in same PR'
  codex_position: '(a) update skill in same PR with deprecation note'
  gemini_position: 'abstain — believed skill was external (incorrect; it is in consensus_mcp/claude_extensions/)'
  weighted_synthesis: |
    Remove the workaround paragraph in the same PR (claude+codex
    agree). Replace with codex's nuance: a brief one-line
    deprecation marker noting "as of v1.14.x iter-0044, MCP
    wrappers expose `phase`; the former shell-CLI fallback for
    proposal mode is no longer needed." This survives one release
    cycle to help users straddling versions, then can be removed
    in v1.15.0. Atomic with code change because the skill ships
    in the wheel (per iter-0041).

q5_test_surface:
  claude_position: '(c) unit + integration tests'
  codex_position: 'unit tests at adapter boundary required, regression search required'
  gemini_position: '(a) unit tests at adapter boundary mocking subprocess'
  weighted_synthesis: |
    Required (all three converge):
      - Unit tests asserting CodexAdapter and GeminiAdapter
        forward the right --mode for each of PHASE_PROPOSE,
        PHASE_REVIEW, PHASE_CONVERGE (mock _dispatch_*.main,
        capture argv, assert).
      - Unit test asserting unknown phase raises ValueError.
      - Wrapper tests asserting MCP-tool `phase` parameter
        propagates to dispatcher --mode argv.
      - All existing dispatcher proposal-mode tests still pass.

    Recommended (claude+codex; gemini did not exclude):
      - One integration test running an adapter end-to-end against
        a fake codex/gemini binary, verifying the actual template
        loaded matches the phase. Not gating, but high value
        insurance against the cousin-defect (mode→template mapping
        moves and unit argv tests still pass with stale meaning).

    Codex's added gate adopted: regression search confirms
    CodexAdapter/GeminiAdapter are covered by mode/proposal tests
    (not just raw argparse) — this is what would have caught the
    original defect.

q6_missed_dimensions:
  weighted_synthesis: |
    All three peers identified fail-closed-on-unknown-phase as a
    requirement; adopted as a gating acceptance criterion.

    Claude's existing-sealed-artifact audit script: adopted as a
    NON-GATING follow-up tool. The blast radius (how many sealed
    packets in consensus-state/archive/imported-from-parent/
    sealed against wrong schema) is useful information but does
    not block the fix. Ship the script alongside the fix; do not
    require its output to be clean.

    Codex's bundled-wheel-vs-source-skill consistency check:
    adopted as a verification gate. The skill exists in two
    places (source: consensus_mcp/claude_extensions/skills/,
    and the wheel build copies it). The iter-0044 acceptance
