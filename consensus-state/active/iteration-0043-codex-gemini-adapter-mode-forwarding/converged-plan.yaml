    return 0 hits for the workaround in both).

    Gemini's broader call-site search: adopted as Phase 0 of
    iter-0044 — do a `grep -rn "CodexAdapter\|GeminiAdapter"`
    sweep before patching to confirm no unknown call-sites need
    updates.

