    consensus_mcp/contributors/__init__.py: "\"\"\"Contributor adapter layer — pluggable AI participants for the workflow engine.\n\nPer iter-0015 converged-plan Section C: each contributor (claude, codex,\ngemini, future AIs) exposes a uniform `ContributorAdapter` interface so the\nworkflow engine can dispatch them generically regardless of underlying\nimplementation (in-process for claude, subprocess for codex/gemini).\n\"\"\"\nfrom consensus_mcp.contributors.base import (\n    ContributorAdapter,\n    DispatchError,\n    Phase,\n    PHASE_PROPOSE,\n    PHASE_REVIEW,\n    PHASE_CONVERGE,\n    SealedArtifact,\n)\n\n__all__ = [\n    \"ContributorAdapter\",\n    \"DispatchError\",\n    \"Phase\",\n    \"PHASE_PROPOSE\",\n    \"PHASE_REVIEW\",\n    \"PHASE_CONVERGE\",\n    \"SealedArtifact\",\n]\n"
    consensus_mcp/contributors/base.py: "\"\"\"ContributorAdapter abstract base + supporting types.\n\nPer iter-0015 converged-plan Section C, every contributor (claude, codex,\ngemini, future AIs) implements this interface. The workflow engine calls\n`dispatch(phase, packet)` to get a sealed artifact regardless of how the\nunderlying contributor works (in-process for claude, subprocess for codex/\ngemini, RPC for future remote AIs).\n\nPhases:\n  - PROPOSE: contributor writes its own design/plan against a problem statement\n    (workflow #4 blind phase). Receives only the problem statement; no peer\n    proposals visible.\n  - REVIEW: contributor evaluates an already-written change against acceptance\n    gates (workflow #3 post-review, or convergence in advisory mode).\n  - CONVERGE: contributor sees all sibling proposals revealed and proposes the\n    synthesized plan (workflow #4 reveal phase).\n\nThe packet structure passed to `dispatch` mirrors the existing goal_packet +\nreview_packet pair used by the dispatch helpers, but with phase-specific\nfields that the engine fills in.\n\"\"\"\nfrom __future__ import annotations\n\nfrom abc import ABC, abstractmethod\nfrom dataclasses import dataclass\nfrom pathlib import Path\nfrom typing import Literal\n\n\n# Phase identifiers as Literal type alias.\nPhase = Literal[\"propose\", \"review\", \"converge\"]\n\nPHASE_PROPOSE: Phase = \"propose\"\nPHASE_REVIEW: Phase = \"review\"\nPHASE_CONVERGE: Phase = \"converge\"\n\n\nclass DispatchError(RuntimeError):\n    \"\"\"Raised when a contributor's dispatch fails (subprocess error, parse fail,\n    file IO error, etc.). The engine decides how to handle (per timeout_policy).\"\"\"\n\n\n@dataclass(frozen=True)\nclass SealedArtifact:\n    \"\"\"The outcome of a successful contributor dispatch.\n\n    Mirrors the dict shape returned by `reviewer.dispatch_codex` MCP tool\n    plus the engine's normalization. `sealed_path` is the on-disk YAML the\n    contributor wrote; `parsed` is the loaded dict (findings, goal_satisfied, ...).\n    \"\"\"\n    contributor: str            # 'claude' | 'codex' | 'gemini' | future\n    phase: Phase\n    pass_id: str\n    sealed_path: Path\n    archive_sealed_path: Path | None\n    packet_sha256: str\n    parsed: dict\n\n\n@dataclass(frozen=True)\nclass DispatchPacket:\n    \"\"\"Input to a contributor's dispatch.\n\n    Carries the phase-specific configuration the engine has assembled.\n    \"\"\"\n    phase: Phase\n    contributor: str\n    iteration_dir: Path\n    goal_packet_path: Path\n    review_target_path: Path | None\n    reviewer_id: str | None     # if None, contributor adapter derives\n    pass_id: str | None         # if None, contributor adapter derives\n    timeout_seconds: int = 600\n    # Phase-specific extras (e.g., {model: 'gemini-2.5-pro'} for gemini)\n    adapter_options: dict | None = None\n\n\nclass ContributorAdapter(ABC):\n    \"\"\"Abstract base for all contributors.\n\n    Concrete subclasses override `dispatch` (and conventionally expose\n    `propose`, `review`, `converge` thin wrappers that build the packet and\n    call `dispatch` with the right phase).\n    \"\"\"\n\n    #: Stable identifier — used in reviewer_id derivation, config matching, etc.\n    name: str = \"\"\n\n    def __init__(self, adapter_config: dict | None = None):\n        \"\"\"`adapter_config` is the sub-dict from `.consensus/config.yaml`'s\n        `contributors.adapters.<name>` block (or None for synthetic tests).\"\"\"\n        self.adapter_config = adapter_config or {}\n\n    @abstractmethod\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n        \"\"\"Run the contributor for the given phase + packet. Return sealed result.\n\n        Must raise DispatchError on any failure (subprocess crash, parse fail,\n        watchdog timeout, etc.). The engine handles fallout per\n        `workflow.timeout_policy`.\n        \"\"\"\n\n    # ----- Phase-specific helpers (default implementations build a packet\n    # and call dispatch). Subclasses MAY override for adapter-specific quirks. -----\n\n    def propose(\n        self,\n        iteration_dir: Path,\n        goal_packet_path: Path,\n        problem_statement_path: Path,\n        *,\n        timeout_seconds: int = 600,\n    ) -> SealedArtifact:\n        \"\"\"Workflow #4 BLIND PROPOSAL phase. `problem_statement_path` is the\n        shared design challenge; no peer proposals visible.\"\"\"\n        packet = DispatchPacket(\n            phase=PHASE_PROPOSE,\n            contributor=self.name,\n            iteration_dir=iteration_dir,\n            goal_packet_path=goal_packet_path,\n            review_target_path=problem_statement_path,\n            reviewer_id=None,\n            pass_id=None,\n            timeout_seconds=timeout_seconds,\n            adapter_options=None,\n        )\n        return self.dispatch(packet)\n\n    def review(\n        self,\n        iteration_dir: Path,\n        goal_packet_path: Path,\n        review_target_path: Path,\n        *,\n        timeout_seconds: int = 600,\n    ) -> SealedArtifact:\n        \"\"\"Workflow #3 / post-review phase. Existing review-shaped dispatch.\"\"\"\n        packet = DispatchPacket(\n            phase=PHASE_REVIEW,\n            contributor=self.name,\n            iteration_dir=iteration_dir,\n            goal_packet_path=goal_packet_path,\n            review_target_path=review_target_path,\n            reviewer_id=None,\n            pass_id=None,\n            timeout_seconds=timeout_seconds,\n            adapter_options=None,\n        )\n        return self.dispatch(packet)\n\n    def converge(\n        self,\n        iteration_dir: Path,\n        goal_packet_path: Path,\n        convergence_packet_path: Path,\n        round_number: int = 1,\n        *,\n        timeout_seconds: int = 600,\n    ) -> SealedArtifact:\n        \"\"\"Workflow #4 REVEAL phase. `convergence_packet_path` contains all\n        revealed sibling proposals.\"\"\"\n        packet = DispatchPacket(\n            phase=PHASE_CONVERGE,\n            contributor=self.name,\n            iteration_dir=iteration_dir,\n            goal_packet_path=goal_packet_path,\n            review_target_path=convergence_packet_path,\n            reviewer_id=None,\n            pass_id=None,\n            timeout_seconds=timeout_seconds,\n            adapter_options={\"round_number\": round_number},\n        )\n        return self.dispatch(packet)\n\n\nclass FakeAlwaysApprove(ContributorAdapter):\n    \"\"\"Test adapter that always returns a clean approval. Used in engine tests.\"\"\"\n\n    name = \"fake-approve\"\n\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n        from consensus_mcp.contributors.base import SealedArtifact\n        out_path = packet.iteration_dir / f\"{self.name}-{packet.phase}.yaml\"\n        parsed = {\n            \"iteration_id\": packet.iteration_dir.name,\n            \"reviewer_id\": f\"{self.name}-{packet.contributor}-1\",\n            \"pass_id\": f\"{self.name}-{packet.contributor}-1-pass1\",\n            \"findings\": [],\n            \"goal_satisfied\": True,\n            \"goal_satisfied_rationale\": f\"FakeAlwaysApprove for {packet.phase}\",\n            \"blocking_objections\": [],\n        }\n        import yaml\n        out_path.write_text(yaml.safe_dump(parsed, sort_keys=False, default_flow_style=False), encoding=\"utf-8\")\n        import hashlib\n        return SealedArtifact(\n            contributor=self.name,\n            phase=packet.phase,\n            pass_id=parsed[\"pass_id\"],\n            sealed_path=out_path,\n            archive_sealed_path=None,\n            packet_sha256=hashlib.sha256(out_path.read_bytes()).hexdigest(),\n            parsed=parsed,\n        )\n\n\nclass FakeAlwaysBlock(ContributorAdapter):\n    \"\"\"Test adapter that always returns a blocking finding.\"\"\"\n\n    name = \"fake-block\"\n\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n        out_path = packet.iteration_dir / f\"{self.name}-{packet.phase}.yaml\"\n        finding_id = f\"{self.name}-rev-001\"\n        parsed = {\n            \"iteration_id\": packet.iteration_dir.name,\n            \"reviewer_id\": f\"{self.name}-{packet.contributor}-1\",\n            \"pass_id\": f\"{self.name}-{packet.contributor}-1-pass1\",\n            \"findings\": [{\n                \"id\": finding_id,\n                \"severity\": \"blocking\",\n                \"summary\": f\"FakeAlwaysBlock objects to {packet.phase}\",\n                \"citation\": \"<fake>\",\n                \"risk\": \"test-only\",\n                \"recommendation\": \"do not ship\",\n            }],\n            \"goal_satisfied\": False,\n            \"goal_satisfied_rationale\": \"FakeAlwaysBlock by construction\",\n            \"blocking_objections\": [finding_id],\n        }\n        import yaml\n        out_path.write_text(yaml.safe_dump(parsed, sort_keys=False, default_flow_style=False), encoding=\"utf-8\")\n        import hashlib\n        return SealedArtifact(\n            contributor=self.name,\n            phase=packet.phase,\n            pass_id=parsed[\"pass_id\"],\n            sealed_path=out_path,\n            archive_sealed_path=None,\n            packet_sha256=hashlib.sha256(out_path.read_bytes()).hexdigest(),\n            parsed=parsed,\n        )\n\n\nclass FakeRaisesDispatchError(ContributorAdapter):\n    \"\"\"Test adapter that always raises DispatchError. For timeout-policy tests.\"\"\"\n\n    name = \"fake-raise\"\n\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n        raise DispatchError(f\"FakeRaisesDispatchError for {packet.phase} (by construction)\")\n"
    consensus_mcp/contributors/claude.py: "\"\"\"Claude contributor adapter — orchestrator-self artifact emission.\n\nPer iter-0015 converged-plan Section C: claude IS the orchestrator running the\nloop, so the \"adapter\" for claude doesn't spawn a subprocess. It accepts a\ncallback that produces the proposal/review/converge artifact and seals it via\nT6 (review.write_and_seal) for symmetry with codex/gemini sealed outputs.\n\nFor tests: pass `proposal_callback=lambda packet: {...dict...}` to inject\ndeterministic claude artifacts.\n\nFor real runtime: the workflow engine intercepts claude's phases and writes\nthe artifact based on the conversation/orchestration state. This adapter is\nthe \"shim\" that gives claude a uniform ContributorAdapter face.\n\"\"\"\nfrom __future__ import annotations\n\nimport hashlib\nfrom pathlib import Path\nfrom typing import Callable\n\nfrom consensus_mcp.contributors.base import (\n    ContributorAdapter,\n    DispatchError,\n    DispatchPacket,\n    SealedArtifact,\n)\n\n\nclass ClaudeAdapter(ContributorAdapter):\n    \"\"\"Claude contributor — no subprocess; uses caller-provided callback to\n    materialize the artifact. The callback receives the DispatchPacket and\n    must return a dict in the standard sealed-artifact shape (findings,\n    goal_satisfied, blocking_objections, ...).\n    \"\"\"\n\n    name = \"claude\"\n\n    def __init__(\n        self,\n        adapter_config: dict | None = None,\n        *,\n        artifact_callback: Callable[[DispatchPacket], dict] | None = None,\n    ):\n        super().__init__(adapter_config)\n        self.artifact_callback = artifact_callback\n\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n        if self.artifact_callback is None:\n            raise DispatchError(\n                \"ClaudeAdapter has no artifact_callback set; cannot dispatch. \"\n                \"Real-runtime orchestration must inject one; tests pass a fake.\"\n            )\n        try:\n            artifact_dict = self.artifact_callback(packet)\n        except Exception as exc:\n            raise DispatchError(\n                f\"claude artifact_callback raised ({type(exc).__name__}): {exc}\"\n            ) from exc\n\n        if not isinstance(artifact_dict, dict):\n            raise DispatchError(\n                f\"claude artifact_callback must return dict; got {type(artifact_dict).__name__}\"\n            )\n\n        # Required fields per sealed-artifact contract.\n        for required in (\"findings\", \"goal_satisfied\", \"blocking_objections\"):\n            if required not in artifact_dict:\n                raise DispatchError(\n                    f\"claude artifact missing required field {required!r}\"\n                )\n\n        # Fill in identifiers if the callback didn't.\n        reviewer_id = packet.reviewer_id or artifact_dict.get(\n            \"reviewer_id\",\n            f\"claude-{packet.iteration_dir.name}-{packet.phase}-1\",\n        )\n        pass_id = packet.pass_id or artifact_dict.get(\n            \"pass_id\", f\"{reviewer_id}-pass1\"\n        )\n        iteration_id = artifact_dict.get(\"iteration_id\", packet.iteration_dir.name)\n\n        # gemini-rev-001 round-1 style cleanup: spread callback's dict FIRST,\n        # then assign canonical IDs so they authoritatively override any value\n        # in artifact_dict — no redundant re-assignment.\n        full_artifact = {\n            **artifact_dict,\n            \"iteration_id\": iteration_id,\n            \"reviewer_id\": reviewer_id,\n            \"pass_id\": pass_id,\n        }\n\n        # codex-rev-001 round-1 BLOCKING fix: route claude artifacts through\n        # T6 (review.write_and_seal) for symmetric sealing semantics with\n        # codex/gemini outputs. Previously we wrote raw YAML, bypassing the\n        # cryptographic sealing + archive + provenance guarantees the sealed-\n        # artifact contract requires.\n        from consensus_mcp.tools.review_write_and_seal import handle as t6_handle\n        t6_result = t6_handle(\n            iteration_id=iteration_id,\n            reviewer_id=reviewer_id,\n            pass_id=pass_id,\n            packet=full_artifact,\n        )\n        if \"error\" in t6_result:\n            raise DispatchError(\n                f\"claude T6 seal failed: {t6_result.get('error')!r}\"\n            )\n\n        # Mirror T6's sealed file to iter_dir as claude-<phase>.yaml so adapters\n        # have symmetric on-disk layout (codex writes codex-review.yaml, gemini\n        # writes gemini-review.yaml, claude writes claude-<phase>.yaml).\n        archive_path = Path(t6_result[\"sealed_path\"])\n        local_path = packet.iteration_dir / f\"claude-{packet.phase}.yaml\"\n        import shutil\n        shutil.copyfile(str(archive_path), str(local_path))\n\n        return SealedArtifact(\n            contributor=self.name,\n            phase=packet.phase,\n            pass_id=pass_id,\n            sealed_path=local_path,\n            archive_sealed_path=archive_path,\n            packet_sha256=t6_result.get(\"packet_sha256\", \"\"),\n            parsed=full_artifact,\n        )\n"
    consensus_mcp/contributors/codex.py: "\"\"\"Codex contributor adapter — wraps consensus_mcp._dispatch_codex.\n\nPer iter-0015 converged-plan Section C: codex's existing dispatch helper is\nthe underlying CLI invoker; this adapter normalizes its packet → argv\ntranslation and result extraction into the ContributorAdapter interface.\n\nPhase semantics for v1: all three phases (propose, review, converge) reuse\nthe SAME prompt template (codex_review_template.md) — phase intent is\nconveyed via the goal_packet's `desired_end_state` text that the workflow\nengine writes appropriately per phase. This was empirically validated in\niter-0015's design consult (same template, different goal yielded design\nproposals + convergence syntheses). Phase-specific templates can be added\nin a later iteration if observed quality drops.\n\"\"\"\nfrom __future__ import annotations\n\nimport contextlib\nimport io\nimport json\nfrom pathlib import Path\n\nfrom consensus_mcp.contributors.base import (\n    ContributorAdapter,\n    DispatchError,\n    DispatchPacket,\n    SealedArtifact,\n)\n\n\nclass CodexAdapter(ContributorAdapter):\n    \"\"\"Codex contributor — subprocess via _dispatch_codex.main.\"\"\"\n\n    name = \"codex\"\n\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n        # Build argv mirroring reviewer.dispatch_codex MCP wrapper.\n        reviewer_id = packet.reviewer_id or f\"codex-{packet.iteration_dir.name}-{packet.phase}-1\"\n        pass_id = packet.pass_id or f\"{reviewer_id}-pass1\"\n        argv = [\n            \"--goal-packet\", str(packet.goal_packet_path),\n            \"--iteration-dir\", str(packet.iteration_dir),\n            \"--reviewer-id\", reviewer_id,\n            \"--pass-id\", pass_id,\n            \"--timeout-seconds\", str(packet.timeout_seconds),\n        ]\n        if packet.review_target_path is not None:\n            argv += [\"--review-target\", str(packet.review_target_path)]\n\n        from consensus_mcp import _dispatch_codex\n\n        buf = io.StringIO()\n        rc = 0\n        with contextlib.redirect_stdout(buf):\n            try:\n                rc = _dispatch_codex.main(argv) or 0\n            except SystemExit as exc:\n                raise DispatchError(\n                    f\"codex argparse SystemExit: {exc.code!r}\"\n                ) from exc\n            except Exception as exc:\n                raise DispatchError(\n                    f\"codex dispatch failed ({type(exc).__name__}): {exc}\"\n                ) from exc\n\n        output = buf.getvalue().strip()\n        try:\n            parsed_result = json.loads(output)\n        except json.JSONDecodeError as exc:\n            raise DispatchError(\n                f\"codex dispatch returned non-JSON stdout: {exc}; sample: {output[:200]!r}\"\n            ) from exc\n\n        if rc != 0 or not parsed_result.get(\"ok\"):\n            raise DispatchError(\n                f\"codex dispatch failed: rc={rc}, \"\n                f\"error={parsed_result.get('error')!r}, \"\n                f\"error_type={parsed_result.get('error_type')!r}\"\n            )\n\n        # codex-rev-002 round-1 fix: wrap sealed-path extraction + YAML\n        # reading in DispatchError so engine timeout/failure policy applies\n        # uniformly regardless of post-helper failures.\n        try:\n            sealed_path_str = parsed_result[\"sealed_path\"]\n        except KeyError as exc:\n            raise DispatchError(\n                f\"codex dispatch returned no sealed_path: {parsed_result!r}\"\n            ) from exc\n        sealed_path = Path(sealed_path_str)\n        try:\n            import yaml\n            sealed = yaml.safe_load(sealed_path.read_text(encoding=\"utf-8\"))\n        except (OSError, yaml.YAMLError) as exc:\n            raise DispatchError(\n                f\"codex sealed artifact unreadable at {sealed_path}: \"\n                f\"{type(exc).__name__}: {exc}\"\n            ) from exc\n        if not isinstance(sealed, dict):\n            raise DispatchError(\n                f\"codex sealed artifact at {sealed_path} is not a YAML mapping; \"\n                f\"got {type(sealed).__name__}\"\n            )\n\n        return SealedArtifact(\n            contributor=self.name,\n            phase=packet.phase,\n            pass_id=parsed_result[\"pass_id\"],\n            sealed_path=sealed_path,\n            archive_sealed_path=Path(parsed_result[\"archive_sealed_path\"])\n                if parsed_result.get(\"archive_sealed_path\") else None,\n            packet_sha256=parsed_result.get(\"packet_sha256\", \"\"),\n            parsed=sealed,\n        )\n"
    consensus_mcp/contributors/gemini.py: "\"\"\"Gemini contributor adapter — wraps consensus_mcp._dispatch_gemini.\n\nMirrors CodexAdapter. Phase semantics same as codex: all phases reuse the\nexisting gemini_review_template.md; phase intent conveyed via goal_packet.\n\"\"\"\nfrom __future__ import annotations\n\nimport contextlib\nimport io\nimport json\nfrom pathlib import Path\n\nfrom consensus_mcp.contributors.base import (\n    ContributorAdapter,\n    DispatchError,\n    DispatchPacket,\n    SealedArtifact,\n)\n\n\nclass GeminiAdapter(ContributorAdapter):\n    \"\"\"Gemini contributor — subprocess via _dispatch_gemini.main.\"\"\"\n\n    name = \"gemini\"\n\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n        reviewer_id = packet.reviewer_id or f\"gemini-{packet.iteration_dir.name}-{packet.phase}-1\"\n        pass_id = packet.pass_id or f\"{reviewer_id}-pass1\"\n        argv = [\n            \"--goal-packet\", str(packet.goal_packet_path),\n            \"--iteration-dir\", str(packet.iteration_dir),\n            \"--reviewer-id\", reviewer_id,\n            \"--pass-id\", pass_id,\n            \"--timeout-seconds\", str(packet.timeout_seconds),\n        ]\n        if packet.review_target_path is not None:\n            argv += [\"--review-target\", str(packet.review_target_path)]\n\n        # codex-rev-003 round-1 fix: merge packet.adapter_options with\n        # adapter_config so per-dispatch overrides take precedence over\n        # static config. Precedence: packet.adapter_options.model >\n        # adapter_config.model.\n        merged_options = {}\n        merged_options.update(self.adapter_config or {})\n        merged_options.update(packet.adapter_options or {})\n        model = merged_options.get(\"model\")\n        if model:\n            argv += [\"--model\", model]\n\n        from consensus_mcp import _dispatch_gemini\n\n        buf = io.StringIO()\n        rc = 0\n        with contextlib.redirect_stdout(buf):\n            try:\n                rc = _dispatch_gemini.main(argv) or 0\n            except SystemExit as exc:\n                raise DispatchError(\n                    f\"gemini argparse SystemExit: {exc.code!r}\"\n                ) from exc\n            except Exception as exc:\n                raise DispatchError(\n                    f\"gemini dispatch failed ({type(exc).__name__}): {exc}\"\n                ) from exc\n\n        output = buf.getvalue().strip()\n        try:\n            parsed_result = json.loads(output)\n        except json.JSONDecodeError as exc:\n            raise DispatchError(\n                f\"gemini dispatch returned non-JSON stdout: {exc}; sample: {output[:200]!r}\"\n            ) from exc\n\n        if rc != 0 or not parsed_result.get(\"ok\"):\n            raise DispatchError(\n                f\"gemini dispatch failed: rc={rc}, \"\n                f\"error={parsed_result.get('error')!r}, \"\n                f\"error_type={parsed_result.get('error_type')!r}\"\n            )\n\n        # codex-rev-002 round-1 fix: wrap sealed-path extraction + YAML read\n        # in DispatchError (same fix as codex.py).\n        try:\n            sealed_path_str = parsed_result[\"sealed_path\"]\n        except KeyError as exc:\n            raise DispatchError(\n                f\"gemini dispatch returned no sealed_path: {parsed_result!r}\"\n            ) from exc\n        sealed_path = Path(sealed_path_str)\n        try:\n            import yaml\n            sealed = yaml.safe_load(sealed_path.read_text(encoding=\"utf-8\"))\n        except (OSError, yaml.YAMLError) as exc:\n            raise DispatchError(\n                f\"gemini sealed artifact unreadable at {sealed_path}: \"\n                f\"{type(exc).__name__}: {exc}\"\n            ) from exc\n        if not isinstance(sealed, dict):\n            raise DispatchError(\n                f\"gemini sealed artifact at {sealed_path} is not a YAML mapping; \"\n                f\"got {type(sealed).__name__}\"\n            )\n\n        return SealedArtifact(\n            contributor=self.name,\n            phase=packet.phase,\n            pass_id=parsed_result[\"pass_id\"],\n            sealed_path=sealed_path,\n            archive_sealed_path=Path(parsed_result[\"archive_sealed_path\"])\n                if parsed_result.get(\"archive_sealed_path\") else None,\n            packet_sha256=parsed_result.get(\"packet_sha256\", \"\"),\n            parsed=sealed,\n        )\n"
    consensus_mcp/tests/test_contributors.py: "\"\"\"Unit tests for consensus_mcp.contributors.* — adapter layer.\n\nPer iter-0016b: test the abstract interface + fake adapters + ClaudeAdapter's\ncallback contract + codex/gemini adapter argv translation (without spawning\nreal subprocesses).\n\"\"\"\nfrom __future__ import annotations\n\nfrom pathlib import Path\nfrom unittest.mock import patch\n\nimport pytest\nimport yaml\n\nfrom consensus_mcp.contributors import (\n    PHASE_CONVERGE,\n    PHASE_PROPOSE,\n    PHASE_REVIEW,\n    ContributorAdapter,\n    DispatchError,\n    SealedArtifact,\n)\nfrom consensus_mcp.contributors.base import (\n    DispatchPacket,\n    FakeAlwaysApprove,\n    FakeAlwaysBlock,\n    FakeRaisesDispatchError,\n)\nfrom consensus_mcp.contributors.claude import ClaudeAdapter\nfrom consensus_mcp.contributors.codex import CodexAdapter\nfrom consensus_mcp.contributors.gemini import GeminiAdapter\n\n\n# ---------- Phase constants ----------\n\ndef test_phase_constants():\n    assert PHASE_PROPOSE == \"propose\"\n    assert PHASE_REVIEW == \"review\"\n    assert PHASE_CONVERGE == \"converge\"\n\n\n# ---------- FakeAlwaysApprove / FakeAlwaysBlock ----------\n\ndef _make_packet(tmp_path: Path, phase: str = PHASE_REVIEW) -> DispatchPacket:\n    iter_dir = tmp_path / \"iter-test\"\n    iter_dir.mkdir(parents=True, exist_ok=True)\n    goal = iter_dir / \"goal_packet.yaml\"\n    goal.write_text(\"pilot_id: iter-test\\n\", encoding=\"utf-8\")\n    return DispatchPacket(\n        phase=phase,\n        contributor=\"<test>\",\n        iteration_dir=iter_dir,\n        goal_packet_path=goal,\n        review_target_path=None,\n        reviewer_id=None,\n        pass_id=None,\n        timeout_seconds=60,\n        adapter_options=None,\n    )\n\n\ndef test_fake_approve_returns_clean(tmp_path):\n    adapter = FakeAlwaysApprove()\n    packet = _make_packet(tmp_path, PHASE_REVIEW)\n    art = adapter.dispatch(packet)\n    assert art.contributor == \"fake-approve\"\n    assert art.phase == PHASE_REVIEW\n    assert art.parsed[\"goal_satisfied\"] is True\n    assert art.parsed[\"blocking_objections\"] == []\n    assert art.sealed_path.exists()\n\n\ndef test_fake_block_returns_blocking_finding(tmp_path):\n    adapter = FakeAlwaysBlock()\n    packet = _make_packet(tmp_path, PHASE_REVIEW)\n    art = adapter.dispatch(packet)\n    assert art.parsed[\"goal_satisfied\"] is False\n    assert art.parsed[\"blocking_objections\"] == [\"fake-block-rev-001\"]\n\n\ndef test_fake_raise_raises_dispatch_error(tmp_path):\n    adapter = FakeRaisesDispatchError()\n    packet = _make_packet(tmp_path)\n    with pytest.raises(DispatchError):\n        adapter.dispatch(packet)\n\n\n# ---------- ContributorAdapter convenience methods ----------\n\ndef test_propose_calls_dispatch_with_propose_phase(tmp_path):\n    adapter = FakeAlwaysApprove()\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    problem = tmp_path / \"problem.md\"\n    problem.write_text(\"# challenge\\n\", encoding=\"utf-8\")\n    art = adapter.propose(iter_dir, iter_dir / \"goal.yaml\", problem)\n    assert art.phase == PHASE_PROPOSE\n\n\ndef test_review_calls_dispatch_with_review_phase(tmp_path):\n    adapter = FakeAlwaysApprove()\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    target = tmp_path / \"target.yaml\"\n    target.write_text(\"k: v\\n\", encoding=\"utf-8\")\n    art = adapter.review(iter_dir, iter_dir / \"goal.yaml\", target)\n    assert art.phase == PHASE_REVIEW\n\n\ndef test_converge_calls_dispatch_with_converge_phase(tmp_path):\n    adapter = FakeAlwaysApprove()\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    conv = tmp_path / \"convergence-packet.yaml\"\n    conv.write_text(\"k: v\\n\", encoding=\"utf-8\")\n    art = adapter.converge(iter_dir, iter_dir / \"goal.yaml\", conv, round_number=1)\n    assert art.phase == PHASE_CONVERGE\n\n\n# ---------- ClaudeAdapter ----------\n\ndef test_claude_without_callback_raises(tmp_path):\n    adapter = ClaudeAdapter()\n    packet = _make_packet(tmp_path)\n    with pytest.raises(DispatchError, match=\"artifact_callback\"):\n        adapter.dispatch(packet)\n\n\ndef test_claude_with_callback_seals_artifact(tmp_path):\n    \"\"\"ClaudeAdapter now routes through T6 (codex-rev-001 round-1 fix); mock T6 in tests.\"\"\"\n    def cb(packet):\n        return {\n            \"findings\": [],\n            \"goal_satisfied\": True,\n            \"goal_satisfied_rationale\": \"claude approves\",\n            \"blocking_objections\": [],\n        }\n    # Set up a fake archive path T6's mock will return.\n    archive_path = tmp_path / \"fake-archive.yaml\"\n    def fake_t6(iteration_id, reviewer_id, pass_id, packet):\n        archive_path.write_text(yaml.safe_dump(packet), encoding=\"utf-8\")\n        return {\"sealed_path\": str(archive_path), \"packet_sha256\": \"fakehash\"}\n    with patch(\"consensus_mcp.tools.review_write_and_seal.handle\", side_effect=fake_t6):\n        adapter = ClaudeAdapter(artifact_callback=cb)\n        packet = _make_packet(tmp_path, PHASE_PROPOSE)\n        art = adapter.dispatch(packet)\n    assert art.contributor == \"claude\"\n    assert art.sealed_path.name == \"claude-propose.yaml\"\n    assert art.parsed[\"goal_satisfied\"] is True\n    assert art.archive_sealed_path == archive_path\n\n\ndef test_claude_rejects_callback_missing_required_field(tmp_path):\n    def cb(packet):\n        # missing 'blocking_objections'\n        return {\"findings\": [], \"goal_satisfied\": True}\n    adapter = ClaudeAdapter(artifact_callback=cb)\n    packet = _make_packet(tmp_path)\n    with pytest.raises(DispatchError, match=\"blocking_objections\"):\n        adapter.dispatch(packet)\n\n\ndef test_claude_rejects_non_dict_callback_return(tmp_path):\n    adapter = ClaudeAdapter(artifact_callback=lambda p: \"not a dict\")\n    packet = _make_packet(tmp_path)\n    with pytest.raises(DispatchError, match=\"must return dict\"):\n        adapter.dispatch(packet)\n\n\ndef test_claude_wraps_callback_exception(tmp_path):\n    def cb(packet):\n        raise ValueError(\"test failure\")\n    adapter = ClaudeAdapter(artifact_callback=cb)\n    packet = _make_packet(tmp_path)\n    with pytest.raises(DispatchError, match=\"ValueError\"):\n        adapter.dispatch(packet)\n\n\ndef test_claude_artifact_filename_per_phase(tmp_path):\n    def cb(packet):\n        return {\"findings\": [], \"goal_satisfied\": True, \"blocking_objections\": []}\n    def fake_t6(iteration_id, reviewer_id, pass_id, packet):\n        archive = tmp_path / f\"archive-{iteration_id}.yaml\"\n        archive.write_text(yaml.safe_dump(packet), encoding=\"utf-8\")\n        return {\"sealed_path\": str(archive), \"packet_sha256\": \"h\"}\n    with patch(\"consensus_mcp.tools.review_write_and_seal.handle\", side_effect=fake_t6):\n        adapter = ClaudeAdapter(artifact_callback=cb)\n        for phase in (PHASE_PROPOSE, PHASE_REVIEW, PHASE_CONVERGE):\n            packet = _make_packet(tmp_path / phase, phase)\n            packet.iteration_dir.mkdir(parents=True, exist_ok=True)\n            art = adapter.dispatch(packet)\n            assert art.sealed_path.name == f\"claude-{phase}.yaml\"\n\n\n# ---------- CodexAdapter / GeminiAdapter argv translation ----------\n\ndef test_codex_adapter_constructs_argv(tmp_path):\n    \"\"\"Mock _dispatch_codex.main to capture argv without spawning subprocess.\"\"\"\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    goal = iter_dir / \"goal_packet.yaml\"\n    goal.write_text(\"pilot_id: iter\\n\", encoding=\"utf-8\")\n    target = iter_dir / \"review-packet.yaml\"\n    target.write_text(\"k: v\\n\", encoding=\"utf-8\")\n\n    # Fake sealed YAML the dispatch would have written.\n    sealed = iter_dir / \"codex-review.yaml\"\n    sealed.write_text(yaml.safe_dump({\"iteration_id\": \"iter\", \"findings\": []}), encoding=\"utf-8\")\n\n    captured_argv = []\n    def fake_main(argv):\n        captured_argv.extend(argv)\n        import json\n        print(json.dumps({\n            \"ok\": True,\n            \"pass_id\": \"codex-iter-review-1-pass1\",\n            \"sealed_path\": str(sealed),\n            \"archive_sealed_path\": None,\n            \"packet_sha256\": \"deadbeef\",\n        }))\n        return 0\n\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW,\n        contributor=\"codex\",\n        iteration_dir=iter_dir,\n        goal_packet_path=goal,\n        review_target_path=target,\n        reviewer_id=None,\n        pass_id=None,\n        timeout_seconds=600,\n        adapter_options=None,\n    )\n    with patch(\"consensus_mcp._dispatch_codex.main\", side_effect=fake_main):\n        art = CodexAdapter().dispatch(packet)\n    assert \"--goal-packet\" in captured_argv\n    assert \"--review-target\" in captured_argv\n    assert \"--timeout-seconds\" in captured_argv\n    assert \"600\" in captured_argv\n    assert art.contributor == \"codex\"\n    assert art.parsed[\"iteration_id\"] == \"iter\"\n\n\ndef test_codex_adapter_raises_on_failure(tmp_path):\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal_packet.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n\n    def fake_main(argv):\n        import json\n        print(json.dumps({\"ok\": False, \"error\": \"simulated\", \"error_type\": \"CodexInvocationError\"}))\n        return 1\n\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW, contributor=\"codex\",\n        iteration_dir=iter_dir, goal_packet_path=iter_dir / \"goal_packet.yaml\",\n        review_target_path=None, reviewer_id=None, pass_id=None,\n        timeout_seconds=60, adapter_options=None,\n    )\n    with patch(\"consensus_mcp._dispatch_codex.main\", side_effect=fake_main):\n  \
      \      with pytest.raises(DispatchError, match=\"simulated\"):\n            CodexAdapter().dispatch(packet)\n\n\ndef test_codex_adapter_wraps_systemexit(tmp_path):\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal_packet.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n\n    def fake_main(argv):\n        raise SystemExit(2)\n\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW, contributor=\"codex\",\n        iteration_dir=iter_dir, goal_packet_path=iter_dir / \"goal_packet.yaml\",\n        review_target_path=None, reviewer_id=None, pass_id=None,\n        timeout_seconds=60, adapter_options=None,\n    )\n    with patch(\"consensus_mcp._dispatch_codex.main\", side_effect=fake_main):\n        with pytest.raises(DispatchError, match=\"SystemExit\"):\n            CodexAdapter().dispatch(packet)\n\n\ndef test_gemini_adapter_packet_options_override_config(tmp_path):\n    \"\"\"codex-rev-003 round-1 fix: packet.adapter_options.model overrides adapter_config.model.\"\"\"\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal_packet.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    sealed = iter_dir / \"gemini-review.yaml\"\n    sealed.write_text(yaml.safe_dump({\"iteration_id\": \"iter\", \"findings\": []}), encoding=\"utf-8\")\n\n    captured_argv = []\n    def fake_main(argv):\n        captured_argv.extend(argv)\n        import json\n        print(json.dumps({\"ok\": True, \"pass_id\": \"p1\", \"sealed_path\": str(sealed),\n                          \"archive_sealed_path\": None, \"packet_sha256\": \"deadbeef\"}))\n        return 0\n\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW, contributor=\"gemini\",\n        iteration_dir=iter_dir, goal_packet_path=iter_dir / \"goal_packet.yaml\",\n        review_target_path=None, reviewer_id=None, pass_id=None,\n        timeout_seconds=60,\n        adapter_options={\"model\": \"gemini-2.5-flash\"},  # per-packet override\n    )\n    adapter = GeminiAdapter(adapter_config={\"model\": \"gemini-2.5-pro\"})  # static config\n    with patch(\"consensus_mcp._dispatch_gemini.main\", side_effect=fake_main):\n        adapter.dispatch(packet)\n    # packet's option wins.\n    assert \"--model\" in captured_argv\n    assert \"gemini-2.5-flash\" in captured_argv\n    assert \"gemini-2.5-pro\" not in captured_argv\n\n\ndef test_codex_adapter_raises_on_missing_sealed_path(tmp_path):\n    \"\"\"codex-rev-002 round-1 fix: missing sealed_path becomes DispatchError.\"\"\"\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal_packet.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    def fake_main(argv):\n        import json\n        # ok=True but no sealed_path (shouldn't happen but defensive)\n        print(json.dumps({\"ok\": True, \"pass_id\": \"p1\"}))\n        return 0\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW, contributor=\"codex\",\n        iteration_dir=iter_dir, goal_packet_path=iter_dir / \"goal_packet.yaml\",\n        review_target_path=None, reviewer_id=None, pass_id=None,\n        timeout_seconds=60, adapter_options=None,\n    )\n    with patch(\"consensus_mcp._dispatch_codex.main\", side_effect=fake_main):\n        with pytest.raises(DispatchError, match=\"sealed_path\"):\n            CodexAdapter().dispatch(packet)\n\n\ndef test_codex_adapter_raises_on_unreadable_sealed_path(tmp_path):\n    \"\"\"codex-rev-002 round-1 fix: unreadable sealed YAML becomes DispatchError.\"\"\"\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal_packet.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    def fake_main(argv):\n        import json\n        # Point at a nonexistent sealed_path.\n        print(json.dumps({\"ok\": True, \"pass_id\": \"p1\",\n                          \"sealed_path\": str(tmp_path / \"does-not-exist.yaml\"),\n                          \"archive_sealed_path\": None, \"packet_sha256\": \"deadbeef\"}))\n        return 0\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW, contributor=\"codex\",\n        iteration_dir=iter_dir, goal_packet_path=iter_dir / \"goal_packet.yaml\",\n        review_target_path=None, reviewer_id=None, pass_id=None,\n        timeout_seconds=60, adapter_options=None,\n    )\n    with patch(\"consensus_mcp._dispatch_codex.main\", side_effect=fake_main):\n        with pytest.raises(DispatchError, match=\"unreadable\"):\n            CodexAdapter().dispatch(packet)\n\n\ndef test_gemini_adapter_includes_model_when_configured(tmp_path):\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal_packet.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    sealed = iter_dir / \"gemini-review.yaml\"\n    sealed.write_text(yaml.safe_dump({\"iteration_id\": \"iter\", \"findings\": []}), encoding=\"utf-8\")\n\n    captured_argv = []\n    def fake_main(argv):\n        captured_argv.extend(argv)\n        import json\n        print(json.dumps({\n            \"ok\": True, \"pass_id\": \"gemini-iter-review-1-pass1\",\n            \"sealed_path\": str(sealed), \"archive_sealed_path\": None,\n            \"packet_sha256\": \"deadbeef\",\n        }))\n        return 0\n\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW, contributor=\"gemini\",\n        iteration_dir=iter_dir, goal_packet_path=iter_dir / \"goal_packet.yaml\",\n        review_target_path=None, reviewer_id=None, pass_id=None,\n        timeout_seconds=60, adapter_options=None,\n    )\n    adapter = GeminiAdapter(adapter_config={\"model\": \"gemini-2.5-pro\"})\n    with patch(\"consensus_mcp._dispatch_gemini.main\", side_effect=fake_main):\n        art = adapter.dispatch(packet)\n    assert \"--model\" in captured_argv\n    assert \"gemini-2.5-pro\" in captured_argv\n    assert art.contributor == \"gemini\"\n\n\ndef test_gemini_adapter_omits_model_when_not_configured(tmp_path):\n    iter_dir = tmp_path / \"iter\"\n    iter_dir.mkdir()\n    (iter_dir / \"goal_packet.yaml\").write_text(\"pilot: x\\n\", encoding=\"utf-8\")\n    sealed = iter_dir / \"gemini-review.yaml\"\n    sealed.write_text(yaml.safe_dump({\"iteration_id\": \"iter\", \"findings\": []}), encoding=\"utf-8\")\n\n    captured_argv = []\n    def fake_main(argv):\n        captured_argv.extend(argv)\n        import json\n        print(json.dumps({\n            \"ok\": True, \"pass_id\": \"p1\",\n            \"sealed_path\": str(sealed), \"archive_sealed_path\": None,\n            \"packet_sha256\": \"deadbeef\",\n        }))\n        return 0\n\n    packet = DispatchPacket(\n        phase=PHASE_REVIEW, contributor=\"gemini\",\n        iteration_dir=iter_dir, goal_packet_path=iter_dir / \"goal_packet.yaml\",\n        review_target_path=None, reviewer_id=None, pass_id=None,\n        timeout_seconds=60, adapter_options=None,\n    )\n    with patch(\"consensus_mcp._dispatch_gemini.main\", side_effect=fake_main):\n        GeminiAdapter().dispatch(packet)\n    assert \"--model\" not in captured_argv\n\n\n# ---------- Adapter names ----------\n\ndef test_adapter_names():\n    assert CodexAdapter.name == \"codex\"\n    assert GeminiAdapter.name == \"gemini\"\n    assert ClaudeAdapter.name == \"claude\"\n    assert FakeAlwaysApprove.name == \"fake-approve\"\n    assert FakeAlwaysBlock.name == \"fake-block\"\n    assert FakeRaisesDispatchError.name == \"fake-raise\"\n"
