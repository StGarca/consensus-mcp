authored_before_peer_visibility: true

selected_target: "consensus-init writes .mcp.json by default, merge-mode for existing files, dev-folder skip, sys.executable-based binary discovery, .gitignore-marker-style idempotency"

rationale_vs_alternatives: |
  The operator's friction point is concrete: install + hand-craft JSON +
  restart Claude = 3 manual steps, one of which (notepad + paste) is
  error-prone enough that they hit it. The fix is to collapse to one
  command. My stance per question:

  Q1 — **Auto-write by default.** New users discover the flag through
  doing nothing. Opt-out via `--no-mcp-json` for advanced users with
  custom MCP configs. The risk of "unexpected file modification" is
  mitigated by merge-mode (Q2) and dev-folder detection (Q3). Making
  this opt-in defeats the "single command bootstraps a project" goal.

  Q2 — **Merge.** If `.mcp.json` already exists, parse it, add or
  update the `consensus-mcp` entry in `mcpServers`, preserve all other
  entries. Print a diff line summary. If parsing fails (malformed
  existing file), fall back to "skip + warn" — don't try to repair
  someone else's config.

  Q3 — **Detect dev folder, skip with notice.** Signal: cwd contains
  `consensus_mcp/server.py` AND `pyproject.toml` whose `[project]`
  table has `name = "consensus-mcp"`. Both checks together avoid false
  positives (a project that happens to have a `consensus_mcp/` dir for
  unrelated reasons, or a fork with a different name). On detect:
  print "dev folder detected, leaving .mcp.json unchanged" and do not
  modify the file. Do NOT skip the `.consensus/config.yaml` write —
  the dev folder still wants its own iteration config.

  Q4 — **`sys.executable`-based discovery.** When `consensus-init`
  runs, it IS the pipx venv's Python. The sibling `consensus-mcp` exe
  is at `Path(sys.executable).parent / "consensus-mcp.exe"` (Windows)
  or `Path(sys.executable).parent / "consensus-mcp"` (POSIX). This is
  more reliable than `shutil.which()` because (a) it doesn't depend
  on the operator's shell PATH being refreshed post-pipx-install, and
  (b) it ALWAYS finds the binary paired with the running init wizard
  rather than potentially picking up a different installation on
  PATH first. Failure message when the sibling is absent (dev-mode
  pip install where consensus-mcp script wasn't installed):
    "Cannot locate consensus-mcp binary at <expected path>. If you're
    running from a development install, set
    consensus_mcp_command='py -3.11 -m consensus_mcp.server' in the
    .mcp.json manually, or install via pipx for the standard
    bootstrap."

  Q5 — **Bracketed-marker idempotency, same as `.gitignore` (iter-
  0016d).** Wrap the consensus-mcp entry's metadata in JSON-comment
  markers... wait, JSON doesn't have comments. Alternative: track
  managed entries by a stable key (the entry name "consensus-mcp"
  itself) and always REPLACE the entry's value, never append. The
  contract: running consensus-init N times produces an identical
  `.mcp.json` (no drift), and any consensus-mcp entry that already
  exists is overwritten with the freshly-computed command/env (NOT
  merged in-place — fields the operator added that aren't in the
  template are LOST). This matches the .gitignore managed-block
  semantic: we own the contents, operator owns the surrounding file.

  Bonus Q6 — **Scope: project-root `.mcp.json` only.** Don't write to
  `.claude/settings.local.json` or user-scope. The whole point is
  per-project env vars (STATE_ROOT, PROJECT_ROOT) need to be
  per-project. User-scope wouldn't work. Document explicitly in the
  init wizard's stdout: "wrote .mcp.json at project root — Claude
  Code will auto-load on next launch."

