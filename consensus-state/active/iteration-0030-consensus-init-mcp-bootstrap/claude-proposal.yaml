    - consensus_mcp/_init_wizard.py
  files_new:
    - consensus_mcp/tests/test_init_wizard_mcp_json.py (or extend
      test_init_wizard.py with new test class)
  api_additions:
    - new helper: `_write_mcp_json(repo_root, state_root, project_root)`
    - new helper: `_resolve_consensus_mcp_binary()` using sys.executable
    - new helper: `_is_dev_folder()` — checks consensus_mcp/server.py +
      pyproject.toml name match
    - new CLI flag: `--no-mcp-json` (opt-out, default-write)

scope_boundaries:
  in:
    - consensus_mcp/_init_wizard.py
    - consensus_mcp/tests/test_init_wizard.py (or new test file)
  out:
    - any changes to the MCP server, dispatchers, workflow engine
    - documentation updates (README/CHANGELOG follow in iter-0032)
    - any new MCP tool surface
    - cross-platform path quirks beyond Windows .exe / POSIX no-ext

key_design_decisions:
  - sys.executable-paired binary discovery beats shutil.which
  - Existing .mcp.json is merged (not overwritten or skipped) so
    operators with playwright/github/etc MCP servers don't lose them
  - Malformed existing .mcp.json triggers skip+warn (don't repair)
  - Dev folder is detected by file presence + pyproject name match
  - --no-mcp-json opts out for advanced users
  - All other defaults: write .mcp.json + .consensus/config.yaml +
    update .gitignore in one command

acceptance_gates_for_iter_0031:
  - A1: full suite still green (current 759 + new tests)
  - A2: fresh project (empty dir, no existing .mcp.json) → consensus-init
    writes valid .mcp.json with correct env vars + invocable command
  - A3: existing .mcp.json with OTHER servers → consensus-init merges
    correctly, other servers preserved
  - A4: --no-mcp-json skips entirely
  - A5: dev folder detected → .mcp.json untouched, notice printed
  - A6: malformed existing .mcp.json → skip + warn, file unchanged
  - A7: re-running consensus-init produces identical .mcp.json (no drift)
  - A8: sys.executable-based binary resolution finds the pipx exe

risks:
  - Operators with json5/jsonc-flavored .mcp.json (comments) — Python's
    json module rejects those. Mitigation: skip+warn path catches it.
  - Windows vs POSIX exe suffix — sys.executable handles correctly via
    pathlib but tests must cover both.
  - sys.executable-pair lookup fails in dev pip-install where console
    scripts weren't generated (rare). Mitigation: clear error message
    with workaround.
  - First-time users who already have a Claude Code session running
    won't see the new server until they restart Claude. The init
    wizard should print a reminder.

