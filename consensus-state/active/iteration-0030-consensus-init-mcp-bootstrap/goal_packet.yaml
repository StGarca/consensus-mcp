    description: converged-plan.yaml at iteration_dir
    check: 'py -3.11 -c "import os; assert os.path.exists(''consensus-state/active/iteration-0030-consensus-init-mcp-bootstrap/converged-plan.yaml''); print(''ok'')"'
  - id: A2
    description: codex participated substantively (not structural-abstention)
    check: 'true'
