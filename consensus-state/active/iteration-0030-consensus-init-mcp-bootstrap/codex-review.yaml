goal_satisfied_rationale: 'This best matches the stated goal: one command leaves Claude
  Code able to see the pipx-installed consensus-mcp server. A no-write design preserves
  the current two-step friction. Overwrite is too destructive because .mcp.json may
  already contain other team MCP servers. Skip-on-existing is too weak because the
  common real case is an existing config that only needs one server added. Marker-based
  root detection plus explicit override is safer than assuming cwd or a literal dev
  folder name. Binary discovery from the active install and PATH is more reliable
  than hard-coding pipx paths, while still allowing an override for unusual installs.
  Idempotent merge prevents consensus-init from becoming noisy in repeated project
  setup or CI-style bootstrap scripts.'
