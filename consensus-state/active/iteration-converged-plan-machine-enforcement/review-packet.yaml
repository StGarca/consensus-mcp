      \ — Workflow C autonomous-execute usage (v1.14.4 contract; v1.15.0 engine)\n\
      - [`docs/workflows/external-process-fallback.md`](docs/workflows/external-process-fallback.md)\
      \ — recovery policy for stalled dispatches\n- [`docs/postmortems/iter-0019-0036-failures.md`](docs/postmortems/iter-0019-0036-failures.md)\
      \ — failure modes encountered during bootstrap, with how each was caught\n\n\
