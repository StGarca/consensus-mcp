      ## License\n\nMIT — see [LICENSE](LICENSE).\n\n## Contributing\n\nThe project\
      \ is self-hosted: consensus-mcp uses itself for its own review process. Pull\
      \ requests go through the four-step cycle. If you contribute, expect cross-AI\
      \ review feedback on your change.\n\nWhen in doubt about a finding, the closure\
      \ invariant is the tiebreaker: did the configured convergence rule pass on the\
      \ same code state with cross-family contributors? If yes, the change can land.\
