      \ in v1.13.0.\n\n**Deferred to v1.14.0** (per codex Q1 scoping):\n\n- Dispatcher\
      \ auto-discovery of `iteration_dir/review-packet.yaml` when\n  `--review-target`\
      \ is non-yaml (currently silent-failure, prompt ships\n  without embedded touched-file\
      \ contents).\n- Cold-start grace period for the watchdog (pre-first-byte vs.\n\
      \  post-first-byte silence thresholds; 45s is too aggressive for bigger\n  prompts).\n\
      - Visibility upgrade: dispatch_heartbeat events should expose a `status`\n \
      \ field (loading / streaming / stalled) for operator clarity.\n\n**Known pre-existing\
      \ pytest flake** (predates v1.13.0; **fixed in v1.14.0\niter-0019**): 5 tests\
      \ in `test_dispatch_codex.py` that pass in isolation\nbut fail in the full suite\
      \ due to test-ordering pollution. Not introduced\nby v1.13.0; tracked separately.\
      \ See the v1.14.0 \"Test isolation\" section\nabove for the resolution.\n\n\
      ## 1.12.0 - 2026-05-11\n\nStandalone release. Extracted from upstream-26.4.16\
      \ source\nproject. See `docs/architecture/codex-fix-author-roadmap.md` for the\
      \ work\nhistory that led here.\n\nRenames vs the prior internal-only releases\
