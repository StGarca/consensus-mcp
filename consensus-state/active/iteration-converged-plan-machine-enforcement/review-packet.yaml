    consensus_mcp/validators/validate_converged_plan.py: "\"\"\"Structural + consequence\
      \ validator for the converged-plan convention.\n\nv1.15.1 — machine-enforcement\
      \ of the v1.15.0 doctrine\n(docs/workflows/converged-plan-convention.md). Converged\
