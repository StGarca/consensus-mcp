      ] == vcp.CONVENTION_SCHEMA_VERSION\n    assert plan[\"convention_gate\"][\"\
      gate_scope\"] == vcp.GATE_SCOPE_DISCLAIMER\n    assert plan[\"convention\"][\"\
      cited_pass_ids\"]\n\n\ndef test_engine_hard_reject_fails_closed_no_seal(tmp_path):\n\
      \    config = _three_contributor_config()\n    adapters = {n: FakeAlwaysApprove()\
      \ for n in (\"claude\", \"codex\", \"gemini\")}\n    engine = WorkflowEngine(config,\
      \ adapters, tmp_path)\n    d, goal, target = _iter_dir(tmp_path, goal_extra={\"\
      risk_class\": \"bricking\"})\n    bad = _good_convention()\n    bad[\"independent_safeguard\"\
