proposal:
  selected_target: 'Ship a Claude Code user-level bootstrap pack: a thin skill/command
    wrapper that recognizes the natural request "consensus init" and exposes an explicit
    `/consensus-init` command, both delegating to the existing `consensus-init` shell
    binary before any consensus-mcp MCP server exists.'
  rationale_vs_alternatives: This fixes the actual chicken-and-egg gap because it
    is loaded by Claude Code independently of `.mcp.json` and does not depend on the
    consensus-mcp server. A shell alias alone still requires the operator to know
    `! consensus-init` or leave Claude Code. MCP-based discovery cannot work before
    bootstrap. Documentation-only reduces confusion but does not make the natural
    Claude Code path work. The wrapper should be intentionally thin so the existing
    `consensus-init` remains the single source of setup behavior while Claude Code
    gains a discoverable pre-MCP entry point.
  deliverable_scope:
    next_iteration_id: iteration-0040-consensus-init-claude-bootstrap
    files_in_scope:
    - pyproject.toml
    - README.md
    - docs/claude-code-bootstrap.md
    - consensus_mcp/**/consensus_init*.py
    - consensus_mcp/**/claude_bootstrap/**
    - tests/**/test_*consensus_init*claude*.py
    files_out_of_scope:
    - consensus-state/**
    - consensus_mcp/server.py
    - MCP runtime protocol changes
    - agent dispatch/convergence workflow code
    - publishing to any external Claude marketplace
    key_design_decisions:
    - 'Q1 primary mechanism: Claude Code bootstrap skill plus slash command; skill
      handles the natural phrase `consensus init`, slash command gives explicit discoverability.'
    - 'Q2 distribution: bundle bootstrap assets in the existing PyPI/pipx package
      and add an explicit installer such as `consensus-init --install-claude-code`;
      document later marketplace/plugin publication as follow-up, not iter-0040 scope.'
    - 'Q3 wrapper scope: wrapper only checks `consensus-init` availability, runs it
      in the current project root, passes through arguments, and reports next steps;
      no reimplementation of `.mcp.json` generation.'
    - 'Q4 restart UX: after successful init, tell the operator that Claude Code must
      reload/restart before the new MCP server is available; do not pretend the current
      session can use the server immediately.'
    - 'Q5 operator-vs-Claude detection: use an explicit wrapper flag or command context
      such as `--from-claude-code` for Claude-specific wording; avoid brittle environment-variable
      heuristics.'
    - 'Q6 bonus: add a low-risk `consensus init` shell alias or console-script group
      later so `! consensus init` also matches the mental model, while preserving
      `consensus-init` compatibility.'
    acceptance_gates:
    - Fresh-project Claude Code bootstrap asset contains no dependency on an already-running
      consensus-mcp MCP server.
    - Installer copies user-level Claude Code command/skill files into the expected
      Claude config location, refuses overwrite unless forced, and has tests using
      a temporary home/config directory.
    - Generated command/skill text invokes `consensus-init`, not `consensus init`,
      unless the optional shell alias is actually implemented.
    - CLI success output clearly states `.mcp.json` was written and Claude Code must
      reload/restart before MCP tools appear.
    - Existing `consensus-init` shell behavior remains backward compatible.
    - 'Docs show three paths: inside Claude Code via `consensus init` after bootstrap
      install, explicit `/consensus-init`, and shell fallback `! consensus-init`.'
  risks:
  - Claude Code skill/command packaging details may differ by installed Claude Code
    version; iter-0040 should verify current file locations before hard-coding paths.
  - The first-time bootstrap still needs one distribution action before Claude can
    recognize `consensus init`; external marketplace/plugin distribution would improve
    this but is larger than the smallest safe implementation.
  - Over-eager natural-language triggering could run setup when the user only asks
    conceptual questions; skill wording should require clear init/setup intent before
    shell execution.
  estimated_complexity: medium
  structural_abstention: false
