      consensus-init --install-claude-code` (once globally), then
      `consensus init` (or `/consensus-init`) in any project.

risks_to_track_in_implementation:
  - Skill triggering false-positives. Skill description must be
    narrow ("consensus init" / "bootstrap consensus" / "set up
    consensus-mcp" — not just "consensus" alone).
  - ~/.claude/ path stability. Read CLAUDE_HOME env var first,
    fall back to platformdirs / `~/.claude`. Document override.
  - Console-script alias `consensus` could collide with other tools
    named `consensus` on the user's PATH. Check pypi for collisions
    before shipping; if collision likely, document opt-in only.
  - Bash invocation from the skill requires Claude Code's Bash
    permission for the project. Document this prominently — the
    skill body should explain the prompt the user will see.

