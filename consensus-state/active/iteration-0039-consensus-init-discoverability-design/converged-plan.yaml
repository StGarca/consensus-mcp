decisions:
  Q1_discoverability_mechanism:
    primary: Claude Code SKILL ("consensus") that triggers on natural
      phrases like "consensus init", "bootstrap consensus", "set up
      consensus".
    secondary: SLASH COMMAND ("/consensus-init") for explicit
      discoverability by users who already know the name. Same
      delegate target — both run the `consensus-init` shell binary.
    fallback: Improved stderr/stdout in the consensus-mcp server boot
      path AND in `consensus-init` itself when no `.mcp.json` is
      present, so users who arrive via plain shell or an outdated
      install still get pointed to the right step.
    rationale: |
      All 3 contributors picked the skill/command direction. The
      original failure mode — operator typed "consensus init"
      without `/` — is specifically a free-text intent the skill
      system catches. The slash command is cheap to ship alongside
      and serves the power-user who types `/`. Improved error
      messages cover everyone else.

  Q2_distribution:
    channel: pipx-bundled files + opt-in installer flag.
    files: Source lives in `consensus_mcp/claude_extensions/`
      (new directory):
        - `consensus_mcp/claude_extensions/skills/consensus/SKILL.md`
        - `consensus_mcp/claude_extensions/commands/consensus-init.md`
    install_command: |
      `consensus-init --install-claude-code` (idempotent, managed-
      block style per iter-0016d / iter-0031). Copies the skill and
      command files into the user's `~/.claude/skills/consensus/`
      and `~/.claude/commands/consensus-init.md`. Honors
      `CLAUDE_HOME` env var override for non-standard installs.
      Refuses to overwrite if the destination diverges from the
      shipped source unless `--force` is also passed (same merge/
      conflict semantics as iter-0031's `--mcp-force`).
    follow_up_deferred: |
      Publishing to a Claude Code plugin marketplace (if/when one
      exists with a stable manifest) — not iter-0040 scope. The
      pipx+installer pattern is forwards-compatible: a future plugin
      publication just ships the same skill/command files via the
      manifest instead of opt-in copy.

  Q3_wrapper_scope:
    behavior: |
      Skill body and slash command body BOTH do the same thing:
        1. Run `Bash("consensus-init")` (capturing stdout/stderr).
        2. If consensus-init succeeded, print its stdout verbatim
           (which already includes "restart Claude Code" guidance
           per Q4 below).
        3. If consensus-init failed (binary not found, write
           refused, etc.), surface its stderr with a clear next-
           step suggestion ("install with `pipx install
           consensus-mcp`" if binary not found; "run
           `consensus-init --mcp-force`" if .mcp.json conflict).
        4. Do NOT reimplement any of consensus-init's logic. The
           wrapper is a discoverability surface, not a parallel
           bootstrap.
    rejected_alternatives:
      - Skill that also bundles a "what is consensus-mcp"
        explainer (gemini did not propose this; claude+codex
        explicitly minimal-scope).
      - Bundling additional commands (`/consensus-status`,
        `/consensus-help`) — useful follow-up, deferred to a
        separate iteration.

  Q4_restart_reload_ux:
    behavior: |
      Default: print explicit, deterministic message after a
      successful init: "Claude Code must reload to activate the
      consensus-mcp server. Either restart Claude Code in this
      project (Ctrl-C, then `claude code`), OR run `/mcp` to
      reload MCP servers if your Claude Code build supports it."
    detection: |
      Codex's stance (prefer explicit wrapper flag over env-var
      heuristics) prevails. The skill/command body knows it's
      running from Claude Code — pass `--from-claude-code` to
      `consensus-init` so consensus-init prints Claude-specific
      wording without sniffing env vars.

      Env var detection (CLAUDECODE=1) is the FALLBACK for when
      consensus-init runs from a bare shell that was launched by
      Claude Code (e.g., the user typed `! consensus-init`).

  Q5_op_vs_claude_detection:
    primary_mechanism: wrapper flag `--from-claude-code` passed by
      the skill/command body (deterministic; codex's preferred path).
    fallback: env var detection (CLAUDECODE=1) for the
      bare-shell-inside-Claude case.
    plain_shell_default: shorter message "Run `claude` in this
      directory to use these tools."

  Q6_bonus_considerations:
    accepted:
      - Console-script entry alias: add `consensus = "consensus_mcp.
        _init_wizard:main"` to pyproject.toml so `consensus init`
        (with a SPACE) works at the shell too, matching the natural
        mental model in case the user dropped to a bash. Internal
        argv parsing already handles the `init` subcommand pattern
        in iter-0031.
    deferred:
      - Plugin/skill version alignment check (claude's suggestion):
        warn at MCP server boot if `~/.claude/skills/consensus/
        SKILL.md` version diverges from the installed consensus-mcp
        version. Useful, but not blocking; ship in iter-0042+.
      - TypeScript Claude Code extension (gemini's path): larger
        surface area; revisit only if skill+command UX proves
        insufficient.
      - Marketplace/plugin publication once Anthropic ships a stable
        manifest spec.

