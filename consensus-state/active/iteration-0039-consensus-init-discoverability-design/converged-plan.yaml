convergence:
  rule: strict-majority
  contributors_required: 2
  contributors_substantive: 3   # claude, codex, gemini all returned non-abstention
  result: CONVERGED
  vote_summary: |
    All three contributors converged on the same primary direction:
    ship a Claude-Code-native entry point that wraps the existing
    `consensus-init` shell binary, delegating to (not reimplementing)
    the iter-0031 bootstrap. Tactical disagreement was small: claude
    + codex picked a pipx-bundled skill + slash command; gemini
    picked a separate Claude Code extension (TypeScript) — gemini's
    proposal is structurally equivalent but a larger surface (a new
    `claude_extension/` subproject vs adding files to consensus_mcp).
    Smallest-deliverable wins: take the claude+codex path; defer the
    TS-extension path to a future iteration if the skill UX proves
    insufficient.

