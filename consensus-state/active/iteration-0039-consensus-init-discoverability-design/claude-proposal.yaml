proposal:
  selected_target: |
    Primary: SHIP A CLAUDE CODE SKILL ("consensus") that triggers on
    natural-language phrases like "consensus init", "bootstrap
    consensus", "set up consensus" and runs the `consensus-init`
    shell binary. Secondary: improve `consensus-init`'s output so
    it prints Claude-Code-aware restart instructions when run from
    inside a Claude Code session.

  rationale_vs_alternatives: |
    The triggering data: operator typed "consensus init" WITHOUT a
    leading `/`. That rules out (a) slash command as the primary
    surface — a `/consensus-init` would still require the user to
    type `/` and know the command name. The skill system is the
    only surface in Claude Code that auto-matches free-text intent.

    Q1 stance (skill primary, error-message secondary):
    - (c) Skill is the only surface that matches the user's actual
      mental model. Skills look at intent, not literal command
      names. A skill with description "trigger on 'consensus init'
      or 'bootstrap consensus' or 'set up consensus' to initialize
      the consensus-mcp server in this project" will fire on the
      same input the operator just typed.
    - (b) Improved error messages are the cheap belt-and-suspenders
      fallback: when consensus-init runs from a plain shell, the
      "next step" should be clearly printed. When it runs from
      inside Claude Code (CLAUDECODE=1 env var per the modern
      Claude CLI), the next step is "restart this project (Ctrl-C
      then `claude code` again) or run `/mcp reload` if available".
    - (a) Slash command is a nice secondary surface for
      power-users who already know the name. Cheap to ship
      alongside the skill (same files, different frontmatter).
    - (d) Docs-only is what we have today and it's failing.

    Q2 stance: Distribution = pipx post-install copy
    (a) into `~/.claude/skills/consensus/`.
    - Plugin packages (c) are the "official" surface but I have
      thin context on whether the plugin format is stable +
      documented enough for a third-party publisher to target it
      reliably in 2026-05. The list of plugins surfaced in this
      session (plugin_context-mode_*, plugin_playwright_*) is
      informative but not the same as "here's the publishing
      manifest spec". Until that's verified, pipx post-install is
      the lower-risk path because it touches a directory we know
      exists (`~/.claude/skills/`) using a script we already ship
      (pipx hooks).
    - (b) An opt-in flag `consensus-init --install-claude-skills`
      is the right ergonomics for the first time (some users may
      not want files copied into ~/.claude without consent). Make
      this the actual UX: pipx install ships the source files
      under `consensus_mcp/claude_skills/`, and the user runs
      `consensus-init --install-claude-skills` once globally to
      copy them. Re-running is idempotent (managed-block pattern
      from iter-0016d).
    - Net: hybrid (a)+(b). Files ship with pipx; install-into-home
      is an explicit one-time flag.

    Q3 stance: (a) Just wrap consensus-init. Walk before run.
    - Don't bundle `/consensus-status` or `/consensus-help` in
      this iteration. They're separate, valuable, and additive,
      but they expand surface area while we're trying to land the
      minimum to unblock the operator's reported friction.
    - The skill body itself can be terse: "Run `consensus-init`
      via Bash. After it succeeds, tell the user to restart
      Claude Code in this project or run `/mcp` to reload."

    Q4 stance: (d) Detect CLAUDECODE env var and print contextual
    instructions, plus (a) clear "restart now" message.
    - When consensus-init runs from inside Claude Code, it sees
      `CLAUDECODE=1` (the standard Claude Code session env var as
      of 2026-05). Print: "Detected Claude Code session. Restart
      Claude Code in this project (Ctrl-C, then `claude code`) to
      load the consensus-mcp server. Tools become available
      next session."
    - When run from plain shell: "Run `claude code` in this
      directory to start using consensus-mcp tools."
    - Don't attempt programmatic MCP reload — there's no
      documented stable Claude Code API for it, and shipping a
      "best-effort reload" that silently no-ops on most users'
      versions is worse UX than honest "you must restart".

    Q5 stance: (a) Yes, contextual messages. Cheap. (c) detection
    mechanism: prefer CLAUDECODE=1 env var; secondary heuristic
    is `os.getppid()` parent name = "claude" or "cli.js" (less
    reliable; skip if env var works).

    Q6 (bonus): Plugin/skill version alignment. If we ship skills
    via pipx post-install, what happens when the user upgrades
    `consensus-mcp` via pipx but doesn't re-run
    `consensus-init --install-claude-skills`? The skill files in
    `~/.claude/skills/consensus/` will be stale. Mitigation:
    embed the consensus-mcp version in the skill frontmatter,
    and at MCP server boot, check that the installed skill
    version matches; if not, print a one-line warning in the
    server's stderr (which Claude Code surfaces in its MCP
    server pane). Not a blocker for iter-0040; can land later.

  deliverable_scope: |
    Smallest implementable scope for iter-0040:

    1. NEW directory: `consensus_mcp/claude_skills/consensus/`
       containing `SKILL.md` with:
       - frontmatter `name: consensus` `description:
         "Initialize or manage consensus-mcp in this project.
         Trigger on phrases like 'consensus init', 'bootstrap
         consensus', 'set up consensus', or '/consensus-init'."`
       - body: instructions for Claude to run
         `Bash("consensus-init")`, capture output, then print the
         consensus-init's stdout verbatim to the user
         (consensus-init already prints the contextual restart
         message per Q4).
    2. NEW flag in `_init_wizard.py`:
       `--install-claude-skills` (idempotent copy of
       `consensus_mcp/claude_skills/consensus/` →
       `~/.claude/skills/consensus/`; managed-block style; respects
       `--force` to overwrite). Honors `~/.claude` env-var
       override (`CLAUDE_HOME` if set) for non-standard installs.
    3. EXTEND `_init_wizard.py` to detect `os.environ.get(
       "CLAUDECODE") == "1"` and print contextual restart
       instructions accordingly (per Q4).
    4. Update README + CHANGELOG to document the two-step setup:
       once: `pipx install consensus-mcp;
       consensus-init --install-claude-skills`
       per-project: just type "consensus init" in Claude Code (or
       `/consensus-init` if power-user) → skill runs the binary.
    5. Tests: `test_init_wizard_install_claude_skills.py` covers
       idempotency, managed-block boundaries, CLAUDE_HOME
       override, conflict-detection (existing skill from another
       source).
    6. NO new MCP tool, NO changes to existing tools, NO changes
       to `_paths.py`, NO new pyproject.toml dependencies. Pure
       additive — copy-files-and-print scope.

    Cost estimate: ~150-250 LOC across `_init_wizard.py`, the
    new SKILL.md, and one test file. One workflow #3 iteration
    (iter-0040) suffices.

  risks: |
    - **Skill triggering false-positives.** A user could type
      "consensus init" in a context where they meant something
      else (unlikely, since the phrase is specific to this
      project). Mitigation: skill description is narrow; the
      skill body always shows what it's about to do before
      running anything destructive (consensus-init is mostly
      idempotent + asks before clobbering — see iter-0031).
    - **CLAUDECODE env var stability.** If Claude Code changes
      the env var name or stops setting it, the contextual
      message regresses to the plain-shell variant — not a
      regression-from-current-state, just no improvement. Cheap
      to update if the env var changes.
    - **~/.claude/skills/ location stability.** If Claude Code
      moves skills to a different path, the install-flag breaks.
      Mitigation: read `CLAUDE_HOME` env var first, fall back to
      `~/.claude`, document the override.
    - **Plugin format ships before iter-0040 lands.** If
      Anthropic publishes a stable plugin manifest in the
      meantime, the right answer becomes (c) plugin instead of
      (a) post-install copy. Mitigation: iter-0040 ships small
      enough that re-shipping as a plugin is a 1-iteration
      migration when/if needed.
    - **Skill body invoking Bash for `consensus-init` requires
      the operator to have pre-approved Bash in their Claude
      Code permissions for that project**, OR the skill is
      shipped with a recommendation to allow it. Document this.

  estimated_complexity: small
findings: []
