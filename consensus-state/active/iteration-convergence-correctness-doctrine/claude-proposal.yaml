risks:
  - 'Performative falsification: a mandatory falsification block becomes a box-tick. Mitigation: the anti-theater property (pre-specified + external refuting observation) is itself doctrine and is auditable in Workflow B.'
  - 'Class-boundary disputes: "is this falsifiable from artifacts?" is a judgment call. Mitigation: doctrine gives the test ("could a contributor refute this by reading only the evidence in the packet, or is an external observation required?") + operator override; machine-classifier deferred precisely because it needs its own design.'
  - 'Doctrine bloat in the bundled skill. Mitigation: each section ≤ ~15 lines, rule + one-line why + the auditable bar; this consult REMOVES nothing and the skill is already the propagation channel of record.'
  - 'This consult ironically converging on a shared "more process" prior. Mitigation: the non-gating self-check + every recommendation carrying its own disconfirming observation; Workflow B instructed to check whether the wrong-improvement observations were engaged, not bypassed.'
  - 'Deferring machine-enforcement could let the documented convention rot if orchestrators ignore it. Mitigation: it is doctrine in the bundled skill (loaded every consult), not just a doc; the named blocker explicitly scopes the hardening follow-up.'
estimated_complexity: small
