  authorized_by: operator
  authorized_at_utc: '2026-05-15T16:00:00Z'
  codex_patch_apply_authorized: false
  scope_signature: 'c0117e8e3c0117e8e3c0117e8e3c0117e8e3c0117e8e3c0117e8e3c0117e8e3c0'
contributors:
  enabled: [claude, codex, gemini]
convergence:
