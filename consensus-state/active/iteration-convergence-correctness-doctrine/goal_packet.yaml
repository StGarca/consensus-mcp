schema_version: 1
pilot_id: iteration-convergence-correctness-doctrine
workflow_mode: propose-converge
independence: blind-first-reveal
goal:
  summary: |
    Workflow A consult on consensus-mcp DOCTRINE improvements
    derived from a real downstream failure report:
    `D:/Projects/ChilipadScreen/consensus-state/CONSENSUS-FAILURE-
    REPORT-2026-05-15.md` (ESP32-P4 i2c.cpp:91 boot loop).

    Operator framing: "Not saying there is something broken here
    to fix, but maybe room for improvement." This is a
    process-improvement consult, not a defect fix.

    VERIFIED FACTS FROM THE REPORT (read in full, 175 lines):

    Two consensus iterations (0012, 0013) each reached CLEAN
    strict-majority 2-of-2 convergence on a root cause, and BOTH
    were REFUTED by an on-device test:
      - 0012: converged "pre-display LEDC/ADC/ISR power-domain
        perturbation"; refuted — moving display first + double
        settle delay, the first i2c_master_transmit STILL
        returned ESP_ERR_INVALID_STATE identically.
      - 0013: converged "sdStorage_init shared-LDO disturbance"
        (round-1 UNANIMOUS across all three contributors);
        refuted — SD activity provably absent, identical failure.

    The report's own process lessons (Section 6):
      1. Consensus convergence ≠ correctness. Convergence
         measures agreement, not truth.
      2. Independent unanimity can be a SHARED-PRIOR ARTIFACT.
         In 0013 all three agreed immediately because they
         shared the same "power domain fits INVALID_STATE"
         prior, reasoning from the same incomplete differential.
         Fast unanimity is a flag to verify HARDER, not
         confidence.
      3. The verify-before-commit gate is the load-bearing
         safeguard — it caught BOTH refutations and prevented
         BOTH bad fixes from shipping. (0013's prove-before-fix
         gate meant the SD-reorder fix was NEVER committed.)
      4. Decouple safety remediation from root cause. An
         independent boot-loop breaker (R4), made independent
         BY DESIGN of the root-cause hypothesis, un-bricked a
         medical-safety device while the root cause stayed
         unknown across TWO failed iterations. The report calls
         this "the single highest-value decision."
      5. Tooling integrity held: the v1.14.0 path-only review
         bug produced void seals that were PRESERVED (not
         deleted) as honest audit history; void rounds correctly
         not counted toward convergence. (This independently
         VALIDATES the v1.14.9 seal-collision + void-preservation
         work just shipped.)

    The report also models a strong pattern: it names the single
    decisive experiment NOT yet run (Exp-4: build the unmodified
    reference under our toolchain) that "cleanly separates our
    firmware from the toolchain and should precede any further
    consensus iteration."

    These lessons generalize beyond ChilipadScreen — they are
    about how ANY consensus run can be confidently wrong. The
    consult question is which (if any) should become enforced
    consensus-mcp doctrine, and in what form, shipped to every
    project via the bundled skill + dispatch templates.

  question: |
    Each contributor: stance on Q1-Q5, justify vs alternatives,
    sketch the smallest deliverable per the no-deferral rule
    (named blocker for anything genuinely deferred). Honest
    structural_abstention acceptable per question.

    NOTE the irony to guard against: this very consult could
    converge on a shared prior. Argue your positions against
    their strongest counter, and name what observation would
    show your recommendation is the WRONG improvement.

    Q1 — **Institutionalizing "convergence ≠ correctness" +
    shared-prior detection** (lessons 1, 2). The deepest lesson:
    fast independent unanimity from a shared differential is the
    multi-agent analog of single-agent rationalize-away
    ([[disconfirming-evidence]] doctrine). Options:
      (a) Converge-phase FALSIFIABILITY field: the converged
          plan must answer "is this root cause falsifiable from
          the artifacts in evidence, or ONLY by an external
          test (device/runtime/integration)?" If external-only
          → status is converged-PENDING-EMPIRICAL-PROOF, not
          done, and the plan must name the discriminating test.
      (b) SHARED-PRIOR audit round: when round-1 is unanimous
          on a root cause, the orchestrator dispatches ONE
          mandatory falsification round ("argue why the
          converged hypothesis is wrong; name the single
          observation that would refute it") before sealing
          convergence.
      (c) Doctrine-only: bundled-skill section "convergence is
          agreement not truth; fast unanimity = verify-harder
          flag" + a dispatch-template instruction requiring
          each contributor to state the differential/prior they
          are reasoning from (so a shared prior becomes visible
          at reveal).
      (d) Layered: (a)+(c) always, (b) for the defect class in
          Q2.

    Q2 — **Empirical-proof gate for a defined defect class**
    (lesson 3, the load-bearing safeguard). For which classes
    must a converged hypothesis be empirically proven BEFORE the
    fix is considered landed (not merely code-reviewed)?
      (a) Not-falsifiable-from-artifacts classes: hardware/
          firmware state, environment/toolchain, concurrency/
          timing — converged plan MUST name a refutation
          experiment; the fix is PROVISIONAL until it passes.
      (b) Universal prove-before-commit for all root-cause
          fixes. Strongest; heaviest.
      (c) Operator-tagged: goal_packet declares
          empirical_proof_required: true; doctrine guidance on
          when.
      (d) Converged-plan gains a documented `falsification`
          block (hypothesis / discriminating_experiment /
          refutation_observation / status) for defect-type
          iterations — convention enforced by doctrine now,
          machine-validated later.

    Q3 — **Decouple safety/mitigation from root cause**
    (lesson 4, "single highest-value decision"). For safety-
    critical / data-loss / bricking / irreversible-risk
    defects, should doctrine REQUIRE a root-cause-INDEPENDENT
    safeguard shipped alongside the hypothesized fix (so the
    device/system stays safe even if the root cause is later
    refuted — as R4 did across two failed iterations)?
      (a) Required for a defined risk class (converged plan
          must include an independent safeguard that ships
          regardless of root-cause correctness).
      (b) Recommended, optional converged-plan
          `independent_safeguard` field.
      (c) Out of scope — project engineering judgment, not
          consensus-mcp doctrine.

    Q4 — **Propagation surface.** Where does the adopted
    doctrine live so it reaches every project?
      (a) bundled consensus-workflow SKILL.md
      (b) dispatch-template preambles (peer AIs apply it every
          consult)
      (c) converged-plan schema fields (machine-enforced)
      (d) project-local memory (claude-personal)
      (e) combination — specify which parts go where.

    Q5 — **Smallest viable deliverable (no-deferral check).**
    What ships in this iteration vs. named-blocker deferral?
    Candidate: doctrine sections (skill) + template preambles +
    a DOCUMENTED converged-plan convention (falsification +
    independent-safeguard blocks as authoring convention,
    doctrine-validated) ship now; ENGINE/validator machine-
    enforcement of those schema fields is larger surface —
    bundle or defer with a stated blocker?

    Required: verdict on Q1-Q5 + Q6 + the WRONG-improvement
    observation for your own recommendation.

    Q6 — Open. Candidates: should the report's "name the single
    decisive experiment before the next iteration" (Exp-4
    pattern) become a standard converged-plan element? Does
    lesson 5 (void-seal preservation validated in the field)
    warrant any additional tooling assertion? Is there a risk
    that a mandatory falsification round just produces
    performative falsification (contributors going through the
    motions) — and if so what makes it real vs theater?

  non_goals:
    - diagnosing or fixing the ChilipadScreen i2c.cpp:91 defect
      itself (that is the downstream project's Exp-4 next step,
      not this consult)
    - changing the convergence VOTING rules (strict-majority
      etc.) — this is about correctness discipline layered on
      top of, not replacing, the existing vote machinery
    - re-litigating Workflow A/B/C naming or the v1.14.9 seal fix
  type: design_consult
allowed_files: []
allowed_sections: []
forbidden_files:
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - .github/
  - .gitignore
max_iterations: 3
max_patch_size: 0
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: converged-plan.yaml at iteration_dir
    check: 'true'
  - id: A2
    description: at least 2 substantive proposals sealed
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - non_convergence_after_3_rounds
operator_escalation_triggers:
  - non_convergence_after_3_rounds
