    docs/workflows/converged-plan-convention.md: "# Converged-plan convention: falsification,\
      \ independent safeguard, decisive experiment\n\nStatus: **authoring convention,\
      \ doctrine-enforced.** Machine\nvalidation (engine/validator) is a sequenced\
      \ follow-up — see the\nnamed blocker at the end.\n\nOrigin: `iteration-convergence-correctness-doctrine`\
      \ (Workflow A\nweighted-synthesis: claude + codex + gemini; no blocking\nobjections),\
      \ derived from the ChilipadScreen i2c boot-loop\nconsensus-failure report (2026-05-15),\
      \ where two clean\nstrict-majority convergences were both refuted on-device.\n\
      \nThese blocks belong in `converged-plan.yaml` for any iteration\nwhose `type`\
      \ is a defect/root-cause investigation. They are\n**not** new voting mechanics\
      \ — correctness discipline layered on\ntop of the existing strict-majority /\
      \ weighted-synthesis rules.\n\n---\n\n## 1. `falsification` (required for defect/root-cause\
      \ iterations)\n\n```yaml\nfalsification:\n  hypothesis: <the converged root\
      \ cause, one sentence>\n  falsifiable_from_artifacts: true|false\n    # true\
      \  → refutable by reading the evidence already in the\n    #         packet\
      \ (code, logs, diffs). Its proof is a test you\n    #         can add now; no\
      \ external experiment required.\n    # false → refutable ONLY by an external\
      \ observation\n    #         (device/runtime/integration/toolchain). This is\
      \ the\n    #         DEFINED CLASS: hardware/firmware state, environment/\n\
      \    #         toolchain, concurrency/timing.\n  discriminating_experiment:\
      \ <the single external test that would\n    refute the hypothesis — concrete\
      \ enough to run as-is>\n  refutation_observation: <the specific observable that,\
      \ if seen,\n    proves the hypothesis WRONG. Pre-specified. Not \"we'll test\n\
      \    it\" — name the observable, e.g. \"i2c_master_transmit still\n    returns\
      \ 0x103 at i2c.cpp:91 on a clean POWERON\">\n  empirical_status: proven | pending\
      \ | refuted | n/a\n    # n/a       → falsifiable_from_artifacts:true and the\
      \ proving\n    #             test is included in this iteration.\n    # pending\
      \   → defined class, experiment named but not yet run.\n    #             \"\
      fixed\"/\"shipped\"/\"root-cause-correct\" language\n    #             is FORBIDDEN\
      \ while pending.\n    # proven    → the experiment ran and did NOT produce the\n\
      \    #             refutation_observation.\n    # refuted   → the experiment\
      \ ran and DID produce the\n    #             refutation_observation. The hypothesis\
      \ is dead;\n    #             the iteration does NOT close on this root cause.\n\
      \    #             This is the load-bearing terminal state — the\n    #    \
      \         ChilipadScreen report's iter-0012 and iter-0013\n    #           \
      \  both ended here, which is precisely why this\n    #             convention\
      \ exists. A refuted status MUST carry\n    #             forward decisive_experiment_before_next_iteration.\n\
      ```\n\n**Anti-theater property (doctrine):** a falsification is real\nonly if\
      \ `refutation_observation` is (1) pre-specified, (2) a\nspecific observable,\
      \ and (3) for the defined class, EXTERNAL to\nthe reasoning that produced the\
      \ hypothesis. External tests can't\nbe rationalized in the room — that is exactly\
      \ why the device\nrefuted what code-reading could not.\n\n## 2. `independent_safeguard`\
      \ (required for the risk class)\n\nRequired when the defect is **safety-critical\
      \ / data-loss /\nbricking / irreversible-risk**.\n\n```yaml\nindependent_safeguard:\n\
      \  mechanism: <what it does>\n  works_if_root_cause_wrong: true   # MUST be\
      \ true\n  why: <why it still protects even if the hypothesis is 100%\n    false\
      \ — answerable from the mechanism alone>\n  ships_with_fix: true           \
      \   # same change as the\n                                    # hypothesized\
      \ fix, not later\n```\n\nAuditable bar: **\"would this safeguard still work\
      \ if the root\ncause were entirely different?\"** If a reviewer cannot answer\n\
      *yes* from `mechanism` + `why` alone, it is a disguised bet on\nthe hypothesis,\
      \ not an interlock, and does not satisfy the\nrequirement. Stopping the bleeding\
      \ outranks perfecting the\ndiagnosis (field-proven: an independent boot-loop\
      \ breaker\nun-bricked a medical-safety device across two failed root-cause\n\
      iterations).\n\n## 3. `decisive_experiment_before_next_iteration`\n\n```yaml\n\
      decisive_experiment_before_next_iteration: <the single test that\n  most cleanly\
      \ partitions the remaining hypothesis space, to run\n  BEFORE opening the next\
      \ iteration> | null\n  # null only when empirical_status: proven (or n/a) AND\
      \ the fix\n  # is confirmed.\n```\n\nThe ChilipadScreen report's \"Exp-4\" (build\
      \ the unmodified\nreference under our toolchain) is the canonical example: one\
      \ test\nthat cleanly separates \"our firmware\" from \"the toolchain\" and\n\
      \"should precede any further consensus iteration.\"\n\n---\n\n## Worked example\
      \ (abbreviated, from the report)\n\n```yaml\nfalsification:\n  hypothesis: \"\
      sdStorage_init shared-LDO disturbance perturbs the I2C/DSI rail\"\n  falsifiable_from_artifacts:\
      \ false\n  discriminating_experiment: \"build flag skips sdStorage_init before\
      \ display; capture boot-1 serial\"\n  refutation_observation: \"first i2c_master_transmit\
      \ still returns ESP_ERR_INVALID_STATE at i2c.cpp:91 with SD_MMC.begin() provably\
      \ absent\"\n  empirical_status: pending     # the experiment was then run and\
      \ DID\n                                # produce the refutation_observation\
      \ →\n                                # terminal state becomes `refuted` (a\n\
      \                                # legal enum value), NOT `proven`. The\n  \
      \                              # iteration does not close on this root\n   \
      \                             # cause; decisive_experiment carries fwd.\nindependent_safeguard:\n\
      \  mechanism: \"boot-loop breaker: on 2nd crashed boot, skip display and continue\
      \ headless\"\n  works_if_root_cause_wrong: true\n  why: \"triggers on the crash\
      \ symptom (reboot count), not on any I2C/LDO theory\"\n  ships_with_fix: true\n\
      decisive_experiment_before_next_iteration: \"flash unmodified reference Drawing_board.ino\
      \ under our pioarduino toolchain (Exp-4)\"\n```\n\nThe report's outcome is the\
      \ lesson: the hypothesis was unanimous\nand refuted; the **independent safeguard\
      \ kept a medical device\nserving anyway**; the decisive experiment was correctly\
      \ named as\nthe next step instead of opening another speculative iteration.\n\
      \n---\n\n## Named blocker — machine enforcement (sequenced follow-up)\n\nEngine/validator\
      \ enforcement of these blocks is **deferred** with\na concrete, file-verified\
      \ blocker: there is no standalone\nconverged-plan schema; the engine reads/writes\
      \ generic YAML plan\nkeys (`workflow_engine.py:505-525`,\n`consensus_get_iteration_outcome.py:114-123`).\
      \ Enforcement needs\nits own schema-design consult plus a not-falsifiable-from-artifacts\n\
      classifier, or it becomes a rejected-goal_packet papercut.\nStarting design\
      \ for that follow-up (gemini's proposal in this\nconsult): a `severity` field\
      \ on the goal packet + a\n`consensus_gate.py` check that fails a critical-severity\
      \ proposal\nlacking a decoupled `independent_safeguard`. Until then this\nconvention\
      \ is enforced by doctrine (the bundled consensus-workflow\nskill, loaded every\
      \ consult) and by Workflow B audit.\n"
schema_version: 1
iteration_id: iteration-convergence-correctness-doctrine
