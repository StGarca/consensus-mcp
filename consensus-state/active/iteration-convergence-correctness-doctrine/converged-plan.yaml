  weighted_synthesis: |
    Aligned. Defined NOT-FALSIFIABLE-FROM-ARTIFACTS class:
    hardware/firmware state, environment/toolchain, concurrency/
    timing, and any claim refutable only by an external observation.
    For that class the converged plan's falsification.empirical_status
    MUST be `pending` until the named discriminating experiment
    passes; "fixed / shipped / root-cause-correct" language is
    forbidden before proof. Pure-code defects falsifiable by a unit
    test already carry their proof (the test) — no extra ceremony
    (avoids box-tick theater).

