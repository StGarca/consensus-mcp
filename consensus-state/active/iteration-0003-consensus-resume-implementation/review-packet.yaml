      \ close_iteration_payload references the validated\n        # closer, not the\
      \ first review by pass_id sort order.\n        \"validated_closer_pass_id\"\
      : validated_closer_pass_id,\n    }\n\n\ndef _compute_expected_next_action(\n\
      \    iteration_state: str,\n    closure_inv: dict,\n    open_reviews: list[dict],\n\
      \    in_flight: list[dict],\n    iter_dir: Path,\n    goal_packet_path: Path,\n\
      \    review_packet_path: Path,\n) -> dict:\n    \"\"\"Exhaustive decision tree\
      \ per spec §5 step 8. Every branch returns.\"\"\"\n    base = {\n        \"\
      kind\": None,\n        \"rationale\": \"\",\n        \"suggested_command\":\
      \ None,\n        \"wait_for_dispatch_payload\": None,\n        \"apply_proposed_patch_payload\"\
      : None,\n        \"close_iteration_payload\": None,\n    }\n    if iteration_state\
      \ in (\"closed_passed\", \"closed_failed\"):\n        base[\"kind\"] = \"operator_decision_required\"\
      \n        base[\"rationale\"] = f\"iteration already {iteration_state}; start\
      \ a new iteration\"\n        return base\n    if iteration_state == \"blocked_operator\"\
      :\n        base[\"kind\"] = \"operator_decision_required\"\n        base[\"\
      rationale\"] = \"iteration is blocked; consult iteration-outcome.yaml\"\n  \
      \      return base\n    if iteration_state == \"unknown\":\n        base[\"\
      kind\"] = \"operator_decision_required\"\n        base[\"rationale\"] = \"goal_packet\
      \ missing or unparseable\"\n        return base\n\n    if closure_inv.get(\"\
      satisfiable_now\"):\n        # codex-iter0003-1 rev-003 fix: use the validated\
      \ closer pass_id surfaced\n        # by _compute_closure_invariant_status, not\
      \ \"first open review by pass_id.\"\n        # The first open review might not\
      \ be the one that actually satisfied the\n        # cross-family + hash-match\
      \ + freshness check.\n        base[\"kind\"] = \"close_iteration\"\n       \
      \ base[\"rationale\"] = \"closure invariant satisfiable now\"\n        base[\"\
      close_iteration_payload\"] = {\n            \"closing_review_pass_id\": closure_inv.get(\"\
      validated_closer_pass_id\"),\n        }\n        return base\n\n    # patch_proposal\
      \ check: any open review with at least one finding carrying patch_proposal?\n\
      \    for r in open_reviews:\n        if r.get(\"classification\") != \"open\"\
      :\n            continue\n        for f in r.get(\"findings_summary\", []):\n\
      \            if f.get(\"has_patch_proposal\"):\n                base[\"kind\"\
      ] = \"apply_proposed_patch\"\n                base[\"rationale\"] = \"an open\
      \ review carries a patch_proposal awaiting verification\"\n                base[\"\
      apply_proposed_patch_payload\"] = {\n                    \"finding_id\": f.get(\"\
      id\"),\n                    \"patch_id\": f.get(\"patch_id\"),\n           \
      \     }\n                return base\n\n    healthy = [d for d in in_flight\
      \ if not d.get(\"looks_stuck\")]\n    if healthy:\n        d = min(healthy,\
      \ key=lambda x: x.get(\"started_at_utc\") or \"\")\n        base[\"kind\"] =\
      \ \"wait_for_dispatch\"\n        base[\"rationale\"] = f\"dispatch {d['pass_id']}\
      \ is in-flight and streaming\"\n        base[\"wait_for_dispatch_payload\"]\
      \ = {\n            \"pass_id\": d[\"pass_id\"],\n            \"seconds_since_last_line\"\
      : d.get(\"seconds_since_last_line\"),\n            \"stall_silence_threshold_seconds\"\
      : d.get(\"stall_silence_threshold_seconds\"),\n            \"looks_stuck\":\
      \ False,\n        }\n        return base\n\n    stuck = [d for d in in_flight\
      \ if d.get(\"looks_stuck\")]\n    if stuck:\n        base[\"kind\"] = \"operator_decision_required\"\
      \n        base[\"rationale\"] = (\n            f\"dispatch {stuck[0]['pass_id']}\
      \ appears stalled; watchdog will auto-abort \"\n            \"or operator may\
      \ write abort-signal file\"\n        )\n        return base\n\n    # codex-iter0003-3\
      \ rev-002 fix: when suggesting a cross-family dispatch,\n    # pick the actual\
      \ valid closer family from closure_invariant_status — not\n    # a hard-coded\
      \ codex command. After a codex-authored bundle mutation the\n    # valid closer\
      \ is claude (not codex); recommending another codex dispatch\n    # would create\
      \ a stuck loop. Today only codex has a dispatcher CLI; if\n    # the required\
      \ family is claude (or any other), fall back to\n    # operator_decision_required\
      \ with the family name in the rationale.\n    valid_closers = closure_inv.get(\"\
      valid_closer_families\") or []\n    if \"codex\" in valid_closers:\n       \
      \ base[\"kind\"] = \"dispatch_cross_family_reviewer\"\n        base[\"rationale\"\
      ] = \"no in-flight pass; closure invariant requires cross-family review (codex)\"\
      \n        base[\"suggested_command\"] = (\n            f\"python -m consensus_mcp._dispatch_codex\
      \ \"\n            f\"--goal-packet {goal_packet_path} \"\n            f\"--iteration-dir\
      \ {iter_dir} \"\n            f\"--reviewer-id codex-{iter_dir.name}-N \"\n \
      \           f\"--review-target {review_packet_path}\"\n        )\n        return\
      \ base\n    if valid_closers:\n        base[\"kind\"] = \"operator_decision_required\"\
      \n        base[\"rationale\"] = (\n            f\"closure invariant requires\
      \ a {valid_closers[0]} reviewer, but consensus-mcp's \"\n            f\"built-in\
      \ dispatcher only supports codex today. Operator must invoke a \"\n        \
      \    f\"{valid_closers[0]} reviewer manually (e.g., via the upcoming `consensus\
      \ run`).\"\n        )\n        return base\n    # codex-iter0003-5 rev-002 fix:\
      \ when there's no mutation event yet (fresh\n    # iteration) but a review-packet\
      \ exists, the natural next action is to\n    # dispatch a cross-family reviewer\
      \ — that creates the first peer review.\n    # Defaulting codex as the suggested\
      \ adapter (the only one with a CLI\n    # dispatcher today; the upcoming `consensus\
      \ run` will generalize this).\n    if review_packet_path.is_file():\n      \
      \  base[\"kind\"] = \"dispatch_cross_family_reviewer\"\n        base[\"rationale\"\
      ] = (\n            \"fresh iteration: review-packet authored but no review has\
      \ been dispatched yet; \"\n            \"kick off the cross-family review\"\n\
      \        )\n        base[\"suggested_command\"] = (\n            f\"python -m\
      \ consensus_mcp._dispatch_codex \"\n            f\"--goal-packet {goal_packet_path}\
      \ \"\n            f\"--iteration-dir {iter_dir} \"\n            f\"--reviewer-id\
      \ codex-{iter_dir.name}-1 \"\n            f\"--review-target {review_packet_path}\"\
      \n        )\n        return base\n    # Truly nothing to act on.\n    base[\"\
      kind\"] = \"operator_decision_required\"\n    base[\"rationale\"] = \"no bundle\
      \ mutation, no review-packet, no in-flight dispatch; nothing for the resume\
      \ tool to suggest\"\n    return base\n\n\ndef _compute_previous_iteration_summary(repo_root:\
      \ Path, current_auth_at: str | None) -> dict | None:\n    archive = repo_root\
      \ / \"consensus-state\" / \"archive\"\n    if not archive.is_dir():\n      \
      \  return None\n    # closure certificates live somewhere under archive; search\
      \ for closure-certificate.yaml\n    best: tuple[str, Path] | None = None\n \
      \   for cert in archive.rglob(\"closure-certificate.yaml\"):\n        data =\
      \ _load_yaml(cert)\n        if not data:\n            continue\n        closed_at\
      \ = data.get(\"closed_at_utc\") or data.get(\"sealed_at_utc\")\n        if not\
      \ closed_at:\n            continue\n        if current_auth_at and closed_at\
      \ >= current_auth_at:\n            continue\n        if best is None or closed_at\
      \ > best[0]:\n            best = (closed_at, cert)\n    if not best:\n     \
      \   return None\n    data = _load_yaml(best[1]) or {}\n    return {\n      \
      \  \"iteration_id\": data.get(\"iteration_id\"),\n        \"iteration_state\"\
      : data.get(\"verdict\") if data.get(\"verdict\", \"\").startswith(\"quorum_close\"\
      ) else None,\n        \"closed_at_utc\": best[0],\n        \"closure_certificate_path\"\
      : str(best[1]),\n    }\n\n\n# ---------------------------------------------------------------------------\n\
      # Public entry point.\n# ---------------------------------------------------------------------------\n\
      \ndef snapshot(\n    iteration_id: str | None = None,\n    *,\n    include_streamed_lines:\
      \ bool = False,\n    max_streamed_lines: int = 50,\n    prior_snapshot_watermark:\
      \ str | None = None,\n    repo_root: Path | None = None,\n) -> dict:\n    \"\
      \"\"Return a read-only operating-context snapshot. See docs/specs/consensus-resume-spec.md\
      \ §5.\"\"\"\n    repo = _resolve_repo_root(repo_root)\n    active = repo / \"\
      consensus-state\" / \"active\"\n    log_path = repo / \"consensus-state\" /\
      \ \"state\" / \"dispatch-log.jsonl\"\n    warnings: list[str] = []\n    multiple:\
      \ list[str] = []\n\n    # --- §3 iteration resolution ---\n    if iteration_id\
      \ is not None:\n        # codex-iter0003-6 rev-001 fix: path-traversal hardening.\
      \ The MCP input\n        # is documented as an iteration DIRECTORY NAME (a single\
      \ path component),\n        # not a path. Reject absolute paths, separators,\
      \ and parent traversal\n        # before any disk read.\n        if (\n    \
      \        not iteration_id\n            or iteration_id in (\".\", \"..\")\n\
      \            or \"/\" in iteration_id\n            or \"\\\\\" in iteration_id\n\
      \            or Path(iteration_id).is_absolute()\n        ):\n            raise\
      \ ValueError(f\"iteration_id must be a single directory name: {iteration_id!r}\"\
      )\n        iter_dir = active / iteration_id\n        # Defense-in-depth: confirm\
      \ the resolved path stays inside active/.\n        try:\n            iter_dir.resolve().relative_to(active.resolve())\n\
      \        except ValueError as exc:\n            raise ValueError(\n        \
      \        f\"iteration_id {iteration_id!r} resolves outside consensus-state/active/\"\
      \n            ) from exc\n        if not iter_dir.is_dir():\n            raise\
      \ ValueError(f\"iteration_id not found: {iteration_id}\")\n        selected\
      \ = iteration_id\n    else:\n        listed = _list_active_iterations(active)\
      \ if active.exists() else []\n        if not listed:\n            return {\n\
      \                \"schema_version\": SCHEMA_VERSION,\n                \"snapshot_taken_at_utc\"\
      : _utc_now_iso(),\n                \"snapshot_watermark\": \"\",\n         \
      \       \"selected_iteration_id\": None,\n                \"iteration_state\"\
      : \"unknown\",\n                \"goal\": None,\n                \"bundle_mutation\"\
      : None,\n                \"recent_activity\": [],\n                \"open_reviews\"\
      : [],\n                \"in_flight_dispatches\": [],\n                \"closure_invariant_status\"\
      : {\n                    \"satisfiable_now\": False,\n                    \"\
      blockers\": [\"no_active_iteration\"],\n                    \"last_bundle_mutation_family\"\
      : None,\n                    \"valid_closer_families\": [],\n              \
      \      \"valid_closer_review_target_hash\": None,\n                },\n    \
      \            \"expected_next_action\": {\n                    \"kind\": \"operator_decision_required\"\
      ,\n                    \"rationale\": \"no active iteration found in consensus-state/active/\"\
      ,\n                    \"suggested_command\": None,\n                    \"\
      wait_for_dispatch_payload\": None,\n                    \"apply_proposed_patch_payload\"\
      : None,\n                    \"close_iteration_payload\": None,\n          \
      \      },\n                \"previous_iteration_summary\": None,\n         \
      \       \"warnings\": [\n                    \"consensus-state/active/ contains\
      \ no iteration directories with goal_packet.yaml\"\n                ] if active.exists()\
      \ else [\"consensus-state/active/ does not exist\"],\n                \"multiple_active_iterations\"\
      : [],\n            }\n        iter_dir = listed[0][0]\n        selected = iter_dir.name\n\
      \        if len(listed) > 1:\n            multiple = [d.name for d, _ in listed]\n\
      \n    # --- §8 watermark fast-path (rev-001 fields) ---\n    watermark = _compute_watermark(iter_dir,\
      \ log_path)\n    if prior_snapshot_watermark is not None and prior_snapshot_watermark\
      \ == watermark:\n        return {\n            \"schema_version\": SCHEMA_VERSION,\n\
      \            \"snapshot_taken_at_utc\": _utc_now_iso(),\n            \"snapshot_watermark\"\
      : watermark,\n            \"watermark_unchanged_since_prior\": True,\n     \
      \       \"selected_iteration_id\": selected,\n        }\n\n    # --- §5 step\
      \ 2: load goal_packet ---\n    gp_path = iter_dir / \"goal_packet.yaml\"\n \
      \   goal_packet = _load_yaml(gp_path)\n    goal: dict | None = None\n    if\
      \ goal_packet is not None:\n        auth = goal_packet.get(\"authorization\"\
      ) or {}\n        recorded_sig = auth.get(\"scope_signature\")\n        expected_sig\
      \ = None\n        sig_valid = False\n        try:\n            expected_sig\
      \ = _scope_signature(goal_packet)\n            sig_valid = (expected_sig ==\
      \ recorded_sig)\n        except Exception as exc:\n            warnings.append(f\"\
      scope_signature recomputation failed: {type(exc).__name__}\")\n        goal\
      \ = {\n            \"summary\": (goal_packet.get(\"goal\") or {}).get(\"summary\"\
      ),\n            \"scope_signature\": recorded_sig,\n            \"scope_signature_valid\"\
      : sig_valid,\n            \"authorized_by\": auth.get(\"authorized_by\"),\n\
      \            \"authorized_at_utc\": auth.get(\"authorized_at_utc\"),\n     \
      \       \"max_iterations\": goal_packet.get(\"max_iterations\"),\n         \
      \   \"iterations_used\": 0,  # not tracked on disk yet; placeholder\n      \
      \  }\n    else:\n        warnings.append(f\"goal_packet.yaml missing or unparseable\
      \ in {iter_dir.name}\")\n\n    # --- §5 step 3: walk dispatch log ---\n    events,\
      \ log_warnings = _walk_dispatch_log(log_path, selected)\n    warnings.extend(log_warnings)\n\
      \n    # --- rev-003: compute current bundle sha BEFORE classifying reviews ---\n\
      \    rp_path = iter_dir / \"review-packet.yaml\"\n    current_bundle_sha, _bundle_source\
      \ = _compute_current_bundle_sha(events, rp_path)\n    # codex-iter0003-4 rev-001\
      \ fix: surface non-OK bundle-sha sources as warnings\n    # so the orchestrator\
      \ knows the review classification is unverified.\n    if _bundle_source == \"\
      mutation_event_missing_hash\":\n        warnings.append(\n            \"bundle-mutation\
      \ event found but lacks bundle_sha256/review_target_hash; \"\n            \"\
      reviews will be classified 'invalid' until a hashed mutation event is logged\"\
      \n        )\n    elif _bundle_source == \"none\" and any(_event_kind(e) for\
      \ e in events):\n        warnings.append(\n            \"current_bundle_sha\
      \ unknown (no mutation event with hash and no review-packet); \"\n         \
      \   \"reviews cannot be verified against the working bundle state\"\n      \
      \  )\n\n    # --- §5 step 5: bundle_mutation ---\n    bundle_mutation = _compute_bundle_mutation(events)\n\
      \n    # --- recent_activity (rev-002 enum, rev-005 tiebreaker) ---\n    recent_activity\
      \ = _compute_recent_activity(events, max_count=10)\n\n    # --- in_flight_dispatches\
      \ ---\n    in_flight = _compute_in_flight(\n        events,\n        iter_dir,\n\
      \        include_streamed=include_streamed_lines,\n        max_streamed_lines=max_streamed_lines,\n\
      \    )\n\n    # --- closure cert + iteration-outcome ---\n    closure_cert_path\
      \ = iter_dir / \"closure-certificate.yaml\"\n    closure_cert = _load_yaml(closure_cert_path)\n\
      \    if closure_cert is not None:\n        closure_cert[\"_path\"] = str(closure_cert_path)\n\
      \    iteration_outcome_path = iter_dir / \"iteration-outcome.yaml\"\n    iteration_outcome\
      \ = _load_yaml(iteration_outcome_path)\n\n    # --- iteration_state ---\n  \
      \  iteration_state = _compute_iteration_state(goal_packet, iteration_outcome,\
      \ closure_cert)\n\n    # --- §5 step 4: classify reviews (now we have current_bundle_sha)\
      \ ---\n    open_reviews: list[dict] = []\n    for review_path in sorted(iter_dir.glob(\"\
      *-review.yaml\")):\n        review = _parse_review(review_path)\n        if\
      \ review is None:\n            warnings.append(f\"review file {review_path.name}\
      \ failed to parse\")\n            continue\n        classification, superseded_by,\
      \ closure_source = _classify_review(\n            review, current_bundle_sha,\
      \ closure_cert, iteration_state,\n        )\n        # Project findings into\
      \ summary\n        findings_summary: list[dict] = []\n        for f in review.get(\"\
      findings\", []) or []:\n            pp = f.get(\"patch_proposal\")\n       \
      \     findings_summary.append({\n                \"id\": f.get(\"id\"),\n  \
      \              \"severity\": f.get(\"severity\"),\n                \"has_patch_proposal\"\
      : isinstance(pp, dict),\n                \"patch_id\": (pp or {}).get(\"patch_id\"\
      ),\n            })\n        actor = review.get(\"actor\") or {}\n        open_reviews.append({\n\
      \            \"pass_id\": review.get(\"pass_id\"),\n            \"reviewer_id\"\
      : review.get(\"reviewer_id\") or actor.get(\"id\"),\n            \"model_family\"\
      : actor.get(\"model_family\") or _infer_model_family(review.get(\"reviewer_id\"\
      ) or \"\"),\n            \"sealed_at_utc\": review.get(\"sealed_at_utc\"),\n\
      \            \"blocking_objections\": review.get(\"blocking_objections\") or\
      \ [],\n            \"goal_satisfied\": review.get(\"goal_satisfied\"),\n   \
      \         \"review_target_hash\": _review_target_hash(review),\n           \
      \ \"classification\": classification,\n            \"superseded_by_pass_id\"\
      : superseded_by,\n            \"closure_source\": closure_source,\n        \
      \    \"findings_summary\": findings_summary,\n        })\n    open_reviews.sort(key=lambda\
      \ r: r.get(\"pass_id\") or \"\")\n\n    # --- closure_invariant_status ---\n\
      \    closure_inv = _compute_closure_invariant_status(bundle_mutation, open_reviews,\
      \ current_bundle_sha)\n\n    # --- expected_next_action ---\n    expected_next\
      \ = _compute_expected_next_action(\n        iteration_state, closure_inv, open_reviews,\
      \ in_flight, iter_dir, gp_path, rp_path,\n    )\n\n    # --- previous_iteration_summary\
      \ ---\n    prev_summary = _compute_previous_iteration_summary(\n        repo,\
      \ (goal or {}).get(\"authorized_at_utc\"),\n    )\n\n    # --- §8 drift check:\
      \ re-compute watermark; warn if changed ---\n    end_watermark = _compute_watermark(iter_dir,\
      \ log_path)\n    snapshot_drift = None\n    if end_watermark != watermark:\n\
      \        warnings.append(\"watermark_drifted_during_snapshot; recommend retry\"\
      )\n        snapshot_drift = {\"start\": watermark, \"end\": end_watermark}\n\
      \n    return {\n        \"schema_version\": SCHEMA_VERSION,\n        \"snapshot_taken_at_utc\"\
      : _utc_now_iso(),\n        \"snapshot_watermark\": end_watermark,\n        \"\
      snapshot_watermark_drift\": snapshot_drift,\n        \"selected_iteration_id\"\
      : selected,\n        \"iteration_state\": iteration_state,\n        \"goal\"\
      : goal,\n        \"bundle_mutation\": bundle_mutation,\n        \"recent_activity\"\
      : recent_activity,\n        \"open_reviews\": open_reviews,\n        \"in_flight_dispatches\"\
      : in_flight,\n        \"closure_invariant_status\": closure_inv,\n        \"\
      expected_next_action\": expected_next,\n        \"previous_iteration_summary\"\
      : prev_summary,\n        \"warnings\": sorted(warnings),\n        \"multiple_active_iterations\"\
      : multiple,\n    }\n\n\ndef _infer_model_family(reviewer_id: str) -> str | None:\n\
      \    rid = (reviewer_id or \"\").lower()\n    if \"codex\" in rid:\n       \
      \ return \"codex\"\n    if \"claude\" in rid:\n        return \"claude\"\n \
      \   return None\n"
    consensus_mcp/tools/resume.py: "\"\"\"consensus.resume MCP tool — single-call\
      \ operating-context snapshot.\n\nWraps consensus_mcp._resume.snapshot() as an\
      \ MCP tool. See\ndocs/specs/consensus-resume-spec.md for the design.\n\nPer\
      \ spec §6: implementation is read-only by construction. No side effects.\n\"\
      \"\"\nfrom __future__ import annotations\n\nfrom typing import Any\n\nfrom consensus_mcp\
      \ import _resume\n\nSCHEMA = {\n    \"name\": \"consensus.resume\",\n    \"\
      description\": (\n        \"Return a read-only operating-context snapshot for\
      \ the current \"\n        \"consensus-mcp iteration. Auto-detects the active\
      \ iteration when \"\n        \"iteration_id is not supplied. Includes goal,\
      \ in-flight dispatches, \"\n        \"open/closing/superseded reviews, closure-invariant\
      \ status, and the \"\n        \"expected next action.\"\n    ),\n    \"input_schema\"\
      : {\n        \"type\": \"object\",\n        \"properties\": {\n            \"\
      iteration_id\": {\n                \"type\": [\"string\", \"null\"],\n     \
      \           \"description\": \"Optional explicit iteration directory name; auto-detect\
      \ when null.\",\n            },\n            \"include_streamed_lines\": {\n\
      \                \"type\": \"boolean\",\n                \"default\": False,\n\
      \            },\n            \"max_streamed_lines\": {\n                \"type\"\
      : \"integer\",\n                \"default\": 50,\n                \"minimum\"\
      : 0,\n                \"maximum\": 500,\n            },\n            \"prior_snapshot_watermark\"\
      : {\n                \"type\": [\"string\", \"null\"],\n                \"description\"\
      : \"Optional watermark from a prior snapshot; if unchanged, returns a fast-path\
      \ response.\",\n            },\n        },\n        \"additionalProperties\"\
      : False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n\
      \        \"description\": \"See docs/specs/consensus-resume-spec.md §4 for the\
      \ full schema.\",\n    },\n}\n\n\ndef handle(\n    iteration_id: str | None\
      \ = None,\n    include_streamed_lines: bool = False,\n    max_streamed_lines:\
      \ int = 50,\n    prior_snapshot_watermark: str | None = None,\n) -> dict[str,\
      \ Any]:\n    try:\n        return _resume.snapshot(\n            iteration_id=iteration_id,\n\
      \            include_streamed_lines=include_streamed_lines,\n            max_streamed_lines=max_streamed_lines,\n\
      \            prior_snapshot_watermark=prior_snapshot_watermark,\n        )\n\
      \    except ValueError as exc:\n        return {\"error\": \"iteration_id_not_found\"\
      , \"message\": str(exc)}\n\n\ndef register(registry) -> None:\n    registry.register(SCHEMA[\"\
      name\"], SCHEMA, handle)\n"
    consensus_mcp/server.py: "\"\"\"MCP server for the consensus pipeline. Phase 1\
      \ G1+G2 hybrid skeleton.\n\nPer spec docs/architecture/phase-1-completion.md\n\
      section 3 (architecture) + section 5 (permissions).\n\nRegisters tool framework,\
      \ performs boot-time validate_disposition_index\ncheck, listens on stdio. Tools\
      \ registered: T2..T11 + Phase 4 supervisor +\ncodex-fix-author surface. Phase\
      \ 1 MCP G1+G2 implementation complete:\nstate.read_decision_ledger (T2), audit.append_event\
      \ (T3),\npatch.stage_and_dry_run (T4), patch.apply_consensus_patch (T5),\nreview.write_and_seal\
      \ (T6), review.read_post_seal (T7).\nPhase 2 G5: state.update_decision_ledger\
      \ (T8).\nPhase 2 G3: repo.get_section (T9), repo.set_section (T10).\nPhase 2\
      \ G4: gate.evaluate_production_with_scope_match (T11).\nPhase 4 supervisor:\
      \ reviewer.dispatch_codex, loop.run_goal,\nloop.verify_codex_patch, apply.codex_patch\
      \ (Task #26 / iter-0016).\n\nImplementation note: the Anthropic MCP SDK (pip\
      \ install mcp) was not\npresent in python_env at implementation time. This server\
      \ uses hand-rolled\nstdio JSON-RPC 2.0, which is the raw wire format the MCP\
      \ SDK wraps anyway.\nIf the SDK is later installed, this file can be swapped\
      \ for the SDK-style\nserver; the ToolRegistry contract stays the same.\n\nBoot\
