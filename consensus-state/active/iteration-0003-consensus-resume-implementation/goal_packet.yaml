schema_version: 1
pilot_id: iteration-0003-consensus-resume-implementation
goal:
  summary: Implement the consensus_resume MCP tool per docs/specs/consensus-resume-spec.md v2, addressing the 5 pass-2 findings inline.
  desired_end_state: |
    Implementation of the consensus_resume MCP tool. Specification:
    docs/specs/consensus-resume-spec.md (v2, sealed via codex-iter0002-2-pass1).

    Five pass-2 findings (codex-rev-001..005, all MEDIUM, all in pass-2)
    are addressed in the code rather than in another spec round:

      rev-001 — output JSON includes optional watermark_unchanged_since_prior
                and snapshot_watermark_drift fields per §8 fast-path
      rev-002 — recent_activity.kind enum includes bundle-mutation kinds
                (patch_applied, review_packet_rebundled, operator_force_bundle_rewrite)
      rev-003 — current bundle sha computed BEFORE review classification
      rev-004 — when bundle_mutation is null, fall back to
                review-packet.yaml's defect_target.base_sha
      rev-005 — recent_activity tiebreaker is dispatch-log line number DESC

    Deliverables:
      - consensus_mcp/_resume.py             (pure snapshot logic)
      - consensus_mcp/tools/resume.py        (MCP tool wrapper)
      - consensus_mcp/server.py              (registry import + register call)
      - consensus_mcp/tests/test_resume.py   (pytest test suite)

    Closure: codex reviews the diff (cross-family). iter-0003 closes
    quorum_close_passed when codex emits goal_satisfied=true OR
    operator dispositions the findings.
  non_goals:
    - touch any other module
    - introduce new dispatch/audit primitives
    - revise the spec further
