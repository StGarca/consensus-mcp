goal_satisfied_rationale: 'Goal satisfied. The five landed CI-greening fixes are root-cause/test-hermeticity
  fixes, not masks: the codex smoke tests are correctly treated as interim real-binary
  integration tests with a named Popen-mock follow-up; the validator fixture now points
  at the standalone repo fixture; the fake-pid/job-kill issue is confined to synthetic
  Popen objects and the conftest os.killpg/os.getpgid guard prevents tests from signaling
  the runner while still exercising the production fallback; pytest-timeout is defensive
  CI hardening; and the POSIX signal assertion now targets stdlib signal.SIGTERM.
  Open-item verdict: corrected fix-shape is A+C, not B/D and not C alone. _dispatch_base._log_dispatch
  was a bare append and is now routed through _visibility_watchdog._locked_append,
  which is the right production-side fix for concurrent main/stdout/stderr thread
  emitters during abort teardown; _read_log_events JSONDecodeError skipping is an
  appropriate defensive telemetry-reader belt, not the primary fix. No blocking objections.'
