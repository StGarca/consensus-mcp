    consensus_mcp/_dispatch_base.py: "\"\"\"Phase 4 v1.14 — shared dispatch infrastructure.\n\
      \nGeneric helpers reused by every reviewer adapter (codex today; gemini and\n\
      any future adapter from iter-0011+). Extracted from _dispatch_codex.py per\n\
      iter-0009 verdict Q1: F1b (extract _dispatch_base.py). NO behavior change\n\
      versus the pre-extraction codex path — every helper here was copied verbatim\n\
      from the original _dispatch_codex.py file.\n\nAdapters import what they need:\n\
      \n    from consensus_mcp._dispatch_base import (\n        RepoRootResolutionError,\
      \ OutsideRepoPathError,\n        _resolve_repo_root, _normalize_relative_to_repo,\n\
      \        _load_goal_packet, _load_template,\n        _build_prompt, _terminate_process_tree,\n\
      \        _compute_per_patch_base_sha,\n        _sha256_str, _build_sealed_packet,\
      \ _seal_via_t6, _log_dispatch,\n    )\n\nThe reviewer adapter contributes its\
      \ own:\n  - CLI invocation (e.g. _invoke_codex / _invoke_gemini)\n  - CLI binary\
      \ resolution / version probe\n  - Output parser specific to the adapter's JSON\
      \ shape\n  - Error class hierarchy\n  - main() entrypoint\n\"\"\"\nfrom __future__\
      \ import annotations\n\nimport hashlib\nimport json\nimport os\nimport re\n\
      import shutil\nimport signal\nimport subprocess\nimport sys\nimport time\nfrom\
      \ pathlib import Path\n\nimport yaml\n\n\n# iter-0010: patch_proposal validation\
      \ constants moved from _dispatch_codex.py\n# so _validate_patch_proposal (also\
      \ moved here) is fully self-contained at the\n# base layer. Per iter-0009 verdict\
      \ + iter-0010 codex-rev-001 blocking finding.\n_PATCH_PROPOSAL_REQUIRED = (\n\
      \    \"patch_id\", \"applies_to_findings\", \"base_sha\",\n    \"unified_diff\"\
      , \"files_touched\", \"expected_tests\",\n)\n_PATCH_PROPOSAL_OPTIONAL = ()\n\
      _PATCH_PROPOSAL_ALLOWED = set(_PATCH_PROPOSAL_REQUIRED) | set(_PATCH_PROPOSAL_OPTIONAL)\n\
      _PATCH_ID_PATTERN = re.compile(r\"^codex-rev-\\d+-patch$\")\n\n# iter-0028 F4\
      \ (codex-rev-002): unified-diff body header parser regex.\n_DIFF_FILE_HEADER_RE\
      \ = re.compile(\n    r\"^(?:---\\s+a/|\\+\\+\\+\\s+b/)(?P<path>\\S+)\\s*$\"\
      ,\n    re.MULTILINE,\n)\n# iter-0028 F1+F2 (codex-rev-003): tokens that signal\
      \ codex-cli's proprietary\n# `apply_patch` format. Naming retains the codex-cli\
      \ reference because that's\n# the originating format; the validator applies\
      \ the rejection regardless of\n# which adapter calls it (gemini, future adapters).\n\
      _APPLY_PATCH_BEGIN_MARKER = \"*** Begin Patch\"\n_APPLY_PATCH_UPDATE_MARKER\
      \ = \"*** Update File\"\n\n\n# Per v1.10.4 F1 (codex review on 0ae7b80d): repo_root\
      \ resolution must fail-closed.\n# Repo markers: directories that MUST exist\
      \ at the resolved root for it to be a valid\n# consensus-mcp / consensus-mcp\
      \ repo. site-packages doesn't have these; cwd in a\n# random directory doesn't\
      \ either; the actual repo does.\n_REPO_ROOT_MARKERS = (\"consensus-state\",\
      \ \"consensus_mcp\", \"consensus_mcp/validators\")\n\n\nclass RepoRootResolutionError(RuntimeError):\n\
      \    \"\"\"Raised when repo_root cannot be resolved to a valid repo (no markers\
      \ found).\"\"\"\n\n\ndef _has_repo_markers(candidate: Path) -> bool:\n    \"\
      \"\"Return True iff candidate contains all _REPO_ROOT_MARKERS as subpaths.\"\
      \"\"\n    return all((candidate / marker).is_dir() for marker in _REPO_ROOT_MARKERS)\n\
      \n\ndef _resolve_repo_root() -> Path:\n    \"\"\"Resolve the repo root, fail-closed\
      \ if no valid candidate is found.\n\n    Per v1.10.4 F1 hardening: the prior\
      \ fallback to\n    Path(__file__).resolve().parent.parent was unsafe — when\
      \ the helper\n    runs as an installed module from python_env/Lib/site-packages,\
      \ that fallback\n    landed at python_env/Lib (NOT the repo root), causing codex\
      \ --cd, T6 archive\n    writes, and dispatch-log writes to all target the wrong\
      \ tree.\n\n    Resolution order (first candidate with all repo markers wins):\n\
      \      1. CONSENSUS_MCP_REPO_ROOT env var (must validate)\n      2. Path.cwd()\
      \ (operator usually invokes from repo root)\n      3. Walk parents of Path(__file__)\
      \ (only succeeds when running in-tree;\n         the in-tree __file__ is consensus_mcp/_dispatch_codex.py\
      \ so\n         3-up = repo root with markers)\n\n    If no candidate validates,\
      \ raise RepoRootResolutionError with a clear\n    operator-facing message naming\
      \ the env var to set. Never silently fall\n    back to site-packages.\n    \"\
      \"\"\n    candidates_tried: list[tuple[str, Path]] = []\n\n    override = os.environ.get(\"\
      CONSENSUS_MCP_REPO_ROOT\")\n    if override:\n        candidate = Path(override).resolve()\n\
      \        candidates_tried.append((\"CONSENSUS_MCP_REPO_ROOT\", candidate))\n\
      \        if _has_repo_markers(candidate):\n            return candidate\n  \
      \      # iter-0028 F5 (codex-rev-004): operator-supplied env var is\n      \
      \  # authoritative. If set but the path fails marker validation, do NOT\n  \
      \      # silently fall through to cwd / __file__ candidates — the operator's\n\
      \        # intent was an explicit override, and silent re-resolution invites\n\
      \        # the very confusion the env var was meant to eliminate. Raise with\n\
      \        # a clear message naming the env var. Empty-string env (treated as\n\
      \        # falsy above) is the \"unset\" case and DOES fall through.\n     \
      \   raise RepoRootResolutionError(\n            f\"CONSENSUS_MCP_REPO_ROOT={override!r}\
      \ was set but the path \"\n            f\"{candidate} does not contain all required\
      \ repo markers \"\n            f\"{_REPO_ROOT_MARKERS}. Not falling through\
      \ to cwd / __file__ \"\n            f\"discovery — operator-supplied env var\
      \ is authoritative. \"\n            f\"Either fix the path (it must contain\
      \ {_REPO_ROOT_MARKERS} as \"\n            f\"subdirectories) or unset CONSENSUS_MCP_REPO_ROOT\
      \ to use \"\n            f\"automatic discovery.\"\n        )\n\n    cwd = Path.cwd().resolve()\n\
      \    candidates_tried.append((\"Path.cwd()\", cwd))\n    if _has_repo_markers(cwd):\n\
      \        return cwd\n\n    # __file__-parent walk: only finds repo root when\
      \ source-tree-installed.\n    here = Path(__file__).resolve()\n    for parent\
      \ in (here.parent, here.parent.parent, here.parent.parent.parent):\n       \
      \ candidates_tried.append((f\"parent of __file__ ({parent.name})\", parent))\n\
      \        if _has_repo_markers(parent):\n            return parent\n\n    tried_msg\
      \ = \"; \".join(f\"{name}={path}\" for name, path in candidates_tried)\n   \
      \ raise RepoRootResolutionError(\n        f\"Cannot resolve consensus-mcp repo\
      \ root. None of the candidates contain \"\n        f\"all required markers {_REPO_ROOT_MARKERS}.\
      \ Set CONSENSUS_MCP_REPO_ROOT \"\n        f\"to the repo root directory (e.g.,\
      \ the directory containing 'consensus-state/' \"\n        f\"and 'scripts/').\
      \ Candidates tried: {tried_msg}\"\n    )\n\n\nclass OutsideRepoPathError(ValueError):\n\
      \    \"\"\"v1.10.5 containment hardening: operator-supplied path resolves outside\
      \ repo_root.\"\"\"\n\n\ndef _normalize_for_compare(p) -> str:\n    \"\"\"iter-0039\
      \ xplat-rev-001 fix: canonicalize a path for cross-platform\n    containment\
      \ comparison.\n\n    On Windows the filesystem is case-insensitive, the canonical\
      \ separator\n    is backslash but forward slashes also work, and extended-length\
      \ paths\n    can be prefixed with `\\\\\\\\?\\\\`. The prior lower+replace fallback\
      \ didn't\n    handle the long-path prefix or 8.3 short-name expansion edge cases.\n\
      \n    This helper:\n      1. Strips the `\\\\\\\\?\\\\` long-path prefix if\
      \ present.\n      2. Calls os.path.normpath to collapse `.` / `..` segments\
      \ and\n         normalize separators.\n      3. Calls os.path.normcase to lowercase\
      \ on Windows (no-op on POSIX).\n\n    The returned string is suitable for startswith-with-separator\n\
      \    containment checks.\n    \"\"\"\n    s = str(p)\n    if sys.platform ==\
      \ \"win32\" and s.startswith(\"\\\\\\\\?\\\\\"):\n        s = s[4:]\n    return\
      \ os.path.normcase(os.path.normpath(s))\n\n\ndef _normalize_relative_to_repo(path_str:\
      \ str | None, repo_root: Path) -> Path | None:\n    \"\"\"Normalize an operator-supplied\
