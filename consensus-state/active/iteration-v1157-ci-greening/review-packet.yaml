      /foo/./bar\")\n        b = _dispatch_codex._normalize_for_compare(\"/foo/bar\"\
      )\n        assert a == b\n\n\ndef test_resolve_codex_bin_msys_path_requires_alpha_drive_letter():\n\
      \    \"\"\"iter-0039 codex-rev-001 regression: MSYS path conversion only fires\n\
