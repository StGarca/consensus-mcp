      \"\"\n    if sys.platform == \"win32\":\n        pytest.skip(\"POSIX-only signal\
      \ test\")\n\n    calls = []\n\n    class FakeProc:\n        pid = 12345\n  \
      \      returncode = None\n        def poll(self): return None if not calls else\
      \ 0  # exit after first signal\n        def terminate(self): calls.append((\"\
      terminate\", None))\n        def kill(self): calls.append((\"kill\", None))\n\
      \        def wait(self, timeout=None): return 0\n        def send_signal(self,\
      \ sig): calls.append((\"send_signal\", sig))\n\n    def fake_killpg(pid, sig):\n\
