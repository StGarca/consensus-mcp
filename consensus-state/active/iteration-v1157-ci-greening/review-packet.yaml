      base_sha\"]`` with\n    that canonical value. Codex's read-only sandbox emits\
      \ a hallucinated\n    base_sha (iter-0021 empirical finding); the operator-stamped\n\
      \    ``defect_target.base_sha`` (computed via ``bundle_sha`` at review-packet\n\
      \    author time) is the authoritative repo-state hash. When review_packet is\n\
      \    absent or lacks a string defect_target.base_sha, codex's emission is kept\n\
      \    (backward compat for unit tests + legacy callers).\n\n    Rules (per codex\
      \ 2026-05-10 v4 + iter-0020 ergonomics fix + iter-0022 base_sha stamp):\n  \
      \    - patch_proposal is dict (None already accepted by caller bypass)\n   \
      \   - keys are EXACTLY the closed set {patch_id, applies_to_findings, base_sha,\n\
      \        unified_diff, files_touched, expected_tests}; extras rejected\n   \
      \   - patch_id matches ^codex-rev-\\\\d+-patch$\n      - patch_id == f\"{finding_id}-patch\"\
      \ (derived from this finding's id;\n        replaces the old content-bound formula\
      \ codex's sandbox couldn't compute)\n      - applies_to_findings non-empty list\
      \ of strings, each in all_finding_ids\n      - files_touched non-empty list\
      \ of strings\n      - unified_diff non-empty string\n      - if goal_packet\
      \ supplied: every files_touched path must be in\n        goal_packet.allowed_files\
      \ (matched via _self_drive._path_in_scope), and\n        no path may match goal_packet.forbidden_files\n\
      \      - helper computes sha256(unified_diff) and stamps it on pp as\n     \
      \   `unified_diff_sha256` (not produced by codex; drift-detection field)\n \
      \     - iter-0022: helper overwrites pp[\"base_sha\"] from review_packet\n \
      \       defect_target.base_sha when present (string-typed)\n    \"\"\"\n   \
      \ if not isinstance(pp, dict):\n        raise error_class(\n            f\"\
      findings[{finding_index}].patch_proposal must be object, got {type(pp).__name__}\"\
      \n        )\n    # Closed-key set; reject extras (anti-self-verification claims\
      \ like 'verified')\n    unknown = set(pp.keys()) - _PATCH_PROPOSAL_ALLOWED\n\
      \    if unknown:\n        raise error_class(\n            f\"findings[{finding_index}].patch_proposal\
      \ has unexpected keys: {sorted(unknown)}\"\n        )\n    # Required fields\
      \ present\n    for required in _PATCH_PROPOSAL_REQUIRED:\n        if required\
      \ not in pp:\n            raise error_class(\n                f\"findings[{finding_index}].patch_proposal\
      \ missing required field: {required!r}\"\n            )\n    # Type checks on\
      \ string fields\n    for str_field in (\"patch_id\", \"base_sha\", \"unified_diff\"\
      ):\n        if not isinstance(pp[str_field], str):\n            raise error_class(\n\
      \                f\"findings[{finding_index}].patch_proposal.{str_field} must\
      \ be string, \"\n                f\"got {type(pp[str_field]).__name__}\"\n \
      \           )\n    # Type checks on list fields\n    for list_field in (\"applies_to_findings\"\
      , \"files_touched\"):\n        if not isinstance(pp[list_field], list):\n  \
      \          raise error_class(\n                f\"findings[{finding_index}].patch_proposal.{list_field}\
      \ must be array, \"\n                f\"got {type(pp[list_field]).__name__}\"\
      \n            )\n    if \"expected_tests\" in pp and not isinstance(pp[\"expected_tests\"\
      ], list):\n        raise error_class(\n            f\"findings[{finding_index}].patch_proposal.expected_tests\
      \ must be array, \"\n            f\"got {type(pp['expected_tests']).__name__}\"\
      \n        )\n\n    # Non-empty constraints\n    if not pp[\"unified_diff\"]:\n\
      \        raise error_class(\n            f\"findings[{finding_index}].patch_proposal.unified_diff\
      \ must be non-empty\"\n        )\n    if not pp[\"files_touched\"]:\n      \
      \  raise error_class(\n            f\"findings[{finding_index}].patch_proposal.files_touched\
      \ must be non-empty\"\n        )\n\n    # iter-0028 F1+F2 (codex-rev-003): reject\
      \ codex-cli's proprietary\n    # `apply_patch` format at validate time.\n  \
      \  diff_text = pp[\"unified_diff\"]\n    if diff_text.lstrip().startswith(_APPLY_PATCH_BEGIN_MARKER)\
      \ or (\n        _APPLY_PATCH_UPDATE_MARKER in diff_text\n    ):\n        raise\
      \ error_class(\n            f\"findings[{finding_index}].patch_proposal: \"\n\
      \            f\"unified_diff_apply_patch_format_not_supported. The unified_diff\
      \ \"\n            f\"field uses codex-cli's proprietary apply_patch format \"\
      \n            f\"({_APPLY_PATCH_BEGIN_MARKER!r}/{_APPLY_PATCH_UPDATE_MARKER!r}).\
      \ \"\n            f\"Use standard unified-diff format with '--- a/<path>' and\
      \ \"\n            f\"'+++ b/<path>' headers and '@@ -L,N +L,N @@' hunks instead.\"\
      \n        )\n\n    # iter-0028 F4 (codex-rev-002): parse `--- a/<path>` and\
      \ `+++ b/<path>`\n    # headers in the diff body. Every body-referenced path\
      \ must be in\n    # files_touched (declared) AND (when goal_packet is supplied)\
      \ in\n    # allowed_files AND NOT in forbidden_files. /dev/null is conventional\n\
      \    # create/delete marker and skipped.\n    body_paths: set[str] = set()\n\
      \    for match in _DIFF_FILE_HEADER_RE.finditer(diff_text):\n        path =\
      \ match.group(\"path\").strip()\n        if not path or path == \"dev/null\"\
      :\n            continue\n        body_paths.add(path)\n    declared_files =\
      \ set(pp[\"files_touched\"])\n    for body_path in sorted(body_paths):\n   \
      \     if body_path not in declared_files:\n            raise error_class(\n\
      \                f\"findings[{finding_index}].patch_proposal: \"\n         \
      \       f\"unified_diff_body_path_outside_scope: {body_path!r} appears \"\n\
      \                f\"in the diff body (--- a/ or +++ b/ header) but is not in\
      \ \"\n                f\"files_touched {sorted(declared_files)}. Every diff-body\
      \ path \"\n                f\"must be declared in files_touched so scope-check\
      \ semantics \"\n                f\"agree across both surfaces.\"\n         \
      \   )\n    if not pp[\"applies_to_findings\"]:\n        raise error_class(\n\
      \            f\"findings[{finding_index}].patch_proposal.applies_to_findings\
      \ must be non-empty\"\n        )\n\n    # Items in the lists must be strings\n\
      \    for j, item in enumerate(pp[\"applies_to_findings\"]):\n        if not\
      \ isinstance(item, str):\n            raise error_class(\n                f\"\
      findings[{finding_index}].patch_proposal.applies_to_findings[{j}] \"\n     \
      \           f\"must be string, got {type(item).__name__}\"\n            )\n\
      \    for j, item in enumerate(pp[\"files_touched\"]):\n        if not isinstance(item,\
      \ str):\n            raise error_class(\n                f\"findings[{finding_index}].patch_proposal.files_touched[{j}]\
      \ \"\n                f\"must be string, got {type(item).__name__}\"\n     \
      \       )\n\n    # patch_id regex (iter-0020: codex-producible form, not content-bound)\n\
      \    if not _PATCH_ID_PATTERN.match(pp[\"patch_id\"]):\n        raise error_class(\n\
      \            f\"findings[{finding_index}].patch_proposal.patch_id {pp['patch_id']!r}\
      \ does not \"\n            f\"match pattern ^codex-rev-\\\\d+-patch$\"\n   \
      \     )\n\n    # patch_id finding-id binding (iter-0020): must equal f\"{finding_id}-patch\"\
      \n    expected_patch_id = f\"{finding_id}-patch\"\n    if pp[\"patch_id\"] !=\
      \ expected_patch_id:\n        raise error_class(\n            f\"findings[{finding_index}].patch_proposal.patch_id\
      \ {pp['patch_id']!r} must \"\n            f\"equal {expected_patch_id!r} (derived\
      \ from this finding's id field)\"\n        )\n\n    # applies_to_findings must\
      \ reference IDs present in this review\n    for ref in pp[\"applies_to_findings\"\
      ]:\n        if ref not in all_finding_ids:\n            raise error_class(\n\
      \                f\"findings[{finding_index}].patch_proposal.applies_to_findings\
      \ references \"\n                f\"unknown finding id {ref!r}; known ids: {sorted(all_finding_ids)}\"\
      \n            )\n\n    # Goal-packet scope checks (skip when goal_packet is\
      \ None — backward compat\n    # for unit-level test invocation; the main pipeline\
      \ always supplies it).\n    if goal_packet is not None:\n        # Reuse the\
      \ same matcher used by the supervisor stop rules so the\n        # allowed/forbidden\
      \ semantics agree across enforcement layers.\n        from consensus_mcp._self_drive\
      \ import _path_in_scope\n        allowed = goal_packet.get(\"allowed_files\"\
      ) or []\n        forbidden = goal_packet.get(\"forbidden_files\") or []\n  \
      \      for path in pp[\"files_touched\"]:\n            if not _path_in_scope(path,\
      \ allowed):\n                raise error_class(\n                    f\"findings[{finding_index}].patch_proposal.files_touched\
      \ path \"\n                    f\"{path!r} is not in goal_packet.allowed_files\
      \ {allowed}\"\n                )\n            if forbidden and _path_in_scope(path,\
      \ forbidden):\n                raise error_class(\n                    f\"findings[{finding_index}].patch_proposal.files_touched\
      \ path \"\n                    f\"{path!r} matches goal_packet.forbidden_files\
      \ {forbidden}\"\n                )\n        for body_path in sorted(body_paths):\n\
      \            if not _path_in_scope(body_path, allowed):\n                raise\
      \ error_class(\n                    f\"findings[{finding_index}].patch_proposal:\
      \ \"\n                    f\"unified_diff_body_path_outside_scope: {body_path!r}\
      \ \"\n                    f\"is in the diff body but not in goal_packet.allowed_files\
      \ \"\n                    f\"{allowed}\"\n                )\n            if\
      \ forbidden and _path_in_scope(body_path, forbidden):\n                raise\
      \ error_class(\n                    f\"findings[{finding_index}].patch_proposal:\
      \ \"\n                    f\"unified_diff_body_path_outside_scope: {body_path!r}\
      \ \"\n                    f\"is in the diff body and matches goal_packet.forbidden_files\
      \ \"\n                    f\"{forbidden}\"\n                )\n\n    # iter-0020:\
      \ helper computes the canonical diff hash and stamps it on the\n    # validated\
      \ patch_proposal output.\n    pp[\"unified_diff_sha256\"] = hashlib.sha256(\n\
      \        pp[\"unified_diff\"].encode(\"utf-8\")\n    ).hexdigest()\n\n    #\
      \ iter-0024 F2 fix + iter-0026 F1: per-patch base_sha stamp against the\n  \
      \  # patch's OWN files_touched subset, using disk bytes when repo_root supplied.\n\
      \    if isinstance(review_packet, dict):\n        defect_target = review_packet.get(\"\
      defect_target\")\n        if isinstance(defect_target, dict):\n            per_patch_sha\
      \ = _compute_per_patch_base_sha(\n                defect_target,\n         \
      \       pp.get(\"files_touched\") or [],\n                repo_root=repo_root,\n\
      \            )\n            if per_patch_sha is not None:\n                pp[\"\
      base_sha\"] = per_patch_sha\n            else:\n                stamped = defect_target.get(\"\
      base_sha\")\n                if isinstance(stamped, str) and stamped:\n    \
      \                pp[\"base_sha\"] = stamped\n\n\ndef _log_dispatch(log_path:\
      \ Path, event: dict) -> None:\n    \"\"\"Append one JSON line to dispatch-log.jsonl.\n\
      \n    Per codex architecture review #4 (2026-05-09), dispatch_done events MUST\
      \ include:\n      - codex_version, prompt_sha256, output_sha256, schema_sha256\n\
      \      - goal_packet_sha256, scope_signature\n      - reviewer_id, pass_id,\
      \ timeout_seconds, exit_code, sealed_path\n    Caller is responsible for populating\
      \ these fields; this writer just appends.\n    Secrets must NEVER be logged.\
      \ The raw subprocess cmd list is NOT passed to\n    this writer; callers log\
      \ only codex_bin (string) + schema_path (string) +\n    timeout_seconds. Raw\
      \ prompt / codex output / goal_packet content are never\n    logged; only their\
      \ sha256 digests are.\n    \"\"\"\n    log_path.parent.mkdir(parents=True, exist_ok=True)\n\
      \    event_with_ts = {\"timestamp_utc\": time.strftime(\"%Y-%m-%dT%H:%M:%SZ\"\
      , time.gmtime()), **event}\n    with log_path.open(\"a\", encoding=\"utf-8\"\
      ) as f:\n        f.write(json.dumps(event_with_ts) + \"\\n\")\n"
    .github/workflows/test.yml: "name: tests\n\non:\n  push:\n    # main is the latest-released\
      \ state; v* are the active release/dev\n    # branches where all development\
      \ lands (pre-v1.15.4 the trigger was\n    # main-only, so CI was dormant from\
      \ v1.13.0→v1.15.3 while every\n    # release happened on a v* branch — fixed\
      \ in v1.15.4).\n    branches: [main, 'v*']\n  pull_request:\n    branches: [main,\
      \ 'v*']\n\njobs:\n  test:\n    name: pytest (${{ matrix.os }}, py${{ matrix.python\
      \ }})\n    runs-on: ${{ matrix.os }}\n    strategy:\n      fail-fast: false\n\
      \      matrix:\n        os: [ubuntu-latest, windows-latest]\n        python:\
      \ [\"3.10\", \"3.11\", \"3.12\"]\n    env:\n      # Skip codex-cli-dependent\
      \ tests; CI does not install the real codex binary.\n      CONSENSUS_MCP_SKIP_CODEX_CLI_TESTS:\
      \ \"1\"\n    steps:\n      - uses: actions/checkout@v4\n\n      - name: Set\
      \ up Python ${{ matrix.python }}\n        uses: actions/setup-python@v5\n  \
      \      with:\n          python-version: ${{ matrix.python }}\n\n      - name:\
      \ Install package\n        run: |\n          python -m pip install --upgrade\
      \ pip\n          pip install -e .\n          pip install pytest pytest-timeout\n\
      \n      - name: Run pytest\n        # --timeout converts a hung test (e.g. a\
      \ real-subprocess test\n        # with no codex/gemini on the runner) into a\
      \ NAMED failure with\n        # a traceback, instead of GitHub SIGTERM-killing\
      \ the whole job\n        # (the historical ubuntu \"exit code 143\" mystery).\
      \ pytest-timeout\n        # uses the signal method on POSIX and thread on Windows.\n\
      \        run: python -m pytest consensus_mcp/tests/ -q --timeout=120\n\n   \
      \   - name: Run validator self-tests\n        run: python consensus_mcp/validators/run_validator_tests.py\n"
    CHANGELOG.md: "# Changelog\n\n## 1.15.7 - 2026-05-15\n\n**CI fix: 4 codex-dispatch\
      \ tests required a real `codex` binary.**\nFirst green CI surfaced this: `test_dispatch_codex.py`'s\n\
      `test_main_smoke_with_mocked_codex`,\n`test_main_smoke_flag_with_env_proceeds`,\n\
      `test_main_sealed_packet_embeds_dispatch_provenance`,\n`test_dispatch_done_includes_archive_path_and_audit_id`\
      \ predate the\niter-0037 refactor that moved the codex invocation from\n`subprocess.run`\
      \ to `subprocess.Popen`. They still mock only\n`subprocess.run` (now just the\
      \ `codex --version` probe), so the\nactual dispatch executes the **real** codex\
      \ via Popen. They passed\non dev machines purely because a real `codex` is on\
      \ PATH; on CI\nrunners with none they failed `CodexInvocationError: codex binary\n\
      not found` (windows legs → exit 1) or reached a process-group kill\nthat SIGTERM'd\
      \ the runner (ubuntu legs → exit 143). It stayed\nhidden because CI was dormant\
      \ v1.13.0→v1.15.3 (main-only trigger)\nuntil v1.15.4 re-enabled it — so these\
      \ were never actually\nCI-covered.\n\nHonest interim fix: a `skipif(shutil.which(\"\
      codex\") is None)`\nguard so they skip cleanly when no real codex is present\
      \ (they are\nde-facto integration tests as written). Verified both ways: codex\n\
      present → all 4 run + pass (no regression, full suite 968/0);\ncodex absent\
      \ (simulated) → 4 skip, 0 failed. **Named follow-up\n(tracked):** rewrite the\
      \ 4 to mock the Popen path via the existing\n`make_fake_codex_popen_factory`\
      \ / `popen_factory=` kwarg (the\npattern the genuinely-hermetic `main()` tests\
      \ already use) and drop\nthe skip. Test-only change; no production code, no\
      \ behavior.\n\nTwo more pre-existing CI-env debts re-enabled CI surfaced, fixed\n\
      here too:\n\n- **Validator self-test `20/21` (windows legs).**\n  `run_validator_tests.py::test_packet_build_sanitizes_injection`\n\
      \  failed because `review_packet_known_good/input.yaml` listed\n  `target_files:\
      \ agent-loop/tests/fixtures/prompt_injection_doc.md`\n  — a **parent-project\
      \ path never rewritten during the standalone\n  extraction**. The doc actually\
      \ lives at\n  `consensus-state/tests/fixtures/prompt_injection_doc.md`; the\n\
      \  stale path meant the builder read nothing, sanitized nothing, and\n  the\
      \ empty `sanitization_log` failed the `>=7` check. Repointed the\n  fixture\
      \ path (the doc contains all 7 `SANITIZE_PATTERNS`); now\n  **21/21**. Not Windows-specific\
      \ — reproduced locally; latent since\n  iter-0001, masked by dormant CI.\n-\
      \ **ubuntu job-kill (exit 143 / \"operation canceled\" ~25%) —\n  ROOT-CAUSED\
      \ + fixed.** Not a hang and not the 4 above:\n  `test_dispatch_codex_streaming.py::_FakePopen.pid`\
      \ returned\n  **`0`**. On POSIX, `_dispatch_base._terminate_process_tree` does\n\
      \  `os.killpg(os.getpgid(proc.pid), SIG*)`; `os.getpgid(0)` resolves\n  to **the\
      \ caller's own process group**, so the abort/watchdog\n  tests SIGTERM'd the\
      \ pytest / GitHub-Actions job *itself* (instant,\n  hence pytest-timeout never\
      \ fired). Windows uses the\n  `send_signal`/`taskkill` branch, so it was masked\
      \ locally and CI\n  was dormant v1.13.0→v1.15.3 so it stayed hidden until v1.15.4\n\
      \  re-enabled CI. Latent since iter-0039. Fixed two ways:\n  (a) corrected the\
      \ synthetic pid to a never-live value so\n  `os.getpgid` raises `ProcessLookupError`\
      \ → the documented\n  `proc.terminate()` fallback runs; (b) a suite-wide\n \
      \ `tests/conftest.py` autouse guard that neutralizes\n  `os.killpg`/`os.getpgid`\
      \ so NO test can ever signal a real\n  process group (production `_terminate_process_tree`\
      \ logic still\n  runs; every `dispatch_aborted` assertion unchanged). `pytest-\n\
      \  timeout` retained as permanent hardening. Verified: targeted\n  abort/dispatch\
      \ suites 144/0; full suite 968 passed / 1 skipped /\n  0 regressions with the\
      \ guard active.\n- **POSIX-only `signal` AttributeError (the FINAL ubuntu blocker).**\n\
      \  Once (3) stopped the runner self-kill, ubuntu ran to completion\n  and surfaced\
      \ the real last failure:\n  `test_terminate_process_tree_uses_signal_on_posix`\
      \ asserted\n  `_dispatch_codex.signal.SIGTERM`, but the iter-0037 refactor moved\n\
      \  `_terminate_process_tree` to `_dispatch_base` and `_dispatch_codex`\n  only\
      \ re-imports the function, not the `signal` module → \n  `AttributeError`. This\
      \ test is Windows-skipped, so it only ran on\n  POSIX CI — masked the entire\
      \ time CI was dormant. Fixed: assert\n  against the stdlib `signal.SIGTERM`\
      \ enum directly (module-agnostic;\n  the same object `_dispatch_base` passes).\
      \ ubuntu was \"1 failed,\n  898 passed, 10 skipped\" — this was the 1.\n\n##\
      \ 1.15.6 - 2026-05-15\n\n**Literal-zero pass** — completes the v1.15.5 identifier\
      \ migration\nper the operator \"true zero\" directive. The v1.15.5\nchangelog/commit/doctrine\
      \ that *documented* the migration\nnecessarily still contained the legacy tokens\
      \ (you cannot record\n\"X was removed\" without writing \"X\"). Those are now\
      \ phrased only\nobliquely (\"the former upstream project name\", \"the prior\
      \ account\nhandle, now `stgarca`\"). The entire working tree (tracked +\ngitignored\
      \ scratch + binary caches; `__pycache__` purged) was\nswept, and a second `git\
      \ filter-repo` pass (same substitutions)\ncleaned all historical blobs, every\
      \ commit/tag message, and the\nsnapshot branch. Verified: **zero literal occurrences\
      \ in any blob\nacross every ref, in any commit message, in any tag message,\
      \ and\nin the working tree (including binary)** — including the record of\n\
      the migration itself. 18 release tags + all branches intact; full\nsuite green;\
      \ a fresh pre-rewrite backup bundle was kept outside\nthe repo. Semantically\
      \ identical to v1.15.5 (de-literalization\nonly; no doctrine/behavior change\
      \ — the substance was\nWorkflow-B-audited in v1.15.5). Every published tag SHA\
      \ changed\nagain; tag-pinned `pipx …@vX.Y.Z` URLs still resolve.\nCanonical\
      \ repo: `github.com/stgarca/consensus-mcp`.\n\n## 1.15.5 - 2026-05-15\n\n**Identifier\
      \ migration + provenance scrub + doctrine reconciliation.**\n\nOperator directed\
      \ (1) removal of every reference to the former\nupstream project's name, and\
      \ (2) migration to the renamed GitHub\naccount (now `stgarca`). Both reached\
      \ immutable commit/tag\nmessages, so — with explicit operator authorization\
      \ — a full\n`git filter-repo` history rewrite was performed:\n\n- **Rewrite:**\
      \ literal substitution of the former upstream\n  project name → `upstream` and\
      \ the prior account handle →\n  `stgarca`, across ALL blob contents AND commit/tag\
      \ messages,\n  all 18 branches + 66 tags (127 commits). Verified before\n  pushing:\
      \ zero occurrences of either legacy token in any blob or\n  message across every\
      \ ref; all 17 release tags + branches\n  present; full suite green on the rewritten\
      \ tree (substitutions\n  internally consistent). Pre-rewrite safety bundle kept\
      \ outside\n  the repo.\n- **Consequence (artifact-scoped truth):** every published\
      \ tag SHA\n  changed. Tag-pinned `pipx install …@vX.Y.Z` URLs keep working\n\
      \  (tags moved with the rewrite); any raw-commit-SHA pin or clone\n  against\
      \ the previous account remote is dead. The canonical repo\n  is now `https://github.com/stgarca/consensus-mcp`.\n\
      - **Doctrine reconciliation:** the v1.15.4 doctrine says `main` is\n  never\
      \ force-pushed. This rewrite force-pushed everything, so the\n  bundled `consensus-workflow`\
      \ skill now carries a\n  **sanctioned-exception carve-out**: a full-history\
      \ rewrite is the\n  ONE non-routine reason to force-push `main`, gated on explicit\n\
      \  authorization + verified backup + pre-push verification + suite\n  green.\
      \ Leaving the doctrine contradicting the action would be the\n  exact currency-drift\
      \ v1.15.3/v1.15.4 fixed.\n- **`consensus-state/README.md`** added (tracked)\
      \ — documents the\n  runtime-state tree + recovery, and (doctrine-correctly,\
      \ via a\n  fresh commit rather than more history surgery) relabels the\n  GitHub\
      \ `consensus-state/` folder off the old root commit the\n  operator flagged.\n\
      - **Literal-zero pass:** a follow-up scrub removed the legacy\n  tokens from\
      \ this changelog/commit/doctrine wording itself (they\n  are described only\
      \ obliquely now) and from snapshot scratch, so\n  the repo contains zero literal\
      \ occurrences anywhere — including\n  the record of the migration itself.\n\n\
      No engine/config/behavior code touched. Full suite green. Workflow\nB audit:\
      \ codex + gemini (bundled-doctrine change).\n\n## 1.15.4 - 2026-05-15\n\n**Repo-presentation\
      \ + CI + branch-doctrine fix.** Operator observed\nthat the GitHub landing page\
      \ looked stuck at v1.13.0 and showed a\nhallucinated \"v2.0.0\" commit label\
      \ on `.github/workflows/`.\n\nRoot cause: the pre-v1.15.4 release-branching\
      \ convention froze\n`main` forever (releases lived only on `v<X.Y.Z>` branches/tags,\n\
      never merged back). `main` is GitHub's default branch, so the\nlanding page\
      \ was frozen at v1.13.0 — and, more seriously,\n`.github/workflows/test.yml`\
