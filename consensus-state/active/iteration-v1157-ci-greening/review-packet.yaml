      \        )\n    assert \"codex blew up\" in str(exc.value)\n\n\ndef test_invoke_codex_timeout_raises(monkeypatch,\
      \ tmp_path):\n    \"\"\"Migrated for iter-0037: the new code path replaces wall-time\
      \ TimeoutExpired\n    with heartbeat-silence abort. Simulate a codex that never\
