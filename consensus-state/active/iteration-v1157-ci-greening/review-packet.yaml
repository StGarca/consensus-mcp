      _FENCE_LANG_BY_EXT = {\n    \".py\": \"python\",\n    \".pyi\": \"python\",\n\
      \    \".md\": \"markdown\",\n    \".yaml\": \"yaml\",\n    \".yml\": \"yaml\"\
      ,\n    \".json\": \"json\",\n    \".toml\": \"toml\",\n    \".sh\": \"bash\"\
      ,\n    \".bash\": \"bash\",\n    \".cmd\": \"batch\",\n    \".js\": \"javascript\"\
      ,\n    \".ts\": \"typescript\",\n    \".html\": \"html\",\n    \".css\": \"\
      css\",\n    \".sql\": \"sql\",\n}\n\n\ndef _format_touched_files_contents(contents:\
      \ dict[str, str]) -> str:\n    \"\"\"Render touched-file contents as ``## File:\
      \ <path>`` + fenced code block.\n\n    Per iter-0021 spec: codex receives file\
