      \"\"\n    if not contents:\n        return \"(no touched-file contents embedded)\"\
      \n    lines: list[str] = []\n    for path in sorted(contents.keys()):\n    \
      \    ext = Path(path).suffix.lower()\n        lang = _FENCE_LANG_BY_EXT.get(ext,\
      \ \"text\")\n        lines.append(f\"## File: {path}\")\n        lines.append(\"\
      \")\n        lines.append(f\"```{lang}\")\n        body = contents[path]\n \
