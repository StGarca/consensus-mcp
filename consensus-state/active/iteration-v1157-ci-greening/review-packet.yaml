      \ = \"\\n\".join(parts)\n    return hashlib.sha256(canonical.encode(\"utf-8\"\
      )).hexdigest()\n\n\ndef _sha256_str(text: str) -> str:\n    \"\"\"Return hex-digest\
      \ sha256 of UTF-8 input. Used for provenance hashing.\"\"\"\n    return hashlib.sha256(text.encode(\"\
      utf-8\")).hexdigest()\n\n\ndef _build_sealed_packet(\n    extracted: dict,\n\
      \    iteration_id: str,\n    reviewer_id: str,\n    pass_id: str,\n    provenance:\
      \ dict | None = None,\n    attestation_method: str = \"auto_codex_dispatch\"\
      ,\n    attestation_input_sources: list[str] | None = None,\n) -> dict:\n   \
      \ \"\"\"Wrap a reviewer's findings dict in the T6-required outer structure.\n\
