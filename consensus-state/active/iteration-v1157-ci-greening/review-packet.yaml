    consensus-state/active/iteration-v1157-ci-greening/implementation-summary.md: "#\
      \ Workflow B audit target — v1.15.7 CI greening (test-infra only)\n\nRe-enabling\
      \ CI in v1.15.4 (dormant v1.13.0→v1.15.3, main-only\ntrigger) exposed three\
      \ independent, pre-existing test-hermeticity\ndebts. No production code changed\
      \ — diffs are confined to\n`consensus_mcp/tests/`, `.github/workflows/test.yml`,\
      \ and one\ntracked test fixture.\n\n## The 3 root causes + fixes\n\n1. **4 codex-dispatch\
      \ \"smoke\" tests need a real `codex` binary.**\n   `test_dispatch_codex.py`\
      \ (`test_main_smoke_with_mocked_codex`,\n   `_smoke_flag_with_env_proceeds`,\n\
      \   `_sealed_packet_embeds_dispatch_provenance`,\n   `_dispatch_done_includes_archive_path_and_audit_id`)\
      \ predate the\n   iter-0037 move to `subprocess.Popen`; they mock only\n   `subprocess.run`\
      \ (now just the `--version` probe), so the real\n   dispatch runs real codex.\
      \ Green on dev (codex on PATH); on\n   runners → `CodexInvocationError`. Fix:\
      \ `_REQUIRES_REAL_CODEX =\n   skipif(shutil.which(\"codex\") is None)` with\
      \ a reason naming the\n   proper-Popen-mock rewrite as a tracked follow-up.\
      \ Verified both\n   ways (present: 4 run+pass; absent: 4 skip, 0 fail).\n\n\
      2. **Validator self-test 20/21.**\n   `review_packet_known_good/input.yaml`\
      \ `target_files` pointed at\n   `agent-loop/tests/fixtures/prompt_injection_doc.md`\
      \ — a\n   parent-project path never rewritten at standalone extraction.\n  \
      \ `build_review_packet` resolves `target_files` repo-relative\n   (`REPO_ROOT\
      \ / rel`); the file didn't exist → empty\n   `sanitization_log` → `>=7` check\
      \ failed. Repointed to\n   `consensus-state/tests/fixtures/prompt_injection_doc.md`\
      \ (verified\n   to contain all 7 `SANITIZE_PATTERNS`). Now 21/21. Reproduced\n\
      \   locally; not OS-specific; latent since iter-0001.\n\n3. **ubuntu job-kill\
      \ (exit 143 / \"operation canceled\" ~25%).**\n   `test_dispatch_codex_streaming._FakePopen.pid`\
      \ returned `0`.\n   POSIX `_dispatch_base._terminate_process_tree` does\n  \
      \ `os.killpg(os.getpgid(proc.pid), SIG*)`; `os.getpgid(0)` =\n   **the caller's\
      \ own process group** → abort/watchdog tests\n   SIGTERM'd the pytest/CI job\
      \ itself (instant — pytest-timeout\n   never fired). Windows uses send_signal/taskkill\
      \ (masked); latent\n   since iter-0039. Fix (defense in depth): (a) NEW\n  \
      \ `tests/conftest.py` autouse guard neutralizing\n   `os.killpg`/`os.getpgid`\
      \ suite-wide (raise `ProcessLookupError`\n   → production's documented `proc.terminate()`\
      \ fallback runs;\n   every `dispatch_aborted` assertion unchanged); (b) `_FakePopen.\n\
      \   pid` 0 → 2_147_483_647 (never-live → `os.getpgid` raises →\n   safe fallback);\
      \ (c) `pytest-timeout --timeout=120` retained as\n   permanent hardening against\
      \ future hangs.\n\n## Verification (CI run 25940449887, commit 41304aa)\n\n\
      - **5 of 6 legs GREEN:** ubuntu py3.10/3.11/3.12 ✓; windows\n  py3.11/3.12 ✓.\
      \ validator self-tests 21/21. full suite local\n  968 passed / 1 skipped / 0\
      \ regressions.\n- **1 OPEN failure — windows-py3.10 ONLY:**\n  `test_dispatch_codex_streaming.py::test_wall_time_hard_ceiling`\n\
      \  → `json.decoder.JSONDecodeError: Expecting value: line 1\n  column 1` at\
      \ the test helper `_read_log_events` (line 290:\n  `_json.loads(line)`). The\
      \ helper ALREADY skips blank lines\n  (`line=line.strip(); if line:`), so a\
      \ **non-empty line in\n  `dispatch-log.jsonl` is not valid JSON**, occurring\
      \ during the\n  wall-time-ceiling abort + reader-thread teardown, only on\n\
      \  py3.10 + Windows (py3.11/3.12 + all Linux pass). Signature\n  ⇒ likely an\
      \ interleaved/partial concurrent write to the JSONL\n  log during thread teardown\
      \ under py3.10's threading on Windows,\n  OR a py3.10-specific flake.\n\n##\
      \ ADJUDICATION REQUESTED (the divergent fix-shape)\n\nDecide the correct fix\
      \ for the open item — these genuinely differ:\n- **(A) Real defect:** dispatch-log\
      \ writes are not atomic under\n  concurrent reader-thread teardown → fix the\
      \ writer\n  (`_dispatch_base`/`_locked_append`/log append) for line-atomic\n\
      \  JSONL. Highest value if real; touches production code.\n- **(B) Test-harness\
      \ artifact:** the controllable-clock/fake\n  teardown in `test_dispatch_codex_streaming`\
      \ races the log\n  flush; fix the test/fake teardown ordering. Test-only.\n\
      - **(C) Reader-helper hardening:** `_read_log_events` should\n  tolerate a torn\
      \ final line (defensive JSONL parse). Risk:\n  could mask (A) if (A) is real.\n\
      - **(D) py3.10-flake:** xfail/skip on windows-py3.10 + tracked\n  follow-up;\
      \ or a supported-version policy call (matrix).\nWhich, and why? Argue from the\
      \ trace + the writer/teardown code.\nState the differential/prior you reasoned\
      \ from.\n\n## Audit questions\n\n- Q1 goal_satisfied: are these the correct\
      \ ROOT-CAUSE fixes, not\n  masks? Specifically Q2 below.\n- Q2 (key): does the\
      \ `conftest` guard neutralizing\n  `os.killpg`/`os.getpgid` hide a PRODUCTION\
      \ defect? Argue from\n  the code: production uses real `Popen(start_new_session=True)`\n\
      \  (POSIX) so `os.getpgid(real_child_pid)` targets the child's own\n  session/group\
      \ — correct; the bug was solely the fake's `pid=0`.\n  Confirm or refute that\
      \ the guard is test-hermeticity, not a\n  prod-bug mask.\n- Q3: do the 4 `skipif`\
      \ codex tests lose meaningful coverage that\n  the named Popen-mock-rewrite\
      \ follow-up must restore? Is \"skip +\n  tracked follow-up\" the right interim\
      \ vs. rewriting now?\n- Q4: any blocking objection. State the differential/prior\
      \ you\n  reasoned from.\n"
    consensus_mcp/tests/conftest.py: "\"\"\"Suite-wide test guards.\n\nv1.15.7 — neutralize\
      \ real process-group signals.\n\nMany tests drive `_dispatch_base._terminate_process_tree`\
      \ with a FAKE\nPopen whose `.pid` is synthetic. On POSIX that function does\n\
      `os.killpg(os.getpgid(proc.pid), SIG*)`. A synthetic pid of `0` (the\n`_FakePopen`\
      \ value) — or any pid that happens to resolve — makes\n`os.getpgid` return the\
      \ **runner's own** process group, so\n`os.killpg` then SIGTERM'd the pytest\
      \ / GitHub-Actions job itself.\nThat surfaced as ubuntu \"##[error]The operation\
      \ was canceled\" at\n~25% of the suite; Windows uses the `send_signal`/`taskkill`\
      \ branch\nso it was masked locally and CI was dormant v1.13.0→v1.15.3 so it\n\
      stayed hidden until v1.15.4 re-enabled CI.\n\nMake the real process-group syscalls\
      \ raise `ProcessLookupError`\nsuite-wide. `_terminate_process_tree` already\
      \ catches that and falls\nback to `proc.terminate()` (its documented path),\
      \ so the abort/\nwatchdog logic and every `dispatch_aborted` assertion behave\
      \ exactly\nas before — no test asserts a real OS signal was delivered. On\n\
      Windows `os.killpg`/`os.getpgid` don't exist (`raising=False` makes\nthe patch\
      \ a harmless no-op there; that path uses CTRL_BREAK/taskkill\nwhich the fakes\
      \ already absorb).\n\"\"\"\nfrom __future__ import annotations\n\nimport os\n\
      \nimport pytest\n\n\n@pytest.fixture(autouse=True)\ndef _no_real_process_group_signals(monkeypatch):\n\
      \    def _neutralized(*_a, **_k):\n        raise ProcessLookupError(\"process-group\
      \ signal neutralized in tests\")\n\n    monkeypatch.setattr(os, \"killpg\",\
      \ _neutralized, raising=False)\n    monkeypatch.setattr(os, \"getpgid\", _neutralized,\
      \ raising=False)\n"
    consensus_mcp/tests/test_dispatch_codex_streaming.py: "\"\"\"Regression tests\
      \ for iter-0037 streaming/heartbeat/abort features of\n`_invoke_codex` in `consensus_mcp/_dispatch_codex.py`.\n\
      \nThese tests use:\n  - `_ControllableClock` — manual `time_fn` substitute;\
      \ tests advance the\n    clock to drive heartbeat / silence / wall-time logic\
      \ without real waits.\n  - `StreamingFakeCodexPopen` — Popen-shaped fake; `stdout.readline()`\
      \ returns\n    scheduled bytes when the controllable clock has reached the scheduled\n\
      \    time, else blocks briefly (real time, not mocked) until either the next\n\
      \    schedule time is reached or the proc is told to exit.\n\nReal `time.sleep(poll_interval)`\
      \ is left as actual time. Tests use a tiny\npoll_interval (0.01s) plus short\
      \ real sleeps between clock-advances so the\nreader thread can drain. This is\
      \ acceptable: the *decision* logic in\n_invoke_codex is driven entirely by `time_fn`;\
      \ we only need a few ms of\nreal time for thread scheduling.\n\"\"\"\nfrom __future__\
      \ import annotations\n\nimport json as _json\nimport sys\nimport threading\n\
      import time\nfrom pathlib import Path\n\nimport pytest\n\nREPO_ROOT = Path(__file__).resolve().parent.parent.parent\n\
      \nfrom consensus_mcp import _dispatch_codex  # noqa: E402\n\n\nSCHEMA_PATH =\
      \ REPO_ROOT / \"consensus_mcp\" / \"dispatch_templates\" / \"codex_review_schema.json\"\
      \n\n\n# --------------------------------------------------------------------------\n\
      # Test helpers\n# --------------------------------------------------------------------------\n\
      \n\nclass _ControllableClock:\n    \"\"\"Manually-advanced monotonic clock for\
      \ `time_fn=` injection.\"\"\"\n\n    def __init__(self, start: float = 1000.0):\n\
      \        self.t = float(start)\n        self._lock = threading.Lock()\n\n  \
      \  def now(self) -> float:\n        with self._lock:\n            return self.t\n\
      \n    def advance(self, dt: float) -> None:\n        with self._lock:\n    \
      \        self.t += float(dt)\n\n\nclass _FakeStdin:\n    \"\"\"Bytes-capturing\
      \ stdin replacement; closed flag used to gate proc exit.\"\"\"\n\n    def __init__(self):\n\
      \        self.buf = bytearray()\n        self.closed = False\n\n    def write(self,\
      \ data):\n        if self.closed:\n            raise BrokenPipeError(\"stdin\
      \ closed\")\n        self.buf.extend(data)\n        return len(data)\n\n   \
      \ def close(self):\n        self.closed = True\n\n    def flush(self):\n   \
      \     pass\n\n\nclass _FakePipeReader:\n    \"\"\"stdout/stderr replacement.\n\
      \n    `readline()` returns the next scheduled `bytes` when the controllable\n\
      \    clock has reached the scheduled time. Until then it sleeps (real time)\
      \ in\n    short ticks. When the parent fake proc is marked exited and the schedule\n\
      \    is drained, `readline()` returns `b\"\"` so `iter(readline, b\"\")` exits\
      \ the\n    reader thread (matching real Popen pipe behavior).\n    \"\"\"\n\n\
      \    def __init__(self, schedule, parent):\n        # schedule: list[tuple[float,\
      \ bytes]] — clock-relative-to-start time + payload\n        # parent: StreamingFakeCodexPopen\
      \ — for clock + exit state.\n        self._schedule = list(schedule)\n     \
      \   self._idx = 0\n        self._parent = parent\n        self._real_tick =\
      \ 0.005\n\n    def readline(self):\n        while True:\n            # If proc\
      \ has exited and we've drained the schedule, EOF.\n            if self._idx\
      \ >= len(self._schedule):\n                if self._parent._exited:\n      \
      \              return b\"\"\n                # Wait for either more schedule\
      \ entries (none coming) or exit.\n                time.sleep(self._real_tick)\n\
      \                continue\n            sched_time, payload = self._schedule[self._idx]\n\
      \            now_rel = self._parent._clock.now() - self._parent._t0\n      \
      \      if now_rel >= sched_time:\n                self._idx += 1\n         \
      \       return payload\n            # Not yet time; brief real sleep, then re-check.\n\
      \            # Also bail out if proc was terminated mid-wait.\n            if\
      \ self._parent._exited:\n                return b\"\"\n            time.sleep(self._real_tick)\n\
      \n\nclass StreamingFakeCodexPopen:\n    \"\"\"Popen-shaped fake.\n\n    On instantiation,\
      \ captures the `-o <out_file>` arg so `.close_stdin_writes_output`\n    can\
      \ stage a payload there at exit time (mimicking real codex's output-file write).\n\
      \n    Constructor uses Popen's positional shape so the real production code's\n\
      \    `popen_factory(cmd, stdin=..., stdout=..., stderr=..., bufsize=...)` call\n\
      \    works unchanged.\n    \"\"\"\n\n    def __init__(\n        self,\n    \
      \    cmd,\n        stdin=None,\n        stdout=None,\n        stderr=None,\n\
      \        bufsize=0,\n        *,\n        _scheduled_stdout=None,\n        _scheduled_stderr=None,\n\
      \        _returncode: int = 0,\n        _exit_at: float = 1.0,\n        _clock:\
      \ _ControllableClock,\n        _output_payload: str = '{\"ok\": true}',\n  \
      \      **_popen_kwargs,  # iter-0039: absorb creationflags / start_new_session\n\
      \    ):\n        self._cmd = cmd\n        self._clock = _clock\n        self._t0\
      \ = _clock.now()\n        self._exit_at = float(_exit_at)\n        self._returncode_on_exit\
      \ = int(_returncode)\n        self._exited = False\n        self.returncode\
      \ = None\n        self._output_payload = _output_payload\n        # Find -o\
      \ <out_file> in cmd.\n        self._out_file = None\n        for i, tok in enumerate(cmd):\n\
      \            if tok == \"-o\" and i + 1 < len(cmd):\n                self._out_file\
      \ = cmd[i + 1]\n                break\n        self.stdin = _FakeStdin()\n \
      \       self.stdout = _FakePipeReader(_scheduled_stdout or [], self)\n     \
      \   self.stderr = _FakePipeReader(_scheduled_stderr or [], self)\n\n    def\
      \ _maybe_write_output(self):\n        if self._out_file and self._returncode_on_exit\
      \ == 0:\n            try:\n                Path(self._out_file).write_text(self._output_payload,\
      \ encoding=\"utf-8\")\n            except OSError:\n                pass\n\n\
      \    def poll(self):\n        if self._exited:\n            return self.returncode\n\
      \        now_rel = self._clock.now() - self._t0\n        if now_rel >= self._exit_at:\n\
      \            self.returncode = self._returncode_on_exit\n            self._exited\
      \ = True\n            self._maybe_write_output()\n            return self.returncode\n\
      \        return None\n\n    def terminate(self):\n        if not self._exited:\n\
      \            self.returncode = -15  # SIGTERM\n            self._exited = True\n\
      \            # Do NOT stage output payload on termination — matches real codex.\n\
      \n    def kill(self):\n        if not self._exited:\n            self.returncode\
      \ = -9\n            self._exited = True\n\n    def send_signal(self, sig):\n\
      \        \"\"\"iter-0039: _terminate_process_tree calls send_signal(CTRL_BREAK_EVENT)\n\
      \        on Windows and os.killpg on POSIX. The fake accepts any signal and\n\
      \        treats it as terminate (the test cares about the exit path, not the\n\
      \        signal-delivery mechanism).\"\"\"\n        self.terminate()\n\n   \
      \ @property\n    def pid(self):\n        \"\"\"`_terminate_process_tree` does\
      \ os.killpg(os.getpgid(proc.pid))\n        on POSIX. Return a synthetic, never-live\
      \ PID so os.getpgid raises\n        ProcessLookupError and the production OSError-fallback\n\
      \        (proc.terminate()) runs. The previous value `0` was WRONG — pid 0\n\
      \        means \"the caller's own process group\", so on Linux CI this fake\n\
      \        made the abort path SIGTERM the pytest/runner job itself\n        (\"\
      operation canceled\"). Belt-and-suspenders: the suite-wide\n        conftest\
      \ guard also neutralizes os.killpg/os.getpgid.\"\"\"\n        return 2_147_483_647\n\
      \n    def wait(self, timeout=None):\n        # We control exit via clock + terminate/kill;\
      \ this is a no-op.\n        # The production code only calls wait() after terminate/kill,\
      \ by which\n        # point _exited is already True. Return returncode.\n  \
      \      return self.returncode\n\n\ndef _make_factory(\n    clock: _ControllableClock,\n\
      \    *,\n    scheduled_stdout=None,\n    scheduled_stderr=None,\n    returncode:\
      \ int = 0,\n    exit_at: float = 1.0,\n    output_payload: str = '{\"ok\": true}',\n\
      ):\n    \"\"\"Build a popen_factory closure for injection into `_invoke_codex`.\"\
      \"\"\n\n    def factory(cmd, **kwargs):\n        return StreamingFakeCodexPopen(\n\
      \            cmd,\n            _scheduled_stdout=scheduled_stdout,\n       \
      \     _scheduled_stderr=scheduled_stderr,\n            _returncode=returncode,\n\
      \            _exit_at=exit_at,\n            _clock=clock,\n            _output_payload=output_payload,\n\
      \            **kwargs,\n        )\n\n    return factory\n\n\ndef _run_invoke_in_thread(**invoke_kwargs):\n\
      \    \"\"\"Run `_invoke_codex` in a background thread; return (thread, holder).\n\
      \n    `holder` is a dict that, after `thread.join()`, contains either:\n   \
      \   - `out`: the codex output (success), or\n      - `e`: the exception raised\
      \ (failure).\n    \"\"\"\n    holder: dict = {}\n\n    def runner():\n     \
      \   try:\n            holder[\"out\"] = _dispatch_codex._invoke_codex(**invoke_kwargs)\n\
      \        except Exception as e:  # noqa: BLE001\n            holder[\"e\"] =\
      \ e\n\n    th = threading.Thread(target=runner, daemon=True)\n    th.start()\n\
      \    return th, holder\n\n\ndef _drive_clock_until_done(\n    clock: _ControllableClock,\n\
      \    thread: threading.Thread,\n    *,\n    step: float = 0.05,\n    real_sleep:\
      \ float = 0.01,\n    max_iterations: int = 2000,\n):\n    \"\"\"Advance `clock`\
      \ by `step` until `thread` finishes or `max_iterations` hit.\n\n    A small\
      \ real sleep between advances gives the reader threads + main poll\n    loop\
      \ scheduler time. Total real wall <= max_iterations * real_sleep.\n    \"\"\"\
      \n    i = 0\n    while thread.is_alive() and i < max_iterations:\n        clock.advance(step)\n\
      \        time.sleep(real_sleep)\n        i += 1\n    thread.join(timeout=5)\n\
      \n\ndef _read_log_events(log_path: Path) -> list[dict]:\n    if not log_path.exists():\n\
      \        return []\n    out = []\n    for line in log_path.read_text(encoding=\"\
      utf-8\").splitlines():\n        line = line.strip()\n        if line:\n    \
      \        out.append(_json.loads(line))\n    return out\n\n\ndef _setup_repo_root(tmp_path:\
      \ Path) -> Path:\n    (tmp_path / \"consensus-state\" / \"state\").mkdir(parents=True,\
      \ exist_ok=True)\n    return tmp_path\n\n\ndef _anchors():\n    return {\n \
      \       \"iteration_id\": \"iter-test\",\n        \"reviewer_id\": \"codex-test\"\
      ,\n        \"pass_id\": \"codex-test-pass1\",\n    }\n\n\n# --------------------------------------------------------------------------\n\
      # Test 1 — streamed lines appear in dispatch-log with correct seq + content\n\
      # --------------------------------------------------------------------------\n\
      \n\ndef test_streamed_lines_appear_in_dispatch_log(tmp_path):\n    repo_root\
      \ = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n    log_path\
      \ = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\n\n\
      \    # 5 lines scheduled at t = 0.0 (all immediately available); proc exits\
      \ at t=0.5.\n    scheduled = [\n        (0.0, b\"line1\\n\"),\n        (0.0,\
      \ b\"line2\\n\"),\n        (0.0, b\"line3\\n\"),\n        (0.0, b\"line4\\n\"\
      ),\n        (0.0, b\"line5\\n\"),\n    ]\n    factory = _make_factory(clock,\
      \ scheduled_stdout=scheduled, exit_at=0.5)\n\n    th, holder = _run_invoke_in_thread(\n\
      \        prompt=\"hi\",\n        codex_bin=\"codex\",\n        timeout_seconds=60,\n\
      \        repo_root=repo_root,\n        schema_path=SCHEMA_PATH,\n        log_path=log_path,\n\
      \        anchors=_anchors(),\n        heartbeat_interval=30.0,\n        stall_silence_seconds=90.0,\n\
      \        poll_interval=0.01,\n        time_fn=clock.now,\n        popen_factory=factory,\n\
      \    )\n    _drive_clock_until_done(clock, th)\n    assert not th.is_alive(),\
      \ \"runner did not finish\"\n    assert \"e\" not in holder, f\"unexpected exception:\
      \ {holder.get('e')}\"\n    assert holder[\"out\"] == '{\"ok\": true}'\n\n  \
      \  events = _read_log_events(log_path)\n    stream_events = [e for e in events\
      \ if e[\"event\"] == \"dispatch_streamed_line\"]\n    assert len(stream_events)\
      \ == 5, f\"expected 5 stream events, got {len(stream_events)}\"\n    for i,\
      \ ev in enumerate(stream_events):\n        assert ev[\"seq\"] == i, f\"event\
      \ {i} seq={ev['seq']}\"\n        assert ev[\"line_truncated\"] == f\"line{i\
      \ + 1}\"\n        assert ev[\"truncated\"] is False\n        assert ev[\"stream\"\
      ] == \"stdout\"\n        assert ev[\"pass_id\"] == \"codex-test-pass1\"\n\n\n\
      # --------------------------------------------------------------------------\n\
      # Test 2 — long lines truncated to 200 chars; full length recorded\n# --------------------------------------------------------------------------\n\
      \n\ndef test_long_lines_are_truncated_to_200_chars(tmp_path):\n    repo_root\
      \ = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n    log_path\
      \ = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\n\n\
      \    big = (\"A\" * 1000) + \"\\n\"\n    scheduled = [(0.0, big.encode(\"utf-8\"\
      ))]\n    factory = _make_factory(clock, scheduled_stdout=scheduled, exit_at=0.2)\n\
      \n    th, holder = _run_invoke_in_thread(\n        prompt=\"x\",\n        codex_bin=\"\
      codex\",\n        timeout_seconds=60,\n        repo_root=repo_root,\n      \
      \  schema_path=SCHEMA_PATH,\n        log_path=log_path,\n        anchors=_anchors(),\n\
      \        heartbeat_interval=30.0,\n        stall_silence_seconds=90.0,\n   \
      \     poll_interval=0.01,\n        time_fn=clock.now,\n        popen_factory=factory,\n\
      \    )\n    _drive_clock_until_done(clock, th)\n    assert not th.is_alive()\n\
      \    assert \"e\" not in holder, f\"unexpected exception: {holder.get('e')}\"\
      \n\n    events = _read_log_events(log_path)\n    stream = [e for e in events\
      \ if e[\"event\"] == \"dispatch_streamed_line\"]\n    assert len(stream) ==\
      \ 1\n    ev = stream[0]\n    assert len(ev[\"line_truncated\"]) == 200\n   \
      \ assert ev[\"line_full_length\"] == 1000\n    assert ev[\"truncated\"] is True\n\
      \n\n# --------------------------------------------------------------------------\n\
      # Test 3 — heartbeat fires at heartbeat_interval cadence\n# --------------------------------------------------------------------------\n\
      \n\ndef test_heartbeat_fires_at_interval(tmp_path):\n    \"\"\"Advance time\
      \ so codex appears to run for ~95s with no stdout; with\n    stall_silence_seconds=200\
      \ we don't trip silence-abort; with\n    heartbeat_interval=30 we should see\
      \ ~3 heartbeats (at ~30, ~60, ~90).\n\n    NOTE: pre-first-line silence falls\
      \ back to `now - start_ts`. So we set\n    `stall_silence_seconds` high enough\
      \ (200s) to not trip silence-abort,\n    and emit no stdout, just heartbeats.\n\
      \    \"\"\"\n    repo_root = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n\
      \    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\
      \n\n    # No stdout; proc exits at clock_rel = 95s.\n    factory = _make_factory(clock,\
      \ scheduled_stdout=[], exit_at=95.0)\n\n    th, holder = _run_invoke_in_thread(\n\
      \        prompt=\"x\",\n        codex_bin=\"codex\",\n        timeout_seconds=300,\
      \  # so wall-time hard ceiling isn't hit\n        repo_root=repo_root,\n   \
      \     schema_path=SCHEMA_PATH,\n        log_path=log_path,\n        anchors=_anchors(),\n\
      \        heartbeat_interval=30.0,\n        stall_silence_seconds=200.0,  # don't\
      \ trip silence-abort\n        poll_interval=0.01,\n        time_fn=clock.now,\n\
      \        popen_factory=factory,\n    )\n\n    # Advance the clock in 1s ticks\
      \ up to ~100s (past exit_at=95s), with\n    # short real sleeps so the main\
      \ loop body can iterate, observe the\n    # advanced clock, and emit heartbeats.\n\
      \    for _ in range(100):\n        clock.advance(1.0)\n        time.sleep(0.01)\n\
      \    th.join(timeout=10)\n    assert not th.is_alive(), \"runner did not finish\"\
      \n    assert \"e\" not in holder, f\"unexpected exception: {holder.get('e')}\"\
      \n\n    events = _read_log_events(log_path)\n    hb = [e for e in events if\
      \ e[\"event\"] == \"dispatch_heartbeat\"]\n    # Expect heartbeats at ~30, 60,\
      \ 90 → 3 events (could be 2 or 4 depending\n    # on scheduler timing; assert\
      \ in window).\n    assert 2 <= len(hb) <= 4, f\"expected ~3 heartbeats, got\
      \ {len(hb)}: {hb}\"\n    # Ages should be monotonically increasing.\n    ages\
      \ = [ev[\"age_seconds\"] for ev in hb]\n    assert ages == sorted(ages), f\"\
      heartbeat ages not monotonic: {ages}\"\n\n\n# --------------------------------------------------------------------------\n\
      # Test 4 — heartbeat silence triggers abort\n# --------------------------------------------------------------------------\n\
      \n\ndef test_heartbeat_silence_triggers_abort(tmp_path):\n    \"\"\"Codex emits\
      \ 2 lines at t=0, then goes silent; advance clock past\n    stall_silence_seconds\
      \ → expect `dispatch_aborted` with\n    `abort_source=\"watchdog_silence\"`\
      \ and CodexInvocationError raised.\n    \"\"\"\n    repo_root = _setup_repo_root(tmp_path)\n\
      \    clock = _ControllableClock()\n    log_path = repo_root / \"consensus-state\"\
      \ / \"state\" / \"dispatch-log.jsonl\"\n\n    scheduled = [\n        (0.0, b\"\
      a\\n\"),\n        (0.0, b\"b\\n\"),\n    ]\n    # Proc would exit at 1000s but\
      \ we'll terminate via silence-abort first.\n    factory = _make_factory(clock,\
      \ scheduled_stdout=scheduled, exit_at=1000.0)\n\n    exc_holder = {}\n\n   \
      \ def runner():\n        try:\n            _dispatch_codex._invoke_codex(\n\
      \                prompt=\"x\",\n                codex_bin=\"codex\",\n     \
      \           timeout_seconds=300,\n                repo_root=repo_root,\n   \
      \             schema_path=SCHEMA_PATH,\n                log_path=log_path,\n\
      \                anchors=_anchors(),\n                heartbeat_interval=1000.0,\
      \  # don't fire heartbeats\n                stall_silence_seconds=10.0,\n  \
      \              poll_interval=0.01,\n                time_fn=clock.now,\n   \
      \             popen_factory=factory,\n            )\n        except Exception\
      \ as e:  # noqa: BLE001\n            exc_holder[\"e\"] = e\n\n    th = threading.Thread(target=runner,\
      \ daemon=True)\n    th.start()\n    # Let the reader thread consume the 2 scheduled\
      \ lines.\n    time.sleep(0.1)\n    # Now advance the clock 15s — past the 10s\
      \ stall_silence_seconds since\n    # last_streamed_ts was set when those lines\
      \ were read (at clock=1000.0).\n    clock.advance(15.0)\n    th.join(timeout=10)\n\
      \    assert not th.is_alive(), \"runner did not abort\"\n\n    assert \"e\"\
      \ in exc_holder, \"expected CodexInvocationError\"\n    assert isinstance(exc_holder[\"\
      e\"], _dispatch_codex.CodexInvocationError)\n\n    events = _read_log_events(log_path)\n\
      \    aborts = [e for e in events if e[\"event\"] == \"dispatch_aborted\"]\n\
      \    assert len(aborts) == 1, f\"expected 1 abort event, got {aborts}\"\n  \
      \  assert aborts[0][\"abort_source\"] == \"watchdog_silence\"\n\n\n# --------------------------------------------------------------------------\n\
      # Test 5 — operator abort-signal file triggers abort\n# --------------------------------------------------------------------------\n\
      \n\ndef test_operator_abort_signal_file_triggers_abort(tmp_path):\n    \"\"\"\
      Mid-run, write `consensus-state/state/abort-dispatch-<pass_id>.signal`;\n  \
      \  expect wrapper to SIGTERM codex, emit `dispatch_aborted` with\n    `abort_source=\"\
      operator_signal_file\"`, delete the signal file, and raise.\n    \"\"\"\n  \
      \  repo_root = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n\
      \    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\
      \n\n    # Codex would run a long time; we'll abort externally.\n    factory\
      \ = _make_factory(clock, scheduled_stdout=[(0.0, b\"working\\n\")], exit_at=1000.0)\n\
      \n    exc_holder = {}\n\n    def runner():\n        try:\n            _dispatch_codex._invoke_codex(\n\
      \                prompt=\"x\",\n                codex_bin=\"codex\",\n     \
      \           timeout_seconds=10000,\n                repo_root=repo_root,\n \
      \               schema_path=SCHEMA_PATH,\n                log_path=log_path,\n\
      \                anchors=_anchors(),\n                heartbeat_interval=10000.0,\n\
      \                stall_silence_seconds=10000.0,  # don't fire silence-abort\n\
      \                poll_interval=0.01,\n                time_fn=clock.now,\n \
      \               popen_factory=factory,\n            )\n        except Exception\
      \ as e:  # noqa: BLE001\n            exc_holder[\"e\"] = e\n\n    th = threading.Thread(target=runner,\
      \ daemon=True)\n    th.start()\n    # Wait a beat so the loop is running.\n\
      \    time.sleep(0.1)\n    signal_path = repo_root / \"consensus-state\" / \"\
      state\" / \"abort-dispatch-codex-test-pass1.signal\"\n    signal_path.write_text(\"\
      operator manual abort\", encoding=\"utf-8\")\n    th.join(timeout=10)\n    assert\
      \ not th.is_alive(), \"runner did not abort\"\n\n    assert \"e\" in exc_holder,\
      \ \"expected CodexInvocationError\"\n    assert isinstance(exc_holder[\"e\"\
      ], _dispatch_codex.CodexInvocationError)\n\n    events = _read_log_events(log_path)\n\
      \    aborts = [e for e in events if e[\"event\"] == \"dispatch_aborted\"]\n\
      \    assert len(aborts) == 1, f\"expected 1 abort event, got {aborts}\"\n  \
      \  assert aborts[0][\"abort_source\"] == \"operator_signal_file\"\n    assert\
      \ \"operator manual abort\" in aborts[0].get(\"abort_reason\", \"\")\n\n   \
      \ # Signal file should be deleted.\n    assert not signal_path.exists(), \"\
      abort signal file was not deleted\"\n\n\n# --------------------------------------------------------------------------\n\
      # Test 6 — wall-time hard ceiling\n# --------------------------------------------------------------------------\n\
      \n\ndef test_wall_time_hard_ceiling(tmp_path):\n    \"\"\"Codex streams continuously\
      \ (so silence-abort never fires) but runs\n    past `timeout_seconds + stall_silence_seconds`\
      \ → expect dispatch_aborted\n    with abort_source=\"wall_time_hard_ceiling\"\
      \ and CodexInvocationError.\n    \"\"\"\n    repo_root = _setup_repo_root(tmp_path)\n\
      \    clock = _ControllableClock()\n    log_path = repo_root / \"consensus-state\"\
      \ / \"state\" / \"dispatch-log.jsonl\"\n\n    # Stream a line every 1s of clock-time\
      \ forever, so silence never fires.\n    # The reader thread reads scheduled\
      \ bytes as clock advances past them.\n    scheduled = [(float(i), f\"keepalive{i}\\\
      n\".encode(\"utf-8\")) for i in range(0, 200)]\n    factory = _make_factory(clock,\
      \ scheduled_stdout=scheduled, exit_at=10000.0)\n\n    exc_holder = {}\n\n  \
      \  def runner():\n        try:\n            _dispatch_codex._invoke_codex(\n\
      \                prompt=\"x\",\n                codex_bin=\"codex\",\n     \
      \           timeout_seconds=10,  # wall = 10\n                repo_root=repo_root,\n\
      \                schema_path=SCHEMA_PATH,\n                log_path=log_path,\n\
      \                anchors=_anchors(),\n                heartbeat_interval=1000.0,\n\
      \                stall_silence_seconds=5.0,  # grace = 5; hard ceiling at 15s\n\
      \                poll_interval=0.01,\n                time_fn=clock.now,\n \
      \               popen_factory=factory,\n            )\n        except Exception\
      \ as e:  # noqa: BLE001\n            exc_holder[\"e\"] = e\n\n    th = threading.Thread(target=runner,\
      \ daemon=True)\n    th.start()\n\n    # Advance clock in 1s steps; reader drains\
      \ scheduled keepalives as we go,\n    # so silence_age stays low. After ~16s\
      \ of clock advance, wall-time hard\n    # ceiling (10 + 5 = 15s) should trip.\n\
      \    for _ in range(20):\n        clock.advance(1.0)\n        time.sleep(0.02)\n\
      \    th.join(timeout=10)\n    assert not th.is_alive(), \"runner did not abort\"\
      \n\n    assert \"e\" in exc_holder, \"expected CodexInvocationError\"\n    assert\
      \ isinstance(exc_holder[\"e\"], _dispatch_codex.CodexInvocationError)\n\n  \
      \  events = _read_log_events(log_path)\n    aborts = [e for e in events if e[\"\
      event\"] == \"dispatch_aborted\"]\n    assert len(aborts) == 1, f\"expected\
      \ 1 abort, got {aborts}\"\n    assert aborts[0][\"abort_source\"] == \"wall_time_hard_ceiling\"\
      \n\n\n# --------------------------------------------------------------------------\n\
      # Test 7 — clean exit returns codex output payload\n# --------------------------------------------------------------------------\n\
      \n\ndef test_clean_exit_returns_output(tmp_path):\n    repo_root = _setup_repo_root(tmp_path)\n\
      \    clock = _ControllableClock()\n    log_path = repo_root / \"consensus-state\"\
      \ / \"state\" / \"dispatch-log.jsonl\"\n\n    payload = '{\"findings\": [],\
      \ \"verdict\": \"PASS\"}'\n    scheduled = [(0.0, b\"working...\\n\"), (0.0,\
      \ b\"done\\n\")]\n    factory = _make_factory(\n        clock,\n        scheduled_stdout=scheduled,\n\
      \        exit_at=0.3,\n        returncode=0,\n        output_payload=payload,\n\
      \    )\n\n    th, holder = _run_invoke_in_thread(\n        prompt=\"x\",\n \
      \       codex_bin=\"codex\",\n        timeout_seconds=60,\n        repo_root=repo_root,\n\
      \        schema_path=SCHEMA_PATH,\n        log_path=log_path,\n        anchors=_anchors(),\n\
      \        heartbeat_interval=30.0,\n        stall_silence_seconds=90.0,\n   \
      \     poll_interval=0.01,\n        time_fn=clock.now,\n        popen_factory=factory,\n\
      \    )\n    _drive_clock_until_done(clock, th)\n    assert not th.is_alive()\n\
      \    assert \"e\" not in holder, f\"unexpected exception: {holder.get('e')}\"\
      \n    assert holder[\"out\"] == payload\n\n    events = _read_log_events(log_path)\n\
      \    aborts = [e for e in events if e[\"event\"] == \"dispatch_aborted\"]\n\
      \    assert aborts == [], f\"clean exit produced abort events: {aborts}\"\n\
      \    stream = [e for e in events if e[\"event\"] == \"dispatch_streamed_line\"\
      ]\n    assert len(stream) == 2\n\n\n# --------------------------------------------------------------------------\n\
      # Optional 8th — stderr drain prevents deadlock\n# --------------------------------------------------------------------------\n\
      \n\ndef test_stderr_drain_prevents_deadlock(tmp_path):\n    \"\"\"codex emits\
      \ ~100KB to stderr; without the stderr-reader thread real\n    codex would block\
      \ on a full pipe buffer. With the drain in place,\n    dispatch completes normally.\n\
      \n    In this fake we simulate by scheduling many stderr lines; the test\n \
      \   asserts that _invoke_codex returns cleanly within the test budget.\n   \
      \ \"\"\"\n    repo_root = _setup_repo_root(tmp_path)\n    clock = _ControllableClock()\n\
      \    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\
      \n\n    big_line = b\"E\" * 1000 + b\"\\n\"\n    # ~100 lines × 1001 bytes ≈\
      \ 100KB on stderr.\n    scheduled_err = [(0.0, big_line) for _ in range(100)]\n\
      \    scheduled_out = [(0.0, b\"ok\\n\")]\n    factory = _make_factory(\n   \
      \     clock,\n        scheduled_stdout=scheduled_out,\n        scheduled_stderr=scheduled_err,\n\
      \        exit_at=0.3,\n    )\n\n    th, holder = _run_invoke_in_thread(\n  \
      \      prompt=\"x\",\n        codex_bin=\"codex\",\n        timeout_seconds=60,\n\
      \        repo_root=repo_root,\n        schema_path=SCHEMA_PATH,\n        log_path=log_path,\n\
      \        anchors=_anchors(),\n        heartbeat_interval=30.0,\n        stall_silence_seconds=90.0,\n\
      \        poll_interval=0.01,\n        time_fn=clock.now,\n        popen_factory=factory,\n\
      \    )\n    _drive_clock_until_done(clock, th)\n    assert not th.is_alive()\n\
      \    assert \"e\" not in holder, f\"unexpected exception: {holder.get('e')}\"\
      \n    assert holder[\"out\"] == '{\"ok\": true}'\n"
    consensus_mcp/tests/test_dispatch_codex.py: "\"\"\"Unit tests for _dispatch_codex.py.\
      \ Codex subprocess is mocked; no real codex calls.\"\"\"\nfrom __future__ import\
      \ annotations\nimport json as _json\nimport shutil as _shutil\nimport signal\n\
      import sys\nimport unittest.mock as _mock\nfrom pathlib import Path\n\nimport\
      \ pytest\nimport yaml\n\n# v1.15.7 CI fix. These four \"smoke\" tests predate\
      \ the iter-0037\n# refactor that moved the codex invocation from `subprocess.run`\
      \ to\n# `subprocess.Popen` (streaming + reader threads). They still mock only\n\
      # `subprocess.run` (which now just covers the `codex --version` probe),\n# so\
      \ the actual dispatch executes the REAL codex binary via Popen. They\n# pass\
      \ on dev machines purely because a real `codex` happens to be on\n# PATH; on\
      \ CI runners with none they failed `CodexInvocationError:\n# codex binary not\
      \ found` (windows legs, exit 1) or reached a\n# process-group kill that SIGTERM'd\
      \ the runner (ubuntu legs, exit 143).\n# This stayed hidden because CI was dormant\
      \ v1.13.0→v1.15.3 (main-only\n# trigger) until v1.15.4 re-enabled it. Honest\
      \ interim: skip when no\n# real codex (these are de-facto integration tests\
      \ as written). Named\n# follow-up (v1.15.x): rewrite them to mock the Popen\
      \ path via the\n# existing `make_fake_codex_popen_factory` / `popen_factory=`\
      \ kwarg\n# (the pattern the genuinely-hermetic main()-tests already use) and\n\
      # drop the skip.\n_REQUIRES_REAL_CODEX = pytest.mark.skipif(\n    _shutil.which(\"\
      codex\") is None,\n    reason=\"needs a real `codex` binary: this test mocks\
      \ subprocess.run \"\n    \"but not the iter-0037 Popen dispatch path (tracked\
      \ rewrite \"\n    \"follow-up); CI runners have no codex.\",\n)\n\nREPO_ROOT\
      \ = Path(__file__).resolve().parent.parent.parent\n\nfrom consensus_mcp import\
      \ _dispatch_codex  # noqa: E402\n\n\nFIXTURES = Path(__file__).parent / \"fixtures\"\
      \ / \"dispatch_codex\"\nSMOKE_GOAL_PACKET = FIXTURES / \"goal_packet_smoke.yaml\"\
      \n\n\nclass _FakeCodexPopen:\n    \"\"\"Popen-like stand-in for the iter-0037\
      \ _invoke_codex Popen+reader-threads\n    code path. Mirrors the subset of the\
      \ subprocess.Popen API that _invoke_codex\n    touches: .stdin.write/.close,\
      \ .stdout.readline, .stderr.readline, .poll,\n    .terminate, .kill, .wait,\
      \ .returncode.\n\n    Constructor records cmd and reads the path passed via\
      \ the `-o` argument so\n    that .stdin.close() can write the preset codex output\
      \ text to that file\n    (matching the real codex's file-write side effect).\
      \ Prompts written to\n    .stdin are appended to the externally-supplied `captured_prompts`\
      \ list as\n    bytes, so callers can inspect what was sent.\n\n    .stdout.readline\
      \ returns successive lines from `stdout_lines` and then b\"\"\n    forever once\
      \ exhausted. .stderr.readline returns stderr lines similarly.\n    .poll returns\
      \ None on the first call (so _invoke_codex enters its main\n    poll loop once)\
      \ and the configured `returncode` thereafter; `poll_calls_until_done`\n    can\
      \ extend the \"still running\" window for silence/timeout simulation tests.\n\
      \    \"\"\"\n\n    def __init__(self, cmd, *, stdout_text: str, returncode:\
      \ int,\n                 captured_prompts: list, stderr_text: str = \"\",\n\
      \                 poll_calls_until_done: int = 1, **_popen_kwargs):\n      \
      \  self._cmd = cmd\n        try:\n            out_idx = cmd.index(\"-o\") +\
      \ 1\n            self._out_file = cmd[out_idx]\n        except (ValueError,\
      \ IndexError):\n            self._out_file = None\n        self._stdout_text\
      \ = stdout_text\n        self._stderr_text = stderr_text\n        self._captured_prompts\
      \ = captured_prompts\n        self._configured_returncode = returncode\n   \
      \     self._poll_calls_until_done = poll_calls_until_done\n        self._poll_calls\
      \ = 0\n        self.returncode = None\n        # Pre-split lines (keep \\n so\
      \ _invoke_codex's rstrip(\"\\r\\n\") works).\n        if stdout_text:\n    \
      \        self._stdout_lines = [\n                (ln + \"\\n\").encode(\"utf-8\"\
      ) for ln in stdout_text.splitlines()\n            ]\n        else:\n       \
      \     self._stdout_lines = []\n        if stderr_text:\n            self._stderr_lines\
      \ = [\n                (ln + \"\\n\").encode(\"utf-8\") for ln in stderr_text.splitlines()\n\
      \            ]\n        else:\n            self._stderr_lines = []\n       \
      \ self._stdout_idx = 0\n        self._stderr_idx = 0\n        # stdin/stdout/stderr\
      \ file-like objects.\n        self.stdin = _FakeStdin(self._captured_prompts,\
      \ self._write_output_file)\n        self.stdout = _FakeStream(self._next_stdout_line)\n\
      \        self.stderr = _FakeStream(self._next_stderr_line)\n\n    def _write_output_file(self):\n\
      \        \"\"\"Called when .stdin.close() fires; mimics codex writing -o file.\"\
      \"\"\n        if self._out_file is not None and self._configured_returncode\
      \ == 0:\n            try:\n                Path(self._out_file).write_text(self._stdout_text\
      \ or \"\",\n                                                 encoding=\"utf-8\"\
      )\n            except OSError:\n                pass\n\n    def _next_stdout_line(self):\n\
      \        if self._stdout_idx < len(self._stdout_lines):\n            line =\
      \ self._stdout_lines[self._stdout_idx]\n            self._stdout_idx += 1\n\
      \            return line\n        return b\"\"\n\n    def _next_stderr_line(self):\n\
      \        if self._stderr_idx < len(self._stderr_lines):\n            line =\
      \ self._stderr_lines[self._stderr_idx]\n            self._stderr_idx += 1\n\
      \            return line\n        return b\"\"\n\n    def poll(self):\n    \
      \    self._poll_calls += 1\n        if self._poll_calls < self._poll_calls_until_done:\n\
      \            return None\n        self.returncode = self._configured_returncode\n\
      \        return self.returncode\n\n    def terminate(self):\n        # Mark\
      \ process finished so subsequent poll/wait stop blocking.\n        self.returncode\
      \ = self._configured_returncode\n\n    def kill(self):\n        self.returncode\
      \ = self._configured_returncode\n\n    def wait(self, timeout=None):\n     \
      \   self.returncode = self._configured_returncode\n        return self.returncode\n\
      \n    def send_signal(self, sig):\n        # iter-0039: _terminate_process_tree\
      \ calls send_signal on Windows.\n        # Treat as terminate for the fake.\n\
      \        self.terminate()\n\n    @property\n    def pid(self):\n        # iter-0039:\
      \ _terminate_process_tree uses os.killpg(os.getpgid(pid))\n        # on POSIX.\
      \ The fake returns 0; os.killpg(0) would target the current\n        # process\
      \ group which is dangerous, but the OSError fallback path\n        # catches\
      \ that case in _terminate_process_tree.\n        return 0\n\n\nclass _FakeStdin:\n\
      \    def __init__(self, captured_prompts: list, on_close):\n        self._captured\
      \ = captured_prompts\n        self._buf = bytearray()\n        self._closed\
      \ = False\n        self._on_close = on_close\n\n    def write(self, data):\n\
      \        if self._closed:\n            raise OSError(\"stdin closed\")\n   \
      \     if isinstance(data, str):\n            data = data.encode(\"utf-8\")\n\
      \        self._buf.extend(data)\n        return len(data)\n\n    def close(self):\n\
      \        if self._closed:\n            return\n        self._closed = True\n\
      \        self._captured.append(bytes(self._buf))\n        self._on_close()\n\
      \n\nclass _FakeStream:\n    \"\"\"Minimal stdout/stderr stand-in supporting\
      \ readline() returning bytes.\"\"\"\n\n    def __init__(self, next_line_fn):\n\
      \        self._next_line = next_line_fn\n\n    def readline(self):\n       \
      \ return self._next_line()\n\n    def read(self):\n        chunks = []\n   \
      \     while True:\n            line = self._next_line()\n            if not\
      \ line:\n                break\n            chunks.append(line)\n        return\
      \ b\"\".join(chunks)\n\n\ndef make_fake_codex_popen_factory(stdout_text: str,\
      \ returncode: int = 0,\n                                   captured_prompts=None,\n\
      \                                   stderr_text: str = \"\",\n             \
      \                      poll_calls_until_done: int = 1):\n    \"\"\"Return a\
      \ popen_factory callable suitable for monkeypatching\n    _dispatch_codex.subprocess.Popen\
      \ (or for the popen_factory= kwarg of\n    _invoke_codex). Each factory call\
      \ constructs a fresh _FakeCodexPopen.\n\n    The factory writes `stdout_text`\
      \ to the path in the `-o` argument of cmd\n    when stdin is closed (mimicking\
      \ codex's file-write side effect) and emits\n    `stdout_text` line-by-line\
      \ via .stdout.readline. `returncode` becomes\n    proc.returncode after the\
      \ configured number of poll calls.\n    \"\"\"\n    if captured_prompts is None:\n\
      \        captured_prompts = []\n\n    def _factory(cmd, **kwargs):\n       \
      \ return _FakeCodexPopen(\n            cmd,\n            stdout_text=stdout_text,\n\
      \            returncode=returncode,\n            captured_prompts=captured_prompts,\n\
      \            stderr_text=stderr_text,\n            poll_calls_until_done=poll_calls_until_done,\n\
      \            **kwargs,\n        )\n\n    return _factory\n\n\ndef _scaffold_repo_markers(tmp_path):\n\
