      \ = tmp_path / \"consensus-state\" / \"active\"\n    isolated_active.mkdir(parents=True,\
      \ exist_ok=True)\n\n\ndef _stage_smoke_goal_packet(tmp_path):\n    \"\"\"v1.10.5:\
