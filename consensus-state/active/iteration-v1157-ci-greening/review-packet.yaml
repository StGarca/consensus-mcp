      \ tmp_path)\n    assert resolved is not None\n\n\n# ---- iter-0039 cross-platform\
      \ fixes ----------------------------------------\n\n\ndef test_normalize_for_compare_strips_long_path_prefix_on_windows():\n\
      \    \"\"\"iter-0039 xplat-rev-001 regression: _normalize_for_compare strips\
      \ the\n    Windows extended-length path prefix `\\\\\\\\?\\\\` so paths with\
