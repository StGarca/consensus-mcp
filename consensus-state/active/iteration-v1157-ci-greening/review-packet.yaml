      \ rather than returning the unexecutable path.\"\"\"\n    if sys.platform !=\
      \ \"win32\":\n        pytest.skip(\"Windows-only App Execution Alias\")\n  \
      \  # Synthesize a fake WindowsApps dir + a 0-byte stub.\n    fake_local_appdata\
      \ = tmp_path / \"LocalAppData\"\n    windows_apps = fake_local_appdata / \"\
      Microsoft\" / \"WindowsApps\"\n    windows_apps.mkdir(parents=True)\n    stub\
