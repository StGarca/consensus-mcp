      +pipx install git+https://github.com/stgarca/consensus-mcp.git@v1.15.4\n\
      \ \n # Optional: add a small Claude Code helper so you can type\n # \"consensus\
      \ init\" inside Claude Code chat in any project.\n@@ -108,8 +108,10 @@\n \n\
