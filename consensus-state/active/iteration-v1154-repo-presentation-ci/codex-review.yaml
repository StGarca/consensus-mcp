      -(machine-enforced plan conventions, dispatcher fixes) and made the\n-documentation\
      \ match shipped reality. Full per-release detail is in\n-[`CHANGELOG.md`](CHANGELOG.md);\
      \ upgrade guidance for known-issue\n+**Current: v1.15.4.** Latest work fixes\
      \ the GitHub landing-page\n+currency problem, reactivates GitHub Actions on\
      \ release branches, and\n+keeps `main` fast-forwarded to the latest released\
      \ tag. Earlier\n+1.15.x work hardened the review machinery (machine-enforced\
      \ plan\n+conventions, dispatcher fixes). Full per-release detail is in\n+[`CHANGELOG.md`](CHANGELOG.md);\
      \ upgrade guidance for known-issue\n releases is in [`docs/advisories.md`](docs/advisories.md).\n\
      --- a/consensus_mcp/claude_extensions/skills/consensus-workflow/SKILL.md\n+++\
      \ b/consensus_mcp/claude_extensions/skills/consensus-workflow/SKILL.md\n@@ -482,9\
