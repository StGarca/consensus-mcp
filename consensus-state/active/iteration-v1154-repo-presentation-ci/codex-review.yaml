findings:
- id: codex-rev-001
  severity: blocking
  summary: README and release doctrine still leave the GitHub landing page pointing
    at v1.15.3 after the v1.15.4 main fast-forward.
  citation: README.md:52
  risk: After main is fast-forwarded, GitHub's default-branch README still tells users
    to install v1.15.3 and says the current release is v1.15.3, so the repo-presentation/currency
    defect is not actually fixed for the primary landing page. The cut sequence also
    bumps README URLs only after tagging, on the next dev branch, which would repeat
    this drift on future releases.
  recommendation: Update the release-branch README to v1.15.4 before tagging/main
    fast-forward, and adjust the bundled cut sequence so README install/status currency
    is part of the pre-tag release step while the post-tag dev-branch step only verifies
    it.
  patch_not_proposed_reason: null
