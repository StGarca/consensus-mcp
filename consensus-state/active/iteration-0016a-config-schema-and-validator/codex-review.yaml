findings:
- id: codex-rev-001
  severity: medium
  summary: Malformed YAML is not converted to ConfigValidationError despite the loader
    contract
  citation: consensus_mcp/config.py:385
  risk: Callers expecting a single config-validation exception path will receive raw
    PyYAML parser/scanner exceptions for syntactically invalid config files, violating
    the module contract and leaving malformed YAML behavior unpinned by tests.
  recommendation: Catch yaml.YAMLError in load(), wrap it in ConfigValidationError,
    and add a focused test for malformed YAML.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: c623a62610faf20e0c50d8abe2f2bbc29c6add9ffdb8968b43d3e3136a99273b
    unified_diff: "--- a/consensus_mcp/config.py\n+++ b/consensus_mcp/config.py\n\
      @@ -382,7 +382,10 @@ def load(path: Path) -> dict:\n         illegal combination.\n\
      \       OSError on file-read failure (caller decides legacy-mode fallback).\n\
      \     \"\"\"\n     text = Path(path).read_text(encoding=\"utf-8\")\n-    raw\
      \ = yaml.safe_load(text)\n+    try:\n+        raw = yaml.safe_load(text)\n+\
      \    except yaml.YAMLError as exc:\n+        raise ConfigValidationError(f\"\
      malformed YAML in {path}: {exc}\") from exc\n     normalized = normalize(raw)\n\
      \     validate(normalized)\n     return normalized\n--- a/consensus_mcp/tests/test_config.py\n\
      +++ b/consensus_mcp/tests/test_config.py\n@@ -388,6 +388,13 @@ def test_load_invalid_raises(tmp_path):\n\
      \     p.write_text(\"schema_version: 1\\nworkflow:\\n  mode: wrong\\n\", encoding=\"\
      utf-8\")\n     with pytest.raises(cfg.ConfigValidationError):\n         cfg.load(p)\n\
      +\n+\n+def test_load_malformed_yaml_raises_config_validation_error(tmp_path):\n\
      +    p = tmp_path / \"config.yaml\"\n+    p.write_text(\"schema_version: [\\\
      n\", encoding=\"utf-8\")\n+    with pytest.raises(cfg.ConfigValidationError,\
      \ match=\"malformed YAML\"):\n+        cfg.load(p)\n \n \n # ---------- effective_config_sha256\
      \ ----------\n"
    files_touched:
    - consensus_mcp/config.py
    - consensus_mcp/tests/test_config.py
    expected_tests:
    - py -3.11 -m pytest consensus_mcp/tests/test_config.py -q
    unified_diff_sha256: 2a0ce9c1c482f7adddf0ccfafc0c4f80b1e7ebb513d271bd255eaf4a210dc0b7
goal_satisfied: false
goal_satisfied_rationale: The implementation covers the requested schema, normalization,
  validation, hashing, and legacy helpers, but load() misses the stated malformed-YAML
  error contract.
