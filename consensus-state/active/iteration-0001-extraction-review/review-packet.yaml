      \  work = Path(tempfile.mkdtemp(prefix=\"consensus-mcp-rgc-\"))\n    venv_python:\
      \ Path | None = None\n    venv_console: Path | None = None\n    try:\n     \
      \   ok_install, detail_install, venv_python, venv_console = gate_install(repo_root,\
      \ python, work)\n        results[\"G_install\"] = (ok_install, detail_install)\n\
      \        _print_gate(\"G_install\", *results[\"G_install\"])\n\n        if ok_install\
      \ and venv_python is not None and venv_console is not None:\n            results[\"\
      G_install_smoke\"] = gate_install_smoke(repo_root, venv_python)\n          \
      \  _print_gate(\"G_install_smoke\", *results[\"G_install_smoke\"])\n\n     \
      \       results[\"G_server_starts\"] = gate_server_starts(repo_root, venv_console)\n\
      \            _print_gate(\"G_server_starts\", *results[\"G_server_starts\"])\n\
      \        else:\n            results[\"G_install_smoke\"] = (False, \"skipped:\
      \ G_install failed\")\n            _print_gate(\"G_install_smoke\", *results[\"\
      G_install_smoke\"])\n            results[\"G_server_starts\"] = (False, \"skipped:\
      \ G_install failed\")\n            _print_gate(\"G_server_starts\", *results[\"\
      G_server_starts\"])\n    finally:\n        # Best-effort cleanup of temp venv.\
      \ Permission errors on Windows are\n        # tolerable; the OS reaps temp dirs\
      \ eventually.\n        shutil.rmtree(work, ignore_errors=True)\n\n    print(\"\
      \\nGate 9 (iteration record):\")\n    results[\"G_real_iter\"] = gate_real_iter(repo_root)\n\
      \    _print_gate(\"G_real_iter\", *results[\"G_real_iter\"])\n\n    print(\"\
      \\nGate 10 (dispatch pytest behavior suite):\")\n    results[\"G_pytest_dispatch_codex\"\
      ] = gate_pytest_dispatch_codex(repo_root, python)\n    _print_gate(\"G_pytest_dispatch_codex\"\
      , *results[\"G_pytest_dispatch_codex\"])\n\n    print(\"\\nGate 11 (archive\
      \ index <-> spec md section-24 sync):\")\n    results[\"G_archive_section_24_synced\"\
      ] = gate_archive_section_24_synced(repo_root, python)\n    _print_gate(\"G_archive_section_24_synced\"\
      , *results[\"G_archive_section_24_synced\"])\n\n    print(\"\\nSUMMARY:\")\n\
      \    passed = sum(1 for ok, _ in results.values() if ok)\n    total = len(results)\n\
      \    for name, (ok, detail) in results.items():\n        mark = \"PASS\" if\
      \ ok else \"FAIL\"\n        print(f\"  {mark}  {name}  -- {detail}\")\n    print(f\"\
      \\n{passed}/{total} gates passed\")\n    return 0 if passed == total else 1\n\
      \n\nif __name__ == \"__main__\":\n    sys.exit(main())\n"
    consensus_mcp/server.py: "\"\"\"MCP server for the consensus pipeline. Phase 1\
      \ G1+G2 hybrid skeleton.\n\nPer spec docs/architecture/phase-1-completion.md\n\
      section 3 (architecture) + section 5 (permissions).\n\nRegisters tool framework,\
      \ performs boot-time validate_disposition_index\ncheck, listens on stdio. Tools\
      \ registered: T2..T11 + Phase 4 supervisor +\ncodex-fix-author surface. Phase\
      \ 1 MCP G1+G2 implementation complete:\nstate.read_decision_ledger (T2), audit.append_event\
      \ (T3),\npatch.stage_and_dry_run (T4), patch.apply_consensus_patch (T5),\nreview.write_and_seal\
      \ (T6), review.read_post_seal (T7).\nPhase 2 G5: state.update_decision_ledger\
      \ (T8).\nPhase 2 G3: repo.get_section (T9), repo.set_section (T10).\nPhase 2\
      \ G4: gate.evaluate_production_with_scope_match (T11).\nPhase 4 supervisor:\
      \ reviewer.dispatch_codex, loop.run_goal,\nloop.verify_codex_patch, apply.codex_patch\
      \ (Task #26 / iter-0016).\n\nImplementation note: the Anthropic MCP SDK (pip\
      \ install mcp) was not\npresent in python_env at implementation time. This server\
      \ uses hand-rolled\nstdio JSON-RPC 2.0, which is the raw wire format the MCP\
      \ SDK wraps anyway.\nIf the SDK is later installed, this file can be swapped\
      \ for the SDK-style\nserver; the ToolRegistry contract stays the same.\n\nBoot\
      \ sequence:\n  1. Run validate_disposition_index against the canonical spec\
      \ md\n  2. If findings != 0: REFUSE TO START; print findings to stderr; exit\
      \ 2\n  3. If findings == 0: register tool surface (empty for now); listen on\
      \ stdio\n  4. Append mcp_server_started event to consensus-state/state/mcp-server-audit.jsonl\n\
      \nShutdown:\n  - Append mcp_server_stopped event before exiting\n\nCLI flags:\n\
      \  --boot-and-exit   Boot, write audit event, then exit cleanly. Used by\n \
      \                   the smoke test to verify the boot/shutdown cycle without\n\
      \                    keeping a long-running stdio server open.\n\"\"\"\nfrom\
      \ __future__ import annotations\nimport argparse\nimport json\nimport os\nimport\
      \ sys\nfrom datetime import datetime, timezone\nfrom pathlib import Path\n\n\
      def _resolve_repo_root() -> Path:\n    \"\"\"Resolve REPO_ROOT.\n\n    Default\
      \ is the in-tree discovery: consensus_mcp/server.py ->\n    parent.parent ==\
      \ repo root. When the package is installed via\n    pip wheel, the parent walk\
      \ lands inside site-packages; consumers of\n    the installed binary must set\
      \ CONSENSUS_MCP_REPO_ROOT to the actual\n    source repo to give the disposition\
      \ check a real spec md to read.\n    Added in v1.9.3-rc P3 T5 packaging work.\n\
      \    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n  \
      \  if override:\n        return Path(override).resolve()\n    return Path(__file__).resolve().parent.parent\n\
      \n\nREPO_ROOT = _resolve_repo_root()\nSPEC_PATH = (\n    REPO_ROOT\n    / \"\
      docs\"\n    / \"architecture\"\n    / \"orchestration-spec.md\"\n)\ndef _resolve_audit_log_path()\
      \ -> Path:\n    \"\"\"Allow smoke tests to point AUDIT_LOG at a temp sink via\
      \ env var; default to real state file.\"\"\"\n    override = os.environ.get(\"\
      CONSENSUS_MCP_AUDIT_LOG\")\n    if override:\n        return Path(override)\n\
      \    return REPO_ROOT / \"consensus-state\" / \"state\" / \"mcp-server-audit.jsonl\"\
      \n\n\nAUDIT_LOG = _resolve_audit_log_path()\n\n\nfrom consensus_mcp.tool_registry\
      \ import ToolRegistry  # noqa: E402\n\n# Global registry -- T2-T11 modules import\
      \ this and call registry.register().\nregistry = ToolRegistry()\n\nfrom consensus_mcp.tools\
      \ import state_read_decision_ledger  # noqa: E402\nstate_read_decision_ledger.register(registry)\n\
      \nfrom consensus_mcp.tools import audit_append_event  # noqa: E402\naudit_append_event.register(registry)\n\
      \nfrom consensus_mcp.tools import patch_stage_and_dry_run  # noqa: E402\npatch_stage_and_dry_run.register(registry)\n\
      \nfrom consensus_mcp.tools import patch_apply_consensus_patch  # noqa: E402\n\
      patch_apply_consensus_patch.register(registry)\n\nfrom consensus_mcp.tools import\
      \ review_write_and_seal  # noqa: E402\nreview_write_and_seal.register(registry)\n\
      \nfrom consensus_mcp.tools import review_read_post_seal  # noqa: E402\nreview_read_post_seal.register(registry)\n\
      \nfrom consensus_mcp.tools import state_update_decision_ledger  # noqa: E402\n\
      state_update_decision_ledger.register(registry)\n\nfrom consensus_mcp.tools\
      \ import repo_get_section  # noqa: E402\nrepo_get_section.register(registry)\n\
      \nfrom consensus_mcp.tools import repo_set_section  # noqa: E402\nrepo_set_section.register(registry)\n\
      \nfrom consensus_mcp.tools import gate_evaluate_production_with_scope_match\
      \  # noqa: E402\ngate_evaluate_production_with_scope_match.register(registry)\n\
      \nfrom consensus_mcp.tools import reviewer_dispatch_codex  # noqa: E402\nreviewer_dispatch_codex.register(registry)\n\
      \nfrom consensus_mcp.tools import loop_run_goal  # noqa: E402\nloop_run_goal.register(registry)\n\
      \nfrom consensus_mcp.tools import loop_verify_codex_patch  # noqa: E402\nloop_verify_codex_patch.register(registry)\n\
      \nfrom consensus_mcp.tools import apply_codex_patch  # noqa: E402\napply_codex_patch.register(registry)\n\
      \n\n# ---------------------------------------------------------------------------\n\
      # Boot-time disposition check\n# ---------------------------------------------------------------------------\n\
      \ndef _run_disposition_check() -> int:\n    \"\"\"Run validate_disposition_index\
      \ against the spec; return findings count.\n\n    Returns 0 if clean. Non-zero\
      \ means server should refuse to start.\n    Raises on import/IO error (caller\
      \ handles).\n    \"\"\"\n    from consensus_mcp.validators.validate_disposition_index\
      \ import validate_disposition_index\n    report = validate_disposition_index(SPEC_PATH)\n\
      \    return report[\"stats\"][\"total_findings\"]\n\n\n# ---------------------------------------------------------------------------\n\
      # Audit log\n# ---------------------------------------------------------------------------\n\
      \ndef _now_utc() -> str:\n    return (\n        datetime.now(timezone.utc)\n\
      \        .replace(microsecond=0)\n        .isoformat()\n        .replace(\"\
      +00:00\", \"Z\")\n    )\n\n\ndef _append_audit_event(event: str, extra: dict\
      \ | None = None) -> None:\n    \"\"\"Append one JSON-lines record to mcp-server-audit.jsonl\
      \ (create if missing).\n\n    True JSONL (one JSON object per line). Atomic-safe\
      \ for concurrent writers:\n    each write is a single open-append-close, so\
      \ two racing processes interleave\n    lines rather than silently dropping each\
      \ other's events. (Note: this is\n    atomic-append for the SERVER boot/stop\
      \ log; per-iteration audit_append_event\n    has different semantics -- see\
      \ audit_append_event.py docstring.)\n    \"\"\"\n    record: dict = {\"event\"\
      : event, \"timestamp_utc\": _now_utc()}\n    if extra:\n        record.update(extra)\n\
      \    AUDIT_LOG.parent.mkdir(parents=True, exist_ok=True)\n    with AUDIT_LOG.open(\"\
      a\", encoding=\"utf-8\") as f:\n        f.write(json.dumps(record) + \"\\n\"\
      )\n\n\n# ---------------------------------------------------------------------------\n\
      # Stdio JSON-RPC 2.0 server (MCP wire format)\n# ---------------------------------------------------------------------------\n\
      \ndef _send(obj: dict) -> None:\n    sys.stdout.write(json.dumps(obj) + \"\\\
      n\")\n    sys.stdout.flush()\n\n\ndef _handle_request(req: dict) -> dict | None:\n\
      \    \"\"\"Dispatch one JSON-RPC request; return response dict or None (for\
      \ notifications).\"\"\"\n    req_id = req.get(\"id\")\n    method = req.get(\"\
      method\", \"\")\n    params = req.get(\"params\") or {}\n\n    # MCP initialize\
      \ handshake\n    if method == \"initialize\":\n        return {\n          \
      \  \"jsonrpc\": \"2.0\",\n            \"id\": req_id,\n            \"result\"\
      : {\n                \"protocolVersion\": \"2024-11-05\",\n                \"\
      serverInfo\": {\"name\": \"consensus-mcp\", \"version\": \"0.1.0-skeleton\"\
      },\n                \"capabilities\": {\"tools\": {}},\n            },\n   \
      \     }\n\n    # MCP tools/list\n    if method == \"tools/list\":\n        tools\
      \ = registry.list_tools()\n        return {\n            \"jsonrpc\": \"2.0\"\
      ,\n            \"id\": req_id,\n            \"result\": {\"tools\": tools},\n\
      \        }\n\n    # MCP tools/call\n    if method == \"tools/call\":\n     \
      \   name = params.get(\"name\", \"\")\n        arguments = params.get(\"arguments\"\
      ) or {}\n        try:\n            handler = registry.get_handler(name)\n  \
      \      except KeyError:\n            return {\n                \"jsonrpc\":\
      \ \"2.0\",\n                \"id\": req_id,\n                \"error\": {\"\
      code\": -32601, \"message\": f\"tool not found: {name}\"},\n            }\n\
      \        try:\n            result = handler(**arguments)\n            return\
      \ {\n                \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n\
      \                \"result\": {\"content\": [{\"type\": \"text\", \"text\": json.dumps(result)}]},\n\
      \            }\n        except Exception as exc:\n            return {\n   \
      \             \"jsonrpc\": \"2.0\",\n                \"id\": req_id,\n     \
      \           \"error\": {\"code\": -32000, \"message\": str(exc)},\n        \
      \    }\n\n    # Notification (no id) -- no response required\n    if req_id\
      \ is None:\n        return None\n\n    return {\n        \"jsonrpc\": \"2.0\"\
      ,\n        \"id\": req_id,\n        \"error\": {\"code\": -32601, \"message\"\
      : f\"method not found: {method}\"},\n    }\n\n\ndef _serve_stdio() -> None:\n\
      \    \"\"\"Read JSON-RPC lines from stdin; write responses to stdout.\"\"\"\n\
      \    for raw_line in sys.stdin:\n        raw_line = raw_line.strip()\n     \
      \   if not raw_line:\n            continue\n        try:\n            req =\
      \ json.loads(raw_line)\n        except json.JSONDecodeError as exc:\n      \
      \      _send({\n                \"jsonrpc\": \"2.0\",\n                \"id\"\
      : None,\n                \"error\": {\"code\": -32700, \"message\": f\"parse\
      \ error: {exc}\"},\n            })\n            continue\n        resp = _handle_request(req)\n\
      \        if resp is not None:\n            _send(resp)\n\n\n# ---------------------------------------------------------------------------\n\
      # Entry point\n# ---------------------------------------------------------------------------\n\
      \ndef main(argv: list[str] | None = None) -> int:\n    parser = argparse.ArgumentParser(description=\"\
      consensus-mcp MCP server (Phase 1 skeleton)\")\n    parser.add_argument(\n \
      \       \"--boot-and-exit\",\n        action=\"store_true\",\n        help=\"\
      boot, write audit event, then exit (used by smoke test)\",\n    )\n    args\
      \ = parser.parse_args(argv)\n\n    # Boot gate: refuse to start if spec has\
      \ findings.\n    try:\n        findings = _run_disposition_check()\n    except\
      \ Exception as exc:\n        print(f\"ERROR: disposition check failed: {exc}\"\
      , file=sys.stderr)\n        return 2\n\n    if findings != 0:\n        print(\n\
      \            f\"ERROR: validate_disposition_index reports {findings} finding(s);\
      \ \"\n            \"server refuses to start.\",\n            file=sys.stderr,\n\
      \        )\n        return 2\n\n    _append_audit_event(\"mcp_server_started\"\
      , {\"findings_at_boot\": findings})\n\n    if args.boot_and_exit:\n        _append_audit_event(\"\
      mcp_server_stopped\", {\"reason\": \"boot-and-exit\"})\n        return 0\n\n\
      \    try:\n        _serve_stdio()\n    finally:\n        _append_audit_event(\"\
      mcp_server_stopped\", {\"reason\": \"stdin_eof\"})\n\n    return 0\n\n\nif __name__\
      \ == \"__main__\":\n    sys.exit(main())\n"
    pyproject.toml: "[build-system]\nrequires = [\"setuptools>=64\", \"wheel\"]\n\
      build-backend = \"setuptools.build_meta\"\n\n[project]\nname = \"consensus-mcp\"\
      \nversion = \"2.0.0\"\ndescription = \"MCP server enforcing G1-G5 consensus\
      \ gates (sealed-review provenance, canonical-006 dry-run, intra-file scope,\
      \ production-scope match, mediated ledger updates)\"\nauthors = [{name = \"\
      stgarca\"}]\nrequires-python = \">=3.10\"\nlicense = {text = \"MIT\"}\n\
      readme = \"README.md\"\ndependencies = [\n  \"pyyaml>=6.0\",\n]\n\n[project.scripts]\n\
      consensus-mcp = \"consensus_mcp.server:main\"\nconsensus-mcp-dispatch-codex\
      \ = \"consensus_mcp._dispatch_codex:main\"\n\n[tool.setuptools]\npackages =\
      \ [\n  \"consensus_mcp\",\n  \"consensus_mcp.tools\",\n  \"consensus_mcp.validators\"\
      ,\n]\ninclude-package-data = true\n\n[tool.setuptools.package-data]\nconsensus_mcp\
      \ = [\n  \"dispatch_templates/*.md\",\n  \"dispatch_templates/*.json\",\n  \"\
      docs/*.md\",\n  \"tests/fixtures/dispatch_codex/*\",\n]\n"
