    consensus_mcp/_release_gate_check.py: "\"\"\"_release_gate_check.py - run all\
      \ 10 release gates for v1.11.0.\n\nPer codex-iter0007-L2 deliverable in iteration-0007\
      \ consensus + the\n9-gate release checklist (canonical-iter0007-001 + claude-iter0007-1).\n\
      \nGates:\n  G_smoke           : in-tree _smoke_test.py exits 0 with \"60/60\
      \ tests passed\"\n  G_validators      : run_validator_tests.py exits 0 with\
      \ \"21/21 tests passed\"\n  G_frontmatter     : YAML frontmatter parses OK in\
      \ every shippable .md\n  G_unstaged        : git diff --quiet on shippable boundary\
      \ paths\n  G_untracked_pkg   : git ls-files --others --exclude-standard on boundary\
      \ -> 0\n  G_install         : python -m build wheel + pip install in clean tempvenv\n\
      \  G_install_smoke   : installed package smoke run -> 60/60\n  G_server_starts\
      \   : consensus-mcp --boot-and-exit returns 0 in <2s\n  G_real_iter       :\
      \ iteration-outcome.yaml.closing_state contains\n                      \"implementation_ready_apply_landed\"\
      \n  G_pytest_dispatch_codex : pytest test_dispatch_codex.py exits 0 with N passed\n\
      \nExit 0 iff all 10 pass. Exit 1 otherwise. Writes per-gate result dict to\n\
      stdout in human-readable form, then a final SUMMARY block.\n\nUsage:\n  python\
      \ -m consensus_mcp._release_gate_check [--repo-root PATH]\n\nPath-resolution:\
      \ same env-var override as server.py / _smoke_test.py\n(CONSENSUS_MCP_REPO_ROOT)\
      \ plus a --repo-root CLI flag for explicit\noverride. Default: in-tree parent\
      \ walk.\n\"\"\"\nfrom __future__ import annotations\nimport argparse\nimport\
      \ os\nimport shutil\nimport subprocess\nimport sys\nimport tempfile\nimport\
      \ time\nfrom pathlib import Path\n\nimport yaml\n\n\ndef _resolve_repo_root(cli_override:\
      \ str | None) -> Path:\n    if cli_override:\n        return Path(cli_override).resolve()\n\
      \    env = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if env:\n      \
      \  return Path(env).resolve()\n    return Path(__file__).resolve().parent.parent\n\
      \n\n# Paths (relative to REPO_ROOT) that the wheel ships.\nSHIPPABLE_BOUNDARY\
      \ = [\n    \"consensus_mcp\",\n    \"consensus_mcp/validators\",\n]\n\n# Paths\
      \ to gate G_unstaged scoping. Same as boundary plus the new artifacts.\nUNSTAGED_SCOPE\
      \ = [\n    \"pyproject.toml\",\n    \"consensus_mcp/_release_gate_check.py\"\
      ,\n    \"consensus_mcp/docs\",\n    \"consensus_mcp\",\n    \"consensus_mcp/validators\"\
      ,\n]\n\n\ndef _print_gate(name: str, passed: bool, detail: str = \"\") -> None:\n\
      \    mark = \"PASS\" if passed else \"FAIL\"\n    line = f\"  [{mark}] {name}\"\
      \n    if detail:\n        line += f\" -- {detail}\"\n    print(line)\n\n\ndef\
      \ gate_smoke(repo_root: Path, python: str) -> tuple[bool, str]:\n    \"\"\"\
      G_smoke: in-tree smoke 60/60 (was 59/59 pre-iter-0021).\"\"\"\n    try:\n  \
      \      result = subprocess.run(\n            [python, str(repo_root / \"consensus_mcp\"\
      \ / \"_smoke_test.py\")],\n            capture_output=True,\n            text=True,\n\
      \            cwd=str(repo_root),\n            timeout=120,\n        )\n    except\
      \ (subprocess.TimeoutExpired, OSError, subprocess.SubprocessError) as exc:\n\
      \        return False, f\"exception: {exc}\"\n    tail = (result.stdout or \"\
      \").strip().splitlines()[-1:] or [\"\"]\n    last = tail[0]\n    ok = result.returncode\
      \ == 0 and \"60/60 tests passed\" in last\n    return ok, f\"exit={result.returncode}\
      \ last={last!r}\"\n\n\ndef gate_validators(repo_root: Path, python: str) ->\
      \ tuple[bool, str]:\n    \"\"\"G_validators: run_validator_tests 21/21.\"\"\"\
      \n    try:\n        result = subprocess.run(\n            [python, str(repo_root\
      \ / \"consensus_mcp\" / \"validators\" / \"run_validator_tests.py\")],\n   \
      \         capture_output=True,\n            text=True,\n            cwd=str(repo_root),\n\
      \            timeout=120,\n        )\n    except (subprocess.TimeoutExpired,\
      \ OSError, subprocess.SubprocessError) as exc:\n        return False, f\"exception:\
      \ {exc}\"\n    tail = (result.stdout or \"\").strip().splitlines()[-1:] or [\"\
      \"]\n    last = tail[0]\n    ok = result.returncode == 0 and \"21/21 tests passed\"\
      \ in last\n    return ok, f\"exit={result.returncode} last={last!r}\"\n\n\n\
      def gate_frontmatter(repo_root: Path) -> tuple[bool, str]:\n    \"\"\"G_frontmatter:\
      \ every shippable .md has parseable frontmatter (or no frontmatter is OK).\"\
      \"\"\n    md_files: list[Path] = []\n    for rel in SHIPPABLE_BOUNDARY:\n  \
      \      base = repo_root / rel\n        if not base.exists():\n            continue\n\
      \        md_files.extend(base.rglob(\"*.md\"))\n    md_files.append(repo_root\
      \ / \"consensus_mcp\" / \"docs\" / \"README.md\")\n    md_files.append(repo_root\
      \ / \"consensus_mcp\" / \"docs\" / \"tool-reference.md\")\n    md_files.append(repo_root\
      \ / \"consensus_mcp\" / \"docs\" / \"state-schema.md\")\n    bad: list[str]\
      \ = []\n    for path in sorted(set(md_files)):\n        if not path.exists():\n\
      \            continue\n        try:\n            text = path.read_text(encoding=\"\
      utf-8\")\n        except (OSError, UnicodeDecodeError) as exc:\n           \
      \ bad.append(f\"{path.name}: read failed ({exc})\")\n            continue\n\
      \        if not text.startswith(\"---\"):\n            # No frontmatter is acceptable\
      \ for ship docs.\n            continue\n        end = text.find(\"\\n---\",\
      \ 3)\n        if end == -1:\n            bad.append(f\"{path.name}: frontmatter\
      \ unterminated\")\n            continue\n        block = text[3:end]\n     \
      \   try:\n            yaml.safe_load(block)\n        except yaml.YAMLError as\
      \ exc:\n            bad.append(f\"{path.name}: yaml parse error ({exc})\")\n\
      \    return (len(bad) == 0), (f\"checked={len(md_files)} bad={bad}\" if bad\
      \ else f\"checked={len(md_files)} all_ok\")\n\n\ndef _git(repo_root: Path, *args:\
      \ str) -> tuple[int, str, str]:\n    \"\"\"Run git; return (exitcode, stdout,\
      \ stderr) separately so callers can\n    avoid polluting structured output (e.g.\
      \ --name-only) with stderr warnings\n    like the Windows CRLF/LF normalization\
      \ message.\n    \"\"\"\n    try:\n        result = subprocess.run(\n       \
      \     [\"git\"] + list(args),\n            capture_output=True,\n          \
      \  text=True,\n            cwd=str(repo_root),\n            timeout=30,\n  \
      \      )\n        return result.returncode, (result.stdout or \"\"), (result.stderr\
      \ or \"\")\n    except (subprocess.TimeoutExpired, OSError, subprocess.SubprocessError)\
      \ as exc:\n        return -1, \"\", f\"git exception: {exc}\"\n\n\ndef gate_unstaged(repo_root:\
      \ Path) -> tuple[bool, str]:\n    \"\"\"G_unstaged: no unstaged changes inside\
      \ the boundary.\"\"\"\n    code, _out, _err = _git(repo_root, \"diff\", \"--quiet\"\
      , \"--\", *UNSTAGED_SCOPE)\n    if code == 0:\n        return True, \"no unstaged\
      \ diff in scope\"\n    if code == 1:\n        c2, out2, _ = _git(repo_root,\
      \ \"diff\", \"--name-only\", \"--\", *UNSTAGED_SCOPE)\n        names = [n for\
      \ n in (out2 or \"\").splitlines() if n.strip()]\n        return False, f\"\
      {len(names)} changed: {names[:5]}\"\n    return False, f\"git error code={code}\"\
      \n\n\ndef gate_untracked_pkg(repo_root: Path) -> tuple[bool, str]:\n    \"\"\
      \"G_untracked_pkg: no untracked files inside the boundary.\"\"\"\n    code,\
      \ out, _ = _git(\n        repo_root,\n        \"ls-files\",\n        \"--others\"\
      ,\n        \"--exclude-standard\",\n        \"--\",\n        *UNSTAGED_SCOPE,\n\
      \    )\n    if code != 0:\n        return False, f\"git error code={code}\"\n\
      \    # Filter out build artifacts (dist/, build/, *.egg-info/) intentionally:\n\
      \    # those are generated by G_install during the run itself.\n    lines =\
      \ [\n        ln for ln in (out or \"\").splitlines()\n        if ln.strip()\
      \ and \"/dist/\" not in ln and \"/build/\" not in ln\n        and \".egg-info\"\
      \ not in ln and \"__pycache__\" not in ln\n    ]\n    if lines:\n        return\
      \ False, f\"{len(lines)} untracked: {lines[:5]}\"\n    return True, \"no untracked\
      \ in scope\"\n\n\ndef gate_install(repo_root: Path, python: str, work: Path)\
      \ -> tuple[bool, str, Path | None, Path | None]:\n    \"\"\"G_install: build\
      \ wheel + pip install in clean tempvenv.\n\n    Returns (passed, detail, venv_python_path,\
      \ installed_console_script_path).\n\n    Per v1.10.2 F5 hardening: pre-clean\
      \ dist/ before build so the gate always\n    selects the just-built wheel. Naive\
      \ `sorted(dist.glob(...))[-1]` lex-sort\n    would otherwise mis-pick a stale\
      \ wheel if multiple versions coexist\n    (e.g., 1.10.1 sorts BEFORE 1.9.3rc0\
      \ lexicographically).\n    \"\"\"\n    pkg_dir = repo_root / \"scripts\" / \"\
      consensus_mcp\"\n    dist_dir = pkg_dir / \"dist\"\n    # Pre-clean dist/ so\
      \ old wheels can't shadow the new build (F5 fix).\n    if dist_dir.exists():\n\
      \        shutil.rmtree(dist_dir, ignore_errors=True)\n\n    # Build wheel with\
      \ --no-isolation so package_dir for the validators sub-package resolves.\n \
      \   # With --no-isolation, build-system requirements must already exist in the\n\
      \    # invoking interpreter. Bootstrap the minimal build tools the gate itself\n\
      \    # needs before asking `python -m build` to enforce pyproject requirements.\n\
      \    missing_build_tools = []\n    for module_name, package_name in ((\"build\"\
      , \"build\"), (\"wheel\", \"wheel\")):\n        try:\n            subprocess.run(\n\
      \                [python, \"-c\", f\"import {module_name}\"],\n            \
      \    check=True,\n                capture_output=True,\n                timeout=10,\n\
      \            )\n        except subprocess.CalledProcessError:\n            missing_build_tools.append(package_name)\n\
      \    if missing_build_tools:\n        pip_install = subprocess.run(\n      \
      \      [python, \"-m\", \"pip\", \"install\", *missing_build_tools],\n     \
      \       capture_output=True,\n            text=True,\n            timeout=180,\n\
      \        )\n        if pip_install.returncode != 0:\n            return False,\
      \ f\"could not install build tools {missing_build_tools}: {pip_install.stderr[:300]}\"\
      , None, None\n\n    build_proc = subprocess.run(\n        [python, \"-m\", \"\
      build\", str(pkg_dir), \"--wheel\", \"--no-isolation\"],\n        capture_output=True,\n\
      \        text=True,\n        timeout=300,\n    )\n    if build_proc.returncode\
      \ != 0:\n        return False, f\"build failed: {(build_proc.stderr or build_proc.stdout)[-400:]}\"\
      , None, None\n\n    dist = pkg_dir / \"dist\"\n    wheels = sorted(dist.glob(\"\
      consensus_mcp-*.whl\"))\n    if not wheels:\n        return False, \"no wheel\
      \ produced\", None, None\n    wheel = wheels[-1]\n\n    venv_dir = work / \"\
      venv\"\n    venv_proc = subprocess.run(\n        [python, \"-m\", \"venv\",\
      \ str(venv_dir)],\n        capture_output=True,\n        text=True,\n      \
      \  timeout=120,\n    )\n    if venv_proc.returncode != 0:\n        return False,\
      \ f\"venv failed: {venv_proc.stderr[:300]}\", None, None\n\n    if os.name ==\
      \ \"nt\":\n        venv_python = venv_dir / \"Scripts\" / \"python.exe\"\n \
      \       venv_console = venv_dir / \"Scripts\" / \"consensus-mcp.exe\"\n    else:\n\
      \        venv_python = venv_dir / \"bin\" / \"python\"\n        venv_console\
      \ = venv_dir / \"bin\" / \"consensus-mcp\"\n\n    pip_proc = subprocess.run(\n\
      \        [str(venv_python), \"-m\", \"pip\", \"install\", \"--quiet\", str(wheel)],\n\
      \        capture_output=True,\n        text=True,\n        timeout=300,\n  \
      \  )\n    if pip_proc.returncode != 0:\n        return False, f\"pip install\
      \ failed: {(pip_proc.stderr or pip_proc.stdout)[-400:]}\", None, None\n    return\
      \ True, f\"wheel={wheel.name}\", venv_python, venv_console\n\n\ndef gate_install_smoke(repo_root:\
      \ Path, venv_python: Path) -> tuple[bool, str]:\n    \"\"\"G_install_smoke:\
      \ smoke from installed package -> 60/60 (was 59/59 pre-iter-0021).\n\n    Smoke\
      \ needs CONSENSUS_MCP_REPO_ROOT env var so it can find fixtures\n    + spec\
      \ md back in the source repo.\n    \"\"\"\n    env = dict(os.environ)\n    env[\"\
      CONSENSUS_MCP_REPO_ROOT\"] = str(repo_root)\n    try:\n        result = subprocess.run(\n\
      \            [str(venv_python), \"-m\", \"consensus_mcp._smoke_test\"],\n  \
      \          capture_output=True,\n            text=True,\n            timeout=180,\n\
      \            env=env,\n        )\n    except (subprocess.TimeoutExpired, OSError,\
      \ subprocess.SubprocessError) as exc:\n        return False, f\"exception: {exc}\"\
      \n    last = (result.stdout or \"\").strip().splitlines()[-1:] or [\"\"]\n \
      \   ok = result.returncode == 0 and \"60/60 tests passed\" in last[0]\n    return\
      \ ok, f\"exit={result.returncode} last={last[0]!r}\"\n\n\ndef gate_server_starts(repo_root:\
      \ Path, venv_console: Path) -> tuple[bool, str]:\n    \"\"\"G_server_starts:\
      \ consensus-mcp --boot-and-exit -> exit 0 in <2s.\"\"\"\n    env = dict(os.environ)\n\
      \    env[\"CONSENSUS_MCP_REPO_ROOT\"] = str(repo_root)\n    audit_sink = Path(tempfile.gettempdir())\
      \ / f\"gate-check-mcp-audit-{os.getpid()}.jsonl\"\n    if audit_sink.exists():\n\
      \        audit_sink.unlink()\n    env[\"CONSENSUS_MCP_AUDIT_LOG\"] = str(audit_sink)\n\
      \    t0 = time.monotonic()\n    try:\n        result = subprocess.run(\n   \
      \         [str(venv_console), \"--boot-and-exit\"],\n            capture_output=True,\n\
      \            text=True,\n            timeout=10,\n            env=env,\n   \
      \     )\n    except (subprocess.TimeoutExpired, OSError, subprocess.SubprocessError)\
      \ as exc:\n        return False, f\"exception: {exc}\"\n    elapsed = time.monotonic()\
      \ - t0\n    if audit_sink.exists():\n        try:\n            audit_sink.unlink()\n\
      \        except OSError:\n            pass\n    ok = result.returncode == 0\
      \ and elapsed < 2.0\n    return ok, f\"exit={result.returncode} elapsed={elapsed:.2f}s\"\
      \n\n\ndef gate_real_iter(repo_root: Path) -> tuple[bool, str]:\n    \"\"\"G_real_iter:\
      \ at least one closed real iteration exists with a valid closing_state.\n\n\
      \    iter-0012 F4: prior implementation hardcoded iter-0007. Now scans every\n\
      \    consensus-state/active/iteration-*/iteration-outcome.yaml, accepts closing_state\n\
      \    in {quorum_close_passed, implementation_ready_apply_landed}, and proves\n\
      \    against the LATEST such iteration (lex-sorted by directory name).\n   \
      \ \"\"\"\n    accepted_states = {\"quorum_close_passed\", \"implementation_ready_apply_landed\"\
      }\n    iteration_dirs = sorted(\n        (repo_root / \"consensus-state\" /\
      \ \"active\").glob(\"iteration-*\"),\n        key=lambda p: p.name,\n    )\n\
      \    matches: list[tuple[str, str]] = []\n    parse_errors: list[str] = []\n\
      \    for d in iteration_dirs:\n        outcome = d / \"iteration-outcome.yaml\"\
      \n        if not outcome.exists():\n            continue\n        try:\n   \
      \         data = yaml.safe_load(outcome.read_text(encoding=\"utf-8\"))\n   \
      \     except (OSError, UnicodeDecodeError, yaml.YAMLError) as exc:\n       \
      \     parse_errors.append(f\"{d.name}:{exc}\")\n            continue\n     \
      \   # Per codex iter-0012 codex-rev-001: extract the closing_state token strictly.\n\
      \        # Many iteration-outcome.yaml files put the token on the first line\
      \ of a\n        # multi-line block, so isolate the first non-empty stripped\
      \ line and require\n        # exact membership in accepted_states (no substring\
      \ containment).\n        raw = (data or {}).get(\"closing_state\")\n       \
      \ first_line = \"\"\n        if isinstance(raw, str):\n            for ln in\
      \ raw.splitlines():\n                if ln.strip():\n                    first_line\
      \ = ln.strip()\n                    break\n        state = first_line\n    \
      \    if state in accepted_states:\n            matches.append((d.name, state))\n\
      \    if not matches:\n        detail = (\n            f\"no closed iteration\
      \ found in {len(iteration_dirs)} iteration-* dirs; \"\n            f\"accepted_states={sorted(accepted_states)}\"\
      \n        )\n        if parse_errors:\n            detail += f\"; parse_errors={parse_errors[:3]}\"\
      \n        return False, detail\n    latest_name, latest_state = matches[-1]\n\
      \    return True, f\"latest_closed={latest_name} closing_state={latest_state!r}\
      \ (n={len(matches)})\"\n\n\ndef gate_archive_section_24_synced(repo_root: Path,\
      \ python: str) -> tuple[bool, str]:\n    \"\"\"G_archive_section_24_synced:\
      \ spec md section 24 mirrors archive index.\n\n    Per codex 2026-05-10 v2 guardrail\
      \ #2: section-24 drift after each closed\n    iteration is a recurring failure\
      \ class (4 manual fixes this session).\n    This gate blocks close until the\
      \ mirror is current. Fix: run\n    `python_env\\\\python.exe -m consensus_mcp._sync_section_24\
      \ --apply`.\n    \"\"\"\n    env = dict(os.environ)\n    env[\"CONSENSUS_MCP_REPO_ROOT\"\
      ] = str(repo_root)\n    try:\n        result = subprocess.run(\n           \
      \ [python, \"-m\", \"consensus_mcp._sync_section_24\"],\n            capture_output=True,\n\
      \            text=True,\n            cwd=str(repo_root),\n            timeout=30,\n\
      \            env=env,\n        )\n    except (subprocess.TimeoutExpired, OSError,\
      \ subprocess.SubprocessError) as exc:\n        return False, f\"exception: {exc}\"\
      \n    ok = result.returncode == 0\n    if ok:\n        return True, \"spec md\
      \ section 24 in sync with archive index\"\n    return False, (\n        f\"\
      DRIFT: archive-index has passes not in spec md section 24. \"\n        f\"Run:\
      \ python_env\\\\python.exe -m consensus_mcp._sync_section_24 --apply\"\n   \
      \ )\n\n\ndef gate_pytest_dispatch_codex(repo_root: Path, python: str) -> tuple[bool,\
      \ str]:\n    \"\"\"G_pytest_dispatch_codex: pytest test_dispatch_codex.py exits\
      \ 0 with current expected count.\n\n    Per F7 (codex review 2026-05-09): smoke\
      \ covers import/help/template-loading;\n    this gate runs the full pytest behavior\
      \ suite so parser/subprocess/sealing\n    regressions can't pass the release\
      \ gate undetected.\n    \"\"\"\n    try:\n        result = subprocess.run(\n\
      \            [\n                python, \"-m\", \"pytest\",\n              \
      \  str(repo_root / \"scripts\" / \"consensus_mcp\" / \"tests\" / \"test_dispatch_codex.py\"\
      ),\n                \"-q\",\n            ],\n            capture_output=True,\n\
      \            text=True,\n            cwd=str(repo_root),\n            timeout=120,\n\
      \        )\n    except (subprocess.TimeoutExpired, OSError, subprocess.SubprocessError)\
      \ as exc:\n        return False, f\"exception: {exc}\"\n    tail = (result.stdout\
      \ or \"\").strip().splitlines()[-1:] or [\"\"]\n    last = tail[0]\n    # iter-0028\
      \ bumped: +14 new tests (F4 diff-body scope, F1/F2 template+validate,\n    #\
      \ F5 env-fail-closed). Prior: 67 (iter-0026 baseline).\n    # 2026-05-10 schema/validator\
      \ alignment: +1 regression test\n    # (test_patch_proposal_missing_expected_tests_rejected).\
      \ Then: 82.\n    # v1.10.5 hardening: +5 regression tests (4 containment + 1\
      \ dispatch_failed\n    # with review-target). Then: 87.\n    # iter-0033: +3\
      \ regression tests (outside_repo_review_target_via_main,\n    # mkdir_oserror_during_preflight,\
      \ containment_case_insensitive_on_windows\n    # which skips on non-win32 —\
      \ but counts in \"passed\" via skip). Local\n    # baseline 90; Windows includes\
      \ the win32 test too so still 90 on Win.\n    ok = result.returncode == 0 and\
      \ \"95 passed\" in last\n    return ok, f\"exit={result.returncode} last={last!r}\"\
      \n\n\ndef main(argv: list[str] | None = None) -> int:\n    parser = argparse.ArgumentParser(\n\
      \        description=\"Run all 10 release gates for consensus-mcp v1.11.0.\"\
      \n    )\n    parser.add_argument(\"--repo-root\", default=None, help=\"Override\
      \ REPO_ROOT.\")\n    args = parser.parse_args(argv)\n\n    repo_root = _resolve_repo_root(args.repo_root)\n\
      \    python = sys.executable\n    print(f\"REPO_ROOT: {repo_root}\")\n    print(f\"\
      PYTHON   : {python}\\n\")\n\n    results: dict[str, tuple[bool, str]] = {}\n\
      \n    print(\"Gates 1-3 (in-tree):\")\n    results[\"G_smoke\"] = gate_smoke(repo_root,\
      \ python)\n    _print_gate(\"G_smoke\", *results[\"G_smoke\"])\n    results[\"\
      G_validators\"] = gate_validators(repo_root, python)\n    _print_gate(\"G_validators\"\
      , *results[\"G_validators\"])\n    results[\"G_frontmatter\"] = gate_frontmatter(repo_root)\n\
      \    _print_gate(\"G_frontmatter\", *results[\"G_frontmatter\"])\n\n    print(\"\
      \\nGates 4-5 (git scoped):\")\n    results[\"G_unstaged\"] = gate_unstaged(repo_root)\n\
