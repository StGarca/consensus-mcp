findings:
- id: codex-rev-001
  severity: high
  summary: Release gate package path still points at the old nested extraction layout
  citation: consensus_mcp/_release_gate_check.py:166
  risk: G_install builds from repo_root/scripts/consensus_mcp, but the standalone
    extraction has a flat package at repo_root/consensus_mcp and pyproject.toml at
    repo root. In the standalone repo this gate will either fail with a missing package
    path or test the wrong leftover tree if one exists, so release validation does
    not prove the extracted package is shippable.
  recommendation: Change gate_install to build from repo_root, then select the wheel
    from repo_root/dist so the gate exercises the standalone package declared by the
    root pyproject.toml.
  patch_not_proposed_reason: A safe patch requires exact line numbers/context for
    the final standalone gate behavior plus likely test updates, but only implementation
    files are embedded; no release-gate tests or expected fixture files are available.
  patch_proposal: null
- id: codex-rev-002
  severity: medium
  summary: Server package metadata still advertises the pre-extraction skeleton version
  citation: consensus_mcp/server.py:143
  risk: MCP initialize responses report version 0.1.0-skeleton while pyproject.toml
    declares consensus-mcp 2.0.0. Clients and audit logs can misidentify the standalone
    package as the old skeleton, weakening extraction provenance and release diagnostics.
  recommendation: Update serverInfo.version to match the package version or derive
    it from installed package metadata.
  patch_not_proposed_reason: No patch proposed because deriving metadata robustly
    may require package importlib metadata tests that are not embedded in the review
    target.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: Rename mechanics are mostly updated in the reviewed files,
  but the release install gate still targets the old nested package path and server
  metadata remains stale.
