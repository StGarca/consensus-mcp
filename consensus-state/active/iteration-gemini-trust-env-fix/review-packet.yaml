      \ of the parent environment with the trust var forced\n    to \"true\" (an inherited\
      \ \"false\" must not defeat the fix). Never\n    mutates `os.environ`.\n   \
      \ \"\"\"\n    env = os.environ.copy()\n    env[\"GEMINI_CLI_TRUST_WORKSPACE\"\
      ] = \"true\"\n    return env\n\n\ndef _resolve_gemini_bin(gemini_bin: str) ->\
      \ str:\n    \"\"\"Resolve a gemini binary spec to an actual executable file\
      \ path.\n\n    Mirrors _resolve_codex_bin's Windows hardening: PATHEXT-aware\
