      \    t_stderr.join(timeout=5)\n    if t_stdout.is_alive() or t_stderr.is_alive():\n\
      \        raise GeminiInvocationError(\n            \"gemini exited but reader\
      \ thread did not drain within 5s; \"\n            \"possible partial output\
      \ or pipe-handling defect\"\n        )\n\n    with state_lock:\n        stdout_bytes\
      \ = b\"\".join(stdout_buf)\n        stderr_bytes = b\"\".join(stderr_buf)\n\n\
