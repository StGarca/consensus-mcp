      \        proc = popen_factory(\n            cmd,\n            stdin=subprocess.PIPE,\n\
      \            stdout=subprocess.PIPE,\n            stderr=subprocess.PIPE,\n\
      \            bufsize=0,\n            cwd=str(repo_root),\n            env=_gemini_subprocess_env(),\n\
      \            **popen_kwargs,\n        )\n    except FileNotFoundError:\n   \
      \     raise GeminiInvocationError(f\"gemini binary not found: {gemini_bin}\"\
      ) from None\n\n    # codex-rev-001 round-1 fix: start readers + watchdog BEFORE\
      \ writing stdin.\n    # Gemini may emit output (or refuse to drain its stdin)\
      \ before we finish\n    # sending the prompt; without readers running, that\
      \ deadlocks.\n    state_lock = threading.Lock()\n    stdout_buf: list = []\n\
      \    stderr_buf: list = []\n    last_streamed_ts: list = [None]\n    streamed_seq:\
      \ list = [0]\n\n    abort_path = None\n    if can_log:\n        abort_path =\
      \ repo_root / \"consensus-state\" / \"state\" / f\"abort-dispatch-{anchors['pass_id']}.signal\"\
      \n\n    def stdout_reader():\n        try:\n            for raw_line in iter(proc.stdout.readline,\
      \ b\"\"):\n                if not raw_line:\n                    break\n   \
      \             with state_lock:\n                    stdout_buf.append(raw_line)\n\
      \                    seq = streamed_seq[0]\n                    streamed_seq[0]\
      \ = seq + 1\n                    last_streamed_ts[0] = time_fn()\n         \
      \       if can_log:\n                    line_str = raw_line.decode(\"utf-8\"\
      , errors=\"replace\").rstrip(\"\\r\\n\")\n                    full_len = len(line_str)\n\
      \                    _log_dispatch(log_path, {\n                        \"event\"\
      : \"dispatch_streamed_line\",\n                        **anchors,\n        \
      \                \"stream\": \"stdout\",\n                        \"line_truncated\"\
      : line_str[:200],\n                        \"line_full_length\": full_len,\n\
      \                        \"truncated\": full_len > 200,\n                  \
      \      \"seq\": seq,\n                    })\n        except Exception:\n  \
      \          pass\n\n    def stderr_reader():\n        try:\n            for raw_line\
      \ in iter(proc.stderr.readline, b\"\"):\n                if not raw_line:\n\
      \                    break\n                with state_lock:\n             \
      \       stderr_buf.append(raw_line)\n        except Exception:\n           \
      \ pass\n\n    t_stdout = threading.Thread(target=stdout_reader, daemon=True,\
      \ name=\"gemini-stdout-reader\")\n    t_stderr = threading.Thread(target=stderr_reader,\
      \ daemon=True, name=\"gemini-stderr-reader\")\n    t_stdout.start()\n    t_stderr.start()\n\
      \n    # codex-rev-001 round-1 fix: write stdin AFTER readers are running so\n\
      \    # gemini-side stdout/stderr pressure can't deadlock us before drain begins.\n\
      \    # Use a writer thread (daemon) so a slow-to-drain stdin doesn't block the\n\
      \    # watchdog loop; the watchdog will still abort if the process stalls.\n\
      \    def stdin_writer():\n        try:\n            proc.stdin.write(prompt.encode(\"\
      utf-8\"))\n            proc.stdin.close()\n        except (BrokenPipeError,\
      \ OSError):\n            pass\n    t_stdin = threading.Thread(target=stdin_writer,\
      \ daemon=True, name=\"gemini-stdin-writer\")\n    t_stdin.start()\n\n    start_ts\
      \ = time_fn()\n    last_heartbeat = start_ts\n\n    while proc.poll() is None:\n\
      \        now = time_fn()\n\n        if abort_path is not None and abort_path.exists():\n\
      \            try:\n                abort_reason = abort_path.read_text(encoding=\"\
      utf-8\").strip() or \"operator_signal_file\"\n            except OSError:\n\
      \                abort_reason = \"operator_signal_file (unreadable)\"\n    \
      \        _terminate_process_tree(proc)\n            with state_lock:\n     \
      \           silence_age = (now - last_streamed_ts[0]) if last_streamed_ts[0]\
      \ is not None else None\n            if can_log:\n                _log_dispatch(log_path,\
