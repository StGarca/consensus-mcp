      \ GeminiInvocationError(\n            f\"gemini exit={proc.returncode}; stderr_tail={stderr_tail!r}{stdout_hint}\"\
      \n        )\n\n    return stdout_bytes.decode(\"utf-8\", errors=\"replace\"\
      )\n\n\n_JSON_FENCE_RE = re.compile(r\"```(?:json)?\\s*(\\{.*?\\})\\s*```\",\
      \ re.DOTALL)\n\n\ndef _extract_json_from_text(text: str) -> str:\n    \"\"\"\
      Extract a JSON object substring from gemini's free-form output.\n\n    Gemini\
      \ lacks codex's --output-schema enforcement, so its response may\n    include\
      \ leading prose, markdown fences, or trailing commentary even\n    when explicitly\
