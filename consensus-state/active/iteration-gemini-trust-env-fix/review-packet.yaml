      \ Without it gemini emits the trust error to stderr with\n    empty stdout and\
      \ the dispatch fails GeminiOutputParseError.\n\n    stall_silence_seconds defaults\
      \ to 180s (gemini cold-start can exceed 45s\n    on large prompts; matches the\
      \ codex adapter's iter-0010 default bump).\n    \"\"\"\n    if time_fn is None:\n\
      \        time_fn = time.time\n    if popen_factory is None:\n        popen_factory\
      \ = subprocess.Popen\n    can_log = log_path is not None and anchors is not\
      \ None\n\n    cmd = [\n        _resolve_gemini_bin(gemini_bin),\n        \"\
      -p\", \"Now respond. Output ONLY the JSON described above; no prose, no markdown\
      \ fences.\",\n        \"-m\", model,\n        \"--approval-mode\", \"plan\"\
