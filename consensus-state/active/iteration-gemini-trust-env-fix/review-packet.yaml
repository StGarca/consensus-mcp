      \        if lst is not None:\n            # Inter-line silence: gemini already\
      \ started emitting; use the\n            # configured stall_silence threshold.\n\
      \            silence_age = now - lst\n            silence_trigger_threshold\
      \ = stall_silence_seconds\n        else:\n            # codex-rev-001 round-2\
      \ fix: pre-first-byte silence. Gemini may\n            # process a long prompt\
