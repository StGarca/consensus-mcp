    consensus_mcp/_dispatch_gemini.py: "\"\"\"Phase 4 v1.14.0 — auto-gemini-dispatch\
      \ helper (gemini adapter).\n\nSibling of _dispatch_codex.py. Reuses generic\
      \ dispatch infrastructure from\n_dispatch_base.py (extracted in iter-0010);\
      \ supplies gemini-specific code:\nCLI invocation shape, binary resolution, output\
      \ JSON parsing with\nvalidator-retry on schemaless parse fail (per iter-0009\
      \ verdict Q2: F2b).\n\nScope (iter-0011): REVIEW-ONLY for patch authoring. Gemini\
      \ does NOT author\npatch_proposal blocks in v1.14.0; codex remains the only\
      \ patch-authoring\nadapter. Patch authoring across adapters is deferred to iter-0013\
      \ capability\nmetadata.\n\niter-0028 extension: dispatcher gained `--mode {review,proposal}`\
      \ (default\n'review') per the iter-0027 converged plan. Proposal mode uses\n\
      `gemini_proposal_template.md` + `gemini_proposal_schema.json` and accepts a\n\
      `--schema` flag to override the proposal schema (proposal-mode only;\nignored\
      \ in review mode, where validation is template-embedded).\n\nUSAGE\n-----\n\
      \  python -m consensus_mcp._dispatch_gemini \\\\\n      --goal-packet <path/to/goal_packet.yaml>\
      \ \\\\\n      --iteration-dir <path/to/iteration-XXXX/> \\\\\n      [--reviewer-id\
      \ gemini-iterXXXX-N] \\\\\n      [--pass-id gemini-iterXXXX-N-passN] \\\\\n\
      \      [--prompt-template <path>] \\\\\n      [--mode {review,proposal}] \\\\\
      \n      [--schema <path>]                    # proposal-mode only \\\\\n   \
      \   [--gemini-bin <path>] \\\\\n      [--model gemini-2.5-pro] \\\\\n      [--timeout-seconds\
      \ 600] \\\\\n      [--review-target <path>] \\\\\n      [--smoke]\n\nReview-mode\
      \ output schema: embedded in\ndispatch_templates/gemini_review_template.md (under\
      \ \"Schema reference\"),\nauthoritative — review mode has no separate --schema\
      \ flag.\n\nProposal-mode output schema: dispatch_templates/gemini_proposal_schema.json\n\
      by default; --schema overrides. The helper validates parsed output against\n\
      the effective schema and records its path + sha256 in dispatch_provenance.\n\
      \nExit 0 = sealed pass produced; non-zero = failure (gemini error, parse fail,\n\
      seal fail). JSON to stdout on success.\n\"\"\"\nfrom __future__ import annotations\n\
      \nimport argparse\nimport json\nimport os\nimport re\nimport shutil\nimport\
      \ subprocess\nimport sys\nimport tempfile\nimport threading\nimport time\nfrom\
      \ pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp._dispatch_base import\
      \ (\n    _REPO_ROOT_MARKERS,\n    RepoRootResolutionError,\n    _has_repo_markers,\n\
      \    _resolve_repo_root,\n    OutsideRepoPathError,\n    _normalize_for_compare,\n\
      \    _normalize_relative_to_repo,\n    _load_goal_packet,\n    _load_template,\n\
      \    _FENCE_LANG_BY_EXT,\n    _format_touched_files_contents,\n    _build_prompt,\n\
      \    _terminate_process_tree,\n    _sha256_str,\n    _build_sealed_packet,\n\
      \    _seal_via_t6,\n    _log_dispatch,\n)\n\n\n# Adapter-specific finding patterns.\
      \ Gemini emits gemini-rev-N IDs; the\n# codex_review_schema.json id pattern\
      \ is codex-rev-N, so we cannot share\n# the validator directly. Mirror codex's\
      \ enum + allowed-key set since the\n# semantic contract (severity values, required\
      \ fields) is identical.\n_GEMINI_FINDING_ID_PATTERN = re.compile(r\"^gemini-rev-\\\
      d+$\")\n_VALID_SEVERITIES = {\"low\", \"medium\", \"high\", \"blocking\", \"\
      critical\"}\n_REQUIRED_FINDING_FIELDS = (\"id\", \"severity\", \"summary\",\
      \ \"citation\", \"risk\", \"recommendation\")\n# iter-0011 scope: gemini does\
      \ NOT emit patch_proposal in v1.14.0. Both\n# patch_proposal and patch_not_proposed_reason\
      \ are still in the allowed set\n# (must be null per schema) but the parser enforces\
      \ patch_proposal IS null\n# (since the codex-rev- pattern wouldn't match gemini-rev-\
      \ patch IDs anyway).\n_ALLOWED_FINDING_KEYS = set(_REQUIRED_FINDING_FIELDS)\
      \ | {\"patch_proposal\", \"patch_not_proposed_reason\"}\n_ALLOWED_TOP_LEVEL_KEYS\
      \ = {\"findings\", \"goal_satisfied\", \"blocking_objections\", \"goal_satisfied_rationale\"\
      }\n_BLOCKING_SEVERITIES = {\"blocking\", \"critical\"}\n\n# Default gemini model.\
      \ Operator can override via --model.\n_DEFAULT_GEMINI_MODEL = \"gemini-2.5-pro\"\
      \n\n\nclass GeminiInvocationError(RuntimeError):\n    \"\"\"Raised when the\
      \ gemini CLI exits non-zero, times out, or is not found.\"\"\"\n\n\nclass GeminiOutputParseError(ValueError):\n\
      \    \"\"\"Raised when gemini output is not parseable JSON or lacks the expected\
      \ top-level shape.\"\"\"\n\n\ndef _gemini_subprocess_env() -> dict:\n    \"\"\
      \"Environment for the gemini subprocess.\n\n    v1.15.2 load-bearing fix (advisory\
      \ 2026-05-15): gemini CLI\n    `0.43.0-preview.0`+ refuses headless/automated\
      \ runs in an\n    \"untrusted\" directory — it writes the trust error to stderr\
      \ and\n    produces EMPTY stdout, which the dispatcher then fails as\n    `GeminiOutputParseError`.\
      \ The `--skip-trust` flag (still passed,\n    defense-in-depth) is NOT load-bearing\
      \ on this version: empirically\n    verified 2026-05-15 — with `--skip-trust`\
      \ only, gemini bypassed\n    trust but went autonomous and 429'd; with\n   \
      \ `GEMINI_CLI_TRUST_WORKSPACE=true` it produced clean deterministic\n    output\
