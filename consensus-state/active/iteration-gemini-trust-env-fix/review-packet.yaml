    CHANGELOG.md: "# Changelog\n\n## 1.15.2 - 2026-05-15\n\n**gemini-dispatch workspace-trust\
      \ fix** — closes the v1.15.1\nnamed blocker (advisory 2026-05-15, now **resolved**).\n\
      \n`consensus_mcp/_dispatch_gemini.py` now injects\n`GEMINI_CLI_TRUST_WORKSPACE=true`\
      \ into the gemini subprocess env\nvia a new `_gemini_subprocess_env()` helper\
      \ (returns a COPY of the\nparent env; forces the var to `true` even if an inherited\
      \ value is\n`false`; never mutates `os.environ`). gemini CLI\n`0.43.0-preview.0`+\
      \ refuses headless runs in an \"untrusted\"\ndirectory — it writes the trust\
      \ error to stderr and produces\n**empty stdout**, which the dispatcher then\
      \ fails as\n`GeminiOutputParseError`.\n\n**Empirically verified 2026-05-15**\
      \ (the v1.15.1 audit diagnosed\nthis first-hand; gemini pass-1 failed twice\
      \ for exactly this):\n- `--skip-trust` alone (still passed, defense-in-depth)\
      \ is NOT\n  load-bearing on this version — gemini bypassed trust but went\n\
      \  autonomous and 429'd.\n- `GEMINI_CLI_TRUST_WORKSPACE=true` produced clean\
      \ deterministic\n  output, and the two clean v1.15.1 Workflow B audit approvals.\n\
      \n`_dispatch_gemini.py` was in the v1.15.1 iteration's\n`forbidden_files`, so\
      \ the dispatcher-level fix was correctly\ndeferred to this version rather than\
      \ patched out-of-scope.\n\nWorkflow B audit clean: gemini `goal_satisfied=true`,\
      \ 0 blocking,\n0 findings — **dispatched from source with\n`GEMINI_CLI_TRUST_WORKSPACE`\
      \ explicitly unset**, so the audit pass\nof this fix was made possible BY this\
      \ fix (end-to-end in-vivo\nproof; acceptance gate A4). codex: 0 blocking; doc-accuracy\n\
      findings on the advisory/changelog wording integrated. Full suite\ngreen: 968\
      \ passed, 1 skipped, 0 regressions; 4 new unit tests for\n`_gemini_subprocess_env`\
      \ in `test_dispatch_gemini.py`.\n\n## 1.15.1 - 2026-05-15\n\n**Machine-enforcement\
      \ of the converged-plan convention** — closes the\nv1.15.0 NAMED BLOCKER. From\
      \ `iteration-converged-plan-machine-\nenforcement` (Workflow A weighted-synthesis:\
      \ claude + codex + gemini;\nshared-prior self-check PASSED; no blocking objections;\
      \ the consult\ndogfooded the very convention it enforces). The recorded v1.15.0\n\
      \"starting design\" (gemini's `severity` field + `consensus_gate.py`\nmechanism)\
      \ was **partially refuted by first-hand code-reading** during\nthe consult:\
      \ `consensus_mcp/validators/consensus_gate.py` is the\nPhase-0 production-readiness\
      \ gate (P0-V6) and is the WRONG component —\nthe v1.15.0 doctrine working correctly\
      \ on its own audit trail.\n\n**Artifact truth (scoped claim):** the **v1.15.0\
      \ tag `4e81f9e` is\nDOCTRINE-ONLY** — it shipped the convention as an authoring\
      \ convention\nenforced by the bundled skill + Workflow B audit, with **zero\
      \ engine\ncode**. Machine enforcement exists **only from the v1.15.1 tag\nforward**.\
      \ Users on v1.15.0 get doctrine; they must upgrade to v1.15.1\nto get the gate.\n\
      \nShipped (real code paths — meaningful regression signal, unlike\nv1.15.0's\
      \ doc-only change):\n\n- **`consensus_mcp/schemas/converged_plan_convention.schema.json`**\n\
      \  (NEW; `schemas/` is net-new) — JSON Schema for the convention\n  object;\
      \ `empirical_status` enum `proven|pending|refuted|n/a` matches\n  v1.15.0 verbatim.\n\
      - **`consensus_mcp/validators/validate_converged_plan.py`** (NEW;\n  small;\
      \ structure + consequence ONLY). Enforces the consequence of\n  the orchestrator-attested\
      \ `falsifiable_from_artifacts` bool — the\n  engine does **not** classify the\
      \ defect (keyword heuristics are the\n  shared-prior trap the v1.15.0 report\
      \ documents). **Recursive-trap\n  defense (highest-order constraint):** the\
      \ validator has zero code\n  path deriving any approved/correct/ready/sound\
      \ state from the\n  blocks (pinned by `test_validator_source_sets_no_correctness_state`\n\
      \  grepping the module), and every result carries an unconditional\n  `gate_scope`\
      \ disclaimer: *\"presence-and-consistency only; NOT a\n  soundness assertion\
      \ … remains a human judgement.\"* A pass means the\n  required thinking was\
      \ **recorded**, never that it is **true**.\n- **`workflow_engine._seal_converged_plan`**\
      \ — ingests the optional\n  orchestrator-authored `convention-input.yaml` via\
      \ the ONE channel\n  that already reaches seal time (a file in `iteration_dir`;\
      \ no new\n  parameter threaded through `run_iteration`/the MCP tool — codex's\n\
      \  external-refuting-observation honored), validates it, and seals the\n  blocks\
      \ **INTO** `converged-plan.yaml` (same write, same hash) with\n  required `cited_pass_ids`\
      \ (provenance-by-citation: not a loose\n  untracked sidecar, not a single-winner\
      \ extraction — gemini's\n  chain-of-evidence requirement). **Fail-closed:**\
      \ a hard-reject does\n  NOT write `converged-plan.yaml`.\n- **Graduated strictness**\
      \ (`convergence.converged_plan_enforcement`:\n  `off|warn|graduated|strict`,\
      \ default `graduated`). Hard-reject ONLY\n  (i) operator-declared safety/data-loss/bricking/irreversible\
      \ risk\n  class missing a conforming root-cause-independent\n  `independent_safeguard`,\
      \ and (ii) `empirical_status:proven` with no\n  recorded `experiment_result`;\
      \ warn + annotate `convention_violations`\n  otherwise.\n- **`consensus_get_iteration_outcome`**\
      \ surfaces `enforcement` +\n  `convention_gate_scope` + `convention_violations`;\
      \ a reader can\n  never see a pass marker without the non-soundness disclaimer\
      \ next\n  to it. Legacy / absent-convention plans (this session's iter-0043\n\
      \  .. v1.15.0) still load, explicitly marked `enforcement:\n  doctrine-only`\
      \ — **NOT silently valid, NOT rejected**.\n\n**Named blocker (need-evidence,\
      \ deferred — not a cop-out):** operator\ngoal_packet `defect_class`/`risk_class`\
      \ declaration UX + an\nanti-gaming cross-check on `falsifiable_from_artifacts`.\
      \ Both are\nill-posed until the shipped slice produces real usage data.\n\n\
      **Workflow B audit chain** (codex + gemini, post-implementation):\ngemini APPROVED\
      \ (`goal_satisfied=true`, no blocking). codex pass-1\nraised 2 blocking + 2\
      \ high — all verified against real code (no\nhallucinations; all correctly caught\
      \ the slice under-implementing\nthe converged plan) and integrated TDD-first:\
      \ the third named block\n(`decisive_experiment_before_next_iteration`) is now\
      \ schema-required\n+ validated; `doctrine-only` is a READ-time legacy classification\n\
      only (a new convergence missing blocks is validated under the\nconfigured level,\
      \ not bypassed); `convention_schema_version` is\npinned exactly (never defaulted/rewritten);\
      \ a hard-reject removes any\nstale `converged-plan.yaml` (fail-closed truly\
      \ closed). **Design\nnote (intentional, peer-converged):** under the default\
      \ `graduated`\nlevel a new *non-safety* convergence missing blocks is sealed\
      \ as\n**warn + annotate** (loudly marked via `convention_gate.\nenforcement_note`,\
      \ never a silent pass), NOT hard-rejected — this is\nthe converged plan's deliberate\
      \ q4/q5 decision (incl. codex's own\nconsult position) to avoid the rejected-goal_packet\
      \ papercut. Strict\nenforcement is opt-in via `converged_plan_enforcement: strict`.\n\
      \nFull suite green: 964 passed, 1 skipped, 0 regressions (38 new\ncode-path\
      \ tests in `test_converged_plan_convention.py`, including\nall audit-integration\
      \ fixes — they close the v1.15.0 doc-only loose\nend with a meaningful regression\
      \ signal).\n\n## 1.15.0 - 2026-05-15\n\n**Convergence-correctness doctrine**\
      \ — minor bump (cross-project\ndoctrine evolution, not a hot-patch). From\n\
      `iteration-convergence-correctness-doctrine` (Workflow A\nweighted-synthesis:\
      \ claude + codex + gemini, no blocking\nobjections; gemini dissented substantively\
      \ on prominence +\nmachine-enforcement and that dissent was incorporated, not\n\
      outvoted — the shared-prior self-check passed), derived from a\nreal downstream\
      \ failure: the ChilipadScreen ESP32-P4 i2c\nboot-loop consensus-failure report\
      \ (2026-05-15) where two clean\nstrict-majority convergences (one round-1 *unanimous*)\
      \ were both\nrefuted on-device.\n\nDoctrine added to the bundled `consensus-workflow`\
      \ skill + both\ndispatch-template preambles + a new\n`docs/workflows/converged-plan-convention.md`:\n\
      \n- **Safety interlock first (headline rule).** Safety-critical /\n  data-loss\
      \ / bricking / irreversible-risk defects MUST ship a\n  root-cause-INDEPENDENT\
      \ safeguard with the hypothesized fix,\n  valuable even if the hypothesis is\
      \ 100% false. Auditable bar:\n  \"would it still work if the root cause were\
      \ entirely\n  different?\" Field-proven: an independent boot-loop breaker\n\
      \  un-bricked a medical-safety device across two failed\n  root-cause iterations\
      \ (\"the single highest-value decision\").\n- **Convergence is agreement, not\
      \ truth.** Fast independent\n  unanimity is a verify-harder flag — a shared-prior\
      \ artifact is\n  the multi-agent analog of single-agent rationalize-away.\n\
      \  Dispatch templates now require each contributor to state the\n  differential/prior\
      \ it reasoned from (shared prior exposed at\n  reveal instead of laundered as\
      \ \"independent agreement\").\n- **Provisional-until-proven** for the defined\
      \ not-falsifiable-\n  from-artifacts class (hardware/firmware state, environment/\n\
      \  toolchain, concurrency/timing): converged root cause is\n  PROVISIONAL; \"\
      fixed/shipped/root-cause-correct\" language\n  forbidden until a pre-specified\
      \ EXTERNAL discriminating\n  experiment runs.\n- **Anti-theater property:**\
      \ a falsification is real only if its\n  refuting observation is pre-specified,\
      \ a specific observable,\n  and (for that class) external to the reasoning that\
      \ produced\n  the hypothesis.\n- **Converged-plan convention:** `falsification`,\n\
      \  `independent_safeguard`, and\n  `decisive_experiment_before_next_iteration`\
      \ blocks documented\n  as an authoring standard, doctrine-enforced now.\n\n\
      **Named blocker (sequenced follow-up):** engine/validator\nMACHINE-enforcement\
      \ of the converged-plan blocks (gemini's\n`severity` field + `consensus_gate.py`\
      \ mechanism is the recorded\nstarting design). Concrete blocker, file-verified:\
      \ no standalone\nconverged-plan schema exists; `workflow_engine.py:505-525`\
      \ reads\ngeneric YAML keys. Needs its own schema-design consult + a\nnot-falsifiable-from-artifacts\
      \ classifier first.\n\n**Field validation of v1.14.9:** the same report independently\n\
      confirmed the v1.14.9 void-seal preservation working correctly —\nvoid rounds\
      \ from the v1.14.0 path-only review bug were preserved\nas honest audit history\
      \ and correctly not counted toward\nconvergence. No new tooling; cited as regression\
      \ evidence.\n\nDoc/skill/template/memory only — no engine, config, or code\n\
      paths touched. Full test suite green, 0 regressions.\n\n## 1.14.9 - 2026-05-15\n\
      \nSeal-pipeline defect fix from iteration-seal-archive-collision-fix\n(workflow\
      \ A weighted-synthesis convergence; codex + gemini + claude;\nno blocking objections).\
      \ Workflow B audit of the implementation by\ncodex + gemini.\n\n**Defect:**\
      \ `review_write_and_seal.handle` built the archive filename\nfrom `reviewer_id`\
      \ only (`{date}-{iteration_id}-{reviewer_id}-pass.yaml`),\nwhile the index keys\
      \ uniqueness on `pass_id`. Re-using a reviewer_id\nacross passes (e.g. `gemini-iteration-0012-2`\
      \ for pass1 AND pass2)\nproduced a hard `packet_path_collision` at the path-exists\
      \ guard\n*before* the pass_id-aware index logic ever ran — forcing operators\n\
      to mint throwaway reviewer-ids per attempt. `test_contributors.py:135`'s\ndocstring\
      \ (\"filename must contain iteration_id + reviewer_id + pass_id\ntokens\") documented\
      \ the intended 4-token contract; the implementation\nhad silently regressed\
      \ to 3 tokens at/before extraction.\n\n**Fix (`consensus_mcp/tools/review_write_and_seal.py`):**\n\
      \n- Archive filename is now 4-token:\n  `{date}-{iteration_id}-{reviewer_id}-{safe_pass_id}-pass.yaml`.\n\
      \  Filename uniqueness key == index uniqueness key (pass_id).\n- New `_sanitize_for_filename`:\
      \ maps `[^A-Za-z0-9._-]`→`-`, collapses\n  runs, strips, falls back to `pass`.\
      \ Applied to the FILENAME only —\n  the raw `pass_id` is preserved verbatim\
      \ in the index entry and\n  packet body.\n- The index `pass_id` lookup is REORDERED\
      \ ahead of the path-exists\n  guard, and idempotency is judged on **content\
      \ identity** — the\n  canonical hash of the packet with the volatile seal-provenance\n\
      \  fields (`sealed_at_utc`, `packet_sha256`) stripped — compared\n  against\
      \ the actual ON-DISK archived packet. An exact re-seal is\n  an idempotent SUCCESS\
      \ (`idempotent: true`, `index_updated:\n  false`, existing recorded path; scheme-agnostic\
      \ so old-scheme\n  archives still resolve) **regardless of seal time**. This\n\
      \  matters because a dispatch retry builds a fresh packet with no\n  `sealed_at_utc`;\
      \ a sha-based check would see a new timestamped\n  hash and mis-classify the\
      \ retry as a collision — defeating the\n  whole feature for its primary use\
      \ case (caught by codex Workflow\n  B audit, HIGH).\n- Integrity guard on the\
      \ idempotent path: a tampered archive that\n  no longer matches the incoming\
      \ content identity yields\n  `index_collision`; one that parses as valid **non-mapping**\
      \ YAML\n  (list/scalar) yields `idempotent_target_integrity_mismatch`\n  without\
      \ crashing; a deleted/unreadable archive yields\n  `idempotent_target_missing`\
      \ / `_unreadable`. The idempotent\n  success return reports the **authoritative\
      \ on-disk artifact\n  hash** (the file's own `packet_sha256`, or a reconstruction\
      \ if\n  absent), never a missing/stale value copied from the index.\n- The sealed\
      \ body now always self-records the canonical `pass_id`\n  (`packet.setdefault`),\
      \ including for pass-label-only packets,\n  and a parameter-vs-body `pass_id`\
      \ consistency guard mirrors the\n  existing `iteration_id` / `reviewer_id` guards.\n\
      - `index_collision` (same pass_id, substantively *different*\n  content) preserved\
      \ with a content-identity-based detail string.\n- path-exists guard retained\
      \ as a defense-in-depth backstop with a\n  distinct detail string (unreachable\
      \ in normal flow).\n- `output_schema` + the `handle()` docstring updated to\
      \ document\n  the new `idempotent` success field and all new error codes; a\n\
      \  schema-contract test pins every `handle()` error code to the\n  schema enum\
      \ so this drift cannot silently regress.\n\n**Workflow B audit chain** (post-review;\
      \ codex iterated, gemini\napproved the core design): gemini APPROVED with no\
      \ findings; codex\nsurfaced and drove resolution of 6 distinct real gaps across\
      \ 4\naudit passes — output-schema drift, missing pass_id consistency\nguard,\
      \ a HIGH timestamp-dependent-idempotency defect, a\nnon-mapping-archive crash,\
      \ pass-label body identity, and a\nstale/missing idempotent-return hash — before\
      \ reaching\n`goal_satisfied: true` with no blocking objections. The HIGH\nfinding\
      \ (idempotency silently broken by the pre-existing\n`sealed_at_utc`-in-hash\
      \ stamp) would have shipped a dead feature\nwithout this audit.\n\n**Backward\
      \ compat:** the 162 existing archives are NOT migrated.\n`review_read_post_seal`\
      \ resolves via the index's stored relative\npath and never parses the filename,\
      \ so old-scheme archives remain\nfully readable. Mixed-scheme archive directory\
      \ across the v1.14.x\nboundary is expected; the index is the resolution source\
      \ of truth.\n\n**Tests:** new `consensus_mcp/tests/test_seal_collision_fix.py`\n\
      (19 cases: the exact `gemini-iteration-0012-2` same-reviewer-\ndistinct-pass\
      \ scenario; timestamp-independent idempotent success;\nnon-mapping-archive integrity\
      \ guard; target-missing; pass_id\nparameter/body consistency; pass-label body\
      \ identity stamping;\nauthoritative-hash return when the index sha is blank;\n\
      hostile-pass_id sanitization; schema-contract pinning of every\n`handle()` error\
      \ code); `test_contributors.py` fake_t6 helpers\nupdated to the 4-token scheme.\
      \ Full suite **723 pass, 0\nregressions** (excluding the pre-existing `test_dispatch_codex`\n\
      ordering flake + `jsonschema`-missing environmental issue, both\npredating this\
      \ work).\n\n**Deferred with stated reasons** (recorded, not silently dropped):\n\
      \n- `superseded_by` index annotation for void seals — 2/3\n  contributors scoped\
      \ it out as beyond the minimal defect; file\n  preservation alone already satisfies\
      \ the audit-history\n  requirement. Own small consult if causal supersession\
      \ tracking\n  is wanted.\n- Forensic scan of the 162 existing archives for latent\
      \ mis-seals\n  — blocked on an undefined remediation model for immutable sealed\n\
      \  history.\n- `index.yaml` non-atomic read-modify-write race — pre-existing,\n\
      \  orthogonal; separate hardening consult.\n\nCarried forward from the overnight\
      \ run (still open, unchanged):\nWorkflow C multi-iteration engine (v1.15.0 named\
      \ blocker); iter-0045\nPHASE_CONVERGE mapping empirical evaluation; project-level\n\
      `.consensus/autonomous-policy.yaml`.\n\n## 1.14.8 - 2026-05-14\n\niter-5 of\
      \ autonomous run-2026-05-15-overnight. Bundled\n`consensus_mcp/claude_extensions/skills/consensus/SKILL.md`\
      \ (the\nbootstrap skill that triggers on \"consensus init\") gains a\n\"Workflow\
      \ modes the operator can pick (v1.14.4+)\" section:\n\n- Documents Workflow\
      \ A (propose-converge, default), Workflow B\n  (post-review, lightweight), Workflow\
      \ C (autonomous-execute,\n  v1.14.4 contract / v1.15.0 engine), and advisory.\n\
      - Notes the numeric-alias deprecation cycle.\n- Cross-references the operating-procedure\
      \ skill\n  (`~/.claude/skills/consensus-workflow/SKILL.md`) as the\n  load-bearing\
      \ reference for dispatch rules and halt conditions.\n\nOperators running `consensus\
      \ init` for the first time will now see\nthe workflow-mode vocabulary at bootstrap\
      \ time instead of having to\ndiscover it from the `--help` output.\n\nNo code\
      \ changes; doc only. 704 tests pass.\n\n## 1.14.7 - 2026-05-14\n\nDoc hot-patch\
      \ from autonomous run-2026-05-15-overnight iter-4. Two\nstale references that\
      \ user-facing surfaces still showed:\n\n- `README.md` \"Status\" section bumped\
      \ from \"1.14.0 — multi-AI\n  contributor pool, blind-first-reveal workflow\
      \ #4 ...\" to a\n  \"v1.14.6 (current)\" header + per-release train summary\
      \ covering\n  v1.14.0 → v1.14.6. Includes pointer to `docs/advisories.md` for\n\
      \  known-defect-release upgrade guidance.\n- `consensus_mcp/claude_extensions/skills/consensus-workflow/SKILL.md`\n\
