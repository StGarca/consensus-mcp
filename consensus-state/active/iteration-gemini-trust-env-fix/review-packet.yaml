      watchdog_silence\",\n                    \"abort_reason\": f\"no gemini stdout\
      \ for {silence_age:.0f}s (threshold {silence_trigger_threshold:.0f}s)\",\n \
      \                   \"age_seconds\": now - start_ts,\n                    \"\
