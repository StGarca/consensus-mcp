      \  `FakeRaisesDispatchError`) for hermetic tests.\n- `workflow_engine.py` —\
      \ `WorkflowEngine.run_iteration()` routes per\n  `workflow.mode` to one of three\
      \ runners. Workflow #3 dispatches non-\n  claude contributors as post-review\
      \ reviewers. Workflow #4 runs blind-\n  proposal phase then reveal-and-converge\
      \ rounds with all contributors\n  seeing the full set of prior round artifacts.\
      \ Convergence evaluation\n  applies the rule across responsive contributors,\
      \ mapped to config\n  contributor keys (not adapter names). Timeout policies\
      \ adjust the\n  effective denominator and block-vote set.\n- `_init_wizard.py`\
      \ — `consensus init` CLI. Interactive (default) +\n  `--non-interactive` + `--accept-defaults`\
      \ + `--reconfigure` + `--check`\n  + `--print-defaults` + `--dry-run` + `--force`\
      \ + `--config <path>` +\n  `--no-update-gitignore`. Exit codes 0/1/2/3/4 per\
      \ converged-plan\n  Section A. Atomic temp+rename writes. `.gitignore` managed-block\
      \ with\n  bracketed markers (`# >>> consensus-mcp managed <<<` /\n  `# <<< consensus-mcp\
      \ managed >>>`), idempotent across reruns even with\n  malformed (orphan, reversed,\
      \ nested) user-supplied markers — orphan\n  markers are preserved untouched.\
      \ Repo-root detection walks upward for\n  `.git`.\n\n**Packaging (iter-0017):**\n\
      \n- `[tool.setuptools].packages` includes `consensus_mcp.contributors`.\n- `[project.scripts]`\
      \ adds `consensus-init` and\n  `consensus-mcp-dispatch-gemini` alongside existing\
      \ entries.\n\n**Workflow + provenance discipline:**\n\nEvery non-trivial change\
      \ shipped on v1.14.0 went through workflow #3 with\ncodex + gemini reviewing\
      \ in parallel. iter-0015 was the canonical\nworkflow #4 design consult (blind\
      \ proposals from claude + codex + gemini,\nthen convergence rounds). iter-0016d\
      \ converged after 6 review rounds\n(both reviewers goal_satisfied=true, zero\
      \ findings). iter-0017 converged\non first pass.\n\n**Test isolation (iter-0019):**\n\
      \n- The 5 long-standing test_dispatch_codex.py full-suite failures are\n  fixed.\
      \ Root cause: `review_write_and_seal.py` and `audit_append_event.py`\n  cache\
      \ `REPO_ROOT` / `ARCHIVE_DIR` / `INDEX_PATH` / `ACTIVE_DIR` at module\n  import\
      \ time, so `monkeypatch.setenv(\"CONSENSUS_MCP_REPO_ROOT\", str(tmp_path))`\n\
      \  in tests had no effect — sealed packets landed in the real archive index,\n\
      \  polluting subsequent test runs. iter-0019 adds an `_isolate_archive_root`\n\
      \  test helper that monkeypatches the cached module attributes directly, so\n\
      \  every dispatch test now seals into a tmp_path-isolated archive. Full\n  suite:\
      \ 658 pass + 1 skipped + 0 fail under any ordering.\n\n**Lazy path resolution\
      \ (iter-0024 design consult → iter-0025 Phase A\n→ iter-0026 first per-tool\
      \ migration):**\n\n- iter-0024 ran the workflow #4 consult on whether to refactor\
      \ the\n  module-level `REPO_ROOT` caches into lazy resolvers. Converged on\n\
      \  SHIP-PHASED: introduce `_paths.py` first (Phase A), then migrate\n  tools\
      \ one at a time (Phase B).\n- iter-0025 (Phase A): introduced `consensus_mcp/_paths.py`\
      \ with 9\n  lazy-resolver functions (`repo_root`, `state_root`, `project_root`,\n\
      \  `spec_path`, `archive_dir`, `index_path`, `active_dir`,\n  `audit_log_path`,\
      \ `dispatch_log_path`). Each reads env state on\n  every call. Backward compatible\
      \ — no existing tool touched.\n- iter-0026 (Phase B step 1): migrated `state_read_decision_ledger`\n\
      \  to use `_paths.state_root()`. First test coverage for that tool\n  (5 new\
      \ tests including the lazy-resolution regression demo).\n- iter-0034 (Phase\
      \ B step 2): migrated `repo_get_section` to\n  `_paths.project_root()`. Removed\
      \ local `_resolve_repo_root`.\n- iter-0035 (Phase B steps 3-8): batched 6 LOW-impact\
      \ tools onto\n  the lazy resolvers in one commit — `repo_set_section`,\n  `state_update_decision_ledger`,\
      \ `patch_stage_and_dry_run`,\n  `patch_apply_consensus_patch`,\n  `gate_evaluate_production_with_scope_match`,\
      \ `review_read_post_seal`.\n  PEP 562 `__getattr__` hooks added per-tool for\
      \ external\n  `module.REPO_ROOT` back-compat.\n- iter-0036 (Phase B step 9,\
      \ HIGH-impact audit-trail tool): migrated\n  `audit_append_event` from cached\
      \ `REPO_ROOT/ACTIVE_DIR` to lazy\n  `project_root()`/`active_dir()`. Cleaned\
      \ up 3 closure_invariant\n  tests that used unsafe `monkeypatch.setattr(audit_append_event,\n\
      \  \"ACTIVE_DIR\", tmp_path)` — pytest's monkeypatch captures the\n  `__getattr__`-synthesized\
      \ value at setattr time and restores it\n  into `__dict__` at teardown, permanently\
      \ poisoning subsequent\n  tests. Switched to `monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\"\
      ,\n  ...)` matching the iter_0018 pattern.\n- iter-0037 (Phase B step 10, final\
      \ + HIGHEST-impact seal-pipeline\n  tool): migrated `review_write_and_seal`\
      \ from cached\n  `REPO_ROOT/ARCHIVE_DIR/INDEX_PATH` plus the in-handle\n  `from\
      \ consensus_mcp.tools.audit_append_event import ACTIVE_DIR`\n  capture to lazy\
      \ `project_root()`/`archive_dir()`/`index_path()`/\n  `active_dir()` resolvers.\
      \ `_isolate_archive_root` test helper in\n  `test_dispatch_codex.py` simplified\
      \ — only `monkeypatch.setenv(\n  \"CONSENSUS_MCP_REPO_ROOT\", ...)` remains;\
      \ the previously-required\n  5 `setattr` calls (now unsafe against `__getattr__`\
      \ attributes)\n  are gone.\n\n**Claude Code bootstrap pack (iter-0039 design\
      \ → iter-0040 implementation):**\n\n- iter-0039 ran a workflow #4 consult (claude\
      \ + codex + gemini, all\n  proposal-mode, strict-majority convergence) on the\
      \ discoverability\n  gap reported by the operator after iter-0033: in a fresh\
      \ project,\n  typing \"consensus init\" into Claude Code chat returned \"I don't\n\
      \  recognize this command\" because the pipx install registers a\n  shell binary\
      \ (`consensus-init`) not a Claude Code surface. All\n  three contributors converged\
      \ on shipping a Claude-Code-native entry\n  point that wraps the existing shell\
      \ binary.\n- iter-0040 implemented the converged plan. New shipped assets:\n\
      \  - `consensus_mcp/claude_extensions/skills/consensus/SKILL.md`\n    triggers\
      \ on \"consensus init\", \"bootstrap consensus\", \"set up\n    consensus\"\
      \ and runs the shell binary via Bash.\n  - `consensus_mcp/claude_extensions/commands/consensus-init.md`\n\
      \    gives explicit `/consensus-init` slash-command discoverability.\n- New\
      \ `consensus-init --install-claude-code` flag copies both into\n  `$CLAUDE_HOME`\
      \ (default `~/.claude`) using a managed idempotent\n  pattern: byte-identical\
      \ = no-op; divergent = skip-with-warning;\n  `--force` overwrites. Honors `CLAUDE_HOME`\
      \ env override for\n  non-default installs (CI, devcontainers, multi-user systems).\n\
      - New `consensus-init --from-claude-code` flag prints contextual\n  reload guidance\
      \ after a successful init (\"restart Claude Code or\n  run `/mcp` to activate\
      \ the consensus-mcp server\"). Used by both\n  the skill and slash command bodies;\
      \ deterministic so we don't\n  rely on env-var sniffing (codex's preferred convergence\n\
      \  resolution per iter-0039 Q4).\n- Bonus from iter-0039 Q6: added `consensus`\
      \ console-script alias\n  to pyproject.toml so `consensus init` (with a SPACE)\
      \ at the\n  shell works alongside the hyphenated `consensus-init`. The\n  `init`\
      \ subcommand is stripped from argv[0] inside `main()`;\n  everything else flows\
      \ through the same argparse setup.\n- Side-effect hot-fix landed in the same\
      \ release: the proposal-mode\n  validation path in `_dispatch_codex.py` / `_dispatch_gemini.py`\n\
      \  did `try: import jsonschema; ...; except jsonschema.ValidationError`\n  —\
      \ when the import failed (because `jsonschema` wasn't a declared\n  dep), the\
      \ except clause's reference to `jsonschema.ValidationError`\n  surfaced as `UnboundLocalError`,\
      \ masking the real problem and\n  blocking iter-0039 from running in the pipx\
      \ venv. Added\n  `jsonschema>=4.0` to deps + split the try/except so `ImportError`\n\
      \  surfaces with actionable wording. (workflow #3 hot-patch because\n  it blocked\
      \ iter-0039 progress.)\n\n**Phase B closed.** All 10 tool migrations landed\
      \ (iter-0026..0037).\nNo tool now holds a cached module-level `REPO_ROOT`/`ACTIVE_DIR`/\n\
      `ARCHIVE_DIR`/`INDEX_PATH`/etc. — every path read is lazy and honors\nenv-var\
      \ redirection at call time. Suite green at 773 passed,\n1 skipped. The cross-project\
      \ pipx install pattern from iter-0030\nnow works in any project: `pipx install\
      \ consensus-mcp` once, then\n`consensus-init` in any project writes a working\
      \ `.mcp.json` and\nthe lazy resolvers pick up the per-project state root automatically.\n\
      \n**Codex proposal mode (iter-0027 → iter-0028):**\n\n- iter-0021 and iter-0024\
      \ design consults discovered that codex\n  structurally-abstained on every workflow\
      \ #4 dispatch because the\n  codex review template is hard-coded for code-review\
      \ tasks: codex\n  kept returning \"missing review target\" errors instead of\
      \ engaging\n  with design questions. Documented as \"structural-abstention\"\
      \ in\n  prior converged plans.\n- iter-0027 ran the workflow #4 consult on what\
      \ to do about it.\n  Claude and gemini independently picked \"fix codex template\
      \ friction\"\n  as the highest-leverage move. Codex itself structurally-abstained\n\
      \  on this very consult (proving the problem).\n- iter-0028 shipped `--mode\
      \ {review,proposal}` on both codex and\n  gemini dispatchers. New `codex_proposal_template.md`\
      \ and\n  `codex_proposal_schema.json` (plus gemini equivalents) frame the\n\
      \  task as proposal generation, not code review. Proposal schema\n  enforces\
      \ `selected_target`, `rationale_vs_alternatives`,\n  `deliverable_scope`, `risks`,\
      \ `estimated_complexity`,\n  `structural_abstention`. The seal pipeline detects\
      \ proposal-shape\n  payloads and embeds them under a top-level `proposal` block\
      \ in the\n  sealed YAML while keeping outer review-shape fields valid (empty\n\
      \  findings, computed goal_satisfied) for audit-event compatibility.\n- iter-0029:\
      \ smoke test of proposal mode on a synthetic design\n  question — codex returned\
      \ a proper proposal-shape sealed YAML.\n- iter-0030: **first real workflow #4\
      \ consult where codex engaged\n  substantively as a peer.** The meta-arc iter-0021\
      \ → iter-0024 →\n  iter-0027 → iter-0028 → iter-0030 closed: the project that\
      \ proves\n  cross-AI consensus works now genuinely produces three-AI consensus\n\
      \  on its own design questions (gemini env-abstaining due to upstream\n  capacity\
      \ issues notwithstanding).\n\n**`consensus-init` auto-bootstraps `.mcp.json`\
      \ (iter-0030 design →\niter-0031 implementation):**\n\n- iter-0030 converged\
      \ on extending `consensus-init` to write\n  `.mcp.json` automatically. Two substantive\
      \ votes (claude + codex)\n  agreed on merge-mode for existing files + opt-out\
      \ flag +\n  marker-based project-root detection + PATH-portable command\n  discovery\
      \ + byte-for-byte idempotency.\n- iter-0031 implemented the converged design.\
      \ New flags: `--no-mcp-json`\n  (opt out), `--mcp-command STR` (override), `--mcp-force`\
      \ (replace\n  existing consensus-mcp entry on divergence). Merge mode preserves\n\
      \  other MCP servers; conflict detection skip+warns instead of\n  clobbering;\
      \ malformed JSON skip+warns instead of mutating.\n- `_detect_repo_root` extended\
      \ from `.git`-only to marker-based:\n  `git rev-parse --show-toplevel` → strong\
      \ markers (.git,\n  pyproject.toml, package.json, CLAUDE.md, .mcp.json, consensus-state)\n\
      \  → cwd fallback.\n- Operator UX is now one command: `pipx install consensus-mcp`,\
      \ then\n  `cd <any-project>; consensus-init`. The wizard writes\n  `.consensus/config.yaml`\
      \ + `.gitignore` managed block + `.mcp.json`\n  (with correct PATH-portable\
      \ command + per-project env vars).\n\n**Defaulting to workflow #4 for design\
      \ questions** (operator policy\ncorrection mid-v1.14.0):\n\nThe original heuristic\
      \ \"workflow #3 for execution; workflow #4 for\nexplicit design questions\"\
      \ was systematically biased toward #3\nbecause of cost asymmetry. Corrected\
      \ mid-cycle: default to workflow\n#4 for any decision with real design surface;\
      \ require an explicit\nreason to fall back to #3. iter-0027 onward applies this\
      \ rule. Saved\nto operator memory as\n[[feedback-default-workflow-4-for-design]].\n\
      \n**Operator memories saved during v1.14.0 cycle:**\n\n- `feedback_no_phantom_proceed.md`\
      \ — never end a turn with \"proceeding\n  with X\" unless the tool call is in\
      \ the same turn\n- `feedback_gemini_429_skip.md` — priority-tiered handling\
      \ of upstream\n  Gemini 429 errors: low-priority iterations skip gemini on first\n\
      \  failure; high-priority iterations allow one retry\n\n**Deferred to a follow-up\
      \ iteration:**\n\n- 20 stale `iter-9999-*` fixture entries remain in\n  `consensus-state/archive/review-passes/index.yaml`.\
      \ Cosmetic only;\n  separate cleanup iteration if desired.\n- Phase C cleanup\
      \ of `_isolate_archive_root`-style fixtures that are\n  now no-ops or simplifiable;\
      \ the test helpers still work but most of\n  the `monkeypatch.setattr` calls\
      \ inside them became redundant once\n  Phase B finished. Pure refactor, no behavior\
      \ change.\n\n## 1.13.0 - 2026-05-12\n\nMulti-project resolution: consensus-mcp\
      \ now boots in any project without a\nlocal checkout. The frozen wheel ships\
      \ a spec template, and state auto-\ninitializes in CWD.\n\n**Changes (per iter-0007\
      \ codex consult, sealed packet 39f8b7a8b...):**\n\n- New resolvers in `server.py`\
      \ split the legacy `REPO_ROOT` into three\n  concerns: `_resolve_spec_path`\
      \ (spec source), `_resolve_state_root`\n  (`consensus-state/` location), `_resolve_project_root`\
      \ (reviewable-file\n  root for goal_packet `allowed_files`).\n- Resolution order\
      \ for each:\n  - Spec: `CONSENSUS_MCP_SPEC_PATH` > legacy `CONSENSUS_MCP_REPO_ROOT`\
      \ >\n    walked-up checkout > shipped `consensus_mcp/spec_template.md`\n  -\
      \ State: `CONSENSUS_MCP_STATE_ROOT` > legacy `CONSENSUS_MCP_REPO_ROOT` >\n \
      \   `Path.cwd() / \"consensus-state\"`\n  - Project: `CONSENSUS_MCP_PROJECT_ROOT`\
      \ > legacy `CONSENSUS_MCP_REPO_ROOT`\n    > `Path.cwd()`\n- `consensus_mcp/spec_template.md`\
      \ shipped in the wheel (added to\n  `pyproject.toml [tool.setuptools.package-data]`).\
      \ Frozen-wheel users get a\n  bootable spec without cloning.\n- `_resolve_repo_root`\
      \ kept for back-compat; no longer load-bearing for\n  spec/state/project-root\
      \ in v1.13.0.\n\n**Deferred to v1.14.0** (per codex Q1 scoping):\n\n- Dispatcher\
      \ auto-discovery of `iteration_dir/review-packet.yaml` when\n  `--review-target`\
      \ is non-yaml (currently silent-failure, prompt ships\n  without embedded touched-file\
      \ contents).\n- Cold-start grace period for the watchdog (pre-first-byte vs.\n\
      \  post-first-byte silence thresholds; 45s is too aggressive for bigger\n  prompts).\n\
      - Visibility upgrade: dispatch_heartbeat events should expose a `status`\n \
      \ field (loading / streaming / stalled) for operator clarity.\n\n**Known pre-existing\
      \ pytest flake** (predates v1.13.0; **fixed in v1.14.0\niter-0019**): 5 tests\
      \ in `test_dispatch_codex.py` that pass in isolation\nbut fail in the full suite\
      \ due to test-ordering pollution. Not introduced\nby v1.13.0; tracked separately.\
      \ See the v1.14.0 \"Test isolation\" section\nabove for the resolution.\n\n\
      ## 1.12.0 - 2026-05-11\n\nStandalone release. Extracted from upstream-26.4.16\
      \ source\nproject. See `docs/architecture/codex-fix-author-roadmap.md` for the\
      \ work\nhistory that led here.\n\nRenames vs the prior internal-only releases\
      \ (1.0.0 - 1.11.0):\n\n- Python package `agent_loop_mcp` -> `consensus_mcp`\n\
      - Python package `agent_loop` (validators) -> `consensus_mcp.validators`\n-\
      \ State directory `agent-loop/` -> `consensus-state/`\n- Env var `AGENT_LOOP_MCP_REPO_ROOT`\
      \ -> `CONSENSUS_MCP_REPO_ROOT`\n- MCP server name `agent-loop-mcp` -> `consensus-mcp`\n\
      - Repo-root markers updated to `(\"consensus-state\", \"consensus_mcp\")`\n\
      - Flat layout (no `scripts/` prefix)\n"
    docs/advisories.md: "# Advisories\n\nStanding channel for \"shipped artifact has\
      \ known doctrine drift\"\nnotices. Each advisory names the affected versions,\
      \ the issue, the\ncorrect version to upgrade to, and any user action required.\n\
      \nFormat: append-only, newest first. Older advisories may be marked\n**resolved**\
      \ when no users remain on the affected versions, but\nthe entry stays for the\
      \ historical record.\n\n---\n\n## Advisory 2026-05-15: gemini dispatch fails\
      \ on gemini CLI ≥ 0.43.0-preview.0\n\n**RESOLVED in `v1.15.2`** — `_dispatch_gemini.py`\
      \ now injects\n`GEMINI_CLI_TRUST_WORKSPACE=true` into the gemini subprocess\
      \ env\n(`_gemini_subprocess_env()`). Users on `v1.15.1` or earlier with\ngemini\
      \ CLI ≥ 0.43.0-preview.0 must upgrade to `v1.15.2` (or apply\nthe env-var workaround\
      \ below until they do). Entry retained for the\nhistorical record.\n\n**Affected\
      \ versions:** all consensus-mcp versions through `v1.15.1`\n(the gemini dispatcher\
      \ behavior is unchanged across this range).\n\n**Severity:** Functional — gemini\
      \ peer reviews silently fail to\nseal when the installed `gemini` CLI enforces\
      \ workspace trust.\ncodex + claude consensus is unaffected; the cross-AI safety\
      \ net\ndegrades from 3-AI to 2-AI until worked around.\n\n**Issue:**\n- `gemini`\
      \ CLI `0.43.0-preview.0`+ refuses headless/automated runs\n  in an \"untrusted\"\
      \ directory, emitting the trust error to stderr\n  and **empty stdout**. `consensus_mcp/_dispatch_gemini.py`\
      \ did\n  not set `GEMINI_CLI_TRUST_WORKSPACE`; it already passed\n  `--skip-trust`,\
      \ but that flag is **not load-bearing** on this CLI\n  version (empirically:\
      \ with `--skip-trust` only, gemini bypassed\n  trust but went autonomous and\
      \ 429'd). So the dispatcher saw empty\n  output and failed `GeminiOutputParseError`\
      \ (\"Expecting value:\n  line 1 column 1\").\n- Observed first-hand 2026-05-15\
      \ during the v1.15.1 Workflow B\n  audit: gemini pass-1 failed twice (initial\
      \ + dispatcher\n  auto-retry) for exactly this reason.\n\n**Workaround (no upgrade\
      \ needed):** export\n`GEMINI_CLI_TRUST_WORKSPACE=true` in the environment that\
      \ runs the\ndispatcher (or the MCP server). The v1.15.1 audit was completed\n\
      this way; gemini returned clean approvals once the env var was set.\n\n**Correct\
      \ upgrade target:** `v1.15.2` — ships the dispatcher-level\nfix (`_gemini_subprocess_env()`\
      \ injects\n`GEMINI_CLI_TRUST_WORKSPACE=true` into the gemini subprocess env).\n\
      `_dispatch_gemini.py` was in the v1.15.1 iteration's\n`forbidden_files`, so\
      \ the fix was correctly deferred to v1.15.2\nrather than patched out-of-scope.\
      \ The env-var workaround above\nremains valid for anyone still on ≤ v1.15.1.\n\
      \n**Provenance:**\n- Diagnosed during `iteration-converged-plan-machine-enforcement`\n\
      \  (v1.15.1 Workflow B audit); recorded there as a v1.15.2 named\n  blocker\
      \ in `fix-response-pass2.md`.\n- Fixed in `iteration-gemini-trust-env-fix` (v1.15.2;\
      \ Workflow B\n  audit clean — gemini approved end-to-end via the source fix\
      \ with\n  the env-var workaround explicitly unset; codex doc-accuracy\n  findings\
      \ integrated).\n\n---\n\n## Advisory 2026-05-15: v1.15.0 converged-plan convention\
      \ is doctrine-only\n\n**Affected versions:** `v1.15.0`\n\n**Severity:** Scope\
      \ clarification (no regression). The v1.15.0 tag\n`4e81f9e` shipped the converged-plan\
      \ convention\n(`falsification` / `independent_safeguard` /\n`decisive_experiment_before_next_iteration`)\
      \ as an **authoring\nconvention enforced by doctrine only** — bundled skill\
      \ + Workflow\nB audit, **zero engine code**.\n\n**Issue:** users on `v1.15.0`\
      \ may assume the convention is\nmachine-validated. It is not. There is no schema,\
      \ no validator, no\nseal-time gate on `v1.15.0`.\n\n**Correct upgrade target:**\
      \ `v1.15.1` — adds the JSON Schema, the\nstructure/consequence validator, the\
      \ fail-closed seal-time gate,\nthe `convergence.converged_plan_enforcement`\
      \ knob (default\n`graduated`), and read-time surfacing. Machine enforcement\
      \ exists\nonly from the `v1.15.1` tag forward.\n\n**Provenance:**\n- `iteration-converged-plan-machine-enforcement`\
      \ (Workflow A\n  weighted-synthesis: claude + codex + gemini; shared-prior\n\
      \  self-check PASSED; Workflow B audit clean: gemini ×2, codex\n  pass-4b goal_satisfied=true,\
      \ 0 blocking, 0 findings).\n\n---\n\n## Advisory 2026-05-14: v1.14.0 + v1.14.1\
      \ bundled-skill drift\n\n**Affected versions:** `v1.14.0`, `v1.14.1`\n\n**Severity:**\
      \ Doctrine drift (no functional regression in\nconsensus-mcp itself). Affects\
      \ the bundled `consensus-workflow`\nSKILL.md content shipped in the wheel and\
      \ installed by the\nClaude Code bootstrap pack.\n\n**Issue:**\n- `v1.14.0` ships\
      \ a bundled skill that incorrectly documents a\n  PyPI publish step in the release\
      \ cut sequence. consensus-mcp\n  is NOT registered on PyPI; releases are git-tag-only\
      \ via\n  `pipx install git+https://github.com/.../@vX.Y.Z`. The PyPI\n  step\
      \ in the skill was added in error during the v1.14.0 cut\n  and propagates misleading\
      \ release-procedure documentation to\n  every project that runs `consensus init\
      \ --install-claude-code`\n  against this version.\n- `v1.14.1` ships a partially-corrected\
      \ skill (PyPI step\n  removed) but is missing the \"Verify before invent\" and\n\
      \  \"Artifact-scoped claims\" doctrine sections that landed in\n  v1.14.2.\n\
      \n**Correct version:** `v1.14.3` (or any later release).\n\n**User action required:**\
      \ Upgrade installs that pulled\n`@v1.14.0` or `@v1.14.1`:\n\n```\npipx install\
      \ --force git+https://github.com/stgarca/consensus-mcp.git@v1.14.3\n```\n\
      \nIf you have run `consensus init --install-claude-code` against\nv1.14.0 or\
      \ v1.14.1, re-run it against v1.14.3 to refresh the\nproject-local skill copy\
      \ (the bootstrap pack copies the bundled\nskill into the project's `.claude/skills/`\
      \ directory at install\ntime; old installs retain the stale copy).\n\n**Provenance:**\n\
      - Originating audit: `iter-audit-2026-05-14-pypi-invention`\n  (workflow #4\
