      \                })\n            raise GeminiInvocationError(\n            \
      \    f\"gemini stuck: no output for {silence_age:.0f}s\"\n            )\n\n\
      \        if now - last_heartbeat >= heartbeat_interval:\n            if can_log:\n\
      \                _log_dispatch(log_path, {\n                    \"event\": \"\
      dispatch_heartbeat\",\n                    **anchors,\n                    \"\
      age_seconds\": now - start_ts,\n                    \"last_streamed_line_age_seconds\"\
      : silence_age if lst is not None else None,\n                    \"last_streamed_line_seq\"\
      : seq_snap - 1 if seq_snap > 0 else None,\n                })\n            last_heartbeat\
      \ = now\n\n        if now - start_ts >= timeout_seconds + stall_silence_seconds:\n\
      \            _terminate_process_tree(proc)\n            if can_log:\n      \
      \          _log_dispatch(log_path, {\n                    \"event\": \"dispatch_aborted\"\
      ,\n                    **anchors,\n                    \"abort_source\": \"\
