      \    conversion. Independent of codex's implementation because the npm\n   \
      \ install layout / executable shape is the same for gemini-cli.\n    \"\"\"\n\
      \    if (\n        sys.platform == \"win32\"\n        and len(gemini_bin) >=\
      \ 3\n        and gemini_bin[0] == \"/\"\n        and gemini_bin[1].isalpha()\n\
      \        and gemini_bin[2] == \"/\"\n    ):\n        drive = gemini_bin[1].upper()\n\
      \        rest = gemini_bin[3:].replace(\"/\", \"\\\\\")\n        gemini_bin\
      \ = f\"{drive}:\\\\{rest}\"\n\n    if os.path.sep in gemini_bin or (len(gemini_bin)\
      \ > 1 and gemini_bin[1] == \":\"):\n        if sys.platform == \"win32\":\n\
      \            p = Path(gemini_bin)\n            try:\n                if p.exists()\
      \ and p.stat().st_size == 0:\n                    windows_apps = (\n       \
      \                 os.environ.get(\"LOCALAPPDATA\", \"\")\n                 \
      \       + r\"\\Microsoft\\WindowsApps\"\n                    )\n           \
      \         if windows_apps and str(p).lower().startswith(windows_apps.lower()):\n\
      \                        raise GeminiInvocationError(\n                    \
      \        f\"gemini binary {gemini_bin!r} is a Windows App Execution \"\n   \
      \                         f\"Alias stub (0-byte file in WindowsApps). subprocess\
      \ cannot \"\n                            f\"exec App Aliases — install the real\
      \ gemini CLI binary or \"\n                            f\"adjust PATH so a non-stub\
      \ variant is preferred.\"\n                        )\n            except OSError:\n\
      \                pass\n        return gemini_bin\n\n    if sys.platform == \"\
      win32\" and \".\" not in Path(gemini_bin).name:\n        for ext in (\".exe\"\
      , \".cmd\", \".bat\", \".ps1\"):\n            cand = shutil.which(gemini_bin\
      \ + ext)\n            if cand:\n                return _resolve_gemini_bin(cand)\n\
      \n    resolved = shutil.which(gemini_bin)\n    if resolved is None:\n      \
      \  return gemini_bin\n    if sys.platform == \"win32\" and resolved.lower().endswith(\"\
      .ps1\"):\n        cmd_alt = shutil.which(gemini_bin + \".cmd\")\n        if\
      \ cmd_alt:\n            resolved = cmd_alt\n    if sys.platform == \"win32\"\
      :\n        p = Path(resolved)\n        try:\n            if p.exists() and p.stat().st_size\
      \ == 0:\n                windows_apps = (\n                    os.environ.get(\"\
      LOCALAPPDATA\", \"\")\n                    + r\"\\Microsoft\\WindowsApps\"\n\
      \                )\n                if windows_apps and str(p).lower().startswith(windows_apps.lower()):\n\
      \                    raise GeminiInvocationError(\n                        f\"\
      gemini binary resolved to {resolved!r} which is a Windows \"\n             \
      \           f\"App Execution Alias stub (0-byte file in WindowsApps). \"\n \
      \                       f\"subprocess cannot exec App Aliases — install the\
      \ real \"\n                        f\"gemini CLI binary or adjust PATH so a\
      \ non-stub variant is \"\n                        f\"preferred.\"\n        \
      \            )\n        except OSError:\n            pass\n    return resolved\n\
      \n\ndef _get_gemini_version(gemini_bin: str) -> str:\n    \"\"\"Best-effort:\
      \ shell out to `<gemini> --version` and return the version string.\n\n    Returns\
      \ 'unknown' on any failure. Used for audit-log provenance only.\n    \"\"\"\n\
      \    try:\n        result = subprocess.run(\n            [_resolve_gemini_bin(gemini_bin),\
