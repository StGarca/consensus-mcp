schema_version: 1
pilot_id: iteration-0019-test-isolation
goal:
  summary: |
    iter-0019 — fix the long-standing 5 test_dispatch_codex.py failures under
    full-suite ordering. Root cause: `review_write_and_seal.py` and
    `audit_append_event.py` cache REPO_ROOT / ARCHIVE_DIR / INDEX_PATH /
    ACTIVE_DIR at module import time, so setting CONSENSUS_MCP_REPO_ROOT via
    monkeypatch.setenv AFTER import has no effect — the failing tests were
    writing to the real consensus-state/archive/review-passes/index.yaml,
    polluting subsequent test runs.
  desired_end_state: |
    consensus_mcp/tests/test_dispatch_codex.py defines a new helper
    `_isolate_archive_root(tmp_path, monkeypatch)` that monkeypatches the
    cached module attributes (rws.REPO_ROOT, rws.ARCHIVE_DIR, rws.INDEX_PATH,
    aae.REPO_ROOT, aae.ACTIVE_DIR) to tmp_path-isolated locations. The 5
    failing tests now call it after `_scaffold_repo_markers(tmp_path)`. Full
    test suite passes (>=658 green, 1 skipped) under any ordering. No source
    code outside tests touched. The architectural lazy-resolution change is
    explicitly deferred to a peer-reviewed follow-up.
  non_goals:
    - architectural lazy resolution in review_write_and_seal / audit_append_event
    - applying isolation to all tests that call _scaffold_repo_markers
      (only the 5 failing ones are touched; scope-bounded)
    - scrubbing the stale iter-9999 entries already in the real index
    - any changes to consensus_mcp/ source files
allowed_files:
  - consensus_mcp/tests/test_dispatch_codex.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/tools/
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/server.py
  - consensus_mcp/config.py
  - consensus_mcp/contributors/
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/_snapshot_state.py
  - consensus_mcp/_import_parent_history.py
  - consensus-state/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
max_iterations: 1
max_patch_size: 200
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=658 green under default ordering
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2
    description: 5 previously-failing tests pass when gemini tests run first
    check: py -3.11 -m pytest consensus_mcp/tests/test_dispatch_gemini.py consensus_mcp/tests/test_dispatch_codex.py -q
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
