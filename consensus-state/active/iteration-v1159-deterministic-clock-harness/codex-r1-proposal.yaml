  deliverable_scope:
    next_iteration_id: iteration-v1159-deterministic-clock-harness
    files_in_scope:
    - consensus_mcp/_dispatch_codex.py
    - consensus_mcp/tests/test_dispatch_codex_streaming.py
    - docs/advisories.md
    files_out_of_scope:
    - .github/workflows/*
    - consensus_mcp/dispatch_templates/*
    - packaging/release metadata
    - public release tags or immutable v1.15.8 artifacts
    - unrelated `_invoke_codex` abort semantics beyond adding a defaulted test hook
    key_design_decisions:
    - Add a private keyword-only sleep hook to `_invoke_codex`, defaulting to `time.sleep`,
      so production callers keep current behavior while tests can block on a deterministic
      condition instead of monkeypatching global `time.sleep`.
    - 'Replace `_ControllableClock` with a condition-backed synchronizing clock: `now()`,
      `advance()`, `sleep()`, `wait_for_runner_sleep()`, `wait_for(predicate)`, and
      `release_all()` for failure cleanup.'
    - Rewrite `_FakePipeReader.readline()` to wait on the synchronizing clock and
      parent exit notification rather than real 5 ms polling; notify readers on `poll()`
      exit, `terminate()`, and `kill()`.
    - Replace arbitrary `time.sleep` loops and bare `join(timeout=10)` waits with
      event/predicate waits against emitted log events, invoke completion, signal-file
      deletion, and fake process termination.
    - Delete `_FLAKY_WINDOWS_CI` in this iteration; no follow-up phase, because the
      acceptance gates are concrete and the implementation cost is small.
    - Update all same-family helper users, including `test_clean_exit_returns_output`;
      preserve stderr drain coverage with real reader threads so the deadlock regression
      test still proves stderr is drained.
    - 'Add a root-cause-independent teardown safeguard: any failed wait releases the
      synchronizing clock, terminates the fake process, joins runner/reader threads,
      and fails with harness state, so a wrong diagnosis does not leave CI wedged.'
    acceptance_gates:
    - '`_FLAKY_WINDOWS_CI` and the Windows/GitHub Actions skip decorator are absent
      from `consensus_mcp/tests/test_dispatch_codex_streaming.py`.'
    - '`pytest consensus_mcp/tests/test_dispatch_codex_streaming.py -q` passes with
      all streaming, heartbeat, abort, clean-exit, and stderr-drain tests collected
      and run.'
    - 'The four formerly skipped tests still assert the same durable outcomes: heartbeat
      event cadence/monotonic age, `abort_source=watchdog_silence`, `abort_source=operator_signal_file`
      plus signal-file deletion and termination, and `abort_source=wall_time_hard_ceiling`.'
    - A Windows GitHub Actions run for the existing project channel, already evidenced
      by the skip condition and v1.15.8 context in the provided test artifact, runs
      these tests without skips before claiming the CI follow-up is complete.
    - No docs or changelog text claims the immutable v1.15.8 artifact contains the
      proper deterministic harness fix; v1.15.8 remains the interim skip release,
      and the fix is attributed only to the new commit/tag once it exists.
  risks:
  - The sleep hook touches production code, even if defaulted; keep it keyword-only/private
    and verify existing callers do not need changes.
  - An over-faked harness could stop exercising reader-thread behavior; retain real
    stdout/stderr reader threads and event-log assertions.
  - Condition-based tests can deadlock if failure cleanup is weak; the helper must
    always release waiters and join/terminate before failing.
  - If the external Windows CI failure persists after deterministic handshakes, the
    scheduling hypothesis is refuted and the next investigation should target Windows
    process/file behavior rather than test timing.
