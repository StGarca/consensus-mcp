findings:
- id: codex-rev-001
  severity: blocking
  summary: Timed-out driver waits are ignored, so the harness is not actually deadlock-free
  citation: consensus_mcp/tests/test_dispatch_codex_streaming.py:428; consensus_mcp/tests/test_dispatch_codex_streaming.py:499
  risk: If the runner stops parking or a predicate never becomes true, wait_for returns
    False after the 20s ceiling, but _drive and _drive_streaming continue looping
    until max_rounds/max_steps before release_all. That contradicts the stated deadlock-free
    invariant and can turn a broken harness into a long CI wedge instead of a fast
    deterministic failure.
  recommendation: Check the return value of every per-step wait_for call. On False,
    call release_all(), join, and raise immediately; also raise when max_rounds/max_steps
    is exhausted even if release_all later makes the runner thread exit.
  patch_not_proposed_reason: Patch not proposed because the sealed review input provides
    final file contents only; a safe fix should update both driver helpers and their
    failure messages against the actual review diff/base in the apply loop.
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: 'Differential/prior used: reviewed as a Workflow A replacement
  for the v1.15.8 Windows skip workaround, with the prior that any remaining harness
  wait that can wedge CI is release-blocking. The clock injection addresses the original
  coordination-by-hope, but the timeout paths in the new drivers do not meet the deadlock-free
  requirement.'
