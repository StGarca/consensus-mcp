findings:
- id: codex-rev-001
  severity: blocking
  summary: stderr-drain test no longer models pipe backpressure, so it can pass even
    if stderr is never drained
  citation: consensus_mcp/tests/test_dispatch_codex_streaming.py:338
  risk: A regression that removes or breaks the stderr reader thread would still let
    the fake process exit on virtual time and write its output. Real codex can deadlock
    on a full stderr pipe, so this loses coverage for the release-line deadlock risk
    the harness claims to preserve.
  recommendation: Make the fake process depend on stderr consumption for exit, or
    assert that the scheduled stderr stream was fully read. The test should fail if
    production stops draining stderr.
  patch_not_proposed_reason: 'Patch not proposed because the right fix is a harness
    design choice: either backpressure-aware fake pipes or a real OS pipe fixture.
    Both need focused validation against the Windows CI determinism constraints.'
  patch_proposal: null
goal_satisfied: false
goal_satisfied_rationale: 'Differential/prior used: H1-H3 imply a harness-only coordination
  fix with coverage preservation as the key success criterion. The four skip targets
  are addressed, but the submitted harness still has a blocking coverage hole around
  the stated deadlock surface.'
