findings:
- id: codex-rev-001
  severity: blocking
  summary: heartbeat driver still leaves deterministic guarantees and cadence coverage
    incomplete
  citation: consensus_mcp/tests/test_dispatch_codex_streaming.py:494
  risk: The startup wait can fail without release_all(), leaving the synthetic clock/process
    teardown path bypassed. The same helper only checks the negative heartbeat gate
    at half the interval, so a regression that emits at 20s for a 30s interval would
    still pass. That violates the Q2(a) requirements for deadlock-free harness behavior
    and no loss of heartbeat-cadence coverage.
  recommendation: Make the startup wait use the same release_all()+join loud-fail
    path as the other drivers, and check just-before-boundary heartbeat suppression
    before crossing the interval boundary.
  patch_not_proposed_reason: null
  patch_proposal:
    patch_id: codex-rev-001-patch
    applies_to_findings:
    - codex-rev-001
    base_sha: 6a018ad24153519ce81e7cfb26a70119651c8895a8b48b754accbc04678eb90e
    unified_diff: "--- a/consensus_mcp/tests/test_dispatch_codex_streaming.py\n+++\
      \ b/consensus_mcp/tests/test_dispatch_codex_streaming.py\n@@ -491,19 +491,27\
      \ @@ def _drive_heartbeats(\n             )\n \n-    assert clock.wait_runner_parked(after_epoch=0),\
      \ \"runner never parked (startup)\"\n+    if not clock.wait_runner_parked(after_epoch=0):\n\
      +        clock.release_all()\n+        th.join(timeout=5)\n+        raise AssertionError(\n\
      +            \"_drive_heartbeats: runner never parked (startup) \u2014 \"\n\
      +            \"release_all fired; handshake broken, NOT a timing flake\"\n+\
      \        )\n+    epsilon = min(0.001, interval / 1000.0)\n+    pre_boundary\
      \ = interval - epsilon\n     for k in range(steps):\n         before = _hb()\n\
      \         # (1) sub-interval: the interval gate MUST suppress emission.\n- \
      \       e1 = clock.advance(interval * 0.5)\n-        _sync(e1, f\"round {k}\
      \ sub-interval\")\n+        e1 = clock.advance(pre_boundary)\n+        _sync(e1,\
      \ f\"round {k} pre-boundary\")\n         mid = _hb()\n         assert mid ==\
      \ before, (\n-            f\"round {k}: heartbeat emitted at +{interval*0.5}s\
      \ \u2014 BEFORE \"\n+            f\"round {k}: heartbeat emitted at +{pre_boundary}s\
      \ \u2014 BEFORE \"\n             f\"the {interval}s interval elapsed: count\
      \ {before}->{mid}. \"\n             \"The interval gate is broken (regression:\
      \ emit-every-poll / \"\n             \"wrong threshold).\"\n         )\n   \
      \      # (2) cross the boundary: EXACTLY one new heartbeat.\n-        e2 = clock.advance(interval\
      \ * 0.5)\n+        e2 = clock.advance(epsilon)\n         _sync(e2, f\"round\
      \ {k} boundary\")\n         after = _hb()\n"
    files_touched:
    - consensus_mcp/tests/test_dispatch_codex_streaming.py
    expected_tests:
    - pytest consensus_mcp/tests/test_dispatch_codex_streaming.py::test_heartbeat_fires_at_interval
    unified_diff_sha256: 69a0f26e8a0c2e68451ae1031e6b4cc4270074559b43a47f82f5c7143f97e3b2
