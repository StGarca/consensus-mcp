      \ to consensus-state/state/dispatch-log.jsonl.\n\niter-0010 (v1.14.0): generic\
      \ dispatch helpers (repo-root resolution, path\nnormalization, goal_packet/template\
      \ loading, prompt building, process-tree\ntermination, per-patch base_sha, sealing,\
