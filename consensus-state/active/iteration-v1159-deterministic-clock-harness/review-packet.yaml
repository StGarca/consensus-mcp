      \ by every reviewer adapter.\nThis module keeps only codex-specific code: CLI\
      \ invocation, version probe,\nbinary resolution, codex-output JSON parsing +\
      \ patch_proposal validation,\nand the codex CLI entrypoint. Codex behavior is\
      \ preserved bit-for-bit.\n\nNOT an MCP tool. CLI-only. Per Phase 3 anti-scope,\
      \ consensus_mcp/tools/*\nis FROZEN; this helper is in the package root and calls\
      \ T6's handle in-process.\n\nUSAGE\n-----\n  python -m consensus_mcp._dispatch_codex\
      \ \\\\\n      --goal-packet <path/to/goal_packet.yaml> \\\\\n      --iteration-dir\
      \ <path/to/iteration-XXXX/> \\\\\n      [--reviewer-id codex-iterXXXX-N] \\\\\
      \n      [--pass-id codex-iterXXXX-N-passN] \\\\\n      [--prompt-template <path>]\
      \ \\\\\n      [--schema <path>] \\\\\n      [--codex-bin <path>] \\\\\n    \
      \  [--timeout-seconds 600] \\\\\n      [--smoke]\n\nExit 0 = sealed pass produced;\
      \ non-zero = failure (codex error, parse fail,\nschema fail, seal fail). JSON\
      \ to stdout on success.\n\"\"\"\nfrom __future__ import annotations\n\nimport\
      \ argparse\nimport hashlib\nimport json\nimport os\nimport re\nimport shutil\n\
      import subprocess\nimport sys\nimport tempfile\nimport threading\nimport time\n\
      from pathlib import Path\n\nimport yaml\n\n# iter-0010: generic dispatch helpers\
