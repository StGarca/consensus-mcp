      \n\n\ndef _invoke_codex(\n    prompt: str,\n    codex_bin: str,\n    timeout_seconds:\
      \ int,\n    repo_root: Path,\n    schema_path: Path,\n    log_path=None,\n \
      \   anchors=None,\n    heartbeat_interval: float = 30.0,\n    stall_silence_seconds:\
      \ float = 180.0,\n    poll_interval: float = 0.5,\n    time_fn=None,\n    popen_factory=None,\n\
      \    *,\n    _sleep=None,\n) -> str:\n    \"\"\"Shell out to codex CLI via Popen\
      \ + reader threads (iter-0037 bidirectional).\n\n    Per iter-0036 lesson +\
      \ iter-0037 codex pre-review (codex-iter0037-1):\n      - Replace blocking subprocess.run\
      \ with Popen + 2 reader threads (stdout\n        + stderr; both drained to prevent\
      \ pipe-buffer deadlock — codex-rev-001).\n      - Emit dispatch_streamed_line\
      \ per stdout line (truncated to 200 chars)\n        and dispatch_heartbeat every\
      \ heartbeat_interval seconds.\n      - Auto-abort on heartbeat-silence (no stdout\
      \ for stall_silence_seconds);\n        wall-time is a soft ceiling that raises\
      \ but does NOT terminate\n        preemptively (codex-rev-002 — operator preference).\n\
      \      - Silence check fires on EVERY poll, not just heartbeat tick\n      \
      \  (codex-rev-003) so the 90s threshold actually bounds the recovery time.\n\
      \      - stdout_buf / stderr_buf / streaming counters protected by state_lock\n\
      \        (codex-rev-004); still-alive reader after proc exit = failure.\n\n\
      \    log_path + anchors are optional for back-compat with callers that don't\n\
      \    have them (tests using the legacy mock pattern). When None: streaming\n\
      \    events / heartbeats / abort-signal-file are all disabled and the function\n\
      \    still returns the final output.\n\n    Verified codex-cli 0.129.0 CLI shape\
      \ unchanged from prior subprocess.run\n    invocation: `codex exec --skip-git-repo-check\
      \ --cd <REPO> --sandbox\n    read-only --output-schema <FILE> -o <OUT> -` (prompt\
      \ via stdin).\n    \"\"\"\n    if time_fn is None:\n        time_fn = time.time\n\
      \    if popen_factory is None:\n        popen_factory = subprocess.Popen\n \
      \   # Private, keyword-only sleep seam (v1.15.9 converged plan\n    # q1_sync_mechanism).\
      \ Defaults to `time.sleep` → ZERO change to\n    # production behavior. The\
      \ streaming test harness injects a\n    # SyncClock-backed blocker so the poll\
      \ loop has a deterministic\n    # happens-before with the test driver instead\
      \ of racing real\n    # wall-clock on loaded CI runners. Chosen over monkeypatching\n\
      \    # global `time.sleep` (no global-state leak — see the\n    # monkeypatch-pollution\
      \ lesson).\n    if _sleep is None:\n        _sleep = time.sleep\n    can_log\
      \ = log_path is not None and anchors is not None\n\n    # iter-0007 F4 (deferred\
      \ infra): allow env-var override of the stall-\n    # silence threshold so operators\
