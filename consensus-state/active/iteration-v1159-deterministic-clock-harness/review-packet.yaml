      \n\ndef _resolve_codex_bin(codex_bin: str) -> str:\n    \"\"\"Resolve a codex\
      \ binary spec to an actual executable file path.\n\n    Per v1.10.3 Windows\
      \ hardening (real-codex smoke 2026-05-09):\n      - Python's subprocess on Windows\
      \ does NOT apply PATHEXT lookup to bare\n        names, so `codex` (which is\
      \ on PATH only as `codex.cmd`/`.ps1`/etc.)\n        fails with \"binary not\
      \ found\". `shutil.which(\"codex\")` DOES apply\n        PATHEXT and returns\
      \ the resolved path.\n      - On Windows, `shutil.which` returns the FIRST PATHEXT\
      \ match by default;\n        order is `.COM; .EXE; .BAT; .CMD; .VBS; .JS; .WS;\
      \ .PS1`. npm-installed\n        CLIs ship `<name>.cmd` (directly executable\
      \ by CreateProcess) AND\n        `<name>.ps1` (needs powershell.exe wrapper).\
      \ Without intervention,\n        `shutil.which(\"codex\")` could return `.ps1`\
      \ (in some PATH orders) and\n        Python's subprocess would fail with WinError\
      \ 193 (\"not a valid Win32\n        application\"). Prefer `.cmd` explicitly\
      \ when the bare-name resolution\n        lands on a script Python can't exec.\n\
      \n    Returns the resolved path. If no resolution is possible (codex_bin already\n\
      \    looks like an absolute path OR shutil.which returns nothing), returns the\n\
      \    input unchanged so subprocess.run produces a clear \"binary not found\"\
      .\n    Per iter-0039 xplat-rev-008 + codex-iter0039-1 codex-rev-001 refinement:\n\
      \      - MSYS-style `/c/foo/bar` paths converted to `C:\\\\foo\\\\bar` on Windows.\n\
      \        Conversion gated on `codex_bin[1].isalpha()` so unrelated POSIX-shaped\n\
      \        absolute paths like `/tmp/x` or `/_/y` aren't mangled into `T:\\\\\
      x` /\n        `_:\\\\y`.\n      - Bare names with no extension on Windows: try\
      \ .exe, .cmd, .bat, .ps1\n        in PATH explicitly so callers don't get bitten\
      \ by PATHEXT ordering\n        ambiguity.\n      - App Execution Alias stub\
      \ rejection on Windows: 0-byte files in\n        `%LOCALAPPDATA%\\\\Microsoft\\\
      \\WindowsApps` are App Aliases that\n        subprocess cannot exec; raise a\
      \ clear error rather than the cryptic\n        WinError 193 / file-not-found\
      \ that bare exec produces.\n    \"\"\"\n    # iter-0039 xplat-rev-008: MSYS-style\
      \ drive-path conversion on Windows.\n    # Only convert if char[1] is a real\
      \ drive letter (codex-iter0039-1\n    # codex-rev-001 refinement: don't mangle\
      \ /tmp, /_/foo, etc.).\n    if (\n        sys.platform == \"win32\"\n      \
      \  and len(codex_bin) >= 3\n        and codex_bin[0] == \"/\"\n        and codex_bin[1].isalpha()\n\
      \        and codex_bin[2] == \"/\"\n    ):\n        drive = codex_bin[1].upper()\n\
      \        rest = codex_bin[3:].replace(\"/\", \"\\\\\")\n        codex_bin =\
      \ f\"{drive}:\\\\{rest}\"\n\n    # If caller already gave a full path that exists,\
      \ use it as-is.\n    if os.path.sep in codex_bin or (len(codex_bin) > 1 and\
      \ codex_bin[1] == \":\"):\n        # iter-0039 xplat-rev-008: App Execution\
      \ Alias check on Windows.\n        # 0-byte stub in WindowsApps cannot be exec'd\
      \ by subprocess.\n        if sys.platform == \"win32\":\n            p = Path(codex_bin)\n\
      \            try:\n                if p.exists() and p.stat().st_size == 0:\n\
      \                    windows_apps = (\n                        os.environ.get(\"\
      LOCALAPPDATA\", \"\")\n                        + r\"\\Microsoft\\WindowsApps\"\
      \n                    )\n                    if windows_apps and str(p).lower().startswith(windows_apps.lower()):\n\
      \                        raise CodexInvocationError(\n                     \
      \       f\"codex binary {codex_bin!r} is a Windows App Execution \"\n      \
      \                      f\"Alias stub (0-byte file in WindowsApps). subprocess\
      \ cannot \"\n                            f\"exec App Aliases — install the real\
      \ codex CLI binary or \"\n                            f\"adjust PATH so a non-stub\
      \ variant is preferred.\"\n                        )\n            except OSError:\n\
      \                pass  # stat failed; treat as not-stub and let subprocess fail\
      \ downstream\n        return codex_bin\n\n    # iter-0039 xplat-rev-008: bare-name\
      \ resolution on Windows. If the name\n    # has no extension, try common Windows-executable\
