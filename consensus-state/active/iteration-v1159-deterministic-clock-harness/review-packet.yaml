      \ cold-start on 50KB+ prompts often\n    # exceeds the 180s default.\n    env_silence\
      \ = os.environ.get(\"CONSENSUS_MCP_STALL_SILENCE_SECONDS\")\n    if env_silence:\n\
      \        try:\n            stall_silence_seconds = float(env_silence)\n    \
      \    except ValueError:\n            pass  # keep default\n\n    with tempfile.NamedTemporaryFile(mode=\"\
      w\", suffix=\".json\", delete=False, encoding=\"utf-8\") as tmp:\n        out_file\
      \ = tmp.name\n    try:\n        cmd = [\n            _resolve_codex_bin(codex_bin),\n\
      \            \"exec\",\n            \"--skip-git-repo-check\",\n           \
      \ \"--cd\", str(repo_root),\n            \"--sandbox\", \"read-only\",\n   \
      \         \"--output-schema\", str(schema_path),\n            \"-o\", out_file,\n\
