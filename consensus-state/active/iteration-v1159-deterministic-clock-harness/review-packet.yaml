      \ that access these via\n# `_dispatch_codex.<name>` continue to resolve through\
      \ the import binding.\nfrom consensus_mcp._dispatch_base import (\n    _REPO_ROOT_MARKERS,\n\
      \    RepoRootResolutionError,\n    _has_repo_markers,\n    _resolve_repo_root,\n\
      \    OutsideRepoPathError,\n    _normalize_for_compare,\n    _normalize_relative_to_repo,\n\
