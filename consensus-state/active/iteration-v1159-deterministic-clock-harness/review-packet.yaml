      \n\ndef test_stderr_drain_prevents_deadlock(tmp_path):\n    \"\"\"Production\
      \ must keep a REAL stderr reader thread draining\n    codex's stderr (real codex\
      \ deadlocks on a full stderr pipe).\n\n    SCOPE OF THIS TEST (v1.15.9 scope\
      \ consult — claude+codex+gemini,\n    weighted-synthesis): the fake's stdout/stderr\
      \ `_FakePipeReader`s\n    are consumed by production's REAL reader threads,\
      \ and this test\n    asserts production actually drained ALL scheduled stderr\
      \ (so a\n    regression that removes/breaks the stderr reader FAILS here). It\n\
      \    does NOT model OS pipe-buffer BACKPRESSURE — the fake proc exits\n    on\
      \ virtual time regardless of consumption; it never blocks on a\n    full pipe.\
      \ That is a PRE-EXISTING limitation (identical in the\n    v1.15.8 baseline\
      \ `da62d54^`, not introduced by the deterministic\n    rewrite). True backpressure\
      \ modeling is a tracked follow-up\n    (docs/advisories.md — finite-buffer reader\
      \ + release_all +\n    mutant gate); deliberately deferred, NOT a v1.15.9 blocker.\"\
      \"\"\n    repo_root = _setup_repo_root(tmp_path)\n    clock = _SyncClock()\n\
      \    log_path = repo_root / \"consensus-state\" / \"state\" / \"dispatch-log.jsonl\"\
      \n\n    big_line = b\"E\" * 1000 + b\"\\n\"\n    scheduled_err = [(0.0, big_line)\
      \ for _ in range(100)]\n    scheduled_out = [(0.0, b\"ok\\n\")]\n    factory\
      \ = _make_factory(\n        clock,\n        scheduled_stdout=scheduled_out,\n\
      \        scheduled_stderr=scheduled_err,\n        exit_at=0.3,\n    )\n\n  \
      \  th, holder = _run_invoke_in_thread(\n        clock,\n        prompt=\"x\"\
      ,\n        codex_bin=\"codex\",\n        timeout_seconds=60,\n        repo_root=repo_root,\n\
      \        schema_path=SCHEMA_PATH,\n        log_path=log_path,\n        anchors=_anchors(),\n\
      \        heartbeat_interval=30.0,\n        stall_silence_seconds=90.0,\n   \
      \     poll_interval=0.01,\n        time_fn=clock.now,\n        popen_factory=factory,\n\
      \    )\n    _drive(clock, th, until=lambda: not th.is_alive())\n    assert not\
      \ th.is_alive()\n    assert \"e\" not in holder, f\"unexpected exception: {holder.get('e')}\"\
      \n    assert holder[\"out\"] == '{\"ok\": true}'\n    # Bounded zero-determinism-risk\
      \ coverage (v1.15.9 scope consult,\n    # weighted-synthesis of claude+codex):\
      \ assert production's REAL\n    # reader threads drained EVERY scheduled stdout+stderr\
      \ line.\n    # Post-run state read after thread death — no timing, no new\n\
      \    # threads, no backpressure modeling. A regression that removes\n    # or\
      \ breaks the stderr reader leaves `_idx == 0` here → FAIL,\n    # which is exactly\
      \ codex-v1159-wfb-6's stated requirement\n    # (\"the test should fail if production\
