      : subprocess.CREATE_NEW_PROCESS_GROUP}\n        else:\n            popen_kwargs\
      \ = {\"start_new_session\": True}\n        try:\n            proc = popen_factory(\n\
      \                cmd,\n                stdin=subprocess.PIPE,\n            \
      \    stdout=subprocess.PIPE,\n                stderr=subprocess.PIPE,\n    \
      \            bufsize=0,\n                **popen_kwargs,\n            )\n  \
      \      except FileNotFoundError:\n            raise CodexInvocationError(f\"\
      codex binary not found: {codex_bin}\") from None\n\n        # Write prompt +\
      \ close stdin. Binary mode preserves UTF-8 bytes verbatim\n        # (per v1.10.3\
      \ Windows hardening — text-mode \\n→\\r\\n translation corrupts\n        # multibyte\
