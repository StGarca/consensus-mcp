q1_sync_mechanism:
  positions: {claude: "gated clock on production now() + runner-done escape; bounded seam as sanctioned fallback", gemini: "monkeypatch GLOBAL time.sleep -> SynchronizingClock; strictly no production change", codex: "private keyword-only sleep= DI hook on _invoke_codex defaulting to time.sleep; reject global monkeypatch"}
  weighted_synthesis: |
    ADOPT codex's mechanism: a PRIVATE, KEYWORD-ONLY `sleep=`
    parameter on `_invoke_codex` defaulting to `time.sleep` (and
    likewise for any internal poll wait), plus a condition-backed
    synchronizing clock. Rationale (weighted):
    - This IS the "single bounded, justified observability/
      injection seam" claude's proposal explicitly pre-sanctioned
      as the fallback if a no-production-change design proved
      fragile. claude's clock-gated-on-`now()` is fragile exactly
      where claude's own `wrong_if` predicted: inferring "the
      runner observed time T" without an explicit happens-before
      point is brittle (which thread, quiescence). The DI hook
      gives the explicit happens-before point with zero default
      behavior change.
    - It is strictly SAFER than gemini's global `time.sleep`
      monkeypatch. gemini itself listed "incorrect patching
      scope / leak" as a risk, and the project has a
      load-bearing memory that monkeypatch state leaks across
      tests ([[feedback-monkeypatch-getattr-pollution]]).
      Dependency injection has no global-state surface. gemini's
      no-production-change INSTINCT is still honored in SUBSTANCE:
      production *behavior* is unchanged (default `time.sleep`);
      only a keyword-only/private seam is added — not a backdoor,
      a legitimate injection point, bounded and defaulted.
    - Replace `_ControllableClock` with a `SyncClock`:
      `now()/advance()/sleep()/wait_for_runner_sleep()/
      wait_for(predicate)/release_all()`. Rewrite
      `_FakePipeReader.readline()` to wait on the SyncClock +
      parent-exit notification (notify on `poll()`-exit,
      `terminate()`, `kill()`) — NO real 5ms poll.
    Gemini's global-monkeypatch and claude's gate-on-now() are
    NOT adopted as the lever, but their shared goal (zero real
    sleep on the drive path) is fully realized by the DI hook.

q2_scope:
  positions: {claude: "(iii) class-wide shared primitive, all clock-driven sites", gemini: "4 + clean-exit + stderr-drain; remove _drive_clock_until_done", codex: "4 + _drive_clock_until_done + clean-exit; preserve stderr-drain with REAL reader threads"}
  weighted_synthesis: |
    Unanimous class-wide (no-deferral satisfied; the latent
    same-class flake in the non-skipped sites is fixed in the
    same change). Concretely: migrate the four `@_FLAKY_WINDOWS_
    CI` tests + `test_clean_exit_returns_output` onto the
    SyncClock; DELETE `_drive_clock_until_done` (gemini+codex);
    DELETE `@_FLAKY_WINDOWS_CI` entirely with NO phased follow-up
    (acceptance gates concrete + cost small — completion test
    passes). ADOPT codex's refinement over gemini's: preserve
    `test_stderr_drain_prevents_deadlock` coverage with REAL
    stdout/stderr reader threads — an over-faked harness would
    stop exercising the very reader-thread behavior that
    regression test exists to prove. Blast radius contained to
    ONE file + the bounded `_dispatch_codex.py` seam.

q3_deadlock_design_and_verification:
  positions: {claude: "universal runner-done escape + absolute safety ceiling -> fast loud FAIL; >=3 consecutive green Windows CI", gemini: "retain join timeouts; function-scoped teardown; 'passes reliably across platforms'", codex: "release_all() root-cause-independent teardown on ANY failed wait; Windows CI run without skips before claiming complete"}
  weighted_synthesis: |
    INDEPENDENT SAFEGUARD (safety-interlock-first doctrine) —
    ADOPT codex's `release_all()`: ANY failed/timed-out wait
    must release the SyncClock, terminate the fake process, join
    runner+reader threads, and fail LOUD with captured harness
    state. This works even if the timing hypothesis is entirely
    wrong (a deadlocked or misdiagnosed harness can never wedge
    a CI job — it fails fast with diagnostics), satisfying
    works_if_root_cause_wrong. Merge with claude's
    universal-escape discipline: EVERY predicate wait includes
    the runner-done condition AND a bounded absolute ceiling AND
    routes failure through `release_all()`. Wake-discipline (one
    `threading.Condition`; notify_all under lock on every
    transition): heartbeat -> production `sleep=` hook wakes on
    advance; silence/wall-ceiling -> production returns/raises ->
    runner `finally` sets runner_done + notify; operator-signal
    -> test writes file, waits on (abort-event OR runner_done);
    clean-exit -> fake `poll()` flips exited at scheduled clock,
    reader EOF (condition-woken), runner returns + notify;
    exception -> same `finally` (no path skips the universal
    waker). VERIFICATION (provisional-until-proven; adopt the
    STRICTEST = claude's, the v1.15.8 bar the project has proven
    it can meet): `@_FLAKY_WINDOWS_CI` deleted + the four tests
    RUN on windows py3.10 + py3.12 + zero `time.sleep` on the
    test/harness drive path + every wait has a guaranteed waker
    + >=3 CONSECUTIVE green Windows CI runs of the SAME commit
    (verified per [[feedback-rerun-verification-trap]]: distinct
    completed attempts via the attempts API, never N polls of a
    run id). ARTIFACT-SCOPING (codex): v1.15.8 tag is immutable
    and remains the interim-skip release; the deterministic fix
    is attributed ONLY to the new v1.15.9 commit/tag.

