  convention_schema_version: 1
  falsification:
    hypothesis: "The four Windows-CI flakes are a missing happens-before contract between the virtual clock and the daemon runner/reader threads (coordination by real time.sleep + join(timeout) + hope), fixed by a DI sleep-hook + condition-backed SyncClock that removes all real sleep from the drive path."
    falsifiable_from_artifacts: false
    discriminating_experiment: "after the rewrite (skips deleted, zero real sleep on the drive path, SyncClock recording runner sleep/wake handshakes): >=3 consecutive green Windows CI runs (py3.10 + py3.12) of the same commit running all four formerly-skipped tests + test_clean_exit_returns_output + test_stderr_drain_prevents_deadlock."
    refutation_observation: "any of those Windows CI runs shows a formerly-skipped test FAIL or HANG (release_all teardown fires / ceiling hit) despite the handshake being correct and no real sleep on the drive path — that refutes coordination-by-hope and points at Windows process/file behavior or product logic, not test timing."
    empirical_status: pending
  independent_safeguard:
    applicable: true
    mechanism: "SyncClock.release_all(): any failed or timed-out wait releases the clock, terminates the fake process, joins runner+reader threads, and fails LOUD with captured harness state."
    works_if_root_cause_wrong: true
    why: "Even if the true cause of a future hang is NOT clock/runner coordination, release_all() guarantees a misdiagnosed or deadlocked harness fails fast with diagnostics instead of wedging the CI job — the failure becomes observable rather than an opaque CI timeout, regardless of the hypothesis."
    ships_with_fix: true
  decisive_experiment_before_next_iteration: "the >=3-consecutive-green-Windows-CI-runs gate above, verified via the attempts API per [[feedback-rerun-verification-trap]] (one green run / N polls of one run id is explicitly insufficient)"
