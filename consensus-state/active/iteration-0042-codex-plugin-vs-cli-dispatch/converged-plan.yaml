iteration_id: iteration-0042-codex-plugin-vs-cli-dispatch
converged_at_utc: '2026-05-13T21:42:00Z'
convergence:
  rule: strict-majority
  contributors_required: 2
  contributors_substantive: 3   # claude, codex, gemini all sealed proposals; none abstained
  result: CONVERGED_DO_NOT_MIGRATE
  vote_summary: |
    All three contributors independently reached the same verdict:
    keep the subprocess-based codex dispatcher; do NOT migrate to
    the codex@openai-codex Claude Code plugin.

    Each contributor weighed the same three load-bearing concerns
    and reached the same conclusion:

    - **Provenance preservation (Q2)**: the seal pipeline depends
      on machine-verifiable sha256 hashes of prompt, output, schema,
      and goal_packet. A plugin-mediated call would degrade output
      to "trust the plugin," breaking the audit chain. (Cited by
      all 3.)
    - **Independence attestation (Q3)**: subprocess dispatch is
      isolated-by-construction because consensus-mcp owns env, cwd,
      and stdin. Plugin runtime may inject Claude Code session
      context invisible to us, making
      `reviewer_isolated_by_construction: true` unverifiable.
      (Cited by all 3.)
    - **Architectural mismatch**: the codex plugin is designed for
      interactive chat use, not for backend pipeline use by another
      MCP server. (Cited by all 3.)

    Distinct contributions:
    - claude flagged **deployment surface** (CI/headless/devcontainer)
      shrinkage if the dispatcher requires Claude Code to be running.
    - codex flagged **marketplace supply-chain trust** + plugin auth
      state surfaces as a Q6 bonus dimension.
    - gemini flagged **latency** + **debugging observability** as
      concrete operational concerns beyond the audit/independence
      ones.

