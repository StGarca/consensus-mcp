  sealed_path: consensus-state/archive/review-passes/2026-05-13-iteration-0042-codex-plugin-vs-cli-dispatch-codex-iteration-0042-1-pass.yaml
- actor: gemini-iteration-0042-codex-plugin-vs-cli-dispatch-1
  stance_summary: DO NOT PURSUE. Plugin is designed for interactive
    chat, not programmatic backend use. Migration would lose raw
    byte-for-byte output capture (breaking output_sha256), add
    latency, reduce observability for debugging, and create brittle
    coupling to Claude Code's plugin architecture. Speculative
    benefits don't outweigh concrete risks.
  sealed_path: consensus-state/archive/review-passes/2026-05-13-iteration-0042-codex-plugin-vs-cli-dispatch-gemini-iteration-0042-codex-plugin-vs-cli-dispatch-1-pass.yaml

decisions:
  Q1_feasibility:
    verdict: NOT FEASIBLE WITHOUT NEW INFRASTRUCTURE
    detail: |
      MCP communication is one-way (host → server). Our Python MCP
      server has no documented path to invoke tools on another MCP
      server registered in the same Claude Code session. The
      alternatives — spinning up our own MCP client inside
      consensus-mcp, or returning a broker directive to be forwarded
      by the orchestrator — either reinvent the subprocess pattern
      worse OR add round-trips that kill non-Claude-Code deployment
      paths. Gate failure: everything else is moot.

  Q2_provenance:
    verdict: WOULD DEGRADE BEYOND THE SEAL PIPELINE'S CONTRACT
    detail: |
      Plugin owns prompt composition (wraps our intent into its own
      template), so prompt_sha256 no longer represents what codex
      actually saw. Schema validation moves out of our control.
      Output capture goes through a chat-style intermediate layer
      that may strip or reformat raw model output, breaking
      output_sha256 byte-for-byte guarantees. Net: machine-verifiable
      audit trail downgrades to "trust the plugin" — a meaningful
      loss for sealed-workflow consumers.

  Q3_independence_attestation:
    verdict: UNVERIFIABLE WITHOUT PLUGIN MANIFEST INSPECTION
    detail: |
      Today subprocess dispatch IS
      `reviewer_isolated_by_construction: true` because consensus-mcp
      controls env, cwd, stdin entirely. Plugin runtime may inject
      Claude Code session context (system prompt additions, prior
      chat-turn awareness, tool-use history) invisible to us. Without
      a manifest declaration of "stateless tool calls, no implicit
      context injection," we cannot honestly attest isolation.

  Q4_architectural_pattern:
    chosen: |
      (d) REJECT MIGRATION. Subprocess dispatcher remains the single
      canonical sealed-workflow path. The codex Claude Code plugin
      remains a separate operator-facing tool (ad-hoc chat queries,
      auth onboarding) — orthogonal to consensus-mcp's pipeline.
    rejected_alternatives:
      - (a) Replace dispatcher entirely → unsafe per Q2 + Q3
      - (b) Two parallel dispatchers (--codex-mode cli|plugin) →
        doubles surface area without clear default rationale
      - (c) Plugin for ad-hoc only → doesn't need consensus-mcp
        involvement at all; operator just installs the plugin directly

  Q5_cost_risk_threshold:
    verdict: DO NOT DO THIS NOW; CONDITIONS FOR REVISIT BELOW
    detail: |
      All three contributors named the SAME revisit conditions
      (independently — strong convergence signal):

      Revisit if AND ONLY IF all three hold:
        1. MCP spec (or the codex plugin specifically) adds a
           documented server-to-server invocation protocol with
           replayable, hashable request/response envelopes.
        2. Codex plugin manifest declares stateless tool calls with
           no implicit context injection from the Claude Code
           session.
        3. Plugin provides demonstrably better stall handling /
           reliability than our 180s subprocess wrapper on the
           known pain points (cold-start latency, AuthRequired
           hangs, Windows path edge cases).

      Until all three are publicly demonstrable: keep subprocess.

  Q6_missed_dimensions_synthesized:
    - **Deployment surface** (claude): subprocess works in CI,
      headless servers, devcontainers, offline. Plugin path requires
      Claude Code running, removing those targets.
    - **Marketplace supply-chain trust** (codex): plugin install
      upgrades silently, auth state lives in plugin runtime, tool
      policy controlled by marketplace — moves trust boundary out
      of consensus-mcp's pyproject.toml + lockfile.
    - **Latency + observability** (gemini): each plugin call adds
      chat-intermediate overhead; failures in opaque plugin layer
      are harder to debug than subprocess stderr capture.

