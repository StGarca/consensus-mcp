proposal:
  selected_target: 'Decision: Do not pursue migration to the codex Claude Code plugin.'
  rationale_vs_alternatives: "The proposed migration from the `codex` CLI to the `codex@openai-codex`\
    \ plugin is ill-advised due to a fundamental architectural mismatch. The plugin\
    \ is designed for an interactive chat environment (Claude Code), not for programmatic,\
    \ non-interactive use by a backend service like consensus-mcp. The current subprocess-based\
    \ approach, while having its own complexities like stall detection, offers direct\
    \ control and, crucially, guarantees the ability to capture the model's raw, byte-for-byte\
    \ output. This guarantee is essential for the system's provenance and auditability\
    \ requirements (specifically `output_sha256`), and it would likely be lost when\
    \ passing calls through a chat-based intermediary. The potential benefits of the\
    \ plugin\u2014'better auth handling, smoother install, and reliability'\u2014\
    are speculative and do not outweigh the significant risks, which include increased\
    \ latency, a more complex and brittle dependency chain (coupling the system to\
    \ a chat client's plugin architecture), and a severe reduction in observability\
    \ for debugging. The architectural patterns required to make this work, such as\
    \ scripting a headless chat client, would be extraordinarily complex and fragile\
    \ compared to the current direct invocation."
  deliverable_scope:
    next_iteration_id: iter-0043-no-op
    files_in_scope: []
    files_out_of_scope:
    - consensus_mcp/_dispatch_codex.py
    key_design_decisions:
    - The final decision is to NOT proceed with the migration. The current implementation
      using a subprocess to invoke the `codex` CLI will be preserved.
    - The core reasoning is the unacceptable risk to the provenance chain and the
      introduction of a fragile, complex dependency on an interactive chat-based plugin
      system.
    acceptance_gates:
    - The consult reaches a consensus on the 'do not pursue' decision.
    - No changes will be made to the codex dispatch logic.
  risks:
  - 'Loss of Provenance: Inability to guarantee capture of the byte-for-byte raw output
    from the codex model, which breaks the SHA256-based audit trail.'
  - 'Architectural Coupling: Creates a hard dependency on an interactive chat client
    (Claude Code) and its plugin ecosystem, which is not designed for backend automation.'
  - 'Increased Complexity & Brittleness: The required workarounds, like scripting
    a headless client, are significantly more complex and prone to failure than the
    current subprocess management.'
  - 'Performance Degradation: Introducing a chat intermediary would almost certainly
    add significant latency to each codex call.'
  - 'Reduced Observability: Debugging would become much more difficult, as failures
    could occur within the opaque, intermediate chat/plugin layers.'
  estimated_complexity: large
