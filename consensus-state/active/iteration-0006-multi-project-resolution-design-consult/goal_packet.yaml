schema_version: 1
pilot_id: iteration-0006-multi-project-resolution-design-consult
goal:
  summary: Cross-AI consult on v1.13.0 multi-project resolution design (ship spec
    template + split spec/state roots).
  desired_end_state: "Codex reviews docs/design-consults/multi-project-resolution-v1.13.0.md\n\
    and emits ONE finding picking among Option A (approve as proposed),\nOption B\
    \ (approve the spirit, fix a defect \u2014 name the defect),\nOption C (reject,\
    \ propose alternative).\n\nThe finding's recommendation field carries the winning\
    \ option (A/B/C);\nrisk field carries the rationale (or defect description for\
    \ B,\nor alternative-approach summary for C). severity: low (design choice).\n\
    \nContext the maintainer wants codex to weigh:\n  - Currently REPO_ROOT controls\
    \ spec location, state location, AND\n    reviewable-file root. Frozen wheel installs\
    \ (no local checkout)\n    can't find the spec and refuse to boot in arbitrary\
    \ projects.\n  - Proposed: split into _resolve_spec_path() (env > legacy REPO_ROOT\
    \ >\n    walked-up checkout > packaged template) and _resolve_state_root()\n \
    \   (env > legacy REPO_ROOT > CWD), keeping _resolve_repo_root for\n    back-compat.\n\
    \  - Adds consensus_mcp/spec_template.md as shipped data so any\n    end user\
    \ gets a working spec without a local checkout.\n  - Goal: zero-per-project-setup\
    \ for end users; dev folder unchanged\n    via its existing project-scope .mcp.json\
    \ + CONSENSUS_MCP_REPO_ROOT.\n  - The 5 risks listed in the design doc are the\
    \ maintainer's\n    self-identified ones \u2014 codex should flag any additional\
    \ risks\n    or defects in the proposed code.\n\nEmpty findings is NOT acceptable\
    \ \u2014 the maintainer needs a verdict.\n"
  non_goals:
  - implement v1.13.0 code (this is a design call, not implementation)
  - propose unrelated refactors
  - touch existing iter-0001..0005 artifacts
