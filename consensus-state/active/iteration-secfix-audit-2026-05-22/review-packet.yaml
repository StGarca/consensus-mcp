      \    if verdict != \"approved\":\n        return _refuse(f\"claude_verification_not_approved:\
      \ verdict={verdict!r}\")\n\n    # --- Step 4: drift detection --------------------------------------------\n\
      \    # Lazy import: keep _closure_invariant a soft dependency.\n    from consensus_mcp._closure_invariant\
      \ import bundle_sha\n    # Defense-in-depth: refuse if base_sha is empty/missing.\
      \ Codex schema\n    # requires it, but apply layer must not silently skip drift\
      \ detection\n    # when the field is empty (review caught this; per codex 2026-05-10\
      \ v4\n    # the drift gate is non-optional).\n    if not base_sha:\n       \
      \ return _refuse(\n            \"base_sha_missing: patch_proposal.base_sha is\
      \ empty/missing; \"\n            \"drift detection requires the codex-reviewed\
      \ bundle hash\"\n        )\n    current_bundle = bundle_sha(repo_root, files_touched)\n\
      \    if current_bundle != base_sha:\n        return _refuse(\n            f\"\
      base_sha_drift: codex saw base_sha={base_sha}, \"\n            f\"current bundle_sha={current_bundle}\
      \ (touched files changed since codex review)\"\n        )\n\n    # --- Step\
      \ 5: stage + dry-run via existing T4 primitive -------------------\n    # Build\
      \ proposed_patches in the form patch.stage_and_dry_run expects:\n    # full-file\
      \ old_string -> new_string substitution. We synthesize old_string\n    # from\
      \ the file's current on-disk content and new_string from applying the\n    #\
      \ codex unified_diff. v1.0: codex's patch_proposal already serializes the\n\
      \    # post-patch full content via the test fixture's _new_content side-channel\n\
      \    # for unit tests, AND production codex emissions provide a unified_diff\n\
      \    # we re-apply via a minimal text patcher.\n    #\n    # For #26 this tool\
      \ accepts full-file replacement via the unified_diff\n    # being apply-able\
      \ by patching against the current file content. To keep\n    # the surgical\
      \ scope per the task brief we use the simplest viable path:\n    # require the\
      \ patch_proposal to contain pre/post content as a structured\n    # `_old_content`\
      \ + `_new_content` pair OR derive both from unified_diff.\n    # Prefer structured\
      \ fields when present; otherwise fall back to text\n    # diff application.\n\
      \    new_contents: dict[str, str] = {}\n    old_content = patch_proposal.get(\"\
      _old_content\")\n    new_content = patch_proposal.get(\"_new_content\")\n  \
      \  if (\n        old_content is not None\n        and new_content is not None\n\
