    consensus_mcp/_paths.py: "\"\"\"Lazy path resolution helpers.\n\nPer the iter-0024\
      \ converged plan (SHIP-PHASED, Phase A): introduce a single\nsource of truth\
      \ for resolving repo / state / archive / audit-log paths\nthat re-reads environment\
      \ state on every call so tests can\n`monkeypatch.setenv(\"CONSENSUS_MCP_REPO_ROOT\"\
      , str(tmp_path))` AFTER import\nand have it actually work.\n\nThis module is\
      \ PURELY ADDITIVE in Phase A — no existing tool is touched.\nTools migrate one\
      \ at a time in iter-0026+ (Phase B). iter-0019's\n`_isolate_archive_root` test\
      \ helper continues to monkeypatch the cached\nmodule-level attributes of un-migrated\
      \ tools.\n\nResolution semantics mirror `server.py`'s `_resolve_*` functions\
      \ exactly,\nsince v1.13.0 (iter-0007) already split REPO_ROOT into three orthogonal\n\
      concerns (spec / state / project). This module is the reusable embodiment\n\
      of that split.\n\nEnvironment variable precedence (per resolver):\n  - `repo_root()`\
      \         — `CONSENSUS_MCP_REPO_ROOT` → walked-up `__file__` → cwd\n  - `spec_path()`\
      \         — `CONSENSUS_MCP_SPEC_PATH` → legacy under repo_root → walked-up →\
      \ packaged template\n  - `state_root()`        — `CONSENSUS_MCP_STATE_ROOT`\
      \ → legacy under repo_root → cwd\n  - `project_root()`      — `CONSENSUS_MCP_PROJECT_ROOT`\
      \ → legacy repo_root → cwd\n\nDerived paths build on the resolvers and inherit\
      \ their laziness.\n\"\"\"\nfrom __future__ import annotations\n\nimport os\n\
      import sys\nfrom pathlib import Path\n\n\n# ---------------------------------------------------------------------------\n\
      # Resolvers — read env state on every call.\n# ---------------------------------------------------------------------------\n\
      \n\ndef repo_root() -> Path:\n    \"\"\"Resolve repo root.\n\n    Precedence:\n\
      \      1. `CONSENSUS_MCP_REPO_ROOT` env var (operator override)\n      2. Walked-up\
      \ `__file__` (dev checkout layout: this file's parent.parent\n         is the\
      \ repo root)\n      3. Current working directory (installed wheel / unusual\
      \ layouts)\n    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\"\
      )\n    if override:\n        return Path(override).resolve()\n    walked = Path(__file__).resolve().parent.parent\n\
      \    # Dev checkout: walked-up parent contains repo markers (pyproject.toml\n\
      \    # or .git). In an installed wheel, walked = site-packages/ which has\n\
      \    # `consensus_mcp/` as a sibling but neither pyproject.toml nor .git, so\n\
      \    # we must NOT return site-packages as the repo root.\n    if (walked /\
      \ \"pyproject.toml\").exists() or (walked / \".git\").exists():\n        return\
      \ walked\n    # Installed wheel / unusual layouts: cwd is the right fallback\
      \ so the\n    # orchestrator can still locate consensus-state/.\n    return\
      \ Path.cwd().resolve()\n\n\ndef spec_path() -> Path:\n    \"\"\"Resolve spec\
      \ path (orchestration-spec.md or packaged template).\n\n    Precedence:\n  \
      \    1. `CONSENSUS_MCP_SPEC_PATH` env override\n      2. Legacy under CONSENSUS_MCP_REPO_ROOT/docs/architecture/orchestration-spec.md\n\
      \      3. Walked-up dev-checkout spec\n      4. Packaged `spec_template.md`\
      \ (frozen-wheel fallback)\n    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_SPEC_PATH\"\
      )\n    if override:\n        return Path(override).resolve()\n    repo_root_env\
      \ = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n   \
      \     legacy = (\n            Path(repo_root_env).resolve()\n            / \"\
      docs\" / \"architecture\" / \"orchestration-spec.md\"\n        )\n        if\
      \ legacy.exists():\n            return legacy\n    walked = (\n        Path(__file__).resolve().parent.parent\n\
      \        / \"docs\" / \"architecture\" / \"orchestration-spec.md\"\n    )\n\
      \    if walked.exists():\n        return walked\n    return Path(__file__).resolve().parent\
      \ / \"spec_template.md\"\n\n\ndef state_root() -> Path:\n    \"\"\"Resolve state\
      \ root (consensus-state/ location).\n\n    Precedence:\n      1. `CONSENSUS_MCP_STATE_ROOT`\
      \ env override\n      2. Legacy under `CONSENSUS_MCP_REPO_ROOT`\n      3. `<cwd>/consensus-state`\n\
      \    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_STATE_ROOT\")\n \
      \   if override:\n        return Path(override).resolve()\n    repo_root_env\
      \ = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n   \
      \     return Path(repo_root_env).resolve() / \"consensus-state\"\n    return\
      \ Path.cwd().resolve() / \"consensus-state\"\n\n\ndef project_root() -> Path:\n\
      \    \"\"\"Resolve project root (reviewable-file root for goal_packet.allowed_files).\n\
      \n    Precedence:\n      1. `CONSENSUS_MCP_PROJECT_ROOT` env override\n    \
      \  2. Legacy `CONSENSUS_MCP_REPO_ROOT`\n      3. Current working directory\n\
      \    \"\"\"\n    override = os.environ.get(\"CONSENSUS_MCP_PROJECT_ROOT\")\n\
      \    if override:\n        return Path(override).resolve()\n    repo_root_env\
      \ = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if repo_root_env:\n   \
      \     return Path(repo_root_env).resolve()\n    return Path.cwd().resolve()\n\
      \n\n# ---------------------------------------------------------------------------\n\
      # Derived paths — compose the resolvers above; inherit laziness.\n# ---------------------------------------------------------------------------\n\
      \n\ndef archive_dir() -> Path:\n    \"\"\"consensus-state/archive/review-passes/\
      \ — sealed review-pass archive.\"\"\"\n    return state_root() / \"archive\"\
      \ / \"review-passes\"\n\n\ndef index_path() -> Path:\n    \"\"\"consensus-state/archive/review-passes/index.yaml\
      \ — pass index.\"\"\"\n    return archive_dir() / \"index.yaml\"\n\n\ndef active_dir()\
      \ -> Path:\n    \"\"\"consensus-state/active/ — per-iteration working directories.\"\
      \"\"\n    return state_root() / \"active\"\n\n\ndef audit_log_path() -> Path:\n\
      \    \"\"\"consensus-state/state/audit-log.jsonl — append-only audit event log.\"\
      \"\"\n    return state_root() / \"state\" / \"audit-log.jsonl\"\n\n\ndef dispatch_log_path()\
      \ -> Path:\n    \"\"\"consensus-state/state/dispatch-log.jsonl — append-only\
      \ dispatch event log.\"\"\"\n    return state_root() / \"state\" / \"dispatch-log.jsonl\"\
      \n\n\n# ---------------------------------------------------------------------------\n\
      # Path containment — shared fail-closed guard for operator/AI-supplied paths.\n\
      # 2026-05-22 consensus security review (CR-1/CR-3/CR-5, H-2): every caller that\n\
      # joins an untrusted relative/absolute path to a base directory before reading\n\
      # or writing MUST route it through resolve_contained() so a `../` traversal,\n\
      # an absolute path, or an in-base symlink-to-outside fails closed.\n# ---------------------------------------------------------------------------\n\
      \n\nclass PathTraversalError(ValueError):\n    \"\"\"A caller-supplied path\
      \ resolves outside its permitted base directory.\"\"\"\n\n\ndef is_contained(resolved:\
      \ Path, base_resolved: Path) -> bool:\n    \"\"\"True iff ``resolved`` is inside\
      \ ``base_resolved`` (both already resolved).\n\n    Mirrors ``_author_review_packet._is_contained``,\
      \ including the Windows\n    case-fold fallback: ``Path.relative_to`` is a case-sensitive\
      \ string\n    compare, but Windows filesystems are case-insensitive, so a mixed-case\n\
      \    base vs path would otherwise trigger a false-positive rejection.\n    \"\
      \"\"\n    try:\n        resolved.relative_to(base_resolved)\n        return\
      \ True\n    except ValueError:\n        if sys.platform == \"win32\":\n    \
      \        resolved_lc = str(resolved).lower().replace(\"\\\\\", \"/\")\n    \
      \        base_lc = str(base_resolved).lower().replace(\"\\\\\", \"/\")\n   \
      \         if resolved_lc == base_lc or resolved_lc.startswith(base_lc.rstrip(\"\
      /\") + \"/\"):\n                return True\n        return False\n\n\ndef resolve_contained(base:\
      \ Path, rel: str) -> Path:\n    \"\"\"Resolve ``rel`` under ``base`` and confirm\
      \ it stays inside ``base``.\n\n    Resolves symlinks and ``..`` BEFORE the containment\
      \ check (fail-closed):\n    an absolute path, a ``../`` traversal, or an in-base\
      \ symlink whose real\n    target is outside ``base`` all raise :class:`PathTraversalError`.\
      \ Returns\n    the resolved absolute path on success.\n    \"\"\"\n    base_resolved\
      \ = Path(base).resolve()\n    candidate = (base_resolved / rel).resolve()\n\
      \    if not is_contained(candidate, base_resolved):\n        raise PathTraversalError(\n\
      \            f\"{rel!r} resolves to {candidate} which is outside {base_resolved}\"\
      \n        )\n    return candidate\n"
    consensus_mcp/tools/apply_codex_patch.py: "\"\"\"apply.codex_patch MCP tool —\
      \ Task #26 (iter-0016).\n\nPer codex 2026-05-10 v4 directive (memory/project_codex_fix_author_directive.md):\n\
      Staged-apply of a codex-emitted patch that has been claude-verified per\nCLAUDE.md.\n\
      \nRefuses by default. Application requires BOTH:\n  1. goal_packet.authorization.codex_patch_apply_authorized\
      \ == True\n  2. env CONSENSUS_MCP_CODEX_PATCH_APPLY == \"1\"\n\nRefuses without\
      \ claude verification (verdict=approved). Detects base_sha drift\nbetween codex\
      \ review time and apply time (touched-file content changed under\ncodex's feet).\
      \ On success emits canonical apply_step_landed audit event with\nthe structured\
      \ last_mutation event object (per #28 closure invariant).\n\nThe implementation:\n\
      \  - REUSES patch.stage_and_dry_run (T4) for the staged dry-run validator gate\n\
      \  - DOES NOT reuse patch.apply_consensus_patch (T5); the apply step is bespoke\n\
      \    (per-file os.replace atomic apply or unified-diff applier). T5 expects\n\
      \    consensus.yaml-driven full-file overwrites with consensus_patch_id\n  \
      \  semantics; codex patches use a different shape (patch_proposal with\n   \
      \ base_sha/unified_diff) so apply_codex_patch authors its own apply step.\n\
      \    If T5's apply contract evolves to match patch_proposal shape, the bespoke\n\
      \    apply could be replaced with a T5 call — currently they diverge.\n\"\"\"\
      \nfrom __future__ import annotations\n\nimport hashlib\nimport os\nimport re\n\
      from datetime import datetime, timezone\nfrom pathlib import Path\nfrom typing\
      \ import Any\n\nimport yaml\n\n\nSCHEMA = {\n    \"name\": \"apply.codex_patch\"\
      ,\n    \"description\": (\n        \"Apply a codex-emitted patch that has been\
      \ claude-verified per CLAUDE.md. \"\n        \"Refuses by default; requires\
      \ both goal_packet.authorization.\"\n        \"codex_patch_apply_authorized=true\
      \ AND env CONSENSUS_MCP_CODEX_PATCH_APPLY=1. \"\n        \"Refuses if no claude\
      \ verification with verdict=approved exists. \"\n        \"Refuses if patch_proposal.base_sha\
      \ doesn't match current state of touched files \"\n        \"(drift detection).\
      \ On success, emits apply_step_landed audit event with the \"\n        \"structured\
      \ last_mutation event object.\"\n    ),\n    \"input_schema\": {\n        \"\
      type\": \"object\",\n        \"properties\": {\n            \"iteration_dir\"\
      : {\"type\": \"string\"},\n            \"patch_id\": {\"type\": \"string\",\
      \ \"pattern\": \"^codex-rev-\\\\d+-patch$\"},\n            \"actor\": {\n  \
      \              \"type\": \"object\",\n                \"properties\": {\n  \
      \                  \"id\": {\"type\": \"string\"},\n                    \"model_family\"\
      : {\"enum\": [\"codex\", \"claude\"]},\n                    \"role\": {\"enum\"\
      : [\"fix_author\", \"correction_author\"]},\n                    \"pass_id\"\
      : {\"type\": \"string\"},\n                },\n                \"required\"\
      : [\"id\", \"model_family\", \"role\", \"pass_id\"],\n                \"additionalProperties\"\
      : False,\n            },\n        },\n        \"required\": [\"iteration_dir\"\
      , \"patch_id\", \"actor\"],\n        \"additionalProperties\": False,\n    },\n\
      \    \"output_schema\": {\n        \"type\": \"object\",\n        \"properties\"\
      : {\n            \"ok\": {\"type\": \"boolean\"},\n            \"applied\":\
      \ {\"type\": \"boolean\"},\n            \"last_mutation\": {\"type\": [\"object\"\
      , \"null\"]},\n            \"error\": {\"type\": [\"string\", \"null\"]},\n\
      \            \"audit_event_id\": {\"type\": [\"string\", \"null\"]},\n     \
      \   },\n        \"required\": [\"ok\", \"applied\"],\n    },\n}\n\n\n_PATCH_ID_PATTERN\
      \ = re.compile(r\"^codex-rev-\\d+-patch$\")\n\n\ndef _resolve_repo_root() ->\
      \ Path:\n    \"\"\"CONSENSUS_MCP_REPO_ROOT env-var override -> source-tree-relative\
      \ discovery.\n\n    Mirrors the resolver used by audit_append_event + patch_stage_and_dry_run\n\
      \    so this tool, T4, and T6 always agree on REPO_ROOT.\n    \"\"\"\n    override\
      \ = os.environ.get(\"CONSENSUS_MCP_REPO_ROOT\")\n    if override:\n        return\
      \ Path(override)\n    return Path(__file__).resolve().parent.parent.parent\n\
      \n\ndef _now_utc() -> str:\n    return (\n        datetime.now(timezone.utc)\n\
      \        .replace(microsecond=0)\n        .isoformat()\n        .replace(\"\
      +00:00\", \"Z\")\n    )\n\n\ndef _read_yaml(path: Path) -> dict:\n    if not\
      \ path.exists():\n        return {}\n    try:\n        data = yaml.safe_load(path.read_text(encoding=\"\
      utf-8\"))\n    except Exception:\n        return {}\n    return data if isinstance(data,\
      \ dict) else {}\n\n\ndef _refuse(error: str, last_mutation: dict | None = None)\
      \ -> dict:\n    return {\n        \"ok\": False,\n        \"applied\": False,\n\
      \        \"last_mutation\": last_mutation,\n        \"error\": error,\n    \
      \    \"audit_event_id\": None,\n    }\n\n\ndef _validate_actor(actor: dict)\
      \ -> str | None:\n    \"\"\"Defense-in-depth actor validation for direct Python\
      \ handle() calls.\n\n    iter-0026 F4-001 (claude-iter0025-001 fix): the prior\
      \ key-presence check\n    accepted ``id=\"\"`` / ``pass_id=None`` / ``id=42``\
      \ which corrupt the\n    audit-log provenance. Both id and pass_id MUST be non-empty\
      \ strings.\n    \"\"\"\n    if not isinstance(actor, dict):\n        return\
      \ \"actor_invalid: actor must be a dict\"\n    required = (\"id\", \"model_family\"\
      , \"role\", \"pass_id\")\n    missing = [key for key in required if key not\
      \ in actor]\n    if missing:\n        return \"actor_invalid: missing required\
      \ actor key(s): \" + \", \".join(missing)\n    # iter-0026 F4-001: id and pass_id\
      \ must be non-empty strings.\n    for key in (\"id\", \"pass_id\"):\n      \
      \  value = actor.get(key)\n        if not isinstance(value, str) or not value:\n\
      \            return (\n                f\"actor_invalid: {key} must be a non-empty\
      \ string; \"\n                f\"got {type(value).__name__}={value!r}\"\n  \
      \          )\n    if actor.get(\"model_family\") not in (\"codex\", \"claude\"\
      ):\n        return \"actor_invalid: model_family must be 'codex' or 'claude'\"\
      \n    if actor.get(\"role\") not in (\"fix_author\", \"correction_author\"):\n\
      \        return \"actor_invalid: role must be 'fix_author' or 'correction_author'\"\
      \n    return None\n\n\ndef handle(\n    iteration_dir: str,\n    patch_id: str,\n\
      \    actor: dict,\n) -> dict:\n    \"\"\"Apply a verified codex patch under\
      \ operator authorization.\"\"\"\n    iter_dir = Path(iteration_dir)\n    repo_root\
      \ = _resolve_repo_root()\n\n    # --- CR-5 (2026-05-22 security review): iteration_dir\
      \ trust boundary ------\n    # iteration_dir is caller-supplied and authorization\
      \ is read FROM it\n    # (goal_packet.yaml below). A caller could point T6 at\
      \ a crafted dir whose\n    # own goal_packet self-grants codex_patch_apply_authorized,\
      \ defeating that\n    # half of the dual interlock. Require it under the canonical\
      \ active root\n    # before reading any authorization or patch artifact.\n \
      \   from consensus_mcp._paths import is_contained\n    _active_root = (repo_root\
      \ / \"consensus-state\" / \"active\").resolve()\n    if not is_contained(iter_dir.resolve(),\
      \ _active_root):\n        return _refuse(\n            \"iteration_dir_outside_canonical_root:\
      \ iteration_dir must be under \"\n            f\"consensus-state/active/ (got\
      \ {iter_dir})\"\n        )\n\n    actor_error = _validate_actor(actor)\n   \
      \ if actor_error:\n        return _refuse(actor_error)\n\n    # Defense-in-depth:\
      \ validate patch_id format. The MCP layer enforces this\n    # via the input_schema\
      \ pattern; record_verdict validates likewise. We\n    # re-check here so a misuse\
      \ via direct python import can't slip past.\n    if not _PATCH_ID_PATTERN.match(patch_id):\n\
      \        return _refuse(\n            f\"invalid_patch_id_format: must match\
      \ ^codex-rev-\\\\d+-patch$; \"\n            f\"got {patch_id!r}\"\n        )\n\
      \n    # --- Step 1: authorization gate (FAILS-CLOSED) ---------------------------\n\
      \    env_flag = os.environ.get(\"CONSENSUS_MCP_CODEX_PATCH_APPLY\") == \"1\"\
      \n    goal_packet = _read_yaml(iter_dir / \"goal_packet.yaml\")\n    auth =\
      \ goal_packet.get(\"authorization\") or {}\n    gp_flag = auth.get(\"codex_patch_apply_authorized\"\
      ) is True\n\n    if not (env_flag and gp_flag):\n        missing: list[str]\
      \ = []\n        if not env_flag:\n            missing.append(\"env CONSENSUS_MCP_CODEX_PATCH_APPLY=1\"\
      )\n        if not gp_flag:\n            missing.append(\"goal_packet.authorization.codex_patch_apply_authorized=true\"\
      )\n        return _refuse(\n            \"operator_authorization_missing: \"\
      \ + \" AND \".join(missing)\n        )\n\n    # --- Step 2: load codex-review.yaml\
      \ and locate the patch_proposal --------\n    review = _read_yaml(iter_dir /\
      \ \"codex-review.yaml\")\n    if not review:\n        return _refuse(\"codex_review_missing:\
      \ codex-review.yaml not found or unreadable\")\n    findings = review.get(\"\
      findings\") or []\n    patch_proposal: dict | None = None\n    finding_id: str\
      \ | None = None\n    for f in findings:\n        if not isinstance(f, dict):\n\
      \            continue\n        pp = f.get(\"patch_proposal\")\n        if isinstance(pp,\
      \ dict) and pp.get(\"patch_id\") == patch_id:\n            patch_proposal =\
      \ pp\n            finding_id = f.get(\"id\")\n            break\n    if patch_proposal\
      \ is None:\n        return _refuse(\n            f\"patch_proposal_missing:\
      \ no finding in codex-review.yaml has \"\n            f\"patch_proposal.patch_id={patch_id!r}\"\
      \n        )\n\n    files_touched = list(patch_proposal.get(\"files_touched\"\
      ) or [])\n    base_sha = patch_proposal.get(\"base_sha\") or \"\"\n    unified_diff\
      \ = patch_proposal.get(\"unified_diff\") or \"\"\n\n    # --- CR-1 + CR-2 (2026-05-22\
      \ security review): containment + scope gate ---\n    # files_touched is AI-supplied.\
      \ Fail CLOSED before any read/write:\n    #   CR-1 each path must resolve INSIDE\
      \ repo_root (no ../ or absolute escape)\n    #   CR-2 each path must be within\
      \ goal_packet.allowed_files and must not\n    #        match forbidden_files.\
      \ Previously only validate_disposition_index\n    #        ran in the staging\
      \ gate, which never checks source-file targets.\n    from consensus_mcp._paths\
      \ import resolve_contained, PathTraversalError\n    from consensus_mcp.validators.scope_check\
      \ import _matches_any\n    _gp_allowed = goal_packet.get(\"allowed_files\")\n\
      \    _gp_forbidden = goal_packet.get(\"forbidden_files\")\n    _gp_allowed =\
      \ _gp_allowed if isinstance(_gp_allowed, list) else []\n    _gp_forbidden =\
      \ _gp_forbidden if isinstance(_gp_forbidden, list) else []\n    for _rel in\
      \ files_touched:\n        try:\n            resolve_contained(repo_root, _rel)\n\
      \        except PathTraversalError as exc:\n            return _refuse(f\"path_traversal:\
      \ {exc}\")\n        if _matches_any(_gp_forbidden, _rel) or not _matches_any(_gp_allowed,\
      \ _rel):\n            return _refuse(\n                f\"out_of_scope: files_touched\
      \ entry {_rel!r} is not within \"\n                \"goal_packet.allowed_files\"\
      \n            )\n\n    # --- Step 3: claude verification gate ------------------------------------\n\
      \    verif_path = iter_dir / \"codex-patch-verifications\" / f\"{patch_id}.yaml\"\
      \n    if not verif_path.exists():\n        return _refuse(\"claude_verification_missing\"\
