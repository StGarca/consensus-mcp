schema_version: 1
pilot_id: iteration-0026-migrate-ledger-tool
goal:
  summary: |
    iter-0026 — first Phase B migration per iter-0024 converged plan.
    Migrate `consensus_mcp/tools/state_read_decision_ledger.py` (lowest-
    load-bearing tool per the converged Phase B order) from its module-
    level `REPO_ROOT = _resolve_repo_root()` capture to lazy
    `_paths.state_root()` composition. Adds first-ever test coverage for
    this tool (it was uncovered) demonstrating the lazy-resolution win.
  desired_end_state: |
    state_read_decision_ledger.py no longer captures REPO_ROOT or
    LEDGER_PATH at module load. The legacy `_resolve_repo_root` helper
    function is removed. A new local `_ledger_path()` function composes
    `state_root() / 'state' / 'disposition-ledger.yaml'` and is called
    inside `handle()` so each invocation honors current env state. The
    public tool surface (SCHEMA, handle, register) is unchanged — name,
    input_schema, output_schema, register signature all stable.

    `test_state_read_decision_ledger.py` (new) exercises:
      - missing ledger returns error
      - present ledger returns yaml + 64-char sha256
      - lazy state_root resolution: setenv→handle→setenv-to-different-
        path→handle returns DIFFERENT content from second path (the
        iter-0019 gotcha that the migration fixes)
      - cache returns same payload on unchanged file
      - register() attaches tool to a fresh ToolRegistry

    Full suite: 711 pass + 1 skipped + 0 fail (706 + 5 new tests).
  non_goals:
    - migrating any other tool (iter-0027+ will do those one at a time)
    - retiring iter-0019 `_isolate_archive_root` (Phase C)
    - changing the tool's MCP surface (schema, return shape)
    - changing _paths.py
allowed_files:
  - consensus_mcp/tools/state_read_decision_ledger.py
  - consensus_mcp/tests/test_state_read_decision_ledger.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/_paths.py
  - consensus_mcp/server.py
  - consensus_mcp/tools/audit_append_event.py
  - consensus_mcp/tools/gate_evaluate_production_with_scope_match.py
  - consensus_mcp/tools/patch_apply_consensus_patch.py
  - consensus_mcp/tools/patch_stage_and_dry_run.py
  - consensus_mcp/tools/repo_get_section.py
  - consensus_mcp/tools/repo_set_section.py
  - consensus_mcp/tools/review_read_post_seal.py
  - consensus_mcp/tools/review_write_and_seal.py
  - consensus_mcp/tools/state_update_decision_ledger.py
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/contributors/
  - consensus_mcp/config.py
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/_engine_factory.py
  - consensus_mcp/_snapshot_state.py
  - consensus_mcp/_import_parent_history.py
  - consensus-state/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
max_iterations: 1
max_patch_size: 200
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=711 green
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2
    description: lazy-resolution regression test passes
    check: py -3.11 -m pytest consensus_mcp/tests/test_state_read_decision_ledger.py::test_lazy_state_root_resolution -q
  - id: A3
    description: module no longer has top-level REPO_ROOT
    check: 'py -3.11 -c "import re; t=open(''consensus_mcp/tools/state_read_decision_ledger.py'',encoding=''utf-8'').read(); assert not re.search(r''^REPO_ROOT\s*='', t, re.M); assert not re.search(r''^LEDGER_PATH\s*='', t, re.M); print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
