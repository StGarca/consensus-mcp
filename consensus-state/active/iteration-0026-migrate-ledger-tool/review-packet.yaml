  touched_files_contents:
    consensus_mcp/tools/state_read_decision_ledger.py: "\"\"\"state.read_decision_ledger MCP tool. Phase 1 G5 partial.\n\nReplaces direct yaml.safe_load of consensus-state/state/disposition-ledger.yaml\nwith mediated read + cache + auto-invalidate.\n\nCache invalidation: cache stores (ledger_sha256, yaml_text, mtime_ns). On read,\ncheck stat(disposition-ledger.yaml).st_mtime_ns; if changed since cached,\nre-read. Else serve from cache.\n\niter-0026 (Phase B step 1 per iter-0024 converged plan): migrated from\nmodule-level REPO_ROOT capture to lazy `_paths.state_root()` resolution.\nPath resolution now reads env state on every call, so test fixtures using\n`monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\", str(tmp_path))` work without\nneeding iter-0019's `_isolate_archive_root` monkeypatch for this tool.\n\nPer design spec:\n- callable_by: any (read-only)\n- inputs: {} (no parameters)\n- outputs: {ledger_yaml: string, ledger_sha256: string}\n- ledger_sha256 uses canonical_yaml_sha256 formula per spec section 7:\n    hashlib.sha256(yaml.safe_dump(yaml.safe_load(open(p)), sort_keys=True).encode('utf-8')).hexdigest()\n\"\"\"\nfrom __future__ import annotations\nimport hashlib\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp._paths import state_root\n\n\ndef _ledger_path() -> Path:\n    \"\"\"Resolve <state_root>/state/disposition-ledger.yaml lazily.\n\n    Honors CONSENSUS_MCP_STATE_ROOT / CONSENSUS_MCP_REPO_ROOT at call time.\n    \"\"\"\n    return state_root() / \"state\" / \"disposition-ledger.yaml\"\n\n\nSCHEMA = {\n    \"name\": \"state.read_decision_ledger\",\n    \"description\": (\n        \"Read the disposition ledger. Cached; auto-invalidates when the file changes on disk. \"\n        \"Returns ledger content as YAML string plus canonical SHA-256.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {},\n        \"additionalProperties\": False,\n    },\n    \"output_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"ledger_yaml\": {\"type\": \"string\"},\n            \"ledger_sha256\": {\"type\": \"string\"},\n        },\n        \"required\": [\"ledger_yaml\", \"ledger_sha256\"],\n    },\n}\n\n_CACHE: dict = {\"sha256\": None, \"yaml_text\": None, \"mtime_ns\": None}\n\n\ndef _canonical_sha256(path: Path) -> tuple[str, str]:\n    \"\"\"Return (yaml_text, sha256_hex) for the file at path using canonical formula.\"\"\"\n    raw = path.read_bytes()\n    loaded = yaml.safe_load(raw)\n    yaml_text = yaml.safe_dump(loaded, sort_keys=True)\n    sha = hashlib.sha256(yaml_text.encode(\"utf-8\")).hexdigest()\n    return yaml_text, sha\n\n\ndef handle() -> dict:\n    \"\"\"MCP tool handler. No inputs per schema (inputs: {}).\n\n    Called via handler(**{}) from server dispatch, or directly as handle().\n    \"\"\"\n    ledger_path = _ledger_path()\n    try:\n        current_mtime_ns = ledger_path.stat().st_mtime_ns\n    except FileNotFoundError:\n        return {\"error\": f\"ledger not found: {ledger_path}\"}\n\n    if _CACHE[\"mtime_ns\"] == current_mtime_ns and _CACHE[\"sha256\"] is not None:\n        return {\"ledger_yaml\": _CACHE[\"yaml_text\"], \"ledger_sha256\": _CACHE[\"sha256\"]}\n\n    yaml_text, sha = _canonical_sha256(ledger_path)\n    _CACHE[\"mtime_ns\"] = current_mtime_ns\n    _CACHE[\"yaml_text\"] = yaml_text\n    _CACHE[\"sha256\"] = sha\n    return {\"ledger_yaml\": yaml_text, \"ledger_sha256\": sha}\n\n\ndef register(registry) -> None:\n    \"\"\"Register this tool with the server's ToolRegistry.\"\"\"\n    registry.register(SCHEMA[\"name\"], SCHEMA, handle)\n"
    consensus_mcp/tests/test_state_read_decision_ledger.py: "\"\"\"Tests for state.read_decision_ledger MCP tool.\n\niter-0026 (Phase B step 1 of iter-0024 plan): added when migrating this\ntool to use `_paths.state_root()` instead of a module-level REPO_ROOT\ncapture. Demonstrates the migration win: `monkeypatch.setenv()` after\nimport now redirects the ledger lookup without needing the iter-0019\n`_isolate_archive_root` helper.\n\"\"\"\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport pytest\nimport yaml\n\nfrom consensus_mcp.tools import state_read_decision_ledger as tool\n\n\n@pytest.fixture(autouse=True)\ndef _clear_cache():\n    \"\"\"Reset the module-level cache between tests so prior runs don't leak.\"\"\"\n    tool._CACHE[\"sha256\"] = None\n    tool._CACHE[\"yaml_text\"] = None\n    tool._CACHE[\"mtime_ns\"] = None\n    yield\n    tool._CACHE[\"sha256\"] = None\n    tool._CACHE[\"yaml_text\"] = None\n    tool._CACHE[\"mtime_ns\"] = None\n\n\ndef _write_ledger(state_root: Path, content: dict) -> Path:\n    ledger_dir = state_root / \"state\"\n    ledger_dir.mkdir(parents=True, exist_ok=True)\n    ledger_path = ledger_dir / \"disposition-ledger.yaml\"\n    ledger_path.write_text(yaml.safe_dump(content), encoding=\"utf-8\")\n    return ledger_path\n\n\ndef test_read_missing_ledger_returns_error(tmp_path, monkeypatch):\n    monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\", str(tmp_path))\n    result = tool.handle()\n    assert \"error\" in result\n    assert \"ledger not found\" in result[\"error\"]\n\n\ndef test_read_returns_yaml_and_sha(tmp_path, monkeypatch):\n    monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\", str(tmp_path))\n    _write_ledger(tmp_path, {\"entries\": [{\"id\": \"iter-0001\"}]})\n    result = tool.handle()\n    assert \"error\" not in result\n    assert \"entries\" in result[\"ledger_yaml\"]\n    assert len(result[\"ledger_sha256\"]) == 64\n\n\ndef test_lazy_state_root_resolution(tmp_path, monkeypatch):\n    \"\"\"The iter-0026 win: changing CONSENSUS_MCP_STATE_ROOT between calls\n    redirects the lookup without needing _isolate_archive_root.\n\n    Before iter-0026, module-level REPO_ROOT capture would have frozen the\n    ledger path at import time. This test would have failed.\"\"\"\n    first = tmp_path / \"first\"\n    first.mkdir()\n    second = tmp_path / \"second\"\n    second.mkdir()\n\n    monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\", str(first))\n    _write_ledger(first, {\"loc\": \"first\"})\n    r1 = tool.handle()\n    assert \"first\" in r1[\"ledger_yaml\"]\n\n    # Reset cache + flip env (the iter-0019 gotcha that the migration fixes).\n    tool._CACHE[\"sha256\"] = None\n    tool._CACHE[\"yaml_text\"] = None\n    tool._CACHE[\"mtime_ns\"] = None\n\n    monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\", str(second))\n    _write_ledger(second, {\"loc\": \"second\"})\n    r2 = tool.handle()\n    assert \"second\" in r2[\"ledger_yaml\"]\n    assert r1[\"ledger_sha256\"] != r2[\"ledger_sha256\"]\n\n\ndef test_cache_returns_same_payload_on_unchanged_file(tmp_path, monkeypatch):\n    monkeypatch.setenv(\"CONSENSUS_MCP_STATE_ROOT\", str(tmp_path))\n    _write_ledger(tmp_path, {\"key\": \"value\"})\n    r1 = tool.handle()\n    r2 = tool.handle()\n    assert r1[\"ledger_sha256\"] == r2[\"ledger_sha256\"]\n    assert r1[\"ledger_yaml\"] == r2[\"ledger_yaml\"]\n\n\ndef test_register_attaches_tool():\n    from consensus_mcp.tool_registry import ToolRegistry\n    registry = ToolRegistry()\n    tool.register(registry)\n    listed = registry.list_tools()\n    names = {t[\"name\"] for t in listed}\n    assert \"state.read_decision_ledger\" in names\n"
schema_version: 1
