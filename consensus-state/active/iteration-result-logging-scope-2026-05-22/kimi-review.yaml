goal_satisfied_rationale: "The core gap is not a missing database table \u2014 it\
  \ is that findings, fixes, and dispositions live in 3+ incompatible shapes (sealed\
  \ review passes, converged-plan prose, iteration-outcome schemas that vary by era)\
  \ and are never normalized at a single point. Three alternatives were considered:\n\
  \n**Alternative A: Extend iteration-outcome.yaml.** Rejected because iteration-outcome.yaml\
  \ already has schema drift across workflow modes (old v1 shape vs newer post-review\
  \ shape). Adding aggregation fields to a workflow-specific file would compound the\
  \ uncountability problem we are solving. A dedicated, versioned artifact with a\
  \ single schema is the fix, not more polymorphism.\n\n**Alternative B: Centralized\
  \ JSONL stream in consensus-state/state/results.jsonl.** Rejected because it would\
  \ require a new gitignore line (not project-local by inheritance) and append-only\
  \ semantics make corrections hard. The existing per-iteration pattern (self-contained\
  \ dirs under consensus-state/active/iteration-*/) is already gitignored (verified\
  \ .gitignore:41) and proven for audit isolation.\n\n**Alternative C: Manual results\
  \ tool that the operator runs after close.** Rejected because manual logging is\
  \ exactly why the current history is uncountable. The recording must be automatic\
  \ at the close boundary.\n\nThe selected approach introduces a new canonical file,\
  \ iteration-results.yaml, written automatically inside each iteration directory\
  \ at iteration_closed time by hooking the existing audit_append_event.py gate. This\
  \ reuses the only automatic, fail-closed boundary in the pipeline (the close gate\
  \ already refuses unaudited mutations and cross-verification failures). A new CLI\
  \ `consensus results` rolls up all iteration-results.yaml files into a trustworthy\
  \ scorecard. The schema is versioned from day 1 so future eras remain countable."
