goal_satisfied_rationale: This proposal directly addresses all seven design questions
  in the brief with a coherent, fail-closed, and forward-looking system. It favors
  creating a new, trustworthy data source over attempting a complex and likely unreliable
  backfill of inconsistent historical data. By hooking into the existing `iteration_closed`
  event in `audit_append_event.py`, the creation of the result log becomes an automatic,
  non-intrusive part of the existing workflow, ensuring data capture is consistent.
  A dedicated `run-result.yaml` file per iteration is the cleanest approach; it co-locates
  the result with the iteration's other artifacts and is guaranteed to be gitignored
  by existing rules. A new schema file (`run_result.v1.schema.json`) and a version
  number in the document itself make the system maintainable and extensible, directly
  preventing the 'uncountable eras' problem. A new, separate aggregation tool (`consensus-mcp
  results`) provides the requested project-level scorecard without bloating existing
  tools. This approach is superior to alternatives like trying to query the disparate
  existing files (`*-review.yaml`, prose summaries) at runtime, which the brief demonstrates
  has already failed.
