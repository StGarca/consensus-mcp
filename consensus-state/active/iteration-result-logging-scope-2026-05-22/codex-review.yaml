goal_satisfied_rationale: 'Differential/prior: the durable unit should be the existing
  canonical event stream, not another prose summary, because the demonstrated failure
  is format drift between sealed passes, converged plans, and summaries. A single
  append/update results ledger under consensus-state/state preserves project locality
  and aggregation without committing run results. This path is verified gitignored
  by .gitignore:42-43 (`consensus-state/state/*.jsonl`, `consensus-state/state/*.yaml`)
  and project-specific by the brief''s verified constraint that each project has its
  own consensus-state/. I prefer this over writing only per-iteration files under
  active/ because active artifacts are lifecycle-bound and harder to roll up; over
  committing archive artifacts because the brief explicitly forbids committing run
  results; and over a standalone manual CLI because the gap is caused by prose-only/manual
  signals. CLI exposure should use the existing installed console-script surface,
  verified via pyproject.toml:18-25 (`[project.scripts]`, `consensus-mcp`, `consensus`),
  not an inferred registry or distribution channel. Mechanism claim falsifiability:
  the claim that audit events are the right automatic hook is falsifiable from artifacts;
  the external refuting observation would be a real consensus run that reaches closure
  without invoking audit.append_event for review_returned_and_sealed, consensus_built,
  apply_step_landed, or iteration_closed. Until such an observation, this is the best
  minimal integration point.'
