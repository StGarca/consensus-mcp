goal_satisfied: true
goal_satisfied_rationale: 'Differential/prior: the safest design is the one that preserves
  the existing contributor abstraction while adding the least new invocation surface.
  The verified project surface already routes contributors through `ContributorAdapter.dispatch(packet)
  -> SealedArtifact` (verified via `contributors/base.py`: `ContributorAdapter`, `DispatchPacket`,
  `SealedArtifact`) and builds contributors from config/profile resolution (verified
  via `_engine_factory.py`: registered/built-in/profile resolution). The verified
  host channel is an in-process artifact callback, not a Claude CLI (verified via
  `_engine_factory.py`: `build_adapters(..., claude_artifact_callback=...)` and the
  `key == "claude"` special case). Therefore the right move is not a raw second `claude_artifact_callback`
  hidden inside existing Claude behavior, because that under-exposes config/provenance/weighting/gate
  exclusion. It is also not direct host-spawned subagent as the engine mechanism,
  because no host-spawn API is verified in the embedded project artifacts; that can
  be the host''s implementation behind the callback, but not the engine contract.
  `kind: host_peer` gives the same open contributor/profile ergonomics as `kind: cli_reviewer`
  while failing closed when the host callback is absent. Mechanism claim caveat: the
  guarantee that the host callback truly creates a fresh context is not fully falsifiable
  from these embedded Python artifacts alone; it depends on the host runtime. Pre-specified
  external refuting observation: if the callback returns a sealed artifact whose required
  `fresh_context_attestation.context_id` equals the orchestrator context id, or whose
  transcript/input manifest contains revealed peer proposals during the blind propose
  dispatch, the fresh-context hypothesis is false.'
