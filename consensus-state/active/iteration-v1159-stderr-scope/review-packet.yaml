      \ on a proc that never exits → wedged. The\n    event assertions are checked\
      \ by the caller AFTER thread death.\n\n    Fully park-synced (no t0-capture\
      \ race, no real-sleep budget):\n    1. Wait for the runner's first park (prologue\
      \ + the fake's\n       `_t0 = now()` capture complete) OR the runner already\
      \ died.\n    2. Each round: advance one logical chunk, then wait until the\n\
      \       runner parked again having observed this advance (still running)\n \
      \      OR the runner thread died. Both are Condition-notified —\n       guaranteed\
      \ waker on every path; ceiling → release_all() → loud\n       fast fail, never\
      \ a wedged CI job. `until` is accepted for\n       call-site readability only\
      \ and does not gate termination.\"\"\"\n    # Startup: wait until the runner\
      \ has parked once (prologue + the\n    # fake's _t0=now() capture complete)\
      \ OR the runner thread already\n    # died — an abort can fire on iteration\
      \ 1 (e.g. operator-signal\n    # written before drive) BEFORE the loop ever\
      \ reaches _sleep, so\n    # \"parked\" is not guaranteed; thread-death is the\
      \ universal escape.\n    if not clock.wait_for(lambda: (not th.is_alive()) or\
      \ clock._sleepers > 0):\n        clock.release_all()\n        th.join(timeout=5)\n\
      \        raise AssertionError(\"_drive: runner neither parked nor exited at\
      \ startup (release_all fired)\")\n\n    rounds = 0\n    while th.is_alive()\
      \ and rounds < max_rounds:\n        e = clock.advance(chunk)\n        # codex-v1159-wfb-2\
      \ codex-rev-001 (BLOCKING, integrated): the\n        # per-round wait return\
      \ MUST be acted on. A False return means\n        # _CEILING elapsed with neither\
      \ runner re-park (epoch>=e) nor\n        # thread death — under correct notify-driven\
