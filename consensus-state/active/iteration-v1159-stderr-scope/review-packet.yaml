      \"\"\n        return 2_147_483_647\n\n    def wait(self, timeout=None):\n  \
      \      # Exit is controlled via clock + terminate/kill; production only\n  \
      \      # calls wait() after terminate/kill, by which point _exited is set.\n\
      \        return self.returncode\n\n\ndef _make_factory(\n    clock: _SyncClock,\n\
      \    *,\n    scheduled_stdout=None,\n    scheduled_stderr=None,\n    returncode:\
      \ int = 0,\n    exit_at: float = 1.0,\n    output_payload: str = '{\"ok\": true}',\n\
      ):\n    \"\"\"Build a popen_factory closure for injection into `_invoke_codex`.\n\
      \n    `factory.instances` records every `StreamingFakeCodexPopen`\n    created\
      \ so a test can assert process-side-effects (codex-v1159-\n    wfb-3 codex-rev-001:\
      \ the operator-abort test must verify the\n    real SIGTERM/terminate happened,\
      \ not just the log/signal-file).\"\"\"\n\n    instances: list = []\n\n    def\
      \ factory(cmd, **kwargs):\n        p = StreamingFakeCodexPopen(\n          \
      \  cmd,\n            _scheduled_stdout=scheduled_stdout,\n            _scheduled_stderr=scheduled_stderr,\n\
      \            _returncode=returncode,\n            _exit_at=exit_at,\n      \
      \      _clock=clock,\n            _output_payload=output_payload,\n        \
      \    **kwargs,\n        )\n        instances.append(p)\n        return p\n\n\
      \    factory.instances = instances\n    return factory\n\n\ndef _run_invoke_in_thread(clock:\
      \ _SyncClock, **invoke_kwargs):\n    \"\"\"Run `_invoke_codex` in a daemon thread;\
      \ return (thread, holder).\n\n    Injects `_sleep=clock.sleep` (the converged\
      \ DI seam) so the\n    production poll loop is virtual-time-gated. The `finally`\
