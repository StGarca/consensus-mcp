      \ a genuine\n        # wedge. Fire the release_all() safeguard and fail FAST/LOUD\n\
      \        # here, not after max_rounds×_CEILING. This is what makes the\n   \
      \     # claimed deadlock-free invariant actually true.\n        if not clock.wait_for(\n\
