      \ runners and forced the\nv1.15.8 Q2(c) `@_FLAKY_WINDOWS_CI` interim skip (now\
      \ DELETED).\n\nMechanism:\n  - `_SyncClock` — a `threading.Condition`-backed\
      \ virtual clock.\n    `now()/advance()` are unchanged in spirit; `sleep(dt)`\
      \ is\n    injected into production `_invoke_codex` via its private,\n    keyword-only\
      \ `_sleep=` seam (defaults to `time.sleep`, so\n    production behavior is unchanged)\
      \ so the poll loop has an\n    explicit happens-before with the test driver\
      \ instead of racing\n    real time. `wait_runner_parked()` gives the heartbeat-cadence\n\
      \    test lockstep; `wait_for(predicate)` keys on the durable\n    emitted `dispatch-log.jsonl`\
      \ events the assertions already use;\n    `release_all()` is a root-cause-INDEPENDENT\
      \ teardown safeguard:\n    any failed/timed-out wait releases every waiter,\
      \ terminates the\n    fake process, and fails LOUD with harness state — a misdiagnosed\n\
      \    or deadlocked harness can never wedge a CI job.\n  - `_FakePipeReader`\
      \ waits on the same clock (no real 5 ms poll);\n    `StreamingFakeCodexPopen`\
      \ notifies the clock on exit/terminate/\n    kill so reader threads are woken\
      \ deterministically.\n  - `test_stderr_drain_prevents_deadlock` keeps REAL stdout/stderr\n\
      \    reader threads (the behavior it exists to prove).\n\nDeadlock-free invariant:\
      \ every blocking wait has a guaranteed\nwaker on EVERY path (advance, runner-parked,\
      \ log-event, proc-exit,\nexception, and the absolute safety ceiling -> release_all()).\n\
      \"\"\"\nfrom __future__ import annotations\n\nimport json as _json\nimport threading\n\
      import time\nfrom pathlib import Path\n\nimport pytest\n\nREPO_ROOT = Path(__file__).resolve().parent.parent.parent\n\
      \nfrom consensus_mcp import _dispatch_codex  # noqa: E402\n\n\nSCHEMA_PATH =\
      \ REPO_ROOT / \"consensus_mcp\" / \"dispatch_templates\" / \"codex_review_schema.json\"\
      \n\n# Absolute real-time safety ceiling for any harness wait. Dozens x\n# normal;\
      \ under correct operation NO wait ever approaches it (every\n# wakeup is Condition-notify\
      \ driven). If one is hit, the handshake is\n# broken -> release_all() fails\
      \ the test LOUD and fast instead of\n# hanging CI. This is the converged independent_safeguard,\
      \ not a\n# correctness-timing dependency.\n_CEILING = 20.0\n\n# Re-poll bound\
      \ on every Condition.wait. The design is notify-driven\n# (advance / sleep progress-beat\
      \ / proc-exit / thread-death all\n# notify_all), so under correct operation\
      \ a waiter wakes in\n# microseconds. _REPOLL is purely a lost-wakeup SAFETY\
      \ NET: a missed\n# notify self-heals in ~50 ms instead of stalling to _CEILING.\n\
      # Correctness NEVER depends on it — every wait re-checks an exact\n# predicate;\
      \ _REPOLL only bounds wakeup LATENCY, never pass/fail\n# (this is what keeps\
      \ the harness deterministic, not wall-clock-timed).\n_REPOLL = 0.05\n\n\n# --------------------------------------------------------------------------\n\
      # Test helpers\n# --------------------------------------------------------------------------\n\
      \n\nclass _SyncClock:\n    \"\"\"Deterministic virtual clock with an explicit\
      \ test<->runner\n    happens-before. Replaces the old real-sleep-polled\n  \
      \  `_ControllableClock`.\"\"\"\n\n    def __init__(self, start: float = 1000.0):\n\
      \        self.t = float(start)\n        self._cond = threading.Condition()\n\
      \        self._epoch = 0          # bumped by every advance()\n        self._park_epoch\
      \ = -1    # max epoch a sleep() caller parked under\n        self._sleepers\
      \ = 0       # threads currently parked in sleep()\n        self._released =\
      \ False\n\n    # -- production-facing (time_fn / _sleep injection) --------------\n\
      \n    def now(self) -> float:\n        with self._cond:\n            return\
      \ self.t\n\n    def sleep(self, _dt: float) -> None:\n        \"\"\"Injected\
      \ as production `_invoke_codex(_sleep=...)`. Park the\n        caller until\
      \ virtual time passes its wake target OR the clock\n        is released. Records\
      \ the park epoch + sleeper count so the\n        driver can detect \"the runner\
      \ consumed the latest advance\".\n        Emits a progress beat (notify) so\
      \ `wait_for` re-checks its\n        predicate immediately after each poll iteration.\"\
      \"\"\n        deadline = time.monotonic() + _CEILING\n        with self._cond:\n\
      \            wake_at = self.t + float(_dt)\n            while self.t < wake_at\
      \ and not self._released:\n                if time.monotonic() >= deadline:\n\
      \                    return  # safety: never wedge the runner forever\n    \
      \            self._sleepers += 1\n                self._park_epoch = max(self._park_epoch,\
      \ self._epoch)\n                self._cond.notify_all()\n                self._cond.wait(_REPOLL)\n\
      \                self._sleepers -= 1\n\n    # -- driver-facing ----------------------------------------------\n\
      \n    def advance(self, dt: float) -> int:\n        with self._cond:\n     \
      \       self.t += float(dt)\n            self._epoch += 1\n            self._cond.notify_all()\n\
      \            return self._epoch\n\n    def wait_runner_parked(self, after_epoch:\
      \ int) -> bool:\n        \"\"\"Lockstep: block until a sleep() caller has parked\
      \ having\n        observed >= after_epoch (ran a full poll iteration after that\n\
      \        advance). Guaranteed waker: sleep()'s notify, or the ceiling.\"\"\"\
      \n        deadline = time.monotonic() + _CEILING\n        with self._cond:\n\
      \            while not self._released and not (\n                self._sleepers\
      \ > 0 and self._park_epoch >= after_epoch\n            ):\n                remaining\
      \ = deadline - time.monotonic()\n                if remaining <= 0:\n      \
      \              return False\n                self._cond.wait(min(remaining,\
      \ _REPOLL))\n            return not self._released\n\n    def wait_for(self,\
      \ predicate) -> bool:\n        \"\"\"Block until predicate() is true OR released\
      \ OR ceiling.\n        predicate reads external state (dispatch-log/holder)\
      \ and does\n        NOT take this lock. Re-checked on every notify — the runner\n\
      \        emits a progress beat each poll iteration via sleep().\"\"\"\n    \
      \    deadline = time.monotonic() + _CEILING\n        with self._cond:\n    \
      \        while not self._released:\n                if predicate():\n      \
      \              return True\n                remaining = deadline - time.monotonic()\n\
      \                if remaining <= 0:\n                    return False\n    \
      \            self._cond.wait(min(remaining, _REPOLL))\n            return predicate()\n\
      \n    def wait_byte_due(self, sched_rel: float, t0: float, parent_exited) ->\
      \ bool:\n        \"\"\"Reader-side wait: True when (now - t0) >= sched_rel;\
      \ False\n        if the parent proc exited or the clock was released. Does NOT\n\
      \        touch the sleeper/epoch state (that is the runner poll loop's\n   \
      \     alone). Woken by advance()/terminate()/kill()/release_all().\"\"\"\n \
      \       deadline = time.monotonic() + _CEILING\n        with self._cond:\n \
      \           while not self._released:\n                if (self.t - t0) >= sched_rel:\n\
      \                    return True\n                if parent_exited():\n    \
      \                return False\n                remaining = deadline - time.monotonic()\n\
      \                if remaining <= 0:\n                    return False\n    \
      \            self._cond.wait(min(remaining, _REPOLL))\n            return (self.t\
      \ - t0) >= sched_rel\n\n    def notify(self) -> None:\n        \"\"\"Wake all\
      \ waiters (used on proc exit / runner-thread death).\"\"\"\n        with self._cond:\n\
      \            self._cond.notify_all()\n\n    def is_released(self) -> bool:\n\
      \        with self._cond:\n            return self._released\n\n    def release_all(self)\
      \ -> None:\n        \"\"\"Independent safeguard: free EVERY waiter immediately\
      \ so a\n        broken handshake fails fast/loud instead of wedging CI. The\n\
      \        fake proc's poll() also observes is_released() and\n        self-terminates,\
      \ so the production runner loop actually EXITS\n        (it does not just spin\
      \ on a never-exiting proc) — without that,\n        release_all only unblocked\
      \ the driver while leaking a spinning\n        daemon (codex-v1159-wfb-4 codex-rev-001,\
      \ integrated).\"\"\"\n        with self._cond:\n            self._released =\
      \ True\n            self._cond.notify_all()\n\n\nclass _FakeStdin:\n    \"\"\
      \"Bytes-capturing stdin replacement; closed flag used to gate proc exit.\"\"\
      \"\n\n    def __init__(self):\n        self.buf = bytearray()\n        self.closed\
      \ = False\n\n    def write(self, data):\n        if self.closed:\n         \
      \   raise BrokenPipeError(\"stdin closed\")\n        self.buf.extend(data)\n\
      \        return len(data)\n\n    def close(self):\n        self.closed = True\n\
      \n    def flush(self):\n        pass\n\n\nclass _FakePipeReader:\n    \"\"\"\
      stdout/stderr replacement. `readline()` returns the next\n    scheduled `bytes`\
      \ once the virtual clock has reached its scheduled\n    time, waiting deterministically\
      \ on the `_SyncClock` (no real\n    polling). Returns `b\"\"` (EOF) when the\
      \ parent proc has exited and\n    the schedule is drained, so production's `iter(readline,\
      \ b\"\")`\n    reader threads terminate exactly like real Popen pipes.\"\"\"\
      \n\n    def __init__(self, schedule, parent):\n        # schedule: list[tuple[float,\
      \ bytes]] — clock-relative time + payload\n        self._schedule = list(schedule)\n\
      \        self._idx = 0\n        self._parent = parent\n\n    def readline(self):\n\
      \        # codex-v1159-wfb-4 codex-rev-003 (integrated): production's\n    \
      \    # reader thread calls readline() in a tight `iter(readline,\n        #\
