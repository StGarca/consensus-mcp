      \         \"_drive: per-round wait hit _CEILING with no runner \"\n        \
      \        \"progress — release_all fired. Deadlock/handshake or \"\n        \
      \        \"product logic broken; NOT a timing flake.\"\n            )\n    \
      \    rounds += 1\n\n    exhausted = th.is_alive() and rounds >= max_rounds\n\
      \    clock.release_all()\n    th.join(timeout=5)\n    if th.is_alive() or exhausted:\n\
      \        raise AssertionError(\n            f\"_drive: runner did not finish\
      \ within max_rounds={max_rounds} \"\n            \"(release_all fired — deterministic\
      \ handshake broke; NOT a \"\n            \"timing flake). max_rounds exhaustion\
      \ is a HARD fail even if \"\n            \"release_all later lets the thread\
      \ limp out.\"\n        )\n\n\ndef _drive_heartbeats(\n    clock: _SyncClock,\n\
      \    th: threading.Thread,\n    log_path: Path,\n    *,\n    interval: float,\n\
      \    steps: int,\n    final_advance: float,\n):\n    \"\"\"Lockstep driver that\
      \ PROVES the heartbeat interval gate\n    (codex-v1159-wfb-5 codex-rev-001,\
      \ integrated). Advancing exactly\n    `interval` per step with one poll/step\
