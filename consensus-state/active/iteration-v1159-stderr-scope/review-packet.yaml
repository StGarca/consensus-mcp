      \ instead of falling back to\n        # the _REPOLL safety net (the reader does\
      \ not otherwise notify;\n        # the runner's sleep()-beat is not ordered\
      \ after this thread).\n        self._parent._clock.notify()\n        while True:\n\
      \            if self._idx >= len(self._schedule):\n                # Schedule\
      \ drained: EOF once the proc has exited.\n                if self._parent._exited:\n\
      \                    return b\"\"\n                if not self._parent._clock.wait_for(\n\
      \                    lambda: self._parent._exited\n                ):\n    \
      \                return b\"\"  # released/ceiling -> behave as EOF\n       \
      \         return b\"\"\n            sched_time, payload = self._schedule[self._idx]\n\
      \            # A real pipe still yields bytes that were written BEFORE the\n\
      \            # process exited: deliver any already-due scheduled line even\n\
      \            # if the proc has since exited. Only a line whose scheduled\n \
      \           # time had NOT arrived when the proc exited is \"never written\"\
      \n            # → EOF. (Bug fixed v1.15.9: returning EOF on _exited before\n\
      \            # draining due bytes silently lost streamed lines.)\n         \
      \   if (self._parent._clock.now() - self._parent._t0) >= sched_time:\n     \
      \           self._idx += 1\n                return payload\n            if self._parent._exited:\n\
      \                return b\"\"  # proc exited before this byte's scheduled time\n\
      \            due = self._parent._clock.wait_byte_due(\n                sched_time,\
      \ self._parent._t0, lambda: self._parent._exited\n            )\n          \
      \  if not due:\n                return b\"\"  # proc exited / released before\
      \ this byte was due\n            self._idx += 1\n            return payload\n\
      \n\nclass StreamingFakeCodexPopen:\n    \"\"\"Popen-shaped fake. Constructor\
      \ uses Popen's positional shape so\n    production `popen_factory(cmd, stdin=...,\
      \ stdout=..., stderr=...,\n    bufsize=...)` works unchanged. Exit state transitions\
      \ notify the\n    `_SyncClock` so reader threads + the driver wake deterministically.\"\
      \"\"\n\n    def __init__(\n        self,\n        cmd,\n        stdin=None,\n\
      \        stdout=None,\n        stderr=None,\n        bufsize=0,\n        *,\n\
      \        _scheduled_stdout=None,\n        _scheduled_stderr=None,\n        _returncode:\
      \ int = 0,\n        _exit_at: float = 1.0,\n        _clock: _SyncClock,\n  \
      \      _output_payload: str = '{\"ok\": true}',\n        **_popen_kwargs,  #\
      \ iter-0039: absorb creationflags / start_new_session\n    ):\n        self._cmd\
      \ = cmd\n        self._clock = _clock\n        self._t0 = _clock.now()\n   \
      \     self._exit_at = float(_exit_at)\n        self._returncode_on_exit = int(_returncode)\n\
      \        self._exited = False\n        # codex-v1159-wfb-3 codex-rev-001 (BLOCKING):\
