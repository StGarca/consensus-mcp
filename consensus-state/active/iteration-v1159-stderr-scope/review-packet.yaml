      \       finally:\n            clock.notify()\n\n    th = threading.Thread(target=runner,\
      \ daemon=True)\n    th.start()\n    return th, holder\n\n\ndef _drive(clock:\
      \ _SyncClock, th: threading.Thread, *, until=None, chunk: float = 50.0,\n  \
      \         max_rounds: int = 64):\n    \"\"\"Deterministic driver for terminal\
      \ scenarios (stream/truncate/\n    clean-exit/stderr-drain/silence-abort/operator-signal).\n\
      \n    The terminal condition is ALWAYS runner-thread death (proc exited\n  \
      \  cleanly, or aborted/raised). It is intentionally NOT a mid-stream\n    observable:\
