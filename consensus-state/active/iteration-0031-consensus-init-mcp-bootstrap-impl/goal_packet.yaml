schema_version: 1
pilot_id: iteration-0031-consensus-init-mcp-bootstrap-impl
goal:
  summary: |
    iter-0031 — implement iter-0030 converged plan. Extend
    `consensus_mcp/_init_wizard.py` so `consensus-init` auto-writes
    `.mcp.json` for projects by default. New helpers: _resolve_mcp_command,
    extended _detect_repo_root with marker-based + git-rev-parse detection,
    _write_mcp_json (merge mode with conflict detection + idempotency).
    New flags: --no-mcp-json, --mcp-command, --mcp-force. All 11
    acceptance gates A1-A11 from the converged plan covered.
  desired_end_state: |
    After this iteration, a new operator can install via pipx and
    bootstrap any project in one command: `consensus-init` from the
    project root produces both `.consensus/config.yaml` AND `.mcp.json`,
    with the correct STATE_ROOT and PROJECT_ROOT env vars derived from
    marker-based project-root detection (git rev-parse > strong markers >
    cwd). Existing .mcp.json files are merged (other servers preserved);
    conflicts are reported with a clear actionable message; --mcp-force
    surgically replaces only the consensus-mcp entry.

    Full suite: 773 pass + 1 skipped + 0 fail (was 759 + 14 new tests
    covering A1-A11 + helper unit tests).
  non_goals:
    - changing the MCP server protocol, dispatchers, workflow engine
    - documentation updates (README/CHANGELOG follow in iter-0032)
    - cross-platform path quirks beyond Windows .exe / POSIX no-ext
allowed_files:
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/tests/test_init_wizard.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/server.py
  - consensus_mcp/tools/
  - consensus_mcp/config.py
  - consensus_mcp/contributors/
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/_engine_factory.py
  - consensus_mcp/_snapshot_state.py
  - consensus_mcp/_import_parent_history.py
  - consensus_mcp/_paths.py
  - consensus_mcp/dispatch_templates/
  - consensus-state/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
max_iterations: 1
max_patch_size: 800
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=773 green
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2_A3
    description: fresh project + merge-with-other-server tests pass
    check: py -3.11 -m pytest consensus_mcp/tests/test_init_wizard.py::test_init_writes_mcp_json_in_fresh_project consensus_mcp/tests/test_init_wizard.py::test_init_merges_existing_mcp_json_with_other_servers -q
  - id: A4_A5
    description: opt-out + idempotency tests pass
    check: py -3.11 -m pytest consensus_mcp/tests/test_init_wizard.py::test_init_no_mcp_json_flag_skips consensus_mcp/tests/test_init_wizard.py::test_init_mcp_json_is_idempotent_on_rerun -q
  - id: A6_A7
    description: conflict handling + force flag tests pass
    check: py -3.11 -m pytest consensus_mcp/tests/test_init_wizard.py::test_init_blocks_conflict_without_force consensus_mcp/tests/test_init_wizard.py::test_init_force_replaces_conflict_preserving_other_servers -q
  - id: A8_A10
    description: malformed json + command override tests pass
    check: py -3.11 -m pytest consensus_mcp/tests/test_init_wizard.py::test_init_malformed_mcp_json_skip_warn consensus_mcp/tests/test_init_wizard.py::test_init_mcp_command_override_threads_through -q
  - id: A9
    description: marker-based project-root from nested cwd
    check: py -3.11 -m pytest consensus_mcp/tests/test_init_wizard.py::test_init_nested_cwd_resolves_to_root_via_markers -q
  - id: A11
    description: dry-run does NOT write .mcp.json (covered by existing dry-run tests)
    check: py -3.11 -m pytest consensus_mcp/tests/test_init_wizard.py::test_init_dry_run_does_not_write_mcp_json -q
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T15:45:00Z'
  codex_patch_apply_authorized: false
  scope_signature: '7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d'
