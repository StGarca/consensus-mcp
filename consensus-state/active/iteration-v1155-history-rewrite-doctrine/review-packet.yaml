    consensus_mcp/claude_extensions/skills/consensus-workflow/SKILL.md: "---\nname:\
      \ consensus-workflow\ndescription: Operating procedures for working with consensus-mcp\
      \ in any project. Trigger when the user asks to run a consensus consult, dispatch\
      \ codex/gemini for review, evaluate a Workflow B vs #4 decision, debug a stalled\
      \ or failed reviewer dispatch, or any question about HOW the cross-AI consensus\
      \ workflow runs (as opposed to \"consensus init\" which only bootstraps). Phrases\
      \ include \"consensus review\", \"consensus iteration\", \"consensus consult\"\
      , \"run a consult\", \"dispatch codex\", \"dispatch gemini\", \"workflow 3\"\
      , \"workflow 4\", \"propose-converge\", \"post-review\".\n---\n\n# Consensus-mcp\
      \ operating procedures\n\nLoad-bearing rules for working with consensus-mcp.\
      \ These are not\nproject-specific tips — they apply in every project that uses\
      \ the\ncross-AI consensus workflow. Follow them by default; deviate only when\n\
      the operator explicitly says otherwise.\n\n## Workflow selection\n\n**Default\
      \ to Workflow A (propose-converge with blind-first-reveal) for\nany decision\
      \ with real design surface** — API shape, trade-off, novel\nmechanism, anything\
      \ where reasonable people could disagree on the right\napproach. Workflow B\
      \ (post-review: claude implements, codex+gemini\naudit) is for **execution per\
      \ a converged design** or for hot-patches\nthat block in-flight work.\n\nThe\
      \ mistake to avoid is defaulting to B because it's faster and\ncalling everything\
      \ \"execution.\" Test: did the converged plan specify\nthe API shape, error\
      \ contract, mechanism? If not, those choices are\nthemselves design surface\
      \ — go through #4.\n\nListing 2+ design choices in a single response = Workflow\
      \ A\ncandidate. Stop and route to a consult.\n\n## Workflow A / B / C in one\
      \ line each\n\n**As of v1.14.4: letter aliases (A/B/C) replace numeric (3/4)\
      \ as\ncanonical operator vocabulary. Numeric aliases stay accepted for\none\
      \ cycle with `DeprecationWarning`.**\n\n- **Workflow A (propose-converge)**\
      \ — DEFAULT. All enabled\n  contributors propose independently in round 1 (blind),\
      \ then\n  converge across reviewed rounds. Used for design questions.\n  (Was\
      \ numbered #4.)\n- **Workflow B (post-review)** — LIGHTWEIGHT/QUICK. Claude\
      \ writes\n  the patch first, codex + gemini audit afterward. Used for clear\n\
      \  execution work and hot-patches. (Was numbered #3.)\n- **Workflow C (autonomous-execute)**\
      \ — LONG-FORM/OVERNIGHT. Runs\n  to completion without operator-in-the-loop,\
      \ auto-approves\n  emergent scope items within operator-pre-declared\n  `autonomy_contract`\
      \ boundaries. v1.14.4 ships the contract\n  (config alias, validators, scope_check\
      \ helper, schema); the\n  multi-iteration **engine is UNIMPLEMENTED as of v1.15.2\
      \ — no\n  committed target version; running Workflow C raises a clear\n  `NotImplementedError`**.\
      \ Status:\n  `docs/workflows/workflow-c-autonomous.md`.\n\n> **Consistency invariant\
      \ (count-agnostic governance).** This\n> doctrine and the v1.15.1 machine-enforcement\
      \ are scoped by\n> WORKFLOW MODE, never by contributor count. A 2-AI install\n\
      > (claude + codex) and a 3-AI install (claude + codex + gemini)\n> are governed\
      \ identically — same doctrine, same seal-time gate,\n> same enforcement knob.\
      \ The ONLY count-sensitive default is the\n> convergence rule (`unanimous` at\
      \ 2 contributors,\n> `strict-majority` at 3), and that is an operator-overridable\n\
      > default, not a doctrine difference. (`propose-converge` requires\n> N≥2, so\
      \ 2-AI gets full Workflow A enforcement; only\n> `autonomous-execute` requires\
      \ exactly 3.)\n- **Advisory** — dispatches happen but no vote is load-bearing.\
      \ Rare.\n\n## Maximize parallelism — always\n\n**Default to parallel; serial\
      \ is the choice that needs justification.**\nEvery operation in a consensus\
      \ workflow that can run independently\nSHOULD run in parallel. This applies\
      \ to:\n\n- Round-1 peer dispatches (codex + gemini in background, claude\n \
      \ authors proposal in parallel)\n- Round-2+ batches where multiple peers are\
      \ re-dispatched\n- Reading multiple sealed artifacts (one batched call, not\
      \ N\n  serial reads)\n- Investigating multiple files / running multiple greps\
      \ during\n  iteration scoping\n- Background long-running operations (snapshots,\
      \ audits, blast-\n  radius scans) kicked off to run alongside foreground work\n\
      - Cross-iteration parallelism: when two iterations have no data\n  dependency,\
      \ dispatch them as parallel branches (worktrees) and\n  converge results\n\n\
      Practice has demonstrated drastic performance improvement when\nparallelism\
      \ is fully exploited. Burden of proof flips: if you\nchoose serial, the reason\
      \ must be a real data dependency\n(operation B needs operation A's output),\
      \ not \"felt simpler\" or\n\"easier to reason about.\"\n\n### Round-1 dispatch\
      \ order (Workflow A) — specific case\n\nDispatch peer contributors FIRST in\
      \ background, then author your\nown proposal in parallel while they run. Independence\
      \ (blind-\nfirst-reveal) depends on **visibility**, not **temporal order**.\n\
      No contributor sees another's output → independence preserved\nregardless of\
      \ who started writing first. This optimization saves\nwall-clock and surfaces\
      \ dispatcher errors earlier.\n\nConstraints: the goal_packet MUST be final before\
      \ kicking off\ncontributors (mid-flight rewrites mean wasted dispatches), and\
      \ the\n\"author in parallel\" optimization applies to round 1 only — round\n\
      2+ explicitly require seeing round-1 outputs.\n\n## Consensus runs to COMPLETION\
      \ — no gratuitous deferral\n\n**Default: consensus runs to completion when goals\
      \ + acceptance\ngates are clear. Defer only when open design surface genuinely\n\
      requires more analysis, the implementation cost is large\n(multiple sessions\
      \ worth), or the work has a real dependency\non something not-yet-built.**\n\
      \nThe deferral instinct comes from \"splitting reduces blast\nradius\" + \"\
      small PRs are better.\" Both are RIGHT for genuinely\nindependent units of work;\
      \ both are WRONG when the items share\na doctrine boundary or when splitting\
      \ just postpones the same\ndecisions without adding analysis.\n\n### The completion\
      \ test\n\nWhen authoring a converged-plan.yaml or scoping a deliverable,\nask\
      \ for each candidate item:\n\n1. Are the acceptance gates concrete and verifiable?\n\
      2. Is there ANY open design question remaining (API shape,\n   trade-off, mechanism)\
      \ that actually needs more thought?\n3. Is the implementation cost SMALL enough\
      \ to fit in this\n   session? (rough heuristic: <60 minutes of edits + tests)\n\
      \nIf (1)=yes AND (2)=no AND (3)=yes → **execute in the same\nsession, not a\
      \ future iteration.** \"Future iteration\" is the\ncop-out — a way to pass the\
      \ work to a hypothetical later-self\nwithout admitting later-self has the same\
      \ context window and\nwill face the same decision.\n\n### Anti-patterns to abort\n\
      \n- \"iter-XXXX candidate: <thing>\" with no concrete reason it\n  can't be\
      \ done now → fold into current iteration.\n- \"Phase B / Phase C\" sequencing\
      \ when phases share the same\n  doctrine boundary → bundle into one.\n- \"Defer\
      \ to dedicated iteration\" because something is \"complex\"\n  when the complexity\
      \ is BOUNDED (concrete decisions, finite\n  alternatives) → execute now; consult\
      \ only on the open part.\n- Splitting a hot-patch across multiple version bumps\
      \ when the\n  fixes share a single failure-mode → bundle into one tag.\n- Writing\
      \ a goal_packet that ASSUMES future iterations will\n  exist → write goal_packets\
      \ that assume completion is the\n  default.\n\n### Application to live consults\n\
      \nBefore writing `next_iteration_id: ...` or `deferred to ...`\nin a converged\
      \ plan, run the completion test on each item.\nIf the test passes, delete the\
      \ deferral and add the work to\nthe current scope. Only ratify the deferral\
      \ if the test\ngenuinely fails, and name the SPECIFIC blocker\n(not \"complexity,\"\
      \ not \"out of scope\" — name the missing\ndata, the dependency, or the design\
      \ question).\n\n### Sequencing-as-deferral is the same anti-pattern\n\nDon't\
      \ sequence three independent fixes across three\nhot-patches when bundling them\
      \ into one passes the\ncompletion test. Sequencing produces the same end-state\
      \ with\nmore bookkeeping and more chances for drift. The cost of\n\"big PR\"\
      \ is real but bounded; the cost of perpetual deferral\nbacklog is unbounded.\n\
      \n## Convergence model — weighted-synthesis by default\n\n**Default convergence\
      \ model: weighted-synthesis.** All ideas of\nall proposals are weighed for benefit\
      \ to the project as a whole.\nNo good ideas are lost; no babies tossed with\
      \ the bathwater.\n\nWhen writing a `converged-plan.yaml`:\n\n- Structure synthesis\
      \ per-question (or per-decision-point), naming\n  each contributor's position\
      \ and explaining which element was\n  adopted and why.\n- When a contributor's\
      \ position was NOT adopted, explicitly note\n  WHY (sequencing, scope, evidence\
      \ quality) so the good idea is\n  preserved as a follow-up rather than lost.\n\
      - Scan each rejected proposal element: if there's no follow-up\n  iteration,\
      \ ADR, or CHANGELOG note capturing it, write one.\n- Report votes per question\
      \ (transparency) but treat the synthesis\n  as an integration, not a vote winner.\n\
      \n`all-or-nothing` finding-disposition is **edge-case opt-in only.**\nReserve\
      \ it for binary scope decisions (\"ship X or not\"), security/\nsafety gates\
      \ (\"approve patch or reject\"), or legal/compliance\nverdicts where partial\
      \ acceptance is incoherent. Operator must\nexplicitly opt in via `goal_packet.convergence.finding_disposition:\n\
      all-or-nothing` with rationale.\n\n**Engine state (current, not a follow-up):**\
      \ the\n`config.py` validator accepts BOTH `weighted-synthesis` and\n`all-or-nothing`\
      \ for `workflow.mode=propose-converge`\n(`VALID_DISPOSITION_FOR_PROPOSE_CONVERGE`),\
      \ and `weighted-synthesis`\nis the `default_config()` default. The earlier \"\
      engine ENFORCES\nall-or-nothing, goal_packet must still declare it until a future\n\
      iteration lifts the constraint\" caveat is **obsolete** — that\nconstraint was\
      \ lifted (iter-three-gaps). Author goal_packets with\n`weighted-synthesis` (the\
      \ default); no all-or-nothing declaration\nis required to pass validation.\n\
      \n## Safety interlock first (HEADLINE — highest-value rule)\n\nFor **safety-critical\
      \ / data-loss / bricking / irreversible-risk**\ndefects: a root-cause-**INDEPENDENT**\
      \ safeguard that is valuable\neven if the root-cause hypothesis is 100% false\
      \ **MUST** ship in\nthe same change as the hypothesized fix. **Stopping the\
      \ bleeding\noutranks perfecting the diagnosis.**\n\nField-proven (ChilipadScreen\
      \ i2c boot-loop report, 2026-05-15): an\nindependent boot-loop breaker, made\
      \ hypothesis-independent *by\ndesign*, un-bricked a medical-safety device and\
      \ kept it serving\nacross **two** consecutive consensus iterations whose converged\n\
      root causes were both later refuted on-device. It was called \"the\nsingle highest-value\
      \ decision.\"\n\nAuditable bar: **\"would this safeguard still work if the root\
      \ cause\nwere entirely different?\"** If a reviewer cannot answer *yes* from\n\
      the safeguard's mechanism alone, it does not qualify — it is a\ndisguised bet\
      \ on the hypothesis, not an interlock.\n\n## Convergence is agreement, not truth\n\
      \n**Convergence measures agreement, not correctness.** Two clean\nstrict-majority\
      \ 2-of-2 convergences (and one round-1 *unanimous*\none) shipped root causes\
      \ that on-device tests then refuted.\n\n**Fast independent unanimity is a VERIFY-HARDER\
      \ flag, not\nconfidence.** When contributors agree quickly, suspect a *shared\n\
      prior*: independent agents reasoning from the same incomplete\ndifferential\
      \ is the multi-agent analog of single-agent\nrationalize-away (see the disconfirming-evidence\
      \ doctrine). Unanimity\nis evidence only when the contributors reasoned from\
      \ *different*\ndifferentials — so make the differential visible (the dispatch\n\
      templates now require each contributor to state the prior it\nreasoned from;\
      \ at reveal, a shared prior is exposed instead of\nlaundered as \"independent\
      \ agreement\").\n\n### Provisional-until-proven (defined defect class)\n\nFor\
      \ claims **not falsifiable from the artifacts in evidence** —\nhardware/firmware\
      \ state, environment/toolchain, concurrency/timing,\nanything refutable only\
      \ by an *external* observation — a converged\nroot cause is **PROVISIONAL**.\
      \ The converged plan's\n`falsification.empirical_status` is `pending` until\
      \ the named\ndiscriminating experiment runs; it then becomes `proven` (the\n\
      refutation observation did NOT occur) or **`refuted`** (it did —\nthe load-bearing\
      \ terminal state; the hypothesis is dead, the\niteration does not close on it,\
      \ and the decisive experiment for\nthe next iteration carries forward). **\"\
      Fixed\" / \"shipped\" /\n\"root-cause-correct\" language is forbidden before\
      \ `proven`.**\n(Pure-code defects refutable by a unit test already carry their\n\
      proof — no extra ceremony; forcing one there is the theater this\nrule is meant\
      \ to prevent.)\n\n### Anti-theater property (what makes falsification real)\n\
      \nA falsification is real **only if its refuting observation is\n(1) pre-specified,\
      \ (2) a specific observable, and (3) for the\ndefined class, EXTERNAL to the\
      \ reasoning that produced the\nhypothesis.** External tests can't be rationalized\
      \ in the room —\nthat is precisely why the device refuted what code-reading\
      \ could\nnot. \"We'll test it\" is not a falsification; \"X at address Y still\n\
      returns 0x103 on a clean POWERON\" is.\n\nAlso name **the single decisive experiment\
      \ that must run before\nthe next iteration** (the report's Exp-4 pattern) —\
      \ the one test\nthat most cleanly partitions the remaining hypothesis space.\n\
      \nSee `docs/workflows/converged-plan-convention.md` for the\nconverged-plan\
      \ blocks (`falsification`, `independent_safeguard`,\n`decisive_experiment_before_next_iteration`).\
      \ These are an\nauthoring convention AND, **as of v1.15.1, machine-enforced**:\n\
      `validators/validate_converged_plan.py` + a fail-closed seal-time\ngate in `workflow_engine._seal_converged_plan`\
      \ validate the blocks\n(structure + consequence only — never soundness), governed\
      \ by\n`convergence.converged_plan_enforcement`\n(`off|warn|graduated|strict`,\
      \ default `graduated`). The v1.15.0\ntag is doctrine-only; machine enforcement\
      \ exists only from the\nv1.15.1 tag forward.\n\n## Dispatching codex / gemini\n\
      \n**`--review-target` must be a `.yaml` review-packet, not a raw `.md`\nor `.diff`\
      \ file.** The peer reviewer sandboxes refuse to read paths\nunder `consensus-state/`,\
      \ so the file contents have to be embedded\ninline. Use `python -m consensus_mcp._author_review_packet\n\
      --iteration-dir <dir> --files <comma-list>` to author a packet with\n`defect_target.touched_files_contents`\
      \ populated, then pass\n`<dir>/review-packet.yaml` as the review target.\n\n\
      **The MCP wrapper `reviewer_dispatch_codex` has a 45-second silence\nthreshold**\
      \ that is often too aggressive on cold-start. The shell\nbinary `consensus-mcp-dispatch-codex`\
      \ respects\n`CONSENSUS_MCP_STALL_SILENCE_SECONDS` (default 180s) and is the\
      \ right\nfallback when the MCP wrapper times out.\n\n**Proposal-mode dispatch\
      \ requires `--mode proposal`** on the shell\nbinaries. The MCP wrappers as of\
      \ v1.14.0 don't expose this flag —\nfall back to the shell CLI for round-1 #4\
      \ dispatch.\n\n## Gemini 429 handling (priority-tiered)\n\n- **Low-priority\
      \ iterations** (chores, doc syncs, simple migrations):\n  if gemini returns\
      \ a single 429, skip it and proceed with a 2-AI\n  consensus (claude + codex).\
      \ Don't retry.\n- **High-priority iterations** (design questions, security review,\n\
      \  blocking decisions): allow one retry on 429; skip only after 2\n  consecutive\
      \ 429s.\n\nThe signal \"skip vs retry\" is the cost of getting it wrong — when\
      \ a\nchore goes through with 2-AI consensus, the worst case is \"we get a\n\
      weaker review\"; when a design decision goes through with 2-AI\nconsensus, the\
      \ worst case is \"we ratify a flawed design.\"\n\n**Empty gemini output is NOT\
      \ a 429 — don't burn the retry budget.**\ngemini CLI ≥ `0.43.0-preview.0` refuses\
      \ headless runs in an\n\"untrusted\" directory: it writes the trust error to\
      \ stderr and\nproduces **empty stdout**, which fails as `GeminiOutputParseError`\n\
      (\"Expecting value: line 1 column 1\"), often twice (initial +\nauto-retry)\
      \ — looking like a transient 429 but it is deterministic.\n**Fixed in v1.15.2:**\
      \ `_dispatch_gemini` injects\n`GEMINI_CLI_TRUST_WORKSPACE=true` into the subprocess\
      \ env. On\n**≤ v1.15.1** apply the manual workaround:\n`GEMINI_CLI_TRUST_WORKSPACE=true`\
      \ in the environment that runs the\ndispatcher (or MCP server). `--skip-trust`\
      \ alone is NOT\nload-bearing on this CLI version. Diagnose by probing `gemini\
      \ -p\n\"reply OK\"` directly — the trust error prints plainly. See\n`docs/advisories.md`\
      \ (Advisory 2026-05-15, resolved v1.15.2).\n\n## Codex auth model\n\nCodex uses\
      \ **token-based auth, not API keys.** If a dispatch hangs\nwith \"AuthRequired\"\
      \ messages, the most common cause is a **secondary\nMCP** that codex itself\
      \ is configured to use — not codex's own auth.\nCheck codex's MCP config (`~/.codex/config.toml`)\
      \ for any nested MCP\nreferences; remove or disable the offending entry. Codex's\
      \ own auth\nrefresh is rarely the culprit.\n\n## Iteration-state persistence\
      \ (data-loss risk)\n\n`consensus-state/active/iteration-*/` is **gitignored\
      \ by design** —\nin-flight iteration scratch (proposals, audits, partial reviews)\n\
      should not pollute the main branch's commit history. But this means\n**a `git\
      \ clean -fdX` (or a CI build agent that wipes untracked\nfiles) will silently\
      \ delete your in-progress consensus work.**\n\nMitigation: `python -m consensus_mcp._snapshot_state\
      \ snapshot --label\n<short-label>` after each iteration close. Snapshots live\
      \ on the\norphan branch `consensus-state-snapshots`. To recover:\n`python -m\
      \ consensus_mcp._snapshot_state restore --tag <tag-name>`.\n\nFor long iterations:\
      \ snapshot mid-flight too. Cheap insurance.\n\n## Verifying peer-cited file\
      \ content\n\nWhen a codex or gemini reviewer cites file content in a finding,\n\
      **grep the cited file to confirm the content exists** before\nacting on the\
      \ finding. Reviewers occasionally hallucinate\n(\"README.md line 67 contains\
      \ @docs/roadmap/v1.14.0-deferred.md\"\nwhen line 67 actually contains `@v1.14.0`).\n\
      \nIf the cited content doesn't exist (verified via grep), dismiss the\nfinding\
      \ with empirical evidence in the commit message:\n\"codex-rev-NNN dismissed:\
      \ cited content at <path>:<line> does not\nexist (grep shows `<actual>`). Reviewer\
      \ hallucination.\"\n\nDon't ignore reviewer findings silently — write the dismissal\
      \ as a\nmatter of record so the audit trail survives.\n\n## Verify before invent\
      \ — cite before propose\n\n**Before introducing any step that touches an external\
      \ system,\nchannel, distribution mechanism, or inferred environmental\ncapability\
      \ — verify it exists in the project and CITE the\nverification source inline.**\n\
      \nThe rule applies to publish/install/deploy/distribute steps;\nsending messages\
      \ (Slack, email, webhooks); posting to external\nservices; uploading to registries\
      \ (PyPI, npm, Docker Hub,\nGitHub Packages); registering anywhere; inferring\
      \ CI/CD\npipelines, license terms, dependency availability, tool\npresence,\
      \ database schemas — any inferred capability or\nchannel.\n\nRequired citation\
      \ form: a one-line inline reference next to\nthe proposed step:\n- `verified\
      \ via README.md:40 — install URL is git+https`\n- `verified via .github/workflows/release.yml:12\
      \ — publish job exists`\n- `verified via curl https://pypi.org/.../json — registered`\n\
      - `not found — not proposing` (when verification fails)\n\n**When verification\
      \ produces DISCONFIRMING evidence (no creds,\nno workflow, registry 404), treat\
      \ that as the SIGNAL — not as\na credential gap to fill.** \"no creds\" → check\
      \ first whether\nthe channel exists in the project at all; do not jump to\n\"\
      operator needs to provide creds.\" Operator pushback (\"what\nis X?\") → check\
      \ whether X was introduced by inference rather\nthan verification; do not jump\
      \ to \"operator unfamiliar with X.\"\n\n**Anti-pattern to abort on sight:**\
      \ \"I'll handle X and hand\nyou Y at the end\" framing makes invented requirements\
      \ feel\ninevitable. Better framing: \"verified-required steps: <list\nwith citations>;\
      \ uncertain steps: <list>; please confirm or\ncorrect uncertain ones.\"\n\n\
      Scope: required for high-impact actions (external system,\nchannel, irreversible\
      \ op, anything operator-visible). NOT\nrequired for routine local-dev steps\
      \ (git status, file reads,\ntest runs against a known repo).\n\n## Artifact-scoped\
      \ claims — no global \"fixed\" or \"shipped\"\n\n**When making any \"fixed\"\
      , \"shipped\", \"done\", \"complete\"\nclaim, the claim must be ARTIFACT-SCOPED\
      \ — naming the\nspecific version + commit/tag + install path + bundled\ncontent\
      \ + known residual defects.** Globally-quantified\nclaims like \"X is fully\
      \ shipped\" or \"Y is fixed\" are\nforbidden when the affected surface is broader\
      \ than the\nartifact you actually changed.\n\n**The canonical scenario:** an\
      \ immutable tag and a dev\nbranch with a fix are NOT the same artifact. Don't\
      \ glue\nthem together. If you fixed something on the v1.14.1 dev\nbranch, the\
      \ v1.14.0 tag at commit 8e0dab2 STILL ships the\ndefect embedded in its wheel/install\
      \ — name that explicitly.\n\nRequired claim form when announcing a fix or completion:\n\
      - Name the artifact: `v1.14.1 tag at commit 5f6cfe7`\n- Name what the artifact\
      \ contains: \"the corrected skill\"\n- Name the unfixed surface explicitly:\
      \ \"the v1.14.0 tag is\n  immutable and STILL ships the buggy skill; users on\n\
      \  v1.14.0 need to upgrade to v1.14.1 to get the fix\"\n- For multi-artifact\
      \ surfaces, list each with status:\n  \"fixed in dev branch ✓, fixed in v1.14.1\
      \ tag ✓, v1.14.0\n  tag still defective ✗\"\n\n**Forbidden phrases when surface\
      \ > what you changed:**\n- \"X is fully shipped\"\n- \"X is done\"\n- \"X is\
      \ fixed\" (without scoping)\n- \"the only channel that exists\" (when an artifact-content\n\
      \  caveat is being suppressed)\n- \"all clear\" / \"no issues remaining\"\n\n\
      ## Non-trivial changes go through peer review\n\nAny **non-trivial change to\
      \ consensus-mcp itself** must go through\npeer review (Workflow A if design\
      \ surface, Workflow B if pure\nexecution). The threshold for \"trivial\" is\
      \ small: typo fixes, doc\nformatting, individual log-line tweaks. Anything touching\n\
      contributor adapters, dispatchers, tool registration, sealing, or\ngoal-packet\
      \ validation = non-trivial.\n\nThis rule does NOT apply to the user's own project\
      \ work using\nconsensus-mcp as a tool — there, the operator decides what's\n\
      non-trivial in their codebase.\n\n## \"Consensus\" trigger word\n\nWhen the\
      \ user says \"consensus\" in a sentence about reviewing,\ndeciding, or analyzing\
      \ — **use the consensus-mcp tools (workflow\n#4 or Workflow B as appropriate),\
      \ NOT the older /council skill.**\nCouncil was a single-Claude multi-persona\
      \ simulation; consensus-mcp\nis a real cross-AI workflow with sealed-provenance\
      \ peer reviewers.\n\n## Release cadence — Friday cut if anything landed\n\n\
      **Cut a release tag every Friday if at least one iteration closed\nthat week.\
      \ Release-cut is a procedure with a trigger, not an\nad-hoc decision.**\n\n\
      The structural failure mode this prevents: iterations close\ncontinuously (acceptance\
      \ gates pass → done), but the release-cut\nceremony has no trigger of its own.\
      \ So work accumulates on the\n`v<X.Y.Z>` branch indefinitely and downstream\
      \ pipx/PyPI users get\nstale versions while the README documents features they\
      \ cannot\ninstall. This actually happened — v1.14.0 sat at 37 commits across\n\
      iter-0009..iter-0043 over 3 days with a release-ready CHANGELOG\nand no tag.\n\
      \n**Cut sequence (apply in order on the v<X.Y.Z> branch tip):**\n\n1. Update\
      \ `CHANGELOG.md` date stamp to the cut date; add an\n   addendum for any iterations\
      \ that landed after the section was\n   first authored.\n2. Verify `pyproject.toml`\
      \ `version` matches the branch.\n3. **Bump README install URLs + `## Status`\
      \ to `@v<X.Y.Z>` on the\n   release branch tip — BEFORE tagging.** Since v1.15.4\
      \ `main`\n   fast-forwards to the just-cut tag, the README *inside the tag*\n\
      \   IS the GitHub landing page. If it still says the previous\n   version, the\
      \ landing page tells users to install the old\n   release the moment `main`\
      \ advances — the exact bleeding-wound\n   this is meant to prevent. Grep `@v<old-prefix>`\
      \ + the Status\n   line; fix all in one commit on the release branch before\
      \ step 5.\n   (Pre-v1.15.4 this was a post-tag dev-branch step; under\n   main=tag\
      \ it MUST be pre-tag.)\n4. Run the full test suite; surface regressions before\
      \ tagging.\n   Document any pre-existing known-issue flakes in CHANGELOG so\n\
      \   they aren't mistaken for v<X.Y.Z> regressions.\n5. `git tag -a v<X.Y.Z>\
      \ -m \"...\"` on the branch tip.\n6. `git push origin refs/heads/v<X.Y.Z> refs/tags/v<X.Y.Z>`\
      \ (use\n   explicit `refs/heads/` and `refs/tags/` to disambiguate; the\n  \
      \ branch and tag now share a name).\n7. **Release is complete.** Distribution\
      \ is git-tag-based — users\n   install via `pipx install git+https://github.com/stgarca/\n\
      \   consensus-mcp.git@v<X.Y.Z>`. There is NO PyPI publish step;\n   the package\
      \ is not registered on PyPI. Optional: build wheel\n   + sdist locally (`python\
      \ -m build`) for local smoke-testing\n   only, not for upload.\n8. **Fast-forward\
      \ `main` to the just-cut tag**\n   (`git push origin refs/tags/v<X.Y.Z>^{}:refs/heads/main`,\
      \ or\n   `git push origin v<X.Y.Z>-tip:main`). This is ALWAYS a clean\n   fast-forward\
      \ because each release branch descends linearly from\n   the previous release\
      \ tip, which descends from `main`. `main` is\n   the GitHub default branch,\
      \ so this keeps the landing page +\n   GitHub Actions CI on the latest released\
      \ state. Verify with\n   `git merge-base --is-ancestor origin/main <tag>` first;\
      \ if it is\n   NOT an ancestor, STOP — that means history diverged and a\n \
      \  force-update would rewrite public `main` (escalate, do not\n   force).\n\
      9. Branch the next release from the v<X.Y.Z> tip: `v<X.Y.Z+1>`\n   for hot-patches,\
      \ OR `v<X.(Y+1).0>` for the next minor. Bump\n   `pyproject.toml` on the new\
      \ branch to the new dev version\n   (e.g., `1.14.1.dev0`); add a `## X.Y.Z+1\
      \ - unreleased` stub\n   to CHANGELOG.md.\n10. **Verify** the README on the\
      \ new dev branch still shows\n    `@v<X.Y.Z>` (the just-cut tag) — it should\
      \ already, because\n    step 3 bumped it pre-tag and the dev branch descends\
      \ from the\n    tag. This is now a no-op verification, NOT a bump (the bump\n\
      \    moved to pre-tag step 3 in v1.15.4 so the tag's README — which\n    `main`\
      \ fast-forwards onto — is correct at tag time). If it is\n    somehow stale,\
      \ that is a bug in step 3, not a routine bump.\n11. Push the new branch: `git\
      \ push -u origin v<X.Y.Z+1>`.\n12. **If the just-cut tag has a known issue worth\
      \ flagging to\n    users on older versions** — add an entry to\n    `docs/advisories.md`\
      \ naming the affected versions, the\n    issue, the correct upgrade target,\
      \ and the user action\n    required. The advisory is the long-lived record;\
      \ CHANGELOG\n    entries get buried as new releases ship.\n\n**Distribution\
      \ convention:** consensus-mcp ships via git tags +\npipx, NOT PyPI. README documents\
      \ `pipx install\ngit+https://github.com/.../consensus-mcp.git@vX.Y.Z`. No\n\
      `twine upload`, no `~/.pypirc`, no PyPI workflow exists. If you\ncatch yourself\
      \ proposing a PyPI step, stop — you're adding a\nchannel that is not part of\
      \ this project's release flow.\n\n**Branch convention (evolved in v1.15.4):**\
      \ `main` is the GitHub\ndefault branch and tracks **the latest released state**.\
      \ After\nevery release cut, `main` is **fast-forwarded to the just-cut tag**\n\
      (cut-sequence step 8) — never a merge, never a force-push (the\nfast-forward\
      \ is always clean because each release branch descends\nlinearly from the prior\
      \ release tip, which descends from `main`).\nActive development happens on the\
      \ `v<X.Y.Z>` branches, which are\nself-contained and branch from the previous\
      \ release's tip; they are\nNOT merged into `main` — `main` only ever *fast-forwards*\
      \ to a\nreleased tag. Rationale: the pre-v1.15.4 \"main frozen forever\"\nconvention\
      \ left the GitHub landing page stuck at v1.13.0 and\nGitHub Actions CI dormant\
      \ from v1.13.0→v1.15.3 (CI triggered only\non `main`). `main` = newest tag;\
      \ `v<next>` = where work lands;\nrelease = the moment a tag is pushed AND `main`\
      \ is fast-forwarded\nonto it.\n\n**Sanctioned-exception carve-out (added v1.15.5):**\
      \ \"never a\nforce-push\" governs ROUTINE operation. A **full-history rewrite**\n\
      (`git filter-repo`) — e.g., an account migration or a\nprovenance/secret scrub\
      \ that must reach immutable commit/tag\nmessages — is the ONE sanctioned reason\
      \ to force-push `main` and\nre-create every tag. It is NOT routine and requires\
      \ ALL of:\n(1) explicit operator authorization of the rewrite specifically\n\
      (not implied by any other task); (2) a verified full backup\nbundle (`git bundle\
      \ --all`) stored OUTSIDE the repo before\nrunning; (3) post-rewrite verification\
      \ BEFORE pushing —\n`git grep`/`git log --all` show zero target strings across\
      \ all\nrefs, all release tags + branches still present, full suite green\non\
      \ the rewritten tip (token replacements must stay internally\nconsistent); (4)\
      \ force-push all branches + all tags together, then\nre-verify `origin/main`\
      \ == local. Precedent: 2026-05-15\n`stgarca`→`stgarca` account migration\
      \ + `upstream`\nprovenance purge (127 commits, 18 branches, 66 tags rewritten;\n\
      backup `consensus-mcp-prefilter-backup-20260515-125935.bundle`).\nConsequence\
      \ to state plainly when it happens: every published tag\nSHA changed; tag-pinned\
      \ `pipx install @vX.Y.Z` URLs keep working\n(tags moved) but any raw-SHA pin\
      \ or old clone is dead.\n\n**Variations:**\n\n- **Empty-week skip:** if zero\
      \ iterations landed, no cut. Never\n  cut empty releases.\n- **Hot-patches between\
      \ Fridays:** cut as `v<X.Y.Z+1>` whenever a\n  hot-patch lands; don't wait for\
      \ Friday for a fix release.\n- **Operator hold:** the operator may explicitly\
      \ delay a cut\n  (\"hold v1.14.0 until iter-0050\"). Default without explicit\n\
      \  hold is \"cut Friday.\"\n\nRelease-cut is itself an operating procedure —\
      \ not a design\ndecision and not subject to peer consensus.\n\n## When in doubt\n\
      \nThe conservative move is **Workflow A with all enabled contributors**.\nThe\
      \ extra wall-clock is bounded; the cost of ratifying a flawed\ndesign via 2-AI\
      \ audit is not.\n\nIf a dispatch is failing in a way you can't diagnose in 5\
      \ minutes,\nstop and ask the operator. Don't keep retrying — there is almost\n\
      always a config or auth issue upstream, and burning more dispatches\ndeepens\
      \ the hole.\n"
    consensus-state/README.md: '# consensus-state/


      Runtime state for the consensus pipeline. **Most of this tree is

      gitignored** — it is per-iteration working scratch, not source.


      | Path | What it is | Tracked? |

      |---|---|---|

      | `active/` | Live per-iteration working dirs (goal packets, proposals, sealed
      reviews, converged plans) | gitignored (only `.gitkeep`) |

      | `archive/` | Sealed review-pass archive + one-time upstream-history mirror
      | gitignored (only `.gitkeep`) |

      | `state/` | Dispatch log + audit log + decision ledger | gitignored (only `.gitkeep`)
      |

      | `tests/fixtures/` | Static fixtures consumed by the test suite | **tracked**
      |


      ## Recovery


      In-flight iteration state is gitignored by design, so a

      `git clean -fdX` (or a CI agent that wipes untracked files) can

      silently delete in-progress consensus work. It is snapshotted to

      the `consensus-state-snapshots` orphan branch after each iteration

      close:


      ```

      python -m consensus_mcp._snapshot_state snapshot --label <short-label>

      python -m consensus_mcp._snapshot_state restore  --tag <tag-name>

      ```


      ## Provenance


      consensus-mcp was extracted from an upstream agent-loop project and

      restarted as a standalone tool at iteration 0001. The full

      per-release history is in [`../CHANGELOG.md`](../CHANGELOG.md);

      release/branch policy and the cross-AI workflow doctrine live in

      the bundled `consensus-workflow` skill.

      '
    CHANGELOG.md: "# Changelog\n\n## 1.15.5 - 2026-05-15\n\n**Account migration +\
      \ provenance purge + doctrine reconciliation.**\n\nOperator directed (1) zero\
      \ `upstream` references anywhere\nand (2) GitHub account rename `stgarca`\
      \ → `stgarca`. Both\nrequired reaching immutable commit/tag messages, so — with\n\
      explicit operator authorization — a full `git filter-repo` history\nrewrite\
      \ was performed:\n\n- **Rewrite:** literal replace `upstream`→`upstream`,\n\
      \  `stgarca`→`stgarca` across ALL blob contents AND\n  commit/tag messages,\
      \ all 18 branches + 66 tags (127 commits).\n  Verified before pushing: zero\
      \ target strings in any blob or\n  message across every ref; all 17 release\
      \ tags + branches\n  present; full suite green on the rewritten tree (token\n\
      \  replacements internally consistent). Pre-rewrite safety bundle\n  kept outside\
      \ the repo.\n- **Consequence (artifact-scoped truth):** every published tag\
      \ SHA\n  changed. Tag-pinned `pipx install …@vX.Y.Z` URLs keep working\n  (tags\
      \ moved with the rewrite); any raw-commit-SHA pin or old\n  clone against the\
      \ previous `stgarca` remote is dead. The\n  canonical repo is now `https://github.com/stgarca/consensus-mcp`.\n\
      - **Doctrine reconciliation:** the v1.15.4 doctrine says `main` is\n  never\
      \ force-pushed. This rewrite force-pushed everything, so the\n  bundled `consensus-workflow`\
      \ skill now carries a\n  **sanctioned-exception carve-out**: a full-history\
      \ rewrite is the\n  ONE non-routine reason to force-push `main`, gated on explicit\n\
      \  authorization + verified backup + pre-push verification + suite\n  green.\
      \ Leaving the doctrine contradicting the action would be the\n  exact currency-drift\
      \ v1.15.3/v1.15.4 fixed.\n- **`consensus-state/README.md`** added (tracked)\
      \ — documents the\n  runtime-state tree + recovery, and (doctrine-correctly,\
      \ via a\n  fresh commit rather than more history surgery) relabels the\n  GitHub\
      \ `consensus-state/` folder off the old root commit the\n  operator flagged.\n\
      \nNo engine/config/behavior code touched. Full suite green. Workflow\nB audit:\
      \ codex + gemini (bundled-doctrine change).\n\n## 1.15.4 - 2026-05-15\n\n**Repo-presentation\
      \ + CI + branch-doctrine fix.** Operator observed\nthat the GitHub landing page\
      \ looked stuck at v1.13.0 and showed a\nhallucinated \"v2.0.0\" commit label\
      \ on `.github/workflows/`.\n\nRoot cause: the pre-v1.15.4 release-branching\
      \ convention froze\n`main` forever (releases lived only on `v<X.Y.Z>` branches/tags,\n\
      never merged back). `main` is GitHub's default branch, so the\nlanding page\
      \ was frozen at v1.13.0 — and, more seriously,\n`.github/workflows/test.yml`\
      \ triggered **only** on `main`, so\nGitHub Actions CI was **dormant from v1.13.0\
      \ → v1.15.3** (every\nrelease ran on a `v*` branch CI never saw; those releases\
      \ were\nverified by local pytest only).\n\n- **CI** (`.github/workflows/test.yml`):\
      \ now triggers on push/PR to\n  `main` **and** `v*` branches, so release-branch\
      \ work is actually\n  exercised by GitHub Actions.\n- **Branch doctrine evolved**\
      \ (`consensus-workflow` SKILL.md): the\n  \"`main` frozen forever / never merge\
      \ back\" convention is replaced\n  by \"`main` = latest released state; every\
      \ release cut\n  fast-forwards `main` to the just-cut tag (clean ff, never a\
      \ merge\n  or force-push); development continues on `v<next>` branches.\" A\n\
      \  new cut-sequence step 8 documents the fast-forward with an\n  ancestor-check\
      \ safety guard (and step 3 moves README install/\n  status currency pre-tag,\
      \ since the tag's README is now the\n  landing page). Updating the bundled doctrine\
      \ here\n  prevents the same currency-drift v1.15.3 just fixed.\n- **`main` fast-forwarded**\
      \ from v1.13.0 (`64f70ec`) to the v1.15.4\n  tag — a verified clean fast-forward\
      \ (no history rewrite, no\n  dropped commits, no force-push). The GitHub landing\
      \ page now\n  reflects the current state, including the accessible README.\n\
      - **README** rewritten as an accessible ~150-line summary (was 364\n  dense\
      \ lines); deep internals moved behind CHANGELOG/`docs/`\n  links. Load-bearing\
      \ facts preserved.\n\nNo engine/config/behavior change. Full suite green. Workflow\
      \ B\naudit: codex + gemini.\n\n## 1.15.3 - 2026-05-15\n\n**Bundled-doctrine\
      \ + status currency hot-patch** — doc/string only,\nno behavior change. Triggered\
      \ by an operator question (\"on a new\ninstall, will 2-AI follow all the upgraded\
      \ workflow lessons, same\nas 3-AI?\"). Investigation answer: **yes — doctrine\
      \ + v1.15.1\nmachine-enforcement are AI-count-AGNOSTIC, scoped by workflow mode,\n\
      never by contributor count.** But the investigation found shipped\nv1.15.2 artifacts\
      \ carrying stale forward-references that misled\nevery new installer (2-AI and\
      \ 3-AI identically).\n\nScope set by a **Workflow A consult** (`iteration-v1153-bundled-\n\
      skill-currency`; claude + codex + gemini; weighted-synthesis;\nshared-prior\
      \ self-check PASSED-WITH-CORRECTION — fast 3/3 unanimity\non scope was partly\
      \ a shared prior; claude's differing differential\nsurfaced F7, which was integrated,\
      \ not laundered by the unanimity).\n\nFixed (one failure mode — a shipped artifact's\
      \ forward-reference\nwhose target version already came due):\n- **F1** `consensus-workflow/SKILL.md`:\
      \ the converged-plan\n  convention is no longer described as \"machine validation\
      \ is a\n  sequenced follow-up\" — it is **machine-enforced as of v1.15.1**\n\
      \  (`validate_converged_plan` + fail-closed seal-time gate +\n  `convergence.converged_plan_enforcement`\
      \ knob, default\n  `graduated`).\n- **F2** same skill, Gemini section: empty\
      \ gemini output is NOT a\n  429 — `GEMINI_CLI_TRUST_WORKSPACE` guidance added\
      \ (fixed v1.15.2;\n  manual workaround only ≤ v1.15.1; don't burn the 429 budget).\n\
      - **F3** both bundled skills (`consensus-workflow` +\n  bootstrap `consensus`):\
      \ Workflow C engine status corrected — it\n  did **not** ship in v1.15.0; it\
      \ is UNIMPLEMENTED as of v1.15.2,\n  no committed target version.\n- **F4**\
      \ `workflow_engine.py`: the Workflow C `NotImplementedError`\n  message + comment\
      \ no longer promise \"lands in v1.15.0\" (string/\n  comment only — no control\
      \ flow; no test pinned it).\n- **F7** `docs/workflows/workflow-c-autonomous.md`:\
      \ 5 stale\n  \"v1.15.0\" forward-references corrected (the consult's\n  shared-prior-correction\
      \ finding — the doc F4's text points at).\n- **Q4** `consensus-workflow/SKILL.md`:\
      \ new normative\n  **consistency invariant** stating doctrine + enforcement\
      \ are\n  workflow-mode-scoped, never contributor-count-scoped — 2-AI and\n \
      \ 3-AI installs governed identically; only the convergence-rule\n  default differs\
      \ (unanimous@2 vs strict-majority@3). Converts the\n  operator's implicit invariant\
      \ into a written guarantee.\n\nNo invented replacement version anywhere (artifact-scoped\
      \ truth —\nthat would repeat the exact defect). Code+doc bundled in one tag\n\
      per the shared-failure-mode hot-patch doctrine (verified precedent:\nv1.14.5,\
      \ v1.14.6). Full suite green, 0 regressions. Workflow B\naudit: codex + gemini.\n\
      \n## 1.15.2 - 2026-05-15\n\n**gemini-dispatch workspace-trust fix** — closes\
      \ the v1.15.1\nnamed blocker (advisory 2026-05-15, now **resolved**).\n\n`consensus_mcp/_dispatch_gemini.py`\
      \ now injects\n`GEMINI_CLI_TRUST_WORKSPACE=true` into the gemini subprocess\
      \ env\nvia a new `_gemini_subprocess_env()` helper (returns a COPY of the\n\
      parent env; forces the var to `true` even if an inherited value is\n`false`;\
      \ never mutates `os.environ`). gemini CLI\n`0.43.0-preview.0`+ refuses headless\
      \ runs in an \"untrusted\"\ndirectory — it writes the trust error to stderr\
      \ and produces\n**empty stdout**, which the dispatcher then fails as\n`GeminiOutputParseError`.\n\
      \n**Empirically verified 2026-05-15** (the v1.15.1 audit diagnosed\nthis first-hand;\
      \ gemini pass-1 failed twice for exactly this):\n- `--skip-trust` alone (still\
      \ passed, defense-in-depth) is NOT\n  load-bearing on this version — gemini\
      \ bypassed trust but went\n  autonomous and 429'd.\n- `GEMINI_CLI_TRUST_WORKSPACE=true`\
      \ produced clean deterministic\n  output, and the two clean v1.15.1 Workflow\
      \ B audit approvals.\n\n`_dispatch_gemini.py` was in the v1.15.1 iteration's\n\
      `forbidden_files`, so the dispatcher-level fix was correctly\ndeferred to this\
      \ version rather than patched out-of-scope.\n\nWorkflow B audit clean: gemini\
      \ `goal_satisfied=true`, 0 blocking,\n0 findings — **dispatched from source\
      \ with\n`GEMINI_CLI_TRUST_WORKSPACE` explicitly unset**, so the audit pass\n\
      of this fix was made possible BY this fix (end-to-end in-vivo\nproof; acceptance\
      \ gate A4). codex: 0 blocking; doc-accuracy\nfindings on the advisory/changelog\
      \ wording integrated. Full suite\ngreen: 968 passed, 1 skipped, 0 regressions;\
      \ 4 new unit tests for\n`_gemini_subprocess_env` in `test_dispatch_gemini.py`.\n\
      \n## 1.15.1 - 2026-05-15\n\n**Machine-enforcement of the converged-plan convention**\
      \ — closes the\nv1.15.0 NAMED BLOCKER. From `iteration-converged-plan-machine-\n\
      enforcement` (Workflow A weighted-synthesis: claude + codex + gemini;\nshared-prior\
      \ self-check PASSED; no blocking objections; the consult\ndogfooded the very\
      \ convention it enforces). The recorded v1.15.0\n\"starting design\" (gemini's\
      \ `severity` field + `consensus_gate.py`\nmechanism) was **partially refuted\
      \ by first-hand code-reading** during\nthe consult: `consensus_mcp/validators/consensus_gate.py`\
      \ is the\nPhase-0 production-readiness gate (P0-V6) and is the WRONG component\
      \ —\nthe v1.15.0 doctrine working correctly on its own audit trail.\n\n**Artifact\
      \ truth (scoped claim):** the **v1.15.0 tag `4e81f9e` is\nDOCTRINE-ONLY** —\
      \ it shipped the convention as an authoring convention\nenforced by the bundled\
      \ skill + Workflow B audit, with **zero engine\ncode**. Machine enforcement\
      \ exists **only from the v1.15.1 tag\nforward**. Users on v1.15.0 get doctrine;\
      \ they must upgrade to v1.15.1\nto get the gate.\n\nShipped (real code paths\
      \ — meaningful regression signal, unlike\nv1.15.0's doc-only change):\n\n- **`consensus_mcp/schemas/converged_plan_convention.schema.json`**\n\
      \  (NEW; `schemas/` is net-new) — JSON Schema for the convention\n  object;\
      \ `empirical_status` enum `proven|pending|refuted|n/a` matches\n  v1.15.0 verbatim.\n\
      - **`consensus_mcp/validators/validate_converged_plan.py`** (NEW;\n  small;\
      \ structure + consequence ONLY). Enforces the consequence of\n  the orchestrator-attested\
      \ `falsifiable_from_artifacts` bool — the\n  engine does **not** classify the\
      \ defect (keyword heuristics are the\n  shared-prior trap the v1.15.0 report\
