    README.md: "# consensus-mcp\n\n**Automated peer review for AI-written code.**\
      \ Instead of trusting one\nAI to check its own work, consensus-mcp puts a small\
      \ panel of AIs\n(Claude, Codex, and Gemini by default) on every change — and\
      \ the\nchange only ships when they agree.\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n\
      [![Python 3.10+](https://img.shields.io/badge/python-3.10+-blue.svg)](https://www.python.org/)\n\
      [![MCP](https://img.shields.io/badge/MCP-server-purple.svg)](https://modelcontextprotocol.io)\n\
      \n---\n\n## Why\n\nAI coding assistants are fast, but they're confident even\
      \ when they're\nwrong — they invent functions, misremember files, and skip\n\
      assumptions. An AI reviewing its *own* work shares the exact blind\nspots that\
      \ caused the mistake.\n\nDifferent AI models fail in different ways. When two\
      \ of them disagree\nabout what a piece of code does, at least one is wrong —\
      \ and that\ndisagreement is what catches bugs a single reviewer misses.\nconsensus-mcp\
      \ turns that into an automatic step in your workflow.\n\n## What it does\n\n\
      When you ask the AI panel to write, fix, or review code, consensus-mcp:\n\n\
      1. **Writes down the request as a contract** — what's changing, which\n   files,\
      \ what \"done\" looks like, who approved it.\n2. **Sends it to each AI independently**\
      \ — they review without seeing\n   each other's answers first, so they can't\
      \ just agree out of\n   politeness.\n3. **Collects structured findings** — each\
      \ AI returns specific issues\n   with file-and-line citations, not vague impressions.\n\
      4. **Requires agreement before anything lands** — a configurable rule\n   (e.g.\
      \ \"majority\" or \"unanimous\") decides when the panel has\n   converged.\n\
      5. **Seals every step** with content hashes, so you can later prove\n   exactly\
      \ what was reviewed, by which AI, and when.\n6. **Backs up its working state**\
      \ to a separate git branch so a stray\n   `git clean` can't lose review history.\n\
      \nThe payoff: a change that passes three different AI families isn't\n\"one\
      \ model liked it\" — it's \"three models that fail differently all\nagree.\"\
      \n\n## Quick start\n\nInstall once per machine (works in any project):\n\n```bash\n\
      pipx install git+https://github.com/stgarca/consensus-mcp.git@v1.15.5\n\n# Optional:\
      \ add a small Claude Code helper so you can type\n# \"consensus init\" inside\
      \ Claude Code chat in any project.\nconsensus-init --install-claude-code\n```\n\
      \nThen, in any project:\n\n```bash\ncd /path/to/your-project\nconsensus-init\
      \                       # interactive setup, or:\nconsensus-init --non-interactive\
      \ --accept-defaults\n```\n\nThat writes a small config and registers the tool\
      \ with Claude Code.\nReopen Claude Code in the project and just ask in plain\
      \ language —\ne.g. *\"get a consensus review on this change.\"*\n\n> Codex and\
      \ Gemini are optional and auto-detected if their CLIs are on\n> your PATH. Claude\
      \ is always there as the coordinator. With just\n> Claude + Codex you still\
      \ get full cross-AI review — see\n> \"2 AIs or 3?\" below.\n\n## How it works\
      \ (the short version)\n\nEvery review runs the same four steps: **author** the\
      \ contract →\n**dispatch** each AI in a locked-down, read-only mode → **seal**\
      \ the\nresponses with hashes into an append-only log → **verify** the result\n\
      against the contract before any code is applied.\n\nA change can only \"close\"\
      \ if a *different* AI family than the one that\nwrote it reviewed the *exact*\
      \ changed state *after* the change was\nmade. Miss any of those and the review\
      \ is rejected automatically. A\nbackground watchdog also kills any AI call that\
      \ stalls, so reviews\ncan't hang indefinitely.\n\nYou pick how strict things\
      \ are per project — the review style, who's\non the panel, the agreement rule,\
      \ and more. `consensus-init` walks you\nthrough it; `consensus-init --print-defaults`\
      \ shows every option.\n\n## 2 AIs or 3?\n\nA 2-AI setup (Claude + Codex) and\
      \ a 3-AI setup (adding Gemini) are\ngoverned **identically** — same rules, same\
      \ enforcement, same\nguarantees. The number of AIs never changes the doctrine;\
      \ it's the\n*workflow mode* that does. The only difference is a sensible default:\n\
      2 AIs default to \"both must agree,\" 3 default to \"majority\" — and you\n\
      can override either.\n\n## Does it actually work?\n\nconsensus-mcp is built\
      \ using itself. During its own development the\nAI panel caught **38 real defects\
      \ before commit, with zero false\npositives** — including a race condition,\
      \ a safety check that silently\nfailed open, and a path-matching bug, each missed\
      \ by single-AI review.\n\n## Status\n\n**Current: v1.15.5.** Recent work hardened\
      \ the review machinery\n(machine-enforced plan conventions, dispatcher fixes),\
      \ made the\ndocumentation match shipped reality, and fixed the release/branch\n\
      model so `main` (and this landing page) and GitHub Actions CI stay\non the latest\
      \ released state. Full per-release detail is in\n[`CHANGELOG.md`](CHANGELOG.md);\
      \ upgrade guidance for known-issue\nreleases is in [`docs/advisories.md`](docs/advisories.md).\n\
      \nExtracted from the project that produced and stress-tested it, then\nrestarted\
      \ as a standalone tool. ~970 regression tests, green.\n\n## Learn more\n\n-\
      \ [`CHANGELOG.md`](CHANGELOG.md) — what changed in each release\n- [`docs/architecture/orchestration-spec.md`](docs/architecture/orchestration-spec.md)\n\
      \  — the full multi-AI orchestration design\n- [`docs/workflows/`](docs/workflows/)\
      \ — the review modes\n  (propose-converge, post-review, advisory, autonomous-execute)\
      \ and\n  when to use each\n- [`docs/advisories.md`](docs/advisories.md) — known-issue\
      \ releases\n  and the right version to upgrade to\n\n(Power-user options — bootstrap\
      \ flags, single-reviewer escape hatches,\nthe full configuration table, the\
      \ architecture map — moved to\n[`CHANGELOG.md`](CHANGELOG.md) and the `docs/`\
      \ tree to keep this page\nreadable.)\n\n## Requirements\n\n- Python 3.10+\n\
      - [`pipx`](https://pipx.pypa.io/) recommended (isolated, reusable\n  across\
      \ projects)\n- Optional: [`codex-cli`](https://github.com/openai/codex-cli)\
      \ and/or\n  [`gemini-cli`](https://github.com/google-gemini/gemini-cli) on PATH\n\
      \  for the multi-AI panel (Claude is always present)\n\n## License\n\nMIT —\
      \ see [LICENSE](LICENSE).\n\n## Contributing\n\nThe project reviews itself:\
      \ contributions go through the same\nfour-step cross-AI cycle, so expect review\
      \ feedback from more than one\nmodel on your change.\n"
