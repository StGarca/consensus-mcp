schema_version: 1
pilot_id: iteration-audit-2026-05-14-three-followup-gaps
workflow_mode: propose-converge
independence: blind-first-reveal
goal:
  summary: |
    Workflow #4 consult on three open gaps left unaddressed by the
    v1.14.2 doctrine hot-patch. The operator surfaced these as
    "NOT addressed in this cut" and explicitly requested consensus.

    GAP 1 — `config.py:303-309` enforces all-or-nothing for
    workflow #4, contradicting the iter-0043 weighted-synthesis
    doctrine.

    Verified evidence (consensus_mcp/config.py:303-309):
      ```
      # Rule: workflow.mode=propose-converge forces all-or-nothing
      # disposition (D5 majority)
      if mode == WORKFLOW_PROPOSE_CONVERGE and disposition !=
              DISPOSITION_ALL_OR_NOTHING:
          raise ConfigValidationError(
              f"workflow.mode=propose-converge requires "
              f"convergence.finding_disposition=all-or-nothing; "
              f"got {disposition!r}. Per iter-0015 majority resolution,
              per-finding is restricted to post-review and advisory
              for v1."
          )
      ```
    Doctrine (iter-0043, shipped in v1.14.2 skill): "Default
    convergence model: weighted-synthesis. all-or-nothing is
    edge-case opt-in only." So the data layer requires the
    legacy default while the doctrine requires the new default.
    Goal_packets currently must declare `all-or-nothing` to pass
    validation, even when the converged plan is authored in
    weighted-synthesis style. Bandage in place; the constraint
    needs lifting.

    GAP 2 — The "rationalize-away-disconfirming-evidence"
    pattern is named in `feedback_disconfirming_evidence.md` but
    not procedurally enforceable beyond pattern-recognition.

    The named pattern (verbatim from the memory):
      "plausible-sounding-default-overrides-verification-and-
       rationalizes-away-disconfirming-evidence"

    Current procedural levers in place (from iter-audit-pypi):
      - Skill section "Verify before invent" (mandatory citation)
      - Skill section "Artifact-scoped claims" (no global "fixed")
      - Dispatch-template verification-first preamble (peer AIs)
      - Project-local memories (claude-personal)

    The pattern survives all of these because it operates at the
    INTERPRETATION layer ("the evidence I just gathered means X
    instead of Y"), not at the verification layer (which is
    enforced) or the claim layer (also enforced). The question is
    whether further procedural levers exist that don't require
    system-prompt changes (out of scope for this consult).

    GAP 3 — v1.14.0 and v1.14.1 tags remain immutable with
    defective-or-partially-corrected bundled skill content. New
    installs of those tags ship the bug.

    Verified state:
      - v1.14.0 tag at commit 8e0dab2: ships skill with PyPI
        invention bug
      - v1.14.1 tag at commit 5f6cfe7: ships skill with PyPI
        bug fixed but no verify-before-invent / artifact-scoped-
        claims sections
      - v1.14.2 tag at commit 12eca6c: ships full doctrine fix
      - README.md:40 currently says
        `pipx install git+https://github.com/stgarca/
        consensus-mcp.git@v1.14.0` — points NEW INSTALLS AT THE
        BUGGY TAG
      - README.md:48 same defect on the pip-in-venv example

    The README points users at the worst-case version. Anyone
    running the documented install command today gets the
    skill with the PyPI invention bug embedded. This is an
    actively-bleeding wound; existing users on v1.14.0 are one
    issue, but ongoing new installs from a stale README is the
    bigger concern.

  question: |
    Each contributor: pick a stance on Q1-Q3, justify against
    alternatives, sketch the smallest deliverable scope. Honest
    structural_abstention is acceptable per question if outside
    your visibility.

    Q1 — **config.py constraint resolution.**
      (a) **Lift the constraint entirely.** Remove the
          `mode == WORKFLOW_PROPOSE_CONVERGE and disposition !=
          DISPOSITION_ALL_OR_NOTHING` check; allow any
          `finding_disposition` value with workflow #4. Update
          docstrings. Pro: simplest, matches doctrine. Con:
          loses the iter-0015 design intent that per-finding
          disposition is a post-review / advisory feature.
      (b) **Invert the default + add new disposition value.**
          Introduce `DISPOSITION_WEIGHTED_SYNTHESIS` as a new
          enum value; default for workflow #4 becomes
          weighted-synthesis; all-or-nothing remains valid as
          an explicit opt-in. Pro: codifies the doctrine in
          the data layer; preserves all-or-nothing semantics
          for operators who want them. Con: schema change,
          new enum value, more test coverage.
      (c) **Soft-enforce: warn but don't reject.** Change the
          ConfigValidationError to a logged warning when
          workflow #4 + non-all-or-nothing is configured.
          Pro: backward compatible, lets operators experiment
          with weighted-synthesis without lifting the rail
          entirely. Con: warnings get ignored; the doctrine
          stays partially-enforced; weak signal.
      (d) **Defer until empirical evidence.** Two iterations
          have used weighted-synthesis (iter-0043, iter-audit-
          pypi); both succeeded but n=2 is small. Wait until
          n>=10 before lifting the constraint. Pro: avoids
          shipping schema changes on small evidence base.
          Con: keeps doctrine and data-layer mismatched
          indefinitely; doctrine drift accumulates.

    Q2 — **Procedural enforcement of the "rationalize-away"
    pattern.** Beyond skill+memory+template, what additional
    procedural lever applies?
      (a) **Decision-audit requirement.** When dispatching a
          tool that produces evidence about an external
          system or capability, the very next claim about
          that system must include an explicit citation to
          the tool's output (positive OR negative). Frame:
          "I ran X, the result was Y, this implies Z; my
          proposed action is W which is justified by Z."
          Pro: structural, hard to skip. Con: noisy if
          applied to every routine check; needs scope rule.
      (b) **Second-pair-of-eyes for high-impact actions.**
          Before any irreversible / operator-visible step
          based on an inferred capability, dispatch a fast
          peer review (codex or gemini) with a narrow
          "verify this inference" prompt. Pro: catches
          claude-internal rationalization via independent
          AI. Con: latency, dispatcher cost, may itself
          rationalize.
      (c) **Verification-report template.** Add a structured
          template for any "I verified X" claim:
          `claim: ..., evidence_source: ..., evidence_value: ...,
          interpretation: ..., counter-interpretation: ...`
          The "counter-interpretation" field forces explicit
          consideration of the disconfirming reading. Pro:
          structurally prevents the gluing pattern by
          requiring the alternative reading to be named.
          Con: heavyweight; only applicable to formal
          verifications, not casual checks.
      (d) **Accept the lever set is exhausted.** The deeper
          failure operates at the interpretation layer where
          procedural enforcement has natural limits without
          system-prompt changes. Best available: routine
          self-check reinforcement via the existing memory
          + skill artifacts. Don't add more rules; sharpen
          the existing ones.

    Q3 — **Stale-bundled-skill mitigation for v1.14.0 / v1.14.1.**
      (a) **Bump README install URL to v1.14.2 + audit other
          docs.** Quick fix; new installs get the doctrine.
          Existing users on older tags unaffected (they have
          to upgrade explicitly). Pro: smallest blast
          radius, addresses the bleeding wound. Con: doesn't
          retroactively help users who pinned v1.14.0.
      (b) **Add a "MINIMUM RECOMMENDED VERSION" advisory to
          README + CHANGELOG explicitly calling out v1.14.0
          and v1.14.1 as deprecated.** Pro: communicates
          the deprecation; users on older tags see the
          advisory next time they consult docs. Con: relies
          on users actually re-reading docs; many won't.
      (c) **(a) + (b) combined.** Bump install URL AND add
          advisory. Pro: belt-and-suspenders. Con: small
          extra effort over (a) alone.
      (d) **Move the tags (footgun).** Force-update v1.14.0
          and v1.14.1 tags to point at the corrected commits.
          Pro: existing pins automatically get the fix.
          Con: violates the immutable-tag invariant that
          downstream tooling (pipx caches, CI lockfiles,
          checksums) relies on. Strong anti-pattern.
      (e) **Accept the cost; do nothing beyond v1.14.2.**
          Tags are tags. Future installs implicitly go to
          v1.14.2 because... wait, no, README still points
          at v1.14.0. So (e) only works if combined with
          (a) anyway. (e) alone is incoherent given the
          README state.

    Required of each contributor:
      (a) verdict on Q1 config.py resolution
      (b) verdict on Q2 procedural enforcement
      (c) verdict on Q3 stale-tag mitigation
      (d) any missed dimension from Q4 below

    Q4 — **Missed dimensions.** Open-ended. Candidates:
      - Are there OTHER stale doc references (besides README
        lines 40 and 48) that should be bumped in the same
        PR as Q3's fix?
      - Should there be a release-notes / advisory mechanism
        in the project (e.g., `docs/advisories.md`) for this
        kind of "shipped artifact has a known doctrine drift"
        situation?
      - For Q1: should `_init_wizard.py` (the operator-facing
        config wizard) be updated to default to weighted-
        synthesis when workflow #4 is selected?
      - For Q2: is there a way to make the dispatch-template
        preamble itself more concrete (e.g., add a
        worked-example showing the rationalize-away pattern
        and the correct response) rather than abstract rules?
      - Cross-cutting: should v1.14.3 bundle ALL of Q1+Q2+Q3
        fixes, or split them across separate hot-patches?

  non_goals:
    - changing the system prompt (Anthropic-side, out of
      scope per iter-audit-pypi convergence)
    - re-cutting v1.14.0 or v1.14.1 (immutable; force-moving
      tags is rejected as Q3 option (d))
    - adding new MCP tools or dispatcher features
    - changing dispatch-template structure beyond preamble
      content
    - implementing iter-0044 (adapter --mode forwarding) —
      that's separately scoped on v1.14.3 and unrelated
  type: design_consult
