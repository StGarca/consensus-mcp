proposal:
  selected_target: |
    THREE INDEPENDENT FIXES, SPLIT ACROSS HOT-PATCHES BY BLAST
    RADIUS:

    - Q3 first as v1.14.3 (URGENT, doc-only): README install URL
      bumped to @v1.14.2; advisory section added to CHANGELOG +
      new `docs/advisories.md`; cut sequence in skill gains a
      "bump README install URL to new tag" step. Stops the
      bleeding wound (new installs hitting the buggy tag).
    - Q1 as v1.14.4 (engine change, test-coverage required):
      add `DISPOSITION_WEIGHTED_SYNTHESIS` enum value; flip
      workflow #4 default to weighted-synthesis; preserve
      all-or-nothing as explicit opt-in. Update validator,
      _init_wizard, schema; add test for both dispositions.
    - Q2 as v1.14.5 OR folded into v1.14.4 (depending on
      Q1's blast radius): skill gains "Decision-audit
      pattern" section + dispatch-template preamble gains a
      worked-example showing the rationalize-away pattern
      vs. the correct response. (a) decision-audit + (c)
      verification-report layered — (a) for routine, (c)
      for formal/irreversible.

    Concrete answers:
      Q1: (b) — new disposition enum value + default flip;
          preserves iter-0015 intent for explicit opt-in.
      Q2: (a) + (c) layered — decision-audit for routine,
          verification-report template for formal.
      Q3: (c) + cut-sequence amendment — bump install URL
          AND add advisory AND make README-bump a release
          gate so this drift can't recur.

  rationale_vs_alternatives: |
    Q1 — Why (b) over (a)/(c)/(d):

    (a) lift entirely: matches doctrine but loses the iter-0015
    design intent that per-finding disposition is restricted to
    post-review and advisory. There IS a real reason to
    constrain the disposition values per workflow mode (different
    workflows have different vote-shapes). The fix is to ADD a
    new value that fits workflow #4, not to remove the
    constraint.

    (c) soft-enforce (warn-don't-reject): warnings are reliably
    ignored. The doctrine stays partially-enforced; the next
    contributor reading a warning-but-permitted goal_packet
    can't tell whether weighted-synthesis is the new normal or
    a deprecated edge-case. Weak signal. Reject.

    (d) defer for empirical evidence: n=2 is small but the call
    was already made deliberately by the operator
    ([[weighted-synthesis-default]] memory + iter-0043 doctrine
    + iter-audit-pypi reinforcement). Deferring would be exactly
    the inertial defaulting that produced this whole audit.
    Reject.

    (b) is the right level: data-layer codification of the
    doctrine + preservation of the historical behavior for
    operators who explicitly want it. Concrete sketch:

      # consensus_mcp/config.py additions
      DISPOSITION_WEIGHTED_SYNTHESIS = "weighted-synthesis"
      _VALID_DISPOSITIONS = {
          DISPOSITION_ALL_OR_NOTHING,
          DISPOSITION_WEIGHTED_SYNTHESIS,
          DISPOSITION_PER_FINDING,  # if it exists for post-review
      }

      # validator change at lines 303-309:
      if mode == WORKFLOW_PROPOSE_CONVERGE:
          if disposition not in {
              DISPOSITION_ALL_OR_NOTHING,
              DISPOSITION_WEIGHTED_SYNTHESIS,
          }:
              raise ConfigValidationError(...)

      # default in _init_wizard.py:
      # if workflow=propose-converge, default disposition =
      # weighted-synthesis (was: all-or-nothing)

    Tests cover both dispositions. Backward compat: existing
    goal_packets that explicitly declare `all-or-nothing` keep
    working. Goal_packets that declare nothing get the new
    default (weighted-synthesis).

    Q2 — Why (a) + (c) layered over (b)/(d) alone:

    (b) second-pair-of-eyes for high-impact actions: high cost
    (peer dispatch latency) for what is fundamentally a self-
    discipline problem. The peer AIs share the same training-
    distribution biases I do — codex and gemini just spent two
    consults agreeing with me on issues I might have produced.
    Independent peer-review is for design questions (workflow
    #4) not for "did claude rationalize this evidence?"
    Reject as primary mechanism; keep as escalation for
    high-stakes actions.

    (d) accept lever set is exhausted: the rationalize-away
    pattern operates at the INTERPRETATION layer where rules
    have natural limits. But that doesn't mean adding rules at
    OTHER layers is futile — it means rules at the
    interpretation layer must be structural enough that the
    rationalization can't slip past them. Reject (d) as
    defeatism.

    (a) decision-audit requirement: structural; when I dispatch
    a tool that produces evidence, the next claim about that
    evidence must include "I ran X, result was Y, implication
    Z, action W is justified by Z." This format prevents the
    gluing pattern by requiring each link in the chain to be
    named. The operator (and future-me) can audit each link
    independently. Cost: small overhead per evidence-producing
    tool call.

    (c) verification-report template: heavier; for FORMAL
    verifications (release cuts, deploy gates, security
    checks), use a structured template:
      claim: <what I'm asserting>
      evidence_source: <file:line / command / URL>
      evidence_value: <verbatim or summary>
      interpretation: <what evidence implies>
      counter_interpretation: <what evidence could ALSO mean>
      decision: <which interpretation I'm acting on, why>
    The "counter_interpretation" field is the load-bearing
    addition — it forces explicit consideration of the
    rationalize-away alternative. Hard to skip without leaving
    an obvious gap.

    Layering: (a) for routine evidence, (c) for formal
    verifications. (b) escalation when stakes warrant.

    Q3 — Why (c) + cut-sequence amendment over (a)/(b)/(d)/(e):

    (a) bump README alone: stops new bleeding but no advisory.
    Users on older tags don't know they should upgrade.
    Insufficient.

    (b) advisory alone: README still points at buggy tag.
    Bleeding continues. Insufficient.

    (d) move tags: footgun. Violates immutable-tag invariant
    that pipx caches, CI lockfiles, and audit consumers rely
    on. Strong anti-pattern; reject categorically.

    (e) accept cost: incoherent given current README state.
    Reject.

    (c) is the belt-and-suspenders combination. Plus a
    THIRD missing piece: this drift recurred BECAUSE the
    cut sequence didn't include "bump README to new tag."
    The verify-before-invent skill section already says
    "verify the README install URL form before assuming
    the channel" but doesn't say "AT cut time, bump the
    URL to the new tag." That's a procedural gap. Adding
    it as a step in the cut sequence prevents future
    drift.

    Concrete deliverable for Q3:
    - README.md:40 + :48 → bump @v1.14.0 → @v1.14.2
    - CHANGELOG.md v1.14.3 section: advisory listing
      v1.14.0 + v1.14.1 as deprecated with reasons
    - NEW docs/advisories.md as a standing mechanism for
      "shipped artifact has known doctrine drift" notices
    - consensus-workflow SKILL.md cut sequence: insert a
      step "bump README.md install URL to v<X.Y.Z> on the
      v<X.Y.Z+1> dev branch immediately after the tag is
      pushed" (so the URL always points at the most recent
      tag at all times)
    - grep -rn '@v1\.1[34]\.[0-9]' docs/ to catch any
      OTHER stale references in the same PR

    Q4 — Missed dimensions adopted:

    1. Yes — there are likely other doc references to
       specific older versions that should be bumped in the
       same PR. Q3 deliverable includes the grep sweep.

    2. Yes — `docs/advisories.md` as a standing mechanism is
       the right structural answer. This audit is the second
       in a single day; pattern is real. Codify the channel.

    3. Yes — `_init_wizard.py` default flip is part of Q1's
       deliverable. Operators going through the wizard for a
       workflow #4 setup should land in weighted-synthesis
       by default, with explicit opt-in for all-or-nothing.

    4. Yes — dispatch-template preamble worked example is
       part of Q2's deliverable. Abstract rules ("verify
       before invent") have lower hit rate than concrete
       wrong/right pairs ("inferred PyPI without checking
       README → wrong; cited README:40 install URL form →
       right"). Add the example.

    5. Split, not bundle. Q3 (doc-only, urgent, low risk)
       as v1.14.3 — same-day cut. Q1 (engine change with
       test coverage, schema additions, default flip) as
       v1.14.4 — separate cycle for proper test coverage.
       Q2 (doctrine + skill + template) as v1.14.5 OR
       folded into v1.14.4 (low marginal cost on top of
       v1.14.4's doc surface). Bundling Q1+Q3 risks the
       Q3 fix being held up by Q1's test coverage; bundling
       Q2+Q3 is fine but Q2 wants Q1's enum to reference
       in the worked example. Sequencing: Q3 → Q1 → Q2.

