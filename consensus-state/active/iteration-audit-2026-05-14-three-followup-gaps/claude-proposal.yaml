  key_design_decisions:
    - 'Q3 first because urgency: README points at buggy tag NOW'
    - 'Q1 codifies doctrine in data layer via NEW disposition value; preserves all-or-nothing as opt-in'
    - 'Q2 layers decision-audit (routine) + verification-report template (formal); peer-review escalation for high-stakes only'
    - 'Cut sequence in skill gains a "bump README install URL" step to prevent future drift'
    - 'docs/advisories.md as standing mechanism for shipped-artifact-has-doctrine-drift notices'
    - 'Worked examples in dispatch-template preamble (concrete wrong/right pair) > abstract rules'
    - 'Force-moving git tags rejected categorically (immutability invariant)'
    - 'Split into 2-3 hot-patches by blast radius; do not bundle Q1 with Q3 (Q3 must not wait for Q1 test coverage)'
  acceptance_gates:
    q3_gating:
      - 'README.md install URLs (:40 + :48) reference @v1.14.2 (or current latest tag)'
      - 'CHANGELOG.md v1.14.3 has advisory section explicitly listing v1.14.0 and v1.14.1 with deprecation reasons'
      - 'docs/advisories.md exists with iter-audit-pypi advisory as first entry'
      - 'skill cut sequence includes "bump README install URL" step explicitly'
      - 'grep "@v1\\.14\\.0" docs/ returns zero hits (or all hits are intentional historical refs)'
      - 'v1.14.3 tagged + pushed; v1.14.4 dev branch opened'
    q1_gating:
      - 'config.py: DISPOSITION_WEIGHTED_SYNTHESIS constant exists; validator allows it for workflow #4'
      - 'config.py: workflow #4 + all-or-nothing still allowed (backward compat)'
      - '_init_wizard.py: new operator going through workflow #4 setup lands in weighted-synthesis default'
      - 'tests: both dispositions covered for workflow #4'
      - 'tests: existing all-or-nothing tests still pass'
      - 'v1.14.4 tagged + pushed'
    q2_gating:
      - 'skill: "Decision-audit pattern" section exists with structural format (I-ran-X-result-Y-implication-Z-action-W)'
      - 'dispatch templates: verification-first preamble has worked example showing rationalize-away vs correct response'
      - 'memory: feedback_decision_audit_pattern + feedback_verification_report_template exist'
      - 'verification-report template applies to formal verifications only (release cuts, deploy gates) per scope rule'
      - 'v1.14.5 (or v1.14.4 fold) tagged + pushed'
  estimated_complexity: medium  # Q1 is small, Q2 is small, Q3 is small, but sequencing across 3 hot-patches is medium overall
  combined_risks:
    - 'Q1 schema change: existing goal_packets without explicit disposition declaration will get the new default (weighted-synthesis). May surprise operators who relied on implicit all-or-nothing. Mitigation: changelog entry calls out the default flip prominently; deprecation note in code for one release cycle.'
    - 'Q2 verification-report template may be over-engineered for low-impact decisions. Mitigation: scope rule explicit ("formal verifications only"); decision-audit pattern is the lighter-weight default for routine evidence.'
    - 'Q3 cut-sequence amendment depends on operator reliably running the bump step. Mitigation: add to skill cut sequence + write a script (consensus_mcp/_bump_readme.py?) that does the bump automatically.'
    - 'Sequencing risk: if Q1 lands before Q3, README still points at buggy tag during the Q1 review cycle. Mitigation: Q3 first explicitly.'
    - 'Worked-example in dispatch templates may go stale (PyPI specifics) as new categories of failure surface. Mitigation: pick a generic example pattern, not PyPI-specific; reference iter-audits by name for the historical detail.'
risks:
  - 'Three hot-patches in one day (v1.14.0, v1.14.1, v1.14.2) plus three more proposed (v1.14.3, v1.14.4, v1.14.5) creates a compressed release timeline. Risk of bookkeeping errors. Mitigation: keep each hot-patch atomic, single-purpose; dont bundle.'
  - 'README install URL bump is a chicken-and-egg: bumping on v1.14.3 means the v1.14.3 tag will SHIP a README that points at v1.14.2 (the previous tag). At the moment v1.14.3 is cut, the README will need bumping AGAIN. The cut-sequence amendment must say "bump on the NEXT dev branch immediately after tag push" so the new README always points at the just-cut tag.'
  - 'Q2 lever set may still be insufficient for the deeper failure. Mitigation: this is the best procedural option without changing the system prompt; if the pattern recurs, escalate to operator-level discussion.'
estimated_complexity: medium
