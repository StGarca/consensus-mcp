proposal:
  selected_target: Bundle immediate, low-risk fixes for README install instructions
    (GAP 3) and config validation (GAP 1); defer the complex procedural design for
    GAP 2 to a dedicated follow-on iteration.
  rationale_vs_alternatives: This approach triages the three gaps by urgency and complexity.
    It prioritizes fixing the 'actively-bleeding wound' in the README (GAP 3) that
    affects all new users, and bundles it with the straightforward doctrine-alignment
    fix for config validation (GAP 1). This delivers maximum immediate value with
    minimal risk. The alternative of addressing all three gaps in one iteration would
    unnecessarily couple simple fixes to a complex, open-ended design problem (GAP
    2), delaying the urgent corrections. Deferring the abstract 'rationalization'
    pattern to its own iteration allows for the focused design thought it requires
    without blocking tangible improvements.
  deliverable_scope:
    next_iteration_id: iter-0044-doctrine-hotfix-followups
    files_in_scope:
    - README.md
    - consensus_mcp/config.py
    - consensus_mcp/tests/test_config.py
    files_out_of_scope:
    - consensus_mcp/dispatch_templates/gemini_proposal_schema.json
    - any files related to AI skill content or behavioral enforcement
    key_design_decisions:
    - Update all `pipx install` and `pip install` examples in README.md to reference
      the `v1.14.2` tag instead of the buggy `v1.14.0`.
    - Remove the validation rule in `config.py` that raises a `ConfigValidationError`
      when `workflow.mode` is `propose-converge` and `convergence.finding_disposition`
      is not `all-or-nothing`. This aligns the data layer with the iter-0043 doctrine,
      making 'weighted-synthesis' a valid disposition.
    - A follow-on design consult will be proposed for GAP 2, as its solution is non-trivial
      and requires dedicated analysis.
    acceptance_gates:
    - A `grep` of `README.md` shows all `git+https` installation commands point to
      tag `v1.14.2`.
    - Unit tests for `consensus_mcp.config` pass when validating a configuration where
      `workflow.mode` is `propose-converge` and `finding_disposition` is `weighted-synthesis`.
  risks:
  - The risk for the proposed scope is low, as the changes align documentation and
    code with established doctrine. The primary risk is a test failure if the config
    validation logic change is not correctly reflected in `test_config.py`.
  estimated_complexity: small
  structural_abstention: false
