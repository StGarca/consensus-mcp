      \         },\n            \"review_target_path\": {\n                \"type\"\
      : [\"string\", \"null\"],\n                \"description\": (\n            \
      \        \"Optional path to the file under review (diff/patch or \"\n      \
      \              \"review-packet.yaml); helper computes sha256 and threads \"\n\
      \                    \"it through the prompt.\"\n                ),\n      \
      \      },\n            \"model\": {\n                \"type\": [\"string\",\
      \ \"null\"],\n                \"description\": \"Gemini model identifier; defaults\
