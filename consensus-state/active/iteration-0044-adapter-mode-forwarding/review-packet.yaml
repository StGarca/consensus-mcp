      \ str | None = None,\n    timeout_seconds: int | None = None,\n    review_target_path:\
      \ str | None = None,\n    model: str | None = None,\n    smoke: bool | None\
      \ = None,\n    phase: str | None = None,\n    mode: str | None = None,\n) ->\
      \ dict:\n    \"\"\"Dispatch gemini via _dispatch_gemini.main; return parsed\
