    consensus_mcp/contributors/_phase_mode.py: "\"\"\"Phase → dispatcher --mode mapping\
      \ (iter-0044 per iter-0043 converged plan).\n\nSingle source of truth for translating\
      \ `DispatchPacket.phase` into the\n`--mode` argument the shell dispatchers (`_dispatch_codex.main`,\n\
      `_dispatch_gemini.main`) accept.\n\nPer iter-0043 weighted-synthesis convergence:\n\
      \  - PHASE_PROPOSE → \"proposal\" (workflow #4 round-1 author task)\n  - PHASE_REVIEW\
      \ → \"review\" (workflow #3 / post-review audit task)\n  - PHASE_CONVERGE →\
      \ \"review\" (interim mapping; the dispatcher only has\n    two templates today.\
      \ iter-0045 candidate: empirically evaluate\n    whether convergence dispatches\
      \ produce review-shaped output that\n    fits the synthesis task, and if not,\
      \ ship a third \"converge\" mode.)\n\nStrict-dict lookup with explicit ValueError\
      \ on unknown phases. Per the\ndisconfirming-evidence rule: silent default-to-review\
      \ is what allowed\nthe original defect (CodexAdapter not forwarding --mode at\
      \ all). Never\ndefault; raise loudly.\n\"\"\"\nfrom __future__ import annotations\n\
      \nfrom consensus_mcp.contributors.base import (\n    PHASE_CONVERGE,\n    PHASE_PROPOSE,\n\
      \    PHASE_REVIEW,\n)\n\n\n_PHASE_TO_MODE: dict[str, str] = {\n    PHASE_PROPOSE:\
      \ \"proposal\",\n    PHASE_REVIEW: \"review\",\n    PHASE_CONVERGE: \"review\"\
      ,\n}\n\n\ndef phase_to_mode(phase: str) -> str:\n    \"\"\"Translate DispatchPacket.phase\
      \ into dispatcher --mode argument.\n\n    Raises:\n        ValueError: when\
      \ `phase` is not one of PHASE_PROPOSE, PHASE_REVIEW,\n            PHASE_CONVERGE.\
      \ The exception message names the phase and the\n            expected set so\
      \ the caller can diagnose.\n    \"\"\"\n    try:\n        return _PHASE_TO_MODE[phase]\n\
      \    except KeyError as exc:\n        raise ValueError(\n            f\"phase_to_mode:\
      \ unmapped phase {phase!r}; expected one of \"\n            f\"{sorted(_PHASE_TO_MODE.keys())}.\
      \ If you added a new phase, \"\n            f\"update consensus_mcp/contributors/_phase_mode.py\
      \ and its tests.\"\n        ) from exc\n"
    consensus_mcp/contributors/codex.py: "\"\"\"Codex contributor adapter — wraps\
      \ consensus_mcp._dispatch_codex.\n\nPer iter-0015 converged-plan Section C:\
      \ codex's existing dispatch helper is\nthe underlying CLI invoker; this adapter\
      \ normalizes its packet → argv\ntranslation and result extraction into the ContributorAdapter\
      \ interface.\n\nPhase semantics for v1: all three phases (propose, review, converge)\
      \ reuse\nthe SAME prompt template (codex_review_template.md) — phase intent\
      \ is\nconveyed via the goal_packet's `desired_end_state` text that the workflow\n\
      engine writes appropriately per phase. This was empirically validated in\niter-0015's\
      \ design consult (same template, different goal yielded design\nproposals +\
      \ convergence syntheses). Phase-specific templates can be added\nin a later\
      \ iteration if observed quality drops.\n\"\"\"\nfrom __future__ import annotations\n\
      \nimport contextlib\nimport io\nimport json\nfrom pathlib import Path\n\nfrom\
      \ consensus_mcp.contributors.base import (\n    ContributorAdapter,\n    DispatchError,\n\
      \    DispatchPacket,\n    SealedArtifact,\n)\n\n\nclass CodexAdapter(ContributorAdapter):\n\
      \    \"\"\"Codex contributor — subprocess via _dispatch_codex.main.\"\"\"\n\n\
      \    name = \"codex\"\n\n    def dispatch(self, packet: DispatchPacket) -> SealedArtifact:\n\
      \        # Build argv mirroring reviewer.dispatch_codex MCP wrapper.\n     \
      \   reviewer_id = packet.reviewer_id or f\"codex-{packet.iteration_dir.name}-{packet.phase}-1\"\
      \n        pass_id = packet.pass_id or f\"{reviewer_id}-pass1\"\n        # iter-0044\
      \ per iter-0043 converged plan: forward packet.phase as\n        # --mode to\
      \ the dispatcher. Previously omitted, causing every\n        # workflow #4 round-1\
      \ dispatch through the engine to silently\n        # use review-mode templates/schemas.\
      \ Strict mapping via\n        # _phase_mode.phase_to_mode (raises ValueError\
      \ on unknown phase).\n        from consensus_mcp.contributors._phase_mode import\
      \ phase_to_mode\n        mode = phase_to_mode(packet.phase)\n        argv =\
      \ [\n            \"--goal-packet\", str(packet.goal_packet_path),\n        \
      \    \"--iteration-dir\", str(packet.iteration_dir),\n            \"--reviewer-id\"\
      , reviewer_id,\n            \"--pass-id\", pass_id,\n            \"--timeout-seconds\"\
      , str(packet.timeout_seconds),\n            \"--mode\", mode,\n        ]\n \
      \       if packet.review_target_path is not None:\n            argv += [\"--review-target\"\
      , str(packet.review_target_path)]\n\n        from consensus_mcp import _dispatch_codex\n\
      \n        buf = io.StringIO()\n        rc = 0\n        with contextlib.redirect_stdout(buf):\n\
      \            try:\n                rc = _dispatch_codex.main(argv) or 0\n  \
      \          except SystemExit as exc:\n                raise DispatchError(\n\
      \                    f\"codex argparse SystemExit: {exc.code!r}\"\n        \
      \        ) from exc\n            except Exception as exc:\n                raise\
      \ DispatchError(\n                    f\"codex dispatch failed ({type(exc).__name__}):\
      \ {exc}\"\n                ) from exc\n\n        output = buf.getvalue().strip()\n\
      \        try:\n            parsed_result = json.loads(output)\n        except\
      \ json.JSONDecodeError as exc:\n            raise DispatchError(\n         \
      \       f\"codex dispatch returned non-JSON stdout: {exc}; sample: {output[:200]!r}\"\
      \n            ) from exc\n\n        if rc != 0 or not parsed_result.get(\"ok\"\
      ):\n            raise DispatchError(\n                f\"codex dispatch failed:\
      \ rc={rc}, \"\n                f\"error={parsed_result.get('error')!r}, \"\n\
      \                f\"error_type={parsed_result.get('error_type')!r}\"\n     \
      \       )\n\n        # codex-rev-002 round-1 fix: wrap sealed-path extraction\
      \ + YAML\n        # reading in DispatchError so engine timeout/failure policy\
      \ applies\n        # uniformly regardless of post-helper failures.\n       \
      \ try:\n            sealed_path_str = parsed_result[\"sealed_path\"]\n     \
      \   except KeyError as exc:\n            raise DispatchError(\n            \
      \    f\"codex dispatch returned no sealed_path: {parsed_result!r}\"\n      \
      \      ) from exc\n        sealed_path = Path(sealed_path_str)\n        try:\n\
      \            import yaml\n            sealed = yaml.safe_load(sealed_path.read_text(encoding=\"\
      utf-8\"))\n        except (OSError, yaml.YAMLError) as exc:\n            raise\
      \ DispatchError(\n                f\"codex sealed artifact unreadable at {sealed_path}:\
      \ \"\n                f\"{type(exc).__name__}: {exc}\"\n            ) from exc\n\
      \        if not isinstance(sealed, dict):\n            raise DispatchError(\n\
      \                f\"codex sealed artifact at {sealed_path} is not a YAML mapping;\
      \ \"\n                f\"got {type(sealed).__name__}\"\n            )\n\n  \
      \      return SealedArtifact(\n            contributor=self.name,\n        \
      \    phase=packet.phase,\n            pass_id=parsed_result[\"pass_id\"],\n\
      \            sealed_path=sealed_path,\n            archive_sealed_path=Path(parsed_result[\"\
      archive_sealed_path\"])\n                if parsed_result.get(\"archive_sealed_path\"\
      ) else None,\n            packet_sha256=parsed_result.get(\"packet_sha256\"\
      , \"\"),\n            parsed=sealed,\n        )\n"
    consensus_mcp/contributors/gemini.py: "\"\"\"Gemini contributor adapter — wraps\
      \ consensus_mcp._dispatch_gemini.\n\nMirrors CodexAdapter. Phase semantics same\
      \ as codex: all phases reuse the\nexisting gemini_review_template.md; phase\
      \ intent conveyed via goal_packet.\n\"\"\"\nfrom __future__ import annotations\n\
      \nimport contextlib\nimport io\nimport json\nfrom pathlib import Path\n\nfrom\
      \ consensus_mcp.contributors.base import (\n    ContributorAdapter,\n    DispatchError,\n\
      \    DispatchPacket,\n    SealedArtifact,\n)\n\n\nclass GeminiAdapter(ContributorAdapter):\n\
      \    \"\"\"Gemini contributor — subprocess via _dispatch_gemini.main.\"\"\"\n\
      \n    name = \"gemini\"\n\n    def dispatch(self, packet: DispatchPacket) ->\
      \ SealedArtifact:\n        reviewer_id = packet.reviewer_id or f\"gemini-{packet.iteration_dir.name}-{packet.phase}-1\"\
      \n        pass_id = packet.pass_id or f\"{reviewer_id}-pass1\"\n        # iter-0044\
      \ per iter-0043 converged plan: forward packet.phase as\n        # --mode to\
      \ the dispatcher. Same defect symmetry as CodexAdapter\n        # (previously\
      \ omitted, causing every workflow #4 round-1 gemini\n        # dispatch through\
      \ the engine to silently use review-mode\n        # templates/schemas). Strict\
      \ mapping via _phase_mode.phase_to_mode.\n        from consensus_mcp.contributors._phase_mode\
      \ import phase_to_mode\n        mode = phase_to_mode(packet.phase)\n       \
      \ argv = [\n            \"--goal-packet\", str(packet.goal_packet_path),\n \
      \           \"--iteration-dir\", str(packet.iteration_dir),\n            \"\
      --reviewer-id\", reviewer_id,\n            \"--pass-id\", pass_id,\n       \
      \     \"--timeout-seconds\", str(packet.timeout_seconds),\n            \"--mode\"\
      , mode,\n        ]\n        if packet.review_target_path is not None:\n    \
      \        argv += [\"--review-target\", str(packet.review_target_path)]\n\n \
      \       # codex-rev-003 round-1 fix: merge packet.adapter_options with\n   \
      \     # adapter_config so per-dispatch overrides take precedence over\n    \
      \    # static config. Precedence: packet.adapter_options.model >\n        #\
      \ adapter_config.model.\n        merged_options = {}\n        merged_options.update(self.adapter_config\
      \ or {})\n        merged_options.update(packet.adapter_options or {})\n    \
      \    model = merged_options.get(\"model\")\n        if model:\n            argv\
      \ += [\"--model\", model]\n\n        from consensus_mcp import _dispatch_gemini\n\
      \n        buf = io.StringIO()\n        rc = 0\n        with contextlib.redirect_stdout(buf):\n\
      \            try:\n                rc = _dispatch_gemini.main(argv) or 0\n \
      \           except SystemExit as exc:\n                raise DispatchError(\n\
      \                    f\"gemini argparse SystemExit: {exc.code!r}\"\n       \
      \         ) from exc\n            except Exception as exc:\n               \
      \ raise DispatchError(\n                    f\"gemini dispatch failed ({type(exc).__name__}):\
      \ {exc}\"\n                ) from exc\n\n        output = buf.getvalue().strip()\n\
      \        try:\n            parsed_result = json.loads(output)\n        except\
      \ json.JSONDecodeError as exc:\n            raise DispatchError(\n         \
      \       f\"gemini dispatch returned non-JSON stdout: {exc}; sample: {output[:200]!r}\"\
      \n            ) from exc\n\n        if rc != 0 or not parsed_result.get(\"ok\"\
      ):\n            raise DispatchError(\n                f\"gemini dispatch failed:\
      \ rc={rc}, \"\n                f\"error={parsed_result.get('error')!r}, \"\n\
      \                f\"error_type={parsed_result.get('error_type')!r}\"\n     \
      \       )\n\n        # codex-rev-002 round-1 fix: wrap sealed-path extraction\
      \ + YAML read\n        # in DispatchError (same fix as codex.py).\n        try:\n\
      \            sealed_path_str = parsed_result[\"sealed_path\"]\n        except\
      \ KeyError as exc:\n            raise DispatchError(\n                f\"gemini\
      \ dispatch returned no sealed_path: {parsed_result!r}\"\n            ) from\
      \ exc\n        sealed_path = Path(sealed_path_str)\n        try:\n         \
      \   import yaml\n            sealed = yaml.safe_load(sealed_path.read_text(encoding=\"\
      utf-8\"))\n        except (OSError, yaml.YAMLError) as exc:\n            raise\
      \ DispatchError(\n                f\"gemini sealed artifact unreadable at {sealed_path}:\
      \ \"\n                f\"{type(exc).__name__}: {exc}\"\n            ) from exc\n\
      \        if not isinstance(sealed, dict):\n            raise DispatchError(\n\
      \                f\"gemini sealed artifact at {sealed_path} is not a YAML mapping;\
      \ \"\n                f\"got {type(sealed).__name__}\"\n            )\n\n  \
      \      return SealedArtifact(\n            contributor=self.name,\n        \
      \    phase=packet.phase,\n            pass_id=parsed_result[\"pass_id\"],\n\
      \            sealed_path=sealed_path,\n            archive_sealed_path=Path(parsed_result[\"\
      archive_sealed_path\"])\n                if parsed_result.get(\"archive_sealed_path\"\
      ) else None,\n            packet_sha256=parsed_result.get(\"packet_sha256\"\
      , \"\"),\n            parsed=sealed,\n        )\n"
    consensus_mcp/tools/reviewer_dispatch_codex.py: "\"\"\"reviewer.dispatch_codex\
      \ MCP tool. Phase 4 v1.1.x — thin wrapper.\n\nWraps the proven _dispatch_codex\
      \ helper (LANDED v1.10.0; HARDENED v1.10.4)\nbehind an MCP tool surface. Per\
      \ project_phase_4_v1_1_x_mcp_wrapper_followup\nmemory and codex review #6 from\
      \ v1.10.0:\n\n  - Tool calls into _dispatch_codex helper (NOT a re-implementation).\n\
      \  - Helper remains the source of truth.\n  - Wrapper translates MCP-tool kwargs\
      \ into argv, calls main() in-process,\n    captures stdout, returns parsed JSON\
      \ dict.\n\nPrecondition (now satisfied per v1.10.3 first-real-codex-smoke success\n\
      2026-05-09): the helper has produced at least one sealed codex-review.yaml\n\
      in a real iteration. Cf. project_phase_4_v1_1_auto_codex_dispatch memory.\n\n\
      Flag-exposure decision (claude-iter0009-001, resolved 2026-05-10):\n  Three\
      \ helper CLI flags are intentionally NOT exposed via the MCP input_schema:\n\
      \    --prompt-template   (sensible internal default; dispatch_templates path-bound)\n\
      \    --schema            (sensible internal default; codex output schema is\
      \ fixed)\n    --codex-bin         (default 'codex'; resolved via shutil.which\
      \ + Windows .cmd\n                         preference at v1.10.3)\n  Rationale:\
      \ keep the MCP surface minimal; expose only what an MCP caller would\n  realistically\
      \ need to override. No caller has yet expressed a need for any of\n  the three.\
      \ If/when one does (e.g., to swap codex for an alternative reviewer\n  binary),\
      \ the addition is one schema property + one argv branch — no logic\n  change.\
      \ Decision is reversible, not load-bearing.\n\"\"\"\nfrom __future__ import\
      \ annotations\n\nimport contextlib\nimport io\nimport json\n\nfrom consensus_mcp\
      \ import _dispatch_codex\n\n\nSCHEMA = {\n    \"name\": \"reviewer.dispatch_codex\"\
      ,\n    \"description\": (\n        \"Dispatch the codex CLI as the second reviewer\
      \ for an iteration. \"\n        \"Thin MCP wrapper over the _dispatch_codex\
      \ helper. Returns the \"\n        \"helper's JSON output verbatim (success:\
      \ ok=True with pass_id + \"\n        \"sealed paths; failure: ok=False with\
      \ error + error_type).\"\n    ),\n    \"input_schema\": {\n        \"type\"\
      : \"object\",\n        \"properties\": {\n            \"goal_packet_path\":\
      \ {\n                \"type\": \"string\",\n                \"description\"\
      : \"Repo-relative or absolute path to the iteration's goal_packet.yaml.\",\n\
      \            },\n            \"iteration_dir\": {\n                \"type\"\
      : \"string\",\n                \"description\": \"Repo-relative or absolute\
      \ path to the iteration directory.\",\n            },\n            \"reviewer_id\"\
      : {\n                \"type\": [\"string\", \"null\"],\n                \"description\"\
      : \"Reviewer identifier; defaults to 'codex-<iteration_id>-1'.\",\n        \
      \    },\n            \"pass_id\": {\n                \"type\": [\"string\",\
      \ \"null\"],\n                \"description\": \"Pass identifier; defaults to\
      \ '<reviewer_id>-pass1'.\",\n            },\n            \"timeout_seconds\"\
      : {\n                \"type\": [\"integer\", \"null\"],\n                \"\
      description\": \"Codex subprocess timeout in seconds; default 600.\",\n    \
      \        },\n            \"review_target_path\": {\n                \"type\"\
      : [\"string\", \"null\"],\n                \"description\": (\n            \
      \        \"Optional path to the file under review (diff/patch); helper \"\n\
      \                    \"computes sha256 and threads it through the prompt.\"\n\
      \                ),\n            },\n            \"smoke\": {\n            \
      \    \"type\": [\"boolean\", \"null\"],\n                \"description\": (\n\
      \                    \"If true, helper's --smoke is passed; the env var \"\n\
      \                    \"CONSENSUS_MCP_RUN_REAL_CODEX_SMOKE=1 must also be set\
      \ \"\n                    \"or the helper refuses (exit 3).\"\n            \
      \    ),\n            },\n            \"phase\": {\n                \"type\"\
      : [\"string\", \"null\"],\n                \"enum\": [\"propose\", \"review\"\
      , \"converge\", None],\n                \"description\": (\n               \
      \     \"iter-0044: dispatch phase, mapped internally to --mode \"\n        \
      \            \"via consensus_mcp.contributors._phase_mode. 'propose' → \"\n\
      \                    \"--mode proposal; 'review' / 'converge' → --mode review.\
      \ \"\n                    \"Hides the dispatcher template/schema split from\
      \ MCP \"\n                    \"callers; matches engine adapter abstraction.\
      \ If both \"\n                    \"phase and mode are set, mode wins as explicit\
      \ override. \"\n                    \"Default (when neither is set): phase='review'\
      \ for \"\n                    \"backward compat with pre-iter-0044 callers.\"\
      \n                ),\n            },\n            \"mode\": {\n            \
      \    \"type\": [\"string\", \"null\"],\n                \"enum\": [\"review\"\
      , \"proposal\", None],\n                \"description\": (\n               \
      \     \"iter-0044 escape hatch: explicit --mode override for \"\n          \
      \          \"callers needing dispatcher-level control. Values match \"\n   \
      \                 \"the shell binary's --mode flag exactly. Wins over \"\n \
      \                   \"phase if both are set.\"\n                ),\n       \
      \     },\n        },\n        \"required\": [\"goal_packet_path\", \"iteration_dir\"\
      ],\n        \"additionalProperties\": False,\n    },\n    \"output_schema\"\
      : {\n        \"type\": \"object\",\n        \"properties\": {\n            \"\
      ok\": {\"type\": \"boolean\"},\n            \"pass_id\": {\"type\": [\"string\"\
      , \"null\"]},\n            \"packet_sha256\": {\"type\": [\"string\", \"null\"\
      ]},\n            \"sealed_path\": {\"type\": [\"string\", \"null\"]},\n    \
      \        \"archive_sealed_path\": {\"type\": [\"string\", \"null\"]},\n    \
      \        \"audit_event_id\": {\"type\": [\"string\", \"null\"]},\n         \
      \   \"error\": {\"type\": [\"string\", \"null\"]},\n            \"error_type\"\
      : {\"type\": [\"string\", \"null\"]},\n            \"raw_stdout_sample\": {\"\
      type\": [\"string\", \"null\"]},\n        },\n        \"required\": [\"ok\"\
      ],\n    },\n}\n\n\ndef _resolve_mode(phase: str | None, mode: str | None) ->\
      \ str | None:\n    \"\"\"iter-0044: resolve the effective --mode argv value.\n\
      \n    Precedence (per iter-0043 converged plan q2 weighted-synthesis):\n   \
      \   1. explicit `mode` wins (escape hatch for dispatcher-level control)\n  \
      \    2. otherwise translate `phase` via _phase_mode.phase_to_mode\n      3.\
      \ otherwise return None (caller omits --mode; dispatcher's own\n         default\
      \ of \"review\" applies, preserving pre-iter-0044 behavior)\n    \"\"\"\n  \
      \  if mode is not None:\n        return mode\n    if phase is not None:\n  \
      \      from consensus_mcp.contributors._phase_mode import phase_to_mode\n  \
      \      return phase_to_mode(phase)\n    return None\n\n\ndef _build_argv(\n\
      \    goal_packet_path: str,\n    iteration_dir: str,\n    reviewer_id: str |\
      \ None,\n    pass_id: str | None,\n    timeout_seconds: int | None,\n    review_target_path:\
      \ str | None,\n    smoke: bool | None,\n    phase: str | None = None,\n    mode:\
      \ str | None = None,\n) -> list[str]:\n    argv: list[str] = [\n        \"--goal-packet\"\
      , goal_packet_path,\n        \"--iteration-dir\", iteration_dir,\n    ]\n  \
      \  if reviewer_id is not None:\n        argv += [\"--reviewer-id\", reviewer_id]\n\
      \    if pass_id is not None:\n        argv += [\"--pass-id\", pass_id]\n   \
      \ if timeout_seconds is not None:\n        argv += [\"--timeout-seconds\", str(timeout_seconds)]\n\
      \    if review_target_path is not None:\n        argv += [\"--review-target\"\
      , review_target_path]\n    # iter-0044: resolve and append --mode. Omitted entirely\
      \ when both\n    # phase and mode are None (preserves pre-iter-0044 behavior\
      \ of relying\n    # on the dispatcher's default \"review\" mode).\n    resolved_mode\
      \ = _resolve_mode(phase, mode)\n    if resolved_mode is not None:\n        argv\
      \ += [\"--mode\", resolved_mode]\n    # smoke is a boolean flag (no value arg),\
      \ so we omit on any falsy\n    # input (None or False) — asymmetric with the\
      \ value-bearing args above\n    # which use `is not None`. Either way `--smoke`\
      \ is only added when truthy.\n    if smoke:\n        argv += [\"--smoke\"]\n\
      \    return argv\n\n\ndef handle(\n    goal_packet_path: str,\n    iteration_dir:\
      \ str,\n    reviewer_id: str | None = None,\n    pass_id: str | None = None,\n\
      \    timeout_seconds: int | None = None,\n    review_target_path: str | None\
      \ = None,\n    smoke: bool | None = None,\n    phase: str | None = None,\n \
      \   mode: str | None = None,\n) -> dict:\n    \"\"\"Dispatch codex via _dispatch_codex.main;\
      \ return parsed JSON dict.\n\n    iter-0044: phase + mode parameters added (per\
      \ iter-0043 converged plan).\n    `phase` is the engine-abstraction parameter\
      \ (propose/review/converge);\n    `mode` is the dispatcher-level escape hatch\
      \ (review/proposal). When\n    both are set, mode wins. When neither is set,\
      \ the dispatcher's\n    default --mode review applies (backward compat).\n \
      \   \"\"\"\n    argv = _build_argv(\n        goal_packet_path=goal_packet_path,\n\
      \        iteration_dir=iteration_dir,\n        reviewer_id=reviewer_id,\n  \
      \      pass_id=pass_id,\n        timeout_seconds=timeout_seconds,\n        review_target_path=review_target_path,\n\
      \        smoke=smoke,\n        phase=phase,\n        mode=mode,\n    )\n   \
      \ buf = io.StringIO()\n    # iter-0012 F3: wrap the helper main() call itself\
      \ in try/except so any\n    # exception raised during pre-checks (yaml.YAMLError,\
      \ ImportError,\n    # RuntimeError, FileNotFoundError, etc.) becomes a structured\
      \ error dict\n    # for direct MCP callers instead of leaking as a JSON-RPC\
      \ error.\n    # loop.run_goal contains exceptions via its own try/except, but\
      \ direct\n    # tool callers got raw tracebacks before this fix.\n    #\n  \
      \  # iter-0028 F3 (codex-rev-001): capture the helper's return code. The\n \
      \   # prior wrapper discarded main()'s rc entirely and trusted stdout JSON's\n\
      \    # `ok` field. A non-zero rc with `ok=True` in stdout would have been\n\
      \    # reported as success. Defense-in-depth: when rc != 0 and stdout JSON\n\
      \    # claims ok=True (or omits ok), force ok=False and stamp a marker key.\n\
      \    rc: int = 0\n    with contextlib.redirect_stdout(buf):\n        try:\n\
      \            rc = _dispatch_codex.main(argv) or 0\n        except SystemExit\
      \ as exc:\n            # iter-0011 codex-rev-001 cross-fix: argparse raises\
      \ SystemExit\n            # (BaseException, not Exception) on bad input. Without\
      \ an explicit\n            # catch, malformed input from an MCP caller could\
      \ kill the stdio\n            # MCP server. Convert to a structured failure\
      \ response. (Same fix\n            # applied to reviewer_dispatch_gemini.py\
      \ simultaneously.)\n            return {\n                \"ok\": False,\n \
      \               \"error_type\": \"ArgparseSystemExit\",\n                \"\
      error\": f\"argparse rejected input: {exc.code!r}\",\n            }\n      \
      \  except Exception as exc:\n            return {\n                \"ok\": False,\n\
      \                \"error_type\": type(exc).__name__,\n                \"error\"\
