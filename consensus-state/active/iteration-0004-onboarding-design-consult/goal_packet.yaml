schema_version: 1
pilot_id: iteration-0004-onboarding-design-consult
goal:
  summary: Cross-AI consult on two onboarding-design choices (binary resolution + output contracts).
  desired_end_state: |
    Codex reviews docs/design-consults/onboarding-binary-resolution-and-output-contracts.md
    and emits ONE finding per question (two findings total). Each finding's
    recommendation field carries the winning option; risk field carries the
    rationale. severity: low (these are design choices, not defects).

    Empty findings is NOT acceptable — both questions need a verdict.
  non_goals:
    - implement either option
    - audit other docs
    - propose patches
