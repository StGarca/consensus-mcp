schema_version: 1
pilot_id: iteration-0034-migrate-repo-get-section
goal:
  summary: |
    iter-0034 — second Phase B migration per iter-0024 plan. Migrate
    `consensus_mcp/tools/repo_get_section.py` from cached `REPO_ROOT =
    _resolve_repo_root()` capture to lazy `_paths.project_root()`
    composition. Read-only spec-section reader; uses project_root semantic
    (not state_root) for path-traversal guard on user-supplied file paths.
  desired_end_state: |
    repo_get_section.py no longer captures REPO_ROOT at module load. The
    legacy `_resolve_repo_root` function is removed. All REPO_ROOT call
    sites use `project_root()` from `consensus_mcp._paths` (lazy, reads
    env on every call). Path-traversal guard semantics preserved: paths
    must resolve under project_root() or are rejected with
    "path_outside_repo". The MCP tool surface (SCHEMA, handle, register)
    is unchanged.
    Full suite: 773 pass + 1 skipped + 0 fail (no regression).
  non_goals:
    - migrating other tools (iter-0035 batch for the next 6 LOW-impact,
      iter-0036 for audit_append_event, iter-0037 for review_write_and_seal)
    - new test coverage for repo_get_section (existing coverage already
      validates path semantics via test_repo_get_section.py if present)
    - changing the tool's MCP surface
allowed_files:
  - consensus_mcp/tools/repo_get_section.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/_paths.py
  - consensus_mcp/server.py
  - consensus_mcp/tools/repo_set_section.py
  - consensus_mcp/tools/state_update_decision_ledger.py
  - consensus_mcp/tools/state_read_decision_ledger.py
  - consensus_mcp/tools/patch_stage_and_dry_run.py
  - consensus_mcp/tools/patch_apply_consensus_patch.py
  - consensus_mcp/tools/gate_evaluate_production_with_scope_match.py
  - consensus_mcp/tools/review_read_post_seal.py
  - consensus_mcp/tools/review_write_and_seal.py
  - consensus_mcp/tools/audit_append_event.py
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/contributors/
  - consensus_mcp/config.py
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/_engine_factory.py
  - consensus_mcp/_snapshot_state.py
  - consensus_mcp/_import_parent_history.py
  - consensus-state/
  - pyproject.toml
  - README.md
  - CHANGELOG.md
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 1
max_patch_size: 200
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=773 green
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2
    description: module no longer captures REPO_ROOT at top level
    check: 'py -3.11 -c "import re; t=open(''consensus_mcp/tools/repo_get_section.py'',encoding=''utf-8'').read(); assert not re.search(r''^REPO_ROOT\s*='', t, re.M); assert not re.search(r''^def _resolve_repo_root'', t, re.M); print(''ok'')"'
  - id: A3
    description: project_root() is imported from _paths
    check: 'py -3.11 -c "t=open(''consensus_mcp/tools/repo_get_section.py'',encoding=''utf-8'').read(); assert ''from consensus_mcp._paths import project_root'' in t; print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T16:20:00Z'
  codex_patch_apply_authorized: false
  scope_signature: 'a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90'
