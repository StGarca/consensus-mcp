schema_version: 1
pilot_id: iteration-0023-readme-v1140-refresh
goal:
  summary: |
    iter-0023 — refresh README.md to reflect v1.14.0 state, per iter-0021
    converged-plan Section "deferred follow-ups" item (d). Updates the
    Quick Start to use `consensus-init` + `consensus.run_iteration`,
    documents the 9 operator-configurable dimensions, replaces the legacy
    4-workflow taxonomy with the v1.14.0 three-mode surface (post-review /
    propose-converge / advisory), refreshes the architecture diagram to
    include contributors/, workflow_engine.py, _engine_factory.py,
    _init_wizard.py, _snapshot_state.py, and the snapshot orphan branch,
    updates test count 420 → 688, version 1.12.0 → 1.14.0, and broadens
    cross-AI framing from "two AIs" to "N contributors".
  desired_end_state: |
    README.md reflects the current v1.14.0 surface accurately. No stale
    references to _visibility_tui (removed pre-v1.14), 420+ tests, or the
    legacy 4-workflow taxonomy as orchestrator-supported. Quick Start
    teaches new users via `consensus-init` + `consensus.run_iteration`,
    not directly invoking `_dispatch_codex`. Legacy single-reviewer
    dispatchers are documented as escape hatches. Cross-AI framing is
    accurate (Claude + Codex + Gemini in the default pool; operator-
    configurable). No other files touched.
  non_goals:
    - any source-code changes
    - changing CHANGELOG.md (already up to date)
    - adding new documentation files
    - changing existing wording where it's still accurate
allowed_files:
  - README.md
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - consensus-state/
  - pyproject.toml
  - CHANGELOG.md
  - LICENSE
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 1
max_patch_size: 400
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: stale claims removed
    check: 'py -3.11 -c "t=open(''README.md'',encoding=''utf-8'').read(); assert ''Two AI agents'' not in t; assert ''_visibility_tui'' not in t; assert ''420+ regression tests'' not in t; assert ''**1.12.0**'' not in t; print(''ok'')"'
  - id: A2
    description: v1.14.0 surface documented
    check: 'py -3.11 -c "t=open(''README.md'',encoding=''utf-8'').read(); assert ''consensus-init'' in t; assert ''consensus.run_iteration'' in t; assert ''propose-converge'' in t; assert ''gemini'' in t.lower(); assert ''snapshot'' in t.lower(); assert ''1.14.0'' in t; print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
  authorized_by: operator-autonomous-overnight
  authorized_at_utc: '2026-05-13T08:30:00Z'
  codex_patch_apply_authorized: false
  scope_signature: '18293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f607'
