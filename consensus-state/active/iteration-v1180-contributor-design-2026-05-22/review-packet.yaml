      \ leak — review-target/goal-packet/schema/template are\n    all read with read_text().\
      \ Containment fails closed with a clear diagnostic.\n\n    None passes through\
      \ as None.\n    \"\"\"\n    if path_str is None:\n        return None\n    p\
