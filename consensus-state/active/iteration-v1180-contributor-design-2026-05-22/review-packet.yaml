      \    packet = {\n        \"iteration_id\": iteration_id,\n        \"reviewer_id\"\
      : reviewer_id,\n        \"pass_id\": pass_id,\n        \"findings\": extracted.get(\"\
      findings\", []),\n        \"goal_satisfied\": (\n            # In proposal mode,\
      \ a non-abstaining contributor \"satisfies\" by\n            # producing a target;\
      \ an abstention is treated as not-satisfied.\n            (not extracted.get(\"\
      structural_abstention\", False))\n            if is_proposal\n            else\
