      \      1. CONSENSUS_MCP_REPO_ROOT env var (must validate)\n      2. Path.cwd()\
      \ (operator usually invokes from repo root)\n      3. Walk parents of Path(__file__)\
      \ (only succeeds when running in-tree;\n         the in-tree __file__ is consensus_mcp/_dispatch_codex.py\
      \ so\n         3-up = repo root with markers)\n\n    If no candidate validates,\
      \ raise RepoRootResolutionError with a clear\n    operator-facing message naming\
