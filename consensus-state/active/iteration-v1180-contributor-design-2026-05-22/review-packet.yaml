      \ Pass None (or omit) to\n    skip the provenance block (e.g., in the unit test\
      \ for _build_sealed_packet\n    itself which doesn't run the full pipeline).\n\
      \n    iter-0010 adapter-agnostic: attestation_method defaults to \"auto_codex_dispatch\"\
      \n    and attestation_input_sources defaults to the codex-specific list, preserving\n\
      \    pre-extraction behavior for the codex caller. Future adapters (gemini,\
      \ ...)\n    pass their own values.\n    \"\"\"\n    if attestation_input_sources\
      \ is None:\n        attestation_input_sources = [\n            \"goal_packet\
      \ (path passed via --goal-packet)\",\n            \"prompt_template (substituted\
      \ by _build_prompt)\",\n            \"review_target (path passed via --review-target;\
      \ may be unspecified)\",\n        ]\n\n    # iter-0028: detect proposal-mode\
      \ payload. A proposal-shape `extracted`\n    # has `selected_target` (or sets\
