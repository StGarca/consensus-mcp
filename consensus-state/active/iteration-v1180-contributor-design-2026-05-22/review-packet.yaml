      : (\n            extracted.get(\"rationale_vs_alternatives\", \"\")\n      \
      \      if is_proposal\n            else extracted.get(\"goal_satisfied_rationale\"\
      , \"\")\n        ),\n        \"blocking_objections\": extracted.get(\"blocking_objections\"\
      , []),\n        # Per v1.10.3 Windows real-codex smoke: T6's audit_append_event\
      \ requires\n        # `independence_attestation` for review_returned_and_sealed\
      \ events (schema\n        # type: object|null). For auto-codex-dispatch, isolation\
