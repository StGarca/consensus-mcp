      \ v for k, v in tfc.items()\n                    if isinstance(k, str) and isinstance(v,\
      \ str)\n                }\n\n    substitutions = {\n        \"{goal_summary}\"\
      : str(goal.get(\"summary\", \"\")),\n        \"{desired_end_state}\": str(goal.get(\"\
      desired_end_state\", \"\")),\n        \"{allowed_files}\": _format_list(goal_packet.get(\"\
      allowed_files\", [])),\n        \"{acceptance_gates}\": _format_gates(goal_packet.get(\"\
