      \ was set but the path \"\n            f\"{candidate} does not contain all required\
      \ repo markers \"\n            f\"{_REPO_ROOT_MARKERS}. Not falling through\
      \ to cwd / __file__ \"\n            f\"discovery — operator-supplied env var\
      \ is authoritative. \"\n            f\"Either fix the path (it must contain\
      \ {_REPO_ROOT_MARKERS} as \"\n            f\"subdirectories) or unset CONSENSUS_MCP_REPO_ROOT\
      \ to use \"\n            f\"automatic discovery.\"\n        )\n\n    cwd = Path.cwd().resolve()\n\
      \    candidates_tried.append((\"Path.cwd()\", cwd))\n    if _has_repo_markers(cwd):\n\
      \        return cwd\n\n    # __file__-parent walk: only finds repo root when\
      \ source-tree-installed.\n    here = Path(__file__).resolve()\n    for parent\
      \ in (here.parent, here.parent.parent, here.parent.parent.parent):\n       \
      \ candidates_tried.append((f\"parent of __file__ ({parent.name})\", parent))\n\
      \        if _has_repo_markers(parent):\n            return parent\n\n    tried_msg\
      \ = \"; \".join(f\"{name}={path}\" for name, path in candidates_tried)\n   \
      \ raise RepoRootResolutionError(\n        f\"Cannot resolve consensus-mcp repo\
      \ root. None of the candidates contain \"\n        f\"all required markers {_REPO_ROOT_MARKERS}.\
      \ Set CONSENSUS_MCP_REPO_ROOT \"\n        f\"to the repo root directory (e.g.,\
      \ the directory containing 'consensus-state/' \"\n        f\"and 'scripts/').\
      \ Candidates tried: {tried_msg}\"\n    )\n\n\nclass OutsideRepoPathError(ValueError):\n\
      \    \"\"\"v1.10.5 containment hardening: operator-supplied path resolves outside\
      \ repo_root.\"\"\"\n\n\ndef _normalize_for_compare(p) -> str:\n    \"\"\"iter-0039\
      \ xplat-rev-001 fix: canonicalize a path for cross-platform\n    containment\
      \ comparison.\n\n    On Windows the filesystem is case-insensitive, the canonical\
      \ separator\n    is backslash but forward slashes also work, and extended-length\
      \ paths\n    can be prefixed with `\\\\\\\\?\\\\`. The prior lower+replace fallback\
      \ didn't\n    handle the long-path prefix or 8.3 short-name expansion edge cases.\n\
      \n    This helper:\n      1. Strips the `\\\\\\\\?\\\\` long-path prefix if\
      \ present.\n      2. Calls os.path.normpath to collapse `.` / `..` segments\
