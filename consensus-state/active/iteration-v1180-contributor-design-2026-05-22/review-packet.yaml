      \ only sees the prompt + goal_packet +\n        # review_target). The attestation\
      \ records this guarantee + references the\n        # dispatch_provenance block\
      \ (which has the cryptographic hashes proving\n        # what was reviewed).\n\
      \        \"independence_attestation\": {\n            \"method\": attestation_method,\n\
      \            \"reviewer_isolated_by_construction\": True,\n            \"no_peer_review_visible_at_dispatch\"\
      : True,\n            \"input_sources\": attestation_input_sources,\n       \
      \     \"see_dispatch_provenance_for_input_hashes\": True,\n        },\n    }\n\
      \    if provenance is not None:\n        packet[\"dispatch_provenance\"] = provenance\n\
      \n    if is_proposal:\n        packet[\"proposal\"] = {\n            \"selected_target\"\
      : extracted.get(\"selected_target\"),\n            \"rationale_vs_alternatives\"\
      : extracted.get(\"rationale_vs_alternatives\", \"\"),\n            \"deliverable_scope\"\
      : extracted.get(\"deliverable_scope\"),\n            \"risks\": extracted.get(\"\
      risks\", []),\n            \"estimated_complexity\": extracted.get(\"estimated_complexity\"\
      ),\n            \"structural_abstention\": extracted.get(\"structural_abstention\"\
      , False),\n        }\n    return packet\n\n\ndef _seal_via_t6(\n    packet:\
      \ dict,\n    iteration_dir: Path,\n    sealed_filename: str = \"codex-review.yaml\"\
      ,\n) -> dict:\n    \"\"\"Call T6's handle in-process; mirror the sealed YAML\
      \ to <iteration_dir>/<sealed_filename>.\n\n    T6's actual signature is handle(iteration_id,\
      \ reviewer_id, pass_id, packet); it\n    writes the sealed YAML to its own deterministic\
      \ archive path under\n    consensus-state/archive/review-passes/. We additionally\
      \ COPY the sealed file to\n    <iteration_dir>/<sealed_filename> so the iteration\
      \ directory has a local copy\n    keyed by its iteration name (the auto-dispatch\
      \ convention).\n\n    iter-0010 adapter-agnostic: sealed_filename defaults to\
      \ \"codex-review.yaml\"\n    preserving pre-extraction behavior. Future adapters\
      \ pass e.g. \"gemini-review.yaml\".\n\n    Returns a dict with sealed_path (==\
