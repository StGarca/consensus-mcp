      \ process cwd (which may differ if a future MCP wrapper\n    or service caller\
      \ invokes us from elsewhere).\n\n    Per v1.10.5 containment hardening: after\
      \ resolution the path MUST be inside\n    repo_root. Absolute paths previously\
      \ passed through unchanged via p.resolve(),\n    which let any caller supply\
      \ (or have an MCP tool wrapper pass through) an\n    out-of-tree absolute path\
