      \        # line without a blank gap; preserve internal newlines verbatim.\n\
      \        if body.endswith(\"\\n\"):\n            body = body[:-1]\n        lines.append(body)\n\
      \        lines.append(\"```\")\n        lines.append(\"\")\n    return \"\\\
      n\".join(lines).rstrip() + \"\\n\"\n\n\ndef _build_prompt(\n    goal_packet:\
      \ dict,\n    template_text: str,\n    iteration_dir: str | None = None,\n  \
      \  review_packet_path: str | None = None,\n    review_target_path: str | None\
      \ = None,\n    review_target_hash: str | None = None,\n    review_packet: dict\
