      import time\nfrom pathlib import Path\n\n# v1.15.7 (A, corrected): serialize\
      \ dispatch-log.jsonl appends ACROSS\n# the threads of one dispatcher process.\
      \ The streaming _invoke_codex\n# emits dispatch events from the main thread\
      \ AND the stdout/stderr\n# reader threads concurrently; an abrupt wall-time-ceiling\
      \ teardown\n# could interleave a bare append → a torn JSONL line (windows-py3.10\n\
      # CI surfaced exactly that). The first corrected attempt reused the\n# audit\
      \ log's `_locked_append` (msvcrt.locking LK_LOCK / fcntl.flock)\n# — but that\
      \ is a BLOCKING CROSS-PROCESS lock; contended across the\n# *same* process's\
      \ threads on Windows it stalled the runner thread\n# (windows-py3.12 regression:\
      \ \"runner did not finish\"). The actual\n# concurrency here is intra-process,\
      \ so a plain in-process lock is\n# the correct, hazard-free primitive. (Cross-process\
      \ serialization\n# of a shared dispatch-log under parallel dispatchers is a\
      \ separate,\n# unobserved concern — deliberately NOT solved with a blocking\
      \ OS\n# lock here; see CHANGELOG v1.15.7.)\n_DISPATCH_LOG_LOCK = threading.Lock()\n\
      \nimport yaml\n\n\n# iter-0010: patch_proposal validation constants moved from\
      \ _dispatch_codex.py\n# so _validate_patch_proposal (also moved here) is fully\
      \ self-contained at the\n# base layer. Per iter-0009 verdict + iter-0010 codex-rev-001\
      \ blocking finding.\n_PATCH_PROPOSAL_REQUIRED = (\n    \"patch_id\", \"applies_to_findings\"\
      , \"base_sha\",\n    \"unified_diff\", \"files_touched\", \"expected_tests\"\
      ,\n)\n_PATCH_PROPOSAL_OPTIONAL = ()\n_PATCH_PROPOSAL_ALLOWED = set(_PATCH_PROPOSAL_REQUIRED)\
      \ | set(_PATCH_PROPOSAL_OPTIONAL)\n_PATCH_ID_PATTERN = re.compile(r\"^codex-rev-\\\
      d+-patch$\")\n\n# iter-0028 F4 (codex-rev-002): unified-diff body header parser\
      \ regex.\n_DIFF_FILE_HEADER_RE = re.compile(\n    r\"^(?:---\\s+a/|\\+\\+\\\
      +\\s+b/)(?P<path>\\S+)\\s*$\",\n    re.MULTILINE,\n)\n# iter-0028 F1+F2 (codex-rev-003):\
      \ tokens that signal codex-cli's proprietary\n# `apply_patch` format. Naming\
      \ retains the codex-cli reference because that's\n# the originating format;\
      \ the validator applies the rejection regardless of\n# which adapter calls it\
      \ (gemini, future adapters).\n_APPLY_PATCH_BEGIN_MARKER = \"*** Begin Patch\"\
      \n_APPLY_PATCH_UPDATE_MARKER = \"*** Update File\"\n\n\n# Per v1.10.4 F1 (codex\
      \ review on 0ae7b80d): repo_root resolution must fail-closed.\n# Repo markers:\
      \ directories that MUST exist at the resolved root for it to be a valid\n# consensus-mcp\
      \ / consensus-mcp repo. site-packages doesn't have these; cwd in a\n# random\
      \ directory doesn't either; the actual repo does.\n_REPO_ROOT_MARKERS = (\"\
      consensus-state\", \"consensus_mcp\", \"consensus_mcp/validators\")\n\n\nclass\
      \ RepoRootResolutionError(RuntimeError):\n    \"\"\"Raised when repo_root cannot\
      \ be resolved to a valid repo (no markers found).\"\"\"\n\n\ndef _has_repo_markers(candidate:\
      \ Path) -> bool:\n    \"\"\"Return True iff candidate contains all _REPO_ROOT_MARKERS\
      \ as subpaths.\"\"\"\n    return all((candidate / marker).is_dir() for marker\
      \ in _REPO_ROOT_MARKERS)\n\n\ndef _resolve_repo_root() -> Path:\n    \"\"\"\
      Resolve the repo root, fail-closed if no valid candidate is found.\n\n    Per\
      \ v1.10.4 F1 hardening: the prior fallback to\n    Path(__file__).resolve().parent.parent\
      \ was unsafe — when the helper\n    runs as an installed module from python_env/Lib/site-packages,\
      \ that fallback\n    landed at python_env/Lib (NOT the repo root), causing codex\
