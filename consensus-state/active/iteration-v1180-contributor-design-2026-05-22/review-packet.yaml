      \ via os.killpg, then\n    SIGKILL after grace.\n\n    Always returns; never\
      \ raises.\n    \"\"\"\n    if proc.poll() is not None:\n        return\n\n \
      \   try:\n        if sys.platform == \"win32\":\n            # CTRL_BREAK_EVENT\
