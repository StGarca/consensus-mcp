      \  - {x}\" for x in xs)\n\n    def _format_gates(gates):\n        if not gates:\n\
      \            return \"(none)\"\n        lines = []\n        for g in gates:\n\
      \            gid = g.get(\"id\", \"?\")\n            desc = g.get(\"description\"\
      , \"\")\n            check = g.get(\"check\", \"\")\n            lines.append(f\"\
      \  - {gid}: {desc}\\n      check: {check}\")\n        return \"\\n\".join(lines)\n\
      \n    def _or_unspecified(v):\n        return v if v is not None and v != \"\
      \" else \"(not specified)\"\n\n    # iter-0021: extract touched-file contents\
