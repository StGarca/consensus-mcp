      \")),\n        \"{iteration_dir}\": _or_unspecified(iteration_dir),\n      \
      \  \"{review_packet_path}\": _or_unspecified(review_packet_path),\n        \"\
      {review_target_path}\": _or_unspecified(review_target_path),\n        \"{review_target_hash}\"\
      : _or_unspecified(review_target_hash),\n        \"{touched_files_contents_block}\"\
      : _format_touched_files_contents(touched_contents),\n    }\n    out = template_text\n\
      \    for placeholder, value in substitutions.items():\n        out = out.replace(placeholder,\
      \ value)\n    return out\n\n\ndef _terminate_process_tree(proc, grace_seconds:\
      \ float = 10.0) -> None:\n    \"\"\"iter-0039 xplat-rev-002 fix: cross-platform\
      \ process tree termination.\n\n    Per the cross-platform audit, plain proc.terminate()\
      \ only kills the\n    immediate codex process. codex-cli is a Node binary that\
      \ spawns child\n    processes; those orphan on abort. The Popen call now creates\
      \ a new\n    process group (CREATE_NEW_PROCESS_GROUP on Windows, start_new_session\n\
      \    on POSIX); this helper sends the appropriate group-wide signal,\n    waits\
