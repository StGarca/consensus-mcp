      \ payload\n    # under a top-level `proposal` key so the workflow engine and\n\
      \    # converged-plan authoring can read it directly.\n    is_proposal = (\n\
      \        \"selected_target\" in extracted\n        or extracted.get(\"structural_abstention\"\
