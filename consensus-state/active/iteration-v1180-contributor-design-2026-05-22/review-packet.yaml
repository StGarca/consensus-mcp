      \    try:\n        if sys.platform == \"win32\":\n            # taskkill /F\
      \ /T kills the tree. CREATE_NO_WINDOW prevents a\n            # console window\
      \ flash (iter-0039 codex-rev-002).\n            subprocess.run(\n          \
      \      [\"taskkill\", \"/F\", \"/T\", \"/PID\", str(proc.pid)],\n          \
      \      capture_output=True,\n                timeout=5,\n                check=False,\n\
      \                creationflags=getattr(subprocess, \"CREATE_NO_WINDOW\", 0),\n\
      \            )\n        else:\n            os.killpg(os.getpgid(proc.pid), signal.SIGKILL)\n\
      \    except (OSError, ProcessLookupError, ValueError, subprocess.SubprocessError):\n\
      \        # Fallback to direct kill if killpg / taskkill failed.\n        try:\n\
      \            proc.kill()\n        except OSError:\n            pass\n    try:\n\
      \        proc.wait(timeout=2)\n    except subprocess.TimeoutExpired:\n     \
      \   # The process is wedged; we've done what we can. Caller will\n        #\
      \ surface the failure via the existing return-code check.\n        pass\n\n\n\
      def _compute_per_patch_base_sha(\n    defect_target: dict,\n    patch_files_touched:\
      \ list,\n    repo_root: Path | None = None,\n) -> str | None:\n    \"\"\"iter-0024\
      \ F2 + iter-0026 F1: compute per-patch bundle_sha matching the\n    on-disk\
      \ bytes hash that apply.codex_patch produces at drift-check time.\n\n    iter-0026\
      \ F1 fix:\n      The prior helper computed bundle_sha by encoding text strings\
      \ from\n      ``defect_target.touched_files_contents`` (UTF-8). On Windows with\
      \ CRLF\n      line endings on disk, ``apply.codex_patch`` (which hashes raw\
      \ disk bytes\n      via ``_closure_invariant.bundle_sha``) saw a DIFFERENT hash,\
      \ forcing\n      manual per-patch re-anchor for every codex-applied patch. The\
      \ fix:\n      when ``repo_root`` is supplied, defer entirely to\n      ``_closure_invariant.bundle_sha(repo_root,\
      \ patch_files_touched)`` so the\n      stamp matches apply-time disk bytes exactly.\n\
      \n      When ``repo_root`` is None (legacy unit-test path), fall back to the\n\
      \      iter-0024 text-encoding behaviour. This preserves backward compatibility\n\
      \      for tests that don't materialise files on disk.\n\n    Returns None when:\n\
      \      - patch_files_touched is empty, OR\n      - (text fallback only) defect_target\
      \ has no touched_files_contents dict,\n        OR any patch file is missing\
      \ / non-string content.\n\n    On None return, caller falls back to defect_target.base_sha\
      \ (iter-0022\n    behaviour) so legacy tests / callers without touched_files_contents\
      \ still\n    work.\n    \"\"\"\n    if not patch_files_touched:\n        return\
      \ None\n\n    # iter-0026 F1: disk-bytes path matches apply.codex_patch exactly.\n\
      \    if repo_root is not None:\n        # Validate path types early so we never\
      \ feed bundle_sha a non-string\n        # entry (it would TypeError on PurePath\
      \ construction).\n        for raw_path in patch_files_touched:\n           \
      \ if not isinstance(raw_path, str):\n                return None\n        #\
      \ Defer import: keeps _closure_invariant a soft dependency at module\n     \
      \   # load time (mirrors apply_codex_patch's import discipline).\n        from\
      \ consensus_mcp._closure_invariant import bundle_sha as _bundle_sha\n      \
      \  try:\n            return _bundle_sha(repo_root, list(patch_files_touched))\n\
      \        except ValueError:\n            # Path contained forbidden \\0 / \\\
      n separator chars; fall through\n            # to None so caller falls back\
      \ to defect_target.base_sha.\n            return None\n\n    # Legacy text-encoding\
      \ fallback (no repo_root supplied — typically a\n    # unit-level test that\
      \ doesn't materialise files on disk).\n    contents = defect_target.get(\"touched_files_contents\"\
      )\n    if not isinstance(contents, dict):\n        return None\n\n    # Defer\
      \ import to avoid circular dependency at module load time.\n    from consensus_mcp._closure_invariant\
      \ import _normalize_path\n\n    normalised_pairs: list[tuple[str, str]] = []\n\
      \    for raw_path in patch_files_touched:\n        if not isinstance(raw_path,\
      \ str):\n            return None\n        # Look up content via the ORIGINAL\
      \ path key (review-packet\n        # touched_files_contents keys are the operator-supplied\
      \ paths). Then\n        # normalise for the canonical bundle form.\n       \
      \ if raw_path not in contents:\n            return None\n        body = contents[raw_path]\n\
      \        if not isinstance(body, str):\n            return None\n        try:\n\
      \            norm = _normalize_path(raw_path)\n        except ValueError:\n\
      \            return None\n        content_hash = hashlib.sha256(body.encode(\"\
      utf-8\")).hexdigest()\n        normalised_pairs.append((norm, content_hash))\n\
      \n    parts = [f\"{p}\\0{h}\" for p, h in sorted(normalised_pairs)]\n    canonical\
      \ = \"\\n\".join(parts)\n    return hashlib.sha256(canonical.encode(\"utf-8\"\
      )).hexdigest()\n\n\ndef _sha256_str(text: str) -> str:\n    \"\"\"Return hex-digest\
      \ sha256 of UTF-8 input. Used for provenance hashing.\"\"\"\n    return hashlib.sha256(text.encode(\"\
      utf-8\")).hexdigest()\n\n\ndef _build_sealed_packet(\n    extracted: dict,\n\
      \    iteration_id: str,\n    reviewer_id: str,\n    pass_id: str,\n    provenance:\
      \ dict | None = None,\n    attestation_method: str = \"auto_codex_dispatch\"\
      ,\n    attestation_input_sources: list[str] | None = None,\n) -> dict:\n   \
      \ \"\"\"Wrap a reviewer's findings dict in the T6-required outer structure.\n\
      \n    T6 (review.write_and_seal) requires top-level: iteration_id, reviewer_id,\
      \ findings.\n    Optional but conventional: pass_id, goal_satisfied, blocking_objections,\n\
      \    goal_satisfied_rationale.\n\n    Per F5 (codex review 2026-05-09): an optional\
      \ `provenance` dict is embedded\n    as the `dispatch_provenance` key. T6 SHA-hashes\
      \ the whole packet, so\n    provenance becomes part of the seal — the sealed\
