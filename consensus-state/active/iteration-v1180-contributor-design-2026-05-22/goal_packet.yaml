    description: converged plan picks one integration option (A/B/C) with rationale + schema/provenance/UX decisions
    check: 'manual — orchestrator authors converged-plan.yaml from the 3 proposals'
stop_conditions:
  - max_iteration_count_reached
operator_escalation_triggers:
  - no_convergence
