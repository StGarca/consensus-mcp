    key_design_decisions:
    - "1. Profile schema completeness: The \xA74 schema captures gemini GEMINI_CLI_TRUST_WORKSPACE\
      \ via the 'env' dict and captures kimi stdin-not-`-p` via 'invoke.transport:\
      \ stdin' + 'prompt_flag: null'. It does NOT fully capture codex token-auth as\
      \ an env-var fallback (codex can use OPENAI_API_KEY non-interactively; schema\
      \ lacks an 'auth.env_vars' list). More critically, the schema is missing two\
      \ fields required for correct operation: (a) 'model' (string, optional) \u2014\
      \ needed for accurate dispatch_provenance.model sealing and for CLIs that accept\
      \ a model flag; (b) 'sealed_filename' (string, default '<name>-review.yaml')\
      \ \u2014 needed for the T6 local mirror in _seal_via_t6. Also missing: 'invoke.model_flag'\
      \ (optional string, e.g. '--model') so base_args doesn't have to carry paired\
      \ values as a flattened list, but this is lower priority since base_args can\
      \ absorb it."
    - '2. Provenance correctness: ProfileAdapter.dispatch() shall construct its own
      provenance dict explicitly, passing it to _build_sealed_packet. The provenance
      block MUST contain: ''model'' from profile[''model''], ''adapter'': ''profile'',
      ''contributor'': profile[''name''], ''bin'': profile[''detect''][''command''],
      plus SHA256 hashes of prompt, output, schema, and goal_packet computed via _sha256_str
      from _dispatch_base. The attestation_method passed to _build_sealed_packet shall
      be f''auto_{profile_name}_dispatch'' and attestation_input_sources shall name
      the profile-driven sources. This isolates provenance from any other adapter
      and eliminates the monkeypatch bug where kimi inherited gemini-2.5-pro.'
    - "3. Profile location and registry merge: Built-in profiles ship as YAML files\
      \ in consensus_mcp/contributor_profiles/ (kimi.yaml, codex.yaml, gemini.yaml).\
      \ _engine_factory.build_adapters loads all built-in YAMLs into a dict, then\
      \ overlays config.get('contributors', {}).get('profiles', {}). Resolution order\
      \ per enabled key: (a) _REGISTERED_ADAPTERS, (b) _BUILTIN_ADAPTERS (claude,\
      \ codex, gemini), (c) merged built-in + config profiles for kind: cli_reviewer\
      \ \u2192 instantiate ProfileAdapter(profile_dict). This preserves R8: existing\
      \ installs with contributors.enabled: [claude, codex, gemini] get the exact\
      \ same adapter classes as before."
    - "4. consensus init selection UX: _init_wizard.py builds the available-profile\
      \ list (built-ins + config profiles). For each, shutil.which(profile.detect.command)\
      \ determines installed status, shown as '[x] kimi \u2713 installed' or '[ ]\
      \ kimi \u2717 missing'. Interactive multi-select uses plain CLI numbered toggles\
      \ (no TUI library). Default selection pre-checks all installed profiles. The\
      \ wizard re-prompts until \u22652 contributors are selected. Claude is listed\
      \ as an ordinary option (kind: host, always 'installed'). Non-interactive path:\
      \ --contributors kim,codex skips the prompt entirely (flags-over-prompts), still\
      \ runs detect+guide output after writing config."
    - '5. detect+guide: After writing contributors.enabled, the wizard iterates the
      selected profiles. For each where shutil.which returns None, it prints: (a)
      install[sys.platform] if present, else ''No install instructions for this OS'';
      (b) auth.command and auth.note; (c) a static reminder that these commands are
      not executed automatically. Nothing is shelled out. OS awareness comes solely
      from indexing the ''install'' block by sys.platform.'
    acceptance_gates:
    - ProfileAdapter instantiates from a profile dict, invokes a fake CLI (stdin and
      flag transports), strips output per strip_patterns, parses JSON, and seals a
      YAML with dispatch_provenance.model equal to the profile's model field.
    - 'build_adapters with contributors.enabled: [kimi, codex] returns a ProfileAdapter
      for kimi and a CodexAdapter for codex; existing configs with [claude, codex,
      gemini] return the same types as v1.17.5 (R8 regression gate).'
    - 'consensus init interactive: selecting 1 contributor triggers re-prompt; selecting
      2+ writes config; --contributors a,b skips interactive and still prints guide.'
    - config.validate rejects a profile missing required fields (name, kind, detect.command,
      invoke.transport) and rejects unknown transport values.
    - pyproject.toml requires-python is '>=3.11' and .mcp.json uses the consensus-mcp
      entry point without py -3.11.
    - 'Monkeypatch test: sys.platform set to ''win32'' + shutil.which returning None
      causes wizard to print the windows install string; on ''linux'' it prints the
      linux string.'
  risks:
  - 'Profile schema may be insufficient for a future AI with an unusual transport
    (e.g., REST API instead of CLI subprocess). Mitigation: schema is intentionally
    versioned and additive; v1.18.0 only needs to cover the 4 known CLIs.'
  - 'shutil.which can find the wrong binary on a polluted PATH. Mitigation: documented
    limitation; operator can override via full path in profile config or via KIMI_BIN-style
    env var convention.'
  - 'If codex/gemini eventually migrate to profiles in a future (A)-style refactor,
    the profile schema must be rich enough to express their advanced features (streaming,
    stall-detection). Mitigation: codex/gemini profile YAMLs designed now as forward-compatible
    documentation, even though they are not consumed by ProfileAdapter in v1.18.0.'
