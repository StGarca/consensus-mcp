goal_satisfied_rationale: "Differential / prior: I reason from the project's demonstrated\
  \ safety culture (fail-closed, minimal diff, 'NO behavior change' invariants \u2014\
  \ e.g., _dispatch_base extraction iter-0009) and the empirical precedent of the\
  \ kimi wrapper, which successfully adds a 4th contributor by swapping ONLY the CLI\
  \ invoker while reusing prompt-build, JSON parse, and T6 seal. This proves the abstraction\
  \ boundary is sound but that the current module structure does not natively support\
  \ parameterization.\n\nWhy (B) over (A): (A) requires refactoring the battle-tested\
  \ codex and gemini dispatchers \u2014 both contain safety-critical, platform-specific\
  \ logic (streaming stall-detection, process-tree termination, Windows extended-path\
  \ containment, iter-0028 patch validation) that has been hardened across many iterations.\
  \ Refactoring them into parameterized invokers in the same release that introduces\
  \ a new feature violates the conservative extraction pattern the project follows.\
  \ The risk of a regression in the two most-used adapters outweighs the aesthetic\
  \ benefit of eliminating duplication. Duplication is already heavily reduced by\
  \ _dispatch_base; what remains in codex/gemini modules is genuinely CLI-specific\
  \ invocation logic.\n\nWhy (B) over (C): (C) adds indirection without reducing code\
  \ or risk. It makes profiles the config surface for ALL AIs, but codex/gemini would\
  \ still need their existing modules \u2014 the profile just carries a 'module' pointer.\
  \ This leaks implementation detail into config and complicates the factory (profile\
  \ \u2192 module lookup \u2192 delegate vs generic invoker). It delivers no concrete\
  \ advantage over (B) while increasing cognitive load.\n\nValue delta of (B): Ships\
  \ extensibility + kimi-as-profile in v1.18.0 with ZERO change to existing adapter\
  \ paths, satisfying R8 automatically. Preserves all existing regression tests for\
  \ codex/gemini unchanged. Formalizes the proven monkeypatch pattern into a first-class,\
  \ testable adapter."
