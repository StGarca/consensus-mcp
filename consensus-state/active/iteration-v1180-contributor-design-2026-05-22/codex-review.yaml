    - pyproject.toml
    - README.md
    files_out_of_scope:
    - Rewriting codex/gemini dispatchers into a fully parameterized shared core
    - Changing the parent project's kimi monkeypatch wrapper
    - Auto-installing CLIs or running auth commands
    - Publishing/distribution changes beyond already verified project-local packaging
      metadata
    key_design_decisions:
    - 'Use candidate B: existing ClaudeAdapter, CodexAdapter, and GeminiAdapter remain
      the default constructors; add ProfileAdapter only for profile-backed cli_reviewer
      contributors such as kimi and user-defined AIs.'
    - "Profile schema completeness: \xA74 captures kimi stdin-not--p via invoke.transport=stdin\
      \ and prompt_flag=null, captures gemini GEMINI_CLI_TRUST_WORKSPACE via env,\
      \ and captures generic flag transport. It is missing explicit auth/provenance\
      \ fields for codex token auth and model identity. Add auth.kind/auth.env_vars/auth.command/auth.note\
      \ and provenance.model/provenance.model_source/provenance.adapter fields. Do\
      \ not log token values."
    - 'Provenance correctness: ProfileAdapter builds dispatch_provenance from the
      resolved profile, not copied module defaults: contributor name, adapter=''profile'',
      profile name/version/source, invoke transport, binary/version probe when available,
      effective model label from profile.provenance.model or a configured env/config
      source, prompt/output/schema/goal hashes, and sealed filename. Kimi must seal
      model as the managed kimi profile label, not gemini-2.5-pro.'
    - Profiles live in packaged built-ins under consensus_mcp/contributor_profiles
      and user overrides/additions live under config contributors.profiles. _engine_factory.build_adapters
      merges built-ins first, then config profiles by name; config profiles may add
      names and may override built-in profile fields only by explicit same-name override.
      Existing contributors.enabled keys claude/codex/gemini resolve to existing adapters
      unless a profile-only custom key is enabled.
    - 'Instantiation rule: build_adapters reads contributors.enabled plus contributors.adapters.
      If key resolves to built-in adapter class, instantiate existing class with adapter_config.
      Else if key resolves to merged profile kind=cli_reviewer, instantiate ProfileAdapter(profile,
      adapter_config). kind=host is reserved for claude/in-process hosts and must
      not silently become a subprocess adapter.'
    - 'consensus init UX: interactive multi-select over merged profiles plus built-in
      host entries, showing installed/missing status from detect.command when applicable.
      Enforce at least two selected contributors. Claude is optional and selected
      only if the user chooses it or defaults include it. Non-interactive --contributors
      a,b,c skips prompting, validates known names and min-2, writes contributors.enabled,
      and still emits detect+guide.'
    - "Detect+guide: use shutil.which for detect.command, select install guidance\
      \ by sys.platform/os.name, print install/auth/note for missing or unauthenticated\
      \ contributors, and never execute install or login commands. Because \xA74 install\
      \ commands are illustrative, built-in profile install guidance must be populated\
      \ only after verification with inline source comments or explicit unavailable\
      \ guidance."
    - 'Completion scope: include the small cross-platform metadata updates requested
      by R7 in the same iteration: committed .mcp.json should use the consensus-mcp
      entry point rather than Windows-only py -3.11, pyproject requires-python becomes
      >=3.11, and README Python support text is reconciled. These have clear gates
      and no named blocker.'
    acceptance_gates:
    - A config with contributors.enabled=[codex,gemini] builds the same adapter classes
      as before and does not require contributors.profiles.
    - A config with contributors.enabled=[kimi,custom] and valid cli_reviewer profiles
      builds ProfileAdapter instances without registering new Python adapter classes.
    - Profile validation rejects missing name/kind/detect/invoke/output/provenance
      requirements, invalid transport values, missing prompt_flag for flag transport,
      non-null prompt_flag for stdin transport unless explicitly allowed, and malformed
      OS install maps.
    - Fake CLI tests prove ProfileAdapter sends prompt via stdin for kimi-style profiles
      with no -p flag, sends prompt via configured flag for flag profiles, injects
      env, sets cwd/workdir flag, strips configured output chrome, parses JSON, and
      seals through T6 with accurate contributor/model/adapter provenance.
    - Wizard tests cover interactive min-2 re-prompt, claude-optional selection, non-interactive
      --contributors precedence, unknown-name failure, and detect+guide output on
      Windows/Linux without executing commands.
    - Provenance regression test verifies a kimi profile seal cannot contain dispatch_provenance.model='gemini-2.5-pro'
      unless the profile explicitly says so.
    - Detect+guide tests assert missing CLIs print OS-specific verified or unavailable
      guidance plus auth note, while present CLIs do not print install instructions.
    - R7 tests or snapshot checks confirm .mcp.json is cross-platform, pyproject requires
      Python >=3.11, and README support text matches.
    - No external publish/install/distribution claim is made without a checked-in
      verification citation or test fixture documenting the source.
  risks:
  - B leaves duplication between ProfileAdapter and codex/gemini dispatchers; this
    is acceptable for v1.18.0 but should be tracked only after real duplication pain
    appears.
  - The profile schema can overfit current CLIs; keep it conservative but include
    provenance/auth fields now so secrets and model labels are not improvised later.
  - Install/auth command verification is an external dependency; if exact vendor guidance
    cannot be verified before release, built-in profiles should ship detect plus auth
    notes with install guidance marked unavailable rather than invented.
  - Generic subprocess behavior may not cover streaming/stall semantics of future
    CLIs; ProfileAdapter should start with simple timeout-based invocation and make
    advanced streaming a later, evidence-driven extension.
  - User overrides of built-in profiles can create confusing support cases; the merge
    policy should make override source visible in diagnostics and provenance.
  estimated_complexity: medium
  structural_abstention: false
