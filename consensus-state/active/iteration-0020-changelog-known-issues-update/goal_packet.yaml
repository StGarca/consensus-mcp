schema_version: 1
pilot_id: iteration-0020-changelog-known-issues-update
goal:
  summary: |
    iter-0020 — amend the v1.14.0 CHANGELOG known-issues section so it
    accurately reflects current state after iter-0019. The previous text
    asserted "5 pre-existing test_dispatch_codex.py tests fail" — that is
    no longer true. Replaces with a "Test isolation (iter-0019)" section
    documenting the fix and a "Deferred to a follow-up iteration" section
    listing the still-outstanding work (lazy REPO_ROOT + stale fixture
    cleanup).
  desired_end_state: |
    CHANGELOG.md under the v1.14.0 heading no longer contains the false
    "5 pre-existing... tests fail" assertion. Instead the document
    references iter-0019 as the fix, captures the suite count (658+1),
    and explicitly lists the deferred lazy-resolution architectural work
    and the stale fixture cleanup as separate follow-ups. No other
    sections of CHANGELOG.md mutated. No source/test files touched.
  non_goals:
    - landing the lazy REPO_ROOT architectural fix
    - scrubbing stale iter-9999 entries from the real index
    - any source code changes
allowed_files:
  - CHANGELOG.md
allowed_sections: []
forbidden_files:
  - consensus_mcp/
  - consensus-state/
  - pyproject.toml
  - README.md
  - LICENSE
  - .github/
  - .gitignore
  - docs/
  - tests/
max_iterations: 1
max_patch_size: 100
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: false "tests fail" assertion removed
    check: 'py -3.11 -c "t=open(''CHANGELOG.md'',encoding=''utf-8'').read(); assert ''5 pre-existing test_dispatch_codex.py tests fail'' not in t; print(''ok'')"'
  - id: A2
    description: iter-0019 fix documented + deferred work listed
    check: 'py -3.11 -c "t=open(''CHANGELOG.md'',encoding=''utf-8'').read().split(''## 1.13.0'')[0]; assert ''iter-0019'' in t; assert ''Deferred to a follow-up'' in t; assert ''658'' in t; print(''ok'')"'
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
operator_escalation_triggers:
  - touched_forbidden_files
authorization:
  authorized_by: operator-autonomous-overnight
  authorized_at_utc: '2026-05-13T07:05:00Z'
  codex_patch_apply_authorized: false
