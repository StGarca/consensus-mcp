findings: []
goal_satisfied: true
goal_satisfied_rationale: 'The best move is not a one-off PyPI ban or a broad reminder
  to verify more carefully. The recurring failure was: channel inferred without evidence,
  then a partial fix described with global shipped/fixed language. A release trust
  gate addresses both at the decision point where harm occurs: before advising operator
  commands and before declaring release state. A PyPI-specific rule would block only
  this exact mistake; a generic postmortem note would be too easy to ignore. The higher-value
  target is a compact invariant: every publish/install/distribution step and every
  fixed/shipped claim must cite checked evidence for channel, version, artifact contents,
  and residual affected surface.'
