proposal:
  selected_target: 'Release Trust Gate: make release/distribution claims evidence-bound
    and artifact-scoped'
  rationale_vs_alternatives: 'The best move is not a one-off PyPI ban or a broad reminder
    to verify more carefully. The recurring failure was: channel inferred without
    evidence, then a partial fix described with global shipped/fixed language. A release
    trust gate addresses both at the decision point where harm occurs: before advising
    operator commands and before declaring release state. A PyPI-specific rule would
    block only this exact mistake; a generic postmortem note would be too easy to
    ignore. The higher-value target is a compact invariant: every publish/install/distribution
    step and every fixed/shipped claim must cite checked evidence for channel, version,
    artifact contents, and residual affected surface.'
  deliverable_scope:
    next_iteration_id: iteration-0029-release-trust-gate
    files_in_scope:
    - AGENTS.md
    - CLAUDE.md
    - README.md
    - CHANGELOG.md
    - docs/release.md
    - docs/release-checklist.md
    - consensus-state/active/iteration-audit-2026-05-14-pypi-invention/POSTMORTEM.md
    files_out_of_scope:
    - Packaging backend changes unless current metadata proves wrong
    - New PyPI/npm/Docker publication automation
    - Historical tag rewriting
    - Runtime protocol changes unrelated to release/distribution claims
    key_design_decisions:
    - Frame the incident as an evidence-boundary failure, not a PyPI-only failure.
    - Separate distribution-channel verification from artifact-content verification.
    - 'Forbid inferred publish commands unless the checklist records direct evidence:
      install URL, registry result, workflow config, prior release precedent, and
      local credential/config presence where relevant.'
    - Replace global status words like 'fully shipped' and 'fixed' with artifact-scoped
      claims naming version, commit/tag, install path, bundled content, and known
      residual defects.
    - Require contradiction checks when a fix exists on a newer branch or commit than
      the artifact being described.
    - 'Keep the gate small: one command-oriented checklist, not a large process framework.'
    acceptance_gates:
    - Applying the checklist to v1.14.0/v1.14.1 would have blocked both `twine upload`
      advice and the misleading 'fully shipped' claim.
    - Checklist includes explicit rows for registry existence, README install form,
      workflow presence, prior release precedent, local config/credential presence,
      tag commit, bundled artifact contents, and known residual defects.
    - Docs distinguish 'distribution mechanism exists' from 'artifact content is correct'.
    - No document introduces PyPI publishing as a default or requirement.
    - A dry-run v1.14.0 status statement must say the git-tag channel existed while
      shipped skill content was defective and corrected only by v1.14.1.
  risks:
  - Overcorrecting into bureaucracy could slow releases and cause the checklist to
    be skipped.
  - If only human docs change and agent-facing instructions do not, recurrence risk
    remains high.
  - If artifact-content verification is underspecified, contributors may verify the
    channel only and still make partial-fix claims.
  - Some proposed doc paths may not exist; next iteration must verify current tree
    before final file selection.
  estimated_complexity: medium
  structural_abstention: false
