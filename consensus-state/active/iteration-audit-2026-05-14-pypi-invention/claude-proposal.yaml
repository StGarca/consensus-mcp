risks:
  - 'Skill bloat: adding two more sections increases the skill size. Mitigation: keep each section <= 15 lines, lead with the rule + one-line why + one-line example.'
  - 'Verification-citation overhead per turn: every external-system step now requires a citation line. May feel noisy for routine git operations. Mitigation: scope the rule to "external system OR distribution channel OR irreversible action" — git push to a known origin is implicitly verified by `git remote -v`; needs no extra citation.'
  - 'The "common defaults to distrust" list will go stale as I learn more exceptions. Mitigation: treat the list as additive (append-only); never delete entries; review quarterly.'
  - 'The deeper failure (rationalizing away disconfirming evidence) may not be fully addressable by procedure. Mitigation: the disconfirming-evidence memory names the pattern explicitly so future-me can recognize and abort it; this is the best procedural lever available without changing the system prompt.'
  - 'Operator may find the additional rules excessive given the small blast radius (one unnecessary release). Mitigation: the user explicitly asked for consensus on this mistake — the directive is to codify, not to debate. If too noisy in practice, prune in a follow-up iteration.'
estimated_complexity: small
