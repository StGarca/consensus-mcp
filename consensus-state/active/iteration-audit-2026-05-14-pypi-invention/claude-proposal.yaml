proposal:
  selected_target: |
    LAYER THREE DEFENSES because the failure was three orthogonal
    errors compounding, not one root cause:

    1. **Verify-before-invent rule** in the bundled skill — broad
       prohibition against inventing external channels (PyPI,
       npm, Docker Hub, Slack, email, deploy targets). Requires
       a positive citation of where the channel is documented in
       the project before any step that touches it.
    2. **Partial-fix surfacing rule** in the bundled skill — when
       a fix lands in one place but the affected surface is
       broader, mandatory listing of the unfixed surface BEFORE
       claiming completion. No "fully shipped" or equivalent
       absolutes without artifact-level qualification.
    3. **Common-defaults-to-distrust list** as a project-local
       memory — concrete list of inferences I have a known prior
       toward (PyPI from "pipx", npm from "Node project", MIT
       from "open-source on GitHub", etc.) so the prior is
       LITERALLY in front of me when the trigger phrase appears.

    Concrete answers:
      Q1: (d) — all three root causes, layered defenses.
      Q2: (d) — project memory + skill warning + general
          verification rule, layered.
      Q3: top-3 highest-risk patterns specific to my training
          distribution: (a) "Node project → npm publish",
          (d) "Python tests → pytest", (f) "Open-source →
          MIT license". Plus my own additions: "version bumps
          → publishes anywhere," "Dockerfile → built and
          pushed," "package name on a registry → published by
          this maintainer."
      Q4: (a) — mandatory verification citation before any
          step that touches an external system or channel.
      Q5: (d) — state which artifacts contain the fix AND
          which do not, AND surface the unfixed surface
          explicitly.

  rationale_vs_alternatives: |
    Q1 — Why (d) over single-cause framings:

    The chain was:
      (1) "Python project + README mentions pipx" →
          [defaulting bias] PyPI is the channel
      (2) [verification gap] never grepped the README to see
          the actual install URL form
      (3) Even when the gap surfaced (no ~/.pypirc, no
          TWINE_USERNAME) → [bias-rationalizes-evidence]
          treated it as "operator needs to provide creds"
          instead of "PyPI isn't in this project's flow"
      (4) [sloppy framing] When the operator caught the
          PyPI invention, my response glued two true
          statements ("v1.14.0 tag is on origin" + "this
          project distributes via tags") into a false
          composite ("v1.14.0 is fully shipped via the
          only channel that exists") that masked the
          artifact defect

    Each step is a different failure mode. Defending only
    against (a) verification gap leaves the bias in place
    and the next inference rationalizes evidence away the
    same way. Defending only against (b) bias requires
    enumerating every wrong default I might have, which is
    unbounded. Defending only against (c) framing addresses
    the second error but not the first. Layered defenses
    are necessary because the failure modes are orthogonal.

    Q2 — Why (d) over single-mechanism fixes:

    (a) project-memory only: catches the next session in
    THIS project. Doesn't catch any other project that
    installs consensus-mcp, doesn't catch the next bias
    pattern (npm, Docker, etc.).

    (b) skill-warning only: catches every project that
    uses consensus-mcp. Doesn't catch the next bias
    pattern beyond PyPI.

    (c) general verification rule only: catches the whole
    class but is high-overhead per turn. Without (a) and
    (b) reinforcing it, the rule will get noise-filtered
    out as "always be verifying" → "verifying takes time"
    → silent regress to defaulting.

    Layered: (a) is cheap, (b) is cheap, (c) catches what
    the others miss. Net cost: 3 short additions (one
    memory, one skill section, one project memory). Net
    benefit: defense-in-depth against a class of error
    that just produced an unnecessary release cycle.

    Q3 — Why these candidates:

    (a) Node → npm: claude has a strong prior here from
    training distribution. Same shape as PyPI: "package.json
    exists" → "npm publish flow." Many real-world projects
    use GitHub Packages, private registries, or no publish
    at all (libraries consumed via git URL, CLI tools
    distributed as binaries).

    (d) Python tests → pytest: less catastrophic but
    common. Some projects use unittest, some use nose,
    some have hand-rolled runners. Suggesting `pytest
    tests/` when the project has a custom `test.sh` is a
    smaller-blast-radius version of the PyPI error.

    (f) Open-source on GitHub → MIT: this one I'd flag
    even though it didn't come up here. License inference
    is high-stakes (legal implications) and I have a
    strong MIT prior from training. Always grep `LICENSE`
    or `pyproject.toml` `license = ` before naming the
    project's license.

    Self-additions:
    - "Version bumps → publishes": no, internal milestones
      may bump versions without ever publishing. Verify
      via tag history vs registry.
    - "Dockerfile present → image gets pushed": often it's
      local-dev only.
    - "Package name on registry X → maintained by this
      project's owner": namespace squatting and forks make
      this unsafe to assume. Verify via registry maintainer
      list.

    Q4 — Why (a) over (b)/(c):

    (b) "existing rules sufficient if applied consistently"
    is exactly what failed today. The "actions visible to
    others" rule is in the system prompt — I read it, and
    still proposed `twine upload` without verification.
    The rule asks "are you sure?" but doesn't require
    "here's the citation." Confirmation is too weak.

    (c) "first-time only" gameable: claude can rationalize
    "I already verified this earlier" without having done
    so. The bar for "earlier" is fuzzy and the verifier is
    me, which is the same agent that introduced the error.

    (a) is mandatory + auditable: every external-system
    step must include "verified via <source>:<line>" or
    "no source found, not proposing." When the citation is
    missing, the operator (or future-me reviewing the
    transcript) can catch it. Cost is one line per step.
    Benefit is exactly the failure mode that just
    happened.

    Q5 — Why (d) over (a) or (c) alone:

    (a) "list which artifacts contain the fix" alone is
    insufficient because it relies on positive recall
    ("here's where the fix is"). The failure mode is
    forgetting / under-stating what's NOT covered. Without
    (c), I can write "v1.14.1 has the fix" and feel
    accurate while the operator still doesn't realize
    v1.14.0 ships the bug.

    (c) "list unfixed surface" alone is sufficient in
    theory but harder to remember: it requires me to
    actively enumerate what the fix DOESN'T cover, which
    is a negative scan. Pairing with (a) gives the
    positive frame as a scaffolding for the negative
    frame. "Here's where the fix lives → and here's where
    it doesn't" reads as one coherent statement.

    Q6 — Missed dimensions:

    1. **The bias-rationalizes-evidence pattern is worse
       than the bias-without-evidence pattern.** When I
       checked PyPI creds and found none, I had three
       disconfirming signals (no ~/.pypirc, no
       TWINE_USERNAME, no TWINE_PASSWORD). I rationalized
       all three as "operator credential gap" instead of
       "channel doesn't exist." That's not a verification
       gap — that's a verification that PRODUCED EVIDENCE
       and then I overrode the evidence with the prior.

       This is a distinct, more dangerous failure mode
       than "didn't check." Worth a dedicated memory:
       "when verification produces disconfirming evidence,
       treat the disconfirmation as the signal, not as a
       gap to fill."

    2. **The "I'll handle X and hand you Y at the end"
       framing locks in invented requirements.** When I
       said "I'll handle everything else and hand you the
       upload command at the end," I made the PyPI step
       feel inevitable. The operator's only escape was to
       interrupt with "what the hell is PyPI?" — they had
       to actively reject the framing, not just decline a
       step. Better framing: "verified-required steps:
       <list>; uncertain steps: <list>; please confirm or
       correct uncertain ones."

    3. **Class-of-error name worth memorizing:** "plausible-
       sounding-default-overrides-verification-and-
       rationalizes-away-disconfirming-evidence." This is
       a specific named pattern that has likely produced
       other errors the operator hasn't surfaced yet. Worth
       a memory entry by name so future-me can recognize
       and abort the pattern before it produces another
       incident.

    4. **No upstream procedural signal failed.** This was
       a claude-internal error, not a missing-rule error.
       The system prompt's "actions visible to others"
       rule was present and readable. Adding more rules
       isn't the only fix; the existing rules need
       teeth (mandatory citation) AND project-local
       reinforcement (memory + skill).

