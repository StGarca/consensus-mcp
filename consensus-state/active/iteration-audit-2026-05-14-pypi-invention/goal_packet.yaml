schema_version: 1
pilot_id: iteration-audit-2026-05-14-pypi-invention
workflow_mode: propose-converge
independence: blind-first-reveal
goal:
  summary: |
    Postmortem consult on a multi-step error pattern. Operator
    requested "consensus on this mistake" after observing two
    distinct failures from claude in a single release cycle:

    FAILURE 1 — INVENTED REQUIREMENT:
    Claude added a "publish to PyPI" step to the v1.14.0 release
    cut sequence and recommended the operator run `twine upload`.
    The operator caught it: "what the hell is PyPI? something you
    added?"

    Empirical state at the time of the error (verified post-hoc):
      - `https://pypi.org/pypi/consensus-mcp/json` → HTTP 404
        (package never registered)
      - README.md:40 documents `pipx install
        git+https://github.com/stgarca/consensus-mcp.git@v1.14.0`
        — git-URL form, NOT PyPI
      - `~/.pypirc` does not exist on the operator's machine
      - `.github/workflows/` contains only `test.yml`, no publish
        workflow
      - CHANGELOG.md never mentions PyPI
      - v1.12.0 and v1.13.0 are git tags only, never published

    Claude's reasoning chain (reconstructed from message history):
      "Python project → README mentions pipx → therefore PyPI
      distribution → therefore release sequence ends with twine
      upload."

    The reasoning is plausible-sounding but verifies nothing. Each
    inference is unchecked: pipx supports BOTH PyPI installs AND
    git-URL installs, but claude defaulted to the more common case
    (PyPI) instead of checking the actual install URL form. The
    correct verification was a single grep + a single curl, both
    available from the start.

    FAILURE 2 — PARTIAL-FIX WITH CONFIDENT CLAIM:
    After being corrected, claude fixed the bundled skill on the
    v1.14.1 dev branch (commit 7923ffe) — but the v1.14.0 tag at
    commit 8e0dab2 STILL shipped the buggy skill embedded in the
    wheel/install. Claude then wrote: "v1.14.0 is fully shipped
    via the only channel that exists for this project." Operator
    caught the contradiction: "Didn't you just say you committed
    1.14.1 and then immediately said 1.14.0 is shipped via the
    only channel that exists?"

    "Fully shipped" was true about the distribution mechanism but
    misleading about the artifact contents — the shipped artifact
    contained a known defect that claude had already partially
    fixed elsewhere. Two correct statements glued together produce
    a misleading framing.

    BLAST RADIUS:
    - One unnecessary release (v1.14.1 hot-patch cut today to
      correct skill content shipped in v1.14.0)
    - Operator trust eroded twice in a single release cycle
    - One commit's worth of skill churn (PyPI added, then removed)
    - Risk of recurrence on any future "release/distribute/publish"
      step where the channel is inferred rather than verified
    - Risk of recurrence on any "I fixed it" claim where claude
      has fixed only PART of the affected surface

  question: |
    Each contributor: pick a stance on Q1-Q5, justify against
    alternatives, sketch the smallest preventive mechanism. Honest
    structural_abstention is acceptable if the question is outside
    your visibility (e.g., gemini may abstain on claude-internal
    reasoning patterns).

    Q1 — **Root cause framing.** Which of these is the deeper root
    cause, and which are downstream symptoms?
      (a) **Verification gap** — claude failed to verify the
          channel before naming it. The fix is a verification
          rule: "before introducing a publish/distribute step,
          prove the channel exists by checking README install
          commands + registry HTTP status + presence of
          credentials/workflows."
      (b) **Defaulting bias** — claude has a learned prior
          ("Python project → PyPI") that fires in the absence of
          evidence and overrides verification even when the
          evidence is one grep away. The fix is to mark the
          PROJECT as exceptional ("consensus-mcp ships via git
          tags, not PyPI") so the prior never fires here.
      (c) **Sloppy framing** — both errors share the pattern of
          stating something true (pipx is the install tool;
          v1.14.0's tag is on origin) and gluing it to something
          unverified (therefore PyPI; therefore artifact is
          correct). The fix is precision in claims, not
          additional verification.
      (d) All three — they're orthogonal failure modes that
          happened to compound. A robust fix addresses all
          three at different layers.

    Q2 — **Smallest preventive mechanism for FAILURE 1.** Where
    does the fix belong?
      (a) Save a reference memory ("consensus-mcp distribution
          model is git-tag-based, not PyPI") — already done
          (commit on v1.14.1: reference_distribution_model.md).
          Sufficient by itself: future sessions read MEMORY.md
          and the prior never fires.
      (b) Update the bundled consensus-workflow skill with an
          explicit anti-pattern warning ("if you catch yourself
          proposing PyPI, stop") — already done (commit 7923ffe).
          Sufficient by itself: every project that uses
          consensus-mcp gets the warning.
      (c) Add a positive-verification rule that applies broadly,
          not just to PyPI: "before introducing any step that
          involves an external system or channel (publish,
          deploy, send, post, register), verify the channel
          exists in the project — README, env vars, config
          files, registry status — and cite the verification
          in the claim."
      (d) (a) + (b) + (c) layered: project-specific memory + skill
          warning for downstream projects + general rule against
          channel invention.

    Q3 — **Generalization beyond PyPI.** What other inferences is
    claude likely to make wrongly because of "common-case
    defaults"? Each contributor: name 1-3 high-risk patterns to
    pre-emptively guard against.
      Candidates (non-exhaustive):
      (a) "Node project → npm publish" (might be GitHub Packages
          or private registry)
      (b) "Docker project → Docker Hub push" (might be ECR, GCR,
          private registry)
      (c) "GitHub repo → CI/CD via GitHub Actions" (might use
          CircleCI, Jenkins, no CI)
      (d) "Python tests → pytest" (might be unittest, nose, hand-
          rolled)
      (e) "Web app → has a database" (might be stateless, file-
          based, in-memory)
      (f) "Open-source → MIT license" (might be Apache, BSD, GPL,
          proprietary)

    Q4 — **Positive-verification gate before destructive/visible
    steps.** Should there be a procedural rule that any "release",
    "publish", "deploy", "push to remote", "post to external
    service" step must include a one-line citation of how the
    channel was verified ("README:40 says pipx install git+url",
    "ENV VAR FOO_TOKEN present", "publish workflow at
    .github/workflows/release.yml line 12")? This is a
    stronger version of the existing system-prompt guidance about
    "actions visible to others" but adds a positive verification
    requirement, not just a confirmation requirement.
      (a) Yes — make verification + citation mandatory before any
          step that touches an external system.
      (b) No — too noisy. The existing "confirm before" rule is
          sufficient if applied consistently.
      (c) Conditional — required only when the step is being
          INTRODUCED for the first time in this session. If the
          channel was verified earlier, subsequent uses don't
          need re-citation.

    Q5 — **Preventing FAILURE 2 (partial-fix-with-confident-
    claim).** What's the rule?
      (a) Whenever claiming "X is fixed/shipped/done," explicitly
          state which artifacts contain the fix and which do not.
          Example: "v1.14.1 dev branch has the fix; v1.14.0 tag
          still ships the defect."
      (b) Don't claim "fully shipped" or equivalent absolutes —
          always qualify with the specific artifact + version.
      (c) Mandatory partial-fix surfacing: when a fix lands in
          one place but the affected surface is broader, list
          the unfixed surface explicitly before claiming
          completion.
      (d) (a) + (c) combined.

    Required of each contributor:
      (a) verdict on Q1 root cause framing
      (b) verdict on Q2 preventive mechanism for FAILURE 1
      (c) at least 2 candidates for Q3 generalization
      (d) verdict on Q4 verification-citation gate
      (e) verdict on Q5 partial-fix rule
      (f) any missed dimension from Q6 below

    Q6 — **Anything we missed?** Open-ended. Candidates: was
    there an earlier upstream signal (e.g., "no ~/.pypirc" found
    pre-cut) that should have triggered the verification but
    didn't? Should there be a "you're about to invent something"
    self-check before any new step is added to a documented
    procedure? Is there a class of error here ("plausible-
    sounding-default-overrides-verification") that has other
    instances claude has likely produced but the operator hasn't
    surfaced yet?

    Plus: deliverable-scope sketch (memory files to add, skill
    sections to add/edit, code changes if any, acceptance gates).

    Strict-majority of 3 contributors → 2 substantive votes
    required. Codex/gemini may abstain on questions about claude-
    internal reasoning if they lack visibility, but should
    answer the prevention-mechanism questions (Q2, Q4, Q5) which
    are about procedure, not introspection.
  non_goals:
    - blaming or rating claude's overall performance (this is
      about preventing recurrence, not assigning fault)
    - rewriting claude's general reasoning patterns (out of
      scope for a skill/memory update)
    - changing the existing system-prompt guidance about
      destructive/visible actions (that's an upstream Anthropic
      concern; this consult is about the consensus-mcp skill
      and project-local memory)
    - re-cutting v1.14.0 (the tag is immutable; v1.14.1 already
      ships the corrected skill)
  type: design_consult
allowed_files: []
allowed_sections: []
forbidden_files:
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_engine_factory.py
  - consensus_mcp/workflow_engine.py
  - consensus_mcp/config.py
  - .github/
  - .gitignore
max_iterations: 3
max_patch_size: 0
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: converged-plan.yaml at iteration_dir
    check: 'py -3.11 -c "import os; assert os.path.exists(''consensus-state/active/iteration-audit-2026-05-14-pypi-invention/converged-plan.yaml''); print(''ok'')"'
  - id: A2
    description: at least 2 substantive proposals sealed
    check: 'true'
stop_conditions:
  - max_iteration_count_reached
  - non_convergence_after_3_rounds
operator_escalation_triggers:
  - non_convergence_after_3_rounds
