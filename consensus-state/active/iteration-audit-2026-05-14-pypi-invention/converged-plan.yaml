# === SYNTHESIS BY QUESTION ===

q1_root_cause:
  unanimous: |
    All three converge on (d) layered orthogonal causes:
      - Claude: verification gap + defaulting bias + sloppy framing
      - Codex: channel inferred without evidence + partial fix
        described with global language
      - Gemini: assumption over verification + imprecise artifact
        state claims
    No single root; layered defenses required.

q2_preventive_mechanism:
  claude: 'layered project memory + bundled skill + general rule'
  codex: 'compact Release Trust Gate checklist'
  gemini: 'Verification-First invariant in dispatch templates'
  weighted_synthesis: |
    All three are additive at different layers. Adopt all:
      - Claude's layered project-local memory (cheap, immediate,
        catches this project's future sessions)
      - Codex's compact checklist artifact (catches release/
        distribute steps specifically with evidence rows)
      - Gemini's dispatch-template invariant (catches the failure
        mode for ALL 3 peer AIs in future consults, not just claude)
      - Plus bundled-skill sections so downstream projects using
        consensus-mcp inherit the doctrine

q3_generalization_candidates:
  adopted_from_claude: 'npm, pytest, MIT-license, version-bump→publish, Dockerfile→pushed, package-name→ownership'
  adopted_from_codex_framing: 'class is "publish/install/distribution" specifically + any inferred capability'
  adopted_from_gemini_framing: 'extends beyond distribution to "any inferred environmental fact" (DB schemas, dependency availability, tool presence)'
  synthesis: |
    Maintain claude's enumerated list (project-local reference
    memory, append-only). Adopt gemini's broader framing for the
    skill section's intro: "any inferred capability, channel, or
    environmental fact" — not limited to distribution.

q4_verification_citation_gate:
  unanimous: |
    All three vote (a) mandatory citation before any step that
    touches an external system or channel. Claude: "verified via
    <source>:<line>". Codex: "checked evidence for channel, version,
    artifact contents, residual surface". Gemini: "verify execution
    context BEFORE proposing action that depends on it".

q5_partial_fix_rule:
  claude: '(d) both fixed-and-unfixed enumeration'
  codex: 'replace global status words with artifact-scoped claims naming version + commit/tag + install path + bundled content + known residual defects'
  gemini: 'distinguish git tag from branch head when making state claims'
  weighted_synthesis: |
    Adopt codex's "artifact-scoped claims" framing as the named
    rule (cleanest formulation). Supplement with claude's explicit
    "and which do not" requirement. Use gemini's tag-vs-branch
    example as the canonical scenario in the rule's prose.

q6_missed_dimensions:
  adopted: |
    Claude:
      - Bias-rationalizes-evidence (worse than bias-without-evidence)
      - Framing locks in invented requirements ("I'll handle X and
        hand you Y" makes invented step feel inevitable)
      - Class-of-error name worth memorizing
    Codex:
      - "If only human docs change and agent-facing instructions
        do not, recurrence risk remains high" — fix MUST be agent-
        facing (templates, skill), not just human-facing docs
      - Separate channel verification from artifact-content
        verification (they're orthogonal failure surfaces)
    Gemini:
      - Over-correction risk (verifying obvious facts; pedantic);
        scope verification to high-impact actions

# === FINAL CONVERGED DELIVERABLE ===

