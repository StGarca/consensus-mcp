schema_version: 1
pilot_id: iteration-0016d-init-wizard
goal:
  summary: |
    iter-0016d — consensus init wizard CLI per converged-plan Section A. Final
    sub-component of iter-0016 series. Implements `consensus init` entry point
    creating .consensus/config.yaml with all configurability dimensions exposed
    as CLI flags. Supports --non-interactive, --accept-defaults, --reconfigure,
    --check, --print-defaults, --dry-run, --force, --no-update-gitignore.
    Manages .gitignore via bracketed markers per F9c.
  desired_end_state: |
    consensus_mcp/_init_wizard.py implements main(argv) returning exit codes
    (0=ok, 2=missing-config-on-check, 3=invalid-config, 4=exists-without-reconfigure).
    Flags cover all 9 configurability dimensions (workflow, contributors,
    independence, convergence, finding-disposition, snapshot-trigger,
    snapshot-every-iterations, patch-authoring, timeout-policy). Auto-detects
    available contributors via PATH (claude always; codex/gemini via shutil.which).
    Defaults workflow_mode based on n_contributors (>=2 → propose-converge;
    1 → post-review). .gitignore managed block updates are idempotent and
    preserve user content. Atomic write via temp+rename. Tests cover all flag
    combinations + invalid combos + .gitignore idempotency + reconfigure.
    Full suite >=634 green.
  non_goals:
    - interactive prompt UX (the --non-interactive code path is the primary one tested here)
    - integration with workflow_engine runtime (later iteration)
    - wiring init wizard into MCP tool surface (later)
    - generating CLI entry point in pyproject.toml (handled by setup phase elsewhere)
allowed_files:
  - consensus_mcp/_init_wizard.py
  - consensus_mcp/tests/test_init_wizard.py
allowed_sections: []
forbidden_files:
  - consensus_mcp/_dispatch_codex.py
  - consensus_mcp/_dispatch_gemini.py
  - consensus_mcp/_dispatch_base.py
  - consensus_mcp/server.py
  - consensus_mcp/tools/
  - consensus_mcp/config.py
  - consensus_mcp/contributors/
  - consensus_mcp/workflow_engine.py
  - consensus-state/
  - README.md
  - LICENSE
  - CHANGELOG.md
  - pyproject.toml
  - .github/
  - .gitignore
  - docs/
max_iterations: 1
max_patch_size: 1500
fix_author_policy: permissive
validators_required: []
acceptance_gates:
  - id: A1
    description: full suite >=634 green
    check: py -3.11 -m pytest consensus_mcp/tests -q
  - id: A2
    description: init wizard tests pass standalone
    check: py -3.11 -m pytest consensus_mcp/tests/test_init_wizard.py -q
stop_conditions:
  - max_iteration_count_reached
  - patch_would_touch_forbidden_files
  - patch_size_exceeds_max
operator_escalation_triggers:
  - touched_forbidden_files
  - max_patch_size_exceeded
authorization:
  authorized_by: operator
  authorized_at_utc: '2026-05-13T05:00:00Z'
  codex_patch_apply_authorized: false
