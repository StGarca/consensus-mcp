    consensus_mcp/_init_wizard.py: "\"\"\"`consensus init` wizard — fourth and final sub-component of iter-0016.\n\nCreates `.consensus/config.yaml` per the iter-0015 converged design. Supports:\n  - Interactive prompts (default; one question per configurability dimension)\n  - Non-interactive (`--non-interactive`) with explicit flags\n  - `--accept-defaults` (non-interactive using all defaults; overridable per-flag)\n  - `--reconfigure` (load existing config; use as defaults; show diff)\n  - `--check` (validate existing config; print normalized form; exit 0/2/3)\n  - `--print-defaults` (emit default YAML to stdout; no write)\n  - `--dry-run` (show intended config + .gitignore changes; no write)\n\nExit codes per converged plan Section A:\n  0  ok\n  1  user-abort (interactive cancel via Ctrl+C / EOF)\n  2  config missing (--check only) or new iteration in repo without config\n  3  invalid config / illegal combination\n  4  config exists without --reconfigure or --force\n\n`.gitignore` updates use bracketed markers per converged design F9c. Malformed\nmarkers (open without close) are detected and preserved untouched rather than\nrisking data loss.\n\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport difflib\nimport shutil\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nfrom consensus_mcp import config as cfg\n\n\nGITIGNORE_OPEN_MARKER = \"# >>> consensus-mcp managed <<<\"\nGITIGNORE_CLOSE_MARKER = \"# <<< consensus-mcp managed >>>\"\nGITIGNORE_MANAGED_PATHS = (\n    \".consensus/tmp/\",\n    \".consensus/cache/\",\n    \".consensus/logs/\",\n)\n\n\nclass WizardError(RuntimeError):\n    pass\n\n\ndef _detect_repo_root(start: Path | None = None) -> Path:\n    \"\"\"Walk upward looking for `.git`. Falls back to start (CWD) if no marker found.\"\"\"\n    cwd = (start or Path.cwd()).resolve()\n    for candidate in (cwd, *cwd.parents):\n        if (candidate / \".git\").exists():\n            return candidate\n    return cwd\n\n\ndef _resolve_config_path(args, repo_root: Path) -> Path:\n    \"\"\"Honor --config override; otherwise default to repo_root/.consensus/config.yaml.\"\"\"\n    if getattr(args, \"config\", None):\n        return Path(args.config).resolve()\n    return repo_root / \".consensus\" / \"config.yaml\"\n\n\ndef _detect_available_contributors(repo_root: Path) -> list[str]:\n    \"\"\"Return contributors whose CLIs are resolvable on PATH. Always includes claude.\"\"\"\n    available = [\"claude\"]\n    if shutil.which(\"codex\"):\n        available.append(\"codex\")\n    if shutil.which(\"gemini\"):\n        available.append(\"gemini\")\n    return available\n\n\ndef _prompt(label: str, default: str, valid: list[str] | None = None) -> str:\n    \"\"\"Single-line prompt with default. Raises KeyboardInterrupt on Ctrl+C/EOF.\"\"\"\n    suffix = f\" [{default}]\"\n    if valid:\n        suffix = f\" ({'/'.join(valid)})\" + suffix\n    while True:\n        try:\n            raw = input(f\"{label}{suffix}: \").strip()\n        except EOFError as exc:\n            raise KeyboardInterrupt from exc\n        choice = raw or default\n        if valid and choice not in valid:\n            print(f\"  invalid; expected one of {valid}\", file=sys.stderr)\n            continue\n        return choice\n\n\ndef _prompt_int(label: str, default: int) -> int:\n    while True:\n        try:\n            raw = input(f\"{label} [{default}]: \").strip()\n        except EOFError as exc:\n            raise KeyboardInterrupt from exc\n        if not raw:\n            return default\n        try:\n            return int(raw)\n        except ValueError:\n            print(\"  invalid; expected an integer\", file=sys.stderr)\n\n\ndef _apply_cli_overrides(args, base: dict) -> None:\n    \"\"\"Apply explicit CLI flags to `base` config (mutates in place).\n\n    Run before prompting so dependent defaults derive from the operator's\n    expressed intent, not from stale base values (codex-rev-003).\n    \"\"\"\n    if args.contributors is not None:\n        base[\"contributors\"][\"enabled\"] = [c.strip() for c in args.contributors.split(\",\") if c.strip()]\n    if args.workflow is not None:\n        base[\"workflow\"][\"mode\"] = cfg.WORKFLOW_ALIASES.get(args.workflow, args.workflow)\n    if args.convergence is not None:\n        base[\"convergence\"][\"rule\"] = args.convergence\n    if args.independence is not None:\n        base[\"workflow\"][\"independence\"] = args.independence\n    if args.finding_disposition is not None:\n        base[\"convergence\"][\"finding_disposition\"] = args.finding_disposition\n    if args.snapshot_trigger is not None:\n        base[\"snapshots\"][\"trigger\"] = args.snapshot_trigger\n    if args.snapshot_every_iterations is not None:\n        base[\"snapshots\"][\"periodic\"][\"every_iterations\"] = args.snapshot_every_iterations\n    if args.patch_authoring is not None:\n        base[\"patches\"][\"authoring\"] = args.patch_authoring\n    if args.timeout_policy is not None:\n        base[\"workflow\"][\"timeout_policy\"] = args.timeout_policy\n\n\ndef _which_flags_set(args) -> set[str]:\n    \"\"\"Return the names of dimension flags the user passed explicitly.\"\"\"\n    keys = (\n        \"contributors\", \"workflow\", \"convergence\", \"independence\",\n        \"finding_disposition\", \"snapshot_trigger\", \"snapshot_every_iterations\",\n        \"patch_authoring\", \"timeout_policy\",\n    )\n    return {k for k in keys if getattr(args, k, None) is not None}\n\n\ndef interactive_overrides(args, repo_root: Path, base: dict, fresh: bool) -> None:\n    \"\"\"Prompt the user for each configurability dimension. Mutates `base` in place.\n\n    Flags already supplied on the command line take precedence (no prompt).\n    When `fresh` is True (no existing config / not reconfigure), missing\n    contributors are auto-suggested from PATH. When False, current base values\n    are the prompt defaults (preserving existing config).\n\n    Raises KeyboardInterrupt on Ctrl+C / EOF — caller maps to exit code 1.\n    \"\"\"\n    set_flags = _which_flags_set(args)\n\n    # Contributors.\n    if \"contributors\" not in set_flags:\n        default = \",\".join(\n            base[\"contributors\"][\"enabled\"] if not fresh else _detect_available_contributors(repo_root)\n        )\n        choice = _prompt(\"Enabled contributors (comma-separated)\", default)\n        base[\"contributors\"][\"enabled\"] = [c.strip() for c in choice.split(\",\") if c.strip()]\n    n_contributors = len(base[\"contributors\"][\"enabled\"])\n\n    # Workflow mode.\n    if \"workflow\" not in set_flags:\n        if fresh:\n            default_workflow = (\n                cfg.WORKFLOW_PROPOSE_CONVERGE if n_contributors >= 2 else cfg.WORKFLOW_POST_REVIEW\n            )\n        else:\n            default_workflow = base[\"workflow\"][\"mode\"]\n        choice = _prompt(\n            \"Workflow mode\", default_workflow,\n            valid=[cfg.WORKFLOW_POST_REVIEW, cfg.WORKFLOW_PROPOSE_CONVERGE, cfg.WORKFLOW_ADVISORY],\n        )\n        base[\"workflow\"][\"mode\"] = choice\n\n    # Convergence rule.\n    if \"convergence\" not in set_flags:\n        if fresh:\n            if base[\"workflow\"][\"mode\"] == cfg.WORKFLOW_ADVISORY:\n                default_rule = cfg.CONVERGE_ADVISORY\n            elif n_contributors >= 3:\n                default_rule = cfg.CONVERGE_STRICT_MAJ\n            else:\n                default_rule = cfg.CONVERGE_UNANIMOUS\n        else:\n            default_rule = base[\"convergence\"][\"rule\"]\n        base[\"convergence\"][\"rule\"] = _prompt(\n            \"Convergence rule\", default_rule, valid=list(cfg.VALID_CONVERGENCE)\n        )\n\n    # Independence model.\n    if \"independence\" not in set_flags:\n        if fresh:\n            default_ind = (\n                cfg.INDEPENDENCE_BLIND if base[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n                else cfg.INDEPENDENCE_VISIBLE\n            )\n        else:\n            default_ind = base[\"workflow\"][\"independence\"]\n        base[\"workflow\"][\"independence\"] = _prompt(\n            \"Independence model\", default_ind, valid=list(cfg.VALID_INDEPENDENCE)\n        )\n\n    # Finding disposition.\n    if \"finding_disposition\" not in set_flags:\n        default_disp = base[\"convergence\"][\"finding_disposition\"] if not fresh else cfg.DISPOSITION_ALL_OR_NOTHING\n        base[\"convergence\"][\"finding_disposition\"] = _prompt(\n            \"Finding disposition\", default_disp, valid=list(cfg.VALID_DISPOSITION)\n        )\n\n    # Snapshot trigger + cadence.\n    if \"snapshot_trigger\" not in set_flags:\n        default_trig = base[\"snapshots\"][\"trigger\"]\n        base[\"snapshots\"][\"trigger\"] = _prompt(\n            \"Snapshot trigger\", default_trig, valid=list(cfg.VALID_SNAPSHOT_TRIGGER)\n        )\n    if \"snapshot_every_iterations\" not in set_flags:\n        default_every = base[\"snapshots\"][\"periodic\"][\"every_iterations\"]\n        base[\"snapshots\"][\"periodic\"][\"every_iterations\"] = _prompt_int(\n            \"Periodic snapshot cadence (iterations)\", default_every\n        )\n\n    # Patch authoring.\n    if \"patch_authoring\" not in set_flags:\n        default_auth = base[\"patches\"][\"authoring\"]\n        base[\"patches\"][\"authoring\"] = _prompt(\n            \"Patch authoring policy\", default_auth, valid=list(cfg.VALID_PATCH_AUTHORING)\n        )\n\n    # Timeout policy.\n    if \"timeout_policy\" not in set_flags:\n        default_to = base[\"workflow\"][\"timeout_policy\"]\n        base[\"workflow\"][\"timeout_policy\"] = _prompt(\n            \"Timeout policy\", default_to, valid=list(cfg.VALID_TIMEOUT_POLICY)\n        )\n\n\ndef build_config_from_flags(args, repo_root: Path, interactive: bool = False) -> dict:\n    \"\"\"Construct a config dict from CLI args + defaults. Validates before return.\n\n    When `--reconfigure` and an existing config is present, the existing\
      \ config\n    is the starting point; auto-detection and derived defaults are SKIPPED for\n    any dimension that already has a value (codex-rev-001). Explicit CLI flags\n    always override.\n    \"\"\"\n    config_path = _resolve_config_path(args, repo_root)\n    existing_loaded = False\n    if args.reconfigure and config_path.exists():\n        try:\n            base = cfg.load(config_path)\n            existing_loaded = True\n        except cfg.ConfigValidationError:\n            base = cfg.default_config()\n    else:\n        base = cfg.default_config()\n\n    # Apply explicit CLI flags FIRST so prompts / derived defaults see them.\n    _apply_cli_overrides(args, base)\n    set_flags = _which_flags_set(args)\n\n    if interactive:\n        interactive_overrides(args, repo_root, base, fresh=not existing_loaded)\n    else:\n        # Non-interactive: only apply derived defaults when we are NOT\n        # preserving an existing config; in reconfigure mode the existing\n        # values must survive any unspecified flag (codex-rev-001).\n        if not existing_loaded:\n            if \"contributors\" not in set_flags:\n                base[\"contributors\"][\"enabled\"] = _detect_available_contributors(repo_root)\n            n_contributors = len(base[\"contributors\"][\"enabled\"])\n            if \"workflow\" not in set_flags:\n                base[\"workflow\"][\"mode\"] = (\n                    cfg.WORKFLOW_PROPOSE_CONVERGE if n_contributors >= 2 else cfg.WORKFLOW_POST_REVIEW\n                )\n            if \"convergence\" not in set_flags:\n                if base[\"workflow\"][\"mode\"] == cfg.WORKFLOW_ADVISORY:\n                    base[\"convergence\"][\"rule\"] = cfg.CONVERGE_ADVISORY\n                elif n_contributors >= 3:\n                    base[\"convergence\"][\"rule\"] = cfg.CONVERGE_STRICT_MAJ\n                else:\n                    base[\"convergence\"][\"rule\"] = cfg.CONVERGE_UNANIMOUS\n            if \"independence\" not in set_flags:\n                base[\"workflow\"][\"independence\"] = (\n                    cfg.INDEPENDENCE_BLIND if base[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n                    else cfg.INDEPENDENCE_VISIBLE\n                )\n            if \"finding_disposition\" not in set_flags:\n                base[\"convergence\"][\"finding_disposition\"] = cfg.DISPOSITION_ALL_OR_NOTHING\n\n    base[\"project\"][\"name\"] = repo_root.name\n    cfg.validate(base)\n    return base\n\n\ndef write_config(config: dict, path: Path) -> None:\n    \"\"\"Atomically write config YAML to path.\"\"\"\n    path.parent.mkdir(parents=True, exist_ok=True)\n    tmp = path.with_suffix(path.suffix + \".tmp\")\n    tmp.write_text(\n        yaml.safe_dump(config, sort_keys=False, default_flow_style=False),\n        encoding=\"utf-8\",\n    )\n    tmp.replace(path)\n\n\ndef _config_diff(old: dict, new: dict) -> str:\n    \"\"\"Return a well-formed unified diff of two configs serialized as YAML.\"\"\"\n    a = yaml.safe_dump(old, sort_keys=False, default_flow_style=False).splitlines()\n    b = yaml.safe_dump(new, sort_keys=False, default_flow_style=False).splitlines()\n    # Use lineterm='' + join with '\\n' so control records (---, +++, @@) and\n    # body lines all end with one newline (codex-rev-004).\n    diff_lines = list(difflib.unified_diff(a, b, fromfile=\"existing\", tofile=\"proposed\", lineterm=\"\"))\n    return \"\\n\".join(diff_lines)\n\n\ndef update_gitignore(repo_root: Path) -> bool:\n    \"\"\"Add managed paths to .gitignore between bracketed markers. Returns True if changed.\n\n    Idempotent: complete marker pairs are stripped, then a single fresh managed\n    block is appended. If the file contains an OPEN marker without a CLOSE\n    marker (or vice versa), the file is treated as foreign and left untouched\n    — a fresh block is appended but no existing lines are deleted\n    (codex-rev-005).\n    \"\"\"\n    gi = repo_root / \".gitignore\"\n    existing = gi.read_text(encoding=\"utf-8\") if gi.exists() else \"\"\n\n    # Validate that markers are well-ordered: each open is followed by a close\n    # before another open, and there are no orphans. Counts must match AND\n    # ordering must be valid (codex pass-2 rev-005 + codex pass-3 rev-001).\n    markers_well_formed = True\n    depth = 0\n    for line in existing.splitlines():\n        if line == GITIGNORE_OPEN_MARKER:\n            depth += 1\n            if depth != 1:\n                markers_well_formed = False\n                break\n        elif line == GITIGNORE_CLOSE_MARKER:\n            depth -= 1\n            if depth != 0:\n                markers_well_formed = False\n                break\n    if depth != 0:\n        markers_well_formed = False\n\n    stripped_lines: list[str] = []\n    if markers_well_formed:\n        in_block = False\n        for line in existing.splitlines():\n            if line == GITIGNORE_OPEN_MARKER:\n                in_block = True\n                continue\n            if line == GITIGNORE_CLOSE_MARKER:\n                in_block = False\n                continue\n            if not in_block:\n                stripped_lines.append(line)\n    else:\n        # Malformed (orphan markers, reversed order, nested, etc.):\n        # preserve every existing line; never silently drop content.\n        # BUT we still strip OUR own previously appended exact managed block at\n        # the tail so reruns remain idempotent (codex pass-4 rev-001).\n        raw_lines = existing.splitlines()\n        block_size = len(GITIGNORE_MANAGED_PATHS) + 2  # open + paths + close\n        if (\n            len(raw_lines) >= block_size\n            and raw_lines[-block_size] == GITIGNORE_OPEN_MARKER\n            and raw_lines[-1] == GITIGNORE_CLOSE_MARKER\n            and raw_lines[-(block_size - 1):-1] == list(GITIGNORE_MANAGED_PATHS)\n        ):\n            # Drop the trailing managed block + any blank separator immediately\n            # before it so the next append doesn't accumulate blank lines.\n            raw_lines = raw_lines[:-block_size]\n            while raw_lines and raw_lines[-1].strip() == \"\":\n                raw_lines.pop()\n        stripped_lines = raw_lines\n\n    new_block = [GITIGNORE_OPEN_MARKER, *GITIGNORE_MANAGED_PATHS, GITIGNORE_CLOSE_MARKER]\n    new_content_lines = list(stripped_lines)\n    if new_content_lines and new_content_lines[-1].strip() != \"\":\n        new_content_lines.append(\"\")\n    new_content_lines.extend(new_block)\n    new_content = \"\\n\".join(new_content_lines) + \"\\n\"\n\n    if new_content == existing:\n        return False\n    gi.write_text(new_content, encoding=\"utf-8\")\n    return True\n\n\ndef cmd_init(args) -> int:\n    \"\"\"Implement the `consensus init` command.\"\"\"\n    repo_root = _detect_repo_root()\n    config_path = _resolve_config_path(args, repo_root)\n\n    if args.check:\n        if not config_path.exists():\n            print(f\"error: {config_path} does not exist\", file=sys.stderr)\n            return 2\n        try:\n            loaded = cfg.load(config_path)\n        except cfg.ConfigValidationError as exc:\n            print(f\"error: invalid config: {exc}\", file=sys.stderr)\n            return 3\n        print(yaml.safe_dump(loaded, sort_keys=False, default_flow_style=False))\n        return 0\n\n    if args.print_defaults:\n        print(yaml.safe_dump(cfg.default_config(), sort_keys=False, default_flow_style=False))\n        return 0\n\n    # gemini pass-3 rev-001: --dry-run no longer forces non-interactive. Users\n    # can preview an interactive session via `consensus init --dry-run`.\n    # Interactivity is suppressed only by --non-interactive or --accept-defaults.\n    # codex pass-4 rev-002: check existing-config guard BEFORE we build / prompt\n    # so exit 4 wins over exit 1 (user abort during interactive) and exit 3\n    # (invalid construction).\n    if config_path.exists() and not (args.reconfigure or args.force):\n        print(\n            f\"error: {config_path} already exists. Use --reconfigure to update \"\n            f\"or --force to overwrite.\",\n            file=sys.stderr,\n        )\n        return 4\n\n    interactive = not (args.non_interactive or args.accept_defaults)\n\n    try:\n        new_config = build_config_from_flags(args, repo_root, interactive=interactive)\n    except cfg.ConfigValidationError as exc:\n        print(f\"error: invalid config: {exc}\", file=sys.stderr)\n        return 3\n    except KeyboardInterrupt:\n        print(\"\\naborted by user\", file=sys.stderr)\n        return 1\n\n    if args.reconfigure and config_path.exists():\n        try:\n            existing = cfg.load(config_path)\n            diff = _config_diff(existing, new_config)\n            if diff:\n                print(\"--- reconfigure diff ---\")\n                print(diff)\n                print(\"--- end diff ---\")\n            else:\n                print(\"reconfigure: no changes\")\n        except cfg.ConfigValidationError:\n            print(f\"note: existing config at {config_path} is invalid; overwriting\")\n\n    if args.dry_run:\n        print(f\"DRY RUN: would write {config_path}\")\n        print(yaml.safe_dump(new_config, sort_keys=False, default_flow_style=False))\n        if not args.no_update_gitignore:\n            print(f\"would update .gitignore at {repo_root / '.gitignore'} (managed block)\")\n        else:\n            print(\".gitignore update skipped (--no-update-gitignore)\")\n        return 0\n\n    write_config(new_config, config_path)\n    print(f\"wrote {config_path}\")\n\n    if not args.no_update_gitignore:\n        changed = update_gitignore(repo_root)\n        if changed:\n            print(f\"updated .gitignore at {repo_root / '.gitignore'}\")\n        else:\n            print(\".gitignore already up to date\")\n    return 0\n\n\ndef main(argv: list[str] | None = None) -> int:\n    parser = argparse.ArgumentParser(\n        prog=\"consensus init\"\
      ,\n        description=\"Initialize .consensus/config.yaml for cross-AI workflow\",\n    )\n    parser.add_argument(\"--check\", action=\"store_true\", help=\"validate existing config and exit\")\n    parser.add_argument(\"--print-defaults\", action=\"store_true\", help=\"print default YAML to stdout\")\n    parser.add_argument(\"--dry-run\", action=\"store_true\", help=\"show intended config; do not write\")\n    parser.add_argument(\"--non-interactive\", action=\"store_true\", help=\"no prompts\")\n    parser.add_argument(\"--accept-defaults\", action=\"store_true\", help=\"non-interactive with defaults\")\n    parser.add_argument(\"--reconfigure\", action=\"store_true\", help=\"re-prompt with existing as defaults; show diff\")\n    parser.add_argument(\"--force\", action=\"store_true\", help=\"overwrite without prompt\")\n    parser.add_argument(\"--no-update-gitignore\", action=\"store_true\", help=\"skip .gitignore marker write\")\n    parser.add_argument(\"--config\", default=None, help=\"override config path\")\n\n    parser.add_argument(\"--workflow\", default=None,\n                        choices=[\"3\", \"4\", \"post-review\", \"propose-converge\", \"advisory\"],\n                        help=\"workflow mode\")\n    parser.add_argument(\"--contributors\", default=None,\n                        help=\"comma-separated list of enabled contributors\")\n    parser.add_argument(\"--independence\", default=None,\n                        choices=list(cfg.VALID_INDEPENDENCE),\n                        help=\"independence model\")\n    parser.add_argument(\"--convergence\", default=None,\n                        choices=list(cfg.VALID_CONVERGENCE),\n                        help=\"convergence rule\")\n    parser.add_argument(\"--finding-disposition\", default=None,\n                        choices=list(cfg.VALID_DISPOSITION),\n                        help=\"finding disposition granularity\")\n    parser.add_argument(\"--snapshot-trigger\", default=None,\n                        choices=list(cfg.VALID_SNAPSHOT_TRIGGER),\n                        help=\"snapshot trigger policy\")\n    parser.add_argument(\"--snapshot-every-iterations\", type=int, default=None,\n                        help=\"periodic snapshot iteration cadence\")\n    parser.add_argument(\"--patch-authoring\", default=None,\n                        choices=list(cfg.VALID_PATCH_AUTHORING),\n                        help=\"patch authoring permission\")\n    parser.add_argument(\"--timeout-policy\", default=None,\n                        choices=list(cfg.VALID_TIMEOUT_POLICY),\n                        help=\"contributor timeout policy\")\n\n    args = parser.parse_args(argv)\n    return cmd_init(args)\n\n\nif __name__ == \"__main__\":\n    sys.exit(main())\n"
    consensus_mcp/tests/test_init_wizard.py: "\"\"\"Unit tests for consensus_mcp._init_wizard (`consensus init` CLI).\"\"\"\nfrom __future__ import annotations\n\nimport builtins\nfrom pathlib import Path\n\nimport pytest\nimport yaml\n\nfrom consensus_mcp import _init_wizard as wiz\nfrom consensus_mcp import config as cfg\n\n\n# ---------- print-defaults ----------\n\ndef test_print_defaults_outputs_yaml(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\"--print-defaults\"])\n    out = capsys.readouterr().out\n    assert rc == 0\n    parsed = yaml.safe_load(out)\n    assert parsed[\"schema_version\"] == 1\n    assert parsed[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n\n\n# ---------- check ----------\n\ndef test_check_missing_config_returns_2(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\"--check\"])\n    assert rc == 2\n    err = capsys.readouterr().err\n    assert \"does not exist\" in err\n\n\ndef test_check_valid_config_returns_0(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    (config_dir / \"config.yaml\").write_text(\n        yaml.safe_dump(cfg.default_config()), encoding=\"utf-8\"\n    )\n    rc = wiz.main([\"--check\"])\n    assert rc == 0\n    out = capsys.readouterr().out\n    parsed = yaml.safe_load(out)\n    assert parsed[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n\n\ndef test_check_invalid_config_returns_3(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    (config_dir / \"config.yaml\").write_text(\n        \"schema_version: 1\\nworkflow:\\n  mode: wrong\\n\", encoding=\"utf-8\"\n    )\n    rc = wiz.main([\"--check\"])\n    assert rc == 3\n\n\ndef test_check_honors_config_path_override(tmp_path, capsys, monkeypatch):\n    \"\"\"--config flag must redirect --check to the override path (codex-rev-002).\"\"\"\n    monkeypatch.chdir(tmp_path)\n    alt = tmp_path / \"elsewhere\" / \"myconfig.yaml\"\n    alt.parent.mkdir()\n    alt.write_text(yaml.safe_dump(cfg.default_config()), encoding=\"utf-8\")\n    # Confirm default path is empty.\n    assert not (tmp_path / \".consensus\" / \"config.yaml\").exists()\n    rc = wiz.main([\"--check\", \"--config\", str(alt)])\n    assert rc == 0\n    out = capsys.readouterr().out\n    parsed = yaml.safe_load(out)\n    assert parsed[\"schema_version\"] == 1\n\n\n# ---------- dry-run ----------\n\ndef test_dry_run_interactive_previews_without_writing(tmp_path, capsys, monkeypatch):\n    \"\"\"gemini pass-3 rev-001: --dry-run with no --non-interactive must enter\n    the interactive prompt path and preview the result without writing.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    monkeypatch.setattr(builtins, \"input\", _stub_input([\"\"] * 8))\n    rc = wiz.main([\"--dry-run\", \"--contributors\", \"claude,codex,gemini\"])\n    assert rc == 0\n    out = capsys.readouterr().out\n    assert \"DRY RUN\" in out\n    assert not (tmp_path / \".consensus\" / \"config.yaml\").exists()\n\n\ndef test_dry_run_does_not_write(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--dry-run\", \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 0\n    out = capsys.readouterr().out\n    assert \"DRY RUN\" in out\n    assert not (tmp_path / \".consensus\" / \"config.yaml\").exists()\n    assert not (tmp_path / \".gitignore\").exists()\n\n\ndef test_dry_run_with_no_update_gitignore_reports_skip(tmp_path, capsys, monkeypatch):\n    \"\"\"codex-rev-004: dry-run must honor --no-update-gitignore in its preview.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--dry-run\", \"--non-interactive\", \"--accept-defaults\",\n        \"--no-update-gitignore\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 0\n    out = capsys.readouterr().out\n    assert \"DRY RUN\" in out\n    assert \"skipped (--no-update-gitignore)\" in out\n    # Must not claim \".gitignore at ...\" would be updated.\n    assert \"would update .gitignore\" not in out\n\n\n# ---------- non-interactive write ----------\n\ndef test_non_interactive_writes_config(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 0\n    config_path = tmp_path / \".consensus\" / \"config.yaml\"\n    assert config_path.exists()\n    loaded = cfg.load(config_path)\n    assert loaded[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n\n\ndef test_non_interactive_refuses_existing_without_reconfigure(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    (config_dir / \"config.yaml\").write_text(\"schema_version: 1\\n\", encoding=\"utf-8\")\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 4\n    err = capsys.readouterr().err\n    assert \"already exists\" in err\n\n\ndef test_non_interactive_writes_to_config_override(tmp_path, monkeypatch):\n    \"\"\"codex-rev-002: --config must redirect the write target.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    alt = tmp_path / \"custom\" / \"cfg.yaml\"\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n        \"--config\", str(alt),\n    ])\n    assert rc == 0\n    assert alt.exists()\n    assert not (tmp_path / \".consensus\" / \"config.yaml\").exists()\n\n\ndef test_existing_config_guard_uses_config_override(tmp_path, capsys, monkeypatch):\n    \"\"\"codex-rev-002: existing-config refusal must check the --config path.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    alt = tmp_path / \"elsewhere.yaml\"\n    alt.write_text(\"schema_version: 1\\n\", encoding=\"utf-8\")\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n        \"--config\", str(alt),\n    ])\n    assert rc == 4\n    err = capsys.readouterr().err\n    assert \"already exists\" in err\n\n\n# ---------- reconfigure ----------\n\ndef test_reconfigure_overwrites(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    (config_dir / \"config.yaml\").write_text(\n        yaml.safe_dump(cfg.default_config()), encoding=\"utf-8\"\n    )\n    rc = wiz.main([\n        \"--non-interactive\", \"--reconfigure\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n        \"--workflow\", \"3\",\n        \"--independence\", cfg.INDEPENDENCE_VISIBLE,\n    ])\n    assert rc == 0\n    loaded = cfg.load(config_dir / \"config.yaml\")\n    assert loaded[\"workflow\"][\"mode\"] == cfg.WORKFLOW_POST_REVIEW\n\n\ndef test_reconfigure_preserves_existing_non_default(tmp_path, monkeypatch):\n    \"\"\"codex-rev-003 (pass 1) / codex-rev-001 (pass 2): --reconfigure must\n    preserve existing config values for any dimension not explicitly overridden\n    via CLI flag — including snapshot trigger and contributors.\n    \"\"\"\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    existing = cfg.default_config()\n    existing[\"snapshots\"][\"trigger\"] = cfg.SNAPSHOT_MANUAL\n    existing[\"contributors\"][\"enabled\"] = [\"claude\", \"codex\"]\n    (config_dir / \"config.yaml\").write_text(\n        yaml.safe_dump(existing), encoding=\"utf-8\"\n    )\n    rc = wiz.main([\n        \"--non-interactive\", \"--reconfigure\", \"--accept-defaults\",\n    ])\n    assert rc == 0\n    loaded = cfg.load(config_dir / \"config.yaml\")\n    # Reconfigure preserved both the non-default snapshot trigger AND the\n    # existing contributor list (NOT re-detected from PATH).\n    assert loaded[\"snapshots\"][\"trigger\"] == cfg.SNAPSHOT_MANUAL\n    assert loaded[\"contributors\"][\"enabled\"] == [\"claude\", \"codex\"]\n\n\ndef test_reconfigure_emits_diff(tmp_path, capsys, monkeypatch):\n    \"\"\"codex-rev-003: --reconfigure must print a before/after diff before write.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    (config_dir / \"config.yaml\").write_text(\n        yaml.safe_dump(cfg.default_config()), encoding=\"utf-8\"\n    )\n    rc = wiz.main([\n        \"--non-interactive\", \"--reconfigure\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n        \"--workflow\", \"3\",\n        \"--independence\", cfg.INDEPENDENCE_VISIBLE,\n    ])\n    out = capsys.readouterr().out\n    assert rc == 0\n    assert \"reconfigure diff\" in out\n\n\n# ---------- default-from-contributor-count ----------\n\ndef test_solo_claude_defaults_to_workflow_3(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude\",\n    ])\n    assert rc == 0\n    loaded = cfg.load(tmp_path / \".consensus\" / \"config.yaml\")\n    assert loaded[\"workflow\"][\"mode\"] == cfg.WORKFLOW_POST_REVIEW\n\n\ndef test_two_plus_contributors_defaults_to_workflow_4(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex\",\n    ])\n    assert rc == 0\n    loaded = cfg.load(tmp_path / \".consensus\" / \"config.yaml\")\n    assert loaded[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n\n\n# ---------- alias resolution ----------\n\ndef test_numeric_workflow_alias_resolves(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n\
      \    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex\",\n        \"--workflow\", \"4\",\n    ])\n    assert rc == 0\n    loaded = cfg.load(tmp_path / \".consensus\" / \"config.yaml\")\n    assert loaded[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n\n\n# ---------- .gitignore management ----------\n\ndef test_gitignore_added_when_absent(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 0\n    gi = (tmp_path / \".gitignore\").read_text(encoding=\"utf-8\")\n    assert wiz.GITIGNORE_OPEN_MARKER in gi\n    assert wiz.GITIGNORE_CLOSE_MARKER in gi\n    assert \".consensus/tmp/\" in gi\n\n\ndef test_gitignore_skipped_when_flag(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n        \"--no-update-gitignore\",\n    ])\n    assert rc == 0\n    assert not (tmp_path / \".gitignore\").exists()\n\n\ndef test_gitignore_deduplicated_on_rerun(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    wiz.main([\n        \"--non-interactive\", \"--reconfigure\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    gi2 = (tmp_path / \".gitignore\").read_text(encoding=\"utf-8\")\n    assert gi2.count(wiz.GITIGNORE_OPEN_MARKER) == 1\n    assert gi2.count(wiz.GITIGNORE_CLOSE_MARKER) == 1\n\n\ndef test_gitignore_preserves_existing_unrelated_lines(tmp_path, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    (tmp_path / \".gitignore\").write_text(\"# user content\\n*.pyc\\nbuild/\\n\", encoding=\"utf-8\")\n    wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    gi = (tmp_path / \".gitignore\").read_text(encoding=\"utf-8\")\n    assert \"# user content\" in gi\n    assert \"*.pyc\" in gi\n    assert \"build/\" in gi\n    assert wiz.GITIGNORE_OPEN_MARKER in gi\n\n\ndef test_gitignore_reversed_markers_preserve_user_lines(tmp_path, monkeypatch):\n    \"\"\"codex pass-3 rev-001: balanced-but-reversed markers (close-before-open)\n    must NOT cause the rewriter to treat downstream lines as managed content.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    reversed_content = (\n        \"# user header\\n\"\n        \"*.pyc\\n\"\n        f\"{wiz.GITIGNORE_CLOSE_MARKER}\\n\"\n        \"build/\\n\"\n        f\"{wiz.GITIGNORE_OPEN_MARKER}\\n\"\n        \"secrets.env\\n\"\n    )\n    (tmp_path / \".gitignore\").write_text(reversed_content, encoding=\"utf-8\")\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 0\n    gi = (tmp_path / \".gitignore\").read_text(encoding=\"utf-8\")\n    for kept in (\"# user header\", \"*.pyc\", \"build/\", \"secrets.env\"):\n        assert kept in gi, f\"missing preserved line {kept!r}\"\n\n\ndef test_gitignore_malformed_open_marker_preserves_user_lines(tmp_path, monkeypatch):\n    \"\"\"codex-rev-005: an unmatched open marker must NOT cause downstream user\n    content to be silently deleted. Wizard preserves all original lines and\n    appends a clean block.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    malformed = (\n        f\"# user header\\n*.pyc\\n\"\n        f\"{wiz.GITIGNORE_OPEN_MARKER}\\n\"\n        f\".consensus/tmp/\\n\"\n        # ← intentionally NO close marker\n        f\"build/\\n\"\n        f\"secrets.env\\n\"\n    )\n    (tmp_path / \".gitignore\").write_text(malformed, encoding=\"utf-8\")\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 0\n    gi = (tmp_path / \".gitignore\").read_text(encoding=\"utf-8\")\n    # All original lines preserved despite malformed marker pair.\n    for kept in (\"# user header\", \"*.pyc\", \"build/\", \"secrets.env\"):\n        assert kept in gi, f\"missing preserved line {kept!r}\"\n\n\ndef test_gitignore_malformed_marker_idempotent_on_rerun(tmp_path, monkeypatch):\n    \"\"\"codex pass-4 rev-001: with malformed markers in the user's file, repeated\n    `consensus init` runs must not accumulate duplicate managed blocks.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    malformed = (\n        f\"# user content\\n*.pyc\\n\"\n        f\"{wiz.GITIGNORE_OPEN_MARKER}\\n\"\n        f\"build/\\n\"  # orphan open marker, no close\n    )\n    (tmp_path / \".gitignore\").write_text(malformed, encoding=\"utf-8\")\n    # First run: appends managed block (and preserves all user content).\n    wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    after_first = (tmp_path / \".gitignore\").read_text(encoding=\"utf-8\")\n    # Second run: must not duplicate the managed block.\n    wiz.main([\n        \"--non-interactive\", \"--reconfigure\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    after_second = (tmp_path / \".gitignore\").read_text(encoding=\"utf-8\")\n    # Idempotency: rerun must not change the file (no duplicate managed block).\n    assert after_first == after_second\n    # The user's orphan open marker is preserved (we never silently delete it),\n    # so the open-marker count is 2 (orphan + appended block), but the managed\n    # PATHS appear exactly once.\n    for path in wiz.GITIGNORE_MANAGED_PATHS:\n        assert after_second.count(path) == 1, f\"{path!r} duplicated on rerun\"\n    # User content preserved across both runs.\n    for kept in (\"# user content\", \"*.pyc\", \"build/\"):\n        assert kept in after_first\n        assert kept in after_second\n\n\ndef test_existing_config_guard_precedes_interactive_prompt(tmp_path, capsys, monkeypatch):\n    \"\"\"codex pass-4 rev-002: exit 4 (config exists) must win over exit 1\n    (interactive abort) and exit 3 (invalid args). Even with no --non-interactive,\n    an existing config without --reconfigure/--force returns 4 without prompting.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    (config_dir / \"config.yaml\").write_text(yaml.safe_dump(cfg.default_config()), encoding=\"utf-8\")\n    # If the guard were not first, input() would be called and we'd get\n    # KeyboardInterrupt (exit 1). Stub input to raise so the test would fail\n    # loudly if the guard ran late.\n    def _explode(prompt=\"\"):\n        raise AssertionError(f\"prompt invoked but guard should have returned first: {prompt!r}\")\n    monkeypatch.setattr(builtins, \"input\", _explode)\n    rc = wiz.main([])\n    assert rc == 4\n\n\ndef test_reconfigure_diff_is_well_formed(tmp_path, capsys, monkeypatch):\n    \"\"\"codex-rev-004 (pass 2): unified diff control records and body lines\n    must each be on their own line; no run-together output.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    config_dir = tmp_path / \".consensus\"\n    config_dir.mkdir()\n    existing = cfg.default_config()\n    existing[\"snapshots\"][\"trigger\"] = cfg.SNAPSHOT_MANUAL\n    (config_dir / \"config.yaml\").write_text(yaml.safe_dump(existing), encoding=\"utf-8\")\n    rc = wiz.main([\n        \"--non-interactive\", \"--reconfigure\", \"--accept-defaults\",\n        \"--snapshot-trigger\", cfg.SNAPSHOT_ON_CLOSE,\n    ])\n    assert rc == 0\n    out = capsys.readouterr().out\n    assert \"reconfigure diff\" in out\n    # The diff prelude (---) and the proposed prelude (+++) and the @@ hunk\n    # marker must each appear on their own line.\n    for needle in (\"--- existing\", \"+++ proposed\", \"@@\"):\n        assert needle in out, f\"missing diff control line {needle!r}\"\n    # No two control records glued together.\n    assert \"--- existing+++ proposed\" not in out\n    assert \"+++ proposed@@\" not in out\n\n\n# ---------- validation ----------\n\ndef test_invalid_combo_returns_3(tmp_path, capsys, monkeypatch):\n    monkeypatch.chdir(tmp_path)\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude\",\n        \"--workflow\", \"4\",\n    ])\n    assert rc == 3\n    err = capsys.readouterr().err\n    assert \"invalid config\" in err.lower()\n\n\n# ---------- interactive mode (gemini-rev-001 / codex-rev-001) ----------\n\ndef _stub_input(responses):\n    \"\"\"Build an input() stub that pops responses left-to-right.\"\"\"\n    queue = list(responses)\n    def _fake(prompt=\"\"):\n        if not queue:\n            raise EOFError\n        return queue.pop(0)\n    return _fake\n\n\ndef test_interactive_default_path_prompts(tmp_path, monkeypatch, capsys):\n    \"\"\"No mode flags → must enter interactive path; user can accept all defaults\n    by pressing enter (empty input). With --contributors supplied, 8 prompts remain.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    monkeypatch.setattr(builtins, \"input\", _stub_input([\"\"] * 8))\n    rc = wiz.main([\"--contributors\", \"claude,codex,gemini\"])\n    assert rc == 0\n    loaded = cfg.load(tmp_path / \".consensus\" / \"config.yaml\")\n    assert loaded[\"workflow\"][\"mode\"] == cfg.WORKFLOW_PROPOSE_CONVERGE\n\n\ndef test_interactive_eof_returns_user_abort(tmp_path, monkeypatch, capsys):\n    \"\"\"codex-rev-001 / gemini-rev-001: Ctrl+D / EOF must yield exit code 1.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    def _eof(prompt=\"\"):\n        raise EOFError\n    monkeypatch.setattr(builtins, \"input\", _eof)\n    rc = wiz.main([])\n    assert rc == 1\n    err = capsys.readouterr().err\n    assert \"aborted by user\" in err\n\n\ndef test_interactive_keyboard_interrupt_returns_user_abort(tmp_path,\
      \ monkeypatch, capsys):\n    \"\"\"Ctrl+C during prompt must yield exit code 1.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    def _kbi(prompt=\"\"):\n        raise KeyboardInterrupt\n    monkeypatch.setattr(builtins, \"input\", _kbi)\n    rc = wiz.main([])\n    assert rc == 1\n\n\ndef test_interactive_user_overrides_workflow(tmp_path, monkeypatch):\n    \"\"\"User can pick non-default workflow at the prompt; remaining 6 dimensions\n    accept defaults via empty input.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    monkeypatch.setattr(builtins, \"input\", _stub_input([\n        \"claude,codex,gemini\",          # contributors\n        cfg.WORKFLOW_POST_REVIEW,       # workflow\n        cfg.CONVERGE_STRICT_MAJ,        # convergence\n        cfg.INDEPENDENCE_VISIBLE,       # independence (workflow #3 needs visible)\n        \"\",                              # finding_disposition (default)\n        \"\",                              # snapshot_trigger (default)\n        \"\",                              # snapshot_every_iterations (default)\n        \"\",                              # patch_authoring (default)\n        \"\",                              # timeout_policy (default)\n    ]))\n    rc = wiz.main([])\n    assert rc == 0\n    loaded = cfg.load(tmp_path / \".consensus\" / \"config.yaml\")\n    assert loaded[\"workflow\"][\"mode\"] == cfg.WORKFLOW_POST_REVIEW\n\n\ndef test_interactive_prompts_all_nine_dimensions(tmp_path, monkeypatch, capsys):\n    \"\"\"codex-rev-002: every configurability dimension must be prompted in\n    interactive mode (not just contributors/workflow/convergence).\"\"\"\n    monkeypatch.chdir(tmp_path)\n    monkeypatch.setattr(builtins, \"input\", _stub_input([\n        \"claude,codex,gemini\",          # contributors\n        cfg.WORKFLOW_PROPOSE_CONVERGE,  # workflow\n        cfg.CONVERGE_STRICT_MAJ,        # convergence\n        cfg.INDEPENDENCE_BLIND,         # independence\n        cfg.DISPOSITION_ALL_OR_NOTHING, # finding_disposition\n        cfg.SNAPSHOT_PERIODIC,          # snapshot_trigger (periodic to keep cadence valid)\n        \"7\",                             # snapshot_every_iterations\n        cfg.PATCH_CLAUDE_ONLY,          # patch_authoring\n        cfg.TIMEOUT_BLOCKING,           # timeout_policy\n    ]))\n    rc = wiz.main([])\n    assert rc == 0\n    loaded = cfg.load(tmp_path / \".consensus\" / \"config.yaml\")\n    assert loaded[\"snapshots\"][\"trigger\"] == cfg.SNAPSHOT_PERIODIC\n    assert loaded[\"snapshots\"][\"periodic\"][\"every_iterations\"] == 7\n    assert loaded[\"patches\"][\"authoring\"] == cfg.PATCH_CLAUDE_ONLY\n    assert loaded[\"workflow\"][\"timeout_policy\"] == cfg.TIMEOUT_BLOCKING\n\n\ndef test_interactive_defaults_reflect_cli_overrides(tmp_path, monkeypatch, capsys):\n    \"\"\"codex-rev-003: when --workflow advisory is passed, convergence prompt\n    default must be 'advisory', not the count-derived default.\"\"\"\n    monkeypatch.chdir(tmp_path)\n    captured_prompts: list[str] = []\n    queue = [\"claude,codex,gemini\", \"\", \"\", \"\", \"\", \"\", \"\", \"\"]\n    def _capturing_input(prompt=\"\"):\n        captured_prompts.append(prompt)\n        if not queue:\n            raise EOFError\n        return queue.pop(0)\n    monkeypatch.setattr(builtins, \"input\", _capturing_input)\n    rc = wiz.main([\"--workflow\", \"advisory\"])\n    assert rc == 0\n    # The convergence prompt should suggest 'advisory' as default since\n    # workflow is advisory; not 'strict-majority' (3-contributor default).\n    convergence_prompts = [p for p in captured_prompts if p.startswith(\"Convergence rule\")]\n    assert any(\"advisory\" in p for p in convergence_prompts), convergence_prompts\n\n\n# ---------- repo root detection ----------\n\ndef test_repo_root_walks_up_to_git(tmp_path, monkeypatch):\n    \"\"\"gemini-rev-002: _detect_repo_root finds .git in an ancestor directory.\"\"\"\n    repo = tmp_path / \"repo\"\n    (repo / \".git\").mkdir(parents=True)\n    sub = repo / \"src\" / \"deep\"\n    sub.mkdir(parents=True)\n    monkeypatch.chdir(sub)\n    rc = wiz.main([\n        \"--non-interactive\", \"--accept-defaults\",\n        \"--contributors\", \"claude,codex,gemini\",\n    ])\n    assert rc == 0\n    # Config landed at repo root, not at sub.\n    assert (repo / \".consensus\" / \"config.yaml\").exists()\n    assert not (sub / \".consensus\" / \"config.yaml\").exists()\n"
  context_files_contents:
    consensus_mcp/config.py: "\"\"\"Per-project `.consensus/config.yaml` schema + loader + validator.\n\nPer iter-0015 converged design (workflow #4, all three contributors agreed):\nthis module is the FIRST sub-component of the iter-0016 implementation\ndelivering the configurable workflow engine. It provides:\n\n  * Schema constants (workflow modes, independence models, convergence rules,\n    finding dispositions, snapshot triggers, patch authoring, timeout policies)\n  * `ConfigValidationError` — raised on illegal config or invalid combinations\n  * `load(path)` — parse YAML, normalize aliases + defaults, validate, return\n    the effective config dict\n  * `validate(config)` — pure check on an already-loaded dict\n  * `normalize(config)` — apply default values + alias resolution (e.g.\n    `workflow.mode: 3` → `workflow.mode: post-review`)\n  * `default_config()` — return the canonical default config dict\n  * `effective_config_sha256(config)` — deterministic hash for sealed provenance\n\nThis module does NOT load files into the engine, does NOT dispatch\ncontributors, does NOT run the wizard. Those land in iter-0016b/c/d.\n\nSchema version 1 lifecycle: schema_version=0 is the synthetic legacy mode\n(no `.consensus/config.yaml`); schema_version=1 is what iter-0016 ships.\nFuture bumps add an in-place migration command.\n\"\"\"\nfrom __future__ import annotations\n\nimport hashlib\nfrom copy import deepcopy\nfrom pathlib import Path\nfrom typing import Any\n\nimport yaml\n\n\nSCHEMA_VERSION = 1\n\n# === Workflow modes (semantic strings; CLI accepts numeric aliases 3/4) ===\nWORKFLOW_POST_REVIEW = \"post-review\"\nWORKFLOW_PROPOSE_CONVERGE = \"propose-converge\"\nWORKFLOW_ADVISORY = \"advisory\"\nVALID_WORKFLOWS = {WORKFLOW_POST_REVIEW, WORKFLOW_PROPOSE_CONVERGE, WORKFLOW_ADVISORY}\n\n# CLI numeric aliases (3 → post-review, 4 → propose-converge)\nWORKFLOW_ALIASES = {\n    \"3\": WORKFLOW_POST_REVIEW,\n    \"4\": WORKFLOW_PROPOSE_CONVERGE,\n    3: WORKFLOW_POST_REVIEW,\n    4: WORKFLOW_PROPOSE_CONVERGE,\n    # Semantic strings pass through unchanged in normalize.\n}\n\n# === Independence models ===\nINDEPENDENCE_BLIND = \"blind-first-reveal\"\nINDEPENDENCE_VISIBLE = \"visible-from-start\"\nINDEPENDENCE_SEQUENTIAL = \"sequential\"\nVALID_INDEPENDENCE = {INDEPENDENCE_BLIND, INDEPENDENCE_VISIBLE, INDEPENDENCE_SEQUENTIAL}\n\n# === Convergence rules ===\nCONVERGE_UNANIMOUS = \"unanimous\"\nCONVERGE_STRICT_MAJ = \"strict-majority\"\nCONVERGE_INCL_MAJ = \"inclusive-majority\"\nCONVERGE_ADVISORY = \"advisory\"\nVALID_CONVERGENCE = {CONVERGE_UNANIMOUS, CONVERGE_STRICT_MAJ, CONVERGE_INCL_MAJ, CONVERGE_ADVISORY}\n\n# === Finding disposition ===\nDISPOSITION_ALL_OR_NOTHING = \"all-or-nothing\"\nDISPOSITION_PER_FINDING = \"per-finding\"\nVALID_DISPOSITION = {DISPOSITION_ALL_OR_NOTHING, DISPOSITION_PER_FINDING}\n\n# === Snapshot triggers ===\nSNAPSHOT_MANUAL = \"manual-only\"\nSNAPSHOT_ON_CLOSE = \"on-iteration-close\"\nSNAPSHOT_PERIODIC = \"periodic\"\nVALID_SNAPSHOT_TRIGGER = {SNAPSHOT_MANUAL, SNAPSHOT_ON_CLOSE, SNAPSHOT_PERIODIC}\n\n# === Patch authoring ===\nPATCH_CLAUDE_ONLY = \"claude-only\"\nPATCH_ANY = \"any-contributor\"\nPATCH_NONE = \"none\"\nVALID_PATCH_AUTHORING = {PATCH_CLAUDE_ONLY, PATCH_ANY, PATCH_NONE}\n\n# === Timeout policy ===\nTIMEOUT_NO_VOTE = \"treat-as-no-vote\"\nTIMEOUT_BLOCKING = \"treat-as-blocking\"\nTIMEOUT_SHRINK = \"shrink-quorum\"\nVALID_TIMEOUT_POLICY = {TIMEOUT_NO_VOTE, TIMEOUT_BLOCKING, TIMEOUT_SHRINK}\n\n# === Allowed contributor identities (v1 closed enum per converged plan SO-5) ===\nKNOWN_CONTRIBUTORS = (\"claude\", \"codex\", \"gemini\")\nCLAUDE = \"claude\"\n\n\nclass ConfigValidationError(ValueError):\n    \"\"\"Raised on schema violation or illegal config combination.\"\"\"\n\n\ndef default_config() -> dict:\n    \"\"\"Return the canonical default `.consensus/config.yaml` structure.\n\n    Defaults assume the canonical 3-contributor setup. Operators with smaller\n    pools must override via init wizard or flags.\n    \"\"\"\n    return {\n        \"schema_version\": SCHEMA_VERSION,\n        \"project\": {\n            \"name\": None,\n            \"config_created_at_utc\": None,\n        },\n        \"workflow\": {\n            \"mode\": WORKFLOW_PROPOSE_CONVERGE,\n            \"independence\": INDEPENDENCE_BLIND,\n            \"max_convergence_rounds\": 3,\n            \"timeout_policy\": TIMEOUT_NO_VOTE,\n        },\n        \"contributors\": {\n            \"enabled\": [\"claude\", \"codex\", \"gemini\"],\n            \"adapters\": {\n                \"claude\": {\n                    \"role\": \"orchestrator\",\n                    \"can_propose\": True,\n                    \"can_review\": True,\n                    \"can_converge\": True,\n                },\n                \"codex\": {\n                    \"command\": \"codex\",\n                    \"model\": \"gpt-5.5\",\n                    \"sandbox_mode\": \"read-only\",\n                    \"can_propose\": True,\n                    \"can_review\": True,\n                    \"can_converge\": True,\n                },\n                \"gemini\": {\n                    \"command\": \"gemini\",\n                    \"model\": \"gemini-2.5-pro\",\n                    \"approval_mode\": \"plan\",\n                    \"can_propose\": True,\n                    \"can_review\": True,\n                    \"can_converge\": True,\n                },\n            },\n        },\n        \"convergence\": {\n            \"rule\": CONVERGE_STRICT_MAJ,\n            \"finding_disposition\": DISPOSITION_ALL_OR_NOTHING,\n        },\n        \"patches\": {\n            \"authoring\": PATCH_CLAUDE_ONLY,\n            \"max_patch_lines\": 600,\n        },\n        \"snapshots\": {\n            \"trigger\": SNAPSHOT_ON_CLOSE,\n            \"periodic\": {\n                \"every_iterations\": None,\n                \"every_minutes\": None,\n            },\n            \"branch\": \"consensus-state-snapshots\",\n            \"retention\": \"unbounded\",\n        },\n        \"artifacts\": {\n            \"root\": \"consensus-state\",\n            \"seal_outputs\": True,\n        },\n        \"defaults\": {\n            \"iteration_timeout_seconds\": 600,\n            \"stall_silence_seconds\": 180,\n            \"pre_first_byte_silence_seconds\": 600,\n        },\n    }\n\n\ndef _deep_merge_defaults(base: dict, overrides: dict) -> dict:\n    \"\"\"Merge overrides into base (deep, override wins for scalars; lists replaced).\"\"\"\n    out = deepcopy(base)\n    for k, v in overrides.items():\n        if k in out and isinstance(out[k], dict) and isinstance(v, dict):\n            out[k] = _deep_merge_defaults(out[k], v)\n        else:\n            out[k] = deepcopy(v)\n    return out\n\n\ndef normalize(config: dict) -> dict:\n    \"\"\"Apply defaults + alias resolution. Returns a NEW dict; does not mutate input.\n\n    Currently handles:\n      - `workflow.mode` numeric aliases (3 → post-review, 4 → propose-converge)\n      - Filling unspecified keys with defaults from `default_config()`\n\n    Does NOT validate — see `validate()` for that.\n    \"\"\"\n    if not isinstance(config, dict):\n        raise ConfigValidationError(\n            f\"config root must be a mapping, got {type(config).__name__}\"\n        )\n    normalized = _deep_merge_defaults(default_config(), config)\n    # Resolve workflow.mode aliases.\n    mode = normalized.get(\"workflow\", {}).get(\"mode\")\n    if mode in WORKFLOW_ALIASES:\n        normalized[\"workflow\"][\"mode\"] = WORKFLOW_ALIASES[mode]\n    return normalized\n\n\ndef validate(config: dict) -> None:\n    \"\"\"Validate a (preferably normalized) config dict. Raises ConfigValidationError.\n\n    Per converged-plan.yaml Section B validation rules.\n    \"\"\"\n    if not isinstance(config, dict):\n        raise ConfigValidationError(\n            f\"config root must be a mapping, got {type(config).__name__}\"\n        )\n\n    # === schema_version ===\n    sv = config.get(\"schema_version\")\n    if sv != SCHEMA_VERSION:\n        raise ConfigValidationError(\n            f\"schema_version must be {SCHEMA_VERSION}, got {sv!r}\"\n        )\n\n    # === workflow ===\n    workflow = config.get(\"workflow\", {})\n    if not isinstance(workflow, dict):\n        raise ConfigValidationError(\"'workflow' must be a mapping\")\n    mode = workflow.get(\"mode\")\n    if mode not in VALID_WORKFLOWS:\n        raise ConfigValidationError(\n            f\"workflow.mode={mode!r} not in {sorted(VALID_WORKFLOWS)}\"\n        )\n    independence = workflow.get(\"independence\")\n    if independence not in VALID_INDEPENDENCE:\n        raise ConfigValidationError(\n            f\"workflow.independence={independence!r} not in {sorted(VALID_INDEPENDENCE)}\"\n        )\n    timeout_policy = workflow.get(\"timeout_policy\", TIMEOUT_NO_VOTE)\n    if timeout_policy not in VALID_TIMEOUT_POLICY:\n        raise ConfigValidationError(\n            f\"workflow.timeout_policy={timeout_policy!r} not in {sorted(VALID_TIMEOUT_POLICY)}\"\n        )\n    max_rounds = workflow.get(\"max_convergence_rounds\", 3)\n    if not isinstance(max_rounds, int) or max_rounds < 1:\n        raise ConfigValidationError(\n            f\"workflow.max_convergence_rounds must be positive int, got {max_rounds!r}\"\n        )\n\n    # === contributors ===\n    contributors = config.get(\"contributors\", {})\n    if not isinstance(contributors, dict):\n        raise ConfigValidationError(\"'contributors' must be a mapping\")\n    enabled = contributors.get(\"enabled\", [])\n    if not isinstance(enabled, list) or not enabled:\n        raise ConfigValidationError(\n            \"contributors.enabled must be a non-empty list\"\n        )\n    if len(set(enabled)) != len(enabled):\n        raise ConfigValidationError(\n            f\"contributors.enabled must be unique; got {enabled!r}\"\n        )\n    for c in enabled:\n        if c not in KNOWN_CONTRIBUTORS:\n      \
      \      raise ConfigValidationError(\n                f\"contributors.enabled contains unknown identifier {c!r}; \"\n                f\"v1 supports {KNOWN_CONTRIBUTORS}\"\n            )\n    if CLAUDE not in enabled:\n        raise ConfigValidationError(\n            f\"contributors.enabled must contain 'claude' (orchestrator); got {enabled!r}\"\n        )\n    adapters = contributors.get(\"adapters\", {})\n    if not isinstance(adapters, dict):\n        raise ConfigValidationError(\"contributors.adapters must be a mapping\")\n    for c in enabled:\n        if c not in adapters:\n            raise ConfigValidationError(\n                f\"contributors.enabled contains {c!r} but contributors.adapters.{c} is missing\"\n            )\n\n    # === convergence ===\n    convergence = config.get(\"convergence\", {})\n    if not isinstance(convergence, dict):\n        raise ConfigValidationError(\"'convergence' must be a mapping\")\n    rule = convergence.get(\"rule\")\n    if rule not in VALID_CONVERGENCE:\n        raise ConfigValidationError(\n            f\"convergence.rule={rule!r} not in {sorted(VALID_CONVERGENCE)}\"\n        )\n    disposition = convergence.get(\"finding_disposition\")\n    if disposition not in VALID_DISPOSITION:\n        raise ConfigValidationError(\n            f\"convergence.finding_disposition={disposition!r} not in {sorted(VALID_DISPOSITION)}\"\n        )\n\n    # === Cross-validation rules per converged-plan.yaml ===\n    n_contributors = len(enabled)\n\n    # Rule: workflow.mode=propose-converge requires N>=2\n    if mode == WORKFLOW_PROPOSE_CONVERGE and n_contributors < 2:\n        raise ConfigValidationError(\n            f\"workflow.mode=propose-converge requires at least 2 contributors; \"\n            f\"got {n_contributors} ({enabled!r}). Use post-review or advisory for solo setups.\"\n        )\n\n    # Rule: workflow.mode=propose-converge forces all-or-nothing disposition (D5 majority)\n    if mode == WORKFLOW_PROPOSE_CONVERGE and disposition != DISPOSITION_ALL_OR_NOTHING:\n        raise ConfigValidationError(\n            f\"workflow.mode=propose-converge requires \"\n            f\"convergence.finding_disposition=all-or-nothing; \"\n            f\"got {disposition!r}. Per iter-0015 majority resolution, per-finding \"\n            f\"is restricted to post-review and advisory for v1.\"\n        )\n\n    # Rule: advisory mode requires advisory convergence rule\n    if mode == WORKFLOW_ADVISORY and rule != CONVERGE_ADVISORY:\n        raise ConfigValidationError(\n            f\"workflow.mode=advisory requires convergence.rule=advisory; got {rule!r}\"\n        )\n    # And vice versa: advisory rule only valid in advisory mode\n    if rule == CONVERGE_ADVISORY and mode != WORKFLOW_ADVISORY:\n        raise ConfigValidationError(\n            f\"convergence.rule=advisory valid only when workflow.mode=advisory; \"\n            f\"got workflow.mode={mode!r}\"\n        )\n\n    # Rule: strict-majority with N=1 is invalid\n    if rule == CONVERGE_STRICT_MAJ and n_contributors == 1:\n        raise ConfigValidationError(\n            \"convergence.rule=strict-majority is invalid with only 1 contributor; \"\n            \"use unanimous or advisory\"\n        )\n\n    # Rule: sequential independence requires N>=2\n    if independence == INDEPENDENCE_SEQUENTIAL and n_contributors < 2:\n        raise ConfigValidationError(\n            f\"workflow.independence=sequential requires at least 2 contributors; \"\n            f\"got {n_contributors}\"\n        )\n\n    # === patches ===\n    patches = config.get(\"patches\", {})\n    if not isinstance(patches, dict):\n        raise ConfigValidationError(\"'patches' must be a mapping\")\n    authoring = patches.get(\"authoring\")\n    if authoring not in VALID_PATCH_AUTHORING:\n        raise ConfigValidationError(\n            f\"patches.authoring={authoring!r} not in {sorted(VALID_PATCH_AUTHORING)}\"\n        )\n    max_patch_lines = patches.get(\"max_patch_lines\", 600)\n    if not isinstance(max_patch_lines, int) or max_patch_lines < 0:\n        raise ConfigValidationError(\n            f\"patches.max_patch_lines must be non-negative int, got {max_patch_lines!r}\"\n        )\n\n    # === snapshots ===\n    snapshots = config.get(\"snapshots\", {})\n    if not isinstance(snapshots, dict):\n        raise ConfigValidationError(\"'snapshots' must be a mapping\")\n    trigger = snapshots.get(\"trigger\")\n    if trigger not in VALID_SNAPSHOT_TRIGGER:\n        raise ConfigValidationError(\n            f\"snapshots.trigger={trigger!r} not in {sorted(VALID_SNAPSHOT_TRIGGER)}\"\n        )\n    periodic = snapshots.get(\"periodic\", {})\n    if not isinstance(periodic, dict):\n        raise ConfigValidationError(\"snapshots.periodic must be a mapping\")\n    every_iters = periodic.get(\"every_iterations\")\n    every_mins = periodic.get(\"every_minutes\")\n    if trigger == SNAPSHOT_PERIODIC:\n        if every_iters is None and every_mins is None:\n            raise ConfigValidationError(\n                \"snapshots.trigger=periodic requires at least one of \"\n                \"snapshots.periodic.every_iterations or every_minutes\"\n            )\n        if every_iters is not None and (not isinstance(every_iters, int) or every_iters < 1):\n            raise ConfigValidationError(\n                f\"snapshots.periodic.every_iterations must be positive int, got {every_iters!r}\"\n            )\n        if every_mins is not None and (not isinstance(every_mins, int) or every_mins < 1):\n            raise ConfigValidationError(\n                f\"snapshots.periodic.every_minutes must be positive int, got {every_mins!r}\"\n            )\n    else:\n        # Non-periodic trigger: both periodic fields must be null\n        if every_iters is not None or every_mins is not None:\n            raise ConfigValidationError(\n                f\"snapshots.trigger={trigger!r} requires \"\n                f\"snapshots.periodic.every_iterations/every_minutes to be null; \"\n                f\"got every_iterations={every_iters!r}, every_minutes={every_mins!r}\"\n            )\n\n\ndef load(path: Path) -> dict:\n    \"\"\"Load `.consensus/config.yaml` from path. Returns normalized + validated dict.\n\n    Raises:\n      ConfigValidationError on malformed YAML, missing schema_version, or\n        illegal combination.\n      OSError on file-read failure (caller decides legacy-mode fallback).\n    \"\"\"\n    text = Path(path).read_text(encoding=\"utf-8\")\n    try:\n        raw = yaml.safe_load(text)\n    except yaml.YAMLError as exc:\n        raise ConfigValidationError(f\"malformed YAML in {path}: {exc}\") from exc\n    normalized = normalize(raw)\n    validate(normalized)\n    return normalized\n\n\ndef effective_config_sha256(config: dict) -> str:\n    \"\"\"Deterministic sha256 of a config dict (canonical YAML form).\n\n    Used by the engine to stamp goal_packets with `config_sha256` so sealed\n    artifacts can prove which config governed dispatch.\n    \"\"\"\n    canonical = yaml.safe_dump(config, sort_keys=True, default_flow_style=False)\n    return hashlib.sha256(canonical.encode(\"utf-8\")).hexdigest()\n\n\ndef is_legacy_mode_repo(repo_root: Path) -> bool:\n    \"\"\"True iff `.consensus/config.yaml` is absent at the repo root.\n\n    Engine uses this to decide between loading config vs entering legacy mode.\n    \"\"\"\n    return not (Path(repo_root) / \".consensus\" / \"config.yaml\").is_file()\n\n\ndef synthesize_legacy_config(repo_root: Path) -> dict:\n    \"\"\"Return the synthetic schema_version=0 'legacy mode' config.\n\n    Per converged-plan.yaml Section D: when `.consensus/config.yaml` is absent,\n    the engine emulates pre-iter-0015 behavior. This helper returns the dict\n    representing that behavior so the engine has a uniform config object to\n    consume regardless of whether real config exists.\n\n    Schema_version=0 is INTENTIONALLY not 1 — it's a sentinel marking legacy\n    synthesis. validate() rejects it; the engine uses a separate code path.\n    \"\"\"\n    return {\n        \"schema_version\": 0,  # sentinel: legacy synthesis\n        \"project\": {\"name\": Path(repo_root).name, \"config_created_at_utc\": None},\n        \"workflow\": {\n            \"mode\": WORKFLOW_POST_REVIEW,\n            \"independence\": INDEPENDENCE_VISIBLE,\n            \"max_convergence_rounds\": 1,\n            \"timeout_policy\": TIMEOUT_NO_VOTE,\n        },\n        \"contributors\": {\n            \"enabled\": [\"claude\", \"codex\"],\n            \"adapters\": {\n                \"claude\": {\n                    \"role\": \"orchestrator\",\n                    \"can_propose\": True,\n                    \"can_review\": True,\n                    \"can_converge\": False,\n                },\n                \"codex\": {\n                    \"command\": \"codex\",\n                    \"model\": \"gpt-5.5\",\n                    \"sandbox_mode\": \"read-only\",\n                    \"can_propose\": False,\n                    \"can_review\": True,\n                    \"can_converge\": False,\n                },\n            },\n        },\n        \"convergence\": {\n            \"rule\": CONVERGE_UNANIMOUS,\n            \"finding_disposition\": DISPOSITION_ALL_OR_NOTHING,\n        },\n        \"patches\": {\"authoring\": PATCH_CLAUDE_ONLY, \"max_patch_lines\": 600},\n        \"snapshots\": {\n            \"trigger\": SNAPSHOT_MANUAL,\n            \"periodic\": {\"every_iterations\": None, \"every_minutes\": None},\n            \"branch\": \"consensus-state-snapshots\",\n            \"retention\": \"unbounded\",\n        },\n        \"artifacts\": {\"root\": \"consensus-state\", \"seal_outputs\": True},\n        \"defaults\": {\n            \"iteration_timeout_seconds\": 600,\n            \"stall_silence_seconds\": 180,\n            \"pre_first_byte_silence_seconds\": 600,\n        },\n        \"_legacy_mode_synthesis\": True,\n    }\n"
