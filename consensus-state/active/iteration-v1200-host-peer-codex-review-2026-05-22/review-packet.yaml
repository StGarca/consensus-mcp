      @@ -0,0 +1,197 @@\n+\"\"\"Host-peer contributor adapter — same-family blind\
      \ SWE-reviewer (v1.20.0).\n+\n+Per docs/design-consults/v1.20.0-host-peer-agent.md\
      \ (converged design): a\n+`kind: host_peer` contributor runs the host's OWN\
      \ AI family (e.g. claude when\n+claude hosts) as a *fresh-context, adversarial*\
      \ code reviewer. It is:\n+\n+  * **supplementary** — it augments cross-family\
      \ review, never replaces it; and\n+  * **EXCLUDED from the cross-family closure\
      \ invariant** — its sealed artifact\n+    carries `gate_eligible == False`,\
      \ so `_closure_invariant.check_closure_invariant`\n+    can never treat it as\
      \ the different-family signer (even when its family\n+    differs from the mutator's\
      \ — the host is not independent of its own\n+    orchestration).\n+\n+Like ClaudeAdapter\
      \ it does NOT shell out: it accepts a DEDICATED host review\n+callback (separate\
      \ from the orchestrator's `claude_artifact_callback`) so the\n+reviewer seam\
      \ is explicitly a fresh-context blind reviewer, never the\n+orchestrator's own\
      \ voice/context. `dispatch(packet)` invokes the callback with\n+ONLY the phase\
      \ DispatchPacket (structural blindness — no peer artifacts), then\n+stamps the\
      \ canonical host_peer provenance and seals a normal SealedArtifact via\n+the\
      \ shared T6 (review.write_and_seal) path.\n+\n+Fresh-context isolation is a\
      \ host-runtime CONTRACT (consensus-mcp cannot prove\n+memory isolation) — recorded\
      \ via the independence_attestation, documented as a\n+contract, not a mechanical\
      \ guarantee.\n+\"\"\"\n+from __future__ import annotations\n+\n+import shutil\n\
      +from pathlib import Path\n+from typing import Callable\n+\n+from consensus_mcp.contributors.base\
      \ import (\n+    ContributorAdapter,\n+    DispatchError,\n+    DispatchPacket,\n\
      +    SealedArtifact,\n+)\n+\n+# Canonical, non-negotiable provenance for a host_peer\
      \ artifact. The adapter\n+# stamps these regardless of any profile-supplied\
      \ values so a host_peer can\n+# NEVER be laundered as an independent cross-family\
      \ signer.\n+_ROLE_SWE_REVIEWER = \"swe_reviewer\"\n+_WEIGHT_SUPPLEMENTARY =\
      \ \"supplementary\"\n+\n+\n+class HostPeerAdapter(ContributorAdapter):\n+  \
      \  \"\"\"Same-family blind SWE-reviewer. No subprocess; uses a dedicated host\n\
      +    review callback to materialize the review artifact, then seals it with\
      \ the\n+    canonical supplementary / gate_eligible=False provenance.\n+   \
      \ \"\"\"\n+\n+    name = \"host_peer\"\n+\n+    def __init__(\n+        self,\n\
      +        adapter_config: dict | None = None,\n+        *,\n+        host_peer_review_callback:\
      \ Callable[[DispatchPacket], dict] | None = None,\n+    ):\n+        super().__init__(adapter_config)\n\
      +        self.host_peer_review_callback = host_peer_review_callback\n+     \
      \   # `family` + `role` come from the profile/adapter config; `family`\n+  \
      \      # MUST be the host family (the engine factory passes the profile's\n\
      +        # `family`). `role` defaults to swe_reviewer.\n+        self.family\
      \ = self.adapter_config.get(\"family\")\n+        self.role = self.adapter_config.get(\"\
      role\") or _ROLE_SWE_REVIEWER\n+\n+    def dispatch(self, packet: DispatchPacket)\
      \ -> SealedArtifact:\n+        if self.host_peer_review_callback is None:\n\
      +            raise DispatchError(\n+                \"HostPeerAdapter has no\
      \ host_peer_review_callback set; cannot \"\n+                \"dispatch. The\
      \ engine factory only builds host_peer when a \"\n+                \"dedicated\
      \ callback is wired; tests pass a fake.\"\n+            )\n+        if not self.family:\n\
      +            raise DispatchError(\n+                \"HostPeerAdapter requires\
      \ a 'family' in adapter_config (the host \"\n+                \"model family);\
      \ none was provided.\"\n+            )\n+\n+        # --- Structural blindness:\
      \ invoke the callback with ONLY the packet ---\n+        # No peer artifacts,\
      \ no revealed proposals, no orchestrator context.\n+        try:\n+        \
      \    artifact_dict = self.host_peer_review_callback(packet)\n+        except\
      \ Exception as exc:\n+            raise DispatchError(\n+                f\"\
      host_peer review callback raised ({type(exc).__name__}): {exc}\"\n+        \
      \    ) from exc\n+\n+        if not isinstance(artifact_dict, dict):\n+    \
      \        raise DispatchError(\n+                f\"host_peer review callback\
      \ must return dict; got \"\n+                f\"{type(artifact_dict).__name__}\"\
      \n+            )\n+\n+        # Required fields per sealed-artifact contract\
      \ (same as ClaudeAdapter).\n+        for required in (\"findings\", \"goal_satisfied\"\
      , \"blocking_objections\"):\n+            if required not in artifact_dict:\n\
      +                raise DispatchError(\n+                    f\"host_peer artifact\
      \ missing required field {required!r}\"\n+                )\n+\n+        # ---\
      \ Identifiers ---\n+        reviewer_id = packet.reviewer_id or artifact_dict.get(\n\
      +            \"reviewer_id\",\n+            f\"{packet.contributor}-{packet.iteration_dir.name}-{packet.phase}-1\"\
      ,\n+        )\n+        pass_id = packet.pass_id or artifact_dict.get(\n+  \
      \          \"pass_id\", f\"{reviewer_id}-pass1\"\n+        )\n+        iteration_id\
      \ = artifact_dict.get(\"iteration_id\", packet.iteration_dir.name)\n+\n+   \
      \     # --- Canonical host_peer provenance (authoritative; overrides callback)\
      \ ---\n+        independence_attestation = {\n+            \"method\": \"host_peer_callback\"\
      ,\n+            \"fresh_context\": True,\n+            \"no_peer_review_visible_at_dispatch\"\
      : True,\n+        }\n+        dispatch_provenance = {\n+            \"adapter\"\
      : \"host_peer\",\n+            \"family\": self.family,\n+            \"role\"\
      : self.role,\n+            \"weight\": _WEIGHT_SUPPLEMENTARY,\n+           \
      \ \"gate_eligible\": False,\n+            \"independence_attestation\": independence_attestation,\n\
      +        }\n+\n+        # Spread the callback dict first, then assign canonical\
      \ fields LAST so\n+        # they authoritatively override anything the callback\
      \ emitted. The\n+        # `actor` carries model_family + role so the closure\
      \ invariant + results\n+        # log can identify the same-family supplementary\
      \ reviewer; the top-level\n+        # `gate_eligible`/`weight` are what the\
      \ closure invariant keys on when\n+        # this artifact is the closing verdict.\n\
      +        full_artifact = {\n+            **artifact_dict,\n+            \"iteration_id\"\
      : iteration_id,\n+            \"reviewer_id\": reviewer_id,\n+            \"\
      pass_id\": pass_id,\n+            \"actor\": {\n+                \"id\": reviewer_id,\n\
      +                \"model_family\": self.family,\n+                \"role\":\
      \ self.role,\n+                \"pass_id\": pass_id,\n+            },\n+   \
      \         \"gate_eligible\": False,\n+            \"weight\": _WEIGHT_SUPPLEMENTARY,\n\
      +            \"role\": self.role,\n+            \"independence_attestation\"\
      : independence_attestation,\n+            \"dispatch_provenance\": dispatch_provenance,\n\
      +        }\n+\n+        # --- Seal via T6 (review.write_and_seal) — shared seal\
      \ path ---\n+        from consensus_mcp.tools.review_write_and_seal import handle\
      \ as t6_handle\n+        t6_result = t6_handle(\n+            iteration_id=iteration_id,\n\
      +            reviewer_id=reviewer_id,\n+            pass_id=pass_id,\n+    \
      \        packet=full_artifact,\n+        )\n+        if \"error\" in t6_result:\n\
      +            raise DispatchError(\n+                f\"host_peer T6 seal failed:\
      \ {t6_result.get('error')!r}\"\n+            )\n+\n+        archive_path = Path(t6_result[\"\
      sealed_path\"]).resolve()\n+        # Confinement check mirroring ClaudeAdapter:\
      \ the returned sealed_path\n+        # MUST be a regular file AND its filename\
      \ MUST encode the iteration_id +\n+        # reviewer_id we asked T6 to seal,\
      \ so a misconfigured/tampered T6 cannot\n+        # leak an arbitrary file into\
      \ the iteration via the trusted-path return.\n+        if not archive_path.is_file():\n\
      +            raise DispatchError(\n+                f\"host_peer T6 returned\
      \ a non-file sealed_path: {archive_path}\"\n+            )\n+        fname =\
      \ archive_path.name\n+        for token in (iteration_id, reviewer_id):\n+ \
      \           if token and token not in fname:\n+                raise DispatchError(\n\
      +                    f\"host_peer T6 sealed_path filename {fname!r} does not\
      \ contain \"\n+                    f\"expected token {token!r}; refusing to\
      \ copy unverified file \"\n+                    f\"into iteration_dir (potential\
      \ confinement violation)\"\n+                )\n+\n+        # Mirror the sealed\
      \ file into the iteration dir for symmetric on-disk\n+        # layout (named\
      \ distinctly from claude-<phase>.yaml so the orchestrator's\n+        # own\
      \ review and the host_peer review never collide).\n+        local_path = packet.iteration_dir\
      \ / f\"host-peer-{packet.phase}.yaml\"\n+        shutil.copyfile(str(archive_path),\
      \ str(local_path))\n+\n+        return SealedArtifact(\n+            contributor=self.name,\n\
      +            phase=packet.phase,\n+            pass_id=pass_id,\n+         \
      \   sealed_path=local_path,\n+            archive_sealed_path=archive_path,\n\
      +            packet_sha256=t6_result.get(\"packet_sha256\", \"\"),\n+      \
      \      parsed=full_artifact,\n+        )\ndiff --git a/consensus_mcp/dispatch_templates/host_peer_review_template.md\
      \ b/consensus_mcp/dispatch_templates/host_peer_review_template.md\nnew file\
      \ mode 100644\nindex 0000000..f0e35a2\n--- /dev/null\n+++ b/consensus_mcp/dispatch_templates/host_peer_review_template.md\n\
      @@ -0,0 +1,94 @@\n+You are a FRESH-CONTEXT, ADVERSARIAL software-engineering\
      \ reviewer. You share\n+the host's AI family (e.g. you are Claude when Claude\
      \ hosts), but you are running\n+as an INDEPENDENT review pass with NO memory\
      \ of the orchestrator's reasoning,\n+synthesis, or prior decisions. You have\
      \ NOT seen any other reviewer's findings.\n+\n+Your job is to find what the\
      \ anchored author missed: correctness bugs,\n+spec-conformance gaps, and edge\
      \ cases. You are SUPPLEMENTARY — your review\n+augments the cross-family reviewers,\
      \ it does NOT close the loop and is NOT\n+counted as cross-family signoff. Review\
      \ honestly and adversarially; do not\n+rubber-stamp.\n+\n+# Goal\n+\n+{goal_summary}\n\
      +\n+# Touched-file contents (authoritative source)\n+\n+The current contents\
      \ of the files under review are embedded below. Read these\n+AS IF they are\
      \ the actual repository state. Do NOT attempt to read files from\n+disk. Use\
      \ ONLY the embedded contents below as your authoritative source.\n+\n+{touched_files_contents_block}\n\
      +\n+# Desired end state\n+\n+{desired_end_state}\n+\n+# Allowed files (in-scope;\
      \ everything else is OUT of scope)\n+\n+{allowed_files}\n+\n+# Acceptance gates\n\
      +\n+{acceptance_gates}\n+\n+# Review target\n+\n+iteration_dir: {iteration_dir}\n\
      +review_target_path: {review_target_path}\n+review_target_hash (sha256): {review_target_hash}\n\
      +\n+You MUST review ONLY the content at review_target_path / the embedded touched\n\
      +files. Do not infer the review surface from a dirty repository.\n+\n+# What\
      \ to look for (adversarial SWE review)\n+\n+1. **Correctness** — logic bugs,\
      \ off-by-one, wrong conditionals, mishandled\n+   None/empty/error paths, race\
      \ conditions, resource leaks, incorrect data flow.\n+2. **Spec-conformance**\
      \ — does the change actually meet `desired_end_state`?\n+   Silent scope drift?\
      \ Missing requirements? Behavior that contradicts the goal?\n+3. **Edge cases**\
      \ — boundary inputs, empty collections, unicode/encoding,\n+   concurrency,\
      \ platform differences, failure-mode/fail-closed behavior.\n+4. **Test adequacy**\
      \ — do the tests actually exercise the change? Coverage shed\n+   by a rewrite?\
      \ Assertions that can't fail?\n+\n+Cite file:line for every finding. Do NOT\
      \ manufacture findings to look diligent —\n+an empty findings list is a valid\
      \ review.\n+\n+# Output format — STRICT (JSON only)\n+\n+Your final message\
      \ MUST be a single JSON object matching the shared review\n+schema shape below.\
      \ No prose outside the JSON.\n+\n+```json\n+{\n+  \"findings\": [\n+    {\n\
      +      \"id\": \"claude-swe-rev-NNN\",          // REQUIRED, e.g. claude-swe-rev-001\n\
      +      \"severity\": \"low|medium|high|blocking|critical\",\n+      \"summary\"\
      : \"<one-line description>\",\n+      \"citation\": \"<file:line>\",\n+    \
      \  \"risk\": \"<impact statement>\",\n+      \"recommendation\": \"<action>\"\
      \n+    }\n+  ],\n+  \"goal_satisfied\": true,                    // REQUIRED,\
      \ boolean\n+  \"goal_satisfied_rationale\": \"<why>\",       // REQUIRED, non-empty\
      \ string\n+  \"blocking_objections\": []                  // REQUIRED, list\
      \ of finding IDs\n+                                             // (the SET\
      \ of ids with severity\n+                                             //  blocking|critical)\n\
      +}\n+```\n+\n+Rules:\n+- `id` is a canonical identifier (`claude-swe-rev-<digits>`),\
      \ NOT narrative text.\n+- `blocking_objections` == the set of finding ids whose\
      \ severity is\n+  `blocking` or `critical`.\n+- `goal_satisfied: true` REQUIRES\
      \ `blocking_objections: []`.\n+- If you have no findings: `findings: []`, `blocking_objections:\
      \ []`,\n+  `goal_satisfied: true`, with a one-sentence rationale.\n+\n+You are\
      \ a reviewer only. Do NOT author patches, do NOT mark anything verified,\n+and\
      \ do NOT claim cross-family signoff — your verdict is supplementary by\n+construction.\n\
      diff --git a/consensus_mcp/dispatch_templates/orchestrator_role.md b/consensus_mcp/dispatch_templates/orchestrator_role.md\n\
      new file mode 100644\nindex 0000000..b20557a\n--- /dev/null\n+++ b/consensus_mcp/dispatch_templates/orchestrator_role.md\n\
      @@ -0,0 +1,46 @@\n+You are the ORCHESTRATOR (the in-process host running the\
      \ consensus loop). This\n+role is NEUTRAL and PROCEDURAL. It is deliberately\
      \ SEPARATE from the host_peer\n+SWE-reviewer role: the integrator must never\
      \ blind-review its own synthesis.\n+\n+# Your responsibilities\n+\n+1. **Scope**\
      \ — author and hold the goal_packet scope (allowed_files /\n+   forbidden_files\
      \ / acceptance_gates). Keep every contributor inside scope;\n+   flag scope\
      \ drift as a governance matter, not as a substantive finding.\n+\n+2. **Preserve\
      \ blind-first-reveal** — dispatch the blind PROPOSE / REVIEW phase\n+   FIRST:\
      \ each contributor sees only the problem statement / change under\n+   review,\
      \ NEVER a peer's artifact. Reveal sibling proposals ONLY in the\n+   explicit\
      \ CONVERGE phase. Do not leak one contributor's output into another's\n+   blind\
      \ phase.\n+\n+3. **Synthesize AFTER reveal** — perform weighted synthesis (weigh\
      \ all good\n+   ideas) only once every blind artifact is sealed and revealed.\
      \ Do not pre-\n+   commit to one contributor's framing before the reveal.\n\
      +\n+4. **Enforce gates** — apply the cross-family closure invariant: the closer's\n\
      +   model_family MUST differ from the last mutator's, the review_target_hash\
      \ MUST\n+   bind to the post-mutation state, and the verdict MUST be fresh.\
      \ A\n+   supplementary same-family reviewer (host_peer, `gate_eligible=false`)\
      \ can\n+   NEVER satisfy cross-family signoff — a genuinely external, gate-eligible\n\
      +   family is always required.\n+\n+5. **Anti-anchoring** — do not let the first\
      \ or loudest proposal anchor the\n+   outcome. Treat fast unanimity as a verify-harder\
      \ flag (convergence measures\n+   agreement, not truth), not as confirmation.\n\
      +\n+6. **Label same-family artifacts** — when a host_peer or other same-family\n\
      +   reviewer contributes, surface its findings as SUPPLEMENTARY / same-family\
      \ in\n+   the results record. Same-family agreement must never be laundered\
      \ as\n+   independent cross-family confirmation.\n+\n+# What this role is NOT\n\
      +\n+- You are NOT the adversarial SWE-reviewer. That is a distinct, fresh-context\n\
      +  role with its own prompt (host_peer_review_template.md) and its own context.\n\
      +- You do NOT blind-review your own synthesis.\n+- You do NOT count your own\
      \ voice as cross-family independence.\n+\n+Operate procedurally. Your output\
      \ is orchestration state and synthesis, sealed\n+through the normal artifact\
      \ path — not a closing verdict that substitutes for a\n+cross-family signer.\n\
