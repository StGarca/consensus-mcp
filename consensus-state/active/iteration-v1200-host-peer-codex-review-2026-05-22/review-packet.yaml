      \ it landed as expected. Be adversarial.\n\n## What to review\nThe full feature\
      \ diff is embedded as `v1.20.0-feature.diff` (cf4fe11..0e47cb6).\nThe converged\
      \ design it must match is embedded as\n`v1.20.0-host-peer-agent.md`.\n\n## Confirm\
      \ (and flag any deviation/bug/risk, with severity)\n1. **LOAD-BEARING SAFETY\
      \ — the cross-family closure invariant must NOT be\n   weakened.** `_closure_invariant.py`\
      \ adds `closer_gate_excluded =\n   closing_verdict.get(\"gate_eligible\") is\
      \ False` and ANDs `not\n   closer_gate_excluded` into `cross_family`. Verify:\
      \ (a) a host_peer\n   (gate_eligible=false) can NEVER be the different-family\
      \ signer that closes a\n   mutation — even when its family DIFFERS from the\
      \ mutator's; (b) the change is\n   purely additive — every existing closer (no\
      \ gate_eligible key, or\n   gate_eligible truthy/None) behaves EXACTLY as before\
      \ (`is False` is\n   literal-only); (c) no other closure logic (hash_match,\
      \ freshness) is touched.\n2. **HostPeerAdapter** (`contributors/host_peer_adapter.py`,\
      \ NEW): blind — invoked\n   with ONLY the phase DispatchPacket, no peer artifacts;\
      \ seals a normal artifact;\n   provenance authoritatively stamped (cannot be\
      \ overridden by the callback):\n   family==host, role=swe_reviewer, weight=supplementary,\
      \ gate_eligible=false,\n   independence_attestation{method,fresh_context,no_peer_review_visible};\
      \ NEVER\n   shells out; fails closed when no callback / no family.\n3. **_engine_factory**:\
      \ routes kind:host_peer → HostPeerAdapter; threads a\n   DEDICATED host_peer\
      \ review callback (separate from claude_artifact_callback);\n   builds host_peer\
      \ ONLY when that callback is wired (graceful absence — existing\n   configs/flows\
      \ unchanged).\n4. **Design conformance**: dedicated callback (not reusing claude_artifact_callback);\n\
      \   supplementary weighting does not count toward the cross-family quorum; results\n\
      \   record tags supplementary same-family reviewers separately; wizard caveat\
      \ is\n   accurate (\"NOT independent multi-AI consensus, same model as host\"\
      ).\n5. **Anything else**: bugs, edge cases, schema mismatches, provenance that\
      \ could\n   be spoofed by a malicious/buggy callback, gate_eligible bypasses,\
      \ test gaps.\n\n## Output\nPer-finding: severity (blocking/high/medium/low),\
      \ file:line citation, the issue,\nand a recommended fix. If everything landed\
      \ correctly, say so explicitly per\nitem. The #1 question: can a same-family\
      \ host_peer EVER satisfy cross-family\nclosure? If yes anywhere, that's BLOCKING.\n"
