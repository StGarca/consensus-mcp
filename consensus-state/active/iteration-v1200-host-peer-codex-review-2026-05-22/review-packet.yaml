    docs/design-consults/v1.20.0-host-peer-agent.md: "# v1.20.0 — Host-family specialist\
      \ agents (converged design)\n\n**Status:** converged via 4-way Workflow A consult\
      \ (claude + codex + gemini +\nkimi), iteration `host-family-agents-design-2026-05-22`.\
      \ Implementation spec.\nWorkflow B review skipped per operator.\n\n## What\n\
      1. A same-family **blind SWE-reviewer** contributor — `kind: host_peer` — that\n\
      \   runs the host's own AI family (e.g. Claude when Claude hosts) as a *fresh-\n\
      \   context, adversarial* code reviewer. It is **supplementary** and **excluded\n\
      \   from the cross-family closure invariant** — it augments cross-family review,\n\
      \   never replaces it.\n2. A distinct **orchestrator role** (the existing in-process\
      \ host): neutral\n   scoping, synthesis, gate-enforcement, anti-anchoring —\
      \ separated from the\n   reviewer so the integrator never blind-reviews its\
      \ own synthesis.\n\n## Why\nSame-model review shares blind spots, and same-family\
      \ agreement is the shared-\nprior trap (low information). But a *fresh-context*\
      \ same-family reviewer with an\nadversarial prompt is a cheap \"second independent\
      \ sample\" that catches careless\nslips, spec drift, and missed edge cases the\
      \ host's anchored context overlooked —\nwithout needing a CLI (the host has\
      \ no `claude` shell binary).\n\n## Decision (option (b), unanimous)\n- **`KIND_HOST_PEER='host_peer'`**\
      \ profile kind (beside `cli_reviewer` + reserved\n  `host`); requires `family`\
      \ + `role`.\n- **`HostPeerAdapter(ContributorAdapter)`**: `dispatch()` calls\
      \ a host review\n  callback with the phase `DispatchPacket` only (structural\
      \ blindness), seals a\n  normal `SealedArtifact`, tags `family == host`, `role=swe_reviewer`,\n\
      \  `gate_eligible=false`, `weight=supplementary`. Never shells out.\n- **Dedicated\
      \ callback** (separate from the orchestrator's\n  `claude_artifact_callback`)\
      \ so the reviewer seam is explicitly a fresh-context\n  blind reviewer, never\
      \ the orchestrator's own voice/context. Build only when the\n  callback is wired;\
      \ otherwise host_peer is gracefully absent.\n- **Gate exclusion — two layers:**\
      \ (1) explicit data — the closure check ignores\n  any artifact with `gate_eligible==false`\
      \ when seeking a different-family signer\n  (so host_peer can NEVER close, even\
      \ when its family differs from the mutator —\n  the host is not independent\
      \ of its own orchestration); (2) automatic — host_peer\n  `family==host` already\
      \ fails the existing cross-family check when host is the\n  mutator. **Load-bearing\
      \ regression test:** `[host + host_peer]` cannot close a\n  host-authored change,\
      \ and a claude host_peer cannot satisfy cross-family signoff\n  for a codex-authored\
      \ change — a genuinely external family is always required.\n- **Role split:**\
      \ distinct prompts — `host_peer_review_template.md` (adversarial:\n  correctness,\
      \ spec-conformance, edge cases) and `orchestrator_role.md` (neutral,\n  anti-anchoring,\
      \ synthesize-after-reveal). Enforced by separate prompts +\n  contexts + the\
      \ adapter kind. The dormant `can_review`/`can_converge` flags are a\n  deferred\
      \ nice-to-have (wiring them risks regressing existing dispatch).\n- **Provenance:**\
      \ `adapter=host_peer, family=<host>, role=swe_reviewer,\n  weight=supplementary,\
      \ gate_eligible=false, fresh_context_attestation`,\n  prompt/output/goal hashes.\
      \ Surfaced same-family so agreement isn't laundered as\n  independent cross-family\
      \ confirmation.\n- **Fresh-context = host-runtime CONTRACT** (consensus-mcp\
      \ cannot prove memory\n  isolation): recorded via `independence_attestation{method:host_peer_callback,\n\
      \  fresh_context:true, no_peer_review_visible_at_dispatch:true}`. Documented\
      \ as a\n  contract, not a mechanical guarantee. (All four reviewers flagged\
      \ this honestly.)\n- **Config:** `contributors.profiles.<name>: {kind: host_peer,\
      \ family: claude,\n  role: swe_reviewer, weight: supplementary, ...}` + a built-in\
      \ profile (named to\n  avoid colliding with a likely user profile).\n- **Results:**\
      \ tag host_peer findings same-family + supplementary in the v1.19.0\n  results\
      \ record.\n\n## Files\n- `consensus_mcp/_contributor_profiles.py` (KIND_HOST_PEER\
      \ + validation)\n- `consensus_mcp/contributors/host_peer_adapter.py` (NEW)\n\
      - `consensus_mcp/_engine_factory.py` (route + thread callback + graceful)\n\
      - `consensus_mcp/_closure_invariant.py` (honor `gate_eligible=false` — HIGHEST-RISK;\
      \ minimal + regression-tested)\n- `consensus_mcp/contributor_profiles/<host-peer>.yaml`\
      \ (built-in)\n- `consensus_mcp/dispatch_templates/{host_peer_review_template.md,\
      \ orchestrator_role.md}` (NEW)\n- `consensus_mcp/_results_log.py` (tag same-family\
      \ + supplementary)\n- tests\n\n## Acceptance gates\nSee `converged-plan.yaml`.\
      \ The load-bearing one: the cross-family closure\ninvariant is NOT weakened\
      \ — host_peer can never be the different-family signer.\n"
