# Built-in contributor profile: gemini (Google Gemini CLI).
#
# METADATA-ONLY in v1.18.0: gemini is dispatched by the EXISTING GeminiAdapter via
# B-routing. This profile supplies the wizard list, detect+guide install/auth, the
# trust-workspace env var, and the model/provenance label; it is NOT consumed by
# ProfileAdapter. Full metadata is authored for the wizard + forward-compat.
#
# install/auth strings VERIFIED 2026-05-22 (do NOT invent):
#   npm package: @google/gemini-cli ; auth: run `gemini` -> OAuth in browser.
#   env GEMINI_CLI_TRUST_WORKSPACE=true is REQUIRED for headless empty-output
#   runs on gemini CLI >=0.43 (see reference_gemini_trust_workspace).
name: gemini
kind: cli_reviewer
model: "gemini-2.5-pro"
detect:
  command: gemini
invoke:
  # METADATA-ONLY: gemini is dispatched by GeminiAdapter, not ProfileAdapter.
  # transport=flag with prompt_flag=-p reflects the real gemini CLI invocation
  # (gemini -p "<prompt>") and validates clean.
  transport: flag
  base_args: []
  prompt_flag: "-p"
  workdir_flag: null
  model_flag: "--model"
env:
  GEMINI_CLI_TRUST_WORKSPACE: "true"
output:
  strip_patterns: []
  schema_enforced: false   # gemini does not enforce the review JSON natively
sealed_filename: gemini-review.yaml
id_prefix: gemini-rev
install:
  windows: "npm install -g @google/gemini-cli"
  linux: "npm install -g @google/gemini-cli"
auth:
  command: "gemini"
  env_vars: []
  note: "OAuth on first run (browser)"
instructions:
  filename: GEMINI.md
timeout_seconds: 1800
